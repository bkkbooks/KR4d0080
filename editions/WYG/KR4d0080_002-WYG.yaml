戲李端叔次韻曽仲錫元日見寄子由生日以檀香觀音像及新合印香銀篆槃為壽次韻李端叔送保倅翟安常赴闕兼寄子由中山松醪寄雄守王引進次韻李端叔謝送牛戩鴛鴦竹石圖次韻聰上人見寄次韻王雄州還朝留别三月二十日多葉杏盛開三月二十日開園三首次韻王雄州送侍涇州臨城道中作并引過湯隂市得豌豆大麥粥示三兒子子由新修汝州龍興寺吳畫壁過髙郵寄孫君孚僕所至未甞出遊過長蘆聞復禪師病甚不可不一問既見則有間矣明日阻風復留見之作三絶句呈聞復并請轉呈於参寥子各賦數首六月七日泊金陵阻風得鍾山泉公書寄詩為謝贈清凉寺和長老予前後守倅餘杭凡五年夏秋之間蒸熱不可過獨中和堂東南頰下瞰海門洞視萬里三伏常蕭然也紹聖元年六月舟行赴嶺外熱甚忽憶此處而作是詩慈湖夾阻風五首過廬山下并引巻三十五詩四十五首起南遷盡在恵州作施注缺今補壺中九華詩并引江西一首秧馬歌并引八月七日初入贛過惶恐灘鬱孤臺亷泉塵外亭天竺寺并引過大庾嶺宿建封寺曉登盡善亭望韶石三首月華寺南華寺碧落洞峽山寺舟行至清逺縣見顧秀才極談恵州風物之羙廣州蒲澗寺贈蒲澗長老發廣州浴日亭逰羅浮山示兒子過十月二日初到恵州寓居合江樓白水山佛迹巖詠湯泉自笑朝雲并引寄虎兒十一月二十六日松風亭下梅花盛開再用前韻新釀桂酒恵守詹君見和復次韻花落復次前韻江郊并引詹守擕酒見過用前韻作詩聊復和之寄鄧道士并引上元夜正月二十四日與兒子過賴仙芝王原秀才僧曇穎行全道士何宗一同遊羅浮道院及栖禪精舍過作詩和其韻寄邁迨一首正月二十六日與數客野歩嘉祐僧舍東南野人家雜花盛開扣門求觀主人林氏媪出應白髪青帬少寡獨居三十年矣感歎之餘作詩記之龍尾石硯寄猶子逺贈王子直秀才次韻表兄程正輔江行見桃花追餞正輔至博羅賦詩為别再用前韻巻三十六詩四十八首時在恵州作施注缺今補眞一酒并引遊博羅香積寺并引次韻定慧欽長老見寄八首并引二月十九日攜白酒鱸魚過詹使君食槐葉冷淘江漲用過韻連雨江漲二首四月十一日初食荔子桄榔杖寄張文潜一首時初聞黄魯直遷黔南范淳父遷九疑也答周循州與程正輔遊碧落洞六月十二日酒醒歩月理髪而寢荔支歎江月五首并引聞正輔表兄將至以詩迎之再和同正輔表兄游白水山與正輔遊香積寺次韻正輔同遊白水山和子由次月中梳頭韻十一月九日夜夢與人論神仙道術因作一詩八句既覺頗記其語録呈子由弟後四句不甚明了今足成之章質夫送酒六壺書至而酒不逹戲作小詩問之小圃五詠人参甘菊地黄薏苡枸杞雨後行菜殘臘獨出二首新年五首二月八日與黄燾僧曇穎過逍遥堂何道士宗一問疾次韻高要令劉湜峽山寺見寄巻三十七詩五十一首起在恵州洎紹聖丁丑再貶儋耳作食荔支二首并引和子由盆中石菖蒲忽生九花遷居并引兩橋詩并引東新橋西新橋悼朝雲并引丙子重九二首白鶴峯新居欲成夜過西鄰翟秀才二首次韻子由所居六詠吳子野絶粒不睡過作詩戲之芝上人陸道士皆和予亦次其韻次韻恵循二守相㑹又次韻二守許過新居又次韻二守同訪新居循守臨行出小鬟復用前韻種茶白鶴山新居鑿井四十尺遇磐石石盡乃得泉三月二十九日二首吾謫海南子由雷州被命即行了不相知至梧廼聞尚在藤也旦夕當追及作此詩示之行瓊儋閒肩輿坐睡夢中得句云千山動鱗甲萬谷酣笙鐘覺而遇清風急雨戲作此數句次前韻寄子由安期生并引夜夢并引遷居之夕聞鄰舍兒誦書欣然而作聞子由瘦客俎經旬無肉又子由勸不讀書蕭然清坐乃無一事宥老楮觀棊糴米入寺次韻子由三首東亭冠椰子東樓次韻子由月季花再生次韻子由浴罷借前韻和子由生第四孫斗老獨覺十二月十七日夜坐逹曉寄子由謫居三適旦起理髪夜卧濯足午牕坐睡子由生日以黄子木拄杖為子由生日之夀巻三十八詩六十三首起在儋耳洎元符三年庚辰復朝奉郎提舉玉局觀北歸抵英州作過於海舶得邁寄書酒作詩逺和之皆粲然可觀子由有書相慶也因用其韻賦一篇并寄諸子姪上元夜過赴儋守召獨坐有感海南人不作寒食而以上巳上冡予攜一瓢酒尋諸生皆出矣獨老符秀才在因與飲至醉符蓋儋人之安貧守静者也新居五色雀并引倦夜用過韻冬至與諸生飲縱筆三首貧家凈掃地次韻子由贈吳子野先生二絶句被酒獨行徧至子雲威徽先覺四黎之舍三首夜燒松明火庚辰歲人日作詩聞黄河已復北流老臣舊數論此今斯言乃驗二首庚辰歲正月十二日天門冬酒熟予自漉之且漉且甞遂以大醉二首追和戊寅歲上元題過所畫枯木竹石三首眞一酒歌并引汲江煎茶予来儋耳得吠狗曰烏觜甚猛而馴隨予遷合浦過澄邁泅而濟路人皆驚戲為作此詩澄邁驛通潮閣二首泂酌亭并引六月二十日夜渡海自雷適亷宿於興亷村凈行院亷州龍眼質味殊絶可敵荔支合浦愈上人以詩名嶺外將訪道南嶽留詩壁上云閑伴孤雲自在飛東坡居士過其精舍戲和其韻梅聖俞之客歐陽晦夫使工畫茅菴巳居其中一琴横牀而巳曹子方作詩四韻僕和之云歐陽晦夫恵琴枕㽞别亷守缾笙并引歐陽晦夫遺接䍦琴枕戲作此詩謝之次韻王鬱林藤州江下夜起對月贈邵道士徐元用使君與其子端常邀僕與小兒過同遊東山浮金堂戲作此詩送鮮于都曹歸蜀灌口舊居送邵道士彦肅還都嶠書韓幹二馬將至廣州用過韻寄邁迨贈鄭清叟秀才和孫叔静兄弟李端叔唱和廣倅蕭大夫借前韻見贈復和答之二首䟦王晉叔所藏畫徐熈杏花一首趙昌四季四首和黄秀才鑒空閣韋偃牧馬圗題靈峯寺壁衆妙堂題馮通直明月湖詩後次韻鄭介夫二首巻三十九詩五十一首起建中靖國辛巳改元度嶺北歸即以是年七月卒於毗陵施注缺今補昔在九江與蘇伯固唱和其略曰我夢扁舟浮震澤雪浪横江千頃白覺来滿眼是廬山倚天無數開青壁蓋實夢也昨日又夢伯固手持乳香嬰兒示予覺而思之蓋南華賜物也豈復與伯固相見於此邪今得来書知巳在南華相待數日矣感歎不巳故先寄此詩次韻韶守狄大夫見贈二首次韻韶倅李通直二首狄韶州煮蔓菁蘆菔羮李伯時畫其弟亮功舊隠圗贈龍光長老贈嶺上老人贈嶺上梅予昔過嶺而南題詩龍泉鐘上今復過而北次前韻過嶺二首留題顯聖寺予初謫嶺南過田氏水閣東南一峯豐下鋭上里人謂之雞籠山予更名獨秀峯今復過之戲留一絶乞數珠贈南禪湜老鬱孤臺䖍守霍大夫監郡許朝奉見和復次韻贈䖍州術士謝晉臣䖍州景徳寺榮師湛然堂次陽行先用數珠韻贈湜長老和猶子遲贈孫志舉南禪長老和詩不巳故作六蟲篇答之明日南禪和詩不到重賦數珠篇以督之二首用前韻再和霍大夫用前韻再和許朝奉用前韻再和孫志舉崔文學甲攜文見過蕭然有出塵之姿問之則孫介夫之甥也故復用前韻賦一篇示志舉畫車二首䖍州吕倚承事年八十三讀書作詩不巳好収古今帖貧甚至食不足王子直去歲送子由北歸往反百舍今又相逢贛上戲用舊韻作詩留别次韻江晦叔二首次韻江晦叔兼呈器之寒食與器之遊南塔寺寂照堂器之好談禪不喜遊山山中筍出戲語器之可同参玉板長老作此詩永和清都觀道士童顔鬒髪問其年生於丙子蓋與余同求此詩贈詩僧道通張競辰永康所居萬巻堂劉壯輿長官是是堂予昔作壺中九華詩其後八年復過湖口則石已為好事者取去廼和前韻以自解云次韻郭功甫二首次韻法芝舉舊詩次舊韻贈清涼長老睡起聞米元章到東園送麥門冬飲子夢中作寄朱行中答徑山琳長老巻四十遺詩二十九首施注缺今補老翁井予以事繫御史臺獄獄吏稍見侵自度不能堪死獄中不得一别子由故作二詩授獄卒梁成以遺子由十二月二十八日䝉㤙責授檢校水部員外郎黄州團練副使復用前韻劉顗宫苑退老於廬山石碑菴顗陜西人本進士換武家有聲伎詩缺西山戲贈武昌王居士并引十二月二十日㳟聞太皇太后升遐吏以罪人不許成服欲哭則不敢欲泣則不可故作挽詞二章補唐文宗柳公權聨句戲作賈梁道詩并引戲孫公素趙成伯家有麗人僕沗鄉人不肎開樽徒吟春雪羙句次韻一笑送南屏謙師并序虛飄飄三首劉監倉家煎米粉作餅子余云為甚酥潘邠老家造逡廵酒余飲之云莫作醋錯著水来否後數日余攜家飲郊外因作小詩戲劉公求之贈包安靜先生二首元祐元年二月八日朝退獨在起居院讀漢書儒林傳感申公故事作小詩一絶初貶英州贈馬夢得贈䖍州慈雲寺鑒老洗兒過子忽出新意以山芋作玉糁羮色香味皆竒絶天上酥陀則不可知人間决無此味也擷菜并引食檳榔儋耳山夜坐與邁聨句曹谿夜觀傳燈録燈花燒一僧字戲占巻四十一追和陶淵明詩六十二首飲酒二十首并引歸田園居六首形贈影影答形神釋詠二疏詠三良詠荆軻答龎参軍貧士七首九日閑居已酉歲九月九日歲暮作和張常侍遊斜川郭主簿二首示周掾祖謝贈羊長史乞食胡西曹示顧賊曹移居二首時運始經曲阿巻四十二追和陶淵明詩六十首讀山海經十三首還舊居止酒并引西田穫蚤稻下潠田舍穫使都經錢谿赴假金陵夜行擬古九首戴主簿怨詩示龎鄧劉柴桑與殷晉安别田舍始春懐古二首停雲勸農雜詩十一首連雨獨飲二首王撫軍座送客荅龎參軍桃花源并引
