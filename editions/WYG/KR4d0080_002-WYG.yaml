body:
  text: 施註蘇詩總目下巻二十二詩五十一首時赴汝留金陵道中作是年先生在泗州度嵗秦少游夢發殯而葬之者云是劉發之柩是嵗發首薦秦以詩賀之劉涇亦作因次其韻金山夢中作次韻周穜惠石銚次韻蔣頴叔龜山辯才師贈潘谷徐大正閑軒蒜山松林中可卜居余欲僦其地地屬金山故作此詩與金山元長老王仲父哀辭并引蔡景繁官舍小閣髙郵陳直躬處士畫鴈和王斿二首次韻張琬次韻王定國南遷回見寄贈梁道人雍秀才畫草蟲八物促織牛天水蟬虎蝎蝦蟇蝸牛蜣蜋鬼蝶泗州南山監倉蕭淵東軒二首泗州除夜雪中黄師是送酥酒二首章錢二君見和復次韻答之二首正月一日雪中過淮謁客回作二首書劉君射堂孫莘老寄墨四首留題蘭臯亭和人見贈和田仲宣見贈和王勝之三首記夢并引寄蘄簟與蒲傳正寄怪石石斛與魯元翰漁父四首巻二十三詩四十八首起常州居住洎赴登州道中作是嵗元豐乙丑先生年五十施注缺今補李憲仲哀辭并引贈眼醫王生彦若與歐育六人飲酒觀杭州鈐轄歐育刀劍戰袍王伯敡所藏趙昌畫四首梅花芙蓉黄葵山茶寄吴徳仁兼簡陳季常題王逸少帖書林逋詩後和仲伯達春日贈袁陟蘇子容母陳夫人挽辭歸宜興留題竹西寺三首與孟震同遊常州僧舍三首贈常州報恩長老二首次韻答賈耘老墨花并引送竹几與謝秀才谿隂堂次韻許遵贈章黙并引送穆越州贈葛葦贈王寂南都妙峰亭神宗皇帝挽辭三首金山妙髙臺贈杜介并引次韻孫莘老斗野亭寄子由在邵伯堰送楊傑并引次韻送徐大正楊康功有石狀如醉道士為賦此詩迨作淮口遇風詩戲用其韻次韻徐積元豐七年有詔京東淮南築髙麗亭館密海二州騷然有逃亡者明年軾過之歎其壯麗留一絶云過密州次韻趙明叔喬禹功再過常山和昔年留别詩再過超然臺贈太守霍翔巻二十四詩四十三首起自登州還朝洎元祐改元在西掖作海市并引登州孫氏松堂過萊州雪後望三山遺直坊并引次韻趙令鑠次韻王定國得潁倅二首次韻趙令鑠惠酒送范純粹守慶州次韻王震次韻王定國謝韓子華過飲惠崇春江晚景二首次韻周邠次韻胡完夫次韻錢穆父次韻穆父舍人再贈之什再次韻答完夫穆父次韻答滿思復送戴䝉赴成都玉局觀將老焉送陳睦知潭州用前韻答西掖諸公見和次韻王覿正言喜雪和蔣發運送表弟程六知楚州和人假山送王伯敡守虢道者院池上作次韻子由送千之姪書文與可墨竹并引次韻錢舍人病起次韻和王鞏用王鞏韻送其姪震知蔡州虢國夫人夜遊圖用舊韻送魯元翰知洺州次韻朱光庭初夏次韻朱光庭喜雨奉敕祭西太一和韓川韻四首西太一見王荆公舊詩偶次其韻二首巻二十五詩四十九首時在翰林作次韻子由送陳侗知陜州送賈訥倅眉二首送程建用次韻李脩孺留别二首次韻黄魯直赤目和周正孺墜馬傷手戲周正孺二絶題文與可墨竹并引潘推官母李氏挽辭玉堂栽花周正孺有詩次韻杜介送魚送杜介歸揚州狄詠石屛和黄魯直燒香二首再和武昌西山并引再用前韻送楊孟容見子由與孔常父唱和詩輙次其韻余昔在館中同舍出入輙相聚飲酒賦詩近嵗不復講故終篇及之庶幾諸公稍復其舊亦太平盛事也趙令晏崔白大圖幅徑三丈次韻張昌言給事省宿次韻三舍人省上送錢承制赴廣西路分都監次韻曽子開從駕二首再和二首次韻貢父省上再和送顧子敦奉使河朔次韻子由送家退翁知懐安軍諸公餞子敦軾以病不往復次前韻和張昌言喜雨次韻劉貢父西省種竹偶與客飲孔常父見訪方設席延請忽上馬馳去巳而有詩戲用其韻答之次韻子由書李伯時所藏韓幹馬次韻劉貢父獨宿省中軾以去嵗春夏侍立邇英而秋冬之交子由相繼入侍次韻絶句四首各述所懐送宋朝散知彭州迎侍二親郭熈畫秋山平逺次韻張昌言喜雨巻二十六詩四十九首時在翰林作施註缺今補書鼂補之所藏文與可墨竹三首戲用鼂補之韻書皇親扇書李世南所畫秋景二首書鄢陵王主簿所畫折枝二首昨見韓丞相言王定國今日玉堂獨坐有懐其人和張耒髙麗松扇李誠之待制六丈挽辭次韻孔常父送張天覺河東提刑送張天覺得山字次韻王定國倅揚州贈李道士并引次韻張舜民自御史出倅虢州留别次韻米黻二王書跋尾二首次韻宋肇惠澄心紙二首郭熈秋山平逺二首送歐陽辯監澶州酒九月十五日邇英講論語終篇賜執政講讀史官燕于東宫又遣中使就賜御書詩各一首臣軾得紫薇花絶句其詞云絲綸閣下文章靜鐘鼔樓中刻漏長獨坐黄昏誰是伴紫薇花對紫薇郎翌日以表謝又進詩一篇臣軾詩云和王晉卿并引謝王澤州寄長松兼簡張天覺二首次韻劉貢父所和韓康公憶持國二首次韻劉貢父叔姪扈駕次韻韓康公置酒見留次韻王都尉偶得耳疾送喬仝寄賀君六首并引送家安國教授歸成都和子由除夜元日省宿致齋三首次韻答張天覺二首次韻黄魯直畫馬試院中作余與李廌方叔相知久矣領貢舉事而李不得第愧甚作詩送之和王晉卿送梅花次韻和宋肇游西池次韻巻二十七詩四十五首時在翰林作書艾宣畫四首竹鶴白鷴杏花黄精鹿蓮龜僕領貢舉未出錢穆父雪中作詩見及三月二十日同逰金明池始見其詩次韻為答次韻子由五月一日同轉對韓康公挽辭三首柏石圖詩并引慶源宣義王丈以累舉得官為洪雅主簿雅州戸掾遇吏民如家人人安樂之既謝事居眉之青神瑞草橋放懐自得有書來求紅帶既以遺之且作詩為戲請黄魯直秦少游各為賦一首為老人光華次韻許沖元送成都髙士敦鈐轄次前韻送程六表弟和王晉卿題李伯時畫馬和錢穆父出守越州二首戲書李伯時畫御馬好頭赤送程七表弟知泗州送曹輔赴閩漕次韻王郎子立風雨有感次韻黄魯直嘲小徳小徳魯直子其母微故其詩云解著潛夫論不妨無外家書林次中所得李伯時歸去來陽關二圖後送蹇道士歸廬山卧病逾月請郡不許復直玉堂十一月一日鎖院是日苦寒詔賜宫燭法酒書呈同院送周朝議守漢州木山并引送千乘千能兩姪還鄉送周正孺知東川題李伯時畫趙景仁琴鶴圖二首次前韻再送周正孺書王定國所藏煙江叠嶂圖次韻王定國㑹飲清虛堂興龍節侍宴前一日微雪與子由同訪王定國小飲清虛堂定國出數詩皆佳而五言尤竒子由又言昔與孫巨源同過定國感念存沒悲歎久之夜歸稍醒各賦一篇明日朝中以示定國王晉卿所藏著色山二首次韻黄魯直效進士作嵗寒知松柏詩王晉卿作煙江叠嶂圖僕賦詩十四韻晉卿和之語特竒麗因復次韻不獨紀其詩畫之美亦為道其出處契闊之故而終之以不忘在莒之戒亦朋友忠愛之義也夜直玉堂携李之儀端叔詩百餘首讀至夜半書其後范景仁和賜酒燭詩復次韻謝之次韻劉貢父春日賜幡勝再和葉公秉王仲至見和次韻答之再和巻二十八詩五十八首起在翰林洎元祐已巳出守錢塘作次韻王晉卿惠花栽栽所寓張退傅第中次韻王晉卿上元侍燕端門王鄭州挽辭書王定國所藏王晉卿畫著色山二首送吕昌朝知嘉州次韻黄魯直寄題郭明父府推潁州西齋二首次韻秦少章和錢䝉仲次韻錢越州同秦仲二子雨中逰寳山去杭州十五年復逰西湖用歐陽察判韻與莫同年雨中飲湖上送子由使契丹次韻答劉景文左藏坐上復借韻送岢嵐軍通判葉朝奉始于文登海上得白石數升如芡實可作枕聞梅丈嗜石故以遺其子子明學士子明有詩次其韻次韻錢越州見寄文登蓬萊閣下石壁千丈為海浪所戰時有碎裂淘灑嵗久皆圓熟可愛土人謂此彈子渦也取數百枚以養石菖蒲且作詩遺垂慈堂老人次韻毛滂法曹感雨送鄧宗古還鄉參寥上人初得智果院㑹者十六人分韻賦詩得心字哭王子立次兒子迨韻異鵲并引次韻詹適宣徳小飲巽亭東川清絲寄魯冀州戲贈怡然以垂雲新茶見餉報以大龍團仍戲作小詩次韻王忠玉逰虎丘三首寄蔡子華和錢四寄其弟龢卧病彌月聞垂雲花開順闍黎以詩見招次韻答之故周茂叔先生濂溪次韻子由使契丹至涿州見寄四首雪後便欲與同僚尋春一病彌月雜花都盡獨牡丹在耳劉景文左藏和順闍黎詩見贈次韻答之次韻劉景文周次元寒食同逰西湖連日與王忠玉張全翁逰西湖訪北山清順道潛二詩僧登垂雲亭飲參寥泉最後過唐州陳使君夜飲忠玉有詩次韻答之新茶送簽判程朝奉以餽其母有詩相謝次韻答之次韻送張山人歸彭城次韻林子中王彦祖唱酬壽星院寒碧軒書劉景文左藏所藏王子敬帖書景文所藏宗少文一筆畫真覺院有洛花花時不暇往四月十八日與景文同往賞枇杷又和景文韻西湖壽星院此君軒仲天貺王元直自眉山來見余錢塘留半嵗既行作絶句五首送之贈善相程傑巻二十九詩五十八首時守杭州作次韻林子中蒜山亭見寄再和并答楊次公次韻劉景文送錢䝉仲三首菩提寺南漪堂杜鵑花題楊次公春蘭題次公蕙次韻曹輔寄壑源試焙新芽次韻袁公濟謝芎椒次韻楊次公恵徑山龍井水次韻劉景文登介亭袁公濟和復次韻答之介亭餞楊傑次公次京師韻送表弟程懿叔赴夔州運判葉教授和溽字韻詩復次韻為戲記龍井之遊次韻林子中見寄安州老人食蜜歌次韻錢穆父紫薇花二首送張嘉州次韻蘇伯固主簿重九送李陶通直赴清谿次韻楊公濟梅花十首贈劉景文謝闗景仁送紅梅栽二首辯才老師退居龍井不復出入余往見之甞出至風篁嶺左右驚曰逺公復過虎谿矣辯才笑曰杜子羙不云乎與子成二老来往亦風流因作亭嶺上名曰過谿亦曰二老謹次辯才韻送程之邵簽判赴闕寄題梅宣義園亭熈寜中軾通守此郡除夜直都㕔囚繫皆滿日暮不得返舍因題一詩于壁今二十年矣衰病之餘復黍郡寄再經除夜庭事蕭然三圄皆空蓋同僚之力非拙朽所致因和前篇呈公濟子侔二通守遊寳雲寺得唐彦猷為杭州日送客舟中手書一絶句云山雨霏微不滿空畫船来往疾輕鴻誰知獨卧朱簾裡一榻無塵四面風明日送彦猷之子坰赴鄂州舟中遇微雨感歎前事因和其韻作兩首送之且歸其書唐氏送江公著知吉州聞錢道士與越守穆父飲酒送一壺次韻劉景文路分上元再和楊公濟梅花十絶與葉淳老侯敦夫張秉道同相視新河秉道有詩次韻二首巻三十詩五十七首起守杭州洎元祐辛未召還尋出守潁州作椶筍并引次韻曹子方龍山眞覺院瑞香花次韻曹子方運判雪中同遊西湖次韻仲殊雪中遊西湖二首次韻参寥同前送小本禪師赴法雲書渾令公燕魚朝恩圖次韻劉景文西湖席上次韻答馬忠玉予去杭十六年而復来留二年而去平生自覺出處老少粗似樂天雖才名相逺而安分寡求亦庻幾焉三月六日来别南北山諸道人而下天竺恵浄師以醜石贈行作三絶句次韻答黄安中兼簡林子中留别蹇道士拱辰次韻子由書王晉卿畫山水二首又書王晉卿畫四首山隂陳跡四明狂客雪谿乘興西塞風雨破琴詩并引題王晉卿畫後贈武道士彈賀若元祐六年六月自杭州召還汶公館我於東堂閲舊詩巻次諸公韻三首次韻子由書王晉卿畫山水一首而晉卿和二首感舊詩并引西湖秋涸東池魚窘甚因㑹客呼網師遷之西池為一笑之樂夜歸被酒不能寐戲作放魚一首復次放魚韻答趙承議陳教授九月十五日觀月聽琴西湖示坐客復次韻謝景貺陳履常見和兼簡歐陽叔弼兄弟送歐陽主簿赴官韋城四首泛潁六觀堂老人草書次韻劉景文見寄次韻趙景貺督兩歐陽詩破陳酒戒叔弼云履