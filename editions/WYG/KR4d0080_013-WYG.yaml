front:
  text: 東坡先生墓誌銘
  hash: sha256:a2675ee4c9496ba1008977e9779db14884cffa6f445581b471710492d29fcb3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0080_WYG_013-1a, image: WYG1110/WYG1110-0078a.png}
body:
  text: 潁濵蘇轍撰予兄子瞻謫居海南四年春正月今天子即位推恩海内澤及鳥獸夏六月公被命渡海北歸眀年舟至淮浙秋七月被病卒於毗陵吴越之民相與哭於市其君子相弔於家訃聞四方無賢愚皆咨嗟出涕太學之士數百人相率飯僧恵林佛舍嗚呼斯文墜矣後生安所復仰公始病以書屬轍曰即死𦵏我嵩山下子為我銘轍執書哭曰小子忍銘吾兄公諱軾姓蘇氏字子瞻一字和仲世家眉山曽大父諱杲贈太子太保妣宋氏追封昌國太夫人大父諱序贈太子太傅妣史氏追封嘉國太夫人考諱洵贈太子太師妣程氏追封成國太夫人公生十年而先君宦學四方太夫人親授以書聞古今成敗輒能語其要太夫人甞讀東漢史至范滂傳慨然太息公侍側曰軾若為滂夫人亦許之否乎太夫人曰汝能為滂吾顧不能為滂母耶公亦奮厲有當世志太夫人喜曰吾有子矣比冠學通經史屬文日數千言嘉祐二年歐陽文忠公考試禮部進士疾時文之詭異思有以救之梅聖俞時與其事得公論刑賞以示文忠文忠驚喜以為異人欲以冠多士疑曽子固所為子固文忠門下士也乃寘公第二復以春秋對義居第一殿試中乙科以書謝諸公文忠見之以書語聖俞曰老夫當避此人放出一頭地士聞者始譁不厭久乃信伏丁太夫人憂終喪五年授河南福昌主簿文忠以直言薦之祕閣試六論舊不起草以故文多不工公始具草文義粲然時以為難比答制䇿賜入三等除大理評事簽書鳯翔判官長吏意公文人不以吏事責之公盡心其職老吏畏伏關中自元昊叛命人貧役重岐下嵗以南山木栰自渭入河經砥柱之險衙前以破産者相繼也公徧問老校曰木栰之害本不至此若河渭未漲操栰者以時進止可無重費也患其乘河渭之暴多方害之耳公即修衙規使衙前得自擇水工栰行無虞乃言於府使得係籍自是衙前之害減半治平二年罷還判登聞鼓院英宗在藩聞公名欲以唐故事召入翰林宰相限以近例欲召試祕閣上曰未知其能否故試如蘇軾有不能耶宰相猶不可及試二論皆入三等得直史館丁先君憂服除時熙寧二年也王介甫用事多所建立公與介甫議論素異既還朝寘之官告院四年介甫欲變更科舉上疑焉使兩制三館議之公議上上悟曰吾固疑此得蘇軾議意釋然矣即日召且問何以助朕公辭避久之乃曰臣竊意陛下求治太急聽言太廣進人太銳䫟陛下安静以待物之来然後應之上竦然聴受曰卿三言朕當詳思之介甫之黨皆不恱命攝開封推官意以多事困之公決斷精敏聲聞益逺㑹上元有㫖市浙燈公宻疏舊例無有不宜以玩好示人即有㫖罷殿前初䇿進士舉子希合争言祖宗法制非是公為考官退擬答以進深中其病自是論事愈力介甫愈恨御史知雜事者為誣奏公過失窮治無所得公未甞以一言自辯乞外任避之通判杭州是時四方行青苗免役市易浙西兼行水利鹽法公於其間常因法以便民民賴以少安髙麗入貢使者凌蔑州郡押伴使臣皆本路筦庫乘勢驕横至與鈐轄亢禮公使人謂之曰逺夷慕化而来理必恭順今乃爾暴恣非汝導之不至是也不悛當奏之押伴者懼為之小戢使者發幣於官吏書稱甲子公郤之曰髙麗於本朝稱臣而不禀正朔吾安敢受使者亟易書稱熙寧然後受之時以為得體吏民畏愛及罷去猶謂之學士而不言姓自杭徙知宻州時方行手實法使民自疏財産以定戸等又使人得告其不實司農寺又下諸路不時施行者以違制論公謂提舉常平官曰違制之坐若自朝廷誰敢不従今出於司農是擅造律也若何使者驚曰公姑徐之未㡬朝廷亦知手實之害罷之宻人私以為幸郡甞有盗竊發而未獲安撫轉運司憂之遣一三班使臣領悍卒數千人入境捕之卒凶暴恣行以禁物誣民入其家争鬬至殺人畏罪驚散欲為亂民訴之公投其書不視曰必不至此潰卒聞之少安徐使人招出戮之自宻徙徐是嵗河決曹村泛於梁山泊溢於南清河城南兩山環繞吕梁百歩扼之滙於城下漲不時洩城将敗富民争出避水公曰富民若出民心動摇吾誰與守吾在是水決不能敗城驅使復入公履屨杖䇿親入武衛營呼其卒長謂之曰河将害城事急矣雖禁軍宜為我盡力卒長呼曰太守猶不避塗潦吾儕小人效命之秋也執挺入火伍中率其徒短衣徒跣持畚鍤以出築東南長堤首起戱馬臺尾屬於城堤成水至堤下害不及城民心乃安然雨日夜不止河勢益暴城不沈者三板公廬於城上過家不入使官吏分堵而守卒完城以聞復請調来嵗夫増築故城為木岸以虞水之再至朝廷従之訖事詔褒之徐人至今思焉徙知湖州以表謝上言事者擿其語以為謗遣官逮赴御史獄初公既補外見事有不便於民者不敢言亦不敢黙視也縁詩人之義託事以諷庶㡬有補於國言者従而媒孽之上初薄其過而浸潤不止至是不得巳従其請既付獄吏必欲寘之死鍜鍊久之不決上終憐之促具獄以黄州圑練副使安置公幅巾芒屩與田父野老相従溪谷之間築室於東坡自號東坡居士三年上有意復用而言者沮之上手札徙汝州略曰蘇軾黜居思咎閲嵗滋深人材實難不忍終棄未至上書自言有饑寒之憂有田在常䫟得居之書朝入夕報可士大夫知上之卒喜公也㑹晏駕不果復用至常以哲宗即位復朝奉郎知登州至登召為禮部郎中公舊善門下侍郎司馬君實及知樞宻院章子厚二人冰炭不相入子厚毎以謔侮困君實君實苦之求助於公公見子厚曰司馬君實時望甚重昔許靖以虛名無實見鄙於蜀先主法正曰靖之浮譽播流四海若不加禮必以賤賢為累先主納之乃以靖為司徒許靖且不可慢况君實乎子厚以為然君實賴以少安既而朝廷縁先帝意欲用公除起居舍人公起於憂患不欲驟履要地力辭之見宰相蔡持正自言持正曰公徊翔久矣朝中無出公右者公固辭持正曰今日誰當在公前者公曰昔林希同在館中年且長持正曰希固當先公耶卒不許然希亦由此繼補記注元祐元年公以七品服入侍延和即改賜銀緋二月遷中書舍人時君實方議改免役為差役差役行於祖宗之世法久多弊編戸充役不習官府吏虐使之多以破産而狹鄉之民或有不得休息者先帝知其然故為免役使民以戸髙下出錢而無執役之苦行法者不掲上意於雇役實費之外取錢過多民遂以病若量出為入毋多取於民則足矣君實為人忠信有餘而才智不足知免役之害而不知其利欲一切以差役代之方差官置局公亦與其選獨以實告而君實始不恱矣甞見之政事堂條陳不可君實忿然公曰昔韓魏公刺陜西義勇公為諫官争之甚力魏公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶君實笑而止公知言不用乞補外不許君實始怒有逐公意矣㑹其病卒乃巳時臺諫官多君實之人皆希合以求進惡公以直形己争求公瑕疵既不可得則因縁熙寧謗訕之說以病公公自是不安於朝矣尋除翰林學士二年復除侍讀毎進讀至治亂盛衰邪正得失之際未甞不反覆開導覬上有所覺悟上雖恭黙不言聞公所論說輒肻首善之三年權知禮部貢舉㑹大雪苦寒士坐庭中噤不能言公寛其禁約使得盡其技而巡舖内臣伺其坐起過為凌辱公以其傷動士心虧損國體奏之有㫖送内侍省撻而逐之士皆恱服甞侍上讀祖宗寳訓因及時事公歴言今賞罰不明善惡無所勸沮又黄河勢方北流而强之使東夏人寇鎮戎殺掠㡬萬人帥臣揜蔽不以聞朝廷亦不問事毎如此恐寖成衰亂之漸當軸者恨之公知不見容乞外任四年以龍圖閣學士知杭州時諫官言前宰相蔡持正知安州作詩借郝處俊事以譏刺時事大臣議逐之嶺南公宻疏言朝廷若薄確之罪則於皇帝孝治為不足若深罪確則於太皇太后仁政為小累謂宜皇帝降敕置獄逮治而太皇太后内出手詔赦之則仁孝兩得矣宣仁后心善公言而不能用公出郊未發遣内侍賜龍茶銀合用前執政恩例所以慰勞甚厚及至杭吏民習公舊政不勞而治嵗適大旱饑疫並作公請於朝免本路上供米三之一故米不翔貴復得賜度僧牒百易米以救饑者明年方春即减價糶常平米民遂免大旱之苦公又多作饘粥藥劑遣吏挾醫分坊治病活者甚衆公曰杭水陸之㑹因疫病死比他處常多乃裒羡緡得二千復發私槖得黄金五十兩以作病坊稍畜錢糧以待之至於今不廢是秋復大雨太湖汎溢害稼公度来嵗必饑復請於朝乞免上供米半又多乞度牒以糴常平米并義倉所有皆以備来嵗出糶朝廷多従之由是吴越之民復免流散杭本江海之地水泉鹹苦居民稀少唐刺史李泌始引西湖水作六井民足於水故井邑日富及白居易復浚西湖放水入運河自河入田所溉至千頃然湖水多葑自唐及錢氏嵗輒開治故湖水足用近嵗廢而不理至是湖中葑田積二十五萬餘丈而水無㡬矣運河失湖水之利則取給於江潮潮渾濁多淤河行闤闠中三年一淘為市井大患而六井亦㡬廢公始至浚茅山鹽橋二河以茅山一河専受江潮以鹽橋一河専受湖水復造堰閘以為湖水畜洩之限然後潮不入市且以餘力復完六井民稍獲其利矣公閒至湖上周視良久曰今欲去葑田葑田如雲将安所寘之湖南北三十里環湖往来終日不逹若取葑田積之湖中為長堤以通南北則葑田去而行者便矣吴人種菱春輒芟除不遺寸草葑田若去募人種菱取其利以備修湖則湖當不復堙塞乃取救荒之餘得錢糧以貫石數者萬復請於朝得百僧度牒以募役者堤成植芙蓉楊栁其上望之如圖畫杭人名之蘇公堤杭僧有浄源者舊居海濵與舶客交通牟利舶至髙麗交譽之元豐末其王子義天来朝因往拜焉至是源死其徒竊持其畫像附舶往告義天亦使其徒附舶来祭祭訖乃言國母使以金塔二祝皇帝太皇太后夀公不納而奏之曰髙麗久不入貢失賜予厚利意欲来朝以未測朝廷所以待之薄厚故以祭亡僧而行祝夀之禮禮意尠薄盖可見矣若受而不答則逺夷或以怨怒因而厚賜之正堕其計臣謂朝廷宜勿與知而使州郡以理郤之然庸僧猾商敢擅招誘外夷邀求厚利為國生事其漸不可長宜痛加懲創朝廷皆従之未㡬髙麗貢使果至公按舊例使之所至吴越七州實費二萬四千餘緡而民閒之費不在乃令諸郡量事裁損比至民獲交易之利而無侵撓之害浙江潮自海門東来勢如雷霆而浮山峙於中與漁浦諸山犬牙相錯洄洑激射嵗敗公私船不可勝計公議自浙江上流地名石門並山而東鑿為運河引浙江及谿谷諸水二十餘里以逹於江又並山為岸不能十里以逹於龍山之大慈浦自浦北折抵小嶺鑿嶺六十五丈以逹於嶺東古河浚古河數里以逹於龍山運河以避浮山之嶮人皆以為便奏聞有惡公成功者㑹公罷歸使代者盡力排之功以不成公復言三吴之水瀦為太湖太湖之水溢為松江以入海海日兩潮潮濁而江清潮水甞欲淤塞江路而江水清駛随輒滌去海口常通則吴中少水患昔蘇州以東公私船皆以篙行無陸挽者自慶歴以来松江大築挽路建長橋以扼塞江路故今三吴多水欲鑿挽路為十橋以迅江勢亦不果用人皆恨之公二十年間再莅此州有徳於其人家有畫像飲食必祝又作生祠以報六年召入為翰林承㫖復侍邇英當軸者不樂風御史攻公公之自汝移常也受命於宋㑹神考晏駕哭於宋而南至揚州常人為公買田書至公喜作詩有聞好語之句言者妄謂公聞諱而喜乞加深譴然詩刻石有時日朝廷知言者之妄皆逐之公懼請外補乃以龍圖閣學士守潁先是開封諸縣多水患吏不究本末決其陂澤注之恵民河河不能勝則陳亦多水至是又将鑿鄧艾溝與潁河並且鑿黄堆注之於淮議者多欲従之公適至遣吏以水平準之淮之漲水髙於新溝㡬一丈若鑿黄堆淮水顧流浸州境決不可為朝廷従之郡有宿賊尹遇等數人羣黨驚刧殺變主及捕盗吏兵者非一朝廷以名捕不獲被殺者噤不敢言公召汝隂尉李直方謂之曰君能擒此當力言於朝乞行優賞不獲亦以不職奏免君矣直方退緝知羣盗所在分命弓手往捕其黨而躬往捕遇直方有母年九十母子泣別而行手㦸刺而獲之然小不應格推賞不及公為言於朝請以年勞改朝散郎階為直方賞朝廷不從其後吏部以公當遷以符㑹考公自謂巳許直方卒不報七年徙揚州發運司舊主東南漕法聴操舟者私載物貨征商不得留難故操舟者富厚以官舟為家補其弊漏而周船夫之乏困故其所載率無虞而速逹近嵗不忍征商之小失一切不許故舟弊人困多盗所載以濟饑寒公私皆病公奏乞復故朝廷従之未閱嵗以兵部尚書召還兼侍讀是嵗親祀南郊為鹵簿使導駕入太廟有貴戚以其車従争道不避仗衛公於車中劾奏之明日中使傳命申敕有司嚴整仗衛尋遷禮部復兼端眀殿翰林侍讀二學士髙麗遣使請書於朝朝廷以故事盡許之公曰漢東平王請諸子及太史公書猶不肻予今髙麗所請有甚於此其可予乎不聴公臨事必以正不能俯仰随俗乞守郡自效八年以二學士知定州定久不治軍政尤弛武衛卒驕惰不敎軍校蠺食其廩賜故不敢何問公取其貪汙甚者配𨽻逺惡然後繕修營房禁止飲博軍中衣食稍足乃部勒以戰法衆皆畏伏然諸校多不自安者卒史復以贓訴其長公曰此事吾自治則可汝若得告軍中亂矣亦決配之衆乃定㑹春大閲軍禮久廢将吏不識上下之分公命舉舊典元帥常服坐帳中将吏戎服奔走執事副總管王光祖自謂老将恥之稱疾不出公召書吏作奏将上光祖震恐而出訖事無敢慢者定人言自韓魏公去不見此禮至今矣北戎久和邊兵不試臨事有不可用之憂惟沿邊弓箭社兵與寇為鄰以戰射自衛猶號精銳故相龎公守邊因其故俗立隊伍将校出入賞罰緩急可使嵗久法弛復為保甲所撓漸不為用公奏為免保甲及兩稅折變科配長吏以時訓勞不報議者惜之時方例廢舊人公坐為中書舍人日草責降官制直書其罪誣以謗訕紹聖元年遂以本官知英州尋復降一官未至復以寧逺軍節度副使安置恵州公以侍従齒嶺南編戸獨以少子過自随瘴癘所侵蠻蜑所侮胸中泊然無所蔕芥人無賢愚皆得其驩心疾苦者畀之藥殞斃者納之竁又率衆為二橋以濟病渉者恵人愛敬之居三年大臣以流竄者為未足也四年復以瓊州別駕安置昌化昌化非人所居食飲不具藥石無有初僦官屋以庇風雨有司猶謂不可則買地築室昌化士人畚土運甓以助之為屋三間人不堪其憂公食芋飲水著書以為樂時従其父老遊亦無間也元符三年大赦北還初徙㢘再徙永巳乃復朝奉郎提舉成都玉局觀居従其便公自元祐以来未甞以嵗課乞遷故官止於此勲上輕車都尉封武功縣開國伯食邑九百戸将居許病暑暴下中止於常建中靖國元年六月請老以本官致仕遂以不起未終旬日獨以諸子侍側曰吾生無惡死必不墜慎無哭泣以怛化問以後事不答湛然而逝實七月丁亥也公娶王氏追封通義郡君繼室以其女弟封同安郡君亦先公而卒子三人長曰邁雄州防禦推官知河間縣事次曰迨次曰過皆承務郎孫男六人簟符箕籥筌籌明年閏六月癸酉𦵏於汝州郟城縣釣臺鄉上瑞里公之於文得之於天少與轍皆師先君初好賈誼陸贄書論古今治亂不為空言既而讀荘子喟然歎息曰吾昔有見於中口未能言今見荘子得吾心矣乃出中庸論其言微妙皆古人所未喻甞謂轍曰吾視今世學者獨子可與我上下耳既而謫居於黄杜門深居馳騁翰墨其文一變如川之方至而轍瞠然不能及矣先君晚嵗讀易玩其爻象得其剛柔逺近喜怒逆順之情以觀其詞皆迎刃而解作易傳未完疾革命公述其志公泣受命卒以成書然後千載之微言煥然可知也復作論語說時發孔氏之祕㝡後居海南作書傳推眀上古之絶學多先儒所未逹既成三書撫之曰今世要未能信後有君子當知我矣至其遇事所為詩騷銘記書檄論譔率皆過人有東坡集四十巻後集二十巻奏議十五巻内制十巻外制三巻公詩本似李杜晚喜陶淵明追和之者㡬遍凡四巻幼而好書老而不勌自言不及晉人至唐褚薛顔栁髣髴近之平生篤於孝友輕財好施伯父太白早亡子孫未立杜氏姑卒未𦵏先君沒有遺言公既除喪即以禮𦵏姑及官可䕃補復以奏伯父之曽孫彭其於人見善稱之如恐不及見不善斥之如恐不盡見義勇於敢為而不顧其害用此數困於世然終不以為恨孔子謂伯夷叔齊古之賢人曰求仁而得仁又何怨公實有焉銘曰蘇自欒城西宅於眉世有潜徳而人莫知猗歟先君名施四方公幼師焉其學以光出而従君道直言忠行險如夷不謀其躬英宗擢之神考試之亦既知矣而未克施晚侍哲皇進以詩書誰實間之一斥而疏公心如玉焚而不灰不變生死孰為去来古有微言衆說所䝉手發其樞恃此以終心之所涵遇物則見聲融金石光溢雲漢耳目同是舉世畢知欲造其淵或眩以疑絶學不繼如已斷絃百世之後豈無其賢我初従公賴以有知撫我則兄誨我則師皆遷於南而不同歸天實為之莫知我哀
