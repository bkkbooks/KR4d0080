body:
  text: 施註蘇詩巻二十四宋蘇軾撰施元之原註武進邵長蘅刪補詩四十三首起自登州還朝洎元祐丙寅改元在西掖作本巻用王鞏韻送其姪震以後詩如干首施註缺今補海市并引予聞登州海市舊矣父老云常出於春夏今嵗晩不復見矣予到官五日而去以不見為恨禱於海神廣徳王之廟明日見焉乃作此詩東方雲海空復空羣仙出沒空明中蕩搖浮世生萬象豈有貝闕藏珠宫心知所見皆幻影敢以耳目煩神工嵗寒水冷天地閉為我起蟄鞭魚龍重樓翠阜出霜曉異事驚倒百嵗翁人閒所得容力取世外無物誰為雄率然有請不我拒信我人厄非天窮潮陽太守南遷歸喜見石廪堆祝融自言正直動山鬼豈知造物哀龍鍾信眉一笑豈易得神之報汝亦巳豐斜陽萬里孤島沒但見碧海磨青銅新詩綺語亦安用相與變滅隨東風楚辭九歌紫貝闕兮珠宫巳見金剛經一切有為法如夢幻泡影唐韓愈傳諌佛骨事貶潮州刺史又謁衡岳詩潛心黙禱若有應豈非正直能感通須臾靜掃衆峯出仰見突兀撑青空紫盖連延接天柱石廩騰擲堆祝融蘇氏演義龍鍾謂不昌熾不翹舉如䰐鬖拉搭之類漢薛宣傳欲君自圖進退可復信眉扵後十洲記蓬莱山在碧海中水皆碧故曰碧海登州孫氏松堂萬松誰種巳摐摐半嶺蒼雲映此邦露重珠瓔䝉翠盖風来石齒碎寒江浮空兩竹横南閣倒影扶桑射北牕坐待夕烽傳海嶠重城歸去踏逄逄梁元帝纂要日景在上曰反景在下曰倒景司馬相如大人賦貫列缺之倒景兮渉豐隆之滂濞注倒景氣去地四千里其景皆倒在下也詩大雅鼍鼓逢逢韓退之詩不踏曉鼔朝安眠聼逢逢過莱州雪後望三山東海如碧環西北巻登莱雲光與天色直到三山回我行適冬仲薄雪收浮埃黄昏風絮定半夜扶桑開参差太華頂出沒雲濤堆安期與羡門乗龍安在哉茂陵秋風客勸爾麾一杯帝鄉不可期楚些招歸来劉禹錫詩水遶亭䑓碧玉環地志莱州掖縣載三山在海之南岸史記封禪書秦始皇東逰海上行禮祠名山川及八神求仙人羡門之屬又八神四曰陰主祠三山又欒大敢為大言䖏之不疑大言曰臣嘗往来海中見安期羡門之屬頋以臣為賤不信臣漢紀武帝𦵏茂陵李賀金銅仙人歌茂陵劉郎秋風客晋孝武帝紀長星勸汝一杯酒陶淵明歸去来辭冨貴非吾願帝鄉不可期宋玉招魂魂兮歸来君無上天些遺直坊并引冨公之客李君諱常登人也故太守李公諱師中榜其閭曰遺直而其子大方求詩扵軾為賦一首使君不浪出羔鴈親叩門先生但清坐薤水已多言當時邦人化市無晨飲豚歳月曽㡬何客主皆九原魯經有遺歎楚些無歸魂我作遺直詩過者式其藩禮記飾羔鴈者以繢後漢陳實傳子紀紀子羣弟堪父子並著髙名同時旌命羔鴈成羣後漢龎参傳為漢陽守郡人有任棠者隐居教授参到先候之棠不與言但以薤一本水一盂置户屏前自抱孫児伏于戶下参思其微意良久曰是欲曉太守也水者欲吾清㧞大本薤者欲吾擊强宗抱兒當戶者欲吾開戶恤孤于是歎息而還家語初魯之販羊有沈猶氏者常朝飲其羊以詐市人孔子為政沈猶氏不敢飲其羊左傳昭十四年仲尼曰叔向古之遺直也次韻趙令鑠趙令鑠字伯堅一云字景貺熙寧中以諸衛将軍對䇿學士院改職方員外郎東坡已報六年穰惆悵紅塵白首郎枕上谿山猶可見門前冠盖已相望故人年少真瓊樹落筆風生戰堵牆端向甕間尋吏部老来専以醉為鄉史記貨殖傳歳在金穰水毁木饑火旱荘子庚桑楚北居畏壘之山居三年畏壘大穣先生在黄州凡跨六年故云漢文帝紀遣使者冠盖相望結轍于道晋王戎傳戎目王衍神姿髙澈如瑶林瓊樹杜子美莫相疑行集賢學士如堵牆觀我落筆中書堂指趙對䇿事也甕間用晉畢卓事巳見二十一巻岐亭詩注王績醉鄊記阮嗣宗陶淵明等十數人並㳺于醉鄉沒身不返次韻王定國得潁倅二首仙風入骨已凌雲秋水為文不受塵一噫固應號地籟餘波猶足挂天紳買牛但自捐三尺射鼠何勞挽六鈞莫向百花潭上去醉翁不見與誰親漢司馬相如傳奏大人賦天子大說飄飄有凌雲氣㳺天地之間意杜子羙詩大兒九齡色清澈秋水為神玉為骨禹貢餘波入于流沙孟郊詩簷溜擲天紳韓退之詩是時雨初霽懸瀑垂天紳三國魏杜襲傳千鈞之弩不為鼷鼠發機再見左傳定八年顔髙之弓六鈞注云三十斤為鈞百花潭疑當在潁州歐陽文忠公自號醉翁致仕居清潁尾滔滔四海我知津毎媿先生植杖耘自少多言晩聞道從今閉口不論文灧翻白獸樽中酒歸煮青泥坊底芹要識老僧無盡䖏牀前牛蟻不曽聞晋禮樂志正旦元㑹設白獸樽扵殿庭盖上施白獸有能獻直言者發此樽飲之時哲宗即位求言上書者以千計司馬温公考定孔宗翰居第一定國第二稍進用故用白獸尊事杜子美詩飯煮青泥坊底芹仙傳拾遺周末殺萇𢎞于蜀其血碧色入地化為碧玉數里内土皆青色今蜀地有青泥坊即𢎞死處傳燈録夀州樹禪師云伊伎倆有窮我不見不聞無盡牛蟻用殷仲堪父事再見次韻趙令鑠恵酒神山無石髓生世悲暫寓坐待玉膏流千載真旦暮青州老從事鬲上非所部恵然肯見從知我憎市酤開缾自洗盞肴核誰與具門前聴剝啄烹魚得尺素東方朔十洲記瀛洲有藴玉石出泉如酒味甘名玉酒或名玉膏飲之數升令人長生荘子齊物論萬世之後而一遇大聖知其解者是旦暮遇之也石髓青州注並再見送范純粹守慶州范純粹字徳孺文正公之季子哲宗即位以直龍圖閣京東轉運副使代其兄忠宣公守慶請棄所侵西夏地曰爭地未棄則邊隙無時可除于是還四砦而夏人服紹聖後以棄地故又坐黨錮屡起屡仆終龍圖閣直學士此詩言文正公在仁宗時李元昊叛命訖以計降之徳孺守慶州竟如先生所期云才大古難用論髙常近迂㸔君趙魏老乃為滕大夫浮雲無根蔕黄潦能湏臾知經㡬成敗得見真賢愚羽旄照城闕談笑安邊隅當年老使君赤手降扵菟諸郎更何事折箠鞭其雛吾知鄧平叔不鬭月支胡孫樵與賈希逸書玉川子月蝕詩韓吏部進學觧莫不倚天㧞地句句欲活讀之如赤手捕長􅉬不施鞚騎生馬老使君指文正也後漢鄧禹傳帝徴禹還勅曰赤眉無榖自當来東吾折箠笞之非諸将憂也又鄧訓傳字平叔為䕶羗校尉先是小月氏胡分居塞内勝兵者二三千騎毎與羗戰常以少制多時迷吾子迷唐與武威種羗合兵萬騎来至塞下欲脅月氏胡訓擁衛稽故令不得戰又令開城及所居園門悉驅羣胡妻子納之嚴兵守衛羗掠無所得因即觧去由是湟中諸胡皆言漢家常欲鬬我曺今鄧使君待我以恩信開門納我妻子咸歡喜叩頭曰惟使君所命次韻王震攜文過我治平閒霧豹當時始一斑聞道吹嘘借餘論故教流落得生還清篇帶月来霜夜妙語先春發病顔詩酒暮年猶足用竹林髙㑹許時攀劉向列女傳陶答子相陶家教不修而冨其妻曰妾聞南山有豹霧雨七日不下食欲以澤其毛衣而成文章也晋書王獻之年數歳嘗觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹時見一斑後漢鄭太傳孔公緒清談髙論嘘枯吹生南史謝脁傳是子聲名未立應共奨成無惜齒牙餘論晋嵇康傳所與神交者阮籍山濤預其流者向秀劉伶籍兄子咸王戎遂為竹林之遊世謂竹林七賢按震字子發定國之姪也故以咸為比次韻王定國謝韓子華過飲楚有孫叔敖長城隐千里哀哉練帬子負薪躡破履豈無故交親逝去如覆水不如老優孟談笑託諧美世家不可恃如倚折足几祥符有賢相手握天下砥懿敏亦名公三貴徳爵齒盖棺今㡬日公子誰料理誰要卿料理欲說且止止宅相開府公久為蒼生起如何垂老别氷盤餽蒼耳親嫌妨鶚薦相對發微泚新詩如彈丸脫手不移晷我亦老賔客苦語落紈綺莫辭三上章有道貧賤恥唐李勣傳帝嘗曰我用勣守并突厥不敢南向賢長城逺矣南史檀道濟傳壞汝萬里長城又任昉傳昉卒後有子不䏻自振生平舊交莫有收恤西華冬月著葛帔練帬道逄劉孝標泫然矜之為著廣絶交論優孟事在史記滑稽傳屡見按定國大父魏國文正公相真宗于景徳祥符閒四方底平懿敏公事仁宗出入侍從将帥三十餘年法華經止止不湏說我法妙難思晋魏舒傳外家寗氏起宅相者云當出貴甥舒曰當為成此宅相韓子華乃王氏甥後漢禰衡傳孔融上疏薦衡曰鷙鳥累百不如一鶚使衡立朝必有可觀杜子美墜馬歌甫也諸侯老賔客班氏叙傳綺襦紈袴之間恵崇春江晩景二首圖畫見聞志建陽僧恵崇尤工小景為寒汀逺渚蕭灑虛曠之象人所難到竹外桃花三兩枝春江水暖鴨先知蔞蒿滿地蘆芽短正是河豚欲上時梅聖俞河豚詩春洲生荻牙春岸飛楊花河豚扵此時貴不數魚蝦兩兩歸鴻欲破羣依依還似北歸人遥知朔漠多風雪更待江南半月春次韻周邠周邠字開祖已見第六巻公倅杭相與倡醻故結句云南遷欲舉力田科三徑初成樂事多豈意殘年踏朝市有如疲馬畏陵坡羡君同甲心方壮笑我無聊鬢巳皤何日西湖尋舊賞淡煙疎雨暗漁蓑次韻胡完夫胡完夫名宗愈晋陵人副樞宿之姪青衫别淚尚斕斑十載江湖困抱關老去上書還北闕朝来拄笏㸔西山相從杯酒形骸外笑說平生醉夢間萬事㑹湏咨伯始白頭容我占清閒抱關用蕭望之事拄笏用王嶶之事並已見荘子徳充符子與我㳺扵形骸之内而子索我扵形骸之外不亦過乎後漢胡廣傳字伯始逹練事體明解朝章京師諺曰萬事不理問伯始天下中庸有胡公次韻錢穆父欽宗在東宫時所藏東坡帖甚冨多有宸翰僉題即位後出二十軸賜吳少宰元中元中為曽文清妹婿以十軸歸之今藏于元孫戶部郎樂道槃宿為餘姚嘗刻石縣齋墨蹟云病客来從飯顆山集本作遷客一言置我老劉間集本作二劉諸家所註皆引石勒載記云朕當在二劉之間耳先生自註云公行軾告詞引董仲舒劉向事此註集本亦不載今補十穆父名勰吳越譲王諸孫五歳日誦千言三歳制舉業成既中秘閣選廷對入等矣㑹王介甫惡孔經父䇿罷科不得第以䕃入宫神宗召對将任以清要介甫知其必不附已命權鹽鐡判官元祐初拜中書舎人故有故人飛上金鑾殿之句哲宗蒞政入翰林章子厚當軸憾其疇昔謫詞有怏怏非少主之臣硜硜無大臣之節二語罷知池州以卒後追復龍圖閣學士老入明光踏舊班染湏那復唱陽關故人飛上金鑾殿病集作遷客来從飯顆山大筆推君西漢手一言置我老劉集作二劉閒公自注公行軾告詞引董仲舒劉向事便湏置酒呼同舎㸔賜飛龍出帝閑漢武帝紀太初四年秋起明光宫杜子羙十二月一日詩明光起草人所羡韋執誼翰林内志至徳以後置學士東院于金鑾殿西隨上所有而遷取其近便李太白詩承恩初入銀臺門著書獨在金鑾殿晋王珣傳夢人以大筆如椽與之既覺語人云此當有大手筆事王注劉向劉歆父子俱以文章學術稱又晋書載記石勒謂徐光曰朕當在二劉之間耳蘅按公自注云云則王注非唐兵志天子御馬總有十二閑其後禁中又増置飛龍廐次韻穆父舎人再贈之什此首集本不載今補入是時先生為起居舎人故用唐志所載起居郎執筆記録事詔語春温昨夜班屋頭鳴鴂便關關逰仙夢覺月臨幌賀雨詩成雲滿山憐我白頭来仗下㸔君黄氣發眉閒鳯池故事同機務火急開樽及尚閑續漢禮儀志立春之日下寛大詔書唐儀衛志衙凡朝㑹之仗三衛畨上分為五仗一曰供奉仗二曰親仗三曰勲仗四曰翊仗五曰散手仗毎月以四十六人立内廊閣外號曰内仗以左右金吾将軍當上中郎将一人押之朝罷皇帝歩入東序門然後放仗又百官志毎仗下議政事起居郎一人執筆記録扵前韓退之詩眉間黄色見歸期相書喜色紅黄晋荀朂傳奪我鳯凰池何賀我耶唐百官志中書舎人㕘議表章百司奏議考課皆預裁焉再次韻答完夫穆父公自注二公自言先世同在西掖掖垣老吏一作史識郎君並轡天街兩絶塵汗血固應生有種夜光那復困無因豈知西省深嚴地也着東坡病痩身免使謫仙明月下狂歌對影只三人劉禛詩誰謂相去逺隔此西掖垣注引應劭漢官儀曰左右曺受尚書事前世文士以中書在右因謂中書為右曹又稱西掖垣李太白月下獨酌詩舉杯邀明月對影成三人次韻答滿思復滿思復字中行元豐末為左司郎中哲宗即位東坡自登州召入為郎禮部旬餘擢起居舎人中行並命為起居郎又同省而中行為東陽人故有跛䍧随赤驥嗁烏巷有顔之句自甘茅屋老三閒豈意彤廷綴兩班紙落雲煙供醉後詩成珠玉㸔朝還誰言載酒山無賀記取嗁烏巷有顔但恐跛䍧随赤驥青雲飛歩不容攀杜子美和賈至詩朝罷香煙㩗滿袖詩成珠玉在揮毫載酒用李白稽山無賀老句注屡見異苑東陽顔烏以純孝著聞父死負土成墳羣烏銜土助之烏口皆傷因名縣曰烏傷圖經云即今義烏也顔烏秦時人送戴䝉赴成都玉局觀将老焉拾遺被酒行歌處野梅官栁西郊路聞道華陽版籍中至今尚有城南杜我欲歸尋萬里橋水花風葉暮瀟瀟芋魁徑尺誰能盡榿木三年已足燒百歳風狂定何有羡君今作峨眉叟縦未家生執㦸郎也應世出埋輪守莫欺老病未歸身玉局他年第㡬人㑹待子猷清興發還湏雪夜去尋君杜子美西郊詩時出碧雞坊西郊向草堂市橋官栁細江路野梅香子美至徳二年拜右拾遺見唐本傳唐地理志成都府蜀郡華陽縣本蜀縣乾元元年更名王子韶鷄跖集韋曲杜鄠近長安諺云城南韋杜去天尺五趙抃成都集記萬里橋諸葛孔明扵此送吳使張温曰此水下至揚州萬里因以為名或云孔明送費褘聘吳至此曰萬里之行自此始二說雖殊要之因孔明得名杜子美詩萬里橋西一草堂百花潭水即滄浪漢翟方進傳童謡曰飯我豆食羮芋魁貨殖傳卓氏遷之蜀曰吾聞岷山之下沃野下有踆鴟至死不饑顔師古注踆䲭謂芋也蜀本記蜀人以榿木為薪種之三年可燒杜子美詩飽聞榿木三年大韓退之詩男兒不再壮百歳如風狂漢揚雄傳揚雄字子雲蜀郡成都人也又雄待詔歳餘奏羽獵賦除為郎後漢張綱傳漢安元年選遣八使循行風俗綱獨埋其車輪扵洛陽都亭曰豺狼當道安問狐狸遂條奏大将軍冀十五事京師震悚按雄與綱俱蜀人詩故云北斗經地神湧出扶一玉局而作髙座成都集記永夀元年老君駕龍車張道陵乗白鶴同至太皥玉女修大丹之所感地神湧出局腳玉牀老君升座說北斗經開元中道士羅上清奏重修殿宇本名玉局治避髙宗諱改為玉局化國朝為玉局觀置提舉主管官送陳睦知潭州陳睦字和叔嘉祐六年第進士初和叔為兩浙提刑嘗駁勘裘氏婢夏沈香獄差秀州倅張若濟重勘夏沈香遂坐死杜陳戚三掾亦得衝替語在第七巻公時倅杭賦詩送之云殺人無驗中不快此恨終身恐難了盖指和叔若濟云茲送和叔所述者止少時登臨相從而已並無一語及其人則不與之意可見華清縹眇浮髙棟上有纈林藏石罋一杯此地初識君千巖夜上同飛鞚君時年少面如玉一飲百觚嫌未痛白鹿泉頭山月出寒光潑眼如流汞朝元閣上酒醒時卧聴風鸞鳴鐵鳯舊㳺空在人何䖏二十三年真一夢我得生還雪髯滿君亦老嫌金帶重有如社燕與秋鴻相逢未穏還相送洞庭青草𣺌無際天柱紫盖森欲動湖南萬古一長嗟付與騷人發嘲弄唐地理志京兆府昭應縣注有宮在驪山下正觀十八年置咸亨二年始名温泉宫天寳六載更曰華清宫杜牧之華清宫辭神仙髙縹眇白樂天詩黄夾纈林寒有葉鄭嵎津陽門詩注云津陽門在華清宫之外闕石罋寺嵓下有天然石形如罋以貯飛泉寺僧於上層飛楼中懸轆轤斜引修綆泉出扵紅樓喬木之杪互見十九巻注又朝元閣南即老君見䖏述征記長安東則驪山西則白鹿原而驪山中又有白鹿觀云陸倕石闕銘蒼龍元武之制銅雀鐵鳯之工薛綜西京賦注圓闕上作鐵鳯皇令張兩翼舉頭敷尾故老杜賛公房詩曰鐵鳯森翺翔又贈崔評事詩曰隂沉鐵鳯闕杜祁公詩老嫌金帯重再見杜子美詩洞庭猶在目青草續為名注青草湖與洞庭湖相連在岳州衡山記天柱峯髙四千一百尺夏禹理水刻石峯上紫盖峯多隠雲表常有白鶴仙童飛翔其側杜子美詩湖南清絶地萬古一長嗟用前韻答西掖諸公見和雙猊蟠礎龍纒棟金井轆轤鳴曉罋小殿垂簾碧一作白玉鉤大宛立仗青絲鞚風馭賔天雲雨隔孤臣忍涙肝腸痛羡君意氣風生坐落筆縱横盤走汞上樽日日瀉黄封賜茗時時開小鳯閉門憐我老太元給札㸔君賦雲夢金奏不知江海眩木𤓰屢費瓊瑶重豈惟蹇歩困追攀已覺侍史疲奔送春還宫栁腰支活雨一作水入御溝鱗甲動借君妙語發春容顧我風琴不成㺯梅聖俞和人早朝詩耽耽玉宇龍纒棟靄靄金爐獸齧環李賀詩轆轤吚啞轉鳴玉戴延之西征記洛陽太極殿有金井欄金博山轆轤蛟龍負山於井上漢張騫傳大宛有善馬唐顔真卿傳太宗置立仗馬二有急奏湏乘者聴漢翟方進傳賜上尊酒黄封内庫官法酒也歐陽公龍茶録後序茶之為物至精而小團又其精者仁宗南郊致齋之夕中書密院各四人共賜一餅宫人剪金為龍鳯貼其上兩府八家分割以歸嘉祐七年明堂始人賜一餅茶經云茗茶之晩取者集韻亦云左傳成十二年金奏作于下史記孟嘗君傳孟嘗君待客坐語而屏風後嘗有侍史主記君所與客語杜子美漫興詩隔戶楊栁弱嫋嫋恰似十五女兒腰潘閬風琹詩到底不能成一曲次韻王覿正言喜雪王覿字明叟泰州如臯人第進士元祐初吕正獻范忠宣薦其可大任擢右正言進司諫極言當位者姦邪害正使一二元老不得行其志章數十上公論韙之公時為右史故云我方執筆待君猶伏閤爭云云聖人與天通有詔寛獄市好語夜喧街濕雲朝覆砌紛然退朝後色映宫槐媚欲誇剪刻工故上朱藍袂我方執筆待一作侍未敢書上瑞君猶伏閤爭髙論亦少慰霏霏止還作盎盎風與氣神龍久潛伏一怒勢必倍行當見三白拜舞讙萬歳歸来飲君家酣詠追既醉漢曺参傳以齊獄市為寄慎勿擾也韓退之李花詩誰将平地千堆雪剪刻作此連天花吳陸暢雪詩天人寧底巧剪冰作飛花宋書大明五年正月朔賀雪落太宰義㳟衣有六出奏以為瑞上說李郢雪霽登樓詩城樓飛雪定猶㸔謝荘衣注云謝荘朝廻衣為飄雪印㸃時人翫之為風韻見宋書符瑞志舊唐書陽城為諫議大夫伏閤上疏杜牧李賀詩集序春之盎盎不足為其和也漢武帝紀元封元年詔曰翌日親登嵩髙御史乗屬在廟旁吏卒咸聞呼萬歳者三毛詩既醉太平也醉酒飽徳人有士君子之行焉和蒋發運之竒字穎叔冝興人夜語飜千偈書来又一言此身真佛祖何䖏不羲軒船穏江吹坐樓空月入樽遥知思我處醉墨在頽垣送表弟程六知楚州公母成國太夫人程氏眉山著姓其姪之才字正輔第二之元字徳孺第六即楚州也之邵字懿叔第七炯炯明珠照雙璧當年三老蘇程石里人下道避鳩杖刺史迎門倒鳧舄我時與子皆兒童狂走從人覓梨栗健如黄犢不可恃隙過白駒那暇惜醴泉寺古垂橘柚石頭山髙暗松櫟諸孫相逄萬里外一笑未解千憂集子方得郡古山陽老手生風謝刀筆我正含毫紫微閣病眼昏花困書檄莫教印綬繫餘年去掃墳墓當有日功成頭白早歸来共藉棃花作寒食後漢禮儀志中秋之月縣道案戶比民年七十者授以玉杖杖端以鳩鳥為飾鳩不噎之鳥也欲老人不噎杜子美百憂集行憶昔十五心尚孩健如黄犢走復来庭前八月棃棗熟一日上樹能千回唐地里志楚州本江都郡之山陽地漢趙廣漢傳見事風生蕭何傳起秦刀筆吏顔師古曰刀所以削書也古者用簡牒故吏皆以刀筆自随唐百官志開元元年改中書省為紫微按公時為中書舎人爾雅書記曰書說文檄二尺書也釋名檄激也下官激迎其上之書文也漢嚴延年傳行矣去汝東歸掃除墳墓耳和人假山上黨攙天碧玉環絶河千里抱商顔試觀煙雨三峰外都在靈仙一掌閒造物何如童子戲寫真聊發使君閑何當挈取西征去畫作圍牀六曲山漢溝洫志引洛水至商顔下顔師古曰商顔商山之顔也楊敬之華山賦天雨初霽三峰相差張平子西亰賦巨靈髙掌厥跡猶存山志華山首陽山黄河流扵二山間相傳此本一山當河河水過而曲行河神巨靈以手擘開其上以足蹈離其下以通流今華山有手跡仙掌峰是也法華經乃至童子戯聚沙為佛塔李賀屏風曲團廻六曲抱膏蘭送王伯敡守虢王伯敡名廷老華山東麓秦遺民當時依山来避秦至今風俗含古意柔桑渌水招行人行人掉臂不回首爭入崤函土囊口惟有使君千里来欲飲三堂無事酒三堂本来一事無日長睡起聞投壺牀頭硯石開雲月澗底松根斸雪腴山棚盗散人安寝勸買耕牛發陳廩歸来只作水衡卿我欲㩗壺就君飲楊文公談苑華山南有川廣袤數百里連山洞壑不知其極人有登蓮華峰絶頂俯瞰人煙舎屋相望四時常有花木疑靈仙之窟宅又云秦人避難者居此其裔也史記孟嘗君傳馮驩曰君獨不見夫朝趍市者乎明旦側肩爭門而入日暮之後過市朝者掉臂而不頋又秦本紀孝公㩀崤函之固擁雍州之地宋玉風賦起扵青蘋之末盛怒扵土囊之口唐文粹吕温虢州三堂記云開元初天子思二南之風並選宗英共持理柄虢大而近匪親不居時惟五王出入相授承平易理逸政多暇考卜惟勝作為三堂三者明臣子在三之節堂者勵宗室克構之義韓退之和虢州劉使君三堂新題詩序云虢州刺史宅連水池竹林往往為亭䑓島渚目其處為三堂劉兄出刺此州職修人治州中稱無事頗復増飾從子弟而㳺其閒米芾硯史虢石可為硯又有茯苓舊唐書憲宗紀李師道與嵩山僧圓淨謀反呂元膺圍之賊入嵩岳山棚盡擒之亦見通鑑漢循吏傳龔遂為渤海太守民有帯持刀劍者使賣劍買牛賣刀買犢又秋冬課收歛益畜果實菱芡郡中皆有畜積吏民皆冨實数年上徴遂以年老拜為水衡都尉道者院池上作下馬逄佳客㩗壺傍小池清風亂荷葉細雨出魚兒井好能冰齒茶甘不上眉歸途更蕭瑟真箇解催詩杜子美水檻遣心詩細雨魚兒出㣲風燕子斜又詩歸路翻蕭颯陂塘五月秋又丈八溝納凉詩片雲頭上黒應是雨催詩次韻子由送千之姪江上松楠深復深滿山風雨作龍吟年来老幹都生菌下有孫枝欲出林白髮未成歸隠計青山儻有濟時心閉門試草三千牘仄席求人少似今栁子厚與蕭俛書朽枿敗腐猶足蒸出芝菌嵇康琴賦乃斲孫枝凖量所任史記滑稽傳東方朔初入長安至公車上書凡用三千牘後漢章帝紀建初五年詔曰朕思遲直士仄席異聞羊叔子譲開府表側席求賢不遺幽賤書文與可墨竹并引亡友文與可有四絶詩一楚辭二草書三畫四與可嘗云世無知我者惟子瞻一見識吾妙處既沒七年覩其遺跡而作是詩筆與子皆逝詩今誰為新空遺運斤質郤弔㫁絃人次韻錢舎人病起牀下龜寒且耐支杯中􅉬去未應衰殿門明日逄王傅櫑具爭先看不疑坐覺香煙攜袖少獨愁花影上廊遲何妨一笑千疴散絶勝倉公飲上池龜支牀出史記龜䇿傳杯􅉬出晋書樂廣傳並已見史記日者傳宋忠賈誼聞司馬季主言伏軾低頭卒不能出氣居三日宋忠見賈誼扵殿門外乃相引屏語相謂自嘆云云誼為梁王傅漢雋不疑傳暴勝之為直指使者不疑冠進賢冠帯櫑具劍上謁應劭曰櫑具木標首之劍櫑落大壮也晋灼曰古長劍首以玉作轆轤形刻木作山形如蓮花未敷時今大劍木首其状似此櫑音磊荘子逹生篇桓公田扵澤見鬼焉公反誒詒為病齊士有皇子告敖者曰公則自傷鬼惡能傷公云云桓公囅然笑曰此寡人之所見也扵是正衣冠與之坐不終日而不知病之去也史記扁鵲傳少時遇長桑君出其懐中藥予扁鵲曰飲是以上池之水三十日當知物矣按倉公淳于意也飲上池乃扁鵲事公詩偶誤次韻和王鞏謫仙竄夜郎子美耕東屯造物豈不惜要令工語言王郎年少日文如缾水翻爭鋒雖剽甚聞鼓或驚奔天欲成就之使觸羝羊藩孤光照㣲陋耿如月在盆歸来千首詩傾瀉五石樽郤疑彭澤在頗覺蘇州煩君㸔騶忌子㢘折配春温知音必無人壊壁挂桐孫唐李白傳賀知章曰子謫仙人也後以從永王璘辟長流夜郎杜子美移居東屯詩淹留為稻畦又東屯稻畦二百頃漢張良傳楚人剽疾願上慎毋與楚争鋒周易羝羊觸藩不能遂不能退無攸利史記騶忌子以鼔琴見威王曰大絃濁以春温者君也小絃㢘折以清者相也再見李善注文選周禮注云孫枝竹枝之未生者桐孫亦然李賀詩嶧陽老樹非桐孫風俗通梧桐生扵嶧陽山採東南孫枝為琴聲甚清雅用王鞏韻送其姪震知蔡州王震字子發文正公旦曽孫子發時為給事中故云夕郎九門插天開萬馬先朝屯舉鞭紅塵中相見不得言亱走清虛宿扣門驚鵲翻君家汾陽家永巷車雷奔夕郎方不夕列㦸以自藩相逄開月閣畫簷低金盆至今夢中語猶舉燈前尊阿戎修玉牒未惮筆削煩君歸助獻納坐繼岑與温我客二子閒不復尋諸孫公自注子美詩云權門多噂沓且復尋諸孫長安志郭汾陽宅在親仁里居其里四分之一中通永巷子孫甚衆杜牧阿房宫賦雷霆乍驚宫車過也漢故事黄門郎毎日暮入對青𤨏門拜故謂之夕郎即今之給事中也金盆用杜詩語屡見晋王戎傳阮籍謂王渾曰與卿語不如共阿戎談王注岑則岑文本與其兄子長倩温則温大雅與其弟彦博也文本為中書舎人侍郎令而兄子長倩為兵部侍郎同中書門下平章事大雅為黄門侍郎而彦博為中書舎人侍郎令虢國夫人夜㳺圖佳人自鞚玉花驄翩如驚燕踏飛龍金鞭爭道寳釵落何人先入明光宫宫中羯鼓催花栁玉奴絃索花奴手坐中八姨真貴人走馬来㸔不動塵明眸皓齒誰復見只有丹青餘淚㾗人間俯仰成今古吳公䑓下雷塘路當時亦笑張麗華不知門外韓擒虎唐史正月望夜楊家五宅夜㳺與廣平公主爭西市門楊氏怒鞭及公主衣公主堕馬羯鼓注再見玉奴已見十九巻楊妃外傳妃善琵琶諸王貴主洎虢國已下並為弟子毎授曲畢皆廣有進獻汝陽王名璡小名花奴尤善羯鼓帝嘗謂侍官曰召花奴将羯鼓来為我觧穢又八姨封虢國夫人不施糚自有美麗常素面朝天杜子美詩虢國夫人承主恩平明騎馬入宫門郤嫌脂粉涴顔色淡掃蛾眉朝至尊又詩明眸皓齒今何在血汙㳺魂歸不得地志揚州吳公臺以陳将吳明徹得名在江都縣西雷塘在縣東北十里煬帝初𦵏吳公臺下唐平江南改𦵏雷塘大業拾遺帝昏湎滋深嘗行吳公臺下恍惚與陳後主遇後主云毎憶張麗華方憑臨春閣作璧月詞未終見韓擒虎躍領萬騎直来衝入便至今日始謂殿下政治在堯舜之上今日還此逸㳺曩時何見罪之深也帝叱之不復有所睹杜牧詩門外韓擒虎樓頭張麗華用舊韻送魯元翰知洺州我在東坡下躬耕三畝園君為尚書郎坐擁百吏繁鳴蛙與鼓吹等是俗物喧永謝十年舊老死三家村惟君綈袍信到我雀羅門緬懐故人意欲使薄夫敦新年到宣室白首代堯言相逄問前軰所見多後一作從昆道館雖云樂冷卿當復温還持刺史節郤駕朱輪軒黄髮方用事白䰅冝少存嗣聖真生知拯民如救燔初囚羽淵魄盡返湘江魂坐憂東郡决老守思王尊北流桑柘沒故道塵埃翻知君一寸心可敵千歩垣流亡自栖止老㓜忘崩犇得閑閉閣坐勿使道眼渾聊乗應捨筏直泝無生源歸来成二老夜榻當重論因話録祠部謂之冰㕔以其冷也王注丗傳京師謂光禄為飽卿衛尉為煖卿鴻臚為睡卿司農為走卿宗正為冷卿左傳堯殛鯀扵羽山其神化為黄熊以入扵羽淵王注時哲宗初登極太母垂簾悉罷新法而元豐末年用事宰執皆斥逐當時議新法不合被竄謫者皆召還録用金剛經如来常說汝等比邱知我說法如筏喻者法尚應捨何况非法次韻朱光庭初夏朝罷人人識鄭崇直聲如在履聲中卧聞疎響梧桐雨獨詠㣲凉殿閣風諫苑君方續承業醉鄉我欲訪無功陶然一枕誰呼覺牛蟻初除病後聰漢書鄭崇傳字子㳺哀帝擢為尚書僕射數諌爭上初納用之毎見曵革履上笑曰我識鄭尚書履聲南史李承業集古今章疏作諌苑次韻朱光庭喜雨久苦趙盾日欣逢傅說霖坐知千里足初覺兩河深破屋常持傘無薪欲㸑琴清詩似庭燎雖美未㤀箴左傳文七年趙衰冬日之日也趙盾夏日之日也書説命若歳大旱用汝作霖雨詩小雅庭燎美宣王也因以箴之奉敕祭西太一和韓川韻四首東軒筆録太一宫舊在京城西蘇村謂之西太一熙寧初詔作宫扵京城之東西隅謂之中太一聖主新除秘祝侍臣来乞豐年夀宫神君欲至半夜靈風肅然漢文紀十三年詔曰盖聞祸自怨起而福由徳興今秘祝之官移過扵下以彰吾之不徳朕甚不取其除之漢郊祀志武帝置夀宫神君神君最貴者太一其佐曰大禁司命之屬皆從之非可得見聞其言言與人音等時去時来来則風肅然也三輔黄圖夀宫北宫有神仙居夀宫張羽旗設供具以禮神明若神明来則肅然風生幃帳皆動玉璽親題御筆金章来侍天香禮罷祝融參乗前驅已過衡湘司馬相如大人賦祝融警而蹕御兮清氣氛而後行解劍獨行殘月披衣困卧清風夢蝶猶飛旅枕粥魚已響枯桐陂水初含曉渌稻花半作秋香皂盖郤迎朝日紅雲正繞宫牆西太一見王荆公舊詩偶次其韻二首王荆公詩云栁葉鳴蜩綠暗荷花落日紅酣三十六陂春水白頭相見江南二十年前此地父兄持我東西今日重来白首欲尋舊迹都迷先生見此兩絶注目久之曰此老野狐精也遂和之後魯直亦和四首秋早川源淨麗雨餘風日清酣從此歸耕劍外何人送我池南杜詩草木變衰行劍外池南盖歸蜀之路但有樽中若下何湏墓上征西聞道烏衣巷口而今煙草萋迷吳興記上若下若村並出美酒再見魏武紀注載公十二月已亥令云云後徴為都尉及遷為典軍校尉意遂更欲為國家討賊立功欲望封侯作征西将軍然後題墓道言漢故征西将軍曺侯之墓此其志也烏衣巷在金陵荆公居金陵是時已薨故云施註蘇詩巻二十四
