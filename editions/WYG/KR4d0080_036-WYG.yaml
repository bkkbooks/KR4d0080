body:
  text: 施註蘇詩巻二十二宋蘇軾撰施元之原註武進邵長蘅刪補詩五十一首時赴汝留金陵道中作是年先生在泗州度嵗巻中有泗州除夜雪中謝黄師是送酒及正月一日雪中過淮謁客詩秦少游夢發殯而𦵏之者云是劉發之柩是嵗發首薦秦以詩賀之劉涇亦作因次其韻君㸔三代士執雉本以殺身為小補居官死職戰死綏夢尸得官真古語五行勝巳斯為官官如草木吾如土仕而未禄猶賔客待以純臣盖非古餽焉曰獻稱寡君豈比公卿相爾汝世衰道微士失巳得喪悲歡反其故草袍蘆箠相嫵媚飲食嬉游事羣聚曲江船舫月燈毬是謂舞殯而歌墓㸔花走馬到東野餘子紛紛何足數二生年少兩豪逸詩酒不知軒冕苦故令將仕夢發棺勸子勿為官所腐塗車芻靈皆假設著眼細㸔君勿誤時來聊復一飛鳴進隠不須煩伍舉周禮凡贄卿執羔大夫執鴈士執雉晉殷浩傳或問將得官而夢棺將得財而夢糞何也浩曰官本臭腐故將得官而夢尸錢本糞土故將得財而夢穢時以為名言珞琭子人命五行尅我者為官禮記仕而未禄者君有餽焉曰獻使焉曰寡君違而君薨弗為服也庾信哀江南賦青袍似草古詩青袍似春草長條隨風舒韓退之永貞行睒閃跳踉相嫵媚列子天瑞篇長㓜羣聚而為牢藉庖厨之物奚異犬豕之類乎撫言新進士宴名有月燈打毬又曲江亭子進士開宴既撤饌則移樂泛舟率為常例咸鎬故事二月士女咸出觀新進士月燈閣打毬會孟東野登第詩春風得意馬蹄疾一日㸔盡長安花禮記塗車芻靈自古有之明器之道也唐張嘉貞傳張説曰宰相時來則為史記楚世家莊王即位三年日夜為樂令國中曰敢諫者死伍舉入諫願有進隠曰有鳥在於阜三年不蜚不鳴是何鳥也王曰三年不蜚蜚則冲天三年不鳴鳴則驚人舉退矣吾知之矣金山夢中作江東賈客木綿裘會㪚金山月滿樓夜半潮來風又熟卧吹簫管到揚州番禺雜編木綿先花後葉紫赤色大如椀二月三月間花既謝蘂為綿有殻盛之彼人績為衣裘唐漢中王瑀嘗蚤朝聞笛聲曰何故卧吹笛工驚謝附譲皇帝傳次韻周穜惠石銚周穜字仁熟御史秩之弟公先曽舉充鄆州敎授元祐三年穜上䟽乞以王安石配享神宗公兩上章自劾乞正繆舉之辠穜後由此致身從槖云銅腥鐵澀不宜泉愛此蒼然深且寛蟹眼翻波湯巳作龍頭拒火柄猶寒薑新鹽少茶初熟水漬雲烝蘚未乾自古函牛多折足要知無脚是輕安陸羽茶經漉水其格以生銅鑄之以備水濕韓石鼎聯句龍頭縮菌蠢又外苞乾蘚文中有暗浪驚淮南子函牛之鼎沸則蛾不得置一足焉後漢劉陶傳猶舉函牛之鼎絓纖柘之木周易鼎卦鼎折足楞嚴經心悟實相身意輕安次韻蒋頴叔蒋穎叔名之竒宜興人月明驚鵲未安枝一棹飄然影自随江上秋風無限浪枕中春夢不多時瓊林花草聞前語罨畫谿山指後期公自注蒋詩記及第時瓊林苑宴坐中所言且約同卜居陽羡豈敢便為雞黍約玊堂金殿要論思李白贈栁圓詩還同月下鵲三繞未安枝白樂天思家詩抱膝燈前影伴身異聞集書生姓盧者歎生世困厄呂翁取枕授之生俛首但記身入穴中榮適無比忽欠伸而寤主人蒸黄粱猶未熟也注互見前唐李商隐愛義興之罨畫溪遂葺居焉地志陽羡有六溪其三溪不知其處而六溪之中有荆溪則首受蕪湖東至陽羡入海圻俗呼為罨畫溪班固兩都賦言語侍從之臣朝夕論思日月獻納龜山辯才師此生念念浮雲改寄語長淮今好在故人宴坐虹梁南新河巧出龜山背木魚呼客振林莽鐵鳳横空飛綵繪忽驚堂宇變雄深坐覺風雷生謦欬羡師游戲浮漚閒笑我榮枯弹指内嘗茶看畫亦不惡問法求詩了無礙千里孤帆又獨來五年一夢誰相對何當來世結香火永與名山躬井磑泗州圖經龜山在盱眙縣東北周回四里髙十五丈新河在龜山南元豐七年發運使蒋之竒開置夾河自洪澤上至龜山六十里謂之新河杜詩鐵鳳森翶翔一曰鐵鳳庭中長竿也楞嚴經空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無况復諸三有維摩經度千百劫猶如弹指贈潘谷志林賣墨者潘谷余不識其人然聞其所為非市井人也墨既精妙而價不二士或不持錢求墨不計多少與之此豈徒然者哉余嘗與詩云一朝入海尋李白空㸔人間畫墨仙一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之盖趺坐井中手尚持數珠也潘郎曉踏河陽春明珠白璧驚市人􅄼知望拜馬蹏下胷中一斛泥與塵何似墨潘穿破褐琅琅翠餅敲元笏布衫漆黒手如龜未害氷壺貯秋月世人重耳輕目前區區張李争媸妍一朝入海尋李白空看人間畫墨仙晉陽秋潘岳為河陽令遍樹桃李人號河陽一縣花晉書夏侯湛與潘岳同輿接茵京都人謂之連璧又石崇與潘岳謟事賈謐謐毋廣成君出崇岳降車路左望塵而拜莊子逍遥遊宋人有善為不龜手之藥者世世以洴澼絖為事張李張遇李庭珪也其墨為時所重見蔡君謨墨説杜子美送孔巢父詩巢父掉頭不肯住東将入海随煙霧若逢李白騎鯨魚道甫問訊今何如徐大正閑軒徐大正字得之因其先君猷守黄州始從公遊秦少游為作閑軒記氷蠶不知寒火䑕不知暑知閑見閑地巳覺非閑侣君看東坡翁懶散誰比數形骸墮醉夢生事委塵土蚤眠不見燈晩食或欺午卧看氊取盗坐視麥漂雨語希舌頰强行少腰脚僂五年黄州城不蹋黄州鼓人言我閑客置此閑處所問閑作何味如眼不自覩頗訝徐孝亷得閑能幾許介子願奉使翁歸備文武應緣不耐閑名字挂庭宇我詩為閑作更得不閑語君如汗血駒轉盻畧燕楚莫嫌鑾輅重終勝鹽車苦王子年拾遺記員嶠山有氷蠶長七寸黒色有鱗角以霜雪覆之作蠒長一尺織為文錦入水不濡入火不燎東方朔十洲記有火林山山中有火䑕火浣布即火䑕毛為之有垢燒之即除古詩話王貞白寄鄭谷詩火䑕重燒布氷蠶獨蠒絲直須天上手裁作領巾披晉王獻之傳嘗夜卧齋中有偷兒入其室盗物都盡獻之徐曰偷兒青氊我家舊物可特置之羣偷驚走後漢髙鳳傳專精誦書妻嘗之田曝麥於庭令鳳䕶雞時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之晉殷仲堪傳每云三日不讀道徳論便覺舌本閒强杜子美詩年侵腰脚衰三國楊阜傳曹洪置酒大㑹令女倡著羅縠之衣蹋鼓韓退之贈張十八詩不蹋曉鼓朝安眠聼逄逄楞嚴經若有見者去既花空旋合見眼若無見者出既翳空旋當翳眼漢武帝紀元光元年初令郡國舉孝亷漢傅介子傳元鳳中介子以駿馬監求使大宛因詔令責樓蘭龜兹國尹翁歸傳田延年為河東太守行縣至平陽悉召故吏親臨見之令有文者東有武者西閲數十人次到翁歸獨伏不起曰翁歸文武兼備唯所施設蒜山松林中可卜居余欲僦其地地属金山故作此詩與金山元長老魏王大瓠無人識種成何翅實五石不辭破作兩大尊只憂水淺江湖窄我材濩落本無用虗名驚世終何益東方先生好自譽伯夷子路并為一杜陵布衣老且愚信口自比契與稷暮年欲學栁下惠嗜好酸鹹不相入金山也是不覊人蚤嵗聞名晩相得我醉而嬉欲仙去旁人笑倒山謂實問我此生何所歸笑指浮休百年宅蒜山幸有閑田地招此無家一房客荘子逍遥游惠子謂荘子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則瓠落無所容荘子天地篇百年之木破為犧尊漢東方朔傳初來上書文辭不遜髙自稱譽上嘗問朔曰先生視朕何如主朔曰陛下功徳陳五帝之上在三王之右誠得天下賢士公卿在位咸得其人譬若以季路為執金吾伯夷為京兆云云上廼大笑杜子美赴奉先詩杜陵有布衣老大意轉拙許身一何愚竊比稷與卨韓退之酬盧雲夫詩雲夫吾兄有狂氣嗜好與俗殊酸鹹乂送惠師詩惠師浮屠者乃是不覊人浮休字出莊子刻意篇注屡見潤州類集蒜山在江上説者云山多澤蒜故名一説蒜當作籌算之算周瑜諸葛亮嘗㑹此山議拒曹操後有赤壁之勝時人以為其多算故名陸龜䝉詩云周郎計算清宵定是也張籍詩爱養無家客摭遺吕仙翁和大雲寺僧詩曰三千里外無家客七百年來雲水身王仲父哀辭并引仁宗朝以制䇿登科者十五人軾沗冒時尚有富彦國張安道錢子飛呉長文夏公酉陳令舉錢醇老王中父并軾與家弟轍九人存焉其後十有五年哭中父於宻州作詩弔之則子飛長文令舉歿矣又八年軾自黄州量移汝海與中父之子沇之相遇於京口相持而泣則十五人者獨三人存耳盖安道及軾與家弟而已嗚呼悲夫乃復次前韻以遺沇之時沇之亦以辠謫家於錢塘云生芻不獨比前人束藁端能廢謝鯤子達想無身後念吾衰不復夢中論已知毅豹為均死未識荆凡定孰存堪笑東坡癡鈍老區區猶記刻舟痕後漢徐穉傳郭林宗有母憂穉徃弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州髙士徐孺子也詩不云乎生芻一束其人如玉晉謝鯤傳為太傅掾坐家僮取官藁除名荘子達生篇魯有單豹巖居而水飲不與民共利行年七十而有嬰兒之色不幸遇餓虎殺而食之有張毅者髙門懸薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而疾攻其内又田子方篇楚王與凡君坐少焉楚王左右曰凡亡者三凡君曰凡之亡也不足以䘮吾存則楚之存不足以存存由是觀之則凡未始亡而楚未始存也呂氏春秋楚人有涉江者其劍自舟中墜於水遽刻其舟曰是吾劍所從墜也舟已行而劍不行若此求劍不亦惑乎蔡景繁官舍小閣十九巻有和蔡海州石室詩蔡景繁名承禧臨川人中嘉祐進士第自知雩都縣神宗召對擢監察御史裏行時呂惠卿參政事景繁極論其姦章言廷諍前後十數竟罷去又論用兵交趾不可與争旦夕利所遣北軍難以深入論中人李憲不宜主兵柄皆人所難言者後出為淮南轉運副使置司楚州東坡謫黄實在部内獨拳拳慰藉行部訪之製詞示坡坡以簡謝云此古人長短句詩也試勉繼之晩即面呈又云寄惠竒篇伏讀驚聳李太白自言名章俊語絡繹間起正如此耳謹已和一首并藏篋中異日當奉呈也和篇皆失其傳與景繁諸帖集亦不載後傳其孫擇言東坡自黄移汝以元豐七年至日過山陽登西閣時景繁方行部既賦此詩且以帖與景繁云西閣詩不敢不作然未敢便寫板上閣名亦思之未有佳者蔡謨蔡廓名父子也晋宋間第一流輒以仰比公家不知可否坡帖云西閣而集本作東閣其義理曉然而誤乃如此神宗元豐五年一新官制遷進廷臣六年以殿前司廨舍地為尚書省自令僕射以下至員外郎聽事凡屋四千餘間故詩云文昌新搆滿鵷鸞都邑正喧収杞梓坡以十二月朔至泗州景繁以是月得疾卒坡為文祭之有云子有賢子汗血之駿天哀子窮以是饋贐景繁國史無傳文集亦未之見子居厚事祐陵為諫官仕至户部侍郎使君不獨東南美典刑尚記先君子戲嘲王叟短轅車肯為徐郎書紙尾三年弭節江湖上千首放懐風月裏手開西一作東閣坐虛明目浄東谿照清泚素琴濁酒容一榻落霞孤鶩供千里大舫何時繫門栁小詩屢欲書牕紙文昌新搆滿鵷鸞都邑正喧収杞梓相逢一醉豈有命南來寂寞君歸矣三國虞翻傳孔融答書曰觀子之治易乃知東南之美非徒㑹稽之竹箭也晉王導傳妻曹氏性妒導宻營别舘以處衆妾曹氏知之将徃焉導恐妾被辱遽命駕猶恐遲以所執麈尾柄驅牛而進蔡謨聞之戲導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物惟短轅犢車長柄麈尾南史蔡廓傳為吏部尚書問中書令傅亮選事若悉以見付不論不然不能拜也亮以語錄尚書徐羡之羡之曰黄門郎以下悉以委蔡自此上故宜共叅同異廓曰我不能為徐干木署紙尾遂不拜羡之小字干木漢天文志斗魁戴筐六星曰文昌宫唐百官志光宅元年改尚書省曰文昌䑓左傳㐮二十六年如杞梓皮革自楚徃也韓退之贈張進士詩况當營都邑杞梓用不疑髙郵陳直躬處士畫鴈二首陳直躬偕之子也家故饒財而偕與其弟獨喜學畫其後伎日以進家日以微遂以為業士大夫既喜其畫且愛其為人徃徃稱之直躬亦世其學云見髙郵志野鴈見人時未起意先改君從何處看得此無人態無乃槁木形人禽兩自在北風振枯葦微雪落璀璀惨淡雲水昏晶熒沙礫碎弋人悵何慕一舉渺江海衆禽事紛争野鴈獨閒潔徐行意自得俯仰若有節我衰寄江湖老伴雜鵝鴨作書問陳子曉景畫苕霅依依聚圓沙稍稍動斜月先鳴獨鼓翅吹亂蘆花雪和王斿二首公自注斿平甫子按王斿字元龍父安國字平甫介甫之弟㓜敏悟以文章稱於世神宗賜對問卿兄秉政外論謂何曰恨知人不明聚斂太急耳為秘閣校理屢以新法力諌其兄惡吕惠卿之姦數摧抑之惠卿得政因鄭俠上書遂䧟平父奪官放歸田里年四十七復官命下而卒異時長怪謫仙人舌有風雷筆有神聞道騎鯨游汗漫憶嘗捫蝨話悲辛氣吞餘子無全目詩到諸郎尚絶倫白髪故交空掩巻淚河東注問蒼旻曽鞏雜識王平父熙寜癸丑嵗宿直崇文舘夢有要之至海上見水中宫殿其中樂作笙簫鼓吹之伎甚衆題其宫曰靈芝宫平父欲與俱徃有人在宫側隔水曰時未至且令去他日迎之至此怳惚夢覺時禁中巳鳴鐘平父自是頗負不凡為詩曰萬頃波濤木葉飛笙簫宫殿號靈芝揮毫不似人間世長樂鐘來夢覺時晉苻堅載記桓温入闗王猛詣之一面談當世之事捫蝨而言李白贈張鎬詩捫蝨對桓公願得論悲辛孫綽天台山賦投刃皆虛目牛無全選詩驚雀無全目世説顧長康拜桓宣武墓人問曰卿憑重桓乃爾哭之状其可見乎顧曰鼻如廣莫長風眼如懸河决溜或曰聲如震雷破山淚如傾河注海杜子美詩猶有淚成河經天復東注爾雅春為蒼天夏為昊天秋為旻天冬為上天嫋嫋春風送度闗娟娟霜月照生還遲留嵗暮江淮上來往君家伯仲間未厭氷灘吼新洛且看松雪媚南山野梅官栁何時動飛盖長橋待子閑新洛汴渠舊引黄河元豐中始引洛水易之謂之清汴或謂之新洛杜甫西郊詩市橋官栁細江路野梅香次韻張琬是時有兩張琬一韓城人父昇樞宻使歸老嵩少元祐初琬自齊州倅求便親飬兩易衛尉丞以才擢知秀州崇寜間為廣東轉運副使移京東西路又一鄱陽人治平二年登第詩中有臨淮自古多竒士之句臨淮乃泗邑疑自有一張琬而二人者皆非也姑載於此以俟知者正之新洛霜餘兩岸隆塵埃舉袂識西風臨淮自古多名士樽酒相連一作從樂寓公半日偷閑歌嘯裏百年暗盡徃來中知君不向窮愁老尚有清詩氣吐虹禮記諸侯不臣寓公史記虞卿傳非窮愁不能著書歐陽公詩昔年叨入武成宫曽見揮毫氣吐虹次韻王定國南遷囬見寄土暈銅花蝕秋水要須悍石相礱砥十年氷蘗戰膏粱萬里煙波濯紈綺歸來詩思轉清激百丈空潭數魴鯉逝将桂浦擷蘭蓀不記槐堂収劍履郤思庾嶺今何在更説彭城真夢耳公自注來詩述彭城舊游君知先竭是甘井我願得全如苦李妄心不復九回腸至道終當三洗髓廣陵陽羨何足較公自注余買田陽羨來詩以為不如廣陵只有無何真我里樂全老子今禪伯公自注謂張安道也定國其婿掣電機鋒不容擬心通豈復問云何印可聊須答如是相逢為我話留滯桃花春漲孤舟起李賀長平箭頭詩凄凄古血生銅花白樂天詩三年為刺史飲氷復食蘗國語膏粱之性難以力正漢班固傳在於綺襦紈袴之間非其好也荘子山木篇直木先伐甘井先竭苦李用王戎語注巳見漢武洞㝠記東方朔游於鴻䝉之澤有黄眉翁語朔曰吾卻食巳九千嵗三千年一反骨洗髓三千年一剝肉伐毛吾生巳三洗髓五伐毛矣荘子應帝王出六極之外游無何有之郷金剛經云何降伏其心又諸菩薩應如是住如是降伏其心世説世尊黙然則為許可漢溝洫志杜欽説王鳳曰來春桃花水盛必羡溢贈梁道人採藥壺公處處過笑看金狄手摩挲老人大父識君久造物小兒如子何寒盡山中無歴日雨斜江上一漁蓑神仙䕶短多官府未厭人間醉踏歌壺公費長房事金狄薊子訓事竝巳見史記封禪書李少君嘗從武安侯飲坐中有九十餘老人少君乃言與其大父游射處老人為兒時從其大父識其處一坐盡驚景龍文舘記杜審言好大言臨終宋之問徃候之乃曰甚被造物小兒相苦僕在世久壓公等今死固當慰人心但恨不見替人耳唐書本傳云造化小兒又互見前唐人詩山中無歴日寒盡不知年青瑣集贈採蓮公詩八十仙翁今釣客一綸一艇一漁蓑韓退之記夢詩乃知仙人未賢聖䕶短憑愚邀我敬續仙傳藍采和每於城市持大拍板常醉踏歌行則振靴言踏踏歌藍采和雍秀才畫草蟲八物促織月叢號耿耿露葉泣漙漙夜長不自暖那憂公子寒古詩明月皎夜光促織鳴東壁詩國風零露漙兮又為公子裳蟬蜕形濁汙中羽翼便翾好秋來閒何濶已抱寒莖槁淮南子蝉飲不食三十日而蜕漢諸葛豐傳為司𨽻校尉刺舉無所避京師為之語曰閒何濶逢諸葛蝦蟇睅目知誰瞋皤腹空自脹慎勿困蜈蚣飢虵不汝放左傳宣二年宋城華元為植廵功城者謳曰睅其目皤其腹小説世有畫蜈蚣蝦蟇虵三物為圖者謂蜈蚣畏蝦蟇蝦蟇畏虵而虵復畏蜈蚣也今以三物聚而為一雖有相吞噬之意無敢先之者盖更相制伏去一則能肆其毒焉蜣蜋洪鐘起暗室飄瓦落空庭誰言轉丸手能作殷牀一作雷聲荘子外物篇雖有忮心者不怨飄瓦荘子蜣蜋之智在於轉丸天水牛兩角徒自長空飛不服箱為牛竟何事利吻穴枯桑詩小雅睆彼牽牛不以服箱選詩枯桑知天風蝎虎跂跂有足虵脈脈無角龍為虎君勿笑食盡蠆尾蟲漢東方朔傳臣以為龍又無角謂之為虵又有足跂跂脈脈善緣壁再見左傳昭四年鄭子産作邱賦國人謗之曰其父死於路巳為蠆尾蝸牛腥涎不滿殻聊足以自濡升髙不知回竟作黏壁枯鬼蝶酉陽雜爼鬼蝶一足著木如乾木葉雙眉巻鐵絲兩翅暈金碧初來花争妍忽去鬼無迹泗州南山監倉蕭淵東軒二首偶隨樵父採都梁公自注南山名都梁山出都梁香故也竹屋松扉試乞漿但見東軒堪隐几不知公子是監倉溪中亂石墻垣古山下寒蔬匕箸香我是江南舊游客挂冠知有老蕭郎古樂府行胡從何方列國持何來􅉊毺㲮􅚊五木香迷迭艾納及都梁白樂天詩能文好飲老蕭郎身似浮雲鬢似霜北望飛塵苦晝霾洗心聊復寄東齋珍禽聲好猶思越野橘香清未過淮有信微泉來逺嶺無心明月轉空階一官倉庾真堪老坐看松根落斷崖詩國風終風且霾爾雅風而雨土曰霾史記陳軫傳凡人之思故在其病也彼思越則越聲不思越則楚聲周禮橘踰淮而北為枳史記平凖書居官者以為姓號注倉氏庾氏是也再見泗州除夜雪中黄師是送酥酒二首自此詩以下至書劉君射堂凡七詩墨蹟刻於成都府治續帖中其後䟦云過泗州作此數詩偶此佳紙精墨寫之以遺旌徳君元豐八年正月十日東坡居士書旌徳盖王夫人也墨蹟刻本與集本間有不同今皆從刻石本黄師是名實暮雪紛紛投碎米春流活活一作咽咽走黄沙舊游似夢徒能説遷一作逐客如僧豈有家冷硯欲書先自凍孤燈何事獨成一作生花使君半夜分酥酒驚起妻孥一笑譁闗右土酥黄似酒揚州雲液卻如酥欲從元放覓拄杖忽有麴生來坐隅對雪不堪令飽煖隔船應巳厭歌呼明朝積玉深三尺髙枕牀頭尚一壺杜詩金城土酥净如練土酥者彼中酥名雲液揚之公厨酒名也神仙傳孔元放與客㑹飲元放作令以杖拄地手把杖倒竪頭下足上一手持杯倒飲之人莫能為也或曰即左元放一説左慈字元放孫討逆欲殺之慈著木履拄一竹杖徐徐而行討逆著鞭䇿馬終不能及見太平廣記開天傳信記葉法善有道術一日與朝士㑹元真觀忽有一人叩門稱麴秀才未及延接巳突入座中少年美風姿語論不凡葉疑其非人潛飛小劍擊之應手墮地乃一酒榼中有美醖共飲之同坐皆曰麴生風味不可忘章錢二君見和復次韻答之黄昏巳作風翻絮半夜猶驚月在沙照汴玉峰明佛刹隔淮雲海暗人家來牟有信迎三白薝蔔無香散六花欲喚阿咸來守嵗林烏櫪馬鬬讙一作喧譁酉陽雜爼花少六出者惟梔子花六出陶貞白言即西域薝蔔花杜子美杜位宅詩守嵗阿戎家椒盤已頌花盍簮喧櫪馬列炬散林鴉按杜詩諸本皆云守嵗阿戎家獨謝無逸手抄陳無巳所校本作阿咸盖子美於杜位為宗從故當用阿咸事也無已云太清本分無纖手裁春勝更有新詩㸃蜀酥醉裏氷髭失纓絡夢囬布被起亷隅君應旅睫寒生暈我亦飢腸夜自呼明日南山春色動不知誰佩紫微壺觀音普門品經即解頸衆寳珠纓絡而以與之南山在泗州盱眙縣自泗州過淮即米元章所謂東南第一山也紫微壺事未詳然杜牧之獨酌詩云獨佩一壺游秋毫太山小牧之終中書舎人開元元年改中書省曰紫微疑用此句正月一日雪中過淮謁客回作二首十里清淮上長堤轉雪龍氷崖落屐齒風葉亂裘茸萬頃穿銀海千尋渡玉峰從來修月手合在廣寒宫左傳僖五年晋士蒍賦曰狐裘尨茸一國三公吾誰適從漢劉向傳始皇驪山以水銀為江海酉陽雜爼太和中鄭仁本弟仁表游嵩山迷路見一人枕一襆物而坐因問之乃云君知月七寳合成乎常有八萬二千户修之我乃其一也十洲記冬至月伏於廣寒之宫飬魄於廣寒之地攢眉有底恨得句不妨清霽霧開寒谷饑鴉舞雪城橋聲春市散塔影暮淮平不用殘燈火船牕夜自明書劉君射堂集本云劉乙新作射堂公自注乙父嘗知眉州蘭玉當年刺史家䨇鞬馳射笑穿花而今白首閑驄馬只有清樽照畫虵寂寂小軒蛛網遍隂隂垂栁鴈行斜手柔弓燥春風後置酒看君中㦸牙後漢董卓傳膂力過人雙帯兩鞬左右馳射鮑明逺詩氊帯佩雙鞬杜子美詩使君五馬一馬驄晋書樂廣傳有親賔久闊不復來廣問其故答曰前在坐䝉賜酒方欲飲杯中有虵影意甚惡之既飲而疾于時河南㕔事壁上有角漆畫作虵廣意杯中虵即角影也復置酒於前處謂客曰酒中復有所見否答曰所見如初廣乃告其所以客豁然意解沈疴頓愈魏文帝典論嵗之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄子丹獵於鄴西終日手獲麞鹿九雉三十後漢呂布傳植㦸於營門謂袁術将紀靈曰請君觀布射㦸小支中者當各解兵不中可留决鬬布一發正中㦸支靈等皆驚曰将軍天威也明日復歡㑹然後罷孫莘老寄墨四首徂徠無老松易水無良工珍材取樂浪妙手惟潘翁公自注潘谷作墨雜用髙麗煤魚胞熟萬杵犀角盤雙龍墨成不敢用進入蓬萊宫蓬萊春晝永玉殿明房櫳金牋灑飛白瑞霧縈長虹遥憐醉常侍一笑開天容詩魯頌徂徠之松新甫之柏墨譜唐有祖氏易水人世為墨官又李庭珪父子張遇皆易水人嗣為南唐墨官漢地理志樂浪郡武帝元封三年開應劭曰故朝鮮國也文房四譜韋仲将墨法云煙一斤好膠五兩浸梣皮汁中下鐵臼搗三萬杵多尤善又造墨法有使鯉魚胞者王闢之澠水燕談蔡君謨評墨云李廷珪張遇墨著名當時其制有進貢供堂劍脊圓握其面多龍文唐地理志改東内為蓬萊宫杜子美莫相疑行憶獻三賦蓬萊宫書苑飛白書者漢蔡伯喈見鴻都役人以堊帚成字心有悦焉歸而為飛白之書唐太宗作飛白字賜羣臣或乗醉争取於帝前散騎常侍劉洎登帝牀引手得之帝笑曰昔聞媫妤辭輦今見常侍登牀谿石琢馬肝剡藤開玉版噓噓雲霧出奕奕龍蛇綰此中有何好秀色紛滿眼故人歸天祿古漆窺蠧簡隃麋給尚方老手擅編剗分餘幸見及流落一歎赧漢武帝時外國獻馬肝石硯譜端州深溪之石其色紫如馬肝者為上舒元輿悲剡溪古藤文剡溪上多古藤株枿谿中多紙工擘剝皮肌以給其業異日過數十百郡洎東雒西雍歴見書文者皆以剡紙相夸漢揚雄傳校書天祿閣三輔故事天祿閣在大殿北以藏祕書晉束晳傳太康二年汲郡人不準盗發安釐王冢得竹書數十車銅劍一枚漆書皆科斗字漢官儀尚書丞郎月賜赤管大筆一雙隃麋墨一丸韓退之詩文章紹編剗我貧如饑䑕長夜空齩齧瓦池研竈煤葦管書柿葉近者唐夫子逺致烏玉玦公自注唐林夫寄張遇墨半丸先生又繼之圭璧爛箱篋晴牕洗硯坐虵蚓稍蟠結便有好事人敲門求醉帖孟東野弔盧殷詩故書窮䑕齧狼籍一室間唐鄭䖍好書常苦無紙慈恩寺貯杮葉數屋䖍日取肄書嵗久殆遍法書苑僧懐素善草書常作醉帖吾窮本坐詩久服朋友戒五年江湖上閉口洗殘債今來復稍稍快癢如爬疥先生不譏訶又復寄詩械幽光發竒思㸃黮出荒怪詩成自一笑故疾逢鰕蟹白樂天齋戒詩詩債填還亦欲平又多生債負是歌詩韓退之詩愜興劇爬疥杜牧之讀韓杜集詩杜詩韓筆愁來讀似倩麻姑癢處􅎲㸃黮見衛恒四體書勢一本作㸃㸃留題蘭臯亭雪後東風未肯和叩門遷客夜經過不知舊竹生新笋但見清伊換濁河無復徃來乗下澤聊同笑語説東坡明年我亦開三徑寂寂兼無雀可羅下澤車用後漢馬援傳語注再見東坡白樂天謫忠州州有東坡屢作詩以言之故公在黄州亦作東坡乃樂天之遺意也又白詩園荒惟有薪堪採門冷兼無雀可羅和人見贈只寫東坡不著名此身巳是一長亭壮心無復春流起衰鬢從教病葉零知有雪兒供筆硯應嗤竈婦洗盆缾回來索酒公應厭京口新傳作客經王子韶鷄跖集唐韓定酬馬彧詩曰盛德好将銀筆述麗詞堪與雪兒歌馬問雪兒歌事韓曰雪兒李宻歌姬也每賔僚文章竒麗者即付使歌之禮記奥者老婦之祭也盛於盆尊於缾和田仲宣見贈頭白江南醉司馬寛心時復喚殷兄寒潮不應淮無信客路相随月有情未許低頭拜東野徒言共飲勝公榮好詩惡韻那容和刻燭應須便置觥醉司馬白樂天也白自號醉吟先生嘗謫江州司馬白嵗日家宴詩猶有誇張少年處笑呼張丈喚殷兄晋王戎傳嘗與阮籍飲時劉昶在坐籍以酒少酌不及昶昶無恨色戎異之他日問籍曰彼何如人也答曰勝公榮不可不與飲若減公榮則不敢不共飲惟公榮可不與飲昶字公榮和王勝之三首城上湖光暖欲波美人唱我踏春歌魯公賔客皆詩酒誰是神仙張志和異聞集邢鳳之子夢一美人歌踏陽春之曲曰踏陽春人間二月雨和塵陽春踏盡秋風起愁盡人間白髪人酉陽雜爼元和初有士人因醉臥㕔中及醒見古屏上婦人悉於牀前踏歌歌曰長安女兒踏春陽無處春陽不斷腸士人驚叱之忽然上屏續仙傳元真子姓張名志和魯國公顔真卿與之友善真卿為湖州刺史與門客㑹飲乃唱和為漁父詞其首唱即志和之詞曰西塞山邊白鷺飛桃花流水鱖魚肥青篛笠綠蓑衣斜風細雨不湏歸真卿與陸鴻漸徐士衡李成矩共唱和二十五首逓相誇尚又互見十七巻過賈収水閣詩注齊醸如澠漲綠波公詩句句可絃歌流觴曲水無多日更作新詩繼永和左傳昭十二年晋侯以齊侯宴投壺齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興李白詩風來綠酒生微波史記孔子世家詩三百篇孔子皆絃歌之王羲之傳與同志宴集於山隂之蘭亭自為叙曰永和九年暮春之初㑹於蘭亭修褉事也故列叙時人錄其所述蘭亭曲水詩集云一十一人詩兩篇成一十五人一篇成一十六人詩不成各罰酒一觥要知太守憐孤客不惜陽春和俚歌坐睡樽前呼不應為公雕琢損天和宋玉對楚王問客有歌於郢中者其始曰下里巴人國中属而和者數千人其為陽春白雪属而和者數十人韓退之石鼎聯句序二子坐睡及覺日已上後漢劉寛嘗講經於靈帝前被酒坐睡記夢并叙樂全先生夢人以詩三篇示之字皆旁行而不可識旁有人道衣古貎為讀其中一篇云人事且常在留質悟圓閒凡四句覺而忘其二以告其客蘇軾軾以私意廣之云圓閒有物物閒空豈有圓空入井中不信天形真箇様故應眼力自先窮連環易一作已解如神手萬竅猶號未濟風稽首問公公大笑本來誰礙更求通楞嚴經鑿井求水出土一尺於中則有一尺虛空此空若因土出則出時應見空入若土先出無空入者云何虛空因土而出王注昔言天者有渾天有宣夜有蓋天其論天形之説各異戰國䇿秦昭王嘗遣使者遺君王后玉連環曰齊多知而解此環不后以示羣臣羣臣不知解后引椎椎破之謝秦使曰謹以解矣荘子天下篇連環可解也我知天之中央寄蘄簟與蒲傳正蒲傳正名宗孟閬州新井人嘗以書寄東坡云晩年學道有所得坡答之曰聞所得甚髙然有二事持勸一曰慈二曰儉此詩云霧帳銀床牙籖玉局云云亦可見其奉飬矣坡女姪歸其子澈傳正守長安其婦冬月閉户以酥滴花菓設客一客二十飣用巳輙更以此諸婦滴酥日夜不輟蘭谿美箭不成笛離離玉筯排霜脊千溝萬縷自生風入手未開先惨慄公家列屋閑蛾眉珠簾不動花隂移霧帳銀牀初破睡牙籖玉局坐彈棊東坡病叟長覊旅凍臥饑吟似饑䑕倚頼春風洗破衾一夜雪寒披故絮火冷燈青誰復知孤舟兒女自嚘吚皇天何時反炎燠愧此八尺黄琉璃願君浄掃清香閣臥聼風漪聲滿榻習習還從兩腋生請公乗此朝閶闔蘄春地志蘄水縣漢蘄春地也宋永嘉中立浠水縣唐改為蘭溪縣又改曰蘄水蘭溪源出苦竹山笛竹生羅田縣山中蘄竹亦生於此用以為簟韓退之送李愿序曲眉豐頰粉白黛綠者列屋而閑居詩國風螓首蛾眉巧笑倩兮晉周顗傳王敦籍顗家得素簏數枚盛故絮而巳晋呉隐之字處黙雖居清顯祿賜皆頒親族冬月無被澣衣乃披其絮孫樵迎春奏凍切人骨闐闐慼慼燈青火白門無蹏轍跡韓退之鄭羣贈簟詩蘄州笛竹天下知鄭君所寳尤瓌竒攜來當晝不得卧一府傳看黄琉璃又誰謂故人知我意巻送八尺含風漪説文楚人名門曰閶闔閶闔天門也漢司馬相如傳云排閶闔入帝宫寄怪石石斛與魯元翰山骨裁方斛江珍拾淺灘清池上几案碎月落杯盤老去懐三友平生困一簞堅姿聊自儆秀色亦堪餐好去髯卿舎憑将道眼看東坡最後供霜雪照人寒陸士衡羅敷歌鮮膚一何潤秀色若可餐王維六祖禪師碑弟子曰神㑹遇師於晩景聞道於中年雖末後供樂最上乗東坡雜記有怪石供後怪石供二篇漁父四首漁父飲誰家去魚蟹一時分付酒無多少醉為期彼此不論錢數漁父醉蓑衣舞醉裏却尋歸路輕舟短棹任斜横醒後不知何處漁父醒春江午夢斷落花飛絮酒醒還醉醉還醒一笑人間今古漁父笑輕鷗舉漠漠一江風雨江邊騎馬是官人借我孤舟南渡杜子美詩江天漠漠鳥飛去又詩劍外官人冷韓退之王君墓誌一女怜之必嫁官人不以與凡子施註蘇詩巻二十二
