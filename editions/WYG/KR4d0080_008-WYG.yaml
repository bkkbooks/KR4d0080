front:
  text: 王註正譌分類蘇詩註三十二巻舊刻永嘉王十朋龜齡纂集註中引用故事謬誤實多有極淺陋可為失笑者王龜齡為南渡名臣著梅溪集如干巻行世史稱其天資頴悟廷對萬餘言淹通經史學者争傳誦之以擬鼂董劉氏珙序其集有云平居無所嗜好顧喜為詩渾厚質直如其為人又云不為浮靡之文然規模宏闊骨骼開張世之盡力於文字者或不能及其所註蘇詩雖云百家必經一手采輯何至紕繆乃爾愚意當是賈人俗本版寫誵譌而後生耳食沿踵至今釋氏所謂可憐愍者㑹予有訂讐之役乃稍加是正随手繙得如干條略疏出䖏件繋之如左其它譌處尚多不及枚舉今所抉摘依原註分屬諸家不欲獨令王氏䝉陋名也長蘅識卷之一壬寅二月有詔令郡吏分往屬縣詩誰言董公健程氏
  hash: sha256:aff31e2879900e82f95e8b461d7eb0239ce3b14bf7ab1d589a8358096c04338b
