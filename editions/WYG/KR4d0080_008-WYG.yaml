body:
  text: 縯註引董卓傳卓議廢立云云按天下健者何必董公語在袁紹傳非卓傳也註譌今正王本一巻東湖詩江水綠如藍縯註引李白詩云山光水色綠如藍按白詩山光水色青於藍非綠如藍也註訛今正王本四巻将往終南和子由見寄詩我今廢學如寒竽久不吹之澀欲無趙氏堯卿註云齊宣王好竽而南郭先生不善吹之澀則不能成聲按南郭先生事出韓子齊宣王好竽必三百人齊吹先生不善竽而濫於三百之中以食禄云云並無澀不能成聲語註又不著書名似因蘇詩而傅㑹之者今正王本十巻巻之二南溪㑹景亭詩居民惟白帽堯卿註云管寧不應州縣之辟甞著白帽按三國管寧傳寧常皁帽布繻袴布帬又四時祠祭加衣服著絮巾故在遼東所有白布單衣云云並無白帽字又寧浮海還郡黄初青龍之間屢被徴命寧皆堅辭不起従無州縣辟舉事註譌今刪王本二十八巻竹􅔺詩䲭夷讓圎滑縯註引揚雄酒箴云䲭夷員滑腹大如壺按酒箴乃䲭夷滑稽滑音骨稽音雞腹大如壺非員滑也註因詩傅㑹今正王本三十巻和董傳留別詩厭伴老儒烹瓠葉趙氏次公註引劉昆傳云以素米瓠葉為爼豆按昆傳是素木非素米也註譌今正王本十六巻巻之六新城道中詩樹頭初日挂銅鉦次公註引先生日喻云生而眇者不識日問之或告之曰日之状如銅鉦按先生集本日之状如銅槃非銅鉦也註譌今刪王本二十九巻於潜僧綠筠軒詩不可使居無竹縯註云王羲之甞寄居空宅中便令種竹按晉書種竹為王徽之事徽之字子猷羲之子也世說並同註譌今正王本二十巻巻之八賀陳述古弟章生子詩㕘軍新婦賢相敵李氏厚註引王渾妻鍾氏新婦得配㕘軍語㕘軍謂渾弟瀹云云又孔毅父妻輓詞生子勝王濟縯又註曰㕘軍為渾中弟瀹也按世說注渾弟倫字太冲歴大将軍㕘軍年二十五卒三國志魏書渾父昶為魏司空諸子中並無名瀹者兩引俱訛今正王本二十巻巻之九戯書吴江三賢畫像詩郤遣姑蘇有麋鹿厚註引伍子胥諫吴王夫差不聽子胥曰臣今見麋鹿遊於姑蘇之臺宫中生荆棘露沾衣也云云按二語本史記淮南王傳漢書在伍被傳麋鹿句乃伍被述子胥諫語宫中荆棘句乃被自諫淮南語故曰今臣亦見宫中生荆棘云云註既不著書名又刪去虛字兩意併作一語牽合可笑今正王本二十九巻捕蝗至浮雲嶺詩殺馬毁車従此逝縯註引後漢周穉傳馮良年三十云云按馮良事見周爕傳非穉也後漢書列傳並無周穉其人註譌今正王本十八巻聽賢師琴詩但聞牛鳴盎中雉登木縯註引管子地負篇凡聴宫如牛鳴窌云云按管子有地員篇無地負篇又聽徴聽羽毎句叶韻故曰凡聽宫如牛鳴窌中宫與中叶芟去中字不叶韻矣註譌今正王本七巻李行中醉眠亭注引李白詩我醉欲眠君且去眀朝有意抱琴来原註訛作眀朝無事抱琴来便爾傖父今正王本二十八巻次韻孫職方蒼梧山詩来依鵬背負青山次公註引荘子鵬背負青山云云按此詩山字出韻本應作天荘子逍遥遊篇背負青天而莫之夭閼亦無鵬背負青山句註紕繆杜撰今正王本十二巻謝人見和前篇詩也知不作堅牢玉次公註引漢書息夫躬傳器用鹽惡又引鄧展曰鹽不堅牢也按漢書乃器用盬惡盬音公戸反非鹽惡也註譌今正王本二十八巻出城送客詩東望峨眉小盧山翠作堆公自註郡東盧山絶類峨眉而小見王本八巻又有遊盧山次韻章傳道見王本三巻又有盧山五詠見王本四巻按宻州有盧山以秦時博士盧敖避難此山得名先生超然臺記曰其東則盧山盧敖之所従遁也即指此是時先生方守髙宻數詩所稱乃宻之盧山非江西之廬山也王本皆譌今正卷之十二子由将赴南都詩㑹㸔銅狄兩咨嗟宋氏援註引後漢方􅃋傳云云後漢安得有方􅃋傳按摩挲銅人事見薊子訓本傳於方􅃋無渉註訛今正王本十八巻巻之十四次韻黄魯直見贈古風不知市人中自有安期生援註云前漢郊祀志安期生瑯琊人賣藥東海邊時人皆言千嵗按漢書郊祀志無此數語盖出抱朴子及列仙傳而援註誤以為漢書也今正王本十三巻巻之二十別黄州詩桑下豈無三宿戀厚註後漢裴楷言浮屠不三宿桑下云云三十五巻欝孤臺詩註亦云按裴楷字叔則乃晉人非後漢也後漢另有襄楷字公矩當桓帝時再疏言災異事浮屠不三宿桑下乃疏中引用四十二章經語厚註再引俱訛今正王本一巻卷之二十一廬山開先漱玉亭王本訛作開元題下註云開元禪院舊傳梁昭眀太子之居栖隠也唐元宗即位始號開元有招隠橋元宗所作云云按黄庭堅開先禪院修造記略曰南唐中主年少好文無經世意慕物外之名問舍五老峯下有野夫獻地買之萬金以為書堂及即位以為寺以野夫獻地為已有國之祥故名開先後遷洪都盖甞彌節故榻與畫像存焉又山志稱中主讀書臺在寺後世以為李後主者誤以為梁昭眀者尤誤又按史南唐中主李景初名景通後更名燝避周諱復為景廟號元宗開先寺本末甚眀無可疑者王本既訛開先為開元又訛南唐之元宗為唐開元天寳之元宗又云唐元宗即位始號開元其杜撰踳駮乃爾梅溪何至是想後人偽託耶今正王本四巻張近㡬仲有龍尾子石硯詩飄零髙下随風花次公註引南史范績傳對竟陵王云云績名凡三見按南史並無范績其人對竟陵王語乃范縝非績也縝字子真為范雲従父兄註訛今正王本三十巻次韻滕元發許仲途秦少遊詩起句二公詩格老彌新醉後狂吟許野人按二公謂滕許野人公自謂也頸聨兩邦旌纛十畝鋤犁正分承起句詩意甚明次公註云兩邦旌纛意者滕元發許仲途皆為太守乎然破題指之為許野人未省云云註詩如此索解直是兒童之見不待識者方為盧胡也今刪王本十三巻巻之二十五詩題狄詠石屏按狄詠樞宻使武襄公之子與先生同館伴遼使事載年譜中王本訛秋詠石屏今正王本三十巻巻之二十六書鄢陵王主簿所畫折枝詩雙翎決将起次公註曰荘子言蜩鷽鳩云我決起而飛也按註意本引荘子逍遥游篇蜩與鷽鳩笑之曰我決起而飛搶榆枋語乃以意竄改拖㳫殊不成句今正王本二十七巻和張耒髙麗松扇詩猶勝漢宫悲媫妤次公註引漢書云班媫妤初大幸後趙飛燕寵盛媫妤失寵遂作秋扇詩云云按秋扇詩即樂府怨歌行新製齊紈素一首是也詩不載漢書註誤牽合今正王本三十巻贈李道士詩戯著幼輿巖石裏次公註引世說云愷之畫謝鯤在石岩裏人問其故曰鯤甞云一邱一壑自謂過庾亮此子宜置邱壑中云云按晉書謝鯤傳明帝在東宫問鯤論者以君方庾亮何如答曰端委廟堂使百僚凖則鯤不如亮一邱一壑自謂過之又世說顧長康畫謝幼輿在岩石裏人問其所以曰此子宜置邱壑中按此二條各是一事置邱壑中是長康語一邱一壑是鯤對眀帝語註以二事牽合語亦拖㳫不成文理今正王本十九巻巻之二十七慶源宣義王丈詩拂衣自註下下考師注前漢陽城為道州刺史云云漢唐不辨可為索笑今正王本九巻卷之三十二滕逹道挽詞雲夢連江雨次公註云雲夢澤在湖州常州之地按周禮職方氏正南曰荆州其澤藪曰雲夢本作瞢註曰雲在江北夢在江南今江夏安陸華容枝江皆其地左傳定公四年楚子渉睢濟江入於雲中杜預注曰入雲夢澤中所謂江南之夢廣輿記雲夢澤在安陸相如傳云椘有七澤其小者曰雲夢方九百里即指此其與湖常相距二千餘里不知註何所據而云然今刪王本二十巻巻之三十五宿建封寺曉登盡善亭望韶石詩再使魚龍舞洞庭次公註荘子言黄帝張咸池之樂於洞庭之野而魚龍舞焉按荘子天運篇北門成問於黄帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠云云通篇無而魚龍舞焉句杜撰今正王本巻新釀桂酒詩酒材巳遣門生致厚註云周禮酒人篇以式法授酒材按周禮安有篇名式法授酒材亦酒正之職非酒人也今正王本八巻巻之三十六答周循州詩且覓黄精與療饑縯註引毛詩泌之洋洋可以療饑因蘇詩有療饑字輒改竄毛詩樂饑為療饑此㝡眼前謬誤而至今仍之不能改豈不可笑王本十四巻小圃五詠甘菊詩孤根䕃長松獨秀無衆草次公註引左傳松柏之下其草不植而菊生焉按左傳襄公二十九年鄭行人子羽曰是謂不宜必代之昌松柏之下其草不植並無而菊生焉句註杜撰今刪王本二十五巻次韻髙要令劉湜峡山寺見寄詩應憐五管客曽作八州督援註引荘子頤隠於齊肩髙於頂句贅指天上有五管也云云按此用五管是嶺外地名唐以廣桂容邕南安五府屬嶺南節度使謂之五管詩云五管客公自謂也註引荘子大謬荘註五管五腧也詩意當作何解又按此數語荘子凡再見人間世篇則曰支離疏者頤隠於齊肩髙於頂㑹撮指天五管在上大宗師篇則曰曲僂發背上有五管頤隠於齊肩髙於頂句贅指天註引顛倒錯亂兩按之俱不合杜撰毎毎如此王本二十三巻巻之三十七安期生詩茂陵秋風客望祀猶蟻蠭王本訛作望祖猶蟻蜂按望祀本用漢郊祀志武帝望祀蓬莱之屬㡬至殊庭語故結曰海上如􅆶棗可聞不可逢詩意甚眀王本訛作望祖次公註乃為之說曰祖字指言髙祖謂髙祖尚不見安期而况武帝云云詩意上下不屬穿鑿支離今正王本十九巻巻之三十八留别㢘守詩編萑以苴豬次公註編萑綴茅也又引左傳或取一編萑焉云云按詩語全用禮記内則編萑以苴之句萑細葦也解作綴茅巳誤又左傳昭二十七年或取一編菅焉杜云苫也訛編菅為編萑尤誤今正王本十六巻和黄秀才鑒空閣詩誰言小叢林清絶冠五嶺按詩意閣在嶺外甚眀胡氏邦衡註題乃引杭州圖經云云殊無謂今刪王本二十八巻巻之三十九用前韻再和霍大夫詩郤下虎頭州次公註云虎頭州以言常州盖虎頭顧愷之也愷之晉陵無錫人無錫乃今常州云云按虎頭州䖍州也考之地里志一統志及圖經諸書従無以常州為虎頭州至謂因顧愷之得名尤支離鑿空當時巳有辨其訛者而至今仍之不解王本十四巻王子立去嵗送子由北歸往返百舍今又相逢贑上戯用舊韻作詩留別次公註王子立住鶴田山云云按王子立名適為子由之壻第十七巻有贈王郎一首即子立也又二十七巻有次韻王郎子立風雨有感詩二十八巻有哭王子立次兒子迨韻三首先生度嶺北歸時距子立之歿盖十餘年矣是詩留別乃王子直秀才非子立也王子直名原䖍州人先生在恵州子直不逺千里来訪留七十日去事載年譜先生有贈王子直秀才詩見三十五巻起句云萬里雲山一破裘今用其韻也題與註並譌今正王本十六巻
