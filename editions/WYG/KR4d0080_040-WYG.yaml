body:
  text: 施註蘇詩巻二十六宋蘇軾撰施元之原注武進邵長蘅刪補詩四十九首時官翰林作施註缺今補書晁補之所藏文與可墨竹三首與可畫竹時見竹不見人豈獨不見人㗳然遺其身其身與竹化無窮出清新荘周世無有誰知此凝一作疑神荘子達生篇用志不分乃凝於神若人今巳無此竹寜復有那將春蚓筆畫作風中桞君看斷崖上痩節蛟虵走何時此霜竿復入江湖手隋書楊素戯栁調曰栁條通體弱獨摇不禁風白樂天畫竹歌蕭畫莖痩節節踈晁子拙生事舉家聞食粥朝來又絶倒諛墓得霜竹可憐先生槃朝日照苜蓿吾詩固云爾可使食無肉公自注吾舊詩云可使食無肉不可使居無竹首二句用魯公乞米帖語屢見世說衛玠談道平子絶倒唐韓愈傳劉义者亦節士持愈數斤金去曰此䛕墓中人得者不若與劉君為夀苜蓿槃詳第四巻和子由詩注屢見戯用晁補之韻昔我嘗陪醉翁醉今君但吟詩老詩清詩咀嚼那得飽痩竹瀟灑令人饑試問鳯凰饑食竹何如駑馬肥苜蓿知君忍饑空誦詩口頬瀾飜如布糓王注醉翁歐陽永叔也詩老梅聖俞也荘子秋水萹鵷鶵非梧桐不止非練實不食注練實竹實也本草苜蓿出西域漢大宛列傳馬嗜苜蓿漢使取其實来于是天子始種苜蓿又杜子美詩宛馬總肥春苜蓿布糓瀾翻注已見書皇親扇十年江海寄浮沈夢遶江南黄葦林誰謂風流貴公子筆端還有五湖心唐人題韓信廟詩隆凖蚤知同烏喙将軍應有五湖心書李世南所畫秋景二首野水参差沒漲痕疎林欹倒出霜根扁舟一棹歸何處家在江南黄葉村人間斤斧日創夷誰見龍虵百尺姿不是溪山曾獨徃何人觧作挂猿枝創夷瘡痍同後漢書命軍吏察夷傷注金瘡曰夷李白詩山光摇積雪猿影挂寒枝書鄢陵王主簿所畫折枝二首論畫以形似見與児童鄰賦詩必此詩定知非詩人詩畫夲一律天工與清新邉鸞雀寫生趙昌花傳神如何此兩幅疎澹含精勻誰言一㸃紅觧寄無邉春劉勰文心雕龍文章有形似之語畫鑑唐人花鳥邉鸞㝡為馳譽叚成式詩活禽生卉推邉鸞趙昌見二十三巻王伯敡藏趙昌花詩注痩竹如幽人幽花如處女低昂枝上雀摇蕩花間雨雙翎决将起衆葉紛自舉可憐採花蜂清蜜寄兩股若人富天巧春色入毫楮懸知君能詩寄聲求妙語荘子逍遥逰蜩與鷽鳩笑之曰我決起而飛搶榆枋漢賈捐之傳君房言語妙天下昨見韓丞相言王定國今日玉堂獨坐有懐其人晝卧玉堂上微風舉輕紈銅缾下碧井百尺鳴飛瀾俛仰清夢餘愛此一掬寒似予平生友苦語涼肺肝秀眉玉兩頬矯矯如翔鸞置之江淮交清詩洗江湍紅鱗對白酒信羙非所安丞相功業成還家酒杯寛人間有此客折簡呼不難相将扣東閣起舞盡餘歡韓退之憶昨行危詞苦語感我耳和張耒髙麗松扇張耒字文潜淮隂人蘓門四學士之一可憐堂上十八公老死不入光眀一作眀光宫萬牛不来難自獻裁作圑圑手中扇屈身䝉垢君一洗挂名君家詩集裏猶勝漢宫悲媫妤網蟲不見乘鸞子會稽録丁固夢松生腹上有觧之者曰松字十八公也後十八年果為三公三輔故事桂宫中有光眀殿班媫妤怨歌行新裂齊紈扇皎潔如霜雪裁成合歡扇團團似眀月江文通擬班婕妤詩紈扇如圎月出自機中素畫作秦王女乗鸞向烟霧劉禹錫團扇歌秋風入庭樹從此不相見上有乗鸞女蒼蒼網蟲遍先生詩葢参錯三詩之意也故李誠之待制六丈挽詞青青一寸松中有樑棟姿天驥墮地走萬里端可期世無阿房宫下建五丈旗又無穆天子西征燕瑶池才大古難用老死亦其宜丈夫恐不免豈患莫已知公如松與驥少小稱偉竒俯仰自廊廟笑談無羌夷清朝竟不用白首仍憂時願斬横行将請烹乾沒児言雖不見省坐折姦雄窺嗟我去公久江湖生白髭歸来耆舊盡零落存者誰比公嵇中散龍性不可羈疑公李北海慷慨多雄詞凄凉五君詠沈痛八哀詩邪正久乃眀人今屬公思九原不可作千古有餘悲秦始皇本紀作前殿阿房上可以坐萬人下可以建五丈旗再見列子穆王肆意逺逰命駕八駿之乗升崑崙之邱遂賓扵西王母觴扵瑶池之上一日行萬里史記季布列傳樊噲曰臣願得十萬衆横行匈奴中季布曰噲可斬也夫髙帝将兵四十餘萬衆困扵平城今噲柰何以十萬衆横行匃奴中漢食貨志烹𢎞羊天乃雨詳見十九巻魚蠻子詩注又張湯始為小吏乾沒與長安富賈田甲魚翁叔之屬交私魏畧文帝與元城令吳質書徐陳應劉一時俱逝何圖數年之間零落略盡言之傷心顔延年五君詠謂阮籍嵇康劉伶阮咸向秀也其詠嵇康云鸞翮有時鎩龍性誰能馴杜子羙八哀詩謂王思禮李光弼嚴武汝陽王璡李邕蘓源眀鄭䖍張九齡也李邕詩云憶昔李公存詞林有根柢聲華當健筆灑落富清製邕嘗為北海太守禮記趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸次韻孔常父送張天覺河東提刑送君應典鷫鸘裘慿仗千鍾洗別愁脫帽風流餘長史公自注君喜草書而不工故以此為戯埋輪家世夲留侯公自注張綱子房七世孫也犍為武陽人墓在今彭山君豈其後邪子河駿馬方争出公自注麟府馬出子河泌昭義疲兵得少休公自注唐福昭義歩兵盖澤潞弓箭手定向秋山得嘉句故闗黄葉滿行舟西亰雜記司馬相如初與卓文君還成都居貧愁懣以所著鷫鸘裘貰酒為歡長史張旭也杜子羙飲中八仙歌云張旭三杯草聖傳脫帽露頂王公前王注故闗即河東古闗唐李端古別離詩水國葉黄時洞庭霜落夜行舟聞商賈宿在楓林下此地送君還茫茫似夢間送張天覺得山字西登太行嶺北望清凉山晴空浮五髻晻靄卿雲間餘光入巖石神草出茅菅何人相指似稍稍落人寰能令墮指児虬髯茁冰顔祝君如此草為民巳痌瘝我亦老且病眼花腰脚頑念當勤致此莫作河東慳山志太行山在澤州晉中縣五臺山一名清凉山史記天官書若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲劉禹錫詩金毛五髻卿雲間詳見二十五巻武昌西山注山志山中有圎光不次呈現詩小雅露彼菅茅王注五臺山有草藥名長松亦名仙茒時有患風疾者入山遇異僧授此草服之兩睂再生疾遂愈次韻王定國倅揚州此身江海寄天游一落紅塵不易收未許相如還蜀道空教何遜在揚州又驚白酒催黄葉尚喜朱顔映黒頭火急著書千古事虞卿應未􅌅窮愁司馬相如傳建節徃使西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵杜注何遜作揚州法曺廨舍有梅花盛開遜吟詠其下後居洛思梅花再請其任従之抵揚州花方盛遜對花徬徨終日史記平原君傳虞卿非窮愁亦不能著書以自見扵後世云贈李道士并序駕部貟外郎李宗君固景祐中良吏也守漢州有道士尹可元精練善畫以遺火得罪當死君緩其獄會赦獲免時可元八十一自誓且死必為李氏子以報可元既死二十餘年而君子世昌之婦夢可元入其室生子曰得柔小名蜀孫幼而善畫既長讀荘老喜之遂為道士賜號妙應事母以孝謹聞其寫真葢妙絶一時云世人只數曺将軍誰知虎頭非癡人腰間大羽何足道頬上三毛自有神平生狎侮諸公子戯著幼輿巖石裡故教世世作黄冠布韈青鞵弄雲水千年鼻祖守闗門一念還為李耳孫香火舊縁何日盡丹青餘習至今存五十之年初過二衰顔記我今如此他時要指集賢人知是香山老居士公自注樂天為翰林學士奉詔寫真集賢院張彦逺名畫記曺霸魏髦之後天寳末每詔寫御馬及功臣官至左武衛将軍冄見又顧愷之小字虎頭丹青妙絶一時俗傳虎頭三絶畫絶痴絶才絶互見第五巻寄莘老詩注杜子羙丹青引良相頭上進賢冠猛将腰間大羽箭晉顧愷之傳嘗圗裴楷象頬上加三毛覺神眀殊勝又為謝鯤象在石巖裏云此子宜置邱壑中幼輿謝鯤字再見唐書李播棄隋為道士號黄冠子杜子羙山水障歌青鞵布韈従此始揚雄反騷或鼻祖扵汾隅劉徳注鼻始也闗令内傳闗令尹喜登樓四望見東極有紫氣西邁曰應有聖人經過至期齋戒守闗果見老子一念用楊妃外傳語見第十四巻芙蓉城詩注史記老子列傳姓李名耳為周守藏室史王注鼻祖指尹喜李耳指老聃按李道士前生姓尹後為李氏子而皆為道士故用尹喜老聃事通言之孔融與曺公書五十之年融又過二白樂天詩昔作少學士圖形入集賢今為老居士寫貌寄香山次韻張舜民自御史出倅虢州留別舜民字雲叟元豐辛酉為環慶師屬眀年責監郴州酒稅尋以年勞賜五品服元祐初還朝赴試玉堂按郴屬湖湘故曰湘纍又賜服赴試故有給札佩銀之語玉堂給札氣如雲初起湘纍復佩銀樊口凄凉巳陳迹公自注昔與張同遊武昌樊口来詩中及之班心突兀見長身公自注臺史謂御史立處為班心江湖前日真成夢鄠杜他年恐卜鄰此去若容陪坐嘯故應客主盡詩人漢司馬相如列傳請為天子㳺獵之賦上令尚書給筆札又相如既奏大人賦天子大說飄飄有凌雲氣揚䧺反騷因江潭而􅐹記兮欽弔楚之湘纍注不以罪死曰纍􅐹徃也長身注屢見地理志鄠杜二縣名屬長安次韻米黻二王書䟦尾二首三館曝書防蠧毁得見来禽與青李秋虵春蚓久相雜野鶩家雞定誰羙玉函金籥上天来紫衣勑使親臨啟紛綸過眼未易識磊落挂壁空雲委歸来妙意獨追求坐想蓬山二十秋怪君何處得此夲上有桓元寒具油巧偷豪奪古来有一笑誰似癡虎頭君不見長安永寧里王家破垣誰復修職畧宋以昭文集賢史館為三館皆寓崇文院尚書故實王内史有来禽青李帖秋虵春蚓野鶩家雞注屢見漢武内傳封以白玉之函黄庭經玉匙金籥常完堅後漢逸民傳井丹善談五經亰師語曰五經紛綸井大春晉謝靈運傳比響聨辭波屬雲委王子年拾遺記海中三神山二日蓬壺即蓬莱山也續晉陽秋桓元好蓄法書名畫客至常出而觀客食寒具油汙其畫後遂不設寒具集韻寒具鐶餅也晉顧愷之傳嘗以一厨畫寄桓元元發其厨後竊取之愷之見封題如初但失其畫直云妙畫通靈變化而去猶人之登仙了無怪色唐王淮傳居永寜里法帖名畫以厚貲鉤取鑿垣納之及被誅所藏書畫悉為人破取元章作書日千紙平生自苦誰與羙畫地為餅未必似要令癡児出饞水錦嚢玉軸来無趾粲然奪真疑聖智忍饑看書淚如洗至今魯公餘乞米三國盧毓傳文帝詔曰選舉莫取有名名如畫地作餅不可啖也歐陽永叔詩盛以錦嚢装玉軸孔融與曺公書珠玉無踁而自至者人好之也乞米魯公帖屢見次韻宋肇恵澄心紙二首詩文發源澄心堂紙乃江南李后主製劉貢父詩云當時百金售一幅澄心堂中千萬軸後人聞此那復得就使得之當不識詩老囊空一不留百畨曽作百金收公自注永叔以澄心百幅遺聖俞聖俞有詩知君也要雕肝腎分我江南數斛愁庾亮賦且将一寸心能容萬斛愁王注澄心紙江南李後主製故曰江南數斛愁韓退之詩不用雕琢愁肝腎君家家學陋相如宜與諸儒論石渠古紙無多且分我自應給札奏新書王注宋肇葢子亰家子亰好為險澀之語故言其家學陋相如也漢儒林列傳甘露中施讐與五經諸儒雜論同異扵石渠閣三國魏武帝本紀諸將征伐皆以新書従事冄見郭熈秋山平逺二首郭熈秋山平逺見二十五巻題注日盡孤鴻落照邉遥知風雨不同川此間有句無人識送與襄陽孟浩然杜子羙詩復憶襄陽孟浩然新詩句句盡堪傳再見木落騷人巳怨秋不堪平逺發詩愁要看萬壑争流處他日終煩顧虎頭李白詩昨夜秋聲閶闔来洞庭木落騷人哀晉顧愷之傳人問㑹稽山水之状愷之云千巖競秀萬壑争流送歐陽辯監澶州酒汗血駕鼓車何従致千里紛紛糟麹間欲試賢公子君家江南英濯足滄浪水郤度舊黄河漲沙埋馬耳由来付造物倚伏何窮巳當念楚子文三仕無愠喜史記大宛列傳大宛多善馬馬汗血東觀漢記光武時名都王國有獻名馬者帝以馬駕鼔車九月十五日邇英講論語終萹賜執政講讀史官燕扵東宫又遣中使就賜御書詩各一首臣軾得紫薇花絶句其詞云絲綸閣下文書静鐘皷樓中刻漏長獨坐黄昏誰是伴紫薇花對紫微郎翌日各以表謝又進詩一萹臣軾詩云通鑑元祐二年秋宴近臣扵資善堂出所書唐人詩分賜按年譜先生以元祐元年自中書舎人為翰林學士知制誥二年兼侍讀通典唐置中書舎人六人其内一人知制誥天寳元年改中書為紫微省舎人曰紫微郎羣芳譜紫薇花小而叢其色紫一名木槿繡裳畫衮雲垂地不作成王剪桐戯日髙黄繖下西清風動槐龍舞交翠公自注邇英閣前有雙槐樛然屬地如龍形壁中蠧簡今千年漆書科斗光射天諸儒不復憂吻燥東宫賜酒如流泉酒酣復拜千金賜一紙驚鸞囬鳯字蒼顔白髪便生光袖有驪珠三十四公自注臣所賜書并題目及臣姓名凡三十四字歸来車馬已喧闐争看銀鉤墨色鮮人間一日傳萬口喜見雲章第一篇公自注上前此未嘗以御書賜羣臣玉堂晝掩文書静鈴索不摇鐘漏永莫言弄筆數行書須信時平由主聖犬羊散盡沙漠空㨗烽夜到甘泉宫似聞指揮築上郡已覺談笑無西戎公自注時熈河新獲鬼章是日涇原復奏夏賊數十萬人遁去文思天子師丈母終閉玉闗辭馬武小臣願對紫薇花試草尺書招贊普公自注按唐制翰林學士帶知制誥許綴中書舎人班今臣以知制誥待罪禁林故得以紫薇為故事詩國風衮衣繡裳史記晉世家成王與叔虞戯削桐葉為圭與之曰以此封若史佚請擇日立叔虞曰天子無戯言揚雄賦攬擢流扵髙光兮溶方皇扵西清漢書魯恭王壊孔子舊宅扵其壁中得古文經傳後漢書杜林扵西州得漆書古文尚書一巻科斗即壊宅所得也陸機文賦始躑躅扵燥吻杜子羙詩不有小舟能盪槳百壺那送酒如泉索靖草書状婉若銀鈎飄若驚鸞王羲之草書勢婆娑而同鳯舞韓退之詩遺我眀珠九十六寒光照骨映驪目戎幕閑話翰林院有懸鈴以偹中夜警急文書出入則引索以代呼唐書長慶中河北用兵翰林院鈴索自鳴與軍事緩急相應韓渥詩夜久忽聞鈴索動玉堂西畔響丁東杜子羙詩㨗書夜報清晝同三輔黄圗甘泉宫在池陽縣西去長安二百里史記䝉恬列傳北逐夷狄收河南築長城居上郡書堯典欽眀文思安安唐杜牧之詩文思天子復河湟詩周頌亦右丈母按丈母指太皇太后也後漢臧宫傳時匈奴饑疫宫與揚虛侯馬武上書願得五千騎以立功詔辭不許又范曄論光武閉玉門以謝西域之質後漢西域傳建武二十一年西域十八國遣子入侍天子皆還其侍子一統志玉門闗在沙州魏收詩尺書徵建鄴杜子羙詩勑書憐賛普注賛普吐畨君號和王晉卿并序元豐二年予得罪貶黄州而駙馬都尉王詵亦坐累逺謫不相聞者七年予既召用而詵亦還朝相見殿門外感歎之餘作詩相屬詞雖不甚工然託物悲慨阨窮而不怨泰而不驕憐其貴公子有志如此故和其韻欲使詵姓名附見予詩集中然亦不以示詵也詵字晉卿功臣全斌之後云宋史全斌太原人贈中書令先生飲東坡獨舞無所屬當時挹眀月對影三人足醉眠草棘間蟲虺莫予毒醒来送歸鴈一寄千里目悵然懷公子旅食久不玉欲書加飡食逺託西飛鵠謂言相濡沫未足救溝瀆吾生如寄耳何者為禍福不如兩相㤀昨夢那可逐上書得自便歸老湖山曲躬耕二頃田自種十年木豈知垂老眼對此金蓮燭公子亦生還仍分刺史竹賢愚有定分尊俎守尸祝文章何足云執技等醫卜朝廷方西顧羌鹵驕未伏遥知重陽酒白羽落黄菊羨君真将家浮面氣可掬何當請長纓一戰河湟復史記魏其武安侯列傳夫起舞屬丞相唐詩欲窮千里目更上一層樓杜子羙詩旅食亰華春尚書惟辟玉食又晉王濟傳濟麗服玉食按濟為晉駙馬則扵晉卿用之宜矣古樂府上有加飡食王注公自黄量移汝州表乞常州居住詔許之唐令狐綯傳為學士承㫖夜對禁中撤金蓮花炬送還院按先生時為學士嘗召對便殿宣仁撤御前金蓮燭送歸院或即自述其事歟荘子逍遥逰庖人雖不治庖尸祝不越樽俎而代之矣漢司馬遷傳文史星歴近乎卜祝之間李白九日登巴陵置酒望洞庭水軍詩白羽落酒樽唐書袁天綱傳見竇軌曰君方語氣浮入扵大宅若将必多殺人願自戒漢書終軍傳願請長纓以羈南越王而致之闕下復河浧見夲巻九月十五日詩注謝王澤州寄長松兼簡張天覺二首莫道長松浪得名能教覆額兩眉青便将徑寸同千尺知有竒功似茯苓長松五臺山神草詳見夲巻送張天覺詩註抱朴子松脂入地千年變為茯苓神仙傳秀眉公餌茯苓得仙慿君說與埋輪使速寄長松作觧嘲公自注張天覺詩有理及河東慳之語無復青黏和漆葉枉将鍾乳敵仙茅漢揚雄傳或嘲以元尚白而雄解之作解嘲三國華佗傳樊阿従陀求可服食益扵人者陀授以漆葉青黏散注青黏一名地尸一名黄芝黏女茅亷反本草千斤鍾乳不若一斤仙次韻劉貢父所和韓康公憶持國二首夢覺真同鹿覆蕉相君脫屣自参寥顔紅底事髮先白室邇何妨人自遥狂似次公應未怪醉推東閣不須招援毫欲作衣冠表盛事終當繼八蕭列子鄭人有薪扵野者遇駭鹿撃而斃之藏諸隍中覆之以蕉俄而遺其所藏之處遂以為夢順塗而詠其事傍有聞者用其言而取之薪者歸其夜真夢藏之之處又夢得之之主案所夢而尋得之遂訟而争之歸之士師士師請二分之以聞鄭君鄭君曰士師将復夢分人鹿耶相君字出史記范雎傳荘子大宗師元㝠聞之参寥唐書蕭氏自瑀至遇八葉宰相名徳相望與唐盛衰世有衣冠盛事圗閉户端居念獨深小軒朱檻憶同臨燎鬚誰識英公意黄髮聊知子建心已託西風傳絶唱且邀眀月伴孤斟他時内集應呼我下客先􅂸醉墮簮史記陸賈傳陳平常燕居深念陸生徃請直入坐而陳丞相方深念不時見陸生陸生曰何念之深也唐李勣傳姊蚤寡有疾自為煮粥火燎其鬚曰吾與姊皆老矣能㡬進之勣封英國公曺子建別白馬王彪詩王其愛玉體俱享黄髮期次韻劉貢父叔姪扈駕玉堂孤坐不勝清長羨枚鄒接長卿只許隔􅉹聞置酒時因議事得聨名機雲似我多遺俗廣受如君不治生共託屬車塵土後鈞天一餉夢中榮司馬相如傳是時梁孝王来朝従鄒陽枚乘之徒相如見而說之因病免客逰梁得與諸侯逰士居杜子羙詩隔屋喚西家借問有酒不􅉹頭過濁醪展席俯長流漢疏廣傳廣為太傅兄子受為少傅俱移病歸子孫竊謂其昆弟老人勸說君買田宅廣曰賢而多財損其志愚而多財益其過漢司馬相如傳犯屬車之清塵應劭注大駕屬車八十一乘史記趙世家簡子夢與百神遊於鈞天廣樂九奏萬舞不似三代之樂其聲動人心韓退之詩雖得一餉樂次韻韓康公置酒見留庭下黄花一醉同重来雪巘巳穹窿不應屢被譏安石但使無多酌次公鍾乳金釵人似玉鵾絃鐵撥坐生風少卿尚有車茵在頗覺寛容勝弱翁晉謝安傳字安石扵土山營墅樓館林竹甚盛每擕中外子姪徃来遊集肴饌亦屢費百金世頗以此譏焉而安殊不以屑意白樂天戯贈牛僧孺詩鍾乳三千兩金釵十二行鵾絃鐵撥注屢見漢書丙吉字少卿車茵見第三巻廣陵三同舎詩注又魏相字弱翁為人嚴毅不如吉寛次韻王都尉偶得耳疾君知六鑿皆為贅我有一言能決疣病客巧聞牀下蟻癡人强覷棘端猴聰眀不在塵根裏藥餌空為婢僕憂但試周郎看聾否曲音小誤已回頭荘子大宗師彼以生為附贅懸疣以死為决疣潰廱韓子燕王好伎巧而人妄進曰臣能扵棘刺之端造母猴三國吳周瑜傳精意扵音樂雖三爵之後其有闕誤瑜必知之知之必顧故時謡曰曲有誤周郎顧送喬仝寄賀君六首幷序舊聞靖長官賀水部皆唐末五代人得道不死章聖皇帝東封有謁扵道左者其謁云晉水部貟外郎賀亢再拜而去上不知也巳而閱謁見之大驚物色求之不可得天聖初又使其弟子喻澄者詣闕進佛道像直數千萬張公安道與澄游具得其事又有喬仝者少得大風疾㡬死賀使學道今年八十益壮盛人無復見賀者而仝數見之元祐二年十二月仝来亰師十許日予留之不可曰賀以上元期我扵䝉山又曰吾師嘗逰宻州識君扵常山道上意若喜君者作是詩以送之且作五絶句以寄賀靖長官見十二巻送范景仁逰洛中詩注君年二十羙且都初得惡疾墮眉須紅顔白髮驚妻孥覧鏡自嫌欲棄軀結茅窮山啖松腴路逢逃秦博士盧方瞳照野清而癯再拜未起煩一呼覺知此身了非吾炯然蓮花出泥塗隨師東逰渡濰邞山頭見我兩輪朱豈知仙人混屠沽爾来八十胸垂胡上山如飛嗔人扶東歸有約不敢渝新年當參老仙儒秋風西来下雙鳧得棗如𤓰分我無詩國風洵羙且都抱朴子上黨趙瞿者病癩垂死其家乃送之山穴中有仙人行過穴口以囊藥賜之瞿服百許日瘡愈顔色豐恱肌膚玉澤仙人曰此是松脂耳列仙傳盧敖為秦始皇博士求神仙一去不返互見第五巻盧敖洞詩注王子年拾遺記老聃居山有父老五人方瞳玉面握清筠杖共談天地及五行之精列仙傳偓佺兩瞳更方濰邞密州二水名禰衡傳欲使我従屠沽兒輩也詩國風狼跋其胡注頷下懸肉也杜子羙詩上馬不用扶每扶必怒嗔生長兵間早脫身晚為元祐太平人不驚渤澥桑田變来看龜䝉漏澤春後漢光武紀生長兵間久􅌅武事桺子厚與蕭俛書朝夕歌謡使成文章雖不得位亦不虚為太平之人也太平廣記王逺傳麻姑云接待已来東海三為桑田詩魯頌奄有龜䝉山志龜山在兖州泗水縣䝉山在沂州費縣寰宇記兖州泗水縣東北漏澤穴有五皆深二丈每春夏積水秋冬不過三日水皆盡曾謁東封玉輅塵幅巾短褐亦逡廵行宫夜奏空名姓悵望雲霞縹緲人周禮王之五輅一曰玉輅又車宫軒門帷宫旌門注天子行宫也垂老區區豈為身㣲言一發重千鈞始知不見髙皇帝正似商山四皓人王注一發謂四皓對髙祖太子仁孝之語舊聞父老晉郎官巳作飛騰變化看聞道東䝉有居處願供薪水看燒丹東䝉即䝉山一名東山南史陶潜傳送一力給其子曰今遣此力助汝薪水之勞抱朴子金丹燒之愈久變化愈妙食之令人不老不死千古風流賀季真㝡憐嗜酒謫仙人狂吟醉舞知無益粟飯藜羮問飬神李白憶賀監詩四眀有狂客風流賀李真長安一相見呼我謫仙人冄見荘子刻意萹此飬神之道也送家安國教授歸成都家安國字復禮睂山人博學舉進士不第後隨韓存寳征乞第得官既而諸公舉之得成都教授故詩内有說劍横經鋒鏑腥編簡香之句別君二十載坐失兩鬢青吾道雖艱難斯文終典型屢作退飛鷁羞看乾死螢一落戎馬間五見霜葉零夜談空說劍春夢猶横經新科復舊貫童子方乞靈須煩凌雲手去作入蜀星蒼苔髙朕室古柏文翁庭初聞編簡香稍覺鋒鏑腥岷峨有雏鳯梧竹飬修翎鳴呼應嶰律飛舞集虞廷吾儕便歸老亦足慰餘齡杜子羙詩案頭乾死讀書螢荘子有說劍萹按通鑑元祐二年詔母用王氏經義従吕公著請復制科詩中新科復舊貫指此後漢李郃傳和帝遣使微服單行觀采風謡二使當到益部李郃指星云有二使星入益州分野髙朕見第五巻監試呈同官詩注王注髙朕室今府學古室文翁庭今有古柏處吕氏春秋黄帝使伶倫截嶰谷竹制十二筩聼鳯凰之鳴以為律吕和子由除夜元日省宿致齋三首按除夜元祐二年丁邜元日三年戊辰也江湖流落豈闗天禁省相望亦偶然䒭是新年未相見此身應坐不歸田白髮蒼顔五十三家人遥遣試春衫朝回兩袖天香滿頭上銀幡笑阿咸杜子羙詩朝罷香烟攜滿袖杜子羙杜位宅守歳詩守嵗阿咸家王注銀幡元日所賜者當年踏月走東風坐看春闈鎖醉翁白髪門生㡬人在郤将新句調兒童次韻答張天覺二首車輕馬稳轡銜堅但有蚊䖟喜撲縁截斷口前君莫問人間差樂勝巢仙列子齊輯乎轡銜之際蚊䖟撲縁出荘子屢見李賀小傳天上差樂不苦也韓退之記夢詩口前截斷第二句綽虐顧我顔不歡乃知神仙未賢聖䕶短慿愚邀我敬我寧屈曲身世間安能従汝巢神仙馭風騎氣我何勞且要長松作土毛亦如訶佛丹霞老郤向清凉禮白毫傳燈録丹霞禪師過慧林寺遇天大寒師取木佛燒火院主訶之師以杖子撥灰曰吾燒取舎利主曰木佛何有舎利師曰既無舎利更取兩尊来燒院主自後睂須墮落王注張天覺為河東提刑行部至五臺山㳺清凉山時有神光也法華經世尊扵靈山㑹上為諸大衆說二十八品放睂間白毫相光照三千大千世界次韻黄魯直畫馬試院中作按年譜先生以元祐三年戊辰任翰林學士知貢舉少年鞍馬勤逺行卧聞齕草風雨聲見此忽思短策横十年髀肉磨欲透􅄼更陪君作詩瘦不如芋魁歸飯豆門前欲嘶御史驄詔恩三日休老翁羨君懐中䨇橘紅公自注黄有老母杜子羙韋偃畫馬歌一匹齕草一匹嘶又詩知君苦思縁詩瘦芋魁飯豆注屢見後漢桓典傳拜侍御史是時宦官秉權典執政無所回避常乘驄馬亰師畏憚為之語曰行行且止避驄馬御史宋故事省試官出院給假三日吳志陸績見袁術術出橘績懷三枚去拜辭墮地術謂曰陸郎作賓客而懷橘乎答曰欲歸遺母余與李廌方叔相知久矣領貢舉事而李不得第愧甚作詩送之廌陽翟人少以文字見蘇子瞻子瞻喜之及知舉廌適就試意在得廌以冠多士及考章程文大喜以為廌無疑遂以為魁既拆號悵然出院以詩送廌與君相従非一日筆勢翩翩疑可識平生謾說古戰塲過眼終迷日五色我慙不出君大笑行止皆天子何責青袍白紵五千人知子無怨亦無徳買羊沽酒謝玉州為我醉倒春風前歸家但草凌雲賦我相夫子非臞仙唐李華傳嘗擬作弔古戰塲文極意硏確他日與蕭穎士讀之問誰可及答曰君加精思便能至矣華愕然信服李肇國史補唐李程貞觀中試日五色賦破云徳動天鑒祥開日華楊扵陵覧之曰須作状頭翌日無名扵陵携示主文曰塲中有此侍郎何以待之曰非状元不可於陵曰若如此侍郎已遺賢矣亟命取李程巻對之不差一字遂擢第一左傳成二年知罃對楚王曰無怨無徳不知所報韓退之寄玉川子詩買羊酤酒謝不敏冄見又紅芍藥歌花前醉倒歌者誰楚狂小子韓退之漢司馬相如傳列仙之儒居山澤間形容甚臞和王晉卿送梅花次韻東坡先生未歸時自種来禽與青李五年不踏江頭路夢逐東風泛蘋芷江梅山杏為誰容獨笑依依臨野水此間風物君未識花浪飜天雪相激眀年我復在江湖知君對花三歎息按未歸時指在黄州時也和宋肇逰西池次韻漢皇慈儉不開邉尚教千艘下瀨船貪看艨艟飛鬭艦不知贔屭舞鈞天故山西望三千里徃事回思二十年自笑區區足官府不如公子散神仙漢食貨志時粤欲與漢用船戰遂乃大修昆眀池列館環之治樓船髙十餘丈旗幟加其上西亰雜記昆眀池中有戈船樓船各數百艘漢武帝紀甲為下瀨将軍注瀨湍也伍子胥書有下瀨船吳志周瑜取䝉衝鬬艦十聨實以薪草同時舉火釋名外狭而長曰艨艟上下重板曰艦按艨艟䝉衝通吳都賦巨鼇贔屭音備戯注云作力貌西亰雜記昆眀池刻石為鯨魚每至雷雨魚嘗鳴吼鬐鬛皆動韓退之酬盧給事詩上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪再見施註蘇詩巻二十六
