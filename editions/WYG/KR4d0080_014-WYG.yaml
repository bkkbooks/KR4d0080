body:
  text: 東坡先生年譜五羊王宗稷編武進後學邵長蘅重訂仁宗景祐三年丙子先生生於是年十二月十九日乙卯時按先生送沈逵詩云嗟我與君皆丙子又有贈長蘆長老詩云與公同丙子三萬六千日又按玉局文云十二月十九日東坡生日置酒赤壁磯上又按志林云退之以磨蝎為身宫而僕以磨蝎為命若以磨蝎為命推之則為卯時生傅紀年録十二月十九日卯時公生於眉山縣紗轂行私第四年丁丑寳元元年戊寅二年已卯康定元年庚辰慶厯元年辛巳二年壬午是年先生七嵗已知讀書按先生上韓魏公梅直講書云自七八歲知讀書又按先生長短句集洞仙歌自序云僕七嵗時見眉州老尼姓朱年九十餘能知孟昶宫中事又考冷齋夜話載先生云某七八嵗時常夢㳺陜右三年癸未是年先生八嵗入小學按志林云吾八嵗入小學以道士張易簡為師師獨稱吾與陳太初者又按先生作范文正公文集序云慶厯三年某始入鄉校士有自京師来以魯人石守道慶厯聖徳詩示鄉先生某從旁竊觀問先生十一人何人也先生曰童子何用知之某曰此天人也耶則不敢知若亦人耳何為其不可四年甲申五年乙酉按子由作先生墓誌云公生十年而先君宦學四方太夫人親授以書問古今成敗輒能語其要太夫人讀東漢史至范滂傳慨然太息公侍側曰某若為滂夫人亦許之否乎夫人曰汝能為滂吾顧不能為滂母耶公亦奮厲有當世志太夫人喜曰吾有子矣又按大全集載東坡少時語云秦少章言東坡十来嵗老蘇曽令作夏侯太初論有人能碎千金之璧不能無失聲於破釡能搏猛虎不能無變色於蜂蠆之語老蘇愛此論年少所作故不傳又按趙徳麟所編侯鯖録云東坡年十嵗在鄉里見老蘇誦歐公謝宣召赴學士院仍謝賜對衣金帶及馬表老蘇令坡擬之其間有匪伊垂之帶有餘非敢後也馬不進老蘇喜曰此子他日當自用之六年丙戌七年丁亥先生年十二按先生所作天石硯銘曰某年十二時於所居紗縠行宅隙地中與羣兒鑿地為戱得異石鏗然扣之有聲又按先生作鍾子翼哀詞云某年十二先君宫師歸自江南又按先生與曽子固書云祖父之沒某年十二矣八年戊子皇祐元年已丑二年庚寅三年辛卯四年壬辰先生年十七按長短句滿庭芳序云余年十七始與劉仲達往来於眉山五年癸巳至和元年甲午先生年十九始娶眉州青神王方女按先生作王氏墓誌云生十有六嵗而歸於某至治平二年王氏卒年二十有七以王氏年數考之則甲午年歸於先生眀矣二年乙未是嵗先生年二十游成都謁張安道按先生作樂全先生文集序云某年二十以諸生見公成都一見待以國士有鼂羙叔是年求交於先生按送羙叔詩云我生二十無朋儔當時四海一子由君来叩門若有求嘉祐元年丙申先生年二十一舉進士按鳳鳴驛記云始余丙申嵗舉進士過扶風求舍於館人不可而岀次於逆旅又有寫老蘇送石舍人序紀年録范文正公文集序云嘉祐元年始舉進士至京師牛口見月詩云忽憶丙申年京師大雨滂二年丁酉先生年二十二赴試禮部館於興國寺浴室院時歐陽文忠公考試得先生刑賞忠厚之至論以為異人欲冠多士疑曽子固所為子固文忠門下士也乃寘先生第二復以春秋對義居第一及殿試章衡牓中進士乙科始見知於歐陽公及韓魏公富鄭公皆待以國士又按先生作太息一篇送秦少章歸京云昔吾舉進士試名於禮部歐陽文忠公見吾文且曰此我軰人也吾當避之是時士以剽裂為文訕公者成市又有上韓太尉書云某年二十有二矣及有上梅直講書是年先生登第之後四月丁太夫人武陽君程氏憂按司馬温公作程夫人墓誌云夫人以嘉祐二年四月癸丑終於鄉里又按老蘇寄文忠公書云一子不免丁憂今已到家紀年録文忠公嘗令鼂羙叔與公定交謂公必名丗且以書抵聖俞曰讀軾書不覺汗岀快哉快哉老夫當避此人放出一頭地文忠公未甞以此許人也三年戊戌四年已亥是嵗先生年二十四服除十二月侍老蘇舟行適楚按先生南行前集序云已亥之嵗侍行適楚舟中無事雜然有觸於中而發於詠嘆盖家君之作與弟轍之文皆在焉謂之南行集紀年録是年荆州上王兵部書曰自蜀至楚舟行六十日過郡十一縣二十有六公由水路至嘉州入嘉陵江由瀘渝涪忠䕫等州入峽江故作嘉州過宜賓泊牛口望夫䑓仙都觀入峽出峽等詩自荆門岀陸由宜城襄鄧唐許尉氏至京故作浰陽早發漢水竹葉酒留尉氏阮籍嘯臺許州西湖等詩五年庚子是嵗先生年二十五授河南府福昌縣主簿有新渠詩其序云庚子正月予過唐州太守趙侯始復三陂疏召渠為新渠詩五章以告於道路致侯之意紀年録過許見范堯夫文正公文集序曰其後過許始識公之仲子今丞相堯夫六年辛丑是年先生二十六應中制科入第三等有應制科上兩制書及上富丞相書又有謝應中制科啟授大理評事鳳翔府簽判按先生有感舊詩序云嘉祐中予與子由奉制䇿寓居懐逺驛時年二十六子由年二十三耳是年十二月赴鳳翔任與子由别馬上賦詩到任有石鼓詩云冬十二月嵗辛丑我初從政見魯叟又有鳳翔八觀詩及鳳鳴驛記七年壬寅先生年二十七官於鳳翔二月有詔郡吏分往屬縣决囚作詩五百言寄子由又有壬寅重九不預㑹遊普門寺僧閣有懐子由詩及按志林有論太白山舊封公爵為文記之是嵗嘉祐七年也又有記嵗暮鄉俗三首以子由和守嵗詩考之云顧追龍蛇子由注云是嵗壬寅乃知記嵗暮鄉俗三詩作於壬寅嵗矣八年癸卯先生年二十八官於鳳翔作思治論紀年録英宗即位公在鳳翔覃恩轉大理寺丞英宗治平元年甲辰先生年二十九官於鳳翔紀年録公在鳳翔磨勘轉殿中丞冬任滿還京至華陰作詩寄子由二年乙巳先生年三十自鳳翔罷任按子由作先生墓誌云治平二年罷還判登聞鼔院英宗皇帝在藩邸聞先生名欲以唐故事召入翰林宰相限以近例召試秘閣皆入三等得直史館是年通義郡君王氏卒於京師紀年録五月二十八日夫人王氏卒六月六日殯於京城外夫人有子邁三年丙午先生年三十一在京師直史館丁老蘇憂扶䕶歸蜀按歐陽文忠公作老蘇墓誌云眀允太常因革禮書一百巻書成方奏未報君以疾卒實治平三年四月戊申也又按張安道作老蘇文安先生墓表云太常禮書成未報以疾卒實治平三年四月也英宗皇帝聞而傷之命有司具舟載其䘮歸葬於蜀四年丁未先生年三十二居服制中以八月壬辰葬老蘇於眉州紀年録神宗即位九月十五日題摹本蘭亭記後神宗熙寜元年戊申先生年三十三免䘮按四菩薩閣記云載四菩薩版以歸既免䘮甞與往来浮屠人勸某為先君捨施為大閣以藏之作記乃熙寜元年十月二年已酉先生年三十四還朝監官告院按烏臺詩話云熙寜二年某在京授差遣與王詵寫詩賦及蓮華經三年庚戌先生年三十五監官告院有送錢藻知婺州詩分韻得英字送曽子固倅越詩分韻得燕字烏臺詩話云舊例館閣補外同舍餞送必分韻又有寄劉貢父詩是年范景仁甞舉先生充諫官四年辛亥先生年三十六任監官告院兼判尚書祠部王荆公欲變科舉上疑焉使兩制三館議之先生獻三言荆公之黨不恱命攝開封府推官有奏罷買燈疏御史知雜事誣告先生過失未甞一言以自辯乞外任避之除通判杭州有赴任過揚州與劉貢甫孫巨源劉莘老相聚數月各以其字為韻作詩十一月到任有初到杭州寄子由兩絶除夕先生以通判職事直都㕔日暮返舍題一詩於壁紀年録臘月遊孤山訪恵勤恵思二僧作詩又和李杞并自和五年壬子先生年三十七在杭州通判任是嵗有牡丹記其序云熙寜五年三月二十三日余從太守沈公觀花於吉祥寺是年科塲先生監試有呈試官詩及試院煎茶詩催試官考較戱作八月十七日登望湖樓是日榜岀與試官兩人復留有五絶句又有送杭州進士詩序云熙寜五年錢塘之士貢於禮部者九人十月乙酉宴於中和堂作是詩以勉之十二日運司差先生往湖州相度堤埠利害與湖州太守孫莘老相見有贈莘老七絶及作山村五絶是嵗又作送杜子方詩紀年録閏七月哭歐陽公於孤山次韻恵思詩六年癸丑先生年三十八在杭州通判任有八月十五觀潮詩寫於安濟亭上及作仁宗皇帝飛白記其畧云熙寜六年冬以事至姑蘇安簡王公子誨岀所賜公端敏二字又有作錢塘六井記其畧云熙寜五年太守陳公述古至問民之利病明年春六井畢修故詳其語以告後人運司又差先生往潤州道岀秀州錢安道送茶和詩是嵗有次韻答章傳道詩寄劉道原詩及和陳述古冬日牡丹詩四絶又有題贈法恵師小童思聰紀年録正月九日作雜興答鮮于子駿上元祥符寺九曲觀燈作詩二十一日述古邀城外尋春作詩二十七日遊風水洞作詩又作李佖留待及和等詩冬以事至姑蘇為王誨作仁宗御飛白記又作三瑞堂詩除夜宿常州城外作詩七年甲寅先生年三十九在杭州通判任是年納侍妾朝雲墓誌云朝雲姓王氏錢塘人事先生二十有三年紹聖三年卒於恵州年三十四以嵗月考之熙寜之甲寅至紹聖之丙子恰二十三年乃知納朝雲在是年眀矣朝雲年三十四是為癸卯生来事先生方十二云先生以子由在濟南求為東州守按子由超然臺賦序云子瞻通守餘杭三年不得代以轍之在濟南也求為東州守既得請髙密五月乃有移知密州之命按先生作勤上人詩集序云熙寜七年余自錢塘赴髙密又按先生辛未别天竺觀音詩序云余昔通守錢塘移蒞膠西以九月二十日来别南北山道友乃知先生以秋末去杭按先生記㳺松江説云吾昔自杭移髙宻與楊元素同舟而陳令舉張子野皆從余過李公擇於湖遂與劉孝叔俱至松江夜半月岀置酒垂虹亭上子野年八十五以歌詞聞於天下作定風波令及道過常州為錢公輔作哀辭及有與段屯田詩云龍鍾三十九勞生已强半嵗暮日斜時還為昔人嘆是年又作鳬繹先生文集序又有師子屏風贊云潤州甘露寺有唐李衛公所留陸探微畫師子版余自錢塘移守膠西過而觀焉是年又有潤州道上過除夜詩兩絶詩見續補遺紀年録元日以事過丹陽作寄魯元翰及栁子玉鶴林招隱并與子玉景純唱和等詩是月秀州贈錢端公文長老等詩二十九日過毗陵䟦李後主書五月作錢公輔哀詞又次韻周邠詩六月自常潤還所至作詩秋捕蝗至浮雲嶺作懐子由詩至於潛作贈毛國華野翁亭緑雲軒於潛女詩又同年臨安令劇飲并所至諸縣有詩九月移知密州是月作勤上人詩集序十月赴密州早行馬上作沁園春十一月三日到任十二月有除夜病中贈段屯田詩蘅按是年除夜紀年録云先生已任密州年譜云在潤州道上各以先生詩為据依然考紀年録是年起元日至除夜記載特詳先生以十月赴密州年譜亦云秋末去杭不應除夜仍在潤州道中姑存疑竢考八年乙卯先生年四十到密州任有上韓丞相論災傷書其到郡二十餘日矣又論密州鹽税又作後杞菊賦其序云予仕宦十有九年家日益貧移守膠西而齋厨索然按先生丁酉年登第至是恰十九年矣是年有寄劉孝叔詩及和李公擇来字韻詩及常山祈雨感應立雩泉九年丙辰先生年四十一在密州任作刻秦篆記云熙寜九年丙辰蜀人蘇某等守髙密是年中秋歡飲達旦作水調歌頭懐子由及作薄薄酒二章又寫超然臺記寄李清臣又祭常山神文書膠西盖公堂照壁畫贊及作山堂銘作表忠觀碑紀年録十二月移知徐州除夜留濰州十月丁巳先生年四十二在密州任按去年十二月先生已離密州當從紀年録就差知河中府已而改知徐州四月赴徐州任有留别釋迦院牡丹呈趙倅詩按子由作先生墓誌云自密徙徐是嵗河决曹村乃知是丁巳自密改東徐又與子由相㑹於澶濮之間相約赴彭城留百餘日宿於逍遥堂子由有兩絶先生和之徐州水患大作七月十七日河決澶州曹村埽八月二十一日及徐州城下先生治水有功至十月五日水漸退城以全朝廷降詔奨諭作河復詩韓幹畫馬歌司馬君實獨樂園詩及送范蜀公往西京詩又有和子由水調歌頭詞及有與王定國顔長道泛舟詩有回頭四十二年非之句紀年録元日早晴離濰州作詩青州道上大雪作詩二月到京作送范蜀公詩元豐元年戊午先生年四十三在徐州任適值春旱徐州城東二十里有石潭置虎頭其中可致雷雨作起伏龍行是年三月始識王逈子髙聞與仙人周瑶英遊作芙蓉城詩二月有㫖賜錢二千四百一十萬起夫四千二十三人及發常平錢米改築徐州外小城創木岸四以奨諭敕記併刻諸石為熙寜防河録云迺即徐州城之東門為大樓堊以黄土名之曰黄樓以土實勝水故也子由作黄樓賦先生跋云元豐元年八月癸丑樓成九月庚辰大合樂以落之又有中秋月三首云六年逄此月五年照離别先生注云中秋有月凡六年矣惟去嵗與子由㑹於此去嵗之㑹乃逍遥堂和詩之時也又有九日黄樓作古詩一首云去年重陽不可説南城夜半千漚發之句以去年九月大水未退故有是語又作放鶴亭記滕縣公堂記鹿鳴燕詩序和魯直古風二首及次韻潛師放魚和舒堯文祈雪詩祭文與可及作石炭詩又作日喻一篇二年已未先生年四十四在徐州任正月已亥同畢仲孫舒煥八人游泗之上登石室使道士載日祥鼔雷氏琴先生有記按玉局文云僕在徐州王子立子敏皆館於官舍而蜀人張師厚来過二王方年少吹洞簫飲酒杏花下三月自徐州移知湖州按先生作張氏園亭記云余自彭城移守吴興由宋登舟三宿而至其記乃三月二十七日所作乃知三月移湖州眀矣是年以四月二十九日到湖州任作送通教大師還杭州序及為章質夫作思堂記王定國作三槐堂記跋歐陽文忠公家書後在湖州王子立子敏皆從先生作子立墓誌云子立子敏皆從余學於吴興學道日進東南之士稱之有與王郎昆仲及兒子邁遶城觀荷花登峴山亭晚入飛英寺分韻得月眀星稀四首又有泛舟城西㑹者五人分韻得人皆苦炎字四首又作文與可畫篔簹谷偃竹記其末云元豐二年七月七日予在湖州曝書見畫廢卷而哭失聲是嵗言事者以先生湖州到任謝表以為謗七月二十八日中使皇甫遵到湖追攝按子立墓誌云子得罪於吴興親戚故人皆驚散獨兩王子不去送予岀郊曰死生禍福天也公其如天何返取予家致之南都又按先生上文潞公書云某始就逮赴獄有一子稍長徒歩相隨其餘守舍皆婦女幼稚至宿州御史符下就家取書州郡望風遣吏發卒圍船搜取長幼㡬怖死既去婦女恚罵曰是好著書書成何所得而怖我如此悉取焚之八月十八日赴臺獄中有寄子由詩二首及賦榆槐竹栢四詩又有十二月二十日恭聞太皇太后升遐吏以某罪人不許成服欲哭則不可欲泣則不敢作挽詩二首已而獄具十二月二十九日責授黄州團練副使本州安置是年子由聞先生下獄上書乞以見任官職贖先生罪責筠州酒官出獄再次寄子由二詩韻有百日歸期恰及春之句先生自八月坐獄至是踰百日矣紀年録七月太子中允權監察御史何大正舒亶諫議大夫李定言公作為詩文謗訕朝政及中外臣寮無所畏惮國子博士季宜之状亦上七月二日崇政殿進呈奉聖㫖送御史臺根勘二十八日皇甫遵到湖州追攝過南京文定張公上劄范蜀公上書救之三年庚申先生年四十五責黄州自京師道岀陳州子由自南郡来陳相見三日而别先生有古詩有便為齊安民之句又與文逸民飲别携手河堤上作詩與子由别乃正月十有四日也至十八日蔡州道上遇雪有次子由韻古詩二首過新息縣有示鄉人任師中一首任伋字師中眉州人嘗倅黄州卜居新息又有過淮詩游淨居寺詩至岐亭訪故人陳慥季常為留五日賦詩一首而去以二月一日至黄州寓居定恵院有初到黄州詩按先生别王文甫子辯云僕以元豐三年二月一日到黄州家在南都獨與兒子邁来是年五月子由来齊安先生有詩迎之又有曉至巴河迎子由詩乃與子由同遊武昌西山寒溪寺有古詩一首定恵顒師為先生竹下開嘯軒作詩記其事又作五禽言又有定恵寺寓居月夜偶出詩云去年花落在徐州對月酣歌羙清夜今年黄州見花發小院閉門風露下蓋懐在徐州與張師厚王子立子敏飲酒杏花下時也定恵有海棠一株土人不知其貴先生作詩有也知造物有深意故遣佳人在幽谷之句按黄州東坡圖云先生寓居定恵未久以是春還臨皋亭乃舊日之回車院也又有遷居臨皋亭詩先生就臨皋亭立南堂有詩五絶又有讀戰國䇿及作石芝詩是嵗又有答秦太虛書借得本州天慶觀道士堂冬至後坐四十九日先生乳母王氏八月卒於臨皋亭按先生上文潞公書云到黄州無所用心覃思易論語若有所得由是言之先生到黄定居之後即作易傳九卷論語五卷必始於是嵗矣四年辛酉先生年四十六在黄州寓居臨皋亭正月往岐亭訪陳季常以岐亭五首考之云元豐三年正月岐亭為留五日明年正月復往見之過古黄州獲一鑑有鑑銘云元豐四年正月余自齊安往岐亭泛舟而還過古黄州獲一鑑周尺有二寸是年先生請故營地之東名之以東坡考東坡八首序云余至黄二年日以困匱故人馬正卿哀予乏食於郡請故營地使躬耕其中盖先生庚申来黄至辛酉為二年以東坡圖考之辛酉方營東坡次年始築雪堂有贈孔毅甫詩云去年東坡拾瓦礫今年刈草盖雪堂則雪堂之作在壬戌嵗矣又有中秋日飲酒江亭上有贈鄭君求字及記㳺松江説聞㨗説按大全集雜説云元豐辛酉冬至僕在黄州姪安節逺来飲酒樂甚以識一時盛事又有冬至贈安節詩云平生幾冬至少小如昨日又有與安節夜坐賦檠字韻詩三首及正月過岐亭作應夢羅漢記五年壬戌先生年四十七在黃州寓居臨皋亭就東坡築雪堂自號東坡居士以東坡圖考之自黄州門南至雪堂四百三十歩堂以大雪中為之因繪雪於四壁之間無容隙其名盖起於此先生自書東坡雪堂四字榜之是年三月先生以事至蘄水悼徐徳占詩序云元豐五年三月余以事至蘄水徳占恵然見訪又有春夜行蘄水過酒家飲酒乘月至一橋上曲肱少休作西江月詞又遊蘄水清泉寺作浣溪沙詞又作寒食詩二首云自我来黄州已見三寒食太守徐君猷分新火先生有詩謝之有臨皋亭中一危坐三見清眀改新火之句七月遊赤壁有赤壁賦云壬戌之秋七月既望蘇子與客泛舟遊於赤壁之下十月又逰之有後赤壁賦云十月既望蘇子歩自雪堂将歸於臨皋則壬戌之冬未遷而先生以甲子六月移汝其居雪堂止年餘由是推之先生自臨皋遷雪堂必在壬戌十月後矣又有和孔毅甫久旱已而甚雨詩云去年太嵗空在酉乃知指去年辛酉言之也又按長短句有飲王文甫家集古句作墨竹定風波及夢扁舟望樓霞作鼓笛慢及記單驤孫兆事迹作怪石供及重九作醉蓬莱示黄守徐君猷有覊旅三年之句先生庚申来黄至是恰三年矣紀年録十二月十九東坡生日也置酒赤壁磯下踞髙峯俯鵲巢酒酣笛聲起於江上客有郭古二生頗知音謂坡曰笛聲有新意非俗工也使人問之則進士李委聞坡生日作新曲曰鶴南飛以獻呼之使前則青巾紫裘腰笛而已既奏新曲又快作數弄嘹然有穿雲裂石之聲坐客皆引滿醉倒委求詩作一絶句王郎以詩見慶次其韻六年癸亥先生年四十八在黄州為通判孟亨之跋子由君子泉銘及有題唐林父筆文閏八月有詩與武昌主簿吴亮工又有記承天夜遊云十月十二夜至承天寺尋張懐民相與歩於中庭庭中如積水空明水中藻荇盖竹栢影也及作一絶送曹煥往筠州序云眀年余過圓通始得其詳先生甲子嵗自黄之汝逰廬山則送曹煥詩必在是年矣又夢中作祭春牛文云元豐六年十二月二十七日天欲眀夢數吏人持紙請祭春牛文予取筆疾書其上紀年録七月二十七日生小子遯小名幹兒七年甲子先生年四十九在黄州二月與徐得之參寥子歩自雪堂至乾明寺有師中菴題名又有記定恵寺海棠説四月乃有量移汝州之命按先生長短句滿庭芳序云四月一日余将自黄移汝留别雪堂鄰里二三君子李仲覧来書以遺之詞中有坐見黄州再閏之句按東坡圖云郡人潘邠老及弟大觀俱以詩知名多從先生逰先生去以雪堂付之邠老因以居焉四月六日又作安國寺記有别黄州詩有過江夜行武昌山上聞黄州鼔角詩黄州送先生者皆至於慈湖陳季常獨至九江既到江州和李大白潯陽宫詩其序云今予亦四十九感之次其韻因㳺廬山有記遊廬山説云僕初入廬山山谷竒秀平生所欲見應接不暇不欲作詩已而山中僧俗皆曰蘇子瞻来矣不覺作一絶入開先寺主僧求詩作瀑布一絶往来十餘日作潄玉亭三峡橋詩與總老同遊西林有贈總老及題西林壁皆絶句也又有寫寳盖頌與僊長老其序云圓通禪院先君舊遊也四月二十四日晚至宿焉眀日先君忌日寫寶盖頌以贈長老僊公盖先生端午已在筠州計程必作宫師忌日後即為髙安之行矣途中又有題李公擇山房及過建昌李野夫公擇故居古詩一首按䟦李志中文云元豐七年某舟行赴汝乃自富川陸走髙安别家弟子由以冷齋夜話考之子由在筠州雲菴居洞山聰禪師亦蜀人居夀聖寺一夕三人同夢迎五祖戒和尚拊手大笑曰世間果有同夢者異哉久之東坡書至曰已至奉新旦夕相見三人同出二十里建山寺而東坡至各追繹所夢坡曰某年七八嵗時甞夢某身是僧往来陜右雲菴驚曰戒陜右人也暮年棄五祖来逰髙安終於大愚逆數盖五十年而坡時年四十九矣又以先生古詩考之有自興國往筠宿石田驛詩及将至筠州先寄遲适逺三猶子詩端午遊真如寺及别子由三首在筠州為留十日又有初别子由至奉新作皆先生筠州之作也七月過金陵有與葉致逺唱和詩途中又有送沈逵赴廣南詩云嗟我與君皆丙子四十九年窮不死又云我方北渡脱重江君復南行輕萬里逼嵗到泗州十二月十八日浴雍熙塔下作如夢令兩闋又作滿庭芳與劉元逹序云余年十七與仲達往来於眉山四十九相逄於泗上晦日同遊南山話舊感嘆又有跋李志中文天石硯銘又作水龍吟及有謝黄師是除夜送酥酒詩先生上表乞於常州居住其畧云今雖已至泗州而貲用罄竭見一面前去南京聴候朝旨則是年除夜在泗州眀矣紀年録六月九日作石鍾山記畧云余自齊安舟行適臨汝而長子邁将赴饒之徳興尉送之至湖口二十三日舟過蕪湖七月十八日幼子遯病亡扵金陵作詩哭之曰吾年四十九覊旅失幼子八年乙丑先生年五十按大全集雜説騾䭾鐸試筆云今日離泗州然吾方上書求居常州乃正月四日書及到南京有放歸陽羡之命遂居常州五月内復朝奉郎知登州再過密州有贈太守霍翔詩云十年不赴竹馬約盖先生丁巳嵗去密至是以成數為十年矣過海州嘆髙麗館壮麗作一絶到郡五日以禮部郎官召到省半月除起居舍人在登州有海市詩又有别登州舉人詩有嫌五日悤悤守之句又有贈杜介詩及題楞伽跋多寳院文又有題登州蓬莱閣及跋起居錢公文後紀年録哲宗即位復朝奉郎八月十七日得㫖除知登州十月十五日到登州二十日召為禮部貟外郎哲宗元祐元年丙寅先生年五十一以七品服入侍延和改賜銀緋尋除中書舍人按志林云元祐元年余為中書舍人復遷翰林學士知制誥是年有法雲寺鐘銘又作真相院釋迦舍利塔銘及作元祐元年九月六日眀堂赦文又有内中告遷神御於新添修殿奉安祝文及奉告天地社稷宗廟宫觀寺院祈雪祝文五嶽四瀆祈雪祝文及任中書舍人日舉江寜府司理周穜充學官及除内翰又有舉魯直自代狀紀年録正月除中書舎人辭免状云臣頃自貶所知登州到任五日而召以省郎半月而擢為右史云云今又冐榮直授躐等驟遷非惟其人既難以處不試而用尤非所安九月一日司馬温公薨作祭文行状十月十二日書黄泥坂辭遺王晉卿是日除翰林學士知制誥十一月供翰林學士職尋除侍讀召入院九日考試館職與聖求㑹宿玉堂作武昌西山詩十二月五日與狄詠同館北客書狄武襄事二年丁卯先生年五十二為翰林學士復除侍讀有書石舍人北使序後及有與喬仝寄賀君詩其序云元祐二年仝来京師十數日予留之不可又有二月八日朝退起居院感申公故事作一絶又有書子由日本扇後及作祭王宜甫文又作興國寺六祖畫贊云嘉祐初舉進士館於興國浴室院予去三十一年而中書舎人彭器資亦館於是余往見之按先生嘉祐丁酉舉進士至元祐丁卯恰三十一年矣是年又作西京應天院修神御畢造遷諸神祝文及奉安神宗皇帝神御祝文及景靈宫宣光殿奉安神宗皇帝御容祝文五嶽四瀆祈雨祝文天地宗廟社稷祈雨祝文景靈宫天興殿開淘井眼祭告里域真官祝文紀年録九月十五日邇英殿講論語終篇賜御書詩翌日進詩又進讀故事八説是年作司馬温公神道碑又作富鄭公神道碑又作趙清獻公神道碑鄭公以元豐六年閏六月二十一日薨于洛陽至是其子紹庭請於朝命公撰碑清獻公以元豐七年八月二十六日薨于杭至是其子㞦請於朝命公撰碑又作贈寫真道士李得素曰五十之年初過二衰顔記我今如此三年戊辰先生年五十三任翰林學士有和子由元日省宿致齋有白髪蒼顔五十三之句是年省試先生知貢舉開院日有與李方叔詩序云僕與李廌方叔相知久矣僕領貢舉事李不得第愧甚作詩謝之又和錢穆父雪中見及有行避門生時小飲之句又充館伴北使按先生與陳傳道書云某頃伴鹵使頗能誦某文乃知先生髙文大冊傳播夷夏又豈止及於鷄林行賈而已哉是年作呂大防范純仁左右相制端午帖子詞元祐三年六月徳音赦文及作西路闕雨祈雨祝文按趙徳麟侯鯖録云東坡云元祐三年二月二十一日與魯直蔡天啟㑹於伯時舎録鬼仙詩又有議論作詩付過又有論樂等説及與王晉卿論雪堂義墨及為文驥作字説又十二月二十一日立延和殿中論盛度誥詞四年已巳先生年五十四任翰林學士有東太一宫修殿告十神太一真君祝文三月内累章請郡除龍圖閣學士知杭州按子由作先生墓誌云宣仁心善先生辯蔡持正之謗岀郊遣内侍賜龍茶銀合用前執政恩例先生以七月三日到杭州任謝表云江山故國所至如歸父老遺民與臣相問以先生去杭州十六年故有是語耳到任有謁文宣王廟祝文云昔自太史通守是邦今由禁林岀使浙右又有謁諸廟祝文先生之帥杭也替林子中先生有和子中詩有江邊遺愛嗁班白之句是年過吴興又作定風波為六客詞作范文正公文集序及跋邢惇夫賦書米元章又有已巳重九和蘇伯固㸃絳唇是嵗子由使契丹先生有詩送之有單于若問君家世莫道中朝第一人之句先生岀牧餘杭子由代先生為學士五年庚午先生年五十五在杭州任有論西湖状及論髙麗公案有謝元祐五年厯日表有與劉景文蘇伯固逰七寳寺題竹上絶句又有庚午重九㸃綘唇十月二十六日與晦老全翁元之敦夫逰南屏寺記㸃茶試墨説十二月逰小靈隱聽林道人彈琴及有乞僧子珪師號状除夜有和熙寜中題都㕔詩序云熈寜中某通守此邦除夜題一詩於壁今二十年矣盖熙寜辛亥至元祐庚午恰二十年是年又有書朱象先畫後及問淵眀説六年辛未先生年五十六在杭州任被召按先生作别天竺觀音三絶序云以三月九日被旨赴闕又按先生作參寥泉銘云予以寒食去郡又上元作㑹有獻剪綵花者作浣溪沙寄袁公濟先生之去杭也林子中復来替先生是以先生與子中啟有適相先後之説過潤州作臨江仙别張秉道既到京師除翰林承㫖復侍邇英按子由所作潁濱遺老傳云先生召還本除吏部尚書復以臣故改翰林承㫖臣之私意元不遑安乞寝臣新命與兄同備從官不報六月作上清儲祥宫碑其畧云元祐六年六月丙午制詔臣某上清儲祥宫成當書之石臣待罪北門記事之成職也按趙徳麟侯鯖録云先生元祐中再召入院作承㫖乃益舊擬作衣帯馬表云枯羸之質匪伊垂之帶有餘歛退之心非敢後也馬不進數月以弟嫌請郡復以舊職知潁州按先生懐舊别子由詩云元祐六年予自杭州召還寓居子由東府數月復岀領汝陰時予年五十六矣紀年録四月到闕五月入院八月除龍圖閣學士知潁州到任有謁文宣王及諸廟文有祭歐陽文忠文及有到潁未㡬公帑已竭齋厨索然戱作數句按趙徳麟侯鯖録云元祐六年冬汝陰久雪人饑一日天未眀東坡先生簡召議事曰某一夕不寐念潁人之饑欲岀百餘千造炊餅救之老妻謂某曰子昨過陳見傅欽之言簽判在陳賑濟有功不問其賑濟之法某遂相招令畤面議曰已備之矣今細民之困不過食與火耳義倉之積穀數千石便可支散以救下民作院有炭數萬秤酒務有柴數十萬秤依元價賣之可濟中民先生曰吾事濟矣遂草放積欠賑濟奏陳履常有詩先生次韻有可憐擾擾雪中人之句為是故也由此觀之先生善政救民之饑真得循吏之體矣又有聚星堂雪詩祭辯才文跋張乖崖文後及志林載夢中論左傳説及論子厚瓶賦又有十二月二日與歐陽叔弼季黙夜坐記道人問真説是年潁州災傷先生奏乞罷黄河夫萬人開本州溝瀆從之七年壬申先生年五十七在潁州任按趙徳麟侯鯖録云元祐七年正月東坡在汝陰州堂前梅花大開月色鮮霽先生王夫人曰春月色勝如秋月色秋月令人慘悽春月令人和悦何如召趙徳麟軰来飲此花下先生大喜曰吾不知子亦能詩耶此真詩家語耳遂召與二歐飲先生用是語作减字木蘭花有不似秋光只與離人照斷腸之句已而改知揚州先生之在潁也與趙徳麟同治西湖未㡬有維揚之命三月十六日湖成徳麟有詩見懐先生次韻又再和之及作雙石詩示僚友按冷齋夜話云東坡鎮維揚幕下皆竒豪一日石塔長老求觧院歸西湖坡與僚佐袖中出疏使鼂無咎讀之其詞有為東坡而少留之句已而以兵部尚書召有召還至都門先寄子由詩有一味豐年説淮潁之句復兼侍讀是年南郊先生為鹵簿使尋遷禮部尚書遷端眀侍讀學士有讀朱暉傳題文潛語後及作醉翁操任兵部尚書日有薦趙徳麟狀紀年録二月移知揚州淮上早發作詩三月上巳日過濠與迨過㳺塗山荆山記所見七月和淵眀飲酒詩二十首八月作張文定公滕元發誌銘九月以兵部尚書召兼侍讀郊祀為鹵簿使尋除端眀殿學士兼翰林侍讀學士守禮部尚書冬至作郊祀慶成詩又次韻錢穆父從駕郊丘瞻望天光退而相慶作詩八年癸酉先生年五十八任端眀侍讀二學士是年先生繼室同安郡君王氏卒於京師按先生作西方阿彌陀贊序云蘇某之妻王氏元祐八年八月一日卒於京師按先生初娶通義郡君王氏乃同安之堂姊先生祭王君錫丈人云某始婚姻公之猶子允有令徳夭閼莫遂惟公幼女嗣執罍篚由是推之通義為同安之堂姊甚眀但未能究再娶嵗月耳又有八月二十七日建隆章淨館成一絶有坐待宫人畫詔回之句㝷以二學士岀知定州九月十四日東府雨中作示子由云去年秋雨時我在廣陵歸今年中山去白首歸無期盖定州之除必在九月内矣到定州任有祭韓魏公文書定州學生硯盖作中山松醪賦紀年録十二月二十三日到定州紹聖元年甲戌先生年五十九知定州就任落兩職追一官知英州有辭宣聖文行至滑州有乞舟行赴英州状云帶家屬數人前去汴泗之間乘舟泛江倍道而行至南康軍出陸赴任未到任閒再貶寜逺軍節度副使恵州安置過䖍州有記真君籖説云八月二十一日過䖍州與王巖翁同謁祥符宫又有鬱孤臺㳺字韻詩與霍守李倅更和數首又有初入贛作又有題天竺樂天石刻余年幼時先君自䖍州歸言天竺有樂天詩今四十七年矣盖先生年十二老蘇歸自江南至是恰四十七年矣是年以十月三日到恵州寓居嘉祐寺有初到恵州詩當月十二日與幼子過同遊白水佛迹浴於湯池有古詩又按長短句浣溪沙序云紹聖元年十月十三日與程鄉令侯晉叔歸善簿覃汲㳺大雲寺野飲松下設松黄湯作此闋余家近釀酒名曰萬家春時有䖍州鶴田處士王原子直不逺千里来訪先生留七十日而去至十一月有戱贈朝雲詩朝雲先生侍妾也又録三十九嵗潤州道上過除夜兩絶付過及有跋朱表臣藏文忠公帖又有與吴秀才書吴乃子野之子其書云過廣州買得檀香數斤定居之後杜門燒香深念五十九年之非矣又就嘉祐寺所居立思無邪齋有贊乃紹聖元年十月二十日作二年乙亥先生年六十在恵州有恵州上元夜詩詩云去年中山府老病亦宵興今年江海上雲房寄山僧以嵗月考之去年甲戌上元先生知定州今嵗乙亥寓嘉祐僧舍故有雲房寄山僧之句是年遷居於合江亭以先生别王子直語觀之紹聖元年十月三日始至恵州寓於嘉祐寺眀年遷於合江之行館得江樓豁徹之觀忘幽谷窈窕之趣乃知乙亥嵗遷居合江樓眀矣又有松江亭上賦梅花詩及先生行年六十化之句三月四日同太守詹範器之柯常林柞王原頼仙芝同逰白水山又有與陳季常書云到恵州将半年先生以去年十月三日到恵州三月恰半年矣又有九月二十七日恵州星華館思無邪齋書記外祖程公逸事又有朝斗記讀管幼安傳書魯直跋逺景圖北齋校書圖後又有為幼子過書金光眀經後及付僧恵誠逰吴中代書及祭妺徳化縣君文有葬枯骨銘時詹守議葬暴骨先生詩有江干白骨已銜恩之句三年丙子先生年六十一在恵州有和陶淵眀移居詩云余去嵗三月自水東嘉祐寺遷去合江樓迨今一年得歸善後隙地數畞父老云古白鶴觀也意欣然居之營白鶴新居始於是矣詩中乃有葺思無邪齋之句先生甲戌寓居嘉祐寺已有思無邪齋贊乙亥遷合江樓先有書程公逸事於星華館思無邪齋今丙子欲營新居又曰葺思無邪齋雖三年之間遷居不常意其齋名亦隨寓而安矣當年恵州修東西新橋先生助以犀帶而子由亦以史夫人頃入内所賜金錢數千為助及橋成日先生有詩落之乃有嘆我捐腰犀及有探囊頼故侯寳錢出金閨之句又有曇秀道人来訪先生而先生題其詩巻云予在廣陵曇秀作詩予和之後五年曇秀来恵州見子先生以壬申知揚州至是恰五年矣時吴逺逰陸道士客於先生嵗暮以無酒為嘆先生和淵眀和張常侍詩云我年六十一頽景薄西山是年又有丙子重九詩二首及書東皋子傳後祭寳月大師文七月朝雲卒先生有詩悼之及作墓誌又於恵州栖禪寺大聖塔葬處作亭覆之名之六如亭又除夜前兩日與吴逺逰有記食芋説按先生和淵眀時運詩丁丑二月十四日白鶴峯新居成計其營新居之棟宇必在丙子秋冬之交有白鶴峰上梁文四年丁丑先生年六十二在恵州正月六日有題劉景文詩後按先生和淵眀時運詩云丁丑二月十四日白鶴峯新居成又與張天和長官書云賤累閠月初可到又云承問賤累正月末已到贛上閠月上旬到此也又按先生丙子年與毛澤民書云長子授韶州仁化令中冬當挈家至此某已買得數畝地在白鶴峰上古白鶴觀基也已令斫木陶瓦作屋二十間以此考之先生長子自冬挈家至閏二月方到恵州按和時運詩序長子邁與予别三年矣般挈諸孫萬里逺来不能無欣然所謂二月十四日新居成必閏二月也三月先生作三馬圖及作陸道士墓誌五月紀年録作四月先生責授瓊州别駕昌化軍安置按志林云余在恵州忽被命責儋耳太守方子容自携告身来弔余曰此固前定吾妻沈事僧伽甚誠一夕夢和尚来辭云當與蘇子瞻同行後七十二日有命今適七十二日矣豈非前定乎遂寄家於恵州獨與幼子過渡海按子由作先生追和淵眀詩序云東坡先生謫居儋耳寘家羅浮之下獨與幼子過負擔過海又至梧州寄子由詩序云吾謫雷被命即行了不相知至梧乃聞其尚在藤也旦夕當追及至五月間果遇子由於藤州有藤州城下夜起望月寄邵道士詩自藤出陸六月與子由相别按先生和淵眀移居詩序云丁丑嵗余謫海南子由亦謫雷州五月十一相遇於藤同行至雷六月十一日相别渡海有雷州詩八首有行瓊州儋耳肩輿坐睡夢中得句覺而遇清風急雨故作是詩有古詩一首以七月到儋州有儋州謝表按先生夜夢詩序云七月十三日至儋州十餘日矣按子由作先生墓誌云紹聖四年先生安置昌化初僦官屋以庇風雨有司猶謂不可則買地築室昌化士人畚土運甓以助之為屋三間又按先生與程全父推官書云初至僦官屋數椽近復遭廹逐不免買地結茅又與程儒書云近與兒子結茅數椽居之勞費不貲矣頼十數學者助作躬泥水之役又云新居在軍城南極湫隘以意測之先生居在軍城南與天慶觀鄰又有桄榔菴銘云東坡居士謫居儋耳無地可居偃息於桄榔林中摘葉書銘以記其處是嵗又過海得子由書律詩一首元符元年戊寅先生年六十三在儋州有過子上元夜赴郡㑹守舍作違字韻詩及有讀晉書隱逸傳嶺南氣候説録温嶠問郭文語又於九月四日逰天慶觀有信道法智説是年吴子野来訪先生以詩贈之其序云去嵗與子野逰逍遥堂因往西山叩羅浮道院宿於西堂今嵗索居儋耳子野復来相見作詩贈之又有記筮卦云戊寅十月五日以久不得子由書憂不去心以周易筮之得渙六三又有記藷説云海南以藷為糧㡬米之十六今嵗藷菜不熟以客舶方至市有米也乃戊寅十月二十一日書又有戊寅十一月一日記海漆説二年已卯先生年六十四在儋州有已卯正月十三日録盧仝杜子羙詩遣懣是時久旱無雨陰翳未快至上元夜老書生數人相過曰良月佳夜先生能一岀乎先生欣然從之歩城西入僧舍歴小巷民夷雜揉屠沽紛然歸舍已三鼓矣歸録其事為已卯夜書又有二月望日書蒼耳説又有儋州詩萬户不禁酒三年夷識翁之句先生丁丑来儋至是将三年矣是嵗閏九月有瓊州進士姜君弼唐佐自瓊州来儋耳從先生學又有作墨説及題程全父詩卷後及有辟穀説又有與姜唐佐簡云已取天慶觀乳泉潑建茶之精者念非君莫與共之又有十月十五日與姜君簡三年庚辰先生年六十五嵗在儋州人日聞黄河復作詩二首至上元又和戊寅違字韻詩題後云戊寅上元余在儋耳過子夜岀守舍作違字韻詩今庚辰上元已再期矣家在恵州白鶴峰下過子并婦從余来此又有五穀耗地説記唐村老人言及養黄中説姜君弼去年閏九月自瓊州来從先生學三月還瓊州有跋姜君弼課䇿及有書栁子厚飲酒讀書二説以贈姜君之行按子由欒城集有贈姜君詩序云子瞻甞贈姜君弼兩句詩云滄海何曽斷地胍白袍端為破天荒它日登科當為子足之必是行以遺之也五月大赦量移廉州安置按先生在儋食芋飲水著書以為樂作書傳以推眀上古之絶學且謙冲下士日與諸黎逰無間甞與軍使張中同訪黎子雲欲醵錢作屋名之曰載酒堂又上已日尋諸生皆岀獨與老符秀才飲又用過韻與諸生冬至飲酒有愁顔解符老壽耳鬪吴公之句注云符吴皆坐客必老符秀才與吴子野也又按趙徳麟侯鯖録云東坡老人在昌化甞負大瓢行歌田畝間所歌盖哨遍也饁婦年七十云内翰昔日富貴一塲春夢坡然之里人呼此媪為春夢婆坡一日被酒獨行遍至子雲諸黎之舍作詩云符老風流可奈何朱顔減盡鬢絲多投梭每困東鄰女換扇惟逢春夢婆是日復見老符秀才言此春夢婆之實也凡此數事皆先生海外逸事雖三年居儋耳未知在某年中今附於庚辰之嵗庶以備觀閲云又有儋州與姜君弼書某已得合浦文字又有與少㳺書自儋之瓊作峻靈王廟碑云元符三年有詔徙亷州向西而辭六月過瓊州作恵通泉記遂渡海有過海詩紀年録七月四日記渡合浦曰予自海康適合浦連日大雨橋梁盡壊水無津涯自興廉浄行院下乘小舟至官寨聞自此而西皆漲水無復橋船或勸乘蜑舟並海即白石是年六月晦無月碇宿大海中天水相連星河滿天起坐四顧太息曰吾何數乘此險也既濟徐聞復厄於此乎所撰易書論語皆以自隨而世未有别書拊之而歎曰天未欲䘮是也吾儕必濟又有烏喙詩序云余来儋耳得犬曰烏喙予遷合浦過澄邁泅而濟戱作是詩渡海到亷州謝表有許承恩而内徙之句在廉州有亷州龍眼質味殊絶可敵荔枝詩又有題少㳺學書云庚辰八月二十四日書於合浦清樂軒及記蘇佛兒語别亷守張左藏詩此皆在廉州所作詩也又有瓶笙詩序云庚辰八月二十八日劉㡬仲餞别東坡中觴聞笙簫聲又有與鄭靖老書云到亷廉守云公已行矣志林未成草得書傳十三卷某留此過中秋或至月末乃行作木栰下水歴容藤至梧與邁約般家至梧相㑹迨亦至恵矣是嵗又有移永州之命按先生謝提舉成都府玉局觀表云先自昌化貶所移亷州又自廉州移舒州節度副使永州居住行至英州復朝奉郎提舉成都府玉局觀任便居住經由廣州有将至廣州用過字韻寄迨邁二子詩時朱行中舍人知廣州先生有簡與朱行中云欲服㡌請見先令咨禀廣州少留而行考先生題廣慶寺云東坡居士渡海北還吴子野何崇道穎堂通三長老黄眀達李公弼林子中自畨禺追餞至清逺峽同逰廣陵寺乃元符三年十一月十五日自此舟行清逺過英州拜玉局之除有何公橋詩過韶州有次韻狄守李倅詩及作九成臺銘是年過嶺作詩寄子由有七年来往我何堪之語盖先生甲戌責恵州已而過海至是為七年矣次年正月五日過南安軍計先生度嶺必已嵗除徽宗建中靖國元年辛巳先生年六十六度嶺北歸作南華長老題名記按題中載石鍾山記云建中靖國元年正月五日自南陵還過南安軍舊法掾吴君示舊所作石鍾山銘為題其末乃知先生首正過南安必矣又有過嶺至南安作一首正月到䖍州有與錢濟眀書云某已到䖍州二月十間方離此又和舊所作鬱孤臺詩有䖍州士人孫志舉從先生逰先生有和遲韻贈志舉先軰云我從海外歸喜及崆峒春又有和志舉見贈云洒掃古玉局香火通帝闉又用前韻謝崔次之見過云自我遷嶺外七見槐火春及發䖍州過吉州永和鎮清都觀有謝道士自言丙子生求詩為賦一首及為作贊并寫清都臺三字中途又為南安軍作學記寫海外所作天慶觀乳泉賦四月舟行至豫章彭蠡之間遇成國程夫人忌日廼寫圓通偈云行當施廬山有道者又有與胡仁修書云旦夕到儀真暫令邁一至常五月行至真州瘴毒大作病暴下中止於常州按先生寄朱行中詩有至今不貪寳凛然照塵寰之句先生注云前一日夢中作此詩寄行中覺而記之自不曉按近日曽端伯百家詩選至朱行中事迹云東坡夢中寄朱行中一篇南遷絶筆也先生文如萬斛泉源而乃止於夢中寄行中之作此正絶筆獲麟之義惜哉六月上表請老以本官致仕七月丁亥卒於常州實七月二十八日嗚呼先生文章為百世之師而忠義尤為天下大閑加之好賢樂善常若不及是宜訃聞之日士民惜哲人之萎朝野嗟一鑑之逝皆出於自然之誠不可以强而致也以次年閏六月葬於汝州郟城縣釣臺鄉上瑞里紀年録七月疾頗革折簡錢世雄云昨夜齒中出血如蚯蚓者無數若専是熱毒根源不淺即今諸藥盡却惟取人參茯苓麥冬瀹湯渇即飲之荘生云在宥天下未聞治天下也三物可謂在宥矣此而不愈則天也徑山老惟琳来説偈答曰與君皆丙子各已三萬日一日一千偈電往那能詰大患縁有身無身則無疾平生笑摩什神呪真浪出琳問神呪事索筆書昔鳩摩羅什病亟出西域神呪三番令弟子誦以免難不及事而終併出一帖云某嶺海萬里不死而歸宿田里有不起之憂非命也耶盖絶筆於此後二日殆将屬纊而聞觀先離琳叩耳大聲云端明冝勿忘公云西方不無但箇裏着力不得世雄云固先生平時踐履至此更湏着力曰着力即差語絶而逝按五羊王氏年譜綜其大端僊谿傅氏紀年核於月日要亦互有得失今以年譜為主而紀年之可取者節抄分注以備参考弃瑕存瑜庶㡬全璧年譜有數條誤處如臘日逰孤山訪僧詩應在辛亥而悮入壬子逰風水洞諸詩應在癸丑而悮入甲寅又見顧秀才談恵州風物之羙詩應在南遷度嶺而悮入北歸之類今俱為刪正其詩文無大關係而年譜未載者雖嵗月可考不更増入以年譜與譜詩異也長蘅識東坡先生年譜
