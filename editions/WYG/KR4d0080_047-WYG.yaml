body:
  text: 施註蘇詩巻三十三宋蘇軾撰施元之原註武進邵長蘅刪補詩四十一首起在兵部洎遷禮部尚書作次韻穆父尚書侍祠郊丘瞻望天光退而相慶引滿醉吟千章杞梓䕃雲天樗散誰收老鄭䖍喜氣到君浮白裏豐年及我挂冠前令嚴鐘鼔三更月野宿貔貅萬竈煙太息何人知帝力歸来金帛看赬肩杜子美送鄭䖍貶台州司户鄭公樗散鬢成絲酒後常稱老畫師史記孫子傳使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈韓退之城南聨句刈熟擔肩赬郊祀慶成詩元祐七年哲宗合祭天地于圜丘公以兵部尚書為南郊鹵簿使先是朝饗八室至神宗室上涕洟不止癸巳冬至行禮上致誠極恭夜月澄爽雲物晏温御棲肆赦終日和燠天意昭答翼日風寒相屬時雪如期宰執侍從進詩以賀蓋此詩也帝出乗昌運天心予太平文章三代繼制作七年成大祀乾坤合剛辰日月明泰壇朝掃地魄寶夜垂精仰御圓蒼蓋環觀海嶽城北流吞朔易西極落欃槍升燎靈光答回鑾瑞霧迎需雲徧枯槁解雨達句萌可頌非天徳因箴亦下情民言知有酌帝謂本無聲富國由崇儉蘄年在好生無心斯格物克已自銷兵化國安新政孤臣反舊耕還將清廟什留與野人賡周易帝出乎震漢食貨志三登曰太平漢孝武紀贊曰號令文章煥然可述後嗣得遵鴻業有三代之風尚書洛誥註周公七年成禮樂禮記成王幼弱周公踐天子之位以治天下朝諸侯於明堂制禮作樂頒度量而天下服七年致政於成王禮記外事以剛日鄭氏曰順其出為陽也出郊為外事爾雅圓丘泰壇祭天也方澤泰圻祭地也禮記掃地而祭貴質也晉天文志鉤陳口中一星曰天皇大帝其神曰耀魄寶唐文粹李徳裕武宗册文云振金石而六變魄寶昭臨詩國風北流活活詩意言黄河順流也尚書平在朔易孔安國云北稱朔易謂嵗改易於北方西極謂西夏也漢天文志天槍左右鋭長數丈縮西北天欃本類星末銳長數丈石氏云槍欃棓彗異狀其殃一也又曰祅星周易雲上於天需君子以飲食晏樂又解卦天地解而雷雨作雷雨作而百果草木皆甲坼解之時義大矣哉禮記季春之月生氣方盛陽氣發泄勾者畢岀萌者盡逹唐李絳傳安國佛祠欲使絳為之頌絳言大人與天地合徳謂非文字所能盡若令可述是陛下美有分限毛詩庭燎美宣王也因以箴之禮記坊記上酌民言則下天上施詩大雅帝謂文王予懷明徳又上天之載無聲無臭後漢王符傳化國之日舒以長故其民閑暇而力有餘毛詩清廟祀文王也次韻奉和錢穆父蔣穎叔王仲至四首見和西湖月下聽琴謖謖松下風藹藹隴上雲聊將竊比我不堪持寄君半生寓軒冕一笑當琴尊良辰飲文字晤語無由醺我有鳯鳴枝背作虵蚹紋月明委静照心清得奇聞當呼玉澗手公自注家有雷琴甚奇古玉澗道人崔閑妙于雅聲當呼使彈一洗羯鼓昏請歌南風曲猶作虞書渾王注鳯鳴枝琴也琴古而漆裂則有虵蚹紋虵蚹字岀莊子注謂虵腹下有齟齬可以行也羯鼓錄明皇酷不好琴嘗聽琴未及畢叱琴者岀曰速召花奴將羯鼓來為我解穢史記樂書舜作五絃之琴以歌南風揚子虞夏之書渾渾爾見和仇池上窮非想亦非非下與風輪共一癡翠羽若知牛有角空瓶何必井之睂還朝暫接鵷鸞翼謝病行收麋鹿姿記取和詩三益友他年弭節過仇池華嚴經四空處天無邊處天無所有處天非想非非想處天又金輪水際外有風輪樓炭經地深二十億萬里下有金粟金剛亦各二十億萬里下有水際八十億萬里此雖六重前四是地輪第五水輪第六風輪共一癡言上天下地皆然蓋佛氏謂之界者一癡想所成也白樂天詩上自非想頂下及風水輪杜子美赤霄行孔雀未知牛有角渴飲寒泉逢抵觸赤霄𤣥圃湏往來翠尾金華不辭辱漢陳遵傳揚雄作酒客難法度士曰子猶瓶矣觀缻之居居井之睂處高臨深動常近危唐上官儀曰御史供奉赤墀下接武䕫龍簉羽鵷鷺三益友指言錢蔣王也仇池詳見三十二巻雙石詩注玉津園承平苑囿雜耕桑六聖勤民計慮長碧水東流還舊𣲖公自注玉津分蔡河上流復合於下紫壇南峙表連岡不逢遲日鶯花亂空想疎林雪月光千畆何時躬帝籍斜陽寂歴鏁雲莊六聖謂太祖太宗眞宗仁宗英宗神宗漢郊祀志甘泉泰畤紫壇八觚宣通象八方禮記天子籍田千畝以事天地籍田竊脂方紀瑞布穀未催耕魚沫依蘋渚蝸涎上綵楹江湖來夢寐蓑笠負平生琴裏思歸曲因君一再行左傳昭十七年少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名九扈為農正杜預曰桑扈竊脂也文選石季倫有思歸引序注巳見頃年楊康功使高麗還奏乞立海神廟于板橋僕嫌其地湫隘移書使遷之文登因古廟而新之楊竟不從不知定國何從見此書作詩稱道不巳僕不能記其云何也次韻答之楊康功名景畧洛陽人元豐間以起居郎使高麗為國王祭奠使歸稱上旨就賜金紫擢中書舍人終龍圗閣待制知揚州退之仙人也游戲於斯文談笑岀奇偉鼓舞南海神頃年三韓使㡬為鮫鰐吞歸來築祠宇要使百賈奔公自注板橋商賈所聚我欲遷其廟下數浮空羣公自注謂登州海市移書竟不從信非磊落人公胡為拳拳繫此空中雲作詩頌其美何異刻劍痕我今巳括囊象在六四坤韓退之南海神廟碑海於天地間為物最鉅而南海神次最貴在北東西三神河伯之上號為祝融傳燈錄南泉云汝道空中一片雲為復釘釘住為復藤纜著刻劍岀吕氏春秋詳二十二巻王仲父哀辭注周易坤之六四曰括囊无咎无譽沐浴啟聖僧舎與趙徳麟邂逅趙徳麟名令畤舊字景貺事見三十巻先生守潁徳麟在幕府郡有西湖毎相從其上至是官滿入京故有東潁西湖季子來歸之句時先生力求㑹稽故有同泛越溪之句南山北闕兩非眞東潁西湖迹已陳季子來歸初可喜老耼新沐定非人酒清不醉休休暖睡穩如禪息息匀自笑塵勞餘一念明年同泛越谿春孟浩然詩北闕休上書南山歸敝廬春秋閔元年八月季子來歸穀梁傳其曰季子貴之也其曰來歸喜之也莊子田子方孔子見老耼老耼新沐方將被髪而乾慹然似非人注慹不動皃神仙傳焦先卧于雪下氣息休休如盛暑醉卧之状次韻王仲至喜雪御筵元祐七年南郊罷時雪如期先生是歲自揚州召歸故云偶還仗内身如寄仲至名欽臣時權工部侍郎三軍喜氣鑠飛花睡起空驚月在沙未集驊騮金騕褭故殘鳷鵲玉横斜偶還仗内身如寄尚憶江南酒可賖宣勸不多心自醉强扶衰白拜君嘉杜子羙宣政退朝詩雪殘鳷鵲亦多時唐儀衛志衙凡朝㑹之仗二衛番上分為五仗一曰供奉仗二曰親仗三曰勲仗四曰翊仗五曰散手仗毎月以四十六人立内廊閤外號曰内仗以左右金吾將軍當上中郎將一人押之朝罷皇帝歩入東序門然後放仗後漢劉寛傳帝嘗令講經寛于坐被酒睡伏帝問太尉醉耶對曰任重責大憂心如醉左傳襄四年晉侯享魯穆叔歌鹿鳴之三穆叔曰君所以嘉寡君也敢不拜嘉僕所藏仇池石希代之寳也王晉卿以小詩借觀意在於奪不敢不借然以此詩先之海石來珠宫秀色如蛾緑坡陀尺寸間宛轉陵巒足連娟二華頂空洞三茅腹初疑仇池化又恐瀛洲蹙殷勤嶠南使餽餉淮東牧公自注僕在揚州程徳孺自嶺南解官還以此石見遺得之喜無寐與汝交不瀆盛以高麗盆藉以文登玉公自注僕以高麗所餉大銅盆貯之又以登州海石如碎玉者附其足幽光先五夜冷氣壓三伏老人生如寄茅舍乆未卜一夫幸可致千里常相逐風流貴公子竄謫武當谷見山應巳厭何事奪所欲欲㽞嗟趙弱寧許負秦曲傳觀愼勿許間道歸應速楚詞紫貝闕兮珠宫再見南部新書青黛螺光明鮮翠毎一螺直千金當時名之曰蛾綠漢舊儀中黄門持五夜謂自甲夜至戊夜也唐地理志均州武當郡有武當山九域志武當山一名仙室山山上有巖澗凡三十七所趙弱四句用史記藺相如歸璧事詳巳見次天字韻答岑巖起岑巖起名象求梓州人元祐四年為郎考功用蘇文定公薦拜殿中侍御史文定執政以嫌徙金部郎事徽宗於王邸終寳文閣待制第四巻送岑著作詩即巖起也一聲清蹕霧開天百辟心莊豈貎䖍囘顧驚君珠玉側同升愧我粃糠前裵囘月色留壇影縹緲松香泛蠟烟公自注近制以椽燭松明易籸盆莫嘆郎潛生白髪聖朝求舊鄙鳶肩周禮卿士大祭祀帥其屬夾道而蹕漢儀注皇帝輦動稱警岀殿則傳蹕晉衛玠傳王濟歎曰珠玉在側覺我形穢孫綽傳與習鑿齒共行綽在前顧謂習曰沙之汰之瓦礫在後習曰簸之揚之糠粃在前後漢張衡傳尉厖睂而郎潛鳶肩用唐馬周事竝已見次韻蔣穎叔二首扈從景靈宫道人幽夢曉初還巳覺笙簫下月壇風伯前驅清宿霧祝融參乗破朝寒英姿連璧從多士妙句鏘金和八鑾巳向詞臣得頗牧公自注時穎叔新除熙河帥路人莫作老儒看楚詞逺遊風伯為余先驅兮辟氛埃而清凉漢司馬相如傳大人賦祝融警而蹕御子虛賦陽子參乘孅阿為御韓退之荆潭唱和詩序鏗鏘發金石世説孫興公作天台山賦成以示范榮期云卿試擲地要作金石聲詩小雅四牡彭彭八鸞鏘鏘唐畢諴傳為翰林學士宣宗召訪邊事諴條状甚悉帝悦曰吾將擇能帥者孰謂頗牧在吾禁署卿為朕行乎即拜邠寧節度使凝祥池似知金馬客時夢碧雞坊冰雪消殘臘煙波寫故鄉鳴鸞自容與立馬乆囘翔乞與三韓使新圗到樂浪公自注時高麗使在都下毎至勝景輙圗畫以歸碧雞坊在成都杜子羙詩云時岀碧鷄坊西郊向草堂漢地理志樂浪郡武帝元封三年開故朝鮮國也圗畫見聞志高麗國熙寧甲寅歲遣使金良鑒入貢訪中國圗畫鋭意購求稍精者十無一二然猶費三萬餘緡丙辰冬復遣使崔思訓入貢因將帶畫工數人乞摹寫相國寺壁畫歸國詔許之於是盡摹之持歸其畫人頗有精于筆法者和叔盎畫馬天驥徳力偹馬外龍鱗中皇天不遣言兀與圖畫一作畫圗同駑駘飽官粟未受一洗空十駕均一至何事籋雲風南秦錄吕光討西域平上疏曰惟龜兹據三十六國之中入其國城天驥龍鱗腰褭丹髦萬計盈廐元微之望雲騅歌色沮聲悲仰天訴天不遣言君未識杜子羙丹青引斯湏九重眞龍岀一洗萬古凡馬空荀子驥一日而千里駑馬十駕亦及之矣籋雲字岀漢禮樂志屢見王晉卿示詩欲奪海石錢穆父王仲至蔣穎叔皆次韻穆至二公以為不可許獨穎叔不然今日穎叔見訪親睹此石之妙遂悔前語僕以為晉卿豈可終閉不予者若能以韓幹二散馬易之者蓋可許也復次前韻相如有家山縹緲在睂綠誰云千里還寄此一顰足平生錦繡腸早歲藜莧腹從教四壁空未遣兩峰蹙吾今况衰病義不忘樵牧逝將仇池石歸泝岷山瀆守子不貪寳完我無瑕玉故人詩相戒妙語予所伏一篇獨異論三占從兩卜君家畫可數天驥紛相逐風騣掠原野電尾梢澗谷君如許相易是亦我所欲今朝安西守來聽陽闗曲勸我留此峰他日來不速西京雜記文君睂色不加黛常如逺山再見李白翰林集序太白弟令問嘗目白曰兄心肝五臟皆錦繡耶韓退之詩三年國子師腸肚習藜莧左傳襄十五年子罕曰我以不貪為寳爾以玉為寳不若人有其寳尚書三人占則從二人之言桞子厚龍城錄寧王善畫馬六馬滚塵圗明皇最愛玉面花驄謂無纎悉不備風騣霧鬛信偉如也唐書地理志洮州臨洮郡有府一名安西欲以石易畫晉卿難之穆父欲兼取二物穎叔欲焚畫碎石乃復次前韻并解二詩之意春冰無眞堅霜葉失故綠鷃疑鵬萬里蚿笑䕫一足二豪爭攘袂先生一捧腹明鏡既無臺淨瓶何用蹙盆山不可隱畫馬無由牧聊將置庭宇何必棄溝瀆焚寳眞愛寳碎玉未忘玉乆知公子賢岀語耆年伏欲觀轉物妙故以求馬卜維摩既復捨天女還相逐授之無盡燈照此乆幽谷定心無一物法樂勝五欲三峩吾鄉里萬馬君部曲卧雲行歸休破賊看神速公自注晉卿將種常有此意莊子秋水篇夔謂蚿吾以一足趻踔而行子無如矣今子之使萬足獨奈何蚿曰予動吾天機而不知其所以然晉劉伶傳嘗醉與俗人相忤其人攘袂奮臂而往伶徐曰雞肋不足以安尊拳傳燈錄神秀云心如明鏡臺六祖云明鏡亦無臺又百丈召溈山云溈山勝景汝當居之華林曰某甲沗居上首祐公何得住持百丈曰若能下得一句岀格當與住持即指淨缾問云不得喚做淨瓶華林曰不可喚作木橛也百丈又問祐師師踢倒淨缾百丈笑云輸郤山子也楞嚴經衆生皆轉於物若能轉物即同如來維摩經魔波旬言居士可捨此女以一切所有於彼者是為菩薩維摩言我巳捨矣汝便將去於是諸女問維摩我等云何止於魔宫居士乃言諸姊有法門名無盡燈無盡燈者譬如一燈然百千燈冥者皆明明終不盡又互見六巻上元詩注傳燈錄六祖偈云本來無一物維摩經汝等巳發道意有法樂可以自娱法華經堅著於五欲癡愛故生惱因造立宅舎五欲自娛生日劉景文以古畫松鶴為壽且貺佳篇次韻為謝問子一室間寜有千里廓塵心洗長松逺意發孤鶴生朝得此壽死籍疑可落微言在參同妙契藏九籥故人有竒趣逸想寄幽壑霜枝謝寒暑雲翮無前卻何湏搆明堂未羡巢阿閣緬懷别時語復作數日惡詩腴固堪飡字瘦還可愕高標忽在眼清夢了如昨君今噲等伍志與湛輩各豈待相願言方為不朽託子雲老執㦸長孺終主爵吾當追松喬子亦鄙衛霍抱朴子小餌丹法服之二日司命削其死籍李太白詩北酆落死名南斗上生籍白樂天詩授我參同契其辭妙且微神仙傳魏伯陽齊㑹稽上虞人也得古文龍虎上經盡獲妙旨公因約其象著參同契三巻鮑昭升天行五圖發金記九龠隱丹經注云仙家有九轉金丹法而龠所以藏書也白樂天松詩殺身獲其所為君構明堂軒后本紀鳯集東園梧桐又巢阿閣南齊王儉傳世祖嘗問當今誰能為五言詩儉曰謝朏得父膏腴晉羊祜傳從事鄒湛曰公令聞令望必與此山俱傳至若湛輩乃當如公言耳互詳十七巻與王郎昆仲詩注漢汲黯傳字長孺武帝召為主爵都尉程徳孺惠海中栢石兼辱佳篇輙復和謝程德孺名之元持節嶺南歸惠此石故皆用嶺南事徳孺時為主客郎中嵐薰瘴染郤敷腴笑飲貪泉獨繼吳未欲連車收薏苡􅈕教沈網取珊瑚不知庾嶺三年别收得曹溪一滴無但指庭前雙栢石要予臨老識方壺飲貪泉晉吳隱之事薏苡後漢馬援事竝巳見洽聞記􅀢箖國海中珊瑚生于水底以大船鐵網取之名其所為珊瑚洲南越志南越以五嶠為限東曰大庾九域志大庾嶺本屬䖍州大庾縣淳化三年以縣置南安軍傳燈錄僧問雲門如何是曹溪一滴水再見又趙州從諗禪師凡有僧入室但指庭前柏樹云庭前柏樹子拾遺記海中有三山其形如壺方丈曰方壺蓬萊曰蓬壺瀛洲曰瀛壺次秦少游韻贈姚安世帝城如海欲尋難肻捨漁舟到杏壇剝啄扣君容膝户巍峩笑我切雲冠問羊獨怪初平在牧豕應同徳曜看肻把參同較同異小牕相對為硏丹莊子漁父篇孔子休乎杏壇之上絃歌鼓琴奏曲未半漁父下船而來楚辭九章冠切雲之崔巍問羊黄初平事詳見十四巻送將官梁左藏詩注後漢梁鴻傳牧豕於上林苑中娶同縣孟氏女字之曰徳曜孟光次丹元姚先生韻葉少藴避暑錄記姚丹元事云姚因王鞏以進於東坡本京師富人王氏子為父逐去事建隆觀一道士天資頗慧因取道藏徧讀或能成誦又多得其方術丹藥作詩間有放浪奇譎語故能成其説浮沉淮南屢易姓名後復其姓名為王繹又易名元誠力詆林靈素為其毒死浮生知㡬何僅熟一釜羮􅃚於俯仰間用此委曲情自憐無他腸偶亦得此生懸知當去客中有不亡存但恐宿緣重毎為習氣昏似聞梅子眞近在吳市門未能肩拍洪但欲目擊温不敢扣門呼恐作踰垣奔且令紹介先徐以方便論不學劉更生黄金鑄尚方不學房次律身事問潁陽王烈亦何人叔夜未可量獨見神山開遽飡石髓香至道尚聽瑩麤材終蹶張先生喜而笑幅巾登我堂苦誓指黄壤要言刻青琅蓬萊在何許弱水空相望且當從嵇阮聊復數山王逹人友四海曲士守一疆愼勿使形諜兒童驚夜光漢書衛綰傳以戲車為郎文帝以為亷謹實無他腸以為河間王大傅陶淵明雜詩身為逆旅舍我如當去客莊子田子方吾有不亡者存韓退之華山女詩仙梯難攀俗縁重楞嚴經陀􅃚微細識習氣成暴流漢梅福字子眞變姓名為吳市門卒詳見九巻次韻陳海州注郭景純遊仙詩左挹浮丘袖右拍洪崖肩莊子田子方温伯雪子舍於魯仲尼見之而不言子路問之仲尼曰若夫人者目擊而道存矣不可以容聲矣維摩經維摩詰以方便現身有疾廣為説法法華經以方便力柔伏其心漢楚元王傳向字子政本名更生尚方鑄作事詳十二巻贈王仲素寺丞詩注酉陽雜俎邢和璞善心算作潁陽書疏房琯太尉祈問終身之事邢言若由東南止西北禄命卒矣降魄之處非舘非寺非塗署病起於魚飱木材用龜兹板其後房公舍閬州紫極宫見有治龜兹板者始憶邢之言有頃刺史具鱠邀琯琯悟具以板事白於刺史其夕病鱠卒也王烈石髓事屢見嵇康字叔夜聽瑩字岀莊子齊物論巳見漢申屠嘉傳以材官蹶張從高帝擊項羽晉王義之傳去㑹稽郡於父母墳前自誓朝廷以其誓苦亦不復徵之本草玉石部青琅玕注瑠璃之類火齊寳也續仙傳謝自然曰毎登玉霄峯即見滄海蓬萊亦應不逺於是入海遇一道士笑謂曰蓬萊隔弱水此去三萬里非飛仙莫到又互見前莊子列禦宼内誠不解形諜成光以外鎭人心使人輕乎貴老而􅕖其所患注􅕖猶醃釀也韓退之詩兒童畏雷電魚龞驚夜光次韻秦少游王仲至元日立春三首省事天公厭兩囘新年春日併相催殷勤更下山隂雪要與梅花作伴來已邜嘉辰壽阿同公自注子由一字同叔元日已邜渠本命也願渠無過亦無功明年春日江湖上囘首觚稜一夢中詞鋒雖作楚騷寒徳意還同漢詔寛好遣秦郎供帖子盡驅春色入毫端公自注立春日翰林學士供詩帖子上元侍飲樓上三首呈同列澹月疎星遶建章仙風吹下御爐香侍臣鵠立通明觀一作殿一朶紅雲捧玉皇薄雪初銷野未耕賣薪買酒看升平吾君勤儉倡優拙自是豐年有笑聲史記范雎傳楚之鐵劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮逺老病行穿萬馬羣九衢人散月紛紛歸來一盞殘燈在猶有傳柑遺細君公自注侍飲樓上則貴戚爭以黄柑遺近臣謂之傳柑聽攜以歸蓋故事也漢東方朔傳歸遺細君又何仁也送蔣潁叔帥熙河并引見蔣穎叔名之奇已二十四巻穎叔岀使臨洮與穆父仲至同餞之各賦詩一篇以今我來思為韻致遄歸之意得我字西方猶宿師論將不及我茍無深入計緩帯我亦可承明正湏君文字粲藻火自薦雖云數畱行終不果正坐喜論兵臨老付邊瑣新詩岀談笑僚友困掀簸我欲歌杕杜楊桞方婀娜邊風事首鹵所得蓋么麽願為魯連書一射聊城笴隂功在不殺結草酬魏顆漢韓安國傳孝文寤於兵之不可宿也故復和親之約顔師古注宿乆留也晉羊祜傳祜在軍輕裘緩帯尚書藻火粉米黼黻絺繡以五采彰施於五色作服漢丙吉傳鹵入雲中代郡吉召東曹案邊長吏瑣科條其人詩小雅杕杜勞還役也又采薇昔我往矣楊桞依依漢衛青傳至龍城斬首鹵數百史記魯仲連傳齊田單攻聊城不下仲連為書約之矢以射城中遺燕將燕將見書泣三日乃自殺聊城亂田單遂屠聊城説文苛箭莖也魏顆事岀左傳宣十五年詳見巻四送蔡冠卿知饒州詩注再送二首使君九萬擊鵬鵾􅈕為陽闗一斷魂不用寛心九千里安西都䕶國西門唐地理志安西大都䕶府初治西州正觀中置漢書鄭吉初䕶鄯善以西南道既破車師降日逐威震西域遂并䕶車師以西北道故號都䕶自吉始焉餘刃西屠横海鯤應予詩讖是游魂歸來趁别陶𢎞景看挂衣冠神武門莊子養生主其於游刃必有餘地矣木𤣥虗海賦其魚則横海之鯨游魂公先有詩與穎叔云湏知羌鹵是游魂故申言之而曰詩讖也漢賈誼傳讖言其度注讖騐也有徵騐之書也陶𢎞景詩意公自謂也次韻穎叔觀燈安西老守是禪僧到處應然無盡燈永夜岀游從萬騎諸羌入看擁千層便因行樂令投甲不用防秋更打冰振旅歸來還侍宴十分宣勸恐難勝魏武紀賊將見公悉於馬上拜秦胡觀者前後重沓唐陸贄傳西北邊歲調河南江淮兵謂之防秋毛詩伐鼓淵淵振旅闐闐次韻王晉卿奉詔押高麗燕射北苑傳呼陛楯郎東夷初識令君香天山自可三箭取海國何勞一葦航宣勸不辭金盌側醉歸爭看玉鞭長錦囊詩草勤收拾莫遣鷄林得夜光陛楯郎岀史記滑稽傳再見世説荀令君至人家坐處三日香唐書薛仁貴傳為鐵勒道行軍總管時九姓衆十餘萬令驍騎來挑戰仁貴發三矢輒殺三人軍中歌曰將軍三箭定天山壯士長歌入漢闗九姓遂衰李賀傳毎旦岀從小奚奴背古錦囊遇所得投囊中未嘗先立題然後為詩白居易傳最工詩當時士人爭傳鷄林行賈售其國相率易一金偽者相輙能辨之次韻錢穆父王仲至同賞田曹梅花四朝正史錢穆父傳載其復知開封臨事益精明東坡乘其据案時遺之詩穆父操筆立賦以報坡曰電掃廷訟響答詩筒近所未見也然穆父以是歲二月十八日再除開封田曹賞梅倡和猶當是為户部尚書時此後止有次韻穆父馬上寄蔣穎叔二絶而東坡出帥定武和送别一詩爾響答詩筒顧未見之豈倡酬猶有遺逸耶坡公之語不應虛發也寒㕔不知春獨立耿玉雪閉門愁永夜置酒及明發忽驚庭户曉未受煙雨沒浮光風宛轉照影水方折鬢霜未易掃睂斧眞自伐惟當此花前醉卧黄昏月淮南子水圓折者有珠方折者有玉枚叔七發皓齒蛾睂命曰伐性之斧送襄陽從事李友諒歸錢塘李友諒字叔益錢塘人舉進士紹聖初右正言張商英論元祐以來刑賞失當謂友諒當衝替因與蘇軾厚善三省為之掩匿云居杭積五歳自意本杭人故山歸無家欲卜西湖鄰良田不難買静士誰當親髥張既超然老潛亦絶倫李子冰玉姿文行兩清淳歸從三人游便足了此身公隄不改作姥嶺行開新幽夢隨子去松花落衣巾王注髥張老潛李子皆杭州人髥張不知為誰老潛即道潛師曰參寥子者李子則友諒也公堤即蘇公堤姥嶺則天姥山也次韻吳傳正枯木歌吳傳正名安詩父克相神宗傳正元祐中為右司諫與劉噐之同攻蔡確竄荒服遷左史攝西掖坐草蘇黄門知汝州詞溢美罷去後為子累編置湘中詩中有龍眠居士本詩人指李伯時也天公水墨自奇絶瘦竹枯松寫殘月夢囘疎影在東牕驚怪霜枝連夜發生成變壞一彈指乃知造物初無物古來畫師非俗士妙想實與詩同出龍眠居士本詩人能使龍池飛霹靂君雖不作丹青手詩眼亦自工識拔龍眠胸中有千駟不獨畫肉兼畫骨但當與作少陵詩或自與君拈秃筆東南山水相招呼萬象入我摩尼珠盡將書畫散朋友獨與長鋏歸來乎卓異記天授二年十二月則天幸上苑遣使宣詔曰明朝遊上苑火急報春知花湏連夜發莫待曉風吹凌晨名花瑞草布苑而開楞嚴經度百千刼猶如彈指杜子美曹將軍畫馬圖詩曾貎先帝照夜白龍池十日飛霹靂又丹青引幹惟畫肉不畫骨又韋偃畫馬歌戲拈秃筆掃驊騮歘見騏驎出東壁圓覺經清浄摩尼寳珠映於五色隨方各現送黄師是赴兩浙憲二十二巻有泗州除夜雪中黄師是送酥酒詩黄師是名實神宗時登進士第歴京東河北轉運師是為章子厚之甥子由官陳師是二女皆為子由婦哲宗欲召用而林希用是沮之終寳文閣待制知定州贈龍圖閣直學士孫勰䟦此詩云先生侍兒嘗問朝之諸公遷擢不淹時獨黄師是昔為提刑今又提刑何也先生時方作詩送之故有白首沈下吏緑衣有公言之句按陸游序亦云侍妾朝雲嘗嘆黄師是仕不進故此句之意戲言其上僭云世乆無此士我晚得王孫寜非叔度家豈岀次公門白首沈下吏緑衣有公言哀哉吳越人乆為江湖吞官自倒帑廩飽不及黎元近聞海上港漸岀水底村願君五袴手招此半菽魂一見刺史天稍忘獄吏尊㑹稽入吾手鏡湖小於盆比我東來時無憂瘡痍存後漢徵君黄憲字叔度西漢循吏黄覇字次公五袴後漢亷范事屢見漢項籍傳今歲饑民貧卒食半菽後漢蘇章傳為冀州刺史故人為清河太守章行部請太守陳平生之好太守喜曰人皆有一天我獨有二天漢周勃傳下庭尉既岀曰吾嘗將百萬軍安知獄吏之貴也㑹稽句先生時方請越故云送范中濟經略侍郎分韻賦詩得先字且贈以魚枕杯四馬箠一以元戎十乗以先啟行為韻范中濟字子竒五世祖仁恕相蜀因葬成都祖雍字伯仁始家河南中濟以䕃歴官判將作監使契丹鹵欲撓之不為屈歷四路漕左司司農卿由河陽守召權户部侍郎元祐八年二月為集賢殿修撰知慶州伯仁在仁宗時為副樞李元昊叛拜鎭武節度使知延州又知永興軍故云廟堂選世將范氏眞多賢中濟在慶進寶文閣待制廣儲蓄城柵嚴守備羈􅃛羌推誠待下人樂為用入為吏部侍郎以待制致仕梁李乆樂禍自焚豈非天兩䑕鬭穴中一勝亦偶然謀初要百慮善後乃萬全廟堂選世將范氏眞多賢仁風被宿麥緑浪揺秦川號令聳毛羽先聲落虛弦我家天一方去路城西偏投竿困障日賣劍行歸田贈君荆魚杯副以蜀馬鞭一醉可以起毋令祖生先梁李謂西夏二種族西夏在唐賜姓李為李繼遷本朝賜姓趙為趙元昊承襲者姓趙其餘種族猶李姓梁則其妻之黨也左傳莊二十年王子頽歌舞不倦樂禍也又隱四年魯大夫衆仲曰兵猶火也弗戢將自焚史記趙奢傳秦伐韓軍於閼與奢曰其道逺險狹譬猶兩鼠鬬於穴中將勇者勝後漢安帝記詔以宿麥不下賑賜貧人注宿舊也麥必經年而熟故稱宿落虗弦用戰國䇿更嬴射鴈事再見歐陽公送劉侍讀詩酌君以荆州魚枕之蕉贈君以宣城䑕湏之筆杜牧之送冀處士詩贈以蜀馬箠副之胡罽裘晉劉琨傳與祖逖為友聞祖逖被用曰吾枕戈待旦常恐祖生先吾著鞭書晁説之考牧圖後我昔在田間但知羊與牛川平牛背穩如駕百斛舟舟行無人岸自移我卧讀書牛不知前有百尾羊聼我鞭聲如鼓鼙我鞭不妄發視其後者而鞭之澤中草木長草長病牛羊尋山跨坑谷騰趠筋骨强煙簑雨笠長林下老去而今空見畫世間馬耳射東風悔不長作多牛翁圎覺經雲駛月運舟行岸移唐李宻傳以蒲韉乗牛挂漢書一帙角上行且讀神仙傳王方平牽蔡經鞭之曰吾鞭亦不可妄得也莊子逹生篇善養生者若牧羊視其後者而鞭之杜子美詩老去人間空見畫李白寒食獨酌詩世人聞此皆掉頭有如東風射馬耳吕與叔學士挽詞吕與叔名大臨京兆藍田人博學無所不通尤深於春秋二禮毎欲掇拾三代遺文舊制令今可行不為空言以拂世駭俗元祐間從官薦其行義修飭文詞爾雅除太學博士遷祕書省正字范内翰淳甫乞以備勸講未及用而卒兄大忠字進伯終寶文閣直學士大防字㣲仲為左僕射兄弟平居相切磋論道考禮制度冠婚喪祭一本於古關中言禮學者推吕氏言中謀猷行中經闗西人物數清英欲過叔度留終日未識魯山空此生論議凋零三益友功名分付二難兄老來尚有憂時歎此涕無從何處傾後漢黄憲傳字叔度荀淑遇憲於逆旅與語移日不能去世説郭林宗至汝南造袁奉高車不停軌鑾不輟軛詣黄叔度乃彌日信宿唐元徳秀傳字紫芝蘇源明嘗語人曰吾不幸生此衰俗所不恥者識元紫芝也嘗為魯山令天下高其行謂之元魯山再見世説陳元方子長文季方子孝光各論其父功徳爭之不决白於太丘太丘曰元方難為兄季方難為弟禮記孔子遇舊館人之䘮入而哭之遇一哀而出涕子貢曰無乃巳重乎子曰予惡夫涕之無從也丹元子示詩飄飄然有謫仙風氣吳傳正繼作復次其韻飛仙亦偶然脱命瞬息中惟詩不可擬如寫天日容夢中哦七言玉丹已入懐一語遭綽虐失身墮蓬萊蓬萊至今空䕶短不養才上界足官府謫仙應退休可憐吳與蘇骯髒雪滿頭雪滿頭終當卻與丹元子笑指東海乘桴浮楞嚴經衆生堅固草木而不休息藥道圓成名飛行仙韓退之記夢詩壯非少者哦七言六字常語一字難我以指撮白玉丹行且咀嚼行詰盤口前截斷第二句綽虐顧我顔不歡乃知仙人未賢聖䕶短憑愚邀我敬次韻王定國書丹元子寜極齋仙人與吾軰寓迹同一塵何曾五漿餽但有爭席人寜極無常居此齋自隨身人􅃚識郗鑒天不留封倫誤落世網中俗物愁我神先生忽扣户夜呼祁孔賓便欲隨子去著書未絶麟願挂神虎一作武冠往卜飲馬鄰王郎濯紈綺意與陋巷親南游苦不蚤儻及蓴鱸新莊子列禦宼吾嘗食於十漿而五漿先饋寓言篇其往也舍者避席煬者避竈其反也舍者與之爭席矣繕性篇不當時命而大窮乎天下則深根寜極而待此存身之道也唐紀聞譚武威叚䂮天寶五載過魏郡逆旅有客市藥䂮知是道者即市醪薦之自言吾姓孟名期思居在恒山䂮祈至山中遂約入山居五日孟先生曰今日盍謁老先生於是啟西室老先生據牀䂮謁拜焉䂮在山四年見老先生岀户不過五六度但端坐正心禪觀不食毎出禪時即飲少藥汁䂮問孟叟老先生為誰叟取晉書郗鑒傳吟讀之曰欲識先生即鑒也杜牧之題魏文貞詩可憐貞觀太平後天且不留封徳彛封倫字徳彝再見晉祁嘉字孔賔事詳十八巻石芝詩注左傳哀十四年春西狩獲麟杜預曰仲尼傷周道之不興感嘉瑞之無應故因魯春秋而脩中興之教絶筆於獲麟之一句所感而作故所以為終也挂冠陶𢎞景事屢見神虎門避唐諱改神武王仲至侍郎見惠穉栝種之禮曹北垣下今百餘日矣蔚然有生意喜而作詩翠栝東南美近生神嶽隂惜哉不可致霜根絡雲岑仙風振高標香實隕平林偶隨樗櫟生不為樵牧侵忽驚黄茅嶺稍出青玉鍼好事雖力取王城少知音豈無換鵝手但知覓來禽高懷獨夫子一見捐橐金得之喜不寐贈我意殊深公堂開後閤凡木媿華簪栽培一寸根寄子百年心常思樊籠中摧我鸞鶴衿誰知積雨後寒芒曉森森恨我廹歸老不見汝十尋蒼皮䕶玉骨旦莫視古今何人風雨夜卧聽饑龍吟換鵞來禽用王羲之事屢見莊子千歲而一遇大聖是猶旦莫遇之也施註蘇詩巻三十三
