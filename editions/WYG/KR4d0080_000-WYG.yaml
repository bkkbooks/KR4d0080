body:
  text: 施注蘇詩别集類二宋提要臣等謹按蘇詩四十二巻宋施元之注附東坡年譜一巻王注正譌一巻補遺二巻則邵長蘅等續編也元之字徳初吳興人陸游作是書序伹稱其官曰司諌其始末則無考矣其同注者為呉郡顧禧游序所謂助以顧君景繁之賅洽也元之子宿又為補綴書録解題所謂其子宿從而推廣且為年譜以傳於世也呉興掌故但言宿推廣為年譜不言補注與書録解題不同今考書中實有宿注則吳興掌故漏矣嘉泰中宿官餘姚嘗以是書刋板竟縁是遭論罷故傳本頗稀世所行者惟王十朋分類注本康熈已夘宋犖官江蘇巡撫始得殘本於蔵書家巳佚其巻一巻二巻五巻六巻八巻九巻二十三巻二十六巻三十五巻三十六巻三十九巻四十犖屬長洲邵長蘅補其闕巻長蘅撰王注正譌一巻又訂定王宗稷年譜一巻冠於集首其注則僅補八巻以病未能卒業更倩髙郵李必恒績成三十五巻三十六巻三十九巻四十巻犖又摭拾遺詩為施氏所未收者得四百餘首别屬錢塘馮景注之重為刋板乾隆初又詔内府刋為巾箱本取擕既便遂衣被彌宏元之原本註在各句之下長蘅病其間隔乃彚注於篇末又於原注多所刋削或失其舊後查慎行作蘇詩補注頗斥其非亦如長蘅之詆王注然數百年沉晦之笈實由犖與長蘅復見於世遂得以上邀乙夜之觀且剞􅩻棗梨夀諸不朽其功亦何可盡沒歟乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:eb1048b061de9d9fabd00a17e1256607974f1ac5ecf4eef3b82927e9e932b3cd
