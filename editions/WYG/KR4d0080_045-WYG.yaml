body:
  text: 施註蘇詩巻三十一宋蘇軾撰施元之原註武進邵長蘅刪補詩三十九首時守潁州作葉待制求先墳永慕亭詩葉待制名康直字景温建州人擢進士第知光化縣其政務便民以治績顯歴秦鳳陕西轉運饟涇原師知秦州夏人宼甘谷景温戒諸将設伏以待殱其二酋自直龍圖閣進待制陕西都轉運使請亳州召為兵部侍郎卒靈區有異産化國無潛珍承平百年間簪纓半齊民建谿富竒偉葉氏初隠淪森然見喬木其下維徳人佳哉鬱蔥蔥氣若鳳與麟聫翩出儒将豈惟十朱輪新松無鹿觸舊柏有烏馴待公歸上冢淚葉乃肎春漢賈誼傳襲九淵之神龍兮吻淵潛以自珍楊惲傳家方隆盛時乗朱輪者十人晉許孜傳二親沒孜宿墓所列植松栢時有鹿犯其松栽孜悲歎之明日鹿為猛獸所殺置於栽下自後樹木滋茂而無犯者唐褚無量傳廬母墓左鹿犯所植松柏無量號訴曰山林不乏忍犯吾塋樹耶自是羣鹿馴擾北史蕭放傳字希夷居喪廬前有二慈烏各集一樹為巢馴庭飲啄每到臨時舒翼悲鳴有似助哀也放與無量二事並互見廿一巻思成堂詩晉王裒傳廬父墓側常攀柏悲號涕淚著樹樹為之枯孟郊古薄命妾行青山有蘼蕪淚葉常不乾與趙陳同過歐陽叔弼新治小齋戯作江湖渺故國風雨傾舊廬東来三十年媿此一束書尺椽亦何有而我常客居羨君開此室容膝真有餘拊牀琴動摇㺯筆牕明虛後夜龍作雨天明雪填渠公自注時方禱雨龍祠作此句時星斗粲然四更風雨大至明日乃雪夢回聞剝啄誰乎一作呼趙陳予添丁走沽酒通徳起挽蔬主孟當啗我玉鱗金尾魚一醉忘其家此身自籧篨韓退之示兒詩始我来京師止攜一束書辛勤三十年以有此屋廬此屋豈為華於我自有餘通徳伶𤣥之妾樊通徳也巳見國語施優謂里克曰主孟啗我注云大夫之妻從夫稱主而孟則里克妻字也籧篨麤竹席已見先生詩話元祐六年十月二十六日禱雨張龍公會景貺履常二歐陽子作詩云夢回聞剥啄誰乎趙陳予景貺拊掌曰句法甚新前人未有此法季黙曰有之長官請客吏請客目曰主簿少府我即此語也聚星堂雪并引元祐六年十一月一日禱雨張龍公得小雪與客㑹飲聚星堂忽憶歐陽文忠公作守時雪中約客賦詩禁體物語於艱難中特出竒麗爾来四十餘年莫有繼者僕以老門生繼公後雖不足追配先生而賔客之美殆不減當時公之二子又適在郡故輒舉前令各賦一篇廬陵集載雪詩注云時在潁州作其序曰玉月棃梅綀絮白舞鵝鶴銀等字皆請勿用牕前暗響鳴枯葉龍公試手行初雪映空先集疑有無作態斜飛正愁絶衆賔起舞風竹亂老守先醉霜松折恨無翠袖㸃横斜祇有㣲燈照明滅歸来尚喜更鼓暗晨起不待鈴索掣未嫌長夜作衣稜郤怕初陽生眼纈欲浮大白追餘賞幸有回飈驚落屑糢糊檜頂獨多時歴亂瓦溝裁一瞥汝南先賢有故事醉翁詩話誰續説當時號令君聼取白戰不許持寸鐡歐陽叔弼見訪誦陶淵明事歎其絶識既去感槩不已而賦此詩淵明求縣令本縁食不足束帯向督郵小屈未為辱翻然賦歸去豈不念窮獨重以五斗米折腰營口腹云何元相國萬鍾不滿欲胡椒銖兩多安用八百斛以此殺其身何翅抵鵲玉徃者不可悔吾其反自燭唐元載傳為相聚斂無涯賜死後籍其家胡椒至八百石他物稱是鹽鐡論崑山之旁以玉抵烏鵲喜劉景文至天明小兒更平聲傳呼髯劉已到城南隅尺書真是髯手迹起坐熨眼知有無今人不作古人事今世有此古丈夫我聞其来喜欲舞病自能起不用扶江淮旱乆塵土惡朝来清雨濯鬢䰅相㸔握手兩無事千里一笑無乃迂平生所樂在吳㑹老死欲𦵏杭與蘇過江西来二百日冷落山水愁吳姝新堤舊井各無恙参寥六一豈念吾别後新詩巧摹寫袖中知有錢塘湖新堤謂所築蘇公堤舊井謂所治唐六井參寥六一二泉名先生有參寥泉銘又有六一泉銘皆杭州事禱雨張龍公既應劉景文有詩次韻張公晩為龍抑自龍中来伊昔風雲㑹咄嗟潭洞開精誠茍可貫賔主真相陪洞簫振羽舞白酒浮雲罍言從闗州妃逺去焦氏臺傾倒缾中雨一洗麥上埃破旱不論功乘雲卻空回嗟龍與我輩用意豈逺哉使君今子義英風冠東莱笑説龍為友幽明莫相猜歐陽公集古䟦尾張龍公碑唐趙耕撰有云公常釣於焦氏臺之隂夫人闗州石氏又詳本巻次韻陳履常張公龍潭詩注見後漢書洞簫注云簫之無底者周禮凡舞有帔舞有羽舞又再獻用兩山尊皆有罍鄭氏注山罍刻畫為山雲之形三國志吳太史慈字子義東莱黄人也最有膽烈劉景文家藏樂天身心問答三首戲書一絶其後淵明形神自我樂天身心相物而今月下三人他日當成幾佛陶淵明有形贈影影答形神釋三首序云貴賤賢愚莫不營營以惜生斯甚惑焉故極陳形影之苦言神辨自然以釋之好事君子共取其心焉白樂天有心問身身報心心重答身三絶句題云閑臥獨吟無人酬和聊假身心相戲復焉南史孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應湏慧業文人生天在靈運前成佛當在靈運後再見西湖戲作王注杭潁皆有西湖先生連守二州其到潁有謝執政啟云入參兩禁用玷北扉之榮出典二邦輒為西湖之長一士千金未易償我從陳趙兩歐陽舉鞭拍手笑山簡祇有并州一葛强晋山簡傳兒童歌之曰舉鞭向葛彊何如并州兒彊家在并州簡愛将也又互見前送歐陽季黙赴闕先生豈止一懐祖郎君不減王文度膝上幾日今白湏令我眼中見此父汝南相從三晦朔君去苦早我来暮霜風凄𦂳正脱木潁水清淺可立鷺莫辭白酒瀉香泉已覺扁舟掠新渡坐看士衡執别手更遣夢得出竒句郎君可是筦庫人乃使騄驥隨蹇歩置之行矣無足道賢愚豈在遇不遇晋王述傳字懐祖愛其子坦之雖長大猶抱膝上王坦之傳字文度時人語曰江東獨歩王文度王羲之常謂諸子曰吾不減懐祖而位遇懸邈當由汝等不及坦之故耶並再見晋陸機字士衡弟字士龍唐劉禹錫字夢得按時季黙兄叔弼及劉景文在潁故有坐㸔士衡之句禮記趙文子之於晋國舉管庫者七十餘家杜子美錦樹行天驥跛足随羸牛用前韻作雪詩留景文萬松嶺上黄千葉載酒年年踏松雪劉郎去後誰復来花下有人心斷絶東齋夜坐搜雪句兩手龜拆霜湏折無情豈亦畏嘲弄穿簾入户吹燈滅紛紛兒女争所似碧海長鯨君未掣朝来雲漢接天流顧我小詩如㸃纈歐陽趙陳在戸外急掃中庭鋪木屑交遊雖似雪柏堅聚散行作風花瞥晴光融作一尺泥歸有何事真無説泥乾路稳放君去莫倚馬蹏如踣鐡荘子不龜手注其藥能令手不龜拆已見白樂天與元九書梁陳閒率不過嘲風雪弄花草而已杜子美詩未掣鯨魚碧海中晋陶侃傳鎮武昌時造船木屑及竹頭悉令舉掌之咸不觧後正㑹積雪始晴聼事前餘雪猶濕於是以屑布地杜子美驄馬行腕促蹏髙如踣鐡交河幾蹴層冰裂和劉景文見贈元龍本志陋曹吳豪氣峥嶸老不除失路今為噲等伍作詩猶似建安初西来為我風黧面獨臥無人雪縞廬留子非為十日飲要令安世誦亡書三國志元龍湖海之士豪氣不除詳巳見前漢韓信傳嘗過樊噲噲曰大王乃􅈕臨臣信出笑曰生乃與噲等為伍建安後漢末年號魏文帝典論曰今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒徳璉東平劉楨公幹此七子皆在建安時也韓退之薦士詩五言出漢時蘇李首更號東都漸瀰漫𣲖别百川導建安能者七卓犖變風操列子黄帝篇商丘開年老力弱面目黧黒史記范雎傳秦昭王遺平原君書曰君幸過寡人願與君為十日之飲漢張安世傳上行幸河東亡書三箧詔問莫能知惟安世識之具述其事後購求得書以相校無所遺失和劉景文雪占雨又得雪龜寕欺我哉似知吾輩喜故及醉中来童子愁冰硯佳人苦膠去聲杯那堪李常侍入蔡夜銜枚左傳昭二十五年臧昭伯如晋臧㑹竊其寳龜僂句以卜僭吉曰僂句不吾欺也杜預注僂句龜所出地名王注膠字去聲與白樂天一碟膠牙餳之膠同膠杯雖出荘子置杯焉則膠而此所謂膠杯乃是酒凍也唐李愬傳討吳元濟夜半冐雪入駐元濟外宅周禮大司馬篇銜枚而進注枚如箸銜之軍法以止語次前韻送劉景文白雲在天不可呼明月豈肯留庭隅怪君西行八百里清坐十日一事無路人不識呼尚書但見凛凛雄千夫公自注君一馬兩僕率然相訪逆旅多呼尚書意謂君都頭也豈知入骨愛詩酒醉倒正欲蛾眉扶一篇向人寫肝肺四海知我霜鬢須公自注君前有詩見寄云四海共知霜鬢滿重陽曽挿菊花無歐陽趙陳皆我有豈謂夫子駕復迂邇来又見三黜柳共此暖熱餐氊蘇酒肴酸薄紅粉暗祇有潁水清而姝一朝寂寞風雨散對影誰念月與吾公自注郡中日與歐陽叔弼趙景貺陳履常相從而景文復至不數日栁戒之亦見過賔客之盛頃所未有然又數日叔弼景文戒之皆去矣何時歸帆泝江水春酒一變甘棠湖公自注景文近卜居九江近甘棠湖仙傳拾遺穆王觴西王母於瑶池上王母謡曰白雲在天山陵月出道里悠逺山川間之唐袁滋傳與之接者皆目謂可見肺肝白樂天對酒詩頼有酒仙相暖熱餐氊用漢蘇武事庾信出横門詩明朝風雨散何處更相尋以屏山贈歐陽叔弼漫郎天骨清生與世俗異學道新有得為貧聊復仕每於紅塵中嘗起青霞志屏山輟贈子莫遣汚簪珥寓目紫翠閒安眠本非睡夢中化為鶴飛入長松寺漫郎用元結傳語屢見江文通恨賦欎青霞之竒意杜牧之詩千峯横紫翠遺教經睡蛇既出乃可安眠新渡寺席上次趙景貺陳履常韻送歐陽叔弼比来諸君唱和叔弼但袖手旁睨而已臨别忽出一篇頗有淵明風致坐皆驚歎神屠不目全妙額惟糚半更刀乃族庖倚市必醜悍平生魏公籌忽斲郢人墁詩書亦何用適道湏此館多言雖數窮㣲中或排難子詩如清風翏翏六收反發将旦胡為乆閉匿綺語真自患許時笑我癡隔屋相詠歎竟識彦道不絶叫呼百萬清朝固多士人門子皆冠莫言清潁水從此隔河漢異時我獨来得魚楊柳貫持歸不忍食尺素觧凄斷中有清圎句銅丸飛柘彈春愁結凌澌正待一笑泮百篇儻寄我呻吟鄭人緩荘子飬生主庖丁謂文恵君曰始臣觧牛之時所見無非牛者三年之後未嘗見全牛也又良庖嵗更刀割也族庖月更刀折也孫綽天台賦投刃皆盧目牛無全後漢馬廖上疏長樂宫云長安語曰城中好廣眉四方且半額城中好大袖四方全疋帛見馬援傳南史梁元帝徐妃以帝眇一目每知帝将至必為半面糚以俟晋魏舒傳為鍾毓長史毓與参佐射舒嘗為畫籌而已後遇朋人不足以舒滿數舒發無不中毓謝而嘆曰吾之不足以盡卿材有如此射豈一事哉莊子徐無鬼郢人堊漫其鼻端若蠅翼使匠石斲之注再見史記滑稽傳談言㣲中亦可以觧紛魯仲連傳為人排患釋難陳後主詩見面無多事聞名爾許時晋顧愷之傳與謝瞻連省夜於月下長詠瞻每遥贊之愷之彌自力瞻将眠令人代已愷之不覺有異俗傳愷之癡絶晋袁躭傳字彦道就局十萬一擲直上百萬投馬絶叫曰竟識袁彦道不詳見六巻㑹客有美堂詩注南史蔡凝傳上謂凝曰我欲用義興主壻錢肅為黄門郎卿意如何凝曰黄散之職故湏人門兼美惟陛下察之唐史李揆傳肅宗謂揆曰卿門地人物文學皆當世第一石鼓文其魚維何維鱮維鯉何以貫之維楊與栁西京雜記長安五陵人以柘木為彈真珠為丸以彈烏鵲南史王筠傳好詩圓美流轉如彈丸再見莊子列禦㓂鄭人緩也呻吟裘氏之地祗三年而緩為儒次韻趙景貺春思且懐吳越山水嵗華来無窮老眼乆矣静春風如繫馬未動意先騁西湖忽破碎鳥落魚動鏡縈城理枯瀆放閘起膠艇願君營此樂官事何時竟公自注清河西湖三閘督君成之思吳信偶然出處付前定飄然不繫舟乗此無盡興醉翁行樂處草木皆可敬明朝游北渚急掃黄葉徑白酒真到齊紅帬已放鄭公自注酒尚有香泉一壺為樂全先生服不作樂也莊子列禦㓂汎若不繫之舟虛而遨遊者也到齊用世説青州從事語青州有齊郡從事為到齊下也注再見次韻陳履常張公龍潭先生以十月二十五日禱兩迎龍公祝辭云謹請州學教授陳師道并遣男右承務郎迨既禱而獲十一月十日祝辭云玉質金相其重千鈞惠然肯来負者四人眷此行宫為留浹辰惟師道迨復餞公還履常為教授屬以送迎龍公蛻骨故詩云念子無吏責十日勤征鞍云云經明宣城宰家此百尺瀾鄭翁不量力敢以非意干𤣥黄雜兩戰絳青表雙蟠烈氣斃强敵仁心惻饑寒精誠禱必赴茍簡求亦難蕭條麥麰枯浩蕩日月寛念子無吏責十日勤征鞍春蔬得雨雪少助先生槃龍不憚徃来而我獨宴安閉閤黙自責神交清夜䦨唐趙耕撰張龍公廟碑公諱路斯隋末明經登第為宣城令罷歸每夕出自戌至丑歸常體冷且濕夫人石氏異而詢之公曰吾龍也蓼人鄭祥亦龍也據吾池吾屢戰未勝明日取决可令九子挟弓矢射之繫鬛以青綃者鄭也絳綃者吾也子遂射中青綃鄭怒東北去投合肥西山以死公是夕與九子俱復為龍漢韓延夀傳守左馮翊髙陵民有兄弟訟田延夀傷之閉閤思過後漢呉祐傳為酒泉太守民有争訟輒閉閤自責然後斷其訟小飲西湖懐歐陽叔弼兄弟贈趙景貺陳履常集本作竹閒亭小酌公真跡刻于婺倅聼事作小飲西湖懐歐陽叔弼兄弟贈趙徳麟陳履常盖是後来所書景貺已改字徳麟也嵗暮自急景我閑方緩觴歡一作醉飲西湖晩歩轉北渚長地坐略少長意行無㵎岡乆知薺麥青稍喜榆栁黄盎盎春欲動瀲瀲夜未央水天鷗鷺静月霧松檜香撫景方晼晩懐人重凄凉豈無一老兵坐念兩歐陽我意正麋鹿君才亦圭璋此㑹不可再一作恐難乆此歡不可忘宋玉九辯白日晼晚其将入兮晋謝奕傳桓温辟奕司馬嘗逼温酒温走避之奕遂引温一兵帥共飲曰失一老兵得一老兵亦何所怪蠟梅一首贈趙景貺天工㸃酥作梅花此有蠟梅禪老家蜜蜂採花作黄蠟取蠟為花亦其物天工變化誰得知我亦兒嬉作小詩君不見萬松嶺上黄千葉玉蘂檀心兩竒絶醉中不覺渡千山夜聞梅香失醉眠歸来卻夢尋花去夢裏花仙覓竒句此閒風物屬詩人我老不飲當付君君行適吳我適越笑指西湖作衣鉢送王竦朝散赴闕我家衡山公公自注伯父為衡山日與君相知有送行詩清而畏人知臧否不出口黙識如蓍龜擢子拱把中云有驥騄姿胡為三十載尚作窮苦詞丈人不妄語未效此何疑朅来清潁上淚濕中郎詩怪我一年長而作十年衰同時幾人在豈敢怨白髭願言指松栢永與霜雪期白樂天上翟中丞詩行為時領袖言作世蓍龜荀子驊騮騏驥纖離騄耳古之良馬也南史何逺傳言不虛妄每語人云卿能得我一妄語則謝一縑衆共伺之不能得也中郎言伯父也晋書謝道韞傳云一門叔父則有阿大中郎次韻致政張朝奉仍招晚飲掃白非黄精輕身豈胡麻怪君仁而夀未覺生有涯曽經丹化米親授棗如瓜雲蒸作霧楷火滅噀雨巴自此養鉛鼎無窮走河車至今許玉斧猶事萼緑華公自注君曽見永州何仙姑得藥餌之人疑其以此夀也故有丹化米萼緑華之句皆女仙事我本三生人疇昔一念差前生或草聖習氣餘驚蛇儒􅋯謝赤松佛縳慚丹霞時時一篇出擾擾四座譁清詩得可驚信美詞多夸回車入官府治具隨貧家萍虀與豆粥亦可成咄嗟博物志天老謂黄帝曰太陽之草名黄精食之可以長生太隂之草名鉤吻食之入口即死杜子美丈人山詩掃除白髪黄精在君看他年冰雪容續齊諧記漢明帝時劉晨阮肇同入天台採藥乏食見澗中流一杯胡麻飯云云本草胡麻乆服輕身不老神仙傳王方平與麻姑過蔡經家經弟婦新産姑索少許米擲之墮地即成丹砂封禪書李少君言上曰嘗見安期生食巨棗大如𤓰後漢張楷性好道術能作五里霧又欒巴為尚書正旦大㑹巴取酒西南噀之云成都市失火因酒為雨以滅之詔以驛書問成都答言時有雨從東北来火乃息雨皆酒氣仙傳拾遺劉無名有真人示以陽爐隂鼎柔金煉化水玉之方伏汞煉鉛成汞髓之訣以鉛為君以汞為臣八石為使黄牙為田修真祕訣隂真君金液丹歌云北方正氣為河車隂符經注云河車伏汞也真誥許翽小名玉斧萼緑華者南山女子顔色絶整以晋昇平三年降羊權家韋續書訣墨藪鍾繇弟子朱翼每畫一波三折筆作一戈如百鈞弩作一㸃如髙峯墜石作一放縱如驚蛇入草法書苑釋亞栖善草書每自題云飛鳥出林驚蛇入草維摩經貪著禪味是菩薩縳傳燈録丹霞禪師遇天大寒取木佛焚之詳見卄六巻次韻答張天覺詩注杜子美詩語不驚人死不休皇甫湜顧著作文集序逸歌長句往往若穿天心出月脅意外驚人語非尋常所能及晋石崇傳為客作豆粥咄嗟而辦每冬得韭萍虀王愷密問其帳下云豆至難熟豫作熟末客来但作白粥投之韭萍虀是𢷬韭根雜以麥苗耳閻立本職貢圖譚賔録貞觀三年東蠻謝元深入朝中書侍郎顔師古奏言昔周武王治致太平逺國歸欵乃集其事為王㑹篇可圖寫貽後以彰服逺之徳從之乃命尚書閻立本畵之為職貢圖正觀之徳表一作来萬邦浩如滄海吞河江音容傖獰服竒厖横絶嶺海逾濤瀧珍禽瑰産争牽扛名王觧辮郤蓋幢粉本遺墨開明牕我喟而作心未降魏徴封倫恨不雙唐太宗紀即位明年正月改元貞觀劉禹錫竹枝詞激訐如吳聲傖獰不可分左傳閔二年晉候使太子申生伐臯落氏衣之厖服杜預曰厖雜色也漢終軍傳殆将有觧辮髪削左袵襲冠帶要衣裳而䝉化者焉唐畫斷閻立徳剏職貢圖異方人物詭怪之状弟立本畫國王粉本昔南北兩朝名手不是過也又云職貢鹵簿圗立本與立徳同製之唐魏徴傳帝嘗歎曰今大亂之後其難治乎徴曰大亂之易治譬饑人之易食也封徳彛曰不然秦任法律漢雜霸道徴書生好虛論徒亂國家不可聼帝納徴言不疑至是天下大治蠻夷君長襲衣冠帯刀宿衛東薄海南踰嶺户闔不閉行旅不齎糧取給於道帝曰行仁義既效矣惜不令封徳彛見之封徳彛名倫次韻王滁州見寄斯人何似似春雨歌舞農夫怨行路君看永叔與元之坎軻一生遭口語兩翁當年鬢未絲玉堂揮翰手如飛教得滁人觧吟詠至今里巷嘲輕肥君家聫翩盡卿相獨来坐歗谿山上笑捐浮利一雞肋多取清名幾熊掌丈夫自重貴難售兩翁今與青山乆後来太守更風流要伴前人作詩瘦我倦承明苦求出到處遺蹤尋六一憑君試與問琅邪許我来游莫難色歐陽永叔與王元之俱嘗守滁州漢江都易王傳口語藉藉楊惲傳横被口語杜子美寄裴十詩知君苦思縁詩瘦李白嘲杜子美詩為問因何太瘦生只為從前作詩苦漢嚴助傳詔曰君厭承明之廬勞侍從之事懐故土出為郡吏歐陽公醉翁亭記環滁皆山也其西南諸峯林壑尤美望之蔚然而深秀者琅邪也公自號六一居士趙景貺以詩求東齋榜銘昨日聞都下寄酒来戲和其韻分一壺作潤筆也王孫天麒麟眸子奥而澈嚢空學愈富屋陋人更傑我老書益放筆落座争掣欲求東齋銘要飲西湖雪長缾分未到小硯乾欲裂不似淳于髠一石要燭滅晋王獻之傳七八嵗時學書羲之密從後掣其筆不得歎曰此兒後當有大名北史鄭譯傳復爵沛國公位上柱國帝令李徳林立作詔書髙熲戲譯曰筆乾答曰出為方岳杖策言歸不得一錢何以潤筆淳于髠事屢見洞庭春色并引静安定郡王名世凖字君平時以保軍留後為安定郡王趙徳麟舊字景貺先生著字説為字徳麟徳麟字見於詩者自此篇始安定郡王以黄甘釀酒謂之洞庭春色色香味三絶以餉其猶子徳麟徳麟以飲予為作此詩醉後信筆頗有沓拖風氣法帖評書王子敬書如河洛少年雖自充悦而舉體沓拖殊不可耐二年洞庭秋香霧長噀手今年洞庭春玉色疑非酒賢王文字飲醉筆龍蛇走既醉念君醒遠餉為我夀缾開香浮座盞凸光照牖方傾安仁醽莫遣公逺齅公自注明皇食柑凡千餘枚皆闕一瓣問進柑使者云中途嘗有道士齅之盖羅公遠也要當立名字未用問升斗應呼釣詩鉤亦號掃愁帚君知蒲桃惡正是嫫母黝湏君灔海杯澆我談天口潘安仁笙賦披黄苞以授甘傾縹瓷以酌醽歐陽公牡丹圗詩洛人矜誇立名字李後主中酒詩莫言滋味惡一篲掃寒愁漢西域傳大宛以蒲萄釀酒列女傳帝妃嫫母於四妃之班居下貎甚醜而最賢史記鄒衍之術迂大而閎辨齊人頌曰談天衍送路都曹并序乖崖公范蜀公東齋記張詠自蜀代去留一巻實封文字與僧正希白且云十年後開後十年公薨於陳訃至僧發開所留文字乃公畫像自贊曰乖則違衆崖不利物乖崖之名聊以表徳因號乖崖在蜀有録曹参軍老病廢事公責之曰胡不歸明日参軍求去且以詩留别其略曰秋光都似宦情薄山色不如歸意濃公驚謝之曰吾過矣同僚有詩人而吾不知因畱而慰薦之予幼時聞父老言恨不問其姓名今都曹路公以小疾求致仕予誦此語留之不可乃採前人意作詩送之并邀趙徳麟陳履常同賦一篇積雪困桃李春心誰為容淮光釀山色先作歸意濃我亦倦游者君恩繫疎慵欲留耿介士伴我衰遲蹤吏課升斗積﨑嶇等鉛舂那将露電身坐待收千鍾結髪空百戰市人看先封誰能搔白首抱闗望夕烽子意亮已成我言寕復從恨無乖崖老一洗芥蔕胸我田荆谿上伏臘亦麤供懐哉江南路㑹作林下逢漢江都易王傳宮人有過或髠鉗以鉛杵舂不中程輒掠漢李廣傳結髪與匈奴大小七十餘戰嘗語王朔曰自漢擊匈奴廣未嘗不在其中而諸部校尉巳下材能不及中以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑荆谿在常州宜興縣先生嘗買田於此次韻陳履常汝隂乆雪人饑公召僉書判官趙徳麟令畤議所以賑䘏之乃發義倉榖以濟貧乏出作院炭酒務薪用元價以售又奏放積欠教授陳履常師道有詩公和之可憐擾擾雪中人饑飽終同寓一塵老檜作花真强項凍鳶儲肉巧謀身忍寒吟詠君堪笑得暖讙呼我未貧坐聼屐聲知有路擁裘來看玉梅春後漢董宣傳為洛陽令殺湖陽公主蒼頭主訴於帝帝使宣謝主宣不從彊使頓之両手據地終不􅈕謝帝笑敕强項令出二鮮于君以詩文見寄作詩為謝二鮮于君乃諫議大夫子駿之子子駿事見十四巻和鄆州新堂月夜詩注我懐元祐初圭璋滿清班維時南隆老奉使獨未還迂叟向我言青齊嵗方艱斯人乃徳星遣出虗危間公自注温公謂余曰子駿福星也京東人困甚且令往彼召用既晚矣天命良復慳一朝失老驥寂寞空帝閑至今清夜夢枕衾有餘潸喜聞二三子結髪師閔顔髙論邈河漢清詩鳴珮環遙知三日雪積玉埋崧山誰念此幽桂坐䝉榛與菅故人在潁尾投詩清泠灣南隆閬中也鮮于子駿閬中人司馬温公自號迂叟漢天文志景星徳星也地理志齊地虛危之分野莊子吾驚怖其言若河漢而無極也左傳杜預注潁水之尾在下蔡又詳本巻新渡寺詩注莊子譲王篇北人無澤自投於清泠之淵次韻趙徳麟雪中惜梅且餉柑酒三首千花未分出梅餘遣雪摧殘計已疎卧聞㸃滴如秋雨知是東風為掃除閬苑千葩映玉宸人間只有此花新飛霙要欲先桃李散作千林火廹春火廹字出唐書源休𨗳朱泚僭號姚令言勸泚圍奉天二人争自比蕭何休顧令言曰成秦之業無輩我者我視蕭何子當曹參可矣即收圗籍貯府庫效何者人皆笑謂為火廹酇侯蹀􅉜嬌黄不受鞿東風暗與色香歸偶逢白墮争春手遣入王孫玉斚飛竇子野酒譜河東人劉白墮善釀酒味香美使人乆醉朝士千里相饋號鶴觴亦名騎驢酒永熙中青州刺史毛鴻賔齎酒之蕃路逢刧盗飲之即醉皆被擒時為之語曰不畏張弓㧞刀惟畏白墮春醪洛陽伽藍記亦云和陳傳道雪中觀燈陳傳道名師仲履常之兄家居彭城履常在潁傳道來訪未幾先生移守維揚而傳道亦歸遂和趙徳麟韻送之詩載巻末傳道是時仕為筦庫新年樂事歎何曽閉閤燒香一病僧未忍便傾澆别酒且来同看照愁燈潁魚躍處新亭近湖雪消時畫舫升祇恐樽前無此客清詩還有士龍能閱世堂詩贈任仲㣲任仲微父任師中名伋按秦少游作任師中墓表元豐中公知瀘州録使者不法事而使者即誣奏公西南乞第過江安時不時掩擊乃延儒生講書疑有私謁朝廷乃下章於他部各窮竟所考未具而公卒時當途者以公既沒為使者地公之子大防三詣闕上書陳寃状獄不敢變使者竟免大防即仲微也又按師中嘗為蔡州新息令惠給鰥寡邑人徳之遂居焉堂前有檜髙百尺盖數百年矣直榦蒼然乃以名其堂故詩云惟有庭前檜閲世不改色云云任公鎮西南嘗贈繞朝策當時若盡用善陣無赫赫凄凉十年後邪正乆已白卻留封徳彛天意眇難測象賢真驥種號訴甘百謫豈云報私仇禍福指絡胍髙才食舊徳但恐里門窄傷心千騎歸贈印黄壤隔惟有庭前檜閲世不改色千年與井在記此王粲宅左傳文十二年晉人患秦之用士㑹也謀歸之士㑹行繞朝贈之以策曰子無謂秦無人吾謀適不用也孫子善用兵者無赫赫之功又善陣者不戰善戰者不敗封徳彛事見本巻職貢圖詩注又杜牧題魏文貞詩可憐正觀太平後天且不留封徳彛蘅按封徳彛指當時使者象賢四語謂大防詣闕訟寃事也漢書于公治閭門曰少髙大令容駟馬髙蓋車注閭門里門也杜子美一室詩應同王粲宅留井峴山前新渡寺送任仲微春隂欲落雪野氣方升雲我遊清潁尾想見翠被君古来聚散地與子復言分倦游安税駕瘦田失歸耘獨宿古寺中荒雞亂鳴羣送子以曉角幽幽醒時聞左傳昭十二年椘子狩于州来次於潁尾使蕩侯潘子司馬督嚻尹午陵尹喜帥師圍徐以懼吳楚子次於乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出杜子美贊上人詩古来聚散地宿昔長荆棘史記李斯傳物極則衰吾未知所税駕也晉祖逖傳與劉琨同寝中夜聞荒雞鳴蹴琨覺曰此非惡聲也因起舞送運判朱朝奉入蜀建安本云送朱世昌使蜀藹藹青城雲娟娟蛾眉月隨我西北来照我光不滅我在塵土中白雲呼我歸我游江湖上眀月濕我衣岷峨天一方雲月在我側謂是山中人相望了不隔夢尋西南路黙數長短亭似聞嘉陵江跳破吹錦一作枕屏送君無一物清江飲君馬路穿慈竹林父老拜馬下不用驚走藏使者我友生聼訟如家人細説為汝評若逢山中友問我歸何日為話腰腳輕猶堪踏泉石唐地理志蜀州青城縣以青城山名十道四蕃志嘉州蛾眉山兩山相對如蛾眉故名韓非子六國時張敏與髙惠為友每相思敏於夢中往尋之至半道迷不知路而回嘉陵江其源出於大散闗嘉陵谷贊寕筍譜慈竹筍四時生其竹内實而節疎又蘄黄生一叢數竿根不外进茅亭客話慈竹聚生根不離母故名之慈也唐書陽城為道州刺史以家人法待吏宜罰者罰之宜賞者賞之病中夜讀朱博士詩病眼亂燈火細書數塵沙君詩如秋露浄我空中花古語多妙寄可識不可誇巧笑在頩頬哀音餘掺撾曽坑一掬春紫餅供千家懸知貴公子醉眼無真茶﨑嶇爛石上得此一寸芽緘封勿浪出湯老客未嘉圓覺經譬如病目見空中花及第二月後漢禰衡傳為漁陽掺撾擊鼓之法東谿試茶録佛嶺東南曰曽坑今屬北苑茶少甘而多苦色亦重濁陸羽茶經上者生爛石中者生櫟壌下者生黄土又湯經三沸為老趙徳麟餞飲湖上舟中對月老守惜春意主人留客情官餘閑日月湖上好清明新火發茶乳温風散粥餳酒䦨紅杏闇日落大堤平清夜除燈坐孤舟擘岸撑逮君幘未墮對此月猶横蔡邕月令自温風暑之在風者也玉燭寳典今人寒食日悉為大麥粥研杏仁為酪以餳沃之孫楚祭子推文云黍飯一盤醴酪二盂是其事也宗懍荆楚嵗時記亦云晋庾敳傳頽然已醉幘墮几上以頭就穿贈朱遜之并序元祐六年九月與朱遜之㑹議于潁或言洛人善接花嵗出新枝而菊品尤多遜之曰菊當以黄為正餘可鄙也昔叔向聞鬷蔑一言知其為人予於遜之亦云黄花候秋節遠自夏小正坤裳有正色鞠衣亦令名一從人偽勝遂與天力争易性寓非族改顔隨所令新竒既易售粹駮宜相傾疾惡逄伯厚識真似淵明君言我所印世論誰敢評願君為霜風一掃紫與赬月令季秋之月菊有黄花夏小正大戴禮篇名以蟲魚草木正十二月之節候起於夏后氏故曰夏小正周易坤六五黄裳元吉周禮内司服掌王后之六服禕衣揄狄闕狄鞠衣展衣縁衣素沙鄭注鞠衣黄衣也後漢陳蕃傳疾惡如風朱伯厚屢見陶淵明飲酒詩秋菊有佳色裛露掇其英維摩經佛所印可屢見和趙徳麟送陳傳道二陳既妙士兩歐惟徳人王孫乃龍種世有籋雲麟五君從我游傾寫出怪珍俗物敗人意兹得實清醇那知有聚散佳夢失欠伸我舟下清淮沙水吹玉塵君行踏曉月疎木挂寸銀尚寄别後詩翦刻淮南春莊子徳人者居無思行無慮漢賈誼鵩賦徳人無累知命不憂二陳言傳道履常兩歐言叔弼季黙也杜子美哀王孫詩髙帝子孫盡隆準龍種自與常人殊籋雲字出漢書天馬歌已見晋王戎傳戎與阮籍為竹林游戎嘗後至籍曰俗物已復来敗人意戎笑曰卿輩意亦復易敗耳清淮時先生将離潁赴揚州故云幽怪録橘中兩叟相謂曰汝輸我瀛洲玉塵九斛施註蘇詩巻三十一
