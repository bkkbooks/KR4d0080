body:
  text: 施註蘇詩續補遺總目巻上古體詩一百四十四首送淡公二首上韓持國送别琴枕黄州古風遊杭州山遊洞之日有亭吏乞詩既為留三絶句於洞之石壁眀日至峡州吏又至意若未足乃復以此授之和穆父新凉無題古意用定國韻贈二十姪震聞潮陽吴子野出家古離别送蘇伯固次韻魯直書伯時畫王摩詰雷州八首妒佳月追和沈遼頃贈南華詩雪林硯屏率魯直同賦申王畫馬圖奉和成伯大雨中㑹客觧嘲和公濟飲湖上贈僧周教授索枸杞因以詩贈録呈廣倅蕭大夫次韻董夷仲茶磨送公為遊淮南謝蘇自之恵酒戯和正甫一字韻池上二首贈仲素寺丞致仕歸隠潛山魯直以詩餽䨇井茶次韻為謝揚州以土物寄少游贈曇秀再過泗上二首贈李兕彦威秀才次韻謝子髙讀淵眀傳龎公食雉䨇鳧觀郭綸初發嘉州犍為王氏書樓過宜賓見夷中亂山夜泊牛口牛口見月舟中聽大人彈琴泊南牛口期任遵聖長官到晚不及見復来江上看山留題仙都觀屈原塔新灘新灘阻風昭君村黄牛廟蝦蟆培留題峡州甘泉寺寄題清溪寺荆門恵泉次韻答荆門張都官維見和恵泉詩浰陽早發夜行觀星漢水萬山隆中竹葉酒鯿魚望夫䑓永安宫八陣磧諸葛鹽井頴大夫廟許州西湖江上值雪效歐陽體限不以鹽玉鶴鷺絮蝶飛舞之類為比仍不使皓白潔素等字渚宫出峡神女廟巫山觀大水望朝陽巖作滄洲亭懐古柏家渡清逺舟中寄耘老書堂嶼戯詠子舟兩竹兩鸜鵒贈山谷子鰒魚行次韻水官詩弔徐徳占并序題李伯時淵眀東籬圗李白謫仙詩數日前夢一僧出二鏡求詩僧以鏡置日中其影甚異其一如芭蕉其一如蓮花夢中與作詩飲酒四首大雪獨留尉氏阮籍嘯䑓留别叔通元弼坦夫和寄天選長官昭陵六馬唐文皇戰馬也琢石象之立昭陵前客有持此石夲示予為賦之顔闔贈狄崇班季子題盧鴻學士堂圖寄周安孺茶余自城中還道中雲氣自山中来如羣馬奔突以手掇䦕籠收其中歸家雲盈籠開而放之作攓雲萹游山呈通判承議寫寄參寥師和郭功父韻送芝道人游隠静次韻魯直戯贈寄傲軒御史䑓榆槐竹柏四首問淵眀朱亥墓嚴顔碑峴山驪山和子由除日見寄夢雪送呂行甫司門倅河陽觀子玉郎中草聖竹枝歌并序轆轤歌辨道歌陳守道老人行襄陽樂府三萹野鷹来襄陽樂上堵吟仙都山鹿白鶴吟留鍾山覺海次韻張甥棠羙述志補和陶詩二首和東方有一士和劉柴桑巻下今體詩二百九十三首過巴東縣不泊聞頗有莱公遺迹白帝廟戎州和魯人孔周翰題詩二首獲鬼章二十韻光禄菴二首過木櫪觀觀開西湖次吴左丞韻荆州十首渝州寄王道祖過安樂山聞山上木葉有文如道士篆符云此山乃道陵所寓二首涪州得山胡巫山廟上下數十里有烏鳶無數取食於行舟之上舟人以神之故亦不敢害夷陵縣歐陽永叔至喜堂入峡題贈田辨之琴姬四十年前元夕與故人從遊得此句南康望湖亭半山亭宋復古畫瀟湘晚景圗三首海上道人傳以神守氣訣次周燾韻過海得子由書去嵗與子野游逍遥堂日欲􅃿因並西山叩羅浮道院至已二鼓矣遂宿於西堂今嵗索居儋耳子野復来相見作詩贈之元祐五年十二月十二日同景文義伯聖途次元伯固仲䝉游七寳寺題竹上泗州過倉中劉景文老兄戯贈一絶戯題巫山縣用杜子羙韻答鼂以道索書大老寺竹間閣子欵塞来享觀䑓吳江岸嘲子由無題扶風天和寺聞洮西㨗報三萼牡丹已未十月十五日獄中恭聞太皇太后不豫有赦作詩題李景元畫謝人恵雲巾方舄二首謝宋漢傑恵李承晏墨被命南遷塗中寄定武同僚李委吹笛并引書黄筌畫翎毛花蝶圗二首次韻王定國得晉卿酒相留夜飲偶於龍井辨才處得歙硯甚竒作小詩秋晚客興陳伯比和囘字復次韻廣陵後園題申公扇子山光寺囘次芝上人韻與道源遊西莊遇齊道人同徃草堂為齊書此寒食夜答子勉三首送楊奉禮别東武流杯走筆謝呂行甫恵子魚贈䖍州慈雲寺鑒老留别登州舉人過嶺寄子由二首歇白塔鋪西蜀楊耆二十年前見之甚貧今見之亦貧所異於昔者蒼顔華髪耳女無羙惡富者妍士無賢不肖貧者鄙使其逢時遇合豈減當世之士哉頃宿長安驛舎聞泣者甚怨問之乃昔富而今貧者乃作一詩今以贈楊君贈人觀湖二首寄髙令寄子由詩送交代仲達少卿次韻馬元賔第五橋次韻完夫再贈之什某已卜居毗陵與完夫有廬里之約云和林子中待制九日袁公濟有詩次其韻和吴安持使者迎駕鹿鳴宴次韻張甥棠美晝眠真興寺閣禱雨恵州近城數小山類蜀道春與進士許毅野歩㑹意處飲之且醉作詩以記適参寥専使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也送蜀僧去塵曽元恕遊龍山吕穆仲不至黄河壬寅重九不預㑹獨遊普門寺僧閣有懐子由小飲公瑾舟中和子由次王鞏韻如囊之句可為一噱儋耳答李端叔立春日病中邀安國仍請率禹功同来僕雖不能飲當請成伯主㑹某當杖䇿倚几於其間觀諸公醉笑以撥滯悶也二首和参寥見寄東園奉和陳賢良秋興三首夜直秘閣呈王敏甫次韻参寥寄少游謝曺子方恵新茶題潭州徐氏春暉亭贈仲勉子文講武䑓南有感題寳雞縣斯飛閣重遊終南子由以詩見寄次韻次韻和子由欲得驪山沉泥硯次韻子由彈琴再次前韻三首和人囘文五首移合浦郭功甫見寄送佛面杖與羅浮長老復官北歸再次前韻蜀僧眀操思歸龍邱子書壁武昌酌菩薩泉送王子立答海上翁占山亭二首題懐素草帖雨中明慶賞牡丹贈僧思誼子玉以詩見邀同刁丈遊金山次韻致逺次韻景文山堂聽筝三首成伯家宴造坐無由輙欲效顰而酒已盡入夜不欲煩擾戯作小詩求數酌而巳成伯席上贈所出妓川人楊姐又答氊帳往年宿𤓰歩夢中得小詩録示民師送范徳孺陸蓮菴僕年三十九在潤州道上遇除夜作此詩又二十年在恵州録之以付過夀陽岸下戯答王都尉傳柑萬州太守髙公宿約遊岑公洞而夜雨連明戯贈二小詩遊中峰盃泉憩寂圗送栁宜歸寒具参寥恵楊梅雨夜宿浄行院送恵州監押過黎君郊居贈王覯太夫人以无咎生日置酒書壁一絶余舊在錢塘伯固開西湖今方請越戯謂固可復来開鏡湖伯固有詩因次韻邵伯梵行寺山茶奉和成伯兼戯禹功病後醉中夢中絶句元翰少卿寵恵谷簾水一器龍團二枚仍以新詩為貺歎味不巳次韻奉和藏春塢三首謝都事恵米别公擇絶句書寄韻遊靈隠寺戯贈開軒李居士常州太平寺薝蔔亭過文覺顯公房恵州靈恵院壁間畫一仰面向天醉僧云是蜀僧隠蠻所作題詩於其下遊太平寺浄土院觀牡丹中有淡黄一朶特竒為作小詩此君軒觀子羙病中作嗟嘆不足因次韻謁敦詩先生因留一絶余将赴文登過廣陵而擇老移住石塔相送竹西亭下留詩為别絶句三首呈定國絶句二首破琴詩後送栁子玉至靈山次韻章子厚飛英留題贈江州景徳長老雜詩二首元祐癸酉八月二十七日於建隆章浄館書贈王覯聞㨗睡起秋思寄子由碣石菴戯贈湛菴主散郎亭侯灘春夜火星巖讀開元天寳遺事三首過泗上喜見張嘉父二首謝恵貓児頭笋題淨因堂同景文詠蓮塘睡起子羙召公擇飲偶以病不及往公擇有詩次韻和参寥醉題信老方丈常州太平寺觀牡丹竹枝詞寄歐叔弼題浄因院絶句和黄龍清老三首過土山寨書辨才白雲堂壁琴詩韓康公坐上侍児求書扇驪山絶句三首靈上訪道人不遇常山贈劉鎡游三游洞十一月三日與㡬先自竹西来訪慶老不見獨與君卿供奉蟾知客東閣道話乆之恵州追録醉睡者集歸去来詩十首余歸自道塲何山遇大風因憩耘老溪亭命官奴秉燭捧硯寫風竹一枝題詩云題雲龍草堂石磬和子由岐下詩并引北亭䨇池横池荷華短橋魚軒牕牡丹曲欄桃花李榴石杏樗梨槐棗松櫻桃檜栁縦筆附四言六言息壤詩并引顔樂亭詩并序新渠詩并序跋姜君弼課冊數日前夢人示余一巻文字大畧若諭馬者用吃蹶兩字夢中甚賞之覺而忘其餘戯作數語足之憶江南寄純如五首恵崇蘆雁何公橋詩補録施註蘇詩續補遺總目
