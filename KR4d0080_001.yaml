  text: 欽定四庫全書集部三
  hash: sha256:f07461303fab15c789ad7c1df69e91ba77e3a1645c0ea5d385f94292466f69db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0080_WYG_001-1a, image: WYG1110/WYG1110-0003a.png}
body:
  text: 施註蘇詩總目上别集類二宋巻一詩四十七首起嘉祐辛丑十二月赴鳳翔任盡壬寅在鳳翔作施註缺今補辛丑十一月十九日既與子由别於鄭州西門之外馬上賦詩一篇寄之和子由澠池懐舊次韻和劉京兆石林亭之作石本唐苑中物散流民間劉購得之壬寅二月有詔令郡吏分徃屬縣減決囚禁自十三日受命出府至寳雞虢郿盩厔四縣既畢事因朝謁太平宮而宿於南谿谿堂遂並南山而西至樓觀大秦寺延生觀仙游潭十九日乃歸作詩五百言以記凡所經歴者寄子由太白山下蚤行至横渠鎮書崇夀院壁留題延生觀後山上小堂留題仙㳺潭中興寺東有玉女洞洞南有馬融讀書石室過潭而南山石益竒潭上有橋畏其嶮不敢渡石鼻城磻溪石郿塢樓觀九月二十日微雪懐子由弟二首病中聞子由得告不赴商州三首病中大雪數日未甞起觀虢令趙薦以詩相屬戲用其韻答之嵗晚相與饋問為饋嵗酒食相邀呼為别嵗至除夜逹旦不眠為守嵗蜀之風俗如是余觀於岐下嵗暮思歸而不可得故為此三詩寄子由饋嵗守嵗别嵗和子由踏青和子由蠶市和子由苦寒見寄和子由論書記所見開元寺吳道子畫佛滅度以答子由和子由寒食和劉長安題薛周逸老亭周善飲酒未七十而致仕中隐堂詩并序鳳翔八觀并序石鼓歌唐楊詛椘文在天王維吳道子畫維摩象恵之塑柱寺東湖公墓秦穆真興寺閣李氏園和子由聞子瞻将如終南太平宮谿堂讀書将徃終南和子由見寄七月二十四日以久不雨出禱磻溪是日宿虢縣二十五日晚自虢縣渡渭宿於僧舎曽閣閣故曽氏所建也夜久不寐見壁有前縣令趙薦留名有懐其人二十六日五更起行至磻溪未明是日自磻溪徃陽平憩於麻田青峰寺之下院翠麓亭二十七日自陽平至斜谷宿於南山中蟠龍寺是日至下馬磧憩於北山僧舎有閣曰懐賢南直斜谷西臨五丈原諸葛孔明所從出師也巻二詩四十五首起在鳳翔至治平乙巳罷鳳翔任還京師作施註缺今補和子由記園中草木十一首周公廟廟在岐山西北七八里廟後百許歩有泉依山湧洌異常國史所謂潤徳泉世亂則竭者也南溪之南竹林中新構一茒堂予以其所處最為深䆳故名之避世堂自清平鎮游樓觀五郡大秦延生仙㳺徃返四日得十一詩寄舍弟子由同作樓觀五郡授經臺大秦寺仙㳺潭五首潭融石室馬南寺洞玉女北寺愛玉女洞中水既致兩缾恐後復取而為使者見紿因破竹為契使寺僧蔵其一以為徃来之信戯謂之調水符自仙游囘至黒水見居民姚氏山亭髙絶可愛復憩其上自樓觀至此得詩共十一首南溪有㑹景亭處衆亭之間無所見甚不稱其名予欲遷之少西臨斷岸西嚮可以逺望而力未暇特為製名曰招隐仍為詩以告来者庶幾遷之凌虚臺竹􅔺渼陂魚讀道蔵十二月十四日夜㣲雪明日蚤徃南溪小酌至晚九月中曾題二小詩於南溪竹上既而忘之昨日再㳺見而録之司竹監燒葦園因召都廵檢柴貽朂左蔵以其徒㑹獵園下和子由木山引水二首寄題興州鼂太守新開古東池華隂寄子由和董傳留别次韻栁子玉見寄送曽子固倅越得燕字王頤赴建州錢監求詩及草書秀州僧本瑩静照堂石蒼舒醉墨堂送安惇秀才失觧西歸送任伋通判黄州兼寄其兄孜巻三詩四十五首起熙寧已酉還京師至辛亥乞外除通判杭州赴任由陳潁過廣陵作和子由初到陳州見寄二首次韻子由緑筠堂送劉攽倅海陵送錢藻出守婺州得英字送呂希道知和州次韻王誨夜坐送文與可出守陵州送劉道原歸覲南康出都来陳所乗船上有題小詩八首不知何人有感於余心者聊為和之次韻張安道讀杜詩送張安道赴南都留臺傅堯俞濟源草堂陸龍圗詵挽詩胡完夫母周夫人挽詞次韻栁子玉過陳絶糧二首潁州初别子由二首歐陽少師令賦所蓄石屏陪歐陽公讌西湖十月二日将至渦口五里所遇風留宿出潁口初見淮山是日至夀州夀州李定少卿出餞城東龍潭上濠州七絶塗山臺逍遥彭祖廟觀魚臺虞姬墓浮山洞四望亭泗洲僧伽塔龜山發洪澤中塗遇大風復還十月十六日記所見廣陵㑹三同舎各以其字為韻仍邀同賦劉貢父劉莘老孫巨源巻四詩四十七首起自京口之錢塘以是年十一月扺任通守錢塘作㳺金山寺自金山放船至焦山甘露寺次韻子由栁湖感物送蔡冠卿知饒州次韻楊褒蚤春初到杭州寄子由二絶次韻栁子玉二首地爐紙帳臘日㳺孤山訪恵勤恵思二僧李杞寺丞見和前篇復用原韻答之再和游靈隐寺得来詩復用前韻戯子由越州張中舍夀樂堂姚屯田挽詞送岑著作吉祥寺賞牡丹吉祥寺僧求閣名和劉道原見寄和劉道原詠史和劉道原寄張師民送張職方吉甫赴閩漕六和寺中作雨中游天竺靈感觀音院和蔡凖郎中見邀游西湖三首和子由栁湖久涸忽有水開元寺山茶舊無花今嵗盛開二首六月二十七日望湖樓醉書五首七月一日出城舟中苦熱宿餘杭法喜寺後緑野堂望吳興諸山懐孫莘老學士宿臨安浄土寺自浄土歩至功臣寺游徑山自徑山囘得呂察推詩用其韻招之宿湖上宿望湖樓再和夜泛西湖五絶巻五詩六十九首起熙寜壬子以後通守錢塘作施注缺今補焦千之求恵山泉詩答任師中次韻沈諫議召游湖不赴明日得雙蓮於北山下作一絶持獻沈既見和又别作一首因用其韻和歐陽少師㑹老堂次韻和歐陽少師寄趙少師次韻監試呈諸試官望海樓晚景五絶試院煎茶孫莘老求墨妙亭詩李公擇求黄鶴樓詩因記舊所聞於馮當世者八月十日夜看月有懐子由并崔度賢良催試官考較戯作八月十七復登望海樓自和前篇是日牓出與試官兩人復留五首秋懐二首哭歐公孤山僧恵思示小詩次韻梵天寺見僧守詮小詩清逺可愛次韻和陳述古拒霜花和沈立之留别二首次韻孔文仲推官見贈湯村開運鹽河雨中督役是日宿水陸寺寄北山清順僧二首客位假寐鹽官部役戯呈同事兼寄述古朱夀昌郎中少不知母所在刺血寫經求之五十年去嵗得之蜀中以詩賀之将之湖州戯贈莘老鴉種麥行鹽官絶句四首南寺千佛閣塔前古檜北寺悟空禅師塔僧爽白雞送張軒民寺丞赴省試六和寺冲師閘山溪為水軒和致仕張郎中春晝冬至日獨游吉祥寺後十餘日復至戯贈和人求筆跡用將之湖州戲贈原韻寄莘老畫魚歌吳中田婦嘆和邵同年戯贈賈收秀才三首游道塲山何山贈孫莘老七絶莘老葺天慶觀小園有亭北向道士山宗說乞名與詩至秀州贈錢端公安道并寄其弟恵山老秀州報本禪院鄉僧文長老方丈王復秀才所居雙檜二首宋叔逹家聴琵琶巻六詩四十九首時通守錢塘作施註缺今補元日次韻張先子野見和七夕寄莘老之作正月九日有羙堂飲醉歸徑睡五鼓方醒不復能眠起閱文書得鮮于子駿所寄古意作雜興一首答之次韻答章傳道見贈法惠寺横翠閣祥符寺九曲觀燈上元過祥符僧可久房蕭然無燈火正月二十一日病後述古邀徃城外尋春有以官法酒見餉者因用前韻求述古為移厨飲湖上飲湖上初晴後雨二首徃富陽新城李節推先行三日留風水洞見待風水洞二首和節推獨游富陽普照寺自普照游二菴富陽妙庭觀董雙成故宅發地得丹鼎覆以銅盤承以琉璃盆盆既破碎丹亦為人争奪持去今獨盤鼎在耳二首新城道中二首山村五絶湖上夜歸寒食未明至湖上太守未来兩縣令先在次韻孫莘老見贈時莘老移廬州因以别之贈别次韻代留别月兎茶薄命佳人吉祥寺花将落而述古不至述古聞之明日即来坐上復用前韻同賦李鈐轄坐上分題戴花於潛令刁同年野翁亭於潛女自昌化雙谿館下歩尋谿源至治平寺二首於潛僧緑筠軒與臨安令宗人同年劇飲寳山晝睡僧清順新作垂雲亭五月十日與呂仲甫周邠僧恵勤恵思清順可久惟肅義詮同汎湖游北山㑹客有羙堂周邠長官與數僧同汎湖徃北山湖中聞堂上歌笑聲以詩見寄因和二首時周有服席上代人贈别三首唐道人言天目山上俯視雷雨每大雷電但聞雲中如嬰兒聲殊不聞雷震也巻七詩六十三首時通守錢塘作追和子由去嵗試舉人洛下所寄五首暴雨初晴樓上晚景過廣愛寺見三學演師觀楊恵之塑寳山朱瑶畫文殊普賢三首韓子華石淙荘立秋日禱雨宿靈隐寺同周徐二令病中獨游浄慈謁夲長老周長官以詩見寄仍邀遊靈隐因次韻答之病中遊祖塔院虎跑泉佛日山榮長老方丈五絶癸丑春分後雪孤山二詠并引柏堂竹閣與述古自有羙堂乘月夜歸有羙堂暴雨八月十五日觀潮五絶東陽水樂亭與周長官李秀才游徑山二君先以詩見寄次其韻二首臨安三絶将軍樹石鏡錦溪登玲瓏山宿九仙山陌上花三首并引逰東西巖宿海㑹寺海㑹寺清心堂徑山道中次韻答周長官兼贈蘇寺丞汪覃秀才久留山中以詩見寄次其韻再游徑山洞霄宫初自徑山歸述古召飲介亭以病先起明日重九亦以病不赴述古㑹再用前韻九日尋臻闍棃遂泛小舟至勤師院二首九日舟中望見有美堂上魯少卿飲以詩戯之二首游諸佛舎一日飲釅茶七盞戯書勤師壁九日湖上尋周李二君不見君亦見尋於湖上以詩見寄明日乃次其韻送杭州杜戚陳三掾罷官歸鄊次韻周長官夀星院同餞魯少卿次韻述古過周長官夜飲述古以詩見責屢不赴㑹復次前韻金門寺中見李西臺與二錢唱和四絶句戯用其韻䟦之胡穆秀才遺古銅器似鼎而小上有兩柱可以覆而不蹶以為鼎則不足疑其飲器也胡有詩答之巻八詩五十九首熙寜甲寅在錢塘聞移知密州之命去杭經常潤道中作施註缺今補賀陳述古弟章生子贈治易僧智周張子野年八十五尚聞買妾述古令作詩書雙竹湛師房二首寳山新開徑和述古冬日牡丹四首和錢安道寄恵建茶和栁子玉喜雪次韻仍呈述古弔天竺海月辯師三首李頎秀才善畫山以兩軸見寄仍有詩次韻答之雪後至臨平與栁子玉同至僧舍見陳尉烈夜至永樂文長老院文時卧病退院栁氏二外甥求筆跡二首錢安道席上令歌者道服除夜野宿常州城外二首元日過丹陽明日立春寄魯元翰古纒頭曲刁同年草堂恵山謁錢道人烹小龍團登絶頂望太湖錢道人有詩云直須認取主人翁作兩絶戯之和蘇州太守王䂓父侍太夫人觀燈之什余時以劉道原見訪滯留京口不及赴此㑹二首成都進士杜暹伯升出家名法通徃来吳中虎邱寺常潤道中有懐錢塘寄述古五首刁景純賞瑞香花憶先朝侍宴次韻同栁子玉游鶴林招隐醉歸呈景純景純見和復次韻贈之二首栁子玉亦見和因以送之兼寄其兄子璋道人子玉家宴用前韻見寄復答之景純復以二篇一言其亡兄與伯父同年之契一言今者唱酬之意仍次其韻金山寺與栁子玉飲大醉卧寳覺禅榻夜分方醒書其壁大風留金山兩日監洞霄宫俞康直郎中所居四詠退圃遯軒逸堂逺樓游鶴林招隐二首書普慈長老壁書焦山綸長老壁刁景純席上和謝生二首留别金山寳覺圎通二長老巻九詩六十五首起自常潤復還杭州尋去杭之密州任作施註缺今補無錫道中賦水車杭州牡丹開時僕猶在常潤周令作詩見寄次其韻復次一首送赴闕蘇州閭邱江君二家雨中飲酒二首次韻沈長官三首戯書吳江三賢畫像三首劉孝叔㑹虎邱時王䂓父齋素祈雨不至二首過永樂文長老已卒贈張刁二老去年秋偶㳺寳山上方入一小院闃然無人有一僧隐几低頭讀書與之語漠然不甚對問其鄰之僧曰此雲闍黎也不出十五年矣今年六月自常潤還復至其室則死𦵏數月矣作詩題其壁聼僧昭素琴僧恵勤初罷僧職游靈隐髙峰塔八月十七日天竺山送桂花贈元素捕蝗至浮雲嶺山行疲苦有懐子由弟二首青牛嶺髙絶處有小寺人迹罕到新城陳氏園次鼂補之韻梅聖俞詩中有毛長官者今於潛令國華也聖俞沒十五年而君猶為令捕蝗至其邑作詩戲之與毛令方尉㳺西菩提寺二首聴賢師琴贈寫真何充秀才囘先生過湖州東林沈氏飲醉以石榴皮書其家東老菴之壁云西鄰已富憂不足東老雖貧樂有餘白酒釀来因好客黄金散盡為收書西蜀和仲聞而次其韻三首東老沈氏之老自謂也湖人因以名之其子偕作詩有可觀者李行中醉眠亭三首潤州甘露寺彈筝單同年求徳興俞氏聚逺樓詩三首平山堂次王居卿祠部韻次韻陳海州書懐次韻陳海州乗槎亭次韻孫職方蒼梧山次韻孫巨源寄漣水李盛二著作并以見寄五絶王莽董卓虎兒除夜病中贈叚屯田喬太博見和復次韻答之二公再和亦再答之雪後書北臺壁二首謝人見和前篇二首鐵溝行贈喬太博出城送客不及歩至溪上二首蘇州姚氏三瑞堂莫笑銀杯小答喬太博送叚屯田分得于字和叚屯田荆林館巻十詩三十七首時守髙宻作贈上天竺辯才師㳺盧山次韻章傳道盧山五詠盧敖洞三泉飲酒臺障日峯聖燈巖次韻章傳道喜雨謝郡人田賀二生獻花惜花和頓教授見寄用除夜韻和子由四首韓太祝送㳺太山首夏官舍即事送春供備席上和李詩送李西齋小兒寄劉孝叔孔長源挽詩二首寄吕穆仲寺丞余主簿母挽詩送趙寺丞寄陳海州答陳述古二首張安道樂全堂張文裕挽詞懐西湖寄鼂羙叔同年和梅户曹㑹獵鐵溝祭常山囘小獵和章七出守湖州二首和張子野見寄三絶句過舊㳺憶竹閣見見題壁和蔣䕫寄茶答李邦直巻十一詩六十六首起守髙宻至得代歸京師作和文與可洋川園池三十首湖橋竹塢横湖荻浦書軒蓼嶼氷池樓望雲天漢臺吏隐亭待月臺霜筠亭二樂榭無言亭灙泉亭露香亭涵虚亭禊亭谿光亭菡蓞亭過谿亭荼䕷洞披錦亭篔簹谷寒蘆港南園野人廬北園此君菴香橙徑寄題刁景純蔵春塢玉盤㿻二首并引和潞公超然臺聞喬太博換左蔵知欽州以詩招飲喬将行烹鵝鹿出刀劍以飲客以詩戲之次韻劉貢父李公擇見寄二首寄黎眉州和趙郎中捕蝗見寄登常山絶頂廣麗亭薄薄酒二首并引同年王中甫挽詞七月五日二首趙郎中見和戲復答之次韻周邠寄雁蕩山圗二首送碧香酒與趙明叔教授趙既見和復次韻答之趙郎中徃莒縣逾月而歸復以一壺遺之仍用前韻蘇潛聖挽詞和鼂同年九日見寄送喬施州雪夜獨宿柏仙菴和孔郎中荆林馬上見寄留别雩泉留别釋迦院牡丹呈趙倅董儲郎中甞知眉州與先人游過安邱訪其故居見其子希甫留詩屋壁劉貢父見余歌詞數首以詩見戲聊次其韻除夜大雪留濰州元日蚤晴遂行中途雪復作大雪青州道上有懐東武園亭寄孔周翰至濟南李公擇以詩相迎次其韻二首和孔君亮郎中見贈巻十二詩四十首起丁巳春留京師至四月之官彭城以後作送范景仁游洛中次韻景仁留别書韓幹牧馬圗送魯元翰少卿知衛州次韻子由送蒋䕫赴代州學官宿州次韻劉涇和李邦直沂山祈雨有應和孔宻州五絶見邸家園留題書春歩西園見寄牡東欄梨花和流杯石上草小詩堂後白丹和趙郎中見戯二首和子由與顔長道同㳺百歩洪相地築亭種栁次韻李邦直感舊與梁先舒煥泛舟得臨醸字二首次韻答邦直子由四首司馬君實獨樂園送顔復兼寄王鞏蝎虎子由将赴南都與余㑹宿於逍遥堂作兩絶句讀之殆不可為懐因和其詩以自解余觀子由自少曠逹天資近道又得至人養生長年之訣而余亦竊聞其一二以為今者宦㳺相别之日淺而異時退休相従之日長既以自解且以慰子由云留題石經院三首過雲龍山人張天驥贈王仲素寺丞陽闗詞三首贈張繼愿中秋月答李公擇和孔周翰二絶再觀邸園留題蘇州詩觀浄觀堂効韋京師哭任遵聖答任師中家漢公巻十三詩四十一首時守彭城作初别子由次韻吕梁仲屯田章質夫寄恵崔徽真王鞏屢約重九見訪既而不至以詩送将官梁交且見寄次韻答之交頗文雅不類武人家有侍者甚恵麗臺頭寺雨中送李邦直赴史館分韻得憶字人字兼寄孫巨源二首代書答梁先九日邀仲屯田為大水所隔以詩見寄次其韻河復并序登望谼亭韓幹馬十四疋有言郡東北荆山下可以溝畎積水因與吳正字王户曹同徃相視以地多亂石不果還㳺聖女山山有石室如墓而無棺槨㦯云宋司馬桓魋墓二子有詩次其韻二首贈寫御容妙善師哭刁景純答呂梁仲屯田張寺丞益齋答孔周翰求書與詩送李公恕赴闕春菜送鄭户曹䖍州八境圗八首并引讀孟郊詩二首訪張山人得山中字二首送孔郎中赴陜郊與梁左蔵㑹飲傅國博家寒食日答李公擇三絶次韻約公擇飲是日大風坐上賦戴花得天字夜飲次韻畢推官巻十四詩三十五首時守彭城洎戊午元豐改元作續麗人行并引聞李公擇飲傅國博家大醉二首起伏龍行并引聞公擇過雲龍張山人輒徃従之公擇有詩戲用其韻送李公擇送筍芍藥與公擇二首和孫莘老次韻㳺張山人園杜介熙熙堂次韻答劉涇攜妓樂游張山人園種徳亭并引文與可有詩見寄云待将一段鵝谿絹掃取寒梢萬尺長次韻答之聞辯才法師復歸上天竺以詩戲問和子由送将官梁左蔵仲通次韻秦觀秀才見贈秦與孫莘老李公擇甚熟将入京應舉僕曩於長安陳漢卿家見吳道子畫佛碎爛可惜其後十餘年復見之於鮮于子駿家則已装背完好子駿以見遺作詩謝之雨中過舒敎授次韻舒敎授寄李公擇又送鄭户曹次韻黄魯直見贈古風二首次韻答舒敎授觀余所蔵墨送鄭户曹賦席上果得榧子送胡掾答仲屯田次韻宻州宋國博以詩見紀在郡雜詠次韻答之答范淳甫次韻答王定國芙蓉城并引和鮮于子駿鄆州新堂月夜二首送将官梁左蔵赴莫州巻十五詩四十二首時守彭城作次韻子由送趙㞦歸覲錢塘遂赴永嘉中秋月三首中秋見月寄子由答王鞏次韻王定國馬上見寄與頓起孫勉泛舟探韻得未字次韻答頓起二首九日黄樓作太虚以黄樓賦見寄作詩為謝九日次韻王鞏送頓起送孫勉李思訓畫長江絶島圗次韻答王鞏張安道見示近詩次韻王鞏顔復同泛舟次韻張十七九日贈子由次韻王鞏獨眠次韻王鞏留别登雲龍山次韻僧潛見贈次韻潛師放魚與舒敎授張山人參寥師同遊戲馬臺書西軒壁兼簡顔長道二首滕縣時同年西園次韻王廷老和張十七九日見寄次韻參寥師寄秦太虛三絶句時秦舉進士不得與參寥師行園中得黄耳蕈百歩洪二首并引送參寥師夜過舒堯文戲作十月十五日觀月黄樓席上次韻答王定民次韻王廷老退居見寄二首次韻顔長道送傅倅巻十六詩四十八首起在彭城至元豐已未移守吳興作雲龍山觀燒得雲字和田國博喜雪祈雪霧豬泉出城馬上作贈舒堯文次韻舒堯文祈雪霧豬泉石炭并引人日獵城南㑹者十人以身輕一鳥過槍急萬人呼為韻得鳥字将官雷勝得過字代作臺頭寺歩月得人字臺頭寺送宋希元種松得徠字作書寄王晉卿忽憶前年寒食北城之游走筆為此詩徃在東武與人徃反作粲字韻詩四首今黄魯直亦次韻見寄復和答雪齋以雙刀遺子由子由有詩次其韻㳺桓山㑹者十人以春水滿四澤夏雲多竒峰為韻得澤字戴道士得四字代作次韻田國博部夫南京見寄二絶月夜與客飲杏花下送蜀人張師厚赴殿試二首再次韻答田國博部夫還二首田國博見示石炭詩有鑄劍斬佞臣之句次韻答之答郡中同僚賀雨罷徐州徃南京馬上走筆寄子由五首次韻曹九章見贈書泗州孫景山西軒過淮三首贈景山兼寄子由舟中夜起余去金山五年而復至次舊詩韻贈寳覺長老㳺恵山三首并引贈恵山僧恵表贈錢道人與秦太虛參寥㑹於松江而闗彦長徐安中適至分韻得風字二首次韻關令送魚次韻秦太虛見戲耳聾端午遍㳺諸寺得禪字送劉寺丞赴餘姚巻十七詩四十一首起已未守吳興即以是年八月攝赴臺獄謫黄州庚申春自京師赴黄作李公擇過髙郵見施大夫與孫莘老賞花詩憶與僕去嵗㑹于彭門折花餽筍故事作詩二十四韻見戯依韻奉答亦以戲公擇云王鞏清虛堂和孫同年卞山龍洞禱晴乗舟過賈收水閣收不在見其子三首次韻孫祕丞見贈與客游道場何山得鳥字僕去杭五年吳中仍嵗大饑疫故人徃徃逝去聞湖上僧舎不復徃日繁麗獨浄慈本長老學者益盛作詩寄之舶趠風并引丁公黙送蝤蛑送孫著作赴考城兼寄錢醇老李邦直二君於孫處有書見及泛舟城南㑹者五人分韻賦詩得人皆苦炎字四首贈王郎一首次韻李公擇梅花送淵師歸徑山送表忠觀錢道士歸杭次韻周開祖長官見寄林子中以詩寄文與可及余與可既沒追和其韻與王郎昆仲及兒子邁遶城觀荷花登峴山亭晚入飛英寺分韻得月明星稀四首城南縣尉水亭得長字與胡祠部㳺法華山又次前韻贈賈耘老趙閲道髙齋送俞節推次韻答孫侔重寄次韻和劉貢父登黄樓見寄并寄子由二首陳州與文郎逸民飲别携手河堤上作此詩子由自南都來陳三日而别正月十八日蔡州道上遇雪次子由韻二首過新息留示鄉人任師中過淮巻十八詩五十三首起元豐三年庚申以後在黄州作書黁公詩後并引㳺浄居寺梅花二首戯作種松萬松亭并引張先生并序陳季常所蓄朱陳村嫁娶圗少年時嘗過一村院見壁上有詩云夜凉疑有雨院静似無僧不知何人詩也宿黄州禪智寺寺僧皆不在夜半雨作偶記此詩故作一絶初到黄州定恵院寓居月夜偶出次韻前篇安國寺浴安國寺尋春寓居定恵院之東雜花滿山有海棠一株土人不知貴也次韻樂著作野歩二月二十六日雨中熟睡至晚強起出門還作此詩意思殊昏昏也雨晴後歩至四望亭下魚池上遂自乾明寺前東岡上歸二首雨中㸔牡丹三首次韻樂著作送酒次韻樂著作天慶觀醮王齊萬秀才寓居武昌縣劉郎洑正與伍洲相對伍子胥奔吳所従渡江也杜沂游武昌以酴醿花菩薩泉見餉二首陳季常自岐亭見訪郡中及舊州諸豪争欲邀致之戯作陳孟公詩一首游武昌寒谿西山寺武昌銅劍歌并引定恵顒師為余竹下開嘯軒石芝并引今年正月十四日與子由别于陳州五月子由復至齊安以詩迎之遷居臨臯亭曉至巴河口迎子由與子由同游寒谿西山次韻答子由和何長官六言五首觀張師正所蓄辰砂五禽言五首并引次韻子由病酒肺疾發正月廿日徃岐亭郡人潘古郭三人送余于女王城東禅荘院鐵拄杖并引與潘三失解後飲酒巻十九詩七十三首時在黄州作東坡八首題織錦圗上囘文三首姪安節逺来夜坐三首冬至日贈安節岐亭道上見梅花戯贈季常樂全先生生日以鐵拄杖為夀二首杭州故人信至齊安送牛尾貍與徐使君四時詞四首太守徐君猷通守孟亨之皆不飲酒以詩戯之雪後到乾明寺遂宿伯父送先人下第歸蜀詩云人稀野店休安枕路入靈關稳跨驢安節将去為誦此句因以為韻作小詩十四首送之次韻和王鞏六首記夢囘文二首并引三朶花并引次韻陳四雪中賞梅正月二十日與潘郭二生出郊尋春忽記去年是日同至女王城作詩乃和前韻是日偶至野人汪氏之居有神降于其室自稱天人李全字徳通善篆字用筆竒妙而不可識云天篆也與余言有所㑹者復作一萹仍用前韻浚井紅梅三首和子由寄題孔平仲草菴二蟲陳季常見過三首寒食雨二首徐使君分新火次韻答元素并引蜜酒歌并引又一首答二猶子與王郎見和謝陳季常恵一揞巾贈黄山人問大冶長老乞桃花茶栽東坡魚蠻子弔李臺卿并引曹既見和復次其韻巻二十詩四十九首起在黄州盡元豐七年甲子量移汝州作次韻孔毅父集古人句見贈五首六年正月二十日復出東門仍用前韻食甘大寒歩至東坡贈巢三元修菜并引二月三日㸃燈㑹客上巳日與二三子携酒出㳺随所見輙作數句明日集之為詩故詞無倫次日日出東門南堂五首次韻子由種杉竹孔毅父妻挽辭次韻孔毅父久旱已而甚雨三首初秋寄子由和黄魯直食笋聞子由為郡僚所捃恐當去官次韻王鞏南遷初歸二首孔毅父以詩戒飲酒問買田且乞墨竹次其韻任師中挽辭子由作二頌頌石臺長老問公手寫蓮經字如黒蟻且頌萬遍脅不至席二十餘年予亦作二首鄧忠臣母周挽辭徐君猷挽辭和蔡景繁海州石室和秦太虛梅花再和潛師橄㰖海棠東坡生日王郎以詩見慶次其韻并寄茶二十一片别黄州過江夜行武昌山上聞黄州鼓角自興國徃筠宿石田驛南廿五里野人舎将至筠先寄遲适逺三猶子端午游真如遲适逺従子由在酒局别子由三首兼别遲初别子由至奉新作巻二十一詩五十四首元豐甲子量移汝州起四月以後離黄州至金陵道中作同年程筠徳林求先墳二詩思成堂歸真亭過建昌李野夫公擇故居初入廬山三首圎通禪院先君舊游也四月二十日晚至宿焉明日忌日也乃手寫寳積獻盖頌佛一偈以贈長老仙公仙撫掌笑曰昨夜夢寳盖飛下著處輒出火豈此祥乎乃作是詩院有蜀僧宣逮事訥長老識先君云子由在筠作東軒記或戯之為東軒長老其壻曹煥徃筠余作一絶句送曹以戯子由曹過廬山以示圎通慎長老慎欣然亦作一絶送客出門歸入室趺坐化去子由聞之仍作二絶一以答予一以答慎明年余過圎通始得其詳乃追次慎韻余過温泉壁上有詩云直待衆生總無垢我方清冷混常流問人云長老可遵作遵已退居圎通亦作一絶世傳徐凝瀑布詩云一條界破青山色至為塵陋又偽作樂天詩稱羡此句有賽不得之語樂天雖渉淺易然豈至是哉乃戯作一絶書李公擇白石山房贈東林總長老題西林壁廬山二勝并引開先潄玉亭栖賢三峡橋陶驥子駿佚老堂二首和李太白并引次韻道潛留别岐亭五首并引郭祥正家醉畫竹石壁上郭作詩為謝且遺二古銅劍龍尾硯歌并引張近幾仲有龍尾子石硯以銅劍易之張作詩送硯反劍乃和其詩卒以劍歸之去嵗九月二十七日黄州生子遯小名幹兒頎然頴異至今年七月二十八日病亡於金陵作二詩哭之葉濤致逺見和二詩復次其韻次荆公韻四絶張庖民挽辭次韻葉致逺見贈次韻杭人裴維甫次韻段縫見贈題孫思邈真戯作鮰魚一絶同王勝之游蒋山至真州再和二首次韻答寳覺眉子石硯歌贈胡誾以玉帯施元長老元以衲帬相報次韻二首次韻滕元發許仲途秦少游送金山鄉僧歸蜀開堂送沈逵赴廣南豆粥施註蘇詩總目上
