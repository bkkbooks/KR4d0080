body:
  text: 縯注引董卓傳卓議廢立云云按天下健者何必董公語在袁紹傳非卓傳也注訛今正王本一卷東湖詩江水緑如藍縯注引李白詩云山光水色緑如藍按白詩山光水色青於藍非緑如藍也注訛今正王本四卷將往終南和子由見寄詩我今廢學如寒竽久不吹之澀欲無趙氏堯卿注云齊宣王好竽而南郭先生不善吹之澀則不能成聲按南郭先生事出韓子齊宣王好竽必三百人齊吹先生不善竽而濫於三百之中以食祿云云並無澀不能成聲語注又不著書名似因蘇詩而傅會之者今正王本十卷卷之二南溪會景亭詩居民惟白帽堯卿注云管寧不應州縣之辟嘗著白帽按三國管寧傳寧常皂帽布繻袴布裙又四時祠祭加衣服著絮巾故在遼東所有白布單衣云云並無白帽字又寧浮海還郡黃初青龍之間屢被徴命寧皆堅辭不起從無州縣辟舉事注訛今刪王本二十八卷竹􅔺詩鴟夷讓圎滑縯注引揚雄酒針云鴟夷員滑腹大如壺按酒針乃鴟夷滑稽滑音骨稽音雞腹大如壺非員滑也注因詩傅會今正王本三十卷和董傳留別詩厭伴老儒烹瓠葉趙氏次公注引劉昆傳云以素米瓠葉為爼豆按昆傳是素木非素米也注訛今正王本十六卷卷之六新城道中詩樹頭初日挂銅鉦次公注引先生日喻云生而眇者不識日問之或告之曰日之狀如銅鉦按先生集本日之狀如銅槃非銅鉦也注訛今刪王本二十九卷於潛僧緑筠軒詩不可使居無竹縯注云王羲之嘗寄居空宅中便令種竹按晉書種竹為王徽之事徽之字子猷羲之子也世説並同注訛今正王本二十卷卷之八賀陳述古弟章生子詩參軍新婦賢相敵李氏厚注引王渾妻鍾氏新婦得配參軍語參軍謂渾弟瀹云云又孔毅父妻挽詞生子勝王濟縯又注曰參軍為渾中弟瀹也按世説注渾弟倫字太沖歷大將軍參軍年二十五卒三國志魏書渾父昶為魏司空諸子中並無名瀹者兩引俱訛今正王本二十卷卷之九戲書吳江三賢畫像詩郤遣姑蘇有麋鹿厚注引伍子胥諫吳王夫差不聽子胥曰臣今見麋鹿遊於姑蘇之臺宫中生荆棘露沾衣也云云按二語本史記淮南王傳漢書在伍被傳麋鹿句乃伍被述子胥諫語宫中荆棘句乃被自諫淮南語故曰今臣亦見宫中生荆棘云云注既不著書名又刪去虛字兩意併作一語牽合可笑今正王本二十九卷捕蝗至浮雲嶺詩殺馬毁車從此逝縯注引後漢周稚傳馮良年三十云云按馮良事見周燮傳非稚也後漢書列傳並無周稚其人注訛今正王本十八卷聽賢師琴詩但聞牛鳴盎中雉登木縯注引管子地負篇凡聽宫如牛鳴窖云云按管子有地員篇無地負篇又聽徴聽羽每句叶韻故曰凡聽宫如牛鳴窖中宫與中叶芟去中字不叶韻矣注訛今正王本七卷李行中醉眠亭注引李白詩我醉欲眠君且去眀朝有意抱琴來原注訛作眀朝無事抱琴來便爾傖父今正王本二十八卷次韻孫職方蒼梧山詩來依鵬背負青山次公注引莊子鵬背負青山云云按此詩山字出韻本應作天莊子逍遙遊篇背負青天而莫之夭閼亦無鵬背負青山句注紕繆杜撰今正王本十二卷謝人見和前篇詩也知不作堅牢玉次公注引漢書息夫躬傳器用鹽惡又引鄧展曰鹽不堅牢也按漢書乃器用盬惡盬音公戶反非鹽惡也注訛今正王本二十八卷出城送客詩東望峨眉小盧山翠作堆公自注郡東盧山絶類峨眉而小見王本八卷又有遊盧山次韻章傳道見王本三卷又有盧山五詠見王本四卷按密州有盧山以秦時博士盧敖避難此山得名先生超然臺記曰其東則盧山盧敖之所從遁也即指此是時先生方守髙密數詩所稱乃密之盧山非江西之廬山也王本皆訛今正卷之十二子由將赴南都詩會看銅狄兩咨嗟宋氏援注引後漢方朔傳云云後漢安得有方朔傳按摩挲銅人事見薊子訓本傳於方朔無涉注訛今正王本十八卷卷之十四次韻黃魯直見贈古風不知市人中自有安期生援注云前漢郊祀志安期生琅琊人賣藥東海邊時人皆言千嵗按漢書郊祀志無此數語蓋出抱朴子及列仙傳而援注誤以為漢書也今正王本十三卷卷之二十別黃州詩桑下豈無三宿戀厚注後漢裴楷言浮屠不三宿桑下云云三十五卷鬱孤臺詩注亦云按裴楷字叔則乃晉人非後漢也後漢另有襄楷字公矩當桓帝時再疏言災異事浮屠不三宿桑下乃疏中引用四十二章經語厚注再引俱訛今正王本一卷卷之二十一廬山開先漱玉亭王本訛作開元題下注云開元禪院舊傳梁昭眀太子之居栖隱也唐元宗即位始號開元有招隱橋元宗所作云云按黃庭堅開先禪院修造記略曰南唐中主年少好文無經世意慕物外之名問舍五老峯下有野夫獻地買之萬金以為書堂及即位以為寺以野夫獻地為已有國之祥故名開先後遷洪都蓋嘗彌節故榻與畫像存焉又山志稱中主讀書臺在寺後世以為李後主者誤以為梁昭眀者尤誤又按史南唐中主李景初名景通後更名燝避周諱復為景廟號元宗開先寺本末甚眀無可疑者王本既訛開先為開元又訛南唐之元宗為唐開元天寶之元宗又云唐元宗即位始號開元其杜撰踳駮乃爾梅溪何至是想後人偽託耶今正王本四卷張近幾仲有龍尾子石硯詩飄零髙下隨風花次公注引南史范績傳對竟陵王云云績名凡三見按南史並無范績其人對竟陵王語乃范縝非績也縝字子真為范雲從父兄注訛今正王本三十卷次韻滕元發許仲途秦少遊詩起句二公詩格老彌新醉後狂吟許野人按二公謂滕許野人公自謂也頸聨兩邦旌纛十畝鋤犁正分承起句詩意甚明次公注云兩邦旌纛意者滕元發許仲途皆為太守乎然破題指之為許野人未省云云注詩如此索解直是兒童之見不待識者方為盧胡也今刪王本十三卷卷之二十五詩題狄詠石屏按狄詠樞密使武襄公之子與先生同館伴遼使事載年譜中王本訛秋詠石屏今正王本三十卷卷之二十六書鄢陵王主簿所畫折枝詩雙翎決將起次公注曰莊子言蜩鷽鳩云我決起而飛也按注意本引莊子逍遙遊篇蜩與鷽鳩笑之曰我決起而飛搶榆枋語乃以意竄改拖沓殊不成句今正王本二十七卷和張耒髙麗松扇詩猶勝漢宫悲媫妤次公注引漢書云班媫妤初大幸後趙飛燕寵盛媫妤失寵遂作秋扇詩云云按秋扇詩即樂府怨歌行新製齊紈素一首是也詩不載漢書注誤牽合今正王本三十卷贈李道士詩戲著幼輿巖石裏次公注引世説云愷之畫謝鯤在石岩裏人問其故曰鯤嘗云一邱一壑自謂過庾亮此子宜置邱壑中云云按晉書謝鯤傳明帝在東宫問鯤論者以君方庾亮何如答曰端委廟堂使百僚凖則鯤不如亮一邱一壑自謂過之又世説顧長康畫謝幼輿在岩石裏人問其所以曰此子宜置邱壑中按此二條各是一事置邱壑中是長康語一邱一壑是鯤對眀帝語注以二事牽合語亦拖沓不成文理今正王本十九卷卷之二十七慶源宣義王丈詩拂衣自注下下考師注前漢陽城為道州刺史云云漢唐不辨可為索笑今正王本九卷卷之三十二滕逹道挽詞雲夢連江雨次公注云雲夢澤在湖州常州之地按周禮職方氏正南曰荆州其澤藪曰雲夢本作瞢注曰雲在江北夢在江南今江夏安陸華容枝江皆其地左傳定公四年楚子涉睢濟江入於雲中杜預注曰入雲夢澤中所謂江南之夢廣輿記雲夢澤在安陸相如傳云椘有七澤其小者曰雲夢方九百里即指此其與湖常相距二千餘里不知注何所據而云然今刪王本二十卷卷之三十五宿建封寺曉登盡善亭望韶石詩再使魚龍舞洞庭次公注莊子言黃帝張咸池之樂於洞庭之野而魚龍舞焉按莊子天運篇北門成問於黃帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠云云通篇無而魚龍舞焉句杜撰今正王本卷新釀桂酒詩酒材巳遣門生致厚注云周禮酒人篇以式法授酒材按周禮安有篇名式法授酒材亦酒正之職非酒人也今正王本八卷卷之三十六答周循州詩且覓黃精與療飢縯注引毛詩泌之洋洋可以療飢因蘇詩有療飢字輒改竄毛詩樂飢為療飢此最眼前謬誤而至今仍之不能改豈不可笑王本十四卷小圃五詠甘菊詩孤根蔭長松獨秀無衆草次公注引左傳松柏之下其草不植而菊生焉按左傳襄公二十九年鄭行人子羽曰是謂不宜必代之昌松柏之下其草不植並無而菊生焉句注杜撰今刪王本二十五卷次韻髙要令劉湜峽山寺見寄詩應憐五管客曽作八州督援注引莊子頤隱於齊肩髙於頂句贅指天上有五管也云云按此用五管是嶺外地名唐以廣桂容雍南安五府屬嶺南節度使謂之五管詩云五管客公自謂也注引莊子大謬莊注五管五腧也詩意當作何解又按此數語莊子凡再見人間世篇則曰支離疏者頤隱於齊肩髙於頂會撮指天五管在上大宗師篇則曰曲僂發背上有五管頤隱於齊肩髙於頂句贅指天注引顛倒錯亂兩按之俱不合杜撰每每如此王本二十三卷卷之三十七安期生詩茂陵秋風客望祀猶蟻蜂王本訛作望祖猶蟻蜂按望祀本用漢郊祀志武帝望祀蓬萊之屬幾至殊庭語故結曰海上如瓜棗可聞不可逢詩意甚眀王本訛作望祖次公注乃為之説曰祖字指言髙祖謂髙祖尚不見安期而况武帝云云詩意上下不屬穿鑿支離今正王本十九卷卷之三十八留别廉守詩編萑以苴豬次公注編萑綴茅也又引左傳或取一編萑焉云云按詩語全用禮記內則編萑以苴之句萑細葦也解作綴茅巳誤又左傳昭二十七年或取一編菅焉杜云苫也訛編菅為編萑尤誤今正王本十六卷和黃秀才鑒空閣詩誰言小叢林清絶冠五嶺按詩意閣在嶺外甚眀胡氏邦衡注題乃引杭州圖經云云殊無謂今刪王本二十八卷卷之三十九用前韻再和霍大夫詩郤下虎頭州次公注云虎頭州以言常州蓋虎頭顧愷之也愷之晉陵無錫人無錫乃今常州云云按虎頭州虔州也考之地里志一統志及圖經諸書從無以常州為虎頭州至謂因顧愷之得名尤支離鑿空當時巳有辨其訛者而至今仍之不解王本十四卷王子立去嵗送子由北歸往返百舍今又相逢贑上戲用舊韻作詩留別次公注王子立住鶴田山云云按王子立名適為子由之壻第十七卷有贈王郎一首即子立也又二十七卷有次韻王郎子立風雨有感詩二十八卷有哭王子立次兒子逮韻三首先生度嶺北歸時距子立之歿蓋十餘年矣是詩留別乃王子直秀才非子立也王子直名原虔州人先生在惠州子直不逺千里來訪留七十日去事載年譜先生有贈王子直秀才詩見三十五卷起句云萬里雲山一破裘今用其韻也題與注並訛今正王本十六卷
