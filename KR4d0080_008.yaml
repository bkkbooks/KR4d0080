front:
  text: 王注正訛分類蘇詩注三十二卷舊刻永嘉王十朋龜齡纂集注中引用故事謬誤實多有極淺陋可為失笑者王龜齡為南渡名臣著梅溪集如干卷行世史稱其天資頴悟廷對萬餘言淹通經史學者爭傳誦之以擬鼂董劉氏珙序其集有云平居無所嗜好顧喜為詩渾厚質直如其為人又云不為浮靡之文然規模宏闊骨骼開張世之盡力於文字者或不能及其所注蘇詩雖云百家必經一手采輯何至紕繆乃爾愚意當是賈人俗本版寫誵訛而後生耳食沿踵至今釋氏所謂可憐愍者會豫有訂讐之役乃稍加是正隨手翻得如干條略疏出處件繫之如左其它訛處尚多不及枚舉今所抉摘依原注分屬諸家不欲獨令王氏蒙陋名也長蘅識卷之一壬寅二月有詔令郡吏分往屬縣詩誰言董公健程氏
  hash: sha256:fd2b7066182c2f85de8287f8cb13e00f3d215fe7b0e1ea34dd2da9f9bbeffcaf
