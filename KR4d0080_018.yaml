body:
  text: 施注蘇詩卷四宋蘇軾撰施元之原注武進邵長蘅刪補詩四十七首起自京口之錢塘以是年十一月抵任通守錢塘作遊金山寺南唐僧應之頭陀巖記金山昔名浮玉因裴頭陀江際獲金貞元二十一年節帥李錡奏易名金山我家江水初發源宦遊直送江入海聞道潮頭一丈髙天寒尚有沙痕在中泠南畔石盤陀古來出沒隨濤波試登絶頂望鄉國江南江北青山多羇愁畏晚尋歸楫山僧苦留看落日微風萬頃鞾文細斷霞半空魚尾赤是時江月初生魄二更月落天深黑江心似有炬火明飛熖照山棲鳥驚悵然歸卧心莫識非鬼非人竟何物公自注是夜所見如此江山如此不歸山江神見怪驚我頑我謝江神豈得已有田不歸如江水郭景純江賦惟岷山之導江初發源乎濫觴漢地理志岷山注云在蜀郡公蜀人也故云我家張又新水經楊子江心中泠第一竇羣金山寺詩西江中泠波四截湧出一峰青嵽嵲毛詩魴魚赬尾赬赤色也尚書厥四月哉生眀又哉生魄注哉始也始生明月三日也始生魄十六日也禮記月三日而成魄魄月質也嶺表異物志海中遇隂晦波如然火滿海以物擊之迸散如星火有月即不復見木玄虛海賦云隂火潛然豈謂此乎左傳僖二十四年晉文公謂舅犯曰所不與舅氏同心者有如白水三國孫權傳魏文帝詔曰此言之誠有如大江自金山放船至焦山潤州圖經焦山焦先所隱故以為名金山樓觀何耽耽撞鐘擊鼓聞淮南焦山何有有修竹採薪汲水僧兩三雲霾浪打人迹絶時有沙户祈春蠶公自注吳人謂水中可田者為沙我來金山更留宿而此不到心懷慙同遊盡返決獨往賦命窮薄輕江潭清晨無風浪自湧中流歌嘯倚半酣老僧下山驚客至迎笑喜作巴人談公自注焦山長老中江人也自言久客忘鄉井只有彌勒為同龕困眠得就紙帳暖飽食未厭山蔬甘山林飢卧古亦有無田不退寧非貪展禽雖未三見黜叔夜自知七不堪行當投劾謝簪組為我佳處留茆菴張平子西京賦大厦耽耽晉夏統傳甲夜之初撞鐘擊鼓楞嚴經食辦擊鼓衆集撞鐘楊雄傳橫江潭而漁列女傳趙津涓女中流為簡子發河激之歌法帖禇遂良書久棄塵滓與彌勒同龕一食清齋六時禪誦嵇叔夜絶交書有必不堪者七甚不可者三後漢崔駰傳祖篆辭甄豐辟命投劾而歸又周黃徐薑傳序閔仲叔世稱節士建武中應侯霸之辟既至霸不及政事徒勞苦而已遂辭出投劾而去注案罪曰劾自投其劾狀而去也甘露寺潤州圖經甘露寺在北固山上唐寶歷中李德裕建公自注欲逰甘露寺有二客相過遂與偕行寺有石如羊相傳謂之很石云諸葛亮孔眀坐其上與孫仲謀論曹公也大鐡鑊二案銘梁武帝所鑄畫師子一菩薩二陸探微筆衛公所留祠堂在寺手植柏合抱矣近寺僧發古殿基得舍利七粒并石記乃衛公為穆宗皇帝造福所葬者也江山豈不好獨遊情易闌但有相擕人何必素所歡我欲訪甘露當途無間官二子舊不識欣然肯聨鞍古郡山為城層梯轉朱欄樓臺斷崖上地窄天水寬一覽吞數州山長江漫漫郤望大眀寺惟見煙中竿很石卧庭下穹隆如伏羱緬懷卧龍公挾䇿事雕鑽一談收猘子再説走老瞞名髙有餘想事往無留觀蕭公古鐡鑊相對空團團陂陀受百斛積雨生微瀾泗水逸周鼎渭城辭漢盤山川失故態怪此能獨完僧繇六化人霓裳挂冰紈隱見十二疊觀者疑夷謾破板陸生畫青猊戲盤跚上有二天人揮手如翔鸞筆墨雖欲盡典刑垂不刋赫赫贊皇公英姿凛以寒古柏手親種挺然誰敢干枝撑雲峰裂根入石窟蟠剃草得斷碑斬崖出金棺瘞藏豈不牢見伏理可歎四雄皆龍虎遺迹儼未刓方其盛壯時爭奪肯少安廢興屬造物遷逝誰控摶况彼妄庸子而欲事所難古今共一軌後世徒辛酸聊興廣武歎不待雍門彈漢張耳傳如平生歡徐鉉吳録太祖入廣陵造大明寺輿地志石羊巷在城南吳時孫氏隧道也劉備詣孫權權與俱獵因醉各據一羊羅隱石羊詩紫髯桑蓋此沉吟很石猶存事可尋三國諸葛亮傳徐庶謂先主曰孔明卧龍也文選商鞅挾䇿以鑽孝公吳歷曹公聞孫策平定江東意甚難之常呼猘兒難與爭鋒猘狂犬也三國志魏武帝小字阿瞞潤州類集甘露寺有梁天監中所鑄鑊有銘可驗漢司馬相如傳罷池陂陀下屬江河周鼎泗水注見一卷石鼓詩魚豢魏略景初元年徙長安鐘簴駱駝銅人承露盤盤折銅人重不可致留於霸城李賀金人辭漢歌攜盤獨出月荒涼渭城已逺波聲小潤州類集甘露寺有張僧繇畫菩薩列子周穆王之時西極之國有化人來後漢章帝紀詔齊相省冰紈注紈素也冰言鮮潔如冰范蔚宗宦者論冰紈霧縠之迹盈牣珍藏潤州類集甘露寺有陸探微畫狻猊注詳一卷開元寺詩史記平原君傳民家有躄者盤跚行汲杜子美畫鶴詩畫色久欲盡蒼然猶出塵唐李德裕傳初封贊皇縣伯潤州類集甘露寺今有李德裕祠堂畫像及所植檜周禮剃氏掌殺草注剃翦也玉壺清話潤州甘露寺熙寧四年春江中漁者見神光纍夕起於溷厠間一旦其厠無故自圯長老應夫再營之方築基墾土去地數尺一礎覆土中刻曰有唐太和三年正月二十四日於上元縣禪衆寺舊塔基下獲舍利石函以其年二月十五日重瘞藏於丹徒縣甘露寺東塔下金棺一銀椁一錦襆九重皆余之施也余創甘露寺寶剎重瘞舍利以資穆皇之冥福也江浙西道觀察等使兼潤州刺史李德裕記四雄諸葛武侯吳大帝梁武帝李衛公也漢韓信傳刻印刓忍不能豫刓五丸反注手弄角訛也杜子美贈閭丘師兄詩漠漠世界黑區區爭奪繁漢賈誼服賦千變萬化兮未始有極忽然為人兮何足控摶漢齊王傳人謂魏勃勇妄庸人耳晉阮籍傳常登廣武觀楚漢戰處歎曰時無英雄使豎子成名東坡志林昔先友史經臣彥輔謂余阮籍登廣武而歎豈謂沛公豎子乎余曰非也傷時無劉項也豎子指魏晉間人耳其後余遊甘露寺寺有孔明孫權李德裕遺迹感而賦詩猶此意也今日讀李太白廣武古戰場詩云沈湎呼豎子狂言非至公乃知太白亦誤認嗣宗語與先友之意無異嗣宗雖放蕩本有意於世以魏晉多故故一放於酒何至以沛公為豎子乎桓談新論雍門周以琴見孟嘗君君曰先生鼓琴亦能使文悲乎對曰竊為足下有所悲千秋萬嵗後墳墓生荆棘遊童牧豎躑躅而歌其上曰孟嘗君之尊貴亦若是乎於是孟嘗君喟然太息淚承睫而未下雍門周引琴鼓之孟嘗君遂㱆欷而就之次韻子由栁湖感物憶昔子美在東屯數間茆屋蒼山根嘲吟草木調蠻獠欲與猿鳥爭啾喧子今憔悴衆所棄驅馬獨出無往還惟有栁湖萬株桞清隂與子供朝昏胡為譏評不少借生意凌挫難為繁栁雖無言不解愠世俗乍見應憮然嬌姿共愛春濯濯豈問空腹修蛇蟠朝看濃翠傲炎赫夜愛疏影搖清圓風翻雪陳春絮亂蠧響啄木秋聲堅四時盛衰各有態搖落悽愴驚寒溫南山孤松積雪底抱凍不死誰復賢杜移居東屯詩東屯復瀼西一種住清溪來往皆茒屋淹留為稻畦北史蠻獠傳蠻之種類蓋盤瓠之後獠者南蠻之别種左傳詩曰雖有姬薑無棄蕉萃會稽典録孔融與曹公書今之少年喜謗前輩或能譏評孝章韓昌黎外集送浮屠令縱西遊序譏評文章商較人士史記荆軻傳願王少假借之晉王恭傳恭美姿儀或目之云濯濯如春月栁白樂天悟真寺詩根株抱石長屈曲蟲蛇蟠晉列女傳謝道韞詠雪云未若栁絮因風起送蔡冠卿知饒州冠卿與安石議刑名不合遂補外得饒州公送行詩意蓋在此吾觀蔡子與人遊掀豗笑語無不可平生儻蕩不驚俗臨事迂闊乃過我橫前坑穽衆所畏布路金珠誰不裹爾來變化驚何速昔號剛強今亦頗憐君獨守廷尉法晚嵗郤理鄱陽柂莫嗟天驥逐羸牛欲試良玉須猛火世事徐觀真夢寐人生不信長轗軻知君決獄有隂功他日老人酬魏顆漢史丹傳貌若儻蕩不備然心甚謹密注儻蕩疏誕無檢也左傳襄公三十年鄭伯有夜飲朝至未已朝者皆自朝布路而罷漢百官公卿表廷尉秦官掌刑辟秩千石張釋之傳釋之為廷尉曰廷尉天下之平也一傾天下用法皆為之輕重杜子美短歌行君今理拖春江流又錦樹行青草萋萋盡枯死天驥跛足隨羸牛東方朔七諫服罷牛而驂驥淮南子終山之玉灼以爐炭三日三夜色澤不變得天地之精也白居易詩試玉要燒三日滿楞嚴經郤來觀世間猶如夢中事古詩無為守窮賤轗軻長苦辛漢于定國傳父于公曰我治獄多隂德未嘗有所寃子孫必有興者左傳宣十五年魏顆從父治命嫁其嬖妾及輔氏之役顆見老人結草以亢杜回回躓而顛故獲之夜夢曰余而所嫁婦人之父也爾用先人治命余是以報王注先生詩案自言以譏當今朝廷進用之人有逆其意者則設坑穽以陷之有順其意者則以利誘之如以金玉布於道路次韻楊褒早春楊褒字之美嘉祐未為國子監直講治平間出通判潁州好牧法書蔡君謨多從借拓歐陽公見其女奴彈琵琶有詩云嬌兒兩幅青布裙三腳木牀坐調曲竒書古畫不論價盛以錦囊裝玉軸亦可見其人也窮巷凄涼苦未和君家庭院得春多不辭瘦馬騎衝雪來聽佳人唱踏莎破恨徑須煩麴糵增年誰復怨羲娥良辰樂事古難並白髮青衫我亦歌細雨郊園聊種菜冷官門户可張羅放朝三日君恩重睡美不知身在何漢陳平傳家乃負郭窮巷樂府曲名有踏莎行世説孔羣與親舊書今年田得七百斛秫不了麴糵事韓退之贈崔立之詩高士例須憐麴糵山海經東南海外甘泉之間有羲和國有女子曰羲娥是生十日常浴日於甘泉謝靈運擬鄴中詩序天下良辰美景賞心樂事四者難并白樂天詩白髮更添今日鬢青衫猶是去年身杜子美有小園種秋菜詩又醉時歌廣文先生官獨冷漢鄭當時傳下邽翟公為廷尉賔客填門及廢門外可設爵羅白樂天詩歸騎紛紛滿九衢放朝三日為泥塗杜逼仄行曉來急雨春風顛睡美不聞鐘鼓傳初到杭州寄子由二絶眼看時事力難勝貪戀君恩退未能遲鈍終須投劾去使君何日換聾丞漢翟方進傳號遲頓不及事注頓讀曰鈍投劾注見本卷焦山詩漢黃霸傳許丞老病聾督郵白欲逐之霸曰許丞雖老尚能拜起送迎正頗重聽何傷公烏臺詩話軾初任杭州寄子由詩云眼看時事力難勝貪戀君恩退未能意謂新法青苖助役等事煩雜不可辦亦言己材不能勝任也聖明寬大許全身衰病摧頽自畏人莫上岡頭苦相望吾方祭竈請比鄰白樂天詩閔默向隅心摧頽觸籠翅魏文帝雜詩客子常畏人詩國風陟彼岡兮瞻望兄兮漢孫寶傳署御史主簿徙入舍祭竈請比鄰次韻栁子玉二首地爐細聲蚯蚓發銀瓶擁褐橫眠天未明衰鬢鑷殘欹雪領壯心降盡倒風旌自稱丹竈錙銖火倦聽山城長短更聞道牀頭唯竹几夫人應不解卿卿公自注俗謂竹几為竹夫人韓石鼎聨句詩時於蚯蚓竅微作蒼蠅鳴杜牧之詩金鑷洗霜鬢鄭愚津陽門詩笑云鮐老不為禮飄蕭雪領霜垂頥詩召南我心則降蘇秦傳齊王曰寡人心搖搖然如縣旌孟東野京山行此時遊子心百尺風中旌朝野僉載韋莊稱炭而㸑多少一臠必覺之江丈通别賦守丹竈而不顧大還丹祕契圖凡一斤藥有十六兩每兩有二十四銖從冬至建子日辰起火分兩錙銖相應世説王安豐婦卿安豐豐曰婦人卿壻於禮不敬答曰我親卿愛卿是以卿卿紙帳亂文龜殼細相連慣卧青綾恐未便潔似僧巾白疊布暖於蠻帳紫茸氊錦衾速卷持還客破屋那愁仰見天但恐嬌兒還惡睡夜深踏裂不成眠漢尚書郎更直建禮門給青綾被今西掖之任也子玉官為尚書郎舊唐書南蠻傳婆利國有吉貝草緝花以作布細者名為白疊杜子美贊公房詩細軟青絲履光明白氎巾又張舍人遺褥段詩錦衾卷還客始覺心和平韓退之寄盧同詩破屋數間而巳矣神仙傳董奉居豫章時大旱縣令丁士彥請致雨奉曰雨易得耳貧道屋皆見天恐雨至何堪令曰先生但致雨當為架好屋屋成暮乃大雨杜茅屋為秋風所破歎布衾多年冷如鐡嬌兒惡卧踏裏裂臘日遊孤山訪惠勤惠思二僧孤山在西湖上惠勤餘杭人東坡通守錢塘見歐陽文忠公於汝隂而南公曰西湖僧惠勤甚文而長於詩子求人於湖山間而不可得則往從勤乎東坡到官三日訪勤於孤山之下遂賦此詩天欲雪雲滿湖樓臺明滅山有無水清出石一作石出魚可數林深無人鳥相呼臘日不歸對妻孥名尋道人實自娛道人之居在何許寶雲山前路盤紆孤山孤絶誰肯廬道人有道山不孤紙窗竹屋深自暖擁褐坐睡依圓蒲天寒路逺愁僕夫整駕催歸及未晡出山回望雲木合但見野鶻盤浮圖兹遊淡薄歡有餘到家恍如夢蘧蘧作詩火急追亡逋清景一失後難摹杜子美雨詩明滅洲景微隱見巖姿露王維詩江流天地外山色有無中漢薛宣傳宣為左馮翊出教曰日至吏以令休掾宜從衆歸對妻子設酒肴請鄰里一關相樂關同笑圖經云寶雲寺乾德二年吳越王錢氏建寺有寶雲菴沈休文詩野徑既盤紆荒阡亦交互韓退鷙之詩喚起窗全曙催歸日未西栁子厚浮圖鶻説有曰鶻穴於長安薦福浮圖有年矣莊子齊物論昔者莊周夢為胡蝶栩栩然胡蝶也俄然覺則蘧蘧然周也李杞寺丞見和前篇復用元韻答之獸在藪魚在湖一入池檻歸期無誤隨弓旌落塵土坐使鞭箠環呻呼追胥連保罪及孥公自注近屢獲鹽賊皆坐同保徙其家百日愁歎一日娛白雲舊有終老約朱綬豈合山人紆人生何者非蘧廬故山鶴怨秋猿孤何時自駕鹿車去掃除白髮煩菖蒲麻鞋短後隨獵夫射弋狐供朝晡陶潛自作五栁傳潘閬畫入三峰圖吾年凜凛今幾餘知非不去慙衛蘧歲荒無術歸亡逋鵠則易畫虎難摹列子昔者夢為人僕數罵杖撻無不致也眠中啽囈呻呼徹旦息焉周禮小司徒之職以比追胥以令貢賦楊子紆朱懷金唐李泌傳肅宗在靈武泌入議國事出陪乘輿衆指曰著黃者聖人著白者山人也因賜金紫莊子天運篇仁義先王之蘧廬也止可一宿而不可以久處孔稚圭北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚風俗通鹿車窄小裁容一鹿晉劉伶傳常乘鹿車神仙傳九疑仙人見武帝云聞有石菖蒲一寸九節可以服食郤老故來採耳杜子美丈人山詩掃除白髮黃精在又述懷詩麻鞋見天子莊子説劔篇曼胡之纓短後之衣漢張騫傳堂邑父善射窮急射禽獸給食晉陶潛著五栁先生傳以自况潘閬觀華山詩髙愛三峰插太虛回頭仰望倒騎驢魏野詩從此華山圖帳襄更添潘閬倒騎驢郭緣生述征記華山有三峰直上數千仞古詩凜凜嵗云暮淮南子蘧伯玉年五十而有四十九年非何者先者難為知而後者易為改也莊子則陽篇蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也未知今之所謂是之非五十九非也後漢馬援傳戒兄子嚴敦書曰效龍伯高不得猶為謹敕之士所謂刻鵠不成尚類騖者也效杜季良不得陷為天下輕薄子所謂畫虎不成反類狗者也公烏臺詩話誤隨弓旌落塵土坐使鞭箠環呻呼以譏諷朝廷新法行後公事鞭箠之多也追胥保伍罪及孥百日愁嘆一日娛以譏諷朝廷鹽法收坐妻子移鄉法太急也嵗荒無術歸亡逋鵠則易畫虎難摹意取馬援言畫鵠不成猶類鶩畫虎不成反類狗言嵗既飢荒我欲出竒畫賑濟又恐朝廷不從乃似畫虎不成反類狗也再和東望海西望湖山平水逺細欲無野人疏狂逐漁釣刺史寬大容歌呼君恩飽暖及爾孥才者不間拙者娛穿巖度嶺腳力健未厭山水相縈紆三百六十古精廬出遊無伴籃輿孤作詩雖未造藩閾破悶豈不賢摴蒱君才敏贍兼百夫朝作千篇日未晡朅來湖上得佳句從此不看營丘圖知君篋櫝富有餘莫惜錦繡償菅蘧窮多鬬險誰先逋賭取名畫不用摹唐王維傳維善畫山水平逺雲勢石色繪工以為天機所到漢百官表武帝元封五年初置部刺史掌奉詔條察州景帝中二年更名郡守曰太守唐百官志武德元年改太守曰刺史漢曹參傳相舍後園近吏舍吏舍日飲歌呼參聞乃反取酒張坐飲大歌呼與相和白樂天詩歷想為官日無如刾史時歡娛接賔客飽暖及妻兒杭州圖經附郭二邑所管寺院內錢塘二百七十仁和六十五合三百三十五所外七邑不與焉晉陶潛傳王𢎞問其所乘答云素有腳疾向來籃輿亦足自反乃令一門生二兒共舉至州元稹杜甫墓志詩人以來未有如子美者李白尚不能歷其藩翰况堂奧乎博物志老子入胡作摴蒱宋髙祖紀桓玄曰劉毅家無儋石之儲摴蒱一擲百萬南史栁惲傳武帝嘗曰分其才藝足了十人韓退之贈崔立之詩朝為百賦猶鬱怒暮作千詩轉遒緊後漢張衡思玄賦回志朅來從玄謀獲我所求夫何思名畫録李成工山水營丘人也世號李營丘韓退之畫記獨孤生申叔者始得此畫而與余彈棊余幸勝而獲焉明年至河陽座有趙侍御者見之戚然進曰噫余之所手摹也遊靈隱寺得來詩復用前韻君不見錢塘湖錢王壯觀今巳無屋堆黃金斗量珠運盡不勞折簡呼四方宦遊散其孥宫闕留與間人娛盛衰哀樂兩須臾何用多憂心鬱紆溪山處處皆可廬最愛靈隱飛來孤喬松百丈蒼髯鬚擾擾下笑栁與蒲髙堂會食羅千夫撞鐘擊鼓喧朝晡凝香方丈眠氍毹絶勝絮被縫海圖清風徐來驚睡餘遂超羲皇傲几蘧歸時棲鴉正畢逋孤煙落日不可摹錢塘記唐元和中議築塘防海塘始開募致土石一斛與錢一千來者如雲旬月而塘成因名錢塘五代史吳越世家錢氏自唐末有國兼有兩浙幾百年宋興俶朝太祖厚禮遣還國太平興國三年詔俶來朝俶舉族歸於京師國除王子年拾遺記後漢郭况庭中起髙閣置衡石其上以稱量珠玉閣下有藏金窟列武士衛之劉禹錫泰娘歌斗量明珠鳥傳意晉宣帝紀王凌曰凌若有罪公當折簡召凌何苦自來帝曰以公非折簡之客故耳十三州記靈隱山青巖晉咸和中有僧登之歎曰此是中天竺國靈鷲山之小嶺不知何年飛來晉殷浩傳松柏之姿經霜猶茂蒲栁弱質望秋先零釋氏要覽唐顯慶中王玄䇿使西域至維摩示疾之室遺址疊石為之玄䇿躬以手板縱橫量之得十笏故號方丈風俗通織毛褥謂之氍毹三輔黃圖武帝溫室殿規地以罽賔氍毹杜子美北征詩海圖折波濤舊繡移曲折天吳及紫鳳顛倒在短褐晉陶潛傳嘗言髙卧北窗之下清風颯至自謂羲皇上人莊子人間世伏羲几蘧之所行終而况散焉者乎注几蘧古聖君名畢逋注見三卷陪歐陽公燕西湖戲子由宛丘先生長如丘宛丘學舍小如舟常時低頭誦經史忽然欠伸屋打頭斜風吹帷雨注靣先生不愧旁人羞任從飽死笑方朔肯為雨立求秦優眼前勃豀何足道處置六鑿須天遊讀書萬卷不讀律致君堯舜知無術勸農冠蓋閙如雲送老虀鹽甘似蜜門前萬事不挂眼頭雖長低氣不屈餘杭别駕無功勞畫堂五丈容旗旄重樓跨空雨聲逺屋多人少風騷騷平生所慙今不恥坐對疲氓更鞭箠道逄陽虎呼與言心知其非口諾唯居髙志下真何益氣節消縮今無幾文章小伎安足程先生别駕舊齊名如今衰老俱無用付與時人分重輕宛丘注見前卷史記孔子世家孔子長九尺有六寸人謂長人而異之曲禮君子欠伸撰杖屨潘安仁秋興賦徑風戾而吹帷莊子外物萹室無空虛則婦姑勃豀心無天遊則六鑿相攘南史梁元帝之敗盡焚圖書曰讀書萬卷猶有今日唐沈全交嘲誚詞評士不讀律博士不尋章韓退之詩致君豈無術自進誠獨難班固西京賦紱冕所興冠蓋如雲韓退之送窮文太學四年朝虀暮鹽又贈張籍時吾老嗜讀書餘事不挂眼晉職官志州郡置刺史别駕治中從事唐地理志杭州餘杭郡秦始皇本紀作前殿阿房上可以坐萬人下可建五丈旗庾信小園賦風騷騷而樹急天慘慘而雲低世説王弼見何晏自説注老子旨意晏多所短不復作聲但應喏喏史記趙世家簡子曰諸大夫朝徒聞唯唯杜子美貽栁少府詩文章一小伎於道未為尊公烏臺詩話任從飽死笑方朔肯為雨立求秦優意取東方朔傳侏儒飽欲死及滑稽傳優旃謂陛楯郎我雖短幸休居言弟家貧官卑而身材長大所以比東方朔陛楯郎而以當今進用之人比侏儒優旃也讀書萬卷不讀律致君堯舜知無術是時朝廷新興律學軾意非之以謂法律不足以致君於堯舜今時又專用法律而忘詩書故言我讀萬卷書不讀法律蓋聞法律之中無致堯舜之術也勸農冠蓋閙如雲送老虀鹽甘似蜜以譏諷朝廷新差提舉官所至苛細生事發摘官吏惟學官無吏責也弟轍為學官故有是句平生所慙今不耻坐對疲氓更鞭箠是時多徒配犯鹽之人例皆飢貧言鞭箠此等貧民軾平生所慚今不復恥矣以譏諷朝廷鹽法太急也道逄陽虎呼與言心知其非口諾唯是時張靚俞希旦作監司意不喜其為人然不敢與爭議故毁詆之為陽虎也越州張中舍夀樂堂熙寧五年簽書公事太子中舍張次山字希元創建張建康人號能吏青山偃蹇如髙人常時不肯入官府髙人自與山有素不待招邀滿庭戶卧龍蟠屈半東州萬室鱗鱗枕其股背之不見與無同狐裘反衣無乃魯張君眼力覻天奧能遣荆棘化堂宇持頤宴坐不出門收攬竒秀得十五才多事少厭間寂卧看雲煙變風雨筍如玉筯椹如簮強飲且為山作主不憂兒輩知此樂但恐造物怪多取春濃睡足午窗明想見新茶如潑乳後漢龎公傳居峴山之南未嘗入城府漢張禹傳忽忘雅素注素故舊也卧龍山在越州漢匡衡傳富貴在身而列士不譽是有狐白之裘而反衣之也韓退之答孟郊詩規模背時利文字覻天巧莊子漁父篇左手據膝右手持頤以聽維摩經心不住內亦不住外是為宴坐不斷煩惱而入涅槃是為宴坐能如是坐者佛所印可三國志龎統傳今拔十失五猶得其半任彥升讓吏部表拔十得五尚曰比肩晉書王羲之曰正賴絲竹陶寫常恐兒輩覺損歡樂之趣莊子天運篇名公器也不可多取茶苑湯少茶多則乳靣聚姚屯田挽詞京口年來耆舊衰髙人淪喪路人悲空聞韋叟一經在不見恬侯萬石時貧病只知為善樂逍遙郤恨棄官遲七年一别真如夢猶記蕭然瘦鶴姿建康實録孫權於朱方築城因京峴山謂之京鎮又因門謂之京口晉習鑿齒著襄陽耆舊傳漢書韋賢傳鄒魯諺曰遺子黃金滿籝不如教子一經石奮傳景帝曰石君及四子皆二千石乃舉集其門因號萬石君少子慶為相諡恬侯後漢東平憲王傳顯宗詔曰日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣王仲宣贈蔡子篤詩風流雲散一别如兩白樂天詩病瘦形如鶴送岑著作岑著作梓州人名象求字巖起時以提舉梓州路常平還蜀故詩云惟應故山夢隨子到吾廬懶者常似靜靜豈懶者徒拙則近於直而直豈拙歟夫子靜且直雍容時卷舒嗟我復何為相得歡有餘我本不違世而世與我殊拙於林間鳩懶於冰底魚人皆笑其狂子獨憐其愚直者有時信平聲靜者不終居而我懶拙病不受砭藥除臨行怪酒薄已與别淚俱後會豈無時遂恐出處踈惟應故山夢隨子到吾廬李白送蔡山人詩我本不棄世世人自棄我詩召南鵲巢疏云鳩拙於營巢禮記月令魚上冰蓋未解凍之時魚於冰下自藏也許慎説文砭以石刺病也吉祥寺賞牡丹人老簮花不自羞花應羞上老人頭醉歸扶路人應笑十里珠簾半上鈎晉謝安傳羊曇嘗因石頭大醉扶路唱樂不覺至西州門杜牧之贈别詩春風十里揚州夢卷上珠簾總不如吉祥寺僧求閣名過眼榮枯電與風久長那得似花紅上人宴坐觀空閣觀色觀空色即空和劉道原見寄劉道原事見第三卷送道原歸覲南康詩注敢向清時怨不容直嗟吾道與君東坐談足使淮南懼歸去方知冀北空獨鶴不須驚夜旦羣烏未可辨雌雄廬山自古不到處得與幽人子細窮後漢鄭玄傳玄從馬融受業畢辭歸融喟然曰鄭生今去吾道東矣魏志郭嘉傳劉表坐談客耳漢汲黯傳淮南王謀反憚汲黯曰黯好直諌守節死誼至説公孫𢎞如發蒙耳左傳冀之北土馬之所生韓退之送溫造序伯樂一過冀北之野而馬羣遂空淮南子雞知將旦鶴知夜半詩小雅具曰豫聖誰知鳥之雌雄王注先生詩案云以譏當今進用雜亂無分别也和劉道原詠史仲尼憂世接輿狂臧穀雖殊竟兩亡吳客漫陳豪士賦桓侯初笑越人方名髙不朽終安用日飲無何計亦良獨掩陳編弔興廢窗前山雨夜浪浪莊子駢拇篇臧與穀二人相與牧羊而俱亡其羊問臧則挾策讀書問穀則博塞以遊二人者事業不同其於亡羊均也晉陸機傳機吳郡人齊王坰矜功自伐受爵不讓機惡之作豪士賦以刺之史記扁鵲傳姓秦氏名越人與虢中庶子論方曰越人之為方也不待切脈望色聽聲寫形言病之所在又過齊齊桓侯客之入朝見曰君有疾不治將深桓侯不應及病召扁鵲鵲巳逃去桓侯遂死曹大家東征賦惟令德為不朽兮身既殺而名存杜子美醉時歌名垂萬古知何用漢袁盎傳盎徙吳相辭行兄子種曰吳王驕日久國多姦南方卑濕絲能日飲亡何説王母反而已如此幸得脫按絲盎字也韓退之别知賦雨浪浪其不止雲浩浩其常浮和劉道原寄張師民仁義大捷徑詩書一旅亭相夸綬若若猶誦麥青青腐鼠何勞嚇髙鴻本自冥顚狂不用喚酒盡漸須醒莊子天運篇古之至人假道於仁托宿於義以遊逍遙之墟楚辭離騷夫唯捷徑以窘步列子仲尼篇處吾之家如逆旅之舍楞嚴經譬如行客投寄旅亭或食或宿事畢俶裝前塗不遑安住漢石顯傳顯與牢梁五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢邪石邪五鹿客邪邙何纍纍綬若若邪莊子外物篇儒以詩禮發冢者詩固有之曰青青之麥生於陵陂生不布施死何含珠為秋水篇惠子相梁莊子往見之或謂惠子曰莊子來欲代子相惠子恐莊子曰鴟得腐鼠鵷雛過之曰嚇今子欲以子之梁國而嚇我邪揚子鴻飛冥冥弋人何慕焉公烏臺詩話熙寧六年軾任杭州通判劉恕寄詩三首軾依韻和云云此詩譏諷朝廷近日進用之人以仁義為捷徑以詩書為逆旅但為印綬爵祿所誘則假六經以進如莊子所謂儒以詩禮發冡故云麥青青也譏之願爵位如鴟鳶以腐鼠嚇鴻鵠溺於利如人之醉於酒酒盡則自醒也送張職方吉甫赴閩漕六和寺中作杭州圖經六和寺開寶三年建太平興國五年改開化寺羡君超然鸞鶴姿江湖欲下還飛去空使吳兒怨不留青山漫漫七閩路門前江水去掀天寺後清池碧玉環君如大江日千里我如此水千山底白樂天懷錢舍人詩因詠松雪句永懷鸞鶴姿林世程閩中記閩之人居海塢有七種故謂之七閩秦時閩越王無諸王此地白樂天詩白浪掀天盡日風劉禹錫洛城舊居詩水繞庭臺碧玉環王注六和寺後有池蘇子美所賦金鯽魚是也雨中遊天竺靈感觀音院蠶欲老麥半黃前山後山雨浪浪農夫輟耒女廢筐白衣仙人在髙堂和蔡準郎中見邀遊西湖三首夏潦漲湖深更幽西風落木芙蓉秋飛雪暗天雲拂地新蒲出水栁映洲湖上四時看不足惟有人生飄若浮解顔一笑豈易得主人有酒君應留不見錢塘遊宦客朝推囚暮決獄不因人喚何時休賈誼服賦其生也若浮其死也若休列子黃帝篇自吾之事夫子友若人也五年之後始一解顔而笑城市不識江湖幽如與蟪蛄語春秋試令江湖處城市郤似麋鹿遊汀洲髙人無心無不可得坎且止乘流浮公卿故舊留不得遇所得意終年留君不見拋官彭澤令琴無絃巾有酒醉欲眠時遣客休莊子逍遙遊朝菌不知晦朔蟪蛄不知春秋漢賈誼傳乘流則逝兮得坎則止范傳正李翰林新墓碑偶乘扁舟一日千里或遇勝境終年不移晉陶潛傳性不解音聲而畜素琴一張絃徽不具郡將候潛逢其酒熟取頭上葛巾漉酒畢還復著之貴賤造之者有酒輒設潛若先醉便語客曰我醉欲眠卿可去田間決水鳴幽幽插秧未遍麥巳秋相攜燒笋苦竹寺郤下踏藕荷花洲船頭斫鮮細縷縷船尾炊玉香浮浮臨風飽食得甘寢肯使細故胸中留君不見壯士憔悴時飢謀食渴謀飲功名有時無罷休禮記月令孟夏之月靡草死麥秋至杜詩踏藕野泥中詩大雅釋之叟叟蒸之浮浮韓退之簟詩倒身甘寢百疾愈賈誼服賦細故蒂芥兮何足以疑史記孫武傳吳王曰將軍罷休和子由栁湖久涸忽有水開元寺山茶舊無花今嵗盛開二首太昊祠東鐵墓西一樽曽與子同攜回瞻郡閣遙飛檻北望檣竿半隱堤飯豆羮藜思兩鵠飲河噀水賴長霓如今勝事無人共花下壺盧鳥勸提左傳梓慎曰陳太昊之墟也先生志林云余舊過陳州留七十餘日近城可逰觀者無不至栁湖旁有邱俗謂之鐵墓云陳胡公墓也城濠水往往嚙其趾見有鐵錮之漢翟方進傳字子威初汝南有鴻隙大陂郡以為饒方進為相奏罷之王莽時常枯旱鄉中追怨謠曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黃鵠春秋元命苞虹霓者隂陽之精雄曰虹雌曰霓漢昭帝時天雨虹下屬宫中飲井水竭歐陽公詩獨有花上提壺盧勸我沽酒花前傾長明燈下石欄干長共松杉鬬嵗寒葉厚有稜犀甲健花深少態鶴頭丹久陪方丈曼陀雨羞對先生苜蓿盤雪裏盛開知有意眀年開後更誰看唐文粹有髙邁長明燈頌劉餗唐朝傳記江寧寺有晉長明燈嵗久火色變青而不熱隋文帝平陳已訝其古至今猶存劉禹錫詩長明燈是前朝熖曽照青青年少時杜子美海棕行龍鱗犀甲相錯落蒼稜白皮十抱文法華經天雨曼陀羅華閩川名士傳薛令之開元中為右庶子作詩曰朝日上團團照見先生槃槃中何所有苜蓿長欄干上幸東宫見之題其榜曰若嫌松桂寒任逐桑榆暖令之乃謝病六月二十七日望湖樓醉書五首黑雲翻墨未遮山白雨跳珠亂入船卷地風來忽吹散望湖樓下水如天杜子美茅屋歌俄頃風定雲墨色白樂天悟真寺詩赤日間白雨又三遊洞序水石相薄跳珠濺玉栁子厚詩桂嶺瘴來雲似墨洞庭春盡水如天李賀貝宫夫人詩空光帖妥水如天放生魚鱉逐人來無主荷花到處開水枕能令山俯仰風船解與月裴回天禧四年判杭州王欽若奏以西湖為放生池禁捕魚鳥為人主祈福杜詩桃花一蔟開無主烏菱白芡不論錢亂繫青菰裹緑盤一作綵槃忽憶嘗新會靈觀滯留江海得加餐周禮籩人之實菱芡栗脯注菱芰也芡雞頭也太史公自序留滯周南歐陽公食雞頭詩凝祥池鎖會靈園注京師賣五嶽觀雞頭最佳獻花遊女木蘭橈細雨斜風濕翠翹無限芳洲生杜若吳兒不識楚辭招任昉述異記木蘭川在尋陽江七里洲中有魯班刻木蘭舟至今猶在唐皇甫冉詩縈回楓葉岸留滯木蘭橈張志和漁父詞青篛笠緑簔衣斜風細雨不須歸楚辭宋玉招魂砥室翠翹挂曲瓊些劉禹錫詩拾羽翠翹翻屈原九歌采芳洲兮杜若將以遺兮下女杜子美詩夢歸歸未得不用楚辭招未成小隱聊中隱可得長間勝暫間我本無家更安往故鄉無此好湖山王康琚反招隱詩小隱隱陵藪大隱隱朝市白樂天中隱詩大隱住朝市小隱入邱樊邱樊太冷落朝市太囂喧不如作中隱隱在留司官唯此中隱士致身吉且安似出復似處非忙亦非間又和裴相間行詩偷間意味勝長間七月一日出城舟中苦熱涼飇呼不來流汗方被體稀星乍明滅暗水光瀰瀰香風過蓮芡驚枕裂魴鯉欠伸宿酒餘起坐濯清泚火雲勢方壯未受月露洗身微欲安適坐待東方啓杜子美詩汗流被我體又倦夜詩重露成涓滴稀星乍有無又貽栁少府詩火雲洗月露絶壁上朝暾詩小雅東有啓明毛傳日旦出謂明星為啓明宿餘杭法喜寺後緑野堂望吳興諸山懷孫莘老學士徙倚秋原上凄涼晚照中水流天不盡人遠思何窮問諜知秦過看山識禹功公自注餘杭始皇所舍舟也西北舟枕山堯時洪水繫舟山上稻涼初吠蛤栁老半書蟲荷背風翻白蓮腮雨退紅追遊慰遲暮覓句效兒童北望苕溪轉遙憐震澤通烹魚得尺素好在紫髯翁史記三代世表余讀諜記黃帝以來皆有年數秦始皇紀三十七年至錢塘臨浙江水波惡乃西從狹中渡注云餘杭也左傳昭公元年劉定公館於雒汭歎曰美哉禹功明德遠矣韓退之詩蛤即是蝦蟇漢五行志昭帝時上林栁樹斷仆地一朝起立生枝葉有蟲食葉成文曰公孫病已立杜子美詩蟲書玉佩蘚又示宗武詩覓句新知律杭州圖經苕水出天目山北入太湖乃古震澤也故老相傳夾岸多苕草秋風吹花浮如飛雪因以名溪古樂府飲馬長城窟行客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書王注張遼以紫髯將軍目孫權今莘老多髯又姓孫故用此事宿臨安淨土寺雞鳴發餘杭到寺已亭午參禪固未暇飽食良先務平生睡不足急掃清風宇閉門羣動息香篆起煙縷覺來烹石泉紫筍發輕乳晚涼沐浴罷衰髮稀可數浩歌出門去暮色入村塢微月半隱山圓荷爭瀉露相攜石橋上夜與故人語明朝入山房石鏡炯當路昔照熊虎姿今為猿鳥顧廢興何足弔萬世一仰俯晉孫綽天台賦羲和亭午遊氣高褰纂要日在午曰亭午李肇國史補湖州有顧渚紫筍茶陸羽茶經與楊祭酒書顧渚山中紫筍茶兩片一上太夫人一充昆弟同啜白樂天白蓮詩泄香銀囊破瀉露玉盤傾臨安縣圖經真寂院一名山房在石鏡山東吳興記臨安縣東石鏡徑二尺七寸甚清明四靣俱見人形吳越王錢鏐布衣時嘗照石鏡鏡起而聳戰自淨土步至功臣寺臨安圖經功臣山在縣南二里本名大官山吳越王錢氏建為功臣院祥符元年改賜今額落日岸葛巾晚風吹羽扇松間野步穩竹外飛橋轉神功鑿橫嶺巖石得巨片直度千人溝下有微流泫岡巒蔚回合金碧爛明絢緬懷異姓王負擔此鄉縣長逢跨下辱屢乞桑間飯誰謂山石頑識此希世彥凜然英氣逼屹起猶聳戰他年萬騎歸父老恣歡宴錦繡被原野金珠散貧賤竇融既入朝吳芮空記靣榮華坐銷歇閲世如郵傳惟有長明燈依然照金殿臨安圖經寺有溝名曰千人相傳錢氏役千人一日而成晉佛圖澄傳敕龍取水泫然微流西漢有異姓諸侯王表晉郭璞詩五百年生異姓王五代史吳越世家錢鏐字具美杭州臨安人也以販鹽為盜天復二年封越王昭宗詔圖形凌煙閣升衣錦營為衣錦城石鑑山曰衣錦山大官山曰功臣山鏐遊衣錦城宴故老山林皆覆以錦梁太祖即位封吳越王兼淮南節度使作還鄉歌曰三節還鄉兮挂錦衣父老逺來相追隨牛斗無孛人無欺吳越一王駟馬歸跨下用史記淮隂事桑間飯用左傳趙宣子靈輒事聳戰事見前篇石鏡注後漢竇融傳自以非舊臣一旦入朝在功臣之右每召見容貌辭氣卑恭巳甚帝以此愈親厚之漢吳芮傳髙祖以其將梅鋗有功從入武關故德芮徙封長沙王一年薨三國諸葛誕傳注魏黃初末盜發吳芮冢容貌如生後與發者見吳綱曰君何類長沙王但微短爾漢蓋寬饒傳平恩侯許伯入第寬饒卬視屋歎曰美哉然富貴無常忽則易人此如傳舍所閲多矣劉禹錫詩視身如傳舍閲世甚東流長明燈注見本卷遊徑山衆峰來自天目山勢若駿馬奔平川中途勒破千里足金鞭玉鐙相回旋人言山住水亦住下有萬古蛟龍淵道人天眼識王氣結茆宴坐荒山巔精誠貫山石為裂天女下試顔如蓮寒窗暖足來朴朔夜鉢呪水降蜿蜒雪眉老人朝扣門願為弟子長參禪爾來廢興三百載奔走吳會輸金錢飛樓湧殿壓山破朝鐘暮鼓驚龍眠晴空偶見浮海蜃落日下數投村鳶有生共處覆載內擾擾膏火同烹煎近來愈覺世議隘每到寬處差安便嗟余老矣百事廢郤尋舊學心茫然問龍乞水歸洗眼欲看細字銷殘年公自注龍井水洗病眼有效李照徑山山門事狀徑山乃天目東北峰也中有徑路以通天目故謂之徑山李白相逄行髙挹黃金鞭徐陵紫驑馬詩玉鐙繡纒鬃金鞍錦覆幪山門事狀徑山之頂乃天目龍之别居國一大師法欽初隱此山頂有素衣老人前致拜曰我龍也自師到山吾屬五百皆不安我將挈歸天目願捨此為立錫地乃請師南登絶頂入五峰之間中有大湫指謂師曰吾家去此湫當漲矣留一六之水慎勿堙之我將時至衛師焉今一六見存謂之龍井又國一大師初入山遇獵者以其地結草菴請師居之其後龍湫既平北峰之陽復有草菴可居師乃止焉菴蓋龍所為今菴基在而草不生又師一日坐石屛之下有白衣士自言是天目中子山人也長安佛法有難聞師道行髙邈願度為沙彌往救師曰汝有何術曰我誦俱􅀈觀音呪功力無比師欲驗之乃曰吾坐後石屏汝能呪之令破否曰可遂叱之石屏裂為三片今謂之喝石巖師知神異為剃髮賜名惠崇至京師與術士競勝之四十二章經天神獻玉女於佛欲以試佛佛言革囊衆穢爾來何為去吾不用汝僧皎然答李季蘭詩天女來相試將花欲染衣山門事狀常有白二跪於杖屨之間古樂府木蘭歌雄腳朴朔雌眼迷離王注引抱朴子云外國方士能神呪者臨川禹步吹氣龍即浮出長十餘丈方士一吹縮至一寸取著壺中遇旱出龍而雨集呪水降龍此事相類史記天官書海旁蜃氣象樓臺韓退之詩頃刻青紅浮海蜃莊子人間世山木自寇也膏火自煎也公烏臺詩話熙寧六年遊徑山留題云近來愈覺世議隘每到勝處差安便以譏諷朝廷進用之人多是刻薄褊隘不少容人過失見山中寬間之處為樂也自徑山回得吕察推詩用其韻招之宿湖上吕名仲甫字穆仲丞相文穆公蒙正孫多君貴公子愛山如愛色心隨葉舟去夢繞千山碧新詩到中路令我喜折屐古來軒冕徒操捨兩悲栗數朝辭簮笏兩腳得暫赤歸來不入府郤走湖上宅寵辱吾久忘寧畏官長詰飄然便歸去誰在子思側君能從我遊出郭及未黑軒后本紀見浮葉乃為舟觀轉篷乃作車晉謝安傳兄子玄破苻堅驛書至安方對客圍棊了無喜色既罷還內過户限心喜甚不覺屐齒之折莊子天運篇親權者不能與人柄操之則栗捨之則悲杜子美詩南望青松駕短壑安得赤腳踏層冰又逼仄行徒步翻愁官長怒又鄭廣文詩醉則騎馬歸頗遭官長罵宿望湖樓再和新月如佳人出海初弄色娟娟到湖上瀲瀲搖空碧夜涼人未寢山靜聞響屐騷人故多感悲秋更憀栗君胡不相就朱墨紛黝赤我行得所嗜十日忘家宅但恨無友生詩病莫訶詰君來試吟詠一作味定作鶴頭側改罷心愈疑滿紙蛟蛇黑髙適人日寄杜二詩栁條弄色不忍見鮑明逺玩月詩娟娟似蛾睂白樂天西湖晚歸詩煙波淡蕩搖空碧南史謝靈運傳尋山涉嶺必造幽峻登躡嘗著木屐上山則去其前齒下山則去其後齒楚辭宋玉九歌悲哉秋之為氣也蕭瑟兮草木搖落而變衰憀栗兮若在逺行北史蘇綽傳拜大行臺右丞始制文案程式朱出墨入及計帳户籍之法曹子建與楊德祖書劉季緒才不逮作者而好詆訶文章掎托利病杜詩新詩改罷自長吟夜泛西湖五絶新月生魄迹未安才破五六漸盤桓今夜吐艷如半璧遊人得向三更看生魄注見本卷遊金山詩杜子美新月詩影斜輪未安盧同月蝕詩初露半箇璧漸吐滿輪魄三更向闌月漸垂欲落未落景特奇明朝人事誰料得看到蒼龍西沒時漢天文志東宫蒼龍星按蒼龍角亢之宿夜半而沒蒼龍已沒牛斗橫東方芒角升長庚漁人收筒及未曉船過惟有菰蒲聲公自注湖上禁漁皆盜釣者也漢天文志天一槍棓矛盾動搖角大兵起注角芒角也後漢天文志長庚廣如一匹布著天菰蒲無邊水茫茫荷花夜開風露香漸見燈明出逺寺更待月黑看湖光湖光非鬼亦非仙風恬浪靜光滿川須臾兩兩入寺去就視不見空茫然施注蘇詩卷四
