body:
  text: 施注蘇詩别集類二宋提要臣等謹按蘇詩四十二卷宋施元之注附東坡年譜一卷王注正訛一卷補遺二卷則邵長蘅等續編也元之字德初吳興人陸游作是書序伹稱其官曰司諌其始末則無考矣其同注者為吳郡顧禧游序所謂助以顧君景繁之賅洽也元之子宿又為補綴書録解題所謂其子宿從而推廣且為年譜以傳於世也吳興掌故但言宿推廣為年譜不言補注與書録解題不同今考書中實有宿注則吳興掌故漏矣嘉泰中宿官餘姚嘗以是書刋板竟緣是遭論罷故傳本頗稀世所行者惟王十朋分類注本康熙已卯宋犖官江蘇巡撫始得殘本於藏書家巳佚其卷一卷二卷五卷六卷八卷九卷二十三卷二十六卷三十五卷三十六卷三十九卷四十犖屬長洲邵長蘅補其闕卷長蘅撰王注正訛一卷又訂定王宗稷年譜一卷冠於集首其注則僅補八卷以病未能卒業更倩髙郵李必恆績成三十五卷三十六卷三十九卷四十卷犖又托拾遺詩為施氏所未收者得四百餘首别屬錢塘馮景注之重為刋板乾隆初又詔內府刋為巾箱本取擕既便遂衣被彌宏元之原本注在各句之下長蘅病其間隔乃彚注於篇末又於原注多所刋削或失其舊後查慎行作蘇詩補注頗斥其非亦如長蘅之詆王注然數百年沉晦之笈實由犖與長蘅復見於世遂得以上邀乙夜之觀且剞􅩻棗梨夀諸不朽其功亦何可盡沒歟乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5e795251fa3cc40e925cd245bf8d8e8eaf69c116d262e2084a1203754fc1ff30
