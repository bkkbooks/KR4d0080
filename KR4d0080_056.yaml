body:
  text: 施注蘇詩卷四十二宋蘇軾撰施元之原注武進邵長蘅刪補追和陶淵明詩六十首讀山海經淵明讀山海經十三首其七皆仙語余讀抱朴子有所感用韻賦之晉葛洪字稚川止羅浮山鍊丹自號抱朴子因以名書今日天始霜衆木斂以疏幽人掩關一作忩卧明景翻空廬開心無良友寓眼得奇書建德有遺民道逺我無車無糧食自足豈謂穀與蔬愧此稚川翁千載與我俱畫我與淵明可作三士圗學道雖恨晚賦詩豈不如莊子山木篇南越有邑焉名為建德之國其民愚而朴少私而寡欲云云君曰彼其道逺而險又有江山我無舟車奈何市南子曰君無形倨無留居以為君車君曰彼其道幽逺而無人吾誰與為鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足稚川雖獨善愛物均孔顔欲使蟪蛄流知有龜鶴年辛勤破封蟄苦語劇移山博哉無窮利千載食此言抱朴子論仙篇或問曰古人推龜鶴於别類以死生為朝暮而吾子乃欲延蟪蛄之命令有歷紀之夀吾子不亦謬乎莊子蟪蛄不知春秋此小年也郭景純遊仙詩借問蜉蝣輩寧知龜鶴年淵明雖中夀雅志仍丹邱逺矣無懷民超然邈無儔竒文出纊息豈復生死流我欲作九原異世為三遊莊子上夀百嵗中夀八十下夀六十楚辭逺遊仍羽人於丹邱兮留不死之舊鄉陶淵明五柳先生傳酣歌賦詩以樂其志無懷氏之民歟葛天氏之民歟又臨終自為祭文及與儼等疏具集中禮記屬纊以俟氣絶子政信竒逸妙算窮隂陽淮南枕中訣養練嵗月長豈伊臭濁中爭此頃刻光安知青藜火丈人非中黃漢劉向傳字子政淮南枕中鴻寶苑祕書言神仙使鬼物為黃金之術向幼而讀誦以為竒互見十二卷贈王仲素詩注王子年拾遺記劉向正月十五夜校書天祿閣有老人著黃衣植青藜杖見向暗中誦書老人吹杖端煙然因以照坐與向説開闢以前事授以五行洪範之文抱朴子仙藥篇中黃子有服食節度極言篇黃帝適東岱而奉中黃亂離棄弱女破冢割恩憐寧知效龜息三嵗號窮山長生定可學當信仲弓言支牀竟不死抱一無窮年抱朴子故太邱長陳仲弓篤論士也撰異聞記云其郡人張廣定者遭亂當避有一女年四嵗不能步涉又不可擔負計棄之固當餓死不欲令其骸骨之露村側有大古冢先有穿穴乃以器盛縋之下此女於冢中以數月許乾飯及水漿與之而捨去後三年廣定乃得還鄉欲收所棄女骨其女故坐冢中見其父母猶識之父母甚喜初猶恐其鬼也入就之乃知其不死問從何得食女言糧初盡時見冡角有一物伸頸吞氣試效之輒不復飢日月為之以至於今廣定索女所言物乃是一大龜耳二山在咫尺靈藥非草木元芝生太元黃精出長谷仙都浩如海豈不供一浴何當從山火束緼分寸燭枹朴子微旨論或曰竊聞求生之道當知二山不審此山為何所在曰有之夫太元之山難知易求不天不地不沈不浮元芝萬株絳樹時生此一山也長谷之山杳杳巍巍元雲飄飄玉液霏霏有道之士登之不衰採服黃精以致天飛此二山也皆古賢之所祕子精思之漢蒯通傳束緼請火蜀士李八百穴居吳山隂默坐但形語從者紛如林其後有李寬雞鵠非同音口耳固多偽識真要在心抱朴子吳大帝時蜀中有李阿者穴居不食世傳見之號為八百嵗翁人往問事阿無所言但瞻顔色後一旦忽去不知所在後有一人姓李名寬到吳而蜀語能咒水治病頗愈於是逺近翕然謂寬為李阿因共呼為李八百而實非也了無治身之要後有見寬者與凡人無異及吳大疫寬亦得溫病死於廬中而事寬者猶謂之化形尸解之仙非真死也黃花冒甘谷靈根固深長葛井窖丹砂紅泉湧尋常二女戲口鼻一作耳松膏以為糧聞此不能寐起坐夜未央抱朴子南陽酈縣山中有甘谷水所以甘者谷上下左右皆生甘菊菊花墮其中故水味為變谷中居民飲甘谷水者無不老夀此菊力也又臨沅縣有民世年百嵗或八九十是宅井水殊赤試掘之左右得古埋丹砂數十斛砂汁因泉入井故飲而得夀已見前注又上黨有趙瞿者病癩歷年垂死有仙人以囊藥賜之曰此是松脂耳汝錬服之可以長生不死瞿服之年百七十嵗夜見面上有采女二長二三寸遊戲口鼻之間如是且一年此女長如大人在側又嘗聞琴瑟之音欣然獨笑在人間二百許年色如少童乃入抱犢山去必地仙也談道鄙俗儒逺自太史走仲尼實不死於聖亦何負紫文出吳宫丹雀本無有遼哉廣桑君獨顯三季後荀子儒效篇􅀈然若終身之虜而不能有他志是俗儒者也抱朴子辨問篇俗儒云聖人所不能則餘人皆不能未聞周孔能為斯事也或曰周孔皆能為此但不為爾吾答之曰必若所云者吾亦可以言周孔皆以升仙但以此法不可以訓世恐人皆知不死之可得故周孔密自為之而祕不告人吳王伐石以治宫室而於合石之中得紫文金簡之書不能讀使使者持以問仲尼而欺仲尼曰吳王間居有赤雀銜書以置殿上不知其義故逺咨呈仲尼視之曰此乃靈寶之方長生之法禹之所服隱在水邦年齊天地朝於紫庭者也禹將仙化封之名山石函之中今乃赤雀銜之殆天授也以此論之是夏禹不死也而仲尼又知之安知仲尼不皆密修其道乎金丹不可成安期渺雲海誰謂黃門妻至道乃近在尸解竟不傳化去空餘悔丹成亦安用御氣本無待真誥葛洪內篇漢期門郎程偉妻能通神變化煎水銀成銀偉從受方妻謂偉骨相不應得之逼之不已妻乃尸解去抱朴子云黃門郎莊子逍遙遊乘天地之正而御六氣之辨以遊無窮者彼且惡乎待哉鄭君故多方元翁所親指竒文二百篇了未出生死素書在黃石豈敢辭跪履萬法等成壞金丹差可恃晉葛洪傳從祖玄學道得仙以其鍊丹祕術授鄭隱洪就隱學悉得其法抱朴子余晚充鄭君門人請見方書先以道家訓戒書近百卷稍稍示余余頗以其疑事咨問之鄭君言君才可教也今當以佳書相示久之漸得見短書縑素所寫者積年之中合集所見二百許卷跪履張良事已見仙傳拾遺張良葬於龍首原赤眉之亂人發其墓但見黃石枕化而飛去得素書一篇云抱朴子鄭君語余曰雜道書卷有佳事但當校其精粗擇所施行若金丹一成此輩一切不用也古強本妄庸蔡誕亦夸士曼都斥仙人謁帝輕舉止學道未有得自欺誰不爾稚川亦隘人疏録此庸子抱朴子昔有古強者食草木之方年八十許尚聰明時人便謂之仙人而強曽略涉書記頗識古事自言已四千嵗敢為虗言言之不怍此皆有名無實使世間不信天下有神仙皆坐此輩以偽亂真也五原有蔡誕者好道而不得佳師廢棄家業走之深山中三年飢凍辛苦久而不堪還家黑瘦骨立不復似人其家問之因欺家云吾未能升天但為地仙也為老君牧龍因與諸仙博戲忽失此龍以罪見謫送付崑崙山下藝鋤芝草法當十年乃得原會偓佺子王喬諸仙來按行為吾作力且得放歸於是遂老死矣河東蒲坂有項曼都者入山學仙十年而歸家云曽到天上仙人以流霞一杯飲我輒不飢渴忽然思家到天帝前謁拜失儀見斥河東因號曼都為斥仙人世多此輩種類非一不可不詳也東坡信畸人涉世真散材仇池有歸路羅浮豈徒來踐蛇及茹蠱心空了無猜攜手葛與陶歸哉復歸哉莊子畸於人而侔於天仇池注再見又先生常夢至仇池詳載桃花源詩引見本卷後韓退之憶昨行踐蛇茹蠱不擇化忽有飛詔從天來伾文未揃崖州熾雖得赦宥恆愁猜還舊居夢歸白鶴山居作痿人常念起夫我豈忘歸不敢夢故山恐興墳墓悲生世本暫寓此身念念非鵝城亦何有偶拾鶴毳遺窮魚守故沼聚沫猶相依大兒當門户時節供丁推夢與鄰翁言憫然憐我衰往來付造物未用相招麾漢韓王信傳僕之思歸如痿人不忘起盲者不忘視莊子魚相煦以溼相濡以沫杜子美詩大兒久在外門户無人持宋敏求春明退朝録吳正肅育言律令有丁推推字不通少壯之意當是丁稚唐以高宗諱避之損其點畫爾史記汲黯傳嚴助曰使黯任職居官無以踰人然至其輔少主守城深堅招之不來麾之不去雖自謂賁育亦不能奪之矣止酒丁丑嵗余謫海南子由亦貶雷州五月十一日相遇於藤同行至雷六月十一日相别渡海余時病痔呻吟子由亦終夕不寐因誦淵明詩勸余止酒乃和元韻因以贈别庶幾真止矣時來與物逝路窮非我止與子各意行同落百蠻裏蕭然兩别駕各攜一稚子子室有孟光我室惟法喜相逄山谷間一月同卧起茫茫海南北粗亦足生理勸我師淵明力薄且為巳微疴坐杯酌止酒則瘳矣望道雖未濟隱約見津涘從今東坡室不立杜康祀唐王績傳所居東南有磐石立杜康祠祭之西田穫早稻蓬頭三獠奴誰謂願且端晨興灑掃罷飽食不自安願治此圃畦少資主遊觀晝功不自覺夜氣乃潛還早韭欲爭春晚菘先破寒人間無正味美好出艱難蚤知農圃樂豈有非意干尚恨不持鋤未免騂我顔此心茍未降何適不間關休去復歇去菜食何所歎北史蠻獠傳南方曰蠻其流曰蛋曰獠南史周顒清貧寡欲終日長蔬食文惠太子問菜食何味最勝曰春初早韭秋末晚菘傳燈録石霜和尚有僧入室石霜云休去歇去下潠田舍穫聚糞西垣下鑿泉東垣隈勞辱何時休宴安不可懷天公豈相喜雨霽與意諧黃松養土膏老楮生樹雞未忍便烹煮繞觀日百回跨海得逺信冰槃鳴玉哀茵蔯點膾縷照坐如花開一與蛋叟醉蒼顔兩摧頽齒根日浮動自與粱肉乖食菜豈不足呼兒折雞栖左傳閔公元年管敬仲言於齊侯曰宴安鴆毒不可懷也杜子美詩一日須來一百回韓退之李花詩氷盤夏薦碧實脆杜子美乞瓷碗詩大邑燒瓷輕且堅扣如哀玉錦城傳又詩楝樹寒雲色茵陳春藕香使都經錢溪遊城南謝氏廢園作喬木卷蒼藤浩浩崩雲積謝家堂前燕對語非宿昔仰看桄榔樹元鶴舞長翮新年結荔子主人黃壤隔溪隂宜館我稍省薪水役相如賣車騎五畝亦可易但恐鵩鳥來此生還蕩析誰能插籬槿護此殘竹柏赴假金陵夜行郊行步月作缺月不蚤出長林踏青冥犬吠主人怒愧此閭里情怪我夜不歸茜袂窺柴荆雲間與地上待我兩友生驚鵲再三起樹端已微明白露淨原野始覺邱陵平暗蛩方夜績孤螢亦宵征歸來閉户坐寸田且默耕莫赴花月期免為詩酒縈詩人如布榖聒聒常自鳴擬古九首有客叩我門繫馬門前柳庭空鳥鵲散門閉客立久主人枕書卧夢我平生友忽聞剝啄聲驚散一杯酒倒裳起謝客夢覺兩愧負坐談雜今古不答顔愈厚問我何處來我來無何有酒盡君可起我歌已三終由來竹林人不數濤與戎有酒從孟公慎勿從揚雄﨑嶇頌沙麓塵埃汗西風昔我未嘗逹今者亦安窮窮逹不到處我在阿堵中説苑孔子遭難陳蔡之境歌兩柱之間子路援干而舞三終而出南史顔延之五君詠山濤王戎以貴顯被黜再見漢陳遵字孟公屢見漢元后傳后薨王莾詔揚雄作誄曰大隂之精沙麓之靈作合于漢配元生成晉顧愷之傳傳神寫照正在阿堵中再見客去室幽幽服鳥來坐隅引吭伸兩翮太息意不舒吾生如寄耳何者為我廬去此復何之少安與汝居夜中聞長嘯月露荒榛蕪無問亦無答吉凶兩何如少年好逺遊蕩志隘八荒九夷為藩籬四海環我堂盧生與若士何足期渺茫稍喜海南州自古無戰場竒峰望黎母何異嵩與邙飛泉寫萬仞舞鶴雙低昻分㳅古文流字未入海膏澤彌此方芋魁儻可飽無肉亦奚傷楚辭逺遊悲時俗之迫隘兮願輕舉以逺遊神仙傳若士謂盧敖曰吾方與汗漫期於九垓之外屢見九域志儋州有黎母山水馮洗古烈婦翁媪國於兹䇿勳梁武後開府隋文時三世更險易一心無磷緇錦繖平積亂犀渠破餘疑廟貌空復存碑板漫無辭我欲作銘志慰此父老思遺民不可問僂句莫余欺犦牲菌雞卜我當一訪之銅鼓壺盧笙歌此迎送詩北史列女傳譙國夫人洗氏世為南越首領在父母家撫循部衆能壓服諸越海南儋耳歸附者千餘洞梁大同中高涼太守馮寶聘以為妻高州刺史李遷仕反夫人擊之大捷及寶卒嶺表大亂夫人懷集百越數州晏然陳永定二年廣州刺史歐陽紇反夫人發兵拒境詔使持節册夫人為高源郡太夫人儀如刺史陳亡隋文帝遣陳主遺書諭之歸化夫人得信驗盡日慟哭親披甲乘介馬張錦繖領彀騎衛詔使巡撫諸州封譙國夫人每嵗時大會陳所賜物於庭以示子孫曰我事三代主惟用一好心今賜物具存此忠孝之報國語奉文犀之渠注云甲也僂句龜也事出左傳巳見史記封禪書令越巫立越祝祠而以雞卜畨禺雜編嶺表之人凡小事必卜其名雞卜鼠卜米卜蓍卜牛骨卜雞卵卜田螺卜篾竹卜嶺表録異銅鼓蠻夷之樂形如腰鼓一頭有面頭面圎二尺許用銅鑄其身遍有蟲魚草木之狀擊之響亮不下鳴鼉胡盧笙交址人多取無柄之瓠剖而為笙上安十三簧吹之音律清響雅合律吕沈香作庭燎甲煎紛相和豈若注微火縈煙嫋清歌貪人無飢飽胡椒亦求多朱劉兩狂子公自注朱初平劉誼欲冠帶黎人以取水沈隕墜如風花本欲竭澤漁奈此明年何説苑庭燎大燭也詩有庭燎篇禮記庭燎之百自齊桓公始也南史范曄傳撰和香方以比類朝士其序曰沈實易和以自比也甲煎淺俗比徐湛之也胡椒暗使元載事已見史記孔子世家竭澤涸漁則蛟龍不合隂陽呂氏春秋晉文公與楚人戰城濮雍季曰竭澤而漁豈不獲得而明年無矣雞窠養鶴髮及與唐人遊來孫亦垂白頗識李崖州再逢盧與丁閲世真東流斯人今在亡未遽掩一邱我師吳季子守節到晚周一見春秋末渺焉不可求錢希白洞微志太平興國中李守忠奉使南方過海至瓊州界逄一翁自稱楊遐舉年八十一邀守忠詣其家見其父叔皆年一百二十餘又見其祖曰宋卿年一百九十五語次見梁上雞窠中有小兒出頭下視宋卿曰此九代祖也不語不食不知其年朔望取下子孫列拜而已爾雅曽孫之子為元孫元孫之子為來孫崖州謂唐相李德裕也德裕大中二年貶崖州司户參軍洞微志云李守忠見宋卿訪及往時韋執誼李德裕二相經由宋卿曰李太尉到朱崖雖不多時尚時時令人北去買藥其時某以小吏亦三獻厨料於太尉觀太尉方正端重實為名相雖遷降南荒茅茨之下了無介懷盧丁謂盧多遜丁謂也盧丁皆貶崖州司户參軍漢楊惲傳古與今如一邱之貉蘅按公詩反用其語似謂李與盧丁賢姦之不同也盧丁乃其本朝故語意特深渾左傳襄三十一年吳屈狐庸言於趙文子曰季子守節者也雖有國不立城南有荒池瑣細誰復採幽姿小芙渠香色獨未改欲為中州信浩蕩絶雲海遙知玉井蓮落蘂不相待攀躋及少壯已矣一作失那容悔黎山有幽子形稿神獨完負薪入城市笑我儒衣冠生不聞詩書豈知有孔顔翛然獨往來榮辱未易關日暮鳥獸散家在孤雲端問答了不通歎息指屢彈似言君貴人草莽栖龍鸞遺我古貝布海風今嵗寒莊子大宗師翛然而往翛然而來舊唐書南蠻傳婆利國有古貝草緝花以作布粗者名白㲲畨禹雜編嶺南雍容皆有古貝樹語訛為劫貝其花蘂似茸絲以線碢子績之織為布戴主簿海南無冬夏安知嵗將窮時時小搖落榮悴俯仰中上天信包荒佳植無由豐鉏耰待肅殺有擇非霜風手栽蘭與菊侑我清宴終擷芳眼已明飲酒腹尚沖草去土自隤井深墻愈隆勿笑一畝園蟻垤齊衡嵩嶺表録異廣南節氣四季溫燉當盛暑北風而雨便似窮秋或嚴冬南風而晴郤如初夏時之寒暑繫在隂晴彼人謂之溫天怨詩示龎鄧當歡有餘樂在戚亦頽然淵明得此理安處故有年嗟我與先生所賦良竒偏人間少宜適惟有歸耘田我昔墮軒冕毫釐真市㕓困來卧重裀憂愧自不眠如今破茅屋一夕或三遷風雨睡不知黃葉滿枕前寧當出怨句慘慘如孤煙但恨不蚤悟猶推淵明賢劉子厚乞巧文胡為賦授有此竒偏劉楨贈徐幹詩起坐失次第一日三四遷劉柴桑紅薯與紫芋逺插墻四周且放幽蘭春莫爭霜菊秋窮冬出甕盎磊落勝農疇淇上白玉延公自注淇上出山藥一名玉延能復過此不一飽忘故山不思馬少遊與殷晉安别送昌化軍使張中張中事見三十八卷新居詩注孤生知永棄末路嗟長勤久安儋耳陋日與雕題親海國此竒士官居我東鄰卯酒無虗日夜棊有逹晨小甕多自釀一瓢時見分仍將對牀夢伴我五更春暫聚水上萍忽散風中雲恐無再見日笑談來生因空吟清詩送不救歸裝貧禮記王制雕題交址有不火食者矣白樂天答元微之詩與君相遇知何處兩葉浮萍大海中劉禹錫寄僚友詩故人雲雨散滿目山川多田舍始春懷古儋人黎子雲兄弟居城東南躬農圃之勞偶與軍使張中同訪之居臨大池水木幽茂坐客欲為醵錢作屋余亦欣然同之名其屋曰載酒堂用淵明懷古田舍韻作二首退居有成言垂老竟未踐何曽淵明歸屢作敬通免休間等一味妄想生愧靦公自注淵明本用緬字今聊取其同音聊將自知明稍積在家善城東兩黎子室邇人自逺呼我釣其池人魚兩忘返使君亦命駕恨子林塘淺後漢馮衍字敬通為曲陽令論功當封以讒毁故賞不行帝將召見王護等排間由此得罪顯宗即位又多短衍以文過其實遂廢於家詩小雅有靦靣目注靦面慙也詩國風其室則邇其人甚逺白樂天渭上釣詩况我垂釣意人魚又兼忘茅茨破不補嗟子乃爾貧菜肥人愈瘦竈間井亦勤我欲致薄少解衣勸坐人臨池作虗堂雨急瓦聲新客來有美載果熟多幽欣丹荔破玉膚黃柑溢芳津借我三畝地結茅為子鄰鴂舌儻可學化為黎母民韓退之寄盧同詩時致薄少助祭祀按廣輿記載黎子雲兄弟貧而好學所居多林木水竹東坡嘗造訪遇雨從農家借笠著屐小兒隨行調笑云云今世傳東坡冒雨圗即此事也故附著之停雲自立冬以來風雨無虛日海道斷絶不得子由書乃和淵明停雲詩以寄停雲在東黯其將雨嗟我懷人道修且阻眷此區區俯仰再撫良辰過鳥逝不我佇莊子其疾俯仰之間再撫四海之外颶作海渾天水溟濛雲屯九河雪立三江我不出門寤寐北窗念彼海康神馳往從南越志颶風具四方之風也嘗以五六月興杜子美朝獻太清宫賦九天之雲下垂四海之水皆立再見凜然清癯落其驕榮餽奠化之廓兮忘情萬里遲子晨興宵征逺虎在側以寧先生遲逺子由二子也逺小字虎兒對奕未終摧然斧柯再遊蘭亭默數永和夢幻去來誰少誰多彈指太息浮雲幾何述異記信安山冇石室王質入其室見童子對棊質觀之局未終視所執斧柯已朽爛矣晉王羲之蘭亭敘曰永和九年暮春之初會于蘭亭修禊事也勸農海南多荒田俗以貿香為業所産粳稌不足於食乃以薯芋雜米作粥糜以取飽豫既哀之乃和淵明勸農詩以告其有知者咨爾漢黎均是一民鄙夷不訓夫豈其真怨忿劫質尋戈相因欺謾莫訴曲自我人後漢順帝紀益州盜賊劫質令長殺列侯左傳昭公元年日尋干戈以相征討天禍爾土不麥不稷民無用物怪珍是植播厥薰木腐餘是穡貪夫汚吏鷹摯狼食漢酷吏傳義縱以鷹擊毛摯為治豈無良田膴膴平陸獸蹤交締鳥喙諧穆驚麏朝射猛豨夜逐芋羮薯麋以飽耆宿毛詩周原膴膴堇荼如飴聼我苦言其福永久利爾鉏耜好爾鄰偶斬艾蓬藋南東其畝父兄搢梃以抶遊手左傳昭十六年庸次比耦以艾殺此地斬之蓬蒿藜藋而共處之詩小雅我疆我理南東其畝左傳襄十七年子罕親執朴以抶其不勉者後漢章帝紀元和三年勸農詔曰務盡地力勿令遊手天不假易亦不汝匱春無遺勤秋有厚冀雲舉雨決婦姑畢至我良孝愛袒跣何愧左傳桓十三年夫人鄧曼曰見莫敖而告諸天之不假易也漢書溝洫志鄭國在前白渠起後舉臿為雲決渠為雨逸諺戲侮博奕頑鄙投之生黎俾勿冠履霜降稻實千箱一軌大作爾社一醉醇美尚書無逸乃逸乃諺既誕否則侮厥父母生黎見三十八卷用過韻冬至詩注毛詩乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶雜詩十一首斜日照孤隙始知空有塵微風動衆竅誰信我忘身一笑問兒子與汝定何親從我來南海幽絶無四鄰耿耿如缺月獨與長庚晨此道固應爾不當怨尤人故山不可到飛夢隔五嶺真遊有黃庭閉目寓兩景室空無可照火滅膏自冷披衣起視夜海闊河漢永西窗半明月散亂梧楸影良辰不可繫逝水無由騁我苖期後枯持此一念靜黃庭經注脾中央即黃庭之宫又黃庭有內景外景真人有妙觀俗子多妄量區區勸粒食此豈知子房我非徒跣相終老懷未央兔死縛淮隂狗功指平陽哀哉亦可羞世路皆羊腸史記留侯學辟榖道引輕身吕后德留侯乃強食之漢蕭何傳為相國後下廷尉數日赦出何徒跣入謝又上曰諸君徒能得獸耳功狗也至如蕭何發縱指示功人也列侯畢已受封奏位次皆曰平陽侯曹參宜第一上善鄂千秋言乃令何第一漢韓信傳高祖令武士縛信載後車信曰果若人言狡兔死良狗烹械信至洛陽赦以為淮隂侯酈道元水經注羊腸坂在晉陽西北石磴縈委若羊腸故取名焉相如偶一官嗤鄙蜀父老不記犢鼻時滌器混傭保著書曽幾何渴肺灰土燥琴臺有遺魄笑我歸不蚤作書遺故人皎皎我懷抱餘生幸無愧可與君平道九域志成都府古迹有司馬相如琴臺漢書王吉貢禹傳序蜀有嚴君平卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜而言利害孟德黠老狐姦言嗾鴻豫哀哉喪亂世梟鸞各騰翥逝者知幾人文舉獨不去天方斫漢室豈計一郗慮昆蟲正相齧乃比藺相如去聲我知公所坐大名難久住細德方險微豈有容公處既往不可悔庶為來者懼後漢孔融傳字文舉曹操忌融正議慮鯁大業山陽郗慮承望風旨奏免融官因顯明讎怨操故書激厲融曰亷藺小國之臣猶能相下國家東遷文舉盛歎鴻豫名實相副鴻豫亦稱文舉竒逸博聞誠怪今者與始相違操既積嫌忌郗慮復搆成其罪遂令路粹枉狀奏融下獄棄市慮字鴻豫史記越世家范蠡曰大名之下難以久居賈誼弔屈原賦見細德之險微兮遙增擊而去之博大古真人老聃關尹喜獨立萬物表長生乃餘事稚川差可近儻有接物意我頃登羅浮物色恐相值徘徊朱明洞沙水自清駛滿把菖蒲根歎息復棄置莊子天下篇關尹老聃古之博大真人哉朱明洞詳三十五卷遊羅浮山公自注藍喬近得道常苦世褊迫西遊王屋山不踐長安陌爾來寧復見鳥道度太白昔與吳逺遊同藏一瓢窄潮陽隔雲海嵗晚儻見客伐薪供養火看作栖鳯宅英州鄭總作藍喬傳喬字子升循州龍川人母陳氏禱羅浮山而孕年十二已能為詩文求道書讀之辭母之江淮抵京師七年而歸語母曰兒所以復返者念母故也瓢中出丹一粒餽焉以黃金數斤遺母曰是真氣所成潮州人吳子野遇之於京師方大暑同登汴橋買瓜喬曰塵埃汙吾瓜當於水中噉爾自擲於河至夜不出吳候其邸則已酣寢始知喬已得道遂與執㸑語人曰吾羅浮仙人也由此升天矣一日躡風雲而上征宫中歷歷聞笙簫聲猶長吟李太白詩云下窺夫子不可及矯首相思空斷腸吳子野嘗謁東坡於惠州南榮晚聞道未肻化庚桑陶頑鑄強獷枉費塵與粳越子古成之韓生教休糧參同得靈鑰九鐰啓伯陽鵝城見諸孫貧苦我為傷空餘焦先室不傳元化方遺像似李白一奠臨江觴神仙傳魏伯陽得神丹元奧之理微顯闡幽著參同契三卷隱丹經金匱九籥有九轉丹法籥所以藏書也後漢華他傳字元化精於方藥為曹操所殺臨死出一卷書與獄吏曰此可以活人吏畏法不敢受他索火燒之餘齡難把玩妙解寄筆端常恐抱永歎不及邱明遷親友復勸我放心餞華顛虛名非我有至味知誰餐思我無所思安能觀諸緣已矣復何歎舊説易兩篇申韓本自聖陋古不復稽巨君縱獨欲借經作巖崖遂令青襟子珠璧人人懷鑿齒井蛙耳信謂天可彌大道久分裂破碎日愈離我如終不言誰悟角與羈吾琴豈得已昭氏有成虧史記申韓傳申不害荆人也申子之學本於黃老而主刑名韓非韓之諸公子也喜刑名法術之學而其歸本於黃老漢王莽傳字巨君奏起明堂辟雍靈臺為學者築舍萬區益博士員徴天下通一藝教授十一人以上及有逸禮古書毛詩周官爾雅通知其意者詣公車晉習鑿齒傳釋道安與鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒再見漢夏侯勝傳章句小儒破碎大道昭氏成虧出莊子齊物論已見三十八卷鉼笙詩我昔登朐山出日觀滄涼欲濟東海縣恨無石橋梁今兹黎母國何異于公鄉蠔浦既黏山暑退亦飛霜所欣非自誷不怨道里長九域志海州東海郡朐山縣滄涼字出列子已見三十五卷浴日亭詩注番禺雜編蠔殼即牡礪有高四五尺者水底見之如山岸呼為蠔山韓退之初南食詩蠔相黏為山南史張融海賦積雪中春飛霜暑路連雨獨飲吾謫海南盡賣酒器以供衣食獨有一荷葉杯工製美妙留以自娛乃和淵明連雨獨飲二首平生我與我舉意輒自然豈止磁石鐵雖合猶有間此外一子由出處同偏仙晚景最可惜分飛海南天糾纆不吾欺寧此憂患先顧引一作影一杯酒誰謂無往還寄語海北人今日為何年醉裏有獨覺夢中無雜言晉殷浩傳桓溫嘗問浩君何如我浩曰我與我周旋久寧作我漢賈誼服賦禍之與福何異糾纆應劭曰如糾索相附會也臣瓉曰糾絞也纆索也晉劉伶傳仍引酒御肉隗然復醉阿堵不解醉誰歟此頽然誤入無功鄉掉臂嵇阮間飲中八仙人與我俱得仙淵明豈知道醉語忽談天偶見此物真遂超天地先醉醒可還酒此覺無所還清風洗徂暑連雨催豐年牀頭伯雅君此子可與言陶淵明獨飲詩故老贈豫酒乃言飲得仙試酌百情逺重觴忽忘天天際去此幾任真無所先無還借用楞嚴經語再見魏文帝典論劉表子好酒為三爵大曰伯雅受七升次曰仲雅受五升次曰季雅受三升王撫軍座送客再送張中胸中有佳處海瘴不能腓三年無所愧十口今同歸汝去莫相憐我生本無依相從大塊中幾合幾分違莫作往來相而生愛見悲悠悠含山日炯炯留清輝懸知冬夜長不恨晨光遲夢中與汝别作詩記忘遺毛詩百卉具腓莊子大塊載我以生維摩經不使人有往來想答龎參軍三送張中留燈坐逹曉要與影晤言下帷對古人何暇復窺園使君本學武少誦十三篇頗能口擊賊戈戟亦森然才智誰不如功名歎無緣獨來向我説憤悶當奚宣一見勝百聞往鏖臯蘭山白衣挾三矢趁此征遼年詩國風彼美淑姬可與晤言漢董仲舒傳下帷講論蓋三年不窺園史記孫武傳以兵法見闔閭闔閭曰子之十三篇吾盡觀之矣可以小試勒兵乎晉朱伺傳楊珉曰朱將軍何以不言伺曰諸君以舌擊賊伺惟以力耳唐高祖諸子傳虢王巨入對合旨楊國忠謂巨曰比來人多以口打賊君不爾乎漢趙充國傳百聞不如一見兵難隃度願馳至金城圗上方略漢霍去病傳合短兵鏖臯蘭下唐薛仁貴傳天子征遼仁貴著白衣自標顯所向披靡後與九姓衆戰發三矢輒殺三人互見三十三卷次韻王晉卿詩注桃花源井引世傳桃源事多過其實考淵明所記止言先世避秦亂來此則漁人所見似是其子孫非秦人不死者也又云殺雞作食豈有仙而殺者乎舊説南陽有菊水水甘而芳居民三十餘家飲其水皆夀或至百二三十嵗蜀青城山老人村有見五世孫者道極險逺生不識鹽醯而溪中多枸杞根如龍蛇飲其水故夀近嵗道稍通漸能致五味而夀益衰桃源蓋此比也歟使武陵太守得而至焉則已化為爭奪之場久矣常意天壤間若此者甚衆不獨桃源豫在穎州夢至一官府人物與俗間無異而山川清逺有足樂者顧視堂上榜曰仇池覺而念之仇池武都氐故地楊難當所保豫何為居之明日以問客客有趙令畤德麟者曰公何問此此乃福地小有洞天之附庸也杜子美蓋云萬古仇池穴潛通小有天他日工部侍郎王欽臣仲至謂豫曰吾嘗奉使過仇池有九十九泉萬山環之可以避世如桃源也凡聖無異居清濁共此世心間偶自見念起忽巳逝欲知真一處要使六用廢桃源信不逺杖藜可小憩躬耘任地力絶學抱天藝臂雞有時鳴尻駕無可稅苓龜亦晨吸杞狗或夜吠耘樵得甘芳齕齧謝炮製子驥雖形隔淵明已心詣高山不難越淺水何足厲不如我仇池高舉復幾嵗從來一生死近又算癡慧蒲澗安期境羅浮稚川界夢往從之遊神交發吾蔽桃花滿庭下流水在户外卻笑逃秦人有畏非真契傳燈録溈山云凡聖同居龍蛇混雜楞嚴經當知是根非一非六汝須陀洹雖得六銷猶未忘一又塵既不緣根無所偶反流全一六用不行莊子大宗師化豫之左臂以為雞豫因以求時夜化豫之尻以為輪以神為馬豫因而乘之豈更駕哉羅浮山靈異記麻姑壇有枸杞樹時有赤大見於樹下或天晴朗時聞犬吠聲陶淵明桃源記南陽劉子驥高尚士也聞之欣然規往遊焉嶺表録異菖蒲澗在廣州城之東北十五里澗中生菖蒲多是一寸十二節山半有菖蒲觀跨水有玉舄閣即安期生上升之地互見三十五卷廣州蒲澗寺注羅浮山記葛稚川入羅浮煉丹弟子從之者五百餘人置觀四所今丹存焉施注蘇詩卷四十二
