body:
  text: 施注蘇詩卷一宋蘇軾撰施元之原注武進邵長蘅刪補詩四十七首起嘉祐辛丑十二月赴鳳翔任盡壬寅在鳳翔作施注缺今補辛丑十一月十九日既與子由别於鄭州西門之外馬上賦詩一篇寄之不飲胡為醉兀兀此心巳逐歸鞍發歸人猶自念庭闈今我何以慰寂寞登髙回首坡隴隔惟見烏帽出復沒苦寒念爾衣裘薄獨騎瘦馬踏殘月路人行歌居人樂僮僕怪我苦悽惻亦知人生要有别但恐嵗月去飄忽寒燈相對記疇昔夜雨何時聽蕭瑟君知此意不可忘慎勿苦愛髙官職公自注嘗有夜雨對牀之言故云爾杜詩烏帽塵拂青螺粟韋應物與元常全真二生詩那知風雨夜復此對牀眠王注子由與先生在懷逺驛嘗讀韋詩至此句惻然感之乃相約早退共為間居之樂其後子由與先生彭城相會有詩曰逍遙堂後千尋木長送中宵風雨聲悮喜對牀尋舊約不知漂泊在彭城先生在東府雨中作示子由詩有曰對牀定悠悠夜雨今蕭瑟蓋皆感歎追舊之言也和子由澠池懷舊漢書𢎞農郡澠池縣注景帝中二年初徙萬家為縣人生到處知何似應似飛鴻踏雪泥泥上偶然留指爪鴻飛那復計東西老僧巳死成新塔壞壁無由見舊題往日﨑嶇還記否路長人困蹇驢嘶公自注往嵗馬死於二陵騎驢至澠池賈誼弔屈原賦騰駕罷牛驂蹇驢兮杜詩東家蹇驢許借我泥滑不敢騎朝天次韻和劉京兆石林亭之作石本唐苑中物散流民間劉購得之京兆府即長安也劉京兆乃劉敞字原父都城日荒廢往事不可還唯餘故苑石漂散向一作尚人間公來始購蓄不憚道里艱忽從座埃中來對冰雪顔瘦骨拔凛凛蒼根潄潺潺唐人唯竒章好石古莫攀盡令屬牛氏刻鑿紛班班嗟此本何常聚散實循環人失亦人得要不出區寰君看劉李末不能保河關况此百株石鴻毛於太山但當對石飲萬事付等間河圖括地象地以石為骨白樂天太湖石記今丞相竒章公嗜石於此物獨不謙讓東第南墅列而置之以甲乙丙丁品之各刻于石隂曰牛氏石甲之上丙之中乙之下按竒章公牛僧孺也家語椘共王出遊亡其烏號之弓左右請求之王曰止也椘人失弓椘人得之又何求焉孔子聞之曰惜乎其不廣也宜曰人遺弓人得之而巳何必椘也王注劉指漢李指唐也史記魏王豹至國即絶河關司馬遷與任安書死有重於太山或輕於鴻毛壬寅二月有詔令郡吏分往屬縣減決囚禁自十三日受命出府至寶雞虢郿盩厔四縣既畢事因朝謁太平宫而宿於南溪溪堂遂並南山而西至樓觀大秦寺延生觀仙遊潭十九日乃歸作詩五百言以記凡所經歷者寄子由逺人罹水旱王命釋俘囚分縣傳眀詔循山得勝遊蕭條初出郭曠蕩實消憂薄暮來孤鎮登臨憶武侯崢嶸依絶壁蒼茫瞰奔流半夜人呼急橫空火氣浮天遙殊不辨風急巳難收曉入陳倉縣猶餘賣酒樓煙煤巳狼藉吏卒尚呀咻公自注十三日宿武城鎮即俗所謂石鼻寨也云孔眀所築是夜二鼓寶雞火作相去三十里而見於武城雞嶺雲霞古龍宫殿宇幽公自注縣有雞爪峰龍宫寺南山連大散歸客走音奏吾州欲往安能遂將還為少留回趨西虢道郤渡小河洲聞道磻溪石猶存渭水頭蒼崖雖有迹大釣夲無鈎公自注十四日自寶雞行至虢聞太公磻溪石在縣東南十八里猶有投竿跪餌兩膝所著之處東去過郿塢孤城象漢劉公自注十五日至郿縣縣有董卓城象長安俗謂之小長安誰言董公健竟復伍孚讎白刃俄生肘黃金謾似邱平生聞太白一見駐行騶鼓角誰能試風靁果致不巖崖已竒絶氷雪更雕鎪春旱憂無麥山靈喜有湫蛟龍懶方睡瓶罐小容偷公自注是日晚自郿起至青秋鎮宿道過太白山相傳云軍行鳴鼓角過山下輒致雷雨山上有湫甚靈以今嵗旱方議取之二曲林泉勝三川氣象侔近山牟麥早臨水竹篁修公自注十六日至盩厔以近山地美氣候殊早縣有官竹園十數里不絶先帝膺符命行宫畫冕旒侍臣簪武辨女樂抱箜篌祕殿開金鎖神人控玉虯黑衣橫巨劍被髮凛雙眸公自注十七日寒食自盩厔東南行二十餘里朝謁太平宫二聖御容此宫乃太宗皇帝時有神降於道士張守真以告受命之符所為立也神封翊聖將軍有殿邂逅逢佳士相將弄綵舟投篙披緑荇濯足亂清溝晚宿南溪上森如水國秋繞湖栽翠密終夜響颼飀公自注是日與監宫張杲之泛舟南溪遂留宿于溪堂冒曉窮幽邃操戈畏炳彪公自注十八日循終南而西縣尉以甲卒見送或云近官竹園往往有虎尹生猶有宅老氏舊停輈問道遺蹤在登仙往事悠馭風歸汗漫閲世似蜉蝣羽客知人意瑶琴繫馬鞦不辭山寺逺來作鹿鳴呦帝子傳聞李嵓堂髣像緱輕風幃幔卷落日髻鬟愁入谷音浴驚蒙密登坡費挽摟亂峰巉似槊一水淡如油中使何年到金龍自古投千重橫翠石百丈見遊鯈音紬最愛泉鳴洞初嘗雪入喉滿瓶雖可致洗耳歎無由公自注是日遊崇聖觀俗所謂樓觀也乃尹喜舊宅山腳有授經臺尚在遂與張杲之同至大秦寺早食而别有太平宫道士趙宗有抱琴見送至寺作鹿鳴之引乃去又西至延生觀觀後上小山有唐玉真公主修道之遺迹下山而西行十數里南入黑水谷谷中有潭名仙遊潭上有寺三倚峻峯面清溪樹林深翠怪石不可勝數潭水以繩縋石數百尺不得其底以瓦礫投之翔揚徐下食頃乃不見其清徹如此遂宿於中興寺寺中有玉女洞洞中有飛泉甚甘眀日以泉二瓶歸至郿又眀日乃至府忽憶尋蟆培方冬脫鹿裘山川良甚似水石亦堪儔惟有泉傍飲無人自獻酬公自注昔與子由遊蟆培時方冬洞中溫溫如二三月椘辭逺遊下崢嶸而無地兮上寥廓而無天注崢嶸深逺貌文選刻削崢嶸王注蒼茫字古人用皆平聲先生用作仄聲蒼字廣韻音粗朗而茫字上聲之莽去聲之漭皆不收不知先生用之所出地志載三秦記陳倉以山得名山有石雞與山雞不别趙髙燒山山雞飛去而石雞不去晨鳴山頭聞三十里蓋玉雞也唐至德二載更名寶雞史記封禪書秦文公獲若石云於陳倉北阪城祠之其神來常以夜光輝若流星從東南來集於祠城則若雄雞其聲殷云野雞夜雊以一牢祠命曰陳寶按雞爪峰蓋以此得名王注大散關秦蜀通途又西虢虢叔所封平王東遷虢徙上陽故謂之西虢後漢董卓傳築塢於郿髙厚七丈號曰萬嵗塢又塢中珍藏有金二三萬斤銀八九萬斤錦綺竒玩積如邱山袁紹傳卓議廢立紹勃然曰天下健者何必董公又卓傳越騎校尉伍孚忿卓凶毒懷珮刀刺之不中左右執孚孚大言曰恨不得磔裂姦賊於都市又王允與吕布謀誅卓李肅以戟刺之𠂻甲不入卓驚呼吕布何在布曰有詔討賊遂殺卓三十六洞天記第十一太白山洞周回五百里三秦謡武功太白去天三百選賦木不雕鎪王注偷字韻蓋方言取龍水謂之偷湫也西京賦右極盩厔并卷酆鄠之下李善注盩厔山名盩音周厔音質寰宇記山曲曰盩水曲曰厔故云二曲王注古謂伊洛河為三川唐以劍南東西及山南西道為三川釋名箜篌師延所作風俗通武帝禱祠太一后土令樂人侯調作坎侯言聲坎坎應節也因其姓號坎侯蘇林注作箜篌李賀箜篌引二十三絲動紫皇司馬相如賦乘鏤象六玉虯劉燾曰翊聖像皆被髮跣足仗劍擾龍相承舊矣廣雅小風曰颼涼風曰飀周易大人虎變其文炳也説文虎文曰彪史記老莊傳老子見周之衰乃遂去至關關令尹喜曰子將隱矣強為我著書乃著書言道德之意五千餘言而去列子馭風而行淮南子有若士者謂盧敖曰子處矣吾與汗漫期于九垓之上詩曹風蜉蝣之羽毛傳渠略也朝生夕死王注帝子唐玉真公主睿宗之女始封長昌縣主天寶三年上言妾髙宗之孫睿宗之女陛下之女弟於天下不為賤何必名係主號資湯沐然後為貴請入數百家之産延十年之命帝許之與金仙公主皆為道士青城山記玉真公主肅宗之姑也築室丈人觀玉真金仙二宫主真容見在女仙列傳西王母姓緱其所居有玄碧之堂唐王建溫門山詩曉入溫門山羣峰亂如戟白樂天詩噴時千點雨澄處一泓油東齋記事道家有金龍玉簡學士院撰文具一嵗中齋醮投於名山洞府金龍以銅制玉簡以階石制莊子與惠子遊於濠上鯈魚出遊沈約詩百丈見遊鱗唐張又新水記峽州扇子峽石中突而泄水獨清冷石狀如龜頭俗謂蝦蟆石其水煎茶為第一太白山下早行至橫渠鎮書崇夀院壁馬上續殘夢不知朝日升亂山橫翠幛落月淡孤燈奔走煩郵吏安間愧老僧再遊應眷眷聊亦記吾曽留題延生觀後山上小堂王注觀後上小山有堂是唐玉真公主修道遺迹夲朝端拱元年奉勑賜此額溪山愈好意無厭上到巉巉第幾尖深谷野禽毛羽怪上方仙子鬢眉纎不慙弄玉騎丹鳳應逐嫦娥駕老蟾澗草巖花自無主晚來胡蝶入踈簾列仙傳蕭史善吹簫秦穆公以女弄玉妻焉遂教弄玉吹簫作鳳鳴一旦弄玉乘鳳蕭史乘龍升天而去淮南子羿得不死之藥於西王母姮娥竊之奔月姮娥羿妻也乾鑿度蟾蜍體就穴鼻始眀注穴鼻也留題仙遊潭中興寺東有玉女洞洞南有馬融讀書石室過潭而南山石益竒潭上有橋畏其嶮不敢渡終南圖經讀書臺在縣城西一百步清潭百尺皎無泥山木隂隂谷鳥啼蜀客曽遊眀月峽秦人今在武陵溪獨攀書室窺巖竇還訪仙姝欵石閨猶有愛山心未至不將雙腳踏飛梯王注眀月峽在古巴郡今在忠涪二州之境石壁有圎孔形如滿月蜀客則先生自謂武陵溪用桃源漁人事詳第六卷風水洞詩注後漢馬融傳融扶風茂陵人京兆摯恂以儒術教授隱於南山之隂融從其遊學石鼻城注見前平時戰國今無在陌上征夫自不間北客初來試新險蜀人從此送殘山獨穿暗月朦朧裏愁渡奔河蒼茫間漸入西南風景變道邉修竹水潺潺王注戰國指蜀魏也諸葛亮築此城以拒郝昭磻溪石注見前墨突不暇黔孔席未嘗暖安知渭上叟跪石留雙骭一朝嬰世故辛苦平多難亦欲就安眠旅人譏客懶淮南子墨子無黔突孔子無暖席史記齊世家武王封師尚父於齊營邱東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行黎眀至國郿塢注見前衣中甲厚行何懼塢裏金多退足慿畢竟英雄誰得似臍脂自照不須燈後漢董卓傳尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光眀達曙如是積日樓觀公自注秦始皇立老子廟於觀南晉惠始修此觀門前古碣卧斜陽閲世如流事可傷長有幽人悲晉惠強修遺廟學秦皇丹砂久窖井水赤白术誰燒廚竈香聞道神仙亦相過只疑田叟是庚桑抱朴子臨汜縣有廖氏世老夀後移居子孫輒殘折他人居其故宅復纍世夀疑其井水赤乃掘井左右得古人埋丹砂數十斛丹汁入井是以飲水而夀陶隱居引仙經术能除惡氣莊子老聃之役有庚桑椘者遍得老聃之道北居畏壘之山九月二十日微雪懷子由弟二首岐陽九月天微雪已作蕭條嵗暮心短日送寒砧杵急冷官無事屋廬深愁腸别後能消酒白髮秋來已上簪近買貂裘堪出塞忽思乘傳知戀切問西琛杜子美詩廣文先生官獨冷又詩白髮不勝簮漢書乘傳注師古曰傳者若今之驛古以車謂之傳車其後又單置馬謂之驛騎詩憬彼淮夷來獻其琛江上同舟詩滿篋鄭西分馬涕垂膺未成報國慙書劍豈不懷歸畏友朋官舍度秋驚嵗晚寺樓見雪與誰登遙知讀易東窗下車馬敲門定不譍詩豈不懷歸畏此簡書左傳引逸詩豈不欲往畏我友朋病中聞子由得告不赴商州三首王注子由與先生同舉賢科子由以訐直得下第除商州推官而王介甫猶不肯撰辭告未即下故先生自去年十二月先赴鳳翔至今年秋子由方告下以老泉傍無侍子奏乞養親三年此所以得告而不赴也病中聞汝免來商旅鴈何時更著行逺别不知官爵好思歸苦覺嵗年長著書多暇真良計從宦無功謾去鄊惟有王城最堪隱萬人如海一身藏近從章子聞渠説公自注章子惇也苦道商人望汝來説客有靈慙直道逋翁久沒厭凡才夷音僅可通名姓癭俗無由辨頸腮答䇿不堪宜落此上書求免亦何哉王注逋翁四皓也避秦隱於商山白樂天詩漢容黃綺為逋客李商隱商於詩割地張儀詐謀身綺季長歐陽公汝癭詩無由辨肩頸辭官不出意誰知敢向清時怨位卑萬事悠悠付杯酒流年冉冉入霜髭䇿曽忤世人嫌汝易可忘憂家有師此外知心更誰是夢魂相覓苦參差病中大雪數日未嘗起觀虢令趙薦以詩相屬戲用其韻答之經旬卧齋閣終日親劑和不知雪已深但覺寒無奈一作那飄蕭窗紙一作紙窗眀堆壓簷板墮公自注關中皆以板為簷風飈助凝列幃幔困掀一作軒簸惟思近醇醲未敢窺璨瑳何時反炎赫郤欲躬臼磨誰言坐無氊尚有裘充貨西鄰歌吹發促席寒威挫崩騰踏成徑繚繞飛入座人歡瓦先融飲雋瓶屢卧嗟豫獨愁寂空室自困坷欲為後日賞恐被遊塵涴寒更報新霽皎月懸半破有客獨苦吟清夜默自課詩人例窮蹇秀句出寒餓何當暴霜雪庶以躡郊賀魏都賦著馴風之醇醲注以酒喻政王注璨瑳以玉比雪之眀也後漢馮衍妻妒悍不畜媵妾兒女自操井臼以言勞則體中生熱也杜子美贈鄭虔詩才名三十年坐客寒無氊西京雜記司馬相如初與文君還成都居貧愁悶以所著鷫鸘裘就市人楊昌貰酒與文君為歡左傳士文伯謂投壺之中曰中雋歐陽詩不覺長瓶卧墻曲韓退之詩勿使塵泥涴又新月憐半破杜詩詩家秀句傳寒餓王注郊賀孟郊李賀也嵗晚相與饋問為饋嵗酒食相邀呼為别嵗至除夜達旦不眠為守嵗蜀之風俗如是余官於岐下嵗暮思歸而不可得故為此三詩寄子由饋嵗農功各已收嵗事得相佐為歡恐無及假物不論貨山川隨出産貧富稱小大置盤巨鯉橫發籠去聲雙卧富人事華靡綵繡光翻座貧者愧不能微摯出舂磨官居故人少里巷佳節過亦欲舉鄉風獨唱無人和詩商頌嵗事來辟在傳以相輔佐王符潛夫論富者競欲相過貧者恥不逮及也别嵗故人適千里臨别尚遲遲人行猶可復嵗行那可追問嵗安所之逺在天一涯已逐東流水赴海歸無時東鄰酒初熟西舍彘亦肥且為一日歡慰此窮年悲勿嗟舊嵗别行與新嵗辭去去勿回顧還君老與衰古詩各在天一涯古樂府百川東到海何時復西歸守嵗欲知垂盡嵗有似赴壑蛇修鱗半已沒去意誰能遮况欲繫其尾雖勤知奈何兒童強不睡相守夜歡一作喧譁晨雞且勿唱更鼓畏添撾坐久燈燼落起看北斗斜眀年豈無年心事恐蹉跎努力盡今夕少年猶可誇晉書賈皇后云繫狗當繫頸今反繫其尾和子由踏青子由踏青詩序眉之東門十數里有山曰蟇頤山上有亭榭松竹山下臨大江每正月八日士女相與遊嬉飲酒於其上謂之踏青也春風陌上驚微塵遊人初樂嵗華新人間正好路傍飲麥短未怕遊車輪城中居人厭城郭喧闐曉出空四鄰歌鼓驚山草木動簞瓢散野烏鳶馴何人聚衆稱道人遮道賣符色怒嗔宜蠺使汝繭如甕宜畜使汝羊如麕路人未必信此語強為買服禳新春道人得錢徑沽酒醉倒自謂吾符神太平廣記園客者濟隂人嘗種五色香草積十年服其實一日有五色蛾止其旁客收而畜之至蠺時有女夜半至自稱客妻道蠺之狀客與俱蠺得一百二十頭繭皆如甕每繅一頭六十日乃盡遂俱仙王注爾雅曰麢大羊杜預奏事曰臣前在南聞魏興北山有野羊大者數千百斤試令求之牝牡各得一豈爾雅所謂麢者乎麢與麕皆從鹿挨傍押韻成都古今記三月三日太守出北門宴學射山蓋張百子以是日上升即此地也男覡女巫會於此寫符篆以鬻人云宜田蠺辟災疫佩者戴者信以為然和子由蠺市子由詩序眉之二月望日鬻蠺器於市因作樂縱觀謂之蠺市蜀人衣食常苦艱蜀人遊樂不知還千人耕種萬人食一年辛苦一春間間時尚以蠺為市共忘辛苦逐欣歡去年霜降斫秋荻今年箔積如連山破瓢為輪土為釡爭買不翅金與紈憶昔與子皆童丱音慣年年廢書走市觀市人爭誇鬪巧智一作智巧野人喑啞遭欺謾詩來使我感舊事不悲去國悲流年王注荻箔乃薦蠺之具瓢輪土釡乃繅絲之物詩齊風總角丱兮注束髮貌和子由苦寒見寄人生不滿百一别費三年三年吾有幾棄擲理無還長恐别離中摧我鬢與顔念昔喜著書别來不成萹細思平時樂乃為憂所緣吾從天下士莫如與子歡羡子久不出讀書蝨生氊丈夫重出處不退要當前西羌解仇隙猛士憂塞壖而宣切廟謀雖不戰鹵意久欺天山西良家子錦緣貂裘鮮千金買戰馬百寶糚刀鐶何時逐汝去與鹵試周旋漢書趙充國傳元康元年先零與諸羌種豪二百餘人解仇交質盟誓申屠嘉傳太上皇廟堧垣注宫外垣餘地也堧壖同按塞壖塞垣也又六郡良家子皆習騎射又山西出將左傳晉文公謂椘子曰左執鞭弭右屬櫜鞬以與君周旋和子由論書吾雖不善書曉書莫如我苟能通其意常謂不學可貌妍容有矉顰同璧美何妨橢端莊雜流麗剛健含婀娜好之每自譏不謂子亦頗書成輒棄去繆被旁人裹體勢夲闊落結束入細麼子詩亦見推語重未敢荷邇來又學射力薄愁官笴公自注官箭十二把吾能十一把箭耳多好竟無成不精安用夥何當盡屏去萬事付懶惰吾聞古書法守駿莫如跛世俗筆苦驕衆中強嵬騀鍾張忽已逺此語與時左莊子天運萹西施病心而矉其里爾雅􅜽小而橢注貝狹而長曰橢班彪王命論么麼不及數子注細小曰麼漢書陳涉傳夥涉之為王沈沈者注椘人謂多為夥説文馬搖頭曰騀王注嵬騀不安帖貌鍾張鍾繇張芝也記所見開元寺吳道子畫佛滅度以答子由名畫記吳陽翟人工畫初名道子玄宗改名道玄下筆有神官至寧王友西方真人誰所見衣被七寶從雙狻音酸當時修道頗辛苦柏生兩肘烏一作鳥巢肩初如濛濛隱山玉漸如濯濯出水蓮道成一旦就空滅奔會四海悲人天翔禽哀響動林谷獸鬼躑躅淚迸泉龎眉深目彼誰子繞牀彈指性自圎隱如寒月墮清晝空有孤光留故躔春遊古寺拂塵壁遺像久此霾香煙畫師不復寫名姓皆云道子口所傳從橫固已蔑孫鄧有如巨鰐吞小鮮來詩所誇孰與此安得携挂其旁觀穆天子傳狻猊日行五百里郭璞注獅子也一名虓獸中之王也傳燈録佛於雪山入定有野鵲於佛頂置巢時去時來大智度論曰佛在隂菴羅雙樹間入般涅槃卧北首大地震動諸三學人僉然不樂郁伊交涕諸無學人但念諸法一切無常杜詩淚下如迸泉王注月墮清晝以譬佛之滅度光留故躔以譬佛之雖寂滅而猶在圖畫見聞志孫知微字太古通義彭山人每畫聖像必齋戒疏瀹方始援筆鄧名隱物類相感志南海有鰐魚其狀若鼉四足長六七尺有齒如劍老子治大國若烹小鮮和子由寒食寒食今年二月晦樹林深翠已生煙繞城駿馬誰能借到處名園意盡便但挂酒壺那計盞偶題詩句不須編忽聞啼鵙驚羈旅江上何人治廢田和劉長安題薛周逸老亭周善飲酒未七十而致仕王注劉長安劉敞原父也薛周莫考近聞薛公子早退驚長流買園招野鶴鑿井動潛虯自言酒中趣一斗勝涼州翻然拂衣去親愛挽不留隱居亦何樂素志庶可求所亡嗟無幾所得不啻酬青春為君好白日為君悠山鳥奏琴築野花弄間幽雖辭功與名其樂實素侯至今清夜夢尚驚冠壓頭誰能載美酒往以大白浮之子雖不識因公可與遊蜀都賦下髙鵠出潛虯續漢書扶風孟陀以蒲萄酒一斗遺張讓即得涼州刺史晉書鄧攸傳吳人歌之曰鄧侯挽不留謝令推不去史貨殖傳今有無秩祿之奉爵邑之入而樂與之比者命曰素封又千金之家比一都之君巨萬者乃與王者同樂劉向説苑魏文侯與大夫飲使公乘不仁為觴政曰飲不盡者浮以大白中隱堂詩并序岐山宰王君紳其祖故蜀人也避亂來長安而遂家焉其居第園圃有名長安城中號中隱堂者是也豫之長安王君以書戒其子弟邀豫遊且乞詩甚勤因為作此五萹前地理志京兆尹縣十二其一曰長安髙帝五年置惠帝元年初城六年成去蜀初逃難遊秦遂不歸園荒喬木老堂在昔人非鑿石清泉激開門野鶴飛退居吾久念長恐此心違徑轉如修蟒坡垂似伏鼇樹從何代有人與此堂髙好古嗟生晚偷間厭久勞王孫早歸隱塵土汙君袍劉安招隱士王孫遊兮不歸陸機詩京洛多風塵素衣化為緇二月驚梅晚幽香此地無依依慰逺客皎皎似吳姝不恨故園隔空嗟芳嵗徂春深桃杏亂笑汝益羈孤韓退之詩二月初驚見草芽杜子美詩丹橘黃柑此地無翠石如鸚鵡何年别海壖貢一作來隨南使逺載壓渭舟偏已伴喬松老那知故國遷金人解辭漢汝獨不潸然廣韻壖江河邊地李賀金銅仙人辭漢歌序宫官既坼盤仙人臨載乃潸然泣下都城更幾姓到處有殘碑古隧埋蝌蚪崩崖露伏龜安排壯亭榭收拾費金資岣嶁何須到韓公浪自悲西都賦三成帝畿注周秦漢也古文四聲韻序科斗書古文也所謂蒼頡夲體形多頭粗尾細腹壯團圎似水蟲之蝌蚪隋志五品以上立碑螭首龜趺韓退之詩岣嶁山尖神禹碑字青石赤形摹竒又云我來咨嗟涕漣而千搜萬索何處有森森緑樹猿猱悲鳳翔八觀并序鳳翔八觀詩記可觀者八也昔司馬子長登會稽探禹穴不逺千里而李太白亦以七澤之觀至荆州二子蓋悲世悼俗自傷不見古人而欲一觀其遺迹故其勤如此鳳翔當秦蜀之交士大夫之所朝夕往來此八觀者又皆跬步可至而好事者有不能遍觀焉故作詩以告欲觀而不知者石鼓歌冬十二月嵗辛丑我初從政見魯叟舊聞石鼓今見之文字欎律蛟蛇走細觀初以指畫肚欲讀嗟如箝在口韓公好古生已遲我今况又百年後強尋偏傍推點畫時得一二遺八九我車既攻馬亦同其魚維鱮貫之栁公自注其詞云我車既攻我馬亦同又云其魚維何維鱮維鯉何以貫之維楊與栁惟此六向可讀餘多不可通古器縱橫猶識鼎衆星錯落僅名斗糢糊半已似瘢胝詰曲猶能辨跟肘娟娟缺月隱雲霧濯濯嘉禾秀莨莠漂流百戰偶然存獨立千載誰與友上追軒頡相唯諾下揖一作挹氷斯同鷇㝅鷇邱候切㝅乃候切憶昔周宣歌鴻鴈當時籀史變蝌蚪厭亂人方思聖賢中興天為生耆耉東征徐鹵闞虓虎北伏一作伐犬戎隨指嗾蘇后切象胥雜沓貢狼鹿方召聨翩賜圭卣遂因鼓鼙思將帥豈為考擊煩矇瞍何人作頌比嵩髙萬古斯文齊岣嶁勳勞至大不矜伐文武未逺猶忠厚欲尋年嵗無甲乙豈有名字記誰某自從周衰更七國竟使秦人有九有掃除詩書誦法律投棄俎豆陳鞭杻當年何人佐祖龍上蔡公子牽黃狗登山刻石頌功烈後者無繼前無偶皆云皇帝巡四國烹滅強暴救黔首六經既已委灰塵此鼓亦當遭擊掊傳聞九鼎淪泗上欲使萬夫沈水取暴君縱欲窮人力神物義不汙秦垢是時石鼓何處避無乃天工令鬼守興亡百變物自間富貴一朝名不朽細思物理坐歎息人生安得如汝夀歐陽集古録石鼓久在岐陽初不見稱於世至唐人始盛稱之而韋應物以為周文王之鼓至宣王時刻爾韓退之直以為宣王之鼓今在鳳翔縣孔子廟鼓有十先時散棄於野鄭餘慶始置於廟而亡其二皇祐四年向傳師求於民間得之十鼓乃足其文可見者四百六十有五磨滅不可識者過半然其可疑者四退之好古不妄者豫姑取以為信耳至於字畫亦非史籀不能作也西京賦隱轔欎律甘泉賦雷欎律於巖窔唐虞世南學書常於被下以指畫肚韓退之苦寒詩濁醪沸入喉口角如銜箝又石鼓歌嗟豫好古生苦晚對此涕淚雙滂沱王注軒頡軒轅蒼頡氷斯李斯李陽氷也頡為黃帝史因觀鳥迹始作書契古文是也周宣王時史籀著大篆十五萹與古稍異謂之籀書秦相李斯取籀文或頗省改謂之小篆焚先典而古文絶矣漢魯共王壞孔子宅得尚書春秋論語孝經時以不復知古文故謂之蝌蚪書諸山刻石荆玉璽文及銅人銘皆斯所書謂之玉筯體唐李陽氷獨得斯用筆意論者謂氷愈於斯也小雅鴻鴈詩序曰美宣王也鄭箋承厲王衰亂之敝而起興復先王之道以安集衆民也大雅常武詩省此徐土又進厥虎臣闞如虓虎國語穆王將征犬戎祭公謀父諫不聼遂征之得四白狼四白鹿以歸左傳宣二年晉侯飲趙盾酒伏甲將攻之公嗾夫熬焉説文使犬聲也周官象胥掌蠻􅊂閩貉戎狄之國使掌傳王之言而諭説焉大雅江漢詩王命召虎釐爾圭瓚秬鬯一卣方方叔也記聽鼓鼙之聲則思將帥之臣大雅嵩髙詩毛傳尹吉甫美宣王也岣嶁注見前秦始皇夲紀始皇三十六年秋使者從關東夜過華隂平舒道有人持璧遮使者曰為吾遺滈池君眀年祖龍死使者問其故忽不見使者奉璧具以聞始皇默然良久曰山鬼固不過知一嵗事也退言曰祖龍者人之先也史記李斯傳斯出獄與其中子俱執顧謂其中子曰吾欲與若復牽黃犬俱出上蔡東門逐狡豈可得乎始皇夲紀二十八年始皇東行郡縣上鄒嶧山刻石頌秦德又南登琅邪作琅邪臺刻石頌秦德二十九年登之罘刻石刻詞有曰烹滅強暴振救黔首又始皇還過彭城齋戒禱祠欲出周鼎泗水使千人沒水求之弗得莊子逍遙遊吾為其無用而掊之注擊而碎之也韓石鼓歌雨淋日炙野火燎鬼物守護煩撝呵詛椘文公自注碑獲於開元寺土下今在太守便廳秦穆公葬於雍橐泉祈年觀下今墓在開元寺之東南數十步則寺豈祈年之故基耶淮南王遷於蜀至雍道病卒則雍非長安此乃古雍也峥嶸開元寺髣佛祈年觀舊築掃成空古碑埋不爛詛書雖可讀字法嗟久換詞云秦嗣王敢使祝用瓚先君穆公世與椘約相捍質之於巫咸萬葉期不叛今其後嗣王乃敢搆多難刳胎殺無罪親族遭圉絆計其所稱訴何啻桀紂亂吾聞古秦俗面詐背不汗豈惟公子卬社鬼亦遭謾遼哉千載後發我一笑一作笑一粲王注問詛椘文於學古文者云有數夲其文皆同惟神名異開元寺下所得乃詛於巫咸神者是數夲中唯巫咸之文筆法最精其家無之唯有此詛於亞駝神一夲詳其篆文乃先生詩中語也今載於此字有不可識者則書闕以補之其文曰秦嗣王敢用吉玉宣璧使其祝宗邵鼕布懇告於丕顯大神亞駝以底椘王熊相之多罪者我先君穆王及椘成王是戮力同心兩邦若一絆以婚姻袗以齊盟曰萬葉子孫毋相為不利親印丕顯大神亞駝而質焉今椘王熊相庸回無道淫伐湛亂宣侈兢縱變渝盟制內之則暴虐不宰刑殺孕婦幽刺親戚拘圉其叔父置諸𡨕室櫝棺之中外之則冒改久闕不畏皇天上帝及丕顯大神亞駝光烈威神而兼倍十八世之盟詛率諸侯之兵以臨加我欲剗伐我社稷滅我百姓蔑我皇天上帝及丕顯大神亞駝之郊祠圭玉犧牲取我邉城新􅙉及於􅙉及於不敢曰可今又悉興其衆張矜怠怒甲兵奮士盛師以逼我邊境將欲覆其亦應受皇天上帝及丕顯大神亞駝之幾靈德賜克剗椘師復略我邊城敢數椘王熊相之倍盟詛著諸名章以盟大神之威神其文如此秦始皇夲紀注祈年宫在雍史記商鞅傳孝公使衛鞅將而伐魏魏使公子卬將而擊之鞅詐公子卬會盟巳飲伏甲士襲鹵公子卬因攻其軍盡破之以歸秦穀梁軍士粲然皆笑王維吳道子畫吳道子見前開元寺注季南名畫記王維字摩詰以詞學知名官至尚書右丞工畫何處訪吳畫普門與開元開元有東塔摩詰留手痕吾觀畫品中莫如二子尊道子實雄放浩如海波翻當其下手風雨快筆所未到氣已吞亭亭雙林間彩暈扶桑暾中有至人談寂滅悟者悲涕迷者手自捫蠻君鬼伯千萬萬相排競進頭如黿摩詰夲詩老佩芷襲芳蓀今觀此壁畫亦若其詩清且敦祇園弟子盡鶴骨心如死灰不復溫門前兩叢竹雪節貫霜根交柯亂葉動無數一一皆可尋其源吳生雖妙絶猶以畫工論摩詰得之於象外有如仙翮謝籠樊吾觀二子皆神俊又於維也斂衽無間言唐米景元畫斷道子為神品上上摩詰為妙品上上名畫斷大凡佛之圎光皆須尺寸先定然後規圎而成惟吳生只一筆又云畫成矣最後方畫圎光風落電轉規成月圎王注開元寺有道子畫佛在雙林下入涅槃像又摩詰畫兩叢竹於開元寺莊子形若稿木心若死灰杜詩畫手看前輩吳生逺擅場又妙絶動宫墻神仙傳王次仲變篆為𨽻始皇召之不至將殺之次仲化為大鳥振翼而起以三大翮墮與使者始皇因名為落翮仙唐張顛傳後輩言筆札者歐虞禇薛或有異論至張顛曽無間言維摩像唐楊惠之塑在天柱寺五代名畫補遺楊惠之與吳道子同師張僧繇筆迹號為畫友工藝並著而道子聲光獨顯遂焚棄筆硯發憤専思塑作能奪僧繇畫相與道子爭衡昔者子輿病且死其友子祀往問之跰􅓷鑒井自歎息造物將安以我為今觀古塑維摩像病骨磊嵬如枯龜乃知至人外生死此身變化浮雲隨世人豈不碩且好身雖未病心已疲此叟神完中有恃談笑可郤千熊羆當其在時或問法俯首無言心自知至今遺像兀不語與昔未死無增虧田翁俚婦那肯顧時有野鼠銜其髭見之使人每自失誰能與結一作詰無言師莊子子輿有病子祀往問之曰偉哉夫造物者將以豫為此拘拘也又跰􅓷而鑑於井注跰􅓷病而不能行貌維摩經是身如浮雲須臾變滅又文殊師利問維摩詰何等是菩薩不二法門時維摩詰默然無言晉書謝靈運髭美臨刑因施作南海祇洹寺維摩詰像髭寺人保惜略不汚損東湖吾家蜀江上江水緑如藍邇來走塵土意思殊不堪况當岐山下風物尤可慙有山禿如赭有水濁如泔不謂郡城東數武見湖潭入門便清奧恍如夢西南泉源從髙來隨波走涵涵東去觸重阜盡為湖所貪但見蒼石螭開口吐清甘借汝腹中過胡為目耽耽新荷弄晚涼輕棹極幽探飄飄忘逺近偃息遺佩篸簪同深有龜一作魚與魚一作龜淺有螺與蚶曝晴復戲雨戢戢多於蠺浮沉無停餌倐忽遽滿籃絲緡雖強致瑣細安足戡聞昔周道興翠鳳棲孤嵐飛鳴飲此水照影弄毿毿公自注此古飲鳳池也至今多梧桐合抱如彭聃綵羽無復見上有鸇搏䳺烏含切嗟豫生雖晚好古意所妉耽同圖書已漫漶猶復訪僑郯卷阿詩可繼此意久已含扶風古三輔政事豈汝諳聊為湖上飲一縱醉後談門前逺行客劫劫無留驂問胡不回首無乃趁朝參豫今正踈懶官長幸見函不辭日遊再行恐嵗滿三暮歸仍倒載鐘鼓已韽韽詩小雅終朝采藍鄭箋藍染草也李白詩山光水色青於藍白樂天詩春來江水緑如藍韓南山詩或赤若秃鬝秦始皇夲紀始皇至湘山祠逢大風幾不得度上問博士曰湘君何神對曰堯女舜妻死而葬於此始皇大怒使刑徒三千人伐湘山木赭其山寰宇記周文王之時丹鳳鳴於岐山故亦曰鳳皇堆王注僑鄭子産也晉侯稱其博物君子郯子言少昊氏以鳥名官仲尼曰天子失官學在四􅊂猶信三輔黃圖京兆在故城內尚冠里馮翊在故城內太上皇廟西南扶風在夕陽街北三輔者謂主爵中尉及左右內史漢武帝改曰京兆尹左馮翊右扶風共治長安城中是為三輔後漢光武之後扶風出治楓里馮翊出治髙陵晉書山簡傳日暮倒載歸酩酊無所知宋韻注韽韽鐘鼓微也真興寺閣山川與城郭漠漠同一形市人與鴉鵲浩浩同一聲此閣幾何髙何人之所營側身送落日引手攀飛星當年王中令斫木南山赬寫真留閣下鐡面眼有稜身強一作長八九尺與閣兩峥嶸古人雖暴恣作事今世驚登者尚呀喘作者何以勝曷不觀此閣其人勇且英王注王彥超周末宋初為鳳翔節度使晉書桓溫傳劉惔嘗稱之曰溫眼如紫石稜李氏園公自注李茂貞園也今為王氏所有五代史茂貞夲姓宋名文通唐僖宗間以功拜鳳翔隴右節度使賜姓名昭宗景福元年反犯京師加拜尚書令封岐王後唐莊宗同光二年卒朝遊北城東回首見修竹下有朱門家破墻圍古屋舉鞭叩其戶幽響答空谷入門所見夥十步九移目異花兼四方野鳥喧百族其西引溪水活活轉墻曲東注入深林林深窗戶緑水光兼竹淨時有獨立鵠林中百尺松嵗久蒼鱗蹙豈惟此地少意恐關中獨小橋過南圃一作浦夾道多喬木隱如城百雉挺若舟千斛隂隂日光淡黯黯秋氣蓄盡東為方池野鴈雜家鶩紅梨驚合抱映島孤雲馥春光水溶漾雪陳風翻撲其北臨長溪波聲卷平陸北山卧可見蒼翠間磽秃我時來周覽問此誰所築云昔李將軍負險乘衰叔抽錢算間口但未榷羮粥當時奪民田失業安敢哭誰家美園囿藉沒不容贖此亭破千家欎欎城之麓將軍竟何事蟣蝨生刀韣何嘗載美酒來此駐車轂空使後世人聞名頸猶縮公自注俗猶呼皇后園蓋茂貞謂其妻也我今官正間屢至因休沐人生營居止竟為何人卜何當辦一身永與清景逐左傳都城過百雉國之害也注方丈曰堵三堵曰雉漢書注漢律人出一算算百二十錢唯賈人與奴婢倍算貢禹傳禹言口錢起武帝民産子三嵗則出口錢故民重困至於生子輒殺宜令兒七嵗去齒乃出口錢年二十乃算唐史肅宗時軍用不給乃稅間架廣韻韣弓衣史記石建為郎中令每五日洗沐歸謁親漢書張安世傳休沐未嘗出秦穆公墓三輔黃圖橐泉宫皇覽曰秦穆公冢在橐泉宫祈年觀下槖泉在城東墓在城中無百步乃知昔未有此城秦人以泉識公墓識音志昔公生不誅孟眀豈有死之日而忍用其良乃知三子殉公意亦如齊之二子從田橫古人感一飯尚能殺其身今人不復見此等乃以所見疑古人古人不可望今人益可傷左傳文六年秦伯任好卒以子車氏之三子奄息仲行針虎為殉皆秦之良也國人哀之為之賦黃鳥史記田儋傳田橫與其客二人乘傳詣洛陽至尸鄉廄置自剄髙帝為之流涕而拜其二客為都尉以王者禮葬田橫既葬二客穿其冢旁孔皆自剄下從之後漢李固傳感古人一飯之報注靈輒也靈輒事見左傳宣二年和子由聞子瞻將如終南太平宫溪堂讀書役名則已勤徇身則已偷我誠愚且拙身名兩無謀始者學書判近亦知問囚但知今當為敢問向所由士方其未得惟以不得憂既得又憂失此心浩難收譬如倦行客中路逢清流塵埃雖未脫暫憩得一潄我欲走南澗春禽始嚶呦鞅掌久不決爾來已徂秋橋山日月迫府縣煩差抽王事誰敢訴民勞吏宜羞中間罹旱暵欲學喚雨鳩千夫挽一木十步八九休渭水涸無泥災堰旋插修對之食不飽餘事更遑求近日秋雨足公餘試新篘劬勞幸已過朽鈍不任鎪秋風欲吹帽西阜可縱遊聊為一日樂慰此百日愁唐有書判拔萃科史記黃帝葬橋山前漢溝洫志武帝歌曰隤林竹兮揵石災廣韻篘酒篘晉書九月九日桓溫宴於龍山風吹孟嘉帽落將往終南和子由見寄人生百年寄鬢鬚富貴何啻葭中莩惟將翰墨留染濡絶勝醉倒蛾眉扶我今廢學如寒竽久不吹之澀欲無嵗云暮矣嗟幾餘欲往南溪侣一作旅禽魚秋風吹雨涼生膚夜長耿耿添漏壺窮年弄筆衫袖烏古人有之我願如終朝危坐學僧趺閉門不出間履鳧下視官爵如泥淤嗟我何為久踟蹰嵗月豈肯與汝居僕夫起餐秣吾駒前漢書非有葭莩之親注葭裏之白皮者喻輕薄也韓子齊宣王好竽必三百人齊吹南郭先生不善竽而濫於三百之中以食祿湣王立欲一一吹之先生乃逃趙一非草書歌十日一筆月數丸墨領袖如皂脣齒皆黑後漢王喬有神術顯宗時為葉令每翔望來朝眀帝怪之令太史伺望輒有雙鳧從東來羅之得雙舄詔尚書診視乃四年中所賜履舄也韓退之送李願歸盤谷序膏吾車兮秣吾馬又天星詩僕夫起餐車載脂七月二十四日以久不雨出禱磻溪是日宿虢縣二十五日晚自虢縣渡渭宿於僧舍曽閣閣故曽氏所建也夜久不寐見壁有前縣令趙薦留名有懷其人龕燈眀滅欲三更欹枕無人夢自驚深谷留風終夜響亂山銜月半牀眀故人漸逺無消息古寺空來看姓名欲向磻溪問薑叟僕夫屢報斗杓傾二十六日五更起行至磻溪未眀夜入磻溪如入峽照山炬火落驚猿山頭孤月耿猶在石上寒波曉更喧至人舊隱白雲合神物已化遺蹤蜿安得夢隨霹靂駕馬上傾倒天瓢翻王注至人舊隱太公也神物龍也磻溪有龍於此地禱雨也酉陽雜俎李鄘在北都介休百姓送解牒宿晉祠宇下夜有人叩門云介休王暫借霹靂車至介休收麥良久數人共持一物如幢上綴旗旙凡十八葉有光如電以授之次日介休大雷雨損麥千餘頃又李靖嘗投宿一巨宅有老婦延之中夜叩户甚迅婦出謂靖曰老婦龍也二子俱出今天命行雨欲煩一行遂鞴青驄馬以一瓢水與之戒曰馬躩地嘶鳴即取水一滴滴馬鬃上一滴乃地上一尺慎勿多也靖見旱極連下三十餘滴靖歸婦驚語曰平地水深三丈矣詩意主禱雨故用此事是日自磻溪往陽平憩於麻田青峯寺之下院翠麓亭不到峯前寺空來渭上村此亭聊可喜修徑豈辭捫谷映朱欄秀山含古木尊路窮驚石斷林缺見河奔馬困嘶青草僧留薦晚飱我來秋日午旱久石牀溫安得雲如蓋能令雨瀉盆共看山下稻涼葉晚翻翻三水小牘安定郡有峴陽峰峰上有池若雨則雲起池中如車蓋然故里諺曰峴山張蓋雨雱霈杜詩白帝城頭雲若屯白帝城下雨翻盆二十七日自陽平至斜谷宿於南山中蟠龍寺橫槎晚渡碧澗口騎馬夜入南山谷谷中暗水響瀧瀧嶺上踈星眀煜煜寺藏嵓底千萬仭路轉山腰三百曲風生飢虎嘯空林月黑驚麏竄修竹入門突兀見深殿照佛青熒有殘燭愧無酒食待遊人旋斫杉松煮溪䔩板閣獨眠驚旅枕木魚曉動隨僧粥起觀萬瓦欎參差日亂千巖散紅緑門前商賈負椒荈山後咫尺連巴蜀何時歸耕江上田一夜心逐南飛鵠杜甫宿贊上人房詩夜深殿突兀風動金琅璫是日至下馬磧憩於北山僧舍有閣曰懷賢南直斜谷西臨五丈原諸葛孔眀所從出師也南望斜谷口三山如犬牙西觀五丈原欎屈如長蛇有懷諸葛公萬騎出漢巴吏士寂如水蕭蕭聞馬檛公才與曺丕豈止十倍加顧瞻三輔間勢若風卷沙一朝長星墜竟使蜀婦髽山僧豈知此一室老煙霞往事逐雲散故山依渭斜客來空弔古清淚落悲笳漢書文帝紀髙帝王子弟地犬牙相制注犬牙言地形如犬之牙交相入也長安志引水經注斜水北歷斜谷過五丈原亦謂之武功水又曰武功蓋在渭水南郿縣北是蜀志建興十二年諸葛亮悉大衆由斜谷出以流馬運據武功五丈原與司馬仲達對於渭南分兵屯田為久住之基耕者雜於渭濵之間而百姓安堵軍無私焉詩車攻萹蕭蕭馬鳴毛傳言不歡譁也公詩用此意韻注馬檛鞭也諸葛亮傳先主病篤召亮謂曰君才十倍曹丕必能安國家定大事晉陽秋有星赤而芒角自東北西南流投於亮營三投再還往大還小俄而亮卒戴記婦人髽而弔也自敗於狐駘始也蓋魯臧紇敗於狐駘國人逆喪者皆髽施注蘇詩卷一
