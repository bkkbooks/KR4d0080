body:
  text: 蘇詩續補遺卷上宋蘇軾撰錢塘馮景補注古體詩一百四十四首送淡公二首燕本冰雪骨越淡蓮花風五言雙寶刀聨響髙飛鴻翰苑錢舍人詩韻鏗雷公識本不識淡仰詠嗟無窮清韻生物表朗玉傾壺中常於冷竹坐相語道意沖嵩洛興不薄稽江事難同明日若不來我作黃石翁何以兀其心為君學虛空本淡二僧名燕越二僧所産地也莊子逍遙逰肌膚若氷雪傳燈録慧可頂骨如五峯秀出楞嚴經縱觀如來青蓮花眼梁昭明文選序退傅有在鄒之作降將有河梁之篇四言五言區以别矣注降將謂李陵别蘇武於河梁作五言解頤新語論者謂南風之辭卿雲之頌夏歌鬱陶乎豫心詩體未備五言之濫觴也逮漢李陵始著五言之目唐書秦系曰劉長卿自謂五言長城系以偏師攻之雖老益壯曹植有寶刀賦楊雄法言鴻飛冥冥聫響即聫句始於漢武柏梁宋孝武帝華林都亭曲水聫句效柏梁體長楊賦翰林以為主人姓譜方雷氏之後蓋古諸侯國黃帝時有雷公按唐雷威嘗入深松中聽風雪聲連延悠揚者伐為琴世稱雷公琴世説時人目夏侯太初朗朗如日月之入懷李安國穨唐如玉山之將崩唐詩一片氷心在玉壺六祖問答九年冷坐無人識神仙傳浮丘伯姓李隱居嵩山服黃精二十年久之成道白日飛升列仙傳王喬周靈王太子晉也好吹笙作鳯鳴逰伊洛之間遇道士浮丘公接以上嵩山晉書庾亮曰諸君少住老子於此興復不淺王徽之傳嘗居山隂夜雪初霽忽憶戴逵逵時在剡便夜乘小船詣之造門即返漢張良傳老父謂良曰後五日平明與我期此五日平明良往父已先在怒曰與老人期後何也去後五日早會又曰孺子見我濟穀城下黃石即我已遂去不見神仙傳黃石君者修彭祖之術年數百嵗陸機文賦兀若枯木文選注引郭象注曰行若曳枯木止若聚死灰莊子德充符常季問於仲尼曰王駘兀者也固有不言之教無形而心成者耶金剛經四維上下虛空可思量不楞嚴經起為世界靜成虛空虛空為同世界為異坐重青草公意合滄海濱渺渺獨見水悠悠不聞人鏡浪洗手渌剡花入心春雖然防外觸眼前繞衣新行當譯文字慰此吟殷勤後漢五行志獻帝踐祚之初京師童謠曰千里草何青青十日卜不得生按千里草為董此豈有董姓者與淡公意合耶輿地志鑑湖後魏太守馬臻所開本名慶湖避漢安帝父清河王諱改為鏡湖今在紹興城南述異記鏡湖軒轅鑄鏡於此楞嚴經因色有香因香有觸維摩經會中有一天女以天花散諸菩薩悉皆墮落至大弟子便著不墮天女曰結習未盡故花著身結習盡者花不著身又文殊師利歎曰善哉善哉乃至無有文字語言是真入不二法門高僧傳先是律藏未闡鳩摩羅什延請多羅誦出十誦梵本羅什譯為晉文上韓持國韓氏三虎秉樞極中有一虎似偉節端居隱几學無心夙駕入朝常正色犯時獨行太崴􅕲回天不忌真藥石輦致歸來荷二聖推排使至有衆力吾儕小人但飽飯一作食不有君子何能國西湖醉臥春水船如何為人作豐年宋史韓維傳字持國與兄絳弟縝先後同在樞府維屢有諌諍孔文仲以對䇿切直罷歸維言臣恐賢俊解體忠良結舌安石惡之後漢賈彪傳字偉節潁川定陵人彪兄弟三人並有高名而彪最優故天下稱曰賈氏三虎偉節最怒漢天文志中宫天極星其一明者泰一之常居也旁三星三公又元鳯四年九月客星在紫宫中斗樞極間占曰為兵春秋運斗樞比斗七星第一曰天樞莊子齊物論南郭子綦隱几而坐天地篇凡有首有趾無心無耳者衆詩國風星言夙駕公羊傳孔父正色而立于朝則人莫敢致難於其君者孔父可謂義形於色矣晉書熊逺字孝文遷御史中丞中宗每歎其公忠謂逺曰卿在朝正色可謂王臣後漢書有獨行傳韓文特立而獨行史記相如賦云嵗磈嵬瘣隱轔欎􅕲唐書貞觀四年詔發卒治洛陽宫且東幸張玄素上書諌即詔罷役魏徵歎曰張公論事有回天之力左傳美疢不如惡石戰國䇿苦言藥也南史王僧孺傳侍郎金元起欲注素問訪以砭石僧孺答曰古人嘗以石為針必不用鐵説文有此砭字許慎云以石刺病也東山經高氏之山多針石郭璞云可以為砭針春秋美疢不如惡石服子慎注云石砭石也李世無復佳石故以鐵代之爾晉書董京傳或見推排罵辱曽無怒色王僧虔傳嘗有書教子曰吾在世雖乏德素要復推排人間十許年故是一舊物左傳吾儕小人皆有闔廬以避燥濕寒暑又吾儕小人朝不及夕又不有君子其能國乎杜甫詩但使殘年飽喫飯又春水船如天上坐世説世稱庾文康為豐年玉稚恭為荒年榖庾家論云是文康稱恭為荒年榖庾長仁為豐年玉乂蔡洪曰凡此諸君以義理為豐年送别鴨頭春水濃如染水面桃花弄春臉衰翁送客水邊行沙襯馬蹄烏帽點昻頭問客幾時歸客道秋風落葉飛繫馬緑楊開口笑傍山依約見斜暉白居易詩鴨頭新緑水鴈齒小紅橋唐詩桃花笑臉紅崔護詩人面桃花相映紅通典上古衣毛冒皮則帽之名所繇起故釋名曰帽者冒也劉熙逸雅帽冒也巾謹也晉輿服志成帝咸和中制聽尚書八座三省侍郎俱著烏紗帽陳周𢎞正謝烏紗帽啓雖復魏宣二端豈能比今烏紗兹賜廣微四縫未足擬其華飾漢書司馬遷報任安書乃欲卭首信眉論列是非莊子盜跖篇其中開口而笑者一月之中不過四五而已矣琴枕清眸作金徽素齒為玊軫響泉竟何用金帶常苦窘斕斑漬珠淚宛轉堆雲鬒君若安七絃應彈卓氏引謝惠連自針氣之凊明雙眸善識文選七發皓齒娥眉西京雜記趙后有寶琴曰鳯凰以金玉隱起為龍螭象嵇康琴賦絃以園客之絲徽以鍾山之玉陳暘樂書琴論黃帝之清角齊桓之號鐘楚莊之繞梁相如之緑綺以至玊牀響泉之類名號之别也輟耕録響泉即蔡雍所傳開成至寶雷威斫述異記南海之外有鮫人水居如魚不廢緝績其眼能泣珠博物志鮫人賣綃臨去從主人索器泣而出珠滿盤以謝主人毛詩鬒髮如雲左傳昔有仍氏女生鬒黑而甚美光可以鑑學記不學操縵不能安絃彈琴九引一曰烈女引二曰伯妃引三曰貞女引四曰思歸引五曰霹靂引六曰走馬引七曰箜篌引八曰秦引九曰楚引漢司馬相如傳臨卭令前奏琴曰竊聞長卿好之願以自娛相如辭謝為鼓一再行是時卓王孫有女文君新寡好音故相如謬與令相重而以琴心挑之黃州南山一尺雪雪盡山蒼然澗谷深自暖梅花應已繁使君厭騎從車馬留山前行歌招野叟共步青林間長松得高蔭盤石堪醉眠祗樂聽山鳥攜琴寫幽泉愛之欲忘返但苦世俗牽歸來始覺逺明月高峰顛春秋隱九年三月庚辰大雨雪左傳平地尺為大雪宋謝惠連雪賦盈尺則呈瑞於豐年樂府幽澗泉者山水二十四曲之一李白古樂府拂彼白石彈吾素琴幽澗愀兮流泉深金徽變化篇假由夫攜琴就松風澗響之間曰三者皆有自然之聲正合類聚古風精神洞元化白日升高旻俯仰淩倒景龍行逸如神半道過紫府弭節聊逡巡金牀設寶几璀璨明月珍仙者二三子眷然骨肉親飲我霞石杯放杯恍如春遂朝玊虗上冠劍班列真無端拜失儀放棄令自新雲霄難遽返下土多埃塵淮南守天庖嗟我復何人莊子在宥篇廣成子曰至道之精窈窈冥冥無視無聼抱神以靜張紫陽真人曰以精化氣以氣化神以神化虛名曰三華聚頂淮南子若士曰吾與汗漫期於九垓之上不可以久駐乃舉臂而竦身遂入雲中神仙傳浮丘伯隱居嵩山久之道成白日飛升梁纂要日景在上曰反景在下曰倒景司馬相如大人賦貫列缺之倒景兮涉豐隆之滂濞注倒景氣去地四千里其景皆倒在下也列仙傳陶安公六安冶師也七月七日騎赤龍上升几歌夕弭節兮北渚六帖銀宫金闕紫府凊都關令內傳老子與尹喜登崑崙上金臺玉樓七寶宫殿晝夜光明乃天地四王之所逰處有珠玊七寶之牀古樂府金牀玉几不能眠下踏霜與露拾遺記瀛州南有金鸞之觀中有寶几覆以雲紈之素劉孝綽詩共摛雲氣藻同舉霞文杯名山記小有清虛天清虛玉君所居抱朴子河東項曼都入山學仙十年而歸云曽到天上仙人以流霞一杯飲我輒不飢渴忽然思家到上帝前謁拜失儀見斥河東因號曼都為斥仙人又劉安升仙見上帝誤稱寡人謫守天厨遊杭州山山中村塢迷野寺鐘相答晚隂失林莽一作杪落日猶在塔行招兩社僧共步青山月送客渡石橋迎客出林樾幽尋本真性往事聽徐説錢王方壯年此邦事輕俠鄉人鄙貧賤異類識英傑立石像興王遺址今岌嶪功勳三吳定富貴四海甲歸來父老藏崇高畏傾壓詩人工譏病此欲恣挑抉流傳後世人談笑資口舌是非今已矣興廢何倉卒持歸問禪翁笑指浮漚沒五代史吳越世家錢鏐字具美杭州臨安人及壯無賴販鹽為盜有善術者望斗牛間有王氣見鏐大驚曰貴人也後起兵并董昌昭宗拜鏐鎮海鎮東軍節度使加檢校太尉中書令鏐遊衣錦城宴故老山林皆覆以錦天復二年封鏐越王又梁太祖聞鏐好玉帶名馬笑曰真英雄也又鏐作還鄉歌曰三節還鄉兮挂錦衣父老逺來相追隨牛斗無孛人無欺吳越一王駟馬歸吳興記臨安縣東五里石鏡山東有石鏡一所徑二尺四寸光照如鏡武肅王錢鏐幼時遊此照其形服冕旒如王者狀又鏐布衣時嘗照石鏡鏡起而聳戰楞嚴經空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無况復諸三有又惟認一浮漚體目為全潮窮盡瀛海汝等即是迷中倍人遊洞之日有亭吏乞詩既為留三絶句於洞之石壁明日至峽州吏又至意若未足乃復以此授之三絶句老泉及東坡子由各一也按南行集老泉遊三遊洞詩云洞中蒼石流成乳山下寒溪冷欲冰天寒二子苦求去我欲居之亦不能子由詩云昔年冇遷客攜手過嵌岩去我嵗已百遊人忽復三按此題前東坡有逰三遊洞絶句一首今入下卷一徑繞山翠縈紆去似蛇忽驚溪水急爭看洞門呀滑磴攀秋蔓飛橋踏古槎三扉迎北吹一穴向西斜歎息煙雲去追思嵗月遐唐人昔未到古俗此為家洞暖無風雪山深富鹿猳相逢衣盡草環坐髻應髽竈突依巖黑樽罍就石窪洪荒無傳記想像在犧媧此事今安有遺蹤我獨嗟山翁勸留句強為寫槎牙世説羊元所居山當户峯巒竒秀謂客曰此翠屏宜晚對爽人心目栁文斗折蛇行明滅可見禮記檀弓魯婦人之髽而弔也自敗于臺鮐始也南宫縚之妻之姑之喪夫子誨之髽栁宗元詩風移魯婦髽淮南子孔子無黔突墨子無暖席魯連子竈五突分煙者衆也吕氏春秋竈突決火上棟宇和穆父新涼家居妻兒號出仕猿鶴怨未能逐什一安敢摶九萬常恐樗櫟身坐纒冠蓋蔓受恩如負債粗報乃焚劵但知眠牛衣寧免刺虎圈清風來既雨新稻香可飯紫螯應巳肥白酒誰能勸君今崔蔡手政比張趙健三公行可致一語自先獻幸推江湖心適我魚鳥願韓退之進學解冬暖而兒號寒年豐而妻啼飢北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚漢書楊惲報孫會宗書糴賤販貴逐什一之利南史宋劉伯龍少而貧薄及歷位尚書左丞少府武陵太守貧寠尤甚常在家慨然召左右將營什一之方忽見一鬼在旁撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑也遂止莊子逍遙遊摶扶搖而上者九萬里又惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩人間世匠石之齊至乎曲轅見櫟社樹其大蔽牛匠伯不顧曰散木也漢書冠蓋相望史記孟嘗君傳問左右何人可使收債於薜者又馮歡乃持劵如前合之能與息者與為期貧不能與息者取其劵而燒之後漢樊宏傳其素所假貸人間數百萬遺令焚削文契責家聞者皆慙爭往償之諸子從敕競不肯受漢王章傳章疾病無被卧牛衣中與妻決涕泣及為京兆欲上封事妻止之曰人當知足獨不念牛衣中涕泣時耶漢儒林傳轅固齊人也竇太后好老子書召問固固曰此家人言耳太后怒曰安得司空城旦書乎乃使固入圈擊彘上假固利兵刺彘正中其心彘應手而倒按此乃刺彘恐非虎圈公蓋偶記張釋之傳虎圈嗇夫及郊祀志商中虎圈字耳後漢崔瑗傳瑗字子玉高於文詞尤善為書記針銘諸能為文者皆自以為弗及范曄贊崔為文宗世禪雕龍蔡雍傳雍字伯喈博學好辭章數術天文妙操音律范曄贊雍實慕靜心精辭綺唐劉宗元傳雄深雅健似司馬子長崔蔡不足多也漢趙尹韓張兩王傳班固贊曰自孝武置左馮翊右扶風京兆尹吏民為之語曰前有趙張後有三王莊子魚相忘於江湖無題引手攀紅櫻紅櫻落如線仰首看紅日紅日走如箭年光與時景頃刻互衰變何當血肉身安得常強健人心苦執迷富貴憂貧賤憂色常在眉歡容不上面吾今頭半白把鏡非不見惟應花下杯更待他人勸論衡日晝行千里夜行千里李賀詩炎炎紅鏡東方開圓覺經我今此身四大和合所謂髮毛爪齒皮肉筋骨皆歸於地唾涕膿血精液涎沫皆歸於水暖氣歸火動轉歸風楞嚴經豈惟年變亦兼月化何直月化兼又日遷念念之間不得停住故知我身終成變滅又則知汝心本妙明淨汝自迷悶喪本受輪南史劉穆之傳謂所親曰貧賤常思富貴富貴必踐危機今日思為丹徒布衣不可得也又王玄謨傳馳啓孝武具陳本末帝答曰七十老公反欲何求聊復為笑想足以申卿眉頭耳玄謨性嚴未曽妄笑時人言玄謨眉頭未曽申故以此為戲又齊本紀高帝為相王鎮東府欎林時五嵗牀前戲高帝方令左右拔白髮問曰兒言我誰耶答曰太翁高帝笑謂左右曰豈有為人作曽祖而拔白髮者乎即擲鏡鑷古意兒童鞭笞學官府翁憐兒癡旁笑侮翁出坐曹鞭復呵賢於羣兒能幾何兒曹鞭人以為戲公怒鞭人血流地等為戲劇誰復先我笑謂翁兒更賢尚書舜典鞭作官刑朴作教行漢刑法志薄刑用鞭朴唐開元名例律笞刑五注笞用箠自十至五十贖銅從一斤至五斤賈誼過秦論執敲朴以鞭笞天下左傳誅屨於徒人費弗得鞭之見血北史齊本紀流血灑地以為娛樂又以馬鞭鞭楊愔背流血浹袍按自古至今以鞭笞流血為戲劇者莫高洋若也題曰古意豈亦有感於此耶用定國韻贈二十姪震衡門老苔蘚行柏千兵屯開樽邀落日未對烏鳥言清風舉吹籟散亂書帙翻傳呼一何急人馬從車奔貧居少賔客鄰婦窺籬籓牆頭過春酒緑泛田家盆比來伏青蒲坐捉白獸樽王猷修潤色亦有簿領煩朝廷貴二陸屢聞天語溫猶能整筆陳愧我非韓孫詩國風衡門之下可以棲遲莊子齊物論子綦曰汝聞人籟而未聞地籟汝聞地籟而未聞天籟夫子遊曰敢問其方子綦曰夫大塊噫氣其名為風杜甫詩隔屋喚西家借問有酒不墻頭過濁醪展席俯長流漢史丹傳候上間獨寢時丹直入臥內頓首伏青蒲上涕泣言曰皇太子以適長立云云天子素仁不忍見丹涕泣言又切至上意大感晉樂志正旦元會設白獸樽於殿廷樽蓋上施白獸若有能獻直言者則發此樽飲之晉書陸機傳字士衡少有異才文章冠世至太康末與雲俱入洛造太常張華華素重其名如舊相識曰伐吳之役利獲二㑓王羲之筆陳圗夫紙者陳也筆者刀矟也墨者鍪甲也水硯者城池也心意者將軍也孫何有詩戰篇物華如陳筆如鋒沈謝曹劉是七雄聞潮陽吳子野出家子昔少年日氣蓋里閭俠自言似劇孟叩門知緩急千金已散盡白首空四壁烈士歎暮年老驥悲伏櫪妻孥真弊屣脫棄何足惜四大猶幻座衣冠矧外物一朝發無上願老靈山宅世事子如何禪心久空寂世間出世聞此道無兩得故應入枯稿習氣要除拂丈夫生豈易趣舍志匪石當為師子吼佛法無南北漢書遊俠傳劇孟者洛陽人也周人以商賈為資劇孟以俠顯大類朱家而好博多少年之戲史記袁盎傳緩急人所有一旦叩門不以親為解不以存亡為辭天下所望者獨季心劇孟耳司馬相如傳家徒四壁立世説晉王敦字處仲每酒後輒詠老驥伏櫪志在千里烈士暮年壯心不已歌闋以如意擊唾壺壺口盡缺史記封禪書嗟乎誠得如黃帝吾視去妻子如脫屣耳圓覺經四大假合而成幻軀法華經無上兩足尊楞嚴經反聞聞自性性成無上道釋典佛國有五精舍其一為靈鷲山起信論世間根本味禪出世根本淨禪出世口無漏禪出世間上上禪後漢書遂乃榮華丘壑甘足枯稿楞嚴經習氣成暴流詩我心匪石漢書司馬遷傳趣舍異路涅槃經佛説偈言師子一吼衆獸伏金剛一杵羣峯碎修羅無數一輪降世間黑暗一日破傳燈録梁武通天元年逹摩來自西土為初祖慧可為二祖僧璨為三祖道信為四祖𢎞忍為五祖慧能為六祖自中華五祖之下曹溪六祖為南宗神秀大師為北宗又六祖曰人冇南北佛性豈然古離别送蘇伯固一作送蘇伯固效韋蘇州三度别君來此别真遲暮白盡老髭鬚明日淮南去酒罷月隨人淚濕花如霧後夜逐君還夢繞湖邉一作江南路離騷惟草木之零落兮恐美人之遲暮杜甫詩老年花似霧中看次韻魯直書伯時畫王摩詰前身陶彭澤後身韋蘇州欲覓王右丞還向五字求詩人與畫手蘭菊芳春秋又恐兩皆是分身來入流晉書陶潛字元亮為彭澤令唐韋應物河南人性高潔工詩貞元中歷蘇州刺史世稱韋蘇州唐書王維字摩詰官尚書右丞工草𨽻善畫唐詩品彚總論開元天寶間則孟襄陽之凊雅王右丞之精緻大厯貞元間則有韋蘇州之雅淡劉隨州之間曠煙花録煬帝曰春蘭秋菊各一時之芳楞嚴經與佛如來同慈力故令我身成三十二應金剛經須陀洹名為入流而實無所入雷州八首一統志雷州古粵地天文牛女分野秦屬象郡漢曰徐聞梁隋曰合州曰海康唐曰雷州白髮坐鉤黨南遷瀕海州灌園以糊口身自雜蒼頭籬落秋暑中碧花蔓牽牛誰知把鋤人舊日東陵侯後漢黨錮傳陳蕃為太傅與大將軍竇武共秉朝政謀誅宦官故引用天下名士乃以李膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕鉤黨鄉人謂膺曰可去矣對曰事不辭難睪不逃刑臣之節也吾年已六十死生有命去將安之乃詣獄考死鄒陽書於陵仲子辭三公為人灌園左傳以糊其口於四方漢鮑宣傳蒼頭盧兒皆用致富注謂奴為蒼頭猶秦言黔首也史記召平故秦東陵侯秦滅後為布衣種瓜長安城東瓜美故世謂之東陵瓜又云青門瓜青門東陵也杜甫詩縱冇健婦把鋤犁荔子無幾何黃柑遽如許遷臣不惜日恣意移寒暑層巢俯雲木信美非吾土草芳自有時鶗鴂何關汝廣志荔支樹青花朱實大如雞子實白如肪甘而多汁似安石榴有甜酸者至日將中翕然俱赤則可食也一樹下子有百斛風土記甘橘之屬滋味甜美有黃者頳者謂之胡甘後漢方術傳左慈走入羊羣操知不可得乃令就羊中告之曰不復相殺本試君術耳忽有一老羝屈前兩膝人立而言曰遽如許即競往赴之而羣羊數百皆變為羝並屈前膝人立云遽如許王粲登樓賦雖信美而非吾土兮曽何足以少留離騷經恐鵜鴂之先鳴兮使百草為之不芳下居近流水小巢依嶺岑終日數椽間但聞鳥遺音爐香入幽夢海月明孤斟鷦鷯一枝足所恨非故林莊子逍遙逰鷦鷯巢於深林不過一枝培塿無松柏駕言此焉遊讀書與意會郤掃可忘憂尺蠖以時屈其伸亦非求得歸良不惡未歸且淹留左傳部婁無松柏墨子培塿生松柏説文培塿小山也詩國風駕言出逰後漢杜密傳劉勝自蜀郡告歸鄉里閉門掃軌無所干及又劉祐杜門絶迹周易尺蠖之屈以求信也劉安招隱士攀援桂枝兮聊淹留又心淹留兮恫荒忽粵嶺風俗殊有疾時勿藥束帶趨房祀用史巫紛若絃歌薦繭栗奴至洽觴酌呻吟殊未央更把雞骨灼周易旡妄之疾勿藥有喜又巽在牀下用史巫紛若陳氏禮書其牲角繭栗漢書郊祀志粵人勇之乃言粵人俗鬼而其祠皆見鬼數有效乃命粵巫立粵祀祠安臺無壇亦祠天神帝百鬼而以雞卜自此始用師古注俗鬼言其土俗尚鬼神之事粵女市無常所至輒成區一日三四遷處處售蝦魚青裙腳不襪臭味猿與狙孰云風土惡白洲生緑珠漢揚雄傳有田一壥有宅一區廣志蝦魚類土附而腮紅若虎善食蝦俗謂之新婦魚一名蝦虎方輿記博白雙角山下梁氏女緑珠生此石崇為採訪使以珠三斛易之舊井尚存汲飲者産女必麗色干寶晉記石崇有妓人曰緑珠海康臘已酉不論冬孟仲殺牛撾鼓祭城郭為傾動雖非堯頒歷自我先人用苦笑荆楚人嘉平臘雲夢風俗通夏曰嘉平殷曰清祀周曰大蠟漢改曰臘臘者獵也因獵取禽獸以祭先祖也荆楚嵗時記諺云臘鼓鳴春草生村人並擊細腰鼓戴胡頭以逐疫搜神記宣帝時隂子方臘日晨炊竈神見子方以黃羊祀之後遂巨富故後人臘日祀竈後漢陳咸傳成哀間為尚書王莽篡位謝病不仕猶用漢家祖臘曰我先人豈知王氏臘乎舊時日南郡野女出成羣此去尚應逺東風已如雲蚩氓託絲布相就通殷勤可憐秋胡子不遇卓文君後漢郡國志日南郡注秦象郡武帝更名屬交州刺史所部劉熙逸雅郡羣也人所羣聚也詩國風有女如雲又氓之蚩蚩抱布貿絲列女傳魯秋胡潔婦者魯秋胡之妻也秋胡子既納之五日而去宦於陳五年乃歸未至家見採桑婦美謂曰力田不如逄少年力桑不如見公卿今吾有金願與夫人婦不受秋胡子還家奉金遺母母使人呼其婦即採桑者婦乃自投於河而死妬佳月狂雲妬佳月怒飛千里黑佳月了不嗔曽何汙潔白爰有謫仙人舉酒為三客今夕偶不見汍瀾念風伯毋煩風伯來彼也易滅沒支頤少待之寒空淨無迹粲粲黃金盤獨照一天碧玉繩慘無輝玊露洗秋色浩瀚玻璃盞和光入胸臆使我能永延約君為莫逆莊子怒而飛其翼若垂天之雲鮑照詩三五二八時千里與君同李白詩對月成三人韓非子黃帝合鬼神於泰山風伯進掃雲笈七籖風伯姓方名道彰吕氏春秋風伯曰飛亷莊子漁父左手據膝右手持頥以聼世説司馬太傅齋中夜坐於時天月明淨都無纎翳太傅歎以為佳謝景重在坐答曰意謂乃不如微雲點綴太傅曰卿居心不淨乃復強欲滓穢太清耶杜詩月落如金盆禮斗威儀玉衡北兩星為玉繩謝朓詩金波麗鳷鵲玉繩低建章五經通義和氣精液凝為露杜詩玉露凋傷楓樹林李白詩秋露如白玉團團下庭緑莊子大宗師三人相視而笑莫逆於心遂相與友追和沈遼頃贈南華詩善哉彼上人了知明鏡臺歡然不我厭肯致逺公材莞爾無心雲胡為出岫來一堂安寂滅卒嵗扄蒼苔禪宗要覽瓶沙王呼佛弟子為上人內有德智外有勝行在人之上故名上人傳燈録神秀偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃盧慧能曰美則美矣了則未了和一偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃陶淵明歸去來辭雲無心以出岫高僧傳晉義熙間僧惠逺居廬山與劉遺民等十八賢同修淨土中有白蓮池因號蓮社隋書經籍志涅槃譯言滅度亦言常樂我淨雪林硯屏率魯直同賦西山無時春巉巗鎖頑隂分明倚天壁點綴無風林物固為人出興誰於此深窮竒真自蠧詩句且娛心世説微雲點綴及老子於此興復不淺皆注見前史記李斯傳娛心意説耳目申王畫馬圗天寶諸王愛名馬千金爭致華軒下當時不獨玉花􅔕飛電流雲絶瀟灑兩坊岐薛寧與申慿陵內廄多清新肉騣汗血畫龍種紫袍玉帶真天人驪山射獵包原隰御前急詔穿圍入揚鞭一蹙破霜蹄萬騎如風不能及鴈飛兔走驚弦開翠華按轡從天回五家錦繡變一作遍山谷百里舄珥遺纎埃青騾蜀棧兩超忽一作西趨急高準濃娥散荆棘回首追風趁日飛一作苜茫連天鳥自飛五陵佳氣春蕭瑟杜詩朝來少試華軒下盡斷唐玄宗所乘馬有玉花􅔕照夜白唐書宗室世系惠文太子範嗣岐王珍惠宣太子業嗣薛王知柔杜詩肉騣碨礧連錢動西域傳大宛國別邑七十餘城多善馬馬汗血言其先天馬子也杜詩霜蹄千里駿又汝陽真天人古今注秦始皇有七名馬一追風二白兔三躡景四追電五飛翮六銅爵七晨鳬瑞應圗飛兔神馬名日行三萬里顔延之馬賦紫燕駢衡按鴈飛兔走皆指馬言則鴈當作燕唐書后妃傳每十月帝幸華清宫五宅車騎皆從家别為隊隊一色俄五家隊合爛若萬花川谷成錦繡又遺鈿墮舄瑟瑟璣琲狼籍於道香聞數十里原注明皇乘青騾入蜀後漢書蘇伯阿望舂陵城曰氣佳哉鬱欎蔥蔥杜詩五陵佳氣無時無奉和成伯大雨中會客解嘲樂事難并真實語坐排用意多乖誤興來取次或成歡瓦鉤郤勝黃金注我生禍患久不擇肯為一時風雨阻天公變化豈有常明月行看照歸路王勃膝王閣序四美具二難并金剛經如來是真語者實語者李義山詩若信貝多真實語三生同聼一樓鐘莊子逹生以瓦注者巧以鉤注者憚以黃金注者殙其巧一也而有所矜則重外也凡外重者內拙酉陽雜俎天公姓張名堅漁陽人乘白龍振䇿登天和公濟飲湖上昨夜醉歸還獨寢曉來宿雨鳴孤枕扁舟小棹截湖來正見青山駮雲錦須知老人興不淺莫學公榮不共飲與君歌鼓樂豐年喚收千夫食陳廪詩小雅厭厭夜飲不醉無歸世説劉公榮與人飲酒雜穢非類人或譏之答曰勝公榮者不可不與飲不如公榮者亦不可不與飲是公榮輩者又不可不與飲故終日共飲而醉又王戎弱冠詣阮籍劉公榮在坐阮謂王曰偶有二斗美酒當與君共飲彼公榮者無預焉或問之阮答曰勝公榮者不得不與飲酒不如公榮者不可不與飲酒惟公榮可不與飲酒按詩云不共飲蓋主後説贈僧道人自嫌三世將棄家十年今始壯玉骨猶含富貴餘漆瞳已照人天上去年相見古長干衆中矯矯如翔鸞今年過我江西寺病瘦已作霜松寒朱顔不辦供嵗月風中蒿火湯中雪好問君家黃面翁乞得摩尼照生滅莫學王郎與支遁臂鷹走馬憐神駿還君圗畫君自收不如木人騎土牛史記王翦傳為將三世者必敗其所殺伐多矣其後受其不祥今王離已三世將矣居亡何項羽救趙擊秦軍果虜王離庾信哀江南賦三世為將終於此滅江左名士傳杜𢎞治目如點漆一統志金陵長干里在聚寶門外有長干橋世説支道林長養數匹馬或言道人畜馬不韻支曰貧道重其神駿善信經明月珠摩尼珠多在龍腦中杜詩惟有摩尼珠可照濁水源舊注周泰擢新城太守司馬宣王使鍾繇調之曰君釋褐登宰府三十六日而擁麾蓋守兵馬郡乞兒乘小車一何駛乎泰曰君明公之子有文采守吏職獼猴騎木牛又何遲也李白詩身騎土牛帶東魯周教授索枸杞因以詩贈録呈廣倅蕭大夫鄴侯藏書手不觸嗟我嗜書終日讀短檠照字細如毛怪底昏花懸兩目扶衰賴有王母杖名字於今挂仙録荒城古塹草露寒碧葉叢低紅菽粟春根夏苖秋著子盡付天隨恥充腹蘭傷桂折緣有用爾獨何損丹其族贈君慎勿比薏苡採之終日不盈掬外澤中乾非爾儔斂藏更借秋陽曝雞壅桔梗一稱帝堇也雖尊等臣僕時復論功不汝遺異時謹事東籬菊韓退之詩鄴侯家多書架插三萬軸一一懸牙籖新若手未觸又短檠二尺便且光楞嚴經瞪以發勞則於虛空别見狂華唐書陸龜蒙字魯望居松江甫里時謂江湖散人或號天隨子所居前後皆樹杞菊以供杯案揚雄解嘲客徒欲朱丹吾轂不知一趺將赤吾之族也後漢馬援傳初援在交址嘗餌薏苡實以勝瘴氣軍還載之一車詩小雅終朝採菉不盈一掬莊子徐無鬼藥也其實堇也桔梗也雞雍也豕零也是時為帝者也何可勝言次韻董夷仲茶磨前人初用茗飲時煮之無問葉與骨寖窮厥味臼始用復計其初碾方出計盡功極至於磨信哉知者能創物破槽折杵向墻角亦其遭遇有伸屈嵗久請求知處所佳者出自衡山窟巴蜀石工強鐫鑿理疏性軟良可咄豫家江陵逺莫致塵土何人為披拂茶經其名一曰茶二曰檟三曰蔎四曰茗五曰荈郭璞云早取為茶晚取為茗天台記丹邱出大茗服之生羽翼茶譜歷代貢茶皆以建寧為上而密雲龍品最高皆碾末作餅周禮考工記知者創物巧者述之守之世謂之工送公為遊淮南負米萬里緣其親運甓無度憂其身讀書莫學流麥士挾䇿莫比亡羊人乃翁辛苦到白首汝今強勉當青春昔時管鮑以君霸此兩士賈寧非貧家語子路曰昔由事二親之時常食藜藿之食為親負米百里之外親沒之後南遊於楚從車百乘積粟萬鍾纍茵而坐列鼎而食顧欲食藜藿為親負米不可得也晉陶侃傳侃在州無事輒朝運百甓於齋外暮運於齋內人問其故答曰吾方致力中原過爾優逸恐不堪事其勵志勤力皆此類也後漢高鳯傳字文通南陽葉人也少為書生家以農畝為業而專精誦讀妻嘗之田曝麥於庭令鳯護雞時天暴雨而鳯持竿誦經不覺潦水流麥妻還怪問鳯方悟之其後遂為名儒莊子駢拇篇臧與榖二人相與牧羊而俱亡其羊問臧奚事則挾策讀書問穀奚事則博塞以遊二人所業不同其亡羊均也史記管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也謝蘇自之惠酒高士例須憐麴糵此語常聞退之説我今有説殆不然麴糵未必高士憐醉者墜車莊生言全酒未若全於天逹人本自不虧缺何暇更求全處全景山沈迷阮籍傲畢卓盜竊劉伶顛貪狂嗜怪無足取世俗喜異矜其賢杜陵詩客尤可笑羅列八子參羣仙流涎露頂置不説為問底處能逃禪我今不飲非不飲心月皎皎長孤圓有時客至亦為酌琴雖未去聊忘絃吾宗先生有深意百里雙罌逺將寄且言不飲固亦高舉世皆同吾獨異不如同異兩俱冥得鹿亡羊等嬉戲決須飲此勿復辭何用區區較醒醉韓退之贈崔立之詩高士例須憐麴蘖莊子逹生夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也又彼得全於酒而猶若是而况得全於天乎三國志徐邈字景山為尚書郎時科禁酒而邈私飲至於沈醉晉書阮籍傳字嗣宗籍傲然獨得任性不羈嗜酒能嘯畢卓傳字茂世太興末為吏部郎常飲酒廢職比舍郎釀熟卓因醉夜至其甕間盜飲之為掌酒者所縛劉伶傳字伯倫常乘鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此杜甫飲中八仙歌道逄麴車口流涎又脫帽露頂王公前又醉中往往愛逃禪傳燈録心月孤圓光吞萬象晉陶潛傳性不解音而畜素琴一張絃徽不具每朋酒之會則撫而和之曰但識琴中趣何勞絃上聲列子鄭人擊駭鹿斃之覆之以蕉俄而遺其所藏之處遂以為夢焉順途詠其事傍人聞而取之告其室人曰向薪者夢得鹿而不知其處吾今得之彼直真夢者矣亡羊注已見楚辭衆人皆醉我獨醒戲和正甫一字韻一字韻未詳故居劍閣隔錦官柑果薑蕨交荆菅竒孤甘挂汲古綆僥覬敢揭鉤金竿已歸耕稼供藳秸公貴幹蠱高巾冠改更句格各蹇當作謇吃姑因狡獪加間關劍誾記梁山之儉蜀所恃以為外户大劍山與小劍山相屬秦欲伐蜀而道不通乃造五石牛以金置尾下言能糞金將以遺蜀蜀主負力而貪令五丁開道引入之秦因架閣為棧道司馬錯由此伐蜀蜀志錦官城萬里橋南一名錦里韓詩汲古得修綆世説頭責秦子羽云此數子者或謇吃無宫商管子行年六十而老吃史記韓非為人口吃不能道説而善著書神仙傳王方平謂麻姑云姑固少年吾老矣不復作此狡獪變化也池上二首小池新鑿會天雨一部鼓吹從何來有蟾正碧亂草色時泅出沒東南隈井幹跳梁亦足樂洞庭魚龍何有哉能歌德聲莫入月清池與爾俱忘回南齊書孔稚圭字德璋風韻清疏不樂世務門庭之內草菜不翦南有山池春日蛙鳴或問之曰欲為陳蕃乎稚圭笑曰我以此當兩部鼓吹莊子秋水子獨不聞夫陷井之蛙乎謂東海之鱉曰吾樂與吾跳梁之井幹之上張衡靈憲羿請不死之藥於西王母嫦娥竊之以奔月將往枚筮之於有黃冇黃占之曰吉翩翩歸妹獨將西行逢天晦芒毋驚毋恐後且大昌嫦娥遂託身於月是為蟾蜍不作太白夢日邉還同樂天賦池上池上新年有荷葉細雨魚兒噞輕浪男兒學易不應舉幽人一友吾得尚此池便可當長江欲榜茅齋來蕩漾李太白詩間來垂釣碧溪上忽復乘舟夢日邉白居易池上篇十畝之宅五畝之園有水一池有竹千竿有叟在中白須飄然云云贈仲素寺丞致仕歸隱潛山一統志皖山在潛山一名皖公山皖伯始封地按潛山在今安慶潛山隱君一作居七十四紺瞳緑髮方謝事腹中靈液變丹砂江上幽居連福地彭城為我駐三日明月滿舟一作船同一醉丹書細字口傳訣顧我沉迷真棄耳年來四十髮蒼蒼始欲求方救憔悴他年若訪潛山居慎勿逃人改名字寰宇記潛山在潛山縣一名皖伯臺左慈常修煉於此上有二嵓三峯四洞太清煉靈丹經丹砂外包八石內含金精八素經司命著籍玉簡丹書編以金縷纒以素絲韓文吾年未四十而視茫茫而髮蒼蒼莊子讓王篇魯君聞顔闔賢往聘之闔鑿壞以遁永嘉郡記張豸隱居頥志家有苦竹數十頃豸為屋居其中王右軍聞而造之豸逃避竹中不與相見後漢書孔嵩變名姓為傭魯直以詩餽雙井茶次韻為謝江夏無雙種竒茗汝隂六一誇新書磨成不敢付僮僕自看雪湯生幾珠列仙之儒瘠不腴只有病渴同相如明年我欲東南去畫舫何妨宿太湖公自注歸田録草茶以雙井為第一畫舫宿太湖北渚貢茶故事後漢書文苑傳黃香字文強江夏安陸人京師號曰天下無雙江夏黃童史記相如以為列仙之儒居山澤間形容甚臞此非帝王之仙意也乃遂就大人賦人相如口吃而善著書常有消渴疾揚州以土物寄少遊鮮鯽經年祕醽醁團臍紫蟹脂填腹後春蓴茁活如酥先社薑芽肥勝肉鳥子纍纍何足道點綴盤餐亦時欲淮南風俗事瓶罌方法相傳竟留蓄且同千里寄鵝毛何用孜孜飲麋鹿本草鯽魚一名鮒魚形亦似鯉色黑而體促腹大而脊隆所在池沼皆有之孟冼本草鯽是稷米所化其魚腹上猶冇米色埤雅此魚旅行吹沫如星以其相即故謂之鯽以其相附故謂之鮒荆州記淥水出豫章康樂縣其間烏程鄉有酒官取水為酒極甘美與湘東酃湖酒年常獻之世稱酃淥酒左思吳都賦飛輕觴而酌醽淥鄒陽酒賦其品類則沙洛淥酃烏程下若齊公之清關中白薄傳肱蟹譜生於濟鄆者其色紺紫産於江浙者其色青白皮日休詩蟹因霜重金膏溢橘為風多玉腦圓南方草木狀蓴生水中葉似鳬葵浮水上花黃白子紫色三月至八月莖細如叉股名為絲蓴堪噉味甘寒杜甫詩金城土酥淨如練又理生那免俗方法報山妻贈曇秀白雲出山初無心棲鳥何必戀山林道人偶愛山水故縱步不知湖嶺深空巗已禮百千相曹溪更欲瞻遺像要知水味孰冷暖始信夢時非幻妄袖中忽出貝葉書中有璧月綴星珠人間勝絶略已遍匡廬南嶺并西湖西湖北望三千里大堤冉冉橫秋水誦師佳句説南屏瘴雲應逐秋風靡胡為只作十日歡杖䇿復尋歸路難留師筍蕨不足道悵望荔子何時丹歸去來辭雲無心以出岫傳燈録曹溪在韶州府城東南梁時有天竺國僧自西來泛舶曹溪口聞異香曰上流必有勝地尋之遂開山立石乃云百七十年當遇無上法師在此演法今六祖慧能南華寺是也佛書如人飲水冷暖自知金剛經一切有為法如夢幻泡影釋典佛經出自西域以貝葉書之流入中國漢志五星連珠日月合璧韓文荔子丹兮蕉黃再過泗上二首眼明初見淮南樹十客相逢九吳語旅程已付夜帆風客睡不妨背船雨黃柑紫蟹見江梅紅稻白魚飽兒女殷勤買酒謝船師千里勞君勤轉櫓杜詩白小羣分命天然二寸魚又溪女得錢留白魚繫舟淮北雨折軸繫舟淮南風斷橋客行有期日月疾嵗事欲晚霜雪驕山根浪頭作雷吼縮手敢試舟師篙不用燃犀照幽怪要須拔劍斬長蛟史記羣輕折軸韓文巧匠旁觀縮手就間晉書溫嶠還武昌至牛渚磯水深不可測嶠燃犀角照之見水族竒形異狀夢曰幽明道别何相照也水經注淡臺子羽齎千金之璧渡河陽侯波起兩蛟夾舟子羽曰吾可以義求不可以威劫操劍斬蛟晉書周處傳投水搏蛟蛟或沈或浮行數十里而處與之俱三日三夜殺蛟而反吕氏春秋荆有佽飛者涉江至於中流而兩蛟夾繞其船佽飛拔寶劍刺蛟殺之贈李兕彥威秀才魏王大瓠實五石種成濩落將安適可憐公子持十牛海上三年竟何得先生少負不羈才從軍數到單于臺天山直欲三箭取白衣將軍何人哉夜逢怪石曽飲羽戲中戟枝何足數誓將馬革褁尸還肯學班超苦兒女封侯衛霍知幾許老矣先生困羈旅酒酣聊復説平生結襪猶堪一再鼓棄書捐劍學萬人紈袴儒冠皆誤身窮途政似不龜手與世羞為西子顰如今惟有談天口雲夢胸中吞八九世間萬事寄黃粱且與先生説烏有莊子逍遙逰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則瓠落無所容外物篇任公子為大鈎巨緇五十犗以為餌蹲乎會稽投竿東海旦旦而釣期年不得魚漢司馬遷傳僕少負不羈之才長無鄉曲之譽唐書將軍三箭定天山壯士長歌入漢關韓詩外傳楚熊渠子夜行見寢石以為伏虎也彎弓射之沒金飲羽史記李廣傳廣出獵見草中石以為虎而射之中石沒鏃視之石也因復更射之不入矣後漢吕布傳植戟於營門布彎弓顧曰諸君觀布射戟小支中者當各解兵不中可留決鬬布即一發正中戟支馬援傳丈夫當以馬革裹尸還葬幸矣史記張釋之傳王生老人曰吾襪解顧謂張廷尉為我結襪釋之跪而結之相如傳為鼓一再行漢書項籍傳籍少時學書不成去學劍又不成去梁怒之籍曰書足記姓名而巳劍一人敵不足學學萬人敵杜詩紈袴不餓死儒冠多誤身莊子逍遙逰宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金天運篇西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里史記騶衍之術迂大而閎辨奭也文具難施淳于髠久與處時有得善言故齊人頌曰談天衍雕龍奭炙轂過髠司馬相如傳相如以子虛虛言也為楚稱烏有先生者烏有此事也為齊難無是公者無是人也明天子之義又吞若雲夢者八九其於胸中曽不蒂芥吕純陽集洞濵隨雲房同憩一肆中雲房自起執炊洞賔入夢備極富貴寵榮為相數十年忽被罪譴籍沒家資分散妻孥路值風雪傼馬俱瘁一身無聊方興浩歎恍然夢覺雲房炊黃梁尚未熟也雲房笑曰子適來之夢升沈萬態榮悴多端五十年間一頃耳次韻謝子高讀淵明傳枯木嵌空微黯淡古器雖在無古絃袖中正有南風手誰為聼之誰為傳風流豈落正始後甲子不數義熙前一山黃菊平生事無酒令人意缺然晉陶潛畜素琴一張絃徽不具詳見前家語舜彈五絃之琴歌南風之詩史記誰為為之孰令聼之世説王敦為大將軍鎮豫章衛玠避亂從洛投敦相見欣然談話彌日於時謝鯤為長史敦謂鯤曰不意永嘉之中復聞正始之音阿平若在當復絶倒南史隱逸傳陶潛所著文章皆題其年月義熙以前明書晉氏年號自永初以來惟云甲子而已龐公襄陽龐公少檢束白髮不髠亦不俗世所奔趨我獨棄我已有餘彼不足鹿門有月樹下行虎溪無風舟上宿不識當時捕魚客但愛長康畫金粟杜口如今不復言龐公為人不曲局東西有人問老翁為道明燈照華屋五言七言正兒戲三行五行亦偶爾我性不飲只解醉正如春風弄羣卉四十年來同幻事老去何須别愚智古人不住亦不滅我今不作亦不止寄語悠悠世上人浪生浪死一埃塵洗墨無池筆無象聊爾作戲悅吾神後漢逸民傳龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賔後遂攜其妻子登鹿門山因採藥不反桃花源記武陵人以捕魚為業名畫記顧愷之字長康於瓦棺寺北殿內畫維摩居士畫畢光耀月餘杜詩虎頭金粟影神妙獨難忘唯識論生相謂本無今有住相謂生位暫停異相謂住别前後滅相謂暫有還無圓覺經云何四疾一者作病二者任病三者止病四者滅病佛經流浪生死豫章志臨川墨池王羲之學書處至今池水盡黑一在金溪白水寺乃謝靈運滌研處也食雉雄雉曵修尾驚飛向日斜空中紛格鬬綵羽落如花喧呼勇不顧投網復誰嗟百錢得一雙新味時所佳烹煎雜雞鶩爪距漫槎牙誰知化為蜃海上落飛鴉禽經雉介鳥也以其善搏鬬也詩王風雉離于羅月令孟冬雉入大水為蜃雙鳬觀在葉縣王喬古仙子時出觀人寰常為漢郎吏厭世去無還雙鳬偶為戲聊以驚世頑不然神仙迹羅網安能攀紛紛塵埃中銅印紆青綸安知無隱者竊笑彼愚姦後漢王喬傳顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候鳧至舉羅張之但得一雙舄焉乃詔上方侯視則四年中所賜尚書官屬履也又或曰此即古仙人王子喬也郭綸公自注綸本河西弓箭手屢戰有功不賞自黎州都監官滿貧不能歸今權嘉州監稅河西猛士無人識日暮津亭閲過船路人但覺􅔕馬瘦不知鐵槊大如椽因言西方久不戰截髮願作萬騎先我當慿軾與寓目看君飛矢射蠻氊大風歌安得猛士兮守四方後漢書行行且止避驄馬御史左傳楚子玉請戰曰請與君之士戲君慿軾而觀之得臣與寓目焉初發嘉州漢屬犍為郡曰漢嘉隋曰眉山唐宋曰嘉州按眉州唐曰嘉州此是今之嘉定州非眉州也原注嘉祐巳亥冬先生與子由侍老泉舟行適楚朝發鼓闐闐西風獵畫旃故鄉飄已逺往意浩無邉錦水細不見蠻江清更鮮奔騰過佛腳曠蕩造平川野市有禪客釣臺尋暮煙相期定先到久立水潺潺公自注是日期鄉僧宗一會别釣魚臺下詩小雅伐鼓淵淵振旅闐闐注闐闐亦鼓聲也杜詩秦川對酒平如掌舊注錦水岷江也蠻江陽山與青衣江也三江合流於嘉州城東南過九頂山凌雲寺大像閣而下犍為王氏書樓樹林幽翠滿山谷樓觀突兀起江濱云是昔人藏書處磊落萬卷今生塵江邉日出紅霧散綺忩畫閣青氛氲山猿悲嘯谷泉響野鳥嘐戞巖花春借問主人今何在被甲逺戍長苦辛先登搏戰事斬級區區何者為三墳書生古亦有戰陳葛巾羽扇揮三軍古人不見悲世俗回首蒼山空白雲爾雅狹而修曲曰樓説文樓重屋樔爾雅觀謂之闕釋名觀者於上觀望也墨客揮犀杜學士鎬博聞強記凡有撿閲取視無差士大夫有所撰著咨以古事無不知者號為杜萬卷左傳穎考叔取鄭伯之旗蝥弧以先登又是能讀三墳五典八索九丘世語諸葛武侯獨乘素輿葛巾毛扇指麾三軍過宜賔見夷中亂山一統志宜賔在敘州漢僰道後周外江唐義賔宋宜賔原注嘉祐四年作江寒晴不知逺見山上日朦朧含高峰晃蕩射峭壁橫雲忽飄散翠樹紛歷歷行人挹孤光飛鳥投逺碧蠻荒誰復愛穠秀安可適豈無避世士高隱鍊精魄誰能從之遊路有豺虎迹後漢書避世墻東王君公黃氣陽精經金門日之通門也其內有金精冶鍊之地故立春之節日更鍊魄於金門之內夜泊牛口日落江霧生繫舟宿牛口居民偶相聚三四依古栁負薪出深谷見客喜且售煮蔬為夜飱安識肉與酒朔風吹茅屋破壁見星斗兒女自咿嚘亦足樂且久人生本無事苦為世味誘富貴耀吾前貧賤獨難守誰知深山子甘與麋鹿友置身落蠻荒生意不自陋今子獨何者汲汲強奔走高士傳披裘公曰五月披裘而負薪豈取遺金者哉詩深谷為陵牛口見月原注時嘉祐元年始舉進士至京師作按詩意當是已亥適楚至牛口作也掩􅐼寂已睡月腳垂孤光披衣起周覽飛露灑我裳山川同一色浩若涉大荒幽懷耿不寐四顧獨倣徨忽憶丙申年京邑大雨雱蔡河中夜決橫浸國南方車馬無復見紛紛操筏郎新秋忽已晴九陌尚汪洋龍津觀夜市燈火亦煌煌新月皎如晝疏星弄寒芒不知京國喧謂是江湖鄉今來牛口渚見月重凄涼郤思舊遊處滿陌沙塵黃詩國風耿耿不寐如有隱憂莊子養生主為之四顧舟中聽大人彈琴彈琴江浦夜漏永斂袵竊聼獨激昻風松瀑布已清絶更愛玊珮聲琅璫自從鄭衛亂雅樂古器殘缺世已忘千年寥落獨琴在有如老仙不死閲興亡世人不容獨反古強以新曲求鏗鏘微音淡弄忽變轉數聲浮脆如笙簧無情枯木今尚爾何况古意墮渺茫江空月出人響絶夜闌更請彈文王琴録吳忠懿王得天台寺中對瀑布泉屋柱斫二琴一號洗凡一號清絶為曠代之寶李白琴贊嶧陽孤桐石聳天骨根老水泉葉苦霜月斫為緑綺徽聲粲發秋風入松萬古竒絶古今樂録天寶十三載始詔道調法曲與胡部新聲合作自爾夷夏之聲相亂無復辨者拾遺記師涓造新曲以代古樂衛靈公情湎心感怠於政事史記孔子世家孔子學鼓琴師襄子十日不進曰得其為人黯然而黑頎然而長眼如望羊心如王四國非文王其誰能為此也師襄子辟席拜曰師蓋云文王操也泊南牛口期任遵聖長官到晚不及見復來江上有微徑深榛煙雨埋﨑嶇欲取别不見又重來下馬未及語固已慰長懷江湖涉浩渺安得與之偕韋應物詩一郡荆榛煙雨中陶潛歸去來辭既窈窕以窮壑亦﨑嶇而經丘江上看山船上看山如走馬歘忽過去數百羣前山槎牙忽變態後嶺雜遝如驚奔仰看微徑斜繚繞上有行人高縹眇舟中舉手欲與言孤帆南去如飛鳥詩大雅來朝走馬至于岐下莊子應帝王南海之帝為倏北帝之帝為黑倏同倐輿地志縹眇峯洞庭之最高者留題仙都觀山前江水流浩浩山上蒼蒼松柏老舟中行客去紛紛古今換易如秋草空山樓觀何峥嶸真人王逺隂長生飛符御氣朝百靈悟道不復誦黃庭龍車虎駕來下迎去如旋風摶紫清真人厭世不回顧世間生死如朝暮學仙度世豈無人餐霞絶粒長辛苦安得獨從逍遙君泠然乘風駕浮雲超世無有我獨行一作存懷沙賦浩浩沅湘兮分流汩兮列仙傳王方平名逺漢桓帝問災祥題宫門數百字帝令削之墨入版矣嘗過吳門蔡經家遣使與麻姑相聞俄頃即至手似鳥爪衣有文章而非錦繡坐定各進行厨香氣逹户外劈麟脯行酒麻姑云接待以來東海三為桑田蓬萊水又淺矣宴畢乘雲而去又隂長生新野人漢和帝后之曽祖不好榮位從馬明生得度世法偕入青城山太清金液神丹成著書九篇白日升天古詩飛符超羽翼神仙傳竇子明好釣魚於旋溪釣得白龍解放之三年龍來迎去又呼子仙者漢中卜師也夀百餘嵗夜有仙人持二茅狗來子仙持一與嫗乃龍也騎之上華陰山又龔聖者結菴於道人峰上每乘龍往來又張道陵遊雲綿洞煉丹靑龍白虎旋繞其上莊子天地篇千載厭世去而上仙乘彼白雲至於帝鄉逍遙遊不食五榖吸風飲露乘雲氣御飛龍而遊乎四海之外又列子御風而行泠然善也屈原塔公自注在忠州原不當有塔於此意者後人追思故為作之楚人悲屈原千嵗意未歇精魂飄何處父老空哽咽至今滄江上投飯救飢渴遺風成競渡猿呌楚山裂屈原古壯士就死意甚烈世俗安得知眷眷不忍決南賨舊屬楚山上有遺塔應是奉佛人恐子就淪滅此事雖無憑此意固已切古人誰不死何必較考折名聲實無窮富貴亦暫熱大夫知此理所以持死節史記屈原者名平楚之同姓也為楚懷王左徒上官大夫短屈原於頃襄王王怒而遷之屈原至於江濵被髮行吟澤畔顔色憔悴形容枯稿乃作漁父之辭懷沙之賦懷石投汨羅而死李華弔古戰場文弔祭不至精魂何依續齊諧記屈原五月五日投汨羅江楚人哀之每至此日以竹筒貯米投水祭之漢建武中長沙歐回白日見一人自稱三閭大夫謂回曰見祭甚善但苦為蛟龍所竊今若有惠可以楝葉塞其上以五彩絲縳之此二物蛟龍所畏今人作粽子以此蓋其遺風也荆楚嵗時記五月五日競渡人傷屈原故以舟楫救之方輿記南賨古巴子國尚書洪範五福考終命六極凶短折新灘扁舟轉山曲未至已先驚白浪橫江起槎牙似雪城畨畨從高來一一投澗坑大魚不能上暴鬛一作腮灘下橫小魚散復合瀺灂如遭烹鸕鷀不敢下飛過兩翅輕白鷺誇瘦捷插腳還欹傾區區舟上人薄技安敢呈只應灘頭廟賴此牛酒盈江淹别賦怨復怨兮逺山曲去復去兮長河湄司馬相如上林賦臨坻注壑瀺灂霣墜史記使得奏薄技出入周衛之中新灘阻風北風吹寒江來自兩山口初聞似搖扇漸覺平沙走飛雲滿嵓谷舞電穿􅐼牖灘下三日留識盡灘一作山前叟孤舟倦鴉軋短纜困牽揉嘗聞不終朝今此何其久只應留逺人此意固亦厚吾今幸無事閉户為飲酒老子飄風不崇朝驟雨不終日孰為此者天地天地猶不能久而况於人乎昭君村昭君本楚人艷色照江水楚人不敢娶謂是漢妃一作家子誰知去鄉國萬里為胡鬼人言生女作門楣昭君當時憂色衰古來人事盡如此反覆縱橫安可知一統志王嬙字昭君避晉文帝諱改曰明秭歸人今歸州有明妃廟漢書丐奴傳單于自言願壻漢氏以自親元帝以後宮良家子王嬙字昭君賜單于單于歡喜白居易詩生為漢宫妃死作胡地鬼楊妃外傳貴妃寵幸時童謠曰生男勿喜女勿悲君看長大作門楣韓非説難及彌子色衰而愛弛得罪於君黃牛廟夷陵志黃牛峽重嶺峻絶加以江湍紆回行者謡曰朝發黃牛暮宿黃牛三朝三暮黃牛如故江邉石壁高無路上有黃牛不復箱廟前行客拜且舞擊鼓吹簫屠白羊山下耕牛苦磽確兩角磨崖四蹄溼青芻半束長苦飢仰看黃牛安可及詩小雅睆彼牽牛不以服箱杜詩自有馮夷來擊鼓始知嬴女善吹簫李白詩三朝上黃牛三暮行太遲三朝復三暮不覺髸成絲蝦蟆培峽州志扇子峽石中突而泄水獨清冷石狀如圭頭俗謂蝦蟆石其水煎茶為第一培一作碚音佩蟇背似覆盂蟇頤如偃月謂是月中蟇開口吐月液根源來甚逺百尺蒼崖裂當時龍破山此水隨龍出入江江水濁猶作深碧色稟受苦潔清獨與凡水隔豈惟煮茶好釀酒應無敵廣雅鼁蝦蟇也陸佃埤雅蝦蟇一名蟾蜍東方朔客難連四海之外以為帶安於覆盂張衡靈憲嫦娥奔月是為蟾蜍易乾鑿度月三日成魄八日成光蟾蜍體就穴鼻始明輿地紀勝竹泉在荆州松滋縣南宋至和初苦竹寺僧浚井得筆後黃庭堅謫黔過之視筆曰此吾蝦蟇碚所墜因知此泉與之相通其詩曰松滋縣西竹林寺苦竹林中甘井泉巴人謾説蝦蟇碚試褁春茶來就煎留題峽州甘泉寺公自注薑詩故居輕舟橫江來弔古悲純孝逶迤尋逺迹婉孌見遺貌清泉不可挹涸盡空石窖古人飄何之惟有風竹閙行行玩村落户户懸網罩民風坦和平開户夜無鈔叢林富笋茹平野絶虎豹嗟哉此樂鄉無乃薑子教後漢列女傳廣漢薑詩妻者同郡龎氏之女也詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻常泝流而汲後時值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慙呼還恩飬愈謹姑嗜魚鱠又不能獨食夫婦嘗力作供鱠呼鄰母共之舍側忽有涌泉味如江水每旦輒出雙鯉魚嘗以供二母之膳寄題清溪寺公自注在峽州鬼谷子之故居口舌安足恃韓非死説難自知不可用鬼谷乃真姦遺書今未亡小數不足觀秦儀固新學見利不知患嗟時無桓文使彼二子顛死敗無足怪夫子固使然君看巧更窮不若愚自安遺宫若有神頷首然吾言漢婁敬傳上怒罵敬曰齊虜以口舌得官乃今妄言沮吾軍史記韓非者韓之諸公子也作孤憤五蠧內外儲説難十餘萬言然韓非知説之難為説難書甚具終死於秦不能自脫史記蘇秦傳東事師於齊而習之於鬼谷先生乂乃閉室不出出其書遍觀之張儀傳始嘗與蘇秦俱事鬼谷先生學術尹知章鬼谷子序蘇秦張儀往事之受捭闔之術十有二章復受轉丸胠篋三章儀秦知道未足行復往見先生曰為子陳言至道齋戒擇日而往見先生乃正席而坐嚴顔而言告二子以全身之道文心雕龍轉丸騁其巧辭飛鉗伏其精術荆門惠泉公自注荆門山在宜都大江之南與虎山對泉源從高來走下隨石脈紛紛白沫亂隱隱蒼崖坼縈回成曲沼清徹見肝膈衆瀉為長溪奔駛蕩蛙蟈初開不容碗漸去已如帛傳聞此山中神物懶一作頗遭謫不能致雷雨灧灧吐寒碧遂令山前人千古灌稻麥説文泉水原也周易山下出泉爾雅泉一見一否為瀐濫泉正出正出湧出也沃泉縣出縣出下出也氿泉穴出穴出反出也僧史僧聞禪師住邵武山中一日冇老翁來謁曰我龍也以疲惰行雨天罰當死賴道力可脫乃化小蛇延緣入袖中夜風號霆擊山嶽為搖而師危坐不傾逹旦蛇飛去次韻答荆門張都官維見和惠泉詩楚人少井飲地氣常不泄蓄之為惠泉坌若有所拆泉源本無情豈問濁與徹貪愚彼二水終古耻莫雪只應所處然遂使語異别泉旁地平衍泉上山嵽嵲君子慎所居此義安可闕古人貴言贈敢用况高節不為冬霜乾肯畏夏日烈泠泠但不已海逺要當徹圗經貪泉在廣州海南縣石門口即吳隱所酌也舊經云登大庾嶺則濁穢之氣分飲石門泉則清白之質變荆州記桂陽郡西南宿山水出注大溪號曰橫溪水甚深冬夏不乾飲者輒冒於財賄俗謂之貪泉南齊書范柏謁宋明帝帝言及廣州貪泉因謂曰卿州復有此不對曰梁州惟冇文里武鄉亷泉讓水曰卿宅何在曰亷讓之間栁宗元愚溪序灌水之陽有溪焉東流入於瀟水余以愚觸罪謫瀟水上愛是溪故更名之為愚溪注愚溪在永州府城西史記孔子世家辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言王勃滕王閣序臨别贈言浰陽早發富貴本先一作無定世人自榮枯囂囂好名心嗟我豈獨無不能便退縮但使進少徐我行念西國已分田園蕪南來竟何事碌碌隨商車自進茍無補乃是懶且愚人生重意氣出處夫豈徒永懷江陽叟種藕春滿湖史記蔡澤傳富貴吾所自有班固答賔戲朝為榮華夕為憔悴陶潛歸去來辭田園將蕪胡不歸漢書武帝元光六年冬初算啇車注始稅商賈車船令出算原注江陽指眉州也夜行觀星天高夜氣嚴列宿森就位大星光相射小星閙若沸天人不相干嗟彼本何事世俗強指擲一一立名字南箕與北斗乃是家人器天亦豈有之無乃遂自謂迫觀知何如逺想偶有似茫茫不可曉使我長歎喟春秋繁露天不剛則列星亂其行晉書凡五星盈縮失位其精降於地為人嵗星降為貴臣熒惑降為童兒歌謠嬉戲填星降為老人婦女太白降為壯夫處於林麓辰星為婦人吉凶之應隨其象告後漢書光武曰郎官上應列宿詩小雅維南有箕不可以簸揚維北有斗不可以挹酒漿漢儒林傳轅固曰此家人言耳劉向新論微子感牽牛星顔子感中台星張良感弧星樊噲感狼星老子感火星莊子大宗師傅説乘東維騎箕尾而比於列星唐書李白母夢長庚星而生白因以名之漢水捨棹忽逾月沙塵困逺行襄陽逢漢水偶似蜀江清蜀江固浩蕩中有蛟與鯨漢水亦云廣欲涉安敢輕文王化南國遊女儼如卿洲中浣紗子環珮鏘鏘鳴古風隨世變寒水空泠泠過之不敢慢佇立整冠纓詩小雅滔滔江漢南國之紀寰宇記漢江在鄖陽府繇漢中流入鄖縣其水因地而名曰漾曰沔曰漢曰滄浪總之為漢水也上至襄陽七百里下至沔陽州五百里異物志鯨鯢長百丈大亦稱之雄曰鯨雌曰鯢詩國風漢有遊女不可求思漢之廣矣不可泳思世説王安豐婦曰親卿愛卿是以卿卿我不卿卿誰當卿卿舊經浣紗溪在荆州府夷陵州西北秋冬之月水色淨麗若浣紗然史記環珮玉聲璆然又滑稽傳冠纓索絶古詩李下不整冠萬山公自注時獨不遊問轍而作西行度連山北出臨漢水漢水蹙成潭旋轉山之趾禪房久已壞古甃含清泚下有仲宣欄綆刻深容指回頭望西北隱隱龜背起傳云古隆中萬樹桑柘美月炯轉山曲山上見洲尾緑水帶平沙盤盤如抱珥山川近且秀不到懶成恥問之安能詳畫地費簮箠襄陽志萬山在城西相傳鄭交甫所見遊女居此山之下萬山東有王粲井即仲宣樓在府城東粲依劉表即此地非荆州也輿地志隆中山在府城北下即諸葛亮隱居有三顧門漢書天文志抱珥􅛆霓注皆日旁氣也凡氣在旁直對為珥在旁如半環向日為抱後漢馬援傳於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然可曉蜀書許慈傳卓犖強識祖宗制度之儀喪紀五服之數皆指掌畫地舉手可采隆中諸葛來西國千年愛未衰今朝遊故里蜀客不勝悲誰言襄陽野生此萬乘師山中有遺貌矯矯龍之姿龍蟠山水秀龍去淵潭移空餘蜿蜒迹使我寒涕垂蜀書諸葛亮傳字孔明琅琊陽都人也躬耕隴畝好為梁父吟時先主屯新野徐庶見先主曰諸葛孔明者臥龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也先主遂詣亮凡三往乃見漢晉春秋亮家於南陽之鄧縣在襄陽城西四十里號曰隆中楊雄解嘲孟軻雖連蹇猶為萬乘師竹葉酒楚人汲漢水釀酒古宜城春風吹酒熟猶似漢江清耆舊何人在丘墳應已平惟餘竹葉在留此千古情輿地志宜城楚鄢陵漢宜城梁率道張協七命荆南烏程豫北竹葉古詩竹葉清香好何妨飲數杯杜詩三杯竹葉清又竹葉於人既無分菊花從此不須開酒譜蒼梧之地釀酒以竹葉雜於中極凊潔張華輕薄篇蒼梧竹葉清宜成九醞酒梁昭明太子將進酒篇洛陽輕薄子長安遊俠兒宜城溢渠碗中山浮羽巵襄陽冇耆舊傳江淹恨賦琴瑟滅兮丘隴平鯿魚曉日照江水遊魚似玉瓶誰言解縮項貪餌每遭烹杜老當年意臨流憶孟生吾今又悲子輟筋涕縱橫埤雅魴一名魾比今之青鯿也郊居賦曰赤鯉靑魴細鱗縮項濶腹魚之美者蓋弱魚也其廣方其厚褊故一曰魴魚一曰鯿魚魴方也鯿褊也襄陽志漢江出鯿魚土人以槎斷水鯿多依槎因號槎頭鯿孟浩然詩試垂竹竿釣果得查頭鯿杜子美詩復憶襄陽孟浩然清詩句句盡堪傳只今耆舊無新語漫釣槎頭縮項鯿晉書翟莊傳莊以弋釣為事後不復獵曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌吞鈎豈我哉時人以為名言望夫臺公自注在忠州南數十里山頭孤石逺亭亭江轉船回石似屏可憐千古長如昨船去船來自不停浩浩長江赴滄海紛紛過客似浮萍誰能坐待山月出照見寒影高伶俜晉蘇峻傳我寧山頭望廷尉不能廷尉望山頭郡國志昔人往楚纍嵗不還其妻登山望之久乃化為石後山詩話望夫石在處有之詩以顧况山頭日日風和雨行人歸來石應語為第一尚書禹貢江漢朝宗于海韓詩外傳二親之夀忽如過客李白春夜宴桃園序光隂者百代之過客周禮萍氏掌水禁鄭注以不沉溺取名蓋使之幾酒謹酒也月令季春萍始生舊説萍善滋生一夜七子一曰萍浮於流水則不生埤雅世説楊華入水化為浮萍劉伶酒德頌俯觀萬物擾擾焉如江漢之載浮萍永安宫公自注今夔之永安門即宫之遺趾千古陵谷變故宫安得存徘徊問耆老惟有永安門遊人雜楚蜀車馬晚喧喧不見重樓好誰知昔日尊吁嗟蜀先主兵敗此亡魂只應法正死使公去遭燔蜀地記永安宫在夔州府治東今之府學也先主為陸遜所敗還至白帝建此即諸葛亮受遺命處杜子美詩崩年亦在永安宫毛詩高岸為谷深谷為陵三國志法正傳字孝直右扶風郿人也年四十五卒先主為之流涕者纍日諸葛亮與正雖好尚不同以公義相取先主將東征權以復關羽之恥羣臣多諫止不從章武二年大軍敗績還住白帝亮歎曰法孝直若在則能制主上令不東行就復東行必不傾危矣八陳磧平沙何茫茫髣佛見石蕝于悅切縱橫滿江上嵗嵗沙水齧孔明死已久誰復辨行列神兵非學到自古不留訣至人已心悟後世徒妄説自從漢道衰蜂起盡姦傑英雄不相下禍難久連結驅民市無煙戰野江流血萬人睹一擲殺盡如沃雪不為久逺計草草常無法孔明最後起意欲掃羣孽﨑嶇事飾制隱忍久不決志大遂成迂嵗月去如瞥六師紛未整一旦英氣折惟餘八陳圗千古壯夔峽水經注江水乂東徑諸葛亮圗壘南石磧平曠望兼川陸有亮所作八陳圖東跨故壘皆纍細石為之自壘西去聚石八行行間相去二丈因曰八陳荆州圖記永安宫南一里渚下平磧上有孔明八陳圗聚細石為之各高五尺廣十圍歷然棊布縱橫相當中間相去九尺正中間南北巷悉廣五尺凡六十四聚成都圖經武侯八陳有三在夔者六十有四方陳法也嘉話録夔州之西市俯臨江岸沙石下看諸葛亮八陳圖箕張翼舒鵝形鸛勢象石分布宛然尚存峽水大時巴蜀雪消之際大樹十圍枯槎百丈破磑巨石隨波塞川而下水與岸齊雷奔山裂及乎水落川平萬物皆失故態唯陳圖小石分堆標聚行列依然如是者垂六七百年陶灑推激逮今不動劉禹錫曰是諸葛公誠心為玄德效死况此法出六韜是太公上智之才所構所以神明保持一定而不可改也圖經夔人重諸葛公每嵗以人日傾城出遊磧上謂之踏磧唐韻束茅表位曰蕝春秋傳置茅蕝也漢書叔孫通為綿蕝之儀注立竹束茅以為標凖按石蕝字先生特借用其意耳蕝一音最諸葛鹽井公自注井冇十四自山下至山上其十三井常空盛夏水漲則鹽泉迤邐遷去常去於江水之所不及五行水本鹹安擇江與井如何不相入此意復誰省人心固難足物理偶相逞猶嫌取未多井上無間綆漢書蜀多鹽井羅褒以鹽井富洪範五行水曰潤下潤下作鹹甘泉記甘露泉在林縣五行之理相尅相勝山泉多甘而海水鹹蓋鹹者水歸本甘者土勝之也後漢書光武曰人苦不知足莊子天運篇名公器也不可多取又至樂篇綆短者不可以汲深潁大夫廟一統志洧川縣有純孝伯廟即穎考叔人情難強回天性可微感世人爭曲直苦語費搖撼大夫言何柔暴主意自慘荒祠旁孤冢古隧有殘坎千年惟茅焦世亦貴其膽不解此微言脫衣徒勇敢左傳鄭莊公置薑氏於城穎而誓之曰不及黃泉無相見也既而悔之穎考叔為穎谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之公曰爾有母遺繄我獨無因語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之遂為母子如初史記吕不韋坐嫪毐免齊人茅焦説秦王云云説苑秦嫪毐之亂始皇遷太后於雍下令曰敢諫者死諫而死者二十七人齊客茅焦解衣立井幹之上而諌云云始皇釋之迎歸太后母子如初法言茅焦可謂劘虎牙矣趙雲别傳先主明旦自來至雲營圍視昨戰處曰子龍一身都是瞻也許州西湖寰宇記許州周許國魏許昌北齊南鄭後周許州西湖小雨晴灧灧春渠長來從古城角夜半傳新響使君欲春遊浚沼役千掌紛紜具畚鍤閙若蟻運壤夭桃弄春色生意寒猶怏惟有落殘梅標格若矜爽遊人坌已集挈榼三且兩醉客臥道旁扶起尚偃仰池臺信宏麗貴與民同賞但恐城市歡不知田野愴潁川七不登野氣長蒼莽誰知萬里客湖上獨長想一統志河南西湖一在許州一在鄢陵湖志舊傳許潁陳蔡接壤之間皆有西湖而汝陽為最孔武仲詩亭下湖光凝不流百尺高臺蘸春緑劉伶酒德頌止則操巵執觚動則挈榼提壺惟酒是務焉知其餘説文榼酒器也莊子適莾蒼者三餐而反腹猶果然江上值雪效歐陽體限不以鹽玉鶴鷺絮蝶飛舞之類為比仍不使皓白潔素等字縮頸夜眼如凍龜雪來唯有客先知江邉曉起浩無際樹杪風多寒更吹青山有似少年子一夕變盡滄浪髭方知陽氣在流水沙上盈尺江無澌隨風顛倒紛不擇下滿坑谷高陵危江空野濶落不見入户但覺輕絲絲沾裳細看若一作巧刻鏤豈有一一天工為霍然一麾遍九野吁此權柄誰執持世間苦樂知有幾今我幸免沾膚肌山夫只見壓樵擔豈知帶酒飄歌兒天王臨軒喜有麥宰相獻夀嘉及時凍吟書生筆欲折夜織貧女寒無幃高人著履踏冷冽飄拂巾帽真仙姿野僧斫路出門去寒液滿鼻清淋漓灑袍入袖溼靴底亦有執版趨階墀舟中行客何所愛願得獵騎當風披草中咻咻有寒兔孤隼下擊千夫馳敲氷煮鹿最可樂我雖不飲強倒巵楚人自古好弋獵誰能往者我欲隨紛紜旋轉從滿面馬上操筆為賦之晉佛圗澄傳石季龍造太武殿初成圖畫自古賢聖忠臣孝子烈士貞女旬餘頭悉縮入肩中惟冠䯰髣佛微出雪賦盈尺則呈瑞於豐年後漢書河水流澌無船不可渡朝野僉載要宜麥見三白世説羣公對雪尚隆之曰麵堆金井誰調湯餅吳永素曰玉滿天山難刻佩環坐間服其韻精宋書大同中元日雪花降殿庭右將軍謝莊下殿雪集衣白上以為嘉瑞羣臣皆作雪花詩賀禇少孫補史記齊東郭先生衣敝不完行雪中履有上無下足盡踐地道中人笑之晉書王恭嘗披鶴氅涉雪而行孟昶見之曰此真神仙中人渚宫渚宫寂寞依古郢楚地荒茫非故基二王臺閣已鹵莽公自注湘東王高氏何況逺問縱橫時楚王獵罷擊靈鼓猛士操舟張水嬉釣魚不復數魚鱉大鼎千石烹蛟螭當時郢人架宫殿意思絶妙般與倕飛樓百尺照湖水上有燕趙千娥眉臨風揚揚意自得長使宋玊作楚詞秦兵西來取鍾簴故宫禾黍秋離離千年壯觀不可復今之存者蓋已卑池空野逈樓閣小惟有深竹藏狐狸臺中絳帳誰復見臺下野水一鴨作浮清猗緑窗朱户春晝閉想見深屋彈朱絲腐儒亦解愛聲色何用白首談孔姬沙泉半涸草堂在破窗無紙風颸颸陳公蹤迹最未逺士一作七瑞寥落今何之百年人事知幾變直恐荒廢成空陂誰能為我訪遺迹草中應有湘東碑輿圖江陵秦郢地今荆州寰宇記江陵渚宫楚襄王建梁元帝即位楚宫即此史記司馬相如子虛賦楚亦有平原廣澤遊獵之地饒樂若此者乎楚王之獵何與寡人又擊靈鼓起烽燧上林賦撞千石之鐘立萬石之巨墨子公輸般造雲梯而攻舜典帝曰疇若豫工僉曰垂哉帝曰俞谷垂汝共工韓詩雕鐫妙工倕史記管晏列傳意氣揚揚甚自得也宋玉高唐賦昔者楚襄王與宋玉遊於雲夢之臺望高唐之觀王曰試為寡人賦之九辨序九辨者楚大夫宋玉之所作也宋玉屈原弟子閃惜其師忠而放逐故作九辨以述其志史記王翦傳李信攻平輿蒙恬攻寢大破荆軍信又攻䣕郢破之於是引兵而西又殺其將項燕因乘勝略定荆地珹邑嵗餘虜荆王負芻竟平荆地為郡縣詩國風彼黍離離彼稷之苗注周室東遷大夫行役過故宗廟宫室盡為禾黍故賦此詩元稹連昌宫詞連昌宫中滿宫竹又夜夜狐狸上墻屋荆州記府城西南有馬融絳帳臺與渚宫不逺孔姬謂孔子周公南史梁元帝諱繹字世誠小字七瑞武帝第七子也十三年封湘東王出峽入峽喜巉巗出峽愛平曠吾心淡無纍遇境即安暢東西徑千里勝處頗屢訪幽尋逺無厭高絶每先上前詩尚遺略不録久恐忘憶從巫廟回中路寒泉漲汲歸真可愛翠碧光滿盎忽驚巫峽尾岩腹有穿壙仰見天蒼蒼石室開南嚮宣尼古廟宇叢木作幃帳鐵楯橫半空俯瞰不計丈古人誰架構下有不測浪石竇見天囷瓦棺悲古葬新灘阻風雪村落去㩦杖亦到龍馬溪茅屋沽村釀玊虗悔不至實為舟人誑聞道石最竒寤寐見怪狀峽山富竒偉得一知幾喪苦恨不知名歷歷但想像今朝脫重險楚水渺平蕩魚多客庖足風順行意王追思偶成篇聊助舟人唱夔州志巫山在大江之濵形如巫字路史舜崩以瓦棺葬於紀是為鳴條三峽記巫峽與瞿唐峽歸峽世稱三峽連旦七百里重巖疊嶂隱蔽天日非亭午夜分不見日月水經云杜宇所鑿古謠巴東三峽巫峽長猿鳴三聲淚霑裳寰宇記馬鳴溪在夔州府俗稱龍馬溪昔土人牧馬於溪上産龍駒四蹄利爪朱騣頳尾高可七尺州將聞之以貢行在所載至溪口攘鬛長鳴躍於冮溪以名易坎卦習坎注習重習也坎險陷也彖曰習坎重險也神女廟大江從西來上有千仞山江山自環擁恢詭富神姦深淵鼉鱉橫去聲巨壑蛇龍頑旌陽斬長蛟雷雨移蒼灣蜀守降老蹇至今帶連鐶縱橫若無主蕩逸侵人寰上帝降瑶姬來處荆巫間神仙豈在猛玊坐幽且間飄蕭駕風馭彌節朝天關倐忽巡四方不知道里艱古粧具法服邃殿羅煙鬟百神自奔走雜沓來趨班雲興靈怪聚雲散鬼神還茫茫夜潭靜皎皎秋月彎還應搖玉珮來聼水潺潺左傳使民知神姦許旌陽傳旌陽於豫章遇一少年自稱慎郎真君與語知非人類謂門人施太玉曰此蜃精宜亟剪戮彼今化為黃牛我當化黑牛以逐之以手巾挂膊為識俄龍沙州一黑牛奔赴黃牛而來太玉以劍揮之中其左股因投於井自井徑歸潭州先是少年以珍寶數萬娶潭州刺史賈至女至是真君見賈曰聞君有貴壻慎郎乃蛟蜃老魅焉敢遁形蜃遂變本形為吏所殺神異記蜀守李氷降毒龍蹇氏鎖之於江上水害遂息誓水碑記李冰鑿山導江其神怒化為牛出沒波上氷操刀入水殺之因立五石犀於水旁誓曰淺毋至足深毋至肩水害遂息神女廟石刻瑤妃西王母之女稱雲華夫人助禹驅神鬼斬石疏波有功見紀今封妙用真人廟額曰凝真觀襄陽耆舊傳赤帝女曰瑤姬未行而卒葬於巫山之陽故曰巫山之女楚懷王遊於高唐晝寢夢與神遇遂為置觀於巫山之南號為朝雲宋玊神女賦於是搖珮飾鳴玉鸞巫山瞿塘迤邐盡巫峽峥嶸起連峯稍可怪石色變蒼翠天工運神巧漸欲作竒偉坱軋勢方深結構意未遂旁觀不暇瞬步步造幽邃蒼崕忽相逼絶壁凛可悸仰觀入九頂㑓爽凌皓氣晃蕩天宇高崩騰江水沸孤超兀不讓直拔勇無畏攀緣見神宇憩坐就石位巉巉隔江波一一問廟吏遙觀神女石綽約誠有以俯首見斜鬟拖霞弄修帔人心隨物變逺覺含深意野老笑吾旁少年嘗屢至去隨猿猱上反以繩索試石笋猗孤峰突兀殊不類世人喜神怪論説驚幼稚楚賦亦虛傳神仙安有是次問掃壇竹云此今尚爾翠葉紛下垂婆娑緑鳳尾風來自偃仰若為神物使絶頂有三碑詰曲古篆字老人那解讀偶見不能記窮探到峰背採斫黃楊子黃楊生石上堅瘦紋如綺貪心去不顧澗谷千尋縋山高虎狼絶深入坦無忌洪濛草樹密蔥蒨雲霞膩石竇有洪泉甘滑如流髓終朝自盥潄冷冽清心胃浣衣挂樹梢磨斧就石鼻徘徊雲日晚歸意念城市不到今十年衰老筋力憊當時伐殘木牙蘖已如臂忽聞老人説終日為歎喟神仙固有之難在忘勢利貧賤爾何愛棄去如脫屣嗟爾若無還絶糧應不死劉安招隱士坱兮軋山曲􅔍心淹留兮恫荒忽答賓戲超忽荒而􅀈蒼皓封禪書肇自皓穹師古注皓灝也元氣浩汗故曰皓招隱士攀緣桂枝兮聊淹留荆州圗記天門角上特生一竹倒垂拂拭謂之天帚永嘉記陽嶼有仙石山頂上有平石方十餘丈名為仙壇壇陬凡有四竹葳蕤青翠風來動音自成宫商石上淨潔初無塵籜相傳云曽有却粒者於此羽化故謂之仙壇仙經曰神山五百年一開其中石髓出得而服之夀與天相畢金玉之精也神仙傳王烈入太行山忽見山破石裂青泥流出如髓烈取食之如飴史記封禪書於是天子曰嗟乎吾誠得如黃帝吾視去妻子如脫屣耳觀大水望朝陽巖作朝陽巖前不結廬下眺江水百步餘春泉濺濺出乳竇青莎白石半汙塗不到津頭二三日誰知江水漲天墟遙望橫杯不敢濟巖口正有人罾魚列子無底之谷名曰歸墟滄洲亭懷古湘水悠悠天際來夾江古水抱山回城中人物若可數日晏市散多蒼苔九嶷巉天古雲埋遙想帝子龍車回心衰目極何可望九歌寂寂令人哀長沙志湘江府城西水至清徹圗經九嶷山在寧逺屬衡州府唐元結九嶷圗記九峯相似望而疑之故名太公曰舜死於蒼梧之野歸葬於江南之九嶷王韶之神鏡記九嶷山半皆植松竹夾路有青澗澗生黃色蓮花香氣盈谷又有九井昔何侯煉丹於此汲一井則九井皆動屈原九歌帝子降兮北渚又九疑繽兮並迎靈之來兮如雲尚書大禹謨九功惟敘九敘惟歌又勸之以九歌俾勿瓌按此因九嶷而思舜故言九歌寂寂似非屈原九歌也柏家渡柏家渡西日欲落青山上下猿鳥樂欲因新月望吳雲遙看北斗挂南嶽一夢愔愔四十秋古人不死終未休草舍蕭條誰與語香風欲過白蘋洲寰宇記衡山即南嶽也周八百里上有七十二峰其峰高峻者五而祝融為最九域志南嶽衡山上承翼軫鈐總萬物故名衡山度應斗衡位直離宫故曰南嶽左傳祈招之愔愔唐韻愔靖也清逺舟中寄耘老一統志清逺漢中宿地在今廣州宋史賈收字耘老烏程人有詩名喜飲酒李公擇蘇子瞻與之遊小寒初度梅花嶺萬壑千岩背人境清逺聊為泛宅行一夢分明墮鄉井覺來滿眼是湖山鴨緑波搖鳯凰影海陵居士無雲梯嵗晚結廬潁水湄山腰自懸蒼玉珮野馬不受黃金羈門前車蓋獵獵走笑倚清流數鬢絲汀洲相見春風起白蘋吹花散煙水萬里飄蓬未得歸目斷滄浪淚如洗北鴈南來遺素書苦言大浸沒我廬清齋十日不燃鼎曲突往往巢龜魚今年玉粒賤如水青銅欲買囊已虗人生百年如寄爾七十朱顔能有幾有子休論賢與愚倪生枉郤帶經鋤天南看取東坡叟可是平生廢讀書南安志大庾嶺其上多植梅又名梅嶺世説顔真卿為湖州刺史張志和來謁真卿以其舟敝漏請更之志和曰願為浮家泛宅往來苕霅間道經太上玉佩金鐺吳筠詩白馬黃金羈後漢獨行傳范丹所止單陋有時絶粒閭里歌之曰甑中生塵范史雲釡中生魚范菜蕪漢兒寬傳受業孔安國貧無資用嘗為弟子都飬時行賃作帶經而鋤書堂嶼蒼山古木書堂嶼北出湘水百餘步誰為往來虧世界至今人指安禪處豈無驚蛇與飛鳥後來那復知其趣不知我身今是否空記名稱作常住楞嚴經了然自知獲本妙心常住不滅釋典初禪修五法四禪離八災患名不動地是為安禪戲詠子舟畫兩竹兩鸜鵒風晴日暖搖雙竹竹間對語雙鸜鵒鸜鵒之肉不可食人生不才果為福子舟之筆利如錐千變萬化皆天機未知筆下鸜鵒語何似夢中蝴蝶飛春秋昭二十五年有鸜鵒來巢廣雅鸜鵒似鵙而有幘兩翼有白點剪其舌可教以人語方言鸜鵒一名寒臯杜詩有鳥名鸜鵒力不能高飛肉味不足登鼎爼胡為見羈虞網中南部新書栁公權筆偈曰圓如錐捺如鑿只得入不得郤莊子齊物論昔者莊周夢為蝴蝶栩栩然蝴蝶也人間世故未終其天年而中道之夭於斧斤此材之患也不才為福句與莊同旨贈山谷子黃童三尺世無雙筆頭袞袞懸秋江不憂老子難為父平生崛強今心一作已降我來喜共阿戎語應敵縱橫如急雨生子還如孫仲謀豚犬謾多何足數黃家小兒名拾得眉如長松眼如漆只今數嵗已動人老人留眼看他日笑君老蚌生明珠自笑此物吾家無君當置酒我當賀有兒傳業更何須後漢書天下無雙江夏黃童再見晉伏滔傳孝武帝嘗會於西堂滔豫坐還下車先呼子系之謂曰百人高會天子先問伏滔在坐不為人作父如此定何如也晉王戎傳阮籍常適戎父渾俄頃輒去過戎良久然後出謂渾曰共卿言不如共阿戎談三國志曹公曰生子當如孫仲謀若劉景升兒子豚犬耳晉杜又傳王羲之見而目之曰膚若凝脂眼如點漆此神仙人也孔融與韋端書不意雙珠近出老蚌鰒魚行漸臺人散長弓射初噉鰒魚人未識西陵衰老繐帳空肯向北河親饋食兩雄一律盜漢家嗜好亦若肩相差食每對之先太息不因噎嘔緣瘡痂中間霸據關梁隔一枚何啻千金直百年南北鮭萊通往往殘餘飽臧獲東隨海舶號倭螺異方珍寶來更多磨沙瀹瀋成大胾剖蚌作脯分餘波君不聞蓬萊閣下駝碁島八月邉風備胡獠舶船跋浪黿鼉震長鑱鏟處崖谷倒膳夫善治薦華堂坐令雕俎生輝光肉芝石耳不足數醋芼魚皮真倚牆中都貴人珍此味糟浥油藏能逺致割肥方厭萬錢厨決眥可醒千日醉三韓使者金鼎來方奩饋送煩輿臺遼東太守逺自獻臨災掾吏誰為材吾生東歸收一斛包苴未肯鑽華屋分送羮材作眼明郤取細書防老讀漢書郊祀志北治大池漸臺高二十餘丈名曰泰液師古注漸浸也臺在池中受水所浸故曰漸臺漢武故事漸臺高三十丈南有壁門三層內殿堂陛咸以土為之鑄銅鳯凰高五丈飾以黃金棲屋上漢王莽傳莽就車之漸臺欲阻池水猶抱持符命威斗軍人入殿中呼曰反虜王莽安在有美人出房曰在漸臺衆兵追之圍數百重臺上亦弓弩與相射稍稍落去矢盡無以復射短兵接初莽憂悶不能食亶飲酒啖鰒魚亶與但通一通志銅雀臺在彰德府臨漳縣魏操所築上有樓鑄大銅雀高一丈五尺置之樓巔操臨終遺令施繐帳於上使宫人歌吹帳中望吾西陵墓田世説劉雍嘗詣孟靈休靈休先患疚瘡痂落在牀雍取食之靈休大驚痂未落者悉褫噉雍雍去靈休與何勗書曰適劉雍向顧見噉遂舉體流血注瘡痂味似鰒魚故也南史禇彥回傳時淮北屬江南無復鰒魚或有間關得至者一枚直數千錢人有餉彥回鰒魚三十枚彥回時雖貴而貧薄過甚門生有獻計賣之云可得十萬錢庾杲之傳清貧自業食惟有韭葅草瀹生韭雜菜任昉嘗戲之曰誰謂庾郎貧食鮭嘗有二十七種注韭與九同音故謂三韭是二十七廣志鰒無鱗有殼一面附石細孔雜雜或七或九北齊顔之推云即石決明內旁一年一孔至十二孔而止以合嵗數登州所出其味珍絶光武時張步據青徐遣使詣闕上書獻鰒魚即此本草鰒魚治青盲失精方輿記蓬萊閣在登州丹崖山閣上望海如鏡忽有若黑豆數點者郡人云海舶至矣不一炊許已至閣下駝碁島一曰鼉磯島在蓬萊海中産硯石金星雪浪者佳晉書何曽厨膳滋味擬於王者日食萬錢猶云無下筯處魏都賦醇酎中山流湎千曰志怪齊人田無已釀千日酒過飲一斗醉臥千日方醒搜神記狄希中山人能造千日酒飲之千日醉又劉玄石千日醉見博物志莊子列禦寇小夫之智不離苞苴竿牘敝精神乎蹇淺次韻水官詩淨因大覺璉師以閻立本畫水官遺編禮公公既報之以詩謂某汝亦作某頓首再拜次韻仍録二詩為一卷以獻附老泉詩水官騎蒼龍龍行欲上天手攀時且住浩若乘風船不知幾何長足尾猶在淵下有二從臣左石乘魚黿矍鑠相顧視風舉衣袂翻女子侍君側白頰垂雙鬟手執雉尾扇容如未開蓮從者八九人非鬼非戎蠻出水未成列先登揚旗旜長刀擁旁牌白羽注強弮雖服甲與裳狀貌猶鯨鱣水獸不得從仰靣以手扳空虛走雷霆雨雹晦九川風師黑虎囊靣目昏塵煙翼從三神人萬里朝天關我從大覺師得此詭怪編畫者古閻子於今三百年見者誰不愛豫者誠已難在我猶在子此理寧非禪報之以好詞何必畫在前高人豈學畫用筆乃其天譬如善遊人一一能操船閻子本逢掖疇昔慕雲淵丹青偶為戲染指初嘗黿愛之不自已筆勢如風翻傳聞正觀中左袵解稚鬟南夷羞白雉佛國貢青蓮詔令擬王會别殿寫戎蠻熊冠金絡額豹袖擁幡旜傳入應門內俯伏脫劒弮天姿儼龍鳳雜沓朝鵬鱣神功與絶迹後世兩莫扳自從李氏亡羣盜竊山川長安三日火至寶隨飛煙尚有脫身者漂流出東關三官豈容獨得此今巳編吁嗟至神物會合當有年京城諸權貴欲取百計難贈以玉如意豈能動高禪信應一篇詩皎若畫在前莊子逹生篇顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若伸吾問焉曰操舟可學耶曰可善遊者數能若乃夫沒人則未嘗見舟而便操之也江淹别賦雖淵雲之墨妙嚴樂之筆精注王褒字子淵揚雄字子雲唐書閻立本傳太宗與侍臣泛舟春苑池見異焉容與波上恱之詔坐者賦詩而召立本侔狀閣外傳呼畫師閻立本是時巳為主爵郎中俯伏池左研吮丹粉望坐者羞悵流汗歸戒其子曰吾少讀書文辭不減儕輩今獨以畫見名與厮役等若曹慎毋習然性所好雖被訾屈亦不能罷也既輔政但以應務俗材無宰相器時薑恪以戰功擢左相故時人有左相宣威沙漠右相馳譽丹青之嘲左傳楚人獻黿於鄭靈公子公之食指動謂子家曰必嘗異味及宰夫解黿食大夫不與子公子公染指於鼎嘗之而出談賓録貞觀三年東蠻謝元深入朝中書侍郎顔師古奏言昔周武王治致太平逺國歸欵乃集其事為王會篇可圗寫貽後以彰服逺之德從之乃命尚書閻立本畫之為職貢圗唐畫斷閻立德創職貢圗異方人物詭怪之狀弟立本畫國王粉本昔南北兩朝名手不是過也唐太宗本紀龍鳯之姿天日之表胡琮别傳吳時秣陵掘地有得白玉如意大帝以問琮琮對曰秦始皇以金陵有天子氣處處輒埋寶物以當王氣此殆是乎弔徐德占并序余初不識德占但聞其初為吕惠卿所薦以處士用元豐五年三月偶以事至蘄水德占聞余在傳舍惠然見訪與之語有過人者是嵗十月聞其遇禍作詩弔之美人種松柏欲使低映門栽培雖易長流惡病其根哀哉嵗寒姿骯髒誰與論一作言竟為明所悮不免刀斧痕一遭兒女汚始覺山林尊從來覓棟梁未免傍籬藩南山隔秦嶺千樹龍蛇奔大厦若畏傾萬牛何足言不然老巖壑合抱枝生孫死者不可悔吾將遺後昆栁宗元枯松詩不以險自防遂為明所誤杜甫古柏行大厦如傾要梁棟萬牛回首丘山重題李伯時淵明東籬圗彼哉嵇阮曹終以明自膏靖飾固昭曠歸來侣蓬蒿新霜著疏栁大風起江濤東籬理黃華意不在芳醪白衣挈壺至徑醉還遊遨悠然見南山意與秋氣高顔延年陶徴士誄夫實以誄華名由諡高茍允德義貴賤何算焉若其寬樂令終之美好亷克已之操其合諡典無愆前志故詢諸友好宜諡曰靖節徴士續晉陽秋陶潛嘗九月九日無酒於宅邉東籬下菊叢中摘盈把坐其側未幾望見白衣人至乃刺史王𢎞送酒也即便就酌醉而後歸陶詩采菊東籬下悠然見南山杜甫詩每恨陶彭澤無錢對菊花如今九日至自覺酒須賖杜牧詩南山與秋色氣勢兩相高李白謫仙詩我居青空裏君隱黃埃中聲形不相弔心事難形容欲乘明月光訪君開素懷天杯飲清露展翼登蓬萊佳人持玉尺度君多少才玉尺不可盡君才無時休對面一笑語共躡金鼇頭絳宫樓闕百千仞霞衣誰與雲煙浮韓退之謁衡嶽廟詩須臾靜掃衆峯出仰見突兀撑青空唐書上官婉兒初生時其母夢神與大稱曰持此稱量天下又趙光逄以文章名人謂玉界尺紀聞談録有海客言一夜見海中大鼇浮出目光照耀天地如白晝蓋金鼇也數日前夢一僧出二鏡求詩僧以鏡置日中其影甚異其一如芭蕉其一如蓮花夢中與作詩君家有二鏡光景如湛盧或長如芭蕉或圓如芙蕖飛電著子壁明月入我廬月下合三璧日月跳明珠問子是非我我是非文殊越絶書歐冶乃因天之精神悉其伎巧造為大劍三小劍二一曰湛盧二曰純鉤三曰勝邪四曰魚腸五曰巨闕吳王闔廬之時得其勝邪魚腸湛盧闔廬亡道子女死殺生以送之湛盧之劍去之如水楞嚴經如汝文殊更有文殊是文殊者為無文殊如第二月誰為是月又誰非月又於自心現大圓鏡飲酒四首我觀人間世無如醉中真虗空為銷殞况乃百憂身惜哉知此晚坐令華髮新聖人驟難得日且致賢人莊子有人間世篇楞嚴經阿難汝觀世間可作之法誰為不壞然終不聞爛壞虛空又我此無常變壞之身雖未曽滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞魏書徐邈傳時科禁酒而邈私飲至於沉醉校事趙逹問以曹事邈曰中聖人逹白之太祖太祖甚怒渡遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人左手持蟹螯舉觴矚雲漢天生此神物為我洗憂患山川同恍惚魚鳥共蕭散客至壺自傾欲去不得間晉畢卓傳卓嘗謂人得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣魏武短歌何以解憂惟有杜康有客逺方來酌我一甌茗我醉方不啜強啜忽復醒既鑿渾沌氏遂逺華胥境操戈逐儒生舉觴還酩酊莊子應帝王日鑿一竅七日而渾沌死列子黃帝晝寢夢遊華胥其國入水不溺入火不熱乘空如履實寢虛若處牀既寤怡然自得其後天下大治幾若華胥矣又宋陽里華子中年病忘魯有儒生自媒能治之華子之妻子以居産之半請其方儒生獨與居七日而積年之疾一朝俱除華子既悟乃大怒黜妻罰子操戈逐儒生曰曩吾忘也蕩蕩然不覺天地之有無今頓識既往數十年來存亡得失哀樂好惡擾擾萬緒起矣須臾之忘可復得乎雷觴淡於水經年不濡唇爰有擾龍裔為造英靈春英靈韻甚高蒲萄難與鄰他年血食汝當配杜康神家語君子之交淡於水左傳有劉纍者善擾龍洛陽伽藍記河東人劉白墮善釀六月以罌貯酒暴於日中經一旬其酒不動飲之香美醉而經月不醒朝貴相餉踰於千里以其逺至號曰鶴觴如鶴之一飛千里也史記大宛國以葡萄為酒富人藏酒至萬餘石久者至數十嵗不敗世本杜康作秫酒晉江統酒誥酒之所興肇自上皇或曰儀狄一曰杜康唐王績傳聞大樂署焦革家善釀復求為大樂丞革死妻送酒不絶嵗餘又死乃棄官去所居東南有盤石立杜康祠以焦革配大雪獨留尉氏尉氏屬河南開封府本秦縣古驛無人雪滿庭有客冒雪來自北紛紛笠上已盈寸下馬登堂面蒼黑苦寒有酒不能飲見之何必問相識我酌徐徐不滿觥看客倒盡不留溼千門晝閉行路絶相與笑語不知夕醉中不復問姓名上馬忽去橫短䇿左傳楚子乘驛爾雅馹遽傳也漢書注傳若今之驛古者以車謂之傳車其後單置馬謂之驛騎詩小雅彼都人士臺笠緇撮古注臺夫須也即莎草謂以夫須皮為笠所以禦暑雨左傳繞朝贈之以䇿注馬鞭也晉元逸傳送客冒寒舉體凍濕阮籍嘯臺阮生古狂逹遁世默無言猶餘胸中氣長嘯獨軒軒高情遺萬物不與世俗論登臨偶自寫激越蕩乾坤醒為嘯所發飲為醉所昏誰能與之較亂世足自存陳留風俗傳阮嗣宗善嘯聲與琴諧陳留有阮公嘯臺世説袁羊古之遺狂晉書阮籍字嗣宗陳留尉氏人嗜酒能嘯善彈琴文帝初欲為武帝求婚于籍籍醉六十日不得言而止籍雖不拘禮教然發言玄逺口不臧否人物嘗於蘇門山遇孫登與商略終古及栖神導氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳯之音響乎巖谷乃登嘯也又籍本有濟世志屬魏晉之際天下多故名士少有全者籍由是不與世事遂酣飲為常留别叔通元弼坦夫田三昔同寮向我每傾倒當年或齟齬反覆看愈好寇三我部民孝悌化鄰保有如袁伯業苦學到衰老石生吾邑子徑立風中草宦遊甑生塵飯水媚翁媪我窮交舊絶計拙集枯稿三子尤見存往復紛紵縞迎我淮水北送我睢陽道願存金石契凛凛貫華皓左傳同官為寮吾嘗同寮敢不盡心乎文帝典論太祖稱長大而能勤學者惟吾與袁伯業耳魏武本紀山陽太守袁遺注字伯業紹從兄古詩疾風知徑草塵甑范别萊蕪事注見前史記吾翁即若翁又母曰劉媪注媪母名音鳥老反一曰媪女老稱也後世父母稱翁媪本此莊子天下篇雖枯稿不舍也才士也夫國語人皆集於菀子獨集於枯左傳吳季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉韓詩外傳熊渠子見其誠心而金石為之開况於人乎孟郊審友詩莫躡冬氷堅中有潛浪翻惟當金石交可與賢逹論華顛皓首皆謂白頭和寄天選長官寓形宇宙間佚我方以老流光安足恃百嵗同過鳥頃子縈網羅文采緣自表自古山林人何曽識機巧但記寒巖翁論心秋月皎黃香十年舊禪學參衆妙虛懷養天和肯徇奔走閙官居職事理晨起何用早桐隂滿西齋叱吏供灑掃眷子東南來野飯煮芹蓼葆光既清尚令尹亦高蹈相將古寺行軟語頽晚照公家有畸人公有族人隱嵩山虗緣能自保卜築嵩山陽何一作行當從結好中山饒勝景一覽未易飽何時命巾車共陟雲外嶠翻然一作思筋力疲不復追踴跳公詩擬南山雄拔千丈峭形容逼天真邂逅識其要藩籬吾未窺敢議窮閫奧歸去來辭寓形宇內復幾時莊子大宗師大塊載我以形勞我以生佚我以老息我以死金樓子楚國龔舍初隨楚王朝宿未央宫見赤蜘蛛大如栗四面縈羅網有蟲觸之而死者進而不能得出焉舍乃歎曰吾生亦如是耳仕宦人之羅網也豈可淹嵗於是挂冠而退時人謂之蜘蛛隱莊子齊物論此之謂葆光大宗師畸人者畸於人而侔於天杜子美詩夜闌接軟語歸去來辭或命巾車或棹孤舟孔叢子巾車命駕將適唐都注以衣飾車也韓退之有南山詩凡百有二韻詩國風邂逅相遇適我願兮宋玉對楚王問夫藩籬之鷃豈能與之料天地之高哉爾雅西南隅謂之奧昭陵六馬唐文皇戰馬也琢石象之立昭陵前客有持此石本示豫為賦之天將剗隋亂帝遣六龍來森然風雲姿颯爽毛骨開飈馳不及視山川儼莫回長鳴視八表擾擾萬駑駘秦王龍鳳姿魯鳥不足摧腰間大白羽中物如風雷區區數豎子摶取若提孩手持掃天帚六合如塵埃艱難濟大業一一非常才維時六驥足績與英衛陪功成鏘八鸞玉輅行天街荒涼昭陵闕古石埋蒼苔唐書太宗本紀生四嵗有書生謁高祖曰公在相法貴人也然必有貴子及見太宗曰龍鳯之姿天日之表其年幾冠必能濟世安民周禮馬八尺以上為龍杜子美詩英姿颯爽來酣戰又卓立天骨森開張六韜陷堅陳敗強敵用大黃參連弩飛鳧電影自副飛鳧赤莖白羽以鋼為首電影青莖赤羽以銅為首杜詩猛將腰間大羽箭唐書太宗嘗自製長弓大羽箭皆倍常箭以旌武功英衛英公徐世績衛公李靖顔闔顔闔古有道躬耕自衣食區區魯小邦不足隱明德軺軒來我門聘幣繼金璧出門應使者耕稼不謀國但疑誤將命非敢憚行役使者反錫命户庭空履迹薄俗徇世榮截趾履之適所重易所輕隋珠彈飛翼伊人畏照影獨往就隂息鼎俎薦忠賢誰能死燔炙念彼藏皮冠安知獲堯客莊子讓王篇魯君聞顔闔得道之人也使人以幣先焉顔闔守陋閭苴布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰然使者致幣顔闔曰恐聼者謬而遺使者罪不若審之使者還反審之後來求之則不得已逹生篇忘足履之適也讓王篇今且有人於此以隋侯之珠彈千仞之雀世必笑之是何也則以所用者重而所要者輕也漁父篇人有畏影惡迹而去之走者舉足愈數而迹愈多不知處隂以休影處靜以息迹愚亦甚矣左傳臣不見皮冠不敢進也南史明僧紹屢徴不至隱于攝山高帝謂其弟慶符曰卿兄高尚其事亦堯之外臣朕夢想幽人固已勤矣所謂徑路絶風雲通仍賜竹根如意筍籜冠贈狄崇班季子狄生臂鷹來見客不會揖踞牀吒得雋借筯數禽入短後掬豹裘猶濺猩血溼指呼索酒嘗快作長鯨吸半酣論刀槊怒髮欲起立北方老猘子狂突尚不縶要須此慓悍氣壓邉烽急夜走追鋒車生斬活離級持歸獻天王封侯穩可拾何為走獵師日使羣毛泣南史張充傳字延符少好逸逰父緒嘗告歸至吳始入西郭逄充獵右臂鷹左牽狗遇緒船至便放紲脫韝拜於水次緒曰一身兩役無乃勞乎莊子吾王所見劍士皆蓬頭突鬚垂冠曼胡之纓短後之衣瞋目而語難杜詩笑指銀瓶索酒嘗又飲如長鯨吸百川史記怒髮上衝冠纂文猘屈尾犬也記獻犬則執緤注紲縶也按老猘子謂契丹也古今注追鋒車去巾蓋施通愋遽則乘之晉杜預傳給追鋒車第二駙馬班固賦四夷聞奏德廣所極僸佅兜離罔不具集活離疑即兜離漢書夏侯勝每講授謂諸生曰士病不明經術經術苟明其取青紫如俯拾地芥耳後漢班超傳立功異域以取封侯萬里之外安能久事筆硯間乎班賦風毛雨血灑野蔽天題盧鴻學士堂圖唐書盧鴻字皓然范陽人徙洛陽慱學善書籕結廬嵩山名所居廬曰寧極開元禮徴不至昔為太室花盧岩在東麓直上登封壇一夜繭生足徑歸不復往巒壑空在目安知有千老舒卷不盈軸一處一盧生裘褐蔭喬木方為世外人行止何煩録百年入篋笥犬馬同一束嗟豫縳世纍歸未有茅屋江千百畝田清泉映修竹尚欲逃世名豈須上圗軸一統志嵩山在登封即中嶽東曰太室西曰少室淮南子楚王欲攻宋墨子聞之自魯而趨楚十日十夜足重繭而不休息杜詩足繭荒山轉愁疾後漢法真傳友人郭正稱之曰法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師矣寄周安孺茶大哉天宇內植物知幾族靈品獨標竒逈超凡草木名從姬旦始漸播桐君録賦詠誰最先厥傳惟杜育育當作育唐人未知好論著始於陸常李亦清流當年慕高躅遂使天下士嗜此偶於俗豈但中土珍兼之異邦鬻鹿門有佳士博覽無不矚邂逅天隨翁篇章互賡續開園頤山下屏迹松江曲有興即揮毫粲然存簡牘伊豫素寡愛嗜好本不篤粵自少年時低回客京轂雖非曵裾者庇蔭或華屋頗見綺紈中齒牙厭粱肉小龍得屢試糞土視珠玊團鳯與葵花碔砆雜魚目貴人自矜惜捧玩且緘櫝未數日注卑定知雙井辱於兹自研討至味識五六自爾入江湖尋僧訪幽獨高人固多暇探究亦頗熟聞道早春時擕籯赴初旭驚雷未破蕾采采不盈掬旋洗玊泉蒸芳馨豈停宿須臾布輕縷火候謹盈縮不憚頃間勞經時廢藏蓄髹筒淨無染箬籠勻且復苦畏梅潤侵暖須人氣燠有如剛耿性不受纎芥觸又若廉夫心難將微穢瀆晴天敞虗府石碾破輕緑永日遇間賔乳泉發新馥香濃奪蘭露色嫩期秋菊閩俗競傳誇豐腴面如粥自云葉家白頗勝中山醁好是一杯深午􅐼春睡足清風擊兩腋去欲凌鴻鵠嗟我樂何深水經亦屢讀子吒中泠泉次乃康王谷蟆培頃曽嘗瓶罌走僮僕如今老且懶細事百不欲美惡兩俱忘誰能強追逐薑鹽拌白土稍稍從吾蜀尚欲外形體安能徇心腹由來薄滋味日飯止脫粟外慕既已矣胡為此羈束昨日散幽步偶上天峰麓山圃正春風蒙茸萬旗簇呼兒為佳客採製聊亦復地僻誰我從包藏置厨簏何嘗較優劣但喜破睡速况此夏日長人間正炎毒幽人無一事午飯飽蔬菽困卧北􅐼風風微動􅐼竹乳甌十分滿人世真局促意爽飄欲仙頭輕快如沐昔人固多癖我癖良可贖為問劉伯倫胡然枕糟麴爾雅檟苦茶郭璞注樹小似梔子冬生今呼早采者為茶晚取者為茗爾雅始於周公故曰名從姬旦始晉杜育荈賦燠如積雪煜若春􅞉雲溪友議陸羽字鴻漸唐人著茶經三卷造茶具二十四事時鬻茶者以陸羽為茶神芝藝叟談貞元中常袞為建州刺史始蒸焙而研之謂之研膏茶中朝故事李德裕有親知授舒州牧李曰到郡日天柱峯茶可惠三四角因話録李約性嗜茶常曰茶須緩火炙活火煎蓋謂老湯三沸之法非活火不能成也唐書黨魯使西番烹茶帳中番使問何為魯曰滌煩療渴所謂茶也畨使曰我亦有之命取出以示曰此夀春者此顧渚者此蘄門者唐書皮日休字襲美襄陽人以詩文著隱鹿門山中自號間氣布衣與華亭陸龜蒙友善陸號天隨子松陵集有皮日休茶人詩云生於顧渚山老在漫石塢陸龜蒙詩云且共薦臯盧何勞傾斗酒歸田録茶之品莫貴於龍鳳團凡八餅重一斤慶曆間蔡君謨為福建運使造小片龍團其品精絶謂之小龍團凡二十餅重一斤其價值金二兩每南郊致齋中書樞密各賜一餅宫人往往鏤金其上其貴重如此茶譜蒙山頂曰上清峯茶最艱得俟雷發聲採之茶録藏茶宜蒻葉而喜過燥故收藏之家以蒻葉封褁入焙中三兩日一次用火常如人體溫溫然以禦濕潤又茶以建寧貢為上有石乳滴乳龍鳳團等名皆碾末作餅中山酒注見前盧同茶歌五碗肌骨清六碗通仙靈七碗吃不得也惟覺兩腋習習清風生中朝故事李德裕居廟廊日有親知奉使京口李曰還日金山下江中泠水取置一壺來其人忘之舟上石頭城方憶及汲一瓶歸京獻之李飲後大吒曰江南水味有異於頃嵗此頗似建業石頭城下水其人謝過不敢隱張又新載陸羽品天下二十水揚子中泠水第七南康記谷簾泉在府城西泉水如簾布巖而下者三十餘𣲖陸羽品其味為天下第一廬山記康王谷楚康王照為秦將王翦所窘匿此桑喬山疏云在康王谷中故名谷簾蝦蟆培注見前張又新煎茶記粉槍末旗蘇蘭薪桂茶譜蘄州團黃茶有一旗二槍之號言一葉二芽也晉陶潛傳嘗言夏月虛間高臥北忩之下清風颯至自謂羲皇上人劉伶酒德頌奮髯箕踞枕麴藉糟無思無慮其樂陶陶余自城中還道中雲氣自山中來如羣馬奔突以手掇開籠收其中歸家雲盈籠開而放之作攓雲篇物役會有時星言從高駕道逢南山雲歘吸如電過竟誰使令之袞袞從空下龍移相排拶子逹切鳳舞或頽亞散為東郊霧凍作枯樹稼或飛入吾車逼仄入肘胯搏取置笥中提擕反茅舍開緘乃放之掣去仍變化雲兮汝歸山無使逹官怕詩國風星言夙駕稅于桑田禮記天降時雨山川出雲釋名雲猶云云衆盛意也韓愈雪詩崩騰相排拶龍鳳交橫飛注排拶密拶也後漢書河南張楷字公超能作五里霧時關西人裴優亦能作三里霧謝氏詩源更嬴之妻能作鎖雲囊佩之陟高山有雲處雲氣入其中歸家啓視雲白如綿自囊而出更嬴善射每言能仰射入雲中其妻不信因以一囊繫箭頭令射之及墜驗之果有白雲在內因名箭曰鎖雲故子美詩云翻身向天仰射雲是也詩意大概本此唐諺語木若稼達官怕韻注木稼一曰木介亦曰樹稼春秋雨木冰即此師古注曰氣著樹木結為氷也杜詩有逼仄行遊山呈通判承議寫寄參寥師煌煌世胄餘夫子非碌碌由來有詩書所以能絶俗得官本河朔瓜期未易促扁舟下南來逸駕追鳴鵠遇勝即倘佯風餐兼露宿嗟豫偶傾蓋一笑外羈束仗䇿每過從相擕訪山谷東風披鮮雲繡錯出林麓松門有時盡幽景無斷續崖轉聞鐘聲林疏見華屋銜山餘落景歸迹猶躑躅誰云鄴下歡往事不可復吾曹二三子取樂亦云足願公寄新詩一一能見録船頭行北歸囊槖有美玊塵埃京洛人亦與洗心目史記平原君傳公等録録所謂因人成事者也魏其武安侯傳太后怒曰此時帝在即録録與碌碌同左傳齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至家語孔子之郯遭程子於塗傾蓋而語終日甚相親顧謂子路曰取束帛以贈先生文選靈運擬魏太子鄴中詩序云建安末豫時在鄴宫朝逰夕宴究歡愈之極天下良辰美景賞心樂事四者難并今昆弟友朋二三諸彥共盡之矣和郭功父韻送芝道人遊隱靜觀音妙智力應感隨緣度芝師訪東坡寧辭萬里步道義偶相契十年同去住行窮半世間又欲浮杯渡我願焚囊鉢不作陳俗具會取郤歸時只是而今路楞嚴經得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住高僧傳晉杯渡者不知其姓名常乘大杯渡河因名焉許渾送僧詩杯浮野渡魚龍逺錫響空山虎豹驚傳燈録守清禪師有僧問如何是和尚家風曰一瓶兼一鉢到處是生涯次韻魯直戲贈昨夜試微涼汗衾初退紅我願隨秋風隨身入房櫳君王不好事只作好驚鴻細看卷蠆尾我家真栗蓬楊妃外傳楊貴妃每夏月常衣輕絹汗出紅膩而多香拭於巾帕其色桃紅洛神賦翩若驚鴻矯若遊龍詩小雅彼君子女卷髮如蠆注蠆螫蟲尾末犍然似髮之曲上者又國風首如飛蓬栗蓬未詳禪宗有栗棘蓬語按之詩意不合宋玉登徒子好色賦其妻蓬頭攣耳齞脣歷齒云云栗蓬疑當作歷蓬寄傲軒歸去來辭倚南􅐼以寄傲先生英妙年一掃千兔秃仕進固有餘不肯踐場屋通闤何所傲傲名非傲俗安知軒冕中享榮不償辱豈無自安計得失猶轉轂先生獨揚揚憂患莫能瀆得如虎挾乙失若龜藏六茅簷聊寄寓俯仰亦自足東坡無邉春方寸盡藏畜醉哦傍若無獨侑一樽醁牀頭車馬道殘月挂疏木朝客紛擾時先生睡方熟選賦終童山東之英妙杜甫詩詞源倒流三峽水筆陳獨掃千人軍李白詩筆鋒殺盡中山兔酉陽雜俎虎威如乙字長寸許在腋兩旁皮內尾端亦有之佩之臨官則能威衆雜阿含經有龜被野干所包藏六而不出野干怒而捨去佛告諸比丘當如龜藏六根魔不得便又野干獸名干音犴范石湖詩六用都藏縮似龜御史臺榆槐竹柏四首榆我行汴堤上厭見榆隂緑千株不盈畝斬伐同一束及居幽囚中亦復見此木蠧皮溜秋雨病葉埋墻曲誰言霜雪苦生意殊未足坐待春風至飛英覆空屋詩國風隰有榆爾雅榆白枌也管子五沃之上其榆條長淮南子八月榆檽令人不飢春秋元命苞三月榆莢落槐憶我初來時草木向衰歇高槐雖經秋晚蟬猶抱葉淹留未云幾離離見疏策栖鴉寒不去哀呌飢啄雪破巢帶空枝疏影挂殘月豈無兩翅羽伴我此愁絶周禮烜氏掌火冬取槐檀之火淮南子槐之生也入季春五日而兔目十日而鼠耳更旬而始規後漢書破巢之下寧有完卵竹今日南風來吹亂庭前竹低昻中音會甲刃紛相觸蕭然風雪意可折不可辱風霽竹已一作亦回猗猗散青玊故山今何有秋雨荒籬竹此君知健否歸掃南軒緑一作三徑緑莊子養生主合於桑林之舞乃中經首之會詩國風緑竹猗猗元稹竹詩一一青琅玕唐人郊居詩門外晚晴秋色老萬條寒玉一溪煙晉書王徽之字子猷嘗暫寄人空宅便命種竹曰何可一日無此君柏故園多珍木翠柏如蒲葦幽囚無與樂百日看不已時來拾流膠一作肪未忍踐落子當年誰所種少長與我齒仰視蒼蒼翰所閲固多矣應見李將軍膽落溫御史春秋運斗樞玉衡星精散為柏李德裕平泉花木記有珠子柏實如珠子生葉又有鴈翅檜葉婆娑如鴈翅也漢書平恩侯許伯入第蓋寬饒仰屋視而歎曰富貴無常忽則易人此如傳舍所閲多矣唐書敬宗初立夏綏節度使李祐進馬百五十匹侍御史溫造彈祐違敇進奉請論如法詔釋之郤其所進祐謂人曰吾夜半入蔡州城取吳元濟未嘗心動今日膽落於溫御史矣桑道茂傳茂居有二柏甚盛茂曰人居木盛則土衰土衰則人病乃以鐵數十斤自埋其下曰後有發者死太和中溫造居之發藏鐵而造死問淵明公自注或曰東坡此詩與淵明反此非知言也蓋亦相引以造意言者未始相非也元祐五年十月日子知神非形何復異人天豈惟三才中所在靡不然我引而高之則為星斗懸我散而卑之寧非山與川三皇雖云沒至今在我前八百要有終彭祖非永年皇皇謀一醉發此露槿妍有酒不辭醉無酒斯飲泉立善求我譽飢人食饞涎委運憂傷生憂一作運去生亦還縱浪大化中正為化所纒應盡便須盡寧復事此言朱亥墓公自注俗謂屠兒墓昔日朱公子雄豪不可追今來遊故國大冢屈稱兒平日輕公相千金棄若遺梁人不好事名字寄當時魯史盜齊豹求名誰復知慎無怨世俗猶不遭仲尼史記信陵君傳公子請朱亥朱亥笑曰臣乃市井鼓刀屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣效命之秋也遂與公子俱至晉鄙軍晉鄙合符疑之欲無聼朱亥袖四十斤鐵椎椎殺晉鄙春秋經昭二十年秋盜殺衛侯之兄縶榖梁傳盜賤也其曰兄母兄也目衛侯衛侯纍也春秋經昭三十一年冬黑肱以濫來奔左傳賤而書名重地也或求名而不得或欲蓋而名彰是以春秋書齊豹曰盜三叛人名以懲不義嚴顔碑先主反劉璋兵意頗不義孔明古豪傑何乃為此事劉璋固庸主誰為死不二嚴子獨何賢談笑傲砧几國亡君已執嗟子死誰為何人刻山石使我空涕淚吁嗟斷頭將千古為病悸蜀書張飛傳先主入益州還攻劉璋飛與諸葛亮等泝流而上分定郡縣至江州破璋將巴郡太守嚴顔生獲之飛呵顔曰大軍至何以不降顔答曰卿等無狀侵奪我州我州但有斷頭將軍無降將軍也飛怒令左右牽去斫頭顔色不變曰斫頭便斫頭何為怒也飛壯而釋之引為賔客漢田延年傳大將軍曰誠然實勇士也發大議時震動朝廷光因舉手自撫心曰使我至今病悸師古注悸心動也音揆峴山在襄陽府城南逺客來自南遊塵昏峴首過關無百步曠蕩吞楚藪登高忽惆悵千載意有偶所憂誰復知嗟我生苦後團團山上檜嵗嵗閲榆栁大材固已殊安得同永久可憐山前客倐忽星過霤賢愚未及分來者當自剖晉羊祜傳祐樂山水每風景佳必造峴山嘗慨然歎息顧謂從事鄒湛等曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷如百嵗後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令聞令望必與此山俱傳至若湛輩乃當如公言耳及祐卒襄陽百姓於峴山祜平生遊憩之所建碑立廟嵗時饗祭焉望其碑者莫不流涕杜預因名為墮淚碑驪山君門如天深幾重君王如帝坐法宫人生難處是安穩何為來此驪山中復道凌雲接金闕樓觀隱煙橫翠空林深霧暗迷八駿朝東暮西勞六龍六龍西幸峨眉棧悲風便入華清院霓裳蕭散羽衣空麋鹿來遊猿鶴怨我上朝元春半老滿地落花無人掃羯鼓樓高挂夕陽長生殿古生青草可憐吳楚兩醯雞築臺未就已堪悲長楊五柞漢幸免江都樓成隋自迷由來留連多喪國晏安鴆毒因奢惑三風十愆古所戒不必驪山可亡國一統志驪山在臨潼左曰東繡嶺右曰西繡嶺下有溫泉其清徹底不火而熱初學記閶闔天門也角亦天門也楚辭天之門兮九重晉志心三星天王正位也中星曰明堂天子位為大辰主天下之賞罰故天子所居曰法宫戰國䇿蘇秦曰謁者如鬼主人難得見如天帝明皇雜録天寶六年更溫泉宫曰華清宫治井為池環山列宫室李白詩六龍西幸萬人歡蛾眉山名在蜀詳見下卷望湖亭詩注杜牧華清宫詩行雲不下朝元閣一曲淋鈴淚萬行劉禹錫詩開元天子萬事足惟惜當時光景促三鄉驛上望仙山歸作霓裳羽衣曲史記淮南傳伍被曰臣聞子胥諫吳王吳王不用乃曰臣今見麋鹿遊姑蘇之臺也今臣亦見宫中生荆棘露沾衣也南京羯鼓録明皇嘗遇二月初宿雨始晴景色明媚小殿亭內栁杏將吐遣高力士取羯鼓上臨軒縱擊一曲名春光好回顧栁杏皆拆白樂天長恨歌七月七日長生殿夜半無人私語時吳地記吳王闔閭十一年起臺於姑蘇山因山為名左傳楚靈王為章華之臺與伍舉登焉日臺美矣夫醯雞甕中小蟲見莊子三輔黃圗五柞宫在盩厔漢武帝建有五柞樹可蔭數畝長揚宫在盩厔本舊秦宫漢修飾以備行幸有垂楊以名通鑑隋煬帝遊江都浙人項升進新宫圖營建既成幸之曰使真仙逰此亦當自迷因名迷樓左傳晏安鴆毒不可懷也尚書伊訓惟兹三風十愆卿士有一于身家必喪邦君冇一于身國必亡和子由除日見寄薄官驅我西逺别不容惜方愁後會逺未遐憂嵗夕強歡雖有酒冷酌不成席秦烹惟羊羮隴饌有熊臘念為兒童嵗屈指已成昔往事今何追忽若箭已釋感時嗟事變所得不償失府卒來驅儺矍鑠驚逺客愁來豈有魔煩汝為攘磔寒梅與凍杏嫩萼初似麥攀條為惆悵玉蘂何時拆不憂春艷晚行見棄夏核人生行樂耳安用聲名藉胡為獨多感不見膏自炙詩來苦相寬子意逺可射依依見其面疑子在咫尺兄今雖小官幸忝佐方伯北池近所鑿中有汧水碧臨池飲美酒尚可消永日但恐詩力弱鬬健未免馘詩成十日到誰謂千里隔一月寄一篇憂愁何足擲陶詩飢來驅我去淮南子熊當心有白脂如玉味甚美俗呼熊白國語單襄公曰高位實疾僨厚味實臘毒周禮臘人掌乾肉又脯臘注臘小物全乾者周禮方相氏黃金四目玄衣朱裳執戈揚盾率百𨽻時難以索室驅疫難通作儺後漢禮儀志季冬先臘一日大儺逐疫選門子弟十歲以上十二嵗以下百二十人為侲子皆赤幘皂衣執大鼗鼓以逐惡鬼於禁中月令季冬之月天子居玄堂右個命有司大儺旁磔出土牛以送寒氣又九門磔攘以畢春氣漢楊惲傳人生行樂耳須富貴何時漢兩龔傳龔勝不食死有老父來弔哭甚哀既而曰嗟乎薰以香自燒膏以明自銷龔生竟夭天年非吾徒也遂趨而出莫知其誰詩國風且以喜樂且以永日魯頌在泮獻馘記釋奠於學以訊馘告莊子稿項黃馘一作􅼪或云截耳從聝獻首從馘謝莊月賦隔千里兮共明月史記屈原憂愁幽思而作離騷夢雪殘杯失春溫破被生夜悄開門千山白俯仰同一照雖時出圭角固已絶瑕竅兒童勿驚怪調汝得一笑送吕行甫司門倅河陽結交不在久傾蓋如平生識子今幾日送别亦有情子生公相家高義久峥嶸天才既超詣世故亦屢更譬如追風驥豈免羈與纓念我山中人久與麋鹿并誤出挂世網舉動俗所驚歸田雖未果已覺去就輕河陽豈云逺出處恐異程便當從此别有酒無徒傾觀子玊郎中草聖柳侯運筆如電閃子雲寒悴羊欣儉百斛明珠便可扛此書非我誰能雙韋續書訣墨藪唐太宗論蕭子雲書行行如縈春蚓字字如綰秋蛇故曰寒悴法書苑梁武帝評羊欣書如大家婢為夫人雖加位遇而舉止羞澀故曰儉也歌辭竹枝歌并序竹枝歌本楚聲幽怨惻怛若有所深悲者豈亦往者之所見有足怨者歟夫傷二妃而哀屈原思懷王而憐項羽此亦楚人之意相傳而然者且其山川風俗鄙野勤苦之態固已見於前人之作與今子由之詩故特緣楚人疇昔之意為一篇九章以補其所未道者蒼梧山高湘水深中原北望度千岑帝子南遊飄不返惟有蒼蒼楓桂林楓葉蕭蕭桂葉碧萬里逺來超莫及乘龍上天去無蹤草木無情空寄泣水濵擊鼓何喧闐相將扣水求屈原屈原已死今千載滿船哀唱似當年海濵長鯨徑千尺食人為糧安可入招君不歸海水深海魚豈解哀忠直吁嗟忠直死無人可惜懷王西入秦秦關已閉無歸日章華不復見車輪君王去時簫鼓咽父老送君車軸折千里逃歸迷故鄉南公哀痛彈長鋏三戶亡秦信不虛一朝兵起盡歡呼當時項羽年最少提劍本是耕田夫橫行天下竟何事棄馬烏江馬垂涕項王已死無故人首入漢庭身委地富貴榮華豈足多至今惟有冢嵯峨故國凄涼人事改楚鄉千古為悲歌一統志禹貢荆州之域天文牛女分野周為百粵地秦屬桂林漢曰蒼梧地總百粵山連五嶺栁開記桂林全州分水嶺下即湘灕二水東自海隅至此分南北而離也北為湘水南為灕水竹書舜南巡不返史記舜巡狩崩於蒼梧之野葬於九疑漢郊祀志黃帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黃帝黃帝上騎羣臣後宮從上龍七十餘人龍乃去餘小臣不得上悉持龍髯墜墜黃帝之弓黃帝既上天乃抱其弓與龍髯號博物志舜南巡不返二女追之不及至洞庭之山以淚揮竹竹盡斑妃死為湘水神故曰湘妃竹續齊諧記五月五日楚人楝葉褁粽投汨羅江祭屈原注見前晉夏統傳領小海之唱謂子胥屈平立吾左右矣崔豹古今注鯨海魚也大者長千里小者數丈一生數萬子異物志鯨鯢長百丈大亦稱之雄曰鯨雌曰鯢史記屈原傳時秦昭王與楚婚欲與懷王會懷王欲行屈平曰秦虎狼之國不可信不如無行懷王稚子子蘭勸王行入武關秦伏兵絶其後因留懷王以求割地懷王怒不聼亡走趙趙不內復之秦竟死於秦而歸葬漢書臨江王傳既上車軸折車廢江陵父老流涕竊言曰吾王不反矣項羽本紀范增説項梁曰齊滅六國楚最無罪自懷王入秦不反楚人憐之至今故楚南公曰楚雖三户亡秦必楚也彈鋏用馮歡事已見又羽本紀項籍者字羽初起時年二十四又項王謂烏江亭長曰吾知公長者吾騎此馬五嵗所當無敵嘗一日行千里不忍殺之以賜公顧見漢騎司馬呂馬童曰若非吾故人乎吾聞漢購我頭千金邑萬户吾為若德乃自刎而死又夜聞四面皆楚歌又項王乃悲歌慷慨轆轤歌新繫青絲百尺繩心在君家轆轤上我心皎潔君不知轆轤一轉一惆悵何處春風吹曉幕江南緑水通珠閣美人二八顔如花泣向花前畏花落臨春風聼春鳥别時多見時少愁人一夜不得眠瑶井玊繩相對曉古賦轠轤不絶注環轉也人􅪀轤井上汲水木一作轆轤魏志京城內有園患無水傅元先生乃作翻車令童轉之水自復更入其功百倍白居易詩蕭相厥初謁召平中庭百拜百不譍召平後來謁蕭相故侯一拜一惆悵郭璞井賦爾乃冠玊檻甃鱗錯鼓轆轤彈徑索飛輕裙之繽紛手爭驚而互搦長纍逶蛇以曽縈兮瑶甕龍騰而灑激禮斗威儀玊衡北兩星為玉繩謝朓詩金波麗鳷鵲玉繩低建章再見梁謝舉凌雲臺詩勢高凌玉井臨逈度金波注玉井星名按此則瑤井玉繩皆指星言故曰相對曉公詩精妙典博如此辨道歌北方正氣名祛邪東郊西應歸中華離南為室坎為家先凝白雪生黃芽黃河流駕紫河車水精池産紅蓮花赤龍騰霄驚盤蛇姹女含笑嬰兒呀十二樓瞰靈泉窪華池玉液隂交加子馳午前無停差三田聚寶真生涯龜精鳯髓填谽谺天地駭有鬼神嗟一丹休別內外砂長修久餌須叔遐腸中澄結無餘柤俗骨變換顔如葩哀哉世人爭齒牙指偽為真正為哇輕肥甘美形驕奢譎詭詐妄言矜誇逰魚在網在罝一氣頓盡猶嘔啞餘生所託誠棲槎九原枯髀如亂麻胡不割衆如鏌鎁空與利名交撑拏胡不讓囗如文騧可惜貪愛相漫塗真心道意非不嘉餐金聞活非虗譁何須橫議相疵瘕衆口並發鳴羣鴉安知聚散同魚蝦自纒如繭居如蝸日懷嗔喜甘籠笯其去死地猶獵豭吾恨爾見有所遮海波或至驚井蛙烏輪即晚蟾影斜吾時俱覩超雲霞史記司馬相如傳呼吸沆瀣兮餐朝霞師古注沆瀣北方夜半氣也揚雄曰或玄而萌或黃而芽隂真君金液丹訣北方正氣為河車東方甲乙成丹砂兩情合養為一體朱雀調運生金花真訣龍從火裏出虎向水中生注龍本坎水而出於火虎本離火而出於水是乃水火之相生也志林人生死自坎離交則生分則死離為心坎為腎龍者汞也精也血也出於腎肝藏之坎之物也虎者鉛也氣也力也出於心肺藏之離之物也道書蓬萊修煉法河車是水朱雀是火取水一斗鐺中以火炙之百沸致聖石九兩其中初成姹女次謂之玊液後成紫色謂之河車白色曰白河車青色曰青河車赤色曰赤河車亦名黃芽參同契河上姹女得火則飛孫思邈詩取金之精合石之液列為夫婦結為魂魄一體混沌兩精感激河車覆載鼎候無忒洪爐列火烘焰翕赫姹女氣索嬰兒聲寂紫色內逹赤芒外射骨變金植顔駐玊澤黃庭內景經琴心三疊舞胎仙注琴和也疊積也和積三丹田如一則如胎息之仙也太清煉靈丹經丹砂外包八石內含金精晉書許邁字叔遐服氣一氣千餘息仙經道家用金色藥石於鼎以水火煉之成丹為外丹口吐濁氣曰吐故鼻納清氣曰納新為內丹莊子天運篇柤梨橘柚其味相反而皆可於口又兵莫憯於志鏌鎁為下真誥仰咽金漿控景登空左傳豫取豫求不汝疵瑕也懷沙賦鳯凰在笯兮雞雉翔舞説文豭牡豕也左傳既定爾婁豬盍歸吾艾豭莊子坎井之蛙注見前五經通義月中有兔與蟾何月隂也蟾蜍陽也而與兔並明隂繫於陽也陳守道一氣混淪生復生有形有心即有情共見利欲飲食事各有爪牙頭角爭爭時怒發霹靂火險處直在嵌巖坑人偽相加有餘怨天真喪盡無純誠徒自取先用極力誰知所得皆空名少為處士松柏寒蓬萊真人氷玊清山是心兮海為腹陽為神兮隂為精渴飲靈泉水飢食玉樹枝白虎化坎青龍離鎖禁姹女關嬰兒樓臺十二紅玻璃木公金母相東西純鉛真汞星光輝烏升兔降無年期停顔卻老只如此哀哉世人迷不迷越絶書道生氣氣生天地天地生萬物莊子德充符惠子曰人而無情何以謂之人莊子曰道與之貌天與之形惡得不謂之人惠子曰既謂之人惡得無情春秋繁露王者言不從則金不從革而秋多霹靂霹靂金氣也其音商也榖梁傳隂陽相薄感而為雷激而為霆廣記木公生於碧海之上以主陽和之氣號東王公又以西華至妙之氣化而生金母西王母傳漢初小兒歌曰著青裙入天門揖金母拜木公老人行有一老翁老無齒處處無人問年紀白髮如絲向下垂一雙眸子碧如水不裹頭又無履相識雖多少知已問翁畢竟何所止笑言只在紅塵裏秋風獵獵行雲飛老人此意無人會目注雲歸心自知黃口小兒莫相笑老人舊日曽年少浪迹常如不繫舟地角天涯知自跳亦曽樂半夜傳籌醉朱閣美人如花弄絃索只恨尊前明月落亦曽憂羈旅他鄉迫暮秋故國日邉無信息斷鴻空逐水長流或安貧或安富或爵通侯封萬户一任秋霜換鬢毛本來面目長如故水有蘋兮山有芝人意雖存事已非有時郤憶經遊處都似茫茫春夢歸邇來尤解安貧賤不為公卿強陪面皎如明月在秋潭動著依前還不見還不見可奈何空使逺人增眷戀但秖從他隨物轉青樓黃閣長相見若相見莫殷勤郤是翁家舊主人孔子徛蘭操年紀逝邁一身將老國語注十二年嵗星一周為一紀韓詩一奴長鬚不裏頭一婢赤腳老無齒家語所得皆黃口小雀史記是口尚乳臭莊子列禦冦泛若不繫之舟韓子祭十二郎文一在天之涯一在地之角漢紀漢世祖於樓上施青漆謂之青樓杜牧之詩贏得青樓薄幸名此則指娼家青樓也宋志三公黃閣前史無其義禮記士卑與天子同公侯大夫則異鄭玄注士賤與君同不嫌也夫朱門洞開當陽之正色也三公之與天子禮秩相亞故黃其閣以示謙從舊制也襄陽樂府三篇野鷹來水經注沔水南有層臺號曰景升臺蓋荆州牧劉表所築表好鷹嘗登此臺歌野鷹來曲野鷹來萬山下荒山無食鷹苦飢飛來為爾繫綵絲北原有兔老且白年年養子秋食菽我欲擊之不可得年深兔老鷹力弱野鷹來城東有臺高崔嵬臺中公子著皮袖東望萬里心悠哉鷹何在嗟爾公子歸無勞使鷹可呼亦凡曹天隂月黑狐夜嘷禮記立秋之日鷹隼乃擊廣志有雉鷹有兔鷹圗經萬山在襄陽城西相傳鄭交甫所見遊女居此山之下瑞應圗王者恩加耆老則白兔見抱朴子兔夀千嵗五百嵗則色白晉書權翼諫秦王堅曰慕容垂勇略過人其心豈止作冠軍而已譬如養鷹飢則附人飽則高飛每聞風飈之聲嘗有凌霄之志正宜謹其絛籠上堵吟水經注堵陽縣有堵水旁有白馬塞孟逹為新城守登之而歎遂為上堵吟音韻哀切今水次尚歌之臺上有客吟秋風悲聲蕭散飄入宫臺邉遊女來竊聼欲學聲同意不同君悲竟何事千里金城兩椎子白馬為塞鳯為關山川無人空且間我悲亦何苦江水冬更深鯿魚冷難捕悠悠江上聼歌人不知我意徒悲辛襄陽記鳯林關在峴山衡州金城山記武岡金城山道書第六十八福地石真人修煉於此題曰仙都白馬關在衡州城東北襄陽樂南史劉道産為襄陽太守善於臨職蠻服歸順百姓樂業由此有襄陽樂歌自道産始使君未來襄陽愁提戈入市裹氊裘自從氊裘南渡沔襄陽無事多春遊襄陽春遊樂何許峴山之陽漢江浦使君朱斾來翻翻人道使君似羊杜道邉逢人問洛陽中原苦戰春田荒北人聞道襄陽樂目送飛鴻應斷腸漢司馬遷傳氊裘之君長咸震怖峴山注見前晉書羊祜字叔子泰山南城人也杜預字元凱京兆杜陵人也顧愷之傳愷之每重嵇康四言詩因為之圖恆云手揮五絃易目送歸鴻難仙都山鹿老泉詩序云至豐都縣將遊仙都觀見知縣李長官云固知君之將至也此山有鹿甚老而猛獸獵人終莫能害將有客來遊鹿輒夜鳴故常以此候之而未嘗失余聞而異之乃為作詩東坡同賦按此序當細書今依原本日月何促促塵世若局束仙子去無蹤故山遺白鹿仙人已去鹿無家孤棲悵望層城霞至今聞有遊洞客夜來江市呌平沙長松千樹風蕭瑟仙宫去人無咫尺夜鳴白鹿安在哉滿山秋草無行迹春秋運斗樞瑶光星散為鹿述異記鹿千嵗而蒼又五百年而白虞世南白鹿賦宴嘉賔於雅什寓仙客於宜春明皇别録芙蓉園得一白鹿山人王旻曰此漢時鹿也果於角際雪毛中得一銅牌刻曰宜春苑中白鹿上目之曰仙客命圍人善畜之又玄都觀老鹿將有客來輒夜鳴道士每候之無失淮南子掘崑崙墟以下地中有層城九重孫綽遊天台山賦仍羽人於丹丘尋不死之福庭茍台嶺之可攀亦何羡於層城又赤城霞起而建標白鶴吟留鍾山覺海白鶴聲可憐紅鶴聲可惡白鶴招不來紅鶴揮不去長松受穢死乃以紅鶴故北山道人曰美者自美吾何為而喜惡者自惡吾何為而怒去自去耳吾何駛而追來自來耳吾何妨而拒吾豈厭喧而求靜吾豈好丹而非素汝謂松死吾無依焉吾方捨隂而坐露相鶴經鶴者陽鳥也而遊於隂百六十年大毛落茸毛生潔白如雪漢汲黯傳守城深堅招之不來麾之不去莊子山木篇陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也録異記魏焦先字孝然結草廬於河間號蝸牛廬呻吟其中後野火燒之乃露袒寢雪中次韻張甥棠美述志名宗奭仲子甘心織屨避萬鍾淵明不肯折腰為五斗一年鴻鴈識來往終日沐猴誰去取知甥詩意慕兩君讀書要在存心久平生所談性命奧長棄不憂金石朽我今巳習鶖子定猶復晨朝怖頭走刳心先擬射毅名不作羊鄒悲峴首雲梯雨矢集無方我已中灰同墨守恐甥自是禹門鱗未可潛逃入吾藪琢磨晚覺孟光賢畏我放言時被肘甥能鉏我青門瓜正午時來休老手高士傳陳仲字子終齊人適楚王欲以為相妻曰子織履以為食恬淡而無為樂在其中矣乃謝使者晉陶潛傳潛歎曰吾不能為五斗米折腰拳拳事鄉里小人史記説者曰人言楚人沐猴而冠耳果然項王聞之烹説者心經注舍利子即舍利佛此云鶖子於小乘十大弟子中智慧第一已得空定楞嚴經佛告富樓那汝豈不聞室羅城中演若逹多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責已頭不見面目以為魑魅無狀狂走晉羊祜登峴首語鄒湛注見前墨子公輸般為雲梯之械將攻宋墨子見之乃解帶為城以堞為械九設攻城之機墨子九拒之公輸般攻械盡而墨子守有餘辛氏三秦記河津一名龍門大魚集門下數千不得上上者為龍不上者魚故云曝腮龍門晉載記祖約敗降於石勒勒使讓之曰卿逆極勢窮方來歸命吾朝豈逋逃之藪也説苑魏桓子肘韓康子康子履魏桓子躡其踵肘足接於車上而智氏分矣青門瓜用東陵侯召平事已見晉載記石勒與李陽鄰居嵗常爭麻池迭相歐擊至是引陽臂笑曰孤往日厭卿老拳卿亦飽孤毒手補和陶詩二首和東方有一士瓶居本近危甑墜知不完夢求亡楚弓笑解適越冠忽然返自照識我本來顔歸路在腳底殽潼失重關屢從淵明遊雲山出毫端借君無弦物寓我非指彈豈惟舞獨鶴便可躡飛鸞還將嶺茅瘴一洗月闕寒公自注此東方一士正淵明也不知從之遊者誰乎若了得此一假我即淵明淵明即我也和劉柴桑萬劫互起滅百年一踟躇漂流四十年今乃言卜居且喜天壤間一席亦吾廬稍理蘭桂叢盡平狐兔墟黃櫞出舊枿紫茗抽新畬我本蚤衰人不謂老更劬邦君助畚鍤鄰里通有無竹屋從低深山􅐼自明疏一飽便終日高眠忘百須自笑四壁空無妻老相如蘇詩續補遺卷上
