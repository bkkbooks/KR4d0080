body:
  text: 施註蘇詩巻三十二宋蘇軾撰施元之原註武進邵長蘅刪補詩三十六首起在潁州洎元祐壬申改知揚州尋以兵部尚書召還作上巳日與二子迨過遊塗山荆山記所見塗山詳見三巻濠州七絶詩註此生終安歸還軫天下半朅來乗樏廟復作微禹歎公自注昔自南河赴杭州過此蓋二十二年矣從祠及彼呱公自注山有啟廟像設偶此粲公自注謂塗山氏秦祖當侑坐公自注廟有栢翳夏郊亦薦祼公自注有鯀廟可憐淮海人尚記弧矢旦公自注淮南人謂禹以六月六日生是日數萬人㑹山上雖傳記不載然相傳如此荆山碧相照楚水清可亂刖人有餘坑美石肖温瓚公自注荆山下有卞氏採玉坑石色如玉不受鑱刻取出山下輒變色不復温瑩龜泉木杪出牛乳石池漫公自注龜泉在荆山下色白而甘真陸羽所謂石池漫流者有石記云唐貞元中隨白龜流出小兒強好古侍史笑流汗歸時蝙蝠飛炬火記逺岸國語還軫諸侯可謂家困尚書禹曰予乗四載孔氏傳云水乗舟陸乘車泥乘楯山乘樏左傳昭元年天王使劉定公勞趙孟於潁館於洛汭劉子曰美哉禹功明徳逺矣㣲禹吾其魚乎尚書禹曰予創若時娶于塗山辛壬癸甲啟呱呱而泣予弗子惟荒度土功楚詞招魂像設君室静閒安些詩國風今夕何夕見此粲者史記秦本紀秦之先帝顓頊氏之苗裔孫曰女修女修生大業大業生大費與禹平水土是為栢翳舜賜姓嬴氏禮記夏后氏禘黄帝而郊鯀尚書亂於河韓詩外傳楚人卞和得玉璞於荆山獻之武王使人相之曰非也王怒刖其左足及文王即位又獻之玉人又曰石也刖其右足至成王時和抱其璞哭於荆山下王乃使玉人理之得寶焉名曰和氏璧蘅按圖經塗山在昔鍾離縣西九十五里荆山在縣西八十三里二山本相聨屬而淮水遶荆山之背神禹鑿開使水流二山間此濠州之荆山也又按史記楚始封居丹陽至楚文王遷都郢皆在南郡其地有荆山楚人故以荆為號左傳曰昔我先王熊繹辟在荆山後漢郡國志曰臨沮侯國有荆山注引荆州記云谿北即荆山首曰景山即卞和抱璞之處據此則卞和得璞自當以近郢之荆山為是而濠州古鍾離國去郢甚逺韓非子所載卞和獻玉事乃在武文成三王之際當時鍾離未嘗屬楚卞和何從得至此山今山中有采玉坑為後人傅會無疑明宋濓塗荆二山記亦云附著之以俟博雅淮上早發澹月傾雲曉角哀小風吹水碧鱗開此生定向江湖老黙數淮中十往來次韻徐仲車公自注仲車耳聾按仲車名積山陽人苦學養母盡力行年四十不婚不仕乆之鄉人廹令就舉入京則以隻輪載母躬自推行葛衫草屨行道之人不能辨也登治平四年第未調官母亡遂不復仕家居山陽衣食不給及路振通判楚州始為娶妻生子小名路皃云先生嘗言仲車古之獨行人於陵仲子不能過然其詩文則怪而放如玉川子此一反也耳聵甚畫地為字乃始通終日面壁不與人接而四方事無不周知此二反也昔王肅三反而斯人有其二亦可謂異矣惡衣惡食詩愈好恰是霜松囀春鳥蒼蠅莫亂逺雞聲世上誰知一作如公覺早八年看我走三州公自注元豐八年予赴登州元祐四年赴杭州今赴揚州皆見仲車月自當空水自流人間擾擾眞螻螘應笑人呼作鬭牛次韻林子中春日新堤書事見寄林子中名希事見二十九巻次韻林子中蒜山亭見寄詩按先生以元祐六年三月從杭州召還凡七上章丐去八月自翰林承㫖岀知潁州故詩云東都寄食似浮雲襆被真成一宿賔七年正月改知揚州子中繼公守杭公在杭開西湖以所積葑為長堤子中因杭人之意為榜曰蘇公堤新堤書事葢蘇公堤也東都寄食似浮雲襆被眞成一宿賔収得玉堂揮翰手郤為淮月弄舟人羡君湖上齋揺碧笑我花時甑有塵為報年來殺風景連江夢雨不知春公自注來詩有芍藥春之句揚州近嵗率為此㑹用花十餘萬枝吏縁為姦民極病之故罷此㑹晉魏舒傳襆被而岀莊子天運篇仁義先王之蘧廬也止可一宿而不可乆處李義山雜纂有十三殺風景事送陳伯修察院赴闕陳伯修名師錫神宗時登第奏名帝得其文婁讀婁賞顧侍臣曰此必陳師錫也啟封果然擢為第三人故云聞君射策日妙語發疇咨知臨安縣拜監察御史以言事岀知宿遷縣元祐間東坡三上章薦之乃入為校書郎遷工部郎徽宗用為殿中侍御史坐黨論削官郴州卒裕陵固天縱筆有雲漢姿嘗重連山象不數秋風辭龍騰與虎變貍豹復何施我窮眞有數文字乃見知聞君射策日妙語發疇咨一日喧萬口驚倒同舍兒豈知二十年道路猶遲遲苦言如藥石瞑眩終見思屈信反覆手獨於君可疑四門方穆穆行矣及此時神宗皇帝葬裕陵周禮太卜掌三易之法一曰連山唐藝文志易部有連山十巻漢武帝幸河東祠后土與羣臣飲燕乃自作秋風辭揚子貍變則豹豹變則虎送張嘉父長官張嘉父名大寧山陽人登元豐八年第治春秋學政和間為司勲郎張文潛嘗作南山賦以贈之其畧曰南山巖巖兮其下有人佩玉而握珠剋意魯叟之古經不習世儒之臆書過都梁兮躊躇奉兩月之周旋其所居當是泗之南山今為盱眙也都城昔傾盖駿馬初服輈再見江湖間秋鷹已離韝於今三㑹合每進不少留豫章既可識瑚璉誰當收微官有民社妙割無雞牛歸來我益敬器博用自周百年子初筵我已廹旅酬但當寄苦語高節貫白頭説文輈車轅也考工記輈人為輈有國馬之輈有田馬之輈有駑馬之輈又張衡賦云馬倚輈而徘徊杜子羙去矣行君不見韝上鷹一飽即飛掣詩小雅賓之初筵左右秩秩又鍾鼓既設舉醻逸逸在潁州與徳麟同治西湖未成改揚州三月十六日湖成徳麟有詩見懷次其韻太山秋毫兩無窮鉅細本岀相形中大千起滅一塵裏未覺杭潁誰雌雄公自注來詩云與杭爭雄我在錢塘拓湖淥大堤士女爭昌丰六橋横絶天漢上北山始與南屏通忽驚二十五萬丈老葑席巻蒼雲空朅來潁尾弄秋色一水縈帯昭靈宫坐思吳越不可到借君月斧修朣朧二十四橋亦何有換此十頃玻瓈風雷塘水乾禾黍滿寳釵耕岀餘鸞龍明年詩客來弔古伴我霜夜號秋蟲公自注徳麟見約來揚寄居亦有意求揚倅莊子齊物論天下莫大於秋毫之末而太山為小樂府有大堤曲云朝發襄陽城暮至大堤宿大堤諸女兒花艷驚郎目詩國風子之昌兮又子之丰兮子由作先生墓誌杭州西湖南北三十里環湖往來終日不逹先生在杭乃取葑積之湖中為長堤一以通南北六橋並跨堤上又先生奏修杭州西湖状云自國初以來稍廢不治水涸草生漸成葑田熙寕中湖之葑合者蓋十二三爾至今遂塞其半已打量湖上葑田計二十五萬餘丈度用二十餘萬工先生昭靈侯廟碑南陽張公隋之初家潁上曰我龍也自唐景龍以來潁人世祠之於焦氏臺熙寧中詔封公昭靈侯元祐六年乃益治其廟月斧用鄭仁表遊嵩山事再見歐陽公自揚移潁作西湖詩云都將二十四橋月換得西湖十頃秋先生復自潁移揚此句盖用文忠語也雷塘在揚州東北十里煬帝葬處次韻徳麟西湖新成見懷絶句壺中春色飲中仙公自注謂洞庭春色也騎鶴東來獨惘然猶有趙陳同李郭不妨同泛過湖船杜子羙有飲中八仙歌後漢郭太傳遊洛陽見李膺大奇之後歸鄉里衣冠諸儒送至河上車數千兩林宗惟與膺同舟而濟衆賓望之以為神仙太字林宗再次韻徳麟新開西湖使君不用山鞠窮饑民自逃泥水中欲將百瀆起凶歲公自注予以潁人苦饑奏乞留黄河夫萬人修境内溝洫詔許之因以餘力浚治此河免使甔石愁揚雄西湖雖小亦西子縈流作態清而丰千夫餘力起三閘焦陂下與長淮通十年憔悴塵土窟清瀾一洗啼痕空王孫本自有仙骨平生宿衛明光宫一行作吏人不識正似雲月初朦朧時臨此水照氷雪莫遣白髮生秋風定湏郤致兩黄鵠新與上帝開濯龍湖成君歸侍帝側燈花已綴釵頭蟲左傳杜預注麥麴鞠窮所以禦濕欲使無社逃泥水中詳已見漢揚雄傳家無甔石之儲晏如也嵇叔夜與山巨源絶交書㳺山澤觀魚鳥心甚樂之一行作吏此事便廢後漢許揚傳成帝時翟方進奏毁鴻郤陂太守鄧晨欲修復聞揚善水脈召與議之揚曰昔成帝用方進之言尋而自夢上天天帝怒曰何故敗我濯龍淵是後民失其利黄鵠注再見韓退之燈花詩囊裏排金粟釵頭綴玉蟲更煩將喜事來報主人翁到官病勌未嘗㑹客毛正仲惠茶乃以端午小集石塔戱作一詩為謝我生亦何湏一飽萬想滅胡為設方丈養此膚寸舌爾來又衰病過午食輙噎繆為淮海帥每愧厨傳闕㸑無欲清人奉使免内熱空煩赤泥印逺致紫玉玦為君伐羔豚歌舞菰黍節禪牕麗午景蜀井岀氷雪坐客皆可人鼎器手自絜金釵候湯眼魚蟹亦應訣遂令色香味一日備三絶報君不虛受知我非輕啜漢宣帝紀吏飾㕑傳稱過使客韋昭曰㕑謂飲食傳謂傳舍莊子人間世吾食也執麤而不臧㸑無欲清之人今吾朝受命而夕飲氷我其内熱與劉禹錫試茶詩何况䝉山顧渚春白泥赤印走風塵周處風土記仲夏端午進筒糉一名角黍以菰葉褁黏米以象隂陽相包蜀井揚州石塔寺旁有蜀井相傳云泉脈與蜀相通故紙工汲其水以造麻牋杜子羙蜀道圗詩吳蜀水相通三國蜀費禕傳來敏曰君信可人必能辦賊陸羽茶經茶沸如魚眼崔珏詩石鼎水煎紅蟹眼雙石并引至揚州獲二石其一緑色岡巒迤邐有穴逹於背其一玉白可鑒漬以盆水置几案間忽憶在潁州日夢人請住一官府榜曰仇池覺而誦杜子羙詩曰萬古仇池穴潛通小有天乃戱作小詩為僚友一笑夢時良是覺時非汲井埋盆故自癡但見玉峰横太白便從鳥道絶峨睂秋風與作煙雲意曉日令涵草木姿一㸃空明何處是老人眞欲住仇池韓退之盆池詩老翁眞箇似童兒汲井埋盆作小池唐地理志鳯翔府郿縣有太白山茅君内傳三十六洞第二委羽之洞名曰大有空明之天三秦記仇池縣本名仇維山上有池故曰仇池山在倉洛二谷之間形如覆壺仇池百頃周廻九千四十歩天形四方壁立千仞自然樓櫓凡二十一道可攀援而上見後漢南蠻傳注次韻鼂無咎學士相迎無咎名補之濟州鉅野人文章温潤典縟其凌厲奇卓岀於天成與黄張秦並驅聯鑣世號元祐四學士少年獨識鼂新城閉門郤掃巻斾旌胷中自有談天口坐郤秦軍發墨守有子不為謀置錐虹霓吞吐忘寒饑端如太史牛馬走嚴徐不敢連尻脽裵回未用疑相待枉尺知君有家戒避人聊復去瀛洲伴我眞能老淮海夢中仇池千仞巖便欲攬我青霞幨且湏還家與婦計我本歸路連西南老人飲酒無人佐獨看紅藥傾白墮每到平山憶醉翁懸知他日君思我路傍小兒笑相逢齊歌萬事轉頭空頼有風流賢别駕猶堪十里巻春風鼂新城無咎之父也爲新城令晉葛洪傳閉門郤掃未嘗交逰左太冲詠史吾慕魯仲連談笑郤秦軍後漢鄭𤣥傳何休好公羊學遂著公羊墨守左氏膏肓穀梁廢疾𤣥乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎𤣥字康成荀子儒者無置錐之地莊子雜篇堯舜有天下子孫無置錐之地也東方朔傳武帝問朔曰方今公孫丞相兒大夫董仲舒司馬遷之倫先生自視何與比哉朔曰臣觀其吐吻唇連尻脽臣雖不肖尚兼此數子唐褚亮傳太宗為天策上將軍作文學舘收聘賢才以杜如晦等為學士凡分三番遞宿閣下每暇日訪以政事詩論典籍號為十八學士是時在選中者天下慕向謂之登瀛洲史記滑稽傳楚莊王欲以優孟為相優孟曰請歸與婦計之再見杜子羙仇池詩近接西南境長懐十九泉謝𤣥暉直中書省詩紅藥當堦翻蒼苔依砌上白墮注詳上巻次韻趙徳麟詩平山堂在揚州大明寺歐陽文忠公修建杜牧之詩春風十里揚州路捲上珠簾總不如三見次韻范淳父送秦少章宿縁在江海世網如予何西來庾公塵巳濯長淮波十年淮海人初見一麥禾但欣爭訟少未覺舟車多秦郎忽過我賦詩如巻阿句法本黄子公自注謂魯直也二豪與揩磨公自注謂其兄少逰與張文潛也嗟我乆離羣逝將老西河後生多名士欲薦空悲歌小范眞可人獨肯勤收羅瘦馬識騄耳枯桐得雲和近聞館李生公自注謂李廌方叔病鶴借一柯贈行苦説我妙語慰蹉跎西羌巳解仇烽火連朝那坐籌付公等吾將寄潛沱史記仲尼弟子傳孔子既没子夏居西河教授為魏文侯師周禮孤竹之管雲和之琴瑟冬日至於地上之圜丘奏之漢趙充國傳元康三年先零與諸羌種豪二百餘人解仇交質詛盟漢地理志安定郡朝那縣故戎那邑也漢髙祖紀運籌帷幄之中决勝千里之外吾不如子房尚書九江孔殷沱潛既道孔氏云沱江别名潛水名聞林夫當徙靈隱寺寓居戲作靈隱前一首唐坰字林夫事見二十九巻和唐彥猷詩送其子坰詩注靈隱前天竺後兩澗春淙一靈鷲不知水從何處來跳波赴壑如奔雷無情有意兩莫測肯向冷泉亭下相縈回我在錢塘六百日山中暫來不暖席今君欲作靈隱居葛衣草屨隨僧蔬能與冷泉作主一百日不用二十四考書中書圗經杭州靈山之隂北澗之陽即靈隱寺靈山之南南澗之陽即天竺寺二澗流水號錢源泉遶寺峰南北而下至峰前合為一澗有橋號合澗橋又冷泉亭在飛來峰下白樂天冷泉亭記東南山水餘杭郡為最就郡言靈隱為尤由寺觀冷泉亭為甲亭在山下水中央寺西南隅白樂天詩到郡六百日入山十二回唐郭子儀傳校中書令考二十四滕逹道挽辭二首滕逹道名甫字元發宣仁簾聽避髙魯王遵甫諱遂以字名而以逹道為字也元發東陽人廷試第三早受知於范文正公而孫威敏沔一見異之曰奇材也後當為賢將授以治劇守邊之畧同修起居注英宗書姓名藏禁中未及用神宗知之即位擢御史中丞翰林學士尹開封故曰先帝知公早云云未㡬與先生皆以論新法得罪而拳拳憂國之意若一故曰公方占賈鵩云云先生自黄移汝上書乞居常州即日報可遂與元發㑹於金山盖其來守吳興時也後以手帖與賈耘老云乆放江湖不見偉人昨在金山滕元發以扁舟破巨浪岀船巍然使人神聳故曰荆溪欲歸老浮玉偶同遊云云皆紀其實也先帝知公早虛懷第一人至今詩禮將惟數武宣臣材大雖難用時來亦少信高平風烈在威敏典刑新空試乘邊策寧留相漢身凄凉舊部曲淚濕塚前麟左傳僖二十七年晉作三軍謀元帥趙衰曰郤縠可亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也君其試之乃使郤縠将中軍漢公孫𢎞傳賛上方欲用文武求之如弗及漢之得人於兹為盛盖指孝武以及孝宣之世也漢高祖紀興闗中卒乘邊塞李奇曰乘守也漢王商傳河平四年單于來朝丞相商坐未央廷中單于仰視商貌大畏之天子聞而嘆曰此眞漢相矣杜子羙詩韋賢初相漢續漢書百官志将軍領軍皆有部曲杜子羙詩凄凉餘部曲又詩苑邊高塚臥麒麟雲夢連江雨樊山落木秋公方占賈鵩我正買龔牛共有江湖樂俱懷畎畝憂荆溪欲歸老浮玉偶同遊骯髒儀刑在驚呼歲月遒囘頭雜歌哭挽語不成謳譙周法訓挽歌者高帝召田横至尸鄉自殺從者不敢哭而不勝哀故為此歌以寄哀音焉次韻蘇伯固遊蜀岡送李孝博奉使嶺表新苖未没鶴老葉方翳蟬綠渠浸麻水白板燒松烟笑窺有紅頰醉卧皆華顚家家機杼鳴樹樹梨棗懸野無佩犢子府有騎鶴仙觀風嶠南使岀相山東賢渡江弔很石過嶺酌貪泉與君歩徙倚望彼修連娟願及南枝謝早隨北鴈翩歸來春酒熟共看山櫻然韓退之稲畦詩魚肥知已秀鶴没覺初深晉顧愷之傳桓𤣥嘗以一桞葉紿愷之曰此蟬所翳葉也取以自蔽人不見已庾信小園賦蟬有翳兮不驚白樂天詩畫扉扃白板漢趙充國傳賛秦漢以來山東岀相山西岀將很石在京口注巳見晉吳隱之傳廣州石門有水曰貪泉隱之為刺史至泉所酌而飲之因賦詩曰若使夷齊飲終當不易心楚詞妬修睂之連娟漢外戚李夫人傳羙連娟以修嫮沈約詩野棠開未落山櫻發欲然石塔寺并引世傳王播飯後鐘詩蓋揚州石塔寺事也相傳如此戲作此詩饑眼望東西詩腸忘早晏雖知燈是火不悟鐘非飯山僧異漂母但可供一莞胡為二十年記憶作此訕齋厨養若人無益祗遺患乃知飯後鐘闍黎盖具眼摭言王播少孤嘗客揚州惠照寺木蘭院隨僧粥食乆之僧頗厭一日播岀度未囘而先飯訖乃鳴鐘魚後播鎭江都因訪舊遊所題字皆紗罩之因留詩云云按唐書播相穆宗時權倖競進播頼其力至宰相專務將迎居位無所裨益復失河北衆望不厭故公詩有無益祗遺患闍黎盖具眼之句送鼂羙叔發運右司年兄赴闕我年二十無朋儔當時四海一子由君來扣門如有求頎然鶴骨清而修醉翁遣我從子游翁如退之蹈軻丘尚欲放子岀一頭公自注嘉祐初與子由寓興國浴室美叔忽見訪云吾從歐陽公遊乆矣公令我來與子定交謂子必名世老夫亦湏放他岀一頭地按子由志先生墓亦云酒醒夢斷四十秋病鶴不病骨愈虯惟有我顔老可羞醉翁賓客散九州㡬人白髪還相収我如懷祖拙自謀正作尚書巳過優君求㑹稽實良籌往看萬壑爭交流公自注美叔方乞越毛詩碩人其頎注頎長也白樂天詩病瘦形如鶴晉王羲之傳嘗謂賓友曰懷祖正當作尚書耳更求㑹稽便自邈然王述字懷祖王文玉挽辭才名誰似廣文寒月斧雲斤琢肺肝𤣥晏一生都卧病子雲三世不遷官幽蘭空覺香風在宿草何曾淚葉乾猶喜諸郎有曹志文章還復富波瀾晉書皇甫謐自號𤣥晏先生終身稱疾辭位孟郊贈崔純亮詩鏡破不改光蘭死不改香禮記曽子曰朋友之墓有宿草而不哭焉説者謂草經一年則陳根今翻用之以言過期而猶哭也三國魏陳思王傳小子志保家之主也按曹志蓋陳思王植之孽子亦好學有才送芝上人遊廬山二年閲三州我老不自惜團團如磨牛歩歩踏陳迹豈知世外人長與魚鳥逸老芝如雲月炯炯時一岀比年三見之常苦有所適逝將走廬阜計濶道愈密吾生如寄耳岀處誰能必江南千萬峰何處訪子室先生以元祐六年離杭召為翰林承旨是年又岀守潁州七年徙揚州故云二年閲三州送程徳林赴眞州君為縣令元豐中吏貪功利以病農君欲言之路無從移書諫臣以自通公自注諫臣蹇受之也元豐天子為改容我時匹馬江西東問之逆旅言頗同老人愛君如劉寵小兒敬君如魯㳟爾來明目逹四聰收拾駔駿冀北空君為赤令有古風政聲直入明光宫天廐如海養羣龍并収其子豈不公公自注君之子祁舉制策文學行義為時所稱白沙何必煩此翁後漢劉寵傳為㑹稽太守徵還山隂有五六老叟龎睂皓髪人齎百錢以送寵寵勞之曰父老何自苦對曰自明府下車以來狗不夜吠民不見吏年老遭値聖明今聞見棄去故自扶奉送魯㳟傳為中牟令河南尹袁安遣仁恕掾肥親往亷察政迹㳟與俱坐桑下有雉過止其旁旁有小兒親曰何不捕之兒曰雉方將雛親瞿然起曰蝗不犯境一異也化及鳥獸二異也䜿子有仁心三異也還府以状白安魏都賦冀馬塡廐而駔駿韓退之送温造序伯樂一過冀北之野而馬羣遂空白沙眞州也唐為白沙鎭谷林堂深谷下窈窕高林合扶疎美哉新堂成及此秋風初我來適過雨物至如娛予稚竹眞可人霜節巳專車老槐苦無頼風花欲塡渠山鴉爭呼號谿蟬獨清虛寄懷勞生外得句幽夢餘古今正自同歲月何必書國語禹致羣臣於㑹稽之山防風氏後至殺而戮之骨節專車杜子羙詩書時記朝夕予少年頗知種松手植數萬株皆中梁柱矣都梁山中見杜輿秀才求學其法戲贈二首露宿泥行草棘中十年春雨養髯龍如今尺五城南杜欲問東坡學種松雞跖集韋曲杜鄠近長安諺曰城南韋杜去天尺五杜子羙贈韋七詩時論同歸尺五天君方掃雪收松子我巳開榛得茯苓為問何如插楊桞明年飛絮作浮萍先生次韻章質夫楊花詞曉來雨過遺踪何在一池萍碎注云舊説楊花入水為浮萍驗之信然行宿泗間見徐州張天驥次舊韻二年三躡過淮舟款叚還逢馬少㳺無事不妨長好飲著書自要且窮愁孤松早偃原非病倦鳥雖還豈是休更欲河邊㡬來往祗今霜雪已䝉頭酉陽雜俎世傳松千歲方傾平偃蓋然有數年輙偃但於根下遇石則偃耳遯齋間覽蘇伯才云凡欲偃松裁時去松中大根惟畱四傍湏根則無不偃陶淵明歸去來辭鳥倦飛而知還次韻劉景文贈傅羲秀才幼眇文章宜和寡崢嶸肝肺亦交難未能飛瓦彈清角肻便投泥戲潑寒忽見秋風吹洛水遥知霜葉滿長安詩成送與劉夫子莫遣孫郎帳下看幼眇字岀漢書讀曰要妙屢見韓子衛靈公之晉平公觴之靈公乃召師涓坐師曠之傍援琴鼓之未終師曠曰不如清徵平公請試聽之一奏有𤣥鶴二八來集再奏而成列三奏而延頸鳴音中宫商師曠曰不如清角一奏之有雲從西北方來再奏之大風至大雨隨之裂帷幙俎豆墮廊瓦唐張説傳始武后末年為潑寒胡戲中宗嘗乘樓縱觀至是四􅊂來朝復為之説上疏曰乞寒潑胡未聞典故裸體跳足汩泥揮水盛徳何觀焉吕洞賔詞西風吹渭水落葉滿長安摭言賈島得落葉滿長安一句求作一聨杳不可得孫郎帳下用禰正平語屢見在彭城日與定國為九日黄樓之㑹今復以是日相遇於宋凡十五年憂樂岀處有不可勝言者而定國學道有得百念灰冷而顔益壯顧予衰病心形俱瘁感之作詩菊盞萸囊自古傳長房寧復是臞仙應從漢武横汾日數到劉公戲馬年對玉山人今老矣見恒河性故依然王郎九日詩千首今賦黄樓第二篇吳筠續齊諧記費長房謂桓景曰九月九日汝家當有災異急令家人縫絳囊盛茱萸繫臂上登高飲菊花酒可消此禍漢武帝秋風辭泛樓船兮濟汾河横中流兮揚素波南史宋武帝在彭城九月九日遊項羽戲馬臺再見世説山公謂嵇叔夜之為人也巖巖若孤松之獨立其醉也隗然若玉山之將頽楞嚴經佛告波斯國王言我今示汝不生滅性汝年㡬時見恒河水王言我生三歲經過此流爾時即知是恒河水佛言如汝所説日月歲時念念變遷則汝三歲見此河時王年十三其水云何王言如三嵗時宛然無異乃至於今年六十二亦無有異九日次定國韻朝􅌲無晦朔蟪蛄疑春秋南柯巳一世我眠未轉頭仙人視吾曹何異蜂蟻稠不知蠻觸氏自有兩國憂我觀去來今未始一念留奔馳竟何得而起無窮羞王郎誤渉世屢獻乆不醻黄金散行樂清詩岀窮愁俛仰四十年始知此生浮軒裳陳道路往往兒童收封侯起大第或是君家騶似聞負販人中有第一流炯然徑寸珠藏此百結裘意行無車馬倐忽畧九州邂逅獨見之天與非人謀笑我方醉夢衣冠戲沐猴力盡病騏驥伎窮老伶優北山有雲根寸田自可耰㑹當無何鄉同作逍遥遊歸來城郭是空有纍纍丘莊子逍遥遊朝菌不知晦朔蟪蛄不知春秋此小年也李太白將進酒歌天生我材必有用黄金散盡行復來烹羊宰牛且為樂㑹湏一飲三百杯世説桓大司馬問劉眞長曰聞㑹稽王語奇進爾耶對曰極進然是苐二流中人桓曰第一流是誰劉曰正在我輩逸士傳董威隱居洛陽白社以殘絮縷帛為衣號百結衣楞嚴經譬如有人於自衣中繫如意寶珠不自知覺漢伍被傳漢廷公卿列侯皆如沐猴而冠耳蓋寛饒傳長信少傅以列卿而沐猴舞又見項羽傳莊子逍遥遊何不樹之無何有之鄉廣莫之野仿偟乎無為其側丁令威歌城郭如故人民非何不學仙塜纍纍屢見召還至都門先寄子由老身倦馬河堤永踏盡黄榆綠槐影荒鷄號月未三更客夢還家時一頃歸老江湖無嵗月未塡溝壑猶朝請黄門殿中春事罷詔許來迎先岀省已飛青蓋在河梁定餉黄封兼賜茗逺來無物可相贈一味豐年説淮潁異聞實錄江南進士陳季卿客長安十年不歸一日終南山翁以竹葉置寰瀛圖上渭水中令陳注目恍然至家信宿復囘山翁尚擁褐而坐季卿謝曰豈非夢耶翁曰他日自知之經月家人來訪具述所以而留詩皆在漢汲黯傳曰臣自以為塡溝壑不復見陛下不意陛下復収之漢吳王濞傳不能朝請二十餘年注云漢律春曰朝秋曰請如古諸侯朝聘也唐百官志開元元年改門下省曰黄門按子由時為門下侍郎故事執政聼謁有服親仍先上聞得旨乃岀青蓋按國朝故事宰相執政許張青蓋次韻定國見寄還朝如夢中雙闕眩金碧復穿鴛鷺行强寄麋鹿迹勞生苦晝短展轉不能夕黙坐數更鼓流水夜自逆故人為我謀此志何由畢越吟知聽否誰念病莊舄公自注時方請越郡史記陳軫傳軫對秦恵王曰越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今仕楚執珪富貴矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉次韻蔣穎叔錢穆父從駕景靈宫二首歸來病鶴記城闉舊踏松枝雨露新半白不羞垂領髪軟紅猶戀屬車塵公自注前輩戲語有西湖風月不如東華軟紅香土雨收九陌豐登後日麗三元下降辰麤識君王為民意不才何以助精禋潘安仁秋興賦素髪颯以垂領杜子羙詩鬂毛垂領白尚書禋於六宗孔安國曰精意以享謂之禋按年譜元祐七年壬申是歳南郊先生為鹵簿使與君並直記初元白首還同入禁門玉殿齊班容小語霜廷稽首泫微温公自注適與穆父並拜廷中地皆流濕相與小語道之病貪賜茗浮銅葉老怯秋泉灧寳樽回首鵷行有人傑坐知羌鹵是遊䰟周禮大祝辨九􅼭一曰稽首銅葉言茶盞也魏文帝善哉行假氣游䰟魚鳥為伍杜子羙詩今日看天意遊䰟貸爾曹近以月石硯屏獻子功中書公復以涵星硯獻純父侍講子功有詩純父未也復以月石風林屏贈之謹和子功詩并求純父數句紫潭岀𤣥雲翳我潭中星獨有潭上月倒挂紫翠屏我老不看書黙坐養此昏花睛時時一開眼見此雲月眼自明乆知世界一泡影大小眞偽何足評笑彼三子歐梅蘇無事自作雪羽争公自注事見三人詩集故將屏硯送兩范要使珠璧栖牕櫺大范忽長謡語岀月脇令人驚小范當繼之説破星心如鷄鳴牀頭復一月下有風林横急送小范家䕶此涵星泓願從少陵博一句山木盡與洪濤傾後漢列女蔡琰傳𤣥雲合兮翳月星異聞實錄徐𤣥之夜見人物如粟粒行案上傳呼曰蚍蜉王欲觀漁於紫石潭漁具數十人入硯中皆獲小魚𤣥之大駭以册覆之照看皆無雪羽用孟子字前漢天文志日月如合璧五星如連珠月脇用皇甫湜若穿天心岀月脇語巳見孟郊聞鷄詩似開孤月口能説落星心杜子羙山水圗歌舟人漁子入浦溆山木盡亞洪濤風次韻范純父涵星硯月石風林屏詩月次於房歴三星斗牛不神箕獨靈簸揺桑榆盡西靡影落蘇子硯與屏天公與我兩厭事孰居無事為此形與君持橐侍帷幄同到温室觀堯蓂自憐太史牛馬走伎等卜祝均倡伶欲留衣冠挂神武便擊雲水歸南溟陶泓不稱管城沐醉石可助平泉醒故持二物與夫子欲使妙質留天庭但令滋液到枯槁勿遣光景生晦𡨕上書挂名豈待我獨立自可當雷霆我時醉眠風林下夜與漁火同青熒撫物懷人應獨歎作詩寄子誰當聽韓退之三星行我生之辰月宿南斗箕獨有神靈無時停簸揚三星各在天什五東南陳嗟汝牛與斗汝獨不能神劉孝標書冀東平之樹望咸陽而西靡淮南子日西垂景在桑端謂之桑榆莊子天運篇孰居無事推而行是帝王世記堯時有草當堦而生毎月朔日生一莢至月半則生十五莢自十六日後日落一莢至月而盡月小則餘一莢不落此瑞草也謂之􅕴莢司馬遷報任安書太史公牛馬走司馬遷再拜言僕之先人非有剖符丹書之功文史星厯近乎卜祝之間固主上所戲弄倡優畜之韓退之毛穎傳封諸管城號管城子陳元陶泓褚先生友善相推致岀處必偕舊唐書李徳裕傳平泉别墅有醒酒石徳裕醉則踞之又歸登傳登拜右拾遺時徳宗欲相裴延齡補闕熊執易危言忤旨草成以示登登曰願寄一名雷電之下安忍令足下獨當次韻錢穆父㑹飲按先生論新法岀為杭州通判時年三十六歴典三郡謫徙黄州年五十始再登朝二聖眷遇特異諸公懼其得政交攻之旣不自安力丐外岀守杭州凡再歲召入而子由已為右丞公以嫌又上章丐去遂守潁移揚復召入益不為留計元祐初錢穆父與公同在西掖又同去守杭越至是復同來故云與君㡬合散先生任兵部為閑曹穆父任户部為劇部故云居官不任事又主人獨賢勞云云彈冠恨不蚤挂冠常苦遲盛服毎假寐角闕時伏思東門未祖道西山空拄頤逝將江海去安此麋鹿姿要當謀三徑何暇擇一枝與君㡬合散得酒忘醇醨君談似落屑我飲如奕棊公自注世有作詩如奕棊奕棊如飲酒飲酒乃大戒之語僕於棊酒二事俱不能也居官不任事造物眞見私主人獨賢勞金穀方流馳行人亦結束杕杜乃歸期公卿雖少安河流正東釃我得㑹稽去方回良不癡左傳宣公二年晨往寢門闢矣盛服將朝坐而假寐王注角闕言帝闕之角也漢文紀未央宫東闕罘罳災師古曰罘罳謂連闕曲閣也釋名罘罳在闕門外罘復也臣將入議事至此復重思莊子逍遥遊鷦鷯巢於深林不過一枝晉史胡母輔之字彥國王澄曰彥國吐佳言如鋸木屑霏霏不絶漢溝洫志禹以為河所從來者高水湍悍難以行平地數為敗迺釃二渠以引其河注云釃分也晉郗愔傳字方回遷太常固讓不拜樂補逺郡岀為㑹稽内史乆之乞骸骨因居㑹稽施註蘇詩巻三十二
