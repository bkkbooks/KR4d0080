body:
  text: 宋孝宗御製文忠蘇軾文集賛并序成一代之文章必能立天下之大節立天下之大節非其氣足以髙天下者未之能焉孔子曰臨大節而不可奪君子人歟孟子曰我善養吾浩然之氣以直養而無害則塞乎天地之間盖存之於身謂之氣見之於事謂之節節也氣也合而言之道也以是成文剛而無餒故能參天地之化開盛衰之運不然則雕蟲篆刻童子之事耳焉足與論一代之文章哉故贈太師諡文忠蘇軾忠言讜論立朝大節一時廷臣無出其右負其豪氣志在行其所學放浪嶺海文不少衰力斡造化元氣淋漓窮理盡性貫通天人山川風雲草木華實千彚萬状可喜可愕有感於中一寓之於文雄視百代自作一家渾涵光芒至是而大成矣朕萬㡬餘暇紬繹詩書他人之文或得或失多所取舍至於軾所著讀之終日亹亹忘倦常寘左右以為矜式信可謂一代文章之宗也歟乃作賛曰維古文章言必已出綴詞緝句文之蟊賊手扶雲漢斡造化機氣髙天下乃克為之猗嗟若人冠冕百代忠言讜論不顧身害凛凛大節見於立朝放浪嶺海侣於漁樵嵗晚歸来其文益偉波瀾老成無所附麗昭晰無疑優游有餘跨唐越漢自我師模賈馬豪奇韓栁雅健前哲典刑未足多羡敬想髙風恨不同時掩巻三歎播以聲詩乾道九年閏正月望選徳殿書賜蘇嶠
