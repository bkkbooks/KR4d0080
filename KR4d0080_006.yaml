body:
  text: 物合於性之所近而事常成於力之久且勤水濕火燥鉤曲弦直各従其類而要皆性之所近以相合也物之於人不類也是故鹿駭毛嬙魚避驪姬其類殊者其性殊人之於人類巳然且邪正雜糅若白黑冰炭之相反非性使然耶予自齠齒時聞長老言蘇文忠公之為人心竊慕效之及就傅讀公傳嚮往逾摯甞圖公像縣座右而貌予侍其側稍長徧誦公集然嗜有韻之言尤深其始筮仕得黄州倅又幸與公同烏虖豈非天哉公詩故有吴興施氏元之註四十二巻元之子宿推廣為年譜而陸放翁序之宋嘉泰間鏤版行世其後罕流傳予常求之數十年莫能得及撫吴又數數購求始得此本於江南藏書家第闕者十二巻乃屬毗陵邵長蘅子湘訂補且為之芟複正譌而佐之以吴郡顧嗣立侠君洎兒子至其續補遺詩四百餘首采摭施本所未備别為二巻則以屬錢塘馮景山公為之註先是永嘉王氏有蘇詩註三十二巻行世頗久然有三失分類則陋不著書名則疎改竄舊文則妄誠如子湘所言加之俗本相沿淆譌多有茲編出而王氏舊本可束髙閣矣凡人喜磊落者薄蟲魚之注矜博雅者搜畢方鼮䑕之名二者異趣而予於蘇詩注則非是之謂盖以既慕其人則嗜其言既嗜其言則索其解解必求精精必正繆将使世之效法公者因解而得其言因言以推其心凡忠言嘉謀豐功亮節之大端胥於是乎識而祈嚮不逺矣昔賢可法莫不皆然獨公詩乎哉而予特其性之近者爾故殫精力積嵗時完殘補闕使施註㡬亡而復顯殆有天焉以玉其成而亦不自知其久且勤如此也烏虖跡公生平自嘉祐登朝歴熙寧元豐元祐紹聖三十餘年間論新法􅘅羣姦投荒錮黨㡬蹈不測而矢其孤忠百折不回讀公詩自可知其人而論其世則予又将以是註為糟醨也康熙己夘夏五商邱宋犖序
