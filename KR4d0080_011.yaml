body:
  text: 宋孝宗贈蘇文忠公太師敕朕承絶學於百聖之後探㣲言於六籍之中将興起於斯文爰緬懐於故老雖儀刑之莫覿尚簡䇿之可求掲為儒者之宗用錫帝師之寵故禮部尚書端眀殿學士贈資政殿學士諡文忠蘇軾養其氣以剛大尊所聞而髙眀博觀載籍之傳㡬海涵而地負逺追正始之作殆玉振而金聲知言自况於孟軻論事肯卑於陸贄方嘉祐全盛甞膺特起之招至熙寧紛更廼陳長治之䇿歎異人之間出驚讒口之中傷放浪嶺海而如在朝廷斟酌古今而若斡造化不可奪者嶤然之節莫之致者自然之名經綸不究於生前議論常公於身後人傳元祐之學家有眉山之書朕三復遺編久欽髙躅王佐之才可大用恨不同時君子之道闇而彰是以論世儻九原之可作庶千載以聞風惟而英爽之靈服我衮衣之命可特贈太師餘如故
