  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0080_WYG_057-1a, image: WYG1110/WYG1110-0696a.png}
body:
  text: 施注蘇詩續補遺總目卷上古體詩一百四十四首送淡公二首上韓持國送别琴枕黃州古風遊杭州山遊洞之日有亭吏乞詩既為留三絶句於洞之石壁眀日至峽州吏又至意若未足乃復以此授之和穆父新涼無題古意用定國韻贈二十姪震聞潮陽吳子野出家古離别送蘇伯固次韻魯直書伯時畫王摩詰雷州八首妒佳月追和沈遼頃贈南華詩雪林硯屏率魯直同賦申王畫馬圖奉和成伯大雨中會客解嘲和公濟飲湖上贈僧周教授索枸杞因以詩贈録呈廣倅蕭大夫次韻董夷仲茶磨送公為遊淮南謝蘇自之惠酒戲和正甫一字韻池上二首贈仲素寺丞致仕歸隱潛山魯直以詩餽雙井茶次韻為謝揚州以土物寄少遊贈曇秀再過泗上二首贈李兕彥威秀才次韻謝子髙讀淵眀傳龎公食雉雙鳧觀郭綸初發嘉州犍為王氏書樓過宜賓見夷中亂山夜泊牛口牛口見月舟中聽大人彈琴泊南牛口期任遵聖長官到晚不及見復來江上看山留題仙都觀屈原塔新灘新灘阻風昭君村黃牛廟蝦蟆培留題峽州甘泉寺寄題清溪寺荆門惠泉次韻答荆門張都官維見和惠泉詩浰陽早發夜行觀星漢水萬山隆中竹葉酒鯿魚望夫臺永安宫八陳磧諸葛鹽井頴大夫廟許州西湖江上值雪效歐陽體限不以鹽玉鶴鷺絮蝶飛舞之類為比仍不使皓白潔素等字渚宫出峽神女廟巫山觀大水望朝陽巖作滄洲亭懷古柏家渡清逺舟中寄耘老書堂嶼戲詠子舟兩竹兩鸜鵒贈山谷子鰒魚行次韻水官詩弔徐德占并序題李伯時淵眀東籬圗李白謫仙詩數日前夢一僧出二鏡求詩僧以鏡置日中其影甚異其一如芭蕉其一如蓮花夢中與作詩飲酒四首大雪獨留尉氏阮籍嘯臺留别叔通元弼坦夫和寄天選長官昭陵六馬唐文皇戰馬也琢石象之立昭陵前客有持此石夲示豫為賦之顔闔贈狄崇班季子題盧鴻學士堂圖寄周安孺茶余自城中還道中雲氣自山中來如羣馬奔突以手掇閛籠收其中歸家雲盈籠開而放之作攓雲萹遊山呈通判承議寫寄參寥師和郭功父韻送芝道人遊隱靜次韻魯直戲贈寄傲軒御史臺榆槐竹柏四首問淵眀朱亥墓嚴顔碑峴山驪山和子由除日見寄夢雪送呂行甫司門倅河陽觀子玉郎中草聖竹枝歌并序轆轤歌辨道歌陳守道老人行襄陽樂府三萹野鷹來襄陽樂上堵吟仙都山鹿白鶴吟留鍾山覺海次韻張甥棠美述志補和陶詩二首和東方有一士和劉柴桑卷下今體詩二百九十三首過巴東縣不泊聞頗有萊公遺迹白帝廟戎州和魯人孔周翰題詩二首獲鬼章二十韻光祿菴二首過木櫪觀觀開西湖次吳左丞韻荆州十首渝州寄王道祖過安樂山聞山上木葉有文如道士篆符云此山乃道陵所寓二首涪州得山胡巫山廟上下數十里有烏鳶無數取食於行舟之上舟人以神之故亦不敢害夷陵縣歐陽永叔至喜堂入峽題贈田辨之琴姬四十年前元夕與故人從遊得此句南康望湖亭半山亭宋復古畫瀟湘晚景圗三首海上道人傳以神守氣訣次周燾韻過海得子由書去嵗與子野遊逍遙堂日欲沒因並西山叩羅浮道院至已二鼓矣遂宿於西堂今嵗索居儋耳子野復來相見作詩贈之元祐五年十二月十二日同景文義伯聖途次元伯固仲蒙遊七寶寺題竹上泗州過倉中劉景文老兄戲贈一絶戲題巫山縣用杜子美韻答鼂以道索書大老寺竹間閣子欵塞來享觀臺吳江岸嘲子由無題扶風天和寺聞洮西捷報三萼牡丹已未十月十五日獄中恭聞太皇太后不豫有赦作詩題李景元畫謝人惠雲巾方舄二首謝宋漢傑惠李承晏墨被命南遷塗中寄定武同僚李委吹笛并引書黃筌畫翎毛花蝶圗二首次韻王定國得晉卿酒相留夜飲偶於龍井辨才處得歙硯甚竒作小詩秋晚客興陳伯比和回字復次韻廣陵後園題申公扇子山光寺回次芝上人韻與道源遊西莊遇齊道人同往草堂為齊書此寒食夜答子勉三首送楊奉禮别東武流杯走筆謝呂行甫惠子魚贈虔州慈雲寺鑒老留别登州舉人過嶺寄子由二首歇白塔鋪西蜀楊耆二十年前見之甚貧今見之亦貧所異於昔者蒼顔華髮耳女無美惡富者妍士無賢不肖貧者鄙使其逢時遇合豈減當世之士哉頃宿長安驛舍聞泣者甚怨問之乃昔富而今貧者乃作一詩今以贈楊君贈人觀湖二首寄髙令寄子由詩送交代仲達少卿次韻馬元賔第五橋次韻完夫再贈之什某已卜居毗陵與完夫有廬里之約云和林子中待制九日袁公濟有詩次其韻和吳安持使者迎駕鹿鳴宴次韻張甥棠美晝眠真興寺閣禱雨惠州近城數小山類蜀道春與進士許毅野步會意處飲之且醉作詩以記適參寥専使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也送蜀僧去塵曽元恕遊龍山吕穆仲不至黃河壬寅重九不預會獨遊普門寺僧閣有懷子由小飲公瑾舟中和子由次王鞏韻如囊之句可為一噱儋耳答李端叔立春日病中邀安國仍請率禹功同來僕雖不能飲當請成伯主會某當杖䇿倚几於其間觀諸公醉笑以撥滯悶也二首和參寥見寄東園奉和陳賢良秋興三首夜直祕閣呈王敏甫次韻參寥寄少遊謝曺子方惠新茶題潭州徐氏春暉亭贈仲勉子文講武臺南有感題寶雞縣斯飛閣重遊終南子由以詩見寄次韻次韻和子由欲得驪山沉泥硯次韻子由彈琴再次前韻三首和人回文五首移合浦郭功甫見寄送佛面杖與羅浮長老復官北歸再次前韻蜀僧眀操思歸龍邱子書壁武昌酌菩薩泉送王子立答海上翁占山亭二首題懷素草帖雨中明慶賞牡丹贈僧思誼子玉以詩見邀同刁丈遊金山次韻致逺次韻景文山堂聽筝三首成伯家宴造坐無由輒欲效顰而酒已盡入夜不欲煩擾戲作小詩求數酌而巳成伯席上贈所出妓川人楊姐又答氊帳往年宿瓜步夢中得小詩録示民師送范德孺陸蓮菴僕年三十九在潤州道上遇除夜作此詩又二十年在惠州録之以付過夀陽岸下戲答王都尉傳柑萬州太守髙公宿約遊岑公洞而夜雨連明戲贈二小詩遊中峰杯泉憩寂圗送栁宜歸寒具參寥惠楊梅雨夜宿淨行院送惠州監押過黎君郊居贈王覯太夫人以無咎生日置酒書壁一絶余舊在錢塘伯固開西湖今方請越戲謂固可復來開鏡湖伯固有詩因次韻邵伯梵行寺山茶奉和成伯兼戲禹功病後醉中夢中絶句元翰少卿寵惠谷簾水一器龍團二枚仍以新詩為貺歎味不巳次韻奉和藏春塢三首謝都事惠米别公擇絶句書寄韻遊靈隱寺戲贈開軒李居士常州太平寺薝蔔亭過文覺顯公房惠州靈惠院壁間畫一仰面向天醉僧云是蜀僧隱蠻所作題詩於其下遊太平寺淨土院觀牡丹中有淡黃一朵特竒為作小詩此君軒觀子美病中作嗟嘆不足因次韻謁敦詩先生因留一絶余將赴文登過廣陵而擇老移住石塔相送竹西亭下留詩為别絶句三首呈定國絶句二首破琴詩後送栁子玉至靈山次韻章子厚飛英留題贈江州景德長老雜詩二首元祐癸酉八月二十七日於建隆章淨館書贈王覯聞捷睡起秋思寄子由碣石菴戲贈湛菴主散郎亭侯灘春夜火星巖讀開元天寶遺事三首過泗上喜見張嘉父二首謝惠貓兒頭笋題淨因堂同景文詠蓮塘睡起子美召公擇飲偶以病不及往公擇有詩次韻和參寥醉題信老方丈常州太平寺觀牡丹竹枝詞寄歐叔弼題淨因院絶句和黃龍清老三首過土山寨書辨才白雲堂壁琴詩韓康公坐上侍兒求書扇驪山絶句三首靈上訪道人不遇常山贈劉鎡遊三遊洞十一月三日與幾先自竹西來訪慶老不見獨與君卿供奉蟾知客東閣道話久之惠州追録醉睡者集歸去來詩十首余歸自道場何山遇大風因憩耘老溪亭命官奴秉燭捧硯寫風竹一枝題詩云題雲龍草堂石磬和子由岐下詩并引北亭雙池橫池荷華短橋魚軒窗牡丹曲欄桃花李榴石杏樗梨槐棗松櫻桃檜栁縱筆附四言六言息壤詩并引顔樂亭詩并序新渠詩并序跋薑君弼課册數日前夢人示余一卷文字大略若諭馬者用吃蹶兩字夢中甚賞之覺而忘其餘戲作數語足之憶江南寄純如五首惠崇蘆雁何公橋詩補録施注蘇詩續補遺總目
