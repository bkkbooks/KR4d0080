body:
  text: 施注蘇詩卷三十四宋蘇軾撰施元之原注武進邵長蘅刪補詩五十七首起在禮部洎元祐八年癸酉出知定州紹聖甲戌改元就任落職知英州再貶惠州赴嶺道中作次韻錢穆父馬上寄蔣頴叔二首玉關不用一丸泥自有長城鳥鼠西剩與故人尋土物臘糟紅麴寄駝蹄後漢隗囂傳囂將王元曰請以一丸泥為大王東封函谷關唐李績傳治并州十六年以威肅聞帝嘗曰煬帝不擇人守邊勞中國築長城以備鹵今我用績守并突厥不敢南賢長城逺矣尚書西傾朱圉鳥鼠孔安國云在隴西之西雍州之南山多買黃封作洗泥使君來自隴山西髙才得兔人人羡爭欲尋蹤覓舊蹄莊子外物篇筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄表弟程德孺生日程德孺名之元事見二十四卷送德孺守楚州詩注德孺元祐七年六月自嶺外持節歸以右朝奉郎為主客郎中進金部時與先生同朝先生還自海南又與德孺會金山始决計歸毗陵仗下千官散紫庭微聞偶語說蘇程長身自昔傳甥舅壽骨遙知是弟兄公自注豫與君皆壽骨貫耳班列中多指豫二人不問而知其為中表也曽活萬人寧望報公自注君在楚州豫在杭州皆遇饑嵗活數萬人祗求五畝卻歸耕四朝遺老凋零盡鶴髮他年幾箇迎七年九月自廣陵召還復館於浴室東堂八年六月乞會稽將去汶公乞詩乃復用前韻三首乞郡三章字半斜廟堂傳笑眼昏花上人問我遲留意待賜頭綱八餅茶公自注尚書學士得賜頭綱龍茶一斤今年綱到最遲夢繞吳山卻月廊白梅盧橘覺猶香公自注杭州梵天寺有月廊數百間寺中多白楊梅盧橘會稽且作須臾意從此歸田䇿最良東南此去幾時歸倦鳥孤飛豈有期斷送一生消底物三年光景六篇詩吳子野將出家贈以扇山枕屏峨峨扇中山絶壁信天剖誰知大圓鏡衡霍入户牖得之老月師畫者一醉叟常疑若人胸自有雲夢藪千巖在掌握用捨彈指久低昂不自知恨寄兒女手短屏雖曲折髙枕謝奔走出家非今日法水洗無垢浮遊雲釋嶠宴坐柳生肘忘懷紫翠間相與到白首楞嚴經六根圓通明照無二含十方界立大圓鏡後漢馬援傳何能卧牀上在兒女子手中耶韓退之詩釋嶠孤雲縱莊子至樂篇支離叔與滑介叔觀於冥伯之邱昆崘之虛黃帝之所休俄而桞生其左肘東府雨中别子由庭下梧桐樹三年三見汝前年適汝隂見汝鳴秋雨去年秋雨時我自廣陵歸今年中山去白首歸無期客去莫歎息主人亦是客對牀定悠悠夜雨空蕭瑟起折梧桐枝贈汝千里行歸來知健否莫忘此時情漢地理志中山國高帝郡景帝三年為國九域志定州定武軍有中山城對牀夜雨按辛丑嵗東坡與子由别於鄭州詩云夜雨何時聽蕭瑟語意詳見卷一注下謝運使仲適座上送王敏仲北使王敏仲名古文正公旦曾孫衝風振河朔飛霧失太行相逢不相識下馬須眉黃洗眼忽驚笑見此玉節郎喜有賢主人共惜一作此殘燭光聚散一夢中人北鴈南翔吾生如寄耳送老天一方幸子遇眀主陳經入西廂歸期不可緩倚相宜在傍楚辭九歌衝風起兮水橫波唐地理志懷州河內縣有太行山杜子美贈衛八處士詩今夕復何夕共此燈燭光歐陽公詩白雲汾水上人北鴈南飛漢揚雄甘泉賦溶方皇於西清顔師古曰西清西廂清間之處也廂作箱王文考靈光殿賦西廂踟蹰以閒宴左傳昭十二年左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九邱書丹元子所示李太白真天人幾何同一漚謫仙非謫乃其遊麾斥八極隘九州化為兩鳥鳴相酬一鳴一止三千秋開元有道為少留縻之不可矧肯求西望太白橫峨岷眼高四海空無人大兒汾陽中令君小兒天台坐忘身平生不識髙將軍手汚吾足乃敢瞋作詩一笑君應聞莊子田子方夫至人者上窺青天下潜黃泉揮斥八極神氣不變曹子建七啓似若狹六合而隘九州韓退之雙鳥詩天公怪兩鳥各捉一處囚還當三千秋更起鳴相酬李白蜀道難歌西當太白有鳥道可以橫絶峨眉巔李白傳初逰并州見郭子儀竒之子儀嘗犯法白為救免及白坐永王璘當誅子儀請解官以贖子儀為中書令汾陽王大鵬賦序昔於江陵口見天台司馬子微謂豫有仙風道骨可與神遊八極之表子微坐忘論序敬尋經㫖與心事相應者著坐忘安心之法略成七條以為修道階次李白傳嘗侍𤣥宗飲醉使髙力士脫鞾力士素貴恥之摘其樂府以激楊妃帝欲官白妃輒沮止次韻曽仲錫承議食蜜漬生荔支曽仲錫溫陵人時為定武倅代北寒虀搗韭萍竒苞零落似晨星逄鹽久已成枯臘得蜜猶應一作疑是薄刑欲就左慈求拄杖便隨李白跨滄溟攀條與立新名字兒女稱呼恐不經公自注俗有十八娘荔支蔡君謨荔枝譜紅鹽者以鹽梅浸佛桑花為紅漿投荔支漬之曝乾色紅而甘酸蜜煎者剝生荔支笮去其漿然後蜜煎煮之漢楊王孫傳鬱為枯臘神仙傳孫討逆怒左慈使行於馬前欲自後刺之慈著木屐拄竹杖徐行討逆鞭馬逐之終不能及再見大行太皇太后髙氏挽辭二首至矣吾三后功髙漢巳還復推元祐冠蓋得永昭全公自注嘗於經筵論奏仁宗皇帝諡曰明孝若明而不仁則民畏而不愛仁而不明則民愛而不畏今大行太皇太后亦兼此二德故天下思慕庶幾於仁宗也有作猶非聖無私乃是天侍臣談要道家法信家傳公自注宰相以下嘗於經筵論奏祖宗以來家法十餘事書於記注三后真宗后章憲明肅劉氏仁宗后慈聖光憲曹氏英宗后宣仁聖烈髙氏皆嘗垂簾聼政郤狄安諸夏先王社稷臣固應祠百世何止活千人定䇿天知我忘家帝念親萬方何以報得疾為勤民社稷臣謂楚王髙瓊景德契丹之役羣臣皆欲避狄獨萊公寇凖不可武臣中惟瓊與萊公意同公既爭之力上曰卿文臣豈獨盡用兵之利害公曰請召髙瓊既至乃言避狄為便公大驚以瓊為悔也既而徐言避狄固為安全但恐扈駕之士中路逃亡無與俱西南者耳上大驚始决北征之䇿宣仁后瓊曽孫也後漢和熹鄧皇后紀叔父陔言活千人者子孫有封兄訓為謁者使修石臼河嵗活千人天道可信家必䝉福后訓女也漢霍光傳定萬世䇿以安社稷言太皇太后定立元祐天子之䇿再和曽仲錫荔支栁花著水萬浮萍荔實周天兩嵗星公自注桞至易成飛絮落水中經宿即為浮萍荔支難長至二十四五年乃實本自玉肌非鵠浴至今丹殼似猩刑侍郎賦詠窮三峽妃子煙塵動四溟莫遣詩人說功過且隨香草附騷經莊子天運篇鵠不日浴而白烏不日黔而黑華陽國志永昌郡有猩猩其血可染朱罽唐白樂天為忠州刺史有題郡中荔支詩重寄荔支與楊使君詩種荔支詩荔支樓對酒詩樂天入為刑部侍郎九域志忠州𨽻䕫州路三峽山在䕫州唐書楊貴妃嗜生荔支乃置騎傳送味未變巳至京師杜牧過華清宫詩一騎紅塵妃子笑無人知是荔支來楚辭離騷經序離騷之文依詩取興引類譬諭故善鳥香草以配忠貞惡禽臭物以比讒佞次韻滕大夫三首滕大夫名興公海陵人時為定武倅雪浪石太行西來萬馬屯勢與岱嶽爭雄尊飛狐上黨天下脊半掩落日先黃昏削成山東二百郡氣壓代北三家村千峰石卷矗牙帳崩崖鑿斷開土門朅來城下作飛石一炮驚落天驕魂承平百年烽燧冷此物僵臥枯榆根畫師爭摹雪浪勢天工不見雷斧痕離堆四面繞江水坐無蜀士誰與論老翁兒戲作飛雨把酒坐看珠跳盆此身自幻孰非夢故國山水聊心存唐文粹鄭亞㑹昌一品集序云上黨居天下之脊當河朔之喉史記張儀傳席卷常山之嶮必折天下之脊山經太華之山削成而四方王注古所謂山東乃今之河北晉地是也杜牧云山東王不得不王霸不得不霸指今之河北謂之山東蓋太行山之東也山東二百郡正謂太行以東冀州之域矣杜子美河北入朝絶句澶漫山東一百州削成如桉抱青丘國史補雷州多雷秋冬伏地中人取得雷斧雷墨可以為藥用漢溝洫志蜀守李氷鑿離堆避沫水之害穿三江成都中韓退之盆池詩老翁真個似童兒汲井埋盆作小池白樂天三遊洞序水石相薄磷磷鑿鑿跳珠濺玉驚動耳目同前我頃三章乞越州欲尋萬壑看交流且憑造物開山骨已見天吳出浪頭公自注石中似有海獸形狀履道鑿池雖可致玉川卷地若為收洛陽泉石今誰主莫學癡人李與牛山海經天吳水神也八首十尾唐白居易傳東都所居履道里疏沼種樹構石樓香山鑿八節灘盧同詩我縱有神力爭敢將公歸揚州惡百姓疑我卷地皮賈氏談録贊皇公平泉莊周回四十里天下竒花異草珍松怪石靡不畢致今悉以絶矣怪石名品甚衆各為洛陽大族有力者取去李衛公平泉花木記及詩序云後世以一花一石移於它處者非李氏子孫德裕初封贊皇伯後封衛國公唐牛僧孺傳治第洛之歸仁里多致嘉石美木白樂天石記云公嗜石以甲乙丙丁為品第沉香石壁立孤峰倚硯長共疑沉水得頑蒼欲隨楚客紉蘭佩誰信吳兒是木腸山下曽逢化松石玉中還有辟邪香早知百和俱灰燼未信人言弱勝剛唐本草注沉水香出天竺單于二國樹葉似橘經冬不凋本似櫸栁重實黑色沉水者是吳兒木腸用賈充吳兒木人石心語出晉書夏統傳已見録異記婺州永康山有枯松因斷墮水化為石枝幹及皮與松無異笠澤叢書東陽多名山金華永康之地中饒古松往往化而為石杜陽雜編自漢至唐公主下降乘七寶步輦四面綴五色玉香囊囊中貯辟邪瑞麟香皆異國所獻也唐肅宗以香玉辟邪賜李輔國其香可聞數里老子柔之勝剛弱之勝彊石芝并引豫嘗夢食石芝作詩記之今乃真得石芝於海上子由和前詩見寄豫頃在京師有鑿井得如小兒手以獻者臂指皆具膚理若生豫聞之隱者此肉芝也與子由烹而食之追記其事復次前韻土中一掌嬰兒新爪指良是肌骨勻見之怖走誰敢食天錫我爾不及賓旌陽逺遊同一許長史玉斧皆門户我家韋布三百年祗有隂功不知數跪陳八簋加六瑚化人視之真塊蘇肉芝烹熟石芝老笑唾熊掌嚬雕胡老蠺作繭何時脫夢想至人空激烈古來大藥不可求真契當如磁石鐵神仙感遇記蘭陵蕭靜之買地葺居掘得一物類人手肥且潤其色微紅烹而食之逾月齒髮再生偶遊鄴都見一道士指其胍曰子之所食者肉芝也神仙傳亦云周易包有魚義不及賔也洪州十二真君傳許遜字敬之弱冠拜旌陽令晉太康二年八月一日拔宅上升東晉尚書郎邁護軍長史穆皆族子也真誥許邁清虛懷道遐棲世外改名逺遊弟諡一名穆外雖泯俗務而內修真學穆生三男小男名翽字道翔小字玉斧禮記殷之六瑚周之八簋鄭氏云皆黍稷器毛詩於粲灑掃陳饋八簋化人塊蘇出列子詳見二十九卷與葉淳老詩注抱朴子芝有石芝木芝草芝肉芝菌芝名有百許種西京雜記菰之有米者長安謂之雕胡傳燈録志公善惡不二頌云聲聞執法坐禪如蠺吐絲自縳吕氏春秋慈石召鐵或引之也大涅槃經譬如磁石去鐵雖逺以其力故鐵則隨著衆生佛性亦復如是華嚴經如好磁石少分之力則能吸壞諸鐵鉤鎖鶴歎園中有鶴馴可呼我欲呼之立坐隅鶴有難色側睨豫豈欲臆對如鵩乎我生如寄良畸孤三尺長脛閣瘦軀俯啄少許便有餘何至以身為子娛驅之上堂立斯須投以餅餌視若無戞然長鳴乃下趨難進易退我不如漢賈誼服賦服乃太息舉首奮翼口不能言請對以臆禮記儒有難進而易退者粥粥若無能也送曽仲錫通判如京師邉城嵗暮多風雪强壓春醪與君别玉帳夜談霜月苦鐵騎曉出氷河裂斷蓬飛葉卷黃沙祗有千林䰒鬆花應為王孫朝上國珠幢玉節與排衙左援公孝右孟博我居其閒嘯且諾僕夫為我催歸來要與北海春水爭先回唐藝文志有玉帳經年號記又咸通十一年以龎勛盜徐州停貢舉盧尚卿賦詩曰自從玉帳論兵後不許金門諫獵來李華弔古戰場文月色苦兮霜白曽子固云齊地寒甚夜氣如霧凝於木上旦起視之如雪日出飄滿庭階齊人謂之霜松䰒鬆花疑即此白樂天懷微之詩今日排衙得免無後漢范滂字孟博岑晊字公孝嘯諾注屢見和錢穆父送别并求頓遞酒聫鑣接武兩長身鵷鷺行中語笑親九子羡君門戶壯八州憐我往來頻佇聞東府開賔閣便乞西湖洗塞塵更向青齊覓消息要知從事是何人九子穆父之子九人東坡嘗戲之為九子母丈夫又東坡嘗歷密徐湖登杭穎揚及今定武凡八郡守劉醜廝詩劉生望都民病羸寄空窰有子曰醜廝十二行操瓢墦閒得餘粒雪中拾墮樵饑飽共生死水火同焚漂病翁恃一褐度此積雪宵哀哉二暴客掣去如饑梟翁既死於寒客亦易此齠﨑嶇走亭長不憚雪徑遙我仇祝與苑物色同遮邀行路為出涕二客竟就梟譊譊訴我庭慷慨驚吾寮曰此可名寄追配郴之蕘恨我非栁子擊節為爾謡官賜二萬錢無家可歸嬌為媾他日婦婉然初垂髫洗沐作小史裹頭束其腰筆硯耕學苑弓一作戈矛戰天驕壯大隨爾好忠孝福可徼相國有折脅封侯或吹簫人事豈易料勿輕此僬僥唐地理志定州望都縣莊子盜跖篇操瓢而乞者皆離名輕死不念本養夀命者也周易重門擊柝以待暴客栁子厚童區寄傳童寄者郴州蕘牧兒年十一嵗二豪賊劫持反接布囊其口去虛所賣之寄僞兒啼恐栗為兒恆狀賊易之對飲酒一人去市一人卧植刃道上童以繩背刃力下上得絶因取刃殺之逃未及逺市者還將殺童童遽曰為兩郎僮孰若為一郎僮邪市者善之持童愈束縛牢甚夜半童以縳即爐火燒絶之復取刃殺市者因大號一虛皆驚吏白州州白大府刺史顔證竒之留為小史不肯與之衣裳護還之鄉史記范雎傳魏齊笞擊雎折脅摺齒雎佯死得出後遂相秦漢周勃傳常以吹簫給喪事後從髙祖封絳侯列子湯問篇從中州以東四十萬里得僬僥國人長一尺五寸題毛女真霧鬢風鬟木葉衣山川良是昔人非祗應間過商顔老獨自吹簫月下歸異聞集洞庭靈姻傳栁毅見龍女風鬟霧鬢商顔老商山四皓也寄餾合刷瓶與子由此詩真迹臨川口掞嘗刻於婺倅聼事公自題其尾云元祐八年十二月二十五日醉睡中作老人心事日摧頽宿火通紅手自焙小甑短瓶良具足稚兒嬌女共燔煨寄君東閣間蒸栗知我空堂坐畫灰約束家僮好收拾故山梨棗待翁來次韻子由清汶老龍珠丹天公不解防癡龍玉函寶方出龍宫雷霆下索無處避逃入先生衣袂中先生不作金椎袖玩世徜徉隱屠酒夜光明月空自投一煆何勞緯蕭手黃門寡好心易足荆棘不生梨棗熟𤣥珠白璧兩無求無脛金丹來入腹區區分别笑樂天䢷知空門不是仙劉慶忌幽明録洛下一洞穴深不可測有人墮穴中良久方蘇旁得一穴入見郛郭臺榭悉以金瑰為飾人皆長三丈因告哀求去長人引令過九處最後所至苦饑餒指中庭柏樹下一羊令跪捋羊鬚初得一珠長人取之次捋一珠亦取之後得一珠令噉甚得療饑因問九處名答曰還問張華可知其人復隨穴而出至交州七八年間方歸終南詣華問之華曰是崑崙下地仙九館羊名為癡龍初一珠食之與天地等夀第二珠食之可以延年第三珠充饑而巳酉陽雜爼孫思邈常隱居終南山時大旱西域僧請於昆明池結壇祈雨凡七日縮水數尺池龍化為老人至思邈石室請救孫謂曰我知昆明池有仙方三十首留傳與豫豫將救汝老人曰此方上帝不許妄傳今急矣固無所吝有頃捧方至孫曰爾第還無慮自是池水忽漲數日溢岸胡僧羞恚而死韓退之詩仙官敕六丁雷電下取將僧史僧聞禪師住邵武山中一日有老人謁聞曰我龍也以疲墮行雨不職上天有罰當死賴道力可脫俄失所在聞視坐榻傍有小蛇尺許延緣入袖中屈蟠暮夜風雷挾坐榻電激雨射山嶽為搖而聞危坐不顧達旦晴霽垂袖蛇墮地而去史記魏信陵君傳侯生謂公子曰臣所過屠者朱亥此子賢者世莫能知故隱屠閒耳又公子矯魏王令代晉鄙晉鄙疑之朱亥袖四十斤鐵椎椎殺晉鄙公子遂將晉鄙軍莊子列禦寇河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取石來煆之唐百官志門下侍郎龍朔二年改黃門侍郎按子由時為門下侍郎靈樞經扁鵲注曰化靈為姹女之胞十月分胎狀如紫金上赤下黑左青右白其中央黃號曰紫金丹白樂天詩吾學空門不學仙恐君此語是虛傳海山不是吾歸處歸則須歸兜率天互見七卷竹閣詩注次韻子由書清汶老所傳秦湘二女圖韓退之詩秦地吹簫女湘波鼓瑟妃春風消氷失瑶玉我本無身安有觸羊生得婦如得風握手一笑未為辱先生室中無天遊佩環何處鳴風甌隨魔未必皆魔女但與分燈遣歸去胡為寫真傳世人更要維摩一轉語丹元茅茨祗三間太極老人時往還㸃檢凡心早除拂方平神鞭常使物真誥楊君自記論云紫微王夫人見降與一神女俱來曰此九華真妃也真妃曰聞君德音甚久不期今日得叙因緣歡願於冥運之㑹依然有絲羅之纒矣夫人既去真妃小留而言曰冥情未攄意氣未忘明日當復來乃取某手執之而自下牀未出戶之間忽然不見陶隱居注蕚緑華詩云此是降羊權乃云楊君所書者當以其姓同音耳趙飛燕外傳帝於太液池作千人之舟后歌歸風送逺之曲帝以文犀簪擊玉甌倚后歌互見十一卷登常山絶頂詩注分燈用維摩經無盡燈事詳見前卷裴硎傳竒元和中元徹桞實􅋈舟合浦岸漂入大海抵孤島見玉虛尊師與南誥夫人㑹二子拜謁求返尊師曰子歸不難子宿分自有師夫人命侍女送二子馭百花橋而歸二子問吾師是誰云是南嶽太極先生既逹昔維舟處回視無橋矣二子後共尋雲水偶雪中見老叟負樵擔上有刻太極字遂禮為師隨詣祝融不復出云方平鞭屢見史記封禪書李少君能使物郤老紫團參寄王定國谽谺土門口突兀太行頂豈惟團紫雲實自俯倒景剛風被草木真氣入苕穎舊聞人銜芝生此羊腸嶺纎㩥虎豹鬛蹙縮龍蛇癭蠶頭試小嚼龜息變方騁矧豫明真子已造浮玉境清宵月挂戶半夜珠落井灰心寧復然汗喘久已靜東坡猶故目北藥致遺秉欲持三丫根往侑九轉鼎為豫置齒頰豈不賢酒茗本草補注人參潞州太行山所出謂之紫團參文選注倒景氣去地四千里其景皆倒在下再見抱朴子鴟鳶展翅不動去地四千里風力猛壯所以可驗有剛風世界陸士衡文賦或苕發穎豎離衆絶致本草人參一名人銜漢地理志上黨壺關縣有羊腸阪定命録袁天綱與李嶠同寢嶠息自耳中起曰是龜息也龜息貴夀而不富王注珠落井以言燕納也黃庭外景經抱珠懷玉和子室注云珠玉謂津液室謂身令人煉津液以和一身也圖經本草相傳欲試人參者當使二人同走一與人參含之一不與度走三五里許其不含人參者必大喘含者氣息自如毛詩彼有遺秉本草髙麗人作人參贊曰三丫五葉背陽向隂欲來求我椵樹相尋神仙傳仙方有九品其七名九轉霜雪之丹次韻劉燾撫勾蜜漬荔支劉燾字無言長興人時新滿座聞名字别久何人記色香葉似楊梅蒸霧雨花如盧橘傲風霜每憐蓴萊下鹽豉肯與葡萄壓酒漿回首驚塵卷飛雪詩情真合與君嘗舊唐書白居易在南賔郡為荔支圖寄朝中親友各記其狀曰荔支若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣北夢瑣言薛能以文章自負纍出戎鎮嘗鬱鬱歎惜因有詩謝淮南寄荼云粗官乞與真拋郤賴有詩情合得嘗立春日小集戲一作呈李端叔李端叔名之儀其先景城人後居當塗舉進士力學善屬文為東坡所知元祐八年九月坡出帥中山辟掌機宜文字是時時事將變端叔䇿知其然相與反覆論議先生是之曰自是相從之日益難得期與子游戲於文詞翰墨以寓其樂蜀人孫敏行子發亦辟在幕府而滕興公曾仲錫為倅五人相得甚歡明年五月先生遂謫嶺南端叔後歷樞密院編修官通判原州元符中監內香藥庫御史論為東坡客不可任京官詔停廢徽宗初提舉河東常平范忠宣公將薨以意授端叔作遺表未幾蔡京當國謂忠宣之子正平與端叔矯撰皆逮入御史府由是得罪貶廢終朝請大夫有姑溪前後集七十卷孫子發仕止奉直大夫白髮巳十載青春無一堪不驚新嵗換聊與故人談牛健民聲喜鴉嬌雪意酣霏微不到地和暖要宜蠶嵗月斜川似風流曲水慙行吟老燕代坐睡夢江潭丞掾頗哀援去聲歌呼誰怕參衰懷久灰槁習氣尚饞貪白啖本河朔紅消真劍南辛盤得青韭臘酒是黃柑歸卧燈殘帳醒聞葉打菴須煩李居士重說後三三陶淵明有遊斜川詩序再見酈道元水經注宋元嘉十一年以舊樂遊苑地為曲水武帝引流傳觴㑹者賦詩王注白啖荔枝名紅消梨名一本作熊白來河北豬紅削劍南按荔枝不應言河朔别本熊白為是延一廣清凉傳無著禪師遊五臺山問一僧云此處衆有幾何答曰前三三後三三又詳本卷贈清凉寺和長老詩注顧禧云此詩方敘燕遊而遽用後三三語讀者往往不知所謂蓋端叔在定武幕中特悅營妓董九者故用九數以為戲爾聞其說於強行父云次韻曽仲錫元日見寄蕭索東風兩鬢華年年幡勝翦宫花愁聞塞曲吹蘆管喜見春盤得蓼芽吾國舊供雲澤米公自注定武齊酒用蘇州米君家新致雪坑茶公自注近得曽坑茶燕南異事真堪紀三寸黃甘擘永嘉杜子美即事詩一雙白魚不受釣三寸黃甘猶自青按溫州永嘉郡嵗貢黃甘子由生日以檀香觀音像及新合印香銀篆槃為壽一首旃檀婆律海外芬西山老臍柏所薰香螺脫黶來相羣能結縹眇風中雲一燈如螢起微焚何時度盡繆篆紋繚繞無窮合復分綿綿浮空散氤氳東坡持是壽卯君君少與我師皇墳旁資老聃釋迦文共厄中年㸃蠅蛟晚遇斯須何足云君方論道承華勛我亦旗鼓嚴中軍國恩未報敢不勤但願不為世所醺爾來白髮不可耘問君何時返鄉枌收拾散亡理放紛此心實與香俱焄聞思大士應巳聞南史西南蠻傳狼牙修國在南海中多棧沈婆律等香酉陽雜爼一木五香根旃檀節沉香花雞舌葉藿膠薰陸又龍脛香出婆利國有婆律樹髙八九文瘦者出龍脛香肥者出婆律香唐本草麝生益州形似麞常食柏葉水麝臍其香尤美又甲香海螺之掩也可聚香使不散雜衆香燒之使益芳獨燒則臭香譜蠡頭生雲南者取黶燒灰合香多用謂能發香復來香煙晋衛恆傳繆篆所以摹印也香譜香篆鏤木為篆文範以香塵卯君子由以巳卯生故云韓退之贈張祕書詩方今向太平元凱承華勛漢韓信傳建大將旗鼓按公自言帥定州也楞嚴經觀世音菩薩由聞思修入三摩地次韻李端叔送保倅翟安常赴闕兼寄子由中山保塞兩窮邊卧治雍容已百年顧我迂愚分竹使與君談笑用蒲鞭松荒三徑思元亮草合平池憶惠連白髮歸心憑說與古來誰似兩疏賢南史謝惠連傳族兄靈運嘗詩思竟日不就忽夢見惠連即得池塘生春草大以為工中山松醪寄雄守王引進鬱鬱蒼髯千嵗姿肯來杯酒作兒嬉流芳不待龜巢葉公自注唐人以荷葉為酒杯謂之碧筒酒掃白聊煩鶴踏枝醉裏便成欹雪舞醒時與作嘯風辭馬軍走送非無意玉帳人間合有詩杜子美謝中丞乳酒詩鳴鞭走送憐漁父洗盞開嘗對馬軍次韻李端叔謝送牛戩鴛鴦竹石圖聞君談西戎廢食忘早晚王師本不陳賊壘何足剗守邊在得士此語要而簡知君論將口似豫識畫眼笑指塵壁閒此是老牛戩平生師衛玠非意嘗理遣訴君定何人未用市朝顯置之勿復道世俗固多舛歸去亦何須單車度殽澠如蟲得羽化已脫安用繭家書空萬軸涼曝困舒卷念當掃長物閉息默自暖此畫聊付君幽處得小展新詩勿縱筆羣吠驚邑犬時來未可知妙斫待輪扁榖粱傳善師者不陳善陳者不戰劉道醇聖宋名畫評道士牛戩字受禧河內人善畫花竹翎毛尤長破毛之禽洎寒雉野鵲每飲酒肆閒或飲一斗然後畫片紙以質之至醒必購之遂毁畫而去桞子厚答韋中立書屈子賦曰邑犬羣吠吠所怪也僕往聞庸蜀之南常雨少日日出則犬吠僕來南二年冬幸大雪數州之犬皆蒼黃吠噬今韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎莊子天道篇輪扁斫輪於堂下得之於手應之於心次韻聰上人見寄總事見本卷三絶句呈聞復詩注前身本同社宿業獨臨邊一悟鏡空老始知圓澤賢歸心忘犢佩生術寄羊鞭不似歐陽子空留六一泉異聞實録元和初齊君房逰錢塘有胡僧探囊出一棗大如拳曰食之者知過去未來事君房啖之頃刻乃悟前生講法華于同德寺是夕君房至靈隱寺剪髮具戒法名鏡空纂異記亦云圓澤與李源事屢見先生六一泉銘序歐陽文忠公將老自謂六一居士豫昔通守錢塘見公於汝隂而南公曰西湖僧惠勤甚文而長於詩豫到官三日見勤於孤山之下抵掌而論人物曰公天人也此邦之人以公不一來為恨公麾斥八極何所不至雖江山之勝莫適為主而竒麗秀絶之氣常為能文者用故吾謂西湖蓋公几案閒一物耳明年公薨豫哭於勤舍又十八年余為杭州則勤亦化去訪其舊居則弟子二仲在焉畫公與勤之像事之如生舍下舊無泉子未至數月泉出講堂之後孤山之趾乃取勤舊語推本其意名之曰六一泉互見四卷臘日遊孤山詩注次韻王雄州還朝留别老李威名八十年壁閒精悍見遺顔自聞出守風流似稍覺承平氣象還但遣詩人歌杕杜不妨侍女唱陽關內朝接武知何日白髮羞歸供奉班王注老李指言李允則也先生作詩在元祐八年逆數八十年則真宗時也景德二年正月真宗以契丹初和易置守將召樞宰議可適用者首選公知雄州御筆置名於紙公在雄凡十四年事見李復圭所作李氏家傳三月二十日多葉杏盛開零露泫月蘂溫風散晴葩春一作天工了不睡連夜開此花芳心誰翦刻天質自清華惱客香有無弄糚影橫斜中山古戰國殺氣浮髙牙叢臺餘袨服易水雄悲笳自從此花開玉肌洗塵沙坐令遊俠窟化作溫柔家我老念江海不飲空咨嗟明年花開時舉酒望三巴公自注欲請梓州而歸漢鄒陽傳全趙之時武力鼎士袨服叢臺之下者一旦成市而不能止幽王之湛患顔師古曰叢臺趙王之臺也在邯鄲史記刺客傳燕太子丹送荆軻易水之上髙漸離擊筑荆軻和而歌曰風蕭蕭兮易水寒壯士一去兮不復還皆垂涕而泣三巴記閬水東南流曲折三曲如巴字華陽國志武王克商封其子宗姫於巴至漢益州牧劉璋以墊口以上為巴郡以固陵為巴東永寧為巴西是為三巴三月二十日開園三首雪髯霜鬢語傖獰淡蕩園林取次行要識將軍不凡意從來祗啜小人羮公自注是日散父老酒食左傳隱元年頴考叔曰小人有母皆嘗小人之食矣未嘗君之羮西園牡籥夜沈沈尚有游人卧栁隂鶴睡覺時風露下落花飛絮滿衣襟漢五行志章城門牡自亡師古曰牡所以下閉者也亦以鐵為之鬱鬱蒼髯真道友絲絲紅萼是鄉人公自注蒼髯松也紅萼海棠也何時翠竹江村路送我柴門月色新杜子美南鄰詩白沙翠竹江村暮相送柴門月色新次韻王雄州送侍其涇州威聲又數中去聲興年二鹵行當一矢聨聞道名城得真將故應驚羽落空弦追鋒歸去雄三衛授鉞重來定十連别酒回頭便陳迹號呶端合發初筵杜子美喜逹行在所詩今朝漢社稷重數中興年漢周亞夫傳文帝曰此真將軍矣晉宣帝紀魏帝詔帝乘追鋒車晝夜兼行四百餘里一宿而至晉職官志文帝初置中衛將軍武帝分左右衛唐李密傳以䕃為左親衛大都督宇文述曰君進素貴當以才學顯何事三衛閒哉淮南子凡命將主親授鉞曰從此上至天將軍制之禮記十國為連連有帥詩大雅賔之初筵溫溫其恭賔既醉止載號載呶臨城道中作并引豫初赴中山連日風埃未嘗了了見太行也今將適嶺表頗以是為恨過臨城內邱天氣忽清徹西望太行草木可數岡巒北走崖谷秀傑忽悟歎曰吾南遷其速返乎退之衡山之祥也書以付邁使志之逐客何人著眼看太行千里送征鞍未應愚谷能留桞可獨衡山解識韓韓退之謁衡嶽廟詩我來正逢秋雨節隂氣晦昧無清風潜心默禱若有應豈非正直能感通須臾靜掃衆峰出仰見突兀撐青空過湯隂市得豌豆大麥粥示三兒子朔野方赤地河壖但黃塵秋霖暗豆莢一作漆夏旱臞麥人逆旅唱晨粥行庖得時珍青斑照匕箸脆響鳴牙齦玉食謝故吏風餐便逐臣漂零竟何適浩蕩寄此身爭勸加餐食實無負吏民何當萬里客歸及三年新漢朝錯傳居太上廟堧中注云堧者內垣之外遊地也本草小麥人作麵第三磨者良為近麩也蓋麥之心曰人樂府古辭上有加餐食下有長相憶左傳成十年曰不食新矣杜預注言不得食新麥也子由新修汝州龍興寺吳畫壁韻語陽秋汝州龍興寺吳道子畫兩壁一壁作離摩示疾文殊來問天女散花一壁作太子遊四門釋迦降魔筆法竒絶子由曽施百縑丹青久衰工不藝人物尤難到今世每摹市井作公卿畫手懸知是徒𨽻吳生已與不傳死那復典刑留近嵗人間幾處變西方盡一作畫作波濤翻海勢細觀手面分轉側妙算毫釐得天契始知真放本精微不比狂花生客慧似聞遺墨留汝海古壁蝸涎可垂涕力捐金帛扶棟宇錯落浮雲卷新霽使君坐嘯清夢餘幾疊衣紋數襟袂他年弔古知有人姓名聊記東坡弟莊子天道篇古之人與其不可傳者死矣汝州為陸海軍過髙郵寄孫君孚孫君孚名叔髙郵人哲宗立為監察御史朝廷更法度逐姦邪君孚多所建明擢中書舍人直學士院以集賢院學士知應天府紹聖初削職守房歸二州貶汀州卒過淮風氣清一洗塵埃容水木漸幽茂菰蒲雜游龍可憐夜合花青枝散紅茸美人遊不歸一笑當誰供故園在何處已偃手種松我行忽失路歸夢千山重聞君有負郭二頃收橫從卷野畢秋穫殷牀聞夜舂樂哉何所憂社酒粥面醲宦游豈不好毋令到千鍾詩國風隰有游龍注云游龍紅草也史記蘇秦傳使我有雒陽負郭田二頃吾豈能佩六國相印乎詩國風橫從其畞杜子美詩梵放時出寺鍾殘仍殷牀僕所至未嘗出遊過長蘆聞復禪師病甚不可不一問既見則有閒矣明日阻風復留見之作三絶句呈聞復并請轉呈於參寥子各賦數首聞復名思聰先生嘗有敘送其歸孤山曰錢塘僧思聰七嵗善彈琴十二捨琴而學書書既工十五捨書而學詩詩有竒語老師宿儒皆敬愛之秦少遊取楞嚴文殊語字之曰聞復亦知壺子不死敢問老聃所遊瑟瑟寒松露骨耽耽病虎垂頭莊子應帝王鄭有神巫曰季咸列子與之見壺子出而謂曰子之先生死矣弗活矣明日又與之見出而謂曰子之先生遇我也有瘳矣全然有生矣寓言篇陽子居南之沛老聃西遊於秦又孔子見老聃老聃方新沐曰吾游於物之初莫言西蜀萬里且到南華一游扶病江邉送客杖拿浦口回頭南華寺在韶州乃曹溪道埸莊子漁父篇漁父杖拿逆立而夫子曲要罄折再拜而應老去此生一訣興來明日重遊卧聞三老白事半夜南風打頭古詩話川峽呼梢工篙手為三老故杜子美詩云長年三老應憐汝史記滑稽傳東郭先生拜謁曰願白事六月七日泊金陵阻風得鍾山泉公書寄詩為謝今日江頭天色惡炮車雲起風欲作獨望鍾山喚寶公林閒白塔如孤鶴寶公骨冷喚不聞郤有老泉來喚人電眸虎齒霹靂舌為豫吹散千峰雲南行萬里亦何事一酌曹溪知水味他年若畫蔣山圖仍一作為作泉公喚居士國史補暴風之候有炮車雲南史隱逸傳釋寶志於宋太始中出入鍾山往來都邑預言未兆識他心智一日中分身易所逺近驚赴晉王戎傳眼爛爛如巖下電再見穆天子傳西王母如人虎齒善嘯韓退之遣瘧鬼詩詛師毒口牙舌作霹靂飛徐爰釋門略建康北十餘里舊名金山漢末秣陵尉蔣子文討賊戰亡靈發於山因立蔣侯祠故世號曰蔣山搜神幽明録志怪書亦云贈清涼寺和長老代北初辭沒馬塵江南來見卧雲人問禪不契前三語施佛空留丈六身老去山林徒夢想雨餘鐘鼓更清新㑹須一洗黃茅瘴未用深藏白㲲巾廣清凉傳大歷中釋無著至五臺山見一寺有童子出延無著問一僧此處衆有幾何答曰前三三後三三無著無對僧曰既不解速須引去童子送出門又問解否答曰不解童子曰金剛背後看師回首寺即隱無著愴然有偈云言下不知開佛印回頭只見舊山巖後漢西域傳明帝夢金人長大頂有光明以聞羣臣或曰西方有神名曰佛其形長丈六尺而黃金色房千里投荒記南方六七月芒茅黃枯時瘴大發土人呼為黃茅瘴豫前後守倅餘杭凡五年夏秋之間蒸熱不可過獨中和堂東南頰下瞰海門洞視萬里三伏常蕭然也紹聖元年六月舟行赴嶺外熱甚忽憶此處而作是詩忠孝王家千柱宫東坡作吏五年中中和堂上東南頰獨有人間萬里風吳越王錢俶以太平興國三年舉族歸朝卒諡曰忠懿事具國史王注頰字內地常語宫室之房曰頰猶人之頤頰也杜子美夏夜歎安得萬里風飄飄吹我裳慈湖夾阻風五首捍索桅竿立嘯空篙師酣寢浪花中故應菅蒯知心腹弱纜能爭萬里風此生歸路愈茫然無數青山水拍天猶有小船來賣餅喜聞虛落在山前說文虛大邱也古者九夫為井四井為邑四邑為邱邱謂之虛或從土廣雅落居也我行都是退之詩真有人家水半扉千頃桑麻在船底空餘石髮挂魚衣韓退之宿曽江口詩雲昏水奔流天水漭相圍三江滅無口其誰識涯圻暮宿投民村髙處水半扉爾雅釋草藫石衣注水苔也一名石髮日輪亭午汗珠融誰識南訛長飬功暴雨過雲聊一快未妨明月郤當空尚書平秩南訛孔安國曰訛化也掌夏之官平序南方化育之事卧看落月橫千丈起喚清風得半帆且竝水村欹側過人間何處不巉巖過廬山下并引豫過廬山下雲物騰湧默有禱焉未午衆峰凛然故作是詩亂雲欲霾山勢與飄風南羣隮相應和勇往爭驂驔可憐薈蔚中時出紫翠嵐鴈沒失東嶺龍騰見西龕一時供坐笑百態變立談暴雨破坱圠清颷掃渾酣廓然歸何處陋矣安足戡亭亭紫霄峰窈窈白石菴五老數松雪雙溪落天潭雖云默禱應顧有移文慙詩國風薈兮蔚兮南山朝隮漢賈誼傳大鈞播物坱圠無垠注坱塵也圠山曲也廬山記山南簡寂觀白雲峰其間一峰獨出而秀卓名曰紫霄峰又山南楞伽院舊名下白石證道院舊名上白石又栖賢寺東北有五老峰廬山之勝此為最焉默禱韓退之事移文孔稚圭事並已見施注蘇詩卷三十四
