body:
  text: 施注蘇詩卷二十宋蘇軾撰施元之原注武進邵長蘅刪補詩四十九首起在黃州盡元豐七年甲子量移汝州作次韻孔毅父集古人句見贈五首孔毅父名平仲家世見第十卷父長源挽詞注羡君戲集他人詩指呼市人如使兒天邊鴻鵠不易得便令作對隨家雞退之驚笑子美泣問君久假何時歸世間好句世人共明月自滿千家墀市人用史記淮隂傳驅市人而戰之意紫駝之峰人莫識雜以雞豚真可惜今君坐致五侯鯖盡是猩脣與熊白路旁拾得半段槍何必開爐鑄矛戟用之如何在我耳入手當令君喪魄西京雜記五侯不相能賓客不得來往婁謢豐辨傅會五侯間各得其歡心競致竒膳乃合以為鯖世稱五侯鯖以為竒味焉裴啓語林亦云五侯王氏婁謢漢書作樓護吕氏春秋伊尹説湯曰肉之美者猩猩之脣髦象之約張協七命封熊之掌翰音之跖燕髀猩唇髦殘象白按熊白即如謂象白也唐哥舒翰傳遇吐蕃苦拔海翰持半段搶迎擊所向披靡天下幾人學杜甫誰得其皮與其骨劃如太華當我前跛牂欲上驚崷崒名章俊語紛交衡無人巧會當時情前生子美只君是信手拈得俱天成書斷羊欣云胡昭草行得張芝骨索靖得其肉韋誕得其筋史記李斯傳太山之高百仞而跛牂牧其上李太白上裴長史書名章俊語絡繹間起傳燈録洛普和尚頌云入荒田不揀信手拈來草觸目未嘗無臨機何不道詩人雕刻間草木搜抉肝腎神應哭不如默誦千萬首左抽右取談笑足夜吟石鼎聲悲秋可憐好事劉與侯何當一醉百不問我欲眠矣君歸休揚子或問雕刻衆形者匪天歟韓退之贈崔立之詩勸君韜養待招徴不用雕琢愁肝腎古詩話賀知章見李白烏栖曲曰此詩可泣鬼神矣詩國風左旋右抽中軍作好韓退之石鼎聯句序道士軒轅彌明夜抵劉師服居宿指爐中石鼎謂侯喜曰子能為詩能與我賦此乎劉與侯皆巳賦十餘韻彌明應之如響膏明蘭臭俱自焚象牙翠羽戕其身多言自古為數窮微中有時堪解紛癡人但數羊羔兒不知何者是左慈千章萬句卒非我急走捉君應巳遲漢兩龔傳薰以香自燒膏以明自銷周易同心之言其臭如蘭左傳襄二十四年象有齒以焚其身賄也異物志翠鳥形似燕翡赤而翠青人取其羽以為飾吳筠玄猿賦小則翡翠殞于毛羽大則犀象殘於齒革老子多言數窮不如守中史記滑稽傳談言微中亦可以解紛後漢左慈傳曹操欲殺之走入羊羣操知不可得乃令就羊中告之曰不復相殺本試君術耳忽一老羝人立而言曰遽如許即競往赴之而羣羊數百皆變為羝並屈前膝人立云遽如許遂莫知所取焉六年正月二十日復出東門仍用前韻亂山環合水侵門身在淮南盡處村五畝漸成終老計九重新掃舊巢痕豈惟見慣沙鷗熟已覺來多釣石溫長與東風約今日暗香先返玉梅魂舊巢痕按陸遊作施氏注東坡詩序解舊巢字甚詳云昔祖宗以三館養士儲將相才及官制行罷三館而東坡蓋嘗直史館然自謫為散官削去史館之職久矣至于史館亦廢故云新掃舊巢痕其用事之嚴如此愚意詩句必作如是解毋乃太固後人穿鑿之病所以不免也食甘一雙羅帕未分珍林下先嘗愧逐臣露葉霜枝剪寒碧金槃玉指破芳辛清泉䔩䔩先流齒香霧霏霏欲噀人坐客殷勤為收子千奴一掬奈吾貧唐蕭嵩傳荆州進黃甘帝以紫帉包賜之又柳氏舊聞云以素羅包其二賜嵩薛逢謝西川相公賜甘子詩滿合新甘破鼻香相公恩重賜先嘗千奴用李衡千頭木奴事詳見上卷東坡詩注大寒步至東坡贈巢三巢三名谷字元修眉山人嘗舉進士京師東坡責黃州谷走江淮因與之逰及二蘇用於朝谷未嘗一見逮謫嶺海慨然自眉山徒步訪之至梅州遺文定書曰我萬里步行見公不自意全今至梅矣文定驚喜曰此非今世人古之人也既見相泣時谷年七十三將復見文忠於海南文定止之不可至新會蠻𨽻竊其橐裝獲於新州谷從之病死于新春雨如暗塵春風吹倒人東坡數間屋巢子誰與鄰空牀斂敗絮破竈鬱生薪相對不言寒哀哉知我貧我有一瓢一作尊酒獨飲良不仁未能赬我頰聊復濡子唇故人千鐘祿馭吏醉吐茵那知我與子坐作寒螀呻努力莫怨天我爾皆天民行看花柳動共享無邊春南史陶潛傳敗絮自擁何慙兒子杜荀鶴詩旋斫生柴帶葉燒吐茵用漢丙吉事注再見元修菜并引菜之美者有吾鄉之巢故人巢元修嗜之余亦嗜之元修云使孔北海見當復云吾家菜耶因謂之元修菜余去鄉十有五年思而不可得元修適自蜀來見余於黃乃作是詩使歸致其子而種之東坡之下云世説楊修九嵗甚聰慧孔君平詣其父父不在兒為設果孔指楊梅以戲兒曰此是君家果應聲答曰未聞孔雀是君家禽彼美君家菜鋪田緑茸茸豆莢圓且小槐牙細而豐種之秋雨餘擢秀繁霜中欲花而未萼一一如青蟲是時青裙女採擷何匆匆蒸之復湘之香色蔚其饛點酒下鹽豉縷橙芼薑蔥那知雞與豚但恐放箸空春盡苗葉老耕翻煙雨叢潤隨甘澤化暖作青泥融始終不我負力與糞壤同我老忘家舍楚音變兒童此物獨嫵媚終年繫余胸君歸致其子囊盛勿函封張騫移苜蓿適用如葵菘馬援載薏苡羅生等蒿蓬懸知東坡下塉鹵化千鍾長使齊安民指此説兩翁詩小雅有饛簋飱有救棘匕晉陸機傳千里蓴羮未下鹽豉再見韓退之詩芼以椒與橙杜子美薑少府設膾歌放箸未覺金盤空王右軍來禽青李帖子皆囊盛為佳函封多不生再見漢張騫傳大宛國馬耆苜蓿騫始為武帝言之其後漢使來歸種之離宫館旁極望焉薏苡注巳見二月三日點燈會客江上東風浪接天苦寒無賴破春姸試開雲夢羔兒酒快瀉錢塘藥玉船蠶市光隂非故國馬行燈火記當年冷煙濕雪梅花在留得新春作上元王注羔兒酒即今之羊羔酒藥玉船蓋以藥煮石而似玉者可作酒杯先生又有獨酌試藥玉船詩成都有蠶市注見首卷馬行在汴京舊城之東北隅蓋鬻馬之區百賈所會也上已日與二三子攜酒出遊隨所見輒作數句明日集之為詩故詞無倫次先生志林記此日出遊云黃州定慧院東小山上有海棠一株特繁茂每嵗盛開時必為置酒已五醉其下矣今年復與參寥及二三子訪焉則園已易主主雖市井人然以余故稍加培治山上多老枳木花白而圓香色皆不凡以余故亦得不伐既飲復憩于尚氏之第尚所居竹林花木皆可喜醉臥閣上稍醒聞坐客崔成者彈雷琴作悲風曉角錚錚然意謂非人間也晚乃步出城東入何氏韓氏竹園遂置酒竹隂下興盡乃徑歸元豐七年三月初二日也薄雲霏霏不成雨杖藜曉入千花塢柯丘海棠吾有詩獨笑深林誰敢侮三杯卯酒人徑醉一枕春睡日亭午竹間老人不讀書留我閉門誰教汝出簷聚枳十圍大寫真素壁千蛟舞東坡作塘今幾尺攜酒一勞農工苦郤尋流水出東門壞垣古塹花無主臥開桃李為誰姸對立鵁鶄相媚嫵開樽藉草勸行路不惜春衫汙泥土褰裳共過春草亭扣門卻入韓家圃轆轤繩斷井深碧鞦韆索挂人何所映簾空復小桃枝乞漿不見譍門女南山古臺臨斷岸雪陳翻空迷仰俯故人餽我玉葉羮火冷煙消誰為煮﨑嶇束緼下荒徑婭姹隔花聞好語更隨落景盡餘樽卻旁孤城得僧宇主人勸我洗足眠倒牀不復聞鐘鼓明朝門外泥一尺始悟三更雨如許平生所向無一遂兹遊何事天不阻固知我友不終窮豈弟君子神所豫黃州東坡圖柯山四望直南高丘故亦名柯丘東南隅海棠一株甚茂又柯丘南尚氏家有叢枳甚大公嘗自為圖之晉書王徽之傳吳中一士大夫家有好竹欲觀之便出坐輿造竹下諷嘯良久主人灑掃請坐徽之不顧將出主人乃閉門徽之便以此賞之盡歡而去又互見前晉阮修傳意有所思率爾褰裳不避晨夕小桃用本事詩所載崔護事巳見傳竒裴航經藍橋驛因渴乞漿于茅舍老嫗嫗曰雲英擎一甌漿來郎君要飲俄於葦箔下出雙玉手捧瓷甌飲之互見十四卷次韻舒教授詩注漢蒯通傳束縕請火於亡肉家歐陽永叔莫登樓詩婭姹扶欄車兩頭髧髦垂鬟嬌未羞詩大雅豈弟君子神所勞矣韓退之薦士詩微詩公勿誚豈弟神所勞日日出東門日日出東門步尋東城遊城門抱關卒笑我此何求我亦無所求駕言寫我憂意適忽忘返路窮乃歸休懸知百嵗後父老説故侯古來賢達人此路誰不由百年寓華屋千載歸山丘何事羊公子不肯過西州詩國風駕言出遊以寫我憂史記蕭何世家召平者故秦東陵侯晉羊曇謝安甥也安薨後行不由西州路詳見七卷遊東西巖詩注南堂五首齊安拾遺夏澳口之側本水驛有亭曰臨臯郡人以驛之高陂上築南堂為先生遊息江上西山半隱堤此邦臺館一時西南堂獨有西南向臥看千帆落淺溪暮年眼力嗟猶在多病顛毛郤未華故作明窗書小字更開幽室養丹砂他時夜雨困移牀坐厭愁聲點客腸一聽南堂新瓦響似聞東塢小荷香山家為割千房蜜稚子新畦五畞蔬更有南堂堪著客不憂門外故人車杜子美秋野詩風落收松子天寒割蜜房孟東野新居詩獨治五畞蔬掃地燒香閉閣眠簟紋如二作似水帳如煙客來夢覺知何處挂起西窗浪接天李商隱詩水紋簟滑鋪牙牀李太白詩碧紗如煙隔窗語尉遲偓中朝故事路巖籍沒有蚊㡡一頂輕密如煙人疑其蛟綃也次韻子由種杉竹吏散庭空雀噪簷閉門獨宿夜厭厭似聞梨棗同時種應與杉篁刻日添糟麴有神熏不醉雪霜誇健巧相沾先生坐待清隂滿空使人人歎滯淹詩小雅厭厭夜飲注安也孔毅父妻挽辭結褵記初歡同穴期晚嵗擇夫得溫嶠生子勝王濟高風相賓友古義仍兄弟從君吏隱中窮達初不計云何抱沈疾俯仰便一世幽隂淒房櫳芳澤在巾袂百年縱得滿此路行亦逝那將有限身長㵼無益涕君文照今古不比山石脆當觀千字誄寧用百金瘞毛詩東山四章樂男女之得及時也云親結其褵九十其儀毛傳曰褵婦人之褘褘香䙬也又大車刺周大夫禮義陵遲男女淫奔云榖則異室死則同穴世説溫嶠從姑有一女屬嶠覔壻嶠報姑已得之門地壻身盡不減嶠因下玉鏡臺一枚既交禮女以手披紗扇撫掌大笑曰我固疑是老奴晉列女傳王渾妻鍾琰生子濟詳見八卷賀陳述古弟章生子詩注左傳僖公三十二年臼季使過冀見冀缺耨其妻饁之敬相待如賔後漢龎公傳夫妻相與敬如賓客古樂府焦仲卿妻詩結髮同枕席黃泉共為友毛詩女曰雞鳴陳古義以刺今不説德而好色也又宴爾新昏如兄如弟漢班倢妤賦房櫳虛兮風泠泠楚詞大招粉白黛黑施芳澤鄭玄周禮注誄謂積纍生時德行漢朱建傳母死辟陽侯奉百金裞注裞贈終者之衣被次韻孔毅父久旱已而甚雨三首先生為楊道士書一帖云僕謫居黃岡綿竹武都山道士楊世昌子京自廬山來過余乃去其人善畫山水能鼓琴曉星歷骨色及作軌革卦影通知黃白藥術可謂藝矣明日當舍余去為之悵然浮圖不三宿木下真有以也元豐六年五月八日東坡居士書又一帖云十月十五日夜與楊道士泛舟赤壁飲醉夜半有一鶴自江南來翅如車輪嘎然長鳴掠余舟而西不知其為何祥也聊復記云按次毅父韻第三首載西州楊道士凡數聯因此帖知為世昌詩中又言善吹洞簫其自廬山從公蓋壬戌之夏前赤壁賦云客有吹洞簫者殆是楊也先生先嘗為賦蜜酒歌後赤壁賦云適有孤鶴橫江東來觀此帖蓋非寓言夢一道士者豈即世昌姑托以夢耶先生道大才高不容於時憂患半生如陳季常巢元修張中吳子野輩獨相從流離困厄之中其姓名遂不沒于千載今世昌藉此復有傳于後世夫豈偶然二帖書在蜀箋筆畫甚精宿嘗以入石云飢人忽夢飯甑溢夢中一飽百憂失只知夢飽本來空未悟真飢定何物我生無田食破硯爾來硯枯磨不出去年太嵗空在酉傍舍壺漿不容乞今年旱勢復如此嵗晚何以黔吾突青天蕩蕩呼不聞况欲稽首號泥佛甕中蜥蜴尤可笑跂跂脈脈何等秩隂陽有時雨有數民是天民天自恤我雖窮苦不如人要亦自是民之一形容雖是喪家狗未肯弭耳爭投骨倒冠落幘謝朋友獨與蚊雷共圭蓽故人嗔我不開門君視我門誰肯屈可憐明月如潑水夜半清光翻我室風從南來非雨候且為疲人洗蒸鬱褰裳一和快哉謡未暇飢寒念明日白樂天詩渴人多夢飲飢人多夢食唐杜牧傳夢書皎皎白駒字俄而飯甑裂牧曰不祥也乃自為墓志馬總意林袁雅正書太嵗在酉乞漿得酒太嵗在已販妻鬻子則知災祥有自然之理史通略及朝野僉載並云後漢和熹鄧皇后紀嘗夢捫天蕩蕩正青張奂傳凡人之情寃則呼天窮則扣心今呼天不聞扣心無益誠自傷痛蜥蜴詳見十二卷蠍虎詩注史記孔子世家鄭人謂孔子纍纍若喪家之狗再見戰國䇿應侯謂秦王曰王見大王之狗臥者臥起者起行者行止者止毋相與鬬者投之一骨輕起相牙何則有爭意也漢中山靖王傳衆詬漂山聚蚊成雷左傳襄十年王叔之宰曰蓽門圭竇之人杜預注蓽門柴門圭竇小户穿壁為户上鋭下方狀如圭也快哉用宋玉風賦語注已見去年東坡拾瓦礫自種黃桑三百尺今年刈草蓋雪堂日炙風吹靣如墨平生懶惰今始悔老大勤農天所直沛然例賜三尺雨造化無心恍難測四方上下同一雲甘霔不為龍所隔公自注俗有分龍日蓬蒿下濕迎曉來燈火新涼催夜織老夫作罷得甘寢臥聽牆東人響屐奔流未已坑谷平折葦枯荷恣漂溺腐儒粗糲支百年力耕不受衆目憐破陂漏水不耐旱人力未至求天全會當作塘徑千步橫斷西北遮山泉四鄰相率助舉杵人人知我囊無錢明年共看決渠雨飢飽在我寧關天誰能伴我田間飲醉倒惟有支頭甎詩小雅上天同雲杜子美詩四海八荒同一雲又詩百年粗糲腐儒餐班孟堅西都賦決渠降雨荷鍤成雲漢李廣傳嘗夜從一騎出從人田間飲韓退之詩暫拳一手支頭臥天公號令不再出十日愁霖併為一君家有田水冒田我家無田憂入室不如西州楊道士萬里隨身惟兩膝沿流不惡泝亦佳一葉扁舟任飄突山芎麥麴都不用泥行露宿終無疾夜來飢腸如轉雷旅愁非酒不可開楊生自言識音律洞簫入手清且哀不須更待秋井塌見人白骨方銜杯揚子法言鼓舞萬物者其雷風乎鼓舞萬民者其號令乎雷不一風不再後漢蔡雍傳風者天之號令也山芎麥麴用左傳申叔展語詳見上卷和王鞏詩注後漢趙一傳柴車草屛露宿其傍庾信愁賦細酌榴花一兩杯蕩彼愁門終不開杜子美醉歌忽憶雨時秋井塌古人白骨生青苔如何不飲令心哀初秋寄子由百川日夜逝物我相隨去惟有宿昔心依然守故處憶在懷逺驛閉門秋暑中藜羮對書史揮汗與子同西風忽淒厲落葉穿户牖子起尋夾衣感嘆執我手朱顔不可恃此語君莫疑别離恐不免功名定難期當時巳悽斷况此兩衰老失塗既難追學道恨不蚤買田秋巳議築室春當成雪堂風雨夜已作對牀聲懷逺驛在汴京麗景門按東坡嘉祐六年與子由同奉制䇿寓懷遠驛笠澤叢書陸龜蒙復友生論文書云讀古聖人書每涵泳義味獨坐日昃案上一杯藜羮如五鼎太牢饋於左右和黃魯直食筍飽食有殘肉飢食無餘菜紛然生喜怒似被狙公賣爾來誰獨覺凛凛白下宰公自注太和古白下也時魯直知吉州太和縣一飯在家僧至樂甘不壞多生味蠧簡食筍乃餘債蕭然映樽俎未肯雜松芥君看霜雪姿童稚巳耿介胡為遭暴橫三嗅不忍嘬朝來忽解籜勢迫風雷噫尚可餉三閭飯筒纒五采莊子齊物論狙公賦茅曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆恱名實未虧而喜怒為用亦因是也再見穆天子傳暴蠧書于羽陵注云暴書中蠧蟲韓退之雜詩豈殊蠧書魚生死文字間續齊諧記屈原以五月五日投汨羅而死楚人哀之是日以竹筒貯米祭之建武元年長沙人見人自稱三閭大夫曰常苦蛟龍所竊願以五色絲纒之則蛟龍所畏也聞子由為郡僚所捃恐當去官少學不為身宿志固有在雖然敢自必用舍置度外天初若相我發迹造𢎞大豈敢負所付捐軀欲投會寧知事大繆舉步得狼狽我已無可言墮甑難追悔子雖僅自免雞肋安足賴低回畏罪罟黽勉敢言退若人疑或使為子得微罪時哉歸去來共抱東坡耒柳子厚冉溪詩少時陳力希公侯許國不復為身謀後漢隗囂傳帝曰且當置此兩子于度外詩大雅而式𢎞大莊子廣而造大也孔叢子吾於狼狽見聖人之志酉陽雜俎狽亦狼之類前足絶短每行必駕兩狼失狼則不能行故世言事乖者謂之狼狽後漢張步傳負負無可言者墮甑後漢孟敏事注巳見後漢楊修傳曹操欲討劉偹而不得進欲守之又難為功於是出教曰雞肋外曹莫能曉修曰雞肋食之則無所得棄之則如可惜公歸計決矣乃令外曰稍嚴操於是回師晉劉伶嘗因醉忤客客奮前欲毆之伶徐曰雞肋不足以安尊拳其人笑而止詩小雅豈不懷歸畏此罪罟又黽勉從事不敢告勞次韻王鞏南遷初歸二首問君謫南賓野葛食幾尺逢人瘴髮黃入市胡眼碧三年不易過坐睨倚天壁歸來貌如故妙語仍破鏑那能廢詩酒亦未妨禪寂願為尚書郎還賜上方舄博物志魏太祖習啖野葛至一尺北夢瑣言嶺南黃茅瘴患者髮落白樂天詩大江寒見底巨山青倚天江家舊池臺修竹圍一尺歸來萬事非惟見秦淮碧平生痛飲處遺墨鴉栖壁西來故父客金印雜鳴鏑三槐老更茂花絮春寂寂中微未可料家廟藏赤舄劉禹鍚江總宅詩池臺竹樹五畞餘至今人道江家宅又詩青松鬱成塢修竹盈尺圍山謙之丹陽記始皇鑿金陵斷方山為瀆令淮水貫城中入大江謂之秦淮江總歸金陵詩歸來惟見秦淮碧漢吳王濞傳周亞夫問故父絳侯客史記張耳傳外黃女亡其夫去抵父客漢百官表相國丞相金印紫綬晉周顗傳殺諸賊奴取金印如斗大繫肘鳴鏑字出漢胸奴傳注巳見曹子建樂府攬弓捷鳴鏑周禮三槐三公位焉按東坡三槐堂記云故兵部侍郎晉國王公嘗手植三槐於庭曰吾子孫必有為三公者已而其子魏國文正公相真宗其子懿敏公事仁宗鞏文正孫也唐禮樂志諸臣之享其親廟室服器之數視其品詩大雅王鍚韓侯玄衮赤舄孔毅父以詩戒飲酒問買田且乞墨竹次其韻酒中真復有何好孟生雖賢未聞道醉時萬慮一掃空醒後紛紛如宿草十年揩洗見真妄石女無兒焦榖稿此身何異貯酒瓶滿輒豫人空自倒武昌痛飲豈吾意性不違人遭客惱君家長松十畞隂借我一菴聊洗心我田方寸耕不盡何用百頃糜千金枕書熟睡呼不起好學憐君工雜擬且將墨竹換新詩潤色何須待東里孟生孟嘉也注屢見韓退之詩數杯澆腸雖暫醉皎皎萬慮醒還新維摩經文殊師利問維摩詰言菩薩云何觀於衆生維摩詰言如焦穀牙如石女兒嵇康幽憤詩性不傷物頻致怨憎列子方寸之地虛矣監戒録王梵夫詩云但存方寸地留與子孫耕任師中挽辭任師中名伋巳見前注師中為新息令民愛之買田而居後通判黃州知瀘州沒于遂州其在齊安常逰於定惠院既去郡人名其亭曰任公東坡遷齊安人知其與師中善也復為師中菴曰師中必來訪豫將館於是潁濱為作記大任剛烈世無有疾惡如風朱伯厚小任溫毅老更文聰明慈愛小馮君兩任才行不須説疇昔並友吾先人相看半作晨星沒可憐太白與殘月大任先去冢未乾小任相繼呼不還強寄一樽生死别樽中有淚酒應酸貴賤賢愚同盡耳君家不盡緣賢子人間得喪了無憑只有天公終可倚後漢朱震字伯厚詳見十七卷林子中以詩寄文與可注大小馮君見十二卷和孔密州詩注揚子法言日昃不飲酒酒必酸白樂天詩賢愚貴賤同歸盡北邙冢墓高嵳峩子由作二頌頌石臺長老問公手寫蓮經字如黑蟻且誦萬遍脅不至席二十餘年豫亦作二首眼前擾擾黑蚍蜉口角霏霏白唾珠要識吾師無礙處試將燒郤看瞋無後漢趙一傳咳唾自成珠莊子秋水篇子不見夫唾者乎噴則大者如珠小者如霧眼睛心地兩虛圓脅不沾牀二十年誰信吾師非不睡睡蛇巳死得安眠傳燈録第十祖初侍伏馱尊者未嘗睡眠謂其脅不至席號脅尊者遺教經煩惱毒蛇睡在汝心譬如黑蚖在汝室睡當以持戒之鉤早併除之睡蛇既出乃可安眠鄧忠臣母周挽辭鄧忠臣字眘思湘州湘隂人微生真草木無處謝天力慈顔如春風不見桃李實古今抱此恨有志俯仰失公子豈先知戰戰常惜日吾君日月照委曲到肝鬲哀哉人子心吾何愛一邑家庭拜前後粲然發笑色豈比黃壤下焚瘞千金璧若人道德人視此亦戲劇聊償曽閔意遽與仙佛寂孤纍臥江渚永望墳墓隔作詩相楚挽感動淚再滴尚書洛誥王命周公後作册逸誥孔氏傳云伯禽封命之書皆同在蒸祭之日周公拜前魯公拜後公羊傳封魯公以為周公也周公拜乎前魯公拜乎後漢王莽傳子父俱延拜而受之注謂周公拜前魯公拜後出尚書大傳揚雄反騷欽弔楚之湘纍注不以罪死曰纍按孤纍公自謂也譙周法訓曰挽歌者高帝召田橫至尸鄉自殺從者悲歌以寄其情後續之為薤露蒿里以送喪至李延年分為二等薤露送王公貴人蒿里送士大夫庶人使挽者歌之因呼為挽歌謝希逸宋貴妃誄鏘楚挽於槐風注楚者酸楚也杜子美詩臨岐别數子握手淚再滴徐君猷挽辭君猷名大受終於黃州事見十九卷戲君猷不飲酒詩注一舸南遊遂不歸清江赤壁照人悲請看行路無從涕盡是當年不忍欺雪後獨來栽柳處竹間行復採茶時山成散盡樽前客舊恨新愁只自知荆州記蒲圻縣沿江一百里南岸名赤壁周瑜黃蓋乘大艦大破魏武於烏林赤壁東西一百六十里禮記孔子之衛遇舊館人之喪而入哭之遇一哀而出涕子貢曰無乃已重乎子曰豫惡夫涕之無從也史記滑稽傳子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺李後主秋夕詩往愁新恨有誰知和蔡景繁海州石室蔡景繁名承禧事見二十二卷蔡景繁官舍小閣詩注東坡在黃有答景繁帖云朐山臨海石室信如所諭前某嘗攜家一遊時有胡琴婢就室中作濩索涼州凛然有冰車鐵馬之聲婢去久矣因公復起一念若果遊此必有新篇當破戒奉和也又云海上竒觀恨不與公同遊大篇或可追賦景繁往遊既賦詩坡為屬和前所述皆指石曼卿後車胡琴云云皆帖中語意又前年開閣云云即所謂婢去久矣因公復起一念用此帖為證而詩乃粲然因公復起一念實用陳鴻長恨傳楊妃語也芙蓉仙人舊遊處公自注石曼卿也蒼藤翠壁初無路戲將桃核裹黃泥石間散擲如風雨坐令空山作錦繡倚天照海花無數花間石室可容車流蘇寶蓋窺靈宇何年霹靂起神物玉棺飛出王喬墓當時醉臥動千日至今石縫餘糟醑山人一去五十年花老室空誰作主手植數松今偃蓋蒼髯白甲低瓊户我來取酒酬先生後車仍載胡琴女一聲冰鐵散巖谷海為瀾翻松為舞爾來心賞復何人持節中郎醉無伍獨臨斷岸呼出日紅波碧巘相吞吐徑尋我語覔餘聲拄杖彭鏗叩銅鼓長篇小字逺相寄一唱三歎神悽楚江風海雨入牙頰似聽石室胡琴語我今老病不出門海山巖洞知何許門外桃花自開落牀頭酒甕生塵土前年開閣放柳枝今年洗心參佛祖夢中舊事時一笑坐覺俯仰成今古願君不用刻此詩東海桑田真旦暮歐陽公詩話石曼卿卒後故人有見之者云恍惚如夢中言我今為仙也所主芙蓉城又石曼卿通判海州以山嶺髙峻人路不通了無花卉點綴映照使人以泥裹桃核為彈拋擲於山嶺之上一二嵗間花發滿山爛如錦繡張平子東京賦樹翠宇之高蓋飛流蘇之騷殺庾信賦翡翠珠被流蘇羽帳後漢王喬傳為葉令天下玉棺於堂前吏人推排終不搖動喬曰天帝獨召我耶乃沐浴寢其中蓋便立覆宿昔葬於城東土自成墳博物志昔人有玄石者從中山酒家飲與之千日酒而忘語其節歸數日尚醉家人以為死遂葬之酒家計其日往告之發冢乃醒玉䇿記千嵗松樹四邉披起上杪不長望而視之有如偃蓋楚詞惜誓章載玉女於後車白樂天五弦彈歌鐵擊珊瑚一兩曲冰瀉玉盤千萬聲後漢蔡雍為左中郎將蔡景繁時漕淮南故云持節中郎馬援傳得駱越銅鼓韓退之詩杖撞玉板聲彭觥開閣用王敦事詳見十七卷李公擇過高郵詩注白樂天不能忘情吟序樂天既老又病風乃録家事會經費去長物妓有樊素者年二十餘綽綽有歌舞態善唱楊枝人多以曲名名之由是名聞洛下將放之馬有駱者駔壯駿穩乘之亦有年將鬻之圉人牽馬出門馬驤首反顧一鳴似知去而旋戀者素慘然立且拜婉孌有詞詞畢泣下豫愍然不能對且命回勒反袂飲素酒自飲一杯快吟數十聲因自哂題其篇曰不能忘情吟駱馬注巳見神仙傳麻姑謂王方平曰自接侍以來見東海三為桑田向到蓬萊水乃淺於往昔會時略半也豈將復為陵陸乎方平笑曰聖人言海中行復揚塵也再見和秦太虛梅花西湖處士骨應稿只有此詩君壓倒東坡先生心巳灰為愛君詩被花惱多情立馬待黃昏殘雪消遲月出蚤江頭千樹春欲暗竹外一枝斜更好孤山山下醉眠處點綴裙腰紛不掃萬里春隨逐客來十年花送佳人老去年花開我已病今年對花還草草不知風雨卷春歸收拾餘香還畀昊歐陽公歸田録處士林逋居於杭州西湖之孤山善為詩如梅花詩疏影橫斜水清淺暗香浮動月黃昏評詩者謂前世詠梅花者多矣未有此句也自逋之卒湖山寂寥未有繼者托言寶歷中楊嗣復宴諸生于新昌里第元白亦預皆賦詩于席惟楊汝士後成而最佳元白歎伏汝士醉歸語子弟曰我今日壓倒元白杜子美絶句江上被花惱不徹無處告訴只顛狂白樂天杭州春望詩誰開湖寺西南路草緑裙腰一道斜注云孤山在湖洲中草緑時望如裙腰詩小雅勞人草草又投畀有昊再和潛師化工未議蘇羣稿先向寒梅一傾倒江南無雪春瘴生為散冰花除熱惱風清月落無人見洗糚自趁霜鐘蚤惟有飛來雙白鷺玉羽瓊枝鬬清好吳山道人心似水眼淨塵空無可掃故將妙語寄多情橫機欲試東坡老東坡習氣除未盡時復長篇書小草且撼長條餐落英忍飢未擬窮呼昊山海經豐山上有九耳鐘霜降則鳴柳子厚龍城録隋開皇中趙師雄遷羅浮一日憩於林間見一女淡糚出迎相與叩酒家門而飲頃之醉寢師雄亦懵然久之東方巳白起視乃在大梅樹下上有翠羽啾㗩須臾月落參橫但惆悵而巳蜀注云宋武帝宫人早朝聞景陽樓鐘聲即起糚洗出南史及南齊書李賀詩今朝畫眉早不待景陽鐘漢書鄭崇傳臣門如市臣心如水列子是殆見吾衡氣機也衡通橫華嚴經除一切煩惱習氣爾雅夏為昊天橄欖紛紛青子落紅鹽正味森森苦且嚴待得微甘回齒頰已輸崖蜜十分甜本草崖蜜又名石蜜别有土蜜木蜜歸叟詩話范景仁云橄欖木高大難採以鹽擦木身則實自落顧禧注云記得小説南人誇橄欖於河東人云此有回味東人云不若我棗比至你回味我已甛久矣棗一作柿按惠洪冷齋夜話云崖蜜事見鬼谷子謂櫻桃也今之鬼谷子實無此説然略記陸士衡有賦云朱藍崖蜜士衡此語當有所自海棠東風渺渺一作裊裊泛崇光香霧空濛一作霏霏月轉廊只恐夜深花睡去故一作更燒髙燭照紅糚宋玉招魂光風轉蕙泛崇蘭些花睡暗使楊妃卯醉未醒事注已見東坡雨洗東坡月色清市人行盡野人行莫嫌犖確坡頭路自愛鏗然曵杖聲生日王郎以詩見慶次其韻并寄茶二十一片折揚新曲萬人趍獨和先生于蒍于但信櫝藏終自售豈知碗脫本無橅朅從冰叟來遊宦肯伴臞仙亦號儒棠棣並為天下士芙蓉曽到海邊郛不嫌霧谷霾松柏終恐虹梁荷棟桴高論無窮如鋸屑小詩有味似連珠感君生日遙稱夀祝我餘年老不枯未辦報君青玉案建溪新餅截雲腴莊子天地篇大聲不入於里耳折揚皇荂則嗑然而笑以唐元德秀傳玄宗酺五鳯樓下命三百里縣令刺史皆聲樂集河內太守輦優伎數百瓌譎光麗德秀時為魯山令惟樂工數十人聨袂歌于蒍于于蒍于者德秀所為歌也帝聞異之歎曰賢人之言哉河內人其塗炭乎乃黜太守德秀益知名朝野僉載武后時宫中謡曰杷推侍御史碗脫校書郎晉王沈傳仕郡文學鬱鬱不得志乃作釋時論曰東野丈人觀時以居隱耕汙腴之墟有冰氏子者出自沍寒之谷過而問塗漢司馬相如傳列仙之儒居山澤間形容甚􅋯毛詩棠棣燕兄弟也棠棣之華鄂不韡韡凡今之人莫如兄弟史記魯仲連傳先生天下士也芙蓉胡微之芙蓉城傳為王迥子髙作子高遇仙人周瑶英事見十四卷王郎字子立子髙其兄也班固西都賦因瓌材而究竒抗應龍之虹梁列棼橑以布翼荷棟桴而髙驤晉胡母輔之傳字彥國王澄嘗與人書曰彥國吐嘉言如鋸木屑霏霏不絶文選演連珠注傅玄敘連珠曰連珠者興于漢章之世班固賈逵傅毅三子受詔作之其大體必假喻以達其旨使覽者微悟合於古詩諷興之義欲歷歷如貫珠易見而可恱故謂之連珠張衡四愁詩美人贈我錦繡段何以報之青玉案别黃州病瘡老馬不任鞿猶向君王得敝幃一作帷桑下豈無三宿戀樽前聊與一身歸長腰尚載撑腸米闊領先裁蓋癭衣投老江湖終不失來時莫遣故人非漢刑法志以鞿而御駻突注馬絡頭曰鞿杜子美瘦馬行日暮不收烏啄瘡禮記敝帷不棄為埋馬也四十二章經浮屠桑下一宿日中一食慎勿再矣後漢襄楷傳浮屠不三宿桑下不欲久生恩愛精之至也郡邑志楚人長腰粳米縮項鯿魚言美味也韻語陽秋汝人多苦癭故歐陽公汝癭詩云傴婦垂甕盎嬌嬰食卵殼無由辨肩頸有類龜縮殼梅聖俞詩云女慚高掩襟男大闊裁領公作此詩時方移汝也過江夜行武昌山上聞黃州鼓角清風弄水月銜山幽人夜渡吳王峴黃州鼓角亦多情送我南來不辭逺江南又聞出塞曲半雜江聲作悲健誰言萬方聲一槩鼉憤龍愁為余變我記江邊枯柳樹未死相逢真識面他年一葉泝江來還吹此曲相迎餞吳王峴在武昌西川九曲亭下志林云孫仲謀泛江自樊口鑿山通道歸武昌今猶謂之吳王峴吳兢樂府古題要解橫吹曲有鼓角舊説云蚩尤帥魑魅與黃帝戰帝始命吹角為龍鳴以禦之其後魏武北征烏丸越涉沙漠軍士聞之悲思於是減為中鳴尤更悲矣唐樂令諸道行軍應給鼓角者三萬人已上角十四具鼓二十四靣二萬巳上角八鼓十四萬人已上角六鼓十不滿萬人臨時量給互見十三卷古今樂録橫吹胡樂張騫入西域傳其法於長安李延年因之更造新聲後漢以給邉將萬人將軍得之有黃鵠隴頭出塞入塞等十曲見班超傳注杜子美閣夜詩五更鼓角聲悲壯又詩萬方聲一槩吾道竟何之自興國往筠宿石田驛南草五里野人舍溪上青山三百疊快馬輕衫來一抹倚山修竹有人家橫道清泉知我渴芒鞋竹杖自輕軟蒲薦松牀亦香滑夜深風露滿中庭惟見孤螢自開闔將至筠先寄遲適逺三猶子露宿風餐六百里明朝飲馬南江水未見豐盈犀角兒先逢玉雪王郎子公自注時道逢王郎於建昌方北行也對牀欲作連夜語念汝還須戴星起夜來夢見小於菟公自注逺小名虎兒猶是髧髦垂兩耳憶過濟南春未動三子出迎殘雪裏我時移守古河東酒肉淋漓渾舍喜而今憔悴一羸馬逆旅擔夫相汝爾出城見我定驚嗟身健窮愁不須恥我為乃翁留十日掣電一歡何足恃惟當火急作新詩一醉兩翁勝酒美露宿字出趙一傳已見鮑明逺升天行風餐委松柏雲臥恣天行左傳宣十二年將飲馬于河而歸詩國風髧彼兩髦揚雄方言周晉秦隴間謂父曰翁端午遊真如遲適逺從子由在酒局一與子由别郤數七端午身隨綵絲繫心與昌歜苦今年匹馬來佳節日夜數兒童喜我至典衣具雞黍水餅既懷鄉飯筒仍愍楚謂言必一醉快作西川語寧知是官身糟麴困熏煮獨攜三子出古剎訪禪祖髙談付梁羅公自注梁羅遲適小名也詩律到阿虎歸來一調笑慰此長齟齬周處風土記仲夏端午烹鶩角黍注云端始也謂五月五日風俗通五月五日以五綵絲繫臂者辟兵及鬼令人不病溫左傳僖三十年王使周公閲來聘饗有昌歜杜預曰菖蒲葅也按世俗端午以菖蒲泛酒飲之嵗時記及玉燭寶典諸書皆不載未詳所自宋玉九辨圓鑿而方枘兮吾固知齟齬而難入别子由三首兼别遲宿守都梁得東平康師孟元祐二年三月刻二蘇公所與九帖於洛陽坡書别子由第二詩而題其後云元豐七年余自黃遷汝往别子由於筠作數詩留别此其一也其後雖不過洛而此意未忘因康君郎中歸洛書以贈之元祐元年三月十日軾書知君念我欲别難我今此别非他日風裏楊花雖未定雨中荷葉終不濕三年磨我廢百書一見何止得雙璧願君亦莫嘆留滯六十小劫風雨疾漢司馬遷傳天子始建漢家之封太史公留滯周南不得與從事發憤且卒法華經日月燈明佛説大乘經六十小劫不起于座先君昔愛洛城居我今亦過嵩山麓水南卜宅一作築吾豈敢試向伊川買修竹又聞緱山好泉眼傍市穿林瀉冰玉遙想一作想見茅軒一作簷照水開兩翁相對清如鵠子由卜居賦序昔余先君以布衣宦學四方嘗過洛陽愛其山川慨然有卜居意而貧不能遂唐溫造隱居洛水之南烏重胤辟河陽幕韓愈詩曰水南山人又繼往車馬僕從塞閭里唐地理志河南府本洛州有川三十九其一曰伊川又河南緱氏有仙人洞兩翁歸隱非難事惟要傳家好兒子憶昔汝翁如汝長筆頭一落三千字世人聞此皆大笑慎勿生兒兩翁似不知樗櫟薦明堂何似鹽車壓千里後漢鄭玄傳以書戒子益恩曰案之禮典便合傳家晉宣穆張后傳帝曰老物不足惜慮困我好兒初别子由至奉新作雙鵲先我來飛上東軒背書隨好夢到人與佳節會一歡難把玩回首了無在郤渡來時溪斷橋號淺瀨茫茫暑天闊藹藹孤城背青山眊矂中落日凄涼外盛衰豈吾意離合非所礙何以解我憂粗了一事大施注蘇詩卷二十
