body:
  text: 施注蘇詩卷九宋蘇軾撰施元之原注武進邵長蘅刪補詩六十五首起自常潤復還杭州尋去杭之密州任作施注缺今補無錫道中賦水車翻翻聨聨銜尾鴉犖犖確確蛻骨蛇分疇翠浪走雲陳刺水緑針抽稻芽洞庭五月欲飛沙鼉鳴窟中如打衙天公不見老翁一作農泣喚取阿香推雷車江浙間人目水車為龍骨車晉安海物記鼉宵鳴如桴鼓今江淮間謂鼉鳴為鼉更埤雅鼉欲雨則鳴搜神記晉永和中有人日暮寄宿草屋惟一女子居之夜半門外呼曰阿香官喚汝推雷車至曉雷雨作視其門乃大冢也杭州牡丹開時僕猶在常潤周令作詩見寄次其韻復次一首送赴闕羞歸應為負花期巳見成隂結子時與物寡情憐我老遣春無限賴君詩玉臺不見朝酣酒金縷猶歌空折枝從此年年定相見欲師老圃問樊遲杜牧之詩自是尋春去較遲不須惆悵怨芳時狂風落盡深紅色緑葉成隂子滿枝朝酣酒用李正封句注再見杜牧之序杜秋娘金陵女也年十五為李錡妾嘗唱詞云勸君莫惜金鏤衣勸君須惜少年時花開堪折直須折莫待無花空折枝莫負黃花九日期人生窮達可無時十年且就三都賦萬户終輕千首詩天靜傷鴻猶戢翼月明驚鵲未安枝君看六月河無水萬斛龍驤到自遲晉左思欲賦三都乃詣著作郎張載訪岷卬之事遂搆思十年門庭藩溷皆置紙筆遇得一句即便疏之自以所見不博求為祕書郎及賦成競相傳寫都城為之紙貴杜牧之寄張祜詩誰人得似張公子千首詩輕萬户侯傷鴻暗用國䇿虛弦事注見三卷廣陵會三同舍魏武樂府月明星稀烏鵲南飛繞樹三匝無枝可依龍驤注見八卷大風留金山蘇州閭邱江君二家雨中飲酒二首閭邱孝忠字公顯小圃隂隂遍灑塵方塘瀲瀲欲生紋已煩仙袂來行雨莫遣歌聲便駐雲肯對綺羅辭白酒試將文字惱紅裙今宵記取醒時節點滴空階獨自聞唐咸通末淮南李公逰江舟子刺船誤濺水濕侍女衣公變色裴慶餘時佐幕在坐遽獻一絶云半額鵝黃金鏤衣翠翹浮動玉叉垂從教水濺羅𥜗濕疑是巫山行雨歸李為之霽顔列子薛談學謳於秦青未窮靑之技遂辭歸青弗止餞於郊撫節悲歌聲振林木響遏行雲談乃反不敢言歸李白詩白酒初熟山中歸古詩夜雨滴空階滴滴空階裏空階滴不入滴入愁人耳五紀歸來鬢未霜十眉環列坐生光喚船渡口迎秋女駐馬橋邉問泰娘曽把四絃娛白傅敢將百草鬬吳王從今却笑風流守畫戟空凝宴寢香唐明皇幸蜀令畫工作十眉圖杜牧秋娘詩卻喚吳江渡舟人那得知劉禹錫泰娘詩有時裝成好天氣走上臯橋折花戲風流太守韋尚書路傍忽見停隼旟白居易琵琶行詳第八卷古纒頭曲王注吳王與西施作鬬百草之戲韋應物詩兵衛森畫戟宴寢凝清香次韻沈長官三首家山何在兩忘歸杯酒相逢慎勿違不獨飯山嘲我瘦也應粳核怪君肥李白詩飯顆山前逢杜甫頭戴笠子日卓午借問因何太瘦生總為從前作詩苦史記陳平傳或謂平貧何食而肥其嫂疾其不事家産曰亦食粳核耳晉王戎之子萬少而大肥戎令食粳而肥愈甚男婚已畢女將歸纍盡身輕志莫違聞道山中食無肉玉池清水自生肥東漢逸民傳向長字子平嫁娶既畢敕斷家事遂肆意逰五嶽名山不知所終九星上經青青之月與日同升合兩成一出彼玉池入乎金屋大如彈黃如橘中有佳味甜如蜜子能得之慎勿失黃庭內景經丹田之中精氣微玉池清水上生肥造物知吾久念歸似憐衰病不相違風來震澤帆初飽雨入松江水漸肥王注帆飽水肥皆方言戲書吳江三賢畫像三首誰將射御教吳兒長笑申公為夏姬卻遣姑蘇有麋鹿更憐夫子得西施公自注范蠡左傳成二年楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可又及共王即位使屈巫聘於齊巫臣盡室以行及鄭使介反幣而以夏姬行遂奔晉七年椘殺巫臣之族巫臣乃通吳於晉教其射御戰陳吳始伐椘於是乎一歲七奔命史記淮南傳王召伍被與謀曰將軍上被悵然曰臣聞子胥諫吳王吳王不用乃曰臣今見麋鹿遊姑蘇之臺也今臣亦見宫中生荆棘露沾衣也浮世功勞食與眠季鷹真得水中仙不須更説知機早直為鱸魚也自賢公自注張翰晉張翰傳字季鷹齊王坰辟為東曺掾翰因秋風起思吳中菰菜蓴羮鱸魚鱠曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕歸俄而坰敗人謂之見機千首文章二頃田囊中未有一錢看卻因養得能言鴨驚破王孫金彈丸公自注陸龜蒙史記蘇秦曰使我有負郭田二頃豈能佩六國相印乎杜子美詩囊空恐羞澀留得一錢看新唐書陸龜蒙傳有田數百畝苦雨潦則與江通故嘗苦飢也又有鬬鴨一欄頗極馴養一日驛使過挾彈斃其尤者龜蒙曰此鴨善人言見欲附蘇州上進使者奈何斃之使人懼盡與囊中金以窒其口徐使問善言狀龜蒙曰能自呼名耳西京雜記韓嫣好彈以金為丸所失者日常十百長安為之語曰苦飢寒逐金丸京師兒童每聞嫣出輒隨之劉孝叔會虎邱時王規父齋素祈雨不至二首述字孝叔覿字規父白簡威猶凛青山興已穠鶴間雲作氅駝卧草埋峰跪履若可教卜鄰應見容因公問回老何處定相逢晉傅玄天性峻急不能有所容每有奏劾或值日暮捧白簡整簪帶坐而待旦於是貴遊懾服臺閣生風跪履用張良事注見五卷杜詩王翰願卜鄰白居易與元稹卜鄰詩明月許同三徑夜緑楊宜作兩家春王注後有回先生詩或言呂洞賔易姓為回處士回字乃呂耳太常齋未解不肯對纎穠只遣三千履來逰十二峰林空答清唱潭淨寫衰容歸去瑶臺路還應月下逢東漢周澤字稚都為太常卧疾齋宫其妻哀澤老病問所苦澤以妻犯齋禁遂收送詔獄當世疑其詭激時人為之語曰生世不諧作太常妻一歲三百五十九日齋注又云一日不齋醉如泥宋玉神女賦穠不短纎不長史記春申君客三千人其上客皆躡珠履李白詩會向瑶臺月下逢過永樂文長老已卒初驚鶴瘦不可識旋覺雲歸無處尋三過門間老病死一彈指頃去來今存亡慣見渾無淚鄉井難忘尚有心欲向錢塘訪圓澤葛洪川畔待秋深傳燈録佛為太子出逰諸城門見老病死遂出家唐小説李源居洛陽惠林寺與僧圓澤逰甚密一日相約逰青城峨眉舟次南浦見婦人錦襠而汲者澤泣謂源曰婦人孕三歲矣吾當為之子無可逃者後十二年中秋天竺寺外當與公相見至暮澤亡而婦乳源後自洛適吳聞葛洪川畔牧童扣角而歌曰三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存源問澤公健否答曰李公真信士然俗緣未盡慎勿相近遂去不復見贈張刁二老張子野湖州烏程人刁景純潤州丹陽人兩邦山水未凄涼二老風流總健強共成一百七十歲各飲三萬六千觴藏春塢裏鶯花鬧仁夀橋邉日月長惟有詩人被磨折金叉零落不成行白居易九老詩七人五百七十歲拖紫紆朱白鬢鬚李白詩百年三萬六千日一日須傾三百杯王注藏春刁公塢名仁夀橋張子野所居詩人指言子野蓋子野多寵姬以戲之也去年秋偶遊寶山上方入一小院闃然無人有一僧隱几低頭讀書與之語漠然不甚對問其鄰之僧曰此雲闍黎也不出十五年矣今年六月自常潤還復至其室則死葬數月矣作詩題其壁雲師來寶山一住十五秋讀書常閉户客至不舉頭去年造其室清坐忘百憂我初無言説師亦無對酬今年復扣門空房但颼飀云已滅無餘薪盡火不留卻疑此室中常有斯人不所遇孰非夢事過吾何求金剛經我皆令入無餘涅槃而滅度之莊子養生主指窮於為薪火傳也不知其盡也聽僧昭素琴至一作溫和無攫醳至平無按抑不知微妙聲究竟從何出散我不平氣洗我不和心此心知有在尚復此微吟史記田完世家騶忌子以鼓琴見威王曰夫大絃濁以春溫者君也小絃廉折以清者相也攫之深醳之愈者政令也僧惠勤初罷僧職軒軒青田鶴鬱鬱在樊籠既為物所縻遂與吾輩同今來始謝去萬事一笑空新詩如洗出不受外垢蒙清風入齒牙出語如風松霜髭茁病骨飢坐聽午鐘非詩能窮人窮者詩乃工此語信不妄吾聞諸醉翁永嘉郡記沭溪去青田九里中有雙白鶴年年生子長大便去惟存雙鶴精白可愛多云神仙所養歐陽公作梅聖俞詩序云非詩能窮人殆窮者而後工也遊靈隱髙峰塔武林山記北髙峰在靈隱寺後山山有塔記云唐天寶中建言逰髙峰塔蓐食治野裝火雲秋未衰及此初旦涼霧霏巖谷暗日出草木香嘉我同來人久便雲水鄉相勸小舉足前路髙且長古松攀龍蛇怪石坐牛羊漸聞鐘磬音飛鳥皆下翔入門空有無雲海浩茫茫惟見聾道人老病時絶糧問年笑不答但指穴藜牀心知不復來欲歸更倣徨贈别留匹布今歲天蚤霜史記韓信嘗從南昌亭長寄食數月亭長妻患之乃晨炊蓐食後漢廉范傳注蓐食蚤起食於寢蓐中也三國管寧自越海及歸常坐一木榻積五十餘年未嘗箕股其榻上當膝處皆穿按穴藜牀似用其意故王注引此存之八月十七日天竺山送桂花分贈元素月缺霜濃細蘂乾此花元屬桂堂仙鷲峰子落驚前夜蟾窟枝空記昔年破裓山一作髙僧憐耿介練裙溪女鬬清姸願公採擷紉幽佩莫遣孤芳老澗邉王注天竺山相傳有梵僧云此山自天竺鷲山飛來八月十五夜嘗有桂子落捕蝗至浮雲嶺山行疲苦有懷子由弟二首西來煙陳塞空虛灑遍秋田雨不如新法清平那有此老身窮苦自招渠無人可訴烏銜肉憶弟難憑犬寄書自笑迂疏皆此類區區猶欲理蝗餘白樂天捕蝗詩始自兩河及三輔薦食如蠶飛似雨漢書黃霸為潁川太守常欲有所伺察擇廉吏遣行吏出不敢舍郵亭食於道傍烏攫其肉民有詣府口言事者適見之霸與語道此後日吏還謁霸霸見迎勞曰甚苦食道傍乃為烏所盜肉吏大驚以霸具知其起居所問毫釐不敢有隱晉陸機有駿犬名黃耳甚愛之既而羈寓京師久無家問笑語犬曰我家絶無書信汝能賫書取消息不犬搖尾作聲乃為書以竹筒盛之繫其頸犬尋路南走遂至其家得報還洛霜風漸欲作重陽熠熠溪邉野菊黃久廢山行疲犖確尚能村醉舞淋浪獨眠林下夢魂好回首人間憂患長殺馬毁車從此逝子來何處問行藏犖確注見七卷再逰徑山韓退之詩淋浪身上衣後漢周燮傳馮良年三十為尉從佐奉檄迎督郵即路慨然恥在厮役因壞車殺馬毁裂衣冠遁至犍為從杜撫學妻子求索蹤迹斷絶後乃見草中有敗車死馬衣裳腐朽謂為虎狼盜賊所害發喪制服十許年乃還鄉里青牛嶺髙絶處有小寺人迹罕到暮歸走馬沙河塘爐煙裊裊十里香朝行曳杖青牛嶺崖泉咽咽千山靜君勿笑老僧耳聾喚不聞百年俱是可憐人明朝且復城中去白雲卻在題詩處盧同詩有錢無錢俱可憐百年驟過如流川王維山中詩城郭遙相望惟應見白雲新城陳氏園次鼂補之韻荒涼廢圃秋寂歷幽花晚山城已窮僻况與城相逺我來亦何事徙倚望雲巘不見苦吟人清樽為誰滿梅聖俞詩中有毛長官者今於潛令國華也聖俞沒十五年而君猶為令捕蝗至其邑作詩戲之詩翁憔悴老一官厭見苜蓿堆青盤歸來羞澀對妻子自比鮎魚緣竹竿今君滯留生二毛飽聽衙鼓眠黃紬更將嘲笑調朋友人道獼猴騎土牛願君恰似髙常侍暫為小邑仍刺史不願君為孟浩然卻遭明主放還山宦遊逢此歲年惡飛蝗來時半天黑羡君封境稻如雲蝗自識人人不識苜蓿注三見詩翁梅聖俞也聖俞以詩知名仕宦三十年終不得一館職及受一敕修書語其妻刁氏曰吾之修書可謂胡孫入布袋矣妻對曰君之仕宦亦何異鮎魚緣竹竿乎潘嶽秋興賦余春秋三十二始見二毛王注世傳太祖戒飭縣令勿於黃紬被底放衙又周泰擢新城太守司馬宣王使鍾繇調之曰君釋褐登宰府三十六日而擁麾蓋守兵馬郡乞兒乘小車一何駛乎泰曰君明公之子有文采守吏職獼猴騎土牛又何遲也李白詩身騎土牛滯東魯唐書髙適始為封邱尉哥舒翰表掌書記適有詩云只言小邑無所為公門百事皆有期杜子美贈詩云脫身簿尉中始與捶楚辭後歷蜀彭二州刺史西川節度使終刑部侍郎左散騎常侍又孟浩然逰京師與王維善維私邀入禁省俄駕至遽匿牀下維以實對玄宗喜曰朕聞其人久矣何懼而匿詔出再拜令自誦其詩至不才明主棄帝怒曰卿不求仕奈何誣我因放還後漢卓茂為密縣令天下大蝗獨不入密縣界魯恭為中牟令郡國螟傷稼犬牙緣界不入中牟宋均為九江太守會山陽楚沛多蝗其飛至九江界者輒東西散去戴封為西華令汝潁有蝗獨不入西華界時督郵行縣蝗忽大至督郵去蝗亦頓除一境竒之與毛令方尉遊西菩提寺二首按於潛縣圖經毛君寶同尉方君武與東坡於熙寧七年八月草七日同遊西菩山明智院石刻存焉西菩提寺去縣十五里推擠不去已三年魚鳥依然笑我頑人未放歸江北路天教看盡浙西山尚書清節衣冠後處士風流水石間一笑相逢那易得數詩狂語不須刪三國毛玠典選舉以儉率人魏太祖以素屏風素馮几賜玠曰君有古人之風故賜君古人之服玠居顯位常布衣蔬食後歷官為尚書僕射唐書方干字雄飛新安人咸通中遁於會稽鑑湖之濵漁釣為樂時號逸士有詩十卷序之者謂入錢起之室唐末宰臣奏名儒不遇者十有五人請賜一官以慰泉下干其一也一曰干桐廬人毛令方尉當是二人後路轉山腰足未移水清石瘦便能竒白雲自占東西嶺明月誰分上下池黑黍黃粱初熟後朱柑緑橘半甛時人生此樂須天賦莫遣兒郎取次知於潛圖經寺前有東西兩山或有雲晦遙望如嶺結用王羲之但恐兒輩覺語意注屢見聽賢師琴大絃春溫和且平小絃廉折亮以清平生未識宫與角但聞牛鳴盎中雉登木門前剝啄誰叩門山僧未間君勿嗔歸家且覓千斛水淨洗從前筝笛耳大絃小絃騶忌子見齊威王語注已見本卷管子地員篇凡聽徵如負豬豕覺而駭凡聽羽如鳴馬在野凡聽宮如牛鳴窖中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清樂天廢琴詩何物使之然羌笛與秦筝先生詩話昵昵兒女語恩怨相爾汝劃然變軒昂勇士赴敵場此退之聽潁師琴詩也歐陽公嘗問僕琴詩何者最佳余以此答之公言此詩固竒麗然自是聽琵琶詩非琴詩余退而作杭僧惟賢詩云云詩成欲寄公而公薨至今以為恨贈寫真何充秀才君不見潞州别駕眼如電左手挂弓橫撚箭又不見雪中騎驢孟浩然皺眉吟詩肩聳山飢寒富貴兩安在空有遺像留人間此身常擬同外物浮雲變化無蹤迹問君何苦寫我真君言好之聊自適黃冠野服山家容意欲置我山巖中勳名將相今何限往寫褒公與鄂公晉王戎神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電唐書明皇英武善射初封臨淄王為潞州别駕尚書談録潞州啓聖宫有明皇欹枕斜書壁處腰鼓馬槽並在明皇有一目微斜故作橫撚箭之狀郊特牲野夫黃冠草服世説顧長康畫謝幼輿在巖石裏人問其所以曰此子宜置邱壑中杜甫丹青引凌煙功臣少顔色將軍下筆開生面良相頭上進賢冠猛將腰間大羽箭褒公鄂公毛髮動英資颯爽來酣戰褒公假志玄鄂公尉遲敬德也回先生過湖州東林沈氏飲醉以石榴皮書其家東老菴之壁云西鄰巳富憂不足東老雖貧樂有餘白酒釀來因好客黃金散盡為收書西蜀和仲聞而次其韻三首東老沈氏之老自謂也湖人因以名之其子偕作詩有可觀者按王會回仙碑云熙寧元年八月十九日湖州歸安縣之東林有隱君子沈思字持正隱於東林因以東老名焉能釀十八仙白酒一日有客自稱回道人長揖東老曰知君白酒新熟願求一醉否公命之坐徐觀其目碧色粲然光彩射人與之語無不通究故知非塵埃中人也因出與飲自日中至暮已飲數斗殊無酒色回曰久不逰浙中今為子有隂德留詩贈子乃擘席上榴皮畫字題於菴壁世俗何知窮是病神仙可學道之餘但知白酒留佳客不問黃公覓素書史張良傳老父出一編書曰讀是則為王者師後十三年孺子見我濟北榖城山下黃石即我也其書乃太公兵法符離道士晨興際華嶽先生尸解餘忽見黃庭丹篆句猶傳青紙小朱書王注宿州符離縣天慶觀寧道士者少年談老莊極可采寧云道中賣菜人儀狀雄偉常此逰息一日於扉上題二絶句而去書為大篆體法極異或曰此洞賔先生所書也郡人爭刳之以治疾字字刳痕深寸餘墨迹不滅神仙傳陳摶字圖南居華山雲臺觀預知死日端拱初卒於蓮花峰下張超谷室中死七日有五色雲蔽塞洞口經月不散又華陽處士李奇自言開元中郎官嘗至摶齋中以朱書青紙詩令小童齎似摶摶與唱和交友焉吕洞賔詩肘傳丹篆千年術口誦黃庭兩卷經鶴觀天壇槐影裏悄無人迹户長扃凄涼雨露三年後髣佛塵埃數字餘至用榴皮緣底事中書君豈不中書禮祭儀雨露既濡君子履之必有怵惕之心韓愈毛穎傳穎拜中書令上嘗呼為中書君後因進見上見其髮秃又所模畫不能稱上意上嘻笑曰中書君老而秃不任吾用吾謂君中書君今不中書耶李行中醉眠亭三首已向間中作地仙更於酒裏得天全從教世路風波惡賀監偏工水底眠唐孫思邈千金方以虻蟲水蛭為藥以害物命不獲上升為地仙莊子醉者墜車雖疾不死骨節與人同而犯害與人異其神全也杜子美飲中八仙歌知章騎馬似乘船眼花落井水底眠君且歸休我欲眠人言此語出天然醉中對客眠何害須信陶潛未若賢晉陶潛有酒輒設不問賔主醉則語客曰我醉欲眠卿且去李白詩我醉欲眠君且去明朝有意抱琴來孝先風味也堪憐肯為周公晝日眠枕麯先生猶笑汝枉將空腹貯遺編後漢邉韶字孝先嘗畫日假寐弟子嘲之云云孝先聞之答曰邉為姓孝先字腹便便五經笥但欲眠思經事寐與周公同夢靜與孔子同意師而可嘲出何典記又互見六卷寶山晝睡詩注劉伶酒德頌先生於是方捧甕承槽銜杯嗽醪奮髯箕踞枕麯藉糟潤州甘露寺彈筝多景樓上彈神曲欲斷哀絃再三促江妃出聽霧雨愁白浪翻空動浮玉公自注金山名喚取吾家雙鳳槽遣作三峽孤猿號與君合奏芳春調啄木飛來霜樹杪王注神曲蓋今筝中有之又楊元素云孫洙巨源王存正仲與東坡同逰多景樓京師官妓皆在而胡琴者姿伎尤妙三公皆一時英彥酒闌巨源請於東坡曰殘霞晚照非竒辭遂作採桑子所謂多情多感仍多病多景樓中是也郭璞江賦馮夷倚浪以傲睨江妃含顰而綿眇梁簡文巴東三峽歌巴東三峽巫峽長猿鳴三聲淚沾裳歐陽公楊直講女奴彈琵琶詩大絃聲遲小絃促十歲嬌兒彈啄木啄木不啄新生枝唯啄牙槎枯木腹單同年求德興俞氏聚逺樓詩三首雲山煙水苦難親野草幽花各自春賴有髙樓能聚逺一時收拾與間人無限青山散不收雲奔浪卷入簾鈎直將眼力為疆界何啻人間萬户侯聞説樓居似地仙不知門外有塵寰幽人隱几寂無語心在飛鴻滅沒間前漢郊祀志公孫卿言仙人好樓居於是上令長安則作飛廉桂館甘泉則作益夀延夀館使卿持節設具而候神人乃作通天臺置祠具其下將招來神仙之屬平山堂次王居卿祠部韻髙會日陪山簡醉狂言屢發次公醒酒如人面天然白山向吾曺分外青江上飛雲來北固檻前修竹憶南屛六朝興廢餘邱壠空使姦雄笑寧馨晉書山簡鎮襄陽于時四方冦亂簡優遊卒歲每出逰多之習家池上置酒輒醉名之曰髙陽池次公酒狂注屢見晉桓溫傳溫過泗踐北境與僚屬登平乘樓眺矚中原慨然曰遂使神州陸沈百年邱墟王夷甫諸人不得不任其責王衍傳衍字夷甫總角嘗造山濤濤嗟歎良久既去目而送之曰何物老嫗生此寧馨兒然誤天下蒼生者未必非此人也次韻陳海州書懷鬱鬱蒼梧海上山公自注東海鬱州山云自蒼梧浮來蓬萊方丈有無間舊聞草木皆仙藥欲棄妻孥守市闤雅志未成空自歎故人相對若為顔酒醒卻憶兒童事長恨雙鳬去莫攀公自注陳曽令鄉邑史封禪書蓬萊方丈瀛州此三神山者相傳在渤海中去人不逺患且至則船風引而去蓋嘗有至者諸仙人及不死之藥皆在焉漢書梅福字子真元始中王莽專政福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變姓名為吳市門卒云雙鳬注再見前次韻陳海州乘槎亭因話録云漢書載張騫窮河源言其奉使之逺實無天河之説惟張華博物志云近世有人居海上每年八月見乘槎來不違時齎一年糧乘之到天河見婦人織丈夫飲牛遣問嚴君平曰某時客星犯斗牛即此人也後世相傳云得織女支機石持以問君平都是虛無之説今成都嚴真觀有一石呼為支機石云寶歷中豫於京都途中逢官差夫遞舁張騫槎先在東都禁中今準詔索有司取進不知是何物也前輩詩往往有張騫槎者相襲訛謬矣縱出雜書亦不足據也人事無涯生有涯逝將歸釣漢江槎乘桴我欲從安石遁世誰能識子嗟日上紅波浮翠巘潮來白浪卷青沙清談美景雙竒絶不覺歸鞍帶月華莊子養生主吾生也有涯而知也無涯晉謝安與孫綽等泛海注詳第三卷詩國風丘中有麻彼留子嗟小序思賢也莊王不明賢人放逐國人思之而作是詩也傳留大夫氏子嗟字也次韻孫職方蒼梧山蒼梧竒事豈虛傳荒怪還須問子年逺託鼇頭轉滄海來依鵬背負青天或云靈境歸賢者又恐神功亦偶然聞道新春恣逺覽羡君平地作飛仙晉王嘉字子年著拾遺記事多怪詭列子海中有五山根無所連著帝遣巨鼇十五舉首戴之山始峙而不動莊子逍遙遊背負青天而莫之夭閼次韻孫巨源寄漣水李盛二著作并以見寄五絶南嶽諸劉豈易逢相望無復馬牛風山公雖見無多子社燕何由戀塞鴻公自注昔與巨源劉貢父劉莘老相遇於山陽自爾契闊惟巨源近者復相見於京口公嘗有詩云有如社燕與秋鴻相逄未穩還相送漢紀王昌字郎邯鄲人詐稱成帝子子輿自立為天子遣將帥徇幽冀移檄有云南嶽諸劉為朕先驅王注借用諸劉字指言貢父莘老晉山濤字巨源公借以指孫公也髙才晚歲終難進勇退當年正急流不獨二疏為可慕他時當有景孫樓公自注巨源近離東海郡有景疏樓宋史陳摶謂錢惟演有仙骨麻衣道者曰此人但能於急流中勇退耳惟演果早年恬退漢書疏廣為太子太傅兄子受為少傅廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也即日父子移病上疏乞骸骨去道路觀者皆曰賢哉二大夫或歎息為之泣下潄石先生難可意公自注謂巨源齧氊校尉久無朋公自注自謂應知客路愁無奈故遣吟詩調李陵公自注謂李君也世説孫楚謂王濟曰欲枕石潄流誤云潄石枕流濟曰流可枕石可潄乎楚曰所以枕流欲洗其耳所以潄石欲礪其齒漢書蘇武留丐奴單于欲降之乃幽武置大窖中絶不與飲食武卧齧氊毛并咽之數日不死胸奴以為神乂初武與李陵俱為侍中武使胸奴明年陵降久之武歸漢陵置酒起舞歌曰徑萬里兮度沙幕云云陵泣數行下因與武訣按蘇武有别李陵詩四首陵亦作三首故後世稱五言首蘇李云雲雨休排神女車忠州老病畏人誇詩豪正值安仁在空看河陽滿縣花公自注盛為邑宰白居易赴忠州道過巫山題詩於廟云為報巫山神女道速排雲雨待清詩晉潘嶽字安仁為河陽令種花滿縣人號河陽一縣花膠西未到吾能説桑柘禾麻不見春不羡京塵騎馬客羡他淮月弄舟人王莽漢家殊未識經綸入手功名事事新百尺穿成連夜井千金購得解飛人漢書王莽傳宗室廣饒侯劉京上言齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中誠有新井入地且百尺又莽又博募有竒技術可以攻胸奴者或言能飛一日千里莽輒試之取大鳥翮為兩翼頭與身皆著毛通引環紐飛數百步墮莽知不可用苟欲獲其名皆拜為理軍賜以車馬待發蘅按此與董卓二詩具有深意入手功名事事新譏安石之變法豈信車中有布乎指吕惠卿之負安石也董卓公業平時勸用儒諸公何事起相圖只言天下無健者豈信車中有布乎後漢董卓傳鄭泰字公業與周珌伍瓊共説卓以韓馥劉岱孔胄諸人為牧守及義兵起卓大怒曰卓初入朝二子勸用善士故相從而諸君到官舉兵相圖此二君賣卓卓何相負遂斬珌瓊而鄭泰以詭辭獲免又王允與呂布謀誅卓有人書吕字于布上荷而行市歌曰布乎有告卓者卓不悟又董公健見第一卷詩注虎兒王注此篇當為逺姪作舊聞老蚌生明珠未省老兔生於菟老兔自謂月中物不騎快馬騎蟾蜍蟾蜍爬沙不肯行坐令青衫垂白鬚於菟駿猛不類渠指揮黃熊駕黑貙丹砂紫麝不用塗眼光百步走妖狐妖狐莫誇智有餘不勞搖牙咀爾徒漢書韋康字元將弟誕字仲將孔融與康父書曰不意雙珠近出老蚌左傳楚人謂虎為於菟五經通義月中有兔與蟾蜍韓退之月蝕詩爬沙腳手鈍誰使女解緣青冥王注世之小兒必塗丹砂紫麝以辟不祥魏志曺真嘗會吳質等真肥朱鑠瘦質召優使説肥瘦真恚拔刀瞋目言爾敢輕脫吾斬爾遂罵坐質按劍曰曹子丹汝非屠杌上肉吳質吞爾不搖喉咀爾不搖牙何敢恃勢驕耶除夜病中贈段屯田王注段釋之也龍鍾三十九勞生已強半歲暮日斜時還為昔人歎公自注樂天詩云行年三十九歲暮日斜時今年一線在那復堪把玩欲起強持酒故交雲雨散惟有病相尋空齋為老伴蕭條燈火冷寒夜何時旦倦僕觸屏風飢鼯嗅空案數朝閉閣卧霜髮秋蓬亂傳聞使者來策杖就梳盥書來苦安慰不怪造請緩大夫忠烈後髙義金石貫要當擊權豪未肯覻衰懦奴亂切一作愞此生何所似暗盡灰中炭歸田計已決此邦聊假館三徑粗成資一枝有餘暖願君更信宿庶奉一笑粲杜詩何人錯憶窮愁日愁日愁隨一線長嵗時記宫中以細線量日影至日日影添一線栁子厚書前過三十七年與瞬息無異後所得者其不足把玩亦已審矣白居易詩病與樂天相伴住觸屏風用陳咸事詳二卷王頤赴建州錢監詩注詩國風首如飛蓬唐史假太尉秀實諡忠烈初朱泚反召秀實議事語至僭位秀實勃然起唾泚面大罵曰狂賊吾恨不斬汝頭豈從汝反耶奮笏擊泚泚舉臂自捍才中其顙血流匍匐而走三徑用蔣詡事詳五卷和邵同年詩注莊子鷦鷯巢於深林不過一枝左傳凡師一宿為舍再宿為信喬太博見和復次韻答之百年三萬日老病常居半其間互憂樂歌笑雜悲歎顛倒不自知直為神所玩須臾便堪笑萬事風雨散自從識此理久謝少年伴逝將逰無何豈暇讀城旦非才更多病二事可並案愧煩賢使者弭節整紛亂喬侯瑚璉質清廟嘗薦盥奮髯百吏走坐變齊俗緩未遭甘鷁退並進恥魚貫每聞議論餘凛凛激貪懦莫耶當自躍豈復煩爐炭便應朝秣越未暮刷燕館胡為守故邱眷戀桑榆暖為君叩牛角一詠南山粲列子楊朱曰百年夀之大齊得者千無一焉設有一者孩抱以逮昏老幾居其半矣莊子逰於無何有之鄉漢書竇太后好老子書召問轅固固曰此家人言耳太后怒曰安得司空城旦書乎後漢孔融傳曺操討烏桓融嘲之曰大將軍逺征蕭條海外昔肅慎氏不貢楛矢丁零盜蘇武牛羊可并案也詩頌小序清廟祀文王也周易觀盥而不薦漢書朱博傳遷琅琊太守齊部舒緩養名博新視事右曺掾史皆移病卧博奮髯抵几曰觀齊兒欲以此為俗耶皆斥罷諸病吏白巾走出府門又敕功曺官屬多褒衣大祒不中節度自今掾史衣皆令去地三寸視事數年大改其俗左傳僖十六年六鷁退飛過宋都周易貫魚以宫人寵莊子大宗師大冶鑄金金踴躍曰我且必為鏌鎁大冶必以為不祥之金刷燕秣越顔延年賦語已見李白詩雞鳴刷幽晡秣越唐明皇續薛令之詩任逐桑榆暖詳見三卷苜蓿槃注琴操寧戚衛人飯牛扣角而商歌曰南山粲白石爛生不逢堯與舜禪短布單衣裁至骭從昏飯牛薄夜半長夜漫漫何時旦桓公聞之舉以為相按粲本作矸音岸山石貌二公再和亦再答之寒雞知將晨飢鶴知夜半亦知老病客遇節嘗感歎光隂等敲石過眼不容玩親友如摶沙放手還復散羈孤每自笑寂寞誰肯伴元達號神君髙論森月旦紀明本賢將汩沒事堆案欣然肯相顧夜閣燈火亂盤空愧不飽酒薄僅堪盥雍容許著帽不怪安石緩雖無窈窕人清唱弄珠貫幸有縱橫舌説劍起慵懦二豪沈下位暗火埋濕炭豈似草元人默默老儒館行看富貴逼炙手借餘暖應念苦思歸登樓賦王粲白居易詩蝸牛角上爭何事石火光中寄此身晉良吏傳喬智明字元達為隆慮共二縣令二縣愛之號為神君後漢許劭傳邵字子將與從兄靖俱有髙名好共核論鄉黨人物每月輒更其品題故汝南俗有月旦評又假熲傳熲字紀明為護羌校尉窮討先零東羌悉平之初熲與皇甫威明張然明並知名顯達京師稱為涼州三明云嵇康書堆案滿几已見前晉書桓溫請謝安為司馬溫詣安值其理髮安性遲緩久而方罷使取幘溫見留之曰令司馬著帽進其見重如此莊子有説劍篇唐元載為相有用事四人熏灼中外人為之語曰卓李鄭薛炙手可熱杜詩炙手可熱勢絶倫三國王粲以西京擾亂乃避地荆州依劉表因登江陵城樓懷歸作登樓賦雪後書北臺壁二首黃昏猶作雨纖纖夜靜無風勢轉嚴但覺衾裯如潑水不知庭院已堆鹽五更曉色來書幌半夜寒聲落畫簷試掃北臺看馬耳未隨埋沒有雙尖王注馬耳山名與臺相對按先生超然臺記云園之北因城以為臺者舊矣又云南望馬耳常山城頭初日始翻鴉陌上晴泥巳沒車凍合玉樓寒起粟光搖銀海眩生花遺蝗入地應千尺宿麥連雲有幾家老病自嗟詩力退空吟冰柱憶劉義王注道經以項肩骨為玉樓眼為銀海起粟使趙飛燕雖寒體無軫粟字又世傳王荆公嘗誦先生此詩歎云子瞻乃能使事至此公壻蔡卞曰句不過詠雪之狀粧樓臺如玉樓瀰漫萬象若銀海耳荆公哂曰此出道書也又蝗遺子於地若雪深一尺則入地一丈麥得雪則滋茂而成稔歲此老農語也唐史劉又韓愈門人作雪車冰柱二詩出盧同孟郊右樊宗師見而拜之謝人見和前篇二首已分酒杯欺淺懦敢將詩力鬬深嚴漁簑句好真堪畫栁絮才髙不道鹽敗履尚存東郭足飛花又舞謫仙簷書生事業真堪笑忍凍孤吟筆退尖韓退之聫句再入更深嚴王注鄭谷雪詩江上晚來堪畫處漁人披得一簑歸段贊善摹為畫圖谷以詩謝之曰愛余風雪句幽絶寫漁簑世説謝安嘗內集俄而雪驟下安曰白雪紛紛何所似兄子朗曰撒鹽空中差可擬道韞曰未若栁絮因風起又張融作海賦以示顧愷之愷之曰公此賦實超元虛但不道鹽耳史記滑稽傳東郭先生久待詔公車貧困衣弊履不完行雪中履有上無下足盡踐地道中人笑之先生應之曰誰能履行雪中令人視之其上履也其下乃似人足者乎李白詩飛花送酒舞前簷退之詩兔尖斜莫並蓋苦寒則筆退尖矣九陌凄風戰齒牙銀杯逐馬帶隨車也知不作堅牢玉無奈能開頃刻花得酒強歡愁底事閉門髙卧定誰家臺前日暖君須愛冰下寒魚漸可叉韓退之雪詩隨車翻縞帶逐馬散銀杯謝惠連雪賦白玉雖白空守貞兮未若兹雪因時興滅注引劉熙注孟子云白雪之性消白玉之性堅頃刻花韓湘事見上卷冬日牡丹注汝南先賢傳洛陽大雪積地丈餘令自出案行至袁安門無行迹謂安已死令人除雪入户見安偃卧問何以不出曰大雪人皆餓不宜干人令以為賢舉為孝亷也鐡溝行贈喬太博名敘字禹功城東坡隴何所似風吹海濤低復起城中病守無所為走馬來尋鐡溝水鐡溝水淺不容輈恰似當年韓與侯有魚無魚何足道駕言聊復寫我憂孤村野店亦何有欲發狂言須斗酒山頭落日側金盆倒著接㒿搔白首忽憶從軍年少時輕裘細馬百不知臂弓腰箭南山下追逐長楊射獵兒老去同君兩憔悴犯夜醉歸人不避明年定起故將軍未肯先誅霸陵尉韓退之詩吾黨侯生字叔起呼我持竿釣溫水又此縱有魚何足求杜子美詩夜闌接軟語落月如金盆晉書山簡傳襄陽兒童歌曰時時能騎馬倒著白接㒿漢揚雄傳上將大誇胡人以多禽獸命右扶風發民入南山捕熊羆豪豬虎豹狖玃狐兔麋鹿輸長楊射熊館以網為周阹縱禽獸其中令胡人手搏之上親臨焉雄從至射熊館還獻上長楊賦以風史記李廣傳廣居藍田南山中射獵嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何乃故也止廣宿亭下居無何廣為右北平太守請霸陵尉與俱至軍斬之王注禹功嘗欲換武故有此句其後果換左藏知欽州出城送客不及步至溪上二首送客客巳去尋花花未開未能城裏去且復水邉來父老借問我使君安在哉今年好風雪會見麥千堆春來六十日笑口幾時開會作堂堂去何妨得得來倦逰行老矣舊隱賦歸哉東望峨眉小盧山翠作堆公自注郡東盧山絶類峨眉而小白樂天詩青春只有九十日不開口笑是癡人唐人詩青春背我堂堂去白髮期人故故生僧貫休詩一瓶一鉢垂垂老萬水千山得得來蘇州姚氏三瑞堂公自注姚氏世以孝稱君不見董召南隱居行義孝且慈天公亦恐無人知故令雞狗相哺兒又令韓老為作詩爾來三百年名與淮水東南馳此人世不乏此事亦時有楓橋三瑞皆目見天意宛在虞鰥後惟有此詩非昔人君更往求無價手韓愈嗟哉董生行夀州屬縣有安豐唐貞元時縣人董生召南隱居行義於其中又曰嗟哉董生孝且慈人不識惟有天翁知生祥下瑞無時期家有狗乳出求食雞來哺其兒啄啄庭中拾蟲蟻哺之不食鳴聲悲全篇見文集吳郡圖經楓橋在吳縣西九里尚書有鰥在下曰虞舜蓋姚氏所自出莫笑銀杯小答喬太博陶潛一縣令獨飲仍獨醒猶將公田二頃五十畝種秫作酒不種粳我今號為二千石歲釀百石何以醉賔客請君莫笑銀杯小爾來歲旱東海窄會當拂衣歸故邱作書貸粟監河侯萬斛船中著美酒與君一生長拍浮陶潛種秫詳六卷自昌化雙溪館詩注莊子外物篇莊周家貧故往貸粟於監河侯晉畢卓嘗謂人曰得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣送段屯田分得于字勸農使者古大夫不惜春衫踐泥塗王事靡盬君甚劬奉常客卿虬兩須東武縣令天馬駒泮宫先生非俗儒相與野飲四子俱樂哉此樂城中無溪邉䇿杖自擕壺腰笏不煩一作須何易于膠西病守老且迂空齋愁坐紛墨朱四十豈不知頭顱畏人不出何其愚王注勸農使者指段屯田奉常客卿喬太博也應為太常博士矣時趙杲為郡教授三國崔琰對賔客虬鬚直視唐書何易于為益昌令刺史崔朴嘗乘春與賔客泛舟索民挽緯易于腰笏身挽朴驚問狀對曰民方耕桑不可役縣令間暇當任其勞朴愧疾驅去托遺陶𢎞景與從兄書云昔仕宦期四十左右作尚書郎即投簮髙邁今三十六方作奉朝請頭顱可知不如早去和段屯田荆林館南山有佳色無人空自奇清詩為題品草木變芬菲謝女得秀句留待中郎歸便當勤鞭策僕倦馬亦飢公自注段有姪女在密施注蘇詩卷九
