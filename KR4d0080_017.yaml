body:
  text: 施注蘇詩卷三宋蘇軾撰施元之原注武進邵長蘅刪補詩四十五首起熙寧已酉還京師至辛亥乞外除通判杭州赴任由陳頴過廣陵作和子由初到陳州見寄二首道喪雖云久吾猶及老成如今各衰晚那更治刑名懶惰便樗散疏狂託聖明阿奴須碌碌門户要全生莊子吾有大木人謂之樗曲轅櫟社其大蔽牛匠石曰散材也杜子美詩鄭公樗散鬢如絲晉列女傳周顗母李氏謂顗等曰我屈節為汝家妾門户計耳中興時顗等並列顯位因冬至置酒絡秀舉觴賜三子曰爾等並貴列吾目前吾復何憂嵩曰恐不如尊旨伯仁好乘人之弊非自全之道嵩性抗直亦不容于世惟阿奴碌碌當在阿母目下耳李氏字絡秀顗字伯仁謨小字阿奴舊隱三年别杉松好在不吾今尚眷眷此意恐悠悠閉户時尋夢無人可説愁還來送别處雙淚寄南州次韻子由緑筠堂愛竹能延客求詩剩挂墻風梢千纛亂月影萬夫長谷鳥驚棋響山蜂識酒香只應陶靖節會聽北窗涼宋子京詩槩竹森煙纛杜牧之晚晴賦竹林外裹兮十萬丈夫甲刃樅樅密陳而環侍送劉攽倅海陵劉攽字貢父臨江新喻人與王介甫論新法不便介甫怒斥通判泰州君不見阮嗣宗臧否不挂口莫誇舌在牙齒牢是中惟可飲醇酒讀書不用多作詩不須工海邉無事日日醉夢魂不到蓬萊宫秋風昨夜入庭樹蓴絲未老君先去君先去幾時回劉郎應白髮桃花開不開晉阮籍傳籍字嗣宗發言玄逺口不臧否人物史記張儀傳嘗從楚相飲已而楚相亡璧門下意張儀共執掠笞其妻曰子毋讀書遊説安得此辱乎儀曰視吾舌尚在否妻笑曰舌在也儀曰足矣韓退之贈劉師服詩羡君齒牙牢且潔大肉硬餅如刀截南史謝瀹傳兄朏指瀹口曰此中惟宜飲酒白樂天詩不用更教詩過好折君官職是詩名杜詩莫相疑行憶獻三賦蓬萊宫晉張翰傳因秋風起思吳中菰菜蓴羮鱸魚膾命駕而歸齊民要術四月蓴生莖而無葉名雉尾蓴芽甚肥美葉舒長名絲蓴劉禹錫還京師詩南曹舊吏來相問何處淹留白髮生又贈看花君子詩元都觀裏桃千樹盡是劉郎去後栽再遊玄都觀詩桃花淨盡菜花開王注公赴詔獄供此詩譏諷朝廷新法不便不容人直言不如耳不聞而口不言也送錢藻出守婺州得英字錢藻字醇老武肅王鏐五世孫熙寧三年以尚書司封郎祕閣校理出守婺州同舍之士飲餞于觀音院會者凡二十人醇老為詩二十言以示坐者各取其一言為韻賦詩送之曽鞏為之序老手便劇郡髙懷厭承明聊紆東陽綬一濯滄浪纓東陽佳山水未到意已清過家父老喜出郭壺漿迎子行得所願愴悢居者情吾君方急賢日旰坐邇英黃金招樂毅白璧賜虞卿子不少自貶陳義空峥嶸古稱為郡樂漸恐煩敲搒音崩臨分敢不盡醉語醒還驚漢朱邑傳逺守劇郡馭于繩墨嚴助傳上賜書曰君厭承明之廬注承明廬在石渠閣外揚子使我紆朱懷金唐地理志婺州東陽郡劉禹錫答于令詩東陽本是佳山水何况曽經沈隱侯後漢岑彭傳南還津鄉有詔過家上冢白樂天初到江州詩遙見朱輪來出郭相迎勞動使君公文選班叔皮北征賦心愴悢以傷懷左傳日旰注旰晏也漢張湯傳每朝奏事語國家用日旰天子忘食宋仁宗景祐二年置邇英在迎陽門之北東向延羲在崇政殿之西南隅上谷郡圗經燕太子丹築臺置千金其上以招賢士天下謂之黃金臺栁子厚詠史燕有黃金臺逺至望諸君史記樂毅傳趙封于觀津號望諸君虞卿傳躡蹻擔簦説趙孝成王一見賜黃金百鎰白璧一雙孔子世家子貢曰夫子之道至大也故天下莫能容夫子盍少貶焉莊子屠羊説居處卑賤而陳義甚髙杜子美詩峥嶸吐髙論漢書東方朔傳注搒擊也韓退之赴江陵詩何况親犴獄敲搒發姦偷公烏臺詩話熙寧三年三月作古詩一首送錢藻此詩除無譏諷外言朝廷方急賢才多士並進子獨逺出為郡不少自勉強求進但守道義意譏當時之人急進也又言青苖助役既行百姓輸納不前為郡者不免用鞭箠催督醉中道此語醒後還驚恐得罪朝廷以譏諷新法不便之故也送吕希道知和州吕希道字景純河東人丞相文靖公之孫翰林侍讀學士公綽之子歷知解和滁汝澶湖亳七州去年送君守解梁今年送君守歷一作櫪陽年年送人作太守坐受塵土堆胸腸君家聨翩三將相富貴未已今方將鳳雛驥子生有種毛骨往往傳諸郎觀君崛鬱負竒表便合劍佩趨明光胡為小郡屢奔走征馬未解風帆張我生本自便江海忍耻未去猶倣徨無言贈君有長歎美哉河水空洋洋九域志解州解梁城事見左傳唐地理志和州歷陽郡世説羅友家貧乞祿于桓溫曰昨逢一鬼大揶揄云只見汝送人作郡不見人送汝作郡溫笑以為襄陽太守王注蒙正諡文穆本朝名相其姪曰夷簡夷簡之子曰公著皆為將相晉書陸雲幼時吳尚書閔鴻見而竒之曰此兒若非龍駒當是鳳雛北齊裴景鸞景鴻並有逸才河東呼景鸞為驥子杜子美入奏行竇侍御驥之子鳳之雛世説王右軍道祖士少風領毛骨恐沒世不復見如此人西漢有明光宫史記孔子將西見趙簡子至于河而聞竇鳴犢舜華之死也臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫次韻王誨夜坐愛君東閣能延客顧我間官不計員䇿杖頻過知未厭卜居相近豈辭遷莫將詩句驚搖落漸喜樽罍省僕緣待約月明池上宿夜深同看水中天漢公孫𢎞傳起客舍開東閣以延賢人宋玉九辨悲哉秋之為氣也簫瑟兮草木搖落而變衰莊子人間世篇愛馬者以筐盛矢以蜄盛溺適有蚊虻僕緣而拊之不時則缺銜毁首碎胸李太白詩人乘海上月帆落湖中天賈島詩船壓水中天送文與可出守陵州文與可名同梓潼人畫竹石妙絶一世得者皆寶之壁上墨君不解語見之尚可消百憂而况我友似君者素節凛凛欺霜秋清詩健筆何足數逍遙齊物追莊周奪官遣去不自覺曉梳脫髮誰能收江邉亂山赤如赭陵陽正在千山頭君知逺别懷抱惡時遣墨君解我愁東坡墨君堂記王子猷謂竹君天下從而君之無異辭今與可又以墨君之形容作堂以居而屬余為文後漢孔融傳凜凛焉皓皓焉與琨玉秋霜比質杜詩復憶襄陽孟浩然清詩句句盡堪傳又庾信文章老更成凌雲健筆意縱橫莊子內篇有逍遙遊齊物論晉王羲之傳中年以來傷于哀樂與親友别輒作數日惡杜詩使我不能餐令我惡懷抱送劉道原歸覲南康劉道原名恕筠州人介甫執政道原在館閣欲引置條例司固辭是時介甫權震天下人不敢忤而道原憤憤欲與之校又條陳所更法令不合衆心者至面刺其過介甫怒變色道原不以為意或稠人廣坐對其門生誦言得失無所避遂與之絶此詩端為介甫而發以孔融汲黯比道原曹操張湯况介甫又云雖無尺箠與寸刃口吻排擊含風霜益著其面折之實也晏嬰不滿六尺長髙節萬仭陵首陽青衫白髮不自歎富貴在天那得忙十年閉户樂幽獨百金購書收散亡朅來東觀弄丹墨聊借舊史誅姦強孔融不肻下曹操汲黯本自輕張湯雖無尺箠與寸刃口吻排擊含風霜自言靜中閲世俗有似不飲觀酒狂衣巾狼藉又屢舞傍人大笑供千埸交朋翩翩去略盡惟我與子猶倣徨世人共棄君獨厚豈敢自愛恐子傷朝來告别驚何速歸意已逐征鴻翔匡廬先生古君子挂冠兩紀鬢未蒼定將文度置膝上喜動鄰里烹豬羊君歸為我道名姓一作姓字幅巾他日容登堂史記晏嬰傳晏子長不滿六尺身相齊國名顯諸侯後漢和帝紀永元十三年幸東觀覽書林閲篇籍博選術藝之士以充其官韓退之詩丹墨交橫揮又答崔立之書將作唐之一經垂之于無窮誅姦諛于既死發潛德之幽光後漢孔融傳見曹操雄詐漸著數不能堪故發辭褊宕多致乖忤漢汲黯傳張湯以更定律令為廷尉黯質責湯于上前憤怒罵曰天下謂刀筆吏不可為公卿果然必湯也韓送張道士詩恨無一尺箠為國笞羌夷又臣有一寸刃西京雜記淮南王著鴻烈書自云字中皆挾風霜漢蓋寬饒傳無多酌我我乃酒狂史記滑稽傳淳于髠曰履舄交錯杯盤狼藉當此之時能飲一石毛詩屢舞僛僛又屢舞仙仙李白短歌行天公見玉女大笑供千埸韓答胡生書不敢自愛懼生之無益而有傷也廬山記匡俗先生姓匡名俗殷周之際遁世隱居廬于此山因號廬山亦曰匡山按匡廬先生謂道原父俗一作續後漢逢萌傳解冠挂東都城門晉書陶𢎞景挂冠神武門王述傳述愛子坦之雖長大猶抱置膝上坦之字文度古樂府木蘭歌磨刀霍霍向豬羊後漢法真傳太守請見真乃幅巾詣謁又符融傳融幅巾奮袖談辭如雲出都來陳所乘船上有題小詩八首不知何人有感于余心者聊為和之蛙鳴青草泊蟬噪垂楊浦吾行亦偶然及此新過雨鳥樂忘罝罦魚樂忘鉤餌何必擇所安滔滔天下是莊子胠篋篇鉤餌罔罟罾笱之知多則魚亂于水矣削格羅落罝罘之知多則獸亂于澤矣煙火動村落晨光尚熹微田園處處好淵明胡不歸廣雅村落居也陶淵明歸去來辭歸去來兮田園將蕪胡不歸又問征夫以前路恨晨光之熹微我行無疾徐輕楫信容漾船留村市閙閘發寒波漲舟人苦炎熱宿此喬木灣清月未及上黑雲如頽山後漢光武紀王邑圍昆陽有雲如壞山當營而隕庾信詠懷詩哭市聞妖獸頽山起怪雲歐陽答聖俞大雨詩夕雲若頽山夜雨如決渠萬竅號地籟衝風散天池喧豗瞬息間還挂斗與箕莊子齊物論大塊噫氣其名為風是惟無作作則萬竅怒號又地籟則衆竅是巳楚辭九歌衝風起兮水橫波莊子逍遙遊南溟者天池也潁水非漢水亦作蒲萄緑恨無襄陽兒令唱銅鞮曲李白襄陽歌遙看漢水鴨頭緑恰似蒲桃初醱醅又襄陽小兒齊拍手攔街爭唱白銅鞮古樂府有白銅鞮歌我詩雖云拙心平聲韻和年來煩惱盡古井無由波白樂天贈元稹詩無波古井水有節秋竹竿孟郊詩妾心古井水波瀾誓不起次韻張安道讀杜詩張文定公名方平字安道大雅初微缺流風困暴豪張為詞客賦變作楚臣騷展轉更崩壞紛綸閲俊髦地偏蕃怪産源失亂狂濤粉黛迷真色魚蝦易豢牢誰知杜陵傑名與謫仙髙掃地收千軌爭標看兩艘詩人例窮苦天意遣奔逃塵暗一作暗人亡鹿溟翻帝斬鼇艱危思李牧述作謝王褒失意各千里哀鳴聞九臯騎鯨遁滄海捋虎得綈袍巨筆屠龍手微官似馬曹迂疏無事業醉飽死遊遨簡牘儀刑在兒童篆刻勞今誰主文字公合抱旌旄開卷遙相憶知音兩不遭般斤思郢質鯤化陋鯈濠恨我無佳句時蒙致白醪殷勤理黃菊未遣沒蓬蒿班孟堅兩京賦序賦者古詩之流也史記屈原傳憂愁幽思而作離騷離騷者猶離憂也韓退之調張籍詩李杜文章在光焰萬丈長又帝欲長吟哦故遣起且僵漢蒯通傳秦失其鹿天下共逐之列子湯問篇昔者女媧氏鍊五色石以補其闕斷鼇之足以立四極王注亡鹿言明皇天寶之亂斬鼇言肅宗誅安史再造唐室漢馮唐傳文帝曰嗟乎吾獨不得廉頗李牧為將豈憂胸奴哉漢王褒傳益州刺史王襄使褒作中和樂職宣布詩杜子美送孔巢父詩巢父掉頭不肯住東將入海隨煙霧又若逢李白騎鯨魚道甫問信今何如唐杜甫傳流落劍南會嚴武節度西川往依焉武以世舊待甫甚善雲溪友議甫曰不謂嚴挺之有此兒武恚目之曰杜審言孫擬捋虎鬚莊子列御寇篇朱泙漫學屠龍于支離益單千金之家三年技成而無所用其巧世説王子猷為桓沖騎兵參軍桓問曰卿何署答曰不知何署時見牽馬來似是馬曹杜甫傳甫客耒陽令嘗饋牛炙白酒大醉一夕卒揚子雕蟲篆刻壯夫不為韓詩文字鋭氣在輝輝見旌旄揚子般之揮斤羿之激矢莊子徐無鬼篇郢人堊漫其鼻端使匠石斫之運斤成風盡堊而鼻不傷宋元君召匠石為之曰臣則嘗能斫之雖然臣之質死久矣逍遙遊篇北溟有魚其名為鯤化而為鳥其名為鵬秋水篇莊子與惠子遊于濠梁之上莊子曰鯈魚出遊從容是魚樂也髙士傳張仲蔚常居窮素所處蓬蒿沒人送張安道赴南都留臺我公古仙伯超然羡門姿偶懷濟物志遂為世所縻黃龍遊帝郊簫韶鳳來儀終然反溟極豈復安籠池出入四十年憂患未嘗辭一言有歸意闔府諫莫移吾君信英睿搜士及茒茨無人長者側何以安子思歸來掃一室虛白以自怡遊于物之初世俗安得知我亦世味薄因循鬢生絲出處良細事從公當有時王注道科有仙卿仙伯如大茅君傳有云紫陽左公太極仙伯是也神仙傳王知逺謂弟子曰吾漸遊洞府仙曹除吾為少室仙伯史記封禪書秦始皇東遊海上求仙人羡門之屬應劭曰羡門名子髙古仙人也揚雄傳鳳凰巢其樹黃龍遊其沼瑞應圗黃龍居四龍之長神靈之精舜東巡狩黃龍負圖置舜前潘安仁秋興賦譬猶池魚籠鳥而有江湖之思莊子人間世虛室生白吉祥止止又田子方篇老𥅆曰吾遊于物之初韓退之示爽詩我老世味薄因循致留連又閔已賦在隱約以平寬固哲人之細事傅堯俞濟源草堂傅堯俞字欽之微官共有田園興老罷方尋隱退廬栽種成隂十年事倉黃欲買百金無先生卜築臨清濟喬木如今似畫圖鄰里亦知偏愛竹春來相與護龍雛管子十年之計莫如樹木杜反照詩荻岸如秋水松門似畫圖吳僧贊寧筍譜俗間謂筍為龍孫盧同詩萬籜抱龍孫攢迸溢林藪陸龍圖詵挽詩陸詵字介夫餘杭人以龍圖閣直學士知成都青苖法出詵言蜀峽刀耕火種民食常不足至種芋充飢願罷四路使者并言差役水利事皆不當改詔獨置成都府一路提舉省其三使詩云挺然直節庇峩岷蓋謂是也所歷桂延秦鳳晉真定成都六州秦鳳未上而改命詩云六州巷哭蓋總言之爾挺然直節庇峩岷謀道從來不計身屬纊家無十金産過車巷哭六州民塵埃輦寺三年别樽爼岐陽一夢新他日思賢見遺像不論宿草更沾巾禮記屬纊以俟絶氣漢揚雄傳家産不過十金乏無擔石之儲晏如也後漢祭遵傳喪還光武幸城門過其車騎孔叢子子産死鄭人巷哭三月晉羊祜傳祜卒南州人號慟罷市巷哭者聲相接王注東坡與介夫相别于京師而會于鳳翔故詩及之唐地里志鳯翔府貞觀七年置岐陽縣趙抃成都古今集記大聖慈寺思賢閣歷政知府一一繪像因以為名禮記曽子曰朋友之墓有宿草而不哭焉胡完夫母周夫人挽詞胡完夫名宗愈常州人柏舟髙節冠鄉鄰綘帳清風聳搢紳豈似凡人但慈母能令孝子作忠臣當年織屨隨方進晚節稱觴見伯仁回首悲涼便陳迹凱風吹盡棘成薪晉列女傳韋逞母宋氏父授以周禮音義逞仕苻堅為太常堅嘗幸太學問博士經典時博士盧壼曰惟周官禮注未有其師自非此母無可以傳授後生于是就宋氏家立講堂隔綘紗幔受業漢翟方進傳欲西至京師受經母憐其幼隨之長安織屨以給晉周伯仁注見本卷謝靈運廬陵王墓下詩道消結憤悶運開申悲涼晉王羲之蘭亭序俯仰之間已為陳迹詩國風凱風自南吹彼棘薪次韻栁子玉過陳絶糧二首風雨蕭蕭夜晦迷不須鳴呌強知時多才久被天公怪闕食惟應㸑婦知杜叟挽衣那及脛顔公食粥敢言炊詩人情味真嘗遍試問于今底處一作事虧詩國風風雨蕭蕭雞鳴膠膠小序風雨思君子也韓退之雙鳥詩天公怪兩鳥各捉一處囚杜子美同谷縣詩黃精無苖山雪盛短衣數挽不掩脛顔魯公乞米帖拙于生事舉家食粥來巳數月如我自觀猶可厭非君誰復肻相尋圗書跌宕悲年老燈火青熒語夜深早嵗便懷齊物意微官敢有濟時心南行千里成何事一聽秋濤萬鼓音江文通恨賦脫略公卿跌宕文史莊子有齊物論白樂天詩可惜濟時心力在潁州初别子由二首神宗青苖法既行子由度不能救以書抵介甫指陳其決不可者且請補外介甫大怒將加以罪同列止之除河南推官會張安道知陳州辟為教授東坡是時亦以論新法為介甫所嫉通判杭州出都來陳子由送至潁且同謁歐陽公而别蓋熙寧四年也征帆挂西風别淚滴清潁留連知無益惜此須臾景我生三度别此别尤酸冷念子似先君木訥剛且靜寡辭真吉人介石乃機警至今天下士去莫如子猛嗟我久病狂意行無坎井有如醉且墜幸未傷輒醒從今得間暇默坐消日永作詩解子憂持用日三省元微之别白樂天詩自識君來三度别遮回白盡老髭須周易吉人之辭寡又介於石不終日貞吉劉禹錫蠻子歌意行無舊路栁子厚愚溪對吾足蹈坎井頭抵木石莊子逹生篇醉者之墜車雖疾不死骨節與人同而患害與人異其神全也王注公赴詔獄供此詩言弟曽爭議新法不合乞罷既美其去果決亦是譏新法之不便也近别不改容逺别涕霑胸咫尺不相見實與千里同人生無離别誰知恩愛重始我來宛丘牽衣舞兒童便知有此恨留我過秋風秋風亦已過别恨終無窮問我何年歸我言嵗在東離合既循環憂喜迭相攻語此長太息我生如飛蓬多憂髮早白不見六一翁唐地里志陳州宛丘縣詩國風宛丘注云四方髙中央下曰宛丘李白南陵别兒童詩兒女歌笑牽人衣歐陽公自號六一居士歐陽少師令賦所蓄石屏何人遺公石屏風上有水墨希微蹤不畫長林與巨植獨畫峨眉山西雪嶺上萬嵗不長之孤松崖崩澗絶可望不可到孤煙落日相溟濛含風偃蹇得真態刻畫始信天有工我恐畢宏韋偃死葬虢山下骨可朽爛心難窮神機巧思無所發化為煙霏淪石中古來畫師非俗士摹寫物象略與詩人同願公作詩慰不遇無使二子含憤泣幽宫老子聽之不聞名曰希摶之不得名曰微王注松髙尺餘四時不改色今峩嵋有之朱景元歷代畫斷畢宏大歷二年為給事中畫松石于左省廳壁好事者皆以詩詠之韋偃工老松異石咫尺千尋駢柯攢景杜雙松圗詩天下幾人畫古松畢宏已老韋偃少陪歐陽公燕西湖王注潁州西湖謂公方壯鬚似雪謂公巳老光浮頰朅來湖上飲美酒醉後劇談猶激烈湖邉草木新著霜芙蓉晚菊爭煌煌插花起舞為公夀公言百嵗如風狂赤松共遊也不惡誰能忍飢啖仙藥巳將夀夭付天公彼徒辛苦吾差樂城上烏棲暮靄生銀缸畫燭照湖明不辭歌詩勸公飲坐無桓伊能撫筝漢揚雄傳口吃不能劇談宋玉髙唐賦玄木冬榮煌煌熒熒韓詩男兒不再壯百嵗如風狂史記張良世家願棄人間事從赤松子遊乃學辟榖道引輕身唐陸龜蒙曰我幾年來忍飢誦經乃食杞菊頤神養夀漢陳遵傳謂張竦曰足下苦身自約而我放意自恣官爵功名不減于子而差獨樂顧不優邪後漢童謡城上烏尾畢逋李太白詩姑蘇臺上烏棲時杜牧之詩暮靄生澤樹斜陽下小樓班孟堅西都賦金缸銜壁注缸燈盞也晉桓伊傳王國寶謝安女壻安惡其為人每抑制之國寶詭諛行于主相之間嫌隙遂成武帝召桓伊飲安侍坐命伊吹笛一弄乃請以筝歌伊撫筝而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患云云聲節慷慨俯仰可觀安泣下霑襟乃越席而就之捋其須曰使君于此不凡帝有愧色十月二日將至渦口五里所遇風留宿長淮久無風放意弄清快今朝雪浪滿始覺平野隘兩山控吾前吞吐久不嘬楚快切孤舟繫桑本終夜舞澎湃舟人更傳呼弱纜恃菅蒯平生傲憂患久矣恬百怪鬼神欺吾窮戲我聊一噫瓶中尚有酒信命誰能戒孟郊詩寒江浪起千堆雪禮記母嘬炙鄭氏注嘬謂一舉盡臠左傳齊髙固入晉師桀石以投人禽之乘其車繫桑本焉漢司馬相如上林賦洶涌澎湃左傳詩曰雖有絲麻無棄菅蒯韓退之感二鳥賦雖得之而不能乃鬼神之所戲莊子齊物篇大塊噫氣其名為風又見本卷船上小詩注出潁口初見淮山是日至夀州東坡嘗縱筆書此詩且題云豫年三十六赴杭倅過夀作此詩今五十九南遷至虔煙雨淒然頗有當年氣象也墨迹在吳興泰氏集作平淮墨迹作長淮今從墨迹我行日夜向江海楓葉蘆花秋興長長一作平淮忽迷天逺近青山久與船低昻夀州巳見白石塔短棹未轉黃茒岡波平風軟望不到故人久立煙蒼茫白樂天山鷓鴣詩黃茒岡頭秋日晚苦竹嶺上寒月低杜牧之詩河橋酒斾風軟候館梅花雪嬌杜樂遊園歌獨立蒼茫自詠詩夀州李定少卿出飢城東龍潭上山鴉噪處古靈湫亂沫浮涎繞客舟未暇然犀照竒鬼欲將燒燕出潛虯使君惜别催歌管村巷驚呼聚玃猴此地他年頌遺愛觀魚并記老莊周延平志苦竹潭在尤溪縣西潭有五龍人常見之有魚者棹舟潭上龍吐涎沫舟膠不能進晉溫嶠然犀事注見第二卷吕氏春秋梁園之北黎丘有竒鬼焉善效人之子姪弟昆好扶邑之丈人而道苦之張華博物志燒燕肉而致龍物類相感志龍之為性粗猛而畏鐵愛玉及空青而嗜燒燕肉故食燕肉之人不可渡江海潛虯注見第一卷左傳子産卒仲尼聞之出涕曰古之遺愛也莊周觀魚注見本卷濠州七絶塗山公自注下有鯀廟山前有禹會村唐地理志濠州鍾離縣有塗山九域志當塗城塗山氏之邑川鎖支祁水尚渾地埋汪罔骨應存樵蘇已入黃熊廟烏鵲猶朝禹會村古嶽瀆經禹理淮水三至桐柏水功不能興禹怒召集百靈搜命九馗乃獲淮渦水神名無支祁善應對言語辨淮之淺深原隰之逺近形若猿猱縮鼻髙額青軀白首金目雪牙頸伸百只力輸五象搏擊騰趠疾奔輕利倐忽之間視之不可久禹授之同律同律不能制授之烏木田烏木田不能制授之庚神庚神遂頸鎖大鐵鼻穿金鈴徙淮之隂龜山之足淮水乃安流注于海李肇國史補永泰初楚州有漁者于淮中釣得古鎖不絶以告刺史李陽大集人力引之鎖窮有獼猴躍復沒國語禹致羣臣于會稽之山防風氏後至殺而戮之其骨節専車防風汪罔氏之君也罔一作芒􅐱道元水經注引春秋左傳哀公七年大夫對孟孫曰禹會諸侯于塗山執玉帛者萬國杜預注塗山在夀春東北今濠州是蘅按栁子厚塗山銘塗山巖巖界彼東國亦指在濠州而吳越春秋則以塗山在會稽應劭云塗山在永興北説者謂即今會稽蕭山縣至于蘇鶚演義又云塗山有四一會稽二渝州三濠州四當塗顧其處皆有禹迹未詳孰是姑並著之漢韓信傳樵蘇後㸑顔師古曰樵取薪蘇取草左傳堯殛鯀于羽山其神化為黃熊國語作黃能能奴來切三足鱉也彭祖廟公自注有雲母山云彭祖所採服也跨歷商周看盛衰欲將齒髮鬬蛇龜空餐雲母連山盡不見蟠桃著子時神仙傳彭祖帝顓頊玄孫姓籛名鏗歷夏至商已七百餘嵗而不衰又云彭鏗善補導之術并服术桂雲母粉麋角常有少容漢武故事武帝七月七日與王母會遺帝蟠桃七大如彈丸帝留核欲種母曰此桃三千年一生實何可待也博物志亦云逍遙臺公自注莊子祠堂在開元寺即墓為堂常怪劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懷晉劉伶傳常乘鹿車携一壺使人荷鍤隨之曰死便埋我莊子列御寇篇莊子將死弟子欲厚葬之莊子曰在上為烏鳶食在下為螻蟻食奪彼與此何其偏也觀魚臺九域志濠州有莊子觀魚臺欲將同異較錙銖肝膽猶能楚越如若信萬殊歸一理子今知我我知魚陸士衡文賦考殿最于錙銖鄭玄禮記注八兩為錙漢律歷志二十四銖而成兩莊子德充符篇仲尼曰自其異者視之肝膽楚越也自其同者視之萬物皆一也淮南子斟酌萬殊陸士衡文賦體有萬殊物無二量莊子秋水篇莊子與惠子遊于濠梁之上莊子曰鯈魚出逰從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂又曰既已知吾知之而問我我知之濠上也互見本卷讀杜詩注虞姬墓九域志隂陵城項羽迷失道于此蓋虞姬死所帳下佳人拭淚痕門前壯士氣如雲倉黃不負君王意只有虞姬與鄭君漢鄭當時傳其先鄭君嘗事項籍籍死而屬漢髙祖令故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君四望亭公自注太和中刺史劉嗣之立李紳以太子賔客分司東都過濠為作記記今存而亭廢者數年矣頽垣破礎沒柴荆故老猶言短李亭敢請使君重起廢落霞孤鶩換新銘唐李紳傳為人短小精悍于詩最有名時號短李白樂天詩間吟短李詩又借教短李作歌行史記太史公自序孔子修舊起廢王勃滕王閣記落霞與孤鶩齊飛秋水共長天一色浮山洞公自注洞在淮上夏潦不能及而冬不加髙故人疑其浮也人言洞府是鼇宫升降隨波與海通共坐船中那得見乾坤浮水水浮空列子湯問篇渤海之東有大壑焉實惟無底之谷其中有五山焉一曰代輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊五山之根無所連著常隨潮波上下往還不得暫峙焉仙聖毒之訴之于帝帝使巨鼇十五舉首而戴之晉天文志天地各乘氣而立載水而行故黃帝書曰天在地外水在天外水浮天而載地者也杜洞庭詩乾坤日夜浮泗洲僧伽塔公自記泗洲大聖傳云和尚何國人也又曰世莫知其所從來云不知何國人也近讀隋書西域傳乃有何國余在惠州忽被命責儋耳太守方子容自携告身來且語余曰此固前定無可恨吾妻沈素事僧伽謹甚一夕夢和尚告别沈問所往答云當與蘇子瞻同行後七十二日當有命今適七十二日矣豈非前定乎豫以謂事之前定者不待夢而知然豫何人也而和尚辱與同行得非夙世有少緣契乎參寥有詩志此事我昔南行舟繫汴逆風三日沙吹面舟人共勸禱靈塔香火未收旗腳轉回頭頃刻失長橋却到龜山未朝飯至人無心何厚薄我自懷私欣所便耕田欲雨刈欲晴去得順風來者怨若使人人禱輒遂造物應須日千變我今身世兩悠悠去無所逐來無戀得行固願留不惡每到有求神亦倦退之舊云三百尺澄觀所營今巳換不嫌俗士汙丹梯一看雲山繞淮甸漢衛青傳大風起沙礫擊面杜詩步壑風吹面泗州圗經龜山水陸院在城東三十里宋元嘉中文帝遣臧質拒魏太武于此山築長城造浮橋絶水路韓退之送僧澄觀詩僧伽後出淮泗上勢到衆佛尤魁竒清淮無波平如席欄柱傾扶半天赤火燒水轉掃地空突兀便髙三百尺借問經營本何人道人澄觀名籍籍孔稚圭北山移文請回俗士駕謝靈運擬鄴中詩屣步陵丹梯龜山九域志泗州盱眙縣龜山鎮我生飄蕩去何求再過龜山嵗五周身行萬里半天下僧卧一菴初白頭地隔中原勞北望潮連滄海欲東遊元嘉舊事無人記故壘摧頽今在不公自注宋文帝遣將拒魏太武築城此山按元嘉文帝紀年也杜子美詩我生苦飄蕩韓退之别知賦將嵗行之兩周十洲記滄海島在北海中水皆滄色仙人謂之滄海發洪澤中塗遇大風復還九域志楚州淮隂縣洪澤鎮風浪忽如此吾行欲安歸挂帆郤西邁此計未為非洪澤三十里安流去如飛居民見我還勞問亦依依携酒就船賣此意厚莫違醒來夜巳半岸木聲向微明日淮隂市白魚能許肥我行無南北適意乃所祈何勞弄澎湃終夜搖窗扉妻孥莫憂色更典篋中衣晉謝安傳與孫綽等泛海風起浪湧安吟嘯自若舟人猶去不止風轉急安徐曰如此將毋歸邪舟人承言即回衆咸服其雅量九歌湘君章使江水兮安流李白詩巴水急如箭巴船去如飛杜子美詩白魚如切玉又溪友得錢留白魚一作溪女杜别贊上人詩是身如浮雲安可限南北澎湃注見本卷杜詩朝回日日典春衣韓退之詩篋中有餘衣十月十六日記所見風髙月暗雲水一作水雲黃淮隂夜發朝山陽山陽曉霧如細雨炯炯初日寒無光雲收霧卷巳亭午有風北來寒欲僵忽驚飛雹穿户牖迅駛不復容遮防市人顛沛百賈亂疾雷一聲如頽墻使君來呼晚置酒坐定巳復日照廊恍疑所見皆夢寐百種變怪旋消亡共言蛟龍厭舊穴魚鱉隨徙空陂塘愚儒無知守章句論説黑白推何祥惟有主人言可用天寒欲雪飲此觴九域志楚州山陽郡淮隂縣在州西四十里漢于定國傳永光元年春霜夏寒日青無光白樂天詩白日冷無光黃河凍不流莊子齊物論疾雷破山韓退之詩天昏地黑蛟龍移雷驚電激雄雌隨清泉百丈化為土魚鱉枯死吁可悲漢張湯傳博士狄山曰和親便上問湯湯曰此愚儒無知夏侯勝傳章句小儒破碎大道漢五行志言之不從則有白眚白祥聽之不聰則有黑眚黑祥廣陵會三同舍各以其字為韻仍邀同賦劉貢父劉貢父名攽公有送劉攽倅海陵詩見本卷錢公輔字君倚時正在郡賢主人謂君倚也去年送劉郎醉語巳驚衆如今各漂泊筆硯誰能弄我命不在天羿彀未必中作詩聊遣意老大慵譏諷夫子少年時雄辨輕子貢爾來再傷弓戢翼念前痛廣陵三日飲相對恍如夢况逢賢主人白酒撥春甕竹西巳揮手灣口猶屢送羡子去安間吾邦正喧鬨韓退之寄盧同詩往年弄筆嘲同異怪辭驚衆謗不巳莊子德充符遊于羿之彀中中央者中地也然而不中者命也史記孔子弟子傳子貢利口巧辭孔子嘗黜其辨杜飲中八仙歌焦遂五斗方卓然髙談雄辨驚四筵荀子傷弓之鳥見曲木而驚毛詩鴛鴦在梁戢其左翼戰國策有鴻鴈從東方來更羸引弓虛發而下之魏王曰射可至此乎更羸曰此孽也其飛徐而鳴悲故瘡未息而驚心未去也聞弦音烈而髙飛故瘡隕也九域志揚州廣陵郡杜羌村詩夜闌更秉燭相對如夢寐杜牧之禪智寺詩誰知竹西路歌吹是揚州灣口見揚州地志烏臺詩話云熙寧四年十一月赴杭州通判寄劉攽詩云吾邦正喧鬨言杭州監司所聚初行新法事多不便孫巨源孫巨源名洙廣陵人在諌院時王介甫行新法多逐諫官御史巨源心知不可而鬱鬱不能有所言但懇乞補外知海州既會于此東坡與劉貢父劉莘老皆坐論新法以去巨源既同舍雅相厚又居諫省而此詩云終嵗不及門則異趣可見又用栁子厚王孫猿事終以巨源絶交之句其責之深矣三年客京輦憔悴難具論揮汗紅塵中但隨馬蹄翻人情貴往返不報生禍根坐令平生友終嵗不及門南來實清曠但恨無與言不謂廣陵城得逢劉與孫異趣不兩立譬如王孫猿吾儕久相聚恐見疑排拫我褊類中散子通真巨源絶交固未敢且復東南奔史記蘇秦傳揮汗成雨班孟堅西都賦紅塵四合煙雲相連栁子厚憎王孫文猿王孫居異山德異性不能相容猿之德靜以常王孫之德躁以囂雖羣不相若也漢灌夫傳竇嬰失藝亦欲倚夫引繩排拫生平慕之後棄者孟康曰拫音痕欲引繩以彈排擯拫格之也晉嵇康傳初婚魏宗室拜中散大夫康作幽憤詩曰惟此褊心顯明臧否又與山濤絶交書云足下旁連多可而少怪書見文選山濤字巨源沈傳師嶽麓寺詩承明年老輒自論乞得湘守東南奔劉莘老劉莘老名摯極論新法章數上中丞楊繪亦言其非安石使曾布作十難折之仍詰兩人向背好惡之情繪懼謝罪莘老獨奮曰為人臣豈可壓于權藝使天子不知利害之實即條對所難以伸其説又云若謂向背則臣所向者義所背者利所向者君父所背者權臣安石大怒將竄嶺外上不聽謫監衡州鹽倉初安石黨友傾一時造作言語以為幾于聖人至是遂以其學亂天下先生詩士方在田里云云謂此也江陵昔相遇幕府稱上賔再見明光宫峩冠挹揖同搢紳如今三見子坎坷為逐臣朝遊雲霄間欲分丞相茵莫落江湖上遂與屈子鄰了不見喜愠子豈真可人邂逅成一歡醉語出天真士方在田里自比渭與莘出試乃大謬芻狗難重陳嵗晚多霜露歸耕當及辰唐地理志江陵本荆州南郡天寶元年更郡名漢馮唐傳上功幕府晉郗超傳謝安曰郗生可謂入幕之賔莘老嘗在荆州幕府故云漢武故事上起明光宫發燕趙美女二千人充之杜子美詩明光起草人所羡漢丙吉傳馭吏醉嘔丞相車上吉曰苐忍之不過汚丞相車茵耳漢酷吏周陽由傳同車未嘗敢均茵伏韓退之赴江陵詩朝為青雲士暮作白首囚楚辭離騷序遷之江南晉嵇康傳王戎自言與康居山陽二十年未嘗見其喜愠之色桓溫傳嘗經王敦墓曰可人可人詩國風邂逅相遇適我願兮杜寄李白詩劇談憐野逸嗜酒見天真漢司馬遷報任安書事乃有大謬不然者莊子天運篇芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而㸑之施注蘇詩卷三
