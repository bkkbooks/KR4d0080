body:
  text: 施注蘇詩序古今詩人之總萃唐則子美宋則子瞻顧兩家箋注之難前輩屢言之先大人常取杜詩千家注疏瀹剔抉殫二十年之力屢易稿而後成宋中丞漫堂先生為序以行世若東坡詩注惟永嘉王氏之書盛行而踳駮迭見識者譏焉余少時讀渭南集知有吳興施司諫所注蘇詩每購之而不可得意當世巳無其書獨時取放翁序讀之因以窺見作者用意之深與後人發眀之不易而司諫之書愈往來余心矣漫堂獲宋槧本於吳中舊家其間闕軼凡十二卷乃屬門人子弟訂補之盡抉永嘉之瑕纇而亦間採其菁英以助施氏之闕遺余讀之心開目張為之狂喜蓋施氏體宗編年一洗永嘉分類之陋而援引必著書名詮詁不乖本事又於注題之下務闡詩旨引事徴詩因詩存人使讀者得以考見當日之情事與少陵詩史同條共貫洵乎其有功玉局而度越梅溪也漫堂宏材博識儒雅風流翹然為今代之子瞻畫戟凝香賞奇汲古獨與眉山曠世相感宜其眷眷於是書而余亦得見所未見以償夙昔之䫟不誠厚幸哉後之學者因注而得其詩因詩而得其人毋沾沾焉考爾雅之魚蟲拾離騷之香草為誇多鬬靡之具也夫少陵自許稷契志不忘君東坡忠規讜論挺挺大節其人皆百世之師光焰萬丈不可磨滅所謂詩外尚有事在者資其言語文章以為髙山景行知注之不可遺兼知注之不可泥則兩得之矣斯固曩者先大人讀杜之微意而亦今日漫堂先生表章蘇氏之盛心歟余承命獲與挍讎竊幸挂名其間為序其大槩如此若夫補亡訂誤援據精核則毗陵邵子湘之力為多云康熙庚辰上巳日滏陽張榕端序
  hash: sha256:aac334856b004232d33e7c606052c1963dbebd212e2cdbccdd5a91fda7445b61
