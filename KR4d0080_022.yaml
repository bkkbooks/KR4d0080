body:
  text: 施註蘇詩巻八宋蘇軾撰施元之原註武進邵長蘅刪補詩五十九首熙寧甲寅在錢塘聞移知宻州之命去杭經常潤道中作施註缺今補賀陳述古弟章生子鬱蔥佳氣夜充閭始見徐卿第二雛甚欲去為湯餅客惟愁錯寫弄麞書參軍新婦賢相敵阿大中郎喜有餘我亦從來識英物試教啼看定何如晉書賈逵晩始生充言後當有充閭之慶故以為名字馬杜子美詩徐卿二子生絶竒又丈夫生兒有如此二雛者名位豈肻卑微休唐明皇王后恩寵日衰不自安一日訴曰三郎獨不記阿忠脫新紫半臂換一斗麫為生日湯餅耶上戚然閔之又李林甫舅子姜度妻誕子林甫手書慶之曰聞有弄麞之慶客視之皆掩口世說王渾與婦鍾氏共坐見武子從庭過渾欣然謂曰生兒如此足慰人意婦笑曰若使新婦得配參軍生兒故可不啻如此注渾弟倫字太冲醇粹簡逺貴老莊之學歴大将軍參軍年二十五卒又謝道韞曰一門叔父則有阿大中郎晉桓溫生未期温嶠見之曰此兒有竒骨可試使啼及聞其聲曰真英物也父彛以嶠賞遂名曰温贈治易僧智周寒牕孤坐凍生缾尚把遺編照露螢閣束九師新得妙夢吞三畫舊通靈斷絃挂壁知音䘮公自注師與契嵩深相知時已逝矣揮麈空山亂石聽齋罷何須更臨水胸中自有洗心經唐鄭棨詩凍缾粘柱礎續晉陽秋車􅏷字武子就業恭勤博覽不倦家貧不常得油夏月則練囊盛數十螢火以繼日焉漢淮南王安聘明易者九人號九師文中子云九師興而易道微晉庾翼傳京兆杜乂陳郡殷浩並才名冠世而翼弗之重也每語人曰此輩宜束之髙閣俟天下太平然後議其任耳韓退之詩春秋三傳束髙閣三國呉虞翻立易註奏上曰臣郡吏陳桃夢臣與道士相遇布易六爻撓其三以飲臣臣乞盡吞之道士言易道在天三爻足矣聚石談經注詳本巻虎邱寺詩晉書佛圖澄嘗齋時至流水從腹旁引出五臓六腑洗之訖還納腹中張子野年八十五尚聞買妾述古令作詩錦里先生自笑狂莫欺九尺鬢睂蒼詩人老去鸎鸎在公子歸来燕燕忙柱下相君猶有齒江南刺史已無腸平生謬作安昌客畧遣彭宣到後堂王注成都謂之錦官城亦謂之錦里杭州臨安錢王時賜名衣錦城而先生臨安三絶又有題名錦溪今借用杜詩錦里先生字以言子野杜子美詩張公一生江海客身長九尺䰅眉蒼麗情集唐貞元初有張君者遇崔氏女於蒲崔小名鸎鸎元稹為作㑹真三十韻嘗與李紳語其事紳又作鸎鸎歌漢成帝時童謡曰鷰鷰尾涎涎張公子時相見一說張祐妾名鷰鷰漢書張蒼自秦為御史主柱下方書漢文帝時為丞相十餘年免相後口中無齒食乳女子為乳母妻妾以百數年百嵗餘乃卒唐劉禹錫罷蘇州過揚州帥杜鴻漸飲大醉席上與司空詩云司空見慣渾閑事斷盡蘇州刺史腸白樂天山㳺示小妓詩莫唱楊栁枝無腸與君斷漢書張禹弟子尤著者彭宣戴崇崇每候禹責師宜置酒設樂與弟子相娱禹将崇入後堂飲食婦女相對優人絃管鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義未嘗得至後堂禹封安昌侯書雙竹湛師房二首我本西湖一作江湖一釣舟意嫌髙屋冷颼颼羡師此室纔方丈一炷清香盡日留維摩經三萬二千師子座入維摩方丈室中無所妨礙暮鼓朝鐘自擊撞閉門孤枕對殘缸白灰旋撥通紅火卧聴蕭蕭雨一作雪打牕韓退之詩文章自娱嬉金石日擊撞寳山新開徑藤梢橘刺元無路竹杖㯶鞋不用扶風自逺來聞笑語水分流處見江湖回觀佛骨青螺髻踏遍仙人碧玉壺野客歸時山月上棠棃葉戰暝禽呼杜子美詩竹寒沙碧浣花溪橘刺藤梢咫尺迷梁武帝改造阿育王寺塔塔下得佛髪青紺色以手伸之隨手長短放之則右旋屈為螺形也白樂天詩天寒路曠何處宿棠梨葉戰風颼颼和述古冬日牡丹四首一朶妖紅翠欲流春光回照雪霜羞化工只欲呈新巧不放閑花得少休王注先生詩案云此譏諷執政之人以化工比之也花開時節雨連風郤向霜餘梁爛紅漏泄春光私一物此心未信出天工杜子美詩侵陵雪色還萱草漏泄春光有栁條當時只道鶴林仙能遣秋花發杜鵑誰信詩能回造化直教霜枿蘖同放春妍潤州鶴林寺杜鵑重九開花為殷七七事詩意夲此詳見五巻後十餘日復至詩注不分清霜入小園故将詩律變寒暄使君欲見藍關詠更倩韓郎為染根唐小說韓湘退之姪孫自言能開頃刻花愈曰子豈能奪造化乎湘乃聚土以盆覆之俄而舉盆開碧牡丹二朶葉有小字云雲横秦嶺家何在雪擁藍闗馬不前愈後謫潮州至藍闗遇雪乃悟今集中有示姪孫湘詩太平廣記唐元和中韓湘於退之後堂前染白牡丹一叢云來春必作含稜碧色四靣各有一朶五色者自劚其根下置藥而後培之及花開朶数一如其説和錢安道寄惠建茶我官於南今幾時嘗盡溪茶與山茗胷中似記故人靣口不能言心自省為君細說我未暇試評其畧差可聴建溪所産雖不同一一天與君子性森然可愛不可慢骨清肉膩和且正雪花雨腳何足道啜過始知真味永縱復苦硬終可録汲黯少戇寛饒猛草茶無頼空有名高者妖邪次頑懭一作礦體輕雖復强浮汎性滯偏工嘔酸冷其間絶品豈不佳張禹縱賢非骨鯁葵花玉􅙧不易致道路幽險隔雲嶺誰知使者來自西開緘磊落收百餅嗅香嚼味本非别透紙自覺光炯炯粃糠團鳳友小龍奴𨽻日注臣雙井收藏愛惜待佳客不敢包裹鑽權倖此詩有味君勿傳空使時人怒生癭王注雪花雨腳謂茶也見駢珠集漢書武帝曰吾欲云云汲黯對曰陛下内多欲而外施仁義上怒變色而罷朝退謂人曰甚矣汲黯之戇也又蓋寛饒為司𨽻校尉好言事犯上意鄭昌訟寛饒有曰山有猛獸藜藿為之不採漢書張禹贊曰禹以儒宗居相位其醖藉可也然持禄保位被阿䛕之譏盧仝謝孟諫議茶歌開緘宛見諫議靣手閲月團三百片歸田録茶品莫貴於龍鳯團凡八餅重一斤慶歴中蔡君謨為福建運使始造小片龍團以進其品精絶謂之小龍團凡二十片重一斤每南郊致齋中書樞宻各賜一餅宫人縷金其上其貴重如此又龍團始於丁晉公成於蔡君謨歐陽永叔歎曰君謨士人也何至作此事茶譜草茶盛於兩浙品以日注為第一景祐以來洪州雙井白芽漸盛近嵗制作尤精其品遂出日注上三國志賈逵為𢎞農太守與典農校尉争公事不得理發憤生癭王注公詩案云此詩以譏世之小人乍得權用不知上下之分妖邪頑懭體輕性滯皆隂斥之也和栁子玉喜雪次韻仍呈述古詩翁愛酒長如渇缾盡欲沽囊巳竭燈青火冷不成眠一夜撚䰅吟喜雪詩成就我覓歡處我窮正與君髣髴曷不走投陳孟公有酒醉君仍飽徳瓊瑤欲盡天應惜更遣清光續殘月安得佳人擢素手笑捧玉盌兩竒絶艶歌一曲回陽春坐使髙堂生暖熱賈島詩吟安一個字撚斷數莖鬚古詩纎纎擢素手韓詩㑹合聫句茗盌纎纎捧白樂天詩艶歌一曲酒一杯弔天竺海月辯師三首欲尋遺跡彊沾裳本自無生可得亡今夜生公講堂月滿庭依舊冷如霜張湛列子註夲是無生故曰不死劉禹錫詩生公說法鬼神聴身後空堂夜不扃高坐寂寥塵漠漠一方明月可中庭生死猶如臂屈伸情鍾我軰一酸辛樂天不是蓬萊客慿仗西方作主人情鍾注見第七巻逰東西巖詩樂天與果上人訣别詩不須惆悵從師去先請西方作主人欲訪浮雲起滅因無縁郤見夢中身安心好住王文度此理何須更問人晉王坦之傳字文度與沙門竺法師甚厚毎共論幽明報應後經年法師來云貧道已死罪福皆不虛惟當勤修道徳以升濟幽明耳言訖不見李頎秀才善畫山以兩軸見寄仍有詩次韻答之平生自是箇中人欲向漁舟便寫真詩句對君難出手雲泉勸我早抽身年來白髪驚秋速長恐青山與世新從此北歸休悵望囊中收得武陵春劉禹錫詩不改南山色其餘事事新雪後至臨平與栁子玉同至僧舎見陳尉烈落帆古戍下積雪高如邱强邀詩老岀疎髯散颼飅僧房有宿火手足漸和柔静士素寡言相對自忘憂銅爐擢煙穟石鼎浮霜漚我行雖有程坐穩且復留大哉天地間此生得浮遊夜至永樂文長老院文時卧病退院夜聞巴叟卧荒村來打三更月下門往事過年如昨日此身未死得重論老非懐土情相得病不開堂道益尊惟有孤栖舊時鶴舉頭見客似長言栁氏二外甥求筆迹二首退筆如山未足珎讀書萬巻始通神君家自有元和腳莫厭家雞更問人太平廣記僧智永學書敗筆如邱山懐素筆塜見苐二巻醉墨堂詩注杜子美詩書貴瘦硬方通神唐栁公權在元和間書有名劉禹錫酬栁宗元詩栁家新様元和腳且盡薑芽斂手徒南史王僧䖍傳庾征西翼書少時與王右軍齊名右軍後進庾猶不分在荆州與都下人書云小兒軰賤家鷄皆學逸少書一紙行書兩絶詩遂良䰅鬢巳成絲何當火急傳家法欲見誠懸筆諫時唐禇遂良有一帖云即日遂良䰅髪盡白栁公權字誠懸唐穆宗問公權用筆法對曰心正則筆正筆正乃可法矣帝為改容悟其筆諫也錢安道席上令歌者道服錢安道名顗為御史謫官烏府先生鐵作肝霜風巻地不知寒猶嫌白髮年前少故㸃紅燈雪裏看他日卜鄰先有約待君投紱我休官如今且作華陽服醉唱儂家七返丹漢御史府中列柏樹常有野烏數千棲宿其上晨出暮來號為朝夕烏茅山志華陽洞在茅山側三茅二許俱得道於此金龍玉簡多投其中華陽玉柱洞中懸石乳其大如椽古歌七還七返三五一龍虎相交入塊室吕仙翁詞七返還丹在人先須煉餌道書大還秘契圖從寅至申為七返郤至坤為九還除夜野宿常州城外二首行歌野哭兩堪悲逺火低星漸向微病眼不眠非守嵗鄉音無伴苦思歸重衾腳冷知霜重新沐頭輕感髪稀多謝殘燈不嫌客孤舟一夜許相依南來三見嵗云徂直恐終身走道塗老去怕看新歴日退歸擬學舊桃符煙花已作青春意霜雪偏尋病客䰅但把窮愁博長健不辭最後飲屠酥風俗通縣官以臘除夕飾桃人垂葦茭畫虎於門通典周人木徳以桃為梗言氣相更也桃梗今之桃符崔實四民月令元旦進椒柏酒次第從少至老今屠酥其遺意也元日過丹陽明日立春寄魯元翰堆盤紅縷細茵陳巧與椒花兩鬬新竹馬異時寜信老土牛明日莫辭春西湖弄水猶應早北寺觀燈欲及辰白髮蒼顔誰肎記曉來頻嚏為何人風土記元日作五辛盤庾肩吾詩聊傾柏葉酒試奠五辛盤杜詩注茵陳蒿類經冬不死更因舊苗而生故名茵陳晉書劉臻妻陳氏元日獻椒花頌庾信詩椒花逐頌來白樂天詩一見竹馬戯每思童騃時月令出土牛以送寒氣北寺在潤州上元最盛詩國風願言則嚏古纒頭曲按先生此詩為琵琶女子作杜詩註纒頭以賞歌舞者鵾絃鐵撥世無有樂府舊工惟尚叟一生喙硬眼無人坐此困窮今白首翠鬟女子年十七指法巳是呼韓婦驚帆渡海風掣迴滿靣塵沙和淚垢青衫不逢湓浦客紅袖謾插曹綱手爾來一見哀駘佗便著臂韝躬井臼我慙貧病百不足强對黄花飲白酒轉闗濩索動有神雷輥空堂戰牕牖四絃一抺擁袂立再拜十分為我夀世人只解錦纒頭與汝作詩傳不朽段安節琵琶録開元中賀懐智善琵琶以石為槽鵾鷄筋作絃用鐵撥彈之漢書有呼韓邪單于白樂天琵琶詩序送客湓浦口聞舟中夜彈琵琶問其人本長安倡女年長色衰嫁為商人婦樂天為作琵琶行結句就中泣下誰最多江州司馬青衫濕琵琶錄曹綱運撥如風雨裴興奴長於攏撚人謂綱有右手奴有左手樂天詩誰能截得曹綱手插向重蓮衣袖中荘子衛有惡人曰哀駘佗婦人見之請於父母曰與為人妻寜為夫子妾者數十而未止也史記淳于髠傳帣韝鞠􅎽侍酒於前注韝臂捍也漢書東方朔傳董君綠幘傅韝樂譜琵琶曲有轉闗六么濩索梁州皆其名也唐僧善本彈六么曲下撥一聲如雷發妙絶入神白樂天琵琶行曲終收撥當心畫四絃一聲如裂帛唐開元時王元寳嘗㑹賔客元寳富於財而無文采親友問昨來高㑹有何佳談元寶視屋良久曰但費錦纒頭耳杜子美詩笑時花近眼舞罷錦纒頭刁同年草堂不用長竿矯繡衣南園北第兩参差青山有約長當户流水無情自入池嵗久酴醿渾欲合春來楊栁不勝垂主人不用悤悤去正是紅梅着子時晉書阮咸與叔父籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服皆錦綺燦目咸以竿挂大布犢鼻於庭人或怪之答曰未能免俗聊復爾耳惠山謁錢道人烹小龍團登絶頂望太湖踏遍江南南岸山逄山未免更留連獨攜天上小團月來試人間第二泉石路縈回九龍脊水光翻動五湖天孫登無語空歸去半嶺松聲萬壑傳晉書阮籍嘗於蘇門山遇孫登與商畧終古及棲神導氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳳之音響乎巖谷乃登嘯也錢道人有詩云直須認取主人翁作兩絶戯之首斷故應無斷者冰銷那復有冰知主人若一作苦苦令儂認認主人人竟是誰圓覺經菩薩常覺不住照與照者同時寂滅譬如有人自斷其首巳斷故無能斷者又如湯銷冰無别有冰知冰銷者存我覺我亦復如是傳燈錄譬如寒月水結為冰及至煖時冰釋為水有主須還更有賔不如無鏡自無塵只從半夜安心後失卻當年覺痛人六祖詩菩提本無樹明鏡亦非臺本來無一物何䖏惹塵埃慧可安心注見前楞嚴經畢陵伽婆蹉言毒刺傷足我身疼痛覺清淨心無痛痛覺和蘇州太守王規父侍太夫人觀燈之什余時以劉道原見訪滯留京口不及赴此㑹二首不覺朱轓輾後塵爭看繡幰錦纒輪洛濱侍從三人貴京兆平反一笑春但逐東山攜妓女那知後閤走窮賓滯留不見榮華事空作賡詩第七人晉汝南王亮傳伏太妃嘗有小疾祓於洛水亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登凌雲臺望見曰伏姊可謂富貴矣漢書雋不疑為京兆尹毎行縣錄囚還其母問不疑多有所平反母喜笑為飲食言語或無所出母怒為不食漢書㳺俠傳陳遵毎大飲輙闗門取客車轄投井中雖有急終不得去嘗有部刺史奏事過遵値其方飲刺史大窮候遵霑醉時突入見遵母叩首白當對尚書有期㑹状母乃令從後閤出去翻翻緹騎走香塵激激飛濤射火輪美酒留連三夜月豐年傾倒五州春公自注時浙西皆不熟罷燈惟蘇獨盛安排詩律追彊對蹭蹬歸期為惡賔墮珥遺簮想無限華胥猶見夢回人後漢百官志執金吾緹騎二百人强對字出晉書西京雜記公孫𢎞為丞相故人高賀從之𢎞食之脫粟飯覆以布被賀怒曰何用故人富貴為脱粟布被我自有之𢎞大慙賀告人曰公孫内服貂蟬外衣麻枲内厨五鼎外膳一肴云何以示天下於是朝廷疑其矯馬𢎞聞之歎曰寜逢惡賔不逢故人史記滑稽傳淳于髠言州閭之㑹前有墮珥後有遺簮舊唐書𤣥宗毎年十月幸華清宫國忠姊妹五家扈從毎家為一隊遺鈿墜珥瑟瑟珠翠燦爛芳馥於路列子黄帝居大庭之館齊心服形三日不親政事晝寝而夢遊華胥氏之國成都進士杜暹伯升出家名法通往來吴中欲識當年杜伯升飄然雲水一孤僧若教俯首隨韁鎖料得如今似我能公自注栁子玉云通若及第不過似我虎邱寺先名海湧山吴越春秋闔閭葬國西發五都之士十萬人作冢銅棺三重水銀為池金玉為鳬鴈扁諸之劔三千槃郢魚腸在焉𦵏後三日金精之氣上揚化為虎踞其墳故號虎邱入門無平田石路穿細嶺一作細穿隂風生澗壑古木翳潭井湛盧誰復見秋水光耿耿鐵花秀巖壁殺氣噤蛙黽幽幽生公堂左右立頑礦當年或未信異類服精猛胡為百嵗後仙鬼互馳騁窈然留清詩讀者為悲哽東軒有佳致雲水麗千頃熙熙覽生物春意破凄冷我來屬無事暖日相與永喜鵲翻初旦愁鳶蹲落景坐見漁樵還新月溪上影悟彼良自咍歸田行可請吳越春秋越王允常使歐冶子鑄五劍曰純鈎湛盧豪曹魚腸巨闕以湛盧獻吳吳公子光以弑其君僚湛盧夜飛入楚十道四蕃志生公異僧竺道生也講經於此人無信者乃聚石為徒與談至理石皆㸃頭寺今有生公講堂山志寺中有鐵花巖在劔池之側又清逺道士與沈恭子同逰虎邱有詩歴論商周及近代二千年事顔真卿為之刻石又鬼詩青松多悲風蕭蕭清且哀白日徒昭昭不照長夜臺李道昌為刺史奏其事陸龜䝉皮日休松陵唱和皆及之杜子美詩蒹葭離披去天水相與永常潤道中有懐錢塘寄述古五首從來直道不辜身得向西湖兩過春沂上巳成曾㸃服泮宫初采魯侯芹休驚嵗嵗年年貌且對朝朝暮暮人細雨晴時一百六畫船鼉鼓莫違民詩魯頌思樂泮水薄采其芹唐劉希夷詩年年嵗嵗花相似嵗嵗年年人不同宋玉神女賦朝朝暮暮陽臺之下荆楚嵗時記去冬節一百五日即有疾風甚雨謂之寒食據歴日在清明前二日亦有云去冬至一百六日草長江南鸎亂飛年來事事與心違花開後院還空落燕入華堂怪未歸世上功名何日是樽前㸃檢㡬人非去年栁絮飛時節記得金籠放雪衣公自注抗人以放鴿為太守夀南史邱遲書莫春三月江南草長雜花生樹羣鶯亂飛白居易詩樽前百事皆依舊㸃檢惟無薛秀才王注唐譚賓録曰天寶中嶺南獻白鸚鵡飬之宫中嵗久頗聰慧通曉言詞上及貴妃呼為雪衣此呼鴿為雪衣借用故事也浮玉山頭日日風湧金門外已春融二年魚鳥渾相識三月鶯花付與公剩看新翻眉倒暈未應泣别臉消紅何人織得相思字寄與江邊北向鴻浮玉即金山也劉夢得詩山頭日日風和雨杭州圖經湧金門外錢塘縣韓退之詩朝遊孤嶼南暮遊孤嶼北所以孤嶼鳥與公盡相識世說簡文入華林園云覺魚鳥自來親人又詳注十一巻王注當時新翻睂様謂之倒暈在横雲卻月逺山蛾睂之外先生嘗有詩云倒暈眉連秀嶺浮白樂天王昭君詩滿靣胡沙満鬂風睂消殘黛臉消紅晉書列女傳竇滔妻蘇氏織錦為回文詩以寄滔月令季冬之月鴈北向國艷夭嬈酒半酣去年同賞寄僧簷但知撲撲晴香軟誰見森森曉態嚴糓雨共驚無幾日蜜蜂未許輙先甜應須火急囘征棹一片辭枝可得黏李正封牡丹詩國色朝酣酒巳見前注唐人蜜蜂詩不知辛苦為誰甜惠泉山下土如濡陽羡溪頭米勝珠賣劍買牛吾欲老殺雞為黍子來無地偏不信容髙蓋俗儉真堪着腐儒莫怪江南苦留滯經營身計一生迂王注恵山泉陽羡米皆常州事陶潜詩心逺地自偏漢于公傳令容駟馬高蓋車史記漢髙祖嫚罵酈食其曰腐儒為天下安用腐儒刁景純賞瑞香花憶先朝侍宴次韻廬山記瑞香花紫而香烈非羣芳之比其始蓋出此山上苑夭桃自作行劉郎去後幾回芳厭従年少追新賞閒對宫花識舊香欲贈佳人非泛洧好紉幽佩弔沈湘鶴林神女無消息為問何年返帝鄉劉郎桃花注見一巻詩國風溱與洧方渙渙兮又伊其相謔贈之以芍藥離騷紉秋蘭以為佩古今詩話潤州鶴林寺杜鵑花相傳唐貞觀中外國僧種之鉢盂中自天台攜來毎春末開時有朱裳女子來逰花下俗傳花神也又互見第五巻後十餘日復至詩注同栁子玉游鶴林招隱醉歸呈景純鶴林竹林寺也宋高祖潛龍時常遊寺有黄鶴飛舞因名黄鶴山鶴林招隱潤州二寺也花時臘酒照人光歸路春風灑靣凉劉氏宅邊霜竹老戴公山下野桃香巖頭疋練兼天浄一作静泉底真珠濺客忙安得道人攜笛去一聲吹裂翠崖岡王注劉氏宅戴公山皆潤州事劉裕本家彭城晉氏東遷移居晉陵丹徒之京口里南史戴顒世居剡下又徙京口止黄鶴山宋文帝毎欲見之嘗謂黄門侍郎張敷曰吾東廵之日當宴戴公山下謝元暉詩澄江淨如練杜子美詩逺水兼天浄國史補李舟嘗得村舎煙竹截以為笛堅如鐵石以遺李謩謩吹笛天下第一月夜泛江吹之俄有客立於岸呼船共載既至請笛而吹其聲精壯山石可裂謩未甞見疑其蛟龍也景純見和復次韻贈之二首解組歸來道益光坐看百物自炎凉捲簾堂上檀槽鬧送客林間樺燭香淺量巳愁當酒怯非才尤覺和詩忙何人貪佩黄金印千柱耽耽瑣北岡張籍詩黄金捍撥紫檀槽絃索初張調益髙白樂天早朝詩月堤槐露氣風燭樺煙香李白詩來時儻佩黄金印人間膏火正爭光毎到藏春得暫凉多事始知田舎好凶年偏覺野蔬香谿山勝畫徒能說來往如梭為底忙老去此身無處著為翁栽插萬松岡王注景純有藏春塢又藏春塢前一岡皆松林命曰萬松岡司馬温公題詩云藏春在何許鬱鬱萬松林永日門闌静東風花木深栁子玉亦見和因以送之兼寄其兄子璋道人不羡腰金照地光暫時假靣弄西凉晴牕嚥日肝腸煖古殿朝真屨袖香說靜故知猶有動無閒底處更求忙先生官罷乗風去何用區區賦陟岡鮑昭詩鞍馬光照地白樂天詩君看裴相國金紫光照地又詩西凉伎假靣胡人弄獅子王注道家服日精月華之氣毛詩陟岡注巳見子玉家宴用前韻見寄復答之自酌金尊勸孟光更教長笛奏伊凉公自注子玉家有笛妓牽衣男女遶太白扇枕郎君煩阿香詩病逄春轉深痼愁魔得酒暫奔忙醒時情味吾能說日在西南白草岡樂府有伊凉州曲李白詩呼童烹雞酌白酒男女嬉笑牽人衣後漢黄香事母至孝暑扇枕寒則以身温席景純復以二篇一言其亡兄與伯父同年之契一言今者唱酬之意仍次其韻靈夀扶來似孔光感時懷舊一悲凉蟾枝不獨同攀桂雞舌還應共賜香公自注亦同為郎等是浮休無得喪麤分憂樂有閒忙年來世事如波浪鬱鬱誰知柏在岡漢書孔光為漢太師賜靈夀杖晉卻詵對晋武帝曰臣舉賢良對䇿為天下第一猶桂林一枝崑山片玉酉陽雜俎月中蟾桂地影也空處水影也漢官儀尚書郎舍雞舌香奏事荘子其生也若浮其死也若休又見賈誼鵩賦宋真宗朝嘗召䖏士种放為司諫以論事公卿惡之賜金歸華山又有紫微舎人者素不能文制誥嘗令張君房代之一日賜日本國詔書已受詞頭而失君房所在中使促之紫微不勝其窘偶楊大年與錢若水賡閑忙二令楊曰世上何人最得閑司諌賜金歸華山錢曰世上何人最得忙紫微失卻張君房時稱名對韓退之詩浪波沄沄去松栢在高岡屢把鉛刀齒歩光更遭華衮照庬凉蘇門山上莫長嘯薝音膽蔔林中無别香燭燼巳殘終夜刻槐花還似昔年忙背城借一吾何敢慎莫尊前替戾岡賈誼賦莫邪為鈍兮鉛刀為銛史記越王使大夫種奉歩光之劍以賀吴范寗序穀梁春秋曰一字之褒寵踰華衮左傳晉太子申生帥師公衣之偏衣佩之金玦狐突曰庬凉冬殺金寒玦離胡可恃也蘇門嘯注見本巻維摩經如入薝蔔林中不聞他香惟聞薝蔔香也按薝蔔即梔子亦名林蘭其花六出至香齊竟陵王子良嘗夜與四學士刻燭為詩毎四韻刻一寸以為率左傳齊晉戰扵鞌齊師敗績齊國佐如晉師曰請收合餘燼背城借一晉佛圖澄傳劉曜自攻洛陽石勒将救之佛圖澄曰相輪鈴音云秀支替戾岡僕谷劬秃當此羯語言軍出捉得劉曜也金山寺與栁子玉飲大醉卧寳覺禪榻夜分方醒書其壁惡酒如惡人相攻劇刀箭頽然一榻上勝之以不戰詩翁氣雄拔禪老語清軟我醉都不知但覺紅緑眩醒時江月墮摵摵風響變惟有一龕燈二豪俱不見杜詩夜闌接軟語李白詩看朱成碧顔始酡晉劉伶酒徳頌二豪侍側馬若蜾嬴之與螟蛉大風留金山兩日塔上一鈴獨自語明日顚風當斷渡朝來白浪打蒼崖倒射軒牕作飛雨龍驤萬斛不敢過漁艇一葉從掀舞細思城市有底忙卻笑蛟龍為誰怒無事久留僮僕怪此風聊得妻孥許灊山道人獨何事半夜不眠聴粥鼔北史石勒死之年天静無風而塔上一鈴獨鳴佛圖澄曰國有大䘮不出今年矣杜子美詩晩来急雨春風顛又蕩蕩萬斛舟王注龍驤大舟也又參寥號灊山道人監洞霄宫俞康直郎中所居四詠退圃百丈休牽上瀨船一鉤歸釣縮頭鯿園中草木春無數只有黄楊厄閏年公自注俗說黄楊一嵗長一寸遇閏退三寸杜子美詩一聲何處送書鴈百丈誰家上瀬船襄陽耆舊傳漢水中鯿魚甚羙禁人捕以槎斷水因謂之槎頭縮項鯿孟浩然峴潭詩試垂竹竿釣果得槎頭鯿杜子美詩即今耆舊無新語謾釣槎頭縮項鯿逸堂新第誰來作並鄰舊官寜復憶星辰請君置酒吾當賀知向江湖拜散人劉禹錫詩朝驅旌斾行時令夜見星辰憶舊官陸龜䝉詩官家未議活蒼生詔賜江湖散人號遯軒冠蓋相望起隱淪先生那得老江村古來真遯何曽遯笑殺踰垣與閉門遠樓西山煙雨巻疎簾北户星河落短簷不獨江天解空闊地偏心逺似陶潛王勃滕王閣詩珠簾暮巻西山雨又見前巻杜子美登慈恩寺塔詩七星在北户河漢聲西流游鶴林招隠二首郊原雨初霽春物有餘妍古寺滿修竹深林聞杜鵑睡餘栁花堕目眩山櫻然西牕有病客危坐看香煙沈約詩山櫻發欲然行歌白雲嶺坐詠修竹林風輕花自落日薄山半隂澗草誰復識聞香杳難尋時見城市人幽居惜未深書普慈長老壁公自注志誠普慈寺後千竿竹醉裏曽看碧玉椽倦客再遊行老矣髙僧一笑故依然久參白足知禪味苦厭黄公聒晝眠惟有兩株紅百葉晩來猶得向人姸白足注再見前維摩經維摩詰雖復飲食而以禪說為味王注黄公黄鸝也又江浙間有花謂之百葉紅書焦山綸長老壁法師住焦山而實未嘗住我來輙問法法師了無語法師非無語不知所答故君看頭與足本自安冠屨譬如長鬛人不以長為苦一旦或人問毎睡安所措歸來被上下一夜著無處展轉遂達晨意欲盡鑷去此言雖鄙淺故自有深趣持此問法師法師一笑許金剛經若心有住則為非住左傳昭七年長鬛者相又昭十七年長鬛者三人伏舟側維摩經文殊師利問維摩詰何等是菩薩不二法門時維摩詰黙然無言文殊師利歎曰善哉善哉乃至無有文字語言是真入不二法門互見第一巻刁景純席上和謝生二首悞入仙人碧玉壺一歡那復間親疎杯盤狼藉吾何敢車騎雍容子甚都此夜新聲聞北里他年故事紀南徐欲窮風月三千界願化天人百億軀神仙傳費長房為市掾有壺公來賣藥常懸一空壺於座上日入後輙跳入壺中長房随公試展足則亦入壺見樓觀五色重門閣道公語長房曰我神仙人也見責暫遊人間耳史記淳于髠傳杯盤狼藉堂上燭滅主人畱髠而送客雍容甚都司馬相如事注再見前史記紂使師涓作滛聲北里之舞靡靡之樂唐時妓皆居北里孫棨有北里志東晉置南徐州治京口今潤州也南史徐君蒨善絃歌好聲色載妓肆意遊行荆楚山川時襄陽魚𢎞亦以豪俊稱於是府中謠曰北路魚南路徐歐陽公詩翰林風月三千首釋典三千大千世界栁子厚詩若為化作身千億遍上峯頭望故鄉縦飲誰能問挈壺不知門外曉星踈綺羅勝事齊三閣賓主談鋒敵兩都榻畔煙花嘗歎杜海中童丱尚追徐無多酌我公須聴醉後麤狂膽滿軀王注周官有挈壺氏蓋言不必問漏之淺深也南史陳後主於光明殿前起臨春結綺望仙三閣後主自居臨春張貴妃居結綺龔孔二貴嬪居望仙並複道往來漢班固西都賦設西都賔東都主人以相辨荅杜牧之詩今日鬢絲禪榻畔茶煙輕颺落花風注再見漢書伍被傳秦又使徐福入海求僊藥多齎珍寳童男女三千人五種百工而行徐福得平原廣澤止王不來無多酌我用蓋寛饒事屢見三國趙雲與曹公戰先主明旦視戰處曰子龍一身都是膽也留别金山寶覺圓通二長老沐罷巾冠快晚凉睡餘齒頰帶茶香艤舟北岸何時渡晞髮東軒未肎忙康濟此身殊有道醫治外物本無方風流二老長還往顧我歸期尚渺茫楚詞與女沐兮咸池晞女髪兮陽之阿杜寄贊上人詩與子成二老來往亦風流施註蘇詩巻八
