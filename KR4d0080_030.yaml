body:
  text: 施註蘇詩巻十六宋蘇軾撰施元之原註武進邵長蘅刪補詩四十八首起在彭城至元豐已未移守吳興作雲龍山觀燒得雲字丁女真水妃寒山便火耘隕霜知已殺坯户聽初焚束緼方熠燿敲石俄氤氲落㸃甘泉烽横煙楚塞氛窮虵上喬木潛蛟躡浮雲驚飛墮傷雁狂走迷癡麏谷蟄起蜩燕山妖竄䕫羵野竹爆哀聲幽桂飄寃芬悲同秋照蟹快若夏燎蚊火牛入燕壘燧象奔吳軍崩騰井陘口萬馬皆朱幩摇曵驪山隂諸姨爛紅裙方隨長風巻忽值絶澗分我本山中人習見匪獨聞偶從二三子來訪張隱君君家亦何有物象移朝曛把酒看飛燼空庭落繽紛行觀農事起畦壠如纈紋細雨發春穎嚴霜倒秋蕡始知一炬力洗盡狐羣韓退之陸渾火詩女丁婦壬傳世婚左傳昭九年鄭裨竈曰火水妃也杜預曰火畏水故為之妃妃一音配史記貨殖傳楚越之地地廣人稀飯稻羮魚或火耕而水耨左傳僖三十三年隕霜不殺草定元年冬十月隕霜殺菽月令蟄蟲坯戸又是月也草木黄落乃伐薪為炭漢蒯通傳束緼請火毛詩注熠燿燐也已見前柳宗元詩夜發敲石火杜子美烽火詩雲邉落㸃殘漢匈奴傳孝文帝時胡騎入代句注邉烽火通於甘泉長安闗輔記甘泉宫在今池陽縣西去長安三百里左傳襄二十七年伯夙謂趙孟曰楚氛甚惡漢志天馬歌籋浮雲籋音躡國語木石之怪曰䕫魍魎水之怪曰龍罔象土之怪曰羵羊白樂天别東林詩春雨星攢尋蟹火注餘杭風俗寒食雨後家家持燭尋蟹歐陽公憎蚊詩燻簷苦煙埃燎壁疲照燭史記田單傳灌脂束葦於牛尾燒其端夜縦之牛尾熱怒而奔燕軍所觸盡死左傳定四年楚鍼尹固與昭王同舟王使執燧象以奔吳師杜預曰燒火燧繫象尾使赴吳師驚郤之謝靈運詩崩騰永嘉末韓退之詩崩騰相排拶漢韓信傳未至井徑口三十里止舍夜半傳發選騎二千人人持一赤幟從間道萆山而望趙軍戒曰趙見我走必空壁逐我若疾入㧞趙幟立漢幟趙軍還歸壁壁皆漢赤幟大驚遂亂遁走毛詩碩人注朱幩以朱纒鑣扇汗也舊唐書楊貴妃傳姊三人皆有才貌𤣥宗並封夫人長曰大姨封韓國三姨封虢國八姨封秦國每年十月幸華清宫國忠姊妹五家扈從毎家一隊著五色衣五家合隊照映如百花之煥發互見八巻和蘇州太守詩註𤣥宗紀天寳六載改驪山温泉為華清宫和田國博喜雪疇昔月如晝曉來雲暗天玉花飛半夜翠浪舞明年螟螣無遺種流亡稍占田嵗豐君不樂鐘磬幾時編公自注田有服不樂禮記檀弓余疇昔之夜王注玉花言雪翠浪言麥雪盛則麥熟也柳子厚詩麥芒際天摇青波詩小雅去其螟螣及其蟊賊漢宣帝記流民自占八萬餘口周禮磬師註宫懸有編鐘編磬祈雪霧豬泉出城馬上作贈舒堯文三年走吳越踏遍千重山朝隨白雲去暮與棲鴉還翩如得木狖飛步誰能攀一為符竹累坐老敲榜閒此行亦何事聊散腰腳頑浩蕩城西南亂山如玦環山下野人家桑柘雜榛菅嵗晏風日暖人牛相對閑薄雪不蓋土麥苗稀可刪願君發豪句嘲詼破天慳韓退之詩青玉刻佩聨玦環果州清居和尚述牧牛圖第十章露地白牛安眠牧者禪寂第十一章牛亡而鞭箠尚在第十二章人牛俱亡次韻舒堯文祈雪霧豬泉長笑蛇醫一寸腹銜水吐雹何時足蒼鵝無罪亦可憐斬頸横盤不敢哭豈知泉下有豬龍卧枕雷車踏隂軸前年太守為旱請雨㸃隨人如撒菽公自注傅欽之曾禱此泉得雨太守歸國龍歸泉至今人詠淇園綠我今又復罹此旱凛凛疲民在溝瀆郤尋舊跡叩神泉坐客仍攜王子淵公自注欽之時客惟舒在矣看草中和樂職頌新聲妙語慰華顛曉來泉上東風急須上氷珠老蛟泣怪詞欲逼龍飛起嶮韻不量吾所及行看積雪厚埋牛誰與春工掀百蟄此時還復借君詩餘力汰輈仍貫笠揮毫落紙勿言疲驚龍再起震失匙酉陽雜爼王彦威鎮汴夏旱季圯曰欲雨甚易耳求虵醫四頭十石甕二枚每甕二虵醫水浮其中木盖泥之分置閑處設席燒香選小兒十嵗已下十餘令執小青竹晝夜擊之不得少輟一日兩夜雨大注蛇醫蜥蝪别名夷堅乙志劉居中隱嵩山巔有大蜥蜴數百皆長三四尺人以食就手飼之拊摩其體滑膩如脂一日聚繞水盎邉各就取水纔入口即吐出已圓結似彈丸積之於側俄頃間纍纍滿地忽震雷一聲彈丸皆失去明日人來言昨午雨雹大作乃知蜥蜴所為者此也王注祈雨法刑白鵝景徳皇祐中詔以其法頒下諸道又志林云鵝能警盜亦能郤蛇且又有祈雨厄悲夫北夢𤨏言卭州有湫有牝豕出入號豬龍湫又元和末建州山寺夜半門外喧然人於窓中窺見數人運斤造雷車博物志地下四柱三十六萬軸犬牙相牽漢王褒字子淵作中和樂職宣布詩詳見十巻次韻章傳道喜雨詩注後漢崔駰傳包胥單辭而存楚唐且華顛以悟秦注華顛謂白首也左傳宣四年伯棼射王汰輈以貫笠轂三國蜀先主傳方食失匕箸注已見石炭幷引彭城舊無石炭元豐元年十二月始遣人訪獲於州之西南白土鎮之北冶鐵作兵犀利勝常云君不見前年雨雪行人斷城中居民風裂骭濕薪半束抱衾裯日暮敲門無處換豈料山中有遺寳磊落如䃜音衣萬車炭流膏迸液無人知陣陣腥風自吹散根苗一發浩無際萬人鼓舞千人看投泥潑水愈光明爍玉流金見精悍南山栗林漸可息北山頑鑛何勞鍜為君鑄作百鍊刀要斬長鯨為萬叚杜子美詩城中斗米換衾裯相許寧論兩相直唐韻䃜美石黑色楚辭宋玊招魂十日代出流金爍石晉載記赫連勃勃造百鍊剛刀為龍雀大鐶李白王節士歌安得倚天劍跨海斬長鯨唐叚秀實傳罵朱泚云狂賊可斬萬段人日獵城南會者十人以身輕一鳥過槍急萬人呼為韻得鳥字京東第二將雷勝隴西人以勇敢應募得官武力絶人騎射敏妙按閱於徐徐人欲觀其能公為小獵城西是日小雨甫晴土潤風和觀者數千人公作獵㑹詩序兒童笑使君憂慍長悄悄誰拈白接䍦令跨金騕褭東風吹濕雪手冷怯清曉忽發兩鳴髇虛交切相趁飛蝱小放弓一長嘯目送孤鴻矯吟詩忘鞭轡不語頭自掉歸來仍脫粟鹽䜴煮芹蓼何似雷将軍兩眼霜鶻皎黑頭已為將百戰意未了馬上倒銀瓶得不暇燎少年負竒志蹭蹬百憂繞囘首英雄人老死已不少青春還一夢餘年真過鳥莫上呼鷹臺平生笑劉表詩國風憂心悄悄慍于羣小唐韻接䍦白帽也晉山簡事注再見杜子美詩細馬時鳴金騕褭唐韻髇箭即鳴鏑也漢匈奴傳冒頓廼作鳴鏑習勒其騎射因話録楊巨源年老頭數掉言吟詩多致得白樂天詩閑倚小橋立掉頭時一吟唐書令狐潮圍雍丘雷萬春立城上靣中六矢而不動潮遙謂張廵曰向見雷將軍乃知足下軍令矣晉諸葛恢傳王導嘗謂曰明府當為黒頭公杜子美詩馬上誰家白靣郎又指㸃銀瓶索酒嘗世說魏武將見匈奴使自以形陋不足雄逺國使崔季珪代帝自捉刀立牀頭既畢使間諜問曰魏王何如匈奴使答曰魏王雅望非常然牀頭捉刀人此乃英雄也張景陽雜詩人生瀛海内忽如鳥過目杜子美詩餘生如過鳥襄陽耆舊傳劉表為荆州刺史築臺名呼鷹仍作野應來曲襄沔記劉表呼鷹臺在縣東七里髙三丈周七十丈將官雷勝得過字代作胡騎入雲中一作囘中急烽連夜過短刀穿鹵陣濺血貂裘涴一來輦轂下愁悶惟欲臥今朝從公獵稍覺天宇大一䨇鐵絲箭未發手先唾射殺雪毛狐腰間餘一箇漢匈奴傳孝文後四年匈奴大入上郡雲中各三萬騎漢書注囘中地在安定其中有宫劉禹錫登天壇詩俯觀羣動靜始覺天宇大杜子美期王將軍不至詩憶爾腰下鐵絲箭射殺林中雪色鹿後漢公孫瓚傳始天下兵起我謂唾掌可决臺頭寺歩月得人字風吹河漢掃微雲歩屧中庭月趁人浥浥爐香初泛夜離離花影欲搖春遙知金闕同清景想見氊車碾暗塵囘首舊遊真是夢一簪華髮岸綸巾臺頭寺送宋希元相從傾蓋只今年送别南臺便黯然入夜更歌金縷曲他時莫忘角弓篇公自注是日與宋君同栽松寺中三年不顧東鄰女公自注取宋玉二頃方求負郭田公自注取季子我欲歸休君未可茂先方議斸龍泉江文通别賦黯然消䰟者唯别而已杜牧之秋娘詩秋持玉斚醉與唱金縷衣左傳昭二年晉侯使韓宣子來聘享之韓子賦角弓既亨宴於季氏有嘉樹焉韓宣子譽之武子曰宿敢不封殖此樹以無忘角弓宋玉好色賦臣東家之子登牆闚臣三年至今未許也晉張華傳字茂先初牛斗間常有紫氣華聞豫章人雷焕妙逹緯象乃要問之煥曰寳劍之精上徹於天耳問何郡煥曰在豫章豐城即補煥為豐城令煥到縣掘獄基入地四大得石函中有雙劍竝刻題一曰龍泉二曰太阿是夕斗牛間氣不復見杜子美詩徒勞望牛斗無計斸龍泉種松得徠字公自注其四在懐古堂其六在石經院春風吹榆林亂莢飛作堆荒園一雨過戢戢千萬栽青松種不生百株望一枚一枚已有餘氣壓千畝槐野人易斗粟云自魯徂徠魯人不知貴萬竈飛青煤束縳同一車胡為乎來哉泫然解其縛清泉洗浮埃枝傷葉尚困生意未肎回山僧老無子養䕶如嬰孩坐待走龍虵清隂滿南臺孤根裂山石直幹排風雷我今百日客公自注時去替不百日養此千歲材茯苓無消息雙鬢日夜摧古今一俛仰作詩寄餘哀詩魯頌徂徠之松新甫之栢杜子美詩幹排雷雨猶力爭淮南子千歲之松下有茯苓上有絲抱樸子松脂入地千年變為茯苓又任子季服茯苓十八年不復食榖靣體玉光作書寄王晉卿忽憶前年寒食北城之游走筆爲此詩王晉卿名詵太原人徙開封能詩善畫以選尚魏國賢惠公主母宣仁髙后於神宗為同産晉卿慕東坡與相游從嘗為作寶繪堂記北城寒食烟火㣲落花胡蜨作團飛王孫出游樂忘歸門前驄馬紫金鞿吹笙帳底煙霏霏行人舉頭誰敢睎扣門狂客君不麾更遣傾城出翠帷書生老眼省見稀畫圖但覺周昉肥别來春物已再菲西望不見紅日圍何時東山歌采薇把盞一聽金縷衣李賀秦宮詞帳底吹笙香霧濃再見唐韻睎望也盼也柳子厚聞歌詩翠帷雙巻出傾城歴代畫斷周昉畫子女爲古今之冠王注東山東征之詩也采薇三章皆言曰歸曰歸往在東武與人往反作粲字韻詩四首今黄魯直亦次韻見寄復和答苻堅破荆州止獲一人半中郎老不遇但喜識元歎我今獨何幸文字厭竒玩又得天下才相從百憂散隂求我輩人規作林泉伴寧當待垂老倉卒收一旦不見梁伯鸞空對孟光案才難不其然婦女厠周亂世豈無作者於我如既盥一作灌獨喜誦君詩咸韶音節緩夜光一已多矧獲纍纍貫相思君欲瘦不往我真懦吾儕眷微祿寒夜抱寸炭何時定相過徑就我乎館飄然東南去江水清且暖相與訪名山微言師忍粲晉習鑿齒傳襄陽䧟於苻堅堅素聞其名與釋道安俱輿而至以其有蹇疾與諸鎮書云昔晉氏平吳利在二陸今破漢南獲士才一人半耳又髙僧傳云苻堅謂安公一人鑿齒半人也晉地理志魏盡得荆州之地分南郡以北立襄陽郡江表傳蔡伯喈貴異顧雍謂曰卿必成名今以吾名與卿故名雍吳録顧雍為蔡邕所嘆故字元歎蔡邕初平元年拜左中郎將晉石苞傳許允謂苞曰卿是我輩人杜子美嚴别駕相從歌垂老遇君未恨晚似君當向古人求韓退之别知賦惟知心而難得斯一旦而為收述異記有珠夜可以鑒故名夜光趙后外傳真臘夷獻萬年蛤不夜珠光彩皆若月照獻帝春秋吕布問曹公明公何瘦答曰所以瘦恨不蚤相得故也杜子美寄岑參詩思君令人瘦家語孔子曰生於我乎館杜子美聽許十誦詩余亦師粲可身猶縳禪寂傳燈録第三十祖僧粲三十二祖𢎞忍即中華三祖五祖也雪齋公自注杭僧法言作雪山於齋中君不見峩睂山西雪千里北望成都如井底春風百日吹不消五月行人如凍蟻紛紛市人爭奪中誰信言公似贊公人間熱惱無處洗故向西齋作雪峰我夢扁舟入呉越長廊靜院燈如月開門不見人與牛公自注言有詩見寄云林下閑看水牯牛惟見空庭滿山雪楚辭招䰟曽冰峩峩飛雪千里舊唐書杜悰傳吐蕃維州南界江陽岷山連嶺而西不知其極北望隴山積雪如玉東望成都若在井底鹵號無憂城李德裕傳亦云新書吐蕃傳削去成都井底語杜子美詩贊公釋門老放逐還上國華嚴經以白旃檀塗身能除一切熱惱白樂天詩既無白旃檀何以除熱惱人牛注見夲巻以雙刀遺子由子由有詩次其韻寶刀匣不見但見龍雀環何曾斬蛟蛇亦未切琅玕胡為穿窬輩見之要領寒吾刀不汝問有媿在其肝念此力自藏包之虎皮斑湛然如古井終歲不復瀾不憂無所用憂在用者難佩之非其人匣中自長歎我老衆所易屢遭非意干惟有王𤣥通堦庭秀芝蘭知子後必大故擇刀所便屠狗非不用一歲六七刓欲試百鍊剛要須更泥蟠作詩銘其背以待知者看龍雀鐶用赫連勃勃事注見本巻王粲刀銘陸剸犀兕水截鯨鯢列子湯問篇周穆王征西戎西戎獻昆吾之劍用之切玉如切泥焉漢張騫傳竟不得月氐要領杜子美詩妖腰亂領敢欣喜禮記倒載干戈包之以虎皮白樂天古劍詩湛然玉匣中秋水澄不流又詩無波古井水韓退之詩法曹貧賤衆所易晉衛玠云非意相干可以理遣再見晉王覽傳覽字𤣥通吕䖍有佩刀工相之以為必登三公可佩此刀䖍謂覽兄祥曰卿有公輔之量故以相與祥臨薨以刀授覽曰汝後必興足稱此刀覽後奕世多才興于江左左傳閔元年卜偃曰畢萬之後必大史記刺客傳荆軻愛燕之狗屠及善擊筑者髙漸離又樊噲傳沛人也以屠狗為事漢書注刓圭角冺鑠也莊子飬生主族庖月更刀折也揚子龍蟠于泥蚖其肆矣家語周廟金人三緘其口而銘其背游桓山會者十人以春水滿四澤夏雲多竒峰爲韻得澤字東郊欲尋春未見鸎花迹春風在流水鳧雁先拍拍孤帆信溶漾弄此半篙碧􅋈舟桓山下長嘯理輕策彈琴石室中幽響清磔磔弔彼泉下人野火失枯腊悟此人閒世何者為真宅暮回百歩洪散坐洪上石愧我非王襄子淵肎見客臨流吹洞簫水月照連璧此歡真不朽回首歲月隔想像斜川游作詩繼彭澤韓退之病鴟詩青泥揜兩翅拍拍不得離桓山在彭城泗水上即宋司馬桓魋墓又先生游桓山記云登桓山入石室使道士戴日祥鼔雷氏之琴此詩蓋紀實也莊子有人間世篇漢楊王孫傳報祈侯書曰支體束絡口含玉石欲化不得鬱為枯腊千載之後棺椁朽腐乃得歸土就其真宅漢王褒有洞簫賦子淵褒字又王襄為益州刺史得王褒薦之詳已見前連璧謂王氏兄弟子立子敏也晉夏侯湛傳與潘安仁同輿接茵京都人謂之連璧陶淵明游斜川詩引云辛丑歲正月五日與二三鄰曲同游斜川欣對不足共爾賦詩淵明嘗為彭澤令戴道士得四字代作戴日祥江南人也少小家江南寄跡方外士偶隨白雲出賣藥彭城市雪霜侵鬢髮塵土汙冠袂頼此三尺桐中有山水意自從夷夏亂七絲一作絃久已弃一作廢心知鹿鳴三不及胡琴四使君獨慕古嗜好與衆異共弔桓魋宫一灑孟嘗淚歸來鎖塵匣獨對斷絃喟挂名石壁間寂寞千歲事韓退之送張道士詩序寄跡老子法中莊子大宗師孔子曰彼游方之外者也後漢韓康傳常採藥名山賣於長安市琴操琴長三尺六寸六分以象三百六十六日列子湯問篇伯牙善鼔琴鍾子期善聽伯牙鼔琴志在髙山子期曰善哉峩峩乎若太山志在流水子期曰善哉洋洋乎若江河古今樂錄天寳十三載始詔道調法曲與胡部新聲合作自爾夷夏之聲相亂無復辨者左傳襄四年歌鹿鳴之三三拜琴操有鹿鳴曲三疉胡琴琵琶也本胡中馬上所鼔四絃以象四時詳五巻宋叔達家聽琵琶詩註孟嘗淚用雍門周鼔琴事詳見四巻甘露寺詩註吕氏春秋鍾子期死伯牙破琴絶絃終身不復鼔琴杜子美詩千秋萬歲名寂寞身後事次韻田國博部夫南京見寄二絶歲月翩翩下坂輪歸來杏子已生人深紅落盡東風惡柳絮榆錢不當春火冷餳稀杏粥稠青裙縞袂餉田頭大夫行役家人怨應羡居鄉馬少游玉燭寳典寒食為大麥粥硏杏仁為酪引餳沃之李義山詩粥香餳白杏花天白樂天詩留餳和冷食出火煮新茶馬少游語在後漢馬援傳詳見六巻山村詩注月夜與客飲杏花下真蹟草書在武寧宰呉節夫家今刻於黄州先生詩話僕在徐州王子立子敏皆館於予蜀人張師厚來過二王方年少吹洞簫飲酒杏花下杏花飛簾散石刻作報餘春明月入户尋幽人褰衣歩月踏花影炯如流水涵青蘋花閒置酒清香發爭挽長條落香雪山城薄酒不堪飲勸君且吸杯中月洞簫聲斷月明中惟憂月落酒杯空明朝卷地春風惡但見綠葉栖殘紅送蜀人張師厚赴殿試二首忘歸不覺鬢毛斑好事鄉人尚往還斷嶺不遮西望眼送君直過楚王山韓退之西山詩為遮西望眼終是懶回頭史記項羽紀自立為西楚覇王王九郡都彭城王注此地有楚王山雲龍山下試春衣放鶴亭前送落暉一色杏花三十里新郎君去馬如飛公放鶴亭記雲龍山人張天驥於故居之東作亭山人有二鶴旦則望西山之缺以放焉暮則傃東山而歸故名之曰放鶴亭摭言神龍以來新進士杏園宴後皆於慈恩塔下題名又薛監逢值新進士出前導曰廻避新郎君又沈嵩得新膀封示羅隠隠詩曰人如流電馬如飛再次韻答田國博部夫還二首西郊黄土沒車輪滿靣風埃笑路人已放役夫三萬指從教積雨洗殘春枝上稀疎地上稠忽看紅糝落牆頭風流别乘多才思歸趁西園秉燭游白樂天詩枝上稀疎地上多韓退之詩始見洛陽春桃枝綴紅糝唐置别駕為太守之貳謂之别乘魏文帝詩乘輦夜行遊逍遥歩西園古詩何不秉燭遊田國博見示石炭詩有鑄劍斬佞臣之句次韻答之楚山鐵炭皆竒物知君欲斫姦邪窟屬鏤無眼不識人楚國何曽斬無極玉川狂直古遺民救月裁詩語最真千里妖蟇一寸鐵地上空愁蟣蝨臣左傳哀十一年呉王賜子胥屬鏤以死又昭二十七年楚令尹子常殺費無極王注無眼不識人暗用國志云此箭無眼不識人語周禮夏官大僕救日月亦如之秋官庭氏救月之矢夜射之盧仝月蝕詩傳聞古老説月蝕蝦蟇精徑圍千尺入汝腹如此癡騃阿誰生又地上蟣蝨臣仝告訴帝天皇臣心有鐵一寸可刳妖蟇痴腸仝號玉川子答郡中同僚賀雨水旱行十年饑疫遍九土竒窮所向惡歲歲祈晴雨雖非為已求重請終愧古鬼神亦知我老病入腰膂何曽拜向人此意難不許重雲萋已合㣲潤先流礎蕭蕭止還作坐聽及三鼔天明将吏集泥土滿鞾屨登城望麰麥綠浪風掀舞愧我賢友生雄篇鬭新語君看大熟歲風雨占十五天地本無功祈禳何足數渡河不入境豈若無蝗虎而况刑白鵝下策君勿取榖梁子雩者為旱求者也求者請也古人重請何重乎請人之所以為人者讓也請道去讓也唐書田承嗣盗有貝博魏衛相磁洺七州未嘗入朝每對詔使言辭不遜郭子儀遣使至承嗣西望拜曰兹膝不屈於人久矣今為公拜詩小雅有渰萋萋注渰雲興貎淮南子山雲蒸而柱礎潤京房易候太平之世五日一風十日一雨後漢劉昆傳為𢎞農太守虎皆負子渡河卓茂傳為宻令時天下大蝗河南二十餘縣皆被其災獨不入宻縣界刑鵝用以祈雨事具景德皇祐詔書又見本巻後漢匈奴傳漢得下䇿世說周仲智飲酒醉瞋目還靣舉蠟燭火擲伯仁伯仁笑曰阿奴火攻固出下䇿耳罷徐州往南京馬上走筆寄子由五首吏民莫扳援歌管莫凄咽吾生如寄耳寧獨為此别别離隨處有悲惱緣愛結而我本無恩此涕誰為設紛紛等兒戲鞭鐙遭割截道邊雙石人幾見太守發有知當解笑撫掌冠纓絕法華經大通智勝如來廣說十二因緣觸緣受受緣愛又生緣老死憂悲苦惱漢周亞夫傳覇上棘門特兒戲耳開元天寳遺事姚崇牧荆州受代日吏民泣擁馬首截鐙畱鞭以為遺愛漢百官表郡守秦官景帝中二年更名太守晉陸雲傳張華撫掌大笑史記滑稽傳淳于髠仰天大笑冠纓索絶父老何自來花枝褭長紅洗盞拜馬前請壽使君公前年無使君魚鼈化児童舉鞭謝父老正坐使君窮窮人命分惡所向招災㓙水來非吾過去亦非吾功後漢劉寵傳自會稽太守徴為将作大匠山隂縣有五六老叟厖睂皓髪人齎百錢以送寵寵勞之曰父老何自苦王注方俗送官罷任以花枝挂綵謂之長紅白樂天初到江州詩将迎勞動使君公左傳昭元年劉子曰微禹吾其魚乎古汴從西來迎我向南京東流入淮泗送我東南行蹔别復還見依然有餘情春雨一作風漲㣲波一夜到彭城過我黄樓下朱欄照飛甍可憐洪上石誰聽月中聲前年過南京麥老櫻桃熟今來舊㳺處櫻麥半黄綠歲月如宿昔人事幾反覆青衫老從事坐穏生髀肉聯翩閱三守迎送如轉轂歸耕何時决田舍我已卜杜子美魏將軍歌將軍昔著從事衫九州春秋劉備在荆州嘗於劉表坐起至厠見髀裏肉生流涕曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳賈島詩碌碌復碌碌百年轉雙轂卜田向何許石佛山南路下有爾家川千畦種秔稌山泉宅龍蜃平地走膏乳異時畝一金近欲為逃户逝将解簪紱賣劍買牛具故山豈不懷廢宅生蒿穭便恐桐鄉人長祠仲卿墓王注石佛山在睂州睂山縣之南漢東方朔傳酆鎬之間號為土膏其賈畝一金李太白詩幾日相别離門前生穭葵漢朱邑傳字仲卿少時為桐郷嗇夫遇民有恩吏民敬愛焉及死其子葬之桐鄉西郭外民共為邑起冡立祠嵗時祠祭又互見二巻送任伋通判詩註次韻曹九章見贈蘧瑗知非我所師流年已似手中蓍正平獨肎從文舉中散何曾靳孝尼賣劍買牛真欲老得錢沽酒更無疑雞豚異日為同社應有千篇唱和詩蘧瑗事出淮南子注已見周易大衍之數五十其用四十有九後漢禰衡傳字正平唯善孔融及楊修常曰大兒孔文舉小兒楊徳祖融亦深愛其才上疏薦之融字文舉晉嵇康傳将刑東市索琴彈之曰昔袁孝尼嘗從吾學廣陵散每靳固之廣陵散於今絶矣康仕魏為中散大夫袁淮字孝尼杜子美醉時歌得錢即相覔沽酒不復疑韓退之南谿詩願為同社人雞豚燕春秋書泗州孫景山西軒落日明孤塔青山繞病身知君向西望不愧塔中人泗州有僧伽塔塔中人蓋指僧伽過淮三首贈景山兼寄子由好在長淮水十年三往來功名眞已矣歸計亦悠哉今日風憐客平時浪作堆晚來洪澤口捍索響如雷離騷已矣國無人莫我知兮漢蘇武傳李陵曰已矣令子卿知吾心耳詩國風悠哉悠哉九域志楚州淮陰縣洪澤鎮過淮山漸好松檜亦蒼然藹藹藏孤寺泠泠出細泉故人眞吏隠小檻帶巖偏郤望臨淮市東風語笑傳杜子美髙齋詩吏隠適性情汝南先賢傳鄭欽吏隠于蟻陂之陽囘首濉陽幕簿書髙沒人何時桐栢水一洗庾公塵此去漸佳境獨游長慘神待君詩百首來寫浙西春桐栢山在唐州桐栢縣淮水所出庾公塵用王導語庾亮字元規注見上巻次韻王廷老退居晉顧愷之傳每食甘蔗常自尾至夲人或怪之云漸入佳境舟中夜起微風蕭蕭吹菰蒲開門看雨月滿湖舟人水鳥兩同夢大魚驚竄如奔狐夜深人物不相管我獨形影相嬉娛暗潮生渚弔寒蚓落月挂柳看懸蛛此生忽忽憂患裏清境過眼能須臾鷄鳴鐘動百鳥散船頭擊鼓還相呼余去金山五年而復至次舊詩韻贈寳覺長老誰能斗酒博西凉但愛齋厨法䜴香舊事真成一夢過髙譚為洗五年忙清風偶與山阿曲明月聊隨屋角方稽首願師憐久客直將歸路指茫茫斗酒西涼用後漢孟陀事注再見法䜴出金山他處莫能及僧每以小罌餽遺逺客詩大雅有巻者阿飄風自南鄭氏云大陵曰阿有大陵巻然而曲廻風從長養之方來入之劉禹錫生公講堂詩一方明月可中庭韓退之喜侯喜至詩欹眠聽新詩屋角月艷艷遊惠山幷引余昔爲錢塘倅徃來無錫未嘗不至惠山既去五年復為湖州與髙郵秦太虛杭僧參寥同至覽唐處士王武陵竇羣朱宿所賦詩愛其語清簡蕭然有出塵之姿追用其韻各賦三首夢裏五年過覺來雙鬢蒼還将塵土足一歩漪瀾堂俯窺松桂影仰見鴻鶴翔炯然肝肺閒已作冰玉光虛明中有色清淨自生香還從世俗去永與世俗忘漪瀾堂寺中堂名薄雲不遮山疎雨不濕人蕭蕭松徑滑策䇿芒鞵新嘉我二三子皎然無緇磷勝游豈殊昔清句仍絶塵弔古泣舊史疾讒歌小旻哀哉扶風子難與巢許鄰公自注謂竇羣毛詩小旻大夫刺幽王也唐竇羣傳兄弟皆擢進士第獨羣以處士客隠毘陵蘇州刺史韋夏卿薦之朝幷表其書報聞不召後夏卿入為京兆尹復言之德宗擢為左拾遺後為御史中丞上言李吉甫隂事憲宗靣覆得其情大怒將誅羣吉甫為之觧乃免子姓編竇望出扶風敲火發山泉烹茶避林樾明牕傾紫盞色味兩竒絶吾生眠食耳一飽萬想滅頗笑玉川子饑弄三百月豈如山中人睡起山花發一甌誰與共門外無來轍盧仝詩手閱月團三百片注再見贈惠山僧惠表行遍天涯意未闌将心到處遣人安山中老宿依然在案上楞嚴巳不㸔欹枕落花餘幾片閉門新竹自千竿客來茶罷空無有盧橘楊梅尚帶酸安心二祖公案注屢見司馬相如上林賦盧橘夏熟黄柑橙榛枇杷燃杮贈錢道人書生苦信書世事仍臆度不量力所負輕出千鈞諾當時一快意事過有餘怍不知幾州鐵鑄此一大錯我生渉憂患常恐長罪惡靜觀殊可喜腳淺猶容卻而况錢夫子萬事初不作相逢更何言無病亦無藥漢季布傳楚人曰得黄金百不如得季布諾杜子美詩人生快意多所辱北夢瑣言唐羅紹威帥魏博疾牙軍之驕以計殺之至八千家雖去其偪而漸為梁祖凌制乃謂親吏曰聚六州四十三縣鐵鑄一個錯不成傳燈錄道吾和尚一鉢歌無可離無可著何處更求無病藥藥是病病是藥到頭兩事須拈卻亦無藥亦無病正是真如靈覺性與秦太虛參寥㑹于松江而關彦長徐安中適至分韻得風字二首吳越溪山興未窮又扶衰病過垂虹浮天自古東南水送客今朝西北風絶境自忘千里逺勝游難復五人同舟師不㑹留連意擬看斜陽萬頃紅垂虹吳江長橋名郭氏𤣥中記天下之多者水焉浮天載地白樂天詩波紅日斜沒沙白月平鋪二子緣詩老更窮人間無處吐長虹平生睡足連江雨盡日舟横擘岸風人笑年來三黜慣天敎我輩一樽同知君欲寫長相憶更送銀盤尾鬛紅南史江淹謂郭鞏曰子咳唾成珠玉吐氣作虹霓非碌碌儔比也盧仝月蝕詩今夜吐艷如長虹杜牧之詩一夜風吹竹連江雨送秋王注南中風吹舟拍岸謂之罨岸風吹舟離岸謂之開岸風擘岸乃開岸之義也次韻關令送魚舉網驚呼得巨魚饞涎不易忍流酥更煩赤腳長䰅老來聽西風十幅蒲韓退之寄盧仝詩先生有意許降臨更遣長須致雙鯉杜荀鶴詩連天一水浸呉東十幅帆飛二月風國史補舟船之盛盡於西江編蒲為帆大者或數十幅自白沙沂流而上常待東北風謂之潮信風次韻秦太虛見戲耳聾君不見詩人借車無可載畱得一錢何足頼晚年更似杜陵翁右臂雖存耳先瞶人将蟻動作牛鬬我覺風雷眞一噫聞塵掃盡根性空不須更枕清流𣲖大朴初散失渾沌六鑿相攘更勝敗眼花亂墜酒生風口業不停詩有債君知五蘊皆是賊人生一病今先差瘥仝楚懈切但恐此心終未了不見不聞還是礙今君疑我特佯聾故作嘲詩窮嶮怪須防額癢出三耳莫放筆端風雨快孟郊移居詩借車載家具家具少于車杜子美空囊詩囊空恐羞澁留得一錢看又清明詩此身漂泊苦西東右臂偏枮左耳聾晉殷仲堪傳父忠嘗患耳聦聞牀下蟻動云牛鬭圓覺經識清淨故聞塵清淨聞清淨故耳根清淨枕流用孫楚語屢見莊子應帝王儵與忽謀報渾沌之徳曰人皆有七竅此獨無有嘗試鑿之日鑿一竅七日而渾沌死内典五蘊色受想行識也傳燈錄壽州道樹禪師云伊伎倆有窮吾不見不聞無盡楚辭九章蓀佯聾而不聞張君房脞説隋董慎為冥府追為右曹仍辟常州秀才張審通管記慎令為判申天府有黄衫人持狀去少頃復至云所申不當慎怒呼左右取方寸肉塞其一耳遂無所聞審通乞更為判後有天符來云甚允當慎喜謂審通曰非君不可正此獄命左右割去耳肉擘為耳安于額上曰塞君一耳與君三耳審通復活後數日覺額癢湧出一耳尤聰時人笑曰天有九頭鳥地有三耳秀才亦呼為雞冠秀才杜子美寄李白詩筆落驚風雨端午遍遊諸寺得禪字肩輿任所適遇勝輒畱連焚香引幽歩酌茗開淨筵㣲雨止還作小牕幽更姸盆山不見日草木自蒼然公詩話自云非至呉越不見此景也忽登最髙塔眼界窮大千卞峯照城郭震澤浮雲天湥沉既可喜曠蕩亦所便幽尋未云畢墟落生晚煙歸來記所歴耿耿清不眠道人亦未寢孤燈同夜禪晉王獻之傳嘗經呉郡聞顧辟疆有名園先不相識乗肩輿徑入湖州圗經卞山極峻清秋爽月不見其頂尚書震澤底定孔安國云吳縣南太湖名也吳郡續圗經太湖在吳縣南禹貢為之震澤周官爾雅謂之具區史記國語謂之五湖其實一也吐吸江海包絡丹陽義興呉郡呉興之境詩國風耿耿不寐送劉寺丞赴餘姚中和堂後石楠樹與君對牀聽夜雨玉笙哀怨不逢人但見香煙横碧縷謳吟思歸出無計坐想蟋蟀空房語明朝開鏁放觀潮豪氣正與潮爭怒銀山動地君不看獨愛清香生雲一作雪霧别來聚散如宿昔城郭空存鶴飛去我老人閒萬事休君亦洗心從佛祖手香新寫法界觀眼淨不覻登伽女餘姚古縣亦何有龍井白泉甘勝乳千金買斷顧渚春似與越人降日注白樂天招張司業詩能來同宿否聽雨對牀眠王注風雨對牀事見與子由别於鄭州詩注中和堂在杭州先生為倅日監秋試意劉寺丞為試官也風俗通漢章帝時零陵文學奚景於舜祠下得笙蓋白玉管也乃知古以玉為笙後人易以竹耳白樂天待漏入閤詩碧縷爐香直紅垂斾尾閑王注先生監試杭州時以八月十六日放榜故云明朝開鎖放觀潮前有監試呈諸試官又催試官考較戲作可攷也柳子厚答夢得詩耦耕若便遺身世黄髪相看萬事休周易聖人以此洗心荘子山木篇願君刳形去皮洗心去欲而游於無人之地法界觀明華嚴品中法界大㫖注巳見楞嚴經摩登伽女以婆毗迦羅先梵天呪攝阿難入於媱室唐地理志越州餘姚縣武徳四年析故句章縣置龍井餘姚有龍泉寺在縣西王荆公嘗題詩云山腰石有千年潤井眼泉無一日乾杜子美太平寺泉眼詩香羙勝牛乳顧渚在湖州長興縣産茶劉禹錫試茶詩何况䝉山顧渚春白泥赤印走風塵日注在越州施註蘇詩巻十六
