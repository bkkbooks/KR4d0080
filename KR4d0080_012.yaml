body:
  text: 施注蘇詩宋史本傳元史臣托克托撰蘇軾字子瞻眉州眉山人生十年父洵遊學四方母程氏親授以書聞古今成敗輒能語其要程氏讀東漢范滂傳慨然太息軾請曰軾若為滂母許之否乎程氏曰汝能為滂吾顧不能為滂母邪比冠博通經史屬文日數千言好賈誼陸贄書既而讀莊子歎曰吾昔有見口未能言今見是書得吾心矣嘉祐二年試禮部方時文磔裂詭異之弊勝主司歐陽修思有以救之得軾刑賞忠厚論驚喜欲擢冠多士猶疑其客曽鞏所為但置第二復以春秋對義居第一殿試中乙科後以書見修修語梅聖俞曰吾當避此人出一頭地聞者始譁不厭久乃信服丁母憂五年調福昌主簿歐陽修以才識兼茂薦之祕閣試六論舊不起草以故文多不工軾始具草文義粲然復對制䇿入三等自宋初以來制䇿入三等惟吳育與軾而巳除大理評事簽書鳯翔府判官關中自元昊叛民貧役重岐下嵗輸南山木筏自渭入河經砥柱之險衙吏踵破家軾訪其利害為修衙規使自擇水工以時進止自是害減半治平二年入判登聞鼓院英宗自藩邸聞其名欲以唐故事召入翰林知制誥宰相韓琦曰軾之才逺大器也他日自當為天下用要在朝廷培養之使天下之士莫不畏慕降伏皆欲朝廷進用然後取而用之則人人無復異詞矣今驟用之則天下之士未必以為然適足以纍之也英宗曰且與修注如何琦曰記注與制誥為鄰未可遽授不若於館閣中近上貼職與之且請召試英宗曰試之未知其能否如軾有不能邪琦猶不可及試二論復入三等得直史館軾聞琦語曰公可謂愛人以德矣會洵卒賻以金帛辭之求贈一官於是贈光祿丞洵將終以兄太白早亡子孫未立妹嫁杜氏卒未葬屬軾軾既除喪即葬姑後官可蔭推與太白曽孫彭熙寧二年還朝王安石執政素惡其議論異己以判官告院四年安石欲變科舉興學校詔兩制三館議軾上議曰得人之道在於知人知人之法在於責實使君相有知人之明朝廷有責實之政則胥史皂𨽻未嘗無人而况於學校貢舉乎雖因今之法臣以為有餘使君相不知人朝廷不責實則公卿侍從常患無人而况學校貢舉乎雖復古之制臣以為不足夫時有可否物有廢興方其所安雖暴君不能廢及其既厭雖聖人不能復故風俗之變法制隨之譬如江河之徙移強而復之則難為力慶歷固嘗立學矣至於今日惟有空名僅存今將變今之禮易今之俗又當廢民力以治宫室斂民財以食遊士百里之內置官立師獄訟聽於是軍旅謀於是又簡不率教者屏之逺方則無乃徒為紛亂以患苦天下邪若乃無大更革而望有益於時則與慶歷之際何異故臣謂今之學校特可因仍舊制使先王之舊物不廢於吾世足矣至於貢舉之法行之百年治亂盛衰初不由此陛下視祖宗之世貢舉之法與今為孰精言語文章與今為孰優所得人才與今為孰多天下之事與今為孰辦較此四者之長短其議決矣今所欲變改不過數端或曰鄉舉德行而略文詞或曰専取䇿論而罷詩賦或欲兼采譽望而罷封彌或欲經生不貼墨而考大義此皆知其一不知其二者也願陛下留意於逺者大者區區之法何預焉臣又竊有私憂過計者夫性命之説自子貢不得聞而今之學者恥不言性命讀其文浩然無當而不可窮觀其貌超然無著而不可挹此豈真能然哉蓋中人之性安於放而樂於誕耳陸下亦安用之議上神宗悟曰吾固疑此得軾議意釋然矣即日召見問方今政令得失安在雖朕過失指陳可也對曰陛下生知之性天縱文武不患不明不患不勤不患不斷但患求治太急聽言太廣進人太鋭䫟鎮以安靜待物之來然後應之神宗悚然曰卿三言朕當熟思之凡在館閣皆當為朕深思治亂無有所隱軾退言於同列安石不恱命權開封府推官將困之以事軾決斷精敏聲聞益逺會上元敕府市浙燈且令損價軾疏言陛下豈以燈為恱此不過以奉二宫之歡耳然百姓不可戶曉皆謂以耳目不急之玩奪其口體必用之資此事至小體則甚大䫟追還前命即詔罷之時安石創行新法軾上書論其不便曰臣之所欲言者三言而巳䫟陛下結人心厚風俗存紀綱人主之所恃者人心而已如木之有根燈之有膏魚之有水農夫之有田商賈之有財失之則亡此理之必然也自古及今未有和易同衆而不安剛果自用而不危者陛下亦知人心之不恱矣祖宗以來治財用者不過三司今陛下不以財用付三司無故又創制置三司條例一司使六七少年日夜講求於內使者四十餘輩分行營幹於外夫制置三司條例司求利之名也六七少年與使者四十餘輩求利之器也造端宏大民實驚疑創法新奇吏皆惶惑以萬乘之主而言利以天子之宰而治財論説百端喧傳萬口然而莫之顧者徒曰我無其事何恤於人言操罔罟而入江湖語人曰我非漁也不如捐罔罟而人自信驅鷹犬而赴林藪語人曰我非獵也不如放鷹犬而獸自馴故臣以為消讒慝而召和氣則莫若罷條例司今君臣宵旰幾一年矣而富國之功茫如捕風徒聞內帑出數百萬緡祠部度五千餘人耳以此為術其誰不能而所行之事道路皆知其難汴水濁流自生民以來不以種稻今欲陂而清之萬頃之稻必用千頃之陂一嵗一淤三嵗而滿矣陛下遂信其説即使相視地形所在鑿空訪尋水利妄庸輕剽率意爭言官司雖知其疏不敢便行抑退追集老少相視可否若非灼然難行必須且為興役官吏苟且順從真謂陛下有意興作上靡帑廩下奪農時隄防一開水失故道雖食議者之肉何補於民臣不知朝廷何苦而為此哉自古役人必用鄉戶今者徒聞江浙之間數郡雇役而欲措之天下單丁女戶蓋天民之窮者也而陛下首欲役之富有四海忍不加恤自楊炎為兩稅租調與庸既兼之矣奈何復欲取庸萬一後世不幸有聚斂之臣庸錢不除差役仍舊推所從來則必有任其咎者矣青苖放錢自昔有禁今陛下始立成法每嵗常行雖云不許抑配而數世之後暴君汙吏陛下能保之與計䫟請之戶必皆孤貧不濟之人鞭撻已急則繼之逃亡逃亡不還則均及鄰保勢有必至異日天下恨之國史記之曰青苗錢自陛下始豈不惜哉且常平之法可謂至矣今欲變為青苗壞彼成此所喪逾多虧官害民雖悔何及昔漢武帝以財力匱竭用賈人桑𢎞羊之説買賤賣貴謂之均輸於時商賈不行盜賊滋熾幾至於亂孝昭既立霍光順民所欲而豫之天下歸心遂以無事不意今日此論復興立法之初其費已厚縱使薄有所獲而征商之額所損必多譬之有人為其主畜牧以一牛易五羊一牛之失則隱而不言五羊之獲則指為勞績今壞常平而言青苗之功虧商稅而取均輸之科何以異此臣竊以為過矣議者必謂民可與樂成難與慮始故陛下堅執不顧期於必行此乃戰國貪功之人行險僥幸之説未及樂成而怨已起矣臣之所䫟陛下結人心者此也國家之所以存亡者在道德之淺深不在乎強與弱歷數之所以長短者在風俗之薄厚不在乎富與貧人主知此則知所輕重矣故臣䫟陛下務崇道德而厚風俗不䫟陛下急於有功而貪富強愛惜風俗如護元氣聖人非不知深刻之法可以齊衆勇悍之夫可以集事忠厚近於迂闊老成初若遲鈍然終不肯以彼易此者知其所得小而所喪大也仁祖持法至寬用人有敘専務掩覆過失未嘗輕改舊章考其成功則曰未至以言乎用兵則十出而九敗以言乎府庫則僅足而無餘徒以德澤在人風俗知義故升遐之日天下歸仁焉議者見其末年吏多因循事不振舉乃欲矯之以苛察齊之以智能招來新進勇鋭之人以圖一切速成之效未享其利澆風巳成多開驟進之門使有意外之得公卿侍從跬步可圖俾常調之人舉生非望欲望風俗之厚豈可得哉近嵗朴拙之人愈少巧進之士益多惟陛下哀之救之以簡易為法以清淨為心而民德歸厚臣之所䫟陛下厚風俗者此也祖宗委任臺諫未嘗罪一言者縱有薄責旋即超升許以風聞而無官長言及乘輿則天子改容事關廊廟則宰相待罪臺諫固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者豈徒然哉將以折姦臣之萌也今法令嚴密朝廷清明所謂姦臣萬無此理然養貓以去鼠不可以無鼠而養不捕之貓畜狗以防盜不可以無盜而畜不吠之狗陛下得不上念祖宗設此官之意下為子孫萬世之防臣聞長老之談皆謂臺諫所言常隨天下公議公議所與臺諫亦與之公議所擊臺諫亦擊之今者物論沸騰怨讟交至公議所在亦知之矣臣恐自茲以往習慣成風盡為執政私人以致人主孤立紀綱一廢何事不生臣之所䫟陛下存紀綱者此也軾見安石贊神宗以獨斷専任因試進士發䇿以晉武平吳以獨斷而克苻堅伐晉以獨斷而亡齊桓専任管仲而霸燕噲専任子之而敗事同而功異為問安石滋怒使御史謝景溫論奏其過窮治無所得軾遂請外通判杭州髙麗入貢使者發幣於官吏書稱甲子軾郤之曰髙麗於本朝稱臣而不稟正朔吾安敢受使者易書稱熙寧然後受之時新政日下軾於其間每因法以便民民賴以安徙知密州司農行手實法不時施行者以違制論軾謂提舉官曰違制之坐若自朝廷誰敢不從今出於司農是擅造律也提舉官驚曰公姑徐之未幾朝廷知法害民罷之有盜竊發安撫司遣三班使臣領悍卒來捕卒凶暴恣行至以禁物誣民入其家爭鬬殺人且畏罪驚潰將為亂民奔訴軾軾投其書不視曰必不至此散卒聞之少安徐使人招出戮之徙知徐州河決曹村泛於梁山泊溢於南清河滙於城下漲不時泄城將敗富民爭出避水軾曰富民出民皆動搖吾誰與守吾在是水決不能敗城驅使復入軾詣武衛營呼卒長曰河將害城事急矣雖禁軍且為我盡力卒長曰太守猶不避塗潦吾儕小人當效命率其徒持畚鍤以出築東南長隄首起戲馬臺尾屬於城雨日夜不止城不沈者三版軾廬於其上過家不入使官吏分堵以守卒全其城復請調來嵗夫增築故城為木岸以虞水之再至朝廷從之徙知湖州上表以謝又以事不便民者不敢言以詩託諷庶有補於國御史李定舒亶何正言托其表語並媒蘖所為詩以為訕謗逮赴臺獄欲置之死煆鍊久之不決神宗獨憐之以黃州團練副使安置軾與田父野老相從溪山間築室於東坡自號東坡居士三年神宗數有意復用輒為當路者沮之神宗嘗語宰相王圭蔡確曰國史至重可命蘇軾成之圭有難色神宗曰軾不可姑用曽鞏鞏進太祖總論神宗意不允遂手札移軾汝州有曰蘇軾黜居思咎閲嵗滋深人材實難不忍終棄軾未至汝上書自言飢寒有田在常䫟得居之朝奏夕報可道過金陵見王安石曰大兵大獄漢唐滅亡之兆祖宗以仁厚治天下正欲革此今西方用兵連年不解東南數起大獄公獨無一言以救之乎安石曰二事皆惠卿啓之安石在外安敢言軾曰在朝則言在外則不言事君之常禮耳上所以待公者非常禮公所以待上者豈可以常禮乎安石厲聲曰安石須説又曰出在安石口入在子瞻耳又曰人須是知行一不義殺一不辜得天下弗為乃可軾戲曰今之君子爭減半年磨勘雖殺人亦為之安石笑而不言至常神宗崩哲宗立復朝奉郎知登州召為禮部郎中軾舊善司馬光章惇時光為門下侍郎惇知樞密院二人不相合惇每以謔侮困光光苦之軾謂惇曰司馬君實時望甚重昔許靖以虛名無實見鄙於蜀先主法正曰靖之浮譽播流四海若不加禮必以賤賢為纍先主納之乃以靖為司徒許靖且不可慢况君實乎惇以為然光賴以少安遷起居舍人軾起於憂患不欲驟履要地辭於宰相蔡確確曰公徊翔久矣朝中無出公右者軾曰昔林希同在館中年且長確曰希固當先公邪卒不許元祐元年軾以七品服入侍延和即賜銀緋遷中書舍人初祖宗時差役行久生弊編户充役者不習其役又虐使之多致破産狹鄉民至有終嵗不得息者王安石相神宗改為免役使戶産髙下出錢顧役行法者過取以為民病司馬光為相知免役之害不知其利欲復差役差官置局軾與其選軾曰差役免役各有利害免役之害掊斂民財十室九空斂聚於上而下有錢荒之患差役之害民常在官不得専力於農而貪吏猾胥得緣為姦此二害輕重蓋略等矣光曰於君何如軾曰法相因則事易成事有漸則民不驚三代之法兵農為一至秦始分為二及唐中葉盡變府兵為長征之卒自爾以來民不知兵兵不知農農出榖帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵蓋未易也光不以為然軾又陳於政事堂光忿然軾曰昔韓魏公刺陜西義勇公為諫官爭之甚力韓公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶光笑之尋除翰林學士二年兼侍讀每進讀至治亂興衰邪正得失之際未嘗不反覆開導覬有所啓悟哲宗雖恭默不言輒首肻之嘗讀祖宗寶訓因及時事軾歷言今賞罰不明善惡無所勸沮又黃河勢方北流而強使之東夏人入鎮戎殺掠數萬人帥臣不以聞每事如此恐寖成衰亂之漸軾嘗鎖宿禁中召入對便殿宣仁后問曰卿前年為何官曰臣為常州圑練副使曰今為何官曰臣今待罪翰林學士曰何以遽至此曰遭遇太皇太后皇帝陛下曰非也曰豈大臣論薦乎曰亦非也軾驚曰臣雖無狀不敢自他途以進曰此先帝意也先帝每誦卿文章必歎曰奇才奇才但未及進用卿耳軾不覺哭失聲宣仁后與哲宗亦泣左右皆感涕巳而命坐賜茶徹御前金蓮燭送歸院三年權知禮部貢舉會大雪苦寒士坐庭中噤不能言軾寬其禁約使得盡技巡鋪內侍每摧辱舉子且持曖昧單詞誣以為罪軾盡奏逐之四年積以論事為當軸者所恨軾恐不見容請外拜龍圖閣學士知杭州未行諫官言前相蔡確知安州作詩借郝處俊事以譏太皇太后大臣議遷之嶺南軾密疏朝廷若薄確之罪則於皇帝孝治為不足若深罪確則於太皇太后仁政為小纍謂宜皇帝敕置獄逮治太皇太后出手詔赦之則於仁孝兩得矣宣仁后心善軾言而不能用軾出郊用前執政恩例遣內侍賜龍茶銀合慰勞甚厚既至杭大旱飢疫並作軾請於朝免本路上供米三之一復得賜度僧牒易米以救飢者明年春又減價糶常平米多作饘粥藥劑遣使挾醫分坊治病活者甚衆軾曰杭水陸之會疫死比他處常多乃裒羡緡得二千復發槖中黃金五十兩以作病坊稍畜錢糧待之杭本近海地泉鹹苦居民稀少唐刺史李泌始引西湖水足六井民足於水白居易又浚西湖水入漕河自河入田所溉至千頃民以殷富湖水多葑自唐及錢氏嵗輒浚治宋興廢之葑積為田水無幾矣漕河失利取給江潮舟行市中潮又多淤三年一淘為民大患六井亦幾於廢軾見茅山一河専受江潮鹽橋一河専受湖水遂浚二河以通漕復造堰閘以為湖水蓄泄之限江潮不復入市以餘力復完六井又取葑田積湖中南北徑三十里為長堤以通行者吳人種菱春輒芟除不遺寸草且募人種菱湖中葑不復生收其利以備修湖取救荒餘錢萬緡糧萬石及請得百僧度牒以募役者堤成植芙蓉楊栁其上望之如畫圖杭人名為蘇公堤杭僧淨源舊居海濵與舶客交通舶至高麗交譽之元豐末其王子義天來朝因往拜焉至是淨源死其徒竊持其像附舶往告義天亦使其徒來祭因持其國母二金塔云祝兩宫夀軾不納奏之曰髙麗久不入貢失賜豫厚利意欲求朝未測吾所以待之厚薄故因祭亡僧而行祝夀之禮若受而不答將生怨心受而厚賜之正墮其計今宜勿與知從州郡自以理郤之彼庸僧猾商為國生事漸不可長宜痛加懲創朝廷皆從之未幾貢使果至舊例使所至吳越七州費二萬四千餘緡軾乃令諸州量事裁損民獲交易之利無復侵撓之害矣浙江潮自海門東來勢如雷霆而浮山峙於江中與漁浦諸山犬牙相錯洄洑激射嵗敗公私船不可勝計軾議自浙江上流地名石門並山而東鑿為漕河引浙江及溪谷諸水二十餘里以逹於江又並山為岸不能十里以逹龍山大慈浦自浦北折扺小嶺鑿嶺六十五丈以逹嶺東古河浚古河數里逹於龍山漕河以避浮山之險人以為便奏聞有惡軾者力沮之功以故不成軾復言三吳之水瀦為太湖太湖之水溢為松江以入海海日兩潮潮濁而江清潮水常欲淤塞江路而江水清駛隨輒滌去海口常通則吳中少水患昔蘇州以東公私船皆以篙行無陸挽者自慶歷以來松江大築挽路建長橋以扼塞江路故今三吳多水欲鑿挽路為十橋以迅江勢亦不果用人皆以為恨軾二十年間再蒞杭有德於民家有畫像飲食必祝又作生祠以報六年召為吏部尚書未至以弟轍除右丞改翰林承旨轍辭右丞欲與兄同備從官不聽軾在翰林數月復以讒請外乃以龍圖閣學士出知頴州先是開封諸縣多水患吏不究本末決其陂澤注之惠民河河不能勝致陳亦多水又將鑿鄧艾溝與潁河並且鑿黃堆欲注之於淮軾始至潁遣吏以水平準之淮之漲水髙於新溝幾一丈若鑿黃堆淮水顧流潁地為患軾言於朝從之郡有宿賊尹遇等數劫殺人又殺捕盜吏兵朝廷以名捕不獲被殺家復懼其害匿不敢言軾召汝隂尉李直方曰君能擒此當力言於朝乞行優賞不獲亦以不職奏免君矣直方有母且老與母訣而後行乃緝知盜所分捕其黨與手戟刺遇獲之朝廷以小不應格推賞不及軾請以已之年勞當改朝散郎階為直方賞不從其後吏部為軾當遷以符會其考軾謂巳許直方又不報七年徙揚州舊發運司主東南漕法聽操舟者私載物貨征商不得留難故操舟者輒富厚以官舟為家補其弊漏且周船夫之乏故所載率皆速逹無虞近嵗一切禁而不許故舟弊人困多盜所載以濟飢寒公私皆病軾請復舊從之未閲嵗以兵部尚書召兼侍讀是嵗哲宗親祀南郊軾為鹵簿使導駕入太廟有赭繖犢車并青蓋犢車十餘爭道不避儀仗軾使御營巡檢使問之乃皇后及大長公主時御史中丞李之純為儀仗使軾曰中丞職當肅政不可不以聞之純不敢言軾於車中奏之哲宗遣使齎疏馳白太皇太后明日詔整肅儀衛自皇后而下皆毋得迎謁尋遷禮部兼端明殿翰林侍讀兩學士為禮部尚書髙麗遣使請書朝廷以故事盡許之軾曰漢東平王請諸子及太史公書猶不肻豫髙麗所請有甚於此其可豫乎不聽八年宣仁后崩哲宗親政軾乞補外以兩學士出知定州時國是將變軾不得入辭既行上書言天下治亂出於下情之通塞至治之極小民皆能自通逮於大亂雖近臣不能自逹陛下臨御九年除執政臺諫外未嘗與羣臣接今聽政之初當以通下情除壅蔽為急務臣日侍帷幄方當戍邊顧不得一見而行况疏逺小臣欲求自通難矣然臣不敢以不得對之故不效愚忠古之聖人將有為也必先處晦而觀明處靜而觀動則萬物之情畢陳於前陛下聖智絶人春秋鼎盛臣䫟虛心循理一切未有所為默觀庶事之利害與羣臣之邪正以三年為期俟得其實然後應物而作使既作之後天下無恨陛下亦無悔由此觀之陛下之有為惟憂太蚤不患稍遲亦巳明矣臣恐急進好利之臣輒勸陛下輕有改變故進此説敢望陛下留神社稷宗廟之福天下幸甚定州軍政壞弛諸衛卒驕惰不教軍校蠺食其廩賜前守不敢誰何軾取貪汙者配𨽻逺惡繕修營房禁止飲博軍中衣食稍足乃部勒戰法衆皆畏伏然諸校業業不安有卒史以贓訴其長軾曰此事吾自治則可聽汝告軍中亂矣立決配之衆乃定會春大閲將吏久廢上下之分軾命舉舊典帥常服出帳中將吏戎服執事副總管王光祖自謂老將恥之稱疾不至軾召書吏使為奏光祖懼而出訖事無一慢者定人言自韓琦去後不見此禮至今矣契丹久和邊軍不可用惟沿邊弓箭社與寇為鄰以戰射自衛猶號精鋭故相龎籍守邊因俗立法嵗久法弛又為保甲所撓軾奏免保甲及兩稅折變科配不報紹聖初御史論軾掌內外制日所作詞命以為譏斥先朝遂以本官知英州尋降一官未至貶寧逺軍節度副使惠州安置居三年泊然無所蒂芥人無賢愚皆得其歡心又貶瓊州别駕居昌化昌化故儋耳地非人所居藥餌皆無有初僦官屋以居有司猶謂不可軾遂買地築室儋人運甓畚土以助之獨與幼子過處著書以為樂時時從其父老遊若將終身徽宗立移廉州改舒州圑練副使徙永州更三大赦遂提舉玉局觀復朝奉郎軾自元祐以來未嘗以嵗課乞遷故官止於此建中靖國元年卒於常州年六十六軾與弟轍師父洵為文既而得之於天嘗自謂作文如行雲流水初無定質但常行於所當行止於所不可不止雖嬉笑怒罵之詞皆可書而誦之其體渾潤光芒雄視百代有文章以來蓋亦鮮矣洵晚讀易作易傳未究命軾述其志軾成易傳復作論語説後居海南作書傳又有東坡集四十卷後集二十卷奏議十五卷內制十卷外制三卷和陶詩四卷一時文人如黃庭堅鼂補之秦觀張耒陳師道舉世未之識軾待之如朋儔未嘗以師資自豫也自為舉子至出入侍從必以愛君為本忠規讜論挺挺大節羣臣無出其右但為小人忌惡擠排不使安於朝廷之上髙宗即位贈資政殿學士諡文忠以其孫符為禮部尚書孝宗置其文左右讀之終日忘倦謂為文章之宗親製集贊賜其曽孫嶠遂崇贈太師軾三子邁逮過俱善為文邁駕部貟外郎逮承務郎過字叔黨軾知杭州過年十九以詩賦解兩浙路禮部試下及軾為兵部尚書任右承務郎軾帥定武謫知英州貶惠州遷儋耳漸徙廉永獨過侍之凡生理晝夜寒暑所須者一身百為不知其難初至海上為文曰志隱軾覽之曰吾可以安於島夷矣因命作孔子弟子別傳軾卒於常州過葬軾汝州郟城小峨眉山遂家潁昌營湖隂水竹數畝名曰小斜川自號斜川居士卒年五十二初監太原府稅次知潁昌府郾城縣皆以法令罷晚權通判中山府有斜川集二十卷其思子臺賦颶風賦早行於世時稱為小坡蓋以軾為大坡也其叔轍每稱過孝以訓宗族且言吾兄逺居海上惟成就此兒能文也七子籥籍節笈篳笛簫論曰蘇軾自為童子時士有傳石介慶歷聖德詩至蜀中者軾歷舉詩中所言韓富杜范諸賢以問其師師怪而語之則曰正欲識是諸人耳蓋巳有頡頏當世賢哲之意弱冠父子兄弟至京師一日而聲名赫然動於四方既而登上第擢詞科入掌書命出典方州器識之閎偉議論之卓犖文章之雄俊政事之精明四者皆能以特立之志為之主而以邁往之氣輔之故意之所向言足以逹其有猷行足以遂其有為至於禍患之來節義足以固其有守皆志與氣所為也仁宗初讀軾轍制䇿退而喜曰朕今日為子孫得兩宰相矣神宗尤愛其文宫中讀之膳進忘食稱為天下奇才二君皆有以知軾而軾卒不得大用一歐陽修先識之其名遂與之齊豈非軾之所長不可掩抑者天下之至公也相不相有命焉嗚呼軾不得相又豈非幸歟或謂軾稍自韜戢雖不獲柄用亦當免禍雖然假令軾以是而易其所為尚得為軾哉
