body:
  text: 施注蘇詩卷三十五宋蘇軾撰施元之原注武進邵長蘅刪補詩四十五首起南遷盡在惠州作施注缺今補壺中九華詩一統志九華山在青陽縣舊名九子山李白謂九峰似蓮花乃更今名湖口人李正臣蓄異石九峰玲瓏宛轉若窗櫺然豫欲以百金買之與仇池石為偶方南遷未暇也名之曰壺中九華且以詩記之清溪電轉失雲峰夢裏猶驚翠掃空五嶺莫愁千嶂外九華今在一壺中天池水落層層見玉女窗明處處通念我仇池太孤絶百金歸買碧玲瓏裴氏廣州記大庾始安臨賀桂陽揭陽是謂五嶺壺中用費長房事詳第八卷刁景純席上詩注莊子逍遙遊南溟者天池也又按青城廬山皖山所在皆有天池詩特借言耳王文考魯靈光殿賦玉女窺窗而下視江西一首江西山水真吾邦白沙翠竹石底江舟行十里磨九瀧篙聲犖確相舂撞醉卧欲醒聞淙淙真欲一口吸老龎何人得俊窺魚矼舉叉絶呌尺鯉雙杜子美詩白沙翠竹江村暮柳宗元小石潭記下見小潭水尤清冽泉石以為底地志韶州昌樂縣有瀧水說文瀧奔水也韓退之詩山石犖確行徑微又詩船石相舂撞傳燈録龎居士藴參馬祖云不與萬法為侣者是什麼人祖云待汝一口吸盡西江水即向汝道左傳莊十一年得俊曰克韓退之人魚詩得俊語時囂爾雅石矼謂之崎吉樂府客從逺方來贈我雙鯉魚秧馬歌并引過廬陵見宣德郎致仕曽君安止出所作禾譜文既溫雅事亦詳實惜其有所缺不譜農器也豫昔遊武昌見農夫皆騎秧馬以榆棗為腹欲其滑以楸桐為背欲其輕腹如小舟昻其首尾背如覆瓦以便兩髀雀躍於泥中繫束藁其首以縛秧日行千畦較之傴僂而作者勞佚相絶矣史記禹乘四載泥行乘橇解者曰橇形如箕擲行泥上豈秧馬之類乎作秧馬歌一首附於禾譜之末云春雲濛濛雨淒淒春秧欲老翠剡齊嗟我婦子行水泥朝分一壠暮千畦腰如箜篌首啄雞筋煩骨殆聲酸嘶我有桐馬手自提頭尻軒昻腹脅低背如覆瓦去角圭以我兩足為四蹄聳踊滑汰入聲如鳧鷖纎纎束藳亦可齎何用繁纓與月題郤從畦東走畦西山城欲閉聞鼓鼙忽作的盧躍檀溪歸來挂壁從髙栖了無芻秣飢不啼少壯騎汝逮老黧何曽蹶軼防顛隮一作擠錦韀公子朝金閨笑我一生踏牛犁不知自有木駃騠杜子美稻畦詩芊芊炯翠羽剡剡向銀漢箜篌見首卷壬寅寄子由詩注按箜篌似筝而腰曲故以為比韓退之詩磨淬出角圭古樂府解題有兩頭纎纎詩晉載記童謡曰一束藁兩頭燃周禮王之五路一曰玉路鍚繁纓注疏繁馬大帶纓馬鞍也月題字出莊子馬額上當顱如月形者的盧劉備事詳見十二卷和子由同遊百步洪詩注又水經注檀溪今有的盧溪尚書微子今爾無指告豫顛隮江文通别賦金閨之諸彥注金馬門也杜子美詩李侯金閨彥駃騠字見漢書胸奴傳注俊馬也生七日而超其母八月七日初入贑過惶恐灘七千里外二毛人十八灘頭一葉身山憶喜歡勞逺夢公自注蜀道有錯喜歡鋪在大散關上地名惶恐泣孤臣長風送客添帆腹積雨浮一作扶舟減石鱗便合與官充水手此生何止略知津一統志贑州府城北章貢二水所合抵萬安縣界有十八灘惶恐其一也中多怪石最險鬱孤臺公自注以下四首皆䖍州八境見圖畫鬱孤如舊游山為翠浪湧水作玉虹流日麗崆峒曉風酣章貢秋丹青未變葉鱗甲欲生洲嵐氣昏城樹灘聲入市樓煙雲侵嶺路草木半炎州故國千峰外髙臺十日留他年三宿處凖擬繫歸舟八景圖詩見十三卷一統志崆峒山在贛州郡城南後凡言崆峒者指此非隴州之崆峒也水經注劉登之曰贑縣東南有章水西有貢水縣治二水之間因以名焉楚辭逺遊嘉南州之炎德韓退之詩南逾橫嶺入炎州或作洲三宿用內典語又浮屠不三宿桑下出後漢襄楷傳詳見二十卷别黃州詩注亷泉水性故自清不清或撓之君看此亷泉五色爛摩尼亷者謂我亷我以此名為有亷則有貪有慧則有癡誰為栁宗元孰是吳隱之漁父足豈潔許由耳何淄紛然立名字此水了不知毁譽有時盡不知無盡時朅來亷泉上捋䰅看鬢眉好在水中人到處相娛嬉圓覺經譬如清淨摩尼寶珠映於五色隨方各現杜詩惟有摩尼珠可照濁水源再見愚溪貪泉洗耳並巳見先生泛穎詩云豈此水薄相與我相娛嬉塵外亭楚山淡無塵贑水清可厲散䇿塵外遊麾手謝此世山髙惜人力十步輒一憩郤立浮雲端俯視萬井麗幽人宴坐處龍虎為斬剃馬駒獨何疑豈墮山鬼計夜垣非助我謬敬欲其逝戲留一轉語千載起攘袂幽人以下八句皆指馬祖事傳燈録六祖謂南嶽曰向去佛法從汝邉去西天般若多羅䜟汝足下出一馬駒踏殺天下人厥後江西傳法遂廣布於天下時號馬祖又馬祖始居此山山鬼為築垣自謂修行不至為鬼所識乃捨去又洞山直道本來無一物這裏合下得一轉語天竺寺井引豫年十二先君自䖍州歸謂豫言近城山中天竺寺有樂天親書詩云一山門作兩山門兩寺元從一寺分東澗水流西澗水南山雲起北山雲前臺花發後臺見上界鐘清下界聞遙想吾師行道處天香桂子落紛紛筆勢竒逸墨跡如新今四十七年豫來訪之則詩已亡有刻石存耳感涕不已而作是詩香山居士留遺跡天竺禪師有故家空詠連珠吟疊璧已亡飛鳥失驚蛇林深野桂寒無子雨浥山薑病有花四十七年真一夢天涯流落淚橫斜唐宣宗弔樂天詩綴玉連珠三十年誰教冥路作詩仙按樂天此詩乃連珠體也書評懷素草書如飛鳥出林驚蛇入草嶺表異録山薑花莖葉即薑也根不堪食而葉閒吐花細如麥粒按本草术一名山薑過大庾嶺一念失垢汙身心洞清淨浩然天地間惟我獨也正今日嶺上行身世永相忘仙人拊我頂結髮受長生莊子德充符受命於地惟松柏獨也正在冬夏青青受命於天惟堯舜獨也正在萬物之首白樂天詩可憐身與世從此兩相忘仙人二句乃李白流夜郎贈韋太守詩先生用其語蓋有所感也宿建封寺曉登盡善亭望韶石三首圖經傳聞有二仙人衣冠相對踞坐二石上云昔帝舜嘗奏樂於此言訖不見郡國志韶州有韶石山舜登此奏韶樂焉一統志在府城東北山多怪石雙闕浮光照短亭至今猿鳥嘯青熒君王自此西巡狩再使魚龍舞洞庭水經韶石對峙似闕又有鳯閣毬門之名劉夢得詩乘樏不來廣樂絶獨與猿鳥愁青熒西巡狩詩意以嶽州洞庭在韶州西故云自此而西特借用舜典字耳莊子天運篇黃帝張咸池之樂於洞庭之野列子瓠巴鼓琴而鳥舞魚躍蜀人文賦楚人辭堯在崇山舜九疑聖主若非真得道南來萬里亦何為司馬相如大人賦歷唐堯於崇山兮過虞舜於九疑漢書注崇山狄山也海外經曰狄山帝堯葬於其陽九疑山在零陵營道縣舜所葬也山海經南方蒼梧之丘其中有九疑山舜所葬處嶺海東南月窟西功成天已錫𤣥圭此方定是神仙宅禹亦東來隱㑹稽揚雄長楊賦西厭月窟東震日域尚書禹貢禹錫元圭告厥成功孫綽天台山賦元聖之所降逰靈仙之所窟宅史記夏本紀禹東巡狩至於㑹稽而崩帝王世紀禹崩於㑹稽葬㑹稽山隂縣之南今山上有禹冢月華寺公自注寺鄰岑水場施者皆坑戶也百年間蓋三焚矣天公胡為不自憐結土融石為銅山萬人探斫富媪泣祗有金帛資豪姦脫身獻佛意可料一瓦坐待千金還月華三火豈天意至今茇舍依榛菅僧言此地本龍象興廢反掌曽何艱髙巖夜吐金碧氣曉得異石青斕斑坑流窟發錢湧地莫施百鎰朝千鍰此山出寶以自賊地脈已斷天應慳我願銅山化南畞爛熳黍麥蘇惸鰥道人修道要底物破鐺煮飯茒三間漢書吳有章郡銅山又賜通蜀東道銅山鑄錢又禮樂志郊社歌后土富媪昭明三光張晏注曰媪老母稱也坤為母故稱媪周禮大司馬仲夏教茇舍注草舍也智度論水行中龍陸行中象故荷大法力比之龍象按月華寺智藥三藏真身在焉故有龍象之語史記天官書金寶之上皆有氣杜子美詩潤聚金碧氣清無砂土痕漢書秦幣黃金方寸而重一斤以鎰為名尚書吕刑其罰千鍰史記䝉恬列傳䝉恬喟然太息曰起臨洮屬之遼東城塹萬餘里此其中不能無絶地胍哉南華寺曹溪通志南華山南華寺為六祖慧能道埸按通首皆六祖事云何見祖師要識本來面亭亭塔中人問我何所見可憐明上座萬法了一電飲水既自知指月無復眩我本修行人三世積精錬中間一念失受此百年譴摳衣禮真相感動淚雨霰借師錫端泉洗我綺語硯傳燈録道明禪師聞五祖密付衣鉢與盧行者即躡跡追逐至庾嶺曰我來求法願行者開示祖曰不思善不思惡正恁麼時那個是明上座本來面目師當下大悟楞嚴經如人以手指月示人彼人因指當應看月若復觀指以月為體此人豈惟亡失月輪亦亡其指禮記摳衣趨隅必慎唯諾鮑昭詩泪下如流霰傳燈録六祖初住曹溪卓錫泉湧清涼甘滑贍足大衆曹溪志卓錫泉一名明通泉凡泉脉枯僧持祖衣往叩即通流碧落洞公自注在英州下十五里槎牙亂峰合晃蕩絶壁橫遙知紫翠閒古來仙釋并陽崖射朝日髙處連玉京隂谷叩白月夢中遊化城果然石門開中有銀河傾幽龕入窈窕别戶穿虛明泉流下珠琲乳湔交縵纓我行畏人知恐為仙者迎小語輒響答空山自雷驚䇿杖歸去來治具煩方平靈樞金景內經下離塵境上界玉京注云玉京無為之天也蓋三十二帝之都法華經有一𨗳師以方便力化作一城於是衆人前入化城生巳度想生安穩想一統志洞多懸石如霓旌羽蓋旁有小洞號雲華深不可測按詩所云幽龕别戶即指其處也史記魏其武安侯傳魏其夫妻治具自旦至今未敢嘗食神仙傳王方平降蔡經家須臾麻姑繼至再拜方平行厨具食皆金盤玉杯多諸花果芬香異常擘脯食之云是麟脯峽山寺公自注傳竒所記孫恪袁氏事即此寺至今有人見白猿者天開清逺峽地轉凝碧灣我行無遲速攝衣步孱顔山僧本幽獨乞食况未還雲碓水自舂松門風為關石泉解娛客琴筑鳴空山佳人劍翁孫逰戲暫人間忽憶嘯雲侣賦詩留玉環林深不可見霧雨霾一作埋髻鬟郭璞江賦豁若天開地志清逺峽一名中宿峽崇山峻立中貫江流寺一名飛來寺白樂天詩藥爐有火丹應伏雲碓無人水自㫪釋惠標詩松門夾細草又杜子美詩松門似畫圖吳越春秋越王問劍於處女處女將見王道逢袁公公曰聞子善劍術女子曰願試也公即挽以刺女女舉杖擊之公即上樹化而為白猿傳竒廣德中有孫恪者遊洛中遇袁氏女遂納為室後十餘年同至峽山寺袁氏欣然改服理鬢詣老僧乃持一碧玉環獻僧曰此是院舊物僧初不曉及齊罷有野猿數十悲嘯捫蘿而躍袁氏惻然俄命筆題詩云無端變化幾湮沈剛被恩情役此心不如逐伴歸山去長嘯一聲煙霧深詩畢遂裂衣化為老猿追嘯者躍樹而去老僧方悟曰乃貧道為沙門時所飬者碧玉環則胡人所施繫於其頸者舟行至清逺縣見顧秀才極談惠州風物之美到處聚觀香案吏此邦宜著玉堂仙江雲漠漠桂花溼梅雨翛翛荔子然聞道黃柑常抵鵲不容朱橘更論錢恰從神武來宏景便向羅浮覓稚川唐史若仗在紫宸內閣則起居舍人夾香案分立殿下杜子美詩朱橘不論錢晉書葛洪字稚川聞交趾出丹砂求為勾漏令刺史鄧嶽留不聼去洪乃止羅浮山屢見廣州蒲澗寺公自注地産菖蒲十二節相傳安期生之故居始皇訪之於此太平寰宇志菖蒲澗一名甘溪南越志云交州刺史陸允所開不用山僧導我前自尋雲外出山泉千章古木臨無地百尺飛濤瀉漏天昔日菖蒲方士宅後來薝蔔祖師禪而今只有花含笑笑道秦皇欲學仙公自注山中多含笑花史記貨殖傳山居千章之楸注大材曰章又杜子美詩千章夏木清寰宇記戎州宜賔縣有大黎小黎二山四時霑霖俗謂之大漏天小漏天唐詩地道漏天終嵗雨杜子美詩鼓角漏天東香譜梔子香出大食國即佛書所謂薝蔔也傳燈録仰山謂香嵓禪師曰汝只得如來禪未得祖師禪遁齊閒覽南方花木北地所無者大含笑小含笑其花常若菡萏之未敷者故有含笑之名贈蒲澗長老優鉢曇花豈有花問師此曲唱誰家巳從子美得桃竹公自注此山有桃竹可作杖而上人不識豫始録子美詩遺之不向安期覓棗瓜燕坐林間時有虎髙眠粥後不聞鴉勝逰自古兼支許為採松肪寄一車法華經佛告舍利佛如是妙法如優曇鉢花時一現耳王注佛言優曇鉢五百年而開花其花極香且有花而無實傳燈録風穴延沼禪師有盧陂長老問曰師唱誰家曲宗風嗣阿誰延沼禪師曰超然逈出威音外翹足徒勞讃底沙志林桃竹葉如棕身如竹密節而實中蓋天成拄杖也杜子美桃竹杖引江心蟠石生桃竹蒼波噴浸尺度足斬根削皮如紫玉江妃水仙惜不得云云晉書王羲之傳㑹稽有佳山水名士多居之孫綽李充許詢支遁等皆以文義冠世並築室東土與羲之同好本草松脂久服輕身不老一名松脂一名松肪發廣州朝市日已逺此身良自如三杯軟飽後公自注浙人謂飲酒為軟飽一枕黑甜餘公自注俗謂睡為黑甜蒲澗疏鐘外黃灣落木初天涯未覺逺處處各樵漁韓退之南海神廟碑扶胥之口黃木之灣按灣在府城東南浴日亭公自注在南海廟前劍氣崢嶸夜插天瑞光明滅到黃灣坐看暘谷浮金暈遙想錢塘涌雪山已覺滄涼蘇病骨更煩沆瀣洗衰顔忽驚鳥動行人起飛上千峰紫翠間列子孔子東遊見兩小兒辨鬭其一曰日出之初滄滄涼涼及其日中熱如探湯司馬相如大人賦呼吸沆瀣兮餐朝霞遊羅浮山一首示兒子過人間有此白玉京羅浮見日雞一鳴公自注劉夢得有詩記羅浮夜半見日事山不甚髙而夜見日此可異也南樓未必齊日觀鬱儀自欲朝朱明公自注山有二石樓今延祥寺在南樓下朱明洞在冲虛觀後云是蓬萊第七洞天東坡之師抱朴老真契久已交前生玉堂金馬久流落寸田尺宅今誰耕道華亦嘗啖一棗公自注唐永樂道士侯道華竊食鄧天師藥仙去永樂有無核棗人不可得道華獨得之豫在岐下亦嘗得食一枚契虛正欲仇三彭公自注唐僧契虛遇人導游稚川仙府真人問曰汝絶三彭之仇乎契虛不能答鐵橋石柱連空橫公自注山有鐵橋石柱人罕至者杖藜欲趁飛猱輕雲溪夜逢瘖虎伏公自注山有啞虎巡山斗壇晝出銅龍吟公自注冲虛觀後有朱真人朝斗壇近於壇上獲銅龍六銅魚一小兒少年有竒志中宵起坐存黃庭近者戲作凌雲賦筆勢倣佛離騷經負書從我盍歸去羣仙正草新宫銘汝應奴𨽻蔡少霞我亦季孟山元卿公自注唐有夢書新宫銘者云紫陽真人山元卿撰其略曰良常西麓原澤東泄新宫宏宏崇軒䡾䡾又有蔡少霞者夢人遣書碑略曰昔乘魚車今履瑞雲躅空仰塗綺輅輪囷其末題云五雲書閣吏蔡少霞書還須略報老同叔贏糧萬里尋初平公自注子由一字同叔李太白詩天上白玉京十二樓五城劉禹錫羅浮山詩隂陽迭用事乃俾夜作晨咿喔天雞鳴扶桑色昕昕赤波千萬里湧出黃金輪鄒師正羅浮指掌圖山髙三千六百丈袤直五百里周三百里上有大小石樓相去五里皆髙出雲表登之可望滄海夜半見日初出泰山日觀注屢見黃庭內景經髙奔日月吾上道鬱儀結鄰善相保注鬱儀奔日之仙也茅君內傳太天之內有地中之洞天三十六所羅浮山之洞周回五百里名曰朱明耀真之天謝靈運羅浮山賦朱明之陽宫耀真之隂室又山志云朱明洞即葛洪修煉之地黃庭內景經脾神常在字魂庭晝夜存之可長生注云魂黃庭也初平事見十四卷和子由送將官梁左藏詩注十月二日初到惠州按年譜為紹聖元年十月倣佛曽遊豈夢中欣然雞犬識新豐吏民驚怪坐何事父老相携迎此翁蘇武豈知還漠北管寧自欲老遼東嶺南萬户皆春色公自注嶺南萬戶酒㑹有幽人客寓公西京雜記髙祖既作新豐并移舊社衢巷棟宇物色惟舊男女老幼相携路首各知其室放犬羊雞鴨於通衢亦競識其家三國志管寧北海朱虛人方天下大亂寧聞公孫度令行於海外遂與邴原王烈等至遼東即往見度遂廬於山谷示無遷志禮記諸侯不臣寓公寓居合江樓海上葱曨氣佳哉二江合處朱樓開蓬萊方丈應不逺肯為蘇子浮江來江風初凉睡正美樓上啼鴉呼我起我今身世兩相違西流白日東流水樓中老人日清新天上豈有癡仙人三山咫尺不歸去一杯付與羅浮春公自注豫家釀酒名羅浮春二江東江西江也按府志東江自贑州南流過龍川河源至府城東西江在府城西南蓬萊方丈注屢見按廣州香山縣有三洲山三山並立海中詩意似指此續仙傳侯道華好子史手不釋卷衆或問之要此何為答曰天上無愚瞢仙人白水山佛跡巖公自注羅浮之東麓也在惠州東北二十里顧微廣州記南海增城縣白水山有瀑布懸注百許丈西有佛跡巖其東湯泉出焉志林紹聖元年十月十二日過遊白水佛跡院浴于湯池熱甚其源殆可熟物循山而東有懸水百仞八九折折處輒為潭水涯有巨人跡數十所謂佛跡也何人守蓬萊夜半失左股浮山若鵬蹲忽展垂天羽根株互連絡崖嶠爭吞吐神工自爐鞴融液相綴補至今餘隙罅流出千斛乳方其欲合時天匠麾月斧帝觴分餘瀝山骨醉后土峰巒尚開闔澗谷猶呼舞海風吹未凝古佛來布武當時汪罔氏投足不蓋拇青蓮雖不見千古落花雨雙溪匯九折萬馬騰一鼓奔雷濺玉雪潭洞開水府潛鱗有饑蛟掉尾取渴虎我來方醉後濯足聊戲侮回風卷飛雹掠面過彊弩山靈莫惡劇微命安足賭此山吾欲老慎勿厭求取溪流變春酒與我相賔主當連青竹竿下灌黃精圃地理志惠州浮山自㑹稽來今浮山上猶有東方草木又羅浮山記羅山自為一山浮山即蓬萊别島堯時洪水浮至依羅而止二山合體謂之羅浮按詩中蓬萊失守及根株連絡神工綴補語即指此易明夷夷于左股莊子逍遙遊鵬之背若太山其翼若垂天之雲禮記堂下布武家語孔子曰汪罔氏之君守封嵎之山者為漆姓在虞夏商為汪罔氏於周為長翟氏按古佛三句指巨人跡也楞嚴經即時天雨百寶蓮花青黃赤白間錯紛糅栁子厚山水記泉大類轂雷鳴西奔李白襄陽歌此江若變作春酒壘麴便築糟丘臺杜子美泉眼詩何當宅下流餘潤通藥圃三春溼黃精一食生毛羽詠湯泉公自注在白水山積水焚大槐蓄油災武庫驚然丞相井疑浣將軍布自憐耳目隘未測隂陽故鬱攸火山烈觱沸湯泉注豈惟渴獸駭坐使癡兒怖安能長魚鱉僅可燖狐山中惟木客戶外時芒屨雖無傾城浴幸免亡國汚莊子雜篇水中有火乃焚大槐博物志積油萬石則自然生火昔晋泰武中武庫火積油所致又臨卭火井諸葛丞相往視之後火轉盛異苑亦云聖證論梁冀衣布有垢則洗之於火後漢梁冀傳帝曰此跋扈將軍也列子周穆王大征西戎西戎獻火浣之布浣之必投于火布則火色垢則布色出火而振之皓然疑乎雪十洲記炎洲在南海中有火林山山中有獸大如鼠毛長三四寸取其毛績以為布名曰火浣布左傳哀三年司鐸火子服景伯命濟濡帷幕鬱攸從之注鬱攸火氣也山海經注火山國雖經霖雨火常烈魏書崑崙之墟有炎火之山詩小雅觱沸檻泉吳越春秋越有木客村勾踐使工人伐木欲以獻吳久不得歸工人憂思作木客吟後人因以名其地互見十三卷八境圖詩注驪山華清宫有溫泉即貴妃浴處自笑一首子石如琢玉逺煙真削黳入我病風手公自注古語云磨墨如病風手𤣥雲淹淒淒是中有何好而我喜欲迷既似蠟屐阮又如煆栁嵇醉筆得天公宛宛天投霓一作霓多謝中書君伴我此幽栖歐陽永叔硯譜端石以子石為上本草松柏千年為茯苓又千年為琥珀又千年為黳燒之作松氣為用與琥珀同狀似𤣥玉而甚輕出西戎釋名醫是衆珀之長亦曰䃜其色黳黑故名阮屐嵇煆並巳見詩小雅有淹淒淒後漢五行志靈帝光和元年有黑氣墮北宫溫明殿東庭中黑如車蓋起奮迅身五色有頭體長十餘丈形貌似龍上問蔡雍對曰所謂天投霓者也朝雲詩并引世謂樂天有粥駱馬放楊栁枝詞嘉其主老病不忍去也然夢得有詩云春盡絮飛留不得隨風好去落誰家樂天亦云病與樂天相伴住春隨樊子一時歸則是樊素竟去也豫家有數妾四五年相繼辭去獨朝雲者隨豫南遷因讀樂天集戲作此詩朝雲姓王氏錢塘人嘗有子曰幹兒未朞而夭云不似楊枝别樂天恰如通德伴伶𤣥阿奴絡秀不同老天女維摩總解禪經卷藥罏新活計舞衫歌扇舊因緣丹成逐我三山去不作巫陽雲雨仙前三句故實屢見按阿奴句似指幹兒之夭也維摩經天女居維摩室與舍利佛發明禪理維摩曰此天女巳能遊戲菩薩之神通也白樂天集有閒居貧活計詩宋玉髙唐賦昔者先王嘗遊髙唐怠而晝寢夢一婦曰妾巫山之神女也旦為朝雲暮為行雨朝朝暮暮陽臺之下寄虎兒按虎兒猶子逺也獨倚桄榔樹閒挑蓽撥根謀生看拙否送老此蠻村廣志桄榔樹大四五圍長五六丈直上無條枝可作杖其顛生葉不過數十似栟櫚本草圖經蓽撥生波斯國今嶺南有之多生竹林內正月發苖作叢髙三四尺十一月二十六日松風亭下梅花盛開按年譜先生以紹聖元年十月三日至惠州寓居嘉祐寺松風亭春風嶺上淮南村昔年梅花曽斷魂公自注豫昔赴黃州春風嶺上見梅花有兩絶句明年正月往岐亭道上賦詩云去年今日關山路細雨梅花正斷魂豈知流落復相見蠻風蛋雨愁黃昏長條半落荔枝浦卧樹獨秀桄榔園豈惟幽光留夜色直恐冷艷排冬溫松風亭下荆棘裏兩株玉蘂明朝暾海南仙雲嬌墮砌月下縞衣來扣門酒醒夢覺起繞樹妙意有在終無言先生獨飲勿歎息幸有落月窺清尊一統志廣州府城東有荔枝洲周五十里南漢嘗建昌華苑其上按縞衣以下即咏趙師雄事再用前韻羅浮山下梅花村玉雪為骨氷為魂紛紛初疑月挂樹耿耿獨與參橫昏先生索居江海上悄如病鶴栖荒園天香國艷肻相顧知我酒熟詩清溫蓬萊宫中花鳥使緑衣倒挂扶桑暾公自注嶺南珍禽有倒挂子緑衣紅啄如鸚鵡而小自海東來非塵埃中物也抱叢窺我方醉卧故遣啄木先敲門麻姑過君急掃灑鳥能歌舞花能言酒醒人散山寂寂惟有落蘂粘空樽唐托言僧栖白詩忍苦為詩身到此氷魂雪魄已難招杜子美徐卿二子歌秋水為神玉為骨又詩天橫醉後參禮記子夏曰吾離羣而索居亦巳久矣唐明皇天寶末遣使採民間美女納之宫中號花鳥使劉繢霏雪録桐花鳯即東坡詞所謂倒挂緑毛么鳯是也李之儀詠倒挂詞自注云此鳥以十二月來好集美人叉上謂之收香倒挂又名探花使按此則花鳥使正指倒挂也異物志啄木大如鵲青黑色人呼為山啄木穿木食蠧左思詩南山有鳥自名啄木韓退之詩洛陽窮秋厭窮獨丁丁啄門疑啄木李肇國史補李泌以虛誕自任嘗對客曰令家人速掃灑今夜洪崖先生來有人遺美酒㑹有客至乃曰麻姑送酒來與君同傾言未畢門者曰某侍郎取榼子泌命倒還略無怍色新釀桂酒先生桂酒頌序楚辭曰奠桂酒兮椒漿是桂可以為酒也有隱居者以桂酒方教吾釀成而玉色香味超然非世間物也搗香篩辣入瓶盆盎盎春溪帶雨渾收拾小山藏社罋招呼眀月到芳樽酒材已遣門生致菜把仍叨地主恩爛煮葵羮斟桂醑風流可惜在蠻村小山淮南小山作招隱士篇其詞曰桂樹叢生兮山之幽三見周禮酒正以式法授酒材杜子美詩清晨䝉菜把常荷地主恩惠守詹君見和復次韻已破誰能惜甑盆頽然醉裏得全渾欲求公瑾一倉米試滿莊生五石樽三杯卯困忘家事萬戶春濃感國恩刺史不須要半道籃輿未暇走山村破甑孟敏事見第七卷與周長官游徑山詩注三國吳魯肅傳周瑜故過候肅并求資糧肅家有兩囷米各三千斛肅乃指一倉與周瑜公瑾瑜字白樂天有卯飲詩籃輿半道用陶淵明事屢見花落復次前韻玉妃謫墮煙雨村先生作詩與招魂人間草木非我對奔月偶挂成幽昏暗一作暗香入戶尋短夢青子綴枝留小園披衣連夜喚客飲雪膚滿地聊相溫松明照坐愁不睡井花入腹清而暾先生來年六十化道眼已入不二門多情好事餘習氣惜花未忍都無言留連一物吾過矣笑領百罰空罍樽玉妃借用太真事招魂楚辭篇名宋玉哀閔屈原無罪放逐恐其魂魄離散遂託帝命假巫語以招之杜子美詩兒童汲井花慣捷瓶在手本草井花水平旦第一汲者令人好顔色莊子蘧伯玊行年六十而六十化再見北史王晞傳謂盧思道曰卿輩亦是留連之一物豈直魚鳥而已杜子美詩數莖白髮那拋得百罰深杯亦不辭江郊并序惠州歸善縣治之北數步抵江少西有盤石小潭可以垂釣作江郊詩云江郊蔥曨雲水蒨絢崎岸斗入洄潭輪轉先生悅之布席閒燕初日下照潜鱗俯見意釣忘魚樂此竿線優哉悠哉玩物之變栁子厚記流沫成輪唐張志和傳自稱煙波釣徒志不在魚每垂釣不設餌韓退之詩舉竿引線忽有得詩小雅優哉悠哉詹守携酒見過用前韻作詩聊復和之箕踞狂歌老瓦盆燎毛燔肉似羌渾傳呼草市來携客灑掃漁磯共置尊山下黃童爭看舞江干白骨已銜恩公自注時詹方議葬暴骨孤雲落日西南望長羡歸鴉自識村杜子美少年行莫笑田家老瓦盆又三絶句縱暴略與羌渾同注謂吐谷渾西羌種也寄鄧道士并序羅浮山有野人相傳葛稚川之𨽻也鄧道士守安山中有道者也嘗於菴前見其足跡長二尺許紹聖二年正月二日豫偶讀韋蘇州寄全椒山中道士詩云今朝郡齊冷忽念山中客澗底束荆薪歸來煮白石抱朴子內篇云引石散以方寸七投一斗白石子中以水合煮之立熟如芋子可食以當榖遙持一樽酒逺慰風雨夕落葉滿空山何處尋行迹乃以酒一壺依蘇州韻作詩寄之一杯羅浮春逺餉採薇客遙知獨酌罷醉卧松下石幽人不可見清嘯聞月夕聊戲菴中人空飛本無迹嵇叔夜飬生論採薇山阿散髮岩岫桞子厚詩飛鳥無遺跡上元夜公自注惠州作前年侍玊輦端門萬枝燈璧月挂罘罳珠星綴觚稜去年中山府老病亦宵興牙旗穿夜市鐵馬響春氷今年江海上雲房寄山僧亦復舉膏火松閒見層層散䇿桄榔林林疏月鬅鬙使君置酒罷簫鼓轉松陵狂生來索酒公自注賈道人也一舉輒數升浩歌出門去我亦歸瞢騰端門宣德門也宋故事元夕皇帝登端門以宴羣臣罘罳觚稜並已見中山府定州也南部新書云軍前大旗謂之牙旗又先生定州詩云鐵騎曉出氷河裂二句正指帥定武軍時事正月二十四日與兒子過賴仙芝王原秀才僧曇穎行全道士何宗一同游羅浮道院及栖禪精舍過作詩和其韻寄邁逮一首栖禪寺在惠州豐湖上斷橋隔勝踐脫屨欣小揭瘴花已繁紅官栁猶疏細斜川二三子悼歎吾年逝淒涼羅浮館風壁頽雨砌黃冠常苦饑迎客羞破袂仙山在何許歸鶴時墮毳﨑嶇食松黃欲救齒髮弊坐令禪客笑一夢等千嵗栖禪晚置酒蠻果粲蕉荔齊厨釡無羮野餉籃有蕙嬉游趁時節俯仰了此世猶當洗業障更作臨水禊寄書陽羡兒并語長頭弟門戶各努力先期畢租稅詩國風淺則揭注攝衣涉水曰揭陶淵明游斜川詩序天氣澄和風物間美與二三鄰曲同游斜川又云悲日月之遂往悼吾年之不留本草圖經松枝上黃粉名松黃應劭風俗通禊者潔也於水上盥潔之也王注陽羡兒邁也長頭弟逮也二子在常州逮長頭見先生詩正月二十六日偶與數客野步嘉祐僧舍東南野人家雜花盛開扣門求觀主人林氏媪出應白髮青裙少寡獨居三十年矣感歎之餘作詩記之一首白鶴故居圖嘉祐寺在歸善縣西縹蒂緗枝出綘房緑隂青子送春忙涓涓泣露紫含笑焰焰燒空紅佛桑落日孤煙知客恨短籬破屋為誰香主人白髮青裙袂子美詩中黃四娘杜牧之詩醉折梨園縹蒂花李商隱詩紅苞雜綘房釋名緑白色曰縹淺黃色曰緗大赤色曰絳余皇日疏佛桑出嶺南枝葉類江南槿樹花類中州芍藥而輕柔過之有深紅深紫淺紅數種剪插於土即活杜子美詩黃四娘家花滿蹊再見龍虎石研寄猶子逺皎皎穿雲月青青出水荷文章工㸃􅚭忠義老研磨偉節何須怒寬饒要少和吾衰此無用寄與小東坡公自注逺為人類豫晉書衛恆傳草書勢云或􅣺􅚍㸃􅚭狀似連珠絶而不離後漢書賈彪字偉節兄弟三人並有髙名而彪最優故天下稱曰賈氏三虎偉節最怒漢書蓋寬饒傳自以行清能髙而為凡庸所越愈失意不快數上書諌諍太子庶子王生髙寬饒節而非其如此子書云云寬饒不納竟被害贈王子直秀才萬里雲山一破裘杖端間挂百錢游五車書已留兒讀二頃田應為鶴謀水底笙歌蛙兩部山中奴婢橘千頭幅巾我欲相隨去海上何人識故侯次韻表兄程正輔江行見桃花曲士賦懷沙草木傷莽莽德人無荆棘坐失嶺嶠阻我兄瑚璉姿流落瘴江浦淨眼見桃花紛紛墮紅雨蕭然振衣裓笑問散花女我觀解語花粉色如黃土一言破千偈况爾初不語可憐一轉話他日如何舉故復此微吟聊和鷗鴉櫓江邊閒草木間客當為主爾來子美瘦正坐作詩苦袖手焚筆研清篇真漫與願君一作兄理北轅六轡去如組上林桃花開水暖鴻北翥史記屈平既絀乃作懷沙之賦其辭云滔滔孟夏兮草木莽莽傷懷永哀兮汩徂南土維摩詰經逺塵離垢得法眼淨李賀將進酒歌况是青春日將暮桃花亂落如紅雨振衣散花見十七卷李公擇過髙郵詩注天寶遺事太液池千葉白蓮開帝與貴妃宴賞指妃謂左右曰何如此解語花也陳鴻長恨歌傳𤣥宗駕幸華清宫內外命婦熠耀景從上心油然若有顧遇左右前後粉色如土詔髙力士潜搜外宫得楊元琰女夀邸陸雲與兄機書云君苖能文每見兄文輒欲焚其筆研左傳宣十二年告令尹改乘轅而北之詩國風執轡如組追餞正輔表兄至博羅賦詩為别孤臣南游墮黃菅君亦何事來牧蠻艤舟蛋戶龍岡窟置酒椰葉桄榔間髙談已笑衰語陋傑句尤覺清詩孱博羅小縣僧舍古我不忍去君忘還君應回望秦與楚夢涉漢水愁秦關我亦坐念髙安客神游黃蘖參洞山何時曠蕩洗瑕謫與君歸駕相追攀梨花寒食隔江路兩山遙對雙煙鬟歸耕不用一錢物惟要兩腳飛孱顔玉牀丹鏃記分我助我金鼎光斕斑韓退之詩衙時龍戶集注即今蛋戶也謂採珠者一統志惠州有九龍岡在長樂吳都賦檳榔無柯椰葉無䕃南方草木狀椰樹葉如栟櫚髙五六丈無枝條髙安縣𨽻筠州時子由分司南京筠州居住傳燈録洪州黃蘗希運禪師筠州洞山良價禪師玉牀丹鏃見十八卷觀張師正所蓄辰砂詩注大丹祕契圖金鼎篇云金鼎者上應天下應地中應人民再用前韻樂天雙鬢如霜菅始知謝遣素與蠻我兄緑髮蔚如故已了夢幻齊人間蛾眉勸酒聊爾耳處仲太忍茂𢎞孱三杯徑醉便歸卧海上知復幾往還連娟六么趁踏鞠杳眇三疊縈陽關酒醒夢斷何所有落花流水空青山忽驚鐃鼓發半夜明月不許幽人攀贈行無物惟一語莫遣瘴霧侵雲鬟羅浮道人一傾蓋欲繫白日留君顔應知我是香案吏他年許綴蓬萊班晉書王敦字處仲王導字茂𢎞詩意用王愷使美人行酒事注已見踏鞠字出史記蘇秦傳又見衛霍傳今之蹴鞠也劉向别録曰蹴踘黃帝所造六么曲名琵琶録唐崑崙彈新翻羽調緑腰注緑腰即録要也本自樂工進曲上令録出要者乃以為名後又訛為六么也陽關三疊詳見十二卷和孔密州詩注施注蘇詩卷三十五
