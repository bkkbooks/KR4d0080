body:
  text: 施註蘇詩巻十宋蘇軾撰施元之原註武進邵長蘅删補詩三十七首時守髙宻作贈上天竺辨才師蘇子由辨才法師塔銘略云師姓徐氏名元浄字無象於潜人生而左肩肉起如袈裟絛八十一日乃滅十嵗出家二十五賜紫及辨才號及其終實八十有一沈公遘治杭命住上天竺増室㡬至萬礎重樓傑閣冠扵浙西後退居龍井東坡守杭作亭風篁嶺上名過溪亦曰二老此詩疑倅杭日所作誤寘此巻南北一山門上下兩天竺中有老法師瘦長如鸛鵠不知修何行碧眼照山谷見之自清涼洗盡煩惱毒坐令一都㑹男女禮白足我有長頭兒角頰峙犀玉四嵗不知行抱負煩背腹師來為摩頂起走趁奔鹿乃知戒律中妙用謝羈束何必言法華佯狂啖魚肉白樂天寄天竺師詩一山門作兩山門兩寺元從一寺分唐裴寛傳寛衣碧瘠而長號碧鸛雀碧眼白足注竝見七巻後漢賈逵傳自為児童常在太學諸儒為之語曰問事不休賈長頭國語鄭史伯曰今王惡角犀豐盈後漢李固傳貌狀有竒表鼎角匿犀足履龜文韓退之送僧澄觀詩有僧来訪呼使前伏犀挿腦髙頰顴摩頂用徐陵候寳誌事詳六卷席上代人贈别詩注子由塔碑子瞻中子迨生三年不䏻行請師為落髪摩頂晋唐彬傳身長八尺走及奔鹿王注京師開寳寺僧俗姓張好誦法華經故呼張法華其言語散亂不經故亦呼為風法華又蘇州義師状如風狂好活燒鯉魚不待熟而食之游盧山次韻章傳道塵容已似服轅駒野性猶同縱壑魚出入巖巒千仞表較量筋力十年初雖無窈窕驅前馬還有鴟夷挂後車莫笑吟詩淡生活當令阿買為君書孔稚圭北山移文抗塵容而走俗狀漢灌夫傳局趣効轅下駒王褒傳褒聖主得賢臣頌云翼乎如鴻毛遇順風沛乎如巨魚縦大壑晉王衍傳巖巖清峙壁立千仞楊雄方言秦晋閒美狀為窕言閑都也美心為窈言幽静也儀禮有執燭前馬國語句踐卑事夫差親為夫差前馬王注言官伎引馬也鴟夷詳七卷胡穆秀才遺古銅器詩注古詩話裴令公夜宴公索聨句元白有得色至楊汝士曰昔日蘭亭無艷質此時金谷有高人白知不䏻加遽曰笙歌鼎沸勿作此冷淡生活元曰樂天可謂能保其名也元乃㣲之韓退之贈張秘書詩阿買不識字頗知書八分詩成使之冩亦足張吾軍注或問魯直阿買是退之何人答云退之姪必有據而云盧山五詠盧敖洞圗經敖秦博士避難此山遂得名上界足官府飛昇亦何益還在此山中相逢不相識韓退之酬盧給事詩天門九扇相當開上界真人足官府李太白通塘曲相逄不相識出沒繞通塘飲酒臺博士雅好飲空山誰與娛莫向驪山去君王不喜儒史記秦始皇𦵏驪山又三十五年諸生四百六十餘人皆坑之咸陽衛宏古文官書序秦始皇宻令冬種𤓰於驪山谷中温䖏𤓰實成詔博士諸生説之人人各異使徃視之為伏機從上填之以土皆壓死今新豐温湯䖏號愍儒鄉見漢書儒林傳註漢酈食其傳初見沛公騎士曰沛公不喜儒聖燈巖石室有金丹山神不知祕何必露光芒夜半驚童稚三泉皎皎巖下泉無人還自潔不用比三星清光同一月詩國風綢繆束薪三星在天王注傳曰明星之多不如一月之光障日峯長安自不逺蜀客苦思歸莫教名障日喚作小峨眉公自注其状類峨眉但小耳晉明帝紀帝年数嵗元帝坐置膝上因長安使来問曰汝謂日與長安孰逺對曰長安近不聞人従日邉来元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃異向者之言乎對曰舉頭見日不見長安由是益竒之李白登鳯皇臺詩總為浮雲能蔽日長安不見使人愁古樂府石崇作思歸引次韻章傳道喜雨公自注禱常山而得去年夏旱秋不雨海畔居民飲鹹苦今年春暖欲生蝝地上戢戢多於土預憂一旦開兩翅口吻如風那肎吐前時渡江入吴越布陣横空如項羽公自注去嵗錢唐見飛蝗自西北来極可畏農夫拱手但垂泣人力區區固難禦撲縁鬉毛一作尾困牛馬啖齧衣服穿房户坐觀不救亦何心秉畀炎火傳自古荷鋤散掘誰敢後得米濟饑還小補常山山神信英烈撝駕雷公訶電母應憐郡守老且愚欲把瘡痍手摩撫山中歸時風色變中路已覺商羊舞夜牕騷騷鬧松竹朝畦泫泫流膏乳從来蝗旱必相資此事吾聞老農語庶將積潤掃遺孽收拾豐嵗還明主縣前巳窖八千斛公自注今春及今得蝗子八千餘斛率以一升完一畝更看蠶婦過初眠公自注蠶一眠則蝗不復生矣未用賀客来旁午先生筆力吾所畏蹙蹴同踏鮑謝跨徐庾偶然談笑得佳篇便恐流傳成樂府陋邦一雨何足道吾君盛德九州普中和樂職幾時作試向諸生選何武唐韻蝝蝗子也左傳宣十五年冬蝝生漢黥布傳上望布軍置陣如項籍軍上惡之撲緣字出莊子詳三卷次韻王誨夜坐詩注北史後秦有蝗齧草木皆盡牛馬至相噉毛姚崇傳誚倪若水曰今坐觀蝗食苖忍而不救因以無年刺史其謂何詩小雅田祖有神秉畀炎火朝野僉載唐開元四年河南北蝗螽為災敕遣使與州縣驅逐採得一石者與石粟一斗者粟亦如之掘坑埋之唐十道四蕃志密州常山齊時祈雨常應因以為名王充論衡畫雷公左手引連鼓右手椎之續仙傳東王父與玊女投壺有不入者天為之笑則電後漢王郎傳元元瘡痍已過半矣家語童謡曰天将大雨商羊鼓舞五行志旱則魚螺變為蟲蝗漢霍光傳使者旁午注一縱一横為旁午宋鮑昭齊謝眺與徐陵庾信前後以詩文鳴於南朝前漢禮樂志武帝立樂府采詩夜誦有趙代秦楚之謳漢王褒傳益州刺史王襄欲宣風化於衆庶聞褒有俊材使作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之時汜鄉侯何武為童子選在歌中乆之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之謝郡人田賀二生獻花城裏田員外城西賀秀才不愁家四壁自有錦千堆珍重尤竒品艱難最後開芳心困落日薄艷戰輕雷公自注昨日雷雨老守仍多病壯懐先已灰殷勤此粲者公自注賀獻花三朶攀折為誰哉玉腕揎紅袖金樽㵼白醅何當鑷霜鬢强插滿頭回唐百官志太宗省内外官定制為七百二十員曰吾以此待天下賢才足矣然是時已有員外置漢賈誼傳河南守聞其秀才召置門下楊巨源看花詩一林堆錦映千燈詩國風三英粲兮又見此粲者國語獸三為羣人三為衆女三為粲杜牧之醉題金鑷洗霜鬢又九日詩菊花須挿滿頭歸惜花吉祥寺中錦千堆公自注錢塘花最盛䖏前年賞花真盛哉道人勸我清明来腰鼓百面如春雷打徹凉州花自開沙河塘上插花回醉倒不覺吴兒咍豈知如今雙鬢摧城西古寺沒蒿菜有僧閉門手自栽千枝萬葉巧剪裁就中一叢何所似馬腦槃盛金縷杯而我食菜方清齋對花不飲花應猜夜来雨雹如李梅紅殘綠暗吁可哀公自注錢塘吉祥寺花為第一壬子清明賞㑹最盛金盤綵藍以獻於座者五十三人夜歸沙河塘上觀者如山爾後無復繼也今年諸家園圃花亦極盛而龍興僧房一叢亦竒但衰病牢落自無以發興耳昨日雨雹如此花之存者有幾可為嘆息也南京羯鼓録明皇嘗遇二月初宿雨始晴景色明媚小殿亭内栁杏将吐歎曰對此景物豈可不與他判㫁遣高力士取羯鼓上臨軒縱擊一曲名春光好回頋栁杏皆拆上指笑謂嬪嬙曰此事不喚我作天公可乎唐裴行儉平都支遮匐獲馬腦盤廣二尺杜子美詩内府殷紅馬腦盤春秋天雨雹和頓教授見寄用除夜韻我笑陶淵明種秫二頃半婦言既不用還有責子嘆無絃則無琴何必勞撫玩我笑劉伯倫醉髪蓬茆散二豪苦不納獨以鍤自伴既死何用埋此身同夜旦孰云二子賢自結兩重案笑人還自笑出口談治亂一生溷塵垢晩以道自盥無成空得懶坐此百事緩仄聞頓夫子講道出新貫豈無一尺書恐不記庸懦奴亂切陋邦貧且病數米銖稱炭慙愧章先生十日坐空館袖中出子詩貪讀酒屢煖狂言各須慎勿使輸薪粲淵明責子詩雖有五男児縂不好紙筆種秫無絃注並見前晋劉伶傳字伯倫嘗乘鹿車攜一壺酒使人荷鍤随之謂曰死便埋我著酒德頌曰俯觀萬物擾擾焉若江海之載浮萍二豪侍側焉如蜾嬴之與螟蛉荘子大宗師死生命也其有夜旦之常天也傳燈録據款結案又兩重公案皆禅宗語如此類甚多宗門公案有一千七百説文牘書版也長一尺為率荘子庚桑楚簡髮而櫛數米而炊稱炭用韋荘事詳四卷次韻栁子玊詩注晉孫盛傳嘗謁殷浩談論食冷而復煖者數四漢刑法志罪人獄巳决定為城且舂滿三嵗為鬼薪白粲惠帝紀註曰取薪給宗廟為鬼薪坐擇米使正白為白粲皆二嵗刑也和子由四首韓太祝送游太山偶作郊原十日游未應回首厭籠囚但教塵土驅馳足終把雲山爛漫酬聞道逢春思濯錦便須到處覓菟裘恨君不上東封頂夜看金輪出九幽蜀記錦城南有濯錦江左傳隐十一年公曰使營菟裘吾将老焉菟兔都反史記封禅書武帝封禪上太山乃令人上石立之太山巔太山記東南峯名日觀鷄一鳴見日出劉禹錫詩赤波千萬里湧出黄金輪黄庭經九幽日月洞空無送春夢裏青春可得追欲將詩句絆餘暉酒闌病客惟思睡蜜熟黄蜂亦懶飛芍藥櫻桃俱掃地公自注病過此二物鬢絲禪榻兩忘機憑君借取法界觀一洗人間萬事非公自注来書云近看此書余未嘗見也白樂天禽蟲十二章蠶老蠒成不庇身蜂饑蜜熟屬他人鬢絲禅榻注再見華嚴經法界觀清涼澄觀禪師述以明華嚴大㫖杜子美送韓十四詩歎息人閒萬事非首夏官舍即事安石榴花開最遲絳裙深樹出幽菲吾廬想見無限好客子倦游胡不歸坐上一樽雖得滿古来四事巧相違令人郤憶湖邊寺垂栁隂陰晝掩扉張華博物志張騫使西域還得安石榴竇子野酒譜扶風傳云頓遜國有安石榴取汁數日成美酒白樂天山石榴詩題詩報我何所云苦云色似石榴裙鄭谷子規詩春山無限好猶道不如歸詩國風式微式微胡不歸後漢孔融傳常嘆曰坐上客常滿樽中酒不空吾無憂矣四事用謝靈運擬鄴中詩序注已見送李供備席上和李詩家聲赫弈盖并凉也解㣲吟錦瑟旁擘水取魚湖起浪引杯看劍坐生光風流别後人人憶才器歸来種種長不用更貪窮事業風騷分付與沈湘漢中山靖王傳雍門子壹㣲吟古詩話李商隐有錦瑟詩云是令狐楚之青衣杜子美詩暫醉佳人錦瑟旁韓退之詩擘水看蛟螭杜宴左氏荘詩檢書燒燭短看劍引杯長西齋西齋深且明中有六尺牀病夫朝睡足危坐覺日長昏昏既非醉踽踽亦非狂褰衣竹風下穆然中㣲凉起行西園中草木含幽香榴花開一枝桑棗沃以光鳴鳩得美䕃困立㤀飛翔黄鳥亦自喜新音變圎吭杖藜觀物化亦以觀我生師荘切萬物各得時我生日皇皇晋賀循傳晉武賜循以六尺牀白樂天詩好是幽眠䖏松陰六尺牀又詩日髙睡足猶慵起危坐見管子弟子職篇詩國風獨行踽踽詩大雅吉甫作頌穆如清風宋玉九辯薄寒之中人詩國風桑之未落其葉沃若荘子山木篇覩一蝉方得美䕃而忘其身左太冲蜀都賦鴻儔鶴侣振露鵜胡雪飛水宿弄吭清渠荘子譲王篇原憲杖藜而應門齊物論周與胡蝶則必有分矣此之謂物化淮南子春女悲秋士哀而知物化周易觀我生進退未失道也劉禹錫賦觀物之餘遂觀我生陶潛歸去来善萬物之得時又寓形宇内復幾時曷不委心任去留胡為皇皇欲何之楊子仲尼皇皇小兒小兒不識愁起坐牽我衣我欲嗔小兒老妻勸兒癡兒癡君更甚不樂愁何為還坐愧此言洗盞當我前大勝劉伶婦區區為酒錢晉劉伶傳伶求酒於妻妻捐酒毁器涕泣諫之寄劉孝叔劉孝叔名述神宗時擢侍御史知雜數論事剴切㑹與王安石争獄事不合出知江州踰嵗提舉崇禧觀東坡倅杭與孝叔㑹虎邱和其二詩載第九卷吴興六客堂孝叔其一人也此詩首言征伐之意熙寕三年十一月詔京畿河北京東西路置三十七将将官遂與州郡長吏争衡故云聨翩三十七将軍走馬西来各開府又立保甲法令諸州籍保甲聚民而教之禁令苛急徃徃去為盗郡縣不敢以聞故云保甲連村團未徧五年立方田均稅法詔司農以條約并式頒之天下嵗以九月委令佐分地計量乃書户帖連荘帳付之以為地符故云方田訟牒紛如雨七年吕惠卿建手實法使民自上其家之物産而官為注籍奉使者至析秋毫天下病之至八年十月乃罷故曰爾来手實降新書云云又曰平生學問止流俗是時安石凡議其新政者皆以流俗謂之也孝叔年七十二卒紹興間録其風節贈秘閣修撰君王有意誅驕鹵椎破銅山鑄銅虎聨翩三十七將軍走馬西来各開府南山伐木作車軸東海取鼍漫戰鼓汗流奔走誰敢後恐乏軍興汙資當作質斧保甲連村團未遍方田訟牒紛如雨爾来手實降新書抉剔根株窮脉縷詔書惻怛信深厚吏䏻淺薄空勞苦平生學問止流俗衆裏笙竽誰比數忽令獨奏鳯將雛倉卒欲吹那得譜况復連年苦饑饉剥齧草木啖泥土今年雨雪頗應時又報蝗蟲生翅股憂来洗盞欲强醉寂寞虛齋卧空甒公厨十日不生煙更望紅裙踏筵舞故人屡寄山中信只有當歸無别語方将雀䑕偷太倉未肯衣冠挂神武吴興丈人真得道平日立朝非小補自從四方冠蓋鬧歸作二浙湖山主髙蹤已自雜漁釣大隱何曾棄簮組去年相從殊未足問道已許談其粗一作祖逝將棄官徃卒業俗縁未盡那得覩公家只在霅谿上上有白雲如白羽應憐進退苦皇皇更把安心教初祖三國志董卓傳悉椎破銅人鐘簴漢文帝紀初與郡守為銅虎符注銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聼受之謝靈運詩金羈相馳逐聨翩何窮已栁子厚古東門行漢家三十六将軍東方雷動横陣雲漢趙廣漢傳劾蘇賢為騎士屯霸上不詣屯所乏軍興蘅按資斧資字當是質字之誤質與鑕通史記范雎傳臣之胷不足以當椹質而要不足以待斧鉞又一語無効請伏斧質又石慶傳罪當伏斧質又漢書梅福傳雖伏質横分臣之願也諸本既譌資舊注因竝作資斧觧極無謂今正後漢馬嚴傳註劉徽九章筭術曰方田第一晋王羲之傳文符如雨倒錯違背不復可知漢儒林傳文章爾雅訓辭深厚漢書司馬遷傳若望僕不相師而用流俗人之言注望怨也流俗謂随俗人之言而流移其志又刑餘之人無足比數衆裏笙竽用東郭濫竽事詳一卷将徃終南詩注晉樂志鳯将雛者舊曲也韓退之感春詩艶姬踏筵舞清眸射劍㦸孫盛雜語姜維詣諸葛亮與母相失後得母書令求當歸維曰但有逺志不在當歸許嵩建康實録太史慈從孫䇿為将曺公聞其名遺之書以篋封之發省無所道但貯當歸爾韓退之詩家請官供不報答無異雀䑕偷太倉挂冠大隠竝已見前注漢椘元王傳遣子郢客與申公俱卒業荘子漁父篇孔子請因受業而卒學大遒俗縁未盡用謝靈運語詳七卷汪潭秀才詩注霅谿注詳五卷贈孫莘老安心注詳七卷病中遊祖塔院王注公烏臺詩案况復連年若饑饉至更望紅裙踏筵舞供云近来饑荒飛蝗蔽天以譏朝廷行法事多闕失又言酒食無備公厨蕭索以譏諷朝廷減削公使錢太甚公事既冗旱蝗又甚貳政巨藩尚如此窘廹耳孔長源挽詩二首孔長源名延世宣聖裔孫以進士第一嘉祐間知封州有遺愛後知越州改宣州未至以為管勾三司理欠憑由司出知潤州未行卒長源言若不䏻出口及見義慷慨老益自强雖齟齬不以易意工於為文三子皆自教以學文仲武仲平仲皆有傳國史為時名臣詩云不愧蔡邕碑者曽子固志其墓也少年才氣冠當時晚節孤風益自竒君勝宜為夫子後林宗不愧蔡邕碑南荒尚記誅元惡東越誰能事細兒耆舊如今幾人在為君無憾為時悲韓愈孔戣墓志銘孔世卅八吾見其孫按戣字君嚴弟戡字君勝後漢郭太傳太字林宗舉有道卒四方之士千餘人皆來㑹𦵏同志者乃共刻石立碑蔡邕為文既而謂涿郡盧植曰吾為碑銘多矣皆有慙德惟郭有道無愧色耳史記陳軫傳荘舄越之鄙細人韓退之詩魯連細児黠小堰門頭栁繫船呉山堂上月侵筵潮聲半夜千巖響詩句明朝萬口傳公自注長源自越過杭夜飲有羙堂上聨句長源詩云天目遠隨雙鳳落海門遥蹙兩潮趨一坐稱善豈意日斜庚子後忽驚嵗在已辰年佳城一閉無窮事南望題詩淚灑牋輿地志吴山本名胥山避伍相故改為吴山杜子美送韋二詩念我能書數字至将詩不必萬人傳漢賈誼傳為長沙傅有服飛入誼舍自傷悼以為壽不得長廼為賦以自廣曰庚子日斜服集余舎止於坐隅貌甚閑暇後漢鄭𤣥夢孔子吿之曰起起今年嵗在辰明年嵗在己既寤以讖合之知命當終讖曰嵗在龍蛇賢人嗟西京雜記滕公嘗出東都馬忽悲鳴掊地不前公使人掘地得石槨其上書云佳城鬰欝三千年見白日吁嗟滕公居此室寄呂穆仲寺丞孤山寺下水侵門毎到先看醉墨痕楚相未亡談笑是中郎不見典刑存公自注杭有伶人善學吕舉措酷似别後常令作之以為笑君先去踏塵埃陌我亦来㝷桑棗村回首西湖真一夢灰心霜鬢更休論史記滑稽傳楚相孫叔敖死優孟為叔敖衣冠抵掌談笑王大驚以為叔敖復生也後漢孔融傳素與蔡邕善邕卒後有虎賁士貌類於邕融每酒酣引與同坐曰雖無老成人尚有典刑邕為左中郎将裴度中書即事詩灰心緣忍事霜鬢為論兵余主簿母挽詩閨庭蘭玊照鄉閭自昔雖貧樂有餘豈獨家人在中饋郤因麟趾識關雎雲軿忽已歸仙府喬木依然擁舊廬忍把還鄉千斛淚一時灑向老萊裾晉謝𤣥傳叔父安嘗曰子弟亦何預人事正欲使其佳𤣥曰譬如芝蘭玊樹欲其生於庭堦耳周易家人在中饋貞吉詩小序麟之趾關雎之應也送趙寺丞寄陳海州景疏樓上喚蛾眉君到應先誦此詩若見孟公投轄飲莫忘衝雪送君時景疏楼海州即東海郡為二疏之鄉故有景疏楼也又見九卷詩注漢陳遵字孟公投轄詳八卷和蘇州太守詩注答陳述古二首漫説山東第二州棗林桑泊負春游城西亦有紅千葉人老簮花郤自羞小桃破蕚未勝春羅綺叢中第一人聞道使君歸去後舞衫歌扇總生塵公自注陳有小妓述古稱之樂府徐陵雜曲舞衫回袖勝春風歌扇當牕似秋月劉越石答盧諶詩澄醪覆觴絲竹生塵張安道樂全堂列子御風殊不惡猶被莊生譏數數歩兵飲酒中散琴於此得全非至樂樂全居士全於天維摩丈室空翛然平生痛飲今不飲無琴不獨今無絃我公天與英雄表龍章鳯姿照魚鳥但令端委坐廟堂北狄西戎談笑了如今老去苦思歸小字親書寄我詩試問樂全全底事無全何處更相虧荘子逍遥游列子御風而行泠然善也旬有五日而後反彼於致福者未數数然也晋阮籍傳歩兵厨營人善醸有貯酒三百斛乃求為歩兵校尉晉魏之際天下多故由是不與世事酣飲為常又嵇康傳與魏宗室婚拜中散大夫常修飬性服食之事弹琴詠詩自足於懐與山濤絶交書曰濁酒一杯弹琴一曲志意畢矣庾信詩歩兵未飲酒中散未弹琴蕭索無真氣昏昏有俗心荘子至樂篇天下有至樂無有哉至樂無樂至譽無譽逹生篇得全於酒猶若是而况得全於天乎維摩經長者維摩詰心念文殊師利與大衆俱来即以神力空其室内除去所有惟置一牀世說王孝伯曰但使常得無事痛飲酒熟讀離騷便可稱名士晉陶潛蓄素琴一張絃徽不具毎朋酒之㑹則撫而和之曰但識琴中趣何勞絃上聲晉嵇康傳康土木形骸不自藻飾人以為龍章鳳姿天質自然左傳哀七年吴太伯端委以治吴國語晋侯端委以入註云諸侯祭服也晉謝鯤傳明帝在東宫問鯤論者以君方庾亮自謂何如答曰端委廟堂使百僚凖則鯤不如亮一邱一壑自謂過之杜子美詩談笑無河北又洗兵馬二三豪俊為時出整頓乾坤濟時了荘子繕性篇樂全之謂得志古之所謂得志者非軒冕之謂也謂無以益其樂而已矣張文裕挽詞張文裕名掞舉進士知益都縣中丞范諷薦其材知萊州掖縣民訴旱於州州不受文裕自為奏上之詔除登萊稅役歴官龍圗直學士户部侍郎致仕卒年八十文裕齊州歴城人故有濟南名士句益都在劍外而文裕有恵政故有劍外生祠句髙才本出朝廷右䏻事空推德業餘每見便聞曹植句至今傳寳魏華書濟南名士新凋䘮劍外生祠已潔除欲寄西風兩行淚依然喬木鄭公廬漢田叔傳上召與語漢廷臣無䏻出其右者周易天下之䏻事畢矣易繫辭可乆則賢人之德可大則賢人之業三國魏陳思王植字子建善屬文杜子美詩文章曺植波瀾闊王注魏華河南人善書其字如禇河南而用筆開闊有豆盧公神道碑見於世又華為王徽之外孫善草𨽻書杜子美宴歴下亭詩海内此亭古濟南名士多又寄杜位詩封書兩行淚霑泗裛新詩白樂天寄劉蘇州詩何堪老淚交流日正是西風摇落時後漢鄭𤣥傳孔融深敬於𤣥告高宻縣為𤣥特立一鄉曰鄭君好學實懐明德今鄭君鄉宜曰鄭公鄉廣開門衢令容髙車號為通德門懐西湖寄鼂美叔同年鼂美叔名端彦時提㸃兩浙刑獄置司杭州西湖天下景游者無愚賢淺深隨所得誰䏻識其全嗟我本狂直早為世所捐獨專山水樂付與寧非天三百六十寺幽㝷遂窮年所至得其妙心知口難傳至今清夜夢耳目餘芳鮮君持使者節風采爍雲煙清流與碧巘安肎為君妍胡不屏騎從暫借僧榻眠讀我壁閒詩清涼洗煩煎䇿杖無道路直造意所便應逢古漁父葦閒自延緣問道若有得買魚勿論錢歐陽公鎮陽園詩至今清夜夢猶遶北潭北漢霍光傳天下想聞其風采荘子漁父詳見七卷九日湖上㝷周李詩注杜子美詩白魚如切玊朱橘不論錢和梅户曹㑹獵鐵溝山西從古説三明誰信儒冠也捍城竿上鯨鯢猶未掩公自注近梟数盗草中狐兔不須驚東州趙叟一作傁飲無敵南國梅仙詩有聲不向如臯閑射雉歸来何以得卿卿公自注是日惟梅趙不射後漢段熲傳贊山西多猛三明儷蹤詳見九卷二公再和詩注左傳宣十二年古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀杜子美冬狩行草中狐兔盡何益天子不在咸陽宫左傳宣十二年趙傁在後漢梅福傳隠吴市門卒至今人以為仙左傳昭二十八年賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言卿卿注見四卷祭常山回小獵青蓋前頭㸃皂旗黄茅岡下出長圍弄風驕馬跑空立趁蒼鷹掠地飛回望白雲生翠巘歸来紅葉滿征衣聖明若用西凉簿白羽猶䏻效一揮南史侯景作長圍圍梁宋書魏主就臧質求酒封溲便與之魏主怒築長圍一夕而合晉張重華傳重華據西凉用主簿謝艾為將軍進軍臨河麻秋以三萬衆距之艾乘軺車冠白幍鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千人馳擊之左右大擾艾乃下車踞胡牀指麾䖏分賊以為伏兵發懼不敢進艾乗勝奔擊大敗之晉顧榮傳陳敏之亂假榮丹陽内史榮與周玘等潛謀起兵攻敏榮發橋斂舟於南岸敏率萬餘人出不穫濟榮麾以白羽扇其衆潰散和章七出守湖州二首章惇字子厚方丈仙人出𣺌茫髙情猶愛水雲鄉功名誰使連三㨗身世何緣得兩㤀早嵗歸休心共在他年相見話偏長只應未報君恩重清夢時時到玊堂史記封禪書蓬萊方丈瀛洲此三神山者相傳在渤海中詩小雅一月三㨗白樂天詩性與時相逺身将世兩㤀陶淵明斜川詩吾生行歸休漢揚雄傳歴金門上玊堂有日矣李宗諤翰苑雜記太宗皇帝御書飛白玊堂之署四字淳化三年賜今在本院玊堂門上絳闕雲臺總有名應須極貴又長生鼎中龍虎黄金賤松下龜虵綠骨輕公自注君好爐火而餌茯苓霅水未渾纓可濯弁峯初見眼應明兩巵春酒真堪羡獨占人閒分外榮晉傅𤣥西都賦巍巍絳闕續仙傳謝自然入海至一山遇道士曰天台司馬承禎身居赤城名在絳闕真良師也後漢朱景等傳贊顯宗追感前世功臣圗畫二十八将於南宫雲臺王注金丹之術有日魄月魄白虎青龍真鉛正永盖五行強名耳霅水弁峯注並見五卷詩國風為此春酒以介眉壽時子厚二親無恙故云和張子野見寄三絶句過舊游前生我已到杭州到處長如到舊游更欲洞霄為隱吏一菴閑地且相留公答錢塘主簿陳師仲書云一嵗率常四五夢至西湖上此殆世俗所謂前緣者在杭州嘗游壽聖院入門便悟曽到䏻言其院後堂殿山石䖏故詩中有前生已到之語杭州圗經洞霄宫在餘杭縣西南十八里唐大歴五年建為天柱觀祥符元年改今額杜子美詩隐吏逢梅福見題壁狂吟跌宕無風雅醉墨淋浪不整齊應為詩人一回顧山僧未忍掃黄泥小説有富家子杜四郎常戯為詩章號杜荀鴨以比荀鶴毎有詩即題屋壁親賔或汙墁之即云三十年来塵撲面如今始得一杴泥竹閣見憶栢堂南畔竹如雲此閣何人是主人但遣先生披鶴氅不須更畫樂天真世說孟昶家在京口嘗見王恭乘髙輿披鶴氅裘於時㣲雪昶於籬間窺之歎曰此真神仙中人竹閣有樂天祠堂和蔣䕫寄茶我生百事常隨緣四方水陸無不便扁舟渡江適吴越三年飲食窮芳鮮金虀玊膾飯炊雪海螯江柱初脱泉臨風飽食甘寢罷一甌花乳浮輕圎自從捨舟入東武沃野便到桑麻川翦毛胡羊大如馬誰記鹿角腥槃筵厨中烝粟埋飯罋大杓更取酸生涎柘羅銅碾棄不用脂麻白土須盆研故人猶作舊眼看謂我好尚如當年沙谿北苑强分别水腳一線争誰先清詩兩幅寄千里紫金百餅費萬錢吟哦烹噍兩竒絶只恐偷乞煩封纒老妻稚子不知愛一半已入薑鹽煎人生所遇無不可南北嗜好知誰賢死生禍福久不擇更論甘苦争蚩姸知君窮旅不自釋因詩寄謝聊相鑴大業拾遺吴郡獻松江鱸魚膾湏八九月霜下之時鱸魚白如雪取三尺以下者作之以香菜花葉相閒和以細縷金橙食之所謂金虀玊鱠東南之佳味也王注海螯言蟹江柱江瑤柱也韓退之簞詩倒身甘寢百疾愈劉禹錫茶詩欲知花乳清冷味湏是眠雲跂石人漢地理志琅邪郡東武縣世説諸阮飲酒不復用常杯斟酌以大罋盛酒圜坐相向大杓更飲之丁謂茶録北苑里名官焙曰龍焙盖造御茶也吕仲吉茶記壑源其别有八沙谿其一也蔡君謨茶録建安人鬬試以水痕先者為負故較勝負之説曰相去一水兩水王注蜀人以芝蔴白土煎茶又鹽薑煎茶亦蜀中風味唐薛䏻茶詩鹽慎添長戒薑宜煮更誇答李邦直李邦直名清臣蚤以詞藻受知人主然志於利禄操持悖繆與鄧温伯章惇諸人鋭意紹述正人竄逐幾無噍類後追治其罪貶雷州司户公守高宻時邦直以京東提刑行部至宻也東坡七年瘴海僅得生還推原禍本實自邦直發之云美人如春風著物物未知羈愁似冰雪見子先流澌子從徐方来吏民舉熙熈扶病出見之驚我一何衰知我久慵倦起我以新詩詩詞如醇酒盎然熏四支徑飲不覺醉欲和先昏疲西齋有蠻帳風雨夜紛披放懐語不擇撫掌笑脱頤别来今幾何春物已含姿栁色日夜暗子来竟何時徐方雖云樂東山禁游嬉又無狂太守何以觧憂思聞子有賢婦華堂詠螽斯盍不倒嚢槖賣劍買蛾眉不用教絲竹唱我新歌詞楚詞望美人兮未来東方朔七諫赴湘沅之流澌兮韻書澌流冰也老子衆人熙熈如享太牢如登春臺漢匡衡傳諸儒語曰匡説詩觧人頤注使人笑而不䏻止也詩小序螽斯后妃子孫衆多也按邦直再娶孫巨源女賢婦謂孫也劉禹錫楊栁枝詞請君莫奏前朝曲唱我新翻楊栁枝施註蘇詩巻十
