body:
  text: 施注蘇詩卷三十七宋蘇軾撰施元之原注武進邵長蘅刪補詩五十一首起在惠州洎紹聖丁丑再貶儋耳作食荔枝二首并引惠州太守東堂祠故相陳文惠公堂下有公手植荔枝一株郡人謂之將軍樹今嵗大熟賞啖之餘下逮吏卒其高不可致者縱猿取之丞相祠堂下將軍大樹旁炎雲駢火實瑞露酌天漿爛紫垂先熟高紅挂逺揚分甘遍鈴下也到黑衣郎杜子美蜀相詩丞相祠堂何處尋後漢馮異傳每所止舍常獨屛樹下軍中號大樹將軍韓退之游青龍寺詩然雲燒樹火實駢詩豳風取彼斧斨以伐逺揚注逺枝揚起也漢司馬遷傳李陵素與士大夫絶甘分少能得人之死力晉王羲之傳有一味之甘割而分之不敢專饗羊祜傳鈴閣之下侍衛不過數十人宣室志張長史質凶屋以居覩黑衣人樹上擲瓦見擊其弟射殺之乃猿也羅浮山下四時春盧橘楊梅次第新日啖荔枝三百顆不辭長作嶺南人鄭熊番禺雜編余在南中五年每食荔支幾與飯相半和子由盆中石菖蒲忽生九花春荑秋莢兩須臾神藥人間果有無無鼻何由識薝蔔有花今始信菖蒲芳心未飽兩蛺蝶寒意知鳴幾蟪蛄記取明年十二節小兒休更籋霜䰅本草陶隱居補注云真菖蒲葉有脊四月五月亦作小釐花也南史梁武帝母張皇后見之曰見菖蒲花者當富貴因取吞之生武帝本草圖經菖蒲亦有一寸十二莭者張籍菖蒲詩石上生菖蒲一本十二節仙人勸我食令我頭青面如雪遷居并引吾紹聖元年十月十二日至惠州寓合江樓是月十八日遷於嘉祐寺二年三月十九日復遷於合江樓三年四月二十日復歸於嘉祐寺時方卜築白鶴峰之上新居成庶幾其少安乎前年家水東回首夕陽麗去年家水西溼面春雨細東西兩無擇緣盡我輒逝今年復東徙舊館聊一憩已買白鶴峯規作終老計長江在北户雪浪舞吾砌青山滿牆頭䰀烏果切鬌幾雲髻雖慚抱朴子金鼎陋蟬蛻猶賢栁栁州廟爼薦丹荔吾生本無待俯仰了此世念念自成劫塵塵各有際下觀生物息相吹等蚊蚋劉禹錫詩䰀鬌雲鬟宫樣粧古樂府頭上阿墮髻音義並同謂髮美貌晉葛洪傳所著書言黃白之事緘之金匱自號抱朴子因以名書後忽坐至日中兀然若睡而卒舉尸入棺甚輕如空衣世以為尸解得仙云又云上士舉形升虛謂之天仙中士遊於名山謂之地仙下士先死後蛻謂之尸解仙韓退之羅池廟碑羅池者故刺史栁侯廟也其詞曰荔子丹兮蕉黃雜尚肴蔬兮進侯堂續仙傳丁約謂韋子威曰郎君得道隔兩塵子威問其故約曰儒謂之世釋謂之劫道謂之塵莊子逍遙遊野馬也塵埃也生物之以息相吹也兩橋詩并引惠州之東江溪合流有橋多廢壞以小舟渡羅浮道士鄧守安始作浮橋以四十舟為二十舫鐵鎖石矴隨水漲落榜曰東新橋州西豐湖上有長橋屢作屢壞栖禪院僧希固築進兩岸為飛樓一作閣九間盡用石鹽木堅若鐵石榜曰西新橋皆以紹聖三年六月畢工作二詩落之東新橋羣鯨貫鐵索背負橫空霓首搖翻雪江尾插崩雲溪機牙任信縮漲落隨髙低轆轤卷巨索青蛟挂長堤奔舟免狂觸脫筏防撞擠一橋何足云歡傳廣東西父老有不識喜笑爭攀躋魚龍亦驚逃雷雹生馬蹄嗟此病涉久公私困留稽姦民食此險出沒如鳧鷖似賣失船壺如去登樓梯不知百年來幾人隕沙泥豈知濤瀾上安若堂與閨往來無晨夜醉病休扶攜使君飲我言妙割無牛雞不云二子勞歎我捐腰犀公自注二士造橋豫嘗助施犀帶我亦夀使君一言聽扶藜常當修未壞勿使後噬臍鶡冠子學問篇中流失船一壺千金遁齊閒覽壷乃今所謂浮環者凡渡江海必預備浮環以虞風濤覆溺之患其形如環而空中用帛為帶挂之項上出兩手以按之則浮而不溺可以待救至今浙人呼為壷後漢劉表傳表子琦與諸葛亮謀自安之術亮初不對後乃共升髙樓因令去梯語亮云云世說殷浩廢後恨簡文曰上人著百尺樓上儋梯將去鄭審天寶故事楊國忠本張易之子天授中易之恩幸無比每歸私第詔令居樓上仍去梯母恐絶嗣乃令女奴駢珠上樓遂生國忠左傳莊六年若不早圖後君噬臍西新橋昔橋木千柱挂湖如斷霓浮梁陷積淖破板隨奔溪笑看逺岸沒坐覺孤城低聊因三農隙稍進百步隄炎州無堅植潦水輕推擠千年誰在者鐵柱羅浮西獨有石鹽木白蟻不敢躋似開銅駝峯如鑿鐵馬蹄岌岌類鞭石山川非會稽嗟我久閣筆不書紙尾鷖蕭然無尺箠一構飛空梯百夫下一杙椓此百尺泥公自注橋柱石磉之下皆有堅木㭬入泥中丈餘謂之頂樁探囊賴故侯寶錢出金閨公自注子由之婦史頃入內得賜黃金錢數千以助施父老喜雲集簞壺無空攜三日飲不散殺盡西村雞似聞百嵗前海近湖有犀公自注橋下舊名鰐湖蓋常有鮫鰐之類那知陵谷變枯瀆生茭藜後來勿忘今冬涉水過臍漢韋𤣥成傳天雨淖注云淖泥也會稽録秦始皇作石橋欲過海觀日出處有神人驅石下海石去不速神輒鞭之流血三齊略記亦云法帖中有王氏一帖最後大書一鷖字相傳此帖之珍所酬至五十餘萬云爾雅樴謂之杙注橛也悼朝雲并引紹聖元年十一月戲作朝雲詩三年七月五日朝雲病亡於惠州葬之栖禪寺松林中東南直大聖塔豫既銘其墓且和前詩以自解朝雲始不識字晚忽學書粗有楷法蓋嘗從泗上比丘尼義冲學佛亦略聞大義且死誦金剛經四句偈而絶先生於朝雲墓前作六如亭蓋取經中如夢幻泡影如露亦如電之語苗而不秀豈其天不使童烏與我𤣥駐景恨無千嵗藥贈行惟有小乘禪傷心一念償前債彈指三生斷後緣歸臥竹根無逺近夜燈勤禮塔中仙楊子育而不苗者吾家之童烏乎九齡而與我𤣥文按此言朝雲所生之子幹兒未百日而亡也杜子美少年行共醉終同卧竹根丙子重九二首三年瘴海上越嶠真我家登山作重九蠻菊秋未花惟有黃茅浪堆壠生坳窊蛋酒糵衆毒酸甜如梨樝何以侑一樽鄰翁餽蛙蛇亦復強取醉歡謡雜悲嗟今年吁惡嵗僵仆如亂麻此會我雖健狂風卷朝霞使我如霜月孤光挂天涯西湖不欲住暮樹號寒鴉西湖惠州西湖也朝雲墓在湖上窮途不擇友過眼如亂雲餘子誰復數坐閲兩使君共飲去年堂俯看秋水紋此水與此人相追兩沄沄老去各休息造物嗟長勤佳哉此令節不惜與子分何以娛我客遊魚在清濆水師三百指鐵網欲掩羣獲多雖一快買放尤可欣此樂真不朽明年我歸耘白鶴峰新居欲成夜過西鄰翟秀才二首林行婆家初閉户翟夫子舍尚留關連娟缺月黃昏後縹眇新居紫翠間繫悶豈無羅帶水割愁還有劒鋩山公自注韓退之云水作青羅帶山如碧玉篸栁子厚云海上尖峯若劍鋩秋來處處割愁腸皆嶺南詩也中原北望無歸日鄰火村舂自往還甕間畢卓防偷酒壁後匡衡不㸃燈待鑿平江百尺井要分清署一壺氷佐卿恐是歸來鶴次律寧非過去僧他日莫尋王粲宅夢中來往本何曽晋畢卓盜飲注巳見西京雜記匡衡好讀書家貧無油燭乃鑿鄰壁映光廣輿記天寶中𤣥宗重陽日獵沙苑有孤鶴飛帝射之中戴箭西南而去益州道觀第一院有青城山道士徐佐卿寄寓一日自外持一箭歸曰吾行山中為飛矢所加因挂箭於壁書月日且言後年箭主到此付之及𤣥宗幸蜀至觀見之乃沙苑縱獵之日所射箭也廣德神異記亦云仍云觀即明月觀房琯字次律前世為僧事再見杜子美詩應同王粲宅留井硯山前次韵子由所居六詠堂前種山丹錯落馬腦盤堂後種秋菊碎金收辟寒草木如有情慰此芳嵗闌幽人正獨樂不知行路難王子年拾遺記魏明帝時昆明國貢嗽金烏常吐金屑如粟此鳥畏霜雪乃起小屋處之名辟寒臺宮人爭以所吐金為叉飾謂之辟寒金故相嘲曰不得辟寒金那得聖人心酉陽雜俎亦云詩人故多感花發憶兩京石榴有正色玉樹真虛名粲粲秋菊花卓為霜中英萸槃照重九纈蘂兩鮮明杜子美立春詩春日春槃細生菜忽憶兩京梅發時漢揚雄甘泉賦翠玉樹之青蔥按子由詩云後庭荏草盛憐爾計興亡注云矮雞冠即玉樹後庭花故此和章及之幽居有古意義井分西牆誰言三伏熱止須一杯凉先生坐忍渴羣囂自披猖衆散徐酌飲逡巡味尤長韓退之詩紛紛百家起詭怪相披猖晉阮瞻傳瞻常羣行冒熱渴甚逆旅有井衆人競趨之瞻獨逡巡在後須飲者畢乃進其夷退無競如此先生飯土塯無物與劉叉何以娛醉客時嗅砌下花井水分西鄰竹隂借東家蕭然行腳僧一身寄天涯史記秦始皇紀二世曰吾聞之韓子曰堯舜採椽不刮茅茨不剪飯土㙧啜土􅀈雖監門之養不觳於此唐韓愈傳劉義持愈數斤金去再見東齊手種柏今復幾尺長知有桓司馬榛茅為遮藏近聞南臺松新枝出餘僵年來此懷抱豈復一作敢驚凡亡史記孔子適宋與弟子習禮大樹下宋桓司馬魋欲殺孔子拔其樹孔子遂去凡亡出莊子田子方篇詳見二十二卷王仲父哀辭注新居巳覆瓦無復風雨憂榿栽與籠竹小詩亦可求尚欲煩二師刺山出飛流應須鑿百尺兩綆載一牛杜子美堂成詩榿林礙日吟風葉籠竹和烟滴露梢又有與何十少府覓榿栽從韋二明府覓綿竹詩後漢耿恭傳胸奴擁絶澗水恭於城中穿井十五丈不得水恭歎曰昔二師將軍拔佩刀刺山飛泉湧出乃整衣服向井再拜有頃水泉奔出吳子野絶粒不睡過作詩戲之芝上人陸道士皆和豫亦次其韵聊為不死五通仙終了無生一大緣獨鶴有聲知半夜老蠶不食巳三眠憐君解比人間夢公自注芝有夢齊子由作銘許我時逃醉後禪會與江山成故事不妨詩酒樂新年華嚴經寶輪妙莊嚴世界有佛名功德海光明輪於彼時為五通仙現大神通六萬諸仙前後圍繞圓覺經心悟實相具無生忍杜子美飲中八仙歌蘇晉長齊繡佛前醉中往往愛逃禪次韻惠循二守相會隂字韵四詩墨蹟及惠守和篇並藏吳興秦氏此詩云軾次韻南圭使君與循州倡酬一首循州蓋周彥質字文之巳見三十六卷有答周循州詩南圭使君乃惠州守方子容後題云因見二公唱和之盛忽破戒作此詩與文之一閲訖即焚之慎勿傳也共惜相從一寸隂酒杯雖淺意殊深且同月下三人影莫作天涯萬里心東嶺近開松菊徑南堂初絶斧斤音知君善頌如張老猶望携壷更一臨禮記晉獻文子成室張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子北面再拜稽首君子謂之善頌善禱又次韻二守許過新居先生真蹟云軾啓叠䝉寵示佳篇仍許過顧新居謹依韵上謝伏望笑覽集本作曉窗清快墨蹟作明快後題云一閲訖幸毁之切告切告集本與後詩相連題云次韵二守同訪新居以墨蹟觀之非也今析題為二且載南圭一詩使託名先生集中藉以不朽云按南圭詩今缺數畝蓬蒿古縣隂曉窗明一作清快夜堂深也知卜築非真宅聊欲跏趺看此心聞道携壷問竒字更因登木助微音相娛北户江千頃直下都無地可臨大毗婆娑論結跏趺坐是相圓滿禮記禮弓孔子之故人曰原壤其母死夫子助之沐椁原壤登木曰久矣豫之不託於音也歌曰狸首之斑然執女手之卷然王簡栖頭陀寺碑飛閣逶迤下臨無地又次韵二守同訪新居墨跡云次韻南圭文之二太守同過白鶴新居之什伏望採覽後云請一呈文之便毁之切告切告此生真欲老牆陰郤掃都忘嵗月深拔薤巳觀賢守政折蔬聊慰故人心風流賀監常吳語憔悴鍾儀獨楚音治狀兩邦俱第一潁川歸去肯重臨劉禹錫牆隂歌莫言牆隂數尺閒老盡主人如等間拔薤用後漢龎參任棠事詳草四卷遺直坊詩注陶淵明詩窮巷隔深轍頗回故人車歡然酌春酒摘我園中蔬杜子美遣興詩賀公雅吳語在位常清狂左傳成九年晋侯觀於軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音互見十七卷陳州與文郎詩注漢黃霸傳為穎川太守治為天下第一徵守京兆尹坐貶秩有詔歸穎川前後八年郡中愈治循守臨行出小鬟復用前韻學語雛鶯在栁隂臨行呼出翠帷深通家不隔同年面公自注文之與南圭令弟同年得路方知異日心趁著春衫逰上苑要求國手教新音嶺梅不用催歸騎截鐙須防舊所臨公自注文之嘗倅韶托言崔沆判罰盧瑑曰紫陌尋春便隔同年之面青雲得路可知異日之心截鐙唐姚元崇牧荆州事巳見種茶松閒旅生茶巳與松俱瘦茨棘尚未容䝉翳爭交構天公所遺棄百嵗仍稚幼紫笋雖不長孤根乃獨夀移栽白鶴嶺土軟春雨後彌旬得連隂似許晚遂茂能忘流轉苦戢戢出鳥咮未任供臼磨且可資摘嗅千團輸大官百餅衒私鬭何如此一啜有味出吾囿後漢光武紀野榖旅生注旅寄也陸羽茶經紫者上緑者次筍者上芹者次又建人謂鬬茶為茗戰茶譜蜀州雀舌鳥觜麥顆故用鳥咮字白鶴山新居鑿井四十尺遇磐石石盡乃得泉海國困蒸溽新居利髙寒以彼陟降勞易此寢處乾但苦江路峻常慚汲腰酸矻矻煩四夫磽磽斫層巒彌旬得尋丈下有青石磐終日但迸火何時見飛瀾豐我粲與醪利汝椎與鑽山石有時盡我意殊未闌今朝僮僕喜黃土復可摶晨瓶得雪乳莫甕停氷湍我生類如此何適不艱難一勺亦天賜曲肱有餘歡三月二十九日二首南嶺過雲開紫翠北江飛雨送凄涼酒醒夢回春盡日閉門隱几坐燒香門外橘花猶的皪牆頭荔子巳斕斑樹暗草深人靜處捲簾欹枕卧看山吾謫海南子由雷州被命即行了不相知至梧乃聞尚在藤也旦夕當追及作此詩示之九疑聫綿屬衡湘蒼梧獨在天一方孤城吹角煙樹裏落日未落江蒼茫幽人拊枕坐歎息我行忽至舜所藏江邊父老能說子白須紅頰如君長莫嫌瓊雷隔雲海聖恩尚許遙相望平生學道真實意豈與窮達俱存亡天其以我為箕子要使此意留要荒他年誰作地輿志海南萬古真吾鄉李太白逺别離九疑聫綿皆相似薛士昭九疑山圖記道州寧逺縣南六十里有九疑山山有九峯一曰簫韶二曰女英三曰石城四曰蛾皇五曰朱明六曰桂林七曰華蓋八曰巴林九曰石樓周回百餘里其形相似見者疑之故曰九疑蒼梧今梧州前志云舜葬於此記曰葬者藏也古樂府白紵歌愁來夜遲猶歎息拊枕思君終反側杜子美詩棣蕚一别永相望後漢東夷濊國傳昔武王封箕子於朝鮮箕子教以禮義田蠶又制八條之教其人終不相盜無門户之閉婦人貞信飲食以籩豆尚書五百里要服五百里荒服孔氏云綏服外之五百里要束以文教要服外之五百里言荒又簡略也南史顧野王撰輿地志三十卷行於世行瓊儋閒肩輿坐睡夢中得句云千山動鱗甲萬谷酣笙鐘覺而遇清風急雨戲作此數句四州環一島百洞蟠其中我行西北隅如渡月半弓登髙望中原但見積水空此生當安歸四顧真途窮眇觀大瀛海坐詠談天翁茫茫太倉中一作區區魏中梁一米誰雌雄幽懷忽破散永嘯來天風千山動鱗甲萬谷酣笙鐘安知非羣仙鈞天宴未終喜我歸有期舉酒屬青童急雨豈無意催詩走羣龍夢雲忽變色笑電亦改容應怪東坡老顔衰語徒工久矣此妙聲不聞蓬萊宫四州言瓊崖儋萬也漢賈捐之傳云朱崖儋耳郡皆在南方海中洲居史記孟子傳騶衍言中國名曰赤縣神州內有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也於是有禆海環之人民禽獸莫能相通乃有大瀛海環其外天地之際焉又鄒衍之術迂大而閎辨故齊人頌曰談天衍莊子秋水篇計中國之在海內不似稊米之在太倉乎又則陽篇通達之中有魏於魏中有梁於梁中有王王與蠻氏有辨乎列子周穆王篇王及化人之宫實以為清都紫微鈞天廣樂帝之所居魏夫人傳青童君來降夫人之别寢命青華玉女烟景珠擊西盈之鐘夢雲用宋玉髙唐賦笑電用玉女投壺事並巳見次前韵寄子由我少即多難邅回一生中百年不易滿寸寸彎強弓老矣復何言榮辱今兩空泥洹尚一路公自注古語云十方薄伽梵一路涅槃門梵語泥洹此云涅槃所向餘皆窮似聞崆峒西仇池迎此翁胡為適南海復駕垂天雄下視九萬里浩浩皆積風回望古合州屬此琉璃鐘離别何足道我生豈有終渡海十年歸方鏡照兩童還鄉亦何有暫假壺公龍峩睂向我笑錦水為君容天人巧相勝不獨數子工指㸃昔遊處蓬萊生故宫仇池注詳三十二卷雙石詩再見唐地理志雷州海康郡本合州貞觀元年更名漢書項羽贊舜蓋重童子項羽又重童子童即瞳也西京雜記髙祖初入咸陽宫周行庫藏云云有方鏡廣四尺九寸髙五尺表裏有明人直來照之影則倒見以手掩心即見五臟有病則知所在後漢費長房傳有老翁賣䕫懸一壷於市肆市罷翁跳入壺中長房見而異焉因詣翁俱入壷中於是隨入深山長房辭歸與一竹杖曰騎此任所之既至可以杖投葛陂中也長房乘杖須㬰來歸即以杖投陂顧視則龍也互見八卷刁景純席上詩注丹臺録謝元一名壺公乃費長房所見暮入空壺者史記伍子胥傳申包胥謂子胥曰人衆者勝天天定亦能勝人安期生并引安期生世知其為仙者也然太史公曰蒯通善齊人安期生生嘗以䇿干項羽羽不能用羽欲封此兩人兩人終不肯受亡去見漢蒯通傳豫每讀此未嘗不廢書而歎嗟乎仙者非斯人而誰為之故意戰國之士如魯連虞卿皆得道者歟安期本䇿士平日交蒯通嘗干重瞳子不見隆準公應如魯仲連抵掌吐長虹難堪踞牀洗寧挹扛鼎雄事既兩大繆漂然籋遺風乃知經世士出世或乘龍豈比山澤臞忍饑啖柏松縱使偶不死正堪為僕僮茂陵秋風客望祀猶蟻蜂海上如瓜棗可聞不可逄列仙傳須於食柏實偓佺食松實續仙傳大中間有野人體生緑毛云我即姚泓也食松柏得長生唐逸史亦云漢武帝葬茂陵李賀金人辭漢歌茂陵劉郎秋風客漢郊祀志武帝望祀蓬萊之屬幾至殊庭如瓜棗注屢見夜夢并引七月十三日至儋州十餘日矣淡然無一事學道未至靜極生愁夜夢如此不免以書自怡夜夢嬉遊童子如父師檢責驚走音奏書計功當畢春秋餘今乃始及桓莊初怛然悸寤心不舒起坐有如挂鈎魚我生紛紛嬰百緣氣固多習獨此偏弃書事君四十年仕不顧一作願留書繞纒自視汝與丘孰賢易韋三絶丘猶然如我當以犀革編韓退之詩歸舍不能食有如魚挂鉤史記孔子世家晚而喜易序彖象說卦文言讀易韋編三絶左傳莊十二年衛人請南宫萬於陳飲之酒而以犀革裹之遷居之夕聞鄰舍兒誦書欣然而作幽居亂蛙黽生理半人禽跫然巳可喜况聞弦誦音兒聲自圓美誰家兩青襟且欣集齊咻未敢笑越吟九齡起韶石姜子家日南吾道無南北安知不生今海濶尚挂斗天髙欲橫參荆榛短牆缺燈火破屋深引書與相和置酒仍獨斟可以侑我醉琅然如玉琴毛詩子襟刺學校廢也青青子襟悠悠我心唐張九齡韶州曲江縣人韶州有韶石山姜公輔有髙才敷奏詳亮德宗器之愛州日南人聞子由瘦公自注儋耳至難得肉五日一見花猪肉十日一遇黃雞粥土人頓頓食薯芋薦以薰鼠燒蝙蝠舊聞蜜唧嘗嘔吐稍近蝦蟇緣習俗十年京國厭肥羜日日蒸花壓紅玉從來此腹負將軍公自注俗諺云大將軍食飽捫腹而歎曰我不負汝左右曰將軍固不負此腹此腹負將軍未嘗出少智慮也今者固宜安脫粟人言天下無正味蝍蛆未遽賢麋鹿海康别駕復何為帽寬帶落驚僮僕相看會作兩臞仙還鄉定可騎黃鵠杜子美遣悶詩頓頓食黃魚又秦州詩充腸多薯芋朝野僉載嶺南獠民好為蜜唧即鼠胎未瞬通身赤蠕者飼之以蜜飣之筵上躡躡而行以筯挾取咬之唧唧作聲故曰蜜唧韓退之食蝦蟇詩余初不下㗋近亦能稍稍詩小雅既有肥羜以速諸父莊子齊物論民食芻豢麋鹿食薦蝍蛆甘帶鴟鴉嗜鼠四者孰知正味九域志雷州海康郡子由時責授雷州别駕漢西域傳烏孫公主悲愁為歌曰常居土思兮心內傷願為黃鵠兮歸故鄉客俎經旬無肉又子由勸不讀書蕭然清坐乃無一事病怯腥鹹不買魚爾來心腹一時虛使君不復憐烏攫屬國方將掘鼠餘老去獨收人所棄游哉時到物之初從今免被孫郎笑絳帕䝉頭讀道書烏攫用黃霸傳事再見漢蘇武傳武在胸奴廩食不至掘野鼠弆草實而食之歸拜典屬國漢貨殖傳白圭樂觀時變故人弃我取人取我豫莊子老𥅆曰吾遊於物之初再見江表傳道士琅琊于吉往來吳㑹立精舍讀道書制作符水以治病人多事之䇿於郡城門樓會諸將賓客吉趨度門下諸將賔客三分之二下樓迎之䇿怒收吉諸將連名陳乞䇿曰昔南陽張津為交州刺史舍前聖典訓廢漢家法律常著絳帕頭鼓琴燒香讀道書云以助化卒為南夷所殺此甚無益諸君但未悟耳今此子巳在鬼録勿復費紙筆也即命斬之宥老楮我牆東北隅張王張王並去聲維老穀樹先樗櫟大葉等桑柘沃流膏馬乳漲墮子楊梅熟胡為尋丈地養此不材木蹶之得輿薪規以種松菊靜言求其用略數得五六膚為蔡侯紙子入桐君録黃繒練成素黝面頮音潰作玉灌灑蒸生菌腐餘光吐燭雖無傲霜節幸免狂酲毒孤根信微陋生理有倚伏投斧為賦詩德怨聊相贖張王後漢班超傳遂雄張南道張音丁亮反韓退之筍詩得時兮張王又劉禹錫蒲桃歌張王日日髙本草楮實一名榖實詩小雅爰有樹檀其下維穀又國風桑之未落其葉沃若後漢宦者蔡倫傳自古書契多編以竹簡其用縑帛者謂之為紙縑貴而簡重並不便於人倫乃造意用樹膚麻頭及敝布魚網以為紙天下咸稱蔡侯紙唐藝文志有桐君藥録三卷王注黃繒黃絹也世蓋以楮實練絹矣黝面黑色也頮洗也顧命洮頮水是也一云楮汁能去面䵟莊子蒸生菌又商丘大木嗅之使人狂酲三日不巳老子禍兮福所倚福兮禍所伏觀棊并引豫素不解棊嘗獨游廬山白鶴觀觀中人皆闔户晝寢獨聞棊聲於古松流水之間意欣然喜之自爾欲學然終不解也兒子過乃粗能者儋守張中日從之戲豫亦隅坐竟日不以為厭也五老峯前白鶴遺趾長松䕃庭風日清美我時獨游不逄一士誰歟棊者户外屨二不聞人聲時聞落子紋枰坐對誰究此味空鉤意釣豈在魴鯉小兒近道剝啄信指勝固欣然敗亦可喜優哉游哉聊復爾耳禮記户外有二屨言聞則入言不聞則不入北夢瑣言宣宗朝日本國王子入朝帝令待詔顧師言與之對棊王子出紋楸玉局冷暖玉碁子蓋玉之蒼者如楸玉色其冷暖者言冬暖夏凉糴米糴米買束薪百物資之市不緣耕樵得飽食殊少味再拜請邦君願受一廛地知非笑昨夢食力免內愧春秧幾時花夏稗忽巳穟悵焉撫耒耜誰復識此意入寺曵杖入寺門輯杖挹世尊我是玉堂仙謫來海南村多生宿業盡一氣中夜存旦隨老鴉起饑食扶桑暾光圓摩尼珠照耀玻瓈盆來從佛印可稍覺魔忙奔間看樹轉午坐到鐘鳴昏斂收平生心耿耿聊自溫楚辭逺遊一氣孔神兮於中夜存虛以待之兮無為之先又九歌暾將出兮東方照吾檻兮扶桑再見次韵子由三首東亭仙山佛國本同歸世路𤣥關兩背馳到處不妨間卜築流年自可數期頤遙知小檻臨廛市定有新松長棘茨誰道茅簷劣容膝海天風雨看紛披東樓白髮蒼頭自照盆董生端合是前身獨棲髙閣多詞客為著新書未絶麟小醉易醒風力軟安眠無夢雨聲新長歌自誷真堪笑底處人間是所欣公自注栁子厚詩云髙歌返故室自誷非所欣王注董生董仲舒也髙閣新書意指仲舒下帷講誦不窺園及著玉杯繁露等書特不泥本事耳椰子冠天教日飲欲全絲美酒生林不待儀自漉疏巾邀醉客更將空殼付冠師公自注前漢髙紀注云薛有作冠師規摹簡古人爭看簪導輕安髮不知更著短簷髙屋帽東坡何事不違時漢袁盎傳字絲為吳相兄子種謂盎曰南方卑濕絲能日飲亡何詳四卷和劉道原詠史又屢見番禺雜編椰子中有汁二三升許蕃人好飲謂之椰子酒戰國䇿帝女儀狄造酒進之於禹漉巾用陶潛事屢見隋禮儀志簮導者簮所以建髮於冠導所以導擽鬢髮入巾幘之裏晉輿服志江左時野人巳著帽士人亦往往而然但其頂圓後乃髙其屋云次韵子由月季花再生幽芳本長春暫瘁如蝕月且當付造物未易料枯枿也知宿根深便作紫笋茁乘時出婉娩為我暖栗烈先生蚤貴重廟論推英拔而今城東瓜不記召南茇陋居有逺寄小圃無濶躡還為久處計坐待行年匝公自注子由明年六十臘果綴梅枝春杯浮竹葉誰言一萌動巳覺萬木活聊將玉蘂新公自注世謂此玫瑰花也插向綸巾折世說謝萬詣簡文著白綸巾鶴氅共談論折巾用郭林宗事再見次韻子由浴罷理髮千梳淨風晞勝湯沐閉息萬竅通霧散名乾浴頽然語默喪靜見天地復時令具薪水漫欲濯腰腹陶匠不可求盆斛何由足公自注海南無浴器故常乾浴而巳老雞卧糞土振羽雙瞑目倦馬𩥇之善切風沙奮鬛一噴玉垢淨各殊性快愜聊自沃雲母透蜀紗琉璃瑩蘄竹稍能夢中覺漸使生處熟楞嚴在牀頭妙偈時仰讀反流歸照性獨立遺所矚未知仰山禪巳就季主卜安心會自得助長母相督楚辭離騷晞爾髮兮陽之阿淮南子湯沐具而蟣蝨弔噴玉字出穆天子傳詳草三卷逮作淮口遇風詩注傳燈録老宿有語生疏處常令熱熟熱熟處放令生疏楞嚴經反流全一六用不行傳燈録仰山惠寂禪師問香嚴近日見處如何香嚴乃有偈曰去年貧未是貧今年貧始是貧去年無卓錐之地今年錐也無仰山曰汝只得如來禪未得祖師禪張景陽雜詩嵗暮懷百憂將從季主借前韻賀子由生第四孫斗老今日散幽憂彈冠及新沐况聞萬里孫巳報三日浴朋來四男子大壯泰臨復開書喜見面未飲春生腹無官一身輕有子萬事足舉家傳吉夢殊相驚凡目爛爛開眼電磽磽峙頭玉公自注李賀詩云頭玉磽磽睂刷翠杜郎生得真男子但令强筋骨可以耕衍沃不須富文章端解耗紙竹君歸定何日我計久巳熟長留五車書要使九子讀公自注吾與子由共九孫男矣簞瓢有內樂軒冕無流矚人言適似我窮達巳可卜蚤謀二頃田莫待八州督公自注吾前後典八州幽憂字出莊子讓王篇彈冠用楚辭漁父並巳見周易復亨出入無疾朋來無咎王注為有四男子故用大壯泰臨復句蓋一陽生則為復二陽生則為臨三陽生則為泰四陽生則為大壯白樂天家醖詩捧疑明水從空化飲似陽和滿腹春詩小雅吉夢維何維熊維羆男子之祥眼電晋王戎事再見適子由幼子獨覺瘴霧三年恬不怪反畏北風生體疥朝來縮頸似寒鴉焰火生薪聊一快紅波翻屋春風起先生默坐春風裏浮空眼纈散雲霞無數心花發桃李翛然獨覺午窗明欲覺猶聞醉鼾聲回首向來蕭瑟處也無風雨也無晴十二月十七日夜坐達曉寄子由燈燼不挑垂暗蘂爐灰重撥尚餘薰清風欲發鴉翻樹缺月初升犬吠雲閉眼此心新活計隨身孤影舊知聞雷州别乘應危坐跨海幽光與子分謫居三適旦起理髮安眠海自運浩浩朝黃宫日出露未晞鬱鬱濛霜松老櫛從我久齒踈含清風一洗耳目明習習萬竅通少年苦嗜睡朝謁常匆匆爬搔未云足巳困冠巾重何異服轅馬沙塵滿風騣雕鞍響珂月實與杻械同解放不可期枯栁豈易逄誰能書此樂獻與腰金翁莊子海運則鵬徙於南溟王注道家以臍下為丹田腦頂為黃宫故云若要不老還精補腦又先生嘗有詩云何異枯楊便馬疥此云枯栁豈易逄翻前詩意也午窗坐睡蒲團蟠兩膝竹几閣雙肘此間道路熟徑到無何有身心兩不見息息安且久睡蛇本亦無何用鉤與手神凝疑夜禪體適劇卯酒我生有定數祿盡空餘夀枯楊不飛花膏澤回衰朽謂我此為覺物至了不受謂我今方夢此心初不垢非夢亦非覺敢問希夷叟睡蛇出佛遺教經再見周易枯楊生梯何可久也楊文公談苑陳摶閉門獨卧至百日周世宗令於禁中扄户以試甚異之雍熙初賜號希夷先生夜卧濯足長安大雪年束薪抱衾裯雲安市無井斗水寬百憂今我逃空谷孤城嘯鵂鶹得米如得珠食菜不敢留况有松風聲釜鬲鳴颼颼瓦盎深及膝時復冷暖投明燈一爪剪快若鷹辭韝天低瘴雲重地薄海氣浮土無重膇藥獨以薪水瘳誰能更包裹冠履裝沐猴西京雜記元封二年大寒雪深五尺野鳥獸皆死牛馬悉踳縮如蝟杜子美詩漢時長安雪一丈牛馬毛寒縮如蝟又詩城中斗米換衾裯相許寧論兩相直又引水詩月峽瞿唐雲作頂亂石峥嶸俗無井又人生留滯生理難斗水何直百憂寬說苑墨子謂滑釐曰今凶年冇欲與子隋侯之珠者又欲與子鍾粟者得粟不得珠得珠不得粟子將何擇重膇字出左傳巳見上卷栁子厚栽竹詩適有重膇疾蒸鬱寧所宜子由生日上天不難知好惡與我一方其未定間人力破隂隲小忍待其定報應真可必季氏生而仁觀過見其實端如栁下惠焉往不三黜天有時而定夀考未易畢兒孫七男子公自注子由三子四孫次第皆逄吉遙知設羅門獨掩懸磬室回思十年事無愧篋中筆但願白髮兄年年作生日尚書洪範惟天隂隲下民注云隲定也天不言而默定下民也又身其康强子孫其逄吉以黃子木拄杖為子由生日之夀靈夀扶孔光菊潭飲伯始雖云間草木豈樂䝉此恥一時偶收用千載相瘢疻海南無嘉植野果名黃子堅瘦多節目天材任操倚嗟我始剪裁世用或緣此貴從老夫手往配先生几相從歸故山不愧仙人杞公自注本草枸杞一名仙人杖漢孔光傳為帝太師詔賜靈夀杖盛𢎞之荆州記菊水出穰縣芳菊被崖水極甘香谷中飲此水上夀百二十七八十者猶以為天太尉胡廣患風疾休沐南歸常飲此水後疾遂瘳年八十二乃薨廣字伯始王注孔光胡廣二人皆畏懦諂諛故云草木䝉恥畨禺雜編黃子類交州子橘屬也淡黃色晉和嶠傳庾敳見而歎曰森森如千丈松雖磊砢多節目施之大厦有棟梁之用施注蘇詩卷三十七
