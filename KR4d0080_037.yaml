body:
  text: 施註蘇詩巻二十三宋蘇軾撰施元之原註武進邵長蘅删補詩四十八首起常州居住洎赴登州道中作是嵗元豐乙丑先生年五十施註缺今補李憲仲哀詞并引同年友李君諱惇字憲仲賢而有文不幸早世軾不及與之遊也而識其子廌有年矣廌自陽翟見予扵南京泣曰吾祖母邊母馬前母張與君之䘮皆未𦵏貧不敢以饑寒為戚顧四䘮未舉死不瞑目矣適會故人梁先吉老聞余當歸耕陽羡以絹十匹絲百両為贐辭之不可乃以遺廌曰此亦仁人之餽也既又作詩以告知君與廌者庻㡬皆有以助之薦年二十五其文曄然氣節不凡此豈終窮者哉大夢行當覺百年特未滿遑哀巳逝人長眠寄孤館念我同年生意長日月短鹽車困騏驥烈火廢圭瓉後生有竒骨出語已精悍蕭然野鶴姿誰復識中散有生寓大塊死者誰不窽嗟君獨久客不識黄土煖推衣助孝子一溉滋湯旱誰能脫左驂大事不可緩荘子齊物論覺而後知其夢也且有大覺而後知大夢也野鶴用嵇紹事見十二巻京師哭任遵聖詩注荘子大宗師大塊載我以形勞我以生佚我以老息我以死西漢楊王孫報祈侯書曰乃得歸土就其真宅由是言之焉用久客詳見十六巻逰桓山會者十人詩注嵇康飬生論為稼于湯世偏有一溉之功者雖終焦爛必一溉者後枯然則一溉之益固不可誣禮記檀弓孔子之衛遇舊館人之䘮入而哭之哀出使子貢脫驂而賻之史記管晏傳越石父賢在縲紲中晏子解左驂贖之贈眼醫王生彦若鍼頭如麥芒氣出如車軸閒關絡脈中性命寄毛粟而况清淨眼内景含天燭琉璃貯沆瀣輕脆不任觸而子扵其閒往来施鋒鏃笑談紛自若觀者頸為縮運鍼如運斤去翳如拆屋常疑子善幻他伎雜符祝子言吾有道此理君未矚形骸一塵垢貴賤兩草木世人方重外妄見瓦與玉而我初不知刺眼如刺肉君㸔目與翳是翳要非目目翳茍二物易分如麥菽寧聞老農夫去草更傷榖鼻端有餘地肝膽分楚蜀吾於五輪閒蕩蕩見空曲如行九軌道並驅無擊轂空花誰開落明月自朏音斐朒女六切請問樂全堂忘言老尊宿公自注彦若樂全先生門下醫也素問鍼頭如芒氣出如筐黄庭經有内景外景楚詞逺逰餐六氣而飲沆瀣張衡思元賦噏青岑之玉醴兮餐沆瀣以為張注沆瀣北方夜半氣也莊子徐無鬼郢人堊漫其鼻端若蝉翼匠石運斤成風聼而斲之盡堊而鼻不傷再見韓退之髙閑上人序吾聞浮屠人善幻多技能漢書張騫傳犛靳眩人注眩仝幻即今吞刀吐火植𤓰種木屠人戳馬之術皆是荘子逹生其巧一也而有所矜則重外也凡外重者内拙五輪眼科常談周禮經涂九軌詩國風並驅從兩肩兮楞嚴經亦如翳人見空中花翳病若除花於空滅釋名朏月未盛明也魄月始生魄然也註承大月月生三日謂之魄承小月月生謂之朏又晦而月見西方謂之朓朔而見東方謂之縮朒朓健行貌縮朒遲貌與歐育等六人飲酒忽驚春色二分空且㸔樽前半丈紅苦戰知君便白羽倦遊憐我憶黄封年来齒髪老未老此去江淮東復東記取六人相會處引杯㸔劍坐生風家語子路曰赤羽若日白羽若月按赤白羽指箭羽也歐育武将故云黄封輦下以黄封酒為貴盖重内醞也李賀詩紫絲竹㫁驄馬小家住錢塘東復東杜子羙詩㸔劍引杯長再見觀杭州鈐轄歐育刀劍戰袍青綾衲衫暖襯甲紅線勒帛光遶脅秃襟小袖雕鶻盤大刀長劍龍蛇柙兩軍鼓譟屋瓦墜紅塵白羽紛相雜将軍恩重此身輕笑履鋒鋩如一挿書生只肯坐帷幄談笑毫端弄生殺叫呼擊鼓催上竿猛士應憐小兒黠試問黄河夜偷渡掠面驚沙寒霎霎何如大艦日髙眠一枕清風過苕霅李賀詩禿襟小袖調鸚鵡後漢光武紀城中亦鼓譟而出中外合埶震呼動天地會大雷風屋瓦皆飛史記趙奢傳秦軍鼔譟勒兵武安屋瓦盡震王伯敡所藏趙昌畫四首歐陽歸田録近世名畫趙昌畫冩生逼真而筆法較俗殊無古人格致然時亦未有其比圖畫見聞志趙昌字昌之廣漢人工畫花果時稱絶倫梅花南行渡關山沙水清練練行人巳愁絶日暮集㣲霰慇懃小梅花髣髴吳姬面暗香隨我去囘首驚千片至今開畫圖老眼凄欲泫幽懐不可寫歸夢君家倩詩小雅如彼雨雪先集唯霰黄葵弱質困夏永竒姿蘇曉一作晩涼低昻黄金盃照曜初日光檀心自成暈翠葉森有芒古来寫生人妙絶誰似昌晨粧與午醉真態含隂陽君㸔此花枝中有風露香芙蓉清飈巳拂林積水漸收潦溪邊野芙蓉花水相媚好坐㸔池蓮盡獨伴霜菊槁幽姿强一笑莫景廹摧倒凄凉似貧女嫁晩驚衰早誰寫少年容樵人劍南老趙昌自題其畫云劍南樵叟山茶蕭蕭南山松黄葉隕勁風誰憐兒女花散火冰雪中能傳歳寒姿古来惟邱翁趙叟得其妙一洗膠粉空掌中調丹砂染此鶴頂紅何湏誇落墨獨賞江南工圖畫見聞志邱文播漢州人畫品降髙趙軰後名潛又徐熈鍾陵人世為江南仕族熈識度閒放以髙雅自任善畫花木禽鳥自作翠㣲堂記云落筆之際未嘗以傅色暈淡細碎為工李後主特爱重其畫開寳末歸朝悉貢上朝廷藏之祕府寄吳徳仁兼簡陳季常東坡先生無一錢十年家火燒凡鉛黄金可成河可塞只有霜䰅一作鬢無由元龍邱居士亦可憐談空說有夜不眠忽聞河東師子吼柱杖落手心茫然誰似濮陽公子賢飲酒食肉自得仙平生寓物不留物在家學得㤀家禪門前罷亞十頃田清溪遶屋花連天溪堂醉臥呼不醒落花如雪春風顛我逰蘭谿訪清泉巳辦布襪青行纒稽山不是無賀老我自興盡回酒船恨君不識顔平原恨我不識元魯山銅駝陌上㑹相見握手一笑三千年漢書郊祀志欒大言臣之師曰黄金可成而河决可塞不死之藥可得仙人可致也王注龍邱居士指陳季常河東師子事有王䙼者字逹觀本嘉州犍為人舊在江南武昌居名天常嘗從先生逰逹觀為坡公言季常之妻栁氏最悍妒毎季常設客有聲妓栁氏則以杖擊照壁大呼客至為散去濮陽公子吳徳仁也唐書顔真卿為平原太守安禄山反河朔盡陷唯真卿城守具備元宗聞之喜曰朕不識真卿何如人所為得如此元徳秀字紫芝為魯山令蘇元明謂人曰吾不幸生衰俗所不恥者識元紫芝銅駝用索靖語詳十五巻百歩洪詩注題王逸少帖顛張醉素両秃翁追逐世好稱書工何曽夢見王與鍾妄自粉飾欺盲聾有如市倡抹青紅妖歌嫚舞眩兒童謝家夫人淡丰容蕭然自有林下風天門蕩蕩驚跳龍出林飛鳥一掃空為君草書續其終待我他日不忩忩漢書竇田傳蚡已罷朝出止車門召御史大夫韓安國載怒曰與長孺共一秃翁何為首䑕両端世說謝遏絶重其姊張元常稱其妹有濟尼者並逰張謝二家人問其優劣答曰王夫人神情散朗故有林下風氣頋家婦清心玉映自是閨房之秀王夫人謝道韞也漢禮樂志天門開詄蕩蕩書評王右軍書字勢雄强如龍跳天門虎卧鳯閣又張旭草書如驚蛇入草飛鳥出林忩忩用張伯英忩忩未暇草書語再見書林逋詩後逋字君復杭州錢塘人仁宗賜謚和靖先生吳儂生長湖山曲呼吸湖光飲山緑不論世外隐君子傭奴販婦皆冰玉先生可是絶俗人神清骨冷無由俗我不識君曽夢見瞳子瞭然光可燭遺篇妙字䖏䖏有歩遶西湖㸔不足詩如東野不言寒書似西臺差少肉平生髙節已難繼将死㣲言猶可録自言不作封禪書更肻悲吟白頭曲公自注逋臨終詩云茂陵異日求遺草猶喜初無封禪書我笑吳人不好事好作祠堂傍修竹不然配食水仙王一盞寒泉薦秋菊西臺御史李建中善真行字和仲伯逹歸山歳月苦無多尚有丹砂奈老何繡谷只應花自染鏡潭長與月相磨君方傍海㸔初日我巳横江擊素波人不我知斯我貴不湏雷雨起龍梭漢武帝秋風詞横中流兮揚素波簫鼓鳴兮發棹歌晋陶侃傳侃少時漁於雷澤網得一織梭以挂于壁有頃雷雨自化為龍而去春日鳴鳩乳燕寂無聲日射西牕潑眼眀午醉醒来無一事只将春睡賞春晴贈袁陟袁陟字世弼豫章人自號遯翁有集十巻嘉祐間終祕書丞是身如虛空萬物皆我儲胡為强分别百金買田廬不見袁夫子神馬載尻輿逰乎無何有一飯不願餘官湖為我池學舎為我居何以遺子孫此身自籧篨薫風暗楊栁秋水静芙蕖應觀我知子不怪子知魚荘子大宗師浸假而化予之尻以為輪以神為馬予因而乗之豈更駕哉又㳺于無何有之鄉栁子厚贈江華長老詩一飯不願餘跏趺便終夕後漢逸民傳劉表謂龎公曰先生若居畎畝而不肻官禄何以遺子孫乎龎公曰世人皆遺之以危今獨遺之以安唐韻籧篨籚䉬一曰麤竹席也知魚用荘子語屡見蘇子容母陳夫人挽詞名頌字子容元祐中為尚書左丞蘇陳甥舅真冰玉正始風流起頽俗夫人髙節稱其家凛凛寒松映修竹鷄鳴為善日日新八十三年如一晨豈惟室家宜夀母寔與朝廷生異人㤀軀狥國乃吾子三仕何曽知慍喜不湏擁笏彊垂魚視我去来皆夢爾誦詩相挽真區區墓碑千字多遺餘他年太史取家傳知有班昭續漢書爾雅謂我舅者吾謂之甥晋書衛玠傳玠妻父樂廣有海内重名議者以為婦公冰清女壻玉潤又王敦鎮豫章長史謝鯤先雅重玠敦謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振于江表㣲言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒又互見十三十五巻詩注詩魯頌魯侯燕喜令妻夀母韓退之曺成王碑王之遭誣在理念太妃老将驚而戚出則囚服就辨入則擁笏垂魚後漢列女傳班昭字恵班彪之女也兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀藏書閣踵而成之又漢書始出多未能通者同郡馬融伏于閣下從昭受讀歸冝興㽞題竹西寺三首冝興常州屬縣竹西寺在揚州杜牧詩誰知竹西路歌吹是揚州再見十年歸夢寄西風此去真為田舍翁剰覓蜀岡新井水要㩗鄉味過江東唐地理志揚州節度使杜亞自江都西循蜀岡之右引陂趨城按蜀岡有井陸羽品為第五泉相傳與岷江相通故先生曰鄉味江東指常州道人勸飲雞蘇水童子能煎鶯粟湯暫借藤床與瓦枕莫教孤負竹風凉本草水蘇紫蘇假蘇三種各異水蘇一名鷄蘇再見鶯粟本草名罌子粟一名米囊子秋種冬生嫩苖作蔬甚佳其實形如酒罌中有細米極白可煮粥江東人呼千葉者為麗春花或謂是罌粟别種非也其花變態本自不常有白者紅者紫者粉紅者杏黄者半紅半紫半白者艷麗可愛故曰麗春又曰賽牡丹曰錦被花詳見㳺黙齋花譜此生已覺都無事今歳仍逢大有年山寺歸来聞好語野花嗁鳥亦欣然唐王維因赦拜官詩云花迎喜氣皆知笑鳥識歡心亦解歌按通鑑元祐六年侍御史賈易劾軾元豐末在揚州聞先帝厭代作詩無人臣禮先生辨題詩劄子云是歳三月六日聞先帝遺詔舉哀挂服了當當迤邐往常州至五月初因往揚州竹西寺見百姓父老十數人道旁語笑一人以手加額云見說好箇少年官家臣寔喜聞百姓謳歌吾君之子出于至誠又是時臣初得請歸耕常州盖将老焉而淮浙閒所在豐熟因作詩云此身已覺都無事今歳仍逢大有年山寺歸来聞好語野花嗁鳥亦欣然盖喜聞此語故作詩書之當途僧舎壁上若稍有不善之意豈敢書壁上以示人乎又其時去先帝上仙已及兩月决非山寺歸来始聞之語而君錫等公然誣㒺伏乞付外施行稍正國法孟震同遊常州僧舎三首孟震字亨之東平人嘗為黄州通判年来轉覺此身浮又作三吳浪漫㳺忽見東平孟君子夢中相對說黄州唐元結自稱為浪士人呼之為漫郎先生君子泉銘序孟君亨之篤學而力行克有常徳信于朋友一時皆稱之曰此君子也因號之孟君子君通守齊安其圃有泉旱不加損水不加益因名之曰君子泉湛湛清池五月寒小山無數碧㠝岏穉杉戢戢三千本且作凌雲合抱㸔知君此去便歸耕笑指孤舟一葉輕若向三茅乞靈雨半篙流水送君行神仙傳大茅君名盈次弟名固小弟名衷太上老君拜盈為司命真君固為定籙君衷為保命君故曰三茅君贈常州報恩長老二首碧玉盌盛紅馬腦井花水養石菖蒲也知法供無窮盡試問禪師得飽無薦福老懐真巧便浄慈両本更尖新憑師為作鐵門限凖備人閒請話人鐵門限詳見十三巻贈寫御容妙善師詩注次韻答賈耘老五年一夢南司州饑寒疾病為子憂東来六月并無水仰㸔古堰横奔牛平生管鮑子知我今日陳蔡誰從邱夜航爭渡泥水澀牽挽直欲来𤓰州自言嗜酒得風痺故鄉不敢居温柔定将泛愛救溝壑衰病不復從前樂今年太守真臥龍笑語炎天出冰雹時低九尺蒼䰅髯過我三閒小池閣故人改觀爭来賀小兒不信猶疑錯為君置酒飲且哦草閒秋蟲亦能歌可憐老驥真老矣無心更秣天山禾郡邑志唐武徳三年于黄州黄陂縣置南司州七年廢其初盖北齊武帝置也又常潤閒有閘名奔牛温柔鄉趙飛燕外傳語已見杜子美詩虗名但蒙寒暄問泛愛不救溝壑辱張籍詩與君相逢莫寂寞衰老不復從前樂㐮陽記諸葛孔明為臥龍龎元士為鳯雛司馬徳操為水鏡皆龎徳公語天山在伊州伊吾縣唐薛仁貴傳将軍三箭定天山壮士長歌入漢關韓退之詠駑驥饑食天山禾墨花并引世多以墨畫山水竹石人物者未有以畫花者也汴人尹白能之為賦一首造物本無物忽然非所難花心起墨暈春色散毫端縹緲形纔具扶疎態自完蓮風起顛一作盡傾倒杏雨半摧殘獨有狂居士求為墨牡丹兼書平子賦歸向雪堂㸔唐末劉訓者京師冨人梁氏開國嘗假貸以給軍京師春逰以觀牡丹為勝賞訓邀客賞花乃繋水牛數百在前指曰劉氏墨牡丹也漢張衡字平子作歸田賦送竹几與謝秀才平生長物擾天真老去歸田只此身㽞我同行木上座贈君無語竹夫人但随秋扇年年在莫鬬瓊枝夜夜新堪笑荒唐玉川子莫年家口若為親世說王㳟從㑹稽還王大㸔之見其坐六尺簟因語㳟卿東来故應有此物可以一領及我㳟無言大去後即舉所坐者送之既無餘便坐薦上大聞之甚驚曰吾本謂卿多故求耳對曰丈人不悉㳟㳟作人無長物王大名忱傳燈録佛日禪師出逰㦯問誰為同行師舉拄杖示之曰唯有木上座耳南史陳後主每使諸貴人及女學士與狎客共賦新詩采其尤艷麗者以為曲調被以新聲宫女有容色者以千百數令習而歌之分部迭進其曲有玉樹後庭花臨春樂等其畧云璧月夜夜滿瓊樹朝朝新大抵皆美張貴妃孔貴嬪之容色玉川子盧仝也有詩云蛙蛇是家口草石是親情溪陰堂白水滿時雙鷺下緑槐髙䖏一蟬吟酒醒門外三竿日臥㸔溪南十畝陰劉禹錫竹枝詞日出三竿春霧消杜詩與致溪邉十畝陰再見次韻許遵蒜山渡口挽歸艎朱雀橋邉㸔道装供帳已應煩百兩擊鮮無久溷諸郎問禪時到長干寺載酒閒過緑野堂此味只憂兒軰覺逢人休道北牕凉王注蒜山在潤州朱雀橋在江寧府晋之建康也長干里在建康漢書疏廣傳廣受乞骸骨歸公卿大夫故人邑子設祖道供帳東都門外送者車數百両漢陸賈傳謂其子曰與女約過女女給人馬酒食極飲十日而更一歳中以徃来過它客率不過再過數擊鮮母久溷女為也唐裴度請老治第東都作别墅具燠館凉臺號緑野堂度野服蕭散與白居易劉禹錫把酒為文章窮晝夜不問人間事㦯曰時王介甫閑居長干故以緑野堂比之兒軰覺用王羲之語屢見贈章黙并序章黙居士字志明生公侯家才性髙爽棄家求道不蓄妻子與世無累而父母與兄之喪貧不能舉以是眷眷世間不能無求扵人余深哀其志既有以少助之又取其言為詩以贈其行庶㡬有哀之者章子親未𦵏餘生抱羸疾朝吟噎鄰里夜淚腐茵席前年黒花生今歳白髪出身随日月逝恨與天地畢願求不毛田親築長夜室難從王孫裸未忍夏后堲五陵多豪士百萬付一擲心知義財難甘就貧友乞不辭毛粟施行自邱山積此志茍朝遂夕死真不戚誓求無生理不踐有為迹棄身尸陀林烏鳶任狼藉王禹偁表蚤年多病眼有黒花晩歳多憂頭生白髪漢楊王孫傳病且死令其子曰吾欲祼𦵏以反吾真又互見本巻禮記檀弓有虞氏瓦棺夏后氏堲周鄭注火熟曰堲燒土冶以周于棺也漢髙帝𦵏長陵恵帝安陵景帝陽陵武帝茂陵昭帝平陵五陵皆在長安北徙天下豪傑之家以寔之晋書劉毅傳家無擔石之儲樗蒱一擲百萬諸經音義尸陀林此言寒林其林幽䆳而寒因以名也在王舍城側死人多送其中荘子上為烏鳶食下為蝼蟻食送穆越州穆名珣字東美江海相忘十五年羡公松柏蔚蒼顔四朝耆舊冰霜後両郡風流水石間舊政猶傳蜀父老先聲已振越溪山樽前俱是蓬莱守莫放髙樓雪月閒唐元㣲之守越以州宅誇白樂天詩云我是玉皇香案吏謫居猶得在蓬莱今越州有蓬莱閣登州亦有蓬莱閣又倚郭乃蓬莱縣公是時已聞新命故云贈葛葦竹椽茅屋半摧傾肻向蜂窠寄此生長恐波頭巻室去欲将船尾載君行小詩試擬孟東野大草閑臨張伯英消遣百年湏底物故應憐我不歸耕贈王寂與君暫别不湏嗟俯仰歸来鬢未華記取江南煙雨裏青山斷䖏是君家南都妙峰亭千尋挂雲闕十頃含風灣開門㺯清泚照見雙銅鐶池䑓半禾黍桃李餘榛菅無人肻回首日暮車斑斑史君非世人心與古佛閒時要聲利客来洗塵埃顔新亭在東阜飛宇臨通闤古甃磨翠壁霜林散烟鬟孤雲抱商邱芳草連杏山俯仰盡法界逍遙寄人寰亭亭妙髙峰了了蓬艾閒五老壓彭蠡三峰照潼關均為拳石小配此一掬慳煩公為標指免使勤躋攀後漢五行志京都童謡曰車斑斑入河間河間姹女工數錢荘子齊物論夫三子者猶存乎蓬艾之間韓退之炭谷湫詩巨靈髙其捧保此一掬慳神宗皇帝挽詞三首文武固天縱欽明又日新化民何止聖妙物獨稱神政已三王上言皆六籍醇巍巍本無象刻畫愧孤臣未易名堯徳何湏數舜功小心仍致孝餘事及平戎典禮從周舊官儀與漢隆誰知本無作千古自承風左傳文十八年史克曰舜有大功二十而為天子荘子知北逰至人無為大聖不作接統真千歳膺期止一章周南稍㽞滯宣室遂凄凉病馬空嘶櫪枯葵已泫霜餘生臥江海歸夢泣嵩邙後漢律歴志閏七而盡其歳十九名之曰章按神宗在位十九年故曰一章漢司馬遷傳是歳天子始建漢家之封而太史㽞滯周南不得與從事發憤且卒而子遷適反見父扵河洛之間太史公執遷手而泣曰今天子接千歳之統封泰山而余不得從行是命也夫漢賈誼傳後歳餘文帝思誼徵之至入見上方受釐坐宣室上因感鬼神而問鬼神之本誼具道所以然之故至夜半文帝前席按公時在謫籍而神廟升遐故云九域志河南府古蹟有嵩山北邙山先生洛中詩嵩髙蒼翠北邙紅金山妙髙臺我欲乗飛車東訪赤松子蓬莱不可到弱水三萬里不如金山去清風半帆耳中有妙髙䑓雲峰自孤起仰觀初無路誰信平如砥䑓中老比邱碧眼照牕几巉巉玉為骨凛凛霜入齒機鋒不可觸千偈如翻水何湏尋徳雲即此比邱是長生未暇學請學長不死帝王世紀竒肱民䏻為飛車從風逺行湯時西風吹竒肱車至于豫州湯破其車不以示民十年東風至乃復作車遣歸之其地去玉門四萬里史記封禪書三神山者其傳在渤海中去人不逺未至望之如雲及到三神山反居水下臨之風輙引去終莫能至云神仙傳謝自然汎海求蓬莱一道士謂曰蓬莱隔弱水三萬里非飛仙不可到妙髙䑓取華嚴經徳雲比邱所居妙髙峰為義也詩小雅周道如砥傳燈録神機交激若拄于箭鋒晋書鳩摩羅什日誦千偈韓退之詩文如翻水成華嚴經善財童子問法于五十三善知識而徳雲比邱乃第一王注長生謂學仙長不死謂佛不生不滅也贈杜介并序元豐八年七月二十五日杜㡬先自浙東還與余相遇扵金山話天台之異以詩贈之我夢逰天台横空石橋小秋風吹菵露翠濕香嫋嫋應真飛錫過絶澗度雲鳥舉意欲從之翛然已松杪㣲言粲珠玉未說意先了覺来如墮空耿耿牕戶曉羣生陷迷網獨逹從古少杜叟子何人長嘯萬物表妻孥空四壁振䇿念輕矯遂為赤城遊飛歩凌縹緲問禪不歸舎屢為瓠壺繞何人識此志佛眼自照瞭我夢君見之卓爾非魔嬈仙葩發茗椀剪刻分葵蓼從今更不出閉戶閑騕褭時從佛頂巖馳下雙蓮沼天台石橋見十一巻次韻周邠寄鴈蕩山圖詩注宋永初山川記寕州瘴氣菵露四時不絶菵者草名其上露霑人之肉即潰爛故鮑昭有苦熱行云瘴氣畫薫體菵露夜霑衣孫綽遊天台賦王喬控鶴以沖天應真飛錫以躡虚又被毛褐之森森振金䇿之鈴鈴又哂夏蟲之疑冰整輕翮而思矯又赤城霞起而建標瀑布飛流以界道釋氏要覽髙僧鄧隠峰逰五䑓出淮西擲錫飛空而徃西天比邱持錫有二十五威儀凡至室中不得著地必挂于壁牙故釋子稱逰行僧為飛錫安住僧為挂錫支遁天台山銘序云往天台當由赤城山為道徑㑹稽記赤城山石色皆赤状似雲霞倦逰録金鑾長老問歐陽景取書索米于玉泉長老景授一緘及詩一絶云金鑾来覓玉泉書金玉相逢價倍珠到了不干藤蔓事壺蘆自去纒壺蘆先生十八羅漢頌後䟦佛滅度後閻浮提衆生剛狠自用莫肻信入故諸聖賢皆隐不見獨以像設遺言提引未悟而峨嵋五臺廬山天台獨出光景變異使人了然見之軾家藏十六羅漢像毎設茶供則化為白乳㦯凝為花木桃李芍藥僅可指名次韻孫莘老斗野亭寄子由在邵伯堰寰宇記邵伯堰在揚州廣陵縣云謝安所築按安傳及至新城築埭于城北人追思之名為邵伯埭然則所謂新城豈乃廣陵耶落帆謝公渚日脚東西平孤亭得小憇暮景含餘清坐待斗與牛錯落挂南甍老僧如夙昔一笑意已傾新詩出故人舊事疑前生吾生七往来送老海上城逢人輙自哂得魚不忍烹似聞績溪老復作東都行小詩如秋菊艷艷霜中眀過此感我言長篇發春榮晋書阮裕赴山陵事畢便還諸人相與追之至方山不相及劉惔歎曰我入東正當泊安石渚下耳不敢近思曠傍唐房琯開元中為盧氏宰與道士邢和璞遇夏日入廢佛寺鑿池得甕中所蔵婁師徳與永禅師書笑曰頗憶此邪因悵然悟前生為永禅師按先生既自黄移汝子由亦自監筠州鹽酒稅移知歙之績溪先生未至汝繼得請歸常州尋起知登州而子由自績溪以校書郎被召入京亦湏由召伯堰至東都故扵篇末及之送楊傑并序王注元祐二年髙嚴僧義天航海閒道至明州傳云義天棄王位出家上疏乞徧歴叢林問法受道有詔朝奉郎楊傑次公館伴所至吳中諸刹皆迎餞如王臣禮至金山僧了元乃牀坐受其大展次公驚問其故了元曰義天亦異國僧耳叢林規䋲如是不可易朝廷聞之以了元知大體無為子嘗奉使登太山絶頂雞一鳴見日出又嘗以事過華山重九日飲酒蓮華峰上今乃奉詔與髙麗僧統㳺錢塘皆以王事而從方外之樂善哉未曽有也作是詩以送之天門夜上賔出日萬里紅波半天赤歸来平地㸔跳丸一㸃黄金鑄秋橘太華峰頭作重九天風吹灧黄花酒浩歌馳下腰帶鞓醉舞崩崖一揮手神㳺八極萬縁虗下視蚊雷隐汙渠大千一息八十返笑厲東海騎􅚪魚三韓王子西求法鑿齒彌天兩勍敵過江風急浪如山寄語舟人好㸔客太山記太山盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如穴中視天牕矣自下至古封禪䖏凡四十里山頂西嵓為仙人石閣東嵓為介邱東南嵓名日觀者雞一鳴時見日始欲出長三丈所腰帯鞓華山地名李白大鵬賦序余昔于江陵見天台司馬子㣲謂余有仙風道骨可與神逰八極之表詩國風深則厲淺則掲注牽衣渉之也爾雅繇帶以上為厲三韓韓有三種曰馬韓曰辰韓曰弁韓皆髙麗也晋書釋道安與習鑿齒相見鑿齒曰四海習鑿齒道安曰彌天釋道安人以為名對摭言唐令狐楚鎮揚州䖏士張佑常與狎宴楚視佑改令曰上水船風又急帆下人湏好立佑應聲曰下水船船底破好㸔客莫倚柂次韻送徐大正公自注嘗與余約卜鄰於江淮閒将赴登州同舟至山陽以詩見送留别别時酒醆照燈花知我歸期漸有涯去歳渡江萍似斗今年並海棗如瓜多情明月邀君共無價青山為我賒千首新詩一竿竹不應空釣漢江槎家語楚昭王渡江江中有物大如斗直觸王舟舟人取之王使人問于孔子孔子曰此為萍實者也異時小兒謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜漢書郊祀志李少君曰臣嘗逰海上見安期生食臣棗大如瓜楊康功有石状如醉道士為賦此詩楚山固多猿青者黠而夀化為狂道士山谷恣騰蹂誤入華陽洞竊飲茅君酒君命囚巖閒巖石為械杻松根絡其足藤蔓縳其肘蒼苔眯其目叢棘哽其口三年化為石堅瘦敵瓊玖無復號雲聲空餘舞杯手樵夫見之笑抱賣易升斗楊公海中仙世俗那得友海邊逢姑射一笑微俛首胡不載之歸用此頑且醜求詩紀其異本末得細剖吾言豈妄云得之亡是叟仙經句曲山即三十六洞天之第八洞名曰華陽洞大茅君之所治也在江寧府句容縣互見本巻前三茅注司馬相如傳子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故虛藉此三人為辭按公詩意言猿化道士道士又化石止設虛辭為稱耳迨作淮口遇風戲用其韻我詩如病驥悲鳴向衰草有兒真驥子一噴羣馬倒養氣勿吟哦聲名忌太早風濤借筆力勢逐孤雲掃何如陶家兒遶舍覔梨棗君㸔押彊韻已勝郊與島杜子羙詩驥子好男兒前年學語時注驥子宗武小名又贈竇侍御詩驥之子鳯之雛穆天子傳天子東逰于黄澤宿于西洛歌曰黄之陁其馬歕沙皇人威儀黄之澤其馬歕玉皇人夀榖歕即噴字王子韶雞跖集王筠字元禮為詩能押彊韻郊島孟郊賈島也次韻徐積徐積字仲車殺雞未肯邀季路裹飯先湏問子来但見中年隐槐市豈知平日賦蘭臺海山入夢方東去風雨留人得暫陪若説峨眉眼前事故鄉何䖏不堪回荘子大宗師子輿與子桑友而霖雨十日子輿曰子桑殆病矣裹飯而徃食之按子桑非子来也豈先生偶誤記邪淮南子槐市學也樹以青槐三輔黄圖明堂辟雍為博士舎三十區為㑹市但列槐樹數百行諸生朔望㑹此市各持其郡所出物及經書所與賈買雍容揖譲議論槐下蘭䑓用宋玉風賦語再見元豐七年有詔京東淮南築髙麗亭館宻海二州騷然有逃亡者明年軾過之歎其壮麗留一絶云簷楹飛舞垣牆外桑柘蕭條斤斧餘盡賜昆邪作奴婢不知償得此人無漢汲黯傳匈奴渾邪王来降賈人與市者坐當死五百餘人黯入請閒見髙門曰夫匈奴攻當路塞絶和親中國舉兵誅之死傷不可勝計而費以鉅萬百數臣愚以為陛下得胡人皆以為奴婢賜從軍死者家鹵獲囙與之以謝天下塞百姓之心今縦不能又㣲文殺無知者五百餘人臣竊為陛下弗取也過宻州次韻趙明叔喬禹功先生依舊廣文貧老守時遭醉尉嗔汝軰何曽堪一笑吾儕相對復三人黄雞唱曉凄凉曲白髪驚秋見在身一别膠西舊朋友扁舟歸釣五湖春唐鄭䖍為廣文館博士醉尉用李廣屏居藍田事俱已見詩意以鄭䖍比趙以李廣比喬也杜子美詩何當官曺清爾軰堪一笑唐牛僧孺詩且門樽前見在身再過常山和昔年留别詩傴僂山前叟迎我如迎新那知夢幻軀念念非昔人江湖久放浪朝市誰相親郤尋泉源去桃花逄避秦左傳昭七年正考父鼎銘云一命而僂再命而傴楞嚴經日月歳時念念遷變再過超然䑓贈太守霍翔超然臺在密州舊因城以為臺公守密州葺而新之自為之記昔飲雩泉别常山天寒歳在龍蛇閒山中兒童拍手笑問我西去何當還十年不赴竹馬約扁舟獨與魚蓑閒重来父老喜我在扶挈老㓜相遮攀當時襁褓皆七尺而我安得留朱顔問今太守為誰歟䕶羌充國鬢未斑公自注翔自言在熈河作屯田有功躬持牛酒勞行役無復杞菊嘲寒慳超然置酒尋舊迹尚有詩賦鑱堅頑孤雲落日在馬耳照耀金碧開煙鬟邞當从扶或作邞淇自古北流水跳波下瀬鳴玦環願公談笑作石埭坐使城郭生溪灣按公以熙寧丙辰冬末罷知密州正在辰巳之間故借用龍蛇字周禮鄉大夫辨夫家之可任者國中自七尺以至六十野自六尺以及六十有五疏云七尺謂年二十六尺謂年十五漢趙充國年七十餘以後将軍出平羌戎條上留田便宜十二事杞菊公超然臺記云始至之日歳比不登盗賊滿野獄訟充斥而齋厨索然日食杞菊公又有後杞菊賦大意譏公使庫之儉陋也蘅按酈道元水經注有扶淇水無郤淇水道元濰水條下云又北左合扶淇之水水出西南常山東北流注濰又云濰自箕縣北逕東武縣西北流合扶淇之水晏謨伏琛云東武城西北二里濰水者即扶淇之水也按此則公詩所用的是扶淇無疑故曰自古北流水也又考漢地里志琅邪郡有邞縣師古曰音夫又音挾又二十六巻送喬仝詩隨師東逰渡濰邞王注濰邞宻州二水名則扶淇似可亦作邞淇至郤淇字别無據依當是集本訛邞為郤諸注家相沿不覺耳今攷正施註蘇詩巻二十三
