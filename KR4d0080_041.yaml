body:
  text: 施注蘇詩卷二十七宋蘇軾撰施元之原注武進邵長蘅刪補詩四十五首時在翰林作書艾宣畫四首圖畫見聞志艾宣鍾陵人工畫花竹翎毛竹鶴此君何處不相宜況有能言老令威誰識長身古君子猶將緇布緣深衣劉禹錫竹詩依依似君子無地不相宜杜子美畫鶴詩低昻各有意磊落如長人禮記古者深衣蓋有制度以應規矩準繩權衡故先王貴之今云緇布緣深衣以鶴之狀身白而黑緣於外也黃精鹿太華西南第幾峰落花流水自重重幽人只採黃精去不見春山鹿養茸本草黃精一名鹿竹華山為多杏花白鷴天工剪刻為誰妍抱蕊游蜂自作團把酒惜春都是夢不如間客此間看韓退之李花詩剪刻作此連天花楊文公談苑李昉畜五禽皆以客名白鷴曰間客鷺曰雪客鶴曰仙客孔雀曰南客鸚鵡曰隴客昉畫為五客圖各為詩五章杜牧之詩願為間客此間行蓮龜半脫蓮房露壓欹緑荷深處有遊龜只應翡翠蘭苕上獨見元夫曝日時抱朴子千歲龜巢於蓮葉杜子美漫興詩或看翡翠蘭苕上未掣鯨魚碧海中沈懷逺南越志宋元君夢𤣥衣大夫神之龜也韓退之詩再拜謝元夫收悲以歡欣僕領貢舉未出錢穆父雪中作詩見及三月二十日同游金明池始見其詩次韻為答雪知我出巳全消花待君來未敢飄行避門生時小飲忽逢騎吏有嘉招魚龍絶技來千里斑白遺民數四朝知有黃公酒壚在蒼顔華髮自相遙唐傳記有行行避門生之語漢西域贊作漫衍魚龍之戲以觀視之晉王戎傳嘗經黃公酒壚下顧後車客曰昔與嵇阮酣暢於此自嵇阮云亡吾為時之所羈紲今日視之雖近邈若山河再見次韻子由五月一日同轉對元祐三年五月一日公以翰林學士兼侍讀文定以户部侍郎同對先是公發䇿試廖正一館職問王莽曺操事侍御史王明叟覿奏論以為非是韓川趙挺之亦攻之公屢疏丐去故詩有憂患半生歸休上䇿云云結用趙堯事言事官中必有所指也跪奉新書笏在腰談王正欲伴耕樵晉陽豈為一門事宣政聊同五日朝憂患半生聨出處歸休上䇿蚤招要後生可畏吾衰矣刀筆從來錯料堯漢揚雄傳士有不談王道者樵夫笑之唐溫大雅傳髙祖初大雅與弟彥博對掌華近帝曰我起晉陽為卿一門耳唐書貞元中詔自今五月一日御宣政殿與文武百僚相見漢周昌傳趙堯為符璽御史趙人方與公謂昌曰君之史趙堯竒士是且代君之位時昌為御史大夫笑曰堯年少刀筆吏耳何至是乎居頃之昌為趙相堯遂代之韓康公挽辭三首韓康公名綘字子華已見七卷石淙莊詩注故國非喬木興王有世臣嗟豫後死者猶及老成人德業經文武風流表搢紳空餘行樂地處處泣遺民晉樂廣傳天下言風流者謂王樂為稱首史記五帝紀薦紳先生難言之徐廣曰薦紳即搢紳也古字假借再世忠清德三朝翊贊勳功成不歸國就訪敢忘君舊學嚴詩律餘威靖塞氛何當繼韓奕故吏總能文王注三朝康公所歷英宗神宗及哲宗也毛詩韓奕尹吉甫美先王也能錫命諸侯按公墓志知慶州日熟羌據堡為亂公出兵討平之故有餘威靖塞氛句西第開東閣初筵㸃後塵笙歌邀白髮燈火樂青春扶路三更罷回頭一夢新賦詩猶墨濕把卷獨沾巾後漢馬融傳為竇憲作西第頌漢公孫宏傳為相開東閣以延賢人詩小雅賔之初筵左右秩秩張景陽七命余雖不敏請從後塵晉羊曇嘗因石頭大醉扶路唱樂見謝安傳柏石圖詩并引陳公弼家藏柏石圖其子慥季常傳寶之東坡居士作詩以為之銘柏生兩石間天命本如此雖云生之艱與石相終始韓子俯仰人但愛平地美土膏雜糞壤成壞幾何耳君看此槎牙豈有可移理蒼龍轉玉骨黑虎抱金柅畫師亦可人使我毛髮起當年落筆意正欲譏韓子韓退之詩柏生兩石間萬歲終不大又詩柏移就平地柏有傷根容周易繫于金柅貞吉三國蜀費禕傳來敏曰君信可人必能辦賊慶源宣義王丈以纍舉得官為洪雅主簿雅州户掾遇吏民如家人人安樂之既謝事居睂之青神瑞草橋放懷自得有書來求紅帶既以遺之且作詩為戲請黃魯直秦少游各為賦一首為老人光華青衫半作霜葉枯遇民如兒吏如奴吏民莫作官長看我是識字耕田夫妻啼兒號刺史怒時有野人來挽鬚拂衣自注下下考芋魁飯豆吾豈無歸米瑞草橋邉路獨遊還佩平生壺慈姥巖前自喚渡青衣江畔人爭扶今年蠶市數州集中有遺民懷袴襦邑中之黔相指似白髯紅帶老不癯我欲西歸卜鄰舍隔牆拊掌容歌呼不學山王乘駟馬回頭空指黃公壚韓退之進學解冬暖而兒號寒年豐而妻啼饑按蘇叔黨作王元直墓表云初季父慶源官于雅州以論事不合取官長怒謝病去詩中云刺史怒即指此唐陽城傳為道州刺史當上考功第自署曰撫字心勞催科政拙考下下芋魁飯豆用漢翟方進傳語屢見杜牧之獨酌詩獨佩一壺游秋毫太山小慈姥巖青衣江皆在青神縣成都記蠶叢氏每春勸民農桑但鬻蠶具設之蠶市又詳一卷和子由蠶市詩注左傳襄十七年宋皇國父為平公築臺子罕請俟農功之畢築者謳曰澤門之晳實興我役邑中之黔實慰我心杜預曰子罕黑色而居邑中韓退之崔十六少府詩賃屋住連墻往來欣莫間隔墻聞歡呼衆口極鵝雁南史顔延年傳作五君詠以述竹林七賢山濤王戎以貴顯被黜世說王戎為尚書令著公服乘軺經黃公酒壚互詳本卷次韻許沖元送成都髙士敦鈐轄髙士敦字仲穆名將瓊之孫栘中老監本虛名懶作燕山萬里行公自注余昔與髙同使契丹辭免不行坐看飛鴻迎使莭歸來駿馬換傾城髙才本不緣勳閥餘力還思治蜀兵西望雪山烽火盡不妨樽酒寄平生漢蘇武傳以父任為郎稍遷至栘中廄監漢車千秋傳無閥閲功勞顔師古曰伐債功也杜子美哀嚴武詩公來雪山重公去雪山輕次前韻送程六表弟二十四卷有送表弟程六知楚州詩此詩送漕江西也君家兄弟真連璧門十朱輪家萬石竹使猶分刺史符尚方行賜尚書舄前年持莭發倉廪到處賣刀收繭栗歸來閉口不論功郤走渡江誰復惜君才不用如澗松我老得全如社櫟青衫莫厭百僚底白首上有千薪積憶昔江湖一釣舟無數雲山供㸃茟未應便障西風扇只恐先移北山檄慿君寄謝江南叟念我空見長安日浮江泝蜀有成言江水在此吾不食連璧用夏侯湛與潘嶽同輿事再見漢楊惲傳家方隆盛時乘朱輪者十人石奮傳奮及四子皆二千石號萬石君漢汲黯傳持莭發河內倉粟以濟貧民賣刀用漢龔遂賣刀買犢事禮記祭天地之牛角繭栗漢丙吉傳絶口不道前恩故朝廷莫能眀其功左思詠史詩鬱鬱澗底松離離山上苖以彼徑寸莖䕃此百尺條世胄躡髙位英俊沈下僚地勢使之然由來非一朝再見莊子人間世匠石之齊至于曲轅見櫟社樹其大蔽牛潔之百圍匠伯不顧曰是不材之木也無所可用故能若是之夀杜子美狄明府詩有才無命百僚底漢汲黯傳陛下用羣臣如積薪耳後來者居上障扇用王𨗳事北山孔稚圭文並再見後漢岑彭傳光武曰河水在此吾不食言和王晉卿題李伯時畫馬督郵有良馬不為君所竒顧收紙上影駿骨何由歸一朝見縈策蟻封驚肉飛豈惟馬不遇人已半生癡晉王湛傳兄子濟冇從馬絶難乘濟問湛曰叔頗好騎否湛曰亦好之因騎此馬姿容既妙回策如縈善騎者無以過又濟所乘馬甚愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試之與已馬等湛又曰此馬任重方知平路無以別也于是當蟻封內試之濟馬果躓而督郵馬如常湛初有識度兄弟宗族皆以為癡濟聞湛剖析元易微妙有竒趣歎曰家有名士三十年而不知濟之罪也武帝亦以湛為癡嘗調濟曰卿家癡叔死未至是對曰臣叔不癡因稱其美後漢莋都夷傳逺夷樂德歌云昌樂肉飛屈伸悉修送錢穆父出守越州二首錢穆父名協事見二十四卷次韻錢穆父詩穆父以龍圗閣待制權知開封府坐奏獄空不實出知越州時元祐三年九月也簿書常苦百憂集樽酒今應一笑開亰兆從教思廣漢會稽聊喜得方回漢趙廣漢傳為京兆尹亷明威制豪强小民得職百姓追思歌之至今晉郗愔傳字方回遷太常固讓不拜樂補逺郡出為㑹稽內史若耶溪水雲門寺賀監荷花空自開我恨今猶在泥滓勸君莫棹酒船回杜子美詩若耶溪雲門寺吾獨何為在泥滓李大白對酒憶賀監詩敕賜鏡湖水為君臺沼榮人亡餘故宅空有荷花生又重憶賀監詩稽山無賀老郤棹酒船回再見戲書李伯時畫御馬好頭赤山西戰馬饑無肉夜嚼長秸如嚼竹蹄間三丈是徐行不信天山有坑谷豈如廄馬好頭赤立仗歸來卧斜日莫教優孟卜葬地厚衣薪槱入銅歷戰國策秦馬之良探前趹後蹄間三尋騰者不可勝數再見史記滑稽傳楚莊王欲以大夫禮葬愛馬左右爭之不可優孟曰以大夫禮葬之薄請以人君禮葬之王曰寡人之過一至此乎為之奈何孟曰請為大王以壠竈為椁銅歷為棺齎以姜棗薦以木蘭祭以粳稻衣以火光葬之于人腹腸于是王使以馬屬大官詩大推薪之槱之送程七表弟知泗州程七表弟名之邵字懿叔江湖不在眼塵土坐滿顔繫舟清洛尾初見淮南山淮山相媚好曉鏡開烟鬟持此娛使君一笑簿領間使君如天馬朝燕暮荆蠻時無王良手空老十二間聊當出毫末化服狡與頑勿謂無人知古佛臨濤灣一作清灣赤子視萬類流萍閲人寰但使此可人餘事真茅菅王注泗州大聖塔臨泗水舟人往米與居人祈禱立應古佛清灣指此可人用桓溫傳經王敦墓語已見送曺輔赴閩漕曺輔字子方海陵人元豐間為鄜延路經略司勾當公事故有往來戎馬詩成橫槊之句後提㸃廣西刑獄先生在惠數有往來書帖元祐黨禍諸賢多在巡內子方周恤備至士論與之曺子本儒俠茟勢翻濤瀾往來戎馬間邉風裂儒冠詩成橫槊裏楯墨何曽乾一旦事逺逰紅塵隔巖灘平生羊炙口竝普浪反海搜鹹酸一從荔支飲一作食豈念苜蓿槃我亦江海人市朝非所安常恐青霞志坐隨白髮䦨淵眀賦歸去談笑便解官今我何為者索身良獨難慿君問清淮秋水今幾竿我舟何時發霜露日已寒舊唐書杜甫傳元稹曰建安之後曺氏父子鞍馬間為文往往橫槊賦詩北史荀濟潁川人與梁武帝為布衣交而負氣不服謂人曰㑹楯鼻上磨墨作檄文江文通恨賦鬱青霞之竒意入修夜之不暘白樂天詩不病何由索得身次韻王郎子立風雨有感王子立名適趙郡臨城人祖忠穆公鬷知樞密院父正路知濮州東坡守徐子立為州學生喜怒不見得喪若一曰是有類子由故以其子妻之後子由謫官同其有無講道著書元祐四年卒年三十五百年一俯仰寒暑相主客稍增裘褐氣已覺團扇厄不須計榮辱此喪彼有獲我琴終不敗無攫故無醳後生不自牧呻吟空挾策揠苗不待長賣菜苦求益此郎獨靜退門外無行迹但恐陶淵眀每為饑所迫淒風弄衣結小雪穿門席願君付一笑造物亦戲劇朝來賦雲夢筆落風雨疾為君裁春衫髙會開桂籍盧諶贈劉琨詩瞻彼日月迅過俯仰攫醳用史記鄒忌子語冉見莊子列御寇鄭人緩也呻吟裘氏之地秪三年而緩為儒又駢拇篇問臧奚事則挾䇿讀書皇甫謐髙士傳司徒侯霸遣子道奉書嚴光子道求報光口授之使者嫌少可更足之光曰賣菜乎求益也唐房𤣥齡傳髙孝基曰僕觀人多矣未見有如此郎者陶淵眀歸去來引余家貧耕植不足以自給兼稚子盈室瓶無儲粟家叔以余貧苦遂見用為邑少日眷然有歸歟之情何則饑凍雖切違巳交病荀子鶉衣百結如懸漢司馬相如賦楚有七澤其一曰雲夢再見杜子美寄李白詩筆落驚風雨詩成泣鬼神次韻黃魯直嘲小德小德魯直子其母微故其詩云解著潛夫論不妨無外家後漢王符傳符無外家隱居著書譏當時失得號潛夫論進饌客爭起小兒那可涯莫欺東方星三五自橫斜名駒已汗血老蚌空泥沙但使伯仁長還興絡秀家晉裴秀傳母賤嫡母宣氏不之禮嘗使進饌于客見者皆為之起秀母曰微賤如此當應為小兒故也毛詩小星惠及下也夫人無妒忌之行惠及賤妾進御于君知其命有貴賤能盡其心矣其詩曰嘒彼小星三五在東注云嘒微貌小星衆無名者三心五噣四時更見三輔決録孔融見韋元將與其父書曰不意眀珠生于老蚌蔡雍青衣賦金生沙礫珠出蚌泥歎此窈窕産於卑微列女傳周顗母李氏字絡秀嘗謂顗曰我屈莭為汝家妾門户計耳汝不與我家為親親者吾亦何惜餘年顗從命由是李氏遂得為方雅之族顗字伯仁書林次中所得李伯時歸去來陽關二圖後林次中名旦時為右司郎中伯時號龍眠居士不見何戡唱渭城舊人空數米嘉榮龍眠獨識殷勤處畫出陽關意外聲劉禹錫贈米嘉榮詩唱得陽關意外聲舊人惟數米嘉榮又歸亰聞何戡歌舊人惟有何戡在更與殷勤唱渭城嘉榮戡元和樂人也本事詩與盧氏雜說少異兩本新圖寶墨香樽前獨唱小秦王為君翻作歸來引不學陽關空斷腸曲譜小秦王入腔即陽關也按先生有歸去來引傳于世亦名哨遍送蹇道士歸廬山物之有知蓋恃息孰居無事使出入心無天游室不空六鑿相攘婦爭席法師逃人入廬山山中無人自往還往者一空還者失此身正在無還間綿綿不絶微風裏內外丹成一彈指人間俯仰三千秋騎鶴歸來與子游莊子外物篇物之有知者恃息其不殷非天之罪又天運篇孰居無事而推行是孰居無事淫樂而勸是孰居無事而披拂是又天游六鑿屢見又寓言篇其往也含者避席其反也舍者與之爭席矣無還出楞嚴經再見老子綿綿若存用之不勤按道家以烹鍊金石為外丹龍虎胎息吐故納新為內丹楞嚴經惟以空寂修于滅盡身心乃能度百千劫猶如彈指卧病逾月請郡不許復直玉堂十一月一日鎖院是日苦寒詔賜官燭法酒書呈同院微霰疏疏㸃玉堂詞頭夜下攬衣忙分光玉燭星辰爛拜賜宫壺雨露香醉眼有花書字大老人無睡漏聲長何時郤逐桑榆暖社酒寒燈樂未央謝惠連雪賦微霰集密雪下桑榆暖用薛令之事屢見送周朝議守漢州五代孟氏竊據蜀土國用褊狹始有𣙜茶之法藝祖平蜀罷去一切橫斂茶遂無禁熙寧初王安石吕惠卿相繼秉政邉事寖興以財用為急七年李杞以三司判官提舉成都等路茶事初立茶法一切禁止民間私買後一嵗杞以疾奉祠都官郎中劉佐繼杞為提舉而益病矣侍御史周尹言成都府路置埸𣙜買諸州茶盡以入官最為公私之害初李杞倡行敝法劉佐攘代其任無他方術惟割剝于下而人不聊生矣臣受命入蜀乃知為害甚巨有知彭州吕陶知蜀州吳司孟䒭奏可以參驗往者杞佐繼陳苛法即信用其言今議者條其刓蠧悉皆眀白未即采聼乞罷𣙜茶之法許通商買賣以安逺方尹還未至都坐是除提㸃湖北路刑獄元豐二年四月李稷言自𣙜茶法行至元年秋凡一年通計課利已支見在凡七十六萬緡上批稷能推原法意日就事功宜速遷擢以勸在位稷自蜀擢陕西轉運使助成伐夏之役督餉出境從給事中徐禧城永樂為夏人所圍遂與將士俱沒元祐初蘇子由在諌省及西棭極論之稍去其害詩云茶為西南病岷俗記二李者謂此也茶為西南病岷俗記二李公自注謂杞與稷也何人折其鋒矯矯六君子公自注謂思道與姪正儒張永徽吳醇翁吕元鈞宋文輔也君家尤出力流落初坐此謂當收桑榆華髮看劍履胡為犯雨雪嵗晚行未已念歸誠得計顧自為謀耳吾聞江漢間瘡痏有未起莫輕龔遂老君王付尺箠召還當有詔挽袖謝鄰里猶堪作水衡供張園林美後漢馮異傳異破赤睂光武賜璽書曰始雖垂翅回溪終能奮翼澠池可謂失之東隅收之桑榆漢龔遂傳宣帝即位久之渤海盜賊並起上選能治者丞相御史舉遂為太守時遂年七十餘召見形貌短小宣帝望不副所聞心內輕焉聞遂對云云甚說至渤海盜賊悉平數年上徵遂以年老不任公卿拜為水衡都尉水衡典上禁苑共張宫館為宗廟取牲官職親近上甚重之以官夀卒後漢鄧禹傳帝敕禹曰赤睂來東吾折箠笞之巳見韓退之送張道士詩豈無一尺箠為國笞羌夷木山并引吾先君子嘗蓄木山三峰且為之記與詩詩人梅二丈聖俞見而賦之今三十年矣而猶子千乘又得五峰益竒因次聖俞韻使並刻之其側附梅聖俞詩空山枯楠大蔽牛霹靂夜落魚鳧洲魚鳧水射幾千秋蠧肌爛髓沙蕩流惟存堅骨蛟龍鎪形侔三山中雄酋左右兩峰相挾翼尊奉君長無慢尤蘇夫子見之驚且喜買于溪叟憑貂裘因嗟大不為梁棟又歎殘不為薪槱雨侵蘚澀得石瘦宜與夫子歸隱邱木生不願回萬牛願終天年仆沙洲時來幸逢河伯秋掀然見怪推不流蓬婆雪嶺巧雕鎪蟄蟲行蟻為豪酋阿咸大膽忽持去河伯好事不汝尤城中古沼浸坤軸一林瘦竹吾菟裘二頃良田不難買三年榿木行可槱會將白髮對蒼巘魯人不厭東家丘杜子美古柏行大厦如傾要梁棟萬牛回首邱山重莊子人間世未終天年而中道夭于斤斧此材之患也杜軍城早秋詩巳收滴博雲間戌更奪蓬婆雪外城蓬婆雪嶺蜀所近吐蕃之山名行蟻音行列之行又南池詩安知有蒼池萬頃浸坤軸送千乘千能兩姪還鄉治生不求富讀書不求官譬如飲不醉陶然有餘歡君看龎德公白首終泥蟠豈無子孫念顧獨遺以安鹿門上冢回牀下拜龍鸞躬耕竟不起耆舊莭獨完念汝少多難氷雪落綺紈五子如一人奉飬真色難烹雞獨饋母自饗苜蓿槃口腹雖纍人寧我食無肝西來四千里敝袍不言寒秀眉似我兄亦復心間寬忽然捨我去嵗晚留餘酸我豈軒冕人青雲意先䦨汝歸蒔松菊環以青琅玕榿隂三年成可以挂吾冠清江入城郭小圃生微瀾相從結茅舍曝背談金鑾晉陶侃傳每飲酒有定限常歡有餘而限已滿後漢龎德公事屢見杜子美遣興詩昔者龎德公未嘗入州府襄陽耆舊間處士莭獨苦後漢郭太傳見陳留茅容異之遂與之言因請寓宿旦日容殺雞為饌太謂為已設既而以供其母自以草蔬與客同飯太起拜之曰賢哉因勸令學卒以成德後漢閔仲叔客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞敕吏常給焉仲叔知乃歎曰閔仲叔豈以口腹纍安邑耶遂去沛三國志蜀秦宓答王商書云僕得曝背乎隴畝之中誦顔氏之簞瓢詠原憲之蓬户翰林志翰林院與金鑾殿相接故學士號金鑾送周正孺知東川周正孺名尹任御史坐言茶事外補事見本卷送周朝議詩注後吕微仲丞相典領録見正孺為御史日所言事歎曰君子哉斯人也因言于上除直祕閣在東川人安其政願復借留詔許之得郡書生榮還家昔人重而况東西川千騎許上冢里門下車入父老且驚聳端知何武賢不事長卿寵清時飬材傑杞梓方培擁未應遺合抱取用及把拱如君尚出麾顧我宜耕壟告歸謝先手求去悔不勇豈云慕亷退實自知衰冗為君掃棠隂畫像或相踵公自注蜀中太守無不畫像者韓退之贈崔復州序大丈夫官至刺史亦榮矣後漢岑彭傳南還津鄉有詔過家上冢漢石奮傳少子內史慶醉歸入外門不下車萬石君聞之不食慶肉袒謝請罪萬石君曰內史貴人入閭里中長老皆走匿而內史坐車中自如固當乃謝罷慶後慶及諸子入里門趨至家漢何武傳蜀郡郫縣人也弟顯家冇市籍租常不入縣課嗇夫求商捕辱顯家武曰以吾家租賦繇役不為衆先奉公吏不亦宜乎卒白太守召商為吏州里皆服焉長卿寵已見前卷次韻王定國倅揚州詩注左傳襄二十六年如杞梓皮革自楚往也雖楚有材晉實用之韓退之送張道士詩况當營都邑杞梓用不疑顔延年五君詠屢薦不入官一麾乃出守題李伯時畫趙景仁琴鶴圖二首趙景仁名㞦清獻公之子已見十五卷詩注清獻先生無一錢故應琴鶴是家傳誰知默鼓無絃曲時向珠宫舞幻仙公撰清獻趙公神道碑云自成郡召還上謂公聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦稱是耶鮑眀逺舞鶴賦偉胎化之仙禽黃庭經間居蕊珠作七言琴心三疊舞胎仙冉見醜石寒松未易親聊將短曲調長人乘軒故自非眀眼終日僛僛舞㸑新毛詩屢舞僛僛後漢蔡雍傳吳人有燒桐以㸑者雍聞火烈之聲知其良木因請裁為琴果有美音而其尾猶焦故時人名曰焦尾琴次前韻再送周正孺東川得望郎坐與西爭重髙風傾石室舊學鄙文冢公自注劉蛻文冢銘在梓州蜀人安使君所至野不聳竹馬迎細侯大錢送劉寵遙知句溪路老稚相扶擁看畫古叢祠百怪朝幽拱牛頭與兜率雲木蔚堆壟醉鄉追舊游筆陳賈餘勇聊將詩酒樂一掃簿書冗西風吹好句珠玉本無踵李義山詩望郎臨古郡華陽國志文翁在蜀立講堂作石室唐劉蛻文冡銘序云文冢者長沙劉蛻復愚為文不忍棄其草聚而封之也竹馬後漢郭伋事伋字細侯已見後漢劉寵傳為㑹稽太守徵為將作大匠山隂五六老叟齎百錢以送寵為人選一大錢受之牛頭兜率梓州二寺老杜皆有詩王績醉鄉記昔黃帝氏嘗獲逰其都阮嗣宗陶淵眀十數人並遊於醉鄉沒身不返杜子美醉歌行筆陳獨掃千人軍左傳成二年欲勇者賈余餘勇㑹稽典録孔融與曺公書云珠玉無脛而自至者以人好之也况賢者之有足乎再見韓詩外傳蓋胥謂平公曰珠出于海玉出于山無足而至者君好之也士有足而不至者君不好也書王定國所藏煙江疊嶂圗公自注王晉卿畫江上愁心千疊山浮空積翠如雲煙山耶雲耶逺莫知煙空雲散山依然但見兩崖蒼蒼暗絶谷中有百道飛來泉縈林絡石隱復見下赴谷口為奔川川平山開林麓斷小橋野店依山前行人稍度喬木外漁舟一葉江吞天使君何從得此本㸃綴毫末分清妍不知人間何處有此境徑欲往買二頃田君不見武昌樊口幽絶處東坡先生留五年春風搖江天漠漠暮雲卷雨山娟姢丹楓翻鴉伴水宿長松落雪驚醉眠桃花流水在人世武陵豈必皆神仙江山清空我塵土雖有去路尋無緣還君此畫三歎息山中故人應有招我歸來萹唐張說江上愁心賦江上之峻山兮鬱﨑嶬而不極雲為風兮煙為色歘變態兮心不識陶峴詩鴉翻楓葉夕陽動鷺立蘆花秋水眀杜子美詩水宿鳥相呼又禽經云凡禽林曰棲水曰宿韓退之桃花源圖歌神仙有無何渺茫桃源之說誠荒唐世俗那知僞與真至今傳者武陵人陶淵眀桃源記武陵人既出詣太守說如此太守即遣人隨往尋遂迷不復得路次韻王定國會飲清虛堂王定國名鞏常通守揚州何遜揚州又幾年官梅詩興故依然何人可復間季孟與子不妨中聖賢卜築君方淮上郡歸心我已劍南川此身正似蠶將老更盡春光一再眠杜子美詩東閣官梅動詩興還如何遜在揚州按何遜揚州事史傳不載載蜀本杜注已見晉王湛傳武帝問王濟曰湛誰比濟曰山濤以下魏舒以上湛聞笑曰欲處我以季孟之間乎三國魏徐邈傳醉客以清酒為聖人濁酒為賢人再見九域志成都府劍南西川節度李太白寄二稚子詩吳地桑葉落吳蠶巳三眠興龍節侍宴前一日微雪與子由同訪王定國小飲清虛堂定國出數詩皆佳而五言尤竒子由又言昔與孫巨源同王定國感念存沒悲歎久之夜歸稍醒各賦一萹眀日朝中以示定國也天風淅淅飛玉沙詔恩歸沐休早衙遙知清虛堂裏雪正似薝蔔林中花出門自笑無所詣呼酒持勸惟君家踏冰凌兢戰疲馬扣門剝啄驚寒鴉羡君五字入詩律欲與六出爭天葩頭風已倩檄手愈背癢郤得仙爪爬銀瓶㵼油浮蟻酒紫碗鋪粟盤龍茶幀巾起作鸜鵒舞疊鼓誰摻漁陽撾九衢燈火雜夢寐十年聚散空咨嗟眀朝握手殿門外共看銀闕暾朝霞韓詩外傳凡草木花多五出雪花獨六出酉陽雜俎梔子花六出相傳即西域薝蔔花也韓退之出門詩長安百萬家出門無所之又詩今日到君家呼酒持勸君揚雄甘泉賦馳閣闔而入凌兢注云寒凉戰栗之處三國魏王粲傳陳琳嘗草檄呈太祖太祖先苦頭風讀之翕然而起曰此愈我病神仙傳麻姑手似鳥爪蔡經心念背癢時此爪爬大佳王方平知之即鞭之曰麻姑神人汝何忽謂其爪可爬背乎杜牧讀韓杜集詩杜詩韓筆愁來讀似倩麻姑癢處爬曺植七略雕觴浮蟻釋名酒有泛齊浮蟻在上泛泛然晉謝尚傳王𨗳有勝㑹謂尚曰聞能作鸜鵒舞一座傾想寧有此理不尚曰佳便著衣幘而舞導令坐者撫掌擊莭尚俯仰在中旁若無人後漢禰衡傳曺操聞衡善擊鼓召為鼓吏因大㑹賓客衡為漁陽摻撾蹀𨄌而前容態有異聲莭悲壯聼者莫不慷慨史記日者傳宋忠見賈誼于殿門外乃相引屛語史記封禪書三神山金銀為宫闕楚辭九歌暾將出兮東方竝已見王晉卿所藏著色山二首縹眇營邱水墨仙浮空出沒有無間爾來一變風流盡誰見將軍著色山畫録李成營邱人也工山水世號李營邱名畫記李思訓父子畫稱一時思訓官至左武衛大將軍世言山水者稱大李將軍小李將軍犖確何人似退之意行無路欲從誰宿雲解駮晨光漏獨見山紅澗碧時韓愈南海神廟碑雲隂解駮日光穿漏又韓詩山石犖確行徑微黃昏到寺蝙蝠飛又山紅澗碧紛爛熳時見松櫪皆十圍次韻黃魯直效進士作歲寒知松柏詩龍蟄雖髙卧雞鳴不廢時炎凉徒自變茂恱兩相知巳負棟梁質肻為兒女姿那憂霜貿貿未喜日遲遲難與夏蟲語永無秋實悲誰知此植物亦解秉天彛陸士衡歎逝賦信松茂而柏恱嗟芝焚而蕙歎韓退之琴操雪霜貿貿薺麥之茂莊子秋水萹夏蟲不可以語于冰者篤于時也三國魏邢顒傳採庶子之春華忘家丞之秋實吳諸葛恪傳注虞喜志林曰樂春藻之繁華忘秋實之甘口周禮大司徒以土會之法辨五地之物生一曰山林其動物宜毛物其植物宜皂物王晉卿作煙江疊嶂圖僕賦詩十四韻晉卿和之語特竒麗因復次韻不獨紀其詩畫之美亦為道其出處契濶之故而終之以不忘在莒之戒亦朋友忠愛之義也山中舉頭望日邉長安不見空雲煙歸來長安望山上時移事改應澘然管絃去盡賓客散惟有馬埒編金泉渥窪故自千里足要飽風雪輕山川屈居華屋啖棗脯十年俯仰龍旗前郤因瘦病出竒骨鹽車之厄寧非天風流文采磨不盡水墨自與詩爭妍畫山何必山中人田歌自古非知田鄭䖍三絶君有二筆勢挽回三百年欲將巖谷亂窈窕睂峰修嫮誇連娟人間何有春一夢此身將老蠶三眠山中幽絶不可久要作平地家居仙能令水石長在眼非君好我當誰緣願君終不忘在莒樂時更賦囚山萹公自注栁子厚有囚山賦李太白登鳳凰臺詩總為浮雲能蔽日長安不見使人愁晉王濟傳性豪侈洛亰地貴濟買地為馬埒編錢滿之時謂為金埒史記滑稽傳楚莊王有愛馬衣以文繡置之華屋之下席以露牀啖以棗脯杜子美丹青引英雄割據雖已矣文采風流今尚存唐鄭䖍傳嘗自寫其詩畫以獻元宗大署其尾曰鄭䖍三絶漢外戚傳孝武李夫人卒上作賦以傷悼曰美連娟以修嫮兮劉向新序齊桓公與管仲飲管仲上夀曰願君無忘出奔于莒也臣亦無忘縳束于魯也柳子厚囚山賦聖日以理兮賢日以進誰使山之囚吾兮滔滔夜直玉堂擕李之儀端叔詩百餘首讀至夜半書其後玉堂清冷不成眠伴直難呼孟浩然暫借好詩消永夜每逢佳處輒參禪愁侵硯滴初含凍喜入燈花欲鬪姸寄語君家小兒子他時此句一時編西京雜記漢廣川王去疾好發冢晉靈公冢得玉蟾蜍一枚大如拳腹空容五合水王取以盛硯滴白樂天劉白唱和集叙命小姪龜兒編録成兩卷仍寫二本一付夢得小兒崙郎各令收藏兩家集范景仁和賜酒燭詩復次韻謝之公自注時公方進新樂笙磬分均上下堂游魚舞獸自奔忙朱絃初識孤桐韻公自注舊樂金石聲髙而絲聲微今樂金石與絲聲皆著玉琯猶聞秬黍香公自注舊法以尺生律今以黍定律以律生尺萬事今方資伯始一斑我亦愧真長此生㑹見三雍就無復遼遼歎未央尚書疏堂上之樂皆受笙均堂下之樂皆受磬均荀子瓠巴鼓瑟遊魚出聼列子瓠巴鼓琴而鳥舞魚躍尚書擊石拊石百獸率舞杜子美石犀行冉平水土犀奔忙續仙傳王母獻白玉琯云吹之以和天風尚書大傳亦云漢律厯志度者本起黃鍾之長以子榖秬黍中者後漢胡廣傳字伯始達練事體眀解朝章亰師諺曰萬事不理問伯始再見晉王獻之傳觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹時見一斑獻之怒曰逺慙荀奉倩近愧劉真長拂衣而去漢河間獻王傳武帝時獻雅樂召對三雍宫後漢儒林傳建武五年修起太學中元元年初建三雍眀帝即位親行其禮後漢梁鴻作五噫之歌曰遼遼未央兮噫再見次韻劉貢父春日賜幡勝寬詔隨春出內朝三軍喜氣挾狐貂鏤銀錯落翻斜月剪綵繽紛舞慶霄臘雪强飛才到地曉風偷轉不驚條脫冠徑醉應歸卧便腹從人笑老韶公自注前一日微雪是日幕次賜酒後漢侯霸傳每春下寬大之詔奉因時之令皆霸所建也續漢禮儀志立春之日下寬大詔書左傳宣公十二年楚子伐蕭蕭潰申公巫臣曰師人多寒王巡三軍拊勉之三軍之士皆如挾纊托言短李鎮揚州請章季標賦雪詩云朱門到晚難盈尺盡是三軍喜氣消荆楚歲時紀人日家家剪綵或鏤金箔為人謝宣逺詩慶霄薄汾陽杜子美雪詩南雪不到地鹽鐵論周公之時風不鳴條雨不破塊便腹後漢邉韶事屢見再和與君流落偶還朝渦眼紛綸七葉貂莫笑華顛飄彩勝幾人黃壤隔青霄行吟未許窮騷雅坐嘯猶䏻出教條記取眀年江上郡五更春枕夢春韶左思詠史詩金張藉舊業七葉珥漢貂漢金日磾傳七葉內侍何其盛也劉向新序齊宣王謂閭邱卭曰士亦華髮墮顛而後可用耳坐嘯後漢成瑨事再見漢黃霸傳然後為條教置父老師帥伍長班行之于民間梁元帝纂要春景曰媚景韶景葉公秉王仲至見和次韻答之葉公秉名均時為祕書監王仲至名欽臣為祕書少監袗絺方暑亦堪朝嵗晚淒風憶皂貂共喜鵷鸞歸禁籞心知日月在重霄君如老驥初遭絡我似枯桑不受條强鑷霜須簪綵勝蒼顔得酒尚能韶漢宣帝紀池籞假與貧民蘇林曰折竹以繩綿連禁籞使人不得往來律名曰籞應劭曰籞禁苑也詩國風蠶月條桑鄭氏云條桑枝落之采其葉也再和衰遲何幸得同朝溫徑如君合珥貂誰惜異材䝉徑寸自慙枯枿借凌霄光風泛泛初浮水紅糝離離欲綴條後日一樽何處共奉常端冕作咸韶後漢輿服志侍中中常侍武冠加黃金璫附蟬為文貂尾為飾注應劭曰說者以金取堅剛百錬不耗蟬居髙飲潔口在腋下貂內徑悍而外溫潤此因物生義也徑寸用左太沖詠史詩詳見本卷柳宗元與蕭俯書枯枿腐敗不能生植楚辭招魂光風轉蕙泛崇蘭些韓退之詩始見洛陽春桃枝綴紅糝漢百官表奉常秦官掌宗廟禮儀景帝中六年更名太常屬官有大樂等六令禮記樂記端冕而聼古樂樂緯黃帝樂曰咸池舜曰簫韶施注蘇詩卷二十七
