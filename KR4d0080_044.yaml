body:
  text: 施注蘇詩卷三十宋蘇軾撰施元之原注武進邵長蘅刪補詩五十七首起守杭州洎元祐辛未召還尋出守潁州作棕筍並引棕筍狀如魚剖之得魚子味如苦筍而加甘芳蜀人以饌佛僧甚貴之而南方不知也筍生膚毳中蓋花之方孕者正二月間可剝取過此苦澀不可食矣取之無害於木而宜於飲食法當蒸熟所施略與筍同蜜煮酢浸可致千里外今以餉殊長老贈君木魚三百尾中有鵝黃子魚子夜叉剖癭欲分甘籜龍藏頭敢言美願隨蔬果得自用勿使山林空老死問君何事食木魚烹不能鳴固其理托言王璘詩芍藥花開菩薩面棕櫚葉散夜叉頭晉王羲之傳有一味之甘剖而分之莊子山木篇夫子出於山舍故人之家故人喜命豎子殺鴈而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者次韻曹子方龍山真覺院瑞香花曹子方名輔已見二十七卷幽香結淺紫來自孤雲岑骨香不自知色淺意殊深移栽青蓮宇遂冠薝蔔林紉為楚臣佩散落天女襟君持風霜節耳冷歌笑音一逄蘭蕙質稍回鐵石心置酒要姸暖飬花須晏隂及此隂晴間恐致慳嗇霖彩雲知易散鷤鵙憂先吟明朝便陳迹試著丹青臨阿彌陀經舍利弗極樂國池中蓮華大如車輪青色青光李太白東林詩我尋青蓮宇獨往謝城闕維摩經如入薝蔔林惟嗅薝蔔不嗅餘香唐釋仲休花品每至牡丹開月多有輕雲微雨謂之飬花天文酒清話俗有慳值風嗇值雨之説詳已見揚雄反離騷徒恐鷤鵙之將鳴兮顧先百草為不芳次韻曹子方運判雪中同遊西湖詞源灧灧波頭展清唱一聲巖谷滿未容雪積句先高豈獨湖開心自逺雲山已作歌眉淺山下碧流清似眼尊前侑酒只新詩何異書魚餐蠧簡次韻仲殊雪中遊西湖二首夜半幽夢覺稍聞竹葦聲起續凍折絃為鼓一再行曲終天自明玉樓已崢嶸有懷二三子落筆先飛霙共為竹林會身與孤鴻輕秀語出寒餓身窮詩乃亨禪老復何為笑指孤煙生我獨念粲者誰與豫目成杜荀鶴詩夜深知雪重卧聞折竹聲賈島朝飢詩坐聞西牀琴凍折兩三絃詩國風見此粲者楚辭九歌滿堂兮美人忽獨與余兮目成寶雲樓閣鬧千門林靜初無一鳥喧閉户莫教風掃地卷簾疑有月臨軒水光瀲灧猶浮碧山色空濛巳斂昏乞得湯休奇絶句始知鹽雪是陳言寶雲寺名南史宋徐湛之傳廣陵有沙門釋惠休善屬文湛之與之厚世祖特令還俗姓湯位至揚州從事史次韻參寥同前朝來處處白氈鋪樓閣山川盡一如總是爛銀並白玉不知奇貨有誰居史記吕不韋傳子楚不得意不韋賈邯鄲見而憐之曰此奇貨可居送小本禪師赴法雲寓形天宇間出處會有役淡然都無營百年何由畢山林等憂患軒冕亦戲劇我來即歸休師寧要安逸王城滿豪傑議論紛黑白聖諦第一義對面誰不識師來亦何事孤月挂空碧是身如浮雲安得限南北出岫本無心既雨歸亦得珠泉有舊約何年挂瓶錫傳燈録梁武帝問逹磨如何是聖諦第一義又問對朕者誰答云不識互見上卷葉教授和溽字韻詩注挂錫注巳見書渾令公燕魚朝恩圖咸寧英氣似汾陽夜飲軍容出紅糚不須纒頭萬匹錦知君未辦作呂強唐書渾瑊繇樓煩郡王徙咸寧郭子儀封汾陽郡王唐魚朝恩傳朝恩為天下觀軍容宣慰處置使大唐故事稽疑代宗詔王縉等就郭子儀為軟腳局朝恩以錦綵數萬與伎人纒頭後漢吕強傳為中常侍清忠奉公黃巾賊起帝問所宜施行強請先赦黨人次韻劉景文西湖席上二老長身屹兩峰常撞大呂應黃鍾將辭鄴下劉公幹郤見雲間陸士龍白髮憐君略相似青山許我定相從吾今官巳六百石慙愧當年邴曼容周禮大師掌六律六同以合陰陽之聲陽聲黃鍾隂聲大吕三國魏王粲傳始文帝為五官將及平原侯植好文學東平劉楨字公幹並見友善時在鄴宫晉陸雲傳與荀隱素未相識常會張華坐華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隱曰日下荀鳴鶴雲字士龍隱字鳴鶴漢兩龔傳琅邪邴漢以清行徵用王莽秉政遂歸老於鄉里兄子曼容亦以飬志自修為官不肯過六百石輒自免去其名過出於漢次韻答馬忠玉坡陀巨麓起連峰積纍當年慶自鍾靈運子孫俱得鳳慈明兄弟孰非龍河梁會作看雲别詩社何妨載酒從祗有西湖似西子故應宛轉為君容南史謝靈運子鳳鳳子超宗好學有文辭帝謂殊有鳳毛見本傳後漢苟爽傳字慈明潁川為之語曰荀氏八龍慈明無雙李陵與蘇武别詩攜手上河梁遊子暮何之又曰仰視浮雲馳奄忽互相踰長當從此别且復立斯須又杜詩别時孤雲今不飛時復看雲淚橫臆豫去杭十六年而復來留二年而去平生自覺出處老少粗似樂天雖才名相逺而安分寡求亦庶幾焉三月六日來别南北山諸道人而下天竺惠淨師以醜石贈行作三絶句當年衫鬢兩青青強説重臨慰别情衰髮祗今無可白故應相對話來生出處依稀似樂天敢將衰朽較前賢便從洛社休官去猶有間居二十年白樂天醉吟先生傳宦遊三十載將老退居洛下尋水望山如此者凡十年豫時年六十有七墓志云終於東都履道私第春秋七十有五在郡依前六百日山中不記幾回來還將天竺一峰去欲把雲根到處栽次韻答黃安中兼簡林子中老去心灰不復然一麾江海意方堅那堪黃散付子度空羡蘇杭飬樂天病肺一春難白酒别腸三夜繞朱絃羣仙政欲吾歸去共把清風借玉川漢韓安國傳坐法抵罪獄吏田甲辱安國安國曰死灰不復然乎甲曰然則溺之杜牧之赴吳興詩乞得一麾江海去樂遊原上望昭陵南史蔡廓傳字子度為吏部尚書問中書令傅亮曰選事若悉以見付不論不然不能拜也云云詳已見前又蔡凝傳宣帝欲用錢肅為黃門侍郎凝曰黃散之職故須人門兼美白樂天吳郡詩石記貞元初韋應物為蘇州牧房孺復為杭州牧韋嗜詩房嗜酒豫旅二郡以當時心言異日蘇杭苟獲一郡足矣今以中書舍人聞領二州之風景韋房之詩酒兼有之矣又詩去年脫杭印今日佩蘇印玉川清風用盧同句注再見留别蹇道士拱辰黑月在濁水何曾不清明寸田滿荆棘梨棗無從生何時反吾真歲月今崢嶸屢接方外士早知俗緣輕庚桑託雞鵠未肯化南榮晚識此道師似有宿世情笑指北山雲訶我不歸耕仙人漢隂馬微服方地行楞嚴經明還日輪暗還黑月佛書西土於一月中三十日內分前十五日為白月後十五日為黑月按今沙門戒牒中第一念亦云莊子庚桑楚篇庚桑子謂南榮趎曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣今吾才小不足以化子子胡不南見老子神仙傳隂長生新野人後漢隂皇后之屬籍少居富貴不好榮利知馬明生得度世之術乃執御者之禮事之十餘年不懈明生曰子真得道矣乃授以丹經教之合丹二仙既合丹成不樂升天但服半劑為地仙故言地行也次韻子由書王晉卿畫山水老去君空見畫夢中我亦曾遊桃花縱落誰見水到人間伏流杜子美觀山水圖詩人間長見畫老去恨空聞又蕭駙馬山亭詩伏流何處入亂石閉門高山人昔與雲俱出俗駕今隨水不回賴我胸中有佳處一樽時對畫圖開陶淵明歸去來辭雲無心而出岫孔德璋北山移文請回俗士駕為吾謝逋客又書王晉卿畫四首山隂陳迹當年不識此清真強把先生擬季倫等是人間一陳迹聚蚊金谷本何人李白王右軍詩右軍本清真蕭灑在風塵晉王羲之傳人以蘭亭敘方石崇金谷集敘崇字季倫韓退之贈張祕書詩雖得一餉樂有如聚飛蚊再見雪溪乘興溪山雪月兩佳哉賔主談鋒夜轉雷猶言不見戴安道為問適從何處來晉戴逵字安道訪戴用王徽之事再見唐武儒衡傳元稹倚宦官知制誥儒衡鄙之會食瓜蠅集其上儒衡揮以扇曰適從何處來遽集於此四明狂客毫端偶集一微塵何處溪山非此身狂客思歸便歸去更求敕賜枉天真韓退之雜詩下視寓九州一塵集毫端再見唐賀知章自號四明狂客天寶初請為道士還鄉詔許之又詔賜鏡湖剡溪一曲注再見西塞風雨斜風細雨到來時我本無家何處歸仰看雲天真箬笠旋收江海入蓑衣續仙傳張志和漁父詞云西塞山邊白鳥飛桃花流水鱖魚肥青箬笠緑蓑衣斜風細雨不須歸再見破琴詩并引舊説房琯開元中嘗宰盧氏與道士邢和璞出遊過夏口村入廢佛寺坐古松下和璞使人鑿地得甕中所藏婁師德與永禪師書笑謂琯曰頗憶此邪琯因悵然悟前生之為永師也房琯事出鄭處誨明皇雜録見高道傳故人柳子玉寶此畫云是唐本宋復古所臨者元祐六年三月十九日豫自杭州還朝宿吳淞江夢長老仲殊挾琴過余彈之有異聲就視琴頗損而有十三絃豫方嘆息不巳殊曰雖損尚可修曰奈十三絃何殊不答誦詩云度數形名本偶然破琴今有十三絃此生若遇邢和璞方信秦箏是響泉豫夢中了然識其所謂既覺而忘之明日晝寢復夢殊來理前語再誦其詩方驚覺而殊適至意其非夢也問之殊蓋不知是歲六月見子玉之子子文京師求得其畫乃作詩並書所夢其上子玉名瑾善作詩及行草書復古名迪畫山川草木蓋妙絶一時仲殊本書生棄家學佛通脫無所著皆奇士也破琴雖未修中有琴意足誰云十三絃音節如佩玉新琴空高張絃聲不附木宛然七絃箏動與世好逐陋矣房次律因循墮流俗懸知董庭蘭不識無絃曲舊唐書房琯傳為宰相無匪懈之意但與劉秩等高談虛論此外則聽董庭蘭彈琴庭蘭自是大招納貨賄琯字次律晉陶潛曰但識琴中趣何勞絃上聲再見題王晉卿畫後醜石半蹲山下虎長松倒卧水中龍試君眼力看多少數到雲峰第幾重贈武道士彈賀若清風終日自開簾涼月今宵肯挂簷琴裏若能知賀若詩中定合愛陶潛續湘山野録太宗皇帝作九絃琴七絃阮酷愛宮調中小調子乃隋賀若弼所撰其一最優古而亡其名琴家祗命曰賀若元祐六年六月自杭州召還汶公館我於東堂閲舊詩卷次諸公韻三首半熟黃粱日未斜玉堂隂合手栽花卻尋一作思三十年前味未飯鐘時巳飯一作飲茶夢覺還驚屧響廊故人來炷影前香鬢須白盡成何事一帖空存老遂良法帖褚遂良云即日遂良鬚髮盡白尺一東來喚我歸衰年巳迫故山期文章曹植今堪笑卻卷波瀾入小詩漢胸奴傳漢遺單于書以尺一牘後漢陽球傳徙衛尉敕尚書令召拜不得稽留尺一按尺一版謂詔䇿也見漢官儀杜酬高蜀州詩文章曹植波瀾濶再見次韻子由書王晉卿畫山水一首而晉卿和二首誤點故教同子敬雜篇真欲擬湯休壠雲寄我山中信雪月追君溪上舟會看飛仙虎頭篋郤來顛倒拾遺裘王孫辦作元真子細雨斜風不濕鷗晉王獻之傳字子敬桓溫使書扇筆誤落因畫作烏駮牸牛甚妙南史湯休注見本卷又江淹作雜擬三十首有擬湯休上人詩云西北秋風至楚客思悠哉日暮碧雲合佳人殊未來本事詩梁高祖問陶𢎞景山中何所有陶為詩曰山中何所有嶺上多白雲只可自怡悅不堪持寄君名畫記顧愷之小字虎頭飛仙用桓玄發厨竊畫事詳見草六卷次韻米黻詩注杜子美北征詩天吳及紫鳳顛倒在短褐子美以至德二年拜左拾遺見本傳續仙傳張志和號玄真子注屢見此境眼前聊妄想幾人林下是真休我今心似一潭月君已身如萬斛舟看畫題詩雙鶴鬢歸田送老一羊裘明年兼與士龍去萬頃蒼波沒兩鷗圓覺經展轉妄想無有是處寒山詩吾心似秋月碧潭清皎潔杜夔州絶句萬斛之舟行若風北史房法夀傳得一羊裘欣然自足晝則樵蘇夜誦經史晉陸雲字士龍士衡弟詩以况子由也杜贈韋左丞詩白鷗沒浩蕩萬里誰能馴感舊詩並引嘉祐中豫與子由同舉制䇿寓居懷逺驛時年二十六而子由二十三耳一日秋風起雨作中夜翛然始有感慨離合之意自爾宦遊四方不相見者十嘗七八每夏秋之交風雨作木落草衰悽然有此感蓋三十年矣元豐中謫居黃岡而子由亦貶筠州嘗作詩以記其事元祐六年豫自杭州召還寓居子由東府數月復出領汝隂時豫年五十六矣乃作詩留别子由而去牀頭枕馳道雙闕夜未央車轂鳴枕中客夢安得長新秋入梧葉風雨驚洞房獨行殘月影悵焉感初涼筮仕記懷逺謫居念黃岡一住三十年此懷未始忘扣門呼阿同安寢已太康青山映華髮歸計三月糧我欲自汝陰徑上潼江章想見氷槃中石蜜與柿霜公自注豫欲請東川而歸二物皆東川所出憐子遇明主憂患已再嘗報國何時畢我心久已降江淹擬古詩雙闕指馳道朱宮羅第宅詩小雅夜如何其夜未央按東府在馳道旁故云枕馳道也阿同子由一字同叔唐地里志潁州汝隂郡梓州梓潼郡西湖秋涸東池魚窘甚因會客呼網師遷之西池為一笑之樂夜歸被酒不能寐戲作放魚一首東池浮萍半黏塊裂碧跳青出魚背西池秋水尚涵空舞闊搖深吹荇帶吾僚有意為遷居老守縱饞那忍膾縱橫爭看銀刀出瀺灂初驚玉花碎但愁數罟損鱗鬛未信長堤隔濤瀨濊濊發發須臾間圉圉洋洋尋丈外安知中無蛟龍種尚恐或有風雲會明年春水漲西湖好去相忘渺淮海杜子美詩水荇牽風翠帶長韓退之詩出網銀刀亂上林賦臨坻注壑瀺灂霣墜字林曰瀺灂小水聲也又潘嶽間居賦遊鱗瀺灂數罟用孟子字詩國風施罛濊濊鱣鮪發發鄭氏注罛魚罟濊濊施之水中發發盛貌孟子趙氏注圉圉魚在水羸劣之貌洋洋舒緩搖尾之貌北户雜録陶朱公飬魚經云魚至三百六十頭則有蛟龍長之因風雨則飛去三國周瑜曰蛟龍得雲雨終非池中物莊子大宗師魚相忘於江湖人相忘於道術復次放魚韻答趙承議陳教授趙景貺陳履常擾擾萬生同一塊搶榆不羡培風背青丘已吞雲夢芥黃河復繚天門帶長譏韓子隘且陋一飽鯨魚何足膾東坡也是可憐人披抉泥沙收細碎逝將歸修一作休八節灘又欲往釣七里瀨正似此魚逃網中未與造物遊數外且將新句調二子湖上秋高風月會為君更喚木腸兒腳扣兩舷歌小海莊子逍遙逰九萬里則風斯在下矣而後乃今培風背負青天而莫之天閼者而後乃今將圖南蜩與鸒鳩笑之曰我決起而飛搶榆枋時則不至而控於地而巳矣奚以九萬里而南為漢功臣年表封爵之誓曰使黃河如帶泰山若厲泰山記山頂有大天門小天門黃河去嶽三百餘里日觀望之如帶韓退之贈劉師服詩巨緡東釣儻可期與子共飽鯨魚膾白樂天開八節灘詩序云東都龍門潭之南有八節灘顧野王輿地志七里灘在東陽江下與嚴陵瀨相接晉夏統傳賈充謂統曰頗能作鄉土間曲乎統曰國人痛伍子胥忠烈為小海唱於是以足扣船引聲喉轉充使伎女之徒盛服金翠繞其船三匝統危坐若無所聞充曰此吳兒木腸石心也韓退之荷花詩腳敲兩舷叫吳歌九月十五日觀月聽琴西湖示坐客白露下衆草碧空卷微雲孤光為誰來似為我與君水天浮四坐河漢落酒樽使我氷雪腸不受麴糵醺尚恨琴有絃出魚亂湖紋哀彈奏舊曲妙耳非昔聞良時失俯仰此見寧朝昏懸知一生中道眼無由渾宋玉九辨白露既下百草兮奄離披此梧楸韓退之秋懷詩白露下百草蕭蘭共憔悴荀子瓠巴鼓瑟遊魚出聽復次韻謝趙景貺陳履常見和兼簡歐陽叔弼兄弟趙景貺名令畤神宗初以承議郎簽書判官在東坡潁川幕府公謂其吏事通敏文采俊麗志節端亮議論英發時教授陳履常公門人相與倡酬既力薦於朝又為著説改字德麟公由潁徙揚自揚召入再上疏薦之遂除光祿丞紹興間封安定郡王履常名師道家彭城少而好學苦志年十六以文謁曾子固知其必以文高世通於詩經尤邃詩禮為文精深雅奧喜作詩小不中意輒焚去存者財十一熙寧中王氏之學盛行履常心非其説遂絶意進取元祐初公與傅欽之堯俞孫莘老覺薦其文行起家為徐州教授公守杭履常以知已之義求郡檄送行守不聽以疾謁告别於南京詩云豈不畏簡書放麑誠不忍後除太學博士言者用是論之改教授潁州復相從於此家素窮或經日不炊淡如也召為祕書省正字卒歐陽叔弼名棐季默名辨皆文忠子此詩云或勸莫作詩兒輩工織紋當元豐間公坐詩遷謫至是賈易趙君錫又以揚州詩有山寺歸來聞好語之句為聞神宗上仙之報而作宣仁力為辨明君錫輩徙官而公亦丐潁以去此聯意實在此是家有甘井汲多終不渾則以文忠公家而發也能詩李長吉識字楊子雲端能望此府坐嘯獲兩君逝將江湖去浮我五石樽眷焉復少留尚為世所醺或勸莫作詩兒輩工織紋朱絃寄三嘆未害俗耳聞共尋兩歐陽伐薪照黃昏是家有甘井汲多終不渾唐李賀傳字長吉七歲能辭章韓愈使賦詩援筆輒就漢楊雄傳字子雲劉棻嘗從雄學作竒字杜子美醉時歌子雲識字終投閣舊唐書韋思謙傳屈公數旬以望此府再見莊子逍遙遊子有五石之瓠何不慮以為大樽而浮乎江湖杜宿贊公土室詩明燃林中薪暗汲古底井又示從孫濟詩淘米少汲水汲多井水渾送歐陽主簿赴官韋城四首名憲文忠公孫鳳雛驥子日相高白髮蒼顔笑我曹讀遍牙籖三萬軸欲來小邑試牛刀出處年來恨不齊一尊臨水記分攜江湖咫尺吾將老汝潁東流子卻西白馬津頭春水來白魚猶喜似江淮使君已復冰堂酒更勸重新畫舫齋九域志滑州黎陽津一名白馬津漢酈食其傳守白馬之津歐陽畫舫齋記豫至滑之三月即其署東偏之室為燕居名曰畫舫齋韋城滑屬邑道傍垂白定霑巾正似當年緑髮新故國依然喬木在典刑復見老成人泛潁我性喜臨水得潁意甚奇到官十日來九日河之湄吏民笑相語使君老而癡使君實不癡流水有令姿繞郡十餘里不駛亦不遲上流直而清下流曲而漪畫船俯明鏡笑問汝為誰忽然生鱗甲亂我須與眉散為百東坡頃刻復在茲此豈水薄相與我相娛嬉聲色與臭味顛倒眩小兒等是兒戲物水中少磷緇趙陳兩歐陽同參天人師觀妙各有得共賦泛潁詩陶淵明和尚西曹詩蕤賓五月中清朝起南颸不駛亦不遲飄飄吹我衣劉禹錫牛渚詩秋江鱗甲生又白樂天詩伊水細浪鱗甲生莊子水靜則明燭須眉傳燈録良價禪師過水觀影大悟有偈曰我今獨自往處處得逄渠渠今正是我我今不是渠按公詩散為百東坡頃刻復在茲正暗用禪師語老子常無欲以觀其妙六觀堂老人草書公自注六觀取金剛經夢幻等六物也老人僧了性精於醫而善草書下筆有逺韻而人莫知貴故作此詩物生有象象乃滋夢幻無根成斯須方其夢時了非無泡影一失俯仰殊清露未晞電巳徂此滅滅盡乃真吾云如死灰實不枯逄場作戲三昧俱化身為醫忘其軀草書非學聊自娛落筆巳喚周越奴蒼鼠奮髯飲松腴剡藤玉板開雪膚遊龍天飛外人呼莫作羞澀羊氏姝左傳僖公十五年韓簡曰龜象也筮數也物生而後有象象而後有滋滋而後有數金剛經一切有為法如夢幻泡影如露亦如電應作如是觀傳燈録鄧隱峰對馬祖曰竿木隨身逄場作戲法書苑周越善草書而不逮懷素又先生不喜周越草書謂其險劣嘗跋懷素帖云此書不佳乃似周越晉王羲之傳善𨽻書論者稱其筆勢以為飄若遊雲矯若驚龍韋續書訣墨藪梁武帝評羊欣書如大家婢為夫人雖加位遇而舉止羞澀終不近似法書苑亦云次韻劉景文見寄淮上東來雙鯉魚巧將詩信渡江湖細看落墨皆松瘦想見掀髯正鶴孤烈士家風安用此書生習氣未能無莫因老驥思千里醉後哀歌缺唾壺晉王敦傳每酒後輒詠魏武樂府老驥伏櫪志在千里云云以如意擊唾壺以為節壺邉盡缺次韻趙景貺督兩歐陽詩破陳酒戒商也哀未忘歲月忽已秋祥琴雖未調餘悲不敢留矧此乃韻語未入金石流羲之生五子一作之總角出銀鉤吾家有二許下筆兩不休君言不能詩此語人信不千鍾斯為堯百榼斯為丘陋矣陶士行當以大白浮酒中那有失醉則不驚鷗明當罰二子已洗兩玉舟檀弓子夏既除喪而見與之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮弗敢過也晉王羲之傳有七子知名者五人索靖傳作草書狀曰婉若銀鉤飄若驚鸞二許謂蘇許公父子瓌頲也故曰吾家魏文帝典論論文云班固與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休後漢孔融傳曹操制酒禁融頻書爭之曰堯不千鍾無以建太平孔非百榼無以堪上聖又孔叢子子路嗑嗑尚飲百榼云云已見前晉陶侃傳字士行每飲酒有定限殷浩等勸更少進侃悽懷良久曰年少時曾有酒失亡親見約故不敢踰大白注再見周禮秋嘗冬蒸祼用􅕌彝黃彝皆有舟王注二子謂歐與陳兩玉舟則先生實有揚州藥玉船也叔弼云履常不飲故不作詩勸履常飲我本畏酒人臨觴未嘗訴平生坐詩窮得句忍不吐吐酒茹好詩肝胃生滓汙用此較得喪天豈不足付吾儕非二物歲月誰與度悄然得長愁為計巳大誤二歐非無詩恨子不飲故強為嚼一酌將非作愁具成言如皎日援筆當自賦他年五君詠山王一時數白樂天思舊詩且進杯中物其餘皆付天左傳襄公二十七年宋向戌從子木成言於楚詩國風謂余不信有如皎日南史顏延年作五君詠山濤王戎以貴顯被黜再見臂痛謁告作三絶句示四君子公退清間如致仕酒餘歡適似還鄉不妨更有安心病卧看縈簾一炷香心有何求遣病安年來古井不生瀾祗愁戲瓦間童子卻作泠泠一水看楞嚴經月光童子言嘗於比丘室中安禪我有弟子窺窗觀室惟見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盻而去我出定後頗覺心痛又互見前注小閣低窗臥晏溫了然非默亦非言維摩示病吾真病誰識東坡不二門史記漢武帝紀至中山晏溫有黃雲蓋焉如淳曰三輔謂日出清霽為晏晏而溫也到潁未幾公帑已竭齋厨索然戲作我昔在東武吏方謹新書齋空不知春客至先愁豫采杞聊自誑食菊不敢餘歲月今幾何齒髮日向疏幸此一郡老依然十年初夢飲本來空真飽竟亦虛尚有赤腳婢能烹赬尾魚心知皆夢耳慎勿歌歸歟白樂天詩渴人多夢飲飢人多夢食寶積經説食者竟無所飽夢飽者竟無所得韓退之寄盧同詩一婢赤腳老無齒景貺履常屢有詩督叔弼季默倡和巳許諾矣復以此句挑之君家文律冠西京旋築詩壇按酒兵袖手莫輕真將種致師須得老門生明朝鄭伯降誰受昨夜條侯壁已驚從此醉翁天下樂還應一舉百觴傾韓祭柳子厚文不善為斫血指汗顔巧匠旁觀縮手袖間漢齊悼惠王傳朱虛侯章曰臣將種也又晉書胡貴嬪嘗與帝博爭道傷帝指帝怒曰真將種也周禮夏官環人掌致師鄭氏云致其必戰之志左傳僖二十八年鄭伯如楚致其師唐書選舉志舉人既及第綴行通名詣主司第則謂門生按將種謂兩歐陽門生則公自謂也左傳宣十二年楚子克鄭鄭伯肉袒牽羊以迎漢周亞夫傳景帝詔使救梁亞夫不奉詔堅壁不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅卧不起頃之復定亞夫封條侯醉翁歐陽公自謂也歐公寄蘇子美詩我亦願助勇鼓旗噪其旁快哉天下樂一釂宜百觴贈月長老天形倚一笠地水轉兩輪五伯之所運毫端栖一塵功名半幅紙兒女浪苦辛子有折足鐺中容五合陳十年此中過卻是英特人延我地爐坐語軟意甚真白灰如積雪中有紅騏驎勿觸紅騏驎作灰維那瞋拱手但默坐牆壁徒諄諄今宵恨客多汙子白㲲巾後夜當獨來不煩主與賓蒲團坐紙帳自要觀我身虞洪穹天論天形如笠而冒地之表晉天文志引葛洪渾天説云天如雞子地如雞中黃天表裏有水各乘氣而立載水而行周天三百六十五度半覆地上半繞地下走轉如車轂之運也傳燈録汾州無業國師云看它古德得意之後茅茨石室向折腳鐺子裏煮飯喫柱贈閭丘師兄詩夜闌接軟語屢見紅騏驎獸炭也傳燈録牆壁瓦礫亦能説法杜贊公房詩細軟青絲履光明白㲲巾深藏供老宿取用及吾身次韻答錢穆父穆父以僕得汝隂用杭越酬唱韻作詩見寄大耿疲勞巳離羣小馮慈愛且當門公自注軾本以舍弟親嫌請郡玉堂不著扶犂手霜鬢偏宜畫鹿轓豪傑雖無兩王繼風流猶有二歐存公自注兩王謂子直深父二歐謂叔弼季默清詩巳入新歌舞要使邦人識雅言後漢耿弇傳張步曰尤來大彤十餘萬衆吾皆即其營而破之今大耿兵少又皆疲勞足可摧乎注弇耿况之長子故呼為大耿小馮注巳再見謝承後漢書鄭𢎞為臨淮太守行春有兩白鹿隨車夾轂而行主簿黃質曰三公車轓畫作鹿明府當為相乎後果為太尉韓退之孟郊墓銘云以昌其詩舉此問王定國當昌其身耶昌其詩也來詩下語未契作此答之王定國與吳正憲充馮文簡京素善而師友東坡舒亶輩欲傾二公因坡詩獄羅織定國遂南行萬里三年而歸司馬溫公當國深器遇之東坡在翰林以人言力請郡去未幾定國亦報罷此詩自慎勿怨謗讒以下端為定國發也昌身如飽腹飽盡還復飢昌詩如膏面為人作容姿不如昌其氣鬱鬱老不衰雖云老不衰劫壞安所之不如昌其志志一氣自隨飬之塞天地孟軻不吾欺人言魏勃勇股栗向小兒何如魯連子談笑卻秦師慎勿怨謗讒乃我得道資淤泥生蓮花糞壤出菌芝賴此善知識使我枯生荑吾言豈須多冷暖子自知送歐陽推官赴華州監酒我觀文忠公四子皆超越仲也珠徑寸照夜光如月好詩真脫兔下筆先落鶻知音如周郎議論亦英發文章乃餘事學道探玄窟死為長白主名字書絳闕公自注熙寧之末仲純父見僕於京城之東曰吾夢道士持告身授吾曰上帝命汝為長白山主此何祥也明年仲純父沒傷心清潁尾已伴白鷗沒喜見三少年俱有千里骨千里不難到莫遣歷塊蹶臨分出苦語願子書之笏四子發伯和奕仲純棐叔弼辨季默史記田敬仲完世家梁王曰寡人國小也尚有徑寸之珠照車前後各十二乘者十枚三國吳周瑜精意音樂有闕誤瑜必知之詳見草六卷次韻王都尉詩注吕蒙傳孫權論蒙曰籌略竒至可次公瑾但言議英發不及耳瑜字公瑾歷塊字出漢書王褒傳詳十二卷韓幹牧馬圖詩注晉輿服志古者貴賤皆執笏有事則書之釋名笏忽也有教命及所啓白則書其上偹忽忘也又法書苑秦有八體書其七曰殳書徐鍇曰書於殳也文書笏武書殳十月十四日以病在告獨酌翠柏不知秋空庭失搖落幽人得嘉蔭露坐方獨酌月華稍澄穆霧氣尤清薄小兒亦何知相語翁正樂銅爐燒柏子石鼎煮山藥一杯賞月露萬象紛酬酢此生獨何幸風纜欣初泊逝逃顏跖網行赴松喬約莫嫌風有待漫欲戲寥廓泠然心境空倣佛來笙鶴歐陽公顔跖詩顏回飲瓢水陋巷卧曲肱盜跖厭人肝九州恣橫行回仁而短命跖夀死免兵愚夫仰天呼禍福豈足慿云云漢王褒傳偃仰詘信若彭祖詬噓呼吸如喬松顏師古曰喬王喬松赤松子也莊子逍遙逰列子御風而行泠然善也此雖免乎行猶有所待也屢見列仙傳王子喬好吹笙作鳳凰鳴於緱氏山頭乘白鶴駐山嶺舉手謝時人數日而去獨酌試藥玉滑盞有懷諸君子明日望夜月庭佳景不可失作詩招之鎔鉛煮白石作玉真自欺琢削為酒杯規摹定州瓷荷心雖淺狹鏡面良渺瀰持此夀佳客到手不容辭曹侯天下平定國豈其師一飲至數石溫克頗似之風流越王孫詩酒屢出奇喜我有此客玉杯不徒施請君詰歐陳問疾來何遲呼兒掃月榭扶病及良時漢張釋之傳廷尉天下平也于定國傳為廷尉食酒至數石不亂冬月治請讞飲酒益精明詩小雅人之齊聖飲酒溫克歐陽季默以油煙墨二丸見餉各長寸許戲作小詩書􅐼拾輕煤佛帳掃餘馥辛勤破千夜收此一寸玉癡人畏老死腐朽同草木欲將東山松涅盡南山竹墨堅人苦脆未用歎不足且當注蟲魚莫草三千牘漢公孫賀傳朱安世曰南山之竹不足受我辭斜谷之木不足為我械韓退之讀皇甫湜詩爾雅注蟲魚定非磊落人史記滑稽傳東方朔初入長安至公車上書凡用三千奏牘再見明日復以大魚為饋重二十斤且求詩故復戲之漢庭九尺人誰似老方朔那將一寸金令足三冬學餉魚欲自洗鱗尾生卓犖我是騎鯨手聊堪充鹿角漢東方朔傳初來上書曰臣年十二學書三冬文史足用楊雄羽獵賦乘巨鱗騎鯨魚杜送孔巢父詩若逄李白騎鯨魚道甫問訊今何如歐陽公逹頭魚詩吾聞海之大物類無窮極毛魚與鹿角一籥數千百鹿角小魚也和趙景貺栽檜汝隂多老檜處處屯蒼雲地連丹砂井物化青牛君時有再生枝公自注潁之靈壇觀有再生檜還作左紐紋王孫有古意書室延清芬應憐四孺子不墮凡木羣體偹松柏姿氣含芝术薰初扶鶴立骨未出龍纒筋巢根白蟻亂網葉秋蟲紛乃知蔽芾初甚要封殖勤他年皮三寸狐鼠了不聞玄中記千歲之樹精化為青羊萬歲之樹精化為青牛秦始皇使人伐大樹有青牛躍出走入豐水青瑣高議亳州太清宫八檜有左紐煉丹等名王注杜甫有種四小松詩又管子對齊侯問苖曰苖始其少也煦煦乎何其孺子也今栽檜亦適有四故云爾雅釋木柏葉松身曰檜漢朝錯傳胡貉之地木皮三寸氷厚六尺施注蘇詩卷三十
