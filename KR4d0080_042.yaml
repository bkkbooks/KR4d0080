body:
  text: 施註蘓詩巻二十八宋蘇軾撰施元之原註武進邵長蘅刪補詩五十八首起在翰林洎元祐已巳出守錢塘作次韻王晉卿惠花栽栽所寓張退傅第中坐來念念失前人共向空中寓一塵若問此花誰是主天教閑客管青春柳子厚石門長老詩坐來念念非昔人萬遍蓮華為誰用杜牧之霅谿詩願為閒客此閒行次韻王晉卿上元侍燕端門月上九門開星河繞露臺君方枕中夢我亦化人來光動仙毬縋音墜香餘步輦回相從穿萬馬衰病若為陪漢文帝紀嘗欲作露臺故事上元日端門築露臺高丈餘優人妓女皆列其上放燈至夜闌綵山上縋下仙毬妓則聼民縱觀天子乘歩輦還内枕中夢用盧生事再見列子周穆王篇西極之國有化人來居亡幾何謁王同遊王執化人之袪騰而上者中天而止王鄭州挽辭王鄭州名克臣字子難河南人勲臣審琦之曾孫祖承衍尚秦賢穆公主子難第景祐進士仁宗閲其父名謂侍臣曰賢穆有孫登科可嘉也熙寕中為開封度支二判官遷塩鐵副使監安上門鄭俠介夫以上書直言竄嶺表子難嘗薦俠且饋之白金坐奪官復為戸部副使以集賢殿修撰知鄆州河决曹村子難亟築隄城下或曰澶淵去鄆為逺且州徙於髙八十年不知水患安事此不聼役愈急隄成水大至不沒者才尺餘復起甬道屬之東平王陵邦人得趨以避水皆繪奉其像璽書褒焉故詩云千里農桑歌子産子師約習進士英宗求儒生為主壻乃以師約尚焉故云一時冠盖慕蕭嵩元祐四年以龍圖閣直學士太中大夫卒年七十六羡君華髮起琳宫右輔初還鼓角雄千里農桑歌子産一時冠盖慕蕭嵩那知聚散春糧外便有悲歡過隙中京兆同僚幾人在猶思對桉筆生風公自注吾為開封府幕與子難同㕔空洞靈章經衆聖集琳宫金母命清歌左傳襄公三十年子産為政三年輿人誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之唐蕭嵩傳以太子太師請老而子華為侍郎子衡尚主位三品就養年踰八十士豔其榮莊子逍遥遊適百里者宿舂糧又知北遊人生天地間若白駒之過隙忽然而巳漢趙廣漢傳為京兆尹見事風生無所迴避書王定國所藏王晉卿畫著色山二首先生以詩謫黄州凡五年王定國鞏亦坐累謫監賔州酒税王晉卿詵為英宗主壻主薨詵徙均州故云三人俱是識山人白髮四老人何曽在商顏煩君紙上影照我胷中山山中亦何有木老土石頑正賴天日光澗谷紛斕斑我心空無物斯文定何閒一作何足闗君看古井水萬象自徃還漢張良傳注顏師古曰四人即商山四皓也溝洫志引洛水至商顏下注云商山之顏也君歸嶺北初逢雪我亦江南五見春寄語風流王武子三人俱是識山人晉王濟傳字武子少有逸才風􅐾英爽氣盖一時王武子尚常山公主以比晉卿也送吕昌朝知嘉州不羡三刀夢蜀都聊將八詠寄東呉臥看古佛凌雲閣敕賜詩人明月湖得句㑹應縁竹鶴思歸寕復為蓴鱸横空好在修睂色頭白猶堪乞左符晉王濬傳夜夢懸三刀於其臥屋梁上須㬰又益一刀覺甚惡之主簿李毅曰三刀為州又益一者明府其臨益州乎果遷益州刺史婺州圗經八詠樓碑在州南宋沈約集有東陽八詠嘉州江上有大石佛明月湖在州治之東韓退之南山詩天宇浮修睂濃緑畫新就漢書銅虎符注與郡守為符者各分其半右留京師左以與之次韻黄魯直寄題郭明父府推潁州西齋二首樹頭啄木常疑客客去而瞋定不然脱轄已應生井沫解衣聊復起庖煙平生詩酒眞相汙此去文書恐獨賢蚤晩西湖暎華髮小舟翻動水中天賈島詩時聞啄木鳥疑是打門僧韓退之剥啄行我不出應客去而瞋杜子羙詩久遭詩酒汙何事忝簪裙詩小雅我從事獨賢西湖潁州之西湖也寂寞東京月旦州徳星無復綴珠旒莫嗟平輿去聲空神物尚有西齋接勝流春夢屢尋湖十頃家書新報橘千頭雪堂亦有思歸曲為謝平生馬少游月旦汝南許劭事巳見劭傳註云縣有月旦里稽神異苑陳實與子姪造荀爽父子討論于時太史奏徳星聚漢志五星如連珠許劭傳劭兄䖍亦知名汝南人稱平輿淵有二龍焉太平寰宇記汝南縣有二龍鄉謂許劭許靖橘千頭襄陽李衡事馬少游語在馬援傳竝再見石崇思歸引序困於人間煩黷常思歸而永歎尋覽樂篇有思歸引儻古人之情有同於今故制此曲次韻秦少章和錢䝉仲秦少章名覯少游弟錢䝉仲穆父子碧畦黄隴稻如京嵗羙人和易得情鑑裏移舟天外思地中鳴角古來聲山圍故國城空在潮打西陵意未平二子有如雙白鷺隔江相照雪衣明詩小雅曾孫之庾如坻如京鄭氏云京髙丘也李白詩人行明鏡中鳥渡屏風裏王羲之曰每過山隂道如明鏡中行也元㣲之㑹稽州宅詩星河影向簷前落鼔角聲從地下迴次韻錢越州錢越州穆父先賦羣字韻詩東坡次其韻錢又和寄坡復次其韻先是東坡起流落中掌二制勇於報國不為顧慮且復踈於言語是時衆賢雖聚本朝而已有洛黨川黨朔黨之語言路多以謗訕誣之二聖察其忠藎不以為􅓧諸公無以泄其怒凡所薦引如黄魯直歐陽叔弼王定國秦少游皆被彈劾無得免者公乃屢章乞去歴辯謗傷元祐四年三月除龍圖閣學士知杭州而穆父時以京尹坐奏獄空事守越正言劉器之謂貴之太薄錢與公以氣類厚善故此詩末章云年來齒頰生荆棘習氣因君又一言後又和云欲息波瀾湏引去吾儕豈獨在多言意皆有在也髥尹超然定逸羣南游端為訪雲門謫仙歸侍玉皇桉老鶴來乗刺史轓巳覺簿書哀老子故知籩豆有司存年來齒頰生荆棘習氣因君又一言蜀闗羽傳諸葛亮答羽書曰孟起黔彭之徒當與益徳並驅争先猶未及髥之絶倫逸羣也羽羙䰅髥故亮謂之髥馬超字孟起張飛字益徳元㣲之越州寄白樂天詩我是玉皇香案吏謫居猶得小蓬萊巳見白樂天詩老鶴風標不可親後漢馬援為隴西太守輒曰頗哀老子使得遨遊冄見真誥許逺遊與王羲之書云君侯心中荆棘交雜華嚴經斷除一切煩惱習氣同秦仲二子雨中游寳山平明已報百吏散半日來陪二子閑立鶴低昂煙雨裏行人出没樹林閒去杭州十五年復游西湖用歐陽察判韻我識南屏金鯽魚重來拊檻散齋餘還從舊社得心印似省前生覔手書葑合平湖久蕪没人經豐嵗尚凋踈誰憐寂寞髙常侍老去狂歌憶孟諸髙僧傳惠可立雪斷臂求法於達磨達磨曰我法一心不立文字法師以心契故曰心印王注公游夀星院入門便悟嘗有詩云前生我已到杭州又晉羊祐自省前生李氏之子唐房琯悟前生為永禪師張文定公方平為滁州日游琅邪山至藏院云前生寫楞伽經未終願再成之皆異人也唐髙適為封丘尉日有詩云我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寕堪作吏風塵下適終左散騎常侍與莫同年雨中飲湖上莫君陳字和中呉興人官至少府監到處相逢是偶然夢中相對各華顚還來一醉西湖雨不見跳珠十五年公為杭倅日有詩云黒雲翻墨未遮山白雨跳珠亂入船故今詩云爾送子由使契丹雲海相望寄此身那因逺適更沾巾不辭驛騎凌風雪要使天驕識鳳麟沙漠回看清禁月湖山應夢武林春單于若問君家世莫道中朝第一人漢匃奴傳南有大漢北有强胡胡者天之驕子也杭州舊號虎林避唐諱更為武林陸文學錢塘記云武林山隋時有白虎見其上因以名之唐李揆傳帝嘗曰卿門地人物文學皆當時第一信朝廷羽儀後為入蕃使酋長曰聞唐有第一人李揆公是否揆畏留因紿曰彼李揆安肯來耶次韻答劉景文左藏劉景文名季孫開封祥符人壯閔公平之少子初以右班殿直監饒州酒後以左藏副使為兩浙兵馬都監駐杭州公為守表薦之得隰州以沒公嘗自書曰劉景文慷慨奇士也博學能詩英偉冠世孔文舉之流耳嘗寄僕詩云四海共知霜鬢滿重陽曾揷菊花無死之日家無一錢但有書二萬軸畫數百幅云其愛重之如此我老詩壇仆鼓旗借君佳句發良時但空賀監杯中物莫示孫郎帳下兒夜燭催詩金燼落秋芳壓㡌露華滋故應好語如爬癢有味難名只自知漢韓信傳建大將鼓旗唐南蠻傳攻大度河仆旗息鼔李白憶賀監詩昔好杯中物今為松下塵帳下兒用禰正平譏劉荆州語詳見十二巻次韻答邦直詩注佛書如人飲水冷暖自知坐上復借韻送岢嵐軍通判葉朝奉雲閒蹋白看纒旗莫忘西湖把酒時夢裏呉山連越嶠樽前羌婦雜胡兒夕烽過後人初醉春鴈來時雪未滋為問從軍眞樂否書來麤遣故人知王注軍中有踏白馬行師以為先驅蹋白纒旗盖岢嵐邉州所見也杜子羙夕烽詩夕烽來不近每日報平安王仲宣從軍詩從軍有苦樂但問所從誰始於文登海上得白石數升如芡實可作枕聞梅丈嗜石故以遺其子子明學士子明有詩次其韻梅子明吴郡人自館閣求便親養為杭州通判海隅荒怪有誰珍零落珊瑚泣季倫法供坐令㣲物重色難歸致孝心純只疑薏苡來交趾未信蠙珠出泗濵願子聚為江夏枕不勞揮扇自寕親晉石崇傳字季倫與王愷以奢靡相尚武帝助愷以珊瑚樹髙二尺許以示崇崇以鐵如意擊碎之愷為之惋惜崇曰不足多恨乃命左右悉取珊瑚髙三四尺者六七株如愷比者甚衆愷怳然自失華嚴經諸供養中法供養最先生舊有怪石供故云薏苡用馬援交趾事再見尚書泗濱浮磬淮夷蠙珠暨魚東觀漢記黄香至孝事母暑月扇枕寒則以身温席人號江夏黄童次韻錢越州見寄莫將牛弩射羊羣卧治何妨晝掩門稍喜使君無疾病時因送客見車轓搔頭白髪秋無數閉眼丹田夜自存欲息波瀾湏引去吾儕豈獨坐多言王注漢有八牛弩以射楚軍矢及十里黄庭經噓吸廬外出入丹田注存三丹田使和積如一則曰胎仙韓退之剥啄行凡今之人急名與官子不引去與為波瀾文登蓬萊閣下石壁千丈為海浪所戰時有碎裂淘灑嵗久皆圓熟可愛土人謂此彈子渦也取數百枚以養石菖蒲且作詩遺垂慈堂老人蓬萊海上峯玉立色不改孤根捍滔天雲骨有破碎陽侯殺亷角隂火發光采纍纍彈丸間瑣細或珠琲閻浮一漚耳眞妄果安在我持此石歸袖中有東海垂慈老人眼俯仰了大塊置之盆盎中日與山海對明年菖蒲根連絡不可觧儻有蟠桃生旦暮猶可待木𤣥虗海賦隂火潜然劉禹錫賦發隂火之光采左太沖呉都賦金鎰磊砢珠琲闌干長阿含經閻浮提世界由閻浮提樹得名楞嚴經空生大覺中如海一漚發再見本巻次韻毛滂法曹感雨毛滂字澤民元祐初公在翰苑澤民自浙入京以書贄文一編自通公出守錢塘澤民適為掾紹聖初謫惠州澤民以書問安否又寄所擬秋興賦公答之曰秋興之作追配騷人多矣遇不遇自有定數然非厄窮無聊何以發此奇思以自表於世耶澤民嘗為武康令崇寕初除刪定官未幾為言者論去後知秀州有東堂集行於世江南佳公子遺我錦繡端攬之温如春公子焉得寒興雨自有時膚寸便䝉􅟎斂藏以自潤牛斗何足干空庭月與影强結三友歡我豈不足歟要此清團團欲歡在一醉常恐樽中乾捨酒尚可樂明珠如彈丸但恐千仞雀悤悤發虗彈迨子閑暇時種子田中丹一朝渉世故空腹容欺謾我頃在東坡秋菊為夕飡永愧坡間人布褐為我完雪堂初覆瓦上簟無下莞時時亦設客每醉筒輒殫一笑便傾倒五年得輕安公子豈我徒衣鉢傳一簟定非郊與島筆勢江河寛悲吟古寺中穿帷雪漫漫他年記此味芋火對懶殘張平子四愁詩羙人贈我錦繡叚何以報之青玉案公羊傳觸石而出膚寸而合不崇朝而徧雨乎天下者惟泰山雲爾南史王筠傳好詩圓羙流轉如彈丸再見莊子讓王篇以隋侯之珠彈千仞之雀世必笑之以其所用重而所要輕也黄庭經注寸田謂三丹田皆方一寸毛詩下筦上簟乃安斯寢公答秦太虗書初到黄廩入既絶人口不少私甚憂之但痛自節儉日用不過百五十每月朔便取四千五百錢斷為三十塊挂屋梁上平旦用畫义挑取一塊即藏去义仍以大竹筒别貯用不盡者以待賓客此賈耘老法也楞嚴經心悟實相身意輕安摭言唐進士如得主司或與主司先人同名第即謝衣鉢古詩話和凝第十三名及第後知舉取范質第十三名謂曰此傳老夫衣鉢耳郊島皆韓愈門人公盖以韓自況也袁郊甘澤謡衡岳寺有僧執役性懶而食殘號懶殘李泌嘗異之一日徃見正撥火出芋啖之取其半以授泌曰勿多言領取十年宰相送鄧宗古還鄉廣漢有姜子孝悌行里閭赤睂雖豺虎㢮兵過其墟至今空清泉無復雙鯉魚南鄭有李郃得妙甘公書夜坐指流星驚倒兩使車抱闗不肯仕布褐䝉璠璵西南固多士君得二子餘凛凛忠文公搜士及樵漁澗谿有幽討蘋芷眞嘉蔬嵗晩終不食心惻當何如後漢列女傳姜詩事母孝母嗜江水魚膾夫婦常力作供之舍側忽有涌泉每旦輙出雙鯉以供膳赤睂賊經詩里㢮兵而過曰驚大孝必觸鬼神又互見十八巻五禽言詩注後漢李郃傳漢中南鄭人也善河圖風星和帝遣使㣲服單行觀采風謡二使當到益部投郃候舍郃時為幙門候吏夏夜露坐因仰觀問曰二君發京師時寕知朝廷遣使耶二人相驚視曰不聞也問何以知之郃指星云二使星向益州分野故知之後三年其使者一人拜漢中太守郃猶為吏太守奇其隐徳召署戸曹史甘公古之知星者忠文范蜀公也蜀公諱鎭字景仁薨謚忠文宗古當是景仁門生參寥上人初得智果院㑹者十六人分韻賦詩得心字參寥上人名道潜事見十五巻智果舍下有泉出石間東坡名之參寥泉且為之銘故詩云云漲水返舊壑飛雲思故岑念君忘家客亦有懐歸心三間得幽寂數歩藏清深攅金盧橘塢散火楊梅林茶笋盡禪味松杉眞法音雲崖有淺井玉醴常半尋遂名參寥泉可濯幽人襟相攜横嶺上未覺衰年侵一眼吞江湖萬象涵古今願君更小築嵗晩解我簮揚雄太𤣥經飲玉醴以解渴張平子思𤣥賦飲青岑之玉醴哭王子立次兒子迨韻王子立名適事見上巻次韻王郎子立風雨有感詩註彭城初識子照眼白而長異夢成先兆公自注余為宻州子立未嘗相識忽告同舍生曰吾夢為宻州壻何也已而果以子由之子妻之淸言得未嘗豈惟知禮意遂欲補詩亡公自注子立能詩而有禮學咄咄真相逼諸生敢鴈行韓退之銘吾見其孫白而長身再見晉束晳有補亡詩其序曰晳與同業疇人肄修鄉飲酒之禮然所詠之詩或有義無辭音樂取節闕而不備於是遥想既徃存思在昔補著其文以綴舊制法帖衛夫人書王逸少甚能學衛眞書咄咄逼人筆勢洞精字體遒媚非無伯鸞志獨有子雲悲公志子立墓享年三十五一女初睟有遺腹裔其兄籧子開葬之臨城恨子非天合猶能使我思兒曹莫悽慟老眼欲枯萎㑹哭皆豪傑公自注子立與黄魯直張文潜晁無咎秦少游陳無已皆友善誰為感舊詩後漢梁鴻傳字伯鸞家貧而尚節介鄉里勢家慕之多欲女之鴻並絶不娶同縣孟氏女狀醜肥而黒擇對不嫁鴻聞而聘之共入霸陵山中以耕織為業詠詩書彈琴以自娱仰慕前世髙士而作頌揚子法言育而不苖者吾家之童烏乎注云童烏子雲之子也子雲傷童烏育而不苖也龍困嘗魚服羊儇或虎䝉悤悤成鬼録憒憒到天公偶落藩牆上同遊羿彀中回看十年事黄葉巻秋風張平子東京賦白龍魚服見困豫且揚子羊質而虎皮見草而悦見豺而戰忘其皮之虎也魏文帝與呉質書徐陳應劉一時俱逝撰其遺文都為一集觀其姓名已為鬼録晉天文志康帝建元二年嵗星犯天闗安西將軍庾翼與兄冰書曰嵗星犯天闗占云闗梁當分比來江東無他故江道亦不艱難而石季龍頻年再閉闗不通信使此復是天公憒憒無皂白之證也庾信詩憒憒天公曉精神殊乏少藩牆用范縝對景陵王人生如樹花同發随風而墮語羿彀用莊子徳充符語並巳見異鵲并引熙寕中柯侯仲常通守漳州以救饑得民有二鵲栖其聼事訖侯之去鵲亦送之漳人異焉為賦此詩昔我先君子仁孝行於家家有五畞園么鳳集桐花是時鳥與鵲巢鷇可俯拏憶我與諸兒飼食觀羣呀里人驚瑞異野老笑而嗟云此方乳哺甚畏鳶與蛇手足之所及二物不敢加主人若可信衆鳥不我遐故知中孚化可及魚與豭柯侯古循吏悃愊眞無華臨漳所全活數等江干沙仁心格異族兩鵲栖其衙但恨不能言相對空楂楂善惡以類應古語良非夸君看彼酷吏所至號鬼車荀子王者之政好生惡殺則鳥鵲之巢可俯而窺莊子馬蹏篇至徳之世禽獸可係羈而遊鳥鵲之巢可攀援而窺周易中孚信及豚魚吉東坡雜説少年時所居書室前有竹柏雜花叢生滿庭衆鳥巢其上武陽君惡殺生兒童婢僕皆不得捕取數年間鳥雀皆巢於低枝其􅙿可俯而窺也又有桐花鳳四五日一翔集其間此鳥羽毛至為奇異難見而能馴擾殊不畏人閭里間見之以為異事此無他不忮之誠信於異類也有野老言鳥雀去人太逺則其子有虵䑕狐狸鴟雀之憂人既不殺則自近人盖欲免此害也由是觀之異時鳥雀巢不敢近人者以人為甚於虵䑕之類也苛政猛於虎信哉後漢章帝紀元和元年詔曰安静之吏悃愊無華韓退之雜詩鵲鳴聲楂楂烏噪聲擭擭嶺表録異鳥一名鬼車或云九首古者重鴞肉及梟羮盖惡鳥欲滅其族也次韻詹適宣徳小飲巽亭君方夢謫仙公自注來詩記李白郎官湖事我亦弔文園江上同三黜天涯共一樽濤雷殷白晝梅雪耿黄昏歸去多情雨應隨御史軒公自注詹為御史臺主簿金道眞浙江記潮頭湧激髙數丈訇隐若雷霆林逋梅詩暗香浮動月黄昏唐顏真卿傳為監察御史使河隴時五原有寃獄久不决天且旱真卿辨獄而雨郡人呼為御史雨韓退之祈雨詩行看五馬入蕭颯巳隨軒東川清絲寄魯冀州戲贈魯冀州名有開字元翰事見第十二巻送元翰如衛州詩註鵝谿清絲清如冰上有千嵗交枝藤藤生谷底飽風雪嵗晩忽作龍虵升嗟我雖為老侍從骨寒只受布與繒牀頭錦衾未還客坐覺芒刺在背膺豈如髥卿晩乃貴福禄正似川方增醉中倒著紫綺裘下有半臂出縹綾封題不敢妄裁剪刀尺自有佳人能遥知千騎出清曉積雪未放浮塵興白湏紅帶柳絲下老弱空巷人相登但放奇紋出領袖吾髥雖老無人憎杜子羙張舍人遺褥叚詩錦鯨巻還客始覺心和平漢霍光傳上内嚴憚之若有芒刺在背李白翫月詩序翫月金陵城西孫楚樓日晩乗醉著紫綺裘烏紗㡌與酒客數人棹歌秦淮北夢瑣言鄭愚好華侈以錦為半臂後以所業見崔鉉鉉歎曰眞消得錦半臂宣室志竇參夢徳宗以文錦半臂賜之解者曰半臂乃股肱之服後數日果大拜温庭筠乾􅍧子房琯家法不著半臂韓退之詩我齒豁可鄙我顏老可憎怡然以垂雲新茶見餉報以大龍團仍戲作小詩妙供來香積珍烹具大官揀牙分雀舌賜茗出龍團曉日雲菴暖春風浴殿寒聊將試道眼莫作兩般看維摩經香積如來以衆香鉢盛滿香飯與化菩薩唐百官志太官署令掌供祠宴朝㑹膳食呂仲吉建安茶録芽如鷹爪雀舌者為上一槍一旗次之次韻王忠玉游虎丘三首當年大白此相浮老守娯賔得二丘公自注郡人有閭丘公太守王規父嘗云不謁虎丘即謁閭丘規父忠玉伯父也白髪重來故人盡空餘叢桂小山幽楚辭劉安招隐士序曰淮南小山之所作也辭曰桂樹叢生兮山之幽青盖紅旗暎玉山新詩小草落𤣥泉風流使者人争看知有眞娘立道邉公自注虎丘中路有眞娘墓張平子東京賦隂地幽流𤣥泉冽清孟東野詩手中飛黒電象外寫𤣥泉舞衫歌扇轉頭空只有青山杳靄中若共呉王鬪百草使君未敢借驚鴻劉禹錫寄蘇州白使君詩若共呉王鬪百草不知應是欠西施又㤗娘歌舞鶴驚鴻水榭春歌撩上客䔵堂暮寄蔡子華蔡子華名褎睂之青神人成都帖有詩叙云王十六秀才將歸蜀云子華宣徳蔡丈見託求詩夢中為作四句覺而成之以寄子華仍請以示楊君素王慶源二老人元祐五年二月七日故人送我東來時手栽茘子待君歸茘子巳丹吾髮白猶作江南未歸客江南春盡水如天腸斷西湖春水船想見青衣江畔路白魚紫笋不論錢霜髥三老如霜檜舊交零落今誰輩莫從唐舉問封侯但遣麻姑更爬背史記蔡澤傳嘗從唐舉相舉熟視而笑曰吾聞聖人不相殆先生乎澤知舉戲之乃曰富貴吾所自有所不知者夀也和錢四寄其弟龢錢四盖穆父龢字岊仲時穆父守越公守杭故云東西二老人别本又載一篇云老來日月似車輪此去知逢幾箇春昨夜冰花猶作柱曉來梅子已生人再見濤頭湧玉輪煩君久駐浙江春年來總作維摩病堪笑東西二老人維摩經長者維摩詰以方便現身有疾以其疾故無數千人皆徃問疾維摩詰因以身疾廣為説法臥病彌月聞垂雲花開順闍黎以詩見招次韻答之道人心似水不礙照花姸宴坐春强半清隂月屢遷平生無起滅一念有陳鮮嫋嫋風枝舉離離日萼蔫病吟終少味老醉不成顛何必遨頭出湖中有散仙李義山詩日薄不蔫花後漢馬援傳過是欲少味矣成都記太守凡出遊樂士女列於木牀觀之勢如磴道謂之遨牀故謂太守為遨頭故周茂叔先生濓谿周茂叔先生子燾字次元公守杭次元為兩浙轉運同在錢塘為賦此詩次元終寳文閣待制世俗眩名實至人疑有無怒移水中蟹愛及屋上烏坐令此谿水名與先生俱先生本全徳亷退乃一隅因抛彭澤米偶似西山夫遂即世所知以為谿之呼先生豈我輩造物乃其徒應同柳州柳聊使愚谿愚晉解系傳趙王倫以宿憾收系曰我於水中見蟹且惡之況此人兄弟輕我耶太公虎韜篇愛其人者愛及屋上之烏憎其人者憎其餘胥再見揚子或問子蜀人也請人曰李仲元者人也不夷不惠可否之間也如是則其名之不彰曰無仲尼則西山之餓夫與東國之絀臣惡乎聞柳子厚種柳詩柳州柳刺史種柳柳江邉又愚溪詩序余以愚觸罪謫瀟水上愛是谿故更名為愚溪次韻子由使契丹至涿州見寄四首老人癡鈍巳逃寒子復辭行理亦難公自注余昔年辭免使北要到盧龍看古塞投文易水弔燕丹唐地里志平州武徳元年徙治盧龍一曰盧龍軍天寳二載置史記燕世家秦兵臨易水燕知禍且至太子丹使荆軻襲刺秦王秦王殺軻擊燕燕斬丹以獻胡羊代馬得安眼窮髪之南共一天又見子卿持漢節遥知遺老泣山前莊子逍遥㳺窮髪之北有𠖇海者天池也李潤詩島嶼分諸國星河共一天韓退之和連昌宫詩宫前遺老來相問今是開元幾葉孫李太白金陵詩六帝餘古丘樵蘇泣遺老氊毳年來亦甚都時時鴂舌問三蘇公自注余與子由入京時北使已問所在後余館伴北使屢誦三蘇文那知老病渾無用欲問君王乞鏡湖始憶庚寅降屈原旋看蠟鳳戲僧䖍随翁萬里心如鐵公自注時猶子遲侍行此子何勞為買田楚辭離騷攝提貞于孟陬兮惟庚寅吾以降南史王僧䖍傳父曇首與凡弟集㑹子孫任其戲適僧䖍採蠟燭珠為鳳凰伯父𢎞稱其長者或云僧綽漢陸賈使南越歸出橐中金分諸子買好畤田宅雪後便欲與同僚尋春一病彌月雜花都盡獨牡丹在耳劉景文左藏和順闍棃詩見贈次韻答之殘花怨久病剩雨泣餘姸不見雙旌出空令九陌遷公自注開園時市井皆入知君苦寂寞妙語嚼芳鮮淺紫從争發深紅任蚤蔫天葩尚青萼國色待華顚載酒邀詩將臞儒不是仙次韻劉景文周次元寒食同游西湖絮飛春减不成年老境同乗下瀨船藍尾忽驚新火後遨頭要及浣花前公自注成都太守自正月二日出遊謂之遨頭至四月十九日浣花乃止山西老將詩無敵洛下書生語更妍共向北山尋二士畫橈鼉鼓䀨清眠漢武帝紀元鼎五年下瀨將軍下蒼梧臣瓉曰伍子胥書有下瀨船白樂天寒食詩三杯藍尾酒一楪膠牙餳咸鎬故事清明尚食内園官小兒於殿前鑚新火賜宰臣以下漢趙充國傳賛曰秦漢以來山東出相山西出將杜子羙贈李白詩白也詩無敵晉謝安傳能為洛下書生詠維摩經二士共談必説妙法二士謂清順道潜連日與王忠玉張全翁游西湖訪北山清順道潜二詩僧登垂雲亭飲參寥泉最後過唐州陳使君夜飲忠玉有詩次韻答之北山非自髙千仞付我足西湖亦何有萬象生我目雲深人在塢風静響應谷與君皆無心信歩行看竹竹間逢詩鳴眼色奪湖淥百篇成俯仰二老相追逐故應千頃池養此一雙鵠山髙路已斷亭小膝屢促夜尋三尺井渇飲半甌玉明朝閙絲管寒食雜歌哭使君坐無聊狂客來不速載酒有鴟夷扣門非啄木浮蛆灔金盌翠羽出華屋湏㬰便陳跡覺夢那可續及君未渡江過我勤秉燭一笑換人爵百年終鬼録韓退之送孟東野序東野始以其詩鳴今以言二詩僧也新茶送簽判程朝奉以餽其母有詩相謝次韻答之程朝奉名遵彦字之邵舉進士簽書杭州節度判官文學吏事皆有可觀事母孝謹有絶人者在東坡幕府二年替還有詩送赴闕載二十九巻公再入翰林薦之於朝擢宗正丞後使廣西入為祠部郎提㸃兩浙刑獄縫衣付與溧陽尉舍肉懐歸潁谷封聞道平反供一笑㑹湏難老待千鍾火前試焙分新胯雪裏頭綱輟賜龍從此升堂是兄弟一甌林下記相逢孟東野游子吟慈母手中線遊子身上衣臨行宻宻縫意恐遲遲歸唐孟郊傳字東野年五十登進士第調溧陽尉左傳隐公元年穎谷封人穎考叔有獻於鄭莊公公賜之食食舍肉公問之對曰小人有母未嘗君之羹請以遺之漢雋不疑傳為京兆尹每行縣録决囚徒還其母輒問有所平反活幾何人即多有所平反母喜笑為飲食語言異於他時毛詩既飲旨酒永錫難老魯侯宴喜令妻夀母莊子寓言篇曾子冄仕而心再化曰吾及親仕三釜而心樂後仕三千鍾不洎吾心悲茶録福建貢茶每若干計綱以進國朝故事第一綱團茶至即分賜近臣歐陽公歸田録茶之貴者莫如龍鳳三國呉周瑜傳孫䇿與瑜同年獨相友善升堂拜母有無通共張昭傳孫䇿創業命昭為長史升堂拜母如比肩之舊次韻送張山人歸彭城羡君飄蕩一虗舟來作錢塘十日遊水洗禪心都眼浄山供詩筆總睂愁雪中乘興眞聊爾春盡思歸卻罷休何日五湖從范蠡種魚萬尾橘千頭莊子列禦宼汎若不繫之舟虗而遨遊者也北户雜録陶朱公養魚法凡種魚每二月上庚日取鯉魚有子者投池中柳子厚遊黄溪記有魚數千尾橘千頭次韻林子中王彥祖唱酬林子中名希時守潤故有雨餘北固之句蚤知身寄一漚中晩節尤驚落木風公自注近聞莘老公擇皆逝故有此句昨夢巳論三世事嵗寒猶喜五人同公自注余與子中彥祖子敦完夫同試舉人景徳寺今皆健雨餘北固山圍坐春盡西湖水暎空差勝四明狂監在更將老眼犯塵紅楞嚴經空生大覺中如海一漚發有漏㣲塵國皆因空所生圓覺經如昨夢故當知生死及與湼槃無起無滅無去來今南史梁平樂侯傳京城之西有别嶺入江髙數十丈三靣臨水號曰北固蔡謨起樓其上以置軍實唐賀知章傳晩節尤誕放自號四明狂客及秘書外監夀星院寒碧軒周益公詩話云蘇文忠公詩初若豪邁天成其實闗鍵甚宻再來杭州作夀星院寒碧軒詩句句切題而未嘗拘其云清風肅肅揺牕扉牕前脩竹一尺圍紛紛蒼雪落夏簟冉冉綠霧沾人衣寒碧各在其中第五句日髙山蟬抱葉響頗似無意而杜詩云抱葉寒蟬静併葉言之寒碧亦在其中矣人静翠羽穿林飛固不待言末句卻説破其妙如此清風肅肅揺牕扉牕前修竹一尺圍紛紛蒼雪落夏簟冉冉緑霧霑人衣日髙山蟬抱葉響人静翠羽穿林飛道人絶粒對寒碧為問鶴骨何縁肥書劉景文左藏所藏王子敬帖章子厚書評云劉季孫文思有子敬兩帖二十二字雖殘缺不完而精神骨氣具在柳公權題數十字於其後用筆艱辛滯澀不可言米元章書史云王獻之送棃帖云今送棃三百顆晩雪殊不能佳即詩中所謂君家兩行十二字也宿按此詩注有東坡詩話所載子敬黄甘三百顆帖在劉景文處二王書傳於世者皆無黄甘帖獨書史載唐摹逸少帖乃雙鈎蠟紙本云奉橘三百顆霜未降未可多得詩話所載盖誤記棃為甘也家雞野鶩同登爼春蚓秋虵總入奩君家兩行十二字氣壓鄴侯三萬籤書劉景文所藏宗少文一筆畫張彥逺名畫記宗炳字少文南陽沮陽人善書畫郭若虗圖畫見聞志張彥賓稱惟王獻之能為一筆書陸探㣲能為一筆畫宛轉回紋錦縈盈連理花何湏郭忠恕匹素畫繅車郭若虗圖畫見間志郭忠恕字恕先雒陽人善畫有設紈素求為圖畫者必怒而去乗興即自為之有富人子喜畫設几案粉墨絹素屢以情言忠恕取紙數十番首畫一丫角小童持車輪紙窮處作風鳶中引線長數丈富家子大怒遂謝絶眞覺院有洛花花時不暇徃四月十八日與劉景文同徃賞枇杷緑暗初迎夏紅殘不及春魏花非老伴盧橘是鄉人井落依山盡巖崖發興新嵗寒君記取松雪看蒼鱗歐陽公花釋名牡丹中魏花者千葉内紅出於魏仁浦故相家白樂天醉贈叔詩老伴如君少史記司馬相如傳盧橘夏熟注今蜀中有給客橙即盧橘也談助云盧橘枇杷也又和景文韻牡丹松檜一時栽付與春風自在開試問壁間題字客幾人不為看花來西湖夀星院此君軒臥聼謖謖碎龍鱗俯看蒼蒼立玉身一舸鴟夷江海去尚餘君子六千人陸機感冬賦風謖謖而屢作世説世目李元禮謖謖如勁松下風再見白樂天題武丘詩玉立竹森森史記越王句踐世家用范蠡計發習流二千教士四萬君子六千人諸御千人伐呉句踐已平呉范蠡乃與其私徒屬乗舟浮海出齊變姓名自謂鴟夷子皮仲天貺王元直自睂山來見余錢塘留半嵗既行作絶句五首送之王箴字元直公夫人同安君之弟也仲君豈弟多學王子清修寡言病後空驚鶴瘦時來或作鵬鶱海角煩君逺訪江源與我同來剰作數詩相送莫教萬里空回郭景純江賦惟岷山之導江初發源乎濫觴三人一旦同行公自注二子與秦少章同寓髙齋復同舟北行留下髙齋月明遥想扁舟京口尚餘孤枕潮聲更欲留君久住念君去國彌年空使犀顱玉頰長懐髥舅凄然犀顱玉頰公自謂諸子髥舅謂元直為余逺致殷勤瑞草橋邊老人紅帶雅冝華髮白醪光泛新春老人王慶源也公先有慶源詩引見上巻贈善相程傑心傳異學不謀身自要清時閲搢紳火色上騰雖有數急流勇退豈無人書中苦覓元非訣醉裏㣲言郤近眞我似樂天君記取華顛賞遍洛陽春唐馬周傳岑文本謂所親曰馬君鳶肩火色騰上必速恐不能久江鄰幾雜志錢若水謁華山陳摶摶曰目如㸃漆黒白分明當作神仙有紫閣老僧曰不然他日但能富貴急流中勇退耳白樂天醉吟先生傳洛陽内外六七十里閒觀寺丘墅有泉石花竹者靡不遊又閑吟詩看雪尋花翫風月洛陽城裏七年閑施註蘇詩巻二十八
