body:
  text: 施注蘇詩卷十五宋蘇軾撰施元之原注武進邵長衡刪補詩四十二首時守彭城作次韻子由送趙㞦歸覲錢塘遂赴永嘉趙㞦字景仁清獻公子由䕃登第通判溫州歸舟轉河曲稍見楚山蒼候吏來迎客吳音已帶鄉言從謝康樂先獻魯靈光已擊三千里何須四十強風流半刺史清絶校書郎到郡詩成集尋溪水濺裳芒鞋隨採藥繭紙記流觴海靜蛟鼉出山空草木長宦遊無逺近民事要更嘗願子傳家法他年請尚方南史謝靈運襲封康樂公為永嘉太守郡有名山水肆意逰遨謝承後漢書王延夀有雋才父逸欲作魯靈光殿賦令延夀往録其狀延夀因韻之以簡其父父曰吾無以加也時蔡雍亦有此作十年不成見延夀賦遂隱而不出莊子逍遙游鵬之徙于南冥也水擊三千里禮記四十曰強而仕舊唐書蕭效傳昔庾亮與郭遊書别駕舊與刺史别乘任居刺史之半安可非其人也唐百官志校書郎正九品主掌讐校典籍刋正文章南史王筠每一官成一集文房四譜右軍蘭亭帖用蠶繭紙鼠須筆書又蘭亭序清流激湍映帶左右引以為流觴曲水列坐其次漢朱雲傳願賜尚方斬馬劍斷佞臣一人頭詳見十二卷次韻答邦直子由闕詩注按公作清獻神道碑云為殿中侍御史彈劾不避權幸京師號鐵面御史中秋月三首殷勤去年月㶑灧古城東憔悴去年人卧病破窗中徘徊巧相覔窈窕穿房櫳月豈知我病但見歌樓空橅枕三歎息扶杖起相從天風不相哀吹我落瓊宫白露入肺肝夜吟如秋蟲坐令太白豪化為東野窮餘年知幾何佳月豈屢逢寒魚亦不睡竟夕相噞宜檢切喁李白月下獨酌詩我歌月徘徊我舞影凌亂韓退之記夢詩隆樓傑閣磊嵬髙天風飄飄吹我過張衡思𤣥賦呌帝閽使闢扉兮覿天皇之瓊宫韓退之秋懷詩蟲弔寒夜永又薦士詩有窮者孟郊受材實雄驁郊字東野說文噞喁魚口上出貌左太冲吳都賦泝洄順流噞喁沈浮何諷夢渴賦鯤鯨噞喁相詬以呬六年逢此月五年照離别公自注中秋有月凡六年矣惟去嵗與子由㑹于此歌君别離曲滿坐為凄咽留都信繁麗此㑹豈易擲鎔銀百頃湖挂鏡千尋闕三更歌吹罷人影亂清樾歸來北堂下寒光翻露葉喚酒與婦飲念我向兒說豈知衰病後空盞對梨栗但見古河東荍麥如鋪雪欲和去年曲復恐心斷絶留都子由時之官南京南京有留守司故云留都白樂天詩冰消湖水銀為面風卷沙汀玉作堆韻注樾木隂也韓退之詩妻孥恐我生悵望槃中不飣栗與梨白樂天詩荍麥鋪花白又村夜詩月明荍麥花如雪鮑明遠東門行涕零心斷絶將去復還訣舒子在汶上閉門相對清公自注舒煥試舉人鄆州鄭子向河朔公自注鄭僅赴北京户曹孤舟連夜行頓子雖咫尺兀如在牢扃公自注頓起來徐試舉人趙子寄書來水調有餘聲公自注今日得趙杲卿書猶記余在東武中秋所作水調歌頭悠哉四子心共此千里明明月不解老良辰難合并回頭坐上人聚散如流萍嘗聞此宵月萬里同隂晴公自注故人史生為余言嘗見海賈云中秋有月則是歲珠多而圓賈人常以此候之雖相去萬里他日㑹合相問則隂晴無不同者天公自著意此㑹那可輕明年各相望俯仰今古情謝希逸月賦美人邁兮音塵闕隔千里兮共明月鮑明逺玩月詩三五二八時千里與君同中秋見月寄子由明月未出羣山髙瑞光萬丈生白毫一杯未盡銀闕涌亂雲脫壞如崩濤誰為天公洗眸子應費明河千斛水遂令冷看世間人照我湛然心不起西南大星如彈丸角尾奕奕蒼龍蟠今宵注眼看不見更許螢火爭清寒何人艤舟臨古汴千燈夜作魚龍變曲折無心逐浪花低昻赴節隨歌板公自注是夜賈客舟中放水燈青熒滅沒轉前山浪颭風回豈復堅明月易低人易散歸來呼酒更重看堂前月色愈清好咽咽寒螀鳴露草卷簾推户寂無人窗下咿啞惟楚老公自注近有一孫名楚老南都從事莫羞貧對月題詩有幾人明朝人事隨日出恍然一夢瑤臺客韓退之月蝕詩念此日月者為天之眼睛盧同詩東方蒼龍角插戟尾搖風史記項籍傳烏江亭長艤船待注附船著岸也陸機文賦舞者赴節以投袂武元衡詩無因駐清景日出事還生盧子逸史許渲暴卒三日寤而作詩云曉入瑶臺露氣清坐中惟見許飛瓊李公垂鶯鶯歌恍然夢作瑶臺客答王鞏公自注鞏將見過有詩自謂惡客戲之汴泗繞吾城城堅如削鐵中有李臨淮號令肝膽裂古來彭城守未省怕惡客惡客云是誰祥符相公孫是家豪逸生有種千金一擲頗黎盆連車載酒來不飲外酒嫌其村子有千瓶酒我有萬株菊任子滿頭插團團見花不見目醉中插花歸花重壓折軸問客何所須客言我愛山青山自繞郭不要買山錢此外有黃樓樓下一河水美哉洋洋乎可以療饑并洗耳彭城之游樂復樂客惡何如主人惡杜詩大城鐵不如唐書李光弼傳寶應元年進封臨淮郡王常鎮徐州郝廷玉傳魚朝恩聞其善布陳請觀之廷玉申號令鳴鼓角部伍坐作進退齊一曰此臨淮王遺法也王善御軍每校旗不如令者輒斬由是人皆自效而赴蹈馳突心破膽裂元次山詩有時逢惡客還家亦少酣注非酒徒即為惡客祥符相公鞏大父魏國文正公也相真宗於景德祥符間漢陳勝傳侯王將相寧有種乎李太白詩莫惜連船沽美酒千金一擲買春芳韓退之詩豁呀巨壑頗黎盆張平子南都賦騰酒車而斟酌注以車載酒也杜子美詩揆棄潭州百斛酒蕪沒瀟岸千株菊杜牧九日詩菊花須插滿頭歸漢書景十三王傳叢輕折軸羽翮飛肉史記孔子世家臨河而歎曰美哉水洋洋乎詩國風泌之洋洋可以樂饑次韻王定國馬上見寄昨夜霜風入夾衣曉來病骨更支離疏狂似我人誰顧坎軻憐君志未移但恨不携桃葉女尚能來趁菊花時南臺二謝人無繼直恐君詩勝義熙公自注二謝從宋武帝九日燕戲馬臺莊子支離疏者頤隱於臍肩髙於頂白樂天詩猶勝村客病支離楚詞坎軻留滯注不遇也坎坎同古今樂録王獻之二妾桃葉桃根獻之作桃葉歌白樂天詩小妓携桃葉與頓起孫勉泛舟探韻得未一作味字窗前堆梧桐牀下鳴絡緯佳人尺書到客子中夜喟朝來一樽酒晤語聊自慰秋蠅已無聲霜蟹初有味當為壯士飲眥裂須磔蝟勿作兒女懷坐念蠨蛸畏山城亦何有一笑瀉肝胃泛舟以娛君魚鱉多可餼縱為十日飲未遽主人費吾儕俱老矣耿耿知自貴寧能傍門户啼笑雜猩狒要將百篇詩一吐千丈氣蕭條歲行暮逮此霜雪未明朝出城南遺跡觀楚魏西風迫吹帽金菊亂如沸願君勿言歸輕别吾所諱遁齊閒覽浙人呼螽斯之善鳴者為絡緯織女詩國風彼美淑姬可與晤語史記項籍紀樊噲嗔目視項王頭髮上指目眦盡裂晋桓溫傳劉惔常稱之曰溫眼如紫石稜須作蝟毛磔孫仲謀晋宣王之流也詩豳風蠨蛸在户又亦可畏也伊可懷也爾雅蠨蛸小蜘蛛長腳者俗呼喜子論語疏腥曰餼謂生肉未煮者東方朔傳上語竇太主曰恐羣臣從官多大為主費當是時董君見尊不名稱主人翁飲大歡樂左思賦猩猩啼而就禽狒狒笑而被格注猩猩形若狗人面善人言被執將死則相對而泣狒狒狀如人長面黑身有尾踵見人即笑笑則脣掩目晋和嶠傳森森如千丈松韓退之詩李杜文章在光焰萬丈長國語靈王不顧其民一國棄之如遺跡焉韓退之薦士詩霜風破佳菊嘉節迫吹帽詩大雅如蜩如螳如沸如羮魏志陳登傳劉備曰君求田問舍言無可采是元龍所諱也次韻答頓起二首挽袖推腰踏破紳舊聞携手上天門相逢應覺聲容似欲話先驚歲月奔新學已皆從許子諸生猶自畏何蕃殿廬直宿真如夢猶記憂時䇿萬言公自注頓君及第時余為殿試編排官見其答䇿語頗直其後與子由試舉人西京既罷回登嵩山絶頂嘗見其唱酬詩十餘首頓詩中及之左傳或挽之或推之韓退之誰氏子詩白頭老母遮門啼挽斷衫袖留不止太山記上有小天門大天門仰視天門如從穴中望天窗王注新學以言王介甫新經之學也韓愈何蕃傳蕃入太學二十餘年歲舉進士學成行尊太學諸生推頌不敢與蕃齒十二東秦比漢京去年古寺共題名公自注去歲見之於青州早衰怪我遽如許苦學憐君太瘦生茅屋擬歸田二頃金丹終掃雪千莖何人更似蘇司業和遍新詩滿洛城漢書髙祖紀田肯曰秦形勝之國帶河阻山縣隔千里秦得百二焉地方二千里持㦸百萬齊得十二焉此東西秦也陸士衡齊謳行孟諸吞楚夢百二侔秦京後漢左慈傳曺操欲殺之慈走入羊羣忽一老羝屈膝人言曰遽如許太瘦生用李白嘲杜甫詩已見前注王注蘇司業源明也先生以比子由云九日黃樓作去年重陽不可說南城夜半千漚發水穿城下作雷鳴泥滿城頭飛雨滑黃花白酒無人問日暮歸來洗鞾襪豈知還復有今年把盞對花容一呷莫嫌酒薄紅粉陋終勝泥中千柄鍤黃樓新成壁未乾清河已落霜初殺朝來白露如細雨南山不見千尋剎樓前便作海茫茫樓下空聞櫓鴉軋薄寒中人老可畏熱酒澆腸氣先壓煙消日出見漁村逺水鱗鱗山齾齾牛轄切詩人猛士雜龍虎公自注坐客三十餘人多知名之士楚舞吳歌亂鵝鴨一杯相屬君勿辭此景何殊泛清霅杜牧之詩歸棹何時聞軋鴉楚辭九辨憯悽增欷兮薄寒之中人韓退之聨句交斫雙缺齾韻注缺齒又器缺也一曰獸食之餘曰齾漢張良傳上顧戚夫人曰為我楚舞吾為若楚歌李白詩吳歌楚舞歡未畢青山欲銜半邊日唐史李訴夜入蔡州擊鵝鴨池以亂軍聲霅溪在湖州注再見太虛以黃樓賦見寄作詩為謝我在黃樓上欲作黃樓詩忽得故人書中有黃樓詞黃樓髙十丈下建五丈旗楚山以為城泗水以為池我詩無傑句萬景驕莫隨夫子獨何妙雨雹散雷椎雄詞雜今古中有屈宋姿南山多磬石清滑如流脂朱蠟為摹刻細妙分毫釐佳處未易識當有來者知秦始皇紀下可以建五丈旗詳見四卷戲子由詩注張景陽七命豐隆奮椎注豐隆雷公也唐杜審言傳嘗曰吾文章當得屈宋作衙官尚書孔安國注泗水涯石可以為磬杜牧秋娘詩京江水清滑生女白如脂九日次韻王鞏我醉欲眠君罷休已教從事到青州鬢霜饒我三千丈詩律輸君一百籌聞道郎君閉東閣且容老子上南樓相逢不用忙歸去明日黃花蝶也愁世說桓公有主簿善别酒有酒輒令先嘗好者謂青州從事惡者謂平原督郵青州屬齊郡平原有鬲縣從事謂到臍下督郵謂在膈上住也李白詩白髮三千丈緣愁似箇長郎君東閣用李義山謁令狐綯詩語已見前注晋庾亮傳亮在武昌諸佐吏殷浩之徒乘秋夜往登南樓不覺亮至諸人將起避之亮曰諸君少住老子於此興復不淺送頓起客路相逢難為樂常不足臨行挽衫袖更賞折殘菊佳人亦何念悽斷陽關曲酒闌不忍去共接一寸燭留君終無窮歸駕不免促岱宗已在眼一往繼前躅天門四十里夜看扶桑浴回頭一作顧望彭城大海浮一粟故人在其下塵土相豗蹴惟有黃樓詩千古配淇澳公自注頓有詩記黃樓本末白樂天詩相逢且莫推辭醉聼唱陽關第四聲一寸燭用竟陵王子良刻燭為詩事已見前注唐書柳公權充翰林學士文宗夜召對燭盡而語不盡宫人以蠟液濡儀紙繼之後漢光武紀趣駕南轅注趣急也讀曰促漢官泰山東上四十里至天門又東南有峯名曰觀雞鳴時見日始出淮南子日出暘谷浴乎咸池入於扶桑是謂晨明東方朔十洲記扶桑在碧海中葉似桑樹長數千丈大二十圍兩兩同根更相依傍是名扶桑詩國風衛淇澳美武公之德也送孫勉昔年罷東武曾過北海縣白河翻雪浪黃土如蒸麵桑麻冠東方一熟天下賤是時纍饑饉常苦盜賊變每憐追胥官野宿風裂面君為淮南秀文采照金殿公自注君嘗考中進士第一人胡為事奔走投筆腰羽箭更被髯參軍豪篇來督戰公自注其兄莘老以詩寄之皆言戰事親程三郡士玉石不能衒欲知君得人失者亦稱善君才無不可要欲經百錬吾詩堪咀嚼聊送别酒咽九域志密州古跡有伏湛墓其志云琅邪東武人髙密即東武也又濰州治北海縣追胥字出周禮小司徒注已見後漢班超傳嘗為官傭書輟業投筆嘆曰大丈夫無它志略猶當效傅介子張騫立功異域以取封侯安能久事筆硯間乎李太白詩流星白羽腰間插晋郗超傳桓溫為大司馬辟超為參軍時王珣為主簿府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也又互見十四卷史記秦始皇紀以衡石量書日夜有程不中程不得休息漢東方朔傳武帝既招英俊程其器能用之如不及揚子衒玉而賈石者其狙詐乎應劭漢官儀金取堅剛百錬而不耗孟東野懊惱詩好詩更相嫉劍㦸生牙關前賢死已久猶在咀嚼間李思訓畫長江絶島圖唐張彥逺名畫記李思訓宗室也林甫之伯父畫稱一時之妙官至左武衛大將軍其畫山水樹石筆格遒徑湍瀨潺湲雲霞縹眇時睹神仙之事窅然巖嶺之幽時人謂之李將軍也山蒼蒼江茫茫大孤小孤江中央崖崩路絶猿鳥去惟有喬木攙天長客舟何處來棹歌中流聲抑揚沙平風軟望不到孤山久與船低昻峩峩兩煙鬟曉鏡開新糚舟中賈客莫漫狂小姑前年嫁彭郎庾信傷心賦山蒼蒼而正寒杜子美詩春動江茫茫斛律金敕勒歌天蒼蒼野茫茫風吹草低見牛羊漢武秋風辭橫中流兮揚素波簫鼓鳴兮發棹歌丘遲詩棹歌發中流鳴鞞響沓嶂杜牧阿房宮賦明星熒熒開糚鏡也緑雲擾擾梳曉鬟也歐陽歸田録世俗傳訛惟祠廟之名尤甚江南有大小孤山而世俗轉孤為姑江側有一石磯謂之澎浪磯遂轉為彭郎云彭郎小姑壻也余過小孤山廟像乃一婦人而敕額為聖母廟豈止俚俗之謬哉春明退朝録陳簡夫詩云山稱孤獨字廟塑女郎形過客雖知誤行人但乞靈次韻答王鞏我有方外客顔如瓊之英十年塵土窟一寸冰雪清朅來從我游坦率見真情顧我無足戀戀此山水清新詩如彈丸脫手不暫停昨日放魚回衣巾滿浮萍今日扁舟去白酒載烏程山頭見月出江路聞鼉鳴莫作孺子歌滄浪濯吾纓吾詩自堪唱相子櫂歌聲晋謝奕傳桓溫辟為安西司馬岸幘笑詠無異常日溫曰我方外司馬詩國風有女同車顔如舜英杜子美留别章使君詩常恐性坦率失身為杯酒南史謝朓嘗云好詩圓美流轉如彈丸也鄒陽酒賦其品類則洛陽􅌬淥烏程若下又詳五卷贈孫莘老詩注禮記舂不相注相謂送杵聲李太白詩滄浪吾有曲寄入棹歌聲張安道見示近詩人物一衰謝微言難重尋殷勤永嘉末復聞正始音清談未足多感時意殊深少年有竒志欲和南風琴荒林蜩蚻一作蛩亂廢沼蛙蟈淫遂欲掩兩耳臨文但噫瘖蕭然王郎子來自緱山隂公自注其壻王鞏携來云見浮丘伯吹簫明月岑遺聲落淮泗蛟鼉為悲吟願公正王度祈招繼愔愔漢司馬遷傳仲尼沒而微言絶晋衛玠傳王敦謂謝鯤曰微言之緒絶而復續不意永嘉之末復聞正始之音互見十三卷左傳昭三十一年荀躒掩耳而走太平廣記王仙客者劉振之甥也振有女曰無雙小仙客數歲皆幼稚相狎振妻常呼仙客為王郎子列仙傳王子喬好吹簫作鳯鳴遇浮丘公得仙互見前注公烏臺詩話張方平令王鞏將詩一卷來徐州軾作一詩題卷末云云軾意言人物衰謝不意復見張方平之文章才氣以譏諷今時衰薄也意以衛玠比方平故云清談未足多也又少年有竒志至臨文但噫喑言軾少年本有志欲和天子薰風之詩因見學者皆空言無實或雜引老佛異端之書文字雜亂故以荒林廢沼比朝廷新法屢有變改事多荒廢致風俗虛浮學者誕妄如蜩蚻之紛亂遂掩耳不欲論文也願公正王度祈招繼愔愔據左氏楚靈王欲求鼎於周求地於諸侯其臣右尹子革諫王其詩曰祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心靈王不能用以及於難軾欲張方平當如蔡公謀父作祈招之詩以正王也次韻王鞏顔復同泛舟沈郎清瘦不勝衣邊老便便帶十圍躞蹀身輕山上走歡呼船重醉中歸舞腰似雪金叉落談辨如雲玉麈揮憶在錢塘正如此回頭四十二年非南史沈約與徐勉書云老病百日數圍革帶嘗應移孔以手握臂率計月小半分檀弓趙丈子其中退然若不勝衣後漢東平王蒼腰帶十圍晋載記尹緯慕容超李勢赫連勃勃皆身長八尺腰帶十圍云便便用邊孝先事注再見楚辭衆踥蹀而日進兮注踥蹀行貌李太白效古詩歸時落日晚躞蹀浮雲驄杜子美詩三更風起寒浪湧取樂喧呼覺船重白氏六帖趙飛燕舞宛轉如流風之回雪托言杜牧與官妓賭酒因微吟曰骰子巡巡裹手拈無因得見玉纎纎張祜應聲曰但知報道金叉落倣佛還應露指尖後漢符融幅巾奮褎談辭如雲注已見晋孫盛傳嘗詣殷浩談論對食奮擲麈尾毛落飯中王衍傳每捉玉柄麈尾與手同色按東坡先生以景祐三年丙子生是年元豐元年戊午年四十有三故云回頭四十二年非次韻張十七九日贈子由千戈萬槊擁笓籬九日清樽豈復持公自注是日南都敕使按兵官事無窮何日了菊花有信不吾欺逍遙瓊館真堪羡取次塵纓未可縻逮此暇時須痛飲他年長劍拄君頤晋史傅咸劾事云令史張濟案行城東有新立屋間笓籬障二十丈晋傅咸傳楊濟與咸書曰天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為快耳詩小雅逮我暇矣飲此湑矣杜子美醉時歌忘形到爾汝痛飲真吾師戰國䇿田單攻狄不能下齊兒謠曰大冠若箕修劍拄頤攻狄不下纍於梧邱李太白答王十二詩嚴陵髙揖漢天子何必長劍拄頤事玉階次韻王鞏獨眠居士身心如槁木旅館孤眠體生粟誰能相思琢白玉服藥千朝償一宿天寒日短銀燈續欲往從之車脫軸何人吹斷參差竹泗水茫茫鴨頭緑趙飛燕外傳體溫舒無軫粟盧同詩白玉璞裏琢出相思心黃金礦裏鑄出相思淚續仙傳彭祖云上士别牀中士異被服藥百裹不如獨卧後人習其術號彭祖經周易車說輻史記范雎傳須賈曰吾馬病車軸折楚辭九歌吹參差兮誰思次韻王鞏留别去國已八年故人今有誰當時交游內未數蔡克兒豈無知我者好爵半已縻爭為東閣吏不顧北山移公子表獨立與世頗異馳不辭千里逺成此一假竒蛾睂亦可憐無奈思餅師無人伴客寢惟有支牀龜君歸與何人文字相娛嬉持此調張子一笑當脫頤晋王導傳蔡謨戲嘲導導怒謂人曰吾往與羣賢共游洛中何曽聞有蔡克兒也謨蔡克子漠朱雲傳薛宣為丞相雲往見之宣偹賓主禮從容謂雲曰在田野無事且留我東閣可以觀四方竒士雲曰小生乃欲相吏耶宣不敢復言楚詞九歌表獨立兮山之上王羲之帖吾年垂耳順要欲一游目汶領足下但當保護以俟此期得果此緣一假竒事也本事詩寧王宅左有賣餅妻纎白明媚王一見屬目厚惠其夫取之寵愛逾等踰歲問曰汝復憶餅師否默然不對王召餅師使見之其妻注視雙淚垂頰若不勝情王乃歸之時坐客數人皆當時文士無不悽異王命賦詩右丞王維先成曰莫以今時寵難忘舊日恩看花滿眼淚不共楚王言史記龜䇿傳南方老人用龜支牀足行二十歲老人死移牀龜尚生龜能行氣導引也張子謂安道也脫頤用匡衡解頤意注已見登雲龍山醉中走上黃茅岡滿岡亂石如羣羊岡頭醉倒石作牀仰看白雲天茫茫歌聲落谷秋風長路人舉首東南望拍手大笑使君狂次韻僧潛見贈僧道潛字參寥於潛人能文章尤喜為詩嘗有句云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲過先生於彭城甚愛之以書告文與可謂其詩句清絶與林逋上下而通了道義見之令人蕭然蘇黃門每稱其體製絶類儲光羲非近時詩僧所能及道人胸中水鏡清萬象起滅無逃形獨依古寺種秋菊要伴騷人餐落英人間底處有南北紛紛鴻雁何曾冥閉門坐穴一禪榻頭上歲月空峥嶸今年偶出為求法欲與慧劍加礱硎雲衲新磨山水出霜髭不剪兒童驚公侯欲識不可得故知倚市無傾城秋風吹夢過淮水想見橘柚垂空庭故人各在天一角相望落落如晨星彭城老守何足顧棗林桑野相邀迎千山不憚荒店逺兩腳欲趁飛猱輕多生綺語磨不盡尚有宛轉詩人情猿吟鶴唳本無意不知下有行人行空階夜雨自清絶誰使掩抑啼孤惸我欲仙山掇瑶草傾筐坐嘆何時盈簿書鞭撲晝填委煮茗燒栗宜宵征乞取摩尼照濁水共看落月金盆傾晋衛瓘見樂廣善談論竒之曰此人之水鏡見之瑩然傳燈録六祖曰人有南北佛性無南北穴榻暗使管寧木榻事注見九卷遊靈隱髙峯塔詩維摩經以智慧劍破煩惱賊揚子有刀者礱諸莊子養生主刀刃若新發於硎漢貨殖傳諺曰刺繡文不如倚市門劉禹鍚送張盥序向所謂同年友當其盛時聨袂舉鑣亘絶九衢若屏風然今來落落如曙星之相望杜子美贈李白詩亦有梁宋遊相期拾瑶草詩國風采采卷耳不盈傾筐杜贈閭丘師兄詩夜闌接軟語落月如金盆又惟有摩尼珠可照濁水源次韻潛師放魚法師說法臨泗水無數天花隨麈尾勸將淨業種西方莫待夢中呼起起哀哉若魚竟坐口逺愧知幾穆生醴况逢孟簡對盧同不怕校人欺子美疲民尚作魚尾赤數罟未除吾顙泚法師自有衣中珠不用辛苦沙泥底佛頂心經說此陀羅尼已天雨寶花繽紛亂下髙僧傳梁僧法雲講次天花散墜起起用鄭𤣥夢孔子事詳十卷孔長源挽詩注漢楚元王傳穆生不嗜酒元王常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市稱疾卧申公白生強起之穆生曰易稱知幾其神乎君子見幾而作不俟終日遂謝病去唐孟簡為常州刺史與盧同逰北湖盡買漁人所獲魚放之同作觀放魚歌校人鄭子産事見孟子左傳襄二十五年子美入數俘而出杜預曰子美子産也詩國風魴魚赬尾鄭箋赬赤也君子仕於亂世其顔色瘦病如魚勞則尾赤楞嚴經譬如有人於自衣繫如意珠不自覺知窮露它方乞食馳走忽有智者指視其珠所願從心致大饒富方悟神珠非從外得白樂天放魚詩不須泥沙底辛苦覓明珠公烏臺詩話元豐元年四月作次韻潛師放魚詩一首云疲民尚作魚尾赤左傳云如魚窺尾衡流而方羊裔注云魚勞則尾赤是時徐州大水之後大役數起軾言民之疲病如魚勞而尾赤也數罟謂魚網之細密者以言民既疲病朝廷又行青苖助役不為除放如密網之取魚皆以譏朝廷新法不便以致大水之災也與舒教授張山人參寥師同遊戲馬臺書西軒壁兼簡顔長道二首古寺長廊院院行此軒偏慰旅人情楚山西斷如迎客汴水南來故繞城路失玉鉤芳草合林亡白鶴古泉清淡游何以娛庠老坐聼郊原琢磬聲桂花叢談咸通中李蔚鎮彭城於戲馬臺西連玉鉤斜道開創池沼構葺亭臺名之曰賞心白鶴則山中故事也陳無已詩話乃云眉山長公守徐嘗與客登項氏戲馬臺賦詩云路失玉鉤芳草合林亡白鶴古泉清廣陵亦有戲馬臺其下有路號玉鉤斜唐髙宗東封有鶴下焉乃詔諸州為老氏築宫名白鶴公蓋誤用而後所取信故不得不辨也禮記有虞氏養國老於上庠養庶老於下庠王注泗濵多磬石故云琢磬聲竹杖芒鞋取次行下臨官道見人情天寒菽粟猶栖畝日暮牛羊自入城沽酒獨教陶令醉題詩誰似皎公清更尋陋巷顔夫子乞取微言繼此聲左思魏都賦餘糧栖畞而不收詩國風日之夕矣牛羊下來王注廬山僧惠逺與陶潛遊常沽酒飲之又吳興僧清晝字皎然唐時有詩名於世又稱長道為顔夫子故使陋巷字滕縣時同年西園人皆種榆栁坐待十畝隂我獨種松柏守此一片心君看閭里間盛衰日駸駸種木不種德聚散如飛禽老時吾不識用意一何深知人得數士重義忘千金西園手所開珍木來千岑飬此霜雪根遲彼鸞鳯吟池塘得流水龜魚自浮沈幽桂日夜長白花亂青襟豈獨蕃草木子孫已成林拱把不知數㑹當出千尋樊侯種梓漆夀張富華簪我作西園詩以為里人針杜子美詩飽聞榿木三年大與致溪邊十畝隂禮記如竹箭之有筠也如松柏之有心也貫四時而不改柯易葉白樂天詩屈曲間池沼無非手自開本草菌桂花白蕊黃牡桂亦曰白華葉冬夏常青文子十圍之大始於拱把後漢樊宏傳宏字靡卿南陽湖陽人也世祖之舅父重嘗欲作器物先種梓漆時人嗤之然積以歲月皆得其用向之笑者咸求假焉資至巨萬而賑贍宗族恩加鄉閭建武十五年定封宏夀張侯十八年帝過湖陽祠重墓追爵諡為夀張敬侯次韻王庭老和張十七九日見寄霜葉投空雀啅籬上樓筋力强扶持對花把酒未甘老膏面染䰅聊自欺無事亦知君好飲多才終恐世相縻請看平日銜杯口㑹有金椎為控頤杜牧題北樓詩不為尋山試筋力肯能寒上背雲樓劉夢得詩筋力上樓知又近來時世輕先輩好染髭䰅事後生晋陸機傳張華嘗謂之曰人為文常恨才少子更患多莊子外物篇儒以詩禮發冡大儒臚傳曰東方作矣事之何若小儒曰未解裾襦口中有珠儒以金椎控其頤徐别其頰無傷口中珠次韻參寥師寄秦太虛三絶句時秦君舉進士不得秦郎文字固超然漢武慿虛意欲仙底事秋來不得解定中試與問諸天漢司馬相如傳既奏大人賦天子說飄飄然有凌雲氣遊天地之間意太平廣記袁昻書評云張伯英書如漢武愛道慿虛欲仙劉禹錫和宣上人放榜詩借問至公誰印可支郎天眼定中觀一尾追風抹萬蹄昆崙𤣥圃謂朝隮回看世上無伯樂郤道鹽車勝月題崔豹古今注秦始皇有七名馬一曰追風杜子美遣興詩地用莫如馬無良誰復記此日千里鳴追風可君意十洲記崑崙山三角北曰閬風西曰𤣥圃東曰崑崙宮韓退之雜說世有伯樂然後有千里馬千里馬常有而伯樂不常有莊子馬蹄篇加之以衡扼齊之以月題音義云月題馬額上當顱如月形者也得喪秋毫久已冥不須聞此氣崢嶸何妨卻伴參寥子無數新詩咳唾成與參寥師行園中得黃耳菌遣化何時取衆香法筵齊鉢久凄凉寒蔬病甲誰能採落葉一作蘂空畦半已荒老楮忽生黃耳菌故人兼致白芽薑蕭然放箸東南去又入春山筍蕨鄉維摩詰遣化菩薩往衆香國禮彼佛足言願得世尊所食之餘欲於娑婆世界施作佛事於是香積如來以衆香鉢盛滿香飯與化菩薩悉飽衆會百步洪并引王定國訪余於彭城一日棹小舟與顔長道携盼英卿三子游泗水北上聖女山南下百步洪吹笛飲酒乘月而歸余時以事不得往夜著羽衣佇立黃樓上相視而笑以為李太白死世間無此樂三百餘年矣定國既去逾月復與參寥師放舟洪下追懷曩游已為陳迹喟然而嘆故作二詩一以遺參寥一以寄定國且示顔長道舒堯文邀同賦云長洪斗落生跳波輕舟南下如投梭水師絶叫鳬雁起亂石一線爭磋磨有如走鷹隼落駿馬下注千丈坡斷絃離柱箭脫手飛電過隙珠翻荷四山眩轉風掠耳但見流沫生千渦嶮中得樂雖一快何異水伯夸秋河我生乘化日夜逝坐覺一念逾新羅紛紛爭奪醉夢裏豈信荆棘埋銅駝覺來俯仰失千劫回視此水殊委蛇君看岸邊蒼石上古來篙眼如蜂窠但應此心無所住造物雖駛如吾何回船上馬各歸去多言譊譊師所呵流沫用莊子已見前注莊子秋水篇秋水時至百川灌河涇流之大兩涘渚涯之間不辨牛馬於是焉河伯欣然自喜又互見七卷八月十五觀潮詩注傳燈録僧問金鱗寶資大師如何是金剛一隻箭師曰過新羅國去又古德云鷂子過新羅晋索靖傳有先識逺量知天下將亂指洛陽宫門銅駝嘆曰㑹見汝在荆棘中揚子譊譊者天下皆訟也又呱呱之子各識其親譊譊之學各習其師華嚴經愚人之所貪諸佛所訶佳人未肯回秋波幼輿欲語防飛梭輕舟弄水買一笑醉中蕩漿肩相磨摩同不學長安閭里俠貂裘夜走胭脂坡獨將詩句擬鮑謝涉江共採秋江荷不知詩中道何語但覺兩頰生微渦我時羽服黃樓上坐見織女初斜河歸來笛聲滿山谷明月正照金叵羅奈何捨我入塵土擾擾毛羣欺卧駝不念空齊老病叟退食誰與同委蛇時來洪上看遺迹忍見屐齒青苔窠詩成不覺雙淚下悲吟相對惟羊何欲遣佳人寄錦字夜寒手冷無人呵傅武仲舞賦目流睇而橫波晋謝鯤傳鯤字幼輿鄰家髙氏女有美色鯤挑之女投梭折其兩齒時人為之語曰任逹不已幼輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌戰國䇿蘇秦說齊宣王曰臨淄之途車轂擊人肩摩異聞集書仙歌長安南坡名胭脂曺家有女名文姬杜子美遣興詩賦詩何必多往往凌鮑謝宋玉招魂涉江采菱發陽阿李太白詩涉江弄秋水愛此荷花鮮班固西都賦毛羣內闐飛羽上覆詩國風委蛇委蛇退食自公謝靈運登臨海嶠作題云與從弟惠連可見羊何共和之沈約宋書靈運既東還與族弟惠連東海何長瑜潁川荀雍太山羊璿之共為山澤之遊時人謂之四友李白久離别歌中有錦字書開緘使人嗟王仁裕開寶遺事李白於便殿草詔時大寒筆凍帝令宫妓十人各執牙筆呵之令白遞取書字送參寥師上人學苦空百念已灰冷劍頭惟一吷焦榖無新穎胡為逐吾輩文字爭蔚炳新詩如玉屑出語便清警退之論草書萬事未嘗屏憂愁不平氣一寓筆所騁頗怪浮屠人視身如丘井頽然寄淡泊誰與發豪猛細思乃不然真巧非幻影欲令詩語妙無厭空且靜靜故了羣動空故納萬境閲世走人間觀身卧雲嶺鹹酸雜衆好中有至味永詩法不相妨此語當更請維摩經如焦谷牙又是身如邱井為老所逼一吷用莊子字蔚炳用周易字並已見韓退之送髙間上人序張旭善草書喜怒窘窮酣醉無聊不平有動於心必於草書發之今間師浮屠氏其為心泊然無所起其於世淡然無所嗜泊與淡相遭頽墮委靡潰敗不可收拾則其於書得無象之乎按公詩乃用其意而反之栁宗元報崔黯書有嗜酸鹹者不得則大戚夜過舒堯文戲作名煥字堯文時為教授見本卷中秋月注先生堂上霜月苦弟子讀書喧兩廡推門入室書縱橫蠟紙燈籠晃雲母先生骨清少眠卧長夜默坐數更鼓耐寒石研欲生冰得火銅瓶如過雨郎君欲出先自贊坐客斂袵誰敢侮明朝阮籍過阿戎應作羲之羡懷祖韓退之桃源歌月明伴宿玉堂空骨冷魂清無夢寐劉筠詩溪箋未破冰生研白樂天懶放詩今早天氣寒郎君應不出自贊字出漢書東方朔傳晋王戎傳阮籍嘗適戎父渾俄頃輒去過戎良久然後出謂渾曰共卿言不如共阿戎談晋王羲之傳謂諸子曰吾不減懷祖而位遇懸邈當由汝等不及坦之故邪王述字懷祖坦之述子也十月十五日觀月黃樓席上次韻中秋天氣未應殊不用紅紗照坐隅山下白雲橫匹素水中明月卧浮圖未成短棹還三峽已約輕舟泛五湖為問登臨好風景明年還憶使君無吳越春秋范蠡扁舟出三江入五湖人莫知其所適答王定民王定民字佐才東萊人俊民弟也開緘奕奕滿銀鉤書尾題詩語更遒八法舊聞宗長史五言今復擬蘇州筆蹤好在留臺寺旗隊遙知到石溝欲寄鼠須并繭紙請君章草賦黃樓晋索靖傳草書之為狀也婉若銀鉤飄若驚鸞法書苑索靖矜其書名曰銀鉤蠆尾又八法起於隸字始自崔張鍾繇傳授李陽冰云王逸少工書十五年中偏工永字以其八法之藝能通一切字長史張旭也韋蘇州注再見鼠須繭紙注見本卷章草漢元帝時史游作急就章解散隸體次韻王廷老退居見寄二首王廷老字伯敡浪蘂浮花不辨春歸來方識歲寒人回頭自笑風波地閉眼聊觀夢幻身北牖已安陶令榻西風還避庾公塵更搔短髮東南望試問今誰裹舊巾韓退之杏花詩浮花浪蘂鎮長有才開還落瘴霧中金剛經一切有為法如夢幻泡影晋王導傳庾亮雖居外鎮而執朝廷之權導內不能平嘗遇西風起舉扇自蔽徐曰元規塵汙人亮字元規接果移花看補籬腰鎌手斧不妨持上都新事長先到老圃間談未易欺釀酒閉門開社甕殺牛留客解耕縻何時得見纎纎玉右手持杯左捧頤鮑明逺詩腰鎌刈葵藿杜子美詩獨繞虛齊徑常持小斧柯唐書劉黑闥屏居漳南諸將詣之黑闥方種蔬即殺耕牛與之共飲次韻顔長道送傅倅兩見黃花掃落英南山山寺遍題名宗成不獨依岑范魯衛終當似弟兄去歲雲濤浮汴泗與君泥土滿衣纓如今别酒休辭醉試聼雙洪落後聲宗岑用東漢宗資成瑨事詳見十一卷趙郎中見和詩注雙洪蓋徐州二水先生徐州鹿鳴燕賦詩叙云俯聼雙洪之號怒即此也施注蘇詩卷十五
