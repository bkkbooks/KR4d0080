body:
  text: 施註蘓詩巻十三宋蘓軾撰施元之原註武進邵長蘅刪補詩四十一首時守彭城作初别子由我少知子由天資和而清好學老益堅表裏漸融眀豈獨為吾弟要是賢友生不見六七年㣲言誰與賡常恐坦率性放縱不自程㑹合亦何事無言對空枰使人之意消不善無由萌森然有六女包裹布與荆無憂賴賢婦藜藿等大烹使子得行意青衫陋公卿明日無晨炊倒牀作雷鳴秋眠我東閣夜聽風雨聲懸知不久别妙理難一作重細評昨日忽出門孤舟轉西城歸来北堂上古屋空崢嶸退食悮相從入門中自驚南都信繁㑹人事水火爭念當閉閣坐頺然寄聾盲妻子亦細事文章固虛名㑹須掃白髪不復用黄精詩小雅雖有兄弟不如友生王註子由題先生像贊亦云人曰吾兄我曰吾師朝野僉載唐徳宗夏中㣲行西明寺宋濟方葛巾捉鼻抄書上曰措大茶求一椀濟曰鼎水方煎有茶可自潑之又問作何事業是何姓行濟曰姓宋第五應進士舉須叟聞呼官家濟皇恐起拜上曰宋五大坦率後聞禮部放榜上令探濟無名曰宋五又坦率也韋𢎞嗣博奕論所志不出一枰之上所務不過方罫之間唐韻枰博局也荘子田子方篇東郭順子其為人也正容以悟物使人之意也消後漢梁鴻傳妻荆釵布裙風雨聲用韋應物詩意王註南都則南京也時子由從張文定簽書南京判為此别也韓集石鼎聨句妄使水火争五代史𢎞肇傳㑹飲王章第蘓逢吉戯之𢎞肇大怒以醜語詬逢吉由是将相如水火杜子美丈人山詩掃除白髪黄精在君看他時氷雪容次韻吕梁仲屯田雨葉風花日夜稀一杯相屬竟何時空虚豈敢酬瓊玉枯朽猶䏻出菌芝門外吕梁從迅急胸中雲夢自逶遲待君筆力追靈運莫負南臺九日期庾信屏風詩風花直亂回唐孟遲懐鄭洎詩風蘭舞幽香雨葉墮寒滴桞子厚與蕭俛書雖朽枿敗腐猶足蒸出芝菌以為瑞物吕梁雲夢注竝見前宋武述征記九月九日王登戯馬臺宴百僚賦詩作者百餘人謝靈運最為工章質夫寄惠崔徽真崔徽註已見玉釵半脱雲垂耳亭亭芙蓉在秋水當時薄命一酸辛千古華堂奉君子水邊何處無麗人近前試㸔丞相嗔不如丹青不觧語世間言語原非眞知君被惱更愁絶巻贈老夫驚老拙為君援茟賦梅花未害廣平心似鐵郭子横洞冥記元鼎元年起招靈閤有神女留一玉釵與帝帝以賜趙偼伃至昭帝元鳯中宫人猶見此釵共謀欲碎之明日視釵匣惟見白燕直飛昇天後宮人作釵因名玉燕釵李賀詩寒鬢斜釵玉燕光華嶽靈姻傳雲髮垂耳李太白詩清水出芙蓉天然去雕餙又李樂府有妾薄命篇杜子美麗人行三月三日天氣新長安水邊多麗人又愼莫近前丞相嗔楊貴妃遺事太液池有千葉白蓮帝指妃示左右曰何如我觧語花杜子美絶句江上被花惱不徹無處告訴只顛狂唐皮日休桃花賦序余甞嘉宋廣平之為相貞姿勁質剛態毅狀疑其鐵腸石心不觧吐婉媚詞然梅花賦清便富艶得南朝徐庾體殊不類其為人也王鞏屢約重九見訪既而不至以詩送將官梁交且見寄次韻荅之交頗文雅不類武人家有侍者甚恵麗知君月下見傾城破恨懸知酒有兵老守亡何惟日飲將軍競病自詩鳴花枝不共秋欹帽筆陣空來夜斫營愛惜微官將底用他年只好寫銘旌南史江諮議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉唐韓偓詩酒衝愁陣出竒兵日飲競病註竝再見韓退之送孟東野序東野始以其詩鳴其髙出魏晋不懈而及於古杜子美醉歌行筆陣獨掃千人軍呉志甘寕傳受敕出斫敵前營至二更時銜枚出斫敵敵驚動遂退白樂天詩晝聼笙歌夜斫營禮記銘明旌也以死者為不可别已故以其旗識之杜牧之詩黄壌不霑新雨露粉書空換舊銘旌臺頭寺雨中送李邦直赴史館分韻得憶字人字兼寄孫巨源二首霜林日夜西風急老送君歸百憂集清歌窈眇入行雲雲為不行天為泣紅葉黄花秋正亂白魚紫蟹君須憶憑君説向髯將軍衰鬢相逢應不識杜子美詩悲見生涯百憂集漢元帝紀帝自度曲被歌聲分刌節度窮極幼眇外戚傳武帝悼李夫人賦惟幼眇之相羊註幼眇猶窈窕也列子秦青撫節悲歌聲振林木響遏行雲五行志無雲而雨為雨泣髥将軍注再見白樂天詩相逢應不識滿頷白髭白珥筆西歸近紫宸太平典冊不緣麟付君此事寜論晉載我當時舊過秦門外想無千斛米墓中知有百年人看君兩一作䨇眼明如鏡休把春秋坐素臣文選曹植表執鞭珥筆註戴筆也潘岳贈陸機詩優游省闥珥筆華軒史記孔子世家西狩獲麟曰吾道窮矣乃因史記作春秋晋陳夀傳夀撰三國志時人稱其善敘事有良史之才張華深善之謂夀曰當以晋書相付耳賈誼過秦論史記秦本紀漢書項籍傳皆載其略晋陳夀傳丁儀丁廙有盛名於魏陳夀謂其子曰可覓千斛米當為尊公作佳傳子不與竟不作傳集異記鄭郊過一冢上有竹兩竿青翠可愛吟曰墓上兩竿竹風吹長裊裊乆不能續忽聞冢中人賡之曰下有百年人長眠不知曉王註詩意言必不如陳夀之希求當念墓中之人而發其潛光也韓退之論史書左邱明紀春秋時事以失明杜預左氏傳序説者以為仲尼自衛反魯修春秋立素王邱明為素臣漢昭帝紀大將軍國家忠臣敢有譖毁者坐之公詩案熈寜十年九月内李清臣差知國史軾作詩送清臣云付君此事寜論晋載我當時舊過秦軾於仁宗朝曽進論徃古得失軾妄以賈誼自比意欲李清臣於國史中載軾所進論也代書答梁先此身與世真悠悠蒼顔華髪誰汝留強名太守古徐州忘歸不如楚沐猴魯人豈獨不知邱蹸藉夫子無罪尤異哉梁子清而脩不逺千里從我游瞭然正色懸䨇眸世之所馳子獨不一經通明傳節侯小楷精絶規摹歐公自註梁生學歐陽公書我衰廢學懶且媮畏見問事賈長頭别来紅葉黄花秋夜夢見之起坐愁遺我駮石盆與甌黒質白章聲琳球謂言山石生澗溝追琢尚可王公羞感子佳意能無酬反將木𤓰報珍投學如富貴一作賈在博収仰取俯拾無遺籌道大如天不可求修其可見致其幽願子篤實慎勿浮發憤忘食樂忘憂漢百官表郡守秦官景帝中二年更名太守家語魯人不識孔子聖人乃曰彼東家邱者吾知之矣荘子譲王篇夫子再逐於魯殺夫子者無罪藉夫子者無禁漢韋賢傳號稱鄒魯大儒子𤣥成復以明經位至丞相賢薨諡節侯漢韓信傳媮衣靡食註媮苟且也賈長頭註見十巻贈上天竺辯才詩漢司馬相如傳白質黒章其儀可喜詩大雅追琢其章金玉其相左傳隐三年苟有明信澗谿沼沚之毛可薦於鬼神可羞於王公左太冲蜀都賦蕡實時味王公羞焉詩國風投我以木𤓰報之以瓊琚漢書貨殖傳魯人俗儉嗇而丙氏尤甚家自父兄子弟約頫有拾卬有取九日邀仲屯田為大水所隔以詩見寄次其韻無復龍山對孟嘉西来河伯意雄夸霜風可使吹黄帽公自註舟人黄帽土勝水也樽酒那能泛浪花漫遣鯉魚傳尺素却將燕石報瓊華何時得見悲秋老醉裏題詩字半斜河伯用莊子秋水篇詳七巻八月十五日㸔潮詩註杜子美詩纜侵隄栁繫幔巻浪花浮毛詩國風尚之以瓊華乎而闞子宋之愚人得燕石梧臺之東歸而藏之以為大寳杜九日詩老去悲秋強自寛又詩作詩呻吟内墨淡字欹傾河復并序熙寜十年秋河決澶淵注鉅野入淮泗自澶魏以北皆絶流而濟楚大被其害彭門城下水二丈八尺七十餘日不退吏民疲於守禦十月十三日澶州大風終日既止而河流一枝已復故道聞之喜甚庻幾可塞乎乃作河復詩歌之道路以致民願而迎神休蓋守土者之志也君不見西漢元光元封間河決瓠子二十年鉅野東傾淮泗滿楚人恣食黄河鱣萬里沙囘封禪罷初遣越巫沈白馬河公未許人力窮薪芻萬計隨流下吾君仁聖如帝堯百神受職河神驕帝遣風師下約束北流夜起澶州橋東風吹凍收㣲淥神功不用淇園竹楚人種麥滿河淤仰㸔浮槎棲古木溝洫志孝武帝元光中河决瓠子東南注鉅野通於淮泗上使汲黯鄭當時興人徒塞之輒復壞後二十餘年歳因以數不登上既封禪廵祭山川其明年乾封少雨乃使汲仁郭昌發卒數萬塞瓠子决河於是上以用事萬里沙則還自臨决河湛白馬玉璧令羣臣從官自將軍以下皆負薪寘决河是時東郡燒草以故薪柴少而下淇園之竹以為楗帝悼功之不成作歌曰皇謂河公兮何不仁又曰河公許兮薪不屬卒塞瓠子築宫其上名曰宣防桞子厚詩渡頭水落村徑成掩亂浮槎在髙樹登望谼亭此詩墨蹟乃欽宗東宫舊藏今在曽文清家宿嘗刻石餘姚縣治東坡題云僕在彭城大水後登望谼亭偶留此詩已而忘之其後徐人有誦之者徐思之乃知其為僕詩也集中無之以入河復詩後河漲覀来失舊谼孤城渾在水光中忽然歸壑無尋處千里禾麻一半空韓幹馬十四匹二馬並驅攢八蹄二馬宛頸騣尾齊一馬任前雙舉後一馬却避長鳴嘶老髥奚官騎且顧前身作馬通馬語後有八匹飲且行㣲流赴吻若有聲前者既濟出林鶴後者欲渉鶴俛啄最後一匹馬中龍不嘶不動尾摇風韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當㸔韓非子伯樂敎二人相踶馬相與之簡子廐觀馬一人舉踶馬其一人從後而循之三撫其尻而馬不踶此自以為失相其一人曰子非失相也此其為馬也踒肩而腫膝夫踶馬也者舉後而任前踵膝不可任也故後不舉王充論衡漢楊翁偉乗蹇馬出遇放馬翁偉謂其御亦曰放馬目眇御曰何以知之曰彼罵轅中馬曰蹇此馬罵之曰眇其御徃視之果眇馬也北夢瑣言浙人劉三復能記三生事云曽為馬馬常患渇望驛而嘶傷其蹏則連心痛漢東方朔傳尻益髙者鶴俛啄也杜子美丹青引斯須九重真龍出一洗萬古凡馬空又天育驃騎歌是何意態雄且傑騣尾蕭梢朔風起有言郡東北荆山下可以溝畎積水因與呉正字王户曹同徃相視以地多亂石不果還游聖女山山有石室如墓而無棺椁或云宋司馬桓魋墓二子有詩次其韻二首按公逰桓山記云元豐二年正月已亥春服既成從二三子云云有詩别見十六巻王注入此悮側手區區未易遮奔流一瞬巻千家共疑智伯初圍趙猶有張湯欲漕斜已坐迂疎来此地分將勞苦送生涯使君下䇿真堪笑隐隐驚雷響踏車時河决水方退諺有側手障黄河之語戰國䇿智子攻趙襄子走晋陽圍而灌之城不浸者三版漢溝洫志有上書欲通襃斜道及漕事下御史大夫張湯言襃水通沔斜水通渭皆可以行船漕上以為然拜湯子卬為漢中守發數萬人作襃斜道五百餘里又待詔賈譲言治河有上中下䇿若乃繕完故堤増卑倍薄勞費無已數逢其害此最下䇿也茫茫清泗遶孤岑歸路相將得暫臨試著芒鞋穿犖确更然松炬照幽深縱令司馬能鑱石奈一作㑹有中郎解摸金强寫蒼崖留歳月他年誰識此時心九域志徐州泗水今呼清河南史顧歡好學而貧夕則燃松節讀書禮記孔子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也三國陳琳為袁紹作檄書言曹操置發丘中郎將摸金校尉所過隳突無骸不露贈寫御容妙善師憶昔射䇿干先皇珠簾翠幄分兩廂紫衣中使下傳詔跪奉冉冉聞天香仰觀眩晃目生暈但見曉色開扶桑迎陽晚出歩就坐絳紗玉斧光照廊野人不識日月角仿髴尚記重瞳光三年歸來真一夢橋山松檜凄風霜天容玉色誰敢畫老師古寺晝閉一作閑房夢中神授心有得覺來信手筆已忘幅巾常服儼不動孤臣入門涕自滂元老侑坐鬚睂古虎臣立侍一作侍立冠劍長平生慣寫龍鳯質肎顧草間猿與麞都人踏破鐵門限黄金白璧空堆牀爾来摹冩亦到我謂是先帝白髮郎不須覽鏡坐自了明年乞身歸故郷西京雜記漢昭陽殿織珠為簾左思呉都賦藹藹翠幄爾雅東西廂謂之序楚辭九歌暾將出兮東方照吾檻兮扶桑迎陽禁中門名唐唐儉傳髙祖嘗召訪之儉曰公日角龍庭姓恊圗讖係天下望乆矣漢項羽傳舜重瞳子項羽亦重瞳子史記黄帝崩葬橋山詩國風涕泗滂沱唐書太宗方四歳有書生相之曰龍鳯之姿天日之表必能濟世安民李揆傳龍章鳯姿尚不見用麞頭鼠目子乃求官耶文房四譜隋僧智永善書人求題頭門限穿穴乃以鐵葉裹之號鐵門限白髪郎用顔駟事詳十一巻董儲郎中詩註杜子美詩上疏乞骸骨黄冠歸故鄉哭刁景純刁景純名約丹徒人少卓越刻苦學問能文章始應舉京師與歐陽永叔富彦國聲譽相髙下天聖二年登進士第屈於為郎施不大耀士友歎惜而景純未嘗以為恨好急人之難海内識與不識多歸之不治産業賔客故人常滿其門尊酒燕娱無虗時重義輕施有古人之風夀八十四讀書想前輩每恨生不早紛紛少年場猶得見此老此老如松柏不受霜雪槁直從毫末中自養到合抱宏材乏近用千歳自枯倒文章餘正始風節貫華皓平生為人耳自為薄如縞是非雖難齊反覆㸔愈好前年旅呉越把酒慶夀考扣門無晨夜百過迹未掃但知從徳公未省厭丘嫂别時公八十後㑹知難保昨日故人書連年䘮翁媪公自註景純妻先亡傷心范橋水漾漾舞寒藻華堂不見人瘦馬空戀皁我欲江東去匏樽酌行潦鏡湖無賀監慟哭稽山道忍見萬松岡荒池沒秋草老子合抱之木生於毫末晋衛玠傳謝鯤雅重玠相見欣然言論彌日王敦曰不意永嘉之末復聞正始之音再見徳公詳見十一巻題藏春塢詩註漢楚元王傳髙祖微時常避事時時與賓客過其邱嫂食嫂厭叔與客来陽為羮盡轑釜客以故去已而視釜有羮由是怨嫂范橋潤州范公橋以文正公得名揚雄方言梁宋齊楚之間謂櫪曰皁唐書賀知章字季眞天寳初上章請度為道士有詔賜鏡湖剡川一曲李白詩欲向江東去定將誰舉杯稽山無賀老卻棹酒船回晋阮籍傳車迹所窮輒慟哭而返萬松岡在景純藏春塢見八巻景純見和詩答呂梁仲屯田亂山合沓圍彭門官居獨在懸水村公自註懸水村吕梁地名居民蕭條雜麋鹿小市冷落無雞豚黄河西来初不覺但訝清泗流奔渾夜聞沙岸鳴罋盎曉㸔雪浪浮鵬鵾吕梁自古喉吻地萬頃一抹何由吞坐觀入市巻閭井吏民走盡餘王尊計窮路斷欲安適吟詩破屋愁鳶蹲歳寒霜重水歸壑但見屋瓦留沙㾗入城相對如夢寐我亦僅免為魚黿旋呼歌舞雜詼笑不惜飲釂空缾盆念君官舍氷雪冷新詩美酒聊相温人生如寄何不樂任使絳蠟燒黄昏宣房未築淮泗滿故道堙滅瘡痍存明年勞苦應更甚我當畚鍤先黥髠付君萬指伐頑石千鎚雷動蒼山根髙城如鐵洪口快談笑卻掃㸔崩奔農夫掉臂免狼顧秋榖布野如雲屯還須更置軟脚酒為君擊鼓行金樽韓退之詩餘瀾怒不已喧聒鳴罋盎漢嚴延年傳河南天下喉咽也顔師古曰言其所在襟要如人體之有喉咽也漢王尊傳為東郡太守河水盛溢泛浸瓠子金堤老弱奔走尊投沈白馬祀水神河伯尊執圭璧使巫䇿祝請以身塡金堤因止宿堤上堤壊吏民皆奔走唯一主簿泣在尊旁立不動而水波稍卻囬還杜子美𦍑村詩夜闌更秉燭相對如夢寐左傳昭二年劉子曰微禹吾其魚乎禮記盛於盆尊於缾杜子美遭田父泥飲詩叫婦開大缾盆中為吾取宣房卽宣防見本巻河復詩註又瓠子歌曰齧桑浮兮淮泗滿謝靈運詩圻岸屢崩奔軟腳字見唐書楊國忠傳詳五巻鹽官部役戲呈同事詩註張寺丞益齋張寺丞名恕字忠甫文定公安道子張子作齋舍而以益為名吾聞之夫子求益非速成譬如逺游客日夜事征行今年適燕薊明年走蠻荆東觀盡滄海西渉渭與涇歸来閉户坐八方在軒庭又如學醫人識病由飽更風雨晦明滛跛躄瘖聾盲虗實在其脉静躁在其情榮枯在其色夀夭在其形苟能閲千人望見知死生為學務日益此言當自程為道貴日損此理在既盈願言書此詩以為益齋銘左傳昭元年天有六氣淫生六疾氣曰隂陽風雨晦明也分為四時序為五節過則為災史記扁鵲傳扁鵲望見桓侯而退走曰疾在骨髓雖司命無奈之何互見四巻和劉道原詠史詩註老子為學日益為道日損答孔周翰求書與詩身閑曷不長閉口天寒正好深藏手吟詩寫字有底忙未脱多生宿塵垢不䝉譏訶子厚疾反更刻畫無鹽醜征西自有家雞肥太白應驚飯山瘦與君相從知幾日東風待得花開否撥棄萬事勿復談百觚之後那詞一作辭酒史記張儀傳願陳子閉口無復言韓退之詩有底忙時不肎来栁子厚荅崔書凡人好辭工書皆病癖也吾不幸蚤得二病學道以来日思砭鍼攻熨卒不能去吾子乃始欽欽思易吾病不亦惑乎又互見二巻石蒼舒醉墨堂詩註晋周顗傳庾亮謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施家雞詳八巻栁氏二外甥求筆跡詩註飯山瘦用李白飯顆山頭詩意詳九巻次韻沈長官註孔叢子昔平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鐘孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲子何辭焉送李公恕赴闕君才有如切玉刀見之凛凛寒生毛願隨壯士斬蛟蜃不願腰間纒錦絛用違其才志不展坐與胥吏同疲勞忽然眉上有黄氣吾君漸欲収英髦立談左右俱動色一語徑破千言牢我頃分符在東武脱畧萬事惟嬉遨盡壞屏障通内外仍呼騎曹為馬曹君為使者見不問反更對飲持䨇螯酒酣箕坐語驚衆雜以嘲諷窮詩騷世上小兒多忌諱獨能容我眞賢豪為我買田臨汶水逝將歸去誅蓬蒿安能終老塵土下俯仰隨人如桔橰列子湯問篇周穆王征西戎西戎獻錕鋙之劍用之切玉如切泥焉東方朔十洲記亦云呂氏春秋荆有佽飛者得寳劍於江干渡中流兩蛟繞舟佽飛㧞劍赴江刺蛟殺之王粲刀銘陸剸犀兕水截鯨鯢杜甫大食寳刀詩蒼水使者捫赤絛晋殷浩傳桓温曰浩有徳有言向使作令僕足以儀刑百揆朝廷用違其才韓退之郾城晚飲詩城上赤雲呈勝氣眉間黄色見歸期韓退之淮西碑萬口和附并為一談牢不可破晋阮籍傳文帝輔政籍嘗從容言於帝曰籍曾逰東平樂其風土帝大悦即拜東平相籍乘驢到郡壊府舍屏障内外相望法令清簡旬日而還馬曹王子猷事對飲用曹參吏舍歌呼意持螯用畢卓語竝見前註漢書張耳傳髙祖箕踞罵詈註箕踞者謂曲兩腳其形如箕荘子天運篇子獨不見夫桔橰者乎引之則俯舍之則仰春菜蔓菁宿根已生葉韮牙戴土拳如蕨爛蒸香薺白魚肥碎㸃青蒿凉餅滑宿酒初消春睡起細履幽畦掇芳辣茵陳甘菊不負渠鱠縷堆槃纖手抹北方苦寒今未巳雪底波稜如鐵甲豈如吾蜀富冬蔬霜葉露芽寒更茁乆抛松葛猶細事苦筍江豚那忍説明年投劾徑須歸莫待齒摇并髮脱禮坊記註葑蔓菁也陳宋之間謂之葑劉夢得嘉話録諸葛亮所止令軍士獨種蔓菁三蜀之人今呼為諸葛菜南史周顒傳文惠太子問顒菜食何味最勝顒曰春初蚤韮秋末晚菘李白詩不知舊行徑初拳幾枝蕨杜牧晚晴賦雨晴秋容新沐兮折遶園而細履劉禹鍚嘉話菜之波稜者本西竺國僧自波稜國将其子来如苜蓿因張騫而至也韓退之祭十二郎文吾年未四十而視茫茫而髪蒼蒼而齒牙動摇又齒落詩餘在皆動摇盡落應始止送鄭户曹鄭户曹名瑾彭城人遊遍錢塘湖上山歸来文字帯芳鮮羸僮瘦馬從吾飲陋巷何人似子賢公業有田常乏食廣文好客竟無氊東歸不趁花時節開盡春風誰與姸後漢鄭太字公業結交賢豪家富於財有田四百頃而食常不足唐鄭䖍傳𤣥宗置廣文館以䖍為博士故號鄭廣文在官貧約杜甫戲簡以詩曰才名四十年坐客寒無氊䖍州八境圖八首并引南康八境圖者太守孔君之所作也君既作石城即其城上樓觀臺榭之所見而作是圖也東望七閩南望五嶺覽羣山之參差俯章貢之奔流雲煙出沒草木蕃麗邑屋相望雞犬之聲相聞觀此圖也可以茫然而思粲然而笑慨然而歎矣蘇子曰此南康之一境也何從而八乎所自觀之者異也且子不見夫日乎其旦如槃其中如珠其夕如破璧此豈三日也哉苟知夫境之為八也則凡寒暑朝夕雨暘晦明之異坐作行立哀樂喜怒之接於吾目而感於吾心者有不可勝數者矣豈特八乎如知夫八之出乎一也則夫四海之外詼詭譎怪禹貢之所書鄒衍之所談相如之所賦雖至千萬未有不一者也後之君子必將有感於斯焉乃作詩八章題之圖上坐㸔奔湍一作灘遶石樓使君髙㑹百無憂三犀竊鄙秦太守八詠聊同沈隐侯華陽國志秦孝文王時李冰為蜀守作石犀牛以厭水精穿石犀谿於江南岸杜子美石犀行君不見秦時蜀太守刻石立作三犀牛婺州圖經八詠樓在州南碑宋沈約文南史沈約諡曰隐集中有東陽八詠濤頭寂寞打城還章貢臺前暮靄寒勌客登臨無限思孤雲落日是長安劉禹鍚詩山圍故國周遭在潮打空城寂寞回南康記贑縣東南山有臺方數丈有自然霞如屋形章貢壹乃章貢二水合流處李太白詩長空去鳥沒落日孤雲還白鵲樓前翠作堆縈雲嶺路若為開故人應在千山外不寄梅花逺信来朱樓深處日㣲明皁葢歸時酒半醒薄暮樵漁人去盡碧谿青嶂遶螺亭寰宇記昔有貧女暮宿亭採螺見衆螺張口嘬其肉貧女死因葬水旁其冡化為巨石號曰螺亭石山在贑縣東南二十里使君那暇日参禪一望叢林一悵然成佛莫敎靈運後著鞭從使祖生先大荘嚴論如是衆生者乃勝智叢林一切諸善行運集在其中南史謝靈運傳㑹稽太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應須慧業丈人生天當在靈運前成佛必在靈運後晋劉琨傳與祖逖為友聞逖被用與親故書曰吾枕戈待旦嘗恐祖生先吾著鞭卻從塵外望塵中無限樓臺煙雨濛山水照人迷向背只尋孤塔認西東杜牧之江南春詞南朝四百八十寺多少樓臺烟雨中詩豳風零雨其濛唐皇甫冉詩山川迷向背風霧失旌旗煙雲縹緲鬱孤臺積翠浮空雨半開想見之罘觀海市絳宫明滅是蓬萊漢郊祀志八神五曰陽主祠之罘山史記天官書海傍蜃氣象樓臺廣野氣成宫闕之罘在登州海中時時有雲氣如宫室臺觀城堞人物車馬冠盖歴歴可見謂之海市回峰亂嶂鬱參差雲外髙人世得知誰向空山弄明月山中木客解吟詩徐鉉帖鄱陽山中有木客自言秦時造阿房宫者食木實遂得不死時就民間飲酒為詩一章云酒盡君莫沽壺傾我當發城市多囂塵還山弄明月顧況集亦云南康記贑縣東南山上有臺風雨之後景氣明淨頗聞山上鼔吹聲即山都木客吟唱也讀孟郊詩二首夜讀孟郊詩細字如牛毛寒燈照昏花佳䖏時一遭孤芳擢荒穢苦語餘詩騷水清石鑿鑿湍激不受篙初如食小魚所得不償勞又似煮彭􅒹竟日嚼空螯要當鬪僧清未足當韓豪人生如朝露日夜火消膏何苦將兩耳聼此寒蟲號不如且置之飲我玉色一作巵醪杜子美述古詩秦時任商鞅法令如牛毛古樂府艷歌行水清石自見詩國風白石鑿鑿唐書韓愈一見孟郊為㤀形交賈島亦韓門弟子島初為浮屠名無本皆附愈傳我憎孟郊詩復作孟郊語饑腸自鳴喚空壁轉饑鼠詩從肺腑出出輙愁肺腑有如黄河魚出膏以自煮尚爱銅斗歌鄙俚頗近古桃弓射鴨罷獨速短蓑一作莎舞不憂踏船翻踏浪不踏土呉姬霜雪白赤腳浣白紵嫁與踏浪兒不識離别苦歌君江湖曲感我長羈旅孟東野詩銅斗飲江酒手拍銅斗歌儂是拍浪兒飲則拜浪婆腳踏小船頭獨速舞短莎又短蓑不怕雨白鷺相争飛短楫畫菰蒲鬪作豪横歸笑伊水健兒浪戰求光輝不如竹枝弓射鴨無是非又射鴨復射鴨鴨驚菰蒲頭鴛鴦亦零落彩色難相求儂是清浪兒每踏清浪逰笑伊鄉貢郎踏土稱風流如何丱角翁至死不裹頭李白通塘曲浦邊清水明素足别有浣紗呉女郎又越女詞耶谿女如雪屣上足如霜東野詩數年伊洛同一旦江湖乖江湖有故荘小女啼喈喈訪張山人得山中字二首魚龍隨水落猿鶴喜君還舊隐邱墟外新堂紫翠間野麋馴杖屨一作履幽桂出榛菅灑掃門前路山公亦爱山公自註張故居為大水所壊新卜此室故居之東韓退之詩豈念幽桂遺榛菅王注山公山簡也公自謂萬木鏁雲龍公自注山名天留與戴公路迷山向背人在瀼西東薺麥餘春雪櫻桃落晚風入城都不記歸路醉眠中南史戴顒常憩京口黄鵠山竹林精舍郡邑志潤州有戴公山註詳八巻同栁子玉遊鶴林招隐詩杜子美䕫州絶句瀼東瀼西一萬家江南江北春冬花送孔郎中赴陜郊孔郎中宗翰巳見十一巻荆林馬上見寄詩註此詩疑其自宻移陕過徐州與先生㑹也驚風擊面黄沙走西出崤函脫塵垢使君来自古徐州聲震河潼殷闗右十里長亭聞鼓角一川秀色明花栁北臨飛檻巻黄流南望青山如峴首東風吹開錦繡谷淥水翻動蒲萄酒訟庭生草數開樽過客如雲牢閉口漢衛青傳大風起砂礫擊面賈誼過秦論秦孝公㩀崤函之固崤謂二殽函謂函谷闗王注古有南徐北徐南徐潤州北徐彭城時自彭城而徃故云古徐潼闗在華州華隂縣河水自龍門南流激華山而東故名河潼庾信哀江南賦十里五里長亭短亭樂府觧題横吹曲有鼓角唐樂令諸道行軍給鼓角三萬人以上角十四具鼓二十四面㐮沔記峴山在㐮陽下臨漢王注陕州去郡二十里有山亦名峴以其狀類峴首故得名與梁左藏㑹飲傅國博家將軍破賊自草檄論詩說劍俱第一彭城老守本虗名識字劣能欺項籍風流别駕貴公子欲把笙歌暖鋒鏑紅斾朝開猛士噪翠帷暮巻佳人出東堂醉卧呼不起嗁鳥落花春寂寂試敎長笛傍耳根一聲吹裂堦前石晋樂廣傳天下言風流者王樂為稱首庾亮與郭㳺書别駕任居刺史之半嵇康傳潁川鍾㑹貴公子也裂石用李謩事已見八巻同栁子玉逰鶴林招隐詩註寒食日答李公擇三絶次韻從来蘇李得名䨇只恐全齊笑陋邦詩似懸河供不辦故欺張籍隴頭瀧王注前漢蘓武李陵能詩謂之蘇李唐蘇味道李嶠俱以文章顯時亦號蘇李又蘇頲李乂對掌文誥明皇謂頲曰前此李嶠蘓味道文擅當時號蘇李今有卿及乂何媿前人哉世説郭子𤣥語議如懸河瀉水注而不竭唐王勃傳張説評楊炯曰文如懸河之不竭瀧韓退之贈張十八詩君乃崑崙渠籍乃隴頭簿書鼛鼓不知春佳句相呼頼故人寒日徳公方上冢歸来誰主復誰賓周禮鼓人以鼛鼓鼓役事德公注屢見廵城已困塵埃眯執扑仍遭蟣蝨緣欲脱布衫携素手試開病眼㸃黄連公自注来詩謂僕布衫督役周禮司空執扑左傳㐮十七年宋平公築臺子罕執扑以行築者而抶其不勉者漢嚴安傳介胄生蟣蝨約公擇飲是日大風先生生長匡廬山山中讀書三十年舊聞飲水師顔淵不知治劇乃所便偷兒夜探赤白丸奮髥忽逢朱子元半年羣盗誅七百誰信家書藏九千春風無事秋月閑紅糚執樂豪且姸紫衫玉帯兩部全琵琶一抹四十絃客来留飲不計錢齊人愛公如子産兒啼卧路呼不還我慙山郡空留連牙兵部吏笑我寒邀公飲酒公無難約束官奴買花鈿薫衣理鬢夜不眠曉来顛風塵暗天我思其由豈坐慳作詩媿謝公笑讙歸来瑟縮愈不安要當啖公八百里豪氣一洗儒生酸公作李氏山房記云李公擇少時讀書於廬山五老峯下白石菴之僧舍公擇既去而山中之人指其居為李氏山房藏書凡九千餘巻漢尹賞傳薛宣舉賞能治劇又長安中閭里少年羣輩殺吏受賕報仇相與探丸為弹得赤丸者斫武吏得黒者斫文吏白者主治䘮漢朱博字子元遷瑯邪太守奮髥抵几斥罷病吏詳已見前潘若冲郡閤雅談髙從晦好弹胡琴天成中王仁裕使荆渚從晦出十妓弹胡琹仁裕有詩曰紅糚齊抱紫檀槽一抹朱絃四十條史記循吏傳子産治鄭死丁壯號哭老人兒啼後漢侯覇傳為臨淮尹政理有能名更始元年遣使徴霸百姓老弱相携號哭遮使者或當道而卧曰願乞侯君復留朞年杜子美偪仄行曉来急雨春風顛俗諺有慳值風嗇值雨之説韓退之詩瑟縮乆不安晋王濟傳王愷以帝舅奢豪有牛名八百里駮常瑩其蹄角濟請以錢十萬與牛對射而賭之一發破的因據胡牀叱左右速探牛心来須臾而至一割便去三國志陳元龍湖海之士豪氣不除詳見前巻次韻荅邦直詩註坐上賦戴花得天字清明初過酒䦨珊折得竒葩晚更姸春色豈闗吾輩事老狂聊作坐中先醉吟不耐欹紗帽起舞從教落酒船結習漸消留不住卻須還與散花天唐白居易傳自號醉吟先生杜子美李尚書聫句數語欹紗帽髙文擲綵牋維摩經維摩詰室有一天女見諸天人説法即以天花散諸菩薩大弟子上花至菩薩即皆墮地至大弟子便著不墮天女曰結習未盡花著身矣結習盡者花不著也夜飲次韻畢推官簿書叢裏過春風酒聖時時且復中紅燭照庭嘶騕褭黄雞催曉唱玲瓏老来漸減金釵興醉後空驚玉筯工公自注畢善篆月未上時應蚤散免敎壑谷問吾公酒聖用徐邈事詳五巻贈孫莘老七絶詩註漢書音義騕䮍神馬也赤喙黒身杜子美詩願隨金騕䮍走置錦屠蘇黄雞用白樂天玲瓏歌詳六巻與臨安令宗人同年劇飲詩註唐舒元輿玉筯篆志秦丞相斯變蒼頡籕文為玉筯篆體尚太古左傳㐮三十年鄭伯有嗜酒為窟室而夜飲朝至未巳朝者曰公焉在其人曰吾公在壑谷又互見前施註蘇詩巻十三
