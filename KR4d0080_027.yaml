  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0080_WYG_027-1a, image: WYG1110/WYG1110-0282a.png}
body:
  text: 施注蘇詩卷十三宋蘇軾撰施元之原注武進邵長蘅刪補詩四十一首時守彭城作初别子由我少知子由天資和而清好學老益堅表裏漸融眀豈獨為吾弟要是賢友生不見六七年微言誰與賡常恐坦率性放縱不自程會合亦何事無言對空枰使人之意消不善無由萌森然有六女包裹布與荆無憂賴賢婦藜藿等大烹使子得行意青衫陋公卿明日無晨炊倒牀作雷鳴秋眠我東閣夜聽風雨聲懸知不久别妙理難一作重細評昨日忽出門孤舟轉西城歸來北堂上古屋空崢嶸退食悮相從入門中自驚南都信繁會人事水火爭念當閉閣坐頺然寄聾盲妻子亦細事文章固虛名會須掃白髮不復用黃精詩小雅雖有兄弟不如友生王注子由題先生像贊亦云人曰吾兄我曰吾師朝野僉載唐德宗夏中微行西明寺宋濟方葛巾捉鼻抄書上曰措大茶求一碗濟曰鼎水方煎有茶可自潑之又問作何事業是何姓行濟曰姓宋第五應進士舉須叟聞呼官家濟皇恐起拜上曰宋五大坦率後聞禮部放榜上令探濟無名曰宋五又坦率也韋𢎞嗣博奕論所志不出一枰之上所務不過方罫之間唐韻枰博局也莊子田子方篇東郭順子其為人也正容以悟物使人之意也消後漢梁鴻傳妻荆叉布裙風雨聲用韋應物詩意王注南都則南京也時子由從張文定簽書南京判為此别也韓集石鼎聨句妄使水火爭五代史𢎞肇傳會飲王章第蘇逢吉戲之𢎞肇大怒以醜語詬逢吉由是將相如水火杜子美丈人山詩掃除白髮黃精在君看他時氷雪容次韻吕梁仲屯田雨葉風花日夜稀一杯相屬竟何時空虛豈敢酬瓊玉枯朽猶能出菌芝門外吕梁從迅急胸中雲夢自逶遲待君筆力追靈運莫負南臺九日期庾信屏風詩風花直亂回唐孟遲懷鄭洎詩風蘭舞幽香雨葉墮寒滴桞子厚與蕭俯書雖朽枿敗腐猶足蒸出芝菌以為瑞物吕梁雲夢注並見前宋武述征記九月九日王登戲馬臺宴百僚賦詩作者百餘人謝靈運最為工章質夫寄惠崔徽真崔徽注已見玉叉半脫雲垂耳亭亭芙蓉在秋水當時薄命一酸辛千古華堂奉君子水邊何處無麗人近前試看丞相嗔不如丹青不解語世間言語原非真知君被惱更愁絶卷贈老夫驚老拙為君援茟賦梅花未害廣平心似鐵郭子橫洞冥記元鼎元年起招靈閣有神女留一玉叉與帝帝以賜趙偼妤至昭帝元鳯中宫人猶見此叉共謀欲碎之明日視叉匣惟見白燕直飛升天後宮人作叉因名玉燕叉李賀詩寒鬢斜叉玉燕光華嶽靈姻傳雲髮垂耳李太白詩清水出芙蓉天然去雕飾又李樂府有妾薄命篇杜子美麗人行三月三日天氣新長安水邊多麗人又愼莫近前丞相嗔楊貴妃遺事太液池有千葉白蓮帝指妃示左右曰何如我解語花杜子美絶句江上被花惱不徹無處告訴只顛狂唐皮日休桃花賦序余嘗嘉宋廣平之為相貞姿徑質剛態毅狀疑其鐵腸石心不解吐婉媚詞然梅花賦清便富艷得南朝徐庾體殊不類其為人也王鞏屢約重九見訪既而不至以詩送將官梁交且見寄次韻答之交頗文雅不類武人家有侍者甚惠麗知君月下見傾城破恨懸知酒有兵老守亡何惟日飲將軍競病自詩鳴花枝不共秋欹帽筆陳空來夜斫營愛惜微官將底用他年只好寫銘旌南史江咨議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉唐韓偓詩酒衝愁陳出竒兵日飲競病注並再見韓退之送孟東野序東野始以其詩鳴其髙出魏晉不懈而及於古杜子美醉歌行筆陳獨掃千人軍吳志甘寧傳受敕出斫敵前營至二更時銜枚出斫敵敵驚動遂退白樂天詩晝聼笙歌夜斫營禮記銘明旌也以死者為不可别已故以其旗識之杜牧之詩黃壤不霑新雨露粉書空換舊銘旌臺頭寺雨中送李邦直赴史館分韻得憶字人字兼寄孫巨源二首霜林日夜西風急老送君歸百憂集清歌窈眇入行雲雲為不行天為泣紅葉黃花秋正亂白魚紫蟹君須憶憑君説向髯將軍衰鬢相逢應不識杜子美詩悲見生涯百憂集漢元帝紀帝自度曲被歌聲分刌節度窮極幼眇外戚傳武帝悼李夫人賦惟幼眇之相羊注幼眇猶窈窕也列子秦青撫節悲歌聲振林木響遏行雲五行志無雲而雨為雨泣髯將軍注再見白樂天詩相逢應不識滿頷白髭白珥筆西歸近紫宸太平典册不緣麟付君此事寧論晉載我當時舊過秦門外想無千斛米墓中知有百年人看君兩一作雙眼明如鏡休把春秋坐素臣文選曹植表執鞭珥筆注戴筆也潘嶽贈陸機詩優遊省闥珥筆華軒史記孔子世家西狩獲麟曰吾道窮矣乃因史記作春秋晉陳夀傳夀撰三國志時人稱其善敘事有良史之才張華深善之謂夀曰當以晉書相付耳賈誼過秦論史記秦本紀漢書項籍傳皆載其略晉陳夀傳丁儀丁廙有盛名於魏陳夀謂其子曰可覓千斛米當為尊公作佳傳子不與竟不作傳集異記鄭郊過一冢上有竹兩竿青翠可愛吟曰墓上兩竿竹風吹長裊裊久不能續忽聞冢中人賡之曰下有百年人長眠不知曉王注詩意言必不如陳夀之希求當念墓中之人而發其潛光也韓退之論史書左邱明紀春秋時事以失明杜預左氏傳序説者以為仲尼自衛反魯修春秋立素王邱明為素臣漢昭帝紀大將軍國家忠臣敢有譖毁者坐之公詩案熙寧十年九月內李清臣差知國史軾作詩送清臣云付君此事寧論晉載我當時舊過秦軾於仁宗朝曽進論往古得失軾妄以賈誼自比意欲李清臣於國史中載軾所進論也代書答梁先此身與世真悠悠蒼顔華髮誰汝留強名太守古徐州忘歸不如楚沐猴魯人豈獨不知邱蹸藉夫子無罪尤異哉梁子清而修不逺千里從我遊瞭然正色懸雙眸世之所馳子獨不一經通明傳節侯小楷精絶規摹歐公自注梁生學歐陽公書我衰廢學懶且偷畏見問事賈長頭别來紅葉黃花秋夜夢見之起坐愁遺我駮石盆與甌黑質白章聲琳球謂言山石生澗溝追琢尚可王公羞感子佳意能無酬反將木瓜報珍投學如富貴一作賈在博收仰取俯拾無遺籌道大如天不可求修其可見致其幽願子篤實慎勿浮發憤忘食樂忘憂漢百官表郡守秦官景帝中二年更名太守家語魯人不識孔子聖人乃曰彼東家邱者吾知之矣莊子讓王篇夫子再逐於魯殺夫子者無罪藉夫子者無禁漢韋賢傳號稱鄒魯大儒子玄成復以明經位至丞相賢薨諡節侯漢韓信傳偷衣靡食注偷苟且也賈長頭注見十卷贈上天竺辨才詩漢司馬相如傳白質黑章其儀可喜詩大雅追琢其章金玉其相左傳隱三年苟有明信澗溪沼沚之毛可薦於鬼神可羞於王公左太沖蜀都賦蕡實時味王公羞焉詩國風投我以木瓜報之以瓊琚漢書貨殖傳魯人俗儉嗇而丙氏尤甚家自父兄子弟約俯有拾卬有取九日邀仲屯田為大水所隔以詩見寄次其韻無復龍山對孟嘉西來河伯意雄夸霜風可使吹黃帽公自注舟人黃帽土勝水也樽酒那能泛浪花漫遣鯉魚傳尺素却將燕石報瓊華何時得見悲秋老醉裏題詩字半斜河伯用莊子秋水篇詳七卷八月十五日看潮詩注杜子美詩纜侵隄栁繫幔卷浪花浮毛詩國風尚之以瓊華乎而闞子宋之愚人得燕石梧臺之東歸而藏之以為大寶杜九日詩老去悲秋強自寬又詩作詩呻吟內墨淡字欹傾河復并序熙寧十年秋河決澶淵注巨野入淮泗自澶魏以北皆絶流而濟楚大被其害彭門城下水二丈八尺七十餘日不退吏民疲於守禦十月十三日澶州大風終日既止而河流一枝已復故道聞之喜甚庶幾可塞乎乃作河復詩歌之道路以致民願而迎神休蓋守土者之志也君不見西漢元光元封間河決瓠子二十年巨野東傾淮泗滿楚人恣食黃河鱣萬里沙回封禪罷初遣越巫沈白馬河公未許人力窮薪芻萬計隨流下吾君仁聖如帝堯百神受職河神驕帝遣風師下約束北流夜起澶州橋東風吹凍收微淥神功不用淇園竹楚人種麥滿河淤仰看浮槎棲古木溝洫志孝武帝元光中河決瓠子東南注巨野通於淮泗上使汲黯鄭當時興人徒塞之輒復壞後二十餘年歲因以數不登上既封禪巡祭山川其明年乾封少雨乃使汲仁郭昌發卒數萬塞瓠子決河於是上以用事萬里沙則還自臨決河湛白馬玉璧令羣臣從官自將軍以下皆負薪置決河是時東郡燒草以故薪柴少而下淇園之竹以為楗帝悼功之不成作歌曰皇謂河公兮何不仁又曰河公許兮薪不屬卒塞瓠子築宫其上名曰宣防桞子厚詩渡頭水落村徑成掩亂浮槎在髙樹登望谼亭此詩墨迹乃欽宗東宫舊藏今在曽文清家宿嘗刻石餘姚縣治東坡題云僕在彭城大水後登望谼亭偶留此詩已而忘之其後徐人有誦之者徐思之乃知其為僕詩也集中無之以入河復詩後河漲覀來失舊谼孤城渾在水光中忽然歸壑無尋處千里禾麻一半空韓幹馬十四匹二馬並驅攢八蹄二馬宛頸騣尾齊一馬任前雙舉後一馬却避長鳴嘶老髯奚官騎且顧前身作馬通馬語後有八匹飲且行微流赴吻若有聲前者既濟出林鶴後者欲涉鶴俯啄最後一匹馬中龍不嘶不動尾搖風韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當看韓非子伯樂教二人相踶馬相與之簡子廄觀馬一人舉踶馬其一人從後而循之三撫其尻而馬不踶此自以為失相其一人曰子非失相也此其為馬也踒肩而腫膝夫踶馬也者舉後而任前踵膝不可任也故後不舉王充論衡漢楊翁偉乘蹇馬出遇放馬翁偉謂其御亦曰放馬目眇御曰何以知之曰彼罵轅中馬曰蹇此馬罵之曰眇其御往視之果眇馬也北夢瑣言浙人劉三復能記三生事云曽為馬馬常患渴望驛而嘶傷其蹄則連心痛漢東方朔傳尻益髙者鶴俯啄也杜子美丹青引斯須九重真龍出一洗萬古凡馬空又天育驃騎歌是何意態雄且傑騣尾蕭梢朔風起有言郡東北荆山下可以溝畎積水因與吳正字王户曹同往相視以地多亂石不果還遊聖女山山有石室如墓而無棺椁或云宋司馬桓魋墓二子有詩次其韻二首按公逰桓山記云元豐二年正月已亥春服既成從二三子云云有詩别見十六卷王注入此悮側手區區未易遮奔流一瞬卷千家共疑智伯初圍趙猶有張湯欲漕斜已坐迂疏來此地分將勞苦送生涯使君下䇿真堪笑隱隱驚雷響踏車時河決水方退諺有側手障黃河之語戰國䇿智子攻趙襄子走晉陽圍而灌之城不浸者三版漢溝洫志有上書欲通褒斜道及漕事下御史大夫張湯言褒水通沔斜水通渭皆可以行船漕上以為然拜湯子卬為漢中守發數萬人作褒斜道五百餘里又待詔賈讓言治河有上中下䇿若乃繕完故堤增卑倍薄勞費無已數逢其害此最下䇿也茫茫清泗繞孤岑歸路相將得暫臨試著芒鞋穿犖確更然松炬照幽深縱令司馬能鑱石奈一作會有中郎解摸金強寫蒼崖留歲月他年誰識此時心九域志徐州泗水今呼清河南史顧歡好學而貧夕則燃松節讀書禮記孔子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也三國陳琳為袁紹作檄書言曹操置發丘中郎將摸金校尉所過隳突無骸不露贈寫御容妙善師憶昔射䇿干先皇珠簾翠幄分兩廂紫衣中使下傳詔跪奉冉冉聞天香仰觀眩晃目生暈但見曉色開扶桑迎陽晚出步就坐絳紗玉斧光照廊野人不識日月角仿佛尚記重瞳光三年歸來真一夢橋山松檜凄風霜天容玉色誰敢畫老師古寺晝閉一作間房夢中神授心有得覺來信手筆已忘幅巾常服儼不動孤臣入門涕自滂元老侑坐鬚睂古虎臣立侍一作侍立冠劍長平生慣寫龍鳯質肯顧草間猿與麞都人踏破鐵門限黃金白璧空堆牀爾來摹寫亦到我謂是先帝白髮郎不須覽鏡坐自了明年乞身歸故鄉西京雜記漢昭陽殿織珠為簾左思吳都賦藹藹翠幄爾雅東西廂謂之序楚辭九歌暾將出兮東方照吾檻兮扶桑迎陽禁中門名唐唐儉傳髙祖嘗召訪之儉曰公日角龍庭姓協圗讖係天下望久矣漢項羽傳舜重瞳子項羽亦重瞳子史記黃帝崩葬橋山詩國風涕泗滂沱唐書太宗方四歲有書生相之曰龍鳯之姿天日之表必能濟世安民李揆傳龍章鳯姿尚不見用麞頭鼠目子乃求官耶文房四譜隋僧智永善書人求題頭門限穿穴乃以鐵葉裹之號鐵門限白髮郎用顔駟事詳十一卷董儲郎中詩注杜子美詩上疏乞骸骨黃冠歸故鄉哭刁景純刁景純名約丹徒人少卓越刻苦學問能文章始應舉京師與歐陽永叔富彥國聲譽相髙下天聖二年登進士第屈於為郎施不大耀士友歎惜而景純未嘗以為恨好急人之難海內識與不識多歸之不治産業賔客故人常滿其門尊酒燕娛無虗時重義輕施有古人之風夀八十四讀書想前輩每恨生不早紛紛少年場猶得見此老此老如松柏不受霜雪稿直從毫末中自養到合抱宏材乏近用千歲自枯倒文章餘正始風節貫華皓平生為人耳自為薄如縞是非雖難齊反覆看愈好前年旅吳越把酒慶夀考扣門無晨夜百過迹未掃但知從德公未省厭丘嫂别時公八十後會知難保昨日故人書連年喪翁媪公自注景純妻先亡傷心范橋水漾漾舞寒藻華堂不見人瘦馬空戀皂我欲江東去匏樽酌行潦鏡湖無賀監慟哭稽山道忍見萬松岡荒池沒秋草老子合抱之木生於毫末晉衛玠傳謝鯤雅重玠相見欣然言論彌日王敦曰不意永嘉之末復聞正始之音再見德公詳見十一卷題藏春塢詩注漢楚元王傳髙祖微時常避事時時與賓客過其邱嫂食嫂厭叔與客來陽為羮盡轑釜客以故去已而視釜有羮由是怨嫂范橋潤州范公橋以文正公得名揚雄方言梁宋齊楚之間謂櫪曰皂唐書賀知章字季真天寶初上章請度為道士有詔賜鏡湖剡川一曲李白詩欲向江東去定將誰舉杯稽山無賀老卻棹酒船回晉阮籍傳車迹所窮輒慟哭而返萬松岡在景純藏春塢見八卷景純見和詩答呂梁仲屯田亂山合沓圍彭門官居獨在懸水村公自注懸水村吕梁地名居民蕭條雜麋鹿小市冷落無雞豚黃河西來初不覺但訝清泗流奔渾夜聞沙岸鳴甕盎曉看雪浪浮鵬鵾吕梁自古喉吻地萬頃一抹何由吞坐觀入市卷閭井吏民走盡餘王尊計窮路斷欲安適吟詩破屋愁鳶蹲歲寒霜重水歸壑但見屋瓦留沙䀶入城相對如夢寐我亦僅免為魚黿旋呼歌舞雜詼笑不惜飲釂空瓶盆念君官舍氷雪冷新詩美酒聊相溫人生如寄何不樂任使絳蠟燒黃昏宣房未築淮泗滿故道堙滅瘡痍存明年勞苦應更甚我當畚鍤先黥髠付君萬指伐頑石千鎚雷動蒼山根髙城如鐵洪口快談笑卻掃看崩奔農夫掉臂免狼顧秋榖布野如雲屯還須更置軟腳酒為君擊鼓行金樽韓退之詩餘瀾怒不已喧聒鳴甕盎漢嚴延年傳河南天下喉咽也顔師古曰言其所在襟要如人體之有喉咽也漢王尊傳為東郡太守河水盛溢泛浸瓠子金堤老弱奔走尊投沈白馬祀水神河伯尊執圭璧使巫䇿祝請以身填金堤因止宿堤上堤壞吏民皆奔走唯一主簿泣在尊旁立不動而水波稍卻回還杜子美羌村詩夜闌更秉燭相對如夢寐左傳昭二年劉子曰微禹吾其魚乎禮記盛於盆尊於瓶杜子美遭田父泥飲詩叫婦開大瓶盆中為吾取宣房即宣防見本卷河復詩注又瓠子歌曰齧桑浮兮淮泗滿謝靈運詩圻岸屢崩奔軟腳字見唐書楊國忠傳詳五卷鹽官部役戲呈同事詩注張寺丞益齋張寺丞名恕字忠甫文定公安道子張子作齋舍而以益為名吾聞之夫子求益非速成譬如逺遊客日夜事征行今年適燕薊明年走蠻荆東觀盡滄海西涉渭與涇歸來閉户坐八方在軒庭又如學醫人識病由飽更風雨晦明淫跛躄瘖聾盲虗實在其脈靜躁在其情榮枯在其色夀夭在其形苟能閲千人望見知死生為學務日益此言當自程為道貴日損此理在既盈願言書此詩以為益齋銘左傳昭元年天有六氣淫生六疾氣曰隂陽風雨晦明也分為四時序為五節過則為災史記扁鵲傳扁鵲望見桓侯而退走曰疾在骨髓雖司命無奈之何互見四卷和劉道原詠史詩注老子為學日益為道日損答孔周翰求書與詩身間曷不長閉口天寒正好深藏手吟詩寫字有底忙未脫多生宿塵垢不蒙譏訶子厚疾反更刻畫無鹽醜征西自有家雞肥太白應驚飯山瘦與君相從知幾日東風待得花開否撥棄萬事勿復談百觚之後那詞一作辭酒史記張儀傳願陳子閉口無復言韓退之詩有底忙時不肯來栁子厚答崔書凡人好辭工書皆病癖也吾不幸蚤得二病學道以來日思砭針攻尉卒不能去吾子乃始欽欽思易吾病不亦惑乎又互見二卷石蒼舒醉墨堂詩注晉周顗傳庾亮謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施家雞詳八卷栁氏二外甥求筆迹詩注飯山瘦用李白飯顆山頭詩意詳九卷次韻沈長官注孔叢子昔平原君與子髙飲強子髙酒曰昔有遺諺堯舜千鐘孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲子何辭焉送李公恕赴闕君才有如切玉刀見之凛凛寒生毛願隨壯士斬蛟蜃不願腰間纒錦絛用違其才志不展坐與胥吏同疲勞忽然眉上有黃氣吾君漸欲收英髦立談左右俱動色一語徑破千言牢我頃分符在東武脫略萬事惟嬉遨盡壞屏障通內外仍呼騎曹為馬曹君為使者見不問反更對飲持雙螯酒酣箕坐語驚衆雜以嘲諷窮詩騷世上小兒多忌諱獨能容我真賢豪為我買田臨汶水逝將歸去誅蓬蒿安能終老塵土下俯仰隨人如桔橰列子湯問篇周穆王征西戎西戎獻錕鋙之劍用之切玉如切泥焉東方朔十洲記亦云呂氏春秋荆有佽飛者得寶劍於江干渡中流兩蛟繞舟佽飛拔劍赴江刺蛟殺之王粲刀銘陸剸犀兕水截鯨鯢杜甫大食寶刀詩蒼水使者捫赤絛晉殷浩傳桓溫曰浩有德有言向使作令僕足以儀刑百揆朝廷用違其才韓退之郾城晚飲詩城上赤雲呈勝氣眉間黃色見歸期韓退之淮西碑萬口和附并為一談牢不可破晉阮籍傳文帝輔政籍嘗從容言於帝曰籍曾逰東平樂其風土帝大悅即拜東平相籍乘驢到郡壞府舍屏障內外相望法令清簡旬日而還馬曹王子猷事對飲用曹參吏舍歌呼意持螯用畢卓語並見前注漢書張耳傳髙祖箕踞罵詈注箕踞者謂曲兩腳其形如箕莊子天運篇子獨不見夫桔橰者乎引之則俯舍之則仰春菜蔓菁宿根已生葉韭牙戴土拳如蕨爛蒸香薺白魚肥碎點青蒿涼餅滑宿酒初消春睡起細履幽畦掇芳辣茵陳甘菊不負渠鱠縷堆槃纖手抹北方苦寒今未巳雪底波稜如鐵甲豈如吾蜀富冬蔬霜葉露芽寒更茁久拋松葛猶細事苦筍江豚那忍説明年投劾徑須歸莫待齒搖并髮脫禮坊記注葑蔓菁也陳宋之間謂之葑劉夢得嘉話録諸葛亮所止令軍士獨種蔓菁三蜀之人今呼為諸葛菜南史周顒傳文惠太子問顒菜食何味最勝顒曰春初蚤韭秋末晚菘李白詩不知舊行徑初拳幾枝蕨杜牧晚晴賦雨晴秋容新沐兮折繞園而細履劉禹鍚嘉話菜之波稜者本西竺國僧自波稜國將其子來如苜蓿因張騫而至也韓退之祭十二郎文吾年未四十而視茫茫而髮蒼蒼而齒牙動搖又齒落詩餘在皆動搖盡落應始止送鄭户曹鄭户曹名瑾彭城人遊遍錢塘湖上山歸來文字帶芳鮮羸僮瘦馬從吾飲陋巷何人似子賢公業有田常乏食廣文好客竟無氊東歸不趁花時節開盡春風誰與姸後漢鄭太字公業結交賢豪家富於財有田四百頃而食常不足唐鄭虔傳玄宗置廣文館以虔為博士故號鄭廣文在官貧約杜甫戲簡以詩曰才名四十年坐客寒無氊虔州八境圖八首并引南康八境圖者太守孔君之所作也君既作石城即其城上樓觀臺榭之所見而作是圖也東望七閩南望五嶺覽羣山之參差俯章貢之奔流雲煙出沒草木蕃麗邑屋相望雞犬之聲相聞觀此圖也可以茫然而思粲然而笑慨然而歎矣蘇子曰此南康之一境也何從而八乎所自觀之者異也且子不見夫日乎其旦如槃其中如珠其夕如破璧此豈三日也哉苟知夫境之為八也則凡寒暑朝夕雨暘晦明之異坐作行立哀樂喜怒之接於吾目而感於吾心者有不可勝數者矣豈特八乎如知夫八之出乎一也則夫四海之外詼詭譎怪禹貢之所書鄒衍之所談相如之所賦雖至千萬未有不一者也後之君子必將有感於斯焉乃作詩八章題之圖上坐看奔湍一作灘繞石樓使君髙會百無憂三犀竊鄙秦太守八詠聊同沈隱侯華陽國志秦孝文王時李冰為蜀守作石犀牛以厭水精穿石犀溪於江南岸杜子美石犀行君不見秦時蜀太守刻石立作三犀牛婺州圖經八詠樓在州南碑宋沈約文南史沈約諡曰隱集中有東陽八詠濤頭寂寞打城還章貢臺前暮靄寒倦客登臨無限思孤雲落日是長安劉禹鍚詩山圍故國周遭在潮打空城寂寞回南康記贑縣東南山有臺方數丈有自然霞如屋形章貢一乃章貢二水合流處李太白詩長空去鳥沒落日孤雲還白鵲樓前翠作堆縈雲嶺路若為開故人應在千山外不寄梅花逺信來朱樓深處日微明皂蓋歸時酒半醒薄暮樵漁人去盡碧溪青嶂繞螺亭寰宇記昔有貧女暮宿亭採螺見衆螺張口嘬其肉貧女死因葬水旁其冡化為巨石號曰螺亭石山在贑縣東南二十里使君那暇日參禪一望叢林一悵然成佛莫教靈運後著鞭從使祖生先大莊嚴論如是衆生者乃勝智叢林一切諸善行運集在其中南史謝靈運傳會稽太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應須慧業丈人生天當在靈運前成佛必在靈運後晉劉琨傳與祖逖為友聞逖被用與親故書曰吾枕戈待旦嘗恐祖生先吾著鞭卻從塵外望塵中無限樓臺煙雨濛山水照人迷向背只尋孤塔認西東杜牧之江南春詞南朝四百八十寺多少樓臺煙雨中詩豳風零雨其濛唐皇甫冉詩山川迷向背風霧失旌旗煙雲縹眇鬱孤臺積翠浮空雨半開想見之罘觀海市絳宫明滅是蓬萊漢郊祀志八神五曰陽主祠之罘山史記天官書海傍蜃氣象樓臺廣野氣成宫闕之罘在登州海中時時有雲氣如宫室臺觀城堞人物車馬冠蓋歷歷可見謂之海市回峰亂嶂鬱參差雲外髙人世得知誰向空山弄明月山中木客解吟詩徐鉉帖鄱陽山中有木客自言秦時造阿房宫者食木實遂得不死時就民間飲酒為詩一章云酒盡君莫沽壺傾我當發城市多囂塵還山弄明月顧況集亦云南康記贑縣東南山上有臺風雨之後景氣明淨頗聞山上鼓吹聲即山都木客吟唱也讀孟郊詩二首夜讀孟郊詩細字如牛毛寒燈照昏花佳處時一遭孤芳擢荒穢苦語餘詩騷水清石鑿鑿湍激不受篙初如食小魚所得不償勞又似煮彭􅒹竟日嚼空螯要當鬪僧清未足當韓豪人生如朝露日夜火消膏何苦將兩耳聼此寒蟲號不如且置之飲我玉色一作巵醪杜子美述古詩秦時任商鞅法令如牛毛古樂府艷歌行水清石自見詩國風白石鑿鑿唐書韓愈一見孟郊為忘形交賈島亦韓門弟子島初為浮屠名無本皆附愈傳我憎孟郊詩復作孟郊語飢腸自鳴喚空壁轉飢鼠詩從肺腑出出輒愁肺腑有如黃河魚出膏以自煮尚愛銅斗歌鄙俚頗近古桃弓射鴨罷獨速短蓑一作莎舞不憂踏船翻踏浪不踏土吳姬霜雪白赤腳浣白紵嫁與踏浪兒不識離别苦歌君江湖曲感我長羈旅孟東野詩銅斗飲江酒手拍銅斗歌儂是拍浪兒飲則拜浪婆腳踏小船頭獨速舞短莎又短蓑不怕雨白鷺相爭飛短楫畫菰蒲鬪作豪橫歸笑伊水健兒浪戰求光輝不如竹枝弓射鴨無是非又射鴨復射鴨鴨驚菰蒲頭鴛鴦亦零落彩色難相求儂是清浪兒每踏清浪逰笑伊鄉貢郎踏土稱風流如何丱角翁至死不裹頭李白通塘曲浦邊清水明素足别有浣紗吳女郎又越女詞耶溪女如雪屣上足如霜東野詩數年伊洛同一旦江湖乖江湖有故莊小女啼喈喈訪張山人得山中字二首魚龍隨水落猿鶴喜君還舊隱邱墟外新堂紫翠間野麋馴杖屨一作履幽桂出榛菅灑掃門前路山公亦愛山公自注張故居為大水所壞新卜此室故居之東韓退之詩豈念幽桂遺榛菅王注山公山簡也公自謂萬木鎖雲龍公自注山名天留與戴公路迷山向背人在瀼西東薺麥餘春雪櫻桃落晚風入城都不記歸路醉眠中南史戴顒常憩京口黃鵠山竹林精舍郡邑志潤州有戴公山注詳八卷同栁子玉遊鶴林招隱詩杜子美夔州絶句瀼東瀼西一萬家江南江北春冬花送孔郎中赴陜郊孔郎中宗翰巳見十一卷荆林馬上見寄詩注此詩疑其自密移陕過徐州與先生會也驚風擊面黃沙走西出崤函脫塵垢使君來自古徐州聲震河潼殷關右十里長亭聞鼓角一川秀色明花栁北臨飛檻卷黃流南望青山如峴首東風吹開錦繡谷淥水翻動蒲萄酒訟庭生草數開樽過客如雲牢閉口漢衛青傳大風起砂礫擊面賈誼過秦論秦孝公據崤函之固崤謂二殽函謂函谷關王注古有南徐北徐南徐潤州北徐彭城時自彭城而往故云古徐潼關在華州華隂縣河水自龍門南流激華山而東故名河潼庾信哀江南賦十里五里長亭短亭樂府解題橫吹曲有鼓角唐樂令諸道行軍給鼓角三萬人以上角十四具鼓二十四面襄沔記峴山在襄陽下臨漢王注陕州去郡二十里有山亦名峴以其狀類峴首故得名與梁左藏會飲傅國博家將軍破賊自草檄論詩説劍俱第一彭城老守本虗名識字劣能欺項籍風流别駕貴公子欲把笙歌暖鋒鏑紅斾朝開猛士噪翠帷暮卷佳人出東堂醉卧呼不起啼鳥落花春寂寂試教長笛傍耳根一聲吹裂階前石晉樂廣傳天下言風流者王樂為稱首庾亮與郭遊書别駕任居刺史之半嵇康傳潁川鍾會貴公子也裂石用李謨事已見八卷同栁子玉逰鶴林招隱詩注寒食日答李公擇三絶次韻從來蘇李得名雙只恐全齊笑陋邦詩似懸河供不辦故欺張籍隴頭瀧王注前漢蘇武李陵能詩謂之蘇李唐蘇味道李嶠俱以文章顯時亦號蘇李又蘇頲李乂對掌文誥明皇謂頲曰前此李嶠蘇味道文擅當時號蘇李今有卿及乂何愧前人哉世説郭子玄語議如懸河瀉水注而不竭唐王勃傳張説評楊炯曰文如懸河之不竭瀧韓退之贈張十八詩君乃崑崙渠籍乃隴頭簿書鼛鼓不知春佳句相呼賴故人寒日德公方上冢歸來誰主復誰賓周禮鼓人以鼛鼓鼓役事德公注屢見巡城已困塵埃眯執撲仍遭蟣蝨緣欲脫布衫携素手試開病眼點黃連公自注來詩謂僕布衫督役周禮司空執撲左傳襄十七年宋平公築臺子罕執撲以行築者而抶其不勉者漢嚴安傳介胄生蟣蝨約公擇飲是日大風先生生長匡廬山山中讀書三十年舊聞飲水師顔淵不知治劇乃所便偷兒夜探赤白丸奮髯忽逢朱子元半年羣盜誅七百誰信家書藏九千春風無事秋月間紅糚執樂豪且姸紫衫玉帶兩部全琵琶一抹四十絃客來留飲不計錢齊人愛公如子産兒啼卧路呼不還我慙山郡空留連牙兵部吏笑我寒邀公飲酒公無難約束官奴買花鈿薰衣理鬢夜不眠曉來顛風塵暗天我思其由豈坐慳作詩愧謝公笑歡歸來瑟縮愈不安要當啖公八百里豪氣一洗儒生酸公作李氏山房記云李公擇少時讀書於廬山五老峯下白石菴之僧舍公擇既去而山中之人指其居為李氏山房藏書凡九千餘卷漢尹賞傳薛宣舉賞能治劇又長安中閭里少年羣輩殺吏受賕報仇相與探丸為彈得赤丸者斫武吏得黑者斫文吏白者主治喪漢朱博字子元遷琅邪太守奮髯抵几斥罷病吏詳已見前潘若沖郡閣雅談髙從晦好彈胡琴天成中王仁裕使荆渚從晦出十妓彈胡琴仁裕有詩曰紅糚齊抱紫檀槽一抹朱絃四十條史記循吏傳子産治鄭死丁壯號哭老人兒啼後漢侯霸傳為臨淮尹政理有能名更始元年遣使徴霸百姓老弱相携號哭遮使者或當道而卧曰願乞侯君復留期年杜子美逼仄行曉來急雨春風顛俗諺有慳值風嗇值雨之説韓退之詩瑟縮久不安晉王濟傳王愷以帝舅奢豪有牛名八百里駮常瑩其蹄角濟請以錢十萬與牛對射而賭之一發破的因據胡牀叱左右速探牛心來須臾而至一割便去三國志陳元龍湖海之士豪氣不除詳見前卷次韻答邦直詩注坐上賦戴花得天字清明初過酒闌珊折得竒葩晚更姸春色豈關吾輩事老狂聊作坐中先醉吟不耐欹紗帽起舞從教落酒船結習漸消留不住卻須還與散花天唐白居易傳自號醉吟先生杜子美李尚書聫句數語欹紗帽髙文擲綵箋維摩經維摩詰室有一天女見諸天人説法即以天花散諸菩薩大弟子上花至菩薩即皆墮地至大弟子便著不墮天女曰結習未盡花著身矣結習盡者花不著也夜飲次韻畢推官簿書叢裏過春風酒聖時時且復中紅燭照庭嘶騕裊黃雞催曉唱玲瓏老來漸減金叉興醉後空驚玉筯工公自注畢善篆月未上時應蚤散免教壑谷問吾公酒聖用徐邈事詳五卷贈孫莘老七絶詩注漢書音義騕裊神馬也赤喙黑身杜子美詩願隨金騕裊走置錦屠蘇黃雞用白樂天玲瓏歌詳六卷與臨安令宗人同年劇飲詩注唐舒元輿玉筯篆志秦丞相斯變蒼頡籕文為玉筯篆體尚太古左傳襄三十年鄭伯有嗜酒為窟室而夜飲朝至未巳朝者曰公焉在其人曰吾公在壑谷又互見前施注蘇詩卷十三
