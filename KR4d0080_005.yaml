body:
  text: 施氏註東坡詩四十二巻鏤版於宋嘉泰間世之學者往往知有其書而流傳絶少商邱公購之數年従江南藏書家得此本又殘闕僅存三十巻是書巻端題吴興施氏吴郡顧氏而不著名而序文目録又闕故覽者莫得其詳也其後得陸放翁所作施注蘇詩序有云施宿武子出其先人司諫公所註數十大編屬某序又云助之以顧子景繁之該洽又按文獻經籍考載司諫名元之字徳初其註詩本末與序合又㕘考郡邑志及它書而三君之名字乃灼然亡疑商邱公幸是書之存而惜其殘缺也進門下士邵長蘅屬以訂補為之綴闕正譌芟蕪省複而所為四十二巻者犂然復完可版行聞之昌黎言用功深者其收名也逺故夫文章之士仰面屋梁搯擢心腎㡬幸得自表見使有身後名耳及觀施氏父子萃數十年心力成是編其用功不為不深而垂四百餘年若滅若沒其姓名亦且従狐狸猯狢吻中抉而出之而厪厪不泯盖其傳之之難如是而註蘇之割裂紕繆如世所傳永嘉王氏本其出施氏下逺甚而顧得行世豈亦有幸不幸與然而書之不足傳者雖幸而見稱於人譬之秋潦汪洋儵歸烏有而其必傳者或忽於近而貴於逺或晦於昔而大顯於今雖經蟲齧蠧蝕之餘而若有物焉馮之不可磨滅註一家詩之興廢其微焉耳然亦有可感者是編出吾知其必将焯然與東坡詩並垂久逺無有能起而盖之者矣康熙己夘孟陬六日毗陵邵長蘅題
