front:
  text: 注蘇例言十二則
  hash: sha256:368fde411f783d0c1b26dff19d9f97fa30f619d503ec2210d41c1af46a8f83f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0080_WYG_007-1a, image: WYG1110/WYG1110-0053a.png}
body:
  text: 邵長蘅子湘纂詩家編年始於少陵當時號為詩史少陵以後惟東坡之詩於編年為宜常跡公生平自嘉祐登朝歷熙寧元豐元祐紹聖三十餘年其間新法之廢興時政之得失賢姦之屢起屢仆按其作詩之嵗月而考之往往槩見事實而於出處大節兄弟朋友過從離合之踪跡為尤詳更千百年猶可想見故編年宜也吳興施氏生南宋之初去公之世未逺其詮訂先後頗為精當卷端數語厪識大略不屑屑排纘年月如黃鶴魯訔之編杜取譏後世識者謂自有蘇注來最稱善本云施注佳處每於注題之下多所發眀少或數言多至數百言或引事以徴詩或因詩以存人或援此以證彼務闡詩㫖非取泛瀾間亦可補正史之闕遺即此一端逈非諸家可及施氏注蘇原釐四十二卷世傳之者絶少商邱公購得宋槧舊本闕十二卷僅存三十卷而蟲蠧腐蝕脫簡又幾什二是書於闕卷則參酌王注徴引羣書以補之脫行殘幅可補者補之不可補則闕之至舊注所未收不敢輕有增益懼失實也計闕一卷三二卷二五卷卷六卷十八卷二十卷十六三五卷九卷三十六卷四三十九卷十卷注家於詩中引用故事每見輒注有尋常習見語而再注三注或至十餘注施氏亦同此弊數見不鮮纍紙幾成駢拇甚無謂也是書力為搔除復出則刪有語非復出而於文義冗龎者亦從刪蓋一書為補為刪之大指如此詩家援据該博使事奧衍少陵之後厪見東坡蓋其學富而才大自經史四庫旁及山經地志釋典道藏方言小說以至嬉笑怒罵里媪竈婦之常談一入詩中遂成典故故曰注詩難而注蘇尤難施氏合父子數十年精力成是一編徴引必著書名詮詁不涉支離詳贍而疏通它家要難度越故注之幸存而於詩意有當者大都不敢輕去王本有可采者間取補入仍標王注以別之是書出而永嘉王氏舊本僅當先揚之糠粃亦大類巳陳之芻狗矣永嘉王氏注本孤行最久幾于家有其書顧其失大要有三不能曲為諱也一曰分門別類失之陋西蜀趙堯卿䕫舊序自言此書分五十門金華吕氏省為三十二門而王氏因之其間篇章割裂首尾衡決有一人一時之酬贈而强分數卷者有一題數詩而强分數卷者玩其標目了無意義且就分門之中亦必顛倒次第晚年之詩或雜於少作鳯翔之什可側於嶺南每一翻閲輒為惛惛讀未數篇遽思掩卷此弊最甚所當急為疏瀹或疑詩賦分類始於昭明何獨於蘇詩苛為責備豫曰分類用之文選巳厭餖飣施之杜蘇確乎不可其故好學深思者能知之一曰不著書名失之疏王注所引故事不標出某書者十之四五僅著書名不標篇名者又居什一中間援引詳眀俾覽者展卷瞭如厪厪及半耳如此注詩寧免疏漏之誚一曰增改舊文失之妄王本所引每因蘇詩句字有改竄古詩以傅㑹之者有改竄子史他書以傅㑹之者魯魚亥豕觸手紛然今直古學振興之日而仍訛襲舛無一人能取而正之可慨也其顯然謬誤者疏録如千條名曰王注正訛附例言後李善注選分疏句下後來注家多宗之施王二家皆然余以謂詩之有注原屬筌蹄既得之後筌蹄可棄况大家之詩每篇有全篇之構法有全篇之神味快讀徐噍乃能得之今以故實橫隔句下使讀者之心目多所扞格因而作者之精神亦為晦蔽僅資漁獵奚裨風雅此不善誦詩者也是書變兩家舊例輒倣須溪劉氏虞山錢氏注杜例離注於全詩之後閲之心目開眀覺蘇詩壁壘為之一變商邱公欣然擊節曰此舉足當玉局功臣抑不愧吳興益友矣引詩注詩始於宋人余謂作者興㑹偶至暗合古人大家往往有此一經注出翻似有意顧近來風尚如是豫亦不能盡略也第取其雅馴者存之聊資吟諷注經刪汰而重復仍有覽者或以為疑不知詩中用事有正用有旁用旁用先注則正用必須再注亦有在此卷證某字在彼卷則證某字事須兩見者亦有此詳彼略義貴互眀或單詞片語偶爾失檢者重復要是不免較之原本十損其七矣是書編纂開於五月蕆事於臘月發凡起例商邱公實總其成其間綴殘葺舊則顧子俠君嗣立經其始校疑訂訛則宋子山言至襄其終至於補者補刪者刪長蘅於此不無小補所愧聞見淺鮮時日趣迫寧免誤漏請俟後賢是冬長蘅適以病歸里末帙闕注四卷三十五三十九三十六四十則屬髙郵李子百藥必恆代箋勞不可沒也乃附著之
