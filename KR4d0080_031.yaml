body:
  text: 施注蘇詩卷十七宋蘇軾撰施元之原注武進邵長蘅刪補詩四十一首起元豐二年巳未守吳興即以是年八月攝赴臺獄十二月謪官黃州洎庚申春自京師赴黃作李公擇過髙郵見施大夫與孫莘老賞花詩憶與僕去嵗會于彭門折花餽筍故事作詩二十四韻見戲依韻奉答亦以戲公擇云汝陽真天人絹帽著紅槿纒頭三百萬不買一笑哂共誇青山峰曲盡花不隕當時謫仙人逸韻謝封畛詩成天一笑萬象解寒窘驚開小桃杏不待雷發軫餘波尚涓滴乞與居易稹爾來誰復見前輩風流盡寂寞兩詩人殘紅對櫻筍饑腸得一醉妙語傳不泯君來恨不與去更復相牽引我老心已灰空煩扇餘燼天游照六鑿虛空掃充牣懸知色竟空那復嗜烏吻蕭然一方丈居士老龎藴散花從滿裓不答天女問故人猶故目怨句寫餘恨疑我此心在遮防費欄楯應虞已斃蛇折尾時一蠢仄聞孟光賢未學處仲忍公自注開閣放出事見本傳寄招應已足左右侍雲鬒何時花月夜羊酒謝不敏此生如幻耳戲語君勿慍應同亡是公一對子虛聽杜子美八哀詩汝陽讓帝子眉宇真天人又詩每䝉天一笑復似物皆春南京羯鼓録汝陽王璡𤣥宗鍾愛之每游幸傾刻不捨璡嘗戴砑絹帽打曲上自摘紅槿花一朵置帽上笪處二物皆滑久之方安遂奏舞山香一曲花不墜落上大笑賜璡金器宋開府與𤣥宗論鼓事上曰頭如青山峰手如白雨㸃即羯鼓之能事山峰取不動雨㸃取碎急互見七卷有美堂暴雨詩注楊妃外傳上羯鼓罷戲秦國請纒頭對曰豈有大唐天子姨無錢用耶遂出三百萬為一局上與妃子在沈香亭命樂工李龜年持金花箋召李白進清平調詞白承詔㫖猶苦宿酲因援筆賦之上命龜年以歌妃笑領歌意尚書禹貢餘波入於流沙左傳僖二十三年晉公子重耳曰其波及晉國者君之餘也唐白居易傳初與元稹酬詠故號元白南史張融卒其從弟弔之曰阿兄風流頓盡王注兩詩人指莘老施大夫也唐宰相有櫻筍厨三月為最盛左傳襄十三年鄭石㚟曰使歸而廢其使怨其君以疾其大夫而相牽引也不猶愈乎莊子庚桑楚身若槁木之枝心若死灰若是者禍亦不至福亦不來左傳成二年齊賓媚人請收合餘燼背城借一六鑿出莊子外物篇注已見史記蘇秦傳饑人饑而不食烏喙者為其愈充腹而與餓死同患也宋齊邱化書躑躅之酒烏喙之脯初噉之若芥再噉之若黍復啖之若丸又啖之若脯淮南子聖人處環堵之室髙誘注曰堵長一丈髙一丈靣環一堵為方丈傳燈録居士龎藴少悟塵勞志求真諦散花天女出維摩經詳見十三卷坐上賦戴花詩注杜子美義鶻行白蛇登其巢吞噬恣朝食又折尾時一掉飢腸皆巳穿晉王敦傳字處仲王愷置酒敦與王導俱在坐有女妓吹笛小失聲韻愷便毆殺一坐改容敦神色自若又愷使美人行酒客飲不盡輒殺之酒至敦故不肯持美人悲懼失色而敦慠然不顧導遂嘆曰處仲若當世心懷剛忍非令終也又嘗荒恣於色體為之弊左右諫之曰此甚易耳乃開後閣驅婢妾數十人放之毛詩鬒髮如雲古樂府有春江花月夜篇漢司馬相如傳亡是公亡是人也又亡是公聽然而笑王鞏清虛堂清虛堂裏王居士閉眼觀身一作心如止水水中照見萬象空敢問堂中誰隱几吳興太守老且病堆案滿前長渴睡願君勿笑反自觀夢幻去來殊未已長疑安石恐不免未信犀首終無事勿將一念住清虛居士與我蓋同耳楞嚴經月光童子白佛言有佛出世名為水天教諸菩薩修習水觀我於是時室中安禪我有弟子窺窗觀室惟見清水遍在室中莊子齊物論南郭子綦隱几而坐再見晉謝安傳安石妻劉惔妹也見家門冨貴而安獨靜退乃曰丈夫不如此也安石掩鼻曰恐不免耳史記陳軫傳謂犀首曰公何好飲也犀首曰無事也再見和孫同年卞山龍洞禱晴吳興連月雨釜甑生魚蛙往問卞山龍曷不安厥家梯空尚巉絶俯視驚谽谺神井湧雲蓋隂崖垂蘚花交流百道泉赴谷走羣蛇不知落何處隱隱如繅車我來叩石户飛鼠翻白鴉寄語洞中龍睡味豈不嘉雨師少弭節雷師亦停檛積水得反壑稻苖出泥沙農夫免菜色龍亦飽豚豭看君擁黃紬髙臥放晚衙戰國䇿知伯攻趙城水不沒者三版臼竈生蛙人馬相食晉成公綏隂霖賦沈竈生蛙中庭運舟釜魚用范丹事已見李白詩仙鼠如白鴉仙經蝙蝠一名仙鼠千歲之後體白如雪棲則倒懸禰衡傳注撾擊鼓杖也禮記歲十二月土反其宅水歸其壑白樂天詩暖閣謀宵宴寒庭放晚衙倦游録文潞公初知榆次縣題詩於新衙鼓上云置向樵樓一任撾檛多檛少不知他如今幸有黃紬被努出頭來道放衙乘舟過賈收水閣收不在見其子三首賈收字耘老吳興人愛酒陶元亮能詩張志和青山來水檻白雨滿漁簔淚垢添丁靣貧低舉案蛾不知何所樂竟夕獨酣歌五桞先生傳性嗜酒而家貧不能恆得親舊知其如此或置酒招之造飲輒盡期在必醉唐書張志和金華人遁居江湖自稱煙波釣徒亦號𤣥真子顔真卿刺湖為更易敝舟浮家泛宅往來苕霅閒嘗撰漁歌兼工山水酒酣䑛筆輒成憲宗命圖其像求之不能致盧同詩莫怪添丁郎淚下作靣垢添丁兒名也白樂天效陶詩客去有餘趣竟夕獨酣歌嫋嫋風蒲亂猗猗水荇長小舟浮鴨緑大杓瀉鵝黃得意詩酒社終身魚稻鄉樂哉無一事何處不清涼楚詞嫋嫋兮秋風詩國風瞻彼淇澳緑竹猗猗杜子美詩水荇牽風翠帶長唐東夷傳髙麗馬訾水出白山色若鴨頭號鴨緑水大杓暗用晉人事鵝黃用杜詩竝已見曳杖青苔岸繫船枯桞根德公方上塜季路獨留言已占蒲魚港更開松菊園從兹來往數兒女自譍門襄陽記司馬德操詣龎公值其渡沔上先人墓注再見陶潛歸去來辭三徑就荒松菊猶存杜詩曬藥能無婦譍門幸有兒晉書李密傳譍門無三尺之童次韻孫祕丞見贈感概清衷似變風老於詩句耳偏聰迂疏自笑成何事冷淡誰能用許功不怕飛蚊如立豹肯隨白鳥過垂虹吟哦相對忘三伏擬泛冰溪入雪宫公自注湖州多蚊蚋豹腳尤毒垂虹吳江亭名冷淡用白樂天泠淡生活語詳見十卷游盧山次韻夏小正白鳥蚊蚋也金樓子白鳥蚊也齊桓公臥柏寢謂仲父曰一物失所寡人悒悒今白鳥營營是必饑耳因開翠紗厨進之厯忌釋伏者何也金氣伏藏之日也金畏於火故至庚日必伏隂陽書後夏至後第三庚為初伏四庚為中伏立秋後初庚為終伏故謂之三伏王注世謂湖州為水精宫言其四靣皆水雪宫借用孟子字與客游道場何山得鳥字清溪到山盡飛路盤空小紅亭與白塔隱見喬木杪中休得小菴孤絶寄雲表洞庭在北户雲水天渺渺菴僧俗緣盡淨業洗未了十年畫鵲竹益以詩自繞髙堂儼像設禪室各深窈奔泉何處來華屋過溪沼何山隔幽谷去路清且悄長松度翠蔓絶壁挂啼鳥我友自杭來尚歎所厯少歸途風雨作一洗紅日燎俄驚萬竅號黑霧卷蓬蓼舟人紛變色坐羡輕鷗矯我獨喚酒杯醉死勝流殍書生例强很造物空煩擾更將掀舞勢把燭畫風篠美人為破顔正似腰支嫋明朝更陳迹清景墮空杳作詩記餘歡萬古一昏曉吳興統記郡有五亭曰白蘋亭集芳亭山光亭朝發亭碧波亭又有白塔巷有白石塔在焉因名楚辭招魂像設君室靜閒安些括地志何山本名金蓋山晉何楷居此習業後為吳興太守改為何山唐傳奕傳自為墓志云青山白雲人也以醉死僕去杭五年吳中仍歲大饑疫故人往往逝去聞湖上僧舍不復往日繁麗獨淨慈本長老學者益盛作詩寄之來往三吳一夢閒故人半作冢纍然獨依舊社傳真法要與遺民度厄年趙叟近聞還印綬竺翁先已反林泉何時策杖相隨去任性逍遙不學禪朱長文吳郡圖經續記漢永建四年分㑹稽為吳郡以浙江中流為界晉宋齊梁陳之閒雖頗割地而不改與吳興丹陽號為三吳神仙傳丁令威云何不學仙冢纍纍左傳閔二年衛之遺民男女七百有三十人漢王莽傳莾下書曰豫遭陽九之厄百六之㑹國用不足民人騷動今厄㑹巳度趙叟謂趙清獻公抃前一歲以宫師致仕竺翁指淨慈本長老舶趠風並引吳中梅雨既過颯然清風彌旬歲歲如此湖人謂之舶趠風是時海舶初回云此風自海上與舶俱至云爾三旬已過黃梅雨萬里初來舶趠風幾處縈回度山曲一時清駛滿江東驚飄蔌蔌先秋葉喚醒昏昏嗜睡翁欲作蘭臺快哉賦卻嫌分别問雌雄宋玉風賦楚襄王遊於蘭臺之宫有風颯然而至乃披襟當之曰快哉此風寡人所與庶人共者耶玉對曰此獨大王之風耳庶人安得而共之曰豈有說乎玉曰發明耳目寧體便人此大王之雄風啖齰嗽獲死生不卒此庶人之雌風丁公默送蝤蛑溪邊石蟹小如錢喜見輪囷赤玉盤半殼含黃宜㸃酒兩螯斫雪勸加餐蠻珍海錯聞名久怪雨腥風入坐寒堪笑吳興饞太守一詩換得兩尖團胡越風物志蝤蛑並􅚺十足生海邉泥穴中潮退探取之四時常有雌者厴大而肥重者踰數斤去厴渾煮熟分擘薦酒切為羔其小而黃者謂之石蝤蛑肉硬厴於檢切酉陽雜爼蝤蛑大者長尺餘兩螯最强鄮縣昔有人於水際泥穴探取之為螯所翦夾有頃而死至今呼此為蝤蛑洲送孫著作赴考城兼寄錢醇老李邦直二君於孫處有書見及使君間如雲欲出誰肯伴清風獨無事一嘯亦可喚來從白蘋洲吹我明月觀門前逺行客青衫流白汗問子何匆匆王事不可緩故人錢與李清廟兩圭瓚蔚為萬乘器尚記溝中斷子亦東南珍價重不可算别情何以慰酒盡對空案惟持一榻凉勸子巾少岸此風䢷復有塵土飛灰炭欲寄二大夫發發不可絆後漢方術傳趙炳嘗臨水求度船人不和之炳乃張蓋坐其中長嘯呼風亂流而濟注和猶許也俗本作知者誤李方直白蘋亭記洲在郡城南東亂霅溪據洲之陽揭大亭一焉一曰梁桞惲為吳興太守賦詩於此因以名洲清廟詩頌篇名尚書平王錫晉文侯秬鬯圭瓚孔氏云以圭為杓柄謂之圭瓚漢鄒陽傳蟠木根柢輪囷離竒而為萬乘器者以左右先為之容也莊子天地篇百年之木破為犧樽青黃而文之其斷在溝中比犧樽於溝中之斷則美惡有閒矣其於失性一也詩小雅南山烈烈飄風發發泛舟城南㑹者五人分韻賦詩得人皆苦炎字四首城中樓閣似魚鱗不見清風起白蘋試選苕溪最深處仍呼我輩不羈人窺船野鶴何曽下見燭飛蟲空自馴繞郭荷花一千頃誰知六月下塘春劉禹錫湖州詩酒對青山月琴韻白蘋風孟東野送陸暢歸湖州詩渺渺霅溪前白蘋多清風韓退之送惠師詩惠師浮屠者乃是不羈人白樂天餘杭詩繞郭荷花三十里按今震澤以南派太湖之水亂苕霅二溪以通舟楫東盡吳興西盡餘杭名曰下塘苦熱誠知處處皆何當危坐學心齊海螯要共詩人把溪月行遭霧雨霾鄉國飄零斷書信弟兄流落隔江淮便應築室苕溪上荷葉遮門水浸階管子弟子職篇危坐鄉師顔色毋怍後漢茅容避雨樹下危坐愈恭莊子人聞世顔回曰敢問心齊仲尼曰唯道集虛虛者心齊也把螯用畢卓左手持蟹螯語注巳見紫蟹鱸魚賤如土得錢相付何曽數碧筒時作象鼻彎白酒微帶荷心苦運肘風生看斫鱠隨刀雪落驚飛縷不將醉語作新詩飽食應慙腹如鼓後漢謡河間詫女工數錢酉陽雜爼魏正始中鄭公慤守濟南夏日率僚佐避暑於歷城之北使君林下以大荷葉酌酒以簪刺其心令與柄通莖上輪囷如象鼻傳飲之名碧筒杯歷下學之言酒味雜蓮氣香冷勝於冰竇子野酒譜亦云白樂天詩味苦蓮心小漿甛蔗節稠杜子美設鱠歌無聲細下飛碎雪又詩刀鳴繪縷飛張景陽七命乃命支離飛霜鍔紅肌綺散素膚雪落酉陽雜爼南孝亷者善斫鱠縠薄絲縷因㑹客忽雷震鱠悉化為蝴蝶飛去橋上游人夜未厭共依水檻立風簷樓中煮酒初嘗芡月夜新粧半出簾南郭清游繼顔謝北窗歸臥等羲炎人間寒熱無窮事自笑疏頑不受痁顧况湖州刺史聽記在晉則謝安謝萬王羲之獻之國朝則顔魯公左傳昭二十年齊侯疥遂痁杜預曰痁瘧也後漢景丹傳壯士不病瘧贈王郎一首一作與王郎夜飲井水此詩墨蹟刻石成都帖而集中失載王郎乃子由壻子立也是時從先生於吳興吳興六月水泉溫千頃菰蒲聚鬭蚊此井獨能深一丈闕一作源龍如我亦知君次韻李公擇梅花詩人固長貧日午饑未動偶然得一飽萬象困嘲弄尋花不論命愛雪長忍凍天公非不憐聽飽即喧閧君為三郡守所至滿賓從江湖常在眼詩酒事豪縱奉使今折磨清比於陵仲永懷茶山下擕妓修春貢更憶檻泉亭插花雲髻重蕭然臥灊麓愁聽春禽哢忽見早梅花不飲但孤諷詩成獨寄我字字愈頭痛嗟君本侍臣筆槖從上雍脫鞾吟芍藥給札賦雲夢何人慰流落嘉花天為種杯傾笛中吟帽拂果下鞚感時念羈旅此意吾儕共故山亦何有桐花集么鳯君亦憶匡廬歸掃藏書洞何當種此花各抱漢隂罋韓退之嘲少年詩直把春償酒都將命乞花孟東野詩文士莫辭酒詩人命屬花髙士傳陳仲字子終適楚居於陵列女傳楚王欲以子終為相入告於妻妻曰亂世多害於是相與逃而為人灌園張君房脞說湖州長城縣啄木嶺金沙泉每歲造茶之所也泉處沙中居常無水湖常二郡守至於境㑹亭具犧牲拜敕祭泉其夕清溢及造茶畢水即微減供堂者畢水已半之太守造畢即涸矣守或還斾稽晚則有風雷之變云爾雅檻泉正出正出者湧出也三國志魏太祖先苦頭風臥讀陳琳所作檄翕然而起曰此愈我病數加厚賜見王粲傳注漢趙充國傳張安世夲持槖簪筆事孝武帝數十年注槖契囊也近居負槖簪筆從備顧問或有所紀也漢司馬遷傳報任安書云迫季冬僕又薄從上上雍楊妃外傳開元中植木芍藥於沈香亭前㑹花繁開召李白立進清平調詞上自是顧李翰林異于他學士㑹髙力士以脫鞾為恥摘其詞以激楊妃帝欲官白妃輒沮止漢司馬相如傳請為天子游獵之賦上令尚書給筆札賦云楚有七澤嘗見其一未覩其餘也臣之所見蓋特其小小者爾名曰雲夢雲夢者方九百里杜荀鶴梅花詩謝公吟賞愁飄落可得更拈長笛吹托遺蜀州紅梅閣東壁有詩憑仗髙樓莫吹笛大家留取倚䦨干因笛中有落梅曲故云後漢濊貃獻果下馬高三尺乘之可於果樹下行王注西蜀有桐花鳥似鳯而小人謂之倒挂子先生梅詞所謂倒挂緑毛么鳯是也先生李氏山房記公擇少時讀書於廬山五老峰下白石菴之僧舍藏書凡九千餘卷莊子天地篇漢隂丈人方將為圃畦鑿隧而入井抱罋而出灌搰搰然用力多而見功寡送淵師歸徑山我昔嘗為徑山客至今詩筆餘山色師住此山三十年妙語應須得山骨溪城六月水雲蒸飛蚊猛捷如花鷹羡師方丈冰雪冷蘭膏不動長明燈山中故人知我至爭來問訊今何似為言百事不如人兩眼猶能書細字公自注徑山夏無蚊余舊詩云問龍乞水歸洗眼欲看細字銷殘年傳燈録逹摩欲返西竺命門人各言所得乃謂道育曰汝得吾骨最後慧可禮拜依位而立祖曰汝得吾髓送表忠觀錢道士歸杭並引通教自杭來見余於吳興問觀亦卒工乎曰未也杭人比歲不登莫有助我者余曰異哉杭人重施輕財是不獨為福田今歲成矣其行乎及還作詩送之集中不載此引道士吳大錢之弟子也嘗見墨跡今録公表忠觀碑載趙抃知杭州言故吳越國王錢氏墳廟在錢塘臨安者皆蕪廢不治請以妙因院為觀使錢氏之孫為道士曰自然者居之以守其墳廟詔許之改妙因為表忠觀錢道士即碑中名自然者號通教大師先王舊德在民心著令稱忠上意深墮淚行看㑹祠下挂名爭欲刻碑隂凄凉破屋塵凝坐憔悴雲孫雪滿簪未信諸豪容郭解卻從他縣施千金漢書吳芮傳徙為長沙王甍諡曰文王初文王芮髙祖賢之制詔御史長沙王忠其定著令注漢約非劉氏不王而芮王故著令中使特王也或曰以芮至忠故著令也晉羊祜傳襄陽百姓於峴山祜平生遊憩之所建碑立廟歲時饗祭焉望其碑者莫不流涕杜預因名為墮淚碑漢郭解傳洛陽人有相仇者邑中賢豪居閒以十數終不聽客乃見解解夜見仇家仇家曲聽解解曰今子幸而聽我奈何從他縣奪人邑賢士大夫權乎乃夜去不使人知次韻周開祖長官見寄墨迹藏吳興向氏前題云次韻奉和樂清開祖長官見寄後題云元豐二年六月十三日吳興郡齊作旋見兒童迎細侯墨迹作已見當是續改此一字俯仰東西閲數州老於岐路豈伶優初聞父老推謝令旋一作巳見兒童迎細侯政拙年年祈水旱民勞處處避嘲謳河吞巨野那容塞盜入䝉山不易搜仕道固應慙孔孟扶顛未可責求由漸謀田舍猶懷祿未脫風濤且傍洲惘惘可憐真喪狗時時相觸是虛舟朅來震澤都如夢只有苕溪可倚樓齊釀酸甜如蜜水樂工零落似風甌疑作鷗遠思顔桞並諸謝近憶張陳與老劉公自注謂張子野陳令舉劉孝叔風定軒窗飛豹腳雨餘欄檻上蝸牛舊游到處皆蒼蘚同甲惟君尚黑頭憶昔湖山共尋勝相逢杯酒兩忘憂醉看梅雪清香過夜棹風船駭汗流百首共成山上集三人俱作月中遊海南未起垂天翼澗底仍依徑寸庥已許春風歸過我預憂詩筆老難酬此生歲月行飄忽晚節功名亦謬悠犀首正緣無事飲馮歡應為有魚留從今更踏青州麴薄酒知君笑督郵晉書循吏傳鄧攸為吳郡守刑政清明後稱疾去職百姓數千人留牽攸船不得進攸乃小停夜中發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去又互見前注後漢郭伋字細侯為並州牧始至行部到西河美稷有兒童數百各騎竹馬道次拜迎漢溝洫志孝武元光中河决於瓠子東南注距野塞之輒復壞莊子庚桑楚汝亡人哉惘惘乎欲反汝情性而無由入可憐哉史記孔子獨立郭東門鄭人曰東門有人其顙似堯其項類臯陶其肩類子産然自腰以下不及禹三寸纍纍若喪家之狗莊子山木篇方舟而濟於河有虛船來觸舟雖有惼心之人不怒吳興詩序東晉王謝諸公莫不游而樂之而城中觀游之最則水堂見於桞惲若顔真卿之忠毅又不獨以篇詠著左太冲詠史詩鬱鬱澗底松離離山上苗以彼徑寸莖䕃此百尺條再見犀首注屢見史記孟嘗君傳馮歡居孟嘗傳舍彈其劍而歌曰長鋏歸來乎食無魚孟嘗君遷之幸舍食有魚矣青州督郵用世說桓溫主簿事詳見十五卷九日次韻王鞏詩注公烏臺詩話軾知湖州有周邠作詩寄軾軾答云云自言遷徙數州未䝉朝廷擢用老於道路並所至遇水旱盜賊夫役數起民䝉其害以譏諷朝廷政事闕失並新法不便之所致也仕道云云以言已仕而道不行則非事道也故有慙於孔孟孔子責由求云顛而不扶意以譏諷朝廷大臣不能扶正其顛仆也林子中以詩寄文與可及余與可既沒追和其韻斯人所甚厭投畀每不受欲其少須臾奪去惟恐後云誰尸此職無乃亦假守賦才有巨細無異斛與斗胡不安其分但聽物所誘時來各飛動意合無姸醜坐令雞栖車長載朱伯厚平生無一旅既死咤萬口自聞與可亡胸臆生堆阜懸知臨絶意要我一執手相望五百里安得自其牖遺文付來哲後事待諸友伶俜嵇紹孤老病孟光偶世人賤目見爭笑千金帚君詩與楚詞識者當有取但知愛墨竹此歎吾已久故人多厚祿能復哀君否不見林與蘇饑寒自奔走詩巷伯篇取彼譛人投畀有北有北不受漢賈山傳願少須臾母死唐楊綰傳綰薨帝曰何奪綰之速耶漢項籍傳注假守兼守也後漢朱震字伯厚為州從事奏濟隂太守單匡臧罪帝收匡下廷尉諺曰車如雞栖馬如狗疾惡如風朱伯厚左傳哀元年有衆一旅杜預曰五百人為旅晉山濤傳與嵇康善康臨誅謂子紹曰巨源在汝不孤矣濤字巨源張平子東京賦若客所謂末學膚受貴耳而賤目者也魏文帝典論家有弊帚享之千金注已見劉協辨騷楚詞者體慢於三代而風雅於戰國乃雅頌之博徒詩賦之英傑也與王郎昆仲及兒子邁繞城觀荷花登峴山亭晚入飛英寺分韻得月明星稀四首吳興統記峴山在州南五里本名顯山晋吳興太守假康於山上起顯亭後改曰峴山亭昨夜雨鳴渠曉來風襲月蕭然欲秋意溪水清可啜環城三十里處處皆佳絶蒲蓮浩如海時見舟一葉此閒真避世青蒻低白髮相逢欲相問已逐驚鷗沒漢劉向傳熒惑襲月韓退之溪堂詩淺有蒲蓮深有蒹葦杜子美詩白鷗沒浩蕩萬里誰能馴清風定何物可愛不可名所至如君子草木有嘉聲我行本無事孤舟任斜橫中流自偃仰適與風相迎舉杯屬浩渺樂此兩無情歸來兩溪間雲水夜自明苕水如漢水鱗鱗鴨頭青吳興勝襄陽萬瓦浮青冥我非羊叔子愧此峴山亭悲傷意則同歲月如流星從我兩王子高鴻插修翎湛輩何足道當以德自銘李白襄陽歌遙看漢水鴨頭緑恰似蒲萄新潑醅再見晉書羊祜傳祜樂山水每風景必造峴山置酒言詠終日不倦嘗慨然歎息顧謂從事鄒湛云云湛曰公德冠四海道嗣前哲令聞令望必與此山俱傳至若湛輩乃當如公言耳祜字叔子又互見十一卷登常山絶頂詩注兩王子謂王適王遹也吏民憐我懶鬭訟日已稀能為無事飲可作不夜歸復尋飛英游盡此一寸暉撞鐘履聲集顛倒雲山衣我來無時節杖屨自推扉莫作使君看外似中已非李德裕獻替記出不至逺歸不近夜城南縣尉水亭得長字兩尉鬱相望東西百步埸揮旗蒲桞市伐鼓水雲鄉已作觀魚檻仍開射鴨堂全家依畫舫極目亂紅粧㶑㶑波頭細疏疏雨腳長我來間濯足溪漲欲浮牀澤國山圍裏孤城水影傍欲知歸路處葦外記風檣王注百步埸尉司教閲處也揮旗伐鼓以言尉之事蒲桞市水雲鄉則言湖州也唐孟郊為溧陽尉開射鴨堂左傳隱五年春公將如棠觀魚杜子美詩幾時來翠節特地引紅糚又詩雨腳如麻未斷絶劉禹錫詩山圍故國周遭在李涉潤州詩孤城吹角水茫茫與胡祠部游法華山陂湖欲盡山為界始見寒泉落髙派道人未放泉出山曲折虛堂瀉清快使君年老尚兒戲緑棹紅船舞澎湃一笑翻杯水濺裙餘歡濯足波生隘長松攙天龍起立蒼藤倒谷雲崩壞仰穿䝉密得清曠一覽震澤吁可怪誰云四萬八千頃渺渺東盡日所曬歸塗十里盡風荷清唱一聲聞露薤公自注是日樂工有作此聲者嗟豫少小慕真隱白髮青衫天所械忽逢佳士與名山何異枯楊便馬疥君猶鸞鶴偶飄墮六翮如雲豈長鎩不將新句紀兹游恐負山中清淨債漢司馬相如賦上林賦八川分流洶湧澎湃杼情詩李相蔚鎮淮南祖送孫處士舟子回篙濺水近坐妓濕衣孫為楊桞調曰從教水濺羅裙濕還道朝來行雨歸又見九卷蘇州閭丘江君詩注作李紳裴餘慶事姑竝存之魯靈光殿賦吁可畏乎其駭人也後漢周舉傳上已梁商燕于洛水酒闌唱罷繼以薤露之歌坐者皆為掩涕南史宋何尚之致仕於方山為退居賦以明所守後還攝職袁淑乃録古來隱士有迹無名者為真隱傳以嗤焉揚子鷦明冲天不在六翮乎抆而傅尸鳩其纍矣夫謝宣逺答靈運詩鎩翮周數仞又次前韻贈賈耘老具區吞滅三州界浩浩湯湯納千派從來不著萬斛船一葦漁舟恣奔快仙壇古洞不可到空聽餘瀾鳴湃湃今朝偶上法華嶺縱觀始覺人寰隘山頭臥碣弔孤冢下有至人僵不壞空餘白棘網秋蟲無復青蓮出幽怪我來徙倚長松下欲掘茯苓親洗曬聞道山中富竒藥往往靈芝雜葵薤詩人空腹待黃精生事只看長柄械公自注子美詩云長鑱長鑱白木柄我生托子以為命今年大熟期一飽食葉微蟲真癬疥公自注今嵗有小蟲食葉不甚為害白花半落紫穟香攘臂欲助磨鎌鎩安得山泉變春酒與子一洗尋常債周禮東南曰揚州其山鎮曰㑹稽其澤藪曰具區蘇州圖經具區接蘇常湖秀四州界內有大小山七十二洞庭居其一焉十道記太湖廣三萬六千頃下有地道潛通巴陵昔龍威丈人之所居法華經有人聞是品能隨喜讚善者是人口中常出青蓮香按湖州法華山昔有樵夫入山得青蓮一枝蓋生於平陸因時入市市人以花生非時且異其事乃從樵夫還至本處掘地視之下有石匣中藏一童子舌根不壞花自舌出是人生持誦法華經致此勝果故以名其山事具寺碑牛僧孺有幽怪録史記龜策傳下有伏靈上有兔絲所謂伏靈者在兔絲之下狀似飛鳥之形又伏靈者千嵗松根也伏靈與茯苓同杜子美放歌行知子松根是茯苓遲暮有意來同煮又詩酒債尋常行處有三國孫濟權之叔也嗜酒不治産常醉屢缺酒緍人皆笑之濟恬然自若謂人曰尋常行坐處缺人酒債欲貨此緼袍償之趙閲道髙齊冷齊夜話趙閲道休官歸老三衢作髙齊居之與鍾山佛慧禪師為方外交見公奔走謂公勞聞公隱退云公髙公心底處有髙下夢幻去來隨所遭不知髙齊竟何義此名之設緣吾曹公年四十巳得道俗緣未盡餘伊臯功名冨貴俱逆旅黃金知繫何人袍超然巳了一大事挂冠而去真秋毫坐看猿猱落罝罔兩手未肯置所操乃知賢逹與愚陋豈直相去九牛毛長松百尺不自覺企而羡者蓬與蒿我欲贏糧往問道未應舉臂詞一作辭盧敖法華經諸佛出世唯以一大事因緣故出現於世晉華談傳或問談曰諺言人之相去如九牛毛寧有是乎談曰即許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也漢司馬遷傳若九牛亡一毛韓退之詩自慙青蒿倚長松莊子庚桑楚南榮趎贏糧七日七夜至老子之所淮南子盧敖游乎北海遇一若士敖自謂觀乎六合之外若士舉臂而竦身遂入雲中敖歎曰猶黃鵠之與壤蟲不亦悲哉送俞節推公自注尚之子尚字退翁按俞節推名溫父湖州烏程人父汝尚字退翁第進士僉書劍南西川判官趙清獻公守蜀入輒相對清談竟暮王介甫當國患一時故老不同已或言退翁清望可置之御史即召詣京師既知所以薦用意力辭得免還家苦貧又從清獻於青州遂以屯田郎中致仕子由寄其詩首云不作清時言事官歸逾年忽告其妻黃曰人生七十者稀吾與夫人皆以過之可往矣黃曰我先去退翁曰善後三日黃沐浴化去退翁明日召諸子告曰吾亦行矣俄隱几而終孫莘老以為事類龎公表其墓而秦少游為書之吳興有君子淡如朱絲琴一唱三太息至今有遺音嗟余與夫子相避如辰參公自注退翁官於蜀余在京師余歸而退翁去及余官於吳興則退翁亡矣猶喜見諸郎窈然清且深異時多良士末路喪初心我生不有命其肯枉尺尋揚子吾不睹參辰之相比也孟東野出門行參辰出沒不相待我欲橫天無羽翰次韻答孫侔孫侔字少述湖州人十年身不到朝廷欲伴騷人賦落英但得低頭拜東野不辭中路伺淵明􅋈舟苕霅人安在卜築江淮計巳成千里論交一言足與君蓋亦不須傾韓退之醉留東野詩低頭拜東野願得始終如駏蛩晉陶潛傳刺史王𢎞造之潜稱疾不見𢎞令人候之密知當往廬山乃齎酒先於半道要之潜既遇酒便引酌野亭欣然忘進𢎞乃出與相見遂歡宴窮日後漢范式傳與張劭為友二人竝告歸鄉里式謂劭曰後二年當過拜尊親見孺子劭尅期候之母曰二年之别千里結言何相見之審耶對曰式信士必不乖違至其日果至重寄陸務觀云孫少述一字正之與荆公交最厚故荆公别少述詩云應須一曲千回首西去論心有幾人又云子今去此來何時後有不可誰豫規其相豫如此及荆公當國數年不復相聞人謂二公之交遂暌故公詩云云劉貢父亦有詩曰不負興公遂初賦更傳中散絶交書凜然髙節照時人不信微官解凂君蔣濟謂能來阮籍薛宣真欲吏朱雲好詩衝口誰能擇俗子疑人未遣聞乞取千篇看俊逸不將輕比鮑參軍晉阮籍傳太尉蔣濟聞其有雋才而辟之籍都亭奏記乞回繆恩以光清舉初濟恐籍不至得記遣卒迎之而籍已去濟大怒於是鄉親共諭之乃就吏竟謝病歸朱雲相吏事詳十五卷次韻王鞏留别詩注杜子美贈李白詩清新庾開府俊逸鮑參軍次韻和劉貢父登黃樓見寄並寄子由二首清派連淮上黃樓冠海禺一作隅此詩尤偉麗夫子計魁梧公自注劉為人短小世俗輕瑚璉巾箱襲武夫坐令乘傳遽奔走為儲須邂逅我已失登臨誰與俱貧貪倉氏粟身聽冶家橅㑹合難前定歸休試後圖腴田未可買公自注夲欲買田於泗上近已不遂矣窮鬼卻須呼二水何年到雙洪不受艫至今清夜夢飛轡䇿天吳公自注此詩寄劉漢書張良傳贊曰聞張良之智勇以為其貌魁梧竒偉反若婦人女子武夫與碔玦通唐韻碔玞石似玉又傳遽驛也以車曰傳以馬曰遽韓退之送窮文結桞作車縳草為船載糗與粻三揖窮鬼而告之云云於是上手稱謝燒車與船延之上坐山海經天吳水神也八首十尾亦曰河伯與子皆去國十年天一禺數竒逢惡歲計拙集枯梧好士餘劉表窮交憶灌夫不矜持漢節猶喜攬桓須清句金絲合髙樓雪月俱吟哦出新意指畫想前橅公自注子由初赴南京送之出東門登城上覽山川之勝云此地可作樓觀於是始有改築之意自寫千言賦新裁六幅圖公自注近以絹自寫子由黃樓賦為六幅圖甚妙傳看一坐聳勸著尺書呼莫使騷人怨東游不到吳公自注此詩寄子由莊子徐無鬼越之流人去國期年見似人者而喜矣漢書李廣傳從大將軍青擊胸奴大將軍隂受上指以為李廣數竒恐不得所欲毋令當單于國語中飲優施起舞謂里克妻曰主孟啖我我教兹暇豫事君乃歌曰暇豫之吾吾不如鳥烏人皆集於菀已獨集於枯後漢劉表為荆州刺史愛民養士學士歸者千數漢灌夫傳士在已左愈貧賤尤益禮敬與鈞稠人廣衆薦寵下輩士亦以此多之漢汲黯傳以便宜持節發河內粟以賑貧民蘇武傳在胸奴中仗漢節牧羊晉桓伊傳謝安捋其須曰使君於此不凡詳見三卷陪歐陽宴西湖詩注陳州與文郎逸民飲别攜手河堤上作此詩白酒無聲滑瀉油醉行堤上散吾愁春風料峭羊角轉河水渺綿瓜蔓流君已思歸夢巴峽我能未到說黃州此生聚散何窮已未忍悲歌學楚囚水衡記二月三月桃花水五月瓜蔓水謂瓜蔓延故以名左傳成九年晉侯觀於軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之晉王導傳過江人士每暇日相邀出新亭飲宴周覬中坐歎曰風景不殊舉目有山河之異皆相視流涕導愀然變色曰當共戮力王室克復神州何至作楚囚對泣耶子由自南都來陳三日而别夫子自逐客尚能哀楚囚奔馳二百里徑來寬我憂相逢知有得道眼清不流别來未一年落盡驕氣浮嗟我晚聞道款啓如孫休至言難久服放心不自收悟彼善知識妙藥應所投納之憂患場磨以百日愁冥頑雖難化鐫發亦巳周平時種種心次第去莫留但餘無所還永與夫子游此别何足道大江東西州畏蛇不下榻睡足吾無求便為齊安民何必歸故丘史記老子傳謂孔子曰去子之驕氣與多欲態色與淫志是皆無益於子之身莊子達生篇孫休欵啓寡聞之民也注款孔也啓開也言所見之小維摩經佛為大醫王應病與藥令得服行左傳昭三年盧蒲嫳曰余髮如此種種余奚能為金剛經衆生若干種心如來悉知楞嚴經佛告阿難今當示汝無所還地韓退之贈張功曹詩下牀畏蛇食畏藥杜牧詩平生睡足處雲夢澤南州再見圖經黃州齊安郡正月十八日蔡州道上遇雪次子由韻二首蘭菊有生意微陽回寸根方憂集暮雪復喜迎朝暾憶我故居室浮光動南軒松竹半傾瀉未數葵與萱三徑瑤草合一瓶井花溫至今行吟處尚餘履舄痕一朝出從仕永愧李仲元晚歲益可羞犯雪方南奔山城買廢圃槁葉手自掀長使齊安人指說故侯園揚子或問子蜀人也請人曰有李仲元者不屈其意不纍其身不夷不惠可否之閒也仲元世之師也漢蕭何傳召平者故秦東陵侯種瓜長安城東瓜美故世謂東陵瓜鉛膏染髭須旋露霜雪根不如閉目坐丹府夜自暾誰知憂患中方寸寓羲軒大雪從壓屋我非兒女萱平生學踵息坐覺兩鐙溫下馬作雪詩滿地鞭箠痕佇立望原野悲歌為黎元道逢射獵子遙指狐兔奔蹤迹尚可原窟穴何足掀寄謝李丞相吾將反丘園南史何長瑜作韻語云陸展染白髮欲以媚側室青青不解久星星行復出孟東野百憂詩萱草兒女花不解壯士憂莊子大宗師真人之息以踵衆人之息以喉王注李丞相指李斯蓋用牽黃犬出上蔡東門語也注巳見過新息留示鄉人任師中公自注任時知瀘州亦坐事對獄昔年嘗羡任夫子卜居新息臨淮水怪君便爾忘故鄉稻熟魚肥信清美竹陂鴈起天為黑公自注小竹陂在縣北桐柏煙橫山半紫公自注桐柏廟在縣南知君坐受兒女困悔不先歸弄清泚塵埃我亦失收身此行蹭蹬尤可鄙寄食方將依白足附書未免煩黃耳往雖不及來有年詔恩儻許歸田里卻下關山入蔡州為買烏犍三百尾公自注黃州出水牛卜居椘辭篇名九域志蔡州新息縣史記韓信傳吕后使武士縛信信曰吾悔不用蒯通之計乃為兒女子所詐歐陽公詩何日早收身江河一漁艇杜子美贈李四丈詩蒼茫風塵際蹭蹬騏驎老白足黃耳竝已見說文犍犗也過淮朝離新息縣初亂一水碧暮宿淮南村巳渡千山赤麏鼯號古戍霧雨暗破驛回頭梁楚郊永與中原隔黃州在何許想像雲夢澤吾生如寄耳初不擇所適但有魚與稻生理已自畢獨喜小兒子少小事安佚相從艱難中肝肺如鐡石便應與晤語何止寄衰疾公自注時家在子由處獨與兒子邁南來水經注淮水出南陽平氏縣貽簪山東北過桐柏山又東徑新息縣南尚書亂於河雲夢注屢見魏武故事長史王必忠能勤事心如鐵石施注蘇詩卷十七
