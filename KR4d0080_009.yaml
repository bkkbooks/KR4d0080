front:
  text: 註蘇姓氏註東坡詩四十二巻年譜目録各一巻司諫吴興施元
  hash: sha256:091ed3034d3c14dcd2417a867382dfa006c1f8a0f82d67ad7c42a248ccb767bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0080_WYG_009-1a, image: WYG1110/WYG1110-0063a.png}
body:
  text: 之徳初與吴郡顧景蕃共為之元之子宿従而推廣且為年譜以傳於世陸放翁作序頗言註之難盖其一時事實既非親見又無故老傳聞有不能盡知者噫豈獨坡詩哉註杜詩者非不多往往穿鑿附㑹皆臆決之過也見文獻通考司諫施元之字徳初註東坡詩四十二巻年譜目録各一巻與吴郡顧景蕃共為之元之子宿推廣為年譜陸放翁序見吴興掌故按二書則施氏當別有年譜今所傳年譜乃五羊王宗稷編紀年録乃僊谿傅藻編施氏譜無考施宿字武子知餘姚縣興廢舉墜加意風敎市田置書敎誨學者姚北瀕海嵗役民修堤民甚苦之宿為石堤建荘田二千畝以備修堤之役功與前令謝景初同稱見浙江通志名宦傳萬姓統譜亦云按蘇詩第二十巻別子由三首註題下有云宿守都梁得東平康師孟元祐二年三月刻二蘇公所與九帖於洛陽乃知武子又甞守都梁而傳未之及云都梁山在今盱眙顧禧字景蕃吴郡人祖沂知龔州父彦成兩浙運使禧不求禄仕居光福山閉戸誦讀著述甚富紹興間有司以遺逸薦不起隠居五十年築室邳村表曰漫荘甞與吴興施元之註蘇子瞻詩行世見府志隠逸傳放翁陸氏游序略曰唐詩人㝡盛名家者以百數惟杜詩註者數家然㮣不為識者所取近世有蜀人任淵甞註宋子京黄魯直陳無巳三家詩頗稱詳贍若東坡先生之詩則援據閎博指趣深逺淵獨不敢為之說某頃與范公至能㑹於蜀因相與論東坡詩慨然謂予足下當作一書發眀東坡之意以遺學者某謝不能他日又言之因舉二三事以質之曰五畝漸成終老計九重新掃舊巢㾗遥知叔孫子巳致魯諸生當若為解至能曰東坡竄黄州自度不復收用故曰新掃舊巢痕建中初復召元祐諸人故曰巳致魯諸生恐不過如此耳某曰此某之所不敢承命也昔祖宗以三館養士儲将相材及官制行罷三館而東坡盖甞直史館然自謫為散官削去史館之職久矣至於史館亦廢故云新掃舊巢痕其用事之嚴如此而鳯巢西隔九重門則又李義山詩也建中初韓曾二相得政盡收用元祐人其不召者亦補大藩惟東坡兄弟猶領宫祠此句盖寓所謂不能致者二人意深語緩尤未易窺測至如車中有布乎指當時用事者則猶近而易見白首沉下吏綠衣有公言乃以侍妾朝雲甞歎黄師是仕不進故此句之意戯言其上僣則非得於故老殆不可知必皆能知此然後無憾至能亦太息曰如此誠難矣後二十五六年某告老居山隂澤中吴興施宿武子出其先人司諫公所註數十大編屬某作序司諫公以絶識博學名天下且用工深歴嵗久又助之以顧君景蕃之該洽則於東坡之意盖㡬可以無憾矣見渭南集又見文獻通考
