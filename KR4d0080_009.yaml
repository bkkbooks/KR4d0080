front:
  text: 注蘇姓氏注東坡詩四十二卷年譜目録各一卷司諫吳興施元
  hash: sha256:d6b654ca33fecd596afa91e8708c154955dbd5c156a43f3c85ae34d424455e1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0080_WYG_009-1a, image: WYG1110/WYG1110-0063a.png}
body:
  text: 之德初與吳郡顧景蕃共為之元之子宿從而推廣且為年譜以傳於世陸放翁作序頗言注之難蓋其一時事實既非親見又無故老傳聞有不能盡知者噫豈獨坡詩哉注杜詩者非不多往往穿鑿附會皆臆決之過也見文獻通考司諫施元之字德初注東坡詩四十二卷年譜目録各一卷與吳郡顧景蕃共為之元之子宿推廣為年譜陸放翁序見吳興掌故按二書則施氏當別有年譜今所傳年譜乃五羊王宗稷編紀年録乃仙溪傅藻編施氏譜無考施宿字武子知餘姚縣興廢舉墜加意風教市田置書教誨學者姚北瀕海嵗役民修堤民甚苦之宿為石堤建莊田二千畝以備修堤之役功與前令謝景初同稱見浙江通志名宦傳萬姓統譜亦云按蘇詩第二十卷別子由三首注題下有云宿守都梁得東平康師孟元祐二年三月刻二蘇公所與九帖於洛陽乃知武子又嘗守都梁而傳未之及云都梁山在今盱眙顧禧字景蕃吳郡人祖沂知龔州父彥成兩浙運使禧不求祿仕居光福山閉戶誦讀著述甚富紹興間有司以遺逸薦不起隱居五十年築室邳村表曰漫莊嘗與吳興施元之注蘇子瞻詩行世見府志隱逸傳放翁陸氏遊序略曰唐詩人最盛名家者以百數惟杜詩注者數家然概不為識者所取近世有蜀人任淵嘗注宋子京黃魯直陳無巳三家詩頗稱詳贍若東坡先生之詩則援據閎博指趣深逺淵獨不敢為之説某頃與范公至能會於蜀因相與論東坡詩慨然謂豫足下當作一書發眀東坡之意以遺學者某謝不能他日又言之因舉二三事以質之曰五畝漸成終老計九重新掃舊巢䀶遙知叔孫子巳致魯諸生當若為解至能曰東坡竄黃州自度不復收用故曰新掃舊巢痕建中初復召元祐諸人故曰巳致魯諸生恐不過如此耳某曰此某之所不敢承命也昔祖宗以三館養士儲將相材及官制行罷三館而東坡蓋嘗直史館然自謫為散官削去史館之職久矣至於史館亦廢故云新掃舊巢痕其用事之嚴如此而鳯巢西隔九重門則又李義山詩也建中初韓曾二相得政盡收用元祐人其不召者亦補大藩惟東坡兄弟猶領宫祠此句蓋寓所謂不能致者二人意深語緩尤未易窺測至如車中有布乎指當時用事者則猶近而易見白首沉下吏緑衣有公言乃以侍妾朝雲嘗歎黃師是仕不進故此句之意戲言其上僣則非得於故老殆不可知必皆能知此然後無憾至能亦太息曰如此誠難矣後二十五六年某告老居山隂澤中吳興施宿武子出其先人司諫公所注數十大編屬某作序司諫公以絶識博學名天下且用工深歷嵗久又助之以顧君景蕃之該洽則於東坡之意蓋幾可以無憾矣見渭南集又見文獻通考
