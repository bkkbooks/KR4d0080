body:
  text: 施註蘓詩巻四十一宋蘓軾撰施元之原註武進邵長蘅删補和陶淵明詩引子由作東坡先生謫居儋耳寘家羅浮之下獨與幼子過負擔度海葺茅竹而居之日㗖藷芋而華屋玉食之念不存於胸中平生無所嗜好以圗史為園囿文章為鼔吹至是亦皆罷去猶獨喜為詩精深華妙不見老人衰憊之氣是時轍亦遷海康書来告曰古之詩人有擬古之作矣未有追和古人者也追和古人則始於東坡吾於詩人無所甚好獨好淵明之詩淵明作詩不多然其詩質而實綺癯而實腴自曹劉鮑謝李杜諸人皆莫及也吾前後和其詩凡一百有九篇至其得意自謂不甚媿淵明今将集而併録之以遺後之君子其為我志之然吾於淵明豈獨好其詩也如其為人實有感焉淵明臨終疏告儼等吾少而窮苦每以家弊東西遊走性剛才拙與物多忤自量為已必貽俗患俛仰辭世使汝等幼而饑寒淵明此語蓋實録也吾真有此病而不早自知平生出仕以犯世患此所以深愧淵明欲以晚節師範其萬一也嗟乎淵明不肯為五斗米一束帶見鄉里小兒而子瞻出仕三十餘年為獄吏所折困終不能悛以陷大難迺欲以桑榆之末景自託於淵明其誰肻信之雖然子瞻之仕其出處進退猶可考也後之君子其必有以處之矣孔子曰述而不作信而好古竊比於我老彭孟子曰曽子子思同道區區之迹蓋未足以論士也轍少而無師子瞻既冠而學成先君命轍師焉子瞻嘗稱轍詩有古人之風自以為不若也然自斥居東坡其學日進沛然如川之方至其詩比李太白杜子美有餘遂與淵明比轍雖馳驟從之而常出其後其和淵明轍繼之者亦一二焉紹聖丁丑十二月十九日海康城南東齋引追和陶淵明詩六十二首飲酒二十首吾飲酒至少常以把盞為樂往往頹然坐睡人見其醉而吾中了然盖莫能名其為醉為醒也在揚州飲酒過午輒罷客去解衣槃礴終日歡不足而適有餘因和淵明飲酒二十首庶以彷彿其不可名者示舍弟子由鼂無咎學士鼂無咎名補之時通判揚州事見三十二巻次韻鼂無咎詩註我生不如陶一作我不如陶生世事纒綿之云何得一適亦有如生時寸田無荆棘佳處正在兹縱心與事往所遇無復疑偶得酒中趣空杯亦常持二豪詆醉客氣湧胸中山漼然似冰釋亦復在一言嗇氣實其腹云當享長年少飲得徑醉此秘君勿傳晉劉伶傳為酒徳頌曰有貴介公子縉紳處士聞吾風聲議其所以先生方捧甖承槽銜杯潄醪無思無慮其樂陶陶兀然而醉怳然而醒二豪侍側焉知蜾蠃之與螟蛉又互見前江表傳孫權曰朕年六十世事難易靡所不嘗近為䑕子所郤令人氣湧如山老子渙若冰将釋又虚其心實其腹道䘮士失巳出語輙不情江左風流人醉中亦求名淵明獨清真談笑得此生身如受風竹掩冉衆葉驚俯仰各有態得酒詩自成唐文藝傳胡楚賓屬文敏甚必酒中然後下筆蠢蠕食葉蟲仰空慕高飛一朝傅兩趐乃得黏網悲啁啾同巢雀沮澤疑可依赴水生兩殼遭閉何時歸二蟲竟誰是一笑百念衰幸此未化閒有酒君莫違陸龜䝉蠧化橘之蠧大如小指齧葉如饑蠶之速蛻為胡蝶聳空翅輕瞥然而去須臾犯蝥網而膠之引絲還纒牢若拲梏禮記季秋之月爵入大水為蛤小舟真一葉下有暗浪喧夜棹醉中發不知枕几偏天明問前路巳度千金山嗟我亦何為此道常往還未來寧早計既徃復何言百年六十化念念竟非是是身如虚空誰受譽與毁得酒未舉杯䘮我固忘爾倒牀自甘寢不擇菅與綺莊子齊物論今也吾䘮我子知之乎頃者大雪年海波翻玉英有士常痛飲饑寒見真情牀頭有敗榼孤坐時一傾未能平體粟且復澆腸鳴脱衣裹凍酒每醉念此生趙飛燕外傳露立閉息順氣體温舒無軫粟巳見我坐華堂上不改麋鹿姿時來蜀岡頭喜見霜松枝心知百尺底巳結千歲竒煌煌凌霄花纒繞復何為舉觴酹其根無事莫相羈白樂天詩有木名凌霄擢秀非孤標偶依一株樹遂抽百尺條託根附樹身開花寄樹梢芙蓉在秋水時節自闔開清風亦何意入我芝蘭懐一隨採折去永與江湖乖斷絲不復續斗水何足栖不如玉井蓮結根天池泥感此每自慰吾事幸不諧醉中有歸路了了初不迷乘流且復逝抵曲吾當逥李白憶舊遊詩秋水出芙蓉天然去雕飾韓退之詩太華峰頭玉井蓮開花十丈藕如船再見維摩經高原陸地不生蓮花卑濕淤泥乃生此花漢賈誼傳乘流則逝得坎則止籃輿兀醉守路轉古城隅酒力如過雨清風消半途前山正可數後騎且勿驅我緣在東南徃寄白髮餘遥知萬松嶺下有三畆居民勞吏無徳歲美天有道暑雨避麥秋温風送蠶老三嚥初有聞一溉未濡槁詔書寛積欠父老顔色好再拜賀吾君獲此不貪寳頹然笑阮籍醉几書謝表嵇叔夜養生論為稼於湯世必一溉者後枯再見晉阮籍傳文帝譲九錫公卿将勸進使籍為其辭籍方據案醉眠使者以告籍便書案使寫之無所改竄互見十二巻京師哭任遵聖詩注按元祐七年五月先生守揚州上奏畧曰今大姓富家為市易所破十無一二其餘小民大率皆有債欠臣親見兩浙京西淮南之民皆為積欠所壓日就窮蹙本州於理合放而于條未有明文者且令權住催理聽候指揮伏望特留聖意深詔左右大臣早賜果决行下六月十六日又上奏曰今夏田一熟民於百死之中微冇生意而監司爭言催欠臣敢昧死請内降手詔一應淮南東西浙西諸般欠負不問新舊特與權住催理一年此詩所述盖是得請故也我夢入小學自謂總角時不謂有白髮猶誦論語辭人間本兒戯顛倒畧似兹惟有醉時真空洞了無疑墜車終無傷莊叟不吾欺呼兒具紙筆醉語輙録之詩國風總角之宴言笑晏晏注云總角結髪也杜子美舂陵行呼兒具紙筆隠几臨軒楹作詩呻吟内墨淡字欹傾醉中雖可樂猶是生滅境云何得此身不醉亦不醒癡如景升牛莫保尻與領黠如東郭㕙束縛作毛頴廼知嵇叔夜非坐虎文炳晉桓温傳劉景升有千斤大牛噉芻豆十倍常牛負重致逺曾不若一羸㹀魏武入荆州以享軍士韓退之毛頴傳居東郭者號曰㕙蒙将軍㧞其豪載頴而歸聚其族而加束縛焉晉嵇康傳字叔夜美詞氣有風儀而土木形骸不自藻飾後為鍾㑹譖於文帝而害之我家小馮君天性頗醇至清坐不飲酒而能容我醉歸休要相依謝病當以次豈知山林士骯髒廼爾貴乞身當念早過是恐少味小馮君出漢書馮奉世傳詩意謂子由也去鄉三十年風雨荒舊宅惟存一束書寄食無定迹每用愧淵明尚取禾三百頎然六男子麤可傳清白於吾豈不多何事復嘆惜韓退之示兒詩始我來京師止擕一束書漢楊震傳子孫常蔬食歩行或令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎嘵嘵六男子弦誦各一經復生五丈夫戢戢丁欲成歸田了門户與國充踐更普兒初學語玉骨開天庭淮老如鶴雛破殻巳長鳴舉酒屬千里一歡愧凡情楊子嘵嘵之學各習其師史記孔子弟子傳商瞿年長無子瞿母請之孔子曰無憂瞿年四十後當有五丈夫子唐食貨志凡民始生黄四歲為小十六為中二十一為丁六十為老韓退之寄盧仝詩去歲生兒名添丁意令與國充耘耔漢吳王濞傳注服䖍曰以當為更卒出錢二百謂之過更自行為卒謂之踐更淮海雖故楚無復輕揚風齋厨聖賢雜無事時一中誰言大道遠正賴三杯通使君不夕坐衙門㪚刀弓尚書淮海惟揚州史記貨殖傳自淮以北西楚也其俗剽輕李濟翁資暇録揚州者以其土俗輕楊故名其州今作楊柳之楊繆也魏徐邈傳醉客謂酒清者為聖人濁者為賢人屢見何人築東臺一郡坐可得亭亭古浮圖獨立表衆惑蕪城閱興廢雷塘㡬開塞明年起華堂置酒弔亡國無令竹西路歌吹乆寂黙釋氏要覧梵語塔婆此云髙顯文選鮑昭蕪城賦注云昭見廣陵故城荒蕪乃吳王濞所都也遂為此賦唐地理志揚州江都縣東十一里有雷塘貞觀十八年長史李襲譽引渠以溉田鼂子天麒麟結交及未仕高才固難及雅志或類巳各懷伯業能共有邱明恥歌呼時就君指我醉郷里吳公門下客賈誼獨見紀請作鵩鳥賦我亦得坎止行樂當及時綠髪不可恃英雄記魏太祖稱長大而能勤學者惟吾與袁伯業耳山陽太守袁遺字伯業見魏武紀葢公偶談道齊相獨識真頹然不事事客至先飲醇當時劉項罷四海瘡痍新三杯洗戰國一斗消彊秦寂寞千載後陽公嗣前塵醉卧客懐中言笑徒多勤我時閲舊史獨與三人親未暇餐脱粟苦心學平津草書亦何用醉墨淋衣巾一揮三十幅持去聽坐人漢曹參傳為齊相膠西葢公為言治道貴清静而民自定及為相日夜飲酒賔客欲有言輙飲以醇酒醉而後去終莫得開説唐陽城傳為諌議大夫日夜劇飲客欲諌止者城揣知其情强飲客客辭即自引滿或先醉卧客懐中漢公孫𢎞傳為丞相封平津侯身食一肉脱粟飯南史齊高帝諸子新浦侯子雲善草𨽻百濟使人求書曰侍中尺牘之美逺流海外今日所求惟在名迹子雲書三十紙與之歸園田居六首東坡曽孫叔子名峴刻所藏真迹于泉南舶司間與集本不同當是集本有誤今從石本三月四日游白水山佛迹巗沐浴於湯泉晞髮於懸瀑之下浩歌而歸肩輿郤行以與客言不覺至荔支浦上晚日蔥曨竹隂蕭然荔子纍纍如芡實矣有父老年八十五指以告余及是可食公能擕酒來遊乎意欣然許之歸卧既覺聞兒子過誦淵明歸園田居詩六首乃悉和一作次其韻始余在廣陵和淵明飲酒二十首今復為此要當盡和其詩廼巳耳一本云今書以寄妙總大士參寥子環州多白水際海皆蒼山以彼無盡景寓我有限年東家著孔丘西家著顔淵市為不二價農為不爭田周公與管蔡恨不茅三間我飽一飯足薇蕨補食前門生餽薪米救我厨無烟斗酒與隻雞酣歌餞華顛禽魚豈知道我適物自閑悠悠未必爾聊樂我所然魏志邴原别傳嘗游學詣孫崧崧曰君鄉里鄭君學者師模也君乃舍之所謂以鄭為東家邱也原曰君謂僕以鄭為東家邱君以僕為西家愚夫邪説苑虞人與芮人質其成於文王二國相謂讓其所爭以為閑田宋武二王傳論襄陽龎公謂劉表曰若使周公與管蔡處茅屋之下食藜藿之羮豈有若斯之難云云食前用孟子食前方丈字窮猿既投林疲馬初觧鞅心空飽新得境熟夢餘想江鷗稍馴集蜑叟巳還徃南池綠錢生北嶺紫筍長提壺豈觧飲好語時見廣春江有佳句我醉墮渺莽新浴覺身輕新沐感髪稀風乎懸瀑下却行詠而歸仰觀江摇山俯見月在衣歩從父老語有約吾敢違老人八十餘不識城市娛造物偶遺漏同儕盡坵墟平生不渡江水北有幽居手插荔支子合抱三百株莫言陳家紫甘冷恐不如君來坐樹下飽食擕其餘歸舍遺兒子懐抱不可虚有酒持飲我不問錢有無史記律書文帝時人民樂業自年六七十翁未嘗至市井蔡君謨荔支譜興化軍風俗園池勝處惟種荔支尤重陳紫富室大家歲或不嘗雖别品千計不為滿意陳氏欲採摘必先閉户隔墻入錢得者自以為幸不敢較其直之多少也君謨所述閩中諸郡荔子以陳家紫為第一坐倚朱藤杖行歌紫芝曲不逄商山翁見此野老足願同荔支社長作雞黍局教我同光塵月固不勝燭公自注莊子曰月固不勝火郭象曰大而闇不若小而明陋哉斯言也予為更之曰明於大者必晦於小月能燭天下而不能燭毫釐此其所以不勝火也然卒之火勝邪月勝邪霜飈散氛祲廓然似朝旭昔我在廣陵悵望柴桑陌長吟飲酒詩頗獲一笑適當時巳放浪朝坐夕不夕矧今長閑人一劫展過隙江山互隠見出没為我役斜川追淵明東臯友王績詩成竟何為六博本無益詩小雅邦君諸侯莫肯朝夕禮記朝不廢朝夕不廢夕左傳百官承事朝而不夕唐王績游北山東臯著書自號東臯子宋玉招䰟箟蔽象棊有六博些注云投六箸行六棊故謂之六博形贈影天地有常運日月無閑時孰居無事中作止推行之細察我與汝相因以成兹忽然乘物化豈與生滅期夢時我方寂偃然無所思胡為有哀樂輙復隨漣洏我舞汝凌亂相應不少疑還将醉時語答我夢中辭莊子天運篇天其運乎地其處乎日月其爭于所乎孰主張是孰維綱是孰居無事推而行是互見前影答形丹青冩君容常恐畵師拙我依月燈出相肖兩竒絶妍形本在君我豈相媚悦君如火上煙火盡君廼别我如鏡中像鏡壊我不滅雖云附隂晴了不受寒熱無心但因物萬變豈有竭醉醒皆夢耳未用議優劣圓覺經由寂静故十方世界諸如來心於中顯現如鏡中像神釋二子本無我其初因物著豈惟老變衰念念不如故知君非金石安足長託附莫從老君言亦莫用佛語仙山與佛國終恐無是處甚欲隨陶翁移家酒中住醉醒要有盡未易逃諸數平生逐兒戯處處餘作具所至人聚觀指目生毁譽如今一㺯火好惡都焚去既無負載勞又無冦攘懼仲尼晚乃覺天下何思慮陶淵明飲酒詩一士長獨醉一夫終年醒醒醉還相笑發言各不領寄言酣中客日没燭當炳周易繫辭子曰天下何思何慮天下同歸而殊塗一致而百慮詠二疏二疏事漢時迹寓心巳去許侯何足道寧識此高趣可憐魏丞相免冠謝陋舉中興多名臣有道獨兩傅世途方轂擊誰肯行此路是身如委蛻未蜕何所顧巳蜕則兩忘身後誰毁譽所以遺子孫買田豈先務我嘗遊東海所歴若有素神交乆從君屢夢今乃悟淵明作詩意妙想非俗慮庶幾二大夫見微而知著漢疏廣傳東海蘭陵人也地節三年立皇太子廣為太傅兄子受為少傅太子外祖平恩侯許伯臼使其弟舜監䕶太子家宣帝以問廣曰不冝獨親外家上善其言以語丞相魏相相免冠謝曰此非臣所及莊子知北遊生非汝有是天地之委和也性命非汝有是天地之委順也子孫非汝有是天地之委蛻也越絶書子胥曰聖人見微知著睹始知巳詠三良子車氏奄息仲行鍼虎秦之良臣也此生太山重忽作鴻毛遺三子死一言所死良巳微賢哉晏平仲事君不以私我豈犬馬哉從君求葢帷殺身固有道大節要不虧君為社稷死我則同其歸顧命有治亂臣子得從違魏顆真孝愛三良安足希仕宦豈不榮有時纏憂悲所以靖節翁服此黔婁衣漢司馬遷傳死有重于太山有輕於鴻毛用之所趣異也禮記仲尼之畜狗死使子貢埋之曰敝帷不棄為埋狗也左傳㐮二十五年齊崔杼弑其君光晏子立于崔氏之門外曰君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私暱誰敢任之魏顆從父治命事在左傳宣十五年詳巻四送蔡冠卿詩注陶詠貧士詩安貧守賤者自古有黔婁好爵吾不縻厚饋吾不酬一旦壽命盡弊服仍不周詠荆軻秦如馬後牛呂氏非復嬴天欲厚其毒假手李客卿功成志自滿積惡如陵京滅身㑹有時徐觀可安行沙邱一狼狽笑落冠與纓太子不少忍顧非萬人英魏韓裂智伯肘足本無聲胡為棄成謀託國此狂生荆軻不足説田子老可驚燕趙多竒士惜哉亦虚名殺父囚其母此豈容天庭亡秦只三户况我數十城漸離雖不傷陛㦸加周營至今天下人愍燕欲其成廢書一太息可見千古情晉元帝紀初元石圖有牛繼馬後故宣帝深忌牛氏而以毒酒鴆殺其将牛金而㳟王妃夏侯氏竟通小吏牛氏而生元帝亦有符云史記秦本紀秦之先柏翳佐舜賜姓嬴氏荘㐮王為秦質子于趙見吕不韋姬悦而取之生始皇名為政姓趙氏呂不韋傳不韋取邯鄲諸姬與居知有身以獻秦質子楚生子政立為王是為始皇帝左傳昭四年司馬侯曰楚王方侈天其或者欲逞其心以厚其毒而降之罰史記李斯傳為秦相呂不韋舍人因以得説秦王拜為客卿卒用其計謀竟并天下詩小雅如岡如陵乂如坻如京鄭氏云京大也史記秦始皇紀崩於沙邱平臺趙高與公子胡亥丞相斯詐為受遺詔沙坵立胡亥為太子賜公子扶蘇死潘安仁西征賦云據天位其若兹亦狼狽而可愍謂始皇也滑稽傳淳于髠仰天大笑冠纓索絶史記燕世家秦兵臨易水燕太子丹隂養壯士使荆軻襲刺秦王秦覺殺軻擊燕燕斬丹以獻史記魏世家當晉六卿之時知氏最强率韓魏之兵以圍趙㐮子于晉陽魏桓子肘韓康子韓康子履魏桓子肘足接于車上而知氏地分身死國亡為天下笑史記荆軻傳田光見荆卿欲自殺以激荆卿因自刎而死呂不韋傳嫪毐事連相國呂不韋出就國不韋自度稍侵見誅乃飲鴆而死劉向説苑茅焦對秦始皇帝曰陛下車裂假父冇嫉妒之心囊撲兩弟有不慈之名遷母萯陽有不孝之行從蒺藜於諌士有桀紂之治漢項籍傳楚雖三户亡秦必楚荆軻傳軻善擊筑者高漸離秦既逐荆軻之客惜其善擊筑重赦之乃臛其目使擊筑漸離乃以鉛置筑中舉筑扑始皇不中遂誅漸離終身不近諸侯之人答龎參軍周循州彦質在郡二年書問無虚日罷歸過惠為余留半月既别和此詩追送之我見異人且得異書挾書從人何適不娛羅浮之趾卜我新居子非元徳三顧我廬㫖酒荔蕉絶甘分珍雖云晚接數面自親海隅一笑豈云無人無酒酤我或乞其鄰漢司馬遷傳李陵素與士大夫絶甘分少再見陶龎參軍詩序諺云數面成親舊况其情過此者乎再見將行復止眷言孜孜苟有於中傾倒出之奕奕千言粲焉陳詩觴行筆落了不容思丱妙侍側兩髦丫分歌舞壽我永為歡欣曲終悽然仰視浮雲此曲此聲何時復聞韓退之詩捧書隨諸兄累累角尚丱詩國風髧彼兩髦實維我儀撃鼓其鏜船開艣鳴顧我而言雨泣載零子卿白首當還西京遼東萬里亦歸管寕詩國風擊鼓其鏜又涕零如雨漢蘇武傳字子卿在匈奴十九歲始以强壯出及還鬚鬢盡白感子至意託辭西風吾生一塵寓形空中願言謙亨君子有終功名在子何異我躬貧士余遷惠州一年衣食漸窘重九俯邇一作將近樽爼蕭然乃和淵明貧士七篇以寄許下高安宜興諸子姪并令過同作長庚與殘月耿耿如相依以我旦暮心惜此湏臾暉青天無今古誰知織烏飛我欲作九原獨與淵明歸俗子不自悼顧憂斯人饑堂堂誰有此千駟良可悲史記齊世家景公坐栢寢歎曰堂堂誰有此乎夷齊恥周粟高歌誦虞軒産禄彼何人能致綺與園古來避世士一作人死灰或餘煙末路益可羞朱墨手自研淵明初亦仕絃歌本誠言不樂廼徑歸視世差獨賢漢張良傳呂后令呂澤卑辭厚禮迎此四人顔師古曰謂東園公綺里季夏黄公角里先生再見晉陶潛傳嘗謂親朋曰聊欲絃歌以爲三徑之資可乎執事者聞之以爲彭澤令誰謂淵明貧尚有一素琴心閑手自適寄此無窮音佳辰愛重九芳菊起自尋疏巾嘆虚漉塵爵笑空斟忽餉二萬錢顔生良足欽急送酒家保勿違故人心南史陶潛傳顔延之在潯陽與潛情欵後為始安郡臨去留二萬錢與潛潛悉送酒家稍就取酒漢欒布傳賣傭於齊為酒家保人皆有耳目夫子曠與婁弱毫寫萬象水鏡無停酬閑居惜重九感此歲月周端如孔北海只有樽空憂二子不並世高風兩無儔我復五百年清夢未易求芙蓉雜金菊枝葉長䦨干遥憐退朝人餻酒出太官豈知江海上落英亦可餐典衣作重九徂歲一作暑慘将一作多寒無衣粟一作寒我膚無酒顰我顔貧居真可嘆二事長相闗國朝故事九月九日以花餻法酒賜近臣西京雜記漢武帝宮人賈佩蘭九月九日佩茱萸囊食餌飲菊花酒云令人長壽方言餌即餻或謂之餈老詹亦白髮公自注惠州太守詹範字惠之相對垂霜蓬賦詩殊有味渉世非所工杖藜山谷間狀類渤海龔半道要我飲意與王𢎞同有酒我自至不須遣龎通門生與兒子杖屨聊相從南史陶潛傳江州刺史王𢎞欲識之不能致也潛嘗徃廬山𢎞令潛故人龎通之齎酒具于半道栗里要之潛使一門生二兒舉籃輿及至欣然便共飲酌俄頃𢎞至亦無忤也互見前我家六兒子流落三四州辛苦見一作更不識今與農圃儔買田帶脩竹築室依清流未能遣一力分汝薪水憂坐念北歸日此勞未易酬我獨遺以安鹿門有前修陶潛傳為彭澤令送一力給其子曰今遣此力助汝薪水之勞此亦人子也可善遇之再見九日閑居明日重九雨甚展轉不能寐起索酒和淵明一篇醉熟昏然殆不能佳也九日獨何日欣然愜平生四時靡不佳樂此古所名龍山憶孟子栗里懐淵明鮮鮮霜菊艶溜溜糟牀聲閑居知令節樂事滿餘齡登高望雲海醉覺三山傾長歌振履商起舞帶索榮坎坷識天意淹留見人情但願飽秔稌年年樂秋成新序原憲曵杖拖履行歌商頌聲滿天地如出金石列子天瑞篇孔子游於太山見榮啟期鹿裘帶索鼔琴而歌巳酉歲九月九日十月初吉菊始開廼與客作重九因次淵明巳酉九月九日一首胡廣飲菊潭而壽然李固傳贊云其視胡廣猶糞土也今日我重九公自注海南氣候不常有月即中秋有菊即重陽誰謂秋冬交黄花與我期草中實後凋香餘白雲乾色映青松高悵望南陽野古潭霏慶霄伯始真糞土平生夏畦勞飲此亦何益内熱中自焦持我萬家春一酹五柳陶夕英幸可掇繼此木蘭朝漢地理志南陽郡穣縣屬荆州古潭指穣縣菊水也胡廣字伯始飲水愈疾事詳三十七巻以黄子木拄杖壽子由詩注歲暮作和張常侍十二月二十五日酒盡取米欲醸米亦竭時吳遠游陸道士皆客於余因讀淵明歲暮和張常侍詩亦以無酒為歎乃用其韻贈二子吳遠游名復古字子野事見三十八巻次韻子由贈吳子野先生詩注陸道士名惟忠字子厚始見東坡於黄州惟忠作詩論内外丹自以為决不死坡告之曰子神清而骨寒其清可以仙其寒亦足以死後十五年復見於惠曰吾真坐寒而死矣紹聖四年卒坡為銘其墓坡嘗以文祭張安道云某於天下未嘗誌墓獨銘五人皆盛徳故如惟忠吳逺遊軰於公困戹流離之中追隨不捨惟忠不幸而死故獨得公為銘以垂千載是亦可謂知所託矣我生有天禄元膺流玉泉何事陶彭澤乏酒每形言仙人與道士自養豈在繁但使荆棘除不憂棃棗愆我年六十一頹景薄西山歲暮似有得稍覺散亡還有如千丈松常苦弱蔓纒養我歲寒枝㑹有觧脱年米盡初不知但怪饑䑕遷二子真我客不醉亦陶然漢食貨志酒者天之美禄黄庭經舌下元膺死生岸出清入元一氣渙子若得之昇天漢注云元膺通津液之岸也管受精符楊雄反騷恐日薄於西山遊斜川正月五日與兒子過出游作謫居澹無事何異老且休雖過靖節年未失斜川游春江淥未波人卧船自流我本無所適汎汎隨鳴鷗中流遇伏洄捨舟歩曾邱有口可與飲何必逄我儔過子詩似翁我唱而輙酬未知陶彭澤頗有此樂不問㸃爾何如不與聖同憂問翁何所笑不為由與求陶淵明游斜川詩開歲倐五十吾生行歸休楚辭卜居泛泛若水中之鳬隨波上下偷以全吾軀南史袁粲傳道遇一士大夫便呼與飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳郭主簿清明日聞過誦書聲節閑美感念少時悵焉追懐先君宮師之遺意且念淮徳二幼孫無以自遣廼和淵明二篇隨意所寓無復倫次也今日復何日高槐布初隂良辰非虚名清和盈我襟孺子巻書坐誦詩如鼓琴郤去四十年玉顔如汝今閉户未嘗出出為鄰里欽家世事酌古百史手自斟當年二老人喜我作此音淮徳入我夢角羈未勝簪孺子笑問我君何念之深禮記翦髪為鬌男角女羈注云夾囟曰角午逹曰羈雀鷇含淳音竹萌抱靖一作静節公自注此兩句先君少時詩失其全篇誦我先君詩肝肺為澄澈猶如鳴鶴和未作獲麟絶願因騎鯨李追此御風列丈夫貴出世功名豈人傑家書三萬巻獨取服食訣地行即空飛何必挾日月楞嚴經衆生堅固服餌而不休息食道圓成名地行仙堅固草木而不休息藥道圓成名飛行仙互見前莊子山木篇昭昭乎如掲日月而行示周掾祖謝游城東學舍作聞有古學舍竊懐淵明欣攝衣造兩塾窺户無一人邦風方杞夷廟貎猶殷因先生饌巳缺弟子散莫臻忍饑坐談道嗟我亦晚聞永言百世祀未補平生勤今此復何國豈與陳蔡鄰永媿虞仲翔絃歌滄海濵三國吳虞翻傳字仲翔徙交州雖處罪放而講學不倦門徒常數百人贈羊長史得鄭㑹嘉靖老書欲於海舶載書千餘巻見借因讀淵明贈羊長史詩云愚生三季後慨然念黄虞得知千載事上賴古人書次其韻以謝鄭君我非皇甫謐門人如摯虞不持兩鴟酒肯借一車書欲令海外士觀經似鴻都結髮事文史俯仰六十餘老馬不耐放長鳴思服輿故知根塵在未免病藥俱念君千里足歴塊猶踟蹰好學真伯業比肩可相如此書乆巳熟救我今荒蕪顧慙桑榆廹乆厭詩酒娛奏賦病未能草元老更疎猶當距楊墨稍欲懲荆舒晉皇甫謐傳自表就武帝借書帝送一車與之門人摯虞等皆為晉名臣兩鴟古語借書一瓻還書一瓻韻注瓻通作鴟盛酒器即鴟夷也後漢靈帝紀光和元年始置鴻都門學士蔡邕書石經英雄記袁遺字伯業巳見本巻飲酒詩注詩魯頌荆舒是懲按王安石初封荆國公後封舒王詩意指此乞食莊周昔貸粟猶欲舂脱之魯公亦乞米炊煮尚不辭淵明端乞食亦不避嗟來嗚呼天下士死生寄一杯斗水何所直逺汲苦姜詩幸有餘薪米養此老不才至味乆不壞可為子孫貽禮記齊大饑黔敖為食於路以待餓者有餓者來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予惟不食嗟來之食以至於斯也胡西曹示顧賊曹長春如稚女飄颻倚輕颸卯酒暈玉頰紅綃巻生衣低顔香自歛含睇意頗微寧當娣一作配黄菊未肯姒一作似戎葵誰言此弱質閲世觀盛衰頩然疑薄怒沃盥未可揮瘴雨吹蠻風凋零豈容遲老人不觧飲短句餘清悲爾雅長婦謂稚婦為娣娣婦謂長婦為姒宋玉神女賦頩薄怒以自持兮曾不可乎犯干左傳僖二十三年晉公子重耳之秦秦伯納女五人奉匜沃盥既而揮之移居去歲三月自水東嘉祐寺遷合江樓迨今一年多病鮮歡頗懐水東之樂得歸善縣後隙地數畆父老云此古白鶴觀也意欣然欲居之廼和此詩昔我初來時水東有幽宅晨興一作與烏鵲朝暮與牛羊夕誰令遷近市日有造請役歌呼雜閭巷鼓角鳴枕席出門無所詣樂事非宿昔病瘦獨彌年京薪與誰析左傳昭三年齊景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者漢張湯傳造請諸公不避寒暑洄潭轉碕岸我作江郊詩今為一㕓氓此地乃得之葺為無邪齋思我無所思古觀廢巳乆白鶴歸何時我豈丁令威千歲復還兹江山朝福地古人不吾欺時運丁丑二月十四日白鶴峰新居成自嘉祐寺遷入詠淵明時運詩云斯晨斯夕言息其廬似為余發也廼次其韻長子邁與余别三年矣挈攜諸孫萬里逺至老朽憂患之餘不能無欣然我卜我居居非一朝龜不吾欺食此江郊廢井巳塞喬木干霄昔人伊何誰其裔苗下有澄一作碧潭可飲可濯江山千里供我遐矚木固無踁瓦豈有足陶匠自至歗歌相樂我視此邦如洙如沂邦人勸我老矣安歸自我幽獨倚門或揮豈無親友雲散莫追顧野王玉篇洙水出泰山沂水出瑯琊縣楊子倚門墻則麾之再見王仲宣贈蔡子篤詩風流雲散一别如雨旦朝丁丁誰款我廬子孫逺至笑語紛如翦䰂一作髮垂髫覆此瓠壺三年一夢廼復見余詩小雅伐木丁丁鳥鳴嚶嚶呂氏春秋款門而謁款扣也漢張蒼傳肥白如瓠陳遵傳腹如瓠壺始經曲阿虞人非其招欲徃畏簡書穆生責醴酒先見我不如江左古弱國强臣擅天衢淵明墮詩酒遂與功名疎我生值良時朱金義當紆天命適如此幸收廢棄餘獨有愧此翁大名難乆居不思犧牛龜兼取熊掌魚北郊有大賚南冠觧囚拘眷言羅浮下白鶴返故廬楊子使我紆朱懐金其樂未可量也莊子列禦㓂子見夫犧牛乎衣以文繡食以芻菽及其牽而入於太廟雖欲為孤犢其可得乎外物篇神龜能見夢於元君而不避余且之網知能七十二鑽而無遺筴不能避刳腸之患施註蘇詩巻四十一
