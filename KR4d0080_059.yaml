body:
  text: 蘇詩續補遺巻下宋蘇軾撰錢塘馮景補註今體詩二百九十三首過巴東縣不泊聞頗有萊公遺迹萊公昔未遇寂寞在巴東聞道山中樹猶餘手種松江山養豪俊禮數困英雄執版迎官長趨塵拜下風當年誰刺史應未識三公宋史寇凖傳字平仲華州下邽人中第授大理評事知歸州巴東大名府成安縣毎期會賦役未嘗輒出符移惟具鄉里姓名揭縣門百姓莫敢後期後為相封萊公荆州府志巴東漢巫縣地梁信陵隋巴東有寇萊公祠祠中有二柏乃公作令時手植者民比之甘棠白帝廟朔風催入峽慘慘去何之共指蒼山路來朝白帝祠荒城秋草滿古樹野藤垂浩蕩荆江逺凄涼蜀客悲遲囘問風俗涕泗閔興衰故國依然在遺民豈復知一方稱警蹕萬乗擁旌旗逺略初吞漢雄心豈在䕫崎嶇來野廟閔黙愧常時破甑蒸山麥長歌唱竹枝荆邯真壯士吳柱本經師失計雖無及圖王固已竒猶餘帝王號皎皎在門楣寰宇記白帝山在䕫州府城東公孫述據蜀殿前井中嘗有白龍出因自稱白帝山亦以名後漢公孫述傳字子陽扶風茂陵人更始之亂述據蜀郡恃其地險衆附有自立志會有龍出其府殿中夜有光耀述以為符瑞因刻其掌文曰公孫帝建武元年四月遂自立為天子號成家色尚白建元龍興平陵人荆邯見東方將平兵且西向說述發國内精兵令田戎據江陵令延岑出漢中定三輔如此海内震搖冀有大利述以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外以廣封疆者也邯曰今東帝無尺土之柄驅烏合之衆跨馬陷敵所向輒平不亟乗時與之分功而坐談武王之說是效隗囂欲為西伯也述然邯言而不能用後漢書孟敏貿甑墮地徑去不顧郭林宗見而異之問其意曰甑已破矣視之何益戎州亂山圍古郡市易帶羣蠻瘦嶺春耕少孤城夜漏閒往時邊有警征馬去無還自頃方從化年來亦款闗頗能貪漢布但未脫金鐶何足爭強弱吾民盡玉顔叙州府志古僰國漢犍為郡梁隋曰戎州戰國策由余聞之款闗請見漢書食貨志大布次布弟布壯布中布差布厚布幼布么布小布是為布貨十品鑄作錢布皆用銅殽以連錫文質周郭放漢五銖錢云師古注布亦錢耳謂之布者言其分布流行也郭元振古劍歌瑠琉匣裏吐蓮花錯鏤金環映明月黄庭經卻滅百邪玉鍊顔和魯人孔周翰題詩二首附孔周翰題詩云屈指從來十七年交親零落一潸然嬋娟再見中秋月依舊清輝照客眠壊壁題詩已五年故人風物兩依然定知來嵗中秋月又照先生枕麴眠劉伶酒徳頌枕麴藉糟再見更邀明月說明年記取孤吟孟浩然此去宦逰如傳舎揀枝驚鵲幾時眠史記司馬相如傳王吉曰長卿久宦遊不遂而來過我漢葢寛饒傳此如傳舎所閱多矣詳見上巻孟襄陽集序間遊祕省秋月新霽諸英華賦詩作㑹浩然句曰微雲淡河漢疎雨滴梧桐舉坐嗟其清絶咸閣筆不復為繼魏武短歌月明星希烏鵲南飛繞樹三帀無枝可依獲鬼章二十二韻案先生謝御書詩自注云時熙河新獲鬼章當在元祐之初青唐有逋寇白首已窮妖竊據臨洮郡潜通講渚橋廟謀周召虎邉帥漢班超堅壘千兵破連航一炬燒擒姦從窟穴奏㨗上煙霄詭異人圖像驩娯路載謡干誅非一事伐叛自先朝取道經陵寢前期告廟祧西來聞幾日面縛見今朝二聖臨雲陛千官溢海潮載囚車轣轆失主馬蕭條横拜如蹲犬胡裝尚衣貂理卿辭具服譯長舌初調緩死恩殊厚求生尾屢摇慈仁逄太母寛厚戴唐堯赤手真擒虎和羮未賜梟藁街虛授首東市偶全腰困獸何須殺遺雛或可招威聲西振夏武節北通遼帝道有强弱天時或長消羌情防報復軍勝忌矜驕慎重闗西將竒功勿再要宋史董氊傳王韶既定熙河其首領青宜結鬼章宼河州踏白城帝命邉臣招來之熙寧十年以鬼章及阿里骨皆為刺史阿里骨傳董氈病革召諸酋領至青唐謂曰吾一子已死惟阿里骨母甞事我我視之如子今將以種落付之諸酋聴命既嗣事遣使修貢元祐元年封寧塞郡公二年遂逼鬼章使率衆拒洮州羌結藥宻者使所部怯陵來告里骨執怯陵結藥密懼攜妻子南歸鬼章又使其子結咓齪入宼八月鬼章就擒檻送京師尋赦之聴招其子以自贖元祐三年里骨奉表謝罪詔西河無復出兵許貢奉如故鬼章死詔焚付其骨左傳㣲子面縛銜璧杜詩偷生惟一老伐叛已三朝又病馬行失主錯莫無晶光又毛暗蕭條連雪霜漢司馬遷傳猛虎在深山百獸震恐及在檻穽之中搖尾而求食東觀故事令郡國送梟五月五日為梟羮賜百官注以惡鳥故食之欲絶其類也三輔録長安城中有藁街陳湯斬郅支單于懸頭于此史記鼂錯衣朝衣斬東市檀弓是全要領以從先大夫於九亰也左傳困獸猶鬬史記宋義諫項梁曰戰勝而將驕卒惰者敗光禄菴二首文章恨不見文園禮樂方将訪石泉何事菴中著光禄枉教閑處筆如椽史記司馬相如傳相如拜為孝文園令唐書田㳺巖頻召不出髙宗幸嵩山親至其門㳺巖野服出拜帝問先生比佳否對曰臣所謂泉石膏肓煙霞痼疾晉王珣傳孝武時為僕射夢人以大筆如椽與之既覺語人曰此當有大手筆事俄而帝崩哀冊諡議皆珣所草城中太守的何人林下先生非我身若向菴中覓光禄雪中履迹鏡中真通典郡守秦官漢景帝中元二年更名郡守為太守過木櫪觀老泉詩序云許旌陽得道之所舟人不以相告既過至武寧縣乃得其事縣人云許旌陽棺槨猶在山上旌陽許邁也嘗為旌陽縣令石壁髙千尺微蹤逺欲無飛簷如劍寺公自注出劍門東望上寺宇彷彿可見古柏似仙都許子嘗髙遁行舟悔不迂斬蛟聞猛烈提劍想﨑嶇寂寞棺猶在脩崇世已愚隱居人不識化去俗爭吁洞府煙霞逺人間爪髮枯飄飄乗倒景誰復顧遺軀南昌府志許邁南昌人母夢金鳳銜珠墮掌而生晉初為旌陽令得異人術周逰江湖悉斬蛟蜃除民害精修山中年一百三十六舉家飛昇倒景注見上巻觀開西湖次吴左丞韻偉人謀議不求多事定紛紛自唯阿盡放龜魚還綠净肎容蕭葦障前坡一朝羙事誰能紀百尺蒼崖尚可磨天上列星當亦喜月明時下浴明疑作清波左傳後之人求多於女將不女容焉道徳經唯之與阿相去幾何漢武故事帝祀甘泉至渭橋有女子浴於渭乳長七尺上怪而問之女曰帝後第七車侍中知我所來時張寛在第七車對曰此星主祭祀者齋戒不嚴則女人星見案天星下浴人但以為先生偶作驚人語耳不知亦有出處荆州十首庚子正月先生與子由侍老泉自荆州游大梁遊人出三峽楚地盡平川北客随南賈吴檣閒蜀船江侵平野斷風捲白沙旋欲問興亡意重城自古堅古今注城者盛也所以盛受民物也左傳民保於城城保於徳博物志禹始作城强者攻弱者守敵者戰唐書大河以北無堅城南方舊戰國慘澹意猶存慷慨因劉表凄凉為屈原廢城猶帶井古姓聚成村亦解觀形勝昇平不敢論周易改邑不改井韻注村聚落也楚地闊無邉蒼茫萬頃連耕牛未嘗汗投種去如捐農事誰當勸民愚亦可憐平生事遊惰那得怨凶年左傳提封萬頃事物紀原後漢末以趙過為搜粟都尉始教民牛耕三犁共一牛一人将之實勝耒耜之利左傳九扈為九農正注以九扈為九農之號各隨其宜以教民事朱檻城東角髙王此望沙江山非一國烽火畏三巴戰骨淪秋草危樓倚斷霞百年豪傑盡擾擾見魚鰕五代髙從誨嗣為荆南節度使封渤海王改南平王晉髙祖立遣學士陶榖為生辰國信使從誨宴之望沙樓大陳戰艦語榖曰吳蜀不賔久矣願脩武備習水戰以待師期榖還具道其語晉祖大喜又南漢與閩蜀皆稱帝從誨所向稱臣故公詩有江山非一國語江淹恨賦試望平原蔓草縈骨拱木歛魂沙頭煙漠漠來往厭喧卑野市分麞閙官帆過渡遲遊人多問卜傖叟盡攜龜日暮江天靜無人唱楚詞鮑眀逺舞鶴賦去帝鄉之岑寂歸人寰之喧卑史記三王不同龜四夷各異卜然各以决吉凶禇少孫續史南方老人用龜支牀足太守王夫子山東老俊髦壯年聞猛烈白首見雄豪食鴈君應厭驅車我正勞中書有安石慎勿賦離騷東漢王符傳皇甫規觧官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規卧不迎既入問卿在郡食鴈羙乎晉謝安傳字安石為尚書僕射領吏部加後將軍及中書令史記屈原傳乃憂愁幽思而作離騷離騷者猶離憂也殘臘多風雪荆人重嵗時客心何草草里巷自嬉嬉爆竹驚鄰鬼驅儺逐小兒故人應念我相望各天涯荆楚嵗時記歲暮家家具肴蔌謂之備宿歲之儲至新年棄之街衢以為去故納新詩驕人好好勞人草草神異經西方深山中有惡鬼名山魈畏爆竹聲人以竹著火中熚烞有聲則驚走驅儺注見前案鬼惡金姑聲閩人謂破竹聲為金姑聲也江水深成窟潜魚大似犀赤鱗如琥珀老枕勝玻瓈上客舉雕俎佳人摇翠箆登庖更作器何以免屠刲周頌猗與漆沮濳有多魚郭璞江賦或鹿觡象鼻或虎狀龍顔鱗甲璀錯煥明錦斑北鴈來南國依依似旅人縱横遭折翼感惻為沾巾平日誰能挹髙飛不可馴故人持贈我三嗅若為珍韓詩嗷嗷鳴鴈鳴且飛窮秋南去春北歸張衡四愁詩側身北望涕霑巾九域志韓憑妻何氏羙宋康王欲之何氏歌曰南山有鳥北山張羅鳥自髙飛羅當奈何陶宏景詩不堪持贈君柳門亰國道驅馬及春陽野火燒枯草東風動綠芒北行連許鄧南去極衡湘楚境横天下懐王信弱王白居易春草詩野火燒不盡春風吹又生岳陽樓記北通巫峽南極瀟湘懐王入秦不返注見前史記趙王敖自上食禮甚卑高祖箕倨詈貫高趙午乃怒曰吾王孱王也注孱弱也渝州寄王道祖祖一作矩曾聞五月到渝州水泊長亭砌下流唯有夢魂長繚繞共論唐史更綢繆舟經故國嵗時改霜落寒江波浪收歸夢不成冬夜永厭聞船上報更籌重慶府志周巴子國秦置巴郡漢曰江州漢末曰永寧梁曰楚州隋曰渝州白帖十里一長亭五里一短亭過安樂山聞山上木葉有文如道士篆符云此山乃張道陵所寓二首第二首一作重過安樂山天師化去知何在玊印相傳世共珍故國子孫今尚死滿山秋葉豈能神張真人傳名道陵良八世孫隱天目山漢章帝和帝累召不起久之逰雲綿洞煉丹青龍白虎旋繞其上丹成餌之于蜀之雲臺峯昇天所遺經訣符章印劍授子孫世守之化去詳下真人已不死外慕墮空虛猶餘好名意滿樹寫天書荘子大宗師古之真人不知說生不知惡死其出不訢其入不距翛然而徃翛然而来而已矣史封禪書李少君病死天子以為化去不死又齊人丁公年九十餘曰封禪者合不死之名也宋史大中祥符元年春正月乙丑有黄帛曵左承天門南鴟尾上守門卒塗榮告有司以聞上召羣臣迎于朝元殿唘封號稱天書涪州得山胡公自注善鳴出黔中案涪州古巴國漢涪陵終日鎖筠籠回頭惜翠茸誰知聲㗲㗲亦自意重重夜宿煙生浦朝鳴日上峯故巢何足戀鷹隼豈能容釋名籠土器又笭也所以畜鳥左傳狐裘尨茸注亂貎此云翠茸盖翠羽也禰衡鸚鵡賦閉以雕籠剪其翅羽揚子通諸人之㗲㗲巫山廟上下數十里有烏鳶無數取食於行舟之上舟人以神之故不敢害羣飛来去噪行人得食無憂便可馴江上饑烏無足怪野鷹何事亦頻頻韓丈二斥不復羣飛刺天杜詩白鷺羣飛太劇乾西京雜記乾鵲噪而行人至揚子法言頻頻之黨甚於鸒斯亦賊夫糧食而巳矣夷陵縣歐陽永叔至喜堂夷陵雖小邑自古控荆吴形勝今無用英雄久已無誰知有文伯逺謫自王都人去年年改堂傾嵗嵗扶追思猶咎吕感歎亦憐朱公自注時朱太守為公築此臺舊種孤楠老新霜一橘枯清篇畱峽洞醉墨寫邦圖公自注三游洞有詩夷陵圖後有留題處故老問行客長官今白䰅著書多念慮許國減歡娱寄語公知否還須數倒壺史記白起傳白起攻楚㧞鄢鄧五城其明年㧞郢燒夷陵遂東至竟陵楚王亡去郢東走徙陳秦以郢為南郡宋歐陽修傳入朝為館閣校勘范仲淹以言事貶在廷多論救司諫髙若訥獨以為當黜修貽書責之謂其不復知人閒有羞恥事若訥上其書坐貶夷陵令按史稱呂夷簡為相成郭后之釁逐孔道輔范仲淹於外時論以此少之而歐陽之貶由救仲淹故公詩云追思猶咎呂指夷簡也入峽自昔懐幽一作清賞今茲得縱探長江連楚蜀萬𣲖瀉東南合水來如電黔波綠似藍餘流細不數逺勢競相參入峽初無路連山忽似龕縈迂收浩𣺌蹙縮作淵潭風過如呼吸雲生似吐含墜崖鳴窣窣垂蔓綠毶毶冷翠多崖竹孤生有石楠飛泉飄亂雪怪石走驚驂絶澗知深淺樵童忽兩三人煙偶逢郭沙岸可乗籃野戍荒州縣邦君古子男放衙鳴晚鼓留客薦霜柑聞道黄精草叢生綠玊篸盡應充食飲不見有彭聃氣候冬猶煖星河夜半涵遺民悲昶衍公自注孟昶從此入覲王衍亦蜀主舊俗接魚蠶版屋漫無瓦嵓居窄似菴伐薪常冒嶮得米不盈甔歎息生何陋劬勞不自慙葉舟輕逺泝大浪固嘗諳矍鑠空相視嘔啞莫與談蠻荒安可駐幽䆳信難妉獨愛孤棲鶻髙超百尺嵐横飛應自得逺颺似無貪振翮游霄漢無心顧雀䳺塵勞世方病局束我何堪盡解林泉好多為富貴酣試㸔飛鳥樂髙遁此心甘漢書趙充國傳注山峭夾水曰峽寰宇記瞿塘峽在䕫州府城東舊名西陵峽兩崖對峙中貫一江灔澦堆當其口乃三峽之門巫峽在巫山縣明月峽在夷陵州懸厓間白石如月黄牛峽在夷陵州西庾仲雍荆州記巴楚有明月峽廣徳峽東突峽今謂之巫峽秭歸峽歸鄉峽輿圖大江在荆州府西北源出蜀之岷山歴荆州夷陵宜都枝江公安石首而東與漢江合荆楚及䕫子皆古子男國也神仙傳鄧伯元王𤣥甫俱在霍山服青精飰杜詩豈無青精飰使我顔色好登真訣注乾石青精即黄精其法以南燭草汁浸米蒸飰暴乾其色青如黳珠食之延年李白詩蠶叢及魚鳧開國何茫然一統志黄帝子曰昌意娶蜀山氏女生髙陽乃封其支庶於蜀歴夏商始稱王首稱蠶叢次曰柏灌次曰魚鳧又蠶叢氏初為蜀侯後稱蜀主教民蠶桑呼青衣帝又成都有昇仙橋相傳魚鳧王與張伯子俱乘虎仙去橋因以名後漢馬援傳矍鑠哉此翁莊子相視而笑莫逆于心風土記鶻鳩一名鶌鳩又名鶻鵃喜朝鳴後漢呂布傳譬如養鷹饑即為用飽則颺去題贈田辨之琴姬流水随絃滑清風入指寒坐中有狂客莫近繡簾彈呂氏春秋伯牙善鼓琴鍾子期善聴伯牙方鼓琴志在髙山子期曰善哉巍巍乎若泰山俄而志在流水子期曰善哉湯湯乎若江河琴歴琴曲有風入松石上流泉辨音集李龜年在岐王宅聞繡簾内彈琴曰此秦聲良久又曰此楚聲王入問之前彈者隴西沈妍後彈者揚州薛滿也二妓驚服翰林志賀知章請為道士還鄉里詔賜鏡湖剡川一曲自號四明狂客四十年前元夕與故人從遊得此句一作上元夜遊絶句午夜朧朧淡月黄夢回猶有暗塵香縱橫滿地霜槐影寂寞蓮燈半在亡唐詩淡月踈星遶建章南部煙花記宫人皆以沉香屑裹履中以薄玉為底行則香痕印地名曰塵香洞冥記長安巧工丁緩為常滿燈九龍五鳳雜以芙蕖蓮葉捧承之狀南康望湖亭一本云過洞庭八月渡長湖蕭條萬象疎一本云蕭湘景物疎秋風片帆急暮靄一作雨一山孤許國心猶在康時術一作業已虚岷峨家萬里投老得歸無成都府志岷山在茂州即隴山之南首直上六十里可望成都岷江之源出此山經茂威二州至新津界峨睂山記在睂州城南來自岷山連岡叠嶂延袤三百餘里至此突起三峯其二峯對峙宛若峨睂半山亭登嶺勢巍巍蓮峯太華齊任几欄紅日蚤回首白雲低松柏月中老猿猴物外嗁禪師吟絶後千古指人迷山海經太華山在華隂即西岳也石壁直上如削成最著者曰蓮花眀星玉女三峯宼凖吟華山詩只有天在上更無山與齊舉頭紅日近回首白雲低時凖年八歳宋復古畫瀟湘晚景圖三首西征憶南國堂上畫瀟湘照眼雲山出浮空野水長舊游心自省信手筆都忘㑹有衡陽客來看意𣺌茫寰宇記衡陽縣漢酃縣地臧榮緒晉書潘岳為長安令作西征賦落落君懐抱山川自屈蟠經營初有適揮灑不應難江市人家少煙村古木攢知君有幽意細細為尋㸔後漢耿弇傳帝謂弇曰將軍前在南陽建此大䇿常以為落落難合有志者事竟成也咫尺殊非少隂晴自不齊徑蟠趨後崦水㑹赴前溪自説非人意曾經入馬蹏他年宦遊處應話劍山西左傳天威不違顔咫尺史記孔子世家有隼集于陳廷而死楛矢貫之石砮矢長尺有咫杜牧之阿房宮賦舞殿冷褏風雨凄凄一日之内一宫之間而氣候不齊海上道人傳以神守氣訣但向起時作還於作處收蛟龍莫放睡雷雨直須休要㑹無窮火嘗觀未盡油夜深人散後惟有一燈留抱朴子胎息者謂以鼻口呼吸如在胞胎中初學行氣常令入多出少莊子列禦寇夫千金之珠必在九重之淵驪龍頷下子能得珠者必遭其睡也楞嚴經阿那律陀常樂睡眠聞如來訶嗁泣自責七日不眼失其雙目易雷雨之動滿盈莊子飬生主指窮于薪火傳也不知其盡也維摩經有法門名無盡燈者譬如一燈然百千燈𠖇者皆明明終不盡次周燾韻一作次周濤韻并叙周燾遊天竺觀激水作詩云拳石耆婆色兩青竹龍驅水轉山鳴夜深不見跳珠碎疑是檐閒滴雨聲東坡和之道眼轉丹青常於寂處鳴蚤知雨是水不作兩般聲傅大士金剛頌天眼通非閡肉眼閡非通法眼惟觀俗慧眼真緣空佛眼如千日照異體還同按此詩宗㫖暗用傅頌而以道眼包攝五眼又楞嚴偈云聲無既無滅聲有亦非生生滅二縁離是則常真實乃此詩常于寂處鳴五字註腳過海得子由書經過廢來久冇弟忽相求門外三竿日江關一葉秋蕭疎悲白髪漫浪散窮愁世事江聲外吾生幸且休易同聲相應同氣相求劉禹錫竹枝詞日出三竿春霧銷唐元結傳後家瀼濵乃自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎既客樊上漫遂顯樊莊子飬生主吾生也有涯戰國䇿孟甞君不恱曰先生且休矣去嵗與子野遊逍遥堂日欲沒因並西山叩羅浮道院至已二鼓矣遂宿于西堂今嵗索居儋耳子野復來相見作詩贈之往嵗追歡地寒牕夢不成笑談驚半夜風雨暗長檠雞唱山椒曉鐘鳴霜外聲只今那復見髣髴似三生黄帝内傳王母授帝洞霄盤雲九華燈檠注此燈有檠之始也韓詩長檠八尺空自長栁子厚記步山椒而登焉山海經豐山上有九耳鐘霜降則鳴元祐五年十二月十二日同景文義伯聖途次元伯固仲䝉游七寳寺題竹上結根豈殊衆修柯獨出林孤髙不可恃嵗晚霜風侵唐王維詩賤日豈殊衆貴來方悟希禮記如松柏之有心也如竹箭之有筠也虛其心實其節貫四時而不改柯易葉則吾以是觀君子之徳泗州過倉中劉景文老兄戲贈一絶既聚伏波米還數魏舒籌應笑蘇夫子僥倖得湖州馬援聚米事詳後漢書注見前晉魏舒傳舒為鍾毓長史毓毎與參佐射舒常為畫籌而巳後遇朋人不足以舒滿數發無不中舉坐愕然毓謝而嘆曰吾之不足以盡卿才有如此射矣豈一事哉戲題巫山縣用杜子羙韻巴俗深留客吴儂但憶歸直知難共語不是故相違東縣聞銅臭江陵換裌衣丁寧巫峽雨慎莫暗朝暉方言吳人自謂曰儂後漢書崔烈入錢五百萬為司徒其子鈞曰論者嫌其銅臭答鼂以道索書閲世真難記如公自不忘其於書太簡正以懶相妨陸機歎逝賦川閱水以成川水滔滔而日度世閲人而為世人冉冉而行莫人何世而弗新世何人之能故魏文帝與朝歌令吳質書足下所治僻左書問致簡益用增勞嵇康與山夀絶交書性復䟽嬾筋駑肉緩又縱逸來久情意傲散簡與禮相背嬾與慢相成韓退之詩老嬾無鬬心久不事鉛槧大老寺竹間閣子殘花帶葉暗新筍出林香但見竹隂綠不知汧水黄樹髙傾隴鳥池浚落河魴栽種良辛苦孤僧瘦欲尩毛詩莫髙匪山莫浚匪泉又豈其食魚必河之魴禮記檀弓吾欲暴尩而奚若注瘠病之人也款塞來享蠢爾氐羌國天誅亦乆稽既能知靣内不復議征西斥堠銷烽火邊城息鼔鼙輸忠修貢職棄過為黔黎雪滿流沙静雲沉太白低巍巍二聖治盛徳古難齊詩小雅蠢爾蠻荆大邦為仇商頌自彼氐羌伊訓天誅造攻自牧宮三國志髙堂隆傳使四表同風囘首面内徳教光熙九服慕義固非俗吏之所能也說文堠封土為臺以記里也李廣傳然亦逺斥堠漢文帝遺匈奴書朕與單于共棄細故偕之大道一統志太白山在武功山甞積雪望之皎然軍行不得鳴鼓角鳴則疾風暴雨立至上有洞道書第十一洞天觀去聲臺案佛家止觀經云止能捨藥觀能離苦止如定而后能静觀則慮而后能得也梵云毘鉢舍那華言觀三界無所住一臺聊自寧塵勞付白骨寂照起黃庭殘磬風中嫋孤燈雪後青須防童子戲投瓦犯清泠釋典欲界為一地四禪四空為八地合為九地即三界是亦名三有金剛經菩薩於法應無所住行於布施又應無所住而生其心楞嚴經優波尼沙陀觀不淨相生大厭離悟諸色性以從不淨白骨㣲塵歸於虛空又相待生勞勞久發塵自相渾濁髙僧傳智藏宿靈曜寺一心寂照滿室光明人問其故答曰此中竒妙未可得言夫宴寂之門固有妙喜吉祥黃庭外景經上有黄庭下關元注黄庭者脾為中主横在太倉上楞嚴文殊偈淨極光通達寂照含虛空卻來觀世間猶如夢中事隋唐嘉話江寧縣寺有晉長明燈歳久火色變青而不熱隋文帝平陳巳訝其古至今猶存案孤燈雪後青句青字夲此卻以雪後形容不熱使事真有化工之巧楞嚴經月光童子修習水觀室中安禪有弟子窺􅑵觀室唯見清水童穉無知取一瓦礫投於水内激水作聲出定心痛後入定時童子奉教除去瓦礫身質如初莊子舜以天下讓其友北人無擇北人無擇羞見之因自投清泠之淵吴江岸曉色兼秋色蟬聲雜鳥聲壮懐銷鑠盡回首尚心驚鄩陽獄中上梁王書衆口鑠金積毁銷骨江淹恨賦於是僕夲恨人心驚不巳嘲子由堆几盡埃簡攻之如蠧蟲誰知聖人意不在古書中嵇康與山濤書素不便書不喜作書而人間多事堆案盈几不相酬答則犯教傷義韓退之雜詩古史散左右詩書置後前豈殊蠧書蟲生死文字間莊子天道篇桓公讀書于堂上輪扁斲輪于堂下釋椎鑿而上問曰公之所讀為何言邪公曰聖人之言也曰聖人在乎公曰巳死矣曰古之人與其不可傳也死矣然則君之所讀者古人之糟粕巳夫案攻専治也如考工記攻木攻金之類無題六秩行當啟區中緣更疎不貪為我寳安歩當君車故國多喬木先人有弊廬誓将閑散好不著一行書白樂天詩年開第七秩屈指幾多人左傳宋人或得玉獻諸子罕子罕不受曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶卒弗受戰國䇿晚食以當肉安歩以當車無罪以當貴檀弓臣免於罪則有先人之敝廬在君無所辱命扶風天和寺逺望若可愛朱欄碧瓦溝聊為一駐足且慰百回頭水落見山石塵髙昏市樓臨風莫長嘯遺涕浩難收聞洮西㨗報漢家将軍一丈佛詔賜天池八尺龍露布朝馳玊關塞㨗書夜到甘泉宫似聞指揮築上郡已覺談笑無西戎牧臣不見天顔喜但驚草木放一作皆春容漢武故事毘耶殺休屠王以其衆來降得其金人置之甘泉宮金人皆長丈餘後漢書漢眀帝夜夢金人長丈餘身有日光飛空而至以問羣臣傅毅對曰臣聞西域有神其名曰佛其形長丈六尺而黄金色周禮馬八尺以上為龍文心雕龍檄者皦也宣露于外皦然明白也明白之文或稱露布播諸視聴也又插羽以示迅不可使辭緩露板以宣衆不可使義隠世說桓宣武北征袁虎時從㑹湏露布文喚袁倚馬前令作手不輟筆俄得七紙殊可觀虎袁宏小字也北史後魏毎戰克書帛於漆竿上名曰露布傅永傳永字脩期仕魏拜安逺将軍鎮南府長史帝毎嘆曰上馬能擊賊下馬作露布惟傅修期耳按露布與檄文同體聲罪曰檄告捷曰露布謂露板宣布其功也其用巳久惟書帛漆竿當始於北魏後漢班超傳注玉門關屬燉煌郡今沙州也去長安三千六百里闗在燉煌縣西北杜子羙詩捷書夜報清晝同漢文帝紀三年上幸甘泉師古曰甘泉在雲陽本秦林光宮上郡秦置屬并州漢武帝紀遣因杅將軍公孫敖築塞外受降城杜詩談笑無河北又天顔有喜近臣知三蕚牡丹風雨何年别留真向此邦至今遺恨在巧過不成雙已未十月十五日獄中恭聞太皇太后不豫有赦作詩庭柏隂隂畫掩門烏知有赦閙黄昏漢宫自種三生福楚客還招九死魂縱有鋤犂及田畝已無靣目見邱園只應聖主如堯舜猶許先生作正言漢朱博傳御史府有松栢樹常有烏數千集其府朝去暮來號朝夕烏南史宋元康中徙彭城王義康為豫章臨川王義慶時為江州相見而笑文帝聞而怪之召還宅義慶大懼妓妾夜聞烏啼聲叩閣云明日有赦後改為南州因製烏夜嗁曲楚辭雖九死其猶未悔宋玉招魂注見前史記項羽夲紀縱江東父兄憐而王我我何面目見之職畧宋雍熙四年改補闕為左右司諫拾遺為左右正言是時太宗欲令諫官修職故詔改其官詔曰諫議大夫司諫正言咸預軒陛之列是為耳目之官題李景元畫聞説神仙郭恕先醉中狂筆勢瀾翻百年寥落何人在只有華亭李景元宋史郭忠恕傳字恕先河南洛陽人七歲能誦書屬文舉童子及第尤工篆籒縱酒跅弛後坐貶流落不復求仕進或踰月不食盛暑暴露日中體不沾汗窮冬鑿河冰而浴其旁凌澌消釋人皆異之尤善畫得者藏以為寶太宗聞其名召授國子監主簿益使酒肆言擅鬻官物詔减死决杖流登州已行至齊州臨邑謂部送吏曰我今逝矣因掊地為穴度可容面俯窺焉而卒稾葬後累月故人將改葬之其體輕若蟬蛻史記注掊手杷土也畫鑑古人畫諸科各有其人界畫則唐絶無作者歴五代始得郭忠恕一人謝人恵雲巾方舄二首燕尾稱呼理未便剪裁雲葉卻天然無心只是青山物覆頂宜歸紫府仙轉覺周家新様俗公自注頭巾起後周未容陶令舊名傳鹿門佳士勤相贈黒霧𤣥霜合比肩公自注皮襲羙贈天随子沙巾詩云掩歛乍疑裁黒霧輕明渾似帶元霜釋名巾謹也二十成人士冠庶人巾當自謹修四教也傅子漢末王公多委王服以幅巾為雅素袁紹崔豹之徒雖為将帥猶著縑巾魏武惜財擬古皮弁裁縑帛以為巾夾巾夾即帢也未有岐荀文若巾之行觸樹枝成岐因而弗改按成岐盖若燕尾云晉輿服志司馬彪曰長冠盖楚制人間或謂之鵲尾冠非也南史齊和帝紀百姓皆著下屋白紗㡌而反帬覆頂東昏曰帬應在下今更在上不祥命斷之於是百姓皆反帬向下此服妖也按反帬覆頂今道士巾式故云宜歸紫府仙也北堂書鈔頭巾之製起於後周宋書陶潜好酒郡将候潜逄其酒熟取頭上葛巾漉酒漉畢還復著之胡鞾短靿格麄疎古雅無如此様殊妙手不勞盤作鳳公自注晉永嘉中有鳳頭鞋輕身只欲化為鳧魏風褊儉堪羞葛楚客豪華可笑珠擬學梁家名解脫公自注武帝作解脫履便於禪坐作跏趺古今注鞾本胡服也趙武靈王常服之其制短靿黄皮閒居之服至馬周改制長靿以殺之加之以氊及絛得著入殿省敷奏取便乘騎也䨇鳧注見前詩小雅糾糾葛屨可以履霜史記春申君傳其上客皆躡珠履以見趙使趙使大慙楞嚴經有佛化身結跏趺坐謝宋漢傑恵李承晏墨老松燒盡結輕花妙法來從北李家翠色冷光何所似牆東鬒髮堕寒鴉見聞録唐李超易水人與子廷珪亡至歙州其地多松因留居以墨名家其堅如玉其紋如犀曹植詩墨出青松烟筆出狡兔翰李賀石硯歌紗帷畫煖墨花春輕漚漂沫松麝薰詩國風鬒髪如雲不屑髢也墻東暗用鄰女窺宋玉事古墨法云色不染手光可射人此云鬒髪寒鴉亦取有仍氏女髪光可鑑意被命南遷塗中寄定武同僚人事千頭及萬頭得時何喜失時憂只知紫綬三公貴不覺黄粱一夢遊適見恩綸臨定武忽遭分職赴英州南行若到江干側休宿潯陽舊酒樓史記老子曰君子得時則駕不得其時則蓬累而行前漢書太尉金印紫綬後漢輿服志公侯將軍紫綬二采紫白九卿中二千石青綬三采青白紅自青綬以上綬皆長三尺二寸與綬同采而首半之縌者古佩璲也佩綬相迎受故曰縌紫綬以上縌綬之間得施玉環鐍云唐白居易左遷九江郡司馬送客湓浦口作琵琶行云潯陽江頭夜送客楓葉蘆花秋瑟瑟結用此事李委吹笛并引元符五年十二月十九日東坡生日置酒赤壁磯下踞髙峯俯鵲巢酒酣笛聲起於江上客有郭石二生頗知音謂坡曰笛聲有新意非俗工也使人問之則進士李委聞坡生日作新曲白鶴南飛以獻呼之使前則青巾紫裘要笛而已既奏新曲又快作數弄嘹然有穿雲裂石之聲坐客皆引滿醉倒委袖出嘉紙一幅曰吾無求於公得一絶句足矣坡笑而從之山頭孤鶴向南飛載我南遊到九嶷下界何人也吹笛可憐時復犯龜茲風俗通笛漢武帝時邱仲所作也笛滌也所以蕩滌邪穢納之雅正也長尺四寸六孔元稹連昌宮辭逡廵大遍梁州徹色色龜茲轟緑續按詞曲之名有破有犯破則唐樂府中入破第一疊入破第二疊之類是也犯則詞譜所載二犯尾犯之類是也詩用犯字夲此龜兹蕃部曲名書黄筌畫翎毛花蝶圖二首短翎長喙喜喧卑曵練雙翔亦自竒賴有黄鸝鬭嬛好獨依蘚石立多時畫鑑五代時黄筌與子居宷並善花卉謂之寫生妙在傅色不用筆墨但以輕色染成謂之沒骨圖郭若虛云諺稱黄筌富貴徐熙野逸蓋筌居待詔所寫皆禁籞珍禽瑞鳥竒花怪石又翎毛骨氣尚豐徐熙江南處士志節髙邁多狀汀花野竹小鳥淵魚二者皆春蘭秋菊各擅重名綠隂青子巳愁人忍見中庭燕麥新怊悵劉郎今白首時來㸔巻覓餘春杜牧之詩桃花落盡深紅色綠葉成隂子滿枝次韻王定國得晉卿酒相留夜飲短衫壓手氣横秋更著仙人紫綺裘使我有名全是酒從他作病且忘憂詩無定律君應将醉有真郷我可侯且倒餘樽盡今夕睡蛇巳死不須鈎釋名衫芟也衣無袖端也古今注秦始皇以布開袴名曰衫廬陵記成芳隱麥林山剥苧皮為短襕寛袖之衣著以酤酒自稱隱士衫李太白詩解我紫綺裘且換金陵酒晉張翰傳字季鷹吳郡人常曰使我有身後名不如即時一杯酒時人貴其曠達晉顧榮傳恒縱酒酣暢謂友人張翰曰惟酒可以忘憂但無如作病何耳杜詩詩律羣公問杜牧詩今代風騷將誰登李杜壇唐王績有醉鄉記注見前宋种放傳字明逸隱終南山自號雲溪醉侯佛遺教經譬如黒蚖在汝室睡當以自持戒之鈎蚤併除之睡蛇既出乃可安眠偶於龍井辨才處得歙硯竒作小詩羅細無文角浪平半丸犀璧浦雲泓午牕睡起人初静時聽西風拉瑟聲硯譜玉朝元硯此為細羅紋刷絲歙石圓徑六寸髙寸五分面有蔥色兔月二像巧若畫成更無凹凸真五代前物也旁刻建中靖國元年改製下刻篆書一拳石兮呈祥俾翰墨兮增光出煨燼兮不敗伊蘇氏兮其昌張九成識又二行子子孫孫永寳用之按蘇氏其昌句豈即先生辨才處所得歙硯與又先生倣毛穎戲作萬石君傳云羅文歙人也其上世甞隠龍尾山云云見聞録蜀人景煥甞得墨材甚精止造五十團曰以此終身墨印文曰香璧後山談叢秦少㳺有李廷珪墨半丸不為文理質如金石潘谷見之而拜曰真李氏故物也我生再見矣秋晚客興草滿池塘霜送梅疎林野色近樓臺天圍故越侵雲盡潮上孤城帶月迴客夢冷随楓葉斷愁心低逐鴈聲來流年又喜經重九可意黄花是處開唐詩山圍故國周遭在潮打空城寂寞囘又楓落吳江冷陳伯比和回字復次韻百里馮生寧屑去湖海陳侯猶肎來詩書好在家四壁蒲柳蓊然城一隈騎上下山亦疎矣鯈從容出何為哉市橋十歩即塵土晚雨瀟瀟殊未回三國志陳登字元龍許汜甞曰元龍湖海之士豪氣未除漢司馬相如傳家徒四壁立莊子秋水鯈魚出㳺從容是魚樂也廣陵後園題申公章子厚扇子露葉風枝曉自匀緑隂青子淨無塵閑吟遶屋扶疎句須信淵明是可人謝恵連詩團團滿葉露析析振條風陶淵明讀山海經詩孟夏草木長繞屋樹扶踈衆鳥欣有託吾亦愛吾廬世說桓温行經王敦墓望之曰可兒可兒孫綽與庾亮牋云王敦可人之目數十年間也山光寺回次芝上人韻閙裏清遊借隙光醉時真境發天藏夢回拾得吹來句十里南風草木香與道源遊西荘遇齊道人同往草堂為齊書此桑麻巳零落藻荇復銷沈園宅在人境嵗時傷我心强穿南埭路遥望北山岑欲與道人語跨鞍聊一尋江淹恨賦亦復含酸茹歎銷落湮沈廣雅銷散也湮没也陶詩結廬在人境而無車馬喧寒食夜漏聲透入碧牕紗人静鞦韆影半斜沈麝不燒金鴨冷淡雲籠月照棃花藝術圖北方為鞦韆戲以習輕趫漢武後庭之戲為千秋悞作秋千唐本草麝香生中臺川谷及雍州益州皆有之陶隠居曰形似麞甞食柏葉及噉蛇或于五月得者徃徃有蛇皮骨主辟邪殺鬼精記事珠金猊寳鴨皆焚香器詩餘金鴨晚香寒答子勉三首君不登郎省還應上諫坡才髙殊未識嵗晚幸無他櫪馬羸難出鄰雞凍不歌寒爐餘㡬火灰裏撥隂何漢書馮唐傳文帝輦過問唐曰父老何自為郎通典中書之官舊矣謂之中書省自魏晉始焉省有中書舍人五人領主書十人分掌二十一局事總國内機要尚書唯聴受而已李氏談録先公嘗言故左省雀坡頌于宗諤因問坡義答曰唐諫議大夫雖在給舍之上待諫議歳滿方遷給事自給事遷舍人時有自郎署拜諌議者驟立在給事上朝中謂曰饒君斗上坡去亦湏斗下坡來蓋言其卻為給舍序班在下也後遂為故事按諫坡二字得此方眀隂何謂隂鏗何遜也驚人得佳句或以傲王公處士還清節滑稽安足雄深沉似康樂簡逺到安豐一㸃無俗氣相期林下風皇甫湜顧況集序逸歌長句駿發蹈厲徃徃多意外驚人語杜子羙詩平生性僻躭佳句語不驚人死不休華山記李白登華山落鴈峯曰此山最髙呼吸可通帝座恨不攜謝眺驚人句來搔首問青天耳屈原卜居將突梯滑稽如脂如韋以絜楹乎漢書傳注師古曰滑稽圜轉縱捨無窮之狀滑音骨稽音雞世說裴楷清通王戎簡要又王公熟視謝尚謂客曰使人思安豐又濟尼曰王夫人神情𣪚朗故有林下風氣欲舞腰身栁一窠小梅摧拍大梅歌舞餘片片棃花落爭奈當塗風物何白樂天詩楊栁小蠻腰西京雜記髙帝戚夫人善為翹袖折腰之舞詩餘六么摧拍盞頻傳洞冥記武帝宮人麗娟善歌體弱不勝衣常唱廻風曲庭葉翻落如秋帝甞以衣帶繫其袂恐其隨風而去也送楊奉禮譜牒推關右風流出靖恭時情任險陂家法故雍容南去河千頃大水中相别餘惟酒一鍾更誰哀老子令得放疎慵後漢楊震傳字伯起𢎞農華隂人也少好學受歐陽尚書于太常桓郁眀經博覧無不窮究諸儒為之語曰闗西夫子楊伯起又曹操收楊彪下獄將作大匠孔融聞之不及朝服徃見操曰楊公四世清徳海内所瞻劉攽曰按楊氏有兩族赤泉氏從木子雲自叙其受氏從才而楊修書稱曰修家子雲是震族亦是楊氏不知文士聊如此云其亦實然耶今書中華隂之族從木從才相半未知所從學者辨之唐書栁沖著姓系録栁芳論之略曰魏氏立九品置中正晉宋因之始尚姓已于時有司選舉必稽譜籍而考其真偽故官有世胄譜有世官過江則為僑姓王謝袁蕭為大東南則為吳姓朱張顧陸為大山東則為郡姓王崔盧李鄭為大闗中亦號郡姓韋裴栁薛楊杜首之又唐興言譜者以路敬淳為宗栁冲韋述次之李守素亦眀姓氏時為肉譜者後有李公淹蕭頴士殷寅孔至為世所稱初漢有鄧氏官譜應劭有氏族一篇王符潛夫論亦有姓氏一篇宋何承天有姓苑二篇譜學大扺具此詩小雅靖共爾位世說郭林宗曰叔度汪汪如千頃之波孔叢子平原君強子髙飲酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲百榼古之聖賢無不能飲子何辭焉後漢馬援傳諸曹時白外事援輒曰此丞掾之任何足相煩頗哀老子使得遨遊别東武流杯莫笑官居如傳室故應人世等浮雲百年父老知誰在唯有雙松識使君傳室注見前韓退之藍田縣丞㕔壁記對樹二松日吟哦其閒走筆謝吕行甫恵子魚卧沙細肋吾方厭通印長魚誰肎分好事東平貴公子貴人不與與蘇君埤雅肋魚似鰣魚而小身薄骨細詩義疏鯊魚吹沙也似鯽魚而小常張口吹沙背上有刺螫人王得臣麈史閩中鮮食最珍子魚莆田迎仙鎮乃其出䖏予按部過之驛左有一祠謂之通應廟下有水曰通應谿日受潮汐訪諸土人為鹹淡水不相入䖏此魚最良故謂之通應子魚比見士大夫賦詩多曰通印以目其魚之大小如王荆公送元厚之詩云長魚爼上通三印荆公博學多聞豈自有所稽耶按公正集有送牛尾貍詩云通印子魚猶帶骨此云通印長魚誰肎分觧與荆公同類說宋顯仁后謂秦檜妻曰子魚大者絶少對曰妾家有之檜咎其失言乃以青魚百尾進太后笑曰我道這婆子村可見子魚大者非權貴不多得也贈䖍州慈雲寺鑒老居士無塵堪洗沐道人有句借宣揚牕間但見蠅鑚紙門外唯聞佛放光徧界難藏真薄相一絲不挂且逄場郤須重説圓通偈千眼薫籠是法王楞嚴經䟦陀婆羅于浴僧時随例入室忽悟水因既不洗塵亦不洗體中閒安然得無所有又若諸衆生愛談名言清浄自居我于彼前現居士身而為說法令其成就傳燈録神瓚禪師見蜂子投窓紙求出師曰世界如許廣濶不肎出鑽他故紙楞嚴經爾時世尊從肉髻中涌百寳光光中涌出千葉寳蓮有化如來坐寶華中頂放十道百寳光明又一絲不挂竿木随身逢場作戲皆宗門語楞嚴偈根選擇圓通入流成正覺法華經法王無上尊留别登州舉人身世相忘久自知此行閒㸔古黄腄自非北海孔文舉誰識東萊太史慈落筆已吞雲夢客抱寒欲訪水仙師莫嫌五日悤悤守歸去先傳樂職詩莊子魚相忘于江湖人相忘于道術漢地理志東萊郡有腄縣黄縣師古注腄音直瑞反登州府志黄縣古萊子國後漢書孔融字文舉魯國人孔子二十世孫為北海相吴志太史慈字子義東萊人也避事之遼東北海相孔融聞而竒之數遣人訊問其母并致餉遺史記司馬相如傳吞若雲夢者八九其于胷中曾不蔕芥樂府解題伯牙學琴于成連三年不成成連曰吾師方子春今在東海中能移人情乃與伯牙俱徃至蓬萊山謂伯牙曰子居習之吾将迎師刺船而去旬日不返伯牙延望無人但聞海水澒洞崩坼之聲山林窅㝠羣鳥悲號愴然歎曰先生將移我情矣乃援琴而歌水仙之操曲終成連囘刺船迎之而還伯牙遂為天下妙矣漢張敞傳絮舜曰今五日京兆耳安能復案事按公紀年以元豐乙丑十月十五日扺登州二十日内召去故有五日悤悤之句漢王褒傳益州刺史王襄欲宣風化于衆庶聞褒有俊材使作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之過嶺寄子由二首按過嶺詩有三首其一巳見前投章獻策謾多談能雪寃忠死亦甘一片丹心天日下數行清淚嶺雲南光榮歸佩呈佳瑞瘴癘幽居弄曉嵐從此西風庾梅謝卻迎誰與馬毶毶漢楊惲傳方當盛漢之隆願勉旃無多談韓退之賦覩二鳥之光榮思一飽之無時山林瘴霧老難堪歸去中原荼亦甘有命誰憐終反北無心卻笑亦巢南蠻音慣習疑傖語脾病縈纒帶嶺嵐賴有祖師清淨水塵埃一洗落毶毶詩國風誰謂荼苦其甘如薺世說王仲祖聞蠻語不觧茫然曰若使介葛盧來朝故當不昧此語又郝隆為桓公南蠻參軍三月三日㑹作詩隆攬筆曰娵隅躍清池桓問娵隅是何物答曰蠻名魚為娵隅桓公曰作詩何以作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語也晉書陸機曰此有傖父欲賦三都歇白塔舖甘山廬阜鬱長望林隙依稀一作熹微漏日光吴國晚蠶初斷葉占城蚤稻欲移秧迢迢澗水随人急冉冉巖花撲馬香望眼儘從一作窮飛鳥逺白雲深處是吾鄉杜詩雨裛紅蕖冉冉香陶宏景詩山中何所有嶺上多白雲莊子乘彼白雲至于帝鄉一統志占城古越裳界秦為象郡林邑漢屬日南郡唐曰占城其俗粒食稻米西蜀楊耆二十年前見之甚貧今見之亦貧所異於昔者蒼顔華髮耳女無羙惡富者妍士無賢不肖貧者鄙使其逄時遇合豈減當世之士哉頃宿長安驛舎聞泣者甚怨問之乃昔富而今貧者乃作一詩今以贈楊君孤村漸一作微雨逐秋凉逆旅愁人怨夜長不寐相看唯櫪馬愁吟一作悲歌互答有寒螿天寒滯穂猶横畝嵗晚空機尚倚牆勸爾一杯聊復睡人間貧富海茫茫杜子羙守歳詩盍簪喧櫪馬詩小雅彼有遺秉此有滯穂孫皓爾汝歌昔與汝為鄰今與汝為臣上汝一杯酒令汝夀萬春晉孝武帝紀末年長星見帝心甚惡之於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歳天子耶贈人别後休論信息疎仙凡自古亦殊途蓬山路逺人難到霜柏威髙道轉孤舊賞未應亡楚國新詩聞已滿皇都誰憐澤畔行吟者目斷長安貌欲枯李陵答蘓武書與子别後益復無聊易殊塗而同歸李義山詩劉郎巳恨蓬山逺又隔蓬山一萬重史記屈原至于江濵被髪行吟澤畔顔色憔悴形容枯槁觀湖二首題疑作觀海乘槎逺引神仙客萬里清風上海濤回首不知沙界小飄衣猶覺色塵髙須彌有頂低垂日兜率無根下戴鼇釋梵茫然齊劫火飛雲不覺醉陶陶張華博物志近世有人居海上毎年八月見乘槎來不違時賫一年粮乘之到天河見婦人織丈夫飲牛遣問嚴君平曰某年月日客星犯牛斗即此人也金剛經以七寶滿爾所恒河沙數三千大千世界以用布施楞嚴經阿難如汝一人㣲動服衣有㣲風出又麄為大地細為㣲塵又若此鄰虛析成虛空當知虛空出生色相因本經湏彌山半髙四萬二千由旬乃四天王所居宫殿湏彌山頂而分四方毎方有八所中間一所乃帝釋宮殿梵語謂兜率天也列子渤海之東有壑焉其中有山無所連著常随波上下徃還不得暫峙焉帝恐流于西極失羣聖之居使巨鼇十五舉首而戴之五山始峙而不動吴都賦巨鼇贔屭首冠靈山劫火注見前朝陽照水紅光開玉濤銀浪相徘徊山分宿霧儘寛逺雲駕髙風馳送來昇霞影色欹殘火及物氣燄眀纖埃可憐極大不知已浮生野馬悠悠哉莊子逍遥逰野馬也塵埃也生物之以息相吹也寄髙令滿地春風埽落花㡬番曾醉長官衙詩成錦繡開胸臆論極氷霜繞齒牙别後與誰同把酒客中無日不思家田園知有兒孫委蚤晚扁舟到海涯歸去來辭田園將蕪胡不歸莊子知北逰孫子非汝有是天地之委蛻也寄子由厭暑多應一向慵銀鈎秀句益疎通也知堆桉文書滿未暇開軒硯墨中湖靣新荷空照水城頭髙柳謾摇風吏曹不是尊賢事誰把前言語化工堆桉用嵇康絶交書已見隋書楊素戲栁調曰栁條通體弱獨摇不禁風蜀志杜瓊謂譙周曰古者名官職不言曹始自漢已來名官盡言曹吏言屬曹卒言侍曹此殆天意也詩送交代仲達少卿此身無用且東來賴有江山慰不才舊尹未嫌衰廢久清尊猶許再三開滿城遺愛知誰繼極目扁舟挽不回歸去青雲還記否交遊勝絶古城隈詩豳風我來自東零雨其濛唐書張說謫岳州詩益悽惋人謂得江山之助莊子人閒世是不材之木也無所可用左傳子産卒仲尼聞之出涕曰古之遺愛也又子産而死誰其嗣之晉鄧攸傳攸為吳郡刑政清明去郡不受一錢百姓數千人留牽攸船不得進攸乃小停夜中發去吳人歌之曰紞如打五更雞明天欲曙鄧侯挽不留謝令推不去史記非附青雲之士惡能施於後世哉爾雅厓内為隩厓外為隈次韻馬元賔流落江湖萬里歸相逢自慰已差池初聞好句驚人倒悔過東庭識靣遲握手寧知無賀監結交誰復許袁絲塞鴻正欲摩天去垂老追攀豈可期史記衛將軍驃騎列傳諸宿將常坐流落不遇又袁盎傳字絲絳侯得釋盎頗有力絳侯乃大與盎結交韓文握手出肺肝相視唐李白傳白至長安徃見賀知章知章見其文歎曰子謫僊人也言于𤣥宗召見金鑾殿杜詩有垂老别第五橋白露凄風洗瘴煙夢回相對兩凄然雀羅廷尉非當日鳩杖先生愈少年世事飽諳思縮手主恩未報耻歸田誰憐第五橋東水獨照台州老鄭䖍詩國風白露為霜又凄其以風史記汲鄭傳翟公為廷尉賔客闐門及廢門外可設雀羅漢禮儀志杖端刻鳩形鳩者不噎之鳥欲老人不噎周禮羅氏捕鳩飬老按漢無羅氏故作鳩杖以扶老而風俗通乃謂漢髙京索之敗遁叢薄中有鳩鳴其上追者不疑遂得脫後即位異此鳥故作鳩杖以賜老人恐未可据漢張衡有歸田賦唐鄭䖍傳安禄山反授䖍偽職因稱風緩賊平貶台州司户參軍杜陪鄭廣文逰何將軍山林詩不識南塘路今知第五橋又懐台州鄭十八司户詩天台隔三江風浪無晨暮鄭公縱得歸老病不識路次韻完夫再贈之什某已卜居毗陵與完夫有廬里之約云完夫姓胡名宗愈晉陵人二十四巻冇次韻胡完夫及再次韻答完夫穆父詩柳絮飛時笋籜班風流二老對開關雪芽為我求陽羡乳水君應餉恵山竹簟水風眠晝永玊堂制草落人間應容緩急煩閭里桑柘聊同十畝閑一統志宜興銅棺山即古陽羡其地産茶茶譜有唐茶品以陽羡為上建溪北苑未著也茶賦雲垂綠腳香浮碧乳挹此霜華卻兹煩暑茶經山水上江水中井水下其山水乳泉漫流者上圖經慧山泉在常州府無錫縣唐陸羽品泉以此居第二史記袁盎傳盎病免居家與閭里浮沉又緩急人所有云云注詳見前詩國風十畞之閒兮桑者閑閑兮和林子中待制林希字子中福州人舉進士紹聖初典詞命醜詆正人詳見施注二十九巻次韻蒜山亭詩兩翁留滯各皤然人笑迂疎老更堅共把鵝兒一作鴟夷一樽酒相逢卵色五湖天江邉遺愛嗁斑白海上先聲入管絃蚤晚淵眀賦歸去浩歌長笑老斜川漢書司馬遷傳是歳天子始建漢家之封而太史公留滯周南尚書黄髪番番與皤仝班固詩皤皤國老後漢馬援傳甞謂人曰丈夫為志窮當益堅老當益壯杜詩鵝兒黄似酒對酒愛新鵝陶淵明有逰斜川詩九日袁公濟有詩次其韻古來靜治得清閑我愧真常也一班舉酒東榮挹江海回樽落日勸湖山平生傾蓋悲歡裏蚤晚抽身簿領閒笑指西南是歸路倦飛弱羽久知還史記曹相國世家蓋公為言治道貴清淨而民自定又百姓歌之曰載其清淨民以寧一傾蓋注見前歸去來辭鳥倦飛而知還和吴安持使者迎駕小雪疎煙雜瑞光清波寒引御溝長曈曈日色籠丹禁杳杳鞭聲出建章鵷鷺偶叨陪下列天閽聊啟望中央歸來喜氣傾新句滿座疑聞錦繡香唐浩虛舟日五色賦破題云麗日焜煌中含瑞光漢百官志注天子凡塗飾以丹丞相以黄禮天子赤墀張衡西京賦青瑣丹墀注天子庭以丹朱塗地故曰丹墀又名丹陛又名彤庭漢宮闕疏天子所居曰禁中凡人不得出入史記封禪書作建章宫度為千門萬户一統志建章宮在西安府城西北漢司馬遷傳嚮者僕亦甞厠下大夫之列詩話謝廷誥以詞賦著名號錦繡堆鹿鳴宴連騎悤悤畫鼓喧喜君新奪錦標還金罍浮菊催開宴紅蕋将春待入關他日曽陪探禹穴白頭重見賦南山何時共樂昇平事風月笙簫坐夜閑戰國䇿結駟連騎輝煌於道南部新書唐盧肇黄頗皆宜春人同舉郡守獨餞頗明年肇狀元及第歸郡守接甚厚肇作詩曰向道是龍剛不信果然奪得錦標歸守大慙詩周南我姑酌彼金罍詩小雅南山有臺次韻張甥棠羙晝眠炎歊五月北牕凉更覺甘如飯稻粱宰我糞牆譏敢避孝先經笥謔兼忘憂虞心謝知時鴈安穩身同挂角羊要識熙熙不爭競華胥别是一仙鄉說文歊炎氣班賦吐金景歊浮雲北窓注巳見韓詩倒身甘寢百疾愈後漢文苑傳邉韶字孝先以文學知名曾晝日假卧弟子私嘲之曰邉孝先腹便便懶讀書但欲眠韶潛聞之應時對曰邉為姓孝先字腹便便五經笥但欲眠思經事寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙傳燈録雪峯云我若東道西道汝則尋言逐句我若羚羊挂角汝向什麽䖏捫摸老子衆人熙熙如登春臺列子黄帝晝寢夢遊華胥再見真興寺閣禱雨太守親從千騎禱神翁逺借一杯清雲隂黯黯将噓遍雨意昏昏欲醖成巳覺微風吹袂冷不堪殘日傍山眀今年秋熟君知否應向江南飽食稉隋考秋分以後不雩但禱而巳搜神記諒輔以五官掾出禱山川曰太守内省責已自曝中庭使輔謝罪為民祈福若無效請以身塞無狀乃積薪柴自環將自焚火而雷雨大作一郡霑潤釋名秔粳米也稻不黏者恵州近城數小山類蜀道春與進士許毅野歩㑹意處飲之且醉作詩以記適參寥専使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也夕陽飛絮亂平蕪萬里春前一酒壺鐡化雙魚沉逺素劍分二嶺隔中區花曽識靣香仍好鳥不知名聲自呼夢想平生消未盡滿林煙月到西湖吴志鄭泉嗜酒甞語人曰我死必葬我陶家之側庶百嵗後化而成土幸見取為酒壺實獲我心矣鐵化魚未詳劍分二嶺注見前世說衛玠總角時問樂廣夢樂云是想衛曰形神所不接豈是想耶樂云因也送蜀僧去塵十年讀易費膏火盡日吟詩愁肺肝不觧丹青追世好欲将芹芷薦君盤誰為善相寧嫌瘦復有知音可廢彈拄扙挂經須陪道故鄉春蕨巳闌干沈攸之曰蚤知窮達有命恨不十年讀書論語讖孔子晚喜易讀之韋編三絶進學解焚膏油以繼晷恒矻矻以窮年曽元恕遊龍山吕穆仲不至青春不覺老朱顔强半消磨簿領閒愁客倦吟花以字疑訛酒佳人休唱日銜山共知寒食眀朝過且赴僧牕半日閑命駕吕安邀不至浴沂曽㸃暮方還梁元帝纂要春曰芳春青春陽春荆楚歳時記去冬至一百五日即有疾風甚雨謂之寒食晉書呂安與嵇康友善毎一相思輒千里命駕黄河輿地志其水從地湧出百餘泓方七八十里東北滙為大澤又東流為赤賔河合忽蘭諸河始名黄河又東北至蘭州入中國活活何人見混茫崑崙氣胍夲來黄濁流若解汚清濟驚浪應須動太行帝假一源神禹跡世流三患梗堯鄉靈槎果有仙家事試問青天路短長史記張騫傳漢使窮河源河源出于寘其山多玉石采來天子按古圖書名河所出山曰崑崙云史記蘓秦傳天時不與雖有清濟濁河惡足為固一統志太行山在平陽府絳縣漢書堯都平陽靈槎用八月乘槎事詳見夲巻壬寅重九不預㑹獨遊普門寺僧閣有懐子由花開酒羙盍不歸來看南山冷翠微憶弟淚如雲不散望鄉心與鴈南飛眀年縱健人應老昨日追歡意正違不問秋風强吹㡌秦人不笑楚人譏杜詩憶弟㸔雲白日眠又明年此會知誰健又羞將短髪還吹㡌晉書孟嘉為桓溫參軍九日逰龍山叅僚畢集有風吹落其㡌嘉不之覺溫謂左右及賔客勿言以觀其舉止小飲公瑾一作謹舟中青泥赤日午相烘走訪一作扣船牕栁影中輟我東坡無限睡賞君南浦不貲風坐觀邸報談迂叟閑説滁山憶醉翁此去澄江三萬頃只應眀月照還空公自注鄧滁人也是日坐中觀邸報云叟入下省庾子山哀江南賦闗上泥青說文烘燎也詩小雅卬烘于煁江文通别賦送君南浦迂叟司馬君實也醉翁歐陽永叔也謝眺詩澄江淨如練和子由次王鞏韻如囊之句可為一噱平生未省為人忙貧賤安閑氣味長粗免趨時頭似葆稍能忍事腹如囊簡書見迫身今老樽酒聞呼首一昻欲挹天河聊自洗塵埃滿面鬢睂黄漢書頭如蓬葆相經腹如懸嚢善蓄多藏詩小雅畏此簡書漢司馬遷傳昂首伸睂論列是非杜詩安得壯士挽天河淨洗甲兵長不用列仙傳有黄睂翁儋耳一統志瓊州昌化漢儋耳地霹靂收威莫雨開獨憑欄檻倚崔嵬垂天雌霓音齧雲端下快意雄風海上來野老已歌豐嵗語除書欲放逐臣回殘年飽飯東坡老一壑能專萬事灰漢地理志自合浦徐聞南入海得大州東西南北方千里武帝元封元年畧以為儋耳珠厓郡春秋繁露王者言不從則金不從革而秋多霹靂霹靂金氣也甘氏星經霹靂在雷電南皆北方水府之精而娵訾為天門故其神棲焉唐書吳武陵與孟簡書云雷砰電射天怒也不能終朝栁宗元之貶已十二年矣聖人在上安有畢世而怒人臣耶公起句暗用其意春秋元命苞虹蜺者隂陽之精雄曰虹雌曰蜺埤雅虹常雙見鮮盛者雄其闇者雌沈約賦雌霓連蜷漢書注蜺讀曰齧說文霓屈虹青赤或白隂氣也垂天出莊子逍遙逰宋玉風賦此大王之雄風也杜詩但願殘年飽喫飯世說一邱一壑自謂過之史記死灰不復然乎答李端叔若人如馬亦如班笑履壺頭出玊關巳入西羌度沙磧又來東海看濤山識君小異千人裏慰我長思十載閒西省憐君一作鄰居時邂逅相逢有味是偷閑後漢馬援傳援征五溪蠻進營壺頭賊乘髙守隘水疾船不得上一統志玉門闗在沙州班超上書願生入玉門闗即此又沙州有鳴沙山天氣清朗則沙鳴聞數里外郡國志伊州銕勒國路多沙磧沙内聞呌喚聲不見人蓋鬼物也史記有味乎其言之也立春日病中邀安國仍請率禹功同來僕雖不能飲當請成伯主㑹某當杖䇿倚几於其間觀諸公醉笑以撥滯悶也孤燈照影夜漫漫拈得花枝不忍㸔白髮欹簮羞彩勝黄耆煮粥薦春盤東方烹狗陽初動南陌爭牛卧作團老子從來興不淺向隅誰有滿堂歡荆楚歳時記人日造華勝相遺起晉賈充又曰人日剪綵為人帖屏風上亦戴之頭鬢典戒像瑞圖金勝之形又取像西王母戴勝也李商隱詩鏤金作勝傳荆俗剪綵為人紀晉風玉燭寳典新正作膏粥以祠門户風土記月正元日五薰錬形注噉五辛菜所以助發五臓之氣也庾肩吾詩聊傾栢葉酒試奠五辛盤四時寳鑑唐人立春日作春餅生菜號春盤禮記月令季冬之月磔狗于四門出土牛以送寒氣論衡立春為土象人男女各二秉耒耜又立土象牛順時應氣示率下也晉庾亮傳老子於此興復不淺再見韓詩外傳一人向隅滿座不樂齋居卧病禁煙前辜負名花已一年此日使君不强喜青春風物為誰妍青衫公子家千里白首先生杖百錢曷不相将來問病已教呼取散花天周禮司烜氏仲春以木鐸修火禁于國中注為季春將出火也連昌宫詞店舍無烟宮樹綠史記魏其武安侯傳韓御史良久謂丞相曰君何不自喜白居易詩江州司馬青衫濕晉書阮脩以百錢挂杖頭至酒店便獨酣暢維摩經長者維摩詰以方便現身有疾以其疾故無數千人皆徃問疾又㑹中有一天女以天花𣪚諸菩薩悉皆墮落李義山詩維摩一室雖多病亦要天花作道場和參寥見寄黄樓南畔馬臺東雲月娟娟正㸃空欲共幽人洗筆硯要傳流水入絲桐且随侍者尋西谷莫學山僧老祝融待我西湖借君去一杯湯餅潑油蔥黄樓戱馬䑓注並見前一綂志祝融在衡山位直離宮以配火徳乃祝融君逰息之所道書第二十四福地後漢書願借宼君一年東園岑寂東園可散愁膠膠擾擾夢神州萬竿苦竹旌旗巻一部鳴蛙鼓吹收雨後月前天欲冷身閑心逺地偏幽杜門謝客恐生謗且作人聞鵬鷃遊莊子天道篇堯曰然則膠膠擾擾乎神州鼓吹註並見前陶詩心逺地自偏莊子有人閒世篇又逍遥逰鵬摶扶搖而上者九萬里尺鷃笑之曰彼且奚適也奉和陳賢良不學孫吴與六韜敢将駑馬並英豪望窮海表天還逺傾盡葵心日愈髙身外浮名休瑣𤨏夢中歸思已滔滔三山舊是神仙地引手東來一釣鼇漢藝文志吳孫子兵法八十二篇注孫武也齊孫子八十九篇注孫臏也吳起四十八篇周史六弢六篇注即今之六韜史記騏驥之衰也駑馬先之釋文智出萬人曰英智過百人曰豪廣雅葵菜常傾葉向日杜詩何用浮名絆此身魏文季緒璅璅何足以云史記封禪書使人入海求蓬萊方丈瀛洲此三神山者諸仙人及不死之藥皆在焉釣鼇注見前又唐李白稱東海釣鼇客秋興三首野鳥游魚信往還此身同寄水雲閒誰家晚吹殘紅葉一夜歸心滿舊山可慰摧頽仍健食此生通脱屢酡顔年華豈是催人老雙鬢無端只自斑佛遺教經示一徃還去已無返晉書喜通脫而憚檢束故里依然一夢前相攜重上釣魚船嘗陪大幙今陳迹謬忝承眀愧昔年報國無成空白首退耕何處有名田黄雞白酒雲山約此計當時已浩然蘭亭記俯仰之間已為陳迹西都賦金馬承明著作之廬漢書限民名田浩然有歸志夲孟子浴鳯池邉星斗光宴餘香滿上書囊樓前夜月低韋曲雲裏車聲出未央去國何年雙鬢雪黄花重見一枝霜傷心無限厭厭夢長似秋宵一倍長史記集上書囊以為殿帷一統志樊川韋曲乃韋安石别業杜詩韋曲花無頼漢髙帝紀蕭何治未央宮立東闕北闕前殿武庫詩小雅厭厭夜飲夜直祕閣呈王敏甫蓬瀛宫闕隔埃氛帝樂天香似許聞瓦弄寒蟬鴛卧月樓生晴靄鳯盤雲共誰交臂論今古只有閑心對此君大隱本來無境界北山猿鶴謾移文此君用晉王子猷語已見白樂天詩大隱在朝市小隱在邱樊不如作中隱隱在留司間猿鶴用孔稚圭北山移文語巳見次韻參寥寄少游岩棲木石已皤然交舊何人慰眼前素與晝公心印合每思秦子意珠圓當年歩月來幽谷拄杖穿雲冒夕煙臺閣山林本無異故應文字不離禪髙僧傳恵可立雪斷臂求法于達磨達磨曰我法一心不立文字法師以心契故曰心印晝公唐詩僧皎然姓謝字清晝湖州人已見謝曹子方恵新茶陳植文華斗石髙景公詩句復稱豪數竒不得封龍額禄仕何妨有馬曹囊簡久藏科斗字銛鋒新瑩鸊鵜膏南州山水能為助更有英辭勝廣騷陳植陳思王曹植也謝靈運云天下才共一石曹子建獨得八斗我得一斗自古及今共用一斗史記李廣數竒不得封侯又韓說封龍額侯世說王子猷作桓車騎騎兵參軍桓問曰卿何署答曰不知何署時見牽馬來似是馬曹李長吉詩鸊鵜淬花白鷴尾注鸊鵜似鳧而小膏中瑩刀題潭州徐氏春暉亭曈曈曉日上三竿客向東風竟倚欄穿竹鳥聲驚歩武入簷花影落杯盤勿嫌歩月臨𤣥圃冷笑乘槎向海灘勝槩直應吟不盡憑君寄與畫圖看晉陸機傳後葛洪著書稱機文猶𤣥圃之積玉無非夜光焉一作縣圃贈仲勉子文雨昏南浦曽相對雪滿荆州喜再逄有子才如不羈馬知君心似後凋松閑看書册應多味老傍人門想更慵何日晴軒觀筆硯一杯相属更從容講武臺南有感又見黄山谷集山城九月冒朝寒講武臺南路屈盤騶子雨中乘馬去村童煙外倚牆看鵶嗁冢木秋風急鷺立漁船夜水乾花似去年堪折贈插花人去淚䦨干題寳雞縣斯飛閣寳雞属鳯翔府秦陳倉地小雅斯干詩云如翬斯飛西南歸路逺蕭條倚檻魂飛不可招野闊牛羊同鴈鶩天長草樹接雲霄昏昏水氣浮山麓汎汎春風弄麥苗誰使愛官輕去國此身無計老漁樵重逰終南子由以詩見寄次韻去年新桞報春回今日殘花覆緑苔溪上有堂還獨宿誰人無事肎重來古琴彈罷風吹座山閣醒時月照杯嬾不作詩君錯料舊逋應許過時陪次韻和子由欲得驪山沉泥硯沉一作澄舉世爭稱鄴瓦堅一枚不換百金頒豈知好事王夫子自採臨潼繡領山經火尚含泉脉暖吊秦應有淚痕潸封題寄去吾無用近日從戎擬學班硯譜銅雀硯世傳鄴城古瓦體質細潤而堅如石不費筆而發墨此古所重者而今絶無鄴民乃偽造以紿逺方又虢州澄泥硯唐人品硯以為第一米芾云絳縣人善製澄泥硯以細絹二重淘洗澄之取極細者燔為硯有色綠如春波者細滑著墨不費筆但㣲滲耳班超投筆注見前次韻子由彈琴琴上遺聲久不彈琴中古義本長存苦心欲記常迷舊信指如歸自看痕應有仙人依樹聽空教瘦鶴舞風騫誰知千里溪堂夜時引驚猿撼竹軒韓非子衛靈公之晉平公觴之靈公令師涓鼓琴師曠曰此清商也不如清徵師曠援琴而鼓一奏之有𤣥鶴二八從南方來再奏而列三奏之延頸而鳴舒翼而舞音中宮商再次前韻係織錦圖上回文春機滿織回文錦粉淚揮殘露井桐人逺寄情書字小桞絲低日晚庭空紅牋短寫空深恨錦句新翻欲斷腸風葉落殘驚夢蝶戍邉回鴈寄情郎羞雲歛慘傷春暮細縷詩成織意深頭伴枕屏山掩恨日昏塵暗玊牕琴和人回文五首紅牕小泣低聲怨永夕春寒斗帳空中酒落花飛絮亂曉鶯嗁破夢悤悤同誰更倚閑牕繡落日紅扉小院深東復西流分水嶺恨無愁續斷絃琴後漢蔡琰傳注邕夜鼓琴絃絶琰曰第二絃邕故斷一絃問之琰曰第四絃竝不差謬寒信風飄霜葉黄冷燈殘月照空牀看君寄憶傳文錦字字縈愁寫斷腸前堂畫燭夜凝淚半夜清香荔惹衾煙鎖竹枝寒宿鳥水沉天色霽横參娥翠歛時聞燕語淚珠彈處見鴻歸多情妾似風花亂薄倖郎如露草晞詩小雅湛湛露斯匪陽不晞移合浦郭功甫見寄君恩浩蕩似陽春合浦何如在海濵莫趁明珠弄明月夜深無數採珠人後漢孟甞傳合浦郡海出明珠先時宰守貪穢珠漸徙於交阯甞為太守革易前弊去珠復還送佛靣杖與羅浮長老十方三界世尊靣都在東坡掌握中送與羅浮徳長老攜歸萬竅總號風楞伽云三界欲界色界無色界也法華經解世尊十號具足世出世間之所宗主故名世尊莊子齊物論大塊噫氣其名為風是惟無作作則萬竅怒號復官北歸再次前韻秋霜春雨不同時萬里今從海外歸已出網羅毛羽在郤尋雲跡帖天飛蜀僧明操思歸龍邱子書壁更厭勞生能㡬日莫将歸思擾衰年片雲㑹得無心否南北東西只一天歸去來辭雲無心以出岫禮記檀弓丘也東西南北之人也武昌酌菩薩泉送王子立送行無酒亦無錢勸爾一杯菩薩泉何處低頭不見我四方同此水中天晉書長星勸汝一杯酒注詳見前楞嚴經有佛出世名為水天教諸菩薩修習水觀入三摩地觀于身中水性無奪與世界外浮幢王刹諸香水海等無差别答海上翁山翁不復見新詩疑是河南石壁曦海水豈容鯨飲盡然犀何處覓瓊枝燃犀用溫嶠事注見前占山亭一作懐口令陳徳任新作占山亭二絶尚父提封海岱間南征惟到穆陵關誰知海上詩狂客占得膠西一半山詩大雅惟師尚父禮記提封萬頃史記海岱之間斂袂而徃朝故齊冠帶衣履甲天下左傳昔召康公命我先君太公曰五侯九伯女實征之賜我先君履東至于海西至于河南至于穆陵北至于無棣一統志膠西今膠州隷萊州府我是膠西舊使君此山仍占與君分故應竊比山中相時作新詩寄白雲陶宏景詩山中何所有嶺上多白雲只可自娛恱不堪持贈君南史宏景止句曲山自號華陽陶隱居梁武帝既蚤與之逰及即位恩禮愈篤書問不絶時人謂為山中宰相題懐素草帖國史補長沙僧懐素善草書自言得草聖三昧人人送酒不曽沽終日松間挂一壺草聖無成狂飲發真堪畫作醉僧圖書斷張芝字伯英善草書精勁絶倫臨池學書池水盡黒韋仲將謂之草聖唐書張旭善草書性好飲醉後輒以頭搵水墨而書醒而觀之以為若有神助雨中明慶賞牡丹霏霏雨露作清妍爍爍眀燈照欲然明日春隂花未老故應未忍著酥煎洛陽貴尚録孟蜀時兵部貳卿李昊毎牡丹花開分遺親友以金鳳牋成歌詩以致之又以興平酥同贈花謝時煎食之贈僧思誼瀉湯舊得茶三昧覓句近窺詩一斑清夜漫漫困披覧一作搜攪齋腸那得許慳頑晉書王獻之年數歳甞觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹時見一斑獻之怒拂衣而去子玉以詩見邀同刁丈遊金山君年甲子未相逢難向君前説老翁更有方瞳八十一奮衣矍鑠走山中仙傳眼方者夀千嵗陶宏景晚年一目有時而方後漢馬援傳㩀鞍顧盻以示可用光武曰矍鑠哉是翁次韻致逺長笑右軍稱草聖不如東野以詩鳴樂天自欲吟淮月懐祖無勞聴角聲晉書王羲之毎自稱我書比鍾繇當抗行比張芝艸猶當鴈行也又王述字懐祖毎聞角聲謂羲之當候已輒灑掃而待之如此累年而羲之竟不顧述以為恨次韻景文山堂聴筝三首忽憶韓公二妙姝琵琶筝韻落空無猶勝江左狂靈運空鬭東昏百草須傅𤣥琵琶賦序漢送烏孫公主嫁昆彌念其行道思哀使知音者裁筝筑箜篌之聲作馬上之樂以方語目之故曰琵琶取易傳于外國也釋名琵琶夲出于胡中馬上所鼓也推手前曰琵引手卻曰琶象其鼔時因以為名風俗通箏秦聲也按樂記筝五絃筑身今并凉二州筝形如瑟不知誰所改易也南史謝靈運傳安西將軍奕之曾孫而方明從子也祖𤣥父瑍靈運㓜便頴悟博覽工文與顔延之為江左第一晉陽秋謝靈運髭羙臨刑因施作南海祗洹寺維摩詰像髭寺僧保惜畧不汚損齊東昏侯與宫人鬬百草剔取靈運髭去馬上胡琴塞上姝鄭中丞後有人無詩成畫燭飄金燼八尺英公欲燎須樂録琵琶一名胡琴一名鼙婆鄭中丞唐宮人以彈小忽雷擅名事載艶異編唐書李勣傳姊蚤寡有疾自為煮粥火燎其須曰吾與姊皆老矣能幾進之勣封英國公荻花楓葉憶秦姝切切幺絃細欲無莫把胡琴挑醉客回看霜㦸褚公須白樂天琵琶行大絃嘈嘈如急雨小絃切切如私語南史褚彥回傳山隂公主滛恣窺見彦囘恱之以白帝帝令彥囘西上閣宿公主夜就之從夕至曉彥囘不為移志公主謂曰君須髥如㦸何無丈夫意彥囘曰囘雖不敏何敢首為亂階成伯家宴造坐無由輒欲效顰而酒巳盡入夜不欲煩擾戯作小詩求數酌而巳道士令嚴難繼和僧伽㡌小郤空迴隔籬不喚鄰翁飲抱甕須防吏部來公自注道士令恱神樂中所謂離而復合者杜詩云肎與鄰翁相對飲隔籬呼取盡餘杯晉書畢卓字茂世太興末為吏部郎甞飲酒廢職比舍郎釀熟卓因醉夜至其甕閒盗飲之為掌酒者所縛明旦視之乃畢吏部也成伯席上贈所出妓川人楊姐坐來真个好相宜深注脣兒淺畫睂須信楊家佳麗種洛川自有浴妃池一統志楊妃池在灌縣妃父元琰為蜀司户生妃于此按洛當作灌又答氊帳卧病經旬減帶圍清樽忘卻故人期莫嫌雪裏閑氊帳作事猶來未合時南史沈約傳約以書陳情于勉言已老病百日數旬革帶常應移孔以手握臂率計月小半分又梁昭明太子傳體素壯腰帶十圍至是减削過半往年宿𤓰歩夢中得小詩録示民師吴塞蒹葭空碧海隋宫楊柳只金堤春風自恨無情水吹得東流竟日西送范徳孺漸覺東風料峭寒青蒿黄韭試春盤遥想慶州千嶂裏暮雲衰草雪漫漫陸蓮菴草木狀生于陸者曰旱蓮何妨紅粉唱迎仙來伴山僧到處禪陸地生花安足怪而今更有火中蓮僕年三十九在潤州道上過除夜作此詩又二十年在恵州録之以付過寺官官小未朝參紅日半牕春睡酣為報鄰雞莫驚覺更容殘夢到江南釣艇歸時菖葉雨繰車鳴處楝花風長江昔日經遊地盡在如今夢寐中歳時記自小寒至榖雨四月八氣二十四候每候五日以一花之風信應之榖雨一候牡丹二候酴醿三候楝花楝花竟則立夏夀陽㟁下街東街西翠幄成池南池北緑錢生幽人獨來帶殘酒一作雨偶聴一作聞得黄鸝第一聲戯答王都尉傳柑侍史傳柑玊座傍人間草木盡天漿寄與維摩三十顆不知薝蔔是餘香公自注舉輕明重維摩猶三十枚詩話唐上元夜宮人以黄羅包柑遺近臣謂之傳柑宴劉禹錫謝柑表甘踰萍蜜寒比天漿釋典西域有薝蔔林即梔子也其花六出維摩經如人入薝蔔林唯聞薝蔔不嗅餘香王維六祖碑林是旃檀更無襍樹花惟薝蔔不嗅餘香萬州太守髙公宿約遊岑公洞而夜雨連眀戲贈二小詩肩輿欲到岑公洞正怯衝泥傍險行定是岑公閟清境春江一夜雨連眀杜詩虛疑皓首衝泥怯實少銀鞍傍險行一綂志岑公巖在萬州大江之南石巖盤結若華蓋左右方池有泉噴薄巖下如簾松篁藤蘿蓊蔚蒼翠記稱神仙窟也蓬牕髙枕雨如繩恰似糟牀壓酒聲今日岑公不能飲吾儕猶健可頻傾遊中峯杯泉石眼杯泉舉世無要知杯度是凡夫可憐狡獪維摩老戯取江湖入鉢盂髙僧傳晉杯渡者不知其姓名常乘木杯渡河因名焉再見憇寂圖東坡雖是湖州𣲖竹石風流各一時前世畫師今姓李不妨還作輞川詩送柳宜歸又見黄山谷集題曰長沙留别折腳鐺邉煨淡粥曲枝桑下飲離杯書生不是南遷客魑魅驚人須蚤回宋玉招魂魂兮歸來南方不可以止些蝮蛇蓁蓁封狐千里些左傳以禦魑魅杜詩文章憎命達魑魅喜人過寒具公自注乃念頭出劉禹錫佳話纖手搓來玉數尋碧油輕蘸嫩黄深夜來春睡濃於酒壓褊佳人纒臂金續晉陽秋桓元好蓄法書名畫客至甞出而觀客食寒具油汙其畫後遂不設寒具注寒具鐶餅名釋名金條脫纒臂金也今之手釧參寥恵楊梅新居未換一根椽只有楊梅不直錢莫共金家鬬甘苦參寥不是老婆禪史記魏其武安傳灌夫無所發怒乃罵臨汝侯曰生平毁程不識不直一錢傳燈録臨濟參大愚愚曰黄蘖與麽老婆心切為汝得徹困更來這裏問有過無過師於言下大悟又普化云河陽新婦子木塔老婆禪臨濟小厮兒卻具一隻眼雨夜宿淨行院芒鞋不踏利名場一葉輕一作虛舟寄渺茫林下對牀聴夜雨靜無燈火照凄凉送恵州監押一作送都監北歸一聲鳴一作鴻鴈破江雲萬葉梧桐巻露銀我自飄零足羇旅更堪秋晚送行人過黎君郊居半園荒草没佳蔬煮得占禾半是藷萬事思量都是錯不如還叩仲尼居贈王覯何人生得寧馨子今夜初逢掣筆郎莫怪圍碁忘瓜葛巳能作賦繼靈光晉書王衍總角甞造山濤濤嗟歎良久既去目而送之曰何物老嫗生此寧馨兒王獻之傳七八歳時學書羲之密從後掣其筆不得歎曰此兒後當復有大名世説王長豫㓜便和令丞相愛恣甚篤毎共圍棋丞相欲舉行長豫按指不聴丞相笑曰詎得爾相與似有瓜葛蔡邕獨斷瓜葛疎親也文選注王延夀字文考有雋才父逸欲作靈光殿賦命延夀徃圖其狀延夀因韻之以獻其父父曰吾無以加也時蔡邕亦有此作十年不成見此賦遂隱而不出太夫人以旡咎生日置酒書壁一絶夀樽餘瀝到朋簮要與郎君夜語深敢問阿婆開後閤井中車轄任浮沉杜詩朋來慶盍簪應璩與滿公琰書外慕郎君謙下之徳注云璩曾事其父奮故稱郎君漢陳遵傳遵嗜酒毎大飲賔客滿堂輒闗門取客車轄投井中雖有急終不得去甞有部刺史奏事過遵值其方飲刺史大窮候遵霑醉時突入見遵母叩頭自白當對尚書有期㑹狀母廼令從後閤出去余舊在錢塘伯固開西湖今方請越戲謂固可復來開鏡湖伯固有詩因次韻已分江湖送此生㑹稽行復得岑成鏡湖席巻八百里坐嘯因君又得名邵伯梵行寺山茶山茶相對阿一作本誰栽細雨無人我獨來説似與君君不㑹一作見爛紅如火雪中開奉和成伯兼戲禹功金錢石竹道旁秋翠黛紅帬馬上謳無限小兒齊拍手山公又作習池遊襄陽記漢侍中習郁于峴山南作魚池池邉有髙隄種竹及長楸芙蓉蔆芡覆水是逰燕名處也山簡每臨此池未甞不大醉而還曰此是我髙陽池也襄陽小兒歌之曰山公時一醉徑造髙陽池日莫倒載歸茗艼無所知病後醉中病為兀兀安身物酒作蓬蓬入腦聲堪笑錢塘十萬户官家付與老書生漢蓋寛饒傳寛饒奏封事引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢後人稱天子為官家夲此夢中絶句楸樹髙花欲插天暖風遲日共茫然落英滿地君方見惆悵春光又一年元翰少卿寵恵谷簾水一器龍團二枚仍以新詩為貺歎味不已次韻奉和巖垂疋練千絲落雷起雙龍萬物春此水此茶俱第一共成三絶景中人方輿記谷簾泉在南康府城西泉水如簾布巖而下者三十餘𣲖陸羽品其味為天下第一韓詩外傳顔囘望吳門見一匹練孔子曰馬也注匹練言其光如練也藏春塢三首退之身外無窮事子羙生前有盡花更有多情君未識不随栁絮落人家莫尋羣玊峯頭路莫看𤣥都觀裏花但解閉門留我住主人休問是誰家朱閣前頭露井多碧桃枝下羙人過寒泉未必能如此奈有銀牀素綆何李太白詩梧桐落金井一葉飛銀牀謝都事恵米平生忍慾今忍貧閉口逢人不少陳俸薄身輕趙都事也能作意向詩人别公擇黍離不復閔宗周何暇雷塘弔一邱若問西來祖師意竹西歌吹是揚州黍離注見前一統志煬帝塚在揚州府城北雷塘又竹西亭在府城東北杜牧詩誰知竹西路歌吹是揚州絶句春來濯濯江邉栁秋後離離湖上花不羡千金買歌舞一篇珠玊是生涯世説王恭濯濯如春月栁杜詩詩成珠玉在揮毫書寄韻巳将鏡鑷投諸地喜見蒼顔白髮新歴數三朝軒冕客色聲誰是獨完人投鑷用南史齊鬱林王事巳見遊靈隐寺戲贈開軒李居士推倒垣墻也不難一軒復作兩軒看若教從此成千里巧歴如今也被漫荘子巧歴所不能知常州太平寺薝蔔亭六花薝蔔林間佛九節菖蒲石上仙何似東坡鐡拄杖一時驚起野狐禪運斗樞玉衡星𣪚為菖蒲本草菖蒲一名堯韭抱朴子菖蒲石上生一寸九節巳上紫花者尤善韓終服之十三年身生毛目視書萬言皆誦之冬恒不寒古詩石上生菖蒲一寸八九節仙人勸我飡令我好顔色野狐禪注見前過文覺顯公房斕斑碎玊飬菖蒲一勺清泉滿石盂淨几明牕書小楷便同爾雅注蟲魚韓退之詩爾雅注蟲魚定非磊落人恵州靈恵院壁閒畫一仰靣向天醉僧云是蜀僧隐蠻所作題詩於其下直視無前氣吐虹五湖三島在胸中相逢莫怪不相揖只見山僧不見公遊太平寺淨土院觀牡丹中有淡黄一朶特竒為作小詩醉中眼纈自斕斑天雨曼陀照玉盤一朶淡一作官黄微拂掠鞓紅魏紫不須看法華經佛說是經己天雨曼陀華牡丹譜姚黄左紫魏花以姓著青州丹州延州紅以州著又煬帝闢西苑易州進牡丹二十種有赬紅鞓紅等名此君軒雲幢煙節十洲一作七州人犀甲檀槍百萬軍蘙薈發生何足道一作數此君真是此君君案此君真是此君君言竹之發生必有所以為之主者猶莊子齊物論所云其有眞君存焉莊子又云可以為衆父而不可以為衆父父即此君君同意觀子羙病中作嗟嘆不足因次韻百尺長松澗下摧知君此意為誰來霜枝半折孤根出尚有狂風急雨催謁敦詩先生因留一絶凛凛人言君似雪我言凜凜雪如君時人盡怪蘇司業不解将錢與廣文杜詩只有蘓司業時時乞酒錢余将赴文登過廣陵而擇老移住石塔相送竹西亭下留詩為别竹西失郤上方老石塔還逢恵照師我亦化身東海去姓名莫遣世人知釋論一覺性是法身二覺相是報身三覺用是化身又釋迦牟尼千百億化身寳王云法身如月之體報身如月之光應身如月之影注應身即化身也絶句三首松柏蕭森溪水南道人只作兩團菴市區收罷豚魚税來與彌陀共一龕褚河南帖與彌勒同龕此身分付一蒲團靜對蕭蕭竹數竿偶為老僧煎茗粥自攜修綆汲清泉韓退之詩汲古得修綆天風吹月入闌干烏鵲無聲夜向䦨織女明星來枕上乃知身不在人間呈定國舊病應逢醫口藥新粧漸畫入時睂信知詩是窮人物近覺王郎不作詩絶句二首峩峩疉石立何孤賴有蕭蕭翠竹俱日暮無人鷗鳥散空留逺水伴寒蘆漠漠秋髙露氣清新蒲倚石近溪生夜來雨後西風急静向牕前似有聲破琴詩後余作破琴詩求得宋復古畫邢和璞於柳仲逺仲逺以此本託王晉卿臨寫為短軸名為邢房悟前生圖作詩題其上此身何處不堪為逆旅浮雲自不知偶見一張閑故紙便疑身是永禪師荘子大宗師偉哉造物又將奚以汝為将奚以汝適以汝為鼠肝乎以汝為蟲臂乎知北遊悲夫世人直為物逆旅耳維摩詰言是身如浮雲湏㬰變滅送桞子玉至靈山世事方艱便猛迴此心未老已先灰何時夢入真君殿也學傳呼觀主來次韻章子厚飛英留題款叚曽陪馬少遊而今人在鳳麟洲黄公酒肆如重過杳杳白蘋天盡頭後漢馬援傳吾從弟少㳺甞哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御款叚馬注款遲也段形也言形叚遲緩東方朔十洲記海外有麟洲鳳洲世説王濬冲為尚書令經黄公酒壚謂後車客曰吾昔與嵇阮共酣飲于此壚竹林之㳺亦預其末自嵇生夭阮公亡以來便為時所覊紲今日視此雖近邈若山河贈江州景徳長老白足髙僧解逹觀安排春事滿幽欄不須天女來相試總把空花眼裏看髙僧傳釋曇如㳺化闗中足白于面雖跣渉泥水未甞沾汙時稱白足和尚天女散花注屢見雜詩二首牕摇細浪魚吹沫一作日手弄黄花蝶遶一作透衣不覺春風吹酒醒空教眀月照人歸昔日雙鵶照淺睂如今妸娜綠雲垂蓬萊老守明朝去腸斷簾間蟋蟀悲元祐癸酉八月二十七日於建隆章淨館書贈王覯海上東風犯雪來臘前先折鏡湖梅遥思禁苑青春夜坐待宫人畫詔回聞捷元豐四年十月二十二日謁王文父齊愈於江南坐上得陳季常書報是月四日种諤領兵深入破殺西夏六萬餘人獲馬五千匹衆喜抃各飲一巨觥聞説将軍取乞誾将軍旗鼓捷如神故知無定河邉柳得共中原雪絮春宋史元豐四年八月种諤將鄜延及畿内兵九萬三千出綏徳城九月諤圍米脂夏人來救戰于無定川大破之斬首五千級十月遂克米脂唐詩可憐無定河邉骨猶是深閨夢裏人睡起杮葉滿庭紅顆秋薰爐沉水度春篝松風夢與故人遇自駕飛鴻跨九州秋思寄子由黄葉山川知晚秋小蟲催女獻功裘老松閲世卧雲壑挽著蒼江無萬牛杜子羙詩萬牛囘首丘山重碣石菴戲贈湛菴主相國寺僧也保康橋上夜觀燈碣石巖前夏飲氷莫把山林笑朝市老夫手裏有烏藤散郎亭法花下有散郎亭老樹蒼崖如有情歡戚巳随時事去壁間只有古人名侯灘江邉皎皎過侯灘更上山腰看打盤百嵗老兒親擊鼓城中憂患不相干春夜春宵一刻直千金花有清香月有隂歌管樓臺聲細細鞦韆院落夜沉沉天寳遺事宫中寒食競立鞦韆令宮嬪嬉笑宴樂眀皇呼為半仙戲古今藝術圖北方山戎寒食用鞦韆以戲習輕蹻也火星巖火星巖下石凌壁閣上相忘止一僧莫問人間興廢事門前流水几前燈讀開元天寳遺事三首一作開元遺事三首姚宋亡來事事興一官銖重萬人輕朔方老将風流在不取西蕃石堡城姚宋姚崇宋璟也連昌宫詞開元欲末姚宋死朝廷漸漸由妃子朔方老将王忠嗣也䇿石堡之得不當所亡潭裡車一作春船百倍多廣陵銅器越溪羅三郎官爵如泥土爭唱𢎞農得寳歌通鑑江淮南租庸等使韋堅引滻水抵苑東望春樓下為潭以聚江淮運船役夫匠通漕渠發人邱壟自江淮至京城民閒蕭然愁怨天寳二年三月上幸望春樓觀新潭堅以新舡數百艘扁榜郡名各陳郡中珍貨於船背陜尉崔成甫著錦半臂缺胯緑衫以裼之紅袹首居前船唱得寶歌使羙婦百人盛飾而和之連檣數里堅跪進諸郡輕貨仍上百牙盤食上置宴竟日而罷觀者山積加堅左𣪚騎常侍名其潭曰廣運注先是民閒唱俚歌曰得體紇那邪其後得寳符於桃林成甫乃更紇體歌為得寳𢎞農野歌曰得寳𢎞農野𢎞農得寳耶潭裏舟船閙揚州銅器多三郎當殿坐聽唱得寳歌其俚又甚焉琵琶絃急袞梁州羯鼔聲髙舞臂鞲破費八姨三百萬大唐天子要纒頭楊妃外傳明皇自擊羯鼓八姨獻三百萬為大唐天子纒頭再見過泗上喜見張嘉父二首睂間氷玊照淮眀筆下波瀾老欲平直得全生如許妙不知形諜巳多名荘子列禦寇内誠不觧形諜成光空翠娱人意自還眀牕一榻共秋閑㑹知名利不到處定把清觴属此山謝恵貓兒頭笋長沙一日煨籩筍鸚鵡洲前人未知走送煩公助湯餅貓兒突兀䑕穿籬題淨因堂瞑倚蒲團卧鉢囊半牕疎箔度微凉蕉心不展待時雨葵葉為誰傾夕陽同景文詠蓮塘塘上鈎簾對晚香不知斜日已侵牀江妃自惜凌波韈長在髙荷扇影凉郭璞江賦江妃含嚬而􅗻眇注引列仙傳曰江婓二女出遊江濱鄭交甫所挑者曹植洛神賦凌波㣲歩羅韈生塵説文韈足衣也睡起食罷茶甌未要深清風一榻直千金腹摇鼻息庭花落還盡平生未足心子羙召公擇飲偶以病不及往公擇有詩次韻樊素阿蠻皆巳出使君應作玊筝歌可憐病士西牕下一夜丹田手自摩白樂天詩櫻桃樊素口楊栁小蠻腰梁元帝筝詩瓊柱動金絲秦聲發趙曲晋書王國寶搆謝安于孝武一日帝召桓伊飲伊撫筝而歌曹子建怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患聲節慷慨俯仰可觀太傅泣下沾襟乃越席捋其鬚曰使君于此不凡太微靈書清水郷敖丘里丹田名藏精宮和參寥芥舟只合在坳堂紙帳心期老孟光不道山人今忽去曉猿嗁處月茫茫荘子逍遥遊覆杯水于坳堂之上則芥為之舟置杯焉則膠後漢書梁鴻取孟氏女名光字之曰徳曜醉題信老方丈鶴作精神松作筋堦庭蘭玊一時春願君且住三千嵗長與東坡作主人常州太平寺觀牡丹武林千葉照觀空别後湖山㡬信風自笑眼花紅緑眩還将白首看鞓紅竹枝詞又見黄山谷集數字小異自過一作日瘦鬼門關外天命同一作輕人鮓甕頭船北人堕淚南人笑青嶂無梯問杜鵑九域志容州鬼門闗漢伏波將軍馬援討林邑蠻路由此立碑石龜尚在寄歐叔弼昔葬衣冠今在否近來消息不須疑曾聞圯上逢黄石久矣留侯不見欺史記封禪書祭黄帝冢橋山釋兵湏如上曰吾聞黄帝不死今有冢何也或對曰黄帝已仙上天羣臣葬其衣冠題淨因院門外黄塵不見山箇中草木亦常閑履聲如渡薄氷過催粥華鯨吼夜闌東都賦發鯨魚鏗華鐘薛綜注海島有大獸名蒲牢蒲牢畏鯨魚鯨魚一擊蒲牢輒大吼凡鐘欲令聲大故作蒲牢于上以所擊之者為鯨魚之狀鐘有篆刻之文故曰華鐘絶句柴桑春晚思依依屋角鳴鳩雨欲飛昨日巳收寒食火吹花風起卻添衣和黄龍清老三首萬山不隔中秋月一鴈能傳寄逺書深密伽陀枯戰筆真誠相見問何如謝荘月賦隔千里兮共明月釋典僧者梵語具云僧伽不言伽者省文也天台八教頓漸祕密不定藏通别圓風前橄㰖星宿落月下桄榔羽扇開静嘿堂中有相憶清江或遣化人來太平廣記南威橄欖也圖經感擥俗作橄欖生嶺南閩廣樹髙不可梯刻其根下方寸許納鹽其中一夕子皆落此木作舟楫所經魚皆浮廣志桄榔樹大四五圍長五六丈其顚生葉其子作穂其皮可作綆得水則柔韌皮中有屑如麫列子周穆王時西極之國有化人來騎驢覓驢真可笑以馬喻馬亦成癡一天月色為誰好二老風流各自知傳燈録參禪有二病一是騎驢覓驢一是騎驢不肎下不解即心是佛眞是騎驢覓驢荘子齊物論以馬喩馬之非馬不若以非馬喻馬之非馬也杜詩中天月色好誰㸔過土山寨南風日日縱篙撐時喜北風将我行湯餅一杯銀線亂蔞蒿如筯玊簮横書辨才白雲堂壁不辭清曉叩松扉卻值支公久不歸山鳥不鳴天欲雪巻簾惟見白雲飛琴詩若言琴上有琴聲放在匣中何不鳴若言聲在指頭上何不於君指上聽楞嚴經辟如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與衆生亦復如是又倡云聲無既無滅聲有亦非生生滅二縁離是則常眞實此詩宗旨大約夲此韓康公坐上侍兒求書扇一一牕扉靣水開更於何處覓蓬萊天香滿袂人知否曾到旃檀小殿來楞嚴經佛告阿難汝噢此旃檀然于一株四十里内同時聞香驪山絶句三首功成雖欲善持盈可嘆前王恃太平辛苦驪山山下土阿房纔廢又華清秦阿房唐華清宮皆在驪山㡬變雕牆㡬變灰舉烽指鹿事悠哉上皇不念前車戒卻怨驪山是禍胎枚乗書福生有基禍生有胎海中方士覔三山萬古眀知去不還咫尺秦陵是商監朝元何必苦躋攀封禪書及至秦始皇幷天下至海上則方士言之不可勝數使人乃齎童男女入海求之船交海中皆以風為解未能至望見之焉詩大雅殷鍳不逺朝元閣在驪山上唐明皇建靈上訪道人不遇花光紅滿欄草色綠無岸不逢青眼人長歌白石澗晋阮籍傳籍能為青白眼見禮俗之士以白眼對之常山贈劉鎡劉侯年少日駿馬拊便靣援弓鴈自落不待白羽貫漢張敞傳走馬章臺街使御史驅自以便面拊馬師古注便面所以障面蓋扇之類也亦曰屏面虛弦落鴈用戰國䇿更嬴事注見前家語白羽若月游三游洞凍雨霏霏半成雪游人屨冷蒼崖滑不辭攜被巖底眠洞口雲深夜無月十一月三日與㡬先自竹西來訪慶老不見獨與君卿供奉蟾知客東閣道話久之恵州追錄巻巻長廊走黄葉席簾垂地香煙歇主人待來終不來火紅銷盡灰如雪醉睡者有道難行不如醉有口難言不如睡先生醉卧此石間萬古無人知此意集歸去來詩十首命駕欲何向忻忻春木榮世人無往復鄉老有逢迎雲外流泉逺風前飛鳥輕相攜就衡宇酌酒話交情渉世恨形役告休成老夫良欣就歸路不復向迷途去去徑有一作猶菊行行田欲蕪情親有還往清酒引罇壺與世不相入膝琴聊自一作盡歡風光歸笑傲雲物寄游觀言話審無勌心懐良獨安東臯清有趣植杖日盤桓世事非吾事駕言歸路尋向時迷有命今日悟無心庭内菊歸酒牕前風入琴寓形知巳老猶未倦登臨雲岫不知逺巾車行復前僕夫尋老木童子引清泉矯首獨傲世委心還樂天農夫告春事扶老向良田富貴良非願鄉關歸去休攜琴巳尋壑載酒復經邱翳翳景将入涓涓泉欲流農夫人不樂我獨與之游觴酒命童僕言歸無復留輕車尋絶壑孤棹入清流乗化欲一作亦安命息交還絶游琴書樂三徑老矣亦何求歸去復歸去帝鄉安可期鳥還知已倦雲出欲何之入室還攜幼臨流亦賦詩春風吹獨立不是傲親知役役倦人事來歸車載奔征夫問前路稚子候衡門入息亦詩筞出游常酒樽交親書已絶雲壑自相存寄傲疑今是求榮感昨非聊欣樽有酒不恨室無衣邱壑世情逺田園生事微柯庭還獨睡時有鳥歸飛余歸自道埸何山遇大風因憩耘老溪亭命官奴秉燭捧硯寫風竹一枝題詩云更将掀舞勢把燭畫風篠羙人為破顔憐此腰肢裊題雲龍草堂石磬折為督郵腰懸作山人室殊非濮上音信是泗濵石折腰為磬折故作淵明揖督郵事耳讀者不以辭害意可也左傳室如懸磬尚書泗濱浮磬和子由岐下詩并引予既至岐下逾月於其廨宇之北隙地為亭亭前為横池長三丈池上為短牆属之堂分堂之北厦為軒牕曲檻俯瞰池上出堂而南為過廊以属之㕔廊之兩旁各為一小池三池皆引汧水種蓮飬魚於其中池邉有桃李杏棃棗櫻桃石榴樗槐松檜栁三十餘株又以斗酒易牡丹一叢於亭之北子由以詩見寄次韻和答凡二十一首北亭誰人築短牆横絶擁吾堂不作新亭檻幽花誰為香公自注舊堂北有牆予始去之為亭横池明月入我池皎皎鋪紵縞何日變成緇太𤣥吾懶草楊雄解嘲吾黙黙獨守吾太𤣥短橋誰能鋪白簟永日卧朱橋樹影欄邉轉波光版底摇杜牧之阿房宫賦長橋卧波軒牕東鄰多白楊夜作雨聲急牕下獨無眠秋蟲見燈入曲欄流水照朱欄青紅亂明鑑誰見檻上人無言觀物泛雙池泝流入城郭亹亹渡千家不見雙池水長漂十里花荷華田田抗朝陽節節卧春水平鋪亂萍葉屢動報魚子魚湖上移魚子初生不畏人自從識鈎餌欲見更無因牡丹花好常患稀花多信佳否未有四十枝枝枝大如斗桃花争開不待葉密綴欲無條傍沼人窺鑑驚魚水濺橋李不及棃英軟應慙梅蕚紅西園有千葉淡佇更纖穠公自注城西有千葉李如荼䕷杏開花送餘寒結子及新火闗中幸無梅汝彊充鼎和棃霜降紅棃熟柔柯巳不勝未甞蠲夏渴長見助冬氷棗居人幾番老棗樹未成槎汝長才堪軸吾歸巳及瓜櫻桃獨遶櫻桃樹酒醒喉肺乾莫除枝上露從向口中漙石榴風流意不盡獨自送殘芳色作帬腰染名随酒盞狂樗自昔為神樹空聞蜩鵙鳴社公煩見輟為爾致羊羮槐採擷殊未厭忽然巳成隂蟬鳴看不見鶴立赴還深抱朴子槐子服之補腦令人髪不白而長生魏都賦槐以䕃塗松彊致南山樹來經渭水灘生成未有意鴉鵲莫相干檜依依古松子鬱鬱緑毛身每長須成節明年漸庇人栁今年手自栽問我何年去他年我復來摇落傷人思世説桓溫北征經金城見所種栁皆十圍慨然嘆曰樹猶如此人何以堪因攀枝執條泫然流涕縱筆舊注此詩執政聞而怒之再貶儋耳白頭蕭散滿霜風小閣藤牀寄病容報道先生春睡羙道人輕打五更鐘附四言六言息壤詩并引淮南子曰鯀堙洪水盜帝之息壤帝使祝融殺之于羽淵今荆州南門外有狀若屋宇䧟入地中而猶見其脊者旁有石記云不可犯畚鍤所及輙復如故又頗以致雷雨嵗大旱屢發有應予感之乃為作詩其辭曰帝息此壤以藩幽臺有神司之随取而培帝敕下民無敢或開惟帝不言以雷以雨惟民知之幸帝之恕帝茫不知誰敢以告字疑誤帝怒不常下土是震使民前知是伇音域于民無是墳者誰取誰予惟其的之是以射之顔樂亭詩并序顔子之故居所謂陋巷者有井存焉而不在顔氏久矣膠西太守孔君宗翰始得其地浚治其井作亭於其上命之曰顔樂昔夫子以簞食瓢飲賢顔子而韓子乃以為哲人之細事何哉蘇子曰古之觀人也必於小者觀之其大者容有偽焉人能碎千金之璧不能無失聲於破釜能搏猛虎不能無變色於蠭蠆孰知簟食瓢飲之為哲人之大事乎乃作顔樂亭詩以遺孔君正韓子之説且以自警云天生烝民為之鼻口羙者可嚼芬者可臭一作嗅仝羙必有惡芬必有臭我無天游六鑿交鬬騖而不反跬歩商受偉哉先師安此微陋孟賁股慄虎豹卻走眇然其身中亦何有我求至樂千載無偶執瓢從之忽焉在後新渠詩并序庚子正月予過唐州太守趙侯始復三陂疏召渠招懐逺人散耕于唐予方為旅人不得親執壺漿簟食以與侯勸逆四方之來者獨為新渠詩五章以告于道路致侯之意其詞曰新渠之水其來舒舒溢流于野至于通衢渠成如神民始不知問誰為之邦君趙侯新渠之田在渠左右渠來奕奕如赴如凑如雲斯積如屋斯溜嗟唐之人始識秔稌新渠之民自淮及潭挈其婦姑或走而顛王命趙侯宥我新民無與王事以訖七年侯謂新民爾既來止其歸爾邑告爾鄰里良田千萬爾擇爾取爾耕爾食遂為爾有築室于唐孔碩且堅生為唐民飽粥與饘死葬于唐祭有雞豚天子有命我惟爾安䟦姜君弼課冊公自注姜君瓊州人已卯閏九月來從學於東坡至儋耳庚辰三月方還瓊雲興天際歘若車蓋凝矑未瞬瀰漫霮䨴驚雷出火喬木糜碎殷地爇空萬夫皆廢􅋼綆四墜一作懸澑綆墜日中見昧一作沬移晷而收野無完塊易豐卦九三豐其沛日中見沬沬星之小者漢王莽傳地皇元年二月壬申日正黒莽惡之下書曰迺者日中見昧隂薄陽黒氣為變董子太平之時雨不破塊津莖潤葉而已數日前夢人示余一巻文字大略若諭馬者用吃蹶兩字夢中甚賞之覺而忘其餘戲作數語足之天驥雖老舉鞭脱逸交馳蟻封歩中衡石旁睨駑駘豐肉滅節徐行方軌動輒吃蹶天資相絶未易致詰鄧粲晋紀王濟性好馬而所乗馬駿駛意甚愛之叔湛曰此雖小駛然力薄不堪苦近見督郵馬當勝此但飬不至耳濟取督郵馬榖食十數日與湛試之歩驟不異于濟而馬不相勝湛曰今直行車路何以别馬勝不唯當就蟻封耳於是就蟻封盤馬果倒踣憶江南寄純如五首六言楚水别來十載蜀山望斷千重畢竟擬為傖父憑君説與吴儂湖目也堪供眼木奴自足為生若話三吴勝事不惟千里蓴羮襄陽記李衡字叔平為丹陽太守密遣人于武陵龍陽州上種甘千樹臨終勅兒曰汝母惡吾不治家故窮如是吾州里有千頭木奴不責汝衣食嵗上一匹絹亦足用矣晋書陸機詣王武子有羊酪指以示機曰卿東吴何以敵此機曰千里蓴羮未下鹽䜴時人稱為名對潜確類書或謂千里末下皆地名蓴䜴所出處張鉅山詩一出脩門道重嘗末下鹽是也按此則未下當作末下語較有味但末下少見出處存之備考人在畫屏中住客依明月邉游未卜柴桑舊宅須乘五馬一作湖扁舟生計曾無聚沫孤蹤謾有清風治産猶嫌范蠡攜孥頗笑梁鴻弱累已償俗盡老身将伴僧居未許季鷹髙潔秋風直為鱸魚晋張翰傳翰因見秋風起乃思吴中菰菜蓴羮鱸魚膾曰人生貴得適志何能覊宦數千里以要名爵乎遂命駕而歸恵崇蘆鴈六言恵崇煙雨蘆鴈坐我瀟湘洞庭欲買扁舟歸去故人云是丹青何公橋詩補録天壤之間水居其多人之往來如鵜在河順水而行雲駛鳥疾維水之利千里咫尺亂流而渉過膝則止維水之害咫尺千里沔彼濫觴蛙跳鯈游溢而懐山神禹所憂豈無一木支此大壊舞于盤渦冰拆雷解坐使此邦畫為兩州雞犬相聞胡越莫救允毅何公甚勇于仁始作石梁其艱其勤将作復止更此百難公心如鐡非石則堅公以身先民以悦使老牡負石如負其子疏為玊虹隐為金堤直欄横檻百賈所栖我來與公同載而出讙呼填道抱其馬足我歎而言視此滔滔未見剛者孰為此橋願公千嵗與橋夀考持節復來以慰父老如朱仲卿食于桐鄉我作銘詩子孫不忘蘇詩續補遺巻下
