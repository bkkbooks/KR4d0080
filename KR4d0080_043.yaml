body:
  text: 施註蘇詩巻二十九宋蘇軾撰施元之原註武進邵長蘅刪補詩五十八首時守杭州作次韻林子中蒜山亭見寄林子中名希閩人東坡起遷客朝廷以人望欲驟用之議除起居舍人公詣宰相蔡持正力辭持正日今日誰當在公先者公曰昔林希同在舘中年且長持正曰希固當先公耶卒不許紹聖初進寶文閣直學士知成都府哲宗親政章子厚方治元祐諸臣欲使子中典書命而疑於左遷使問之欣然留行復為中書舍人自司馬温公東坡等數十人皆使為謫詞極其醜詆遂累遷至同知樞宻院後朝廷理其詞命醜正之罪奪職為舒州建中靖國元年東坡自海南歸至儀眞與子由書云林子中病傷寒十餘日便卒所獲㡬何遺臭無窮哀哉哀哉竒逸多聞老敬通何人慷慨解憐翁十年簿領催衰白一笑江山發醉紅聞道賦詩臨北固未應舉扇向西風叩頭莫喚無家客歸掃岷峨一畞宮後漢馮衍傳衍字敬通幼有奇才博通羣書數遭讒毁遂埳壈於時舉扇用庾元規事屢見無家客公有與金山元長老詩云蒜山幸有閑田地招此無家一房客再和并答楊次公楊次公事見二十三巻送楊傑詩注此巻倡醻凡五詩次公時提點兩浙刑獄毗盧海上妙髙峰二老遥知説此翁聊復􅋈舟尋紫翠不妨持節散陳紅髙懐郤有雲門興好句眞傳雪竇風唱我三人無譜曲馮夷亦合舞幽宮華嚴經毗盧遮那十身巢海又文殊師利告善財童子言南方有一國土名為勝樂其國有山名曰妙髙峰漢食貨志太倉之粟陳陳相因賈捐之傳孝武元狩六年太倉之粟紅腐而不可食持節用汲黯事雲門雪竇皆禪宗也次公有雪竇語録序司馬相如大人賦使靈媧鼓琴而舞馮夷次韻劉景文送錢䝉仲三首錢䝉仲乃穆父内翰之子穆父守越遣䝉仲從東坡學穆父九男子東坡每戲穆父為九子母丈夫故云送盡青雲九子子由壻王子立新逝故云王郎獨為鬼録誰識天閑老驥不争日暮長途送盡青雲九子歸去扁舟五湖南史何承天傳除著作佐郎承天年巳老而諸佐郎竝名家年少荀伯子嘲之常呼為妳母承天曰卿當云鳳皇將九子妳母何言耶寄語竹林社友同書桂籍天倫王郎獨為鬼録世間無此玉人五字古原春草千金漢殿長門經緯尚餘三䇿典刑留與諸孫摭言白居易應舉初至京以詩謁顧况况戯之曰長安物貴居大不易及讀原上草詩云野火燒不盡春風吹又生乃嗟賞曰有句如此居天下有甚難樂天集此詩題云古原草司馬長卿長門賦序孝武陳皇后得幸頗妒别在長門宮愁悶悲思聞相如天下工為文奉金百斤為相如文君取酒因于解悲愁之詞而相如為文以寤主上后復得幸菩提寺南漪堂杜鵑花南漪杜鵑天下無披香殿上紅氍毹鶴林兵火眞一夢不歸閬苑歸西湖三輔黄圖武帝建温室殿規地以罽賓氍毹白樂天紅線毯歌揀絲練線紅藍染織作披香殿上毯續仙傳鶴林寺杜鵑花盛為三春游觀之最時將重九周寳謂殷七七曰能令此花開否七七乃宿其下次日花發此花平日開時常見三紅裳女子䕶之及是忽女子來語七七曰花在人間已百年非久郤歸閬苑今與道者開之數日花俄不見亦無花落之迹其後兵火焚寺樹失根株信歸閬苑矣事互見巻五後十餘日復至詩注題楊次公春蘭春蘭如羙人不採羞自獻時聞風露香蓬艾深不見丹青寫眞色欲補離騷傳對之如靈均冠佩不敢燕漢淮南王傳武帝使為離騷傳旦受詔食時上楚辭離騷名余曰正則兮字余曰靈均漢汲黯傳丞相晏見或時不冠至如見黯不冠不見也題次公蕙蕙本蘭之族依然臭味同曽為水仙佩相識楚辭中幻色雖非實眞香亦竟空云何起㣲馥鼻觀已先通王子年拾遺記楚人思慕屈平謂之水仙楚辭離騷雜申椒與菌桂兮豈維紉夫蕙茝楞嚴經觀世音菩薩由聞思修入三摩地疏云聞思修為三觀惟觀世音三觀俱全次韻曹輔寄壑源試焙新芽曹輔字子方時為福建路轉運使仙山靈草一作雨濕行雲洗遍香肌粉未匀明月來投玉川子清風吹破武林春要知玉一作冰雪心膓好不是膏油首面新戯作小詩君勿一作一笑從來佳茗似佳人韓退之李花詩日光赤色照來好明月暫入都交加夜領張徹投盧仝乗雲共至玉皇家南史齊帝賜公主首面三十人茶品要録沙溪之圉民或雜以松黄飾其首靣試時雖鮮白而不能久次韻袁公濟謝芎椒燥吻時時著酒濡要令卧疾致文殊河魚潰腹空號楚汗水流骹始信呉公自注吴眞君服椒法云半年腳心汗如水自笑方求三嵗艾不如長作獨眠夫羡君清瘦眞仙骨更助飄飄鶴背軀陸士衡文賦始躑躅於燥吻終流離於濡翰維摩經文殊奉佛㫖詣維摩詰問疾諸菩薩大弟子咸作是念今二大士文殊師利維摩詰共談必説妙法左傳宣十二年申叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何再見潘安仁射雉賦注云骹脛也一曰吴人呼腳為骹次韻楊次公惠徑山龍井水公自注龍井水洗病眼有效漏盡雞號厭夜行年來小器溢缾罌棄官縱未歸東海罷郡猶堪作水衡幻色將空眼先暗勝遊無礙腳殊輕空煩逺致龍淵水寕復臨池似伯英三國魏田豫傳年過七十而居位譬猶鐘鳴漏盡而夜行不休是罪人也史記厯書冬分時雞三號卒明韓石鼎聫句方當紅爐然益見小器盈漢䟽廣傳東海蘭陵人也與兄子受俱乞骸骨歸老故鄉巳見水衡用漢龔遂事屢見次韻劉景文登介亭澤國梅雨餘衰年困蒸溽髙堂磨新塼頗覺利腰足松根百尺井兩綆飛浄渌流觴聚兒童一笑為捧腹清風信可御剛氣在巖麓始知共此世物外無三伏長歌入雲去不待絃管逐西湖眞西子煙樹㸃睂目濤江少醖藉髙浪翻飛屋俛仰拊四海百世飛鳥速逺追錢氏餘近弔祖侯躅吾生如寄耳寸晷輕尺玉誰似劉將軍逸韻謝邊幅千言一揮手五車不再讀春嵓彩雞舞月峽哀猿哭朝先鶗鴂起暮與寒螿續我老廢吟哦賴君時擊觸從今事逺覽發軔此幽谷清游得三昧至樂謝五欲莫作狂道士氣壓劉師服磨塼字出傳燈録史記日者傳司馬季主捧腹大笑莊子在宥篇俛仰之間而拊四海之外祖侯謂祖無擇淮南子聖人重分寸之隂而輕尺璧後漢馬援傳見公孫述曰天下雌雄未定不吐哺走迎國士反修飾邊幅此子何足久稽天下士南史任昉傳為新安太守在郡不事邊幅莊子惠子多方其書五車韓愈詩為人强記覽過眼不再讀北史邢邵傳廣尋經史五行俱下一覽便無所遺唐蕭頴士傳與李華陸據游龍門讀道傍碑頴士即誦華再據三乃能盡記聞者謂三人才髙下此其分也異苑山雞愛其毛映水則舞宜都山川記峽中猿鳴至清行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣謝惠連搗衣詩烈烈寒螿嗁此二句謂景文篤學苦吟也史記封禪書上使欒大驗小方闘棊自相觸擊楚辭離騷朝發軔於蒼梧兮夕余至於懸圃内典梵語三昧此云正受法華經有五欲曰滛慾曰睡眠曰飲食曰自恣曰貪欲又維摩詰云汝等巳發道意有法樂可以自娱不應復樂五欲狂道士軒轅彌明也與劉師服進士相識劉與侯喜聫石鼎句彌明應之如響事詳韓退之石鼎聫句序屢見袁公濟和復次韻答之袁公濟名轂昏昏墮醉夢奈此六月溽君詩如清風吹我朝睡足登臨得佳句江白照湖渌䄂手獨不言默藁已在腹是時風雨過藹藹雲歸麓疎星帶㣲月金火争見伏惜哉此清景變滅不可逐歸來讀君詩耿耿猶在目郤思少年日聲價争埸屋文如翻水成賦作叉手速秋風起鴻鴈我亦繼華躅那知君蹭蹬獨泣荆山玉相見南新道青衫垂破幅蚤知事大繆恨不十年讀莫嫌馮唐老終勝賈誼哭今年復為僚舊好許重續升沈何足道等是蠻與觸共為湖山主出入窮澗谷衆馳君不争人棄我所欲何時神武門相約挂冠服禮記季夏之月土潤溽暑詩大雅吉甫作頌穆如清風唐王勃傳屬文初不精思先磨墨數升則酣飲引被覆靣及寤援筆成篇不易一字時人謂勃為腹槀厯忌釋伏者何也金氣伏藏之日也四時代謝皆以相生立夏火代木木生火立秋金代火金畏於火故至庚日必伏顏師古曰隂氣將起廹于殘陽而未得升故為藏伏太平廣記唐温庭筠才思艶麗工於小賦每入試押官韻作賦凡八叉手而八韻成繼華躅袁轂試館職首薦東坡亦第七人漢司馬遷傳務一心營職以求親媚於主上而事乃有大繆不然者漢馮唐傳文帝問曰父老何自為郎賈誼傳上疏陳政事曰有可為痛哭者一流涕者二長太息者六左傳桓二年公及戎盟于唐修舊好也莊子則陽篇戴晉人曰有國於蝸之左角曰觸氏有國於蝸之右角曰蠻氏時相與争地而戰伏尸逐北旬有五日而後反云云介亭餞楊傑次公籃輿西出登山門嘉與我友尋仙村丹青明滅風篁嶺環珮空響桃花源公自注郡人謂介亭山下為桃源路前朝欲上巳蠟屐黒雲白雨如傾盆今晨積霧巻千里豈畏觸熱生病根在家頭陀無為子久與青山為弟昆孤峰盡處亦何有西湖鏡天江抹坤臨髙揮手謝好住清風萬壑傳其言風回響答君聼取我亦到處随君軒杜子羙貽柳少府詩自非曉相訪觸熱生病根傳燈録㑹通禪師休官出家鳥窠禪師云汝當為在家菩薩戒施俱修如謝靈運之儔也次公號無為子杜牧之詩大江吞天去一練横坤抹傳奇封陟傳仙姝謂陟曰好住好住無異日追悔六祖壇經和尚報言好住今共汝别次京師韻送表弟程懿叔赴䕫州運判程懿叔名之邵行七二十七巻有送表弟程七知泗州詩先生元祐五年六月三日手書此詩并自跋云時徳孺在嶺外適有使至杭當録本示之徳孺書中自言學佛有所悟入寄偈頌十數篇來故有新得道之語德孺名之元懿叔兄也詩跋刻石成都府治與子甥舅氏摧頽各蒼顏竝為東諸侯長此佳江山寒松無時花安得插髻鬟惟將老不死一笑榮枯間我甚似樂天但無素與蠻挂冠及未耄當獲一紀閑子亦拙進取才髙命堅頑譬如萬斛舟行此九折灣仲氏新得道一漚目塵寰嵗晩家鄉路莫遣生榛菅左傳成十六年郤犨將新軍且為公族大夫以主東諸侯古詩話樂天二妓樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊柳小蠻腰國語狐偃語晉文公曰蓄力一紀可以逺矣韋昭注曰十二年嵗星一周為一紀葉教授和溽字韻詩復次韻為戲記龍井之游先生魯諸儒飲食清不溽空膓出秀句吟嚼五味足華堂閙絲管眸子漲春渌先生疾走避面冷毒在腹歸來煑瓠葉弟子歌旱麓聲滛及靈臺中有麀鹿伏功名一走何用千人逐故應容我輩清坐時閉目髙亭石排衙木杪挂飛屋我來無時節客亦不待速似聞雪髥叟西嶺訪遺躅朝陽入潭洞金碧涵水玉泉扉夜不扃雲袂本無幅慈皇付寳偈神侣得幽讀訥菴有老人宴坐天魔哭時來獻瓔珞法供燈相續吾儕詩酒汙欲徃無乃觸齋厨費晨炊車騎滿山谷願聞第一義鉢飯非所欲便投切雲冠予幼好奇服漢叔孫通傳説上曰儒者難與進取可與守成願徴魯諸生與臣弟子共起朝儀禮記儒行其居處不滛其飲食不溽佛書眈著五味禪詩小雅瓠葉大夫刺幽王也大雅旱麓受祉也靈臺民始附也禮記聲滛反商説苑一兔走於街萬人追之一人得之萬人不復走白樂天懐㣲之詩不知雨雪江陵府今日排衙得也無按介亭有石如劍㦸對峙謂之排衙石訥菴謂辯才法師觀音經天魔外道恐怖毛豎普門品經無盡意菩薩解頸衆寳珠瓔珞價直百千兩金而以與之作是言仁者受此法施珍寳瓔珞華嚴經諸供飬中法供養最傳燈録逹磨西來梁武帝問如何是聖諦第一義答云廓然無聖杜子羙詩願聞第一義回向心地初楚辭九章余幼好此奇服兮年既老而不衰帶長鋏之陸離兮冠切雲之崔嵬次韻林子中見寄飄零洛社數遺民詩酒當年困惡賓元亮本無適俗韻孝章要是有名人蒜山小隐雖為客江水西來亦帶岷巻郤西湖千頃葑笑看魚尾更莘莘西京雜記公孫𢎞曰寕逢惡賓莫逢故人冄見陶潜歸田園居詩少無適俗韻性本愛丘山㑹稽典録盛憲字孝章素有髙名孫䇿深忌之孔融憂其不免禍乃與曹公書勸招致之曰孝章要為有天下大名九牧之人所共稱歎蒜山為客已見蒜山卜居詩註千頃葑公開西湖以葑積為堤以通南北今蘇公堤是也詩小雅魚在在藻有莘其尾安州老人食蜜歌公自注贈僧仲殊按僧仲殊安州人居錢塘為詩敏㨗立成而工妙絶人逺甚殊辟榖常啖蜜陸務觀云族伯父彥逺言少時識仲殊長老東坡為作安州老人食蜜歌者一日與數客過之所食皆蜜也豆腐麵筋牛乳之類皆漬蜜食之客多不能下筯惟東坡性亦酷嗜蜜能與之共飽崇寕中忽上堂辭衆是夕閉方丈門自縊死及火舍利五色不可勝計鄒忠公為作詩云逆行天莫測雉作瀆中經漚滅風前質蓮開火後形鉢盂殘蜜白爐篆冷煙青空有誰家曲人間得細聼彥逺又云殊少為士人遊蕩不羈為妻投毒羮胾中幾死啖蜜而解醫云復食肉則毒發不可療遂棄家為浮屠鄒公所謂誰家曲者謂其雅工於樂府詞猶有不羈餘習也安州老人心似鐵老人心肝小兒舌不食五榖惟食蜜笑指蜜蜂作檀越蜜中有詩人不知千花百草争含姿老人咀嚼時一吐還引世間癡小兒小兒得詩如得蜜蜜中有藥治平聲百疾正當狂走捉風時一笑看詩百憂失東坡先生取人亷幾人相歡幾人嫌恰似飲茶甘苦雜不如一作知食蜜中邊甛因君寄與雙龍餅鏡空一照雙龍影三呉六月水如湯老人心似雙龍井四十二章經財之於人譬如刀刃有蜜小兒餂之有割舌之患又若有人得道猶如食蜜中邊皆甛後漢朱浮傳與彭寵書云伯通獨中風狂走自捐盛時漢郊祀志谷永曰求之盪盪如係風捕景終不可得次韻錢穆父紫薇花二首虗白堂前合抱花秋風落日照横斜閲人此地知多少物化無涯生有涯公自注虗白堂前紫薇兩株俗云樂天所種杭州圖經虗白堂在舊治白樂天有詩云虗白堂前衙退後更無一事到中心漢盖寛饒傳此如傳舍所閲多矣再見莊子聖人其生也天行其死也物化又養生主篇吾生也有涯而知也無涯以有涯随無涯殆巳折得芳蕤兩眼花題詩相報字傾斜篋中尚有絲綸句公自注白樂天紫薇花詩絲綸閣下文章静鐘鼓樓中刻漏長獨坐黄昏誰是伴紫薇花對紫㣲郎上嘗書此詩以賜軾坐覺天光照海涯送張嘉州少年不願萬戸侯亦不願識韓荆州頗願身為漢嘉守載酒時作凌雲游虗名無用今白首夢中郤到龍泓口浮雲軒冕何足言惟有江山難入手峨睂山月半輪秋影入平羌江水流謫仙此語誰解道請看見月時登樓笑談萬事眞何有一時付與東巖酒公自注佛峽人家白酒舊有名歸來還受一大錢好意莫違黄髮叟李白與韓荆州朝宗書聞天下談士相聚而言曰生不用萬戸侯但願一識韓荆州嘉州九頂山上寺曰凌雲龍泓口在凌雲之上土人謂之龍巖後漢劉寵傳為㑹稽太守徴還山隂老叟龎睂皓髮人齎百錢以送寵為人選一大錢受之次韻蘇伯固主簿重九蘇伯固名堅博學能詩公與講宗盟自黄徙汝同遊廬山有歸朝歡詞以劉夢得比之公自翰林守杭道呉興伯固以臨濮縣主簿監杭州在城商税自杭來㑹作後六客詞伯固與焉方經理開西湖伯固建議謂當參酌古今而用中䇿湖成其力為多後一嵗又相從於廣陵有和伯固韻送李孝博詩公歸自海南伯固在南華相待有詩載三十九巻黄魯直謫死宜州至大觀間伯固在嶺外䕶其喪歸葬雙井其風義如此子庠字養直學世其家號後湖居士有文集行世雲間朱袖拂雲和知一作應是長松挂女蘿髻重不嫌黄菊滿手香新喜緑橙搓墨飜衫䄂吾方醉紙落雲煙子患多只有黄雞與白日玲瓏應識使君歌李白寄逺詩遥知玉牕裏纖手弄雲和奏曲有深意青松交女蘿詩小雅蔦與女蘿施於松上白樂天有醉示妓人商玲瓏歌巳見送李陶通直赴清谿忠文文正二大老公自注司馬温公范蜀公君之師友温公諡文正蜀公諡忠文蘇李廣平三舍人公自注蘇子容宋次道與先公才元熙寕中封還李定詞頭天下謂之三舍人喜見通家賢子弟自言得邑少風塵從來勢利闗心薄此去谿山琢句新肎向西湖留數月錢塘初識小麒麟三舍人熙寕初大臣薦秀州軍事判官李定召見擢太子中允守監察御史裏行知制詔宋敏求以定驟自幕職而升朝著任執法非故事蘇頌李大臨相繼封還詞頭不草制敏求前罷頌與大臨更奏復下至于七八遂俱罷歸班而定御史之命亦中寢次韻楊公濟梅花十首楊公濟名蟠章安人舉進士能詩題金山云天末樓臺横北固夜深燈火見揚州歐陽文忠公讀公濟章安集詩云蘇梅久作黄泉客我亦今為白髪翁臥讀楊蟠一千首乞渠秋月與春風先生守杭公濟通判州事知夀州提點荆廣鑄錢卒梅梢春色弄㣲和作意南枝翦刻多月黒林間逢縞袂霸陵醉尉誤誰何摭遺蜀州有紅梅數本郡侯構閣環墻以固之游人莫得見也一日梅巳放有兩婦人凭欄語笑守梅吏走報郡侯既啟鑰闃不見人唯於東壁有詩云南枝向暖北枝寒一種春風有幾般憑仗髙樓莫吹笛大家留取倚欄干相逢月下是瑶臺藉草清樽連夜開明日酒醒應滿地空令饑鶴啄莓苔緑髮尋春湖畔回萬松嶺上一枝開而今縱老霜根在得見劉郎又獨來月地雲堦漫一樽玉奴當作兒終不負東昏臨春結綺荒荆棘誰信幽香是返魂牛僧孺周秦行記僧孺遇薄后潘妃楊妃戚妃作詩云香風引到大羅天月地雲堦拜洞仙共道人間惆悵事不知今夕是何年后曰今夕誰伴牛秀才戚辭潘亦辭曰東昏以玉兒故身死國除不擬負他乃令王昭君夕焉楊妃在坐自稱玉奴十洲記聚窟洲有返魂香死尸在地聞香即活仙傳拾遺亦云日出冰湖散水花野梅官柳漸欹斜西郊欲就詩人飲黄四娘東子羙家杜子羙江上獨歩尋花詩黄四娘家花滿蹊千朶萬朶壓枝低君知蚤落坐先開莫著新詩句句催嶺北霜枝最多思忍寒留待使君來李義山詩忍寒應欲試梅糚白樂天新栽梅今年好待使君來冰盤未薦含酸子雪嶺先看耐凍枝應笑春風木芍藥豐肌弱骨要人醫寒雀喧喧凍不飛遶林空啅未開枝多情好與風流伴不到雙雙燕語時鮫綃翦碎玉簮輕檀暈糚成雪月明肯伴老人春一醉懸知欲落更多情北夢瑣言張建章大夫於渤海遇水仙遺鮫綃自齎以進明宗有事郊丘建章鄉人掌東序之寳言國璽外有二物一即鮫綃也亦云夏天清暑展開滿堂凛然縞帬練帨玉川家肝膽清新冷不邪穠李争春猶辦此更教踏雪看梅花韓退之李花詩夜領張徹投盧仝乘雲共到玉皇家長姬香御四羅列縞帬練帨無等差清寒瑩骨肝膽醒一生思慮無由邪贈劉景文荷盡已無擎雨蓋菊殘猶有傲霜枝一年好景君須記最是橙黄橘緑時謝闗景仁送紅梅栽二首年年芳信負紅梅江畔埀埀又欲開珍重多情闗令尹直和根撥送春来為君栽向南堂下記取他年著子時酸釅不堪調衆口使君風味好攢眉歐陽歸田録丁晉公南遷過潭州作齋僧䟽云補仲山之袞雖曲盡於一心和傅說之羮實難調於衆口辯才老師退居龍井不復出入余往見之嘗出至風篁嶺左右驚曰逺公復過虎谿矣辯才笑曰杜子美不云乎與子成二老来往亦風流因作亭嶺上名曰過谿亦曰二老謹次辯才韻辯才事見第十巻贈上天竺辯才師詩注日月轉雙轂古今同一丘惟此鶴骨老凛然不知秋去住兩無礙人天爭挽留去如龍出山雷雨巻潭湫来如珠還浦魚鼈爭騈頭此生暫寄寓常恐名實浮我比陶令媿師為逺公優送我還過谿谿水當逆流聊使此山人永記二老游大千在掌握寧有别離憂賈島詩碌碌復碌碌百年雙轉轂漢楊惲傳古與今如一丘之貉後漢孟嘗傳合浦郡海出明珠先時宰守貪穢珠漸徙於交阯嘗為太守革易前弊未踰嵗去珠復還周易貫魚以宮人寵無不利王弼曰駢頭相次似貫魚也廬山記逺公與陶元亮陸修静語道不覺過虎谿因相與大笑故作三笑圖再見栁子厚石門精室詩小劫不逾瞬大千若在掌送程之邵僉判赴闕程之邵名遵彦事見二十八巻新茶送僉判程朝奉詩注元祐三年龍圖閣待制熊伯通本自越移杭尋改江寜而先生繼之之邵蓋是伯通羅致幕府故有賢哉江東守收此幕中竒之句夜光不自獻天驥良難知從来一狐腋或出五羖皮賢哉江東守收此幕中竒無華豈易識既得不自隨留君望此府助我憐其衰二年促膝語一旦長揖辭林深伏猛在岸改潛珍移去此當安從失君徒自悲念君瑚璉質當今臺閣宜去矣㑹有合豈常懐其私世說王東亭為宣武主簿既承藉有譽為一府之望舊唐書韋思謙傳皇甫公義引為沛王府倉曹曰屈心為數旬客以望此府禮記虎豹之皮示伏猛也漢賈誼傳襲九淵之神龍分沕淵潛以自珍寄梅宣義園亭梅宣義者呉郡人子明之父子明為杭州通判與東坡同僚嘗以白石遺子明以奉其父載二十八巻此詩云愛子幸僚友乆要疑弟昆又云明年過君西蓋呉郡為滿去歸塗也先生後有除夜圄空詩呈公濟子侔二通守不著子明當已去官耶仙人子真後還隠呉市門不惜十年力治此五畝園初期橘為奴漸見桐有孫清池壓丘虎異石来湖黿敲門無貴賤遂性各琴樽我本放浪人家寄西南坤敝廬雖尚在小圃誰當樊羡君欲歸去奈此未報恩愛子幸僚友乆要疑弟昆明年過君西飲我空缾盆漢梅福傳字子真少補南昌尉後去官棄妻子去九江至今傳為仙其後人有見於㑹稽者變姓名為呉市門卒僧文覽洞庭湖山記黿頭山形如黿欲行狀有眼鼻山中所出貞石郡人琢而為器周易坤元亨西南得朋東北喪朋王弼注西南致養之地與坤同道者也詩國風折栁樊圃注云樊藩也圃菜園也熙寧中軾通守此郡除夜直都聽囚繫皆滿日暮不得返舍因題一詩于壁今二十年矣衰病之餘復忝郡寄再經除夜庭事蕭然三圄皆空蓋同僚之力非拙朽所致因和前篇呈公濟子侔二通守前詩除日當蚤歸官事乃見留執筆對之泣哀此繫中囚小人營餱糧墮網不知羞我亦戀薄禄因循失歸休不須論賢愚均是為食謀誰能暫縱遣閔默愧前修㑹稽典録盛吉為廷尉毎至冬節獄囚當斷妻夜持燭吉持丹筆垂泣相向舊唐書太宗紀嘗親録囚見應死者閔之縱使歸家期以来秋就死仍敕天下死囚皆縱遣使至期詣京師凡三百九十明年秋自詣朝堂無一亡匿者上皆赦之楚辭離騷蹇吾法乎前修兮非時俗之所服舊唐書裴寂傳高祖曰我與公無媿前修今詩山川不改舊嵗月逝不留百年一俯仰五勝更王囚同僚比岑范德業前人羞坐令老鈍守嘯諾獲少休卻思二十年出處非人謀齒髪付天公缺壊不可修漢律歴志秦推五勝自以為獲水德注引漢書音義曰五行相勝秦以周為火用水勝也五行有王相死囚休廢岑范嘯諾詳後漢黨錮傳注屢見游寳雲寺得唐彦猷為杭州日送客舟中手書一絶句云山雨霏微不滿空畫船来往疾輕鴻誰知獨臥朱簾裏一榻無塵四面風明日送彦猷之子坰赴鄂州舟中遇微雨感歎前事因和其韻作兩首送之且歸其書唐氏唐彦猷名詢錢塘人仁宗時為知制誥子坰字林夫父任為官熈寧初上書青苗法不行宜誅大臣異議者王安石喜其言薦使對賜進士出身為崇文校書用鄧綰薦為監察御史同知諌院既而數論事不見聽因百官起居日扣陛請對力數安石用人變法非是至六十餘條上屢止之坰慷慨自若且讀且論上下皆震悚安石為之請去上意雖寤亦不深怒明日貶監廣州軍資庫至是知鄂州後知湖泉二州卒於泉林夫當先生廢棄於時其自附甚勤簡牘題跋可以考見此詩餞行因得彦猷舊作用以為題三十二巻又有賦靈隠詩長篇亦止述靈隠天竺山川風物而巳其於林夫賢否殊無一言及之意亦有在也二妙凋零筆法空忽驚雲海戲羣鴻清詩不敢私囊篋人道黄門有父風晉衞瓘傳為尚書令與尚書郎索靖俱善草書時人號一臺二妙瓘子恒為黄門郎善草𨽻書韋續書訣墨藪梁武帝評鍾繇書如雲鵠造天羣鳧戲海出處榮枯一笑空十年社燕與秋鴻誰知白首長河路還臥當時送客風賈島詩長江風送客孤館雨留人送江公著知吉州江公著字晦叔桐廬人舉進士為洛陽尉遇乆旱微雨作詩云雲葉紛紛雨腳勻亂花柔草長精神雷車卻碾前山過不灑原頭陌上塵司馬温公於士人家見之為稱薦由此知名元祐初以近臣薦通判陳州後歴提㸃湖南刑獄京西轉運副使三呉行盡千山水猶道桐廬更清美豈惟濁世隠狂奴時平亦出佳公子初冠惠文讀城旦晩入奉常陪劍履方將華省起彈冠忽憶釣臺歸洗耳未應良木棄大匠要使名駒試千里奉親官舍當有擇得郡江南差可喜白粲連檣一萬艘紅糚執樂三千指簿書期㑹得餘閒亦念人生行樂耳公自注二耳義不同故得重用呉郡圖經續記漢永建四年分㑹稽為呉郡與呉興丹陽號為三呉後漢嚴光傳司徒侯霸奉書光答曰懐仁輔義天下恱阿諛順㫖要領絶霸封奏之帝笑曰狂奴故態也又光武曰咄咄子陵不相助為理耶光曰唐堯著德巢父洗耳士故有志何至相迫乎乃歸富春後人名其釣處為嚴陵灘漢張敞傳秦時獄法吏冠柱後惠文儒林轅固傳太后曰安得司空城旦書乎再見聞錢道士與越守穆父飲酒送一壺龍根為脯玉為漿下界寒醅亦漫嘗一紙鵝經逸少醉他年鵬賦謫仙狂金丹自足留衰鬂苦淚何須㸃别膓呉越舊邦遺澤在定應符竹付諸郎𤣥怪録巴卭人有橘園剖二大橘中有二老叟相對象戲一叟曰僕饑虛矣須龍根脯食之袖出一草根削食食訖以水噀之化為一龍共乘之風雨晦㝠忽失所在十洲記瀛洲有玉膏如酒名曰玉酒飲杯輒醉令人長生又上元夫人謂漢武帝曰鳴天鼔飲玉漿晉王羲之傳山隂有一道士好養鵝羲之往觀焉意甚恱固求市之道士曰為寫道德經當舉羣相贈羲之欣然寫畢籠鵝而歸仙傳拾遺管霄霞籠紅鵝一雙遺之請書黄庭經李太白大鵬賦序見司馬子微謂余可與神遊八極之表因著大鵬遇希有鳥賦以自廣次韻劉景文路分上元華燈閟艱嵗冷月挂空府三呉重時節九陌自歌舞云從月幾望遂至一百五嘉辰可屈指樂事相繼武今宵掃雲陣極目淨天宇嬉遊各忘歸闐咽頃未覩飛毬互明滅激水相吞吐老去反兒童歸来尚鐃鼔新年消暗雪舊嵗添絲縷何時九江城相對兩漁父公自注予舊欲卜居廬山景文近買宅江州周易月幾望馬匹亡無咎激水謂水燈也韓退之陸渾火詩山狂谷狠相吐吞再和楊公濟梅花十絶一枝風物便清和㸔盡千林未覺多結習已空從著袂不須天女問云何維摩經有天女散華注屢見天教桃李作輿臺故遣寒梅第一開憑仗幽人收艾納國香和雨入青苔左傳昭七年芉尹無宇曰人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事廣志艾納松皮上蘚衣合和諸香燒之其烟團聚清白可愛出本草注香譜云艾納出西國似艾白髪思家萬里回小軒臨水為花開故應剰作詩千首知是多情得得来人去殘英滿酒尊不堪細雨濕黄昏夜寒那得穿花蝶知是風流楚客魂春入西湖到處花帬腰芳草抱山斜盈盈解佩臨煙浦脈脈當壚傍酒家白樂天春望詩誰開湖寺西南路草緑帬腰一道斜韓詩外傳鄭交甫將適南楚遵彼漢皋臺下遇二女佩兩珠大如雞卵交甫曰欲子之佩二女解以與之交甫既行顧不見二女佩亦失之列仙傳亦云漢司馬相如傳文君與相如俱之臨卭買酒舍乃令文君當壚莫向霜晨怨未開白頭朝夕自相催斬新一朶含風露恰似西廂待月来杜子美梅花詩朝夕催人自白頭麗情集鶯鶯詩待月西廂下臨風户半開隔牆花影動疑是玉人来洗盡鉛華見雪肌要將真色鬬生枝檀心已作龍涎吐玉頰何勞獺髓醫沈立之香譜龍涎香出大食國國人候島林上有異禽翔集下有羣魚游泳則必有伏龍吐涎浮於水上舟人或採得之則為巨富其涎如膠毎兩與金等獺髓用孫和誤傷鄧夫人事載酉陽雜爼注已見湖面初驚片片飛尊前吹折最繁枝何人㑹得春風意怕見梅黄雨細時長恨漫天栁絮輕只將飛舞占清明寒梅似與春相避未解無私造物情北客南来豈是家醉㸔參月半横斜他年欲識呉姬面秉燭三更對此花與葉淳老侯敦夫張秉道同相視新河秉道有詩次韻二首浙江潮自海門東来埶如雷霆而浮山峙於江中與魚浦諸山犬牙相錯洄洑激射嵗敗公私船不可勝計前知信州侯臨葬親杭之南蕩往来相視地形反復講求建議自浙江上流地名石門竝山而東鑿為運河引浙江及谿谷諸水二十二里以達於江又竝江為岸凡八里以達於龍山之大慈浦自浦北折抵小嶺鑿嶺六十五丈以達於古河浚古河四里以達於龍山運河以避浮山之嶮人皆以為便時公與前轉運使葉温叟轉運判官張璹同往按視如臨言遂奏䟽以聞乞令三省㸔詳支賜錢物委臨監督而公以是月召還役竟不成先是杭之西湖水涸草生漸成葑田公取葑積之湖中為長堤以通南北杭人名為蘇公堤故云我鑿西湖還舊觀一眼已盡西南碧勸農使者非常人謂温叟上饒使君更超軼謂臨也淳老温叟字敦夫臨字張秉道乃呉興六客之一時客於杭君不見元帥府前羅萬㦸濤頭未順千弩射至今鳯凰山下路長借一箭開兩翼我鑿西湖還舊觀一眼已盡西南碧又將回奪浮山險千艘夜下無南北坐陳三策本人謀惟留一諾待我畫老病思歸真暫寓功名如幻終何得從来自笑畫蛇足此事何殊食雞肋憐君嗜好更迂闊得我新詩喜折屐江湖麤了我竟歸餘事後来當潤色一菴閑臥洞霄宫井有丹砂水長赤北夢瑣言杭州連嵗潮頭直打羅刹石呉越錢尚父俾張弓弩侯潮至逆而射之由是漸退羅刹石化而為陸地遂列廩庾焉漢溝洫志待詔賈讓言治河有上中下䇿後漢楊修傳曹操出教曰雞肋外曹莫能曉修獨曰雞肋食之則無所得棄之則如可惜公歸計决矣乃令外白解嚴操於是廻師杭州圖經洞霄宫在餘杭縣西南十八里荆溪父老愁三害下斬長蛟本無頼平生倔强韓退之文字猶為鰐魚戒石門之役萬金耳首鼠不為吾已隘江湖開塞古有數兩鵠飛来告成壊勸農使者非常人一言巳破黎民駭上饒使君更超軼坐睨浮山如累塊髯張乃我結韈生詩酒淋漓出狂怪我作水衡生作丞他日歸朝同此拜晉周處傳不修細行州曲患之嘗謂父老曰時和嵗豐何苦不樂父老曰三害未除何樂之有處問之答曰南山白額獸長橋蛟并子為三處乃入山射殺猛獸投水搏蛟經三日不出人以為死皆相慶處乃斬蛟而返遂厲志好學期年州府交辟處義興陽羡人荆溪在陽羡史記漢高祖紀大人常以臣無頼晉均曰江淮之間謂小兒多詐狡獪為無頼倔强字出漢書舊唐書李逢吉傳韓愈性木强古詩話韓退之詩尤工用韻寛則泛入旁韻窄則不復旁出木强可見也兩鵠用翟方進鴻隙大陂謡語已再見列子周穆王執化人之袂騰而上者中天廼止暨及化人之宫俯而視之其宫榭若累塊積蘇焉漢張釋之傳王生者善為黄老言嘗召居廷中公卿盡㑹立王生曰吾韈解顧謂釋之為我結韈釋之跪而結之水衡丞用漢龔遂及王生事巳再見施註蘇詩巻二十九
