body:
  text: 施註蘇詩巻二宋蘇軾撰施元之原註武進邵長蘅删補詩四十五首起在鳳翔至治平乙巳罷鳳翔任還京師作施註缺今補和子由記園中草木十一首煌煌帝王都赫赫走羣彦嗟汝獨何為閉門觀物變微物豈足觀汝獨觀不倦牽牛與葵蓼採摘入詩巻吾聞山東傅置酒携嬿婉富貴未能忘聲色聊自遣汝今又不然時節看𤓰蔓懐寳自足珍蓻蘭那計畹吾歸於汝處慎勿嗟嵗晩古樂府有煌煌京洛萹本草牽牛生花如鼓子花稍大作碧色陶隠居注蓼有三種一紫蓼一香蓼一青蓼晉書謝安棲遅東山放情邱壑好音樂毎遊賞必以妓從離騷既滋蘭之九畹兮又樹蕙之百畆王逸注十二畆曰畹荒園無數畝草木動成林春陽一已敷妍醜各自矜蒲萄雖滿架困倒不能任可憐病石榴花如破紅襟葵花雖粲粲蔕淺不勝簮叢蓼晚可喜輕紅隨秋深物生感時節此理等廢興飄零不自由盛亦非汝能種栢待其成栢成人已老不如種叢篲春種秋可倒隂陽不擇物美惡隨意造栢生何苦艱似亦費天巧天工巧有㡬肯盡為汝耗君看藜與藿生意常草草萱草雖微花孤秀能自㧞亭亭亂葉中一一芳心插牽牛獨何畏詰曲自牙蘖走尋荆與榛如有宿昔約南齋讀書處亂翠曉如潑偏工貯秋雨嵗嵗壊籬落夲草萱草一名鹿蔥嵇康養生論萱草忘憂蘆筍初似竹稍開葉如蒲方春節抱甲漸老根生䰅不愛當夏緑愛此及秋枯黄葉倒風雨白花摇江湖江湖不可到移植苦勤劬安得䨇野鴨飛来成畫圖行樂惜芳晨秋風常苦早誰知念離别喜見秋𤓰老秋𤓰感霜霰莖葉颯已槁宦遊歸無時身若馬繫皁悲鳴念千里耿耿志空抱多憂竟何為使汝𤣥髮縞顔延年赭白馬賦飛黄服皁魏武樂府老驥伏櫪志在千里官舎有叢竹結根問囚㕔下為人所徑土宻不容釘慇懃戒吏卒插棘䕶中庭遶砌忽墳裂走鞭瘦竛竮我常携枕簟来此䕃寒青日暮不能去臥聽牕風泠左傳僖四年公祭之地地墳注髙起也芎藭生蜀道白芷来江南漂流到關輔猶不失芳甘濯濯翠莖滿愔愔清露涵及其未花實可以資筐籃秋節忽巳老苦寒非所堪劚根取其實對此微物慙夲草芎藭生武功川谷陶隠居注蜀中亦有而細白芷生河東川谷下澤如掌自我来關輔南山得再遊山中亦何有草木媚深幽菖蒲人不識生此亂石溝山髙霜雪一作雪霜苦苖葉不得抽下有千嵗根蹙縮如蟠虯長為鬼神守徳薄安敢偷寰宇記咸平中姚咸南採菖蒲有一丈夫謂之曰此菖蒲安期生所餌可以忘老倐而失之神仙傳茅君丹砂二千嵗乃結成上帝常使鬼神毒蛇守焉我歸自南山山翠猶在目心隨白雲去夢遶山之麓汝從何方来笑齒粲如玉探懐出新詩秀語奪山緑覺来已茫昩但記說秋菊有如採樵子入洞聽琴筑歸来寫遺聲猶勝人間曲公自注八月十一日夜宿府學方和此詩夢與弟游南山出詩數十萹夢中甚愛之及覺唯記一句云蟋蟀悲秋菊郭璞游仙詩靈妃顧我笑粲然啟玉齒野菊生秋澗芳心空自知無人驚嵗晚惟有暗蛩悲花開澗水上花落澗水湄菊衰蛩亦蟄與汝嵗相期椘客方多感秋風詠江蘺落英不滿掬何以慰朝飢吕温山櫻詩幽處竟誰見芳心空自知李商隠詩莫學漢臣栽苜蓿還同椘客詠江蘺椘辭離騷扈江離與辟芷兮紉秋蘭以為佩注香草生於江中故曰江離也離蘺通椘辭夕飡秋菊之落英周公廟廟在岐山西北七八里廟後百許歩有泉依山湧冽異常國史所謂潤徳泉世亂則竭者也湘山野録雍熙二年鳳翔奏岐山縣周公廟有泉湧出相傳時平則流亂則竭至大中年復流賜號潤徳泉後又涸今其泉復湧澄瀅甘潔太宗嘉之吾今那復夢周公尚喜秋来過故宫翠鳳舊依山硉兀清泉長與世窮通至今游客傷離黍故國諸生詠雨濛牛酒不来烏鳥散白楊無數暮號風王注周興鸑鷟鳴於岐山今為鳳翔郭璞江賦巨石硉兀以前却古詩白楊多悲風蕭蕭愁殺人南溪之南竹林中新構一茒堂予以其所處最為深邃故名之避世堂猶恨溪堂淺更穿修竹林髙人不畏虎避世已無心隠几頽如病忘言兀似一作自瘖茒茨追上古冠蓋謝當今曉夢猿呼覺秋懐鳥伴吟暫来聊觧帶屢去欲携衾湖上行人絶堦前暮雪深應逢緑毛叟扣戸夜抽簪晉史郭文少愛山水游名山歴華隂之崖窮谷無人之地倚木於樹苫覆其上而居亦無壁障時猛獸為暴入屋害人而文獨宿十餘年卒無患害莊子南郭子綦隠几而坐㗳焉似喪其耦史記李斯傳采椽不斲茒茨不剪皮日休詩劉根昔成道兹塢四百年毵毿被其體號為綠毛仙自清平鎮遊樓觀五郡大秦延生仙游往返四日得十一詩寄舎弟子由同作樓觀注見前巻鳥噪猿呼晝閉門寂寥誰識古皇尊青牛乆已辭轅軛白鶴時来一作来時訪子孫山近朔風吹積雪天寒落日淡孤村道人應怪遊人衆汲盡階前井水渾別說老氏乗青牛薄板車續搜神記遼東華表柱上有鶴集其上言曰有鳥有鳥丁令威去家千嵗今来歸古樂府朔風吹積雪杜詩淘米少汲水汲多井水渾五郡古觀正依林麓斷居民来就一作說水泉甘亂溪赴渭爭趨北飛鳥迎山不復南羽客衣冠朝上象野人香火祝春蠶汝師豈觧言符命山鬼何知託老耼公自注觀有明皇碑言夢老子告以享國長乆之意授經䑓公自注乃南山一峯耳非復有築處劍舞有神通草聖海山無事化琴工此䑓一覽秦川小不待傳經意已空國史補唐張旭善草書自言吾聞公主與擔夫争道而得筆法之意後見公孫大娘舞劍器而得其神後漢張奐傳注張芝草書為世所寳韋仲将以為草聖也書斷旭書類伯英時謂之亞聖水仙操序伯牙學琴於成連三年而成成連曰吾之學不能移人之情吾師方子春在東海中乃齎糧從之至蓬萊山留伯牙曰吾将迎吾師刺船而去旬時不返伯牙心悲延頭四望但聞海水汩沒山林窅𡨕羣鳥悲號仰天嘆曰先生将移我情乃援琴而作歌按海山無事化琴工句王注引成連事似為近之又引南史宗少文撫琴動操欲令衆山皆響非詩意矣今刪老子傳經詳見上巻壬寅二月詩注杜子羙望嶽詩㑹當凌絶頂一覽衆山小大秦寺晃蕩平川盡坡陁翠麓横忽逢孤塔迥獨向亂山眀信足幽尋逺臨風卻立驚原田浩如海滚滚一作衮衮盡東傾漢司馬相如哀二世登陂陁之長阪兮注陂陁不平之貌坡陂通李白詩幽尋無前期乗興不覺逺仙游潭五首公自注潭上有寺三二在潭北循黑水而上為東路至南寺渡黑水西里餘從馬北上為西路至北寺東路險不可騎馬而西路隔潭潭水深不可測上以一木為橋不敢過故南寺有塔望之可愛而終不能到潭翠壁下無路何年雷雨穿光摇巖上寺深到影中天我欲然一作燃犀看龍應抱寳眠誰能一作言孤石上危坐試僧禪晉書温嶠傳嶠旋武昌至牛渚磯水深不可測世云其下多怪物嶠遂燃犀角而照之湏㬰見水族覆火竒形異状或乗馬車著赤衣者其夜嶠夢人謂曰與君幽眀道别何意相照也意甚惡之嶠至鎮未旬而卒莊子列禦宼夫千金之珠必在九重之淵驪龍頷下子能得珠者必遭其睡也南寺東去愁攀石西来怯渡橋碧潭如見試白塔苦相招野饋慚微薄村沽慰寂寥路窮斤斧絶松桂得干霄北寺唐初傳有此亂後不留碑畏虎闗門早無村得米遅山泉自入甕野桂不勝炊信羙那能乆應先學忍飢杜詩小市常爭米孤城早閉門戰國䇿蘓秦謂椘王曰國之食貴於玉薪貴於桂謁者難見如鬼王難見如天帝今臣食玉炊桂因鬼見帝不亦難乎王粲登樓賦信羙而非吾土兮曽何足以乆留馬融石室未應将軍聘初從季直游絳紗生不識蒼石尚能留豈害依梁冀何須困李侯吾詩慎勿刻猿鶴為君羞三輔決録注摯恂字季直詳見前巻留題仙遊潭注後漢馬融傳大将軍鄧隲聞融名召為舎人不應命又融教養諸生常有千數常坐髙堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者吴祐傳梁冀誣奏李固融在坐為冀草奏祐謂融曰李公之罪成於卿手李公即誅卿何面目見天下之人乎玉女洞洞裏吹簫子終年守獨幽石泉為曉鏡山月當簾鉤嵗晚杉楓盡人家霧雨愁送迎應鄙陋誰繼椘臣謳椘辭沅湘之間其俗信鬼而好祀使巫覡作樂歌舞以娱神蠻荆陋俗詞多鄙俚屈原既放逐見而感之為作九歌韓退之羅池廟碑作迎享送神詩遺栁民俾歌以祀焉愛玉女洞中水既致兩缾恐後復取而為使者見紿因破竹為契使寺僧藏其一以為往来之信戯謂之調水符欺謾乆成俗闗市有契繻誰知南山下取水亦置符古人辨淄澠皎若鶴與鳧吾今既謝此但視符有無常恐汲水人智出符之餘多防竟無及棄置為長吁漢書終軍傳注繻帛邊也關出入皆以傳傳還因裂繻頭合以為符信也列子孔子曰淄澠之合易牙能辨之鶴鳧用荘子鶴頸長鳧頸短語自仙游回至黒水見居民姚氏山亭髙絶可愛復憩其上山鵶曉辭谷似報游人起出門猶屢顧惨若去吾里道途險且迂繼此復能㡬溪邊有危構歸駕聊復柅愛此山中人縹緲如仙子平生慕獨往官爵同一屣胡為此溪邊眷眷若有俟國恩乆未報念此慙且泚臨風浩悲咤萬世同一軌何年謝簪紱丹砂留迅晷易繫于金柅注止輪木漢書郊祀志天子曰嗟乎誠得如黄帝吾視去妻子如脱屣耳南溪有㑹景亭處衆亭之間無所見甚不稱其名予欲遷之少西臨斷岸西嚮可以逺望而力未暇特為製名曰招隠仍為詩以告来者庶㡬遷之飛簷臨古道髙榜勸遊人未即令公隠聊須濯路塵茒茨分聚落烟火傍城闉林缺湖光漏牕眀野意新居民惟白帽過客謾朱輪山好留歸屐風囬落醉巾他年誰改築舊製不須因再到吾雖老猶堪作坐賔南史和帝紀百姓皆著下屋白紗帽而反裙覆頂楊惲傳乗朱輪者十人落醉巾王注引孟嘉落帽事已見前巻凌虛䑓王注在鳳翔廨後園陳希亮知鳳翔時建先生集載凌虛䑓記才髙多感激道直無往還不如此臺上舉酒邀青山青山雖云逺似亦識公顔崩騰赴幽賞披豁露天慳落日銜翬壁暮雲㸃烟鬟浩歌清興發放意末禮刪是時嵗云暮微雪灑袍班吏退迹如掃賔来勇躋攀䑓前飛鴈過䑓上雕弓彎聫翩向空墜一笑驚塵寰李太白詩青山猶銜半邊日韓退之詩擢玉紆烟鬟又雉帶箭詩衝人决起百餘尺紅翎白簇隨傾斜将軍仰笑軍吏賀五色離披馬前墮詩似取其意竹􅔺王注竹􅔺食竹根之䑕也野人獻竹􅔺腰腹大如盎自言道傍得採不費罝網鴟夷讓圎滑混沌慙瘦爽兩牙雖有餘四足僅能髣逢人自驚蹶悶若児脫襁念此微陋質刀几安足枉就擒太倉卒羞愧不能饗南山有孤熊擇獸行䑛掌韓退之詩腰腹空大何能為鴟夷酒器詳本巻次韻栁子玉詩注神異經崑崙西有獸焉其状如犬長毛四足似熊名曰混沌退之詩擇肉於熊羆肯視兔與貍渼陂魚公自注陂在鄠縣王注杜詩有渼陂行字從水從羙以陂中魚故得名渼音羙霜筠細破為䨇掩中有長魚如卧劍紫荇穿顋氣惨悽紅鱗照座光磨閃携来雖逺鬛尚動烹不待熟指先染坐客相看為觧顔香粳飽送如填塹早嵗嘗為荆渚客黄魚屢食沙頭店江濵易採不復珍盈尺輙棄無乃僭自從西征復何有欲致南烹嗟乆欠游鯈瑣細空自腥亂骨縦横動遭砭故人逺餽何以報客俎乆空驚忽贍東道無辭信使頻西鄰幸有庖虀釅魚欠切孟浩然詩游魚擁劍来左傳宣公四年鄭靈公烹黿子公之食指動公故弗與子公怒染指於鼎嘗之而出曹植詩食若填巨塹杜子羙詩半濕搗香粳韓退之詩淅玉炊香粳杜詩頓頓食黄魚地志沙頭鎮屬荆南府韓南食詩我来禦魑魅自宜味南烹讀道藏嗟予亦何幸偶此琳宫居宫中復何有戢戢千函書盛以丹錦囊冒以青霞裾王喬掌闗籥蚩尤守其廬乗閒竊掀攪渉獵豈暇徐至人悟一言道集由中虛心閑反自照皎皎如芙蕖千嵗厭世去此言乃籧篨人皆忽其身治之用土苴何暇及天下幽憂吾未除韓退之贈崔立之詩戢戢已多如束筍漢武内傳帝見西王母巾器中有一巻小黄書盛以紫錦之囊帝問此何書曰五岳真形圗也其文秘禁令侍女宋靈賔更取一圖以與帝靈賔探懐中得一巻盛以雲錦之囊因以付帝乾􅍧子何譲之見一老翁歌譲之逐入邱化狐遁去案上得書一紙云何以蔽祼霞裾雲􅀈王注蚩尤神名道藏中多畫蚩尤守禦之状前漢賈山渉獵書記不能為醇儒莊子惟道集虗王注道家存想法當想心如未開蓮花韻注籧篨敝竹器也莊子千嵗厭世去而上仙又道之真以治身其土苴以治天下又堯以天下譲子州支父子州支父曰我適有幽憂之疾未暇治天下也十二月十四日夜微雪眀日早往南溪小酌至晚南溪得雪真無價走馬来看及未消獨自披榛尋履迹最先犯曉過朱橋誰憐破屋眠無處坐覺村飢語不囂惟有暮鴉知客意驚飛千片落寒條趙景真與稽茂齊書渉澤求蹊披榛覓路履迹盖用東郭先生雪中履迹也杜牧之詩澤濶鳥来遅村飢人語早九月中曽題二小詩於南溪竹上既而忘之昨日再遊見而録之湖上蕭蕭踈雨過山頭靄靄暮雲横陂塘水落荷将盡城市人歸虎欲行誰謂江湖居而為虎豹宅焚山豈不能愛此千竿碧司竹監燒葦園因召都廵檢柴貽勗左藏以其徒㑹獵園下官園刈葦嵗畱槎深冬放火如紅霞枯槎燒盡有根在春雨一洗皆萌芽黄狐老最狡㨗賣侮百獸常矜誇年年此厄竟不悟但愛䝉宻争来家風迴焰巻毛尾熱欲出已被蒼鷹遮野人来言此最樂徒手曉一作時出歸滿車廵邊将軍在近邑呼来颯颯從矛叉戍兵乆閑可小試戰鼓雖凍猶堪撾雄心欲搏南澗虎陣勢頗學常山蛇霜乾火烈聲爆野飛走無路號且呀迎人截来砉一作苦逢箭避犬一作火逸去窮投罝擊鮮走馬殊未厭但恐落日催棲鵶弊旗仆鼓坐數獲鞍挂雉兔肩分麚主人置酒聚狂客紛紛醉語晚更譁燎毛燔肉不暇割飲啖直欲追羲媧青邱雲夢古所咤與此何啻百倍加苦遭諫疏說夷羿又被賦客嘲滛奢豈如閑官走山邑放曠不與趨朝衙農工巳畢嵗云暮車騎雖少賔殊佳酒酣上馬去不告獵獵霜風吹帽斜周官大司馬羣吏弊旗注弊仆也司馬相如子虚賦秋田乎青邱仿偟乎海外吞若雲夢者八九其於胷中曽不芥蔕左傳魏絳諫晉侯引虞人之箴曰在帝夷羿冒於原獸又相如賦盛推雲夢以為髙奢言滛樂而顯侈靡竊為足下不取也北史獨孤信嘗因獵日暮馳馬入城其帽微側詰且人有戴帽者咸慕信側其帽焉和子由木山引水二首蜀江乆不見滄浪江上枯槎逺可将去國尚能三犢載汲泉何愛一夫忙﨑嶇好事人應笑冷淡為歡意自長遥想納凉清夜永牕前微月照汪汪千年古木卧無梢浪巻沙翻去似瓢㡬度過秋生蘚暈至今流潤應江潮泫然疑有蛟龍吐斷處人言霹靂焦材大古来無適用不須欎欎慕山苖王注江有潮来枯木先潤若相應也栁宗元霹靂琴贊引始枯桐生石上言有蛟龍伏其窽一夕暴震為火焚至旦乃巳超道人取以為三琴云杜子羙詩志士幽人莫怨嗟古来材大難為用左思詠史詩鬰鬰澗底松離離山上苖以彼徑寸莖䕃此百尺條寄題興州鼂太守新開古東池百畆新池傍郭斜居人行樂路人誇自言官長如靈運能使江山似永嘉縦飲座中遺白帢音蛤幽尋盡處見桃花不堪山鳥號歸去長遣王孫苦憶家南史謝靈運為永嘉太守郡有名山水素所愛好遂肆志遨遊尋山陟嶺必造幽勝嵓障千里莫不遍歴所至輙為詩以致其意永嘉今温州也貫休詩永嘉為郡後山水添鮮碧永嘉志夲漢東甌縣晉太康二年明帝立永嘉郡王注帢帽也魏初有白帢之製華隂寄子由三年無日不思歸夢裏還家旋覺非臘酒送寒催去國東風吹雪滿征衣三峯已過天浮翠四扇行看日照扉里堠消磨不禁盡速携家餉勞驂騑華山記其上有三峯直上晴霽可覩三峯蓮華松檜毛女也韓退之詩荆山已去華山来日出潼關四扇開又路傍堠詩堆堆路傍堠一䨇復一隻注封堠也和董傳留别王注董傳字至和洛陽人有詩名嘗在鳳翔與東坡相從韓魏公鎮長安傳有詩云古来風義遺才少近世公卿薦士稀韓舉而已卒矣麤繒大布裹生涯腹有詩書氣自華厭伴老儒烹瓠葉強隨舉子踏槐花囊空不辦尋春馬眼亂行看擇壻車得意猶堪誇世俗詔黄新濕字如鴉後漢劉昆教授弟子恒五百餘人每春秋享射常備列典儀以素木瓠葉為俎豆詩小雅幡幡瓠葉采之亨之序曰刺幽王棄禮而不能行故思古之人不以微薄廢禮焉南部新書長安舉士六月後落第者不出京謂之過夏時語曰槐花黄舉子忙王注唐進士開宴常寄曲江亭其日公卿家傾城縦觀鈿車珠鞅櫛比而至中東榻之選十八九盧仝詩閑来案上翻墨汁塗抹詩書如老鴉次韻栁子玉見寄薄雷輕雨曉晴初陌上春泥未濺裾行樂及時雖有酒出門無侣謾看書遥知寒食催歸騎定把鴟夷載後車他日見邀須强起不應辭病似相如漢書陳遵傳鴟夷滑稽腹如大壺注鴟夷韋囊以盛酒即今鴟夷幐也史記司馬相如傳相如與臨卭令王吉相善臨卭富人相謂曰令有貴客為具召之并召令相如謝病不能行臨卭令不敢嘗食自往迎相如相如不得巳強往一座盡傾送曽子固倅越得燕字王注子固名鞏南豐人嘉祐二年永叔知貢舉子固兄弟四人同登科醉翁門下士雜沓難為賢曽子獨超軼孤芳陋羣妍昔從南方来與翁兩聨翩翁今自憔悴子去亦宜然賈誼窮適椘樂生老思燕那因江鱠羙遽厭天庖羶但苦世論隘聒耳如蜩蟬安得萬頃池養此横海鱣漢書劉向傳襍沓衆賢罔不肅和賈誼傳天子議以誼任公卿之位絳灌之屬皆害之出為長沙太傅長沙椘地也史記樂毅傳毅去燕奔趙燕王以其子閒為昌國君而毅往来復通燕賈誼弔屈原賦横江湖之鱣鯨兮固将制於螻蟻李白詩魯國一杯水難容横海鱗王注先生詩案云送曾鞏詩以譏近来多用刻薄之人議論鄙隘如蟬之鳴不足聽也以詩案考之此詩作於熙寕三年不當入此王頤赴建州錢監求詩及草書我昔識子自武功寒㕔夜語尊酒同酒䦨燭盡語不盡倦僕立寐僵屏風丁寧勸學不死訣自言親受方瞳翁嗟予聞道不早悟醉夢顛倒隨盲聾邇来憂患苦摧剝意思蕭索如霜蓬羡君顔色愈少壯外慕漸少由中充河車挽水灌腦黒丹砂伏火入頬紅大梁相逢又東去但道何日辭樊籠未能便乞勾漏集作岣嶁誤令官曺似是錫與銅留詩河上慰離别草書未暇縁怱怱一作忩忩漢地理志武功縣屬右扶風韓退之答張徹詩勤来得晤語勿憚宿寒㕔漢書陳萬年病召其子咸教戒於牀下語至夜半咸睡頭觸屏風南史陶𢎞景年踰八十而有壮容仙書云眼方者夀千嵗𢎞景末年一眼有時而方又李根兩目瞳子皆方仙經説八百嵗人瞳子方也黄庭經北方正氣名河車仙經云鈆絶河車空所作必無功河車挽水盖搬運之法古嵩子真訣大丹第六轉以文武火養一伏時成其伏火朱砂以楮汁丸如麻子大毎日下三丸駐顔定色莊子内萹澤雉十歩一啄百歩一飲不蘄蓄乎樊中漢書地理志交趾郡屬縣有苟屚師古曰屚與漏同盖即勾漏也一統志安南有勾漏山古縣在其下晉書葛洪聞交趾出丹砂求為勾漏令帝不許洪曰非欲求榮以有丹爾杜子羙詩逺慚勾漏令不得問丹砂後漢書注張伯英下筆必為楷則號忩忩不暇草書秀州僧本瑩静照堂鳥囚不忘飛馬繫嘗念馳静中不自勝不若聽所之君看厭事人無事乃更悲貧賤苦形勞富貴嗟神疲作堂名静照此語子謂誰江湖隠淪士豈無適時資老死不自惜扁舟自娱嬉從之恐莫見况肎從我為史記陳軫謂犀首曰公何好飲也曰無事也軫謂曰吾令公厭事可乎石蒼舒醉墨堂王注蒼舒京兆人字才羙善行草人謂得草聖三昧官為承事郎通判保安庫嘗為丞相吕公微仲所薦不達而卒人生識字憂患始姓名麄記可以休何用草書誇神速開巻戃怳令人愁我嘗好之每自笑君有此病何能瘳自言其中有至樂適意無異逍遥遊近者作堂名醉墨如飲羙酒銷百憂乃知栁子語不妄病嗜土炭如珍羞君於此蓺亦云至堆墻敗筆如山邱興来一揮百紙盡駿馬倏忽踏九州我書意造本無法㸃畫信手煩推求胡為議論獨見假隻字片紙皆藏收不减鍾張君自足下方羅趙我亦優不須臨池更苦學完取絹素充衾裯杜子羙詩子雲識字終投閣史記項藉學書不成其季父梁怒之藉曰書足以記姓名而已杜醉歌行總角草書又神速世上児子徒紛紛張衡賦神戃怳以疑愁栁子厚答崔黯書凡人好辭工書皆病癖也吾嘗見病心腹人有㗖土炭嗜酸鹹者不得則大戚觀吾子之意亦戚矣國史補長沙僧懐素好草書棄筆堆積埋於山下號曰筆塚南史曺景宗為人自恃髙勝毎作書字有不觧不以問人皆以意造懐素帖王右軍云吾真書過鍾而草故不减張僕以為真不如鍾草不如張三輔决録杜伯度崔子玉以工草書稱於前世趙襲與羅暉亦以能草頗自矜夸故張伯英與友人書曰上比崔杜不足下方羅趙有餘後漢書注張芝字伯英好草書家之衣帛必先書後染臨池學書池水盡黒送安惇秀才失觧西歸舊書不厭百囘讀熟讀深思子自知他年名宦恐不免今日棲遅那可追我昔家居斷還往著書不復窺園葵朅来東遊慕人爵棄去舊學從児嬉狂謀謬算百不遂惟有霜鬢来如期故山松柏皆手種行且拱矣歸何時萬事早知皆有命十年浪走寜非癡與君未可較得失臨别惟有長嗟咨晉董遇字季直華隂人興平中關中擾亂與兄仲耒耜負販而常挟持經史人有從遇學者遇不肎教云必當先讀百回讀書百遍而義自見漢書董仲舒孝景時為博士下帷講誦盖三年不窺園王注園葵用公儀子㧞去園葵事左傳秦穆公使孟眀西乞白乙伐鄭蹇叔哭之公曰爾何知中夀爾墓之木拱矣南史沈攸之言早知窮達有命恨不十年讀書送任伋通判黄州兼寄其兄孜王注孜時為簡州平泉令字師聖伋字師中皆名士眉人也東坡謂之大任小任兄弟於慶歴間登第吾州之豪任公子少年盛壯日千里無媒自進誰識之有才不用今老矣别来十年學不厭讀破萬巻詩愈羙黄州小郡夹谿谷茆屋數家依竹葦知命無憂子何病見賢不薦誰當恥平原老令更可悲六十青衫貧欲死桐鄉遺老至今泣頴川大姓誰能箠因君寄聲問消息莫對黄鷂矜爪觜史記田光曰騏驥盛壮之時一日而馳千里至其衰老駑馬先之杜子羙詩讀書破萬巻下筆如有神漢書循吏傳朱邑病且死屬其子曰我故為桐鄉吏其民愛我必𦵏我桐鄊後世子孫奉嘗我不如桐鄉民李白詩六帝餘古邱樵蘇泣遺老漢書趙廣漢傳頴川大姓原楮宗族恣横賔客犯為盗賊前二千石莫能禽制廣漢既至數月誅原楮首惡郡中震慄韓退之詩魯連細而黠有似黄鷂子田巴兀老蒼憐汝矜爪觜施註蘇詩巻二
