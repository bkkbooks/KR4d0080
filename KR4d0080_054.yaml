body:
  text: 施注蘇詩卷四十宋蘇軾撰施元之原注武進邵長蘅刪補遺詩二十九首施注缺今補老翁井井中老翁誤年華白沙翠石公之家公來無蹤去無迹井面團圎水生花翁今與世兩何與無事紛紛驚牧豎改顔易服與世同無使世人知有翁豫以事繫御史臺獄獄吏稍見侵自度不能堪死獄中不得一别子由故作二詩授獄卒梁成以遺子由聖主如天萬物春小臣愚暗自亡身百年未滿先償債十口無歸更纍人是處青山可埋骨他年夜雨獨傷神與君世世為兄弟又結來生未了因柏臺霜氣夜淒淒風動琅璫月向低夢繞雲山心似鹿魂飛湯火命如雞眼中犀角真吾子身後牛衣愧老妻百嵗神遊定何處桐鄉知葬浙江西公自注獄中聞杭湖間民為余作解厄道場者纍月故有此句漢書御史府中列柏樹常有野烏數十棲宿其上因名烏臺又名柏臺杜子美詩風動金琅璫犀角字出國語牛衣用王章事桐鄉用朱邑事並已見十二月二十八日蒙恩責授檢校水部員外郎黃州團練副使復用前韻百日歸期恰及春餘年樂事最關身出門便旋風吹面走馬聨翩鵲啅人卻對酒杯渾是夢試拈詩筆已如神此災何必深追咎竊祿從來豈有因左傳定三年閽曰夷射姑旋焉杜注旋小便也韓退之石鼎聨句序道士起出户若將便旋然又詩起居諫議聨翩來平生文字為吾纍此去聲名不厭低塞上縱歸他日馬城東不鬬少年雞休官彭澤貧無酒隱几維摩病有妻堪笑睢陽老從事為豫投檄向江西公自注子由聞子下獄乞以官爵贖豫罪貶筠州監酒淮南子近塞上之人其馬亡入胡中人皆弔之其父曰此何詎知不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何詎不為禍曹子建詩鬬雞東郊道唐東城父老傳明皇好鬬雞時賈昌為五百小兒長劉顗宫苑退老於廬山石碑菴顗陜西人本進士換武家有聲伎詩缺西山戲題武昌王居士并引豫往在武昌九曲西山亭上有題一句元鴻橫號黃槲峴九曲亭即吳王峴山一山皆槲葉其旁即元結陂湖也荷花極盛因為對云皓鶴下浴紅荷湖座客皆笑同請賦此詩一統志樊山即西山也山有九曲嶺元結寒溪在其下相傳有吳王避暑宫江干高居堅關扃犍耕躬稼角挂經篙竿繫舸菰茭隔笳鼓過軍雞狗驚解襟顧景各箕踞擊劍賡歌幾舉觥荆笄供膾愧攪聒乾鍋更戞甘瓜羮漢兒寬傳帶經而鋤唐書李密傳以蒲韉乘牛挂漢書一帙角上行且讀宋沈慶之詩歸來笳鼓競杜子美詩殺戮到雞狗戛羮漢高祖事在漢書楚元王傳詳見十三卷哭刁景純詩注按經字係九青韻豈先生偶失檢耶十二月二十日恭聞太皇太后升遐慈聖后也以軾罪人不許承服欲哭則不敢欲泣則不可故作挽詞二章巍然開濟兩朝勳信矣才難十亂臣原廟固應祠百世先王何止活千人和熹未聖猶貪位明德雖賢不及民月落風悲天雨泣誰將椽筆寫光塵杜子美蜀相詩兩朝開濟老臣心論語十亂注其一人蓋邑薑也後漢和熹鄧皇后紀和帝崩殤帝生始百日后乃迎立之尊后為太皇太后臨朝及殤帝崩太后定策立安帝猶臨朝政范煜論曰鄧后稱制終身號令自出術謝前政之良身闕明辟之義至使嗣主側目斂袵于虛器直生懷悶懸書于象魏借之儀者殆其惑哉又明德馬皇后紀皇太后曰馬貴人德冠後宫即其人也遂立為皇后常衣大練裙不加緣建初元年欲封爵諸舅太后不聽晉書王珣傳夢人以大筆如椽與之既覺語人云此當有大手筆事俄而帝崩哀册諡議皆珣所草老子和其光同其塵王注王立之云此詩蓋未嘗進其後作宣仁挽詞取其兩句云固應祠百世何止活千人未報山陵國士知繞林松柏已猗猗一聲慟哭猶無所萬死酬恩更有時夢裏天衢隘雲仗人間雨淚變彤帷關雎卷耳平生事白首纍臣正坐詩史記刺客列傳豫讓曰知伯以國士遇我我以國士報之毛詩關雎卷耳皆后妃之詩左傳成三年對曰以君之靈纍臣得歸骨于晉戲足柳公權聨句并引宋玉對楚王此獨大王之雄風也庶人安得而共之譏楚王知已而不知人也柳公權小子與文宗聨句有美而無針故為足成其篇人皆苦炎熱我愛夏日長薰風自南來殿閣生微涼一為居所移苦樂永相忘願言均此施清隂分四方戲作賈梁道詩并引康施注目有嵇紹以一題即此首王凌謂賈充曰汝非賈梁道之子耶乃欲以國與人由是觀之梁道之忠于魏也久矣司馬景王既執凌歸過梁道廟凌大呼曰我亦大魏之忠臣也及司馬病見凌與梁道守而殺之二人者可謂忠義之至精貫于神明矣然梁道之靈獨不能巳其子充之姦至使首發成濟之事此又理之不可曉者也故豫戲作小詩云嵇紹似康為有子郗超叛鑒似無孫如今更恨賈梁道不殺公閭殺子元晉書嵇紹傳中散大夫康之子也王師敗績于蕩隂百官及侍衛莫不散潰惟紹儼然端冕以身捍衛兵交御輦飛箭雨集紹遂被害于帝側血濺御服天子深哀歎之及事定左右欲浣衣帝曰此嵇侍中血勿浣也又郗鑒傳與王敦相見鑒曰丈夫既潔身北面義同在三豈可偷生屈節靦顔天壤耶敦聞言大忿之及祖約蘇峻反鑒設壇場刑白馬大誓三軍三軍爭為用命圍解進位太尉尋薨册曰惟公忠亮雅正行為世表社稷之危賴公以寧云云子愔愔子超桓溫辟為征西大將軍掾又轉為參軍溫懷不軌欲立霸王之基超為之謀主以愔忠于王室不令知之公閭賈充字子元司馬景王字戲孫公素披扇當年笑溫嶠握刀晚嵗戰劉郎不須戚戚如馮衍便與時時説李陽世説溫嶠下玉鏡臺一枚聘姑女既婚交禮女以手披紗扇撫掌大笑曰我固疑是老奴果如所卜三國志法正傳孫權以妹妻先主妹才捷剛猛有諸兄之風侍婢百餘人皆親執刀侍立先主每入衷心常凜凜漢書馮衍傳妻北地任氏妬悍衍作書與其兄遂逐之世説王夷甫婦郭泰寧女才拙而性剛夷甫患之而不能禁時其鄉人幽州刺史李陽京都大俠郭氏憚之夷甫驟諫之乃曰非但我言卿不可李陽亦謂卿不可郭氏為之小損趙成伯家有麗人僕忝鄉人不肯開樽徒吟春雪美句次韻一笑繡簾朱户未曽開誰見梅花落鏡臺試問高吟三十韻何如低唱兩三杯公自注世言檢死秀才衣帶上有雪詩三十韻又云陶穀學士買得黨太尉家妓遇雪陶收雪水烹團茶謂妓曰黨家應不識此妓曰彼粗人安得此但能於銷金暖帳中淺斟低唱喫羊羔兒酒陶默然慙其言莫言衰鬢聊相映須得纎腰與共回知道文君隔青瑣梁園賦客肻言才公自注聊答來句義取婦人而已罪過罪過文君司馬相如妻見本傳世説韓壽美姿容賈充女於青璅窗中看見壽説之謝惠連雪賦梁王不悅遊於兔園召鄒生延枚叟相如末至居客之右送南屏謙師并序南屛謙師妙於茶事自云得之於心應之於手非可以言傳學到者十二月二十七日聞軾遊夀星逺來設茶作此詩贈之道人曉出南屏山來試點茶三昧手忽驚午盞兔毛斑打作春甕鵝兒酒天台乳花世不見玉川風腋今安有先生有意續茶經會使老謙名不朽按第六卷先生月茶詩云中有迷離玉兔兒兔毛斑疑即指此茶也杜子美詩鵝兒黃似酒天台記丹邱出大茗服之生羽翼茶寮記雲腳漸垂乳花浮面又茶有石乳滴乳白乳之號虗飄飄三首虗飄飄畫簷蛛結網銀漢鵲成橋塵漬雨桐葉霜飛風柳條露凝殘點見紅日星曵餘光橫碧霄虗飄飄比浮名利猶堅牢淮南子烏鵲填河成橋而度織女虗飄飄花飛不到地虹起謾成橋入夢雲千疊遊空絲萬條蜃樓百尺橫滄海鴈字一行書絳霄虛飄飄比人身世猶堅牢史記天官書海旁蜃氣象樓臺虛飄飄風寒吹絮浪春水暖氷橋勢緩䨥音霜垂線聲乾葉下條雨中漚點隨流水風裏綵雲橫碧霄虛飄飄比時富貴猶堅牢字彚䨥雨貌漚點水中小泡楞嚴經云如湛巨海流一浮漚起滅無從白樂天詩大都好物不堅牢綵雲易散琉璃脆劉監倉家煎米粉作餅子余云為甚酥潘邠老家造逡巡酒余飲之云莫作醋錯著水來否後數日余攜家飲郊外因作小詩戲劉公求之野飲花間百物無杖頭惟挂一葫蘆已傾潘子錯著水更覔君家為甚酥贈包安靜先生二首皓色生甌面堪稱雪見羞東坡調詩腹今夜睡應休公自注偶謁大中精藍中故人烹日注茶果不虛故詩以記之五代劉鄩有妾名花見羞雪見羞三字本此建茶三十片不審味如何奉贈包居士僧房戰睡魔公自注昨日點日注極佳點此復云罐中餘者可示及舟中滌神耳茶經歷代貢茶皆以建寧為上國史補建州有先春龍焙茶録建人以鬬茶為茗戰胡嶠茶詩破睡當封不夜侯元祐元年二月八日朝退獨在起居院讀漢書儒林傳感申公故事作小詩一絶寂寞申公謝客時自言已見穆生幾綰臧下吏明堂廢又作龍鍾病免歸漢書儒林傳申公魯人也少與楚元王交俱事齊人浮邱伯在長安元王遣子郢與申公俱卒學元王薨郢嗣立為楚王令申公傅太子戊戊不好學病申公及戊立為王胥靡申公申公愧之歸魯退居家教終身不出門復謝賔客蘭陵王臧及代趙綰皆從受詩綰臧請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹輪駕駟迎申公至見上上問治亂之事申公時已八十餘老對曰為治不在多言顧力行何如耳上默然是時竇太后喜老子言不悅儒術得綰臧之過以讓上上因廢明堂事下綰臧吏皆自殺申公亦病免歸數年卒穆生事巳見十五卷次韻潛師放魚詩注初貶英州贈馬夢得萬古仇池穴歸心負雪堂殷勤竹裏夢猶自數山王杜子美詩萬古仇池穴潛通小有天雪堂在黃州府治東顔延之詠竹林七賢以山王貴盛黜之乃作五君詠贈虔州慈雲寺鑒老居士無塵堪洗沐道人有句借宣揚窗間但見蠅攢紙門外惟聞佛放光遍界難藏真薄相一絲不挂且逢場郤須重説圓通偈千眼薰籠是法王蠅攢紙佛放光注已見一絲不挂逢場作戲皆禪宗語釋典菩薩千手目與一手目同又十六開士於浴堂證悟本因於薰寵焙浴具得大安樂法華經法王無上尊圓覺經注佛為萬法之王又曰空王洗兒人皆養子望聰明我被聰明誤一生惟願孩兒愚且魯無災無難到公卿過子忽出新意以山芋作玉糝羮色香味皆竒絶天上酥陀則不可知人間決無此味也唐本草芋有六種白芋真芋連禪紫芋並毒少正可煮啖之兼肉作羮甚佳蹲鴟之饒蓋謂此也香似龍涎仍釅白味如牛乳更全清莫將南海金虀膾輕比東坡玉糝羮香譜龍涎於香品中最貴重出大食國海傍多亦不過數兩上品曰泛水次曰滲沙維摩經阿難白佛言憶念昔時世尊身病有小疾當用牛乳又杜子美泉眼詩香美勝牛乳金虀鱠注已見擷菜并序吾借王參軍地種菜不及半畝而吾與過子終年飽菜夜半飲醉無以解酒輒擷菜煮之味含土膏氣飽風露雖粱肉不能及也人生須底物而更貪耶乃作四句秋來霜露滿東園蘆蔔生兒芥有孫我與何曽同一飽不知何苦食雞豚晉書何曽傳性豪奢務極華侈日食萬錢猶曰無下箸處食檳榔月照無枝林夜棟立萬礎眇眇雲間扇蔭此九月暑上有垂房子下繞絳刺禦風欺紫鳯卵雨暗蒼龍乳裂包一墮地還以皮自煮北客初未諳勸食俗難阻中虛畏泄氣始嚼或半吐吸津得微甘著齒隨亦苦面目太嚴冷滋味絶媚嫵誅彭勳可䇿推轂勇宜賈瘴風作堅頑導利時有補藥儲固可爾果録詎用許先生失膏粱便腹委敗鼓日啖過一粒腸胃為所侮蟄雷殷臍腎藜藿腐亭午書燈看膏盡鉦漏歷歷數老眼怕少睡竟使赤眥弩渴思梅林咽飢念黃獨舉奈何農經中收此困羈旅牛舌不餉人一斛肻多與乃知見本偏但可酬惡語異物志檳榔樹若筍竹生竿近上未五六尺間洪腫起如廆木焉因坼裂出若黍秀也無華而為實大如桃李天生棘重纍其下所以禦衛其實也味苦澀剖其上皮煮其膚熟而食之堅如乾棗彼方珍之以為口食嵇含南方草木狀交廣人凡貴勝族客必先呈此果若邂逅不設用相嫌恨本草主治消榖逐水除痰澼殺三蟲宣利臟腑壅滯破胸中氣嶺南人噉之當果實以袪瘴痿也一名洗瘴丹按彭者三尸之姓彭質彭矯彭居也周成雜字檳榔果也似螺可食李當之藥録檳榔一名檳門韓昌黎進學解敗鼓之皮世説魏武行役失汲道軍皆渴乃令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乘此得及前源本草拾遺陳藏器云黃獨過霜雪枮無苗蓋蹲鴟之類梁劉孝綽詠有人乞牛舌乳不付因餉檳榔詩云云宋劉穆之貧時從妻兄江氏乞檳榔江曰檳榔消食君苦飢何須此後尹丹陽以金盤斛許誇示之儋耳山突兀隘空虛他山總不如君看道傍石盡是補天餘詩小雅他山之石可以攻玉列子天亦物也物有不足故昔者女媧氏練五色之石以補其闕夜坐與邁聨句清風來無邉明月翳復吐坡松聲滿虗空竹影侵半户邁暗枝有驚鵲壞壁鳴飢鼠坡露葉耿高梧風螢落空廡微涼感團扇古意歌白紵樂哉今夕遊獲此陪杖屨邁傳家詩律細已自過宗武短詩膝上成聊以感懷祖坡古樂府有白紵辭杜子美詩晚節漸於詩律細又集中有示宗武詩懷祖事屢見曹溪夜觀傳燈録燈花落一僧字上口占山堂夜岑寂燈下看傳燈不覺燈花落茶毗一個僧釋典天竺第九祖入滅衆以香油旃檀闍維真體闍維即茶毗焚燒也施注蘇詩卷四十
