body:
  text: 施注蘇詩卷五宋蘇軾撰施元之原注武進邵長蘅刪補詩六十九首起熙寧壬子以後通守錢塘作施注缺今補焦千之求惠山泉詩兹山定空中乳水滿其腹遇隙則發見臭味實一族淺深各有值方圓隨所蓄或為雲洶湧或作線斷續或鳴空洞中雜佩間琴築或流蒼石縫宛轉龍鸞蹙瓶罌走千里真偽半相瀆貴人髙宴罷醉眼亂紅緑赤泥開方印紫餅截圓玉傾甌共歎賞竊語笑僮僕豈如泉上僧盥灑自挹掬故人憐我病蒻籠寄新馥欠伸北窗下晝睡美方熟精品厭凡泉願子致一斛左傳襄二十二年譬諸草木吾臭味也而何敢差池白居易廬山草堂記堂東有瀑布瀉階隅落石渠夜中如環珮琴築聲酉陽雜俎允街縣有泉泉眼中水走旋如盤龍驢馬飲之皆驚走盧同詩白絹斜封三道印茶録茶色貴白而餅茶多以珍膏油其面故有青紫黑之異又茶宜蒻葉收藏之家以蒻葉封裹焙中答任師中次韻公自注來詩勸以詩酒自娛間裏有深趣常憂兒輩知已成歸蜀計誰借買山資世事久已謝故人猶見思平生不飲酒對子敢論詩兒輩知注見第四卷越州張中舍詩世説支道林因人就深公買印山深公答曰未聞巢由買山而隱又郗超每聞欲髙尚隱退者輒為辦百萬資唐符載就襄陽節度于頔求買山錢頔與百萬沈諫議召遊湖不赴明日得雙蓮於北山下作一絶持獻沈既見和又别作一首因用其韻湖上棠隂手自栽問公更得幾回來水仙亦恐公歸去故遣雙蓮一夜開杭州圖經湖上有水仙王廟在錢塘門外二里詔書行捧縷金箋樂府應歌相府蓮莫忘今年花發處西湖西畔北山前李肇國史補于司空以樂府有想夫憐曲名不佳欲改之坐客有笑者曰南朝相府曾有瑞蓮號相府蓮後有此曲誤呼想夫憐杭州圖經北髙峰在靈隱寺後又北山之形如獅子名獅子峯和歐陽少師會老堂次韻一時冠蓋盡嚴終舊德年來豈易逢聞道堂中延蓋叟定應牀下拜梁松蠧魚自曬間箱篋科斗長收古鼎鐘我欲棄官重問道寸筳何以得舂容王注嚴助終軍二子皆少年之貴漢曹參為齊相嘗避正寢以延蓋公後漢馬援有疾梁松候之拜牀下援曰我乃松父友雖貴何得失其序乎科斗詳見石鼓詩注歐陽公收古鼎鐘銘刻最多見集古録目東方朔客難以筳撞鐘豈能發其音聲韓詩東野不回頭有如寸筳撞巨鐘禮記學記待其從容然後能盡其聲和歐陽少師寄趙少師次韻朱門有遺啄千里來燕雀公家冷如氷百呼無一諾平生親友半遷逝公雖不怪旁人愕世事如今臘酒醲交情自古春雲薄二公凛凛和非同疇昔心親豈貌從白鬚相映松間鶴清句更酬雪裏鴻何日揚雄一廛足郤追范蠡五湖中韓詩直置心親無貌敬漢書揚雄居岷山之陽有宅一區有田一廛監試呈諸試官我本山中人寒苦盜寸廩文詞雖少作勉強非天稟既得旋廢忘懶惰今十稔麻衣如再著墨水真可飲每聞科詔下白汗如流瀋此邦東南會多士敢題品芻蕘盡蘭蓀香不數葵荏貧家見珠貝眩晃自難審緬懷嘉祐初文格變已甚千金碎全璧百衲收寸錦調和椒桂釅咀嚼沙礫磣廣眉成半額學步歸踔踸丑甚切一作趻維時老宗伯氣壓羣兒凛蛟龍不世出魚鮪初驚淰至音久乃信知味猶食椹至今天下士微管幾左袵謂當千載後石室祠髙朕爾來又一變此學初誰諗權衡破舊法芻豢笑凡飪髙言追衛樂篆刻鄙曹沈先生周孔出弟子淵騫寢郤顧老鈍軀頑朴謝鐫鋟諸君况才傑容我懶且噤聊欲廢書眠秋濤舂午枕左傳僖二年虢公敗戎於桑田卜偃曰不可以五稔廣雅秋榖熟也古謂一年為一稔按先生以嘉祐六年辛丑中制科入第三等至熙寧五年壬子在杭州監試蓋十二年矣今十稔舉成數云晚唐劉得仁詩一著麻衣便白頭梁試進士不中程者飲以墨水北齊選舉濫者飲墨水一斗王注嘉祐初文格雕鏤磔裂如劉幾魏宜之屬後漢馬廖言城中好廣眉四方皆半額莊子秋水篇不聞夫夀陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳又夔謂蚿曰吾以一足趻踔而行趻同踸王注老宗伯言歐陽永叔也禮運以龍為畜故魚鮪不淰淰魚駭貌詩魯頌翩彼飛梟集于泮林食我桑椹懷我好音漢末髙朕為蜀郡守興設學校修周公禮教邦人立石室祠之在文翁石室傍王注衛玠樂廣言其時尚虛無之學也曹植沈約言時以詩賦為篆刻而不用也揚子或問淵騫曰在寢望海樓晚景五絶杭州圖經東樓一名望海樓在舊治中和堂北太平寰宇記樓髙十八丈唐武德七年置海上濤頭一線來樓前指顧雪成堆從今潮上君須上更看銀山二十回橫風吹雨入樓斜壯觀應須好句誇雨過潮平江海碧電光時掣紫金蛇青山斷處塔層層隔岸人家喚欲譍江上秋風晚來急為傳鐘鼓到西興杭州圖經浙江渡在候潮門外對西興樓下誰家燒夜香玉笙哀怨弄初涼臨風有客吟秋扇拜月無人見晚糚沙河燈火照山紅歌鼓喧呼語笑中為問少年心在否角巾欹側鬢如蓬唐地理志沙河塘縣舊治南五里咸通二年刺史崔彥曽聞昔潮水衝擊錢塘江岸至於奔逸入城勢莫能禦故開沙河以決之河有三曰外沙中沙裏沙試院煎茶蟹眼已過魚眼生颼颼欲作松風鳴蒙茸出磨細珠落眩轉繞甌飛雪輕銀瓶瀉湯誇第二未識古人煎水意公自注古語云煎水不煎茶君不見昔時李生好客手自煎貴從活火發新泉又不見今時潞公煎茶學西蜀定州花瓷琢紅玉我今貧病常苦飢分無玉碗捧蛾眉且學公家作茗飲磚爐石銚行相隨不用撑腸拄腹文字五千卷但願一甌常及睡足日髙時蔡君謨茶辨辨水泉煮飲等極為詳備有蟹眼魚眼用湯之法茶經云凡候湯有三沸如魚眼微有聲為一沸四向如涌泉連珠為第二沸騰波鼓浪為三沸則湯老因話録李約嗜茶能自煎謂人曰茶須緩火炙活火煎活火謂炭之有焰方熾者盧同謝孟諫議寄新茶詩三碗搜祐腸惟有文字五千卷又新茶詩日髙丈五睡正濃軍將打門驚周公孫莘老求墨妙亭詩先生墨妙亭記云熙寧四年十二月髙郵縣孫莘老自廣德移守吳興其明年二月作墨妙亭於府第之北取自漢以來古文遺刻以實之蘭亭繭紙入昭陵世間遺迹猶龍騰顔公變法出新意細筋入骨如秋鷹徐家父子亦秀絶字外出力中藏稜嶧山傳刻典刑在千載筆法留陽氷杜陵評書貴瘦硬此論未公吾不憑短長肥瘦各有態玉環飛燕誰敢憎吳興太守真好古購買斷缺揮縑繒龜趺入坐螭隱壁空齋晝靜聞登登奇蹤散出走吳越勝事傳説誇友朋書來乞詩要自寫為把栗尾書溪藤後來視今猶視昔過眼百世如風燈他年劉郎憶賀監還道同時須服膺法書苑王右軍蘭亭禊序真本以繭紙書唐太宗初得之命趙模馮承素諸葛貞之流拓本以賜諸王真本入玉匣從葬昭陵梁武帝評右軍書字勢雄踞如龍躍天門虎卧鳳閣書斷唐顔真卿書雄秀獨出一變古法又徐浩父子皆工草隸浩書張九齡司徒告身多渴筆世狀其法曰怒猊抉石渴驥奔泉杜子美詩嶧山之碑野火焚棗木傳刻肥失真按嶧山碑李斯書所謂小篆也唐李陽氷得其筆法又見一卷石鼓詩注杜子美詩苦縣光和尚骨立書貴瘦硬方通神王注亭中有顔徐李斯等石刻故敘言之楊妃外傳妃小字玉環明皇覽漢成內傳見飛燕身輕不勝風製七寶避風臺因謂妃子曰爾則任吹多少妃曰霓裳一曲足掩前古詩大雅築之登登王注登登打碑聲也栗尾筆也溪藤剡溪紙也唐國史補紙則有越之剡藤蘭亭記後之視今猶今之視昔韓詩百歲如風燈劉禹錫詩髙樓賀監昔曽登壁上筆蹤龍虎騰又云偶因獨見空驚目恨不同時便服膺李公擇求黃鶴樓詩因記舊所聞於馮當世者黃鶴樓前月滿川抱關老卒飢不眠夜聞三人笑語言羽衣著屐響空山非鬼非人意其仙石扉三扣聲清圓洞中鏗鈜落門關縹眇入石如飛煙雞鳴月落風馭還迎拜稽首願執鞭汝非其人骨腥羶黃金乞得重莫肩持歸包裹弊席氊夜穿茒屋光射天里閭來觀已變遷似石非石鉛非鉛或取而有衆忿喧訟歸有司今幾年無功暴得喜欲顛神人戲汝真可憐願君為考然不然此語可信馮公傳韓賦乃鬼神之所戲又見第二卷渦口詩注八月十日夜看月有懷子由并崔度賢良宛邱先生自不飽更笑老崔窮百巧一更相過三更歸古柏隂中看參昴去年舉君苜蓿盤夜傾閩酒赤如丹今年還看去年月露冷遙知范叔寒典衣自種一頃豆那知積雨生科斗歸來四壁草蟲鳴不如王江長飲酒公自注王江陳州道人毛詩惟參與昴苜蓿盤注見第四卷和子由詩韻語陽秋酒有以紅為貴者李賀詩小槽酒滴真珠紅是也今閩廣間所釀酒謂之紅酒其色殆類胭脂史記范雎傳須賈曰范叔一寒至此乎乃與之綈袍漢楊惲詩田彼南山蕪穢不治種一頃豆落而為萁催試官考較戲作八月十五夜月色隨處好不擇茅簷與市樓况我官居似蓬島鳳咮堂前野橘香劍潭橋畔秋荷老八月十八潮壯觀天下無鵾鵬水擊三千里組練長驅十萬夫紅旗青蓋互明滅黑沙白浪相吞屠人生會合古難必此景此行那兩得願君聞此添蠟燭門外白袍如立鵠錢塘候潮圖八月十八日獨大常潮逺觀數百里若素練橫江稍近見潮頭髙數丈捲雲湧雪混混庉庉聲如雷鼓猶不足以形容之左傳襄三年楚子重伐吳使鄧廖帥組甲三百被練三千以侵吳王注紅旗青蓋言弄潮也八月十七復登望海樓自和前篇是日榜出與試官兩一作五人復留五首樓上煙雲怪不來樓前飛紙落成堆非關文字須重看郤被江山未放回眼昏燭暗細行斜考閲精強外已誇明日失杯君莫怪早知安足不成蛇國策陳軫曰人有遺舍人一巵酒者舍人相謂曰畫地為蛇蛇先成者獨飲之一人蛇先成曰吾能為之足人奪之酒曰蛇固無足今為之足非蛇也亂山遮曉擁千層睡美初涼撼不譍昨夜酒行君屢歎定知歸夢到吳興天台桂子為誰香倦聽空階夜點涼賴有明朝看潮在萬人空巷鬬新粧唐垂拱中天台桂子落十餘日方止見陸龜蒙詩注秋花不見眼花紅身在孤舟兀兀中細雨作寒知有意未教金菊出蒿蓬秋懷二首苦熱念西風常恐來無時及兹遂凄凜又作徂年悲蟋蟀鳴我牀黃葉投我幃窗前有棲鵩夜嘯如狐狸露冷梧葉脫孤眠無安枝熠耀亦有偶髙屋飛相追定知無幾見迫此清霜期物化逝不留我興為嗟咨便當勤秉燭為樂戒暮遲古樂府有苦熱行淮南子木葉落長年悲阮嗣宗詩開秋兆涼氣蟋蟀鳴牀帷漢賈誼傳誼為長沙王傅有鵩鳥入舍止於坐隅注鵩似梟不祥鳥也詩豳風熠耀宵行疏熠耀者螢火之蟲飛而有光之貌故曰熠耀磷也杜螢火詩十月清霜重飄零何處歸詩小雅無幾相見古詩晝短苦夜長何不秉燭遊海風東南來吹盡三日雨空階有餘滴似與幽人語念我平生歡寂寞守環堵壺漿慰作勞裹飯救寒苦今年秋應熟過從飽雞黍嗟我獨何求萬里涉江浦居貧豈無食自不安畎畝念此坐達晨殘燈翳復吐古詩夜雨滴空階陶潛詩壺漿勞近鄰楊惲書田家作勞莊子裹飯而食之詩國風不知我者謂我何求杜詩初日翳復吐哭歐公孤山僧惠思示小詩次韻故人已為土衰鬢亦驚秋猶喜孤山下相逢説舊遊梵天寺見僧守詮小詩清逺可愛次韻杭州圖經梵天寺在鳳凰山但聞煙外鐘不見煙中寺幽人行未已草露濕芒屨惟應山頭月夜夜照來去附守詮詩落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨行屨惟聞犬吠聲又入青蘿去和陳述古拒霜花千株掃作一番黃只有芙蓉獨自芳喚作拒霜知未稱細思郤是最宜霜和沈立之留别二首而今父老千行淚一似當時初去時不用鐫碑頌遺愛丈人清德畏人知三國胡質仕魏纍遷征東將軍假節青徐諸軍事子威歷安豐太守厲操清白武帝問卿孰與父清曰臣父清恐人知臣清恐人不知何敢及父卧聞鐃鼓送歸艎夢裏匆匆共一觴試問别來愁幾許春江萬斛若為量公自注去時豫在試院次韻孔文仲推官見贈我本麋鹿性諒非伏轅姿君如汗血馬作駒已權奇齊驅大道中並帶鑾鑣馳聞聲自決驟那復受縶維謂君朝發燕秣楚日未欹云何中道止連蹇驢騾隨金鞍冒翠錦玉勒垂青絲旁觀信美矣自揣良厭之均為人所勞何必陋鹽輜君看立仗馬不敢鳴且窺調習困鞭箠僅存骨與皮人生各有志此論我久持他人聞定笑聊與吾子期空階卧積雨病骨煩撑支秋草上垣墻霜葉鳴階墀門前自無客敢作揚雄麾候吏報君來弭節江之湄一對髙人談稍忘俗吏卑今朝枉詩句粲如鳳來儀上山絶梯磴墮海迷津涯憐我枯稿質借潤生華滋豈效世俗人洗刮求瘢痍賢明日登用清廟歌緝熙胡不學長卿預作封禪詞戰國策汗明見春申君曰驥服鹽車而上太行漉汁灑地白汗交流外阪遷延負轅而不能上伯樂遭之下車攀而哭之驥於是俯而噴仰而鳴見伯樂之知已也賈誼賦驥垂兩耳伏鹽車兮漢書大宛傳宛别邑七十餘城多善馬汗血言其先天馬子也注汗從肩膊出如血故名汗血漢書郊祀歌太一況天馬下霑赤汗沫流赭志俶儻精權奇籋浮雲掩上馳詩國風輶車鑾鑣載獫歇驕莊子麋鹿見之決驟顔延年賦旦刷幽燕晝秣荆越揚雄反騷驢騾連蹇而齊足梁簡文帝紫騮詩青驄懸玉鐙唐史李林甫語諫官曰君等獨不見立仗馬乎終日無聲而飫三品芻豆一鳴則斥之後雖欲不鳴得乎由是諫諍路絶揚子在夷貊則引之倚門牆則麾之離騷吾令羲和弭節兮望崦嵫而勿迫爾雅水草交曰湄莊子河潤九里後漢郭伋傳帝勞之曰賢能太守帝城不逺河潤九里冀京師蒙福古詩緑葉發華滋後漢趙一賦所好則鑽皮出其毛羽所惡則洗垢求其瘢痕周頌小序清廟祀文王也維清奏象舞也詩維清緝熙文王之典史記司馬相如傳相如病甚天子使所忠往而相如已死家無書問其妻曰長卿未死時為一卷書曰有使者來求書奏之其遺札書言封禪事忠奏其書天子異之湯村開運鹽河雨中督役圖經仁和縣湯村鎮市在安仁東鄉去縣四十一里而都鹽倉在天宗門裏居官不任事蕭散羡長卿胡不歸去來滯留愧淵明鹽事星火急誰能恤農耕薨甍曉鼓動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與豬投泥相濺驚下馬荒堤上四顧但湖泓線路不容足又與牛羊爭歸田雖賤辱豈失泥中行寄語故山友慎毋厭藜羮史記相如與卓氏婚饒於財其進仕宦未嘗肯與公卿國家之事稱病間居不慕官爵詩國風胡為乎泥中莊子讓王篇孔子窮於陳蔡之間七日不火食藜羮不糝王注諷開此河不當又妨農事也是日宿水陸寺寄北山清順僧二首草沒河堤雨暗村寺藏修竹不知門拾薪煮藥憐僧病掃地焚香淨客魂農事未休侵小雪佛燈初上報黃昏年來漸識幽居味思與髙人對榻論國史補云韋應物性髙潔鮮食寡欲所在焚香掃地而坐長嫌鐘鼓聒湖山此境蕭條郤自然乞食繞村真為飽無言對客本非禪披榛覓路衝泥入洗足關門聽雨眠遙想後身窮賈島夜寒應聳作詩肩晉陶淵明有乞食詩披榛覓路注見第二卷微雪詩唐史賈島字浪仙初為浮屠名無本韓退之有送無本歸范陽詩韓石鼎聨句序彌明袖手竦肩而髙吟客位假寐謁入不得去兀坐如枯株豈惟主忘客今我亦忘吾同僚不解事愠色見髯鬚雖無性命憂且復忍須臾晉郗超為中書侍郎謝安與王文度共詣超日旰未得前文度便欲去安曰不能為性命忍須臾邪鹽官部役戲呈同事兼寄述古鹽官縣圖經隋開皇九年置杭州鹽官縣縣屬有鹽埸十所新月照水水欲氷夜霜穿屋衣生稜野廬半與牛羊共曉鼓郤隨鴉鵲興夜來履破裘穿縫紅頰曲眉應入夢千夫在野口如林豈不懷歸畏嘲弄我州賢將知人勞已釀白酒買豚羔耐寒努力歸不逺兩腳凍硬公須軟唐書楊國忠傳諸楊湯沐館在華清宫東垣帝臨幸必遍五家賞賚不資訃出有賜曰餞路返有勞曰軟腳楊妃外傳出有餞飲還有軟腳大唐稽疑郭子儀自同州歸代宗詔大臣就宅作軟腳局人率出錢三百千朱夀昌郎中少不知母所在刺血寫經求之五十年去歲得之蜀中以詩賀之嗟君七歲知念母憐君壯大心愈苦羡君臨老得相逢喜極無言淚如雨不羡白衣作三公不愛白日升青天愛君五十著綵服兒啼郤得償當年烹龍為炙玉為酒鶴髮初生千萬夀金馬詔書錦作囊白藤肩輿簾蹙繡感君離合我酸辛此事今無古或聞長陵朅來見大姊仲孺豈意逢將軍開皇苦桃空記面建中天子終不見西河郡守誰復譏潁谷封人羞自薦史記儒林傳序公孫𢎞以春秋白衣為天子三公後漢荀爽起自布衣九十五日而至三公列士傳老萊子年七十著五色斑斕之衣戲舞於當庭為小兒啼以悅親漢書外戚傳武帝母王太后微時為金王孫婦生女在長陵小市武帝自駕迎之直至其門家人驚恐女逃匿扶將出拜帝下車立曰大姊何藏之深也載至長樂宫與俱謁太后霍光傳霍中孺以縣吏給事平陽侯家與侍者衛少兒私通而生去病絶不相聞久之去病既壯大為將軍擊胸奴至平陽見中孺跪曰去病不早自知為大人遺體也中音仲隋史文帝外家吕氏其家甚微帝顯後求訪不知所在開皇初汝南郡上言有男子吕永吉自稱有姑字苦桃嫁楊氏勘驗知是舅家而貴之唐代宗皇后沈氏生德宗史思明再陷河洛失后所在德宗即位建中元年遙尊為皇太后以睦王述為奉迎太后使分命使臣周行天下終貞元之世無聞焉史記吳起傳吳起出衛郭門與其母訣囓臂而盟曰起不為卿相不復入衛頃之其母死起終不歸後仕衛為西河守左傳鄭莊公置母薑氏於城潁而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷封人聞之有獻于公鄭伯用其説而母子如初將之湖州戲贈莘老餘杭自是山水窟側聞吳興更清絶湖中橘林新著霜溪上苕花正浮雪顧渚茶芽白於齒梅溪木瓜紅勝頰吳兒膾縷薄欲飛未去先説饞涎垂亦知謝公到郡久應怪杜牧尋春遲鬢絲只好對禪榻湖亭不用張水嬉杜子美詩色好梨勝頰吳興統地梅溪一名東海堰在烏程縣西南六十里又顧渚泉上有木瓜堂其庭除列植木瓜引泉杜詩刀鳴膾縷飛晉謝安嘗為吳興太守唐杜牧佐宣城幕聞湖州多奇麗往遊刺史崔君為張水嬉縱州人畢觀牧賞一女姝期之曰吾不十年來守此郡不來從所適洎牧守湖州女從人三年矣牧有詩曰自是尋春去較遲不須惆悵怨芳時又詩今日鬢絲禪榻畔茶煙輕揚落花風鴉種麥行霜林老鴉間無用畦東拾麥畦西種畦西種得青猗猗畦東已作牛尾稀明年麥熟芒攢槊農夫未食鴉先啄徐行俯仰若自矜鼓翅跳踉上牛角憶昔舜耕歷山鳥為耘如今老鴉種麥更辛勤農夫羅拜鴉飛起勸農使者來行水笠澤叢書世謂舜之在下田於歷山象為之耕鳥為之耘聖德感召也鹽官絶句四首南寺千佛閣古邑居民半海濤師來構築便能髙千金用盡身無事坐看香煙繞白毫北寺悟空禪師塔公自注名齊安宣宗微時師知其非凡人鹽官圖經安國寺在縣西北六百五十步祥符元年改今額寺中有悟空塔塔前有古檜存焉已將世界等微塵空裏浮花夢裏身豈為龍顔更分别只應天眼識天人圓覺經譬彼病目見空中花又如夢中人夢時非無及至於醒了無所得漢髙祖本紀隆準而龍顔三國邯鄲淳見曹植曰真天人也塔前古檜當年雙檜是雙童相對無言老更恭庭雪到腰埋不死如今化作兩蒼龍傳燈録二祖慧可初詣達磨參求佛法直大雪夜侍中庭堅立不動遲明積雪過膝詩借用其意僧爽白雞公自注養二十餘年常立坐側聽經斷尾雄雞本畏烹年來聽法伴修行還須郤置蓮花漏老怯風霜恐不鳴左傳昭二十二年賓孟適郊見雄雞自斷其尾問之侍者曰憚其為犧也晉逺法師在山中置蓮花漏眂其早晚以為行道之節送張軒民寺丞赴省試龍飛甲子盡豪英嘗喜吾猶及老成人競春蘭笑秋菊天教明月伴長庚傳家各自聞詩禮與子相逢亦弟兄洗眼上林看躍馬賀詩先到古宣城公自注伯父與太平州張侍讀同年此其子楚辭九歌春蘭兮秋鞠鞠同菊煙花録煬帝曰春蘭秋菊各一時之芳韓退之詩東方未明大星沒獨有太白對殘月長庚太白也史記蔡澤傳躍馬食肉富貴四十三年足矣六和寺沖師閘山溪為水軒欲放清溪自在流忍教氷雪落沙洲出山定被江潮涴能為山僧更少留杜子美詩江流大自在又詩在山泉水清出山泉水濁和致仕張郎中春晝投紱歸來萬事輕消磨未盡祇風情舊因蓴菜求長假新為楊枝作短行不禱自安緣夀骨深藏難沒是詩名淺斟杯酒紅生頰細琢歌詞穩稱聲蝸殼卜居心自放蠅頭寫字眼能明盛衰閲過君應笑寵辱年來我亦平跪履數從圯下老逸書間問濟南生東風屈指無多日只恐先春鶗鵙鳴潘安仁秋興賦且斂袵以歸來兮忽投紱以髙邁蓴菜注見第三卷送劉攽唐白居易詩櫻桃樊素口楊柳小蠻腰白既年邁而小蠻方豐艷因為楊柳枝詞以託意王注細琢歌詞即張善為小詞也三國焦先作小廬形如蝸殼故曰蝸牛廬南史齊衡陽王鈞嘗手自細書五經置於巾箱以備遺忘賀玠問曰殿下家自足墳素復何須蠅頭細書藏巾箱中史記留侯世家良常遊下邳圯上有一老父至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲毆之為其老強下取履因長跪進履父以足受笑而去史記儒林傳伏生濟南人故為秦博士孝文時求能治尚書者聞有伏生欲召之生年九十餘老不能行乃使鼂錯往受業離騷恐鶗鵙之先鳴兮使百草為之不芳冬至日獨遊吉祥寺井底微陽回未回蕭蕭寒雨濕枯荄何人更似蘇夫子不是花時肯獨來月令冬至則水泉動後十餘日復至東君意淺著寒梅千朵深紅未暇裁安得道人殷七七不論時節遣花開王注言東君止著意寒梅千朵深紅則吉祥寺牡丹也古今詩話殷七七字文祥周寶舊識之及移鎮浙西一日謂七七曰鶴林杜鵑花天下奇絶聞子能作非時花今重九將近能開花副此日乎七七乃前二日往鶴林中夜女子來謂七七曰妾為上玄所命司此花今與道者開之然此花非久即歸閬苑矣女子俄不見及九日爛熳如春寶驚異遊賞纍日其後兵火焚寺樹失根株云又見續仙傳戲贈惆悵沙河十里春一畨花老一畨新小橋依舊斜陽裏不見樓中垂手人古樂府舞有大垂手小垂手梁吳均曲垂手忽迢迢飛燕掌中嬌又且復小垂手廣袖拂紅塵和人求筆迹麥光鋪几淨無瑕入夜青燈照眼花從此剡藤真可弔半紆春蚓綰秋蛇王注麥光紙名蓋南中竹紙之流今成都以麻屑競為之唐舒元輿作弔剡溪藤文言今之錯為文者皆夭閼剡藤者也剡藤可作紙唐太宗論蕭子雲書行行若縈春蚓字字如綰秋蛇用將之湖州戲贈原韻寄莘老君不見夷甫開三窟不如長康號癡絶癡人自得終天年智士死智罪莫雪困窮誰要卿料理舉頭看山笏拄頰野鳬翅重自不飛黃鶴何事兩翼垂泥中相從豈得久今我不往行恐遲江夏無雙應未去恨無文字相娛嬉公自注黃庭堅莘老壻能文晉書王衍字夷甫居宰輔不以國為念而思自全之計乃以弟澄為荆州族弟敦為青州謂曰卿二人在外而吾留此足以為三窟矣識者鄙之晉顧愷之字長康桓溫嘗云愷之體中癡黠各半合而論之正得其平耳故俗傳愷之才絶畫絶癡絶世説王徽之為桓沖參軍沖嘗謂徽之曰卿在府日久比當相料理徽之初不酬答直髙視以手板拄頰云西山朝來致有爽氣後漢黃香能文章京師號曰天下無雙江夏黃童畫魚歌公自注湖州道上作按畫胡麥切音義並同劃以鈎劃魚今三吳水鄉往往有之天寒水落魚在泥短鉤畫水如耕犁渚蒲拔折藻荇亂此意豈復遺鰍鯢偶然信手皆虛擊本不辭勞幾冀同萬一一魚中刃百魚驚蝦蟹奔忙誤跳擲漁人養魚如養雛插竿貫笠驚鵜鶘豈知白挺閙如雨攪水覓魚嗟已疏杜詩渚蒲芽白水荇青王注鯢有二有鯨鯢之鯢有魚子之鯢今此言魚子也吳中田婦歎公自注和賈收韻今年粳稻熟苦遲庶見霜風來幾時霜風來時雨如瀉杷頭出菌鎌生衣眼枯淚盡雨不盡忍見黃穗卧青泥茅苫一月隴上宿天晴穫稻隨車歸汗流肩赬載入市價賤乞與如粳粞賣牛納稅拆屋炊慮淺不及明年飢官今要錢不要米西北萬里招羌兒龔黃滿朝人更苦不如郤作河伯婦韓退之城南聨句刈熟擔肩赬宋史司馬溫公曰百姓有米而官不要米百姓無錢而官必要錢史記褚先生滑稽傳魏文侯時西門豹為鄴令會長老問民所疾苦長老曰苦為河伯娶婦豹問故曰鄴三老廷掾常歲賦斂百姓得數百萬為河伯娶婦巫行視小家女好者共粉飾之沈之河中不爾即有水患豹至禁絶之和邵同年戲贈賈收秀才三首傾蓋相歡一笑中從來未省馬牛風卜鄰尚可容三徑投社終當作兩翁古意已將蘭緝佩招詞間詠桂生叢此身自斷天休問白髮年來漸不公家語孔子之剡遭程子於塗傾蓋而語終日甚相親漢鄒陽上梁孝王書白頭如新傾蓋如故左傳風馬牛注馬逐上風而去牛逐下風而來故云不相及也尚書馬牛其風左傳非宅是卜惟鄰是卜漢杜陵蔣詡元卿為兖州太守王莽居攝以病免官居鄉里卧不出户於舍中竹下開三徑惟羊仲求仲從之遊二仲皆挫廉逃名之士劉安招隱士桂樹叢生兮山之幽杜子美詩自斷此生休問天唐詩公道世間惟白髮朝見新荑出舊槎騷人孤憤苦思家五噫處士大窮約三賦先生多誕誇帳外鶴鳴奩有鏡筒中錢盡案無鮭玉川何日朝金闕白晝關門守夜叉公自注時賈欲再娶王注先生本注云時賈欲再娶則詩意皆涉夫婦事也新荑出舊槎使枯楊生荑之義韓非有孤憤篇言孤獨而憤悶也後漢梁鴻傳鴻過京師作五噫之歌曰陟彼北邙兮噫顧覽帝京兮噫宫室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而惡之求鴻不得漢司馬相如奏子虛上林大人三賦北山移文蕙帳空兮夜鶴怨又詳前卷詩注公答秦太虛書初到黃痛自節儉日用不得過百五十仍放大竹筒貯用不盡者以待賔客南史庾杲之食惟有韭葅瀹韭生韭雜菜任昉常戲之曰誰謂庾郎貧食鮭嘗有二十七種菜謂三韭也盧同詩夜又當晝不肯啓夜半醮祭夜半開生涯到處似檣烏科第無心摘頷鬚黃帽刺船忘歲月白衣擔酒慰鰥孤狙公欺病來分栗水伯知饞為出鱸莫向洞庭歌楚曲煙波渺渺正愁豫王注杜詩檣烏相背發又檣烏宿處非又檣烏終歲飛此檣竿上刻為烏形以占風者晉令車駕出入相風在前亦是刻烏於竿上名曰相風傅玄相風賦云棲神烏於竿首俟祥風之來征韓詩連年收科第如摘頷底髭前漢鄧通以棹船為黃頭郎注土勝水其色黃故刺船之郎皆著黃帽晉陽秋陶潛九月九日無酒出宅邉菊叢中坐摘菊花盈把久之望見白衣人至乃江州刺史王𢎞送酒即便獨酌醉而後歸莊子狙公賦芧曰朝三而暮四衆狙皆怒然則朝四而暮三衆狙皆悅注芧橡子也似栗而小山海經朝日之谷神曰天吳是為水伯九歌帝子降兮北渚目渺渺兮愁豫嫋嫋兮秋風洞庭波兮木葉下遊道場山何山道場山頂何山麓上徹雲峯下幽谷我從山水窟中來尚愛此山看不足陂湖行盡白漫漫青山忽作龍蛇盤山髙無風松自響誤認石齒號驚湍山僧不放山泉出屋底清池照瑶席階前合抱香入雲月裏仙人親手植出山回望翠雲鬟碧瓦朱欄縹眇間白水田頭問行路小溪深處是何山髙人讀書夜達旦至今山鶴鳴夜半我今廢學不歸山山中對酒空三歎禪宗正脈道場山如訥禪師證道於此故名王注何山以何鍇讀書得名故有髙人讀書夜達旦句杜詩碧瓦朱甍照城郭鶴知夜半注見四卷和劉道原贈孫莘老七絶嗟豫與子久離羣耳冷心灰百不聞若對青山談世事當須舉白便浮君浮白出劉向説苑注見一卷和劉長安詩吳都賦出躡珠履動以千百里宴巷飲飛觴舉白天目山前淥浸裾碧瀾堂下看銜艫作堤捍水非吾事間送苕溪入太湖寰宇記湖州安吉縣天目山髙萬六千丈父老云欲度難及避水災天目海陵山為第一水經注浙江水出吳興郡於潛縣北天目山山極髙峻崖嶺竦疊西臨後澗山上有霜木皆是數百年樹謂之雙鳳林按王存九域志湖州南至杭州界首十五里故天目山於寰宇記則係之湖州於水經則係之於潛而於潛雖屬杭州蓋與湖接境也輿地志苕溪一源自天目一源自獨松嶺合浮玉山水至吳興入太湖又見四卷宿餘杭法喜寺注夜來雨洗碧巑岏浪湧雲屯繞郭寒聞有辨山何處是為君四面竟求看寰宇記辨山在烏程縣一名卞山山石瑩然如玉夜橋燈火照溪明欲放扁舟取次行暫借官奴遣吹笛明朝新月到三更三年京國厭藜蒿長羡淮魚壓楚糟今日駱駝橋下泊恣看修網出銀刀駱駝橋唐垂拱元年造以形似駱駝背名之劉禹錫詩駱駝橋上蘋風起鸚鵡杯中若下春杜詩出網銀刀亂烏程宿稻襲人香釀作春風霅音閘水光時復中之徐邈聖毋多酌我次公狂寰宇記古烏程能醖酒故以名縣又指酒為烏程張協七命乃有荆南烏程豫北竹葉韋昭吳録烏程下若酒有名輿地志若溪在長興縣南溪南曰上若北曰下若村人取下若水釀酒醇美勝雲陽若溪亦作箬溪蓋長興故屬烏程也霅溪在湖州府城霅者以衆流合集為義凡四水曰苕溪前溪餘不溪及北流水通謂之霅溪一曰四水蕩激時霅然有聲故名魏志徐邈為尚書郎時科酒禁而邈私飲至於沉醉校尉趙達問以曹事邈曰中聖人達白太祖太祖甚怒鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人耳竟得免後文帝見邈問曰頗復中聖人不對曰昔子反斃於陽榖御叔罰於飲酒臣嗜同二子不能自懲時復中之西漢蓋寬饒字次公為司𨽻平恩侯許伯入第丞相已下皆賀寬饒東鄉特坐許伯自酌曰蓋君後至寬饒曰無多酌我我乃酒狂丞相魏侯笑曰次公醒而狂何必酒也去年臘日訪孤山曾借僧窗半日間不為思歸對妻子道人有約徑須還莘老葺天慶觀小園有亭北向道士山宗説乞名與詩春風欲動北風微歸鴈亭邉送鴈歸蜀客南遊家最逺吳山寒盡雪先晞扁舟去後花絮亂五馬來時賔從非惟有道人應不忘抱琴無語立斜暉漢制太守駟馬其有加秩中二千石者乃右驂故以五馬為太守美稱南齊柳元伯之子五人皆領郡五馬參差於亭故殷文圭云柳氏亭邉參差五馬至秀州贈錢端公安道并寄其弟惠山老一作惠山山人鴛鴦湖邉月如水孤舟夜榜鴛鴦起平明繫纜石橋亭慚愧冒寒髯御史結交最晚情獨厚論心無數今有幾寂寞抱關歎蕭生耆老執戟哀揚子怪君顔采郤秀發無乃遷謫反便美天公欲困無奈何世人共抑真疏矣毗陵髙山錫無骨陸子遺味泉氷齒賢哉仲氏早拂衣占斷此山長洗耳山頭望湖光潑眼山下濯足波生指儻容逸少問金堂記與嵇康留石髓南湖紀略鴛鴦湖名南湖在府城南其禽多鴛鴦故名一曰兩湖相麗若鴛鴦然五代時湖東有煙雨樓今存王注髯御史指錢安道也安道髯而為御史故云漢蕭望之傳霍光秉政王仲翁與蕭望之等數人皆召見吏民當見者先露索去刀兵兩吏挾持望之獨不肯聽自引出曰不願見於是光不用望之而仲翁至光祿大夫望之署小苑東門候仲翁出入傳呼甚寵顧謂曰不肯碌碌反抱關為望之曰各從其志揚雄傳雄為郎給事黃門與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主而雄三世不徙官及莽時以耆老久次轉為大夫按黃門郎掌守門户故執戟潘嶽詩執戟疲揚王注毗陵常州也髙山惠山也陸子陸羽也羽善煎茶次第水品以無錫惠山寺石泉為第二包吉贈劉尊師詩曉漱瓊膏氷齒寒世説孫楚曰所以枕流欲洗其耳許邁遺羲之書自山之南至臨安多有金堂玉室仙人芝草左元放之徒在焉神仙傳王烈入太行山忽山破石裂青泥流如髓烈取食之如飴餘半與嵇康凝而為石烈歎曰叔夜志趣非常而不遇命也秀州報本禪院鄉僧文長老方丈萬里家山一夢中吳音漸已變兒童每逢蜀叟談終日便覺峨睂翠掃空師已忘言真有道我除搜句百無功明年採藥天台去更欲題詩滿浙東洞天記峨睂山在嘉州係第七洞天又天台赤城山髙一萬八千丈周回五百里在台州天台縣王復秀才所居雙檜二首吳王池館遍重城奇草幽花不記名青蓋一歸無覓處只留雙檜待升平晉書孫皓時錢塘湖開或言天下當太平青蓋入洛時皓以問陳訓訓曰臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛將有輿櫬銜璧之事尋而吳國亡凜然相對敢相欺直幹臨空未要奇根到九泉無曲處世間惟有蟄龍知通鑑中丞李定御史舒亶論軾自熙寧以來作為文章怨謗君父陛下發錢以本業貧民則曰贏得兒童語音好一年強半在城中陛下明法以課試羣吏則曰讀書萬卷不讀律致君堯舜終無術陛下興水利則曰東海若知明主意應教斥鹵變桑田陛下謹鹽禁則曰豈是聞韶解忘味爾來三月食無鹽其他觸物即事應口無非以詆謗為主上不得已從其請逮軾赴臺獄詔定與知諫院張璪御史何正臣舒亶等雜治之煆鍊久之不決且多引名士必欲置之死太皇太后謂帝言小人忌才中傷捃至於詩其過微矣宜熟察之而吳充申救甚力會王安禮亦以為言帝曰朕固不深譴也王圭復舉軾詠檜詩曰根到九泉無曲處世間惟有蟄龍知今陛下飛龍在天軾欲求之地下之蟄龍不臣孰甚焉帝曰彼自詠檜爾何預朕事促具獄貶黃州團練副使按公諸詩前後作於熙寧間坐詆謗就逮則元豐二年也因注雙檜詩并托於此宋叔達家聽琵琶數絃已品龍香撥半面猶遮鳳尾槽新曲翻從玉連鎖舊聲終愛鬱輪袍夢回只記歸舟字賦罷雙垂紫錦絛何異烏孫送公主碧天無際鴈行髙楊妃外傳開元中中官白秀貞自蜀回得琵琶以獻其槽以邏逤檀為之溫潤如玉光明可鑒有金縷紅紋蹙成雙鳳以龍香板為撥絃乃拘彌國所貢緑氷蠶絲也鄭愚津陽門詩玉奴琵琶龍香撥玉奴太真小字白樂天琵琶行千呼萬喚始出來猶抱琵琶半遮靣歐陽詩杜彬琵琶皮作絃自從彬死世莫傳玉連鎖聲入黃泉玉連鎖今曲名廣林記王維微時為岐王所知將應舉王令作琵琶新曲引至公主家維自彈主問何曲曰鬱輪袍也主大愛之是年遂為舉首太平廣記李生者其舅盧有道術謂李生曰求得善箜篌者令侍飲生視箜篌上有朱字云雲中辨江樹天際識歸舟後李生妻陸長源女乃所見於舅家者問有何能曰善箜篌取而視之朱字宛然紫錦絛見張説琵琶賦傅玄琵琶賦序故老云漢送烏孫公主念其行道思慕使知音者作馬上之樂以方語目之故名琵琶釋名推手前曰琵引手郤曰琶施注蘇詩卷五
