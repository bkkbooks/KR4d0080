body:
  text: 施註蘇詩巻三十八宋蘇軾撰施元之原註武進邵長蘅刪補詩六十三首起在儋耳洎元符三年庚辰復朝奉郎提舉王局觀北歸抵英州作過於海舶得邁寄書酒作詩逺和之皆粲然可觀子由有書相慶也因用其韻賦一篇并寄諸子姪我似老牛鞭不動雨滑泥深四蹏重汝如黄犢走卻來海濶山髙百程送庶㡬門戸有八慈不恨居鄰無二仲他年汝曹笏滿床中夜起舞踏破甕㑹當洗眼看騰躍莫指癡腹笑空洞譽兒雖是兩翁癖積徳已自三世種豈惟萬一許生還尚恐九十煩珍從六子晨耕簞瓢出衆婦夜績燈火共春秋古史乃家法詩筆離騷亦時用但令文字還照世糞土腐餘安足夢杜子美百憂集行憶年十五心尚孩健如黄犢走復來後漢荀爽傳潁州為之語曰荀氏八龍慈明無雙爽字慈明三輔决録蒋詡竹下開三徑惟與羊仲求仲從遊互詳五巻和邵同年詩注唐崔琳傳每嵗時宴于家以一榻置笏猶重積其上世傳小話有一貧士家惟一甕夜則守之以寝一夕心自惟念茍得富貴當以錢若干營田宅若干蓄聲妓而髙車大葢無不備置往來于懐不覺歡適起舞遂踏破甕故今俗間指妄想狂計者謂之甕算唐王勃傳父福畤嘗詫諸子於韓思彦思彦曰武子有馬癖君有譽兒癖王家癖何多邪使勃出其文思彦曰生子若是可夸也杜子美羌村詩生還偶然遂禮記九十者天子欲有問焉則就其室以珍從糞土腐餘用殷浩傳語詳二十巻秦少游夢發殯詩註上元夜過赴儋守召獨坐有感使君置酒莫相違守舍何妨獨掩扉静看月牕盤蜥蜴卧聞風幔落蛜蝛燈花結盡吾猶夢香篆消時汝欲歸搔首凄凉十年事傳柑歸遺滿朝衣爾雅蠑螈蜥蜴蝘蜓守宫詩國風伊威在室鄭氏云伊威委黍也此物家無人惻然令人感思疏云伊威䑕婦也或並作蟲邊傳柑先生在翰林時有上元侍飲詩云猶有傳柑遺細君追憶其事故云海南人不作寒食而以上已上冢予攜一瓢酒尋諸生皆出矣獨老符秀才在因與飲至醉符盖儋人之安貧守静者也老鴉銜肉紙飛灰萬里家山安在哉蒼耳林中太白過鹿門山下徳公回管寕投老終歸去王式當年本不來記取南城上已日木棉花落刺桐開李白詩集有尋城北范居士失道落蒼耳中見范置酒摘蒼耳作三國魏管寕傳避難居遼東文帝即位徵還郡注云寕在遼東積三十七年乃歸漢王式傳詔除為博士既至止舍中㑹諸博士共持酒食勞式江公心嫉式謂歌吹諸生曰歌驪駒云云式恥之讓諸生曰我本不欲來諸生强勸我竟為豎子所辱遂謝病免歸番禺雜編木綿樹高二三丈切類桐木二三月間花既謝蕋為綿彼人績之為毯潔白如雪温暖無比刺桐樹似青桐而矮三四月時紅芳滿樹禁煙時士女競憇花隂亦曲江之偶也新居東坡至儋耳軍使張中請舘於行衙又别飾官舍為安居計朝廷命湖南提舉常平董必者察訪廣西遣使臣過海逐出之中坐黜死雷州監司悉鐫秩遂買地築室為屋五間潮人王介石為客於儋躬泥水之役其勞甚於家𨽻故詩有逐客猶遭屏句朝陽入北林竹樹散疎影短籬尋丈間寄我無窮境舊居無一席逐客猶遭屏結茅得兹地翳翳村巷永數朝風雨凉畦菊發新頴俯仰可卒嵗何必謀二頃五色雀并引海南有五色雀常以兩綘者為長進止必隨焉俗謂之鳳凰云乆旱而見輒雨潦則反是吾卜居儋耳城南嘗一至庭下今日又見之進士黎子雲及其弟威家既去吾舉酒祝之曰若為吾來者當再集也巳而果然乃為賦詩楊浮異物志儋耳南方夷也生則鏤其頰皮連耳匡分為数支状如雞腸纍纍下垂至肩故名儋耳見後漢孝明紀注粲粲五色羽炎方鳳之徒青黄縞元服翼衛兩紱朱仁心知閔農常告雨霽符我窮惟四壁破屋無瞻烏惠然此粲者來集竹與梧鏘鳴如玉佩意欲相嬉娛寂寞兩黎生食菜真臞儒小圃散春物野桃陳雪膚舉杯得一笑見此紅鸞雛髙情如飛仙未易握粟呼胡為去復來眷眷豈屬吾回翔天壤間何必懐此都韓退之詩丹穴五色羽其名為鳳凰詩小雅瞻烏爰止于誰之屋詩國風惠然肯來又見此粲者詩疏鳳凰非梧桐不棲非竹實不食左傳莊二十二年鳳凰于飛和鳴鏘鏘番禺雜編五色雀一名音聲鳥毎樂作有聲如鼓者塤者笛者版者滿山嘈噆乆而自罷詩小雅交交桑扈率埸啄粟握粟出卜自何能糓賈誼弔屈原賦歴九州而相君兮何必懐此都也倦夜倦枕厭長夜小牕終未明孤村一犬吠殘月㡬人行衰鬢乆巳白旅懐空自清荒園有絡緯虛織竟何成用過韻冬至與諸生飲酒公自注符吳皆坐客其餘皆即事實錄也小酒生黎法乾糟瓦盎中芳辛知有毒滴瀝取無窮凍醴寒初泫春醅暖更饛華夷兩樽合醉笑一歡同里閈峩山北田園震澤東歸期那敢説安訊不曽通鶴鬢驚全白犀圍尚半紅愁顔觧符老夀耳闘吳翁得糓鵞初飽亡猫䑕益豐黄薑收土芋巻耳斫霜叢児瘦緣儲藥奴肥為種菘頻頻非竊食数数尚乘風河伯方夸若靈娲自舞馮歸塗䧟泥淖炬火燎茆蓬膝上王文度家傳張長公和詩仍醉墨戯海亂羣鴻番禺雜編黎人在海南山洞中一曰熟黎亦供州縣之役又有生黎所居洞深百餘里善登木如猿猱詩小雅有饛簋飱鄭氏云饛滿簋貌王注峨山在眉州震澤在常州陸務觀云故事謫散官雖别駕司馬皆封賜如故宋尚書在鄜畤詩云經時不巾櫛慵更佩金魚先生時謫瓊州别駕故用犀圍尚半紅之句揚子頻頻之黨甚於鷽斯亦賊夫糧食而巳乘風河伯俱用莊子屡見司馬相如大人賦使靈娲鼓琴而舞馮夷已見晋王坦之字文度膝上事屡見漢張釋之傳子摰字長公官至大夫免以不能取容當世故終身不仕韋續墨薮梁武帝評鍾繇書如雲鶴造天羣鴻戯海縱筆三首寂寂東坡一病翁白湏蕭散滿霜風小児誤喜朱顔在一笑那知是酒紅父老争看烏角巾應緣曽現宰官身溪邉古路三叉口獨立斜陽数過人北船不到米如珠醉飽蕭條半月無明日東家當祭竈隻雞斗酒定膰吾漢孫寳傳入舎祭竈請比鄰再見膰肉字出孟子貧家净掃地貧家净掃地貧女好梳頭下士晚聞道聊以拙自修扣門有佳客一飯相邀留春炊勿草草此客未易媮慎勿用勞薪感我如薫蕕德人抱衡石銖黍安可廋老子下士聞道大笑之杜子羙詩一飯未嘗留俗客数篇今見古人詩詩小雅勞人草草左傳襄三十年季武子曰晋未可媮也注媮薄也晋荀朂傳常在武帝坐進飯謂人曰此是勞薪所炊帝遣問膳夫乃云實用故車腳世服其明識左傳僖四年晋卜人曰一薫一蕕十年尚猶有臭次韻子由贈吳子野先生二絶句吳子野名復古一字逺遊潮州人東坡與一見論出世閒法嘗著飬生論一篇為子野作也與遊二十餘年南遷至真揚間見子野無一語及得䘮休戚事獨告坡曰邯鄲之夢猶足破妄而歸真目見而身履之亦可以悟矣未㡬南歸訪東坡於惠過子由於循坡徙儋耳子野又從之為作逺遊菴銘送坡北歸遇疾而殂以文祭之曰嗚呼子野道與世違寂黙自求闔門垂幃兀爾坐忘有似子㣲或似壺子杜氣發機急人緩已忘其渇饑送我北還中道弊衣有疾不藥但卻甘肥問以後事一笑而麾可以知其人矣馬跡車輪滿四方若為閉暑小茆堂仙心欲捉左元放癡疾還同顧長康後漢左慈字元放曹操欲于座上收殺之慈乃郤入壁中云云互見二十巻次韻孔毅父詩注長康顧愷之字世傳癡絶屡見江令蒼苔圍故宅謝家語燕集華堂先生笑說江南事祗有青山繞建康江令江總也為陳中書令劉禹鍚金陵五題其一江令宅云南朝詞臣北朝客歸來惟見秦淮碧池䑓竹樹三畝餘至今人道江家宅其一烏衣巷云朱雀橋邉野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家九域志江寕府天禧元年為建康軍節度被酒獨行徧至子雲威徽先覺四黎之舍三首半醒半醉問諸黎竹刺藤稍歩歩迷但尋牛矢覓歸路家在牛欄西復西杜子羙詩竹寒沙碧浣花谿橘刺藤稍咫尺迷韓非子商太宰問市南門之外牛矢何多總角黎家三四童口吹蔥葉送迎翁莫作天涯萬里意谿邉自有舞雩風符老風情奈老何朱顔減盡鬢絲多投梭每困東鄰女換扇唯逢春夢婆公自注是日復見符林秀才言換扇事投梭晋謝鯤事巳見趙德麟侯鯖錄東坡在昌化嘗負大瓢行歌田畝間盖哨遍也饁婦年七十謂曰内翰昔日富貴一埸春夢坡然之里人因呼為春夢婆夜燒松明火嵗暮風雨交客舍悽薄寒夜燒松明火照室紅龍鸞快熖初煌煌碧煙稍團團幽人忽富貴蕙帳芬椒蘭珠煤綴屋角香􅢧音詣流銅槃公自注􅢧松瀝也出本草注坐看十八公俯仰灰燼殘齊奴朝㸑蠟萊公夜長歎海康無此物燭盡更未䦨夲草唐本注云松取枝燒其上下承取汁名􅢧晋石崇傳小字齊奴常以蠟代薪歐陽公歸田錄㓂萊公自少年富貴不㸃油燈雖寝亦然燭逹旦每罷官去後人至官舍見厠溷間燭淚在地徃徃成堆按雷州海康郡萊公貶此地終焉庚辰歲人日作時聞黄河巳復北流老臣舊数論此今斯言乃驗二首神宗元豐四年澶州言河决小吳埽詔東行河道巳填淤不可復更不修閉哲宗元祐三年知樞宻院安燾等疏議回河東流平章重事文忠烈中書侍郎吕正愍從而和之力主其議子由在西掖言於右僕射吕正獻曰河决而北先帝不能回而諸公欲回之是自謂過先帝也正獻曰當與公籌之然竟莫能奪其役遂興議論紛然至於累嵗公嘗侍上讀祖宗寳訓因及時事曰黄河勢方北流而强之使東當軸者恨之老臣舊数論此指此事也老去仍棲隔海村夢中時見作詩孫天涯巳慣逢人日歸路猶欣過鬼門三策巳應思賈讓孤忠終未赦虞翻典衣剩買河源米屈指新篘作上元作詩孫陸務觀云在蜀見蘇山藏公墨跡疊韻竹後題云寄作詩孫符符字仲虎九域志容州鬼門闗漢伏波将軍馬援討林邑蠻路由此立碑石龜尚在韓退之贈張十一詩念君又署南荒吏路指鬼門幽更夐諺云若度鬼門闗十去九不回三國吳虞翻傳孫權積怒徙翻交州在南十餘年卒河源米河源縣屬惠州當是秔秫所産也白樂天嘗酒詩一甕香醪新挿篘不用長愁挂月村㯽榔生子竹生孫公自注海南勒竹每節生枝如竹竿大盖竹孫也新巢語燕還窺硯舊雨來人不到門春水蘆根看鶴立夕陽楓葉見鴉翻此生念念隨泡影莫認家山作夲元杜子羙詩月挂客愁村舊雨字出杜子羙秋述巳見庚辰嵗正月十二日天門冬酒熟予自漉之且漉且嘗遂以大醉二首自撥牀頭一甕雲幽人先巳醉濃芬天門冬熟新年喜麴米春香並舍聞公自注杜子羙詩云聞道雲安麴米春盖酒名也菜圃漸疎花漠漠竹扉斜掩雨紛紛擁裘睡覺知何處吹面東風散纈紋證類夲草孫真人枕中記云天門冬釀酒服之去三虫伏屍輕身益氣令人不饑載酒無人過子雲年來家醞有竒芬醉鄕杳杳誰同夢睡息齁齁得自聞口業向詩猶小小眼花因酒尚紛紛㸃燈更試淮南語汎溢東風有縠紋王績醉鄕記乃命周公旦立酒人氏之職典司五齊拓土七千里僅與醉鄕逹焉嗟乎醉鄕氏之俗豈古華胥氏之國乎何其淳寂也如是余将遊焉莊子駢拇篇吾所謂聰者非謂其聞彼也自聞而巳矣淮南子東風至而酒汎溢髙誘注云酒汎謂米麫麯之汎者風至而沸動許氏注云酒汎清酒也東風震方也木味酸相感故也追和戊寅歲上元春鴻社燕巧相違白鶴峰頭白板扉石建方欣洗牏厠姜龎不觧歎蠨蝛一龕京口嗟春夢萬炬錢塘憶夜歸合浦賣珠無復有當年笑我泣牛衣漢石奮傳長子建為郎中令每五日洗沐歸謁親入子舍竊問侍者取親中帬厠牏身自澣灑姜龎廣漢姜詩妻同郡龎盛之女也詩事母至孝妻奉順尤篤詳十八巻五禽言詩注再見詩國風伊威在室蠨蛸在户伊威注見夲巻蠨蛸長踦也漢王章傳初為諸生學長安獨與妻居章疾病無被卧牛衣中與妻决涕泣後章為京兆欲上封事妻曰人當知足獨不念牛衣中涕泣時邪果下廷尉獄既死妻子皆徙合浦采珠致産数百萬注云牛衣編亂麻為之即今俗呼為龍具者題過所畫枯木竹石三首老可能為竹冩真小坡今與石傳神山僧自覺菩提長心境都将付卧輪老可謂文與可小坡言過也過字叔黨先生之子時謂小東坡傳燈錄卧輪禪師偈云卧輪有伎倆能㫁百思想對境心不起菩提日日長六祖聞之曰未也乃云慧能無伎倆不斷百思想對境心数起菩提作麽長散木支離得自全交柯蚴蟉欲相纒不湏更説能鳴鴈要以空中得盡年荘子人間世匠石之齊見櫟社樹曰散木也又支離其身者猶足以養其身終其天年况支離其德者乎漢司馬相如傳青龍蚴蟉於東廂荘子山木篇弟子問於荘子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生将何處荘子笑曰周将處夫材與不材之間似之而非也故未免乎累倦看澁勒暗蠻村亂棘孤藤束瘴根唯有長身六君子猗猗一作依依猶得似淇園詩國風瞻彼淇澳綠竹猗猗毛傳綠王芻也竹篇竹也漢溝洫志下淇園之竹以為揵真一酒歌并引布算以歩五星不如仰觀之㨗吹律以求中聲不如耳齊之審鈆汞以為藥策易以候火不如天造之真也是故神宅空樂出虛蹋踘者以氣升孰能推是類以求天造之藥乎於此有物其名曰真一逺遊先生方治此道不飲不食而飲此酒食此藥居此堂予亦竊其一二故作真一之歌其辭曰空中細莖挿天芒不生沮澤生陵岡渉閱四氣更六陽森然不受螟與蝗飛龍御月作秋凉蒼波改色屯雲黄天旋雷動玉塵香起搜十裂照坐光跏趺牛噍昨笑反安且詳動搖天闗出瓊漿壬公飛空丁女藏三伏遇井了不嘗醸為真一和而莊三杯儼如侍君王湛然寂照非楚狂終身不入無功鄕莊子青青之麥生於陵陂按麥熟頭昻故芒可云挿天也此詩通首皆指麥言之王注麥以九月種四月熟渉閱四氣者謂備四時之氣更六陽者謂自十一月一陽生至四月為六陽也又王充論衡云糓之多蟲者粢也稻時有蟲麥與秬無蟲又麥以四月熟時為秋禮記月令孟夏之月麥秋至是也按卦氣圖十一月復卦為乾之初九逓至三月夬卦為乾之九五四月正陽之月為純乾卦乾九五飛龍在天則飛龍御月者指三月也是時麥欲秋矣故下有蒼波屯雲之句又栁子厚詩云麥芒際天摇青波稍老謂之蒼波稍熟則又如黄雲之屯也又論衡云日月星隨天而西譬若蟻行磨上則磨可以言天旋又天文志天無雷而有聲謂之雲磨則磨可以言雷動又束晳餅賦云漫項薄持起搜牢丸四物之名晋何曾性豪侈作蒸餅不裂作十字不食詩盖用曾事也再見乂佛氏謂盤足為跏趺楞嚴經云有牛呞病謂吐而噍也又黄庭經言口為天闗瓊漿以言華池之水也壬公言水丁女言火既出華池之水則壬水飛而在上丁火伏而在下矣韓退之陸渾火詩女丁婦壬傳世婚王績字無功著醉鄕記巳見夲巻汲江煎茶活水還湏活火烹公自注唐人云茶湏緩火炙活火煎自臨釣石取深清大瓢貯月歸春甕小杓分江入夜缾茶雨巳飜煎處腳松風忽作㵼時聲枯腸未易禁三椀坐聽荒城長短更予來儋耳得吠狗曰烏觜甚猛而馴隨予遷合浦過澄邁泅而濟路人皆驚戯為作此詩烏喙夲海獒幸我為之主食餘巳瓠肥終不憂鼎俎晝馴識賓客夜悍為門戸知我當北還掉尾喜欲舞跳踉趁童僕吐舌喘汗雨長橋不肎躡徑渡清深浦拍浮似鵞鴨登岸劇虓虎盗肉亦小疵鞭箠當貰汝再拜謝厚恩天不遣言語何當寄家書黄耳定乃祖爾雅犬四尺為獒漢張蒼傳肥白如瓠魏賈岱宗狗賦其所折伏敬主識人晝則無窺窬之客夜則無姦淫之賓漢蒯通傳里婦云昨暮夜犬得肉黄耳晋陸機犬名詳見九巻捕蝗至浮雲嶺詩注澄邁驛通潮閣二首倦客愁聞歸路遥眼明飛閣俯長橋貪看白鷺横秋浦不覺青林没晚潮餘生欲老海南村帝遣巫陽招我魂杳杳天低鶻沒處青山一髮是中原楚辭宋玉招魂帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之巫陽對曰掌夢上帝其命難從若必筮予之恐後之謝不能復用巫陽焉乃下招曰云云韓退之詩乗潮簸扶胥近岸指一髮泂酌亭并引瓊山郡東衆泉觱發然皆冽而不食丁丑嵗六月南遷過瓊始得雙泉之甘於城之東北隅以告其人自是汲者常滿泉相去咫尺而異味庚辰嵗六月十七日遷於合浦復過之太守承議郎陸公求泉上之亭名與詩名之曰泂酌其詩曰泂酌兩泉挹彼注兹一缾之中有澠有淄以瀹以烹衆喊胡感切莫齊自江徂海浩然無私豈弟君子江海是儀既味我泉亦嚌音霽我詩詩大雅泂酌彼行潦挹彼注兹列子仲尼篇口将爽者先辨淄渑張湛曰淄澠水異味旣合則難别也又説符篇孔子曰淄渑之合易牙嘗而知之揚子易牙能喊不能齊不齊之口注喊者嘗其味也禮疏嚌謂至齒嘗之六月二十日夜渡海參横斗轉欲三更苦雨終風也觧晴雲散月明誰㸃綴天容海色夲澄清空餘魯叟乘桴意麤識軒轅奏樂聲九死南荒吾不恨兹遊竒絶冠平生樂府善哉行月没參横北斗闌干左傳昭公四年春無凄風秋無苦雨詩國風終風且霾晋謝重傳嘗侍㑹稽王道子坐于時月夜明净道子嘆以為佳重率爾曰意謂乃不如微雲㸃綴道子戯曰卿居心不净乃欲滓穢太清耶韓退之詩水色與天容此處皆淥净楞嚴經譬如澄清百千大海楚辭離騷雖九死其猶未悔自雷適廉宿於興㢘村净行院荒凉海南北佛舍如雞棲忽行榕林中跨空飛拱枅當門冽碧井洗我兩足泥髙堂磨新甎洞戸分角圭倒牀便甘寝鼻息如虹霓僮僕不肎去我為半日稽晨登一葉舟醉兀十里谿醒來知何處歸路老更迷韓退之青龍寺詩刻畫圭角出崖窽杜子羙詩山晩黄雲合歸時恐路迷㢘州龍眼質味殊絶可敵荔支龍眼與荔支異出同父祖端如甘與橘未易相可否異哉西海濵琪樹羅元圃纍纍似桃李一一流膏乳坐疑星隕空又恐珠還浦圖經未嘗説玉食逺莫数獨使一作有皴皮生弄色映琱俎蠻荒非汝辱幸免妃子汙番禺雜編龍眼子樹葉俱似荔支但子圎小止淡黄一色廣人多呼為亞荔支左傳荘七年夜中星隕如雨珠還後漢孟嘗事巳見按皴皮指荔支妃子汙謂楊妃嗜生荔而致祸也注巳見合浦愈上人以詩名嶺外将訪道南嶽留詩壁上云閒伴孤雲自在飛東坡居士過其精舍戲和其韻孤雲出岫豈求伴鍚杖凌空自要飛為問庭松尚西指不知老奘㡬年一作時歸陶淵明辭雲無心以出岫栁子厚詩仙山不屬分符客一任凌空鍚杖飛大唐新語𤣥奘法師西域取經以手摩靈巖寺松樹曰吾西去汝可西長若吾歸即東向使吾弟子知之及去其枝年年西指長数丈一年忽東向弟子曰吾師歸矣乃迎之果至後號為摩頂松梅聖俞之客歐陽晦夫使工畫茅菴巳居其中一琴横床而巳曹子方作詩四韻僕和之云按宋史元符三年正月哲宗崩徽宗即位先生以五月始被命移㢘州六月離儋耳七月至㢘三為歐陽晦夫賦詩寂寞王子猷回船剡谿路迢遥戴安道雪夕誰與度倒披王㳟氅半掩袁安戸應調折絃琴自和撚湏句歐陽晦夫惠琴枕中郎不眠仰看屋得此古椽圍尺竹輪囷濩落非笛用剖作袖琴徽軫足流傳㡬處到淵明卧枕綸巾酒新漉孤鸞别鵠一作鶴誰復聞鼻息齁齁自成曲張隲文士傳蔡邕經㑹稽髙遷亭見屋椽竹東間第六可以為笛取用果有異聲邕初平元年拜中郎将古琴操一曰别鵠操商陵牧子作陶淵明詩知我故來意取琴為我彈上絃驚别鵠下絃離孤鸞酉陽雜俎許州有一老僧自四十夏以後毎寝熟即聲如鼓篁自成均節許州伶人伺其寢即譜其聲按之絲竹皆合古奏僧覺亦不自知十餘年如此留别㢘守編雈以苴豬墐塗以塗之小餅如嚼月中有酥與飴懸知合浦人長誦東坡詩好在真一酒為我醉宗資禮記内則炮取豚若将刲之刳之實棗於其腹中編雈以苴之塗之以謹塗炮之注云将音牂萑蘆葦之類苴裹也謹當為墐黏土也言行錄丁晋公與楊大年抛令大年云有酒如線遇鍼則見晋公云有餅如月遇食則缺後漢宗資為汝南太守詩意謂㢘守也缾笙并引庚辰八月二十八日劉㡬仲餞飲東坡中觴聞笙簫聲杳杳若在雲霄間抑揚徃返麤中音節徐而察之則出於雙缾水火相得自然吟嘯盖食頃乃巳坐客驚歎得未曽有請作缾笙詩記之孤松吟風細泠泠獨蠒長繅女娲笙陋哉石鼎逢彌明蚯蚓竅作蒼蠅聲缾中宫商自相賡昭文無虧亦無成東坡醉熟呼不醒但云作勞吾耳鳴神仙傳園客飬蠶成五色獨蠒繅之經月不絶再見禮記明堂位女娲之笙簧荘子齊物論有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也晋載記石勒也為人耕聞鞞鐸之音以告其母母曰作勞耳鳴非不祥歐陽晦夫遺接䍦琴枕戲作此詩謝之携児過嶺今七年晚塗更著黎衣冠白頭穿林要藤帽赤腳渡水湏花縵不愁故人驚絶倒但使俚俗相恬安見君合浦如夢寐挽湏握手俱汍瀾妻縫接䍦霧縠細児送琴枕氷徽寒無絃且寄陶令意倒載猶作山公看我懐汝隂六一老眉宇秀發如春巒羽衣鶴氅古仙伯岌岌兩柱扶霜紈至今畵像作此服凛如退之加渥丹爾來前軰皆鬼錄我亦帶脱巾欹寛作詩頗似六一語往往亦帶梅翁酸番禺雜編生黎人用藤織裹頭謂之䍡􅀢子西域記西域國人首冠花縵身衣纓絡杜子羙詩相對如夢寐又詩問事競挽湏東軒雜錄晏公一日見韓愈畫像語坐客曰此貌大類歐陽修安知非愈後身也詩國風顔如渥丹梅翁謂梅聖俞也東坡題梅詩集後云先君與二丈游時某與子由年甚少公獨深知之南遷過合浦見其門人歐陽晦夫出其詩藁数十幅云次韻王鬱林晚塗流落不堪言海上春泥手自翻漢使節空餘皓首故侯𤓰在有頽垣平生多難非天意此去殘年盡主恩誤辱使君相抆拭寕聞老鶴更乘軒漢朱博傳長陵大姓尚方禁少時嘗盗人妻見斫創著其頰博笑曰大丈夫固時有是馮翊欲洒卿恥抆拭用禁能自效否藤州江下夜起對月贈邵道士江月照我心江水洗我肝端如徑寸珠墮此白玉盤我心夲如此月滿江不湍起舞者誰歟莫作三人看嶠南瘴毒地有此江月寒乃知天壌間何人不清安牀頭有白酒盎若白露漙獨醉還獨醒夜氣清漫漫仍呼卲道士取琴月下彈相将乘一葉夜下蒼梧灘徐元用使君與其子端常邀僕與小児過同遊東山浮金堂戲作此詩元用名疇昔與徐使君共賞錢塘春愛此小天竺時來中聖人松如遷客老酒似使君醇繫舟藤城下弄月鐔江濵江月夜夜好雲山朝朝新使君有令子真是石麒麟我子乃散材有如木輪囷二老白接䍦兩郎烏角巾醉卧松下石扶歸江上津浮橋半沒水掲此碧鱗鱗南史顧憲之為建康令甚得人和故都下飲酒得醇者輙呼為顧建康謂其清且羙焉陳後主詩璧月夜夜好瓊樹朝朝新送鮮于都曹歸蜀灌口舊居籋盡霜鬚照碧銅依然春雪在長松朝行犀浦催收芋夜渡繩橋看伏龍莫歎倦遊無駟馬要将老健敵千鍾子雲三世惟身在為向西南説病容犀浦在郫縣青城山記云李氷琢五石犀以厭水一在青城二在犀浦一在成都市橋一在江中號犀浦為沉犀浦杜子羙南鄰詩園收芋栗未全貧繩橋在灌口有伏龍觀杜入奏行運糧繩橋壮士喜漢揚雄傳字子雲蜀郡成都人也歴成哀平三世不徙官送邵道士彦肅還都嶠洞天福地記第二十都嶠山洞周回一百八十里名寳𤣥之天在容州乞得紛紛擾擾身結茆都嶠與仙鄰少而寡慾顔常好老不求名語益真許邁有妻還學道陶潜無酒亦從人相隨十日還歸去萬劫清遊結此因晋許邁傳字逺遊初學道時其妻尚在父母旣終乃遣妻孫氏還家遂擕其同志徧遊名山焉晋書陶潜傳或有酒要之雖不識主人亦欣然無忤酣醉便返書韓幹二馬赤髯碧眼老鮮卑回策如縈獨善騎赬白紫騮俱絶世馬中岳湛有妍姿後漢鮮卑傳東胡之支也别依鮮卑山故因號焉晋明帝紀乘巴滇駿馬㣲行至于湖隂察王敦營壘敦晝寝驚起曰此必黄鬚鮮卑奴來也晋王湛傳兄子濟有從馬絶難乘湛騎此馬姿容既妙回策如縈善騎者無以過之詳見二十七巻和王晋卿詩注赬白顔延年有赬白馬賦李太白紫騮馬詩紫騮行且嘶雙飜碧玉蹄岳湛借用夏侯湛潘岳連璧事巳見将至廣州用過韻寄邁迨皇天遣出家臨老乃學道北歸為児子破戒堪一笑披雲見天眼回首失海潦蠻唱與黎歌餘音猶杳杳大兒牧衆穉四嵗守孤嶠次子病藥醫三折乃麤曉小兒耕且養得暇為書繞我亦困詩酒去道愈茫𣺌紛紛何時定所至皆可老莫學栁儀曹詩書教氓獠亦莫事登陟谿山有何好安居與我遊閉戸净灑掃左傳定十三年晋知伯将伐公齊髙疆曰三折肱知為良醫唯伐君為不可揚子古之學者耕且飬唐栁宗元傳自禮部員外郎坐貶後徙栁州刺史南方為進士者走数千里以宗元為師經指授者為文辭皆有法贈鄭清叟秀才風濤戰扶胥海賊横泥子胡為犯二怖博此一笑喜問君奚所欲欲談仁義耳我才不逮人所有聊足巳安能相付予過聽君誤矣霜風掃瘴毒冬日稍清羙年來萬事足所欠惟一死澹然兩無求滑净空棐几韓退之南海廟碑廟在今廣州治之東南海道八十里扶胥之口黄木之灣再見和孫叔静兄弟李端叔唱和孫叔静名鼛錢塘人徙江都年十五遊太學老蘇先生亟稱之哲宗擢提舉廣東常平東坡居惠州極意與周旋二子娶晁無咎黄魯直女黨事起家人危之叔静一無所顧平生篤於行義君子人也㣲時與蔡京善察其人常曰蔡子貴人也然才多而徳薄志大而行不副若不能謹守恐詒天下憂京還朝遇諸塗京曰我若用願助我叔静曰公能以正論輔人主節儉以先百吏而絶口不言兵鼛何為者京黙然後卒如其言仕為太僕卿殿中少監以顯謨閣待制知曹州單州靖康二年卒年八十六諡通靖病骨瘦欲折霜髯籋更疎喜聞新國政兼得故人書秉燭真如夢傾杯不敢餘天涯老兄弟懐抱㡬時攄杜子羙簡諸子詩少陵野老骨欲折又羌村詩夜闌更秉燭相對如夢寐廣倅蕭大夫借前韻見贈復和答之二首生還麤勝虞蚤退不如踈垂死初聞道平生誤信書風濤驚夜半疾病送災餘賴有蕭夫子幽懐得少攄唐蕭頴士傳人稱為蕭夫子心閑詩自放筆老語翻疎贈我皆强韻知君得異書滔滔沮叟是綽綽孟生餘一笑滄溟側應無憤可攄南史王筠傳為詩能用强韻袁山松漢書王朗為㑹稽守還許下時人稱其才進曰不見異人當得異書抱朴子時人疑蔡邕得異書搜其帳中果得王充所作論衡綽綽用孟子語跋王晋叔所藏畫徐熙杏花徐熙鍾陵人江左風流王謝家盡携書畫到天涯郤因梅雨丹青暗洗出徐熙落墨花圖畫見聞志徐熙意出古今徐鉉云落墨為格雜彩副之迹與色不相隐映也沈存中筆談國初江南布衣徐熙善畫花以墨筆畫之殊草草略施丹粉神氣迥出别有生動之意趙昌四季圖畫見聞志趙昌廣漢人工畫花果芍藥倚竹佳人翠袖長天寒猶著薄羅裳揚州近日紅千葉自是風流時世粧杜子羙佳人詩天寒翠䄂薄日暮倚修竹因話錄崔樞夫人治家整肅貴賤皆不許時世粧白樂天歌時世妝自出城中傳四方躑躅楓林翠壁楚江邉躑躅千層不忍看開巻便知歸路近劍南樵客為施丹范蜀公來齋記趙昌漢州人昌自稱劍南樵人寒菊輕肌弱骨散幽葩真是青帬兩髻丫便有佳名配黄菊應緣霜後苦無花西京雜記趙昭儀弱骨豐肌尤工語笑歐陽公詩小婢立我前赤腳兩髻丫山茶遊蜂掠盡粉絲黄落蕋猶收蜜露香待得春風㡬枝在年來殺菽有飛霜左傳定公元年冬十月隕霜殺菽和黄秀才鑒空閣明月夲自明無心孰為境挂空如水鑒冩此山河影我觀大瀛海巨浸與天永九州居其間無異虵盤鏡空水兩無質相照但耿耿妄云桂兔蟇俗説皆可屏我遊鑒空閣缺月正凄冷黄子寒無衣對月句愈警借君方諸淚一沐管城穎誰言小叢林清絶冠五嶺前定錄袁孝叔遇異人得書云每受命即開一幅累仕皆驗最後一幅畫虵蟠鏡中而巳五經通義月中有兔與蟾蜍月隂也蟾蜍陽也而與兔並明隂係陽也酉陽雜俎舊傳月中有桂有兔故異書言月桂髙五百丈下有一人常斫之長慶中有人八月十五夜玩月光屬於林中如匹布尋視之見一金背蝦蟇疑是月中者淮南子陽燧見日熯而為火方諸見月津而為水大荘嚴論如是衆僧者乃勝智之叢林一切諸善行運集在其中韋偃牧馬圖神工妙技帝所收江都曹韓逝莫留人間畫馬唯韋侯當年為誰掃驊騮至今霜蹏踏長楸圉人困卧沙壠頭沙苑茫茫蒺藜秋風騣霧鬛寒颼颼龍種尚與駑駘遊長稭短豆豈我羞八鑾六轡非馬謀古來西山與東邱杜子羙曹将軍畫馬引國初巳來畫鞍馬神妙獨数江都王将軍得名三十載人間又見真乘黄又丹青引弟子韓幹蚤入室亦能畫馬窮殊相又韋偃畫馬歌戲拈秃筆掃驊騮􅘒見騏驎出東壁一匹齕草一匹嘶坐看千里當霜蹏又霜蹏蹴踏長楸間又李鄠縣胡馬行一聞説盡急難材轉益愁向駑駘軰又始知神龍别有種不比俗馬空多肉題靈峰寺壁靈峰山上寳陀寺白髮東坡又到來前世德雲今我是依希猶記妙髙䑓華嚴經德雲比邱居勝樂國妙峰山之上衆妙堂先生有衆妙堂記載集中湛然無觀古真人我獨觀此衆妙門夫物芸芸各歸根衆中得一道乃存道人晨起開東軒趺坐一醉扶桑暾餘光照我玻瓈盆倒射牕几清而溫欲收月魄餐日魂我自日月誰使吞老子𤣥之又𤣥衆妙之門又夫物芸芸各歸其根黄庭内景經出日入月呼吸存注云日月者隂陽之精也左出右入身有陰陽之氣題馮通直明月湖詩後老衍清篇墨未枯小馮新作語尤姝呼兒净洗涵星硯為子賡歌墮月湖聞道䍧江空抱珥公自注南詔有西珥河即古䍧牱江也河形如月抱珥故名西珥年來合浦自還珠請君多釀蓮花酒凖擬王喬下履鳬王注老衍謂馮衍也漢西南夷傳蜀枸醤道西北䍧牱江江廣数里出番禺城下再見次韻鄭介夫二首鄭介夫名俠福清人事詳見宋史東坡南遷始識介夫北歸至英介夫在焉和其二詩嘉定六年賜諡曰介一落泥塗迹愈深尺薪如桂米如金長庚到曉空陪月太歲今年合守心相與齧氊持漢節何妨振履出商音孤雲倦鳥空來徃自要閑飛不作霖左傳襄三十年趙孟謂綘縣老人曰吾子辱在泥塗乆矣武之罪也戰國策蘇秦謂楚王曰國之食貴於玉薪貴於桂後漢郎顗傳孝經鉤命决曰歲星守心年糓豐注云歲星守心為重華故年豐也劉向新序原憲曵杖拖履行歌商頌聲滿天地如出金石尚書髙宗命説曰若歲大旱用汝作霖雨一生憂患萃殘年心似驚蠶未易眠海上偶來期汗漫葦間猶得見延緣良醫自要經三折老将何妨敗兩甄收取桑榆種棃棗祝君眉夀似増川晋周訪傳擊賊率杜曽使李恒督左甄許朝督右甄訪自領中軍令其衆曰一甄敗鳴三鼓兩甄敗鳴六鼓自旦至申兩甄皆敗訪親鳴鼓士皆騰踊奔赴曽遂大潰詩小雅如川之方至以莫不増施註蘇詩巻三十八
