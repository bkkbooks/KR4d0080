body:
  text: 施注蘇詩卷十二宋蘇軾撰施元之原注武進邵長蘅删補詩四十首起丁巳春留京師至四月之官彭城以後作送范景仁游洛中小人真暗事閒退豈公難道大吾何病言深聽者寒憂時雖蚤白住世有還丹得酒相逢樂無心所遇安去年行萬里蜀路走千盤投老身彌健登山意未䦨西游為櫻筍東道盡鵷鸞杖屨攜兒去園亭借客看折花斑竹寺弄水石樓灘鬻馬衰憐白驚雷怯笑韓蘚書標洞府公自注歐陽永叔嘗游嵩山日暮於絶壁上見苔蘚成文云神清之洞明日復尋不見松蓋偃天壇試與劉夫子重尋靖長官公自注劉几云曽見人嵩山幽絶處眼光如猫意其為靖長官也又送喬同詩引云靖長官唐末五代人得道不死史記孔子世家顔回曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子戰國策馮忌見趙王曰服子曰客交淺而言深是亂也客曰不然交淺而言深是忠也按景仁嘗纍疏力詆王安石安石大怒持其疏至手顫故云聽者寒隱丹經有大小還丹秦中嵗時記唐有櫻筍厨白樂天歇馬吟忽憶家園須速去櫻桃欲熟筍應生左傳僖三十年含鄭以為東道主世說陳太邱詣荀朗陵貧儉無僕役乃使元方將車季方持杖從後唐白居易致仕洛中既老又病風將鬻其駱馬馬悲鳴復留之作不能忘情吟又有賣駱馬詩嵩山韓退之題名云元和四年二月二十六日與樊宗師盧同自洛中至少室謁李勃遂至龍潭下釣遇雷明日乃歸歐陽集古跋尾右韓退之題名在洛陽嵩山天封宫石柱上刻之記龍潭遇雷事余為西京留守推官游嵩山入天封宫登山項之武后封禪處有石記戒人游龍潭者毋語笑以黷神龍龍怒則有雷恐因念退之記遇雷意其有所誡也九域志洛陽有天壇山次韻景仁留别公老我亦衰相見恨不數臨行一杯酒此意重山嶽歌詞白紵清琴弄黃鐘濁詩新眇難和飲少僅可學欲參兵部選有力誰如犖且作東諸侯山城雄鼓角南游許過我不憚千里邈㑹當聞公來倒屣髮一一作三握嵇叔夜飬生論從衰得白從白得老沈約别范安成詩及爾各衰暮非復别離時勿言一杯酒明日難重持樂府題解白紵吳地所出白紵舞夲吳舞也梁武帝令沈約改其詞為四時歌周禮凡樂黃鐘為宫鄭氏云凡五聲宫之所生濁者為多唐選舉志武選兵部主之朝野僉載崔湜為吏部侍郎有選人白湜曰某能翹關負米湜笑曰若壯何不選兵部答曰外議謂侍郎下有氣力者即得選左傳莊三十二年雩講於梁氏女公子觀之圉人犖自牆外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋於稷門晋嵇康傳吕安服康髙致每一相思千里命駕三國王粲傳蔡雍聞粲在門倒屣迎之史記魯世家周公一沐三握髮一飯三吐哺書韓幹牧馬圖南山之下汧渭之閒想見開元天寶年八坊分屯隘秦川四十萬匹如雲煙騅駓駰駱驪驑騵白魚赤兔騂皇䮧胡安切龍顱鳳頸獰且妍竒姿逸德隱駑頑碧眼胡兒手足鮮嵗時剪刷供帝間柘袍臨池侍三千紅糚照日光流淵樓下玉螭吐清寒往來蹙蹴同踏生飛湍衆工䑛筆和朱鉛先生曹霸弟子韓廄馬多肉尻立刀切脽音誰圓肉中畫骨誇尤難金羈玉勒繡羅鞍鞭箠刻烙傷天全不如此圖近自然平沙細草荒芊綿驚鴻脫兔爭後先王良挾策飛上天何必俯首服短轅史記秦始皇紀非子好馬周孝王召使主馬於汧渭之閒唐兵志唐初得突厥馬二千匹又得隋馬三千於赤岸澤徙之隴右監牧之制始于此用張萬嵗領羣牧自貞觀麟德四十年間馬七十六萬六千置八坊岐豳涇寧閒地廣千里自萬嵗失職馬政頗廢開元初國馬益耗及王毛仲領內外間廄馬稍稍復始二十四萬至十三年及四十三萬王毛仲傳從帝東封牧馬數萬匹每色一隊相間如錦繡天子才之杜子美天育驃騎歌當時四十萬匹馬張公歎其才盡下詩駉頌有騅有駓又駰駱驪魚騂皇俱見駉頌驑騵見爾雅赤吕布馬名唐韻䮂䮧番大馬劉琬馬賦龍頭烏目麟腹虎胸杜胡馬行鳳臆麟鬐未易識周禮校人掌王馬之政天子十有二間馬六種六典曰隋文帝服柘黃袍巾帶聼朝遂以為常莊子田子方篇宋元君將畫圖衆史皆至䑛筆和墨在外者半杜子美丹青引贈曹將軍弟子韓幹早入室亦能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣凋喪漢東方朔傳結股腳連脽尻莊子馬蹄篇伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣曹植賦翩若驚鴻宛若游龍史記田單傳後如脫兔敵不及拒天文志漢中四星曰天駟旁一星曰王良王良䇿馬車騎滿野漢王褒傳及至駕齧䣛驂乘旦王良執靶韓哀附輿縱馳騁騖忽如景靡過都越國蹶如歷塊追奔電逐遺風漢灌夫傳局促效轅下駒送魯元翰少卿知衛州公自密移守河中至京師改徐州時有㫖不許入國門寓城外范蜀公園故首句云云魯元翰名有開乃肅簡公之姪自知南康代還王介甫問江南如何元翰對新法當為異日患介甫怒僅得倅杭公時亦為杭倅與魯同官魯先代去七卷有夀星寺餞魯少卿詩即元翰也冗士無處著寄身范公園桃花忽成隂薺麥秀已繁閉門春晝永惟有黃蜂喧誰人肯攜酒共醉榆桞村髯卿獨何者一月三到門我不往拜之髯來意彌敦堂堂元老後亹亹仁人言憶在錢塘嵗情好均弟昆時於冰雪中笑語作春溫欲飲徑相覓夜開叢竹軒搜尋到篋笥鮓醢無復存每愧煙火中玉腕親炮燔别來今幾何相對如夢魂告我當北渡新詩侑清樽坡陀太行麓洶湧黃河翻仕宦非不遇王畿西北垣斯民如魚耳見網則驚奔皎皎千丈清不如尺水渾刑政雖首務念當飬其源一聞襦袴音盜賊安足論蜀關羽傳猶未若髯之絶倫逸羣也晋謝安傳弱冠詣王濛濛曰此客亹亹為來逼人左傳昭三年君子曰仁人之言其利溥哉杜子美貽桞少府詩桞侯披衣笑見我顔色溫又醉時歌得錢即相覓沽酒不復疑小說載詩云吹火紅唇動揎薪玉腕斜遙觀煙裏面恰似霧中花事見孟啓夲事詩襦袴用後漢亷范事見前卷和孔郎中詩注次韻子由送蔣蔣䕫赴代州學官功力爭先變法初典刑獨守老成餘窮人未信詩能爾倚市懸知繡不如代北諸生漸狂簡牀頭雜說為爬梳歸來問鴈吾何敢疾世王符解著書史記貨殖傳刺繡文不如倚市門東漢王符隱居著書三十篇以譏當世得失號曰潛夫論又皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規卧不迎既入問卿在郡食鴈美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履迎門援符手而還與同坐極歡時人為之語曰徒見二千石不如一逢掖宿州次韻劉涇劉涇字巨濟我欲歸休瑟漸希舞雩何日著春衣多情白髮三千丈無用蒼皮四十圍晚覺文章真小伎早知富貴有危機為君垂涕君知否千古華亭鶴自飛公自注涇之兄汴亦有文死矣李白秋浦歌白髮三千丈緣愁似䓢長杜子美古柏行霜皮溜雨四十圜黛色參天二千尺富貴危機晋諸葛長民語見七卷韓子華石淙莊詩注晋書陸機臨死歎曰華亭鶴唳豈可復聞乎和李邦直沂山祈雨有應髙田生黃埃下田生蒼耳蒼耳亦已無更問麥有幾蛟龍睡足亦解慙二麥枯時雨如洗不知雨從何處來但聞吕梁百步聲如雷試上城南望城北際天菽粟青成堆饑火燒腸作牛吼不知待得秋成否半年不雨坐龍慵共怨天公不怨龍今朝一雨聊自贖龍神社鬼各言功無功日盜太倉榖嗟我與龍同此責勸農使者不汝容因君作詩先自劾杜子美詩雨降不濡物良田起黃埃莊子逹生篇孔子觀於吕梁縣水三十仞流沫四十里王注吕梁今謂百步洪在彭城郡東龍神見法華經社鬼見漢王莽傳漢孫寶傳張忠辟為屬欲令授子經更為除舍設儲偫寶自劾去韓退之詩家請官供不報答無異鼠雀偷太倉行抽手版付丞相不待彈劾還耕桑公詩亦此意和孔密州五絶見邸家園留題大斾傳聞載酒過小詩未忍著磚磨陽關三疊君須祕公自注來詩有渭城之句除郤膠西不解歌王注漢於燉煌龍勒縣置陽關後人因以陽關名曲按先生詩話舊傳陽關三疊然今世歌者每句再疊而巳若通一首言之又是四疊皆非是或每句二唱以應三疊之說則叢然無復節奏余在密州有文勛長官者以事至密自云得古夲陽關其聲宛轉凄斷不類向之所聞每句皆再唱而第一句不疊乃知古夲三疊蓋如此及在黃州偶讀樂天對酒詩云相逢且莫推辭醉聼唱陽關第四聲注云第四聲勸君更盡一杯酒以此驗之則第一句不疊審矣春步西園見寄嵗嵗開園成故事年年行樂不辜春今年太守尤難繼慈愛聰明惠利人漢馮奉世傳奉世子野王與弟立相代為上郡太守治行略相似吏民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民東欄梨花梨花淡白桞深青桞絮飛時花滿城惆悵東欄二株雪人生看得幾清明韓退之詩走馬城西惆悵歸不忍千株雪相映和流杯石上草書小詩蜂腰鶴膝嘲希逸春蚓秋蛇病子雲醉裏自書醒自笑如今二絶更逢君南史齊陸厥傳永明時盛為文章吳興沈約陳郡謝朓琅邪王融以氣類相推轂汝南周顒善識聲韻約等文皆用四聲制韻有平頭上尾蜂腰鶴膝之病世呼為永明體又謝莊字希逸王元謨問何者為雙聲疊韻答曰元瓠為雙聲磝碻為疊韻晋王羲之傳蕭子雲近出擅名江表然僅得成書無丈夫之氣行行若縈春蚓字字如綰秋蛇唐張旭每醉或以頭濡墨而書既醒自視以為神不可復得也南史顧野王傳宣城王為揚州刺史野王及王褒並為賔客王於東府起齊令野王畫古賢王褒書贊時稱為二絶堂後白牡丹城西千葉豈不好笑舞春風醉臉丹何似後堂冰玉潔游蜂非意不相干公自注孔頗有聲妓而客無見者後堂用張禹傳字詳見八卷張子野年八十五詩注晋衛玠傳嘗謂人有不及可以情恕非意相干可以理遣故終身不見喜怒之容和趙郎中見戲公自注趙以徐妓不如東武詩中見戲云只有當時燕子樓燕子人亡三百秋卷一作捲簾那復似揚州西行未必能勝此空唱崔徽上白樓白樂天燕子樓詩序徐州故尚書張建封愛妓曰盻盻張既沒第中有小樓名燕子盻盻念舊愛而不肯嫁居是樓十餘年幽獨塊然卷簾用杜牧之詩已見四卷吉祥寺賞牡丹詩注麗情集元微之崔徽傳云蒲女也裴敬中使蒲徽一見動情不能忍敬中使回徽以不得從為恨久之成疾寫真以寄裴且曰崔徽一旦不及卷中人矣微之為作崔徽歌三國吕布傳魏太祖圍沛布登白門樓圍急乃下降酈道元水經注南門謂之白門我擊藤牀君唱歌明年六十奈君何公自注趙每醉歌畢輒曰明年六十矣醉顛只要􅋔風景莫向人前自洗磨和子由與顔長道同游百步洪相地築亭種桞平明坐衙不暖席歸來閉閣間終日卧聞客至倒屣迎兩眼䝉籠餘睡色城東泗水步可到路轉河洪翻雪白安得青絲絡駿馬蹙踏飛波桞隂下奮身三丈兩蹄間振鬛長鳴身自乾少年狂興久已謝但憶嘉陵繞劍關劍關大道車方軌君自不去歸何難山中故人應大笑築室種桞何時還漢書汲黯傳黯多病卧閣內不出嵗餘東海大治史記張儀傳秦馬之良探前趹後蹄閒三尋騰者不可勝數三國志注劉備乘馬名的盧走墮檀溪中溺不得出備急曰的盧今日死矣可努力乃一踴三文遂得出九域志嘉陵江在果州一說出大散關南行劍門關東向閬中與涪水㑹戰國䇿蘇秦說齊宣王曰亢父之險車不得方軌馬不得並行次韻李邦直感舊騶騎傳呼出跨坊簿書填委入充堂誰教按部如何武只許清樽對孟光婉娩有時來入夢溫柔何日聼還鄉酸寒病守尤堪笑千步空餘僕射場漢東方朔傳注騶奉廄之御也後以為騎謂之騶騎蕭望之傳仲翁出入從倉頭廬兒下車趨門傳呼甚寵王注出而騶騎傳呼則凌跨坊巷入而簿書填委則充滿堂㕔或云跨坊乃籠街之義劉公幹詩職事煩填委文墨紛消散漢書何武傳行部必先即學宫見諸生試其誦論問以得失然後入傳舍出記問墾田頃畝五榖美惡已乃見二千石以為常韓退之詩孤逰懷耿介旅宿夢婉娩趙飛燕外傳成帝見合德曰吾當老此溫柔鄉不復效武皇老白雲鄉也韓贈張僕射詩汴泗交流郡城角斸埸千步平如削與梁先舒煥泛舟得臨釀字二首彭城古戰國孤客倦登臨汴泗交流處清潭百丈深故人輕千里足繭來相尋何以娛佳客潭水洗君心彭城徐州也古大彭氏國自春秋至唐末多戰爭之地漢髙項羽劉裕皆起彭城晋嵇康傳吕安服其髙致每一相思千里命駕戰國䇿蘇秦足重繭日百而舍造外闕願見於前口道天下之事李太白詩君思潁水渌忽復歸嵩岑歸時莫洗耳為我洗君心老守厭簿書先生罷函文風流魏晋閒談笑羲皇上河洪一作洪河忽巳過水色緑可釀君無輕此樂此樂清且放禮記非飲食之客則布席席閒函文鄭氏謂講問之客也王注魏晋閒士尚清談慕逹節視名教吏事為俗又陶淵明自謂羲皇上人次韻答邦直子由四首增收一首公詩案云李清臣寄軾弟轍詩二首批云可求子瞻和軾郤作詩二首和李清臣其內一首首句云五斗塵勞尚足留集中失載此詩今附於後又云軾又用弟轍韻與李清臣六首蓋東坡次韻通為八首集中止有四首今收詩案一首猶逸其三也按所收詩施夲又闕其半無他夲可校姑仍之簿書顛倒夢魂閒知我疏慵肯見原間作閉門僧舍冷病聞吹枕海濤喧忘懷杯酒逢人共引睡文章信手翻欲吐狂言喙三尺怕君嗔我郤須吞公自注邦直屢以此見戒韋應物郡齊詩惟我出塵意賞愛似僧家白樂天詩引睡卧看書莊子徐無鬼丘願有喙三尺朝野僉載陸餘慶為洛州善論事而謬於判事時嘲之曰說事喙長三尺判事手重五斤城南短李好交游箕踞狂歌總自由尊主庇民君有道樂天知命我無憂醉呼妙舞留連夜公自注邦直家中舞者甚多間作清詩斷送秋蕭灑使君殊不俗樽前容我攬鬚不繫辭樂天知命故不憂杜子美詩留連春夜舞攬鬚用桓伊撫筝事三見老弟東來殊寂寞故人留飲慰酸寒草荒城角開新徑雨入河洪失舊灘車馬追陪迹未掃唱酬往復字應漫此詩更欲憑君改待與江南子布看韓退之詩酸寒溧陽尉後漢杜密傳劉勝自蜀郡告歸鄉里閉門掃軌注云軌車迹也後漢禰衡傳初逹頴川隂懷一刺無所之適至刺字漫滅典略余曩聞劉荆州嘗自作書欲與孫伯符以示禰正平正平蚩之言知是為欲使孫䇿帳下兒讀之邪將使張子布見乎君雖為我此遲留别後凄凉我巳憂不見便同千里逺退歸終作十年遊恨無揚子一區宅懶卧元龍百尺樓聞道鵷鴻滿臺閣網羅應不到沙鷗三國志陳登字元龍許汜見先主曰元龍湖海之士豪氣不除昔遭亂過下邳見元龍無客主之意久不相與語自上大牀卧使客卧下牀劉備曰君有國士之名而求田問舍言無可採是元龍所諱也何緣當與君語如我欲卧百尺樓上卧君於地何但上下牀之間邪後漢儒林傳網羅遺逸博存衆家五斗塵勞尚足留閉關郤欲治幽憂羞為毛遂囊中頴龍逢地下遊缺文中子或問劉靈何人也曰古之閉關人也幽憂字出莊子已見前注史記平原君傳秦圍邯鄲平原君求合從於楚取於門下客得十九人有毛遂者自贊備員曰使遂得處囊中乃頴脫而出漢朱雲傳臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問曰誰也對曰安昌侯張禹上大怒御史將雲下雲攀殿檻檻折雲呼曰臣得從龍逢比干遊於地下足矣司馬君實獨樂園青山在屋上流水在屋下中有五畞園花竹秀而野花香襲杖屨竹色侵盞斚樽酒樂餘春棋局消長夏洛陽古多士風俗猶爾雅先生卧不出冠蓋傾洛社雖云與衆樂中有獨樂者才全德不形所貴知我寡先生獨何事四海望陶冶兒童誦君實走卒知司馬持此欲安歸造物不我捨名聲逐吾輩此病天所赭撫掌笑先生年來效喑啞孟浩然符公蘭若詩緑篠夾路旁清泉流舍下桞子厚盩厔縣食堂記青山在前流水在下可以俯仰可以燕樂澠水燕談司馬文正公以髙才全德大得中外之望士大夫識與不識稱之曰君實下至閭閻畎畝匹夫匹婦莫不能道司馬公身退十餘年而天下之人日冀其復用於朝漢蒯通傳足下欲持是安歸乎三國鍾㑹傳謂所親曰我淮南已來畫無遺䇿四海共知持此安歸後漢法真傳友人郭正稱之曰逃名而名我隨避名而名我追王注古者刑人赭衣若莊子天刑之意耳舊注用始皇赭山非是烏臺詩案供此詩言四海蒼生望司馬光執政陶冶天下以譏見任執政不得其人又譏新法處處不便也送顔復兼寄王鞏顔復字長道魯人父名太初字醇之先師兖公四十七世孫號鳧繹先生東坡為叙其文嘉祐中訪遺逸京東以長道應詔試者二十二人復為第一賜進士出身元祐初入為太常博士寖遷二史經筵西掖以病改待制未拜而卒鞏字定國彭城官居冷如水誰從我逰顔氏子我衰且病君亦窮衰窮相守正其理胡為一朝捨我去輕衫觸熱行千里問君無乃求之歟答我不然聊爾耳京師萬事日日新故人如故今有幾君知牛行相君宅扣門但覓王居士清詩草聖俱入妙别後寄我書連紙苦恨相思不相見約我重陽嗅霜蘂君歸可喚與俱來未應指目妨進擬太一老仙間不出公自注張安道為中太一宫使鞏安道壻也踵門問道今時矣因行過我路幾何願君推挽加鞭箠吾儕一醉豈易得買羊釀一作酤酒從今始韓退之贈張籍詩子又捨我去我懷焉所窮牛行鞏大父文正公居牛行街見徐度南窗記史記范雎傳鄭安平言於王稽曰臣里中有張祿先生欲見君言天下事其人有仇不敢晝見王稽曰夜與俱來漢陳勝傳旦日卒中往往指目勝廣舊唐書李珏傳文宗語珏曰竇易直勸我凡宰相進擬五取三三取一韓退之詩買羊酤酒謝不敏蝎虎黃雞啄蝎如啄黍窗閒守宫稱蝎虎暗中繳尾伺飛蟲巧捷功夫在腰膂跂跂脉脉善緣壁陋質從來誰比數今年嵗旱號蜥蜴狂走兒童閙歌舞能銜渠水作冰雹便向蛟龍覓雲雨守宫努力搏蒼蠅明年嵗旱當求汝漢東方朔傳上嘗使諸數家射覆置守宫盂下射之皆不能中朔曰臣以為龍又無角謂之為蛇又有足跂跂脉脉善緣壁是非守宫即蜥蜴假公路北户雜録蝘蜓以器飬之食以丹砂體盡赤搗之以㸃女人支體終身不滅淫則㸃落故號守宫顔師古漢書注亦云揚雄方言在澤中者謂之蜥蜴楊文公談苑魏庠言昔游關中佛寺見沙門有善胡法者置蜥蜴甕中使童男女數十衣青衣同聲呪曰蜥蜴蜥蜴興雲吐霧雨今滂沱放汝歸去嵗旱為之頗有應子由將赴南都與余㑹宿於逍遙堂作兩絶句讀之殆不可為懷因和其詩以自解余觀子由自少曠逹天資近道又得至人飬生長年之訣而余亦竊聞其一二以為今者宦游相别之日淺而異時退休相從之日長既以自解且以慰子由云子由逍遙堂詩序云轍幼從子瞻讀書未嘗一日相舍既壯將遊宦四方讀韋蘇州詩至那知風雨夜復此對牀眠惻然感之乃相約早退為間居之樂故子瞻始為鳳翔幕府留詩為别曰夜雨何時聼蕭瑟其後子瞻通守餘杭復移守膠西而轍滯留於淮陽濟南不見者七年熙寧十年二月始復㑹於澶濮之間相從彭城留百餘日時宿於逍遙堂追感前約為作二小詩其一載首卷與子由别於鄭州西門詩注其一云秋來東閣凉如水客至山公醉似泥困卧北窗呼不醒風吹松竹雨凄凄别期漸近不堪聞風雨蕭蕭巳斷魂猶勝相逢不相識形容變盡語音存李太白通塘曲相逢不相識出沒繞通塘後漢夏馥傳黨錮事起馥自剪須變形隱匿姓名為冶家傭形貌毁瘁人無知者弟靜遇馥不識聞其言聲乃覺而拜之但令朱雀長金花此别還同一轉車五百年閒誰復在㑹看銅狄兩咨嗟隂真君金液還丹歌北方正氣為河車東方甲乙成丹砂兩情合飬歸一體朱雀調護生金花注云朱雀火也後漢薊子訓傳人於長安東霸城見之與一老翁共摩挲銅人相謂曰適見鑄此今已近五百嵗矣留題石經院三首蔥蒨門前路行穿翠密中郤來堂上看巖谷意無窮夭矯庭中檜枯枝鵲踏消瘦皮纒鶴骨髙頂轉龍腰窈窕山頭井潛通伏澗清欲知深幾許聼轉一作放轆轤聲過雲龍山人張天驥郊原雨初足風日清且好病守亦欣然肩輿白門道荒田咽蛩蚓村巷懸梨棗下有幽人居閉門空雀噪西風髙正厲落葉紛可掃孤童卧斜日病馬放秋草墟里通有無垣牆任摧倒君家夲冠蓋絲竹閙鄰保脫身聲利中道德自濯澡躬耕抱羸疾奉飬百嵗老詩書膏吻頰菽水媚翁媪烏老反饑寒天隨子杞菊自擷芼慈孝董邵南雞狗相乳抱吾生如寄耳歸計失不早故山豈敢忘但恐迫華皓從君好一作學種秫斗酒時自一作相勞白門見夲卷和趙郎中見戲詩注顔延年詩仄同幽人居郊扉常晝閉晋陶潛傳躬耕自資遂抱羸疾揚雄方言周晋秦隴謂父曰翁漢髙祖紀母媪注幽州及漢中皆謂老嫗為媪又曰媪女老稱也陸龜䝉杞菊賦序天隨生宅荒前後皆樹以把菊春苖恣肥得以采擷詩國風采采芣苡薄言擷之又參差荇菜左右芼之董邵南事詳十卷蘇州姚氏三瑞堂詩魏明帝樂府人生如寄多憂何為法苑珠林支遁在剡謝安與書云人生如寄耳終日戚戚遲君來以晤言消之種秫用陶潛事注見七卷漢楊惲傳田家作苦嵗時伏臘烹羊炮羔斗酒自勞贈王仲素寺丞公自注名景純飬氣如飬兒棄官如棄泥人皆笑子一作豫拙事定竟誰迷歸耕獨患貧問子一作子何所齎尺宅足自庇寸田有餘畦明珠照短褐陋室生虹霓雖無孔方兄顧有法喜妻彈琴一長嘯不答阮與嵇曹南劉夫子名與子政齊家有鴻寶書不鑄金裊蹄促膝問道要遂䝉分刀圭不忍獨不死尺書肯見梯我生夲强鄙少以氣自擠孤舟倒江河赤手攬象犀年來稍自笑留氣暖下臍苦恨聞道晚意象颯巳凄空見孫思邈區區賦病梨老子專氣致柔能如嬰兒乎醫經欲養兒慎風池黃庭經寸田尺土以治生兩眉閒為上丹田心為絳宫田臍下三寸為下丹田晋魯褒錢神論錢之為體有乾坤之象親之如兄字曰孔方維摩經法喜以為妻慈悲以為女晋孫登傳登好讀易撫一弦琴見者皆親樂之文帝聞之使阮籍往與語不應嵇康又從之游三年問其所圖終不答長嘯即孫登事注見八卷惠山謁錢道人詩劉夫子或云謂劉誼王注先生在惠州時有書與宜翁咨問道要自以杜門屏居胸中廓然實無荆棘有受道之質且曰或有外丹巳成可助梨棗者望不惜分惠其書載毗陵後集一曰劉安世待制字器之曹南人得養生煉丹術公嘗師之漢楚元王傳劉向字子政夲名更生淮南王有枕中鴻寶苑祕書言神仙使鬼物為金之術更生父德治淮南獄得其書更生幼而讀誦以為竒獻之上令典尚方鑄作事方多不驗乃下更生吏漢武帝紀太始二年詔更黃金為麟趾裊蹄韓愈博士李君墓志余自袁州還京師襄陽乘舸邀我於蕭洲屏人曰我得祕藥不可獨不死今遺子一器襄陽孟簡也時為節度使唐盧照鄰得惡疾從孫思邈問養生之道庭前有病梨樹照鄰乃作賦以自悲陽關詞三首王注三詩各自說事意皆可以陽關之聲歌之乃聚為一處標其題曰陽關三絶云受降城下紫髯郎戲馬臺前古戰埸恨君不取契丹首金甲牙旗歸故鄉漢胸奴傳令因杅將軍築受降城唐書朔方總管張仁願於河北築三受降城以絶突厥南寇之路三國張遼問吳降人向有紫髯將軍為誰答曰孫㑹稽又見七卷戲馬臺在彭城南項羽所作蕭子顯齊書武帝為宋公在彭城九日出戲馬臺至今相承以為舊凖唐李華弔古戰場文浩浩乎平沙無垠敻不見人河水縈帶羣山糾紛亭長告余曰此古戰埸也常覆三軍往往鬼哭天隂則聞兵書曰牙旗將軍之旗右贈張繼願濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽關腸斷聲唐地理志齊州濟南郡劉禹錫詩唱得陽關意外聲舊人惟有來嘉榮郗昂樂府解題許永新歌奏慢聲喜者聞之氣勇愁者聞之腸斷右答李公擇李公擇先知湖州自湖移濟南公故以霅溪女戲之暮雲收盡溢清寒銀漢無聲轉玉盤此生此夜不長好明月明年何處看李太白詩小時不識月喚作白玉盤右中秋月和孔周翰二絶再觀邸園留題小園香霧曉䝉籠醉手一作守狂詞未必工魯叟録詩應有取曲收彤管邶鄘風詩國風靜女其孌貽我彤管箋云彤管筆赤管也古者后夫人必有女史事無大小記以成法王注嘗聞髙密老儒之言曰邸氏有賢婦孀居不嫁其節甚髙故公此詩用靜女彤管邶鄘之風也觀净觀堂效韋蘇州詩弱羽巢林在一枝幽人蝸舍兩相宜樂天長短三千首郤愛韋郎五字詩莊子逍遙遊鷦鷯巢於深林不過一枝髙士傳焦先作蝸牛廬呻吟其中注已見前白氏文集記樂天有文集七帙合六十七卷凡三千四百十七首舊唐書白居易與元微之書云韋蘇州歌行清麗之外頗近興調其五言又髙雅閒淡自成一家之體今之秉筆者誰能及之然當蘇州在時人亦未甚愛重必待身死後則愛之京師哭任遵聖任遵聖名孜眉山人二卷有送任伋通判黃州兼寄其兄孜作下篇答任師中即伋也十年不還鄉兒女日夜長豈惟催老大漸復成凋喪每聞耆舊亡涕泫聲輒放老任况竒逸先子推輩行文章得少一作小得譽詩語尤清壯吏能復所長談笑萬夫上自喜作劇縣偏工破豪黨奮髯走猾吏嚼齒對姦將哀哉命不偶每以才得謗竟使落窮山青衫就黃壤宦游久不樂江海永相望退耕夲就君時節相勞餉此懷今不遂歸見纍纍葬望哭國西門落日銜千嶂平生惟一子抱負珠在掌見之齠齔中巳有食牛量他年如入洛生死一相訪惟有王濬冲心知中散狀禮記孔子泫然流涕晋阮籍傳文帝讓九錫公卿將勸進使籍為其辭籍沉醉忘作臨詣府使取之見籍方據桉醉眠使者以告籍便書案使寫之無所改竄辭甚清壯漢灌嬰傳景帝曰魏其沾沾自喜耳晋書袁甫嘗詣何朂自言能為劇縣勗問惟欲宰縣不為臺閣職何也甫曰人各有能與不能奮髯用前漢朱博事注巳見唐書張巡裂眥血面齧齒皆碎潘安仁懷舊賦墳纍纍以接壠柏森森以攢植杜子美詩掌中貪見一珠新韓詩外傳男子八月生齒八嵗而齠齒女子七月生齒七嵗而齔齒尸子虎豹之駒雖未成文已有食牛之氣韓愈别竇司直詩行當挂其冠生死君一訪晋嵇紹中散大夫康之子也紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂如野鶴之在雞羣戎曰君復未見其父爾濬冲戎字答任師中家漢公先君昔未仕杜門皇祐初道德無貧賤風采照鄉閭何嘗疏小人小人自濶疏出門無所詣老史在郊墟門前萬竿竹堂上四庫書髙樹紅消梨小池白芙蕖常呼赤腳婢雨中擷園蔬矯矯任夫子罷官還舊廬是時里中兒始識長者車烹雞酌白酒相對歡有餘有如龎德公往還葛與徐妻子走堂下主人竟誰歟我時年尚幼作賦慕相如侍立看君談精悍實起豫嵗月曽幾何耆老逝不居史侯最先沒孤墳拱桑樗我亦涉萬里清血滿襟袪漂流二十年始悟萬緣虛獨喜任夫子老佩刺史魚威行烏白蠻解辮請冠裾方當入奏事清廟陳璠璵胡為厭軒冕歸意不少紓上蔡有良田黃沙走清渠罷亞百頃稻雍容十年儲閒隨李丞相搏射鹿與豬蒼鷹十斤重猛犬如黃驢豈比陶淵明窮苦自把鋤我今四十二衰髮不滿梳彭城古名郡乏人偶見除頭顱已可知幾何不樵漁㑹當相從去芒鞋老菑畬念子瘴江邉懷抱向誰攄賴我同年友相歡出同輿冰盤薦文鮪公自注鮪鮥也戎瀘常有玉斚傾浮蛆醉中忽思我清詩綴瓊琚知我少詼一作所諧教我時卷舒世事日反覆翩如風中旟雀羅弔廷尉秋扇悲婕妤升沉一何速喜怒紛衆狙作詩謝二子我師寧與蘧王注先君言編禮也皇祐仁宗年號又老史名經字彥輔眉之老儒嘗作思子臺賦公甚稱之唐藝文志兩都各聚書四部以甲乙丙丁為次列經史子集四庫其夲有正副軸帶牙籖皆異色以别之三秦記漢武帝園有大梨如五升瓶落地則碎名含消梨漢陳平傳平家貧門外多長者車轍龎德公事詳十一卷寄題刁景純詩注漢揚雄傳先是司馬相如作賦𢎞麗溫雅雄心壯之每作賦嘗擬之以為式杜子美詩草𤣥吾豈敢賦或似相如漢嚴延年傳為人短小精悍敏捷於事梁益州記雋州其地接諸蠻部有烏蠻白蠻杜子美詩山帶烏蠻濶又烏蠻瘴逺隨漢書終軍傳將有解編髮削左袵襲冠帶要衣裳而䝉化者焉注編讀曰辮逸論語璠璵魯之寶玉也孔子曰美哉逺而望之煥若也近而視之瑟若也罷亞禾名夲作䆉稏巳見七卷注史記李斯傳為秦丞相下吏顧其子曰吾欲與若復牽黃犬俱出上蔡東門逐狡兔豈可得乎又見首卷石鼓詩注按師中嘗為蔡州新息令邑人愛之為買田故用上蔡東門事晋夏侯湛傳與潘嶽友善每出同輿接茵周禮漁人春獻王鮪詩國風投我以木瓜報之以瓊琚雀羅衆狙注竝見前文選趙飛燕姊弟得幸班婕妤失寵作䊵扇曲云常恐秋節至凉飈奪炎熱棄捐篋笥中恩情中道絶寧蘧寧武子蘧伯玉也潘安仁間居賦雖吾顔之云厚猶內愧於寧蘧施注蘇詩卷十二
