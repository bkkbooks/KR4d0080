body:
  text: 施註蘇詩巻二十一宋蘇軾撰施元之原註武進邵長蘅刪補詩五十四首起甲子四月以後離黄州至金陵道中作同年程筠徳林求先墳二詩思成堂詩商頌賚我思成注云神靈來至我致齋之所思則用成宰樹連山谷祠堂照路隅養松無觸鹿助祭有馴烏歸夢先寒食兒啼到白須遙知隣里化醉叟道爭扶公羊傳僖公三十三年秦伯曰若爾之年者宰上之木拱矣注云宰冢也劉禹錫宣明二年碑堂詩千行宰樹荆川道又王思道碑堂詩蒼蒼宰樹起寒煙杜子羙詩蜀相祠堂何處尋唐禇無量傳母喪廬墓左鹿犯所植松柏無量號訴曰山林不乏忍犯吾塋樹耶自是羣鹿馴擾不復棖觸無量為終身不御其肉北史蕭祗傳祗卒子放居䘮以孝聞所居廬前有二慈烏來集毎臨時舒翅悲鳴全似哀泣家人則之未嘗有缺髙士傳老萊子行年七十卧地為小兒嗁欲親之喜歸真亭述異記盧府君墓在館陶銘曰盧府君歸真之室舊笑桓司馬今師鄭大夫不知徂歲月空覺老楸梧祭禮傳家法阡名載版圖會㸔千字誄木杪見龜趺禮記夫子居於宋見桓司馬自為石槨三年而不成夫子曰若是其靡也死不如速朽之愈也晉杜預傳遺令曰密縣邢山上有冢云是鄭大夫祭仲或云子産之冢也居山之頂四望周達東北向新鄭城意不忘本也其隧道空其前示藏無珍寳不取於重深也吾將來兆域儀制取法於鄭大夫欲以儉自完耳漢原渉傳曹氏𦵏茂陵民謂其道曰京兆阡渉慕之遂買地開道立表署曰南陽阡人不肯從謂之原氏阡周禮司會掌國之百物財用凡在書契版圖葉夢得石林詩話學者多議木杪見龜跌為語病謂龜趺不當出木杪殊未之思東南多𦵏山上碑亭往往在半山間則自下視之龜趺出木杪何足怪哉過建昌李野夫公擇故居李野夫名莘公擇之兄嘗為江西轉運副使彭蠡東北源廬阜西南麓何人修水上種此一雙玉思之不可見破宅餘修竹四隣戒莫犯十畝森似束我來仲夏初解籜呈新緑幽鳥向我鳴野人留我宿徘徊不忍去㣲月挂喬木遙想他年歸解組巾一幅對床老兄弟夜雨鳴竹屋卧聴鄰寺鐘書牕有殘燭修水在建昌縣徐鉉搜神記陽公子雍伯嘗設義漿以給行旅經三年有一人就公飲出石子一升與之曰種此可得羙玉并得好婦如言種之後求徐氏婚徐笑曰得白璧一雙乃可公於所種玉田果得玉徐氏乃以女妻之元稹連昌宫詞連昌宫中滿宫竹嵗久無人森似束初入廬山三首青山若無素偃蹇不相親要識廬山面他年是故人公自注山南山靣也自昔懐清賞神遊杳藹間如今不是夢真箇是廬山芒鞵青竹杖自挂百錢遊可怪深山裏人人識故侯先生詩話僕初入廬山山谷竒秀平日所未見殆應接不睱遂發意不欲作詩巳而見山中僧俗皆云蘇子瞻來矣不覺作一絶曰芒鞵青竹杖云云既而哂前言之為謬復作兩絶句青山若無素云云按詩話則今第三篇首篇矣晉阮修傳嘗以百錢挂杖頭至酒店便獨酣暢故侯注再見圓通禪院先君舊遊也四月二十日晩至宿焉明日忌日也乃手寫寳積獻盖頌佛一偈以贈長老仙公仙撫掌笑曰昨夜夢寳盖飛下著處輙出火豈此祥乎乃作是詩院有蜀僧宣逮事訥長老識先君云石耳峰頭路接天梵音堂下月臨泉此生初飲廬山水他日徒參雪竇襌袖裏寳書猶未出夢中飛盖已先傳何人更識嵇中散野鶴昻藏未是仙傳燈録雪竇師諱重顯遂州李氏子出家參隨州智門祚和尚悟不起一念之㫖後居四明之雪竇有雪竇禪師語錄野鶴用晉嵇紹事注巳見子由在筠作東軒記或戲之為東軒長老其壻曹煥往筠余作一絶句送曹以戲子由曹過廬山以示圓通慎長老慎欣然亦作一絶送客出門歸入室趺坐化去子由聞之仍作二絶一以答余一以答慎明年余過圓通始得其詳乃追次慎韻君到髙安幾日囬一時斗藪舊塵埃贈君一籠牢収取盛取東軒長老來九州志筠州治髙安縣白樂天詩斗藪塵埃衣禮拜氷雪顔右送曹詩大士何曾有生死小儒底處覓窮通偶留一吷千山上散作人間萬竅風右和慎詩余過温泉壁上有詩云直待衆生總無垢我方清冷混常流問人云長老可遵作遵巳退居圓通亦作一絶石龍有口口無根自在流泉誰吐吞若信衆生本無垢此泉何處覓寒温先生詩話載遵師篇云禪庭誰作石龍頭龍口湯泉沸不休其下句即序中所載世傳徐凝瀑布詩云一條界破青山色至為塵陋又偽作樂天詩稱羨此句有賽不得之語樂天雖渉淺易然豈至是哉乃戲作一絶帝遣銀河一𣲖垂古來惟有謫仙詞飛流濺沫知多少不與徐凝洗惡詩李白廬山瀑布詩飛流直下三千尺疑是銀河落九天書李公擇白石山房偶尋流水上崔嵬五老蒼顔一笑開若見謫仙煩寄語匡山頭白早歸來廬山記棲賢寺東北有五老峯廬山之勝此為最者李太白詩廬山東南五老峯青天削出金芙蓉杜子羙詩匡山讀書處頭白好歸來贈東林總長老廬山在江州南三十里東林又在山南五里晉道逺所居䂓制廣袤水石深怪古迹無窮西林即永法師所居規制稍不及東林元豐三年詔革江州東林律居為禪席觀文殿學士王公詔出守南昌欲延寳覺禪師寳舉常總自代總知之宵遁去王公檄諸郡求訪得之新淦深山中遂應命其徒相語曰逺公嘗有䜟記云吾滅七百年後有肉身大士革居道塲今符其語矣事見僧寳傳溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人阿彌陁經出廣長舌相遍覆三千大千世界楞嚴經等八萬四千清淨寳日八萬四千爍迦羅首八萬四千母陁羅臂皆記佛法門之數法華經世尊見大神力出廣長舌清淨法身佛言三身法身者清淨無相之身也化身者受生示現之身也報身者功徳莊嚴之身也題西林壁横㸔成嶺側成峯逺近髙低各不同一作無一同不識廬山真面目只緣身在此山中華嚴經於一塵中大小刹種種差别如塵數平坦髙下各不同佛悉往詣各轉法輪廬山二勝并引余逰廬山南北得十五六竒勝殆不可勝紀而懶不作詩獨擇其尤佳者作二首開先潄玉亭廬山記山中瀑布十餘處香爐峯與雙劒峯在瀑布旁水源在五老峯頂西入康王谷為水簾東為開先之瀑布髙巖下赤日深谷來悲風擘開青玉峽飛出兩白龍亂沬㪚霜雪古潭搖清空餘流滑無聲快瀉雙石谼我來不忍去月出飛橋東蕩蕩白銀闕沈沈水精宫願隨琴髙生脚踏赤鯶公手持白芙渠跳下清泠中陸士衡詩頓轡倚髙嵓側聴悲風響述征記華山首陽本一山巨靈擘開以通河流唐韻谼大壑也漢郊祀歌天門開詄蕩蕩史記封禪書海中三神山其物禽獸盡白而金銀為宫闕述異記呉王闔閭搆水晶宫楊漢公吴興詩溪上玉樓樓上月清光合作水晶宫列仙傳琴髙趙人也以鼓琴為樂康王舍人浮㳺冀州涿郡間二百餘年後辭入涿水中取龍子與弟子期至日皆潔齋候水傍設祠屋果乘赤鯉來祠中留一月餘復入水去酉陽雜爼唐律捕得鯉即放號赤鯶公輒殺者杖八十以䜟言鯉為李也莊子讓王舜以天下讓其友北人無擇無擇因自投於清泠之淵栖賢三峽橋子由棲賢僧堂記元豐三年余過廬山入栖賢谷谷中多大石岌嶪相倚水行石間其聲如雷霆又如千乘車行者震掉不能自持雖三峽之險不過也故橋曰三峽吾聞太山石積日穿綫溜况此百雷霆萬世與石鬭深行九地底嶮出三峽右長輸不盡谿欲滿無底竇跳波翻潛魚震響落飛狖清寒入山骨草木盡堅瘦空濛煙靄間澒洞金石奏彎彎飛橋出㶑㶑半月彀玉淵神龍近雨雹亂晴晝垂缾得清甘可嚥不可潄漢枚乘傳太山之霤穿石單極之䋁斷幹水非石之鑽索非木之鋸漸靡使之然也孫子善守者藏於九地之下三峽瞿塘巫山黄牛也列子渤海之東有大壑焉為無底之谷名曰歸墟白樂天詩巖㠋無撮土樹木多瘦堅杜子羙詩青㝠連澒洞左思吴都賦不窺玉淵者未知驪龍之所蟠也按三峽橋上流有玉淵潭陶驥子駿佚老堂文舉與元禮尚得稱世舊淵明吾所師夫子乃其後挂冠不待年亦豈為五斗我歌歸來引公自注余增損淵明歸去來以就聲律謂之歸來引千載信尚友相逢黄巻中何似一杯酒君醉我且歸明朝許來否後漢孔融傳年十嵗詣李膺融白我是李君通家子弟膺問髙祖父甞與僕有恩舊乎融曰先君孔子與君先人李老君同徳比義而相師友則融與君累世通家融字文舉膺字元禮陶潛傳我醉欲眠卿可去此詩乃用其語意我從廬山來目送孤飛雲路逢陸道士知是千嵗人試問當時友虎谿巳埃塵似聞佚老堂知是幾世孫能為五字詩仍戴漉酒巾人呼小靖節自號葛天民廬山記逺公十八賢同修浄土結白蓮社山有虎谿逺師送客過此虎輒號鳴嘗與陶淵明陸修静道士語不覺過虎谿因相與大笑再見陶潛五栁先生傳酣暢賦詩以樂其志無懐氏之民歟葛天氏之民歟漉酒即用陶潛事巳見和李太白并引李太白有潯陽紫極宫感秋詩紫極宫今天慶觀也道士胡洞微以石本示余盖其師卓玘之所刻玘有道術節義過人今亡矣太白詩云四十九年非一徃不可復今余亦四十九感之次其韻玊芝一名瓊田草洞微種之七八年矣云更數年可食許以遺余故并記之寄卧虛寂堂月明浸疎竹冷然洗我心欲飲不可掬流光發永歎自惜非余獨行年四十九還此北牕宿緬懐卓道人白首寓醫卜謫仙固逺矣此士亦難復世道如奕棋變化不容覆惟應玉芝老待得蟠桃熟史記日者傳賈誼曰吾聞古之聖人不居朝廷必在醫卜之中三國王粲傳觀人圍碁局壊粲為覆之碁者不信以帕盖局使更以他局為之用相比較不誤一道蟠桃出度索山注巳見次韻道潛留别參寥從先生於黄期年先生移汝同游廬山乃還於潛山中為聞廬岳多眞隠故就髙人斷宿攀巳喜禪心無别語尚嫌剃髪有詩斑異同更莫疑三語物我終當付八還到後與君開北户舉頭三十六青山維摩經云何斷攀緣以無所得唐僧詩髪為作詩斑晋阮瞻傳王戎問曰聖人貴名教老荘明自然其㫖同異瞻曰将無同戎咨嗟良久即命辟之時謂之三語掾楞嚴經佛告阿難汝咸㸔此諸變化相吾今還本所因處云何本因此諸變化明還日輪暗還黒月通還户牖壅還牆宇緣還分别頑虛還空欎𡋯還塵清明還霽則諸世間一切所有不出斯類汝見八種見精明性當欲誰還岐亭五首并引元豐三年正月余始謫黄州至岐亭北二十五里山上有白馬青盖來迎者則余故人陳慥季常也為留五日賦詩一篇而去明年正月復往見之季常使人勞余於中塗余久不殺恐季常之為余殺也則以前韻作詩為殺戒以遺季常自爾不復殺而岐亭之人多化之有不食肉者其後數往見之往必作詩詩必以前韻凡余在黄四年三往見季常季常七來見余盖相從百餘日也七年四月余量移汝州自江淮徂雒送者皆止慈湖而季常獨至九江乃復用前韻通為五首以贈之昨日雲隂重東風融雪汁逺林草木暗近舎煙火濕下有隠君子嘯歌方自得知我犯寒來呼酒意頗急撫掌動鄰里遶村捉鵝鴨房櫳鏘器聲蔬果照巾羃久聞蔞蒿羙初見新芽赤洗盞酌鵝黄磨刀削熊白須臾我徑醉坐睡落巾幘醒時夜向闌唧唧銅缾泣黄州豈云逺但恐朋友缺我當安所主君亦無此客朝來静菴中惟見峰巒集杜子美成都草堂詩不教鵝鴨惱比鄰周禮天官羃人掌共巾羃説苑齊景公坐睡而夢五大夫晋庾凱傳頽然而醉幘墮几上杜子美龍門鎮詩古鎭峰巒集我哀籃中蛤閉口䕶殘汁又哀網中魚開口吐微濕刳腸彼交病過分我何得相逢未寒温相勸此最急不見盧懐愼烝壺似烝鴨坐客皆忍笑髠然發其羃不見王武子每食刀几赤琉璃載烝㹠中有人乳白盧公信寒陋衰髪得滿幘武子雖豪華未死神巳泣先生萬金璧䕶此一蟻缺一年如一夢百嵗眞過客君無廢此篇嚴詩編杜集莊子大宗師魚相呴以濕相濡以沫不如相忘於江湖又外物篇神龜知能七十二鑽而無遺筴不能避刳腸之患晉王獻之傳與徽之操之俱詣謝安二兄多言俗事獻之寒温而已烝壺詳見十九巻蜜酒詩注按盧氏雜説是鄭餘慶事而公詩指為盧懐愼豈懐慎事同此而别有出處耶當考晉王濟傳字武子性豪侈麗服玉食武帝幸其宅供饌悉貯琉璃器烝㹠甚美帝問之答曰以人乳蒸㹠帝色甚不平食未畢而去按濟死年四十六嵗新舊唐書並不載懐慎年夀惟鄭餘慶則云死年七十六也黄庭經長生至慎房中急何謂死作令神泣抱朴子以蟻鼻之缺損無價之純鈎李白桃李園序天地者萬物之逆旅也光隂者百代之過客也又擬古詩生者為過客死者為歸人嚴詩指嚴武也杜子美集中有嚴武詩數篇君家蜂作窠嵗嵗添漆汁我身牛穿鼻巻舌聊自濕二年三過君此行真得得爱君似劇孟扣門知緩急家有紅頰兒能唱綠頭鴨行當隔簾見花霧輕羃羃為我取黄封親拆官泥赤仍須煩素手自㸃葉家白樂哉無一事十年不蓄幘閉門㺯添丁哇一作談笑雜呱泣西方正苦戰誰補将帥缺披圖見八陣合散更平聲主客不須親戎行坐論教君集荘子秋水牛馬四足是謂天落馬首穿牛鼻是謂人漢書袁盎傳洛陽劇孟嘗過盎盎善待之安陵富人有謂盎曰劇孟博徒将軍何自通之盎曰緩急人所有夫一旦扣門不以親為解不以在亡為辭天下所望者惟季心劇孟今公陽從數騎一旦有緩急寜足恃乎韓退之晚秋聨句青娥翳長袖紅頰吹鳴籥綠頭鴨曲名南史夏侯亶有数十妓妾並無被服姿容每有客常隔簾奏伎黄封京師官法酒以黄紙或黄羅絹封羃缾口名黄封酒茶錄建州葉氏多茶山每嵗貢焉三國志蜀諸葛亮演兵法作八陣圖咸得其要云老子用兵有云吾不敢為主而為客唐侯君集傳始太宗命李靖教君集兵法既而奏靖且反兵之隠微不以示臣帝以譲靖曰方中原無事臣之所教足以制四夷而求盡臣術此君集欲反耳酸酒如虀湯甜酒如蜜汁三年黄州城飲酒但飲濕我如更揀擇一醉豈易得幾思壓茅柴禁網日夜急西隣推罋盎醉倒豬與鴨君家大如掌破屋無遮羃何從得此酒冷面妬君赤定應好事人千石供李白為君三日醉蓬髪不暇幘夜深欲逾垣臥想春罋泣君奴亦笑我鬢齒行秃缺三年巳四至嵗嵗遭惡客人生幾兩屐莫厭頻來集茅柴乃村落所醸醨薄酒也又黄州人造私酒俗謂之壓茅柴漢循吏傳序禁網疎㶄詩意謂酒禁嚴也漢趙廣漢傳為京兆尹至霍禹第搜索私屠酤推破盧罌韓退之寄盧仝詩玊川先生洛城裏破屋數間而已矣俗諺有無錢吃酒妬人面赤之語好事用楊雄傳語巳見陶淵明飲酒詩時賴好事人載醪袪所惑李太白贈韋南陵詩愁來飲酒二千石寒灰重暖生陽春山翁醉後能騎馬别是風流賢主人王注春罋泣以言酒熟而泣泣然也夜深逾垣似暗使畢卓傳比舍郎酒熟夜至其罋間盗取意枯松强鑽膏槁竹欲瀝汁兩窮相值遇相哀莫相濕不知我與君交游竟何得心法幸相語頭然未為急願為穿雲鶻莫作将鶵鴨我行及初夏煮酒暎疎羃故鄉在何許西望千山赤兹遊定安歸東泛萬頃白一歡寜復再起舞花墮幘将行出苦語不用兒女泣吾非固多矣君豈無一缺各念别時言閉户謝衆客空堂浄掃地虛白道所集梵網經序當求精進如救頭然但念無常慎勿放逸杜子美光祿坂詩西望千山萬山赤後漢來歙傳謂蓋延曰呼巨卿欲相属以軍事而反効兒女子涕泣乎史記申公傳公歸魯終身不出門復謝賔客荘子人間世虛室生白宇泰定者發乎天光又曰惟道集虛郭祥正家醉畫竹石壁上郭作詩為謝且遺二古銅劍郭祥正字功父當塗人空腸得酒芒角出肝肺槎牙生竹石森然欲作不可回吐向君家雪色壁平生好詩仍好畫書牆涴壁長遭罵不瞋不罵喜有餘世間誰復如君者一雙銅劍秋水光兩首新詩争劍鋩劍在牀頭詩在手不知誰作蛟龍吼漢律歴志角觸也物觸地而出戴芒角也劉禹錫詩小兒㺯筆不能瞋涴壁書牕且賞勤杜子美相從歌酒酣擊劍蛟龍吼龍尾硯歌并引余舊作鳳咮石硯銘其畧云蘇子一見名鳳咮坐令龍尾羞牛後巳而求硯於歙歙人云子自有鳳咮何以此為盖不能平也奉議郎方君彦德有龍尾大硯竒甚謂余若能作詩少解前語者當奉餉乃作此詩按先生集載鳳咮硯銘有三其銘序云北苑龍焙山如翔鳳平飲之状當其咮有石蒼黑而玉色熙寜中太原王頥以為硯余銘之曰鳳咮又延平志考異云延平硯材産斫﨑者為上東坡得之喜甚遽目為鳳咮又云硯﨑石在劍浦縣東三十里東坡取名鳳咮者此也黄琮白琥天不惜顧恐貪夫死懐璧君㸔龍尾豈石材玉徳金聲寓於石與天作石來幾時與人作硯初不詞辭同詩成鮑謝石何與筆落鍾王硯不知錦茵玊匣俱塵垢𢷬練支牀亦何有况瞋蘇子鳳咮銘戲語相嘲作牛後碧天照水風吹雲明牕大几清無塵我生天地一閑物蘇子亦是支離人麤言細語都不擇春蚓秋虵隨意畫願從蘇子老東坡仁者不用生分别周禮以黄琮禮地以白琥禮西方左傳桓十年虞叔有玊虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懐璧其罪吾焉用此具以賈害也乃獻之杜子美遣興詩賦詩何必多徃徃凌鮑謝法書苑羊欣云鍾繇行書亦二王之亞又徐浩論書云鍾善眞書右軍行法小令破體皆一時之妙蔡希綜法書論云八體之極是歸乎鍾蔡草𨽻之雄是歸乎張王此四賢者自数百載來未之逮也集古錄有𢷬練石記杜子美詩支怵錦石圓史記蘇秦傳諺曰寜為鷄口無為牛後今四面交臂而臣事秦何異牛後乎荘子人間世支離其形者猶足以養其身終其天年况支離其德者乎大毗婆娑論麤言及細語皆歸第一義維摩經天女言華無所分别仁者自生分别耳張近幾仲有龍尾子石硯以銅劍易之張近幾仲開封人我家銅劍如赤虵君家石硯蒼璧橢而䨟君持我劍向何許大明宫裏玉佩鳴衝牙我得君硯亦安用雪堂牕下爾雅箋蟲鰕二物與人初不異飄落髙下隨風花蒯緱玊具皆外物視草草𤣥無等差君不見秦趙城易璧指圖睨柱相矜誇又不見二生妾換馬驕鳴啜泣思其家不如無情兩相與永以為好譬之桃李與瓊華周禮以蒼璧禮天漢食貨志復小橢之注云橢圓而長也韓退之酬盧給事詩大明宫中給事歸禮記凡帯必有佩玉佩玉有衝牙韓退之讀皇甫湜園池詩爾雅注蟲魚定非磊落人南史范縝對竞陵王子良曰人生如樹花同發随風而墮有拂簾幌墜於茵席之上有闢籬牆落於糞溷之中墮茵席者殿下是也落糞溷者下官是也史記馮驩有一劍又蒯緱漢書單于朝甘泉宫賜以玊具劍並巳見漢淮南王安傳淮南王安善為文詞帝每為報書及賜嘗召司馬相如等視草翰林志𤣥宗召張説等入禁中謂之翰林待詔或詔從中出雖宸翰所揮亦資其檢討謂之視草漢揚雄草太𤣥有以自守泊如也史記藺相如傳秦昭王以十五城請易趙和氏璧趙遣相如奉璧入秦相如視秦王無意償趙城持璧睨柱欲擊秦王恐其破璧乃謝之召有司案圖指從此以徃十五都予趙李玫異聞實錄酒徒鮑生多畜聲妓外弟韋生好乘駿馬一日相遇既飲酒乃以女妓善四絃者換紫赤掇忽有二人造席便以妾換馬作題聯賦折亭下舊葉書之四韻訖而葉盡韋生取紅箋獻之二公曰幽顕路殊何見逼之甚言訖行十餘歩而失二客自稱江淹謝荘鮑既以妾換馬妾歌曰風颭荷珠難暫圓多生信有短因緣西樓今夜三更月還照離人泣斷絃纂異記亦云詩國風有女仳離啜其泣矣又匪報也永以為好也張作詩送硯反劍乃和其詩卒以劍歸之贈君長鋏君當歌每食無魚歎委蛇一朝得見暴公子櫑具欲與冠争峩豈比杜陵貧病叟終日長鑱隨短簑斬蛟刺虎老無力帶牛佩犢吏所訶故将換硯豈無意恐君琱琢傷天和作詩反劍亦何謂知君欲以詩相磨報章苦恨無好語試向君硯求餘波詩成劍往硯應笑那将屋漏供懸河委蛇用毛詩字音徒何反漢雋不疑傳暴勝之為直指使者至渤海聞不疑賢請與相見不疑冠進賢冠帶櫑具劍盛服上謁曰竊伏海瀕聞暴公子威名舊矣杜同谷縣歌長鑱長鑱白木柄又短衣数挽不掩脛晋鄧遐傳黽水有蛟為人害遐㧞劍入水斬之漢李廣傳上召禹使刺虎禹從落中以劍斫絶纍上壮之詩小雅雖則七㐮不成報章唐王勃傳張説評楊炯曰文如懸河酌之不竭去嵗九月二十七日黄州生子遯小名幹兒頎然頴異至今年七月二十八日病亡於金陵作二詩哭之吾年四十九羈旅失㓜子㓜子真吾兒眉角生巳似未期觀所好蹁躚逐書史摇頭卻梨栗似識非分耻吾老常鮮歡頼此一笑喜忽然遭奪去惡業我累爾衣薪那免俗變滅湏臾耳歸來懐抱空老淚如瀉水陶淵明責子詩通子垂九齡但覓梨與栗易經厚衣之以薪𦵏之中野晉王衍傳衍䘮㓜子悲不自勝山簡曰孩抱中物何至於此衍曰情之所鍾正在我輩我淚猶可拭日逺當日忘母哭不可聞欲與汝俱亡故衣尚懸架漲乳巳流牀感此欲忘生一臥終日僵中年沗聞道夢幻講巳詳儲藥如邱山臨病更求方仍将恩愛刃割此衰老膓知迷欲自反一慟送餘傷晋謝安傳但使自今以徃日忘日去韓退之杜君墓銘事之在人日逺日忘葉濤致逺見和二詩復次其韻公自注濤顛倒元韻平生無一女誰復嘆耳耳滯留生此兒足慰周南史那知非真實造物聊戲爾煩惱初無根恩愛為種子煩公為假説反復相指似欲除苦海浪先乾愛河水棄置一寸鱗悠然笑侯喜為公寫餘習缾罍一時恥三國崔琰傳太祖為魏王楊訓發表稱贊功伐琰與訓書省表亊佳耳時乎時乎㑹當有變時有白琰此書傲世怨謗者太祖怒曰諺言生女耳耳非佳語㑹當有變時意指不遜於是罰琰為徒𨽻漢司馬遷傳太史公留滯周南不得與從事白樂天自覺詩不将恩爱子更種憂悲根昇𤣥經漂浪愛河流吹慾海韓退之贈侯喜詩吾黨侯生字叔起呼我持竿釣温水舉竿引線忽有得一寸纔分鱗與鬐聞公少巳悟拄杖久倚床笑我老而癡負鼓欲求亡庶幾東門子柱史安敢望嗜毒戲猛獸慮患先不詳囊破虵巳走尚未省齧傷妙哉兩篇詩洗我千結腸黠蠶不作蠒未老輙自僵永謝湯火厄冷然超無方荘子天運篇孔子見老耼而語仁義老耼曰吾子亦放風而動總徳而立矣又奚傑然若負建鼓而求亡子者耶列子力命篇魏有東門呉者子死而不憂曰吾嘗無子無子之時不憂今子死乃與向無子同臣奚憂焉枚乘賦越女侍前齊姬奉後此甘餐毒藥戲猛獸之爪牙朝野僉載王顯與文皇有舊常戲顯曰抵死不作蠒及文皇登極因奏曰今日得作蠒耶帝笑曰卿無貴相朕非為卿惜也曰朝貴夕死足矣帝與三品服其夜卒次荆公韻四絶青李扶疎禽自來清真逸少手親栽深紅淺紫從争發雪白鵝黄也鬬開尚書故實王内史帖中有與蜀郡守書求來禽青李日給藤子來禽言味甘來衆禽也俗作林檎晋王羲之字逸少李太白詩右軍本清真瀟灑在風塵斫竹穿花破綠苔小詩端為覓榿栽細㸔造物初無物春到江南花自開杜子美有貽何十少府詩覓榿栽郭象南華眞經序荘生上知造物無物下知有物之自造也騎驢渺渺入荒陂想見先生未病時勸我試求三畆宅從公巳覺十年遲東軒雜錄王荆公築第於金陵白下門外七里去蒋山亦七里平日乘一驢從數童游諸山寺甲第非真有閑花亦偶栽聊為清浄供卻對道人開公自注荆公病後捨宅作寺漢田蚡傳治宅甲諸第顔師古曰言為諸第之最也以甲乙之次言甲則為上矣霍光傳孝宣帝詔賜甲第一區張庖民挽辭張庖民字翔父金陵人元豐五年卒於曹溪東晉巾車令西京執㦸郎甘心向山水結髪事文章故自輕千户何曽羡一嚢天髙鬼神惡骨朽姓名芳庾嶺銘旌暗秦淮舊宅荒吾詩不用刻妙語有黄香公自注黄魯直為庖民作哀辭晋陶潛為彭澤令賦歸去來辭云或命巾車漢東方朔傳官不過侍郎位不過執㦸曹子建與楊徳祖書揚子雲先朝執㦸之臣耳東方朔傳侏儒長三尺餘奉一嚢粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十侏儒飽欲死臣朔飢欲死後漢趙壹傳文章雖滿腹不如一嚢錢韓退之感春詩天公髙居鬼神惡曹大家東征賦惟令德為不朽兮身既歿而名存晋桓溫傳嘗曰既不流芳後世不足復遺臭萬載耶裴氏廣州記五嶺一曰大庾許嵩建康實錄秦始皇三十七年東巡自江乗渡望氣者云五百年後金陵有天子氣因鑿鍾阜斷金陵長隴以流至今呼為秦淮次韻葉致逺見贈葉致逺名濤處州龍泉人舉進士始從王介甫學為文詞哲宗立擢掌外制是時貶削元祐正人一時誥命林希首當其任用以致身二府濤復効尤奮筆醜詆士論鄙之欲求五畆寄樵蘇所至遲留似賈胡信命不須歌去汝逄人未免嘆猶吾人皆勸我杯中物我獨憐君屋上烏一伎文章何足道要言一作知摩詰是文殊馬援傳耿舒與兄弇書曰伏波類西域賈胡到一處輒止詩國風逝将去汝適彼樂國猶吾用論語字太公六韜爱其人者爱及屋上之烏憎其人者惡其餘胥維摩經文殊師利維摩詰二士共談必説妙法維摩詰黙然無言次韻杭人裴維甫餘杭門外葉飛秋尚記居人挽去舟一别臨平山上塔五年雲夢澤南州凄凉楚些緣吾發邂逅秦淮為子留寄謝西湖舊風月故應時許夢中遊杭州圖經臨平山在州西北六十里次韻段縫見贈段縫字約之居金陵季子東周負郭田須知力穡是家傳細思種薤五十本大勝取禾三百廛若得與君連北巷故應終老忘西川短衣匹馬非吾事只擬闗門不問天漢龔遂傳為渤海太守令民口種一樹榆百本薤五十本蔥一畦韮按百本薤當作句五十本乃葸公一時誤記耳詩國風不稼不穡胡取禾三百廛兮杜子美贈畢曜詩我居巷南子巷北九域志成都府劍南西川節度杜子美曲江詩自斷此生休問天又短衣匹馬随李廣㸔射猛虎終殘年題孫思邈眞先生一去五百載猶在峨眉西崦中自為天仙足官府不應尸解坐蝱蟲杜陽編明皇西幸夢一叟再拜於前曰臣孫思邈也廬於峨眉山有年矣今聞鑾駕成都故來候謁云云杜子美有赤谷西崦人家詩韓退之張十八詩上界真人足官府豈如散仙鞭笞鸞鳳終日相追陪仙傳拾遺孫思邈有神仙降謂之曰爾所著千金方濟人之功巳廣而以物命為藥害物亦多必為尸解之仙不得白日輕舉矣思邈乃取草木之藥以代蟲蝱之命戲作鮰魚一絶粉紅石首仍無骨雪白河㹠不藥人寄語天公與河伯何妨乞與水精鱗石首魚名其頭骨乃石也蘇州圖經云飬魚城下水中有石首魚梅聖俞河豚詩烹調茍失所入喉為鏌邪酉陽雜爼天公姓張名堅漁陽人乗白龍振䇿登天抱朴子釋鬼篇馮夷以八月上庚日渡河溺死天帝署為河伯同王勝之游蒋山王勝之名益柔河南人用䕃入官范文正公未識面以館閣薦之除集賢校理預蘇子美奏邸㑹作傲歌中司與近臣合攻之言其當誅韓忠獻為仁宗言少年狂語何足深治天下大事不少而獨攻一王益柔此其意不在傲歌也帝感悟但黜監復州酒後歴知制誥直學士院連守大郡至江寕纔一日移南都故詩云到郡席不暖居民空惘然坡偕勝之過儀真再和此詩介甫時居金陵数與坡遊嘆息謂人曰不知更幾百年方有如此人物既賦此詩介甫亟取讀至峰多巧障日江逺欲浮天乃撫几曰老夫平生作詩無此一句到郡席不暖居民空惘然好山無十里遺恨恐他年欲欵南朝寺同登北郭船朱門収畫㦸紺宇出青蓮公自注荆公以宅為寺夾路蒼髥古迎人翠麓偏龍腰蟠故國鳥爪寄曽巔竹杪飛華屋松根泫細泉峰多巧障日江逺欲浮天畧彴横秋水浮屠挿暮煙歸來踏人影雲細月娟娟後漢黄憲傳戴良見憲歸惘然若有失也庾仲雍九江記建鄴宫城孫權所築昔諸葛亮勸都之去鍾山龍蟠石頭虎踞有王者氣權從之髙僧傳誌公生於鷹窠手類鳥爪死𦵏此山上木𤣥虛海賦浟湙瀲灔浮天無岸再見至真州再和二首王勝之是時年七十二東坡纔四十九故云話舊巳忘年勝之至南都未幾而卒老手王摩詰窮交孟浩然論詩曽伴直話舊巳忘年北上難陪驥東行且趁船離亭花映肉醉眼鷺窺蓮柂轉三山沒風囬五兩偏荒祠過𤓰歩古甃墮松巔聞道清香閣新篘白玉泉莫教門掩夜坐待月流天小院檀槽閙空庭樺燭煙公詩便堪唱為付小嬋娟世説賀司空入洛經呉閶門在船中彈琴張季鷹本不相識聞絃甚清下船就賀因共語便大相知説問賀卿欲何之賀曰入洛赴命正爾進路張曰吾亦有事北京因路寄載便與賀同發初不告家家追問廼知蘅按公詩北上難陪驥東行且趁船盖借此事而翻用之也賀名循季鷹張翰字杜牧晩晴賦忽八九之紅芰姹然如婦斂然如女白鷺潛來兮邈風標之公子窺此美人兮如慕悦其容媚李白鳳凰䑓詩三山半落青天外二水中分白鷺洲北堂書鈔候風之羽楚人謂之五兩郭璞江賦覘五兩之動静李善注引兵書曰凡候風法以雞羽重八兩建五丈旗取羽繫其巔立軍營中圖經揚州江都縣有𤓰歩鎮韋應物蘇州郡齋詩兵衛森畫㦸宴寝凝清香再見白樂天嘗酒詩一甕香醪新挿篘公顔如雪柏千載故依然笑我無根栁空中不待年肎留歸闕斾坐待逆風船特許門傳籥一作鑰那知箭起蓮相逢月上後小語坐西偏流落千帆側追思百尺巔躬耕懐谷口水石羡平泉茅屋歸元亮霓裳醉樂天行聞宣室召歸近御爐煙未用歌池上隨宜教李娟門籥謂門筦鑰箭蓮謂蓮花漏也世説支道林語王逸少曰貧道與君小語韓退之庭楸詩朝日出其東吾嘗坐西偏劉夢得詩沉舟側畔千帆過病樹前頭萬水春揚子谷口鄭子真不屈其志耕乎巖谷之下賈氏談錄李徳裕平泉荘周回四十里天下竒花異草珍松怪石靡不畢置其間陶淵明詩草屋八九間白樂天醉吟先生傳若興發命家僮調法部絲竹合奏霓裳羽衣一曲放情自娱茗艼而後已漢賈誼傳文帝思誼徵之至入見宣室注宣室未央前正室也白樂天和微之歌李娟張態君莫嫌亦擬随宜且教取注娟態蘇之妓女也又樂天有池上篇次韻答寳覺芒鞵竹杖布行纒遮莫千山更萬山從来無脚不解滑誰信石頭行路難傳燈錄鄧隠峯辭馬祖問何處去對云石頭去師云石頭路滑石頭即希遷也為青原思下第二世號石頭遷眉子石硯歌贈胡誾君不見成都畫手開十眉横雲卻月争新竒游人指㸃小嚬處中有漁陽胡馬嘶又不見王孫青瑣横䨇碧腸斷浮空逺山色書生性命何足論坐費千金買消渴爾來䘮亂愁天公謫向君家書硯中小牕虛幌相嫵媚令君曉夢生春紅毗耶居士談空處結習巳空花不住試教天女為磨鉛千偈瀾翻無一語川畫十眉圖序蛾眉翠黛卧蠶捧心偃月復月筯㸃栁葉逺山八字是為十眉成都古今集記明皇御容院有宋藝畫美人侍明皇翠眉十種世多傳寫以為贈玩晉賈充傳每讌賔僚其女輒於青瑣中窺之西京雜記文君姣好眉目如望逺山為人放誕故悦長卿而越禮焉長卿素有消渴疾悦文君色遂發痼疾又揚雄懐鉛提槧從計吏訪四方語作方言韓退之詩挈攜陬維口瀾翻以玉帯施元長老元以衲帬相報次韻二首病骨難堪玉帶圍鈍根仍落箭鋒機欲教乞食歌姬院故與雲山舊衲衣傳燈錄禪宗有函盖箭鋒語北夢瑣言韓熈載披毳衲於歌姬院持鉢乞食曰不為俗情所染可以説法度人此帶閲人如傳舍流傳到我亦悠哉錦袍錯落真相稱乞與佯狂老萬回舊唐書萬回法雲公閿鄉人姓張氏㓜時笑傲若狂鄉黨莫測出入公卿間常披錦袍譚賔錄兩京記並云開天傳信記萬回兄戍安西常往省視一日徃返萬里故號萬回次韻滕元發許仲途秦少游二公詩格老彌新醉後狂吟許野人坐㸔青丘吞澤芥自慙黄潦薦谿蘋兩邦旌纛光相照十畆鋤犁手自親何似秦郎妙天下明年獻頌請東巡司馬相如子虛賦秋田乎青丘彷徨乎海外吞雲夢者八九其於胷中曽不蔕芥屡見漢書賈捐之字君房楊興曰君房下筆言語妙天下後漢馬融傳車駕東巡岱宗融上東巡頌帝竒其文召拜郎中送金山鄉僧歸蜀開堂撞鐘浮玉山迎我三千指衆中聞謦欬未語知鄉里我非箇中人何以黙識子振衣忽歸去隻影千山裏涪江與中泠共此一味水冰盤薦琥珀何似糖霜羙華嚴經譬如衆水皆同一味送沈逵赴廣南嗟我與君皆丙子四十九年窮不死君隨幕府戰西𦍑夜度冰河斫雲壘飛塵漲天箭灑甲歸對妻孥眞夢耳我謫黄岡四五年孤舟出沒煙波裏故人不復通問訊疾病飢寒疑死矣相逢握手一大笑白髪蒼顔畧相似我方北渡脱重江君復南行輕萬里功名如幻何足計學道有牙真可喜句漏丹砂巳付君汝陽罋盎吾何恥君歸趁我鷄黍約買田築室從今始按公以景祐三年丙子生至元豐七年甲子四十九嵗漢書幕府注幕府者以軍幕為義軍旅無常居止故以帳幕言之劉禹錫游桃源詩道牙期日就塵慮乃氷釋晉葛洪傳聞交趾出丹砂求為句漏令洪遂将子姪俱行至廣州刺史鄧嶽留不聼去洪乃止羅浮山錬丹互見前注荘子德充符罋盎大癭説齊桓公桓公説之而視全人其脰肩肩汝癭見上巻别黄州詩注公時方量移汝州故云鷄黍後漢范巨卿張元伯事注巳見歐陽詩築室買田清潁尾豆粥君不見虖沱流澌車折軸公孫倉皇奉豆粥濕薪破竈自燎衣饑寒頓解劉文叔又不見金谷敲氷草木春帳下烹煎皆美人萍虀豆粥不傳法咄嗟而辦石季倫干戈未解身如寄聲色相纒心巳醉身心顛倒自不知更識人間有真味豈如江頭千頃雪色蘆茅簷出沒晨煙孤地碓舂秔光似玉沙缾煮豆軟如酥我老此身無著處賣書來問東家住卧聼鷄鳴粥熟時蓬頭曳履君家去後漢書光武字文叔馮異字公孫王郎起光武東南馳至無蔞亭時天寒烈衆皆飢疲異上豆粥明旦光武曰昨得公孫豆粥飢寒俱解及至南宫遇大風雨引車入道旁空舍異抱薪鄧禹爇火光武對竈燎衣異復進麥飯菟肩因復渡虖沱河至信都建安六年詔曰倉卒無蔞亭豆粥虖沱河麥飯厚意久未報王覇傳光武南馳至虖沱河候吏還白河水流澌漢臨江王傳既上車軸折車廢晉石崇傳字季倫有别館在河陽之金谷為客作豆粥咄嗟而辦每冬得韮萍虀王愷以不能及為恨乃宻貨崇帳下問其所以悉告之遂争長焉崇後知之殺所告者楞嚴經不知身心顛倒所在杜游何将軍山林詩盡拈書籍賣來問爾東家施註蘇詩巻二十一
