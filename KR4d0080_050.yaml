body:
  text: 施注蘇詩卷三十六宋蘇軾撰施元之原注武進邵長蘅刪補詩四十八首時在惠州作施注缺今補真一酒并引米麥水三一而已此東坡先生真一酒也撥雪披雲得乳泓蜜蜂又欲醉先生公自注真一色味頗類豫在黃州日所醖蜜酒也稻垂麥仰隂陽足器潔泉新表裏清曉日著顔紅有暈春風入髓散無聲人閒真一東坡老與作青州從事名遊博羅香積寺并引白鶴故居圖香積寺在惠州南博羅縣西山下寺去縣七里三山犬牙夾道皆美田麥禾甚茂寺下溪水可作碓磨若築塘百步閘而落之可轉兩輪舉四杵也以屬縣令林抃使督成之抃字天和二年流落蛙魚鄉朝來喜見麥吐芒東風搖波舞淨緑初日泫露酣嬌黃汪汪春泥已沒膝剡剡秋榖初分秧誰言萬里出無友見此二美喜欲狂三山屏擁僧舍小一溪雷轉松隂凉要令水力供臼磨與相地脉增隄防霏霏落雪看收麵隱隱疊鼓聞舂糠散流一啜雲子白炊裂十字瓊肌香豈惟牢九薦古味公自注束晳餅賦饅頭薄持起搜牢九要使真一流天漿詩成捧腹便絶倒書生說食真膏肓國語范蠡謂王孫雄曰故濵於東海之陂黿鼉魚鱉之與處而蛙黽之與同渚柳子厚詩麥芒際天搖青波文選麥漸漸以擢芒謝靈運詩花上露猶泫白鶴故居圗三山者大北山象頭山白水山皆在水南一溪者即東江也在山之北柳州山水記泉大類轂雷鳴西奔漢武帝外傳太上之藥則有風實雲子金精玉液杜子美詩飯抄雲子白晉書何曽性奢豪每燕見不食大官所設帝輒命取其食蒸餅上不拆作十字不食也真一酒名按束晳餅賦有饅頭薄壯起溲牢丸之名而先生詩用作牢九又自注中薄壯作薄持起溲作起搜又三十八卷真一酒歌亦用起搜字想别有所據未詳次韵定慧欽長老見寄八首并引蘇州定慧長老守欽使其徒卓契順來惠州問豫安否且寄擬寒山十頌語有璨忍之通而詩無島可之寒吾甚嘉之為和八首吳郡圖經續記定慧禪院本萬嵗子院在長洲縣東祥符中改今額傳燈録天台寒山子者本無氏族始豐縣西七十里有寒明二巖以其於寒巖中居止故名有頌三百餘首傳布人間又三祖僧璨鏡智禪師五祖𢎞忍大滿禪師賈島初為僧名無本可即僧可明也舊云郊寒島瘦左角看破楚南柯聞長滕鈎簾歸乳燕穴紙出癡蠅為鼠常留飯憐蛾不㸃燈﨑嶇真可笑我是小乘僧左角用蠻觸事南柯用淳于棼事並巳見左傳隱十二年滕侯薛侯來朝爭長卒長滕侯傳燈録古靈神贊禪師見蜂子投紙窗求出師曰世界如許廣闊不肯出鑽他故紙驢年去遂有偈曰空門不肻出投忩也太癡百年鑽故紙未見出頭時韓退之詩癡如遇寒蠅李白書云白﨑嶇歷落可笑人也傳燈録圭峰云悟我空遍真之理而修者是小乘禪鐵橋本無柱石樓豈有門舞空五色羽吠雲千嵗根松花釀仙酒木客餽山飱我醉君且去陶云吾亦云白鶴故居圖鐵橋峰在大石樓峯東大小二石樓在羅浮山下一統志五色雀出羅浮山貴人至則先翔舞先生在儋州有五色雀詩見三十八卷續神仙傳朱孺子一日忽見二花犬相趨入枸杞叢下因异之尋掘得二枸杞根形狀如犬白樂天詩不知靈藥根成狗怪得時聞吠夜聲原化記有老人雪中訪崔豈真獻松花酒老人云花澀無味乃取一丸藥投之味頓别羅浮髙萬仭不看扶桑卑默坐朱明洞玉池自生肥從來性坦率醉語漏天機相逄莫相問我不記吾誰白鶴故居圖朱明洞在麻姑峯之北又詳上卷逰羅浮山詩注幽人白骨觀大士甘露滅根塵各清淨心境兩竒絶真源未純熟習氣餘陋劣譬如巳放鷹中夜時掣紲楞嚴經優婆尼沙阤白佛言觀不淨相生大厭離白骨微塵歸於空虛維摩經始在佛樹力降魔得甘露滅覺道成楞嚴經根塵同源縛脫無二又世間一切根塵隂處界等皆如來藏清淨本然張衡鷦鷯賦蒼鷹鷙而受紲誰言窮巷士乃竊造化權所見皆我有安居受其全戲作一篇書千古發爭端儒墨起一作豈相殺豫初本無言閒居蓄百毒救彼跛與盲依山作陶穴掩此暴骨橫區區效一溉豈能濟含生力惡不己出時哉汝非爭周禮醫師掌醫之政令聚毒藥以供醫事注毒五毒也疏藥之辛苦者又韓退之詩醫師加百毒詩大雅陶復陶穴左傳宣十二年楚子曰今我使二國暴骨暴矣禮記大道之行力惡其不出於身也不必為已少壯欲及物老閒餘此心微生山海間坐受瘴霧侵可憐鄧道士攝衣問呻吟覆舟郤一作弔私渡斷橋費千金按鄧道士名守安嘗造東新橋見下卷兩橋詩序淨名毗耶中妙喜恆沙外初無往來相二土徒故切同一在云何定慧師尚缺行腳債請判維摩憑一到東坡界維摩經毗耶離城中有長者名維摩詰僧肇注云維摩詰秦言淨名也又佛言有國名妙喜佛號無動是維摩詰於彼國沒而來此生二一作三月十九日携白酒鱸魚過詹使君食槐葉冷淘杜子美槐葉冷淘詩青青髙槐葉采掇付中厨新麵來近市汁滓宛相俱云云枇杷巳熟粲金珠桑落初嘗灧玉蛆暫借垂蓮十分盞一澆空腹五車書青浮卵碗槐芽餅紅㸃氷盤藿葉魚醉飽髙眠真事業此生有味在三餘水經注劉白墮宿擅工釀採挹河流醖成芳酎懸食同枯枝之年排於桑落之辰故酒得其名霏雪録河東桑落坊有井每至桑落時取水釀酒甚美庾信詩蒲城桑落酒灞岸菊花天王注槐芽餅取槐葉汁溲麵作餅即鮮碧色禮記少儀牛羊與魚之腥聶而切之為膾注云聶之言牒也先藿葉切之復報切之則成膾三國志注董遇言為學當以三餘冬者嵗之餘夜者日之餘隂雨者時之餘也江漲用過韻草木生故墟牛羊滿空瀆春江圍草市夜浪浮竹屋巳連漲海白尚帶霍山緑坎離更休王魚鱉橫陵陸得非昆崙囚欲報陸渾衄行看北風競來救南國蹙長驅連山燒一掃含沙毒孤吟愍造化何時停倚伏當憐水旱氓不作舟車蓄江流儻席卷社酒期茅縮房千里竹室記豫環堵所棲率用竹以結其四周植者為柱楣撐者為椽桷破者為霤削者為障一統志霍山在龍川縣有三百七十二峯按東江過龍川入惠州界故云周易坎為水離為火漢書音義五行有王相死囚休廢即五行相勝之意也韓退之陸渾山火詩女丁婦壬傳世婚一朝結讐奈後昆又月及申酉利復怨助女五龍從九鯤溺厥邑囚之崑崙注水火相配今火勝水故結讐然水生於申火死於酉故帝於此時令之報怨溺火官之邑而囚火官於崑崙也按此正申上句坎離休王之意左傳襄十八年晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競又成十六年南國蹙射其元王中厥目山海經大荒南有蜮處水中含沙射人影中則成瘡史記早則資車水則資舟物之理也左傳僖四年爾貢包茅不入無以縮酒連雨漲江二首越井岡頭雲出山牂牱江上水如天牀牀避漏幽人屋浦浦移家蛋子船龍卷魚蝦并雨落人隨雞犬上牆眠只應樓下平階水長記先生過嶺年史記西南夷傳牂牁江廣數里出畨禺城下後漢南蠻傳楚遣將莊蹻伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎以且蘭有椓船牂牁處乃改其名為牂牁注繫船杙也亦作牂牱杜甫茅屋為秋風所破歌牀牀屋漏無乾處類書蛋人瀕海而居以舟為宅辨水色知龍居又曰龍人急雨蕭蕭作晚涼臥聞榕葉響長廊微明燈火耿殘夢半濕簾帷浥舊香髙浪隱牀吹甕盎暗風驚樹擺琳琅先生不出晴無用留向空階滴夜長嵇含南方草木狀榕樹南海桂林多有之葉如木麻實如冬青枝條最繁其䕃十畝栁子厚詩山城過雨百花盡榕葉滿庭鶯亂啼四月十一日初食荔支南村諸楊北村盧公自注謂楊梅盧橘也白華青葉冬不枯垂黃綴紫煙雨裏特與荔支為先驅海山仙人絳羅襦紅紗中單白玉膚不須更待妃子笑風骨自是傾城姝不知天公有意無遣此尤物生海隅雲山得伴松檜老霜雪自困樝梨粗先生洗盞酌桂醑氷盤薦此赬虬珠似聞江鰩斫玉柱更洗河豚烹腹腴公自注豫嘗謂荔支厚味髙格兩絶果中無比惟江鰩柱河豚魚近之耳我生涉世本為口一官久巳輕蓴鱸人間何者非夢幻南來萬里真良圖臨海異物志楊梅其子大如彈丸正赤五月中熟司馬相如上林賦盧橘夏熟師古曰盧黑色也廣州記盧橘皮厚味酸大如柑至夏熟土人呼為盧橘張勃吳録餘冬録云相如作賦不知盧橘名枇杷按上林賦自有枇杷橪柿之文不應重出蔡君謨食荔支詩絳衣仙子過中元别葉空枝去不還古今注中單襯衣也漢髙祖始改名汗衫唐輿服志凡祀天地之服皆白紗中單左傳昭二十八年叔向欲取于申公巫臣氏其母曰夫有尤物足以移人茍非德義則必有禍禮記楂梨鑽之莊子天運篇其猶柤梨橘柚耶其味相反而皆可于口韓退之柿詩然雲燒樹火實駢金烏下啄赬虬卵臨海異物志玉珧柱美如珧玉晉安南異物名記肉柱膚寸美如珧玉即江瑶也一云江瑶即海月藝苑雌黃河豚水族之竒味本草吳越人春月甚珍貴之尤重其腹腴呼為西施乳禮記少儀冬右腴疏曰腴腹下也杜子美設鱠歌偏勸腹腴愧年小桄榔杖寄張文潛一首時初聞黃魯直遷黔南范淳父九疑也睡起風清酒在亡身隨殘夢兩茫茫江邉曵杖桄榔瘦林下尋苖蓽撥香獨步儻逢勾漏令逺來莫恨曲江張遙知魯國真男子獨憶平生盛孝章唐書劉禹錫傳作問大鈞謫九年等賦又叙張九齡為宰相建言放臣不宜與善地悉徙五溪不毛處議者以為開元良善臣而卒無嗣豈忮心隂責最大雖他美莫贖耶欲感諷權近而憾不釋張九齡傳韶州曲江人時呼為張曲江楊彪傳融謂曺操曰孔融魯國男子也㑹稽典録盛憲字孝章有天下大名孫䇿欲誅之孔文舉與曺公書意欲曹公致書救之書未至而巳誅矣初憲為臺郎路逄童子容貌非常憲怪而問之曰魯國孔融憲異之乃載歸結為兄弟答周循州蔬飯藜牀破衲衣掃除習氣不吟詩前生自一作似是盧行者後學過呼韓退之未敢叩門求夜話時叨送米續晨炊知君清俸難多輟且覓黃精與療饑盧行者名慧能即曹溪六祖抱朴子內篇黃精一名救窮一名垂珠服花勝實服實勝根與程正輔游碧落洞空山不難到絶境未易名何時謫仙人來作鈞天聲胸中幾雲夢餘地多一作方恢宏長庚與北斗錯落綴冠纓黃公獻紫芝赤松餽青精溪山久寂寞請續離騷經抱枝寒蜩咽繞耳飛蚊清謫仙撫掌笑笑此羽皇銘我頃嘗獨游自適孤雲情君今又繼往霧雨愁青冥感君兄弟意尋羊問初平玉牀分箭鏃不忍獨長生詩成輒寄我妙絶陶謝并孤鴻方避弋老驥猶在坰鳥獸如可羣永寄槁木形何山不堪隱飲水自修齡曺子建與陳琳書披翠雲以為衣戴北斗以為冠髙士傳四皓者角里先生綺里季夏黃公東園公也避秦逃入商洛山作歌曰莫莫髙山深谷逶迤曄曄紫芝可以療饑真誥霍山有道者鄧伯原受青精石飯之法杜子美詩豈無青精飯使我顔色好按羽皇銘疑即用前卷自注山𤣥卿新宫銘事六月十二日酒醒步月理髮而寢羽蟲見月爭翾一作翻翻我亦散髮虛明軒千梳冷快肌骨醒風露氣入霜蓬根起舞三人謾相屬停杯一問終無言曲肱薤簟有佳處夢覺瓊樓空斷魂杜子美夏夜歎昊天出華月茂林延疏光仲夏苦夜短開軒納微涼虛明見纖毫羽蟲亦飛揚真誥太極緣經云髮當數櫛血液不滯髮根常堅李太白詩青天有月來幾時我今停杯一問之白樂天寄李蘄州詩笛愁春盡梅花裏簟冷秋生薤葉中拾遺記翟乾祐與人玩月人問月中何所有乾佑曰隨我手看之月規半圓瓊樓玉字滿焉良久乃隱又先生有詞云祗恐瓊樓玉宇髙處不勝寒亦同此意荔支歎十里一置飛塵灰五里一候兵火催顛坑仆谷相枕藉知是荔支龍眼來飛車跨山鶻橫海風枝露葉如新採宮中美人一破顔驚塵濺血流千載永元荔支來交州天寶嵗貢取之涪至今欲食林甫肉無人舉觴酹伯游公自注漢永元中交州進荔支龍眼十里一置五里一侯奔騰死亡罹猛獸毒蟲之害者無數唐羌字伯游為林武長上書言狀和帝罷之唐天實中蓋取涪州荔支自子午谷路進入我願天公憐赤子莫生尤物為瘡痏雨順風調百榖登民不饑寒為上瑞集本無此二句君不見武夷溪邉粟粒芽前丁後蔡相籠加公自注大小龍茶始於丁晋公成於蔡君謨歐陽永叔聞君謨進小龍團驚歎曰君謨士人也何至作此事爭新買寵各出意今年鬭品充官茶公自注今年閩中監司乞進鬭茶許之吾君所乏豈此物致養口體何陋邪洛陽相君忠孝家可憐亦進姚黃花公自注洛下貢花自錢惟演始李太白詩誰能駕飛車相從觀海外金樓子竒肱之民能為飛車兵書海鶻頭低尾髙前大後小如旗之狀木華海賦魚則橫海之鯨王注鶻橫海言船也按首四句指漢橫海四句指唐交州記龍眼樹髙五六丈似荔支而小廣州記荔支大如桂樹實如雞子甘而多汁謝承後漢書唐羌上書云伏見交趾七郡獻生龍眼等鳥驚風發南州土地炎熱惡蟲猛獸不絶於路至於觸犯死亡之害死者不可生來者猶可救也此二物升殿未必延年益夀云云後漢書和帝紀元興元年帝以唐羌言下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛民之本其敕大官勿復受獻按漢書曰元興先生詩云永元蓋末年改元即永元十七年也王注十五年誤張平子西京賦所惡成瘡痏武夷山在建州粟粒芽茶之極品者范希文鬬茶歌年年春日東南來建溪水暖氷微開溪邊竒花冠天下武夷仙人親手栽錢俶歸朝諡忠懿先生有表忠觀碑互見前三十四卷忠孝王注歐陽牡丹譜姚黃者千葉黃花出於民姚氏家江月五首并引嶺南氣候不常吾嘗云菊花開時乃重陽凉天佳月即中秋不須以日月為斷也今嵗九月殘暑方退既望之後月出愈遲然豫嘗夜起登合江樓或與客游豐湖入栖禪寺扣羅浮道院登逍遙堂逮曉乃歸杜子美云四更山吐月殘夜水明樓此殆古今絶唱也因其句作五首仍以殘夜水明樓為韻一更山吐月玉塔臥微瀾正似西湖上湧金門外看氷輪橫海闊香霧入樓寒停鞭且莫上照我一杯殘二更山吐月幽人方獨夜可憐人與月夜夜江樓下風枝夕一作久未停露草不可藉歸來掩關臥唧唧蟲夜話三更山吐月栖鳥亦驚起起尋夢中遊清絶正如此驅雲掃衆宿俯仰迷空水幸可飲我牛不須違洗耳四更山吐月皎皎為誰明幽人赴我約坐待玉繩橫野橋多斷板山寺有微行今夕定何夕夢中遊化城春秋元命苞玉衡北兩星為玉繩星謝朓詩玉繩低建章杜子美詩不違銀漢落亦伴玉繩橫五更山吐月窗迥室幽幽玉鈎還掛户江練郤明樓星河淡欲曉鼓角冷知秋不眠翻五詠清切變蠻謳韓退之詩蟲鳴室幽幽月吐窗炯炯鮑昭月詩始出西南樓纖纖如玉鉤謝𤣥暉詩澄江淨如練聞正輔表兄將至以詩迎之生逄堯舜仁得作嶺南游雖懷跫然喜豈免跕墮憂莫雨侵重膇曉煙騰鬱攸朝槃見蜜唧夜枕聞鵂鶹幾欲烹鬱屈固嘗饌鉤輈舌音漸獠變面汗嘗騂羞賴我存黃庭有時仍丹丘目聽不任耳踵息殆廢喉稍欣素月夜遂度黃茅秋我兄清廟器持節瘴海頭蕭然三家步橫此萬斛舟人言得漢吏天遣活楚囚惠然再過我樂哉十日留但恨參語賢忽潛九原幽萬里儻同歸兩鰥當對耰公自注軾喪婦巳三年矣正輔近亦有亡嫂之戚故云强歌非真達何必師莊周跫然足音出莊子跕墮用後漢馬援事並巳見左傳成六年韓獻子曰郇瑕氏之地其惡易覯易覯則民愁民愁則墊隘于是乎有沈溺重膇之疾蜜唧即鼠胎飼之以蜜飣筵上獠民喜食之互詳下卷聞子由瘦詩注嶺表異録梟一名鵂鶹夜飛晝伏能拾人爪甲以為凶凶則鳴于屋上又名鬼車韓退之南食詩惟蛇舊所識實憚口眼獰開籠聽其去鬱屈尚不平又陸龜䝉苦熱詩蛇煩爭鬱屈蟹躁實郭索鉤輈鷓鴣聲也韓退之詩鷓鴣鉤輈猿叫歇李羣玉詩方穿詰屈崎嶇路又聼鉤輈格磔聲南越志鷓鴣肉白而脆味勝雞雉韓退之南食詩腥臊始發越吞咀面汗騂楚辭逺遊仍羽人于丹丘兮留不死之舊鄊列子老聃之弟子有亢倉子者得聃之道能以耳視而目聼莊子大宗師至人之息以踵衆人之息以喉再見唐書李珏傳為殿中侍御史宰相韋處厚曰清廟之器非擊搏才栁子厚鐵爐步志江之滸凡舟可縻而上下者曰步九國志王審知聞徐寅名辟居幕下寅不樂一旦拂衣去曰丈尺之水前波後堰焉能容萬斛之舟乎王注漢吏指正輔楚囚先生自謂也漢書楊敞傳霍光遣田延年報敞以廢昌邑王事敞汗流洽背徒唯唯而巳敞夫人遽從東廂與延年參語許諾注三人共言故云參語再和稚川真長生少從鄭公游孝章偶不死免為文舉憂餘齡會有適獨往豈相攸由來警露鶴不羡撮蚤鶹願加視後鞭同駕躅空輈寧餐墮齒堇勿憶齊眉羞何時遂縱壑歸路同首丘東岡松柏老西嶺橘柚秋著意尋彌明長頸髙結喉無心逐定逺燕頷飛虎頭君方卒功名一泛范蠡舟我亦霑霈渥漸解鍾儀囚寧須張子房萬户自擇留猶勝嵇叔夜孤憤甘長幽南窗可寄傲北山早歸耰此語君勿疑老彭跨商周晉書葛洪傳從祖𤣥吳時學道得仙以其煉丹祕術授弟子鄭隱洪就隱學悉得其法盛孝章注見本卷詩大雅為韓姞相攸箋云相視攸所也周處風土記白鶴性警至八月露降流於草木上滴滴有聲則鳴莊子秋水篇鴟鵂夜撮蚤察毫末畫出瞑目而不見丘山視後鞭亦用莊子語巳見唐逸史蔡少霞夢為蒼龍溪王寫太皇真訣記得四句云昔乘魚車今履瑞雲躅空仰塗綺絡輪囷互見三十五卷公自注爾雅齧苦堇也本草一種黃花者有毒殺人即毛芹也又烏頭苗一名堇有毒唐書張果傳帝密語髙力士朕聞飲堇無苦真仙人也因取以飲果三進頺然如醉顧曰非佳酒也頃視齒燋縮顧左右取鐵如意擊墮之更出藥傅其斷良久復生齊睂意指鰥居也禮記狐死正首丘言不忘本也漢書留侯世家髙祖自擇齊二萬户欲以封張良良曰始臣起下邳與上會留臣願封留足矣世本彭祖在商為守藏史在周為柱下史年八百歲又神仙傳彭祖夀八百歷三代同正輔表兄游白水山白鶴故居圖白水山羅浮山之西瀑布在焉偉哉造物真豪縱攫土摶沙為此㺯擘開翠峽走雲雷截破奔流作潭洞因隨化人履巨迹得與仙兄躡飛鞚曵杖不知巖谷深穿雲但覺衣裘重坐看驚鳥救一作投霜葉知有老蛟蟠石甕金沙玉礫粲可數古鏡寶奩寒不動念兄獨立與世踈絶境難到惟我共永辭角上兩蠻觸一洗胸中九雲夢浮來山髙回望失武陵路絶無人送筠籃擷翠爪甲香素綆分碧銀瓶凍歸路霏霏湯谷暗野堂活活神泉湧解衣浴此無垢人身輕可試雲閒鳳莊子大宗師偉哉夫造物將以豫為此拘拘也再見按翠峽二句指瀑布化人句指佛迹也山有佛迹崖見前卷杜子美詩黃門飛鞚不動塵韓退之詩林柯有脫葉欲墮鳥驚救古詩淮南王篇金瓶素綆汲寒漿王褒湯泉碑湯谷揚波神泉愈疾山有湯泉故云與正輔遊香積寺越山少松竹常苦野火厄此峯獨蒼然感荷佛祖力茯苓無人採千嵗化琥珀幽光發中夜見者惟木客我豈無長鑱真贋苦難識靈苗與毒草疑似在毫髮􅀈玩竟不食棄置長太息山僧類有道辛苦嘗谷汲我慚作機舂鑿破混沌穴幽尋恐不繼書板記嵗月杜子美詩長鑱長鑱白木柄韓退之詩前計頓乖張居然見真贋漢書地理志虢會之地土狹而險山居谷汲王注傳曰杵臼之智不及機舂次韻正輔同遊白水山祗知楚越為天涯不知肝膽非一家此身如線自縈繞左旋右轉隨繅車誤拋山林入朝市平地咫尺千褒斜欲從稚川隱羅浮先與靈運開永嘉首參虞舜款韶石次謁六祖登南華仙山一見五色羽雪樹兩摘南枝花赤魚白蟹一作白魚赤蟹箸屢下黃柑緑橘籩常加糖霜不待蜀客寄荔支莫信閩人誇恣傾白蜜收五稜細斸黃土栽三丫公自注正輔分人參歸種韶陽來詩本用䃁字惠州無書不見此字所出故且從木奉和朱明洞裏得靈草翩然放杖凌蒼霞豈無軒車駕熟鹿亦有鼓吹號寒蛙仙人勸酒不用勺石上自有樽罍窪徑從此路朝玉闕千里莫遣毫釐差故人日夜望我歸相迎欲到長風沙豈知乘槎天女側獨倚雲機看織紗世閒誰似老兄弟篤愛不復相疵瑕相携行到水窮處庶幾一見留子嗟千年枸杞嘗夜吠無數草棘工藏遮但令凡心一洗濯神人仙藥不我遐山中歸來萬想滅豈復回顧雙雲一作飛鴉莊子德充符自其異者視之肝膽楚越也白樂天詩途窮平谷險舉足劇褒斜西都賦注褒斜谷在長安城西南南曰褒北曰斜長四百七十里謝靈運傳在永嘉登山臨水佳處無不游嘗自始寧南山伐木開徑直入臨海周禮籩人掌肆籩之實加籩之實蓤芡栗脯物産志糖霜出遂寧宋時入貢荔支譜廣南及梓䕫之間所出大率早熟其精好者僅比閩中之下品東觀漠記上賜朱祐白蜜一石蘇頌本草圖經雍洛間有梨花蜜白如凝脂嶺表録瀧州山中多紫石英其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒三丫見三十四卷寄紫團參詩注又互見本卷人參詩注李白長干行相迎不道逺直至長風沙同安志長風沙鎮在懷寧縣東一百二十里王維詩行到水窮處坐看雲起時雙雲鴉似指失偶事先生前詩有兩鰥之語玩洗凡心及萬想滅二語可見雲鴉即所云雲鬟鴉鬢也作飛鴉解非和子由次月中梳頭韵子由詩序云轍有白髮近二十年矣然止百餘莖不增不減虔州道人王正彥教令拔去以真水火養之恐不復更生從其言巳數月而白髮不出更年嵗不見豈真不生邪子瞻兄示我月中梳頭詩戲次來韻言拔白之驗詩曰水上有車車自翻懸流如線垂前軒霜蓬巳枯不再緑有客勸我拔其根枯根一去紫茸茁珍重巳試幽人言紛紛華髮不足道當返六十過去魂夏畦流膏白雨翻北窗幽人臥羲軒風輪曉長春笋節露珠夜上秋禾根公自注或為豫言草木之長常在昧明間早作而伺之乃見其拔起數寸竹笋尤甚又夏秋之交稻方含秀黃昏月出露珠起于其根纍纍然忽自騰上若有推之者或入于莖心或垂于葉端稻乃秀實驗之信然此二事與子由養生之說契故以此為寄從來白髮有公道始信丹經非妄言此身法報本無二他年妙絶兼形魂公自注傳燈録有形神俱妙者乃不復有解化之事杜牧之詩公道世閒惟白髮法報法身報身也字見華嚴合論十一月九日夜夢與人論神仙道術因作一詩八句既覺頗記其語録呈子由弟後四句不甚明了今足成之耳析塵妙質本來空公自注夢中於此句若了然有所得者更積微陽一線功照夜一燈長耿耿閉門千息自濛濛養成丹竈無煙火㸃盡人閒有暈銅寄語山神停伎倆不聞不見我何窮楞嚴經又鄰虛塵析入空者用幾色相合成虛空傳燈録夀州道樹禪師得法於北宗秀在夀州三峯山結茅而居有一野人常化作佛及菩薩羅漢天仙等形或放神光或呈聲響如此涉十年後寂無形影師告衆曰野人作多色伎倆眩惑於人只消老僧不見不聞伊伎倆有窮吾不見不聞無盡章質夫送酒六壺書至而酒不達戲作小詩問之白衣送酒舞一作侮淵明急掃風軒洗破觥豈意青州六從事化為烏有一先生空煩左手持新蟹漫繞東籬嗅落英南海使君今北海定分百榼餉春耕王注章時為廣帥孔融為北海相嘗有樽中酒不空語故云小圃五詠人參上黨天下脊遼東真井底𤣥泉傾海腴白露灑天醴靈苗此孕育肩肢一作股或具體移根到羅浮越水灌清泚地殊風雨隔臭味終祖禰青丫綴紫萼圓實墮紅米窮年生意足黃土手自啓上藥無炮炙齕齧盡根柢開心定魂魄憂恚何足洗糜身輔吾生一作軀既食首重稽本草人參生上黨山谷及遼東釋名人參一名海腴春秋運斗樞瑶光星化而為人參故又名神草隋書五行志髙祖時上黨人宅後每夜有人呼聲求之不得去宅一里所見人參枝葉異常掘之得人參一如人體四肢畢備本草圖經人參初生小者一丫兩葉年深者生四丫各五葉中心一莖有花細小如粟蘂如絲紫白色秋後結子如大豆青生熟紅白落藥性論人參主安精神定魂魄開心益智地黃地黃飼老馬可使光鑒人吾聞樂天語喻馬施之身我衰正伏櫪垂耳氣不振移栽附沃壤蕃茂爭新春沈水得稚根重湯養陳薪投以東阿清和以北海醇崖蜜助甘冷山薑發芳辛融為寒食餳咽作瑞露珍丹田自宿火渴肺還生津願餉內熱子一洗胸中塵白樂天採地黃者詩凌晨荷鍤去薄暮不盈筐攜來朱家門賣與白面郎與君啖肥馬可使照地光願易馬殘粟救此苦饑腸本草地黃宜肥壤虛地則根大而多汁本草陶隱居云阿膠出東阿其用皮有老少則膠有清濁又崖蜜生南方巖嶺閒入藥最勝杜子美成州詩崖蜜亦易求釋名糖之清者為餳纂異記甘珍逢三書生曰我有瑞露珍釀百花中與飲甘香可愛天寶遺事楊貴妃含玉咽津以解肺渴枸杞神藥不自閟羅生滿山澤日有牛羊憂嵗有野火厄越俗不好事過眼等茨棘青荑春自長絳珠爛莫摘短籬護新植紫筍生臥節根莖與花實收拾無棄物大將𤣥吾鬢小則餉我客似聞朱明洞中有千嵗質靈尨或夜吠可見不可索仙人儻許我借杖扶衰疾詩小雅楚楚者茨言抽其棘本草枸杞冬採根春夏採葉秋採莖實又枸杞久服輕身不老一名仙人杖劉禹錫枸杞井詩枝繁本是仙人杖根老能成瑞犬形詩國風無使尨也吠又靈尨注見本卷甘菊越山春始寒霜菊晚愈好朝來出細粟稍覺芳嵗老孤根䕃長松獨秀無衆草晨光雖照耀秋雨半摧倒先生臥不出黃葉紛可掃無人送酒壺空腹嚼珠寶香風入牙頰楚些發天藻新荑蔚巳滿宿根寒不槁揚揚㺯芳蝶生死何足道頗訝昌黎公一作翁恨爾生不早先生記菊帖云嶺南地暖而菊獨後開考其理菊性介烈須霜降乃發而嶺海常以冬至微霜故也吾以十月望與客泛菊作重九書此為記唐太宗殘菊詩階蘭凝曙霜岸菊照晨光范至能譜序惟甘菊一種可食仍入藥餌楚些注巳見神仙傳王母云神仙之書受而不敬是謂慢天藻韓退之秋懷詩鮮鮮霜中菊既晚何用好揚揚㺯芳蝶爾生還不早薏苡伏波飯薏苡禦瘴傳神良能除五溪毒不救讒言傷讒言風雨過瘴癘久亦亡兩俱不足治但愛草木長草木各有宜珍産駢南荒絳囊懸荔支雪粉剖桄榔不謂蓬荻姿中有藥與糧舂為芡珠圓炊作菰米香子美拾橡栗黃精誑空腸今吾獨何者玉粒照座光酈道元水經注武陵有五溪謂雄溪樠溪酉溪元溪辰溪謂之五溪蠻後漢馬援傳初援在交趾常餌薏苡以勝瘴氣軍還載之一車及卒後有譛之者以為前所載皆明珠文犀再見蔡君謨荔枝詩厚葉纖枝雜絳囊使君分寄驛人忙臨海異物志桄榔皮中有白粉似稻米及麥麵可作餅餌崔豹古今注芡一名雁頭廣雅雞頭謂之䓈芡歐陽永叔食雞頭詩爭先園客採新苞剖蚌得珠從海底本草薏苡米白色如糯人呼為薏珠子舂熟炊為飲食氣味如麥飯乃佳宋玉賦主人之女為臣炊雕胡之飯注雕胡菰米也廣雅菰蔣其米謂之肜胡杜子美寓居同谷縣詩嵗拾橡栗隨狙公又黃精無苗山雪盛短衣數挽不掩脛再見雨後行菜夢回聞雨聲喜我菜甲長平明江路濕竝岸飛兩槳天公真富有乳膏瀉黃壤霜根一蕃滋風葉漸俯仰未任筐筥載巳作杯盤一作桉想艱難生理窄一味敢專饗小摘飯山僧清安寄真賞芥藍如菌菌脆美牙頰響白菘類羔豚冒土出蹯掌誰能視火候小竈當自養詩國風于以盛之維筐及筥杜子美詩自鉏稀菜甲小摘為親情劉恂嶺南異物志南土芥髙五六尺芥心嫩薹謂之芥藍陳仁玉菌譜芝菌最為上品菌凡九種味極香美海録碎事江東人呼地菌為土囷陸佃埤雅菘葉如蕪菁性凌冬晚凋故曰菘俗謂之白菜左傳宣二年宰夫胹熊蹯不熟殘臘獨出二首幽尋本無事獨往意自長釣魚豐樂橋採杞逍遙堂羅浮春欲動雪日有清光處處野梅開家家臘酒香路逄眇道士疑是左元放我欲從之語恐復化為羊杜子美詩江路野梅香神仙傳左慈字元放徐墮有道術居丹徒慈過之墮門下客欺慈云徐公不在慈便去客報徐公有一老翁眇目吾欺之云公不在矣公曰咄咄此是左公過我化羊事屢見江邊有微行詰曲背城市平湖春草合步到栖禪寺堂空不見人老稚掩關睡所營在一食食巳寧復事客來豈無得施子靜掃地風松獨不靜送我作鼓吹詩國風遵彼微行陶淵明詩傾身營一飽少許便有餘新年五首紹聖三年先生年六十一在惠州即古白鶴基始營新居故有結茅來此住之句曉雨暗人日春愁連上元水生挑菜渚煙濕落梅村小市人歸盡孤舟鶴踏翻猶堪慰寂寞漁火亂黃昏荆楚嵗時記正月七日謂之人日以隂晴卜豐耗北渚集羣鷺新年何所之盡歸喬木寺分占結巢枝生物會有役謀身各及時何當禁畢弋看引雪衣兒江淹擬雜體詩問君亦何為百年會有役談苑李昉五禽呼鷺為雪客天寶遺事楊貴妃鸚鵡名雪衣娘詩借用其字耳海國空自暖春山無限清氷溪結一作紛瘴雨雪菌到江城更待輕雷發先催凍笋生豐湖有藤菜似可敵蓴羮一統志豐湖在惠州府城西廣十里有潄玉灘㸃翠洲諸勝中産藤菜王注先生嘗言豐湖有燕脂藤味滑美大類蓴小邑浮橋外青山石岸東茶槍燒後有麥浪水前空萬户不禁酒三年真識翁結茅來此住嵗晚有無同茶譜蘄州團黃茶有一槍兩旗之號荔子幾時熟花頭今巳繁探春先揀樹買夏欲論園居士常携客參軍許叩門明年更有味懷抱帶諸孫二月八日與黃燾僧曇頴過逍遙堂何道士宗一問疾安心守𤣥牝閉眼覓黃庭問疾來三士澆愁有半瓶風松時落蘂病鶴不梳翎樽空我歸去山月照君醒次韻髙要令劉湜峽山寺見寄新聞妙無多舊學間可束猶當隱季主未遽逃梅福空腸吐餘思靜似蠶綴族寸田結初果秀若銅生緑荆棘掃誠盡梨棗憂不熟髙人寧鑄金下士乃服玉君看嶺嶠隘我欲巾笥蓄曽攀羅浮頂亦到朱明谷旋觀真歷塊歸臥甘破屋故人老猶仕世味薄如縠偶從越女笑不怕蠻江浴驚聞尺書到喜有新詩辱應憐五管客曽作八州督骨銷讒口鑠膽破獄吏酷隴雲不易寄江月乃可掬遙知清逺寺不稱空明腹蹇驢步武碎短瑟絃柱促仰看泉落珮俯聽石響轂千峯瀉清駛一往無回躅狂雷失晤語過電不容目要知僧長饑正坐山少肉人閒無南北蝸角空出縮仇池九十九公自注仇池有九十九泉余嘗夢至有詩嵩少三十六公自注子由近買田陽翟北望嵩少甚近天人同一夢仙凡無兩録陋邦真可老生理亦粗足便回爇天焰長作照海燭公自注黃魯直寄詩云蓮花合裏一寸燭牝馬海中燒百川魯直蓋近有得也史記日者傳司馬季主楚人也卜于長安市本草生銅皆有青蓋銅之精華也抱朴子服玉當得璞玉以屑與水服之令人不死北史李預傳得餐玉之法乃採訪藍田掘得百枚作屑食之經年有效韓退之詩吾老世味薄又洪濤春天禹穴幽越女一笑三年留舊唐書永徽後以廣桂容雍安南皆𨽻廣府謂之五府節度使名嶺南五管又韓退之詩五管遍歷無賢侯王注引莊子謬晉書陶侃字士行嘗如厠見一人朱衣介幘斂袂曰君後當為公位至八州都督按先生有詩云八州憐我往來頻即紀實也史記鄒陽上梁王書衆口鑠金積毁銷骨南史王融矯詔立竟陵王子良太學生魏準鼓成其事及融誅準懼而死舉體皆青時以為膽破于良史詩掬水月在手韓退之詩雷驚電激語難聞傳燈録司馬頭陀自湖南來百丈謂之曰老僧欲住溈山可乎對曰溈山竒絶可聚千五百衆然非和尚所住百丈云何謂也對云和尚是骨人彼是肉山設居之徒不盈于百矣西京賦光焰燭天庭韓退之詩居然妄推讓見謂爇天焰施注蘇詩卷三十六
