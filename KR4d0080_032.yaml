body:
  text: 施注蘇詩卷十八宋蘇軾撰施元之原注武進邵長蘅刪補詩五十三首起元豐三年庚申以後在黃州作書黁公詩後并引書黁音奴昆反香也晉有太史令郭黁過加祿鎮南二十五里大許店休馬於逆旅祁宗祥家見壁上有幅紙題詩云滿院秋光濃欲滴老僧倚杖清松側只怪高聲問不譍瞋余踏破蒼苔色其後題云滏水僧寶黁宗祥謂余此光黃間狂僧也年百三十死於熙寧十年既死人有見之者宗祥言其異事甚多作是詩以識之黁公本名清戒俗謂之戒和尚云黁公昔未化來往淮山曲壽逾兩甲子氣壓諸尊宿但嗟濁惡世不受龍象蹴我來不及見悵望空遺躅霜顱隱白毫鎖骨埋青玉皆云似達磨隻履還西竺壁間餘清詩字勢頗拔俗為吟五字偈一洗凡眼肉內典五濁惡世維摩經龍象蹴踏非驢所堪楞嚴經白毫宛轉五須彌鄴侯家傳李泌每導引骨節珊然有聲人謂之鎖子骨晉庾亮傳將葬何充歎曰埋玉樹著土中使人情何能已傳燈録達磨逝三嵗魏宋雲奉使西域遇之於松嶺手攜隻履翩翩獨逝雲復命具奏其事帝令啓壙惟空棺一隻草履存焉金剛經如來有肉眼不遊淨居寺并引淨居寺在光山縣南四十里大蘇山之南小蘇山之北寺僧居仁為余言齊天保中僧惠思過此見父老問其姓曰蘇氏又得二山名乃歎曰吾師告我遇三蘇則住遂留結菴而父老竟無有蓋山神也其後僧智顗見思於此山而得法焉則世所謂思大和尚智者大師是也唐神龍中道岸禪師始建寺於其地廣明庚子之亂寺廢於兵火至乾興中乃復而賜名曰梵天云十載遊名山自製山中衣願言畢婚嫁攜手老翠微不悟俗緣在失身蹈危機刑名非夙學陷穽損積威遂恐生死隔永與雲山違今日復何日芒鞋自輕飛稽首兩足尊舉頭雙涕揮靈山會未散八部猶光輝願從二聖往一洗千劫非裴回竹溪月空翠搖煙霏鐘聲自送客出谷猶依依回首吾家山歲晚將焉歸畢婚嫁後漢向長事巳見九卷次韻沈長官詩注史記申不害之學本於黃老而主刑名又韓非喜刑名法術之學尚書敜乃穽孔氏云穽穿地陷獸漢司馬遷傳猛虎處深山百獸震恐及在穽檻之中搖尾而求食積威約之漸也法華經稽首兩足尊行集經如來世尊福足慧足稱兩足尊法華經鈔世尊於靈山會上為諸大衆説二十八品放睂間白毫相光照三千大千世界又天龍八部咸悉歡喜梅花二首春來幽谷水潺潺的皪梅花草棘間一夜東風吹石裂半隨飛雪渡關山漢司馬相如傳宜笑的皪郭璞曰的皪鮮白貌也髙適聽吹笛詩借問梅花何處落風吹一夜滿關山歐陽公山齋絶句正當年少惜花時日日東風吹石裂齊安拾遺關山岐亭路有春風嶺何人把酒慰深幽開自無聊落更愁幸有清溪三百曲不辭相送到黃州戲作種松我昔少年日種松滿東岡初移一寸根瑣細如插秧二年黃茅下一一攢麥芒三年出蓬艾滿山散牛羊不見十餘年想作龍蛇長夜風波浪碎朝露珠璣香我欲食其膏已伐百本桑公自注煮松脂法用桑柴灰水人事多乖忤神藥竟渺茫朅來齊安野夾路須髯蒼會開龜蛇窟不惜斤斧瘡縱未得茯苓且當拾流肪釡盎百出入皎然散飛霜稿死三彭仇澡換五榖腸清骨凝緑髓丹田發幽光白髮何足道要使雙瞳方郤後五百年騎鶴還故鄉杜子美寄楊員外詩翻動神仙窟封題鳥獸形宣室志僧契虛遇人導遊稚川仙府真人問曰汝能絶三彭之仇乎三彭道書所為彭質彭蹻彭居也在人身中狀如小兒有須毛人既死便作鬼耳黃庭經端於蘂宫十九年三疊琴心化胎仙注三疊琴心三丹田也又三丹田各方一寸曰寸田神仙傳李根兩目瞳子皆方萬松亭并引麻城縣令張毅植萬松於道周以芘行者且以名其亭去未十年而松之存者十不及三四傷來者之不嗣其意也故作是詩十年栽種百年規好德無人助我儀公自注古語云一年之計樹之以榖十年之計樹之以木百年之計樹之以德縣令若同倉庾氏亭松應長子孫枝天公不救斧斤厄野火解憐氷雪姿為問幾株能合抱殷勤記取角弓詩詩大雅我儀圖之愛莫助之史記平凖書為吏者長子孫居官者以為姓號如淳曰倉氏庾氏是也角弓用左傳季氏有嘉樹事詳見十六卷臺頭寺送宋希元注杜子美懷李白詩更尋嘉樹傳不忘角弓詩張先生並序先生不知其名黃州故縣人本姓盧為張氏所養陽狂垢汚寒暑不能侵常獨行市中夜或不知其所止往來者欲見之多不能致余試使人召之欣然而來既至立而不言與之言不應使之坐不可但俯仰熟視傳舍堂中久之而去夫孰非傳舍者是中竟何有乎然余以有思惟心追躡其意蓋未得也熟視空堂竟不言故應知我未天全肯來傳舍人皆悅能致先生子亦賢脫屣不妨眠糞屋流澌爭看浴冰川士亷豈識桃椎妙妄意稱量未必然莊子達生篇一其性養其氣合其德以通乎物之所造若是者其天守全其神無卻揚子叔孫通制君臣之儀徴先生於齊魯所不能致者二人王注本朝靳信者得道之異人也常汚垢徉狂晝脫屣而行夜眠糞屋中人莫測之又楊文公説苑曰郭忠恕大寒鑿冰而浴唐朱桃椎傳髙士亷為益州長史備禮以請與之語不答瞪視而出士亷再拜曰祭酒其使我以無事治蜀耶乃簡條目薄賦斂州大治陳季常所蓄朱陳村嫁娶圖朱陳村在徐州豐縣白樂天詩徐州古豐縣有村曰朱陳去縣百餘里桑麻青氛氲機聲軋軋牛驢走紛紛女汲澗中水男採山上薪縣逺官事少山深人俗淳有財不行商有丁不入軍家家守村業頭白不出門田中老與幼相見何欣欣一村惟兩姓世世為婚姻親疏居有族少長遊有羣黃雞與白酒歡會不隔旬生者不逺别嫁娶先近鄰死者不逺葬墳墓多繞村既安生與死不苦形與神所以多壽考往往見玄孫何年顧陸丹青手畫作朱陳嫁娶圗聞道一村惟兩姓不將門户買崔盧歷代名畫記張懷瓘云像人之美顧得其神陸得其骨顧愷之陸探微也西川名畫録趙德玄雍京人工畫車馬人物屋木山水天復中入蜀有朱陳村及豐沛盤車等圖至今相傳文中子任薛王劉崔盧之昏非古也何以視譜唐髙士亷傳太宗以山東士人多尚閥閲嫁娶必多取資故人謂之賣昏由是詔士亷等撰氏族志太宗曰我於崔盧李鄭無嫌今謀士勞臣何容納貨舊門向聲背實買昏為榮耶太上有立德其次立功其次立言其次有爵為卿大夫世世不絶謂之門户反是豈不惑耶我是朱陳舊使君勸耕曾入杏花村而今風物那堪畫縣吏催錢夜打門韓退之董生行門外惟有吏日來徵租更索錢少年時嘗過一村院見壁上有詩云夜涼疑有雨院靜似無僧不知何人詩也宿黃州禪智寺寺僧皆不在夜半雨作偶記此詩故作一絶佛燈漸暗飢鼠出山雨忽來修竹鳴知是何人舊詩句巳應知我此時情韓退之次石頭驛詩默然都不語應識此時情初到黃州自笑平生為口忙老來事業轉荒唐長江繞郭知魚美好竹連山覺筍香逐客不妨員外置詩人例作水曹郎只慚無補絲毫事尚費官家壓酒囊公自注檢校官例折支多得退酒袋杜子美比鄰詩愛酒晉山簡能詩何水曹白樂天聽吳水部新詩明朝與向詩家道水部如今不姓何説苑鮑白令之對秦始皇曰天下官則讓賢是也天下家則世繼是也故五帝以天下為官三王以天下為家漢蓋寬饒傳韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢白樂天詩况無治道術坐受官家祿定惠院寓居月夜偶出幽人無事不出門偶逐東風轉良夜參差玉宇飛木末繚繞香煙來月下江雲有態清自媚竹露無聲浩如瀉已驚弱桞萬絲垂尚有殘梅一枝亞清詩獨吟還自和白酒已盡誰能借不辭青春忽忽過但恐歡意年年謝自知醉耳愛松風會揀霜林結茅舍浮浮大甑長炊玉澑澑小槽如壓蔗飲中真味老更濃醉裏狂言醒可怕閉門一作但當謝客對妻子倒冠落佩從嘲罵後漢祭遵傳帝幸遵營饗士卒作黃門武樂良夜罷注云良猶深也南史陶𢎞景特愛松風庭院皆植松每聞其響欣然為樂杜牧之晚晴賦倒冠落佩兮與世濶疏次韻前篇去年花落在徐州對月酣歌美清夜公自注去年花下對月與張君厚王子中兄弟飲酒作蘋字韻詩今年黃州見花發小院閉門風露下萬事如花不可期餘年似酒那禁瀉憶昔扁舟泝巴峽落帆樊口髙桅亞長江衮衮空自流白髮紛紛寧少借竟無五畝繼沮溺空有千篇凌鮑謝至今歸計負雲山未免孤衾眠客舍少年辛苦真食蓼老境安間一作清間如啖蔗飢寒未至且安居憂患已空猶夢怕穿花踏月飲村酒免使醉歸官長罵陶淵明詩佳人美清夜達曙酣且歌韓退之詩大帆夜劃窮髙桅白樂天詩何異食蓼蟲不知苦是苦啖蔗用顧愷之事已見十六卷韓退之答張徹詩初味如啖蔗遂通斯建瓴杜子美鄭廣文詩醉即騎馬歸頗遭官長罵再見安國寺浴老來百事懶身垢猶念浴衰髮不到耳尚煩月一沐山城足薪炭煙霧蒙湯谷塵垢能幾何翛然脫羈梏披衣坐小閣散髮臨修竹心困萬緣空身安一牀足豈惟忘淨穢兼以洗榮辱默歸毋多談此理觀要熟安國寺尋春臥聞百舌呼春風起尋花桞村村同城南古寺修竹合小房曲檻欹深紅看花歎老憶年少對酒思家愁老翁病眼不羞雲母亂鬢絲強理茶煙中遙知二月王城外玉仙洪福花如海薄羅勻霧蓋新粧快馬爭風鳴雜珮玉川先生真可憐一生耽酒終無錢病過春風九十日獨抱添丁看花發孟東野樂府送花人老盡人悲花自開春秋經昭公二十二年劉子單子以王猛入於王城吕希哲家孰記玉仙觀在京城宣化門外有陳道士者修葺亭臺栽種花木甚盛洪福寺在京師黃魯直有同元明過洪福寺戲題詩云洪福僧園拂紺紗舊題塵壁似昏鴉春殘已是風和雨更著遊人撼落花曹景宗傳騎快馬如龍與年少輩數十騎云云覺耳後生風鼻頭出火盧同詩天下薄夫苦耽酒玉川先生也耽酒薄夫有錢恣張樂先生無錢養恬漠又示添丁子詩數日不食強人行何忍索我抱看滿樹花寓居定惠院之東雜花滿山有海棠一株土人不知貴也江城地瘴蕃草木只有名花苦幽獨嫣然一笑竹籬間桃李漫山總粗俗也知造物有深意故遣佳人在空谷自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠袖卷紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦悽愴月下無人更清淑先生食飽無一事散步逍遙自捫腹不問人家與僧舍拄杖敲門看修竹忽逢絶艷照衰朽歎息無言揩病目陋邦何處得此花無乃好事移西蜀寸根千里不易到銜子飛來定鴻鵠天涯流落俱可念為飲一樽歌此曲明朝酒醒還獨來雪落紛紛那忍觸周易坤卦天地變化草木蕃楚詞九歌幽獨處乎山中宋玉賦嫣然一笑惑陽城迷下蔡杜子美詩絶代有佳人幽居在空谷又天寒翠袖薄日暮倚修竹又寄蘇侍御詩紅顔白靣花映肉明皇雜録上皇嘗登沉香亭召妃子時卯酒未醒髙力士從侍兒扶掖而至上皇笑曰豈是妃子醉耶海棠睡未足耳世説王子猷嘗行過吳中見一士大夫家極有好竹王肩輿徑造竹下諷嘯良久南史袁粲為丹陽尹郡南一家有竹石率爾步往直造竹所嘯詠自得韓退之詩誰家多竹門可欵白樂天送春詩百花落如雪次韻樂著作野步老來幾不辨西東秋後霜林且強紅眼暈見花真是病耳虛聞蟻定非聰酒醒不覺春強半睡起常驚日過中植杖偶逢為黍客披衣間詠舞雩風仰看落蘂收松粉俯見新芽摘杞叢楚雨還昏雲夢澤吳潮不到武昌宮公自注黃州對岸武昌縣有孫權故宫廢興古郡詩無數寂寞間窗易粗通解組歸來成二老風流他日與君同圎覺經譬彼病目見空中花聞蟻晉殷仲堪父事注已見揚子是以過中則惕又聖人之道譬猶日之中矣不及則未過則昃三國志吳主孫權二十五年自公安都鄂改名武昌杜子美贈贊公詩與子成二老來往亦風流已見蘅按公用粗字可通上聲十卷寄劉孝叔詩問道已許談其粗與組覩叶此詩寂寞間窗易粗通亦作上聲想必有據二月二十六日雨中熟睡至晚強起出門還作此詩意思殊昏昏也卯酒困三杯午餐便一肉雨聲來不斷睡味清且熟昏昏覺還臥展轉無由足強起出門行孤夢猶可續泥深竹雞語村暗鳩婦哭明朝看此時睡語應難讀白樂天詩空腹三杯卯後酒遁齋間覽白蟻聞竹雞之聲盡化為水今山林多有之其聲自呼為泥滑滑者是也歐陽公鳴鳩詩天將隂鳴鳩逐婦鳴中林鳩婦怒啼無好音雨晴後步至四望亭下魚池上遂自乾明寺前東岡上歸二首雨過浮萍合蛙聲滿四鄰海棠真一夢梅子欲嘗新拄杖間挑菜鞦韆不見人殷勤木芍藥獨自殿餘春梁宗凛荆楚歲時記春節懸長繩於髙木士女坐立其上共推引之以為戲名曰鞦韆涅槃經謂之罥索天寶遺事禁中呼木芍藥為牡丹論語奔而殿注在軍前曰啓後曰殿柳子厚芍藥詩欹紅醉濃露窈窕留餘春髙亭廢巳久下有種魚塘暮色千山入春風百草香市橋人寂寂古寺竹蒼蒼鸛鶴來何處號鳴滿夕陽假公路北户雜録陶朱公養魚經云凡種魚池中有數洲令魚循環無窮如在江湖柳子厚記蒼然暮色自逺而至杜子美絶句遲日江山麗春風花草香雨中看牡丹三首霧雨不成點映空疑有無時於花上見的皪走明珠秀色洗紅粉暗香生雪膚黃昏更蕭瑟頭重欲相扶杜子美詩鳴雨既過漸細微映空搖揚如絲飛淮南子日薄於虞淵是謂黃昏杜牧之詩醉頭扶不起三丈日還髙明日雨當止晨光在松枝清寒入花骨肅肅初自持午景發濃艷一笑當及時依然暮還斂亦自惜幽姿幽姿不可惜後日東風起酒醒何所見金粉抱青子千花與百草共盡無妍鄙未忍汙泥沙牛酥煎落蘂洛陽貴尚録孟蜀時兵部二卿李昊每牡丹花開將數朵分遺親友以金鳯箋成歌詩以致之又以興平酥同贈且云俟花謝即以酥煎食之無棄穠花也其風流貴重如此次韻樂著作送酒少年多病怯杯觴老去方知此味長萬斛羈愁都似雪一壺春酒若為湯庾信愁賦且將一寸心能容萬斛愁孔子家語人之棄惡如湯之灌雪焉枚叔七發小飯大啜如湯沃雪次韻樂著作天慶觀醮濁世紛紛肯下臨夢尋飛步五雲深無因上到通明殿只許微聞玉佩音王欽若翊聖保德傳建隆初鳯翔盩厔民張守真一日朝禮玉皇大殿覩其額曰通明殿不曉其旨真君曰上帝在無上天為諸天之尊常升金殿光明通徹無所不照故為通明殿王齊萬秀才寓居武昌縣劉郎洑正與伍洲相對伍子胥奔吳所從渡江也君家稻田冠西蜀搗玉揚珠三萬斛塞江流柿起書樓碧瓦朱欄照山谷傾家起樂不論命散盡黃金如轉燭惟餘舊書一百車方舟載入荆江曲江上青山亦何有伍洲遙望劉郎藪明朝寒食當過君請殺耕牛壓私酒與君飲酒細論文酒酣訪古江之濆仲謀公瑾不須弔一酹波神英烈君公自注杭州伍子胥廟封英烈王晉王濬傳武帝謀伐吳濬造船於蜀木柿蔽江而下唐李磎傳聚書至萬卷時人號李書樓杜子美詩碧瓦朱甍照城郭李太白詩天生我才必有用黃金散盡還復來杜詩萬事如轉燭又三歲如轉燭曹子建樂府中厨辦豐膳烹羊宰肥牛李詩吳姬壓酒喚客嘗杜懷李白詩何時一樽酒重與細論文杜沂遊武昌以酴醿花菩薩泉見餉二首酴醿不爭春寂寞開最晚青蛟走玉骨羽蓋蒙珠幰不糚艷巳絶無風香自逺凄涼吳宫闕紅粉埋故苑至今微月夜笙簫來翠巘餘姸入此花千載尚清婉怪君呼不歸定為花所挽昨宵雷雨惡花盡君應返王注以武昌有孫權故宫故特用吳宫嬪嬙之魂為意耳君言西山頂自古流白泉上為千牛乳下有萬石鉛不愧惠山味但無陸子賢願君揚其名庶託文字傳寒泉比吉士清濁在其源不食我心惻於泉非所患嗟我本何有虛名空自纒不見子桞子餘愚汙溪山牛乳用杜詩已見常州圖經惠山之側有錫山其山出錫古謠云有錫兵無錫寧故縣名無錫陸文學傳云陸羽品第天下水味以惠山泉為第二刻石留山中故名陸子泉有祠堂在焉周易井卦井泄不食為我心惻九五井冽寒泉食象曰寒泉之食中正也柳子厚愚溪詩序山水之竒以余故咸以愚辱焉陳季常自岐亭見訪郡中及舊州諸豪爭欲邀致之戲作陳孟公詩一首孟公好飲寧論斗醉後關門防客走不妨間過左阿君百謫終為賢太守老居閭里自浮沉笑問伯松何苦心忽然載酒從陋巷為愛揚雄作酒針長安富兒求一過千金壽君君笑唾汝家安得客孟公從來只識陳驚坐漢書遊俠傳陳遵字孟公嘗過長安富人左氏飲食作樂司直陳崇劾奏遵乘藩車過寡婦左阿君置酒歌謳起舞跳梁頓仆坐上又初為京兆史日出醉歸曹事數廢西曹以故事謫之曰陳卿今日以某事謫遵曰滿百乃相聞又與張竦伯松俱以列侯歸長安竦居貧無賓客時時好事者從之質疑問事而遵車騎滿門酒肉相屬先是揚雄作酒針遵大喜之謂竦曰吾與爾猶是矣足下諷誦經書苦身自約而我放意自娛浮沈俗間官爵功名不減於子而差獨樂顧不優耶又遵所到衣冠懷之惟恐在後時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐遊武昌寒溪西山寺連山蟠武昌翠木蔚樊口我來已百日欲濟空搔首坐看鷗鳥沒夢逐麕麚走今朝橫江來一葦寄衰朽高談反巨浪飛屨輕重阜去人曾幾何絶壁寒溪吼風泉兩部樂松竹三益友徐行欣有得芝术在蓬莠西上九曲亭衆山皆培塿郤看江北路雲水渺何有離離見吳宫莽莽真楚藪空傳孫郎石無復陶公柳爾來風流人惟有漫浪叟買田吾已決乳水况宜酒所須修竹林深處安井臼相將踏勝絶更裹三日糗楚辭招隱士白鹿麕麚兮或騰或倚揚雄反騷橫江湘以南淮兩部樂用孔圭兩部鼓吹語已見元次山丐論古人鄉無君子則與雲山為友里無君子則與松竹為友坐無君子則與琴酒為友論語益者三友左傳襄二十四年子太叔曰培婁無松柏注培婁小阜也杜子美詩髙山之外皆培婁離騷九章滔滔孟夏兮草木莽莽三國孫䇿傳袁術嘗歎曰使術有子如孫郎死復何恨江表傳䇿雖有位號士皆呼為孫郎晉陶侃鎮武昌課諸營種桞唐元結傳家瀼濱乃自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎既客樊上少長相戲更曰聱叟又漫浪於人間得非聱斷乎公漫久矣可以漫為叟元結集自釋云及家樊上漫遂顯焉注云在武昌縣西五里糗乾飯屑也武昌銅劍歌並引供奉官鄭文嘗官於武昌江岸裂出古銅劍文得之以遺余冶鑄精巧非煆冶所成者雨餘江清風卷沙雷公躡雲捕黃蛇蛇行空中如枉矢電光煜煜燒蛇尾或投以塊鏗有聲雷飛上天蛇入水水上青山如削鐵神物欲出山自裂細看兩脅生碧花猶是西江老蛟血蘇子得之何所為蒯緱彈鋏詠新詩君不見凌煙功臣長九尺腰間玉具髙拄頤漢天文志枉矢狀頭大流星蛇行而蒼黑望如有毛目然廣異記開元時太原武勝之嘗於靜江灘中見雷公踐雲逐蛇靜江夫以石投之中蛇鏗然有聲雷公飛去乃得一銅劍有文云許旌陽斬蛟第二劍李賀長平箭頭歌淒淒古血生銅花史記孟嘗君傳馮歡見孟嘗君置傳舍十日孟嘗君問傳舍長曰客何所為答曰馮先生甚貧獨有一劍耳又蒯緱每彈劍而歌注蒯如茅之類可為繩緱謂把劍之處漢胸奴傳單于朝天子於甘泉宫賜以玉具劍後漢馮異傳光武賜以乘輿玉具劍戰國䇿大冠若箕修劍拄頤定惠院顒師為余竹下開嘯軒啼鴂催天明喧喧相詆譙暗蛩泣夜永唧唧自相弔飲風蟬至潔長吟不改調食土蚓無腸亦自終夕叫鳶貪聲最鄙鵲喜意可料皆緣不平鳴慟哭等嬉笑阮生巳粗率孫子亦未妙道人開此軒清坐默自照衝風振河海不能號無竅纍盡吾何言風來竹自嘯楚辭離騷恐鵜鴂之先鳴漢書譙讓注譙責也韓退之秋懷詩蟲弔寒夜永又吟蛩相唧唧傳玄蟬賦美兹蟬之純潔兮稟隂陽之微靈吸瀣露之朝零聆商風而和鳴差羣吟以遞倡似簫管之餘音茍子蚓上食埃土下飲黃泉用心一也崔豹古今注蚓曰歌女莊子秋水篇鴟得腐鼠鴛雛過之仰而視之曰嚇西京雜記陸賈曰蜘蛛集而百事喜乾鵲噪而行人至韓退之送孟東野序凡物不得其平則鳴戰國䇿長歌之哀過於慟哭嬉笑之怒甚於裂眥孫登嘯詳見八卷惠山謁錢道人詩注楚辭九歌衝風起兮水橫波石芝並引元豐三年五月十一日癸酉夜夢遊何人家開堂西門有小園古井井上皆蒼石石上生紫藤如龍蛇枝葉如赤箭主人言此石芝也余率爾折食一枝衆皆驚笑其味如雞蘇而甘明日作此詩空堂明月清且新幽人睡息來初勻了然非夢亦非覺有人夜呼祁孔賓披衣相從到何許朱欄碧井開瓊户忽驚石上堆龍蛇玉芝紫筍生無數鏘然敲折青珊瑚味如蜜藕和雞蘇主人相顧一撫掌滿堂坐客皆盧胡亦知洞府嘲輕脫終勝嵇康羡王烈神山一合五百年風吹石髓堅如鐵晉祁嘉傳字孔賓少清貧好學年二十餘夜忽窗中有聲呼曰祁孔賓隱去來修飭人間甚苦不可諧所得未毛銖所喪如山崖旦而逃去晉石崇傳武帝賜王愷珊瑚樹愷以示崇崇便以鐵如意擊之應手而碎杜子美詩腰下寶玦青珊瑚韓退之詩太華山頭玉井蓮開花十丈藕如船冷比雪霜甘比蜜一片入口沈痾痊本草水蘇一名雞蘇孔叢子盧胡而笑闞子宋之愚人得燕石藏之以為大寶周客見之掩口盧胡而笑續神仙傳許碏遊盧闕間嘗醉吟曰閬苑花前是醉鄉淹翻王母九霞觴羣仙拍手嫌輕脫謫向人間作酒狂滔似冉反王烈石髓詳五卷至秀州詩注按仙經神山五百年一開石髓出得而服之壽與天齊今年正月十四日與子由别於陳州五月子由復至齊安以詩迎之驚塵急雪滿貂裘淚灑東風别宛丘又向邯鄲枕中見卻來雲夢澤南州暌離動作三年計牽挽當為十日留早晚青山映黃髮相看萬事一時休異聞集開元中道人吕翁常往來邯鄲有書生姓盧與翁同止逆旅主人方蒸黃粱共待其熟盧生不覺長嘆翁問之具言生世困厄翁開囊中枕以授盧曰枕此當如願生俯首但記身入枕中遂至其家未幾登髙第歷臺閣出入將相五十年忽欠伸而寤黃粱猶未熟也謝曰先生以窒吾欲耳自此不復求仕矣漢陸賈傳約過女極飲十日而更桞子厚别劉夢得詩耦耕若便遺身世黃髮相看萬事休遷居臨臯亭我生天地間一蟻寄大磨區區欲右行不救風輪左雖云走仁義未免違一作遲寒餓劍米有危炊針氊無穩坐豈無佳山水借眼風雨過歸田不待老勇決凡幾個幸茲廢棄餘疲馬解鞍馱全家占江驛絶境天為破飢貧相乘除未見可弔賀淡然無憂樂苦語不成些蘇個切抱朴子天圓如張蓋地方如棋局天旁轉如磨推而左行日月右行隨天左轉譬之蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨而左回焉晉天文志亦云楞嚴經覺明空昧相待成搖故有風輪執持世界晉顧愷之傳桓玄與愷之同在殷仲堪坐共作危語玄曰矛頭淅米劍頭炊晉杜錫傳屢諌愍懷太子太子患之置針著錫常所坐氊中刺之流血張平子有歸田賦左傳昭八年史趙曰可弔也而又賀之史記張儀傳羣臣皆賀子獨弔何也些説文語詞也宋玉哀屈原作招魂楚些沈存中云今夔峽湖湘及南北江獠人凡禁呪句尾皆稱些乃楚人舊俗西域呪語末皆云娑婆訶亦三合而為些也曉至巴口迎子由去年御史府舉動觸四壁幽幽百尺井仰天無一席隔牆聞歌呼自恨計之失留詩不忍寫苦淚漬紙筆餘生復何幸樂事有今日江流鏡面淨煙雨輕羃羃孤舟如鳧鷖點破千頃碧聞君在磁湖欲見隔咫尺朝來好風色旗尾西北擲行當中流見笑眼清光溢此邦疑可老修竹帶泉石欲買柯氏林茲謀待君必漢王莽傳定安公第置門衛使者監領敕阿乳母不得與語常在四壁中韓退之詩隔牆聞歡呼衆口極鵝鴈按先生有獄中寄子由詩見四十卷中杜子美復愁詩皂尾掣旗竿劉禹錫詩旗尾飄揚勢漸髙與子由同遊寒溪西山散人出入無町畦朝遊湖北暮淮西髙安酒官雖未上兩腳垂欲穿塵泥與君聚散若雲雨共惜此日相提攜千搖萬兀到樊口一箭放澑先鳧鷖層層草木暗西嶺瀏瀏霜雪鳴寒溪空山古寺亦何有歸路萬頃青玻璃我今漂泊等鴻鴈江南江北無常栖幅巾不礙過城市欲踏徑路開新蹊公自注路有直入寒溪不過武昌者卻憂别後不忍到見子行迹空餘悽吾儕流落豈天意自坐迂闊非人擠行逢山水輒羞歎此去未免勤鹽虀何當一遇李八百公自注李八百宅在筠州相哀白髮分刀圭唐陸龜蒙號江湖散人莊子人間世而幾死之散人又惡知散木又彼且為無町畦亦與之為無町畦寒溪西山在鄂州武昌縣屬湖北黃州屬淮西圖經筠州髙安郡潁濱遺老傳子瞻以詩得罪朝廷轍從坐謫監筠州鹽酒稅神仙傳李八百蜀人也莫知其名歷世見之時人計其年八百嵗因以號之或隱山林或出市㕓相傳能拄拐日八百里陳摶傳有一人青巾短褐叩陳希夷門未報倐去追之見老人衣鹿皮曰此神仙李八百也動則八百里本草凡散藥有云刀圭者十分方寸匕之一堆如梧桐子大也韓退之寄周隨州詩金丹别後知傳得乞取刀圭救病身次韻答子由平生弱羽寄衝風此去歸飛識所從好語似珠穿一一妄心如膜退重重山僧有味寧知子瀧吏無言只笑儂尚有讀書清淨業未容春睡敵千鍾杜牧之登第後過鄰居老空門氣味長韓退之瀧吏詩山僧尚未知名姓始羡瀧吏垂手笑官何問之愚儂幸無負犯何由到而知華嚴經即以利益諸衆生而為自行清淨業和何長官六言作邑君真伯厚去官我豈曼容一廛願託仁政六字難賡變風後漢朱震字伯厚詳十七卷林于中以詩寄文注漢兩龔傳邴曼容養志自修為官不肯過六百石輒自免去五噫已出東洛三復願比南容學道未逢潘盎公自注南海謂狂為盎潘近世得道者也草書猶似楊風後漢梁鴻傳過京師作五噫之歌已見王注元祐中廣南儂智髙反至梧州有潘盎者棄妻子服儒衣常持一大翣行坐獨語南越謂愚盎儂賊聞其異召而問之曰吾形貌如何盎曰汝一賊也他無所類賊怒害之法書苑楊凝式善行草書時人以楊風呼之再見石渠何須反顧水驛幸足相容長江大欲見庇探支八月涼風三輔舊事石渠誾在未央大殿北以藏祕書漢劉向傳講論五經於石渠楚辭離騷忽反顧以逰目兮將往觀乎四荒王注探支字是官物官錢有此名此亦戲言之矣清風初號地籟明月自寫天容貧家何以娛客但知抹月批風韓退之詩天容與水色此處皆緑淨禪宗有薄批明月細抹清風之語青山自是絶色無人誰與為容説向市朝公子何殊馬耳東風李太白詩世人聞此皆掉頭有如東風射馬耳觀張師正所蓄辰砂將軍結髮戰蠻溪篋有殊珍勝象犀漫説玉牀收一作分箭鏃何曾金鼎識刀圭近聞猛士收丹穴欲助君王鑄裊蹄多少空巖人不見自隨初日吐虹霓圖經辰州出丹砂其苖乃白石耳土人謂之砂牀箭鏃連牀者色若鐵而瑩徹漢貨殖傳寡婦清其先得丹穴擅其利數世武帝紀太始二年詔更黃金為麟趾裊蹄史記封禪書少君言上曰祀竈則致物致物而丹沙可化為黃金沙同砂大洞錬真寶經上品光明沙者受太陽洞通澄明正真之精氣降結紅光耀如日色五禽言並引梅聖俞嘗作四禽言余謫黃州寓居定惠院繞舍皆茂林修竹荒池蒲葦春夏之交鳴鳥百族土人多以其聲之似者名之遂用聖俞體作五禽言按梅聖俞詩集四禽言則竹雞婆餅焦提胡蘆杜鵑也一曰泥滑滑苦竹岡雨蕭蕭馬上郎馬蹄凌競雨又急此鳥為君應斷腸二曰婆餅焦兒不食爾父向何之爾母山頭化為石山頭化石可奈何遂作微禽啼不息三曰提胡蘆沽美酒風為賓樹為友山花獠亂目前開勸爾今朝千萬壽四曰不如歸去春山雲暮萬木兮參天蜀天兮何處人言有翼可歸飛安用悲啼向髙樹使君向蘄州更唱蘄州鬼我不識使君寧知使君死人生作鬼會不免使君已老知何晚公自注王元之自黃移蘄州聞啼鳥問其名或對曰此名蘄州鬼元之惡之果卒於蘄南山昨夜雨西溪不可渡溪邊布榖兒勸我脫破袴不辭脫袴溪水寒水中照見催租瘢公自注主人謂布谷為脫卻破袴去年麥不熟挾彈規我肉今年麥上場處處有殘粟豐年無象何處尋聽取林間快活吟公自注此鳥聲云麥飯熟即快活力作力作蠶絲一百箔壠上麥頭昻林間桑子落願儂一箔千兩絲繅絲得蛹飼爾雛公自注此鳥聲云蠶絲一百箔王元景談藪元景嘗大醉楊遵彥謂之曰何大低昻元景曰黍熟頭低麥熟頭昻黍麥俱有所以低昻姑惡姑惡姑不惡妾命薄君不見東海孝婦死作三年乾不如廣漢龐姑去卻還公自注姑惡水鳥也俗云婦以姑虐死故其聲云漢于定國傳東國有孝婦其姑自經死姑女告吏婦殺我母具獄上府于公以為此婦養姑以孝聞必不殺也太守不聽竟論殺孝婦郡中枯旱三年後漢列女傳廣漢薑詩妻同郡龐盛之女詩母愛飲江水妻汲不時至母渴詩責而遣之妻乃寄止鄰含晝夜紡績市珍羞使鄰母以意自遺其姑久之姑怪問鄰母感慚呼還次韻子由病酒肺疾發憶子少年時肺病疲坐臥喊呀或終日勢若風雨過虛陽作浮漲客冷仍下墮妻孥恐悵望膾炙不登坐終年禁晚食半夜發清餓胃強鬲苦滿肺斂腹輒破三彭恣啖囓二豎肯逋播寸田可治生誰勸耕黃糯公自注新法方田謂黃糯為上腴探懷得真藥不待君臣佐初如雪花積漸作櫻桃一作珠大隔牆聞三咽隱隱如轉磨自兹失故疾陽唱隂輒和神仙多歷試中路或坎坷平生不盡器痛飲知無奈舊人眼看盡老伴餘幾個殘年一斗粟待子同舂簸云何不自珍醉病又一挫真源結梨棗世味等粳莝耕耘當待穫願子勤自課相將賦逺逰仙語不用些三彭注見本卷左傳成十年晉景公求醫於秦秦桓公使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居於肓之上膏之下若我何黃庭經寸田尺宅可治生寸田為三丹田注見本卷本草飬命之藥則多君養性之藥則多臣療病之藥則多佐漢淮南厲王傳廢處蜀嚴道卭郵不食而死民歌之曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容真誥紫微王夫人授許長史曰火棗交梨之樹已生君心中猶令有荆棘相雜可剪荆棘出此樹單生粳莝漢陳平傳亦食粳核耳史記范雎傳置莝豆其前令兩黥徒夾而馬食之楚辭遠遊悲時俗之迫厄兮願輕舉以逺遊正月草日往岐亭郡人潘古郭三人送余於女王城東禪莊院志林黃州東十五里有永安城俗謂之女王城十日春寒不出門不知江栁已搖村稍聞決決流氷谷盡放青青沒燒痕數畝荒園留我住半瓶濁酒待君溫去年今日關山路細雨梅花正斷魂唐詩岡分河勢斷春入燒痕深鐵拄杖並引桞真齡字安期閩人也家寶一鐵拄杖如楖栗木牙節宛轉天成中空有簧行輒微響栁云得之浙中相傳王審知以遺錢鏐鏐以賜一僧栁偶得之以遺余作此詩謝之栁公手中黑蛇滑千年老根生乳節忽聞鏗然爪甲聲四坐驚顧知是鐡含簧腹中細泉語逬火石上飛星裂公言此物老有神自昔閩王餉吳越不知流落幾人手坐看變滅如春雪忽然贈我意安在兩腳未許甘衰歇便尋轍迹訪崆洞徑渡洞庭探禹穴披榛覓藥採芝菌刺虎鏦蛟擉蛇蝎會教化作兩錢錐歸來見公未華髮問我鐵君無恙否取出摩挲向公説杜子美桃竹杖引出入瓜甲鏗有聲莊子在宥黃帝立為天子十九年令行天下聞廣成子在於空同之上故往見之韻語秋陽崆洞山汝州岷俱有之杜詩云崆洞小麥熟則岷州之崆洞也黃帝往空同乃汝州之空同也漢司馬遷傳南遊江淮上會稽探禹穴漢書鏦殺吳王周禮以時擉魚鱉龜蜃説苑干將莫邪斬羽截鐵刜鐘不錚此至利也使之補履曾不如兩錢之錐東方朔别傳亦云桂苑叢談李德裕贈僧方竹杖及再見問杖無恙否曰已規而漆之矣公嗟惋久之風俗通恙毒蟲也喜傷人古人草居露宿故相勞問必曰無恙與潘三失解後飲酒千金弊帚人誰買半額蛾睂世所姸顧我自為都眊矂憐君欲鬭小嬋娟青雲豈易量他日黃菊猶應似去年醉裏未知誰得喪滿江風月不論錢後漢馬廖傳城中好廣睂四方且半額國史補進士不捷而飲謂之打眊矂孟東野嬋娟篇花嬋娟泛春泉妓嬋娟不長妍李太白詩清風明月不用一錢買施注蘇詩卷十八
