body:
  text: 施注蘇詩卷六宋蘇軾撰施元之原注武進邵長蘅刪補詩四十九首時通守錢塘作施注缺今補元日次韻張先子野見和七夕寄莘老之作得句牛女夕轉頭參尾中青春先入睡白髮不遺窮酒社我為敵詩壇子有功縮頭先夏鱉公自注見玉川子實腹鄙秋蟲莫唱裙垂緑無人臉斷紅舊交懷賀老新進謝終童袍鵠雙雙瑞腰犀一一通小蠻知在否試問囁嚅翁月令孟春之月昏參中旦尾中杜牧贈趙嘏詩今代風騷將誰登李杜壇盧同月蝕詩北方寒龜被蛇縛藏頭入殼如入獄又寒龜夏鱉一種味且當以其肉充臛羅隱蜘蛛賦序蜘蛛秋蟲也致身羅網間歐陽詞舞餘裙帶緑雙垂元稹鶯鶯序其臉斷紅而已李白憶賀監詩稽山無賀老漢書終軍傳軍字子雲年十八選為博士弟子後為諫大夫死時年二十餘故世謂之終童漢西域傳贊明珠文甲通犀翠羽之珍盈於後宫注通犀中央色白通兩頭小蠻白樂天妾已見五卷李林宗字直木嘗謂樂天為囁嚅翁正月九日有美堂飲醉歸徑睡五鼓方醒不復能眠起閲文書得鮮于子駿所寄古意作雜興一首答之杭州圖經有美堂在郡城吳山嘉祐二年梅摯出守杭仁宗賜詩首章云地有湖山美因以名堂衆人事紛擾志士獨悄悄何異琵琶絃常遭腰鼓閙三杯忘萬慮醒後還皎皎有如轆轤索已脫重縈繞家人自約飭始慕陳婦孝可憐原巨先放蕩今誰弔平生嗜羊炙識味肯輕飽烹蛇啖蛙蛤頗訝能稍稍憂來自不寐起視天漢渺闌干玉繩低耿耿太白曉韓退之詩數杯澆腸雖暫醉皎皎萬慮醒還新漢書遊俠傳原涉字巨先或譏涉曰子本吏二千石之世結髮自修以行喪推財禮讓為名何故自放縱為輕俠之徒乎涉應曰子獨不見家人寡婦邪始自約飭之時意乃慕宋伯姬及陳孝婦不幸一為盜賊所汙遂行淫失知其非禮然不能自還吾猶此矣顔師古注陳孝婦者其夫當行戒屬孝婦曰汝善養吾母孝婦曰諾夫死孝婦養姑愈謹其父母欲嫁之孝婦固欲自殺父母懼遂使養姑淮南太守以聞朝廷髙其義號曰孝婦韓南食詩我來禦魑魅自宜味南烹惟蛇舊所識實憚口眼獰又食蝦蟆詩強號為蛙蛤於實無所較余初不下喉近亦能稍稍謝朓詩玉繩低建章曹子建樂府北斗闌干次韻答章傳道見贈並生天地宇同閲古今宙視下則有髙無前孰為後達人千鈞弩一弛難再彀下士沐猴冠已繫猶跳驟欲將駒過隙坐待石穿溜君看漢唐主宫殿悲麥秀而况彼區區何異一醉富鶢鶋非所養俯仰眩金奏髑髏有餘樂不博南面后嗟我昔少年守道貧非疚自從出求仕役物恐見囿馬融既依梁班固亦仕竇效矉豈不欲頑質謝鐫鏤仄聞長者言婞直非養夀唾面慎勿拭出跨當俯就居然成懶廢敢復齒豪右子如照海珠網目疏見漏宏材乏近用巧舞困短袖坐令傾國容臨老見邂逅吾衰信久矣書絶十年舊門前可羅雀感豫煩屢叩願言歌緇衣子粲還豫授尸子四方上下曰宇古往今來曰宙史項羽本紀人謂楚人沐猴而冠果然莊子人生天地間如白駒之過隙漢枚乘傳太山之溜穿石漸靡使之然也史記宋世家箕子朝周過故殷虛感宫室毁壞生禾黍乃作麥秀之詩曰麥秀漸漸兮禾黍油油彼狡童兮不與我好兮詩小雅彼昏不知一醉日富箋云無知之人飲酒一醉自謂日益富也鶢鶋海鳥見左傳莊子達生篇昔者有鳥止於魯郊魯君説之為具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己養養鳥也又至樂篇莊子之楚見空髑髏擊以馬箠而問之髑髏見夢曰死則無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王樂不能過也又讓王篇原憲對子貢曰無財謂之貧學道而不能行謂之病今憲貧也非病也後漢馬融懲於鄧氏不敢復違忤勢家遂為梁冀草奏誣李固又作大將軍西第頌亦頗為正直所羞又竇憲出征胸奴以班固為中護軍與參議及憲敗固死獄中莊子天運篇西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里離騷經鮌婞直以亡身兮終然夭乎羽之野漢書循吏傳天子笑曰君安得長者之言而稱之唐婁師德教其弟耐事弟曰人有唾面潔之而已師德曰未也潔之是違其怒正使自乾耳出跨用韓信淮隂少年事史記韓非傳長袖善舞前漢李延年歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國詩國風今夕何夕見此邂逅毛傳邂逅解悅之貌羅雀注見四卷詩國風緇衣之宜兮又還豫授子之粲兮先生詩案云熙寧六年正月作此詩言某不能效班馬二人苟容依附也法惠寺橫翠閣朝見吳山橫暮見吳山從吳山故多態轉側為君容幽人起朱閣空洞更無物惟有千步岡東西作簾額春來故國歸無期人言秋悲春更悲已泛平湖思濯錦更看橫翠憶峨睂雕欄能得幾時好不獨馮欄人易老百年興廢更堪哀懸知草莽化池臺遊人尋我舊遊處但覓吳山橫處來輿圖考錦江在成都府城南一名汶江織錦濯此則鮮麗其地曰錦里名山記峨嵋山在蜀嘉定州南北有臺山有六寺光相居絶頂白水寺居其中自白水至光相歷八十四盤山徑如線如是者六十餘里至山頂即普賢示現處其屋皆以板為之祥符寺九曲觀燈紗籠擎燭迎門入銀葉燒香見客邀金鼎轉丹光吐夜寶珠穿蟻鬧連宵波翻焰裏元相激魚舞湯中不畏焦明日酒醒空想像清吟半逐夢魂銷拾遺記石葉香其狀疊疊如雲母其氣辟癘魏文帝時題腹國來獻假成式詩欲熏羅薦嫌龍腦須為尋求石葉香按銀葉當是石葉類一曰銀葉字見香譜即燒香所用者王注小説載有以九曲寶珠欲穿之而不得問之孔子孔子教以塗脂於線使蟻通焉又三國時有術士以藥傅魚投沸鼎中徘徊不死此直言置魚琉璃盞水中其後點燈魚遊泳而不畏耳上元過祥符僧可久房蕭然無燈火門前歌舞鬬分朋一室清風冷欲氷不把琉璃間照佛始知無盡本無燈唐史玄宗於花萼樓命諸王分朋角戲內典法門名無盡燈譬如以一燈然百千燈正月二十一日病後述古邀往城外尋春屋上山禽苦喚人檻前氷沼忽生鱗老來厭伴一作逐紅裙醉病起空驚白髮新卧聽使君鳴鼓角試呼稚子整冠巾曲欄幽榭終寒窘一看郊原浩蕩春郭景純遊山詩閶闔西南來潛波渙鱗起注兌為閶闔風水波渙然如魚鱗之起也韓退之詩不解文字飲惟能醉紅裙有以官法酒見餉者因用前韻求述古為移厨飲湖上喜逢門外白衣人欲膾湖中赤玉鱗遊舫已糚吳榜穩舞衫初試越羅新欲將漁釣追黃帽未要靴刀抹絳巾芳意十分強半在為君先踏水邉春白衣人用陶潛事黃帽用漢書黃頭郎事注並詳五卷和邵同年戲贈詩晉張載傳吳榜越船不能無水而浮李賀詩越羅衫袂迎春風韓愈送李端公序紅抹首鞾袴握刀又元和聖德詩注禹會塗山之時大風雷震有甲卒千餘人其不被甲者以紅絹帕抹其額自此遂為軍容之服飲湖上初晴後雨二首朝曦迎客宴重岡晚雨留人入醉鄉此意自佳君不會一杯當屬水仙王公自注湖上有水仙王廟唐王績作醉鄉記水仙注又見五卷水光瀲灧晴方好山色空濛雨亦奇欲把西湖比西子淡糚濃抹總相宜往富陽新城李節推先行三日留風水洞見待前地理志秦分三十六郡富春屬會稽晉太元中改曰富陽春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語金鯽池邉不見君先生詩話舊讀蘇子美六和塔詩松橋待金鯽竟日獨遲留初不喻此語及倅錢塘乃知寺後池中有此魚如金色也昨日復遊池上投餅餌乃略出不食復入則此魚自珍貴蓋久矣追君直過定山村路人皆言君未逺騎馬少年清且婉風巖水穴舊聞名只隔山溪夜不行溪橋曉溜浮梅萼知君繫馬巖花落出城三日尚逶遲妻孥怪罵歸何時世上小兒誇疾走如君相待今安有圖經開化寺開寶三年建僧智曇即此建六和塔金魚池在寺後山澗水底有金鯽魚太平寰宇記定山突出浙江數百丈詩國風清揚婉兮杜子美詩繫馬林花動詩小雅周道逶遲王注先生詩案云熙寧六年正月二十七日在杭州遊風水洞留題詩言世上小兒誇疾走意在譏諷世人多務急進不顧大體也風水洞二首和節推杭州圖經洞去錢塘縣舊治五十里在楊村慈嵓院洞極大流水不竭洞頂又有一洞清風微出故名曰風水洞白樂天長慶三年秋九月來遊觀泉石竹木留詩風轉鳴空穴泉幽寫石門虛心聞地籟妄意覓桃源過客詩難好居僧語不繁歸瓶得氷雪清冷慰文園莊子齊物論汝聞人籟而未聞地籟又地籟則衆竅是已陶潛桃源記晉太原中武陵人捕魚為業緣溪而行忘路之逺近忽逢桃花林林盡水源便得一山山有小口倣佛若有光便捨船從口入初極狹才通人行數十步豁然開朗土地平曠其中往來種作男女衣著悉如外人自云先世避秦來此停數日辭去既出得船便扶向路處處志之及郡下詣太守説如此太守遣人隨往遂迷不復得路漢司馬相如為孝文園令有消渴疾山前乳水隔塵凡山上仙風舞檜杉細細龍鱗生亂石團團羊角轉空巖馮夷窟宅非梁棟御寇車輿謝轡銜世事漸艱吾欲去一作出永隨二子脫譏讒莊子摶扶搖羊角而上者九萬里注扶搖風上行也羊角風之屈曲勢今旋風上如羖羊角也王注馮夷𢎞農華隂人服八石得水仙帝錫為河伯楚辭九歌云魚鱗屋兮龍堂紫貝闕兮朱宫即馮夷所居也莊子逍遙遊列子御風而行泠然善也楚辭惜往日無轡銜而自載王注言世態可厭欲從馮夷之水居禦寇之風馭為可以脫譏讒先生詩案熙寧六年正月有遊風水洞詩云世事漸艱吾欲去意謂行新法之後世事日益艱難小人爭進各務讒毁試度思之不可以合又不可以容故欲棄官卜隱居之地也詩集作欲出詩案作欲去從詩案獨遊富陽普照寺富春真古邑此寺亦唐餘鶴老依喬木龍歸護賜書連筒春水逺出谷曉鐘疏欲繼江潮韻何人為起豫杜詩連筒灌小園唐人詩話宋之問遊江南靈隱寺夜月澄明獨行廊下因吟曰鷲嶺鬱岧嶤龍宫鎖寂寥沈思久之不就有老僧曰何吟苦乃爾何不道樓觀滄海日門對浙江潮宋歎警策逮明訪之不復見寺僧知者曰此駱賓王也自普照遊二菴長松吟風晚雨細東菴半掩西菴閉山行盡日不逢人裛裛野梅香入袂居僧笑我戀清景自厭山深出無計我雖愛山亦自笑獨往神傷後難繼不如西湖飲美酒紅杏碧桃香覆髻作詩寄謝採薇翁本不避人那避世杜詩神傷山行深富陽妙庭觀董雙成故宅發地得丹鼎覆以銅盤承以琉璃盆盆既破碎丹亦為人爭奪持去今獨盤鼎在耳二首人去山空鶴不歸丹亡鼎在世徒悲可憐九轉功成後郤把飛升乞內集作肉芝王注河中永樂道淨院唐文宗時道士鄧太玄錬丹於藥院中藥成留貯院內太玄死周悟先主院事有蒲人侯道華者事悟先以供給使諸道士皆奴畜之道華愈欣然一旦亡去獨留一詩云帖裹大還丹多年色不移前宵盜喫郤今日碧空飛鄧師鍊得藥留著與內芝其下列細字稱去年七月一日蒙韓君賜姓李名內芝配住上清善進院學者多疑內芝字為詳載所出云按集作肉芝原有據神仙傳蕭靜之掘地得人手潤澤而白烹而食之曰肉芝也抱朴子行山中見小人乘車馬長七八寸者肉芝也捉取服之即仙矣琉璃擊碎走金丹無復神光發舊壇時有世人來舐鼎欲隨雞犬事劉安漢淮南王安臨仙去餘藥在庭中雞犬舐之並得飛升故雞鳴雲中犬吠天上新城道中二首東風知我欲山行吹斷簷間積雨聲嶺上晴雲披絮帽樹頭初日挂銅鉦野桃含笑竹籬短溪柳自搖沙水清西崦人家應最樂煮葵燒筍餉春耕韓詩晴雲如擘絮漢書周勃傳勃下廷尉太后以為無反事文帝朝太后以冒絮提文帝注頭上巾為冒絮提擲也張平子賦右素威以司鉦王注銅鉦今所謂鑼也身世悠悠我此行溪邉委轡聽溪聲散材畏見搜林斧疲馬思聞卷斾鉦細雨足時茶户喜亂山深處長官清人間岐路知多少試向桑田問耦耕山村五絶竹籬茅屋趁溪斜春入山村處處花無象太平還有象孤煙起處是人家唐書文宗延英對宰相曰卿等有意太平乎牛僧孺對曰太平無象今雖未及至治亦可謂小康而更求太平非臣所及煙雨濛濛雞犬聲有生何處不安生但令黃犢無人佩布榖何勞也勸耕漢書龔遂為渤海太守令民賣劍買牛賣刀買犢曰何為帶牛佩犢布榖鳥名俗云催耕鳥也老翁七十自腰鎌慙愧春山筍蕨甛豈是聞韶解忘味爾來三月食無鹽鮑明逺詩腰鎌刈葵藿班固幽通賦虞韶美而鳳儀兮孔忘味於千載涅槃經食中無鹽按老翁杖藜二絶俱入臺獄詩案詳五卷雙檜詩注杖藜裹飰去匆匆過眼青錢轉手空贏得兒童語音好一年強半在城中竊祿忘歸我自羞豐年底事汝憂愁不須更待飛鳶墮方念平生馬少遊後漢馬援傳援擊交趾謂官屬曰吾從弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御款假馬為郡縣吏守墳墓鄉里稱善人足矣致求盈餘徒自苦耳當吾在浪泊西里間下潦上霧毒氣薰蒸仰視飛鳶跕跕墮水中卧念少遊平生時語何可得也湖上夜歸我飲不盡器半酣味尤長籃輿湖上歸春風吹面涼行到孤山西夜色已蒼蒼清吟雜夢寐得句旋已忘尚記梨花村依依聞暗香入城定何時賓客半在亡睡眼忽驚矍繁燈閙河塘市人拍手笑狀如失林麞始悟山野姿異趣難自強人生安為樂吾策殊未良唐文粹何諷夢渴賦飲不盡器籃輿用陶潛事注見四卷寒食未明至湖上太守未來兩縣令先在城頭月落尚啼烏烏榜紅舷早滿湖鼓吹未容迎五馬水雲先已揚雙鳧映山黃帽螭頭舫夾道青煙鵲尾爐老病逢春只思睡獨求僧榻寄須臾王注烏榜紅舷遊湖之船也古樂府羅敷行五馬立躊蹰杜詩人生五馬貴莫受二毛侵又詳五卷莘老葺天慶觀詩注雙鳧注見一卷將往終南詩黃帽注再見前白樂天杭州詩小航船亦畫龍頭杜陵集陶貞白有金鵲尾香爐注爐有柄曰鵲尾皮日休詩鵲尾香爐一世焚次韻孫莘老見贈時莘老移廬州因以别之爐錘一手賦形殊造物無心敢望渠我本疏頑固當爾子猶淪落况其餘龔黃側畔難言政羅趙前頭且眩書公自注莘老見稱政事與書而莘老書至不工惟有陽關一杯酒殷勤重唱贈離居莊子大宗師以天地為大爐以造化為大冶漢龔遂為渤海太守黃霸為潁川太守並見前漢循吏傳晉衛恆傳羅叔景趙元嗣與張伯英並時注詳第二卷贈别青鳥銜巾久欲飛黃鶯别主更悲啼殷勤莫忘分擕處湖水東邉鳳嶺西太平廣記漢武故事七月七日於永華殿齋西王母來至有二青鳥挾侍王母旁杜詩楊花雪落覆白蘋青鳥飛去銜紅巾唐韓滉鎮浙西戎昱為部內刺史有官妓善歌色亦間妙昱情屬至厚滉聞其能召至籍中昱為詞以送云送客春風湖上亭柳條藤蔓繫人情黃鶯久住還相識欲别頻啼四五聲妓至唱戎此詞滉即時歸之次韻代留别絳蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷去應記儂家舊姓西史記越世家范蠡浮海出齊變姓名自謂鴟夷子皮王注寰宇記載西施施其姓也所居在西故有東施家西施家今云舊姓西豈偶不契勘耶然不害其詩句之妙月茶環非環玦非玦中有迷離玉兒一似佳人裙上月月圓還缺缺還圓此月一缺圓何年君不見鬬茶公子不忍鬬小團上有雙銜綬帶雙飛鸞古木蘭歌雌眼迷離歐陽公有鬬茶歌李義山詩願得化為紅綬帶許教雙鳳一時銜薄命佳人雙頰凝酥髮抹漆眼光入簾珠的皪故將白練作仙衣不許紅膏汙天質吳音嬌軟帶兒癡無限間愁總未知自古佳人多命薄閉門春盡楊花落廣韻的皪白狀冷齋夜話則天長夀三年詔書曰應天下尼當用細白練為衣古樂府有妾薄命曲吉祥寺花將落而述古不至今歲東風巧翦裁含情只待使君來對花無信花應恨直恐明年便不開述古聞之明日即來坐上復用前韻同賦仙衣不用翦刀裁國色初含一作酣卯酒來太守問花花有語為君零落為君開劉禹錫詩仙人衣裳棄刀尺宋之問詠翦綵花詩今年春色好應被翦刀催南部新書唐玄宗內殿賞牡丹謂穆修已曰今京邑詩誰為首出修已曰李正封詩天香夜染衣國色朝酣酒時楊妃侍側上曰粧臺前飲以紫金盞則正封之詩見矣才調集有無名氏絶句云春光冉冉歸何處更向樽前把一杯盡日問花花不語為誰零落為誰開李鈐轄坐上分題戴花二八佳人細馬馱十千美酒渭城歌簾前柳絮驚春晚頭上花枝奈老何露濕醉巾香掩冉月明歸路影婆娑緑珠吹笛何時見欲把斜紅插皂羅李白詩蒲萄酒金叵羅吳姬十五細馬馱曹植名都篇歸來宴平樂美酒斗十千緑珠石崇家妓善吹笛於潛令刁同年野翁亭山翁不出山溪翁長在溪公自注前二令作二翁亭不如野翁來往溪山間上友麋鹿下鳧鷖問翁何所樂三年不去煩推擠翁言此間亦有樂非絲非竹非蛾睂山人醉後鐵冠落溪女笑時銀櫛低我來觀政問風謡皆云吠犬足生氂但恐此翁一旦捨此去長使山人索寞溪女啼公自注天目山唐道士常冠鐵冠於潛婦女皆插大銀櫛長尺許謂之蓬沓左太沖詩何必絲與竹山水有清音後漢岑彭傳岑熙為魏郡太守輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之吠犬不驚足下生氂於潛女青裙縞袂於潛女兩足如霜不穿屨􅡬沙鬢髮絲穿柠蓬沓障前走風雨老濞宫粧傳父祖至今遺民悲故主苕溪楊柳初飛絮照溪畫睂渡溪去逢郎樵歸相媚嫵不信姬薑有齊魯李白越女詩屨上足如霜不著鴉頭襪又一雙金齒屐兩足白如霜退之月蝕詩赤鳥司南方尾秃翅􅡬沙王注柠當作杼字書柠同楮於絲穿之下無義説文曰杼機之持緯者絲穿杼言鬢如絲之穿杼也杜子美詩稚子無憂走風雨杜牧之詩老濞即山鑄後庭千蛾眉王注老濞吳王濞此指吳越王錢氏也唐書太宗曰人言魏徵粗疏朕正覺其嫵媚自昌化雙溪館下步尋溪源至治平寺二首亂山滴翠衣裘重雙澗響空窗户搖飽食不嫌溪筍瘦穿林間覓野芎苗卻愁縣令知遊寺尚喜漁人爭渡橋正似醴泉山下路桑枝刺眼麥齊腰醴泉漢谷口地隋置醴泉縣在今西安府每見田園輒自招倦飛不擬控扶搖共疑楊惲非鋤豆誰信劉章解立苗老去尚餐彭澤米夢歸時到錦江橋宦遊莫作無家客舉族長懸似細腰前漢楊惲種豆詩見第五卷八月十日夜看月詩注史記齊悼惠世家朱虛侯劉章忿劉氏不得職常入侍髙后燕飲進曰請為太后言耕田歌歌曰深耕溉種立苗欲疏非其種者鉏而去之太后默然晉陶潛為彭澤令在縣公田悉令種秫妻子固請種粳乃以二頃五十畝種秫五十畝種粳郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰向鄉里小人即日解印綬去錦江橋在成都大慈寺前所過石橋是也退之詩細腰不自乳舉族長孤懸於潛僧緑筠軒可使食無肉不可使居無竹無肉令人瘦無竹令人俗人瘦尚可肥俗士不可醫傍人笑此言似髙還似癡若對此君仍大嚼世間那有揚州鶴世説王子猷嘗暫寄人空宅住便令種竹或問暫住何煩爾王嘯詠良久直指竹曰何可一日無此君魏曹植與吳質書過屠門而大嚼雖不得肉貴且適意揚州鶴用俗傳騎鶴上揚州語與臨安令宗人同年劇飲我雖不解飲把盞一作盞歡意足試呼白髮感秋人令唱黃雞催曉曲與君登科如隔晨敝袍霜葉空殘緑如今莫問老與少兒子森森如立竹黃雞催曉不須愁老盡世人非我獨白樂天有初見白髮感秋詩又詩誰道使君不解歌聽唱黃雞與白日黃雞催曉丑時鳴白日催年酉前沒寶山晝睡杭州圗經寶山在吳山之南七尺頑軀走世塵十圍便腹貯天真此中空洞渾無物何止容君數百人後漢文苑傳邉韶字孝先嘗晝日假卧弟子嘲之曰邉孝先腹便便懶讀書但欲眠又尹緯腰帶十圍世説王導嘗枕周覬膝而指其腹曰卿此中何所有也答曰此中空洞無物足容卿輩數百人導亦不以為忤僧清順新作垂雲亭江山雖有餘亭榭著一作苦難穩登臨不得要萬象各偃蹇惜哉垂雲軒此地得何晚天功爭向背詩眼巧增損路窮朱欄出山破石壁很海門浸坤軸湖尾抱雲巘蔥蔥城郭麗淡淡煙村逺紛紛烏鵲去一一漁樵返雄觀快新獲微景收昔遁道人真古人嘯詠慕嵇阮空齋卧蒲褐芒屨每自捆天憐詩人窮乞與供詩本我詩久不作荒澀旋鋤墾從君覓佳句咀嚼廢朝飯左傳哀六年彼皆偃蹇將棄子之命注驕傲也楚辭離騷望瑶臺之偃蹇兮注髙貌杜子美詩安知有蒼池萬頃浸坤軸後漢蘇伯阿望舂陵郭歎曰氣佳哉鬱鬱蔥蔥然世説周顗於王導坐傲然嘯詠導曰卿欲逺希嵇阮邪顗曰安敢近捨明公逺希嵇阮唐書隱士朱桃椎嘗織芒屩置道上見者曰居士屩也為易米茗置其處輒取去終不與人接捆屨字出孟子五月十日與吕仲甫周邠僧惠勤惠思清順可久惟肅義詮同泛湖遊北山三吳雨連月湖水日夜添尋僧去無路瀲瀲水拍簷駕言徂北山得與幽人兼清風洗昏翳晚景分穠纖縹眇朱樓人斜陽半疏簾臨風一揮手悵焉起遐瞻世人騖朝市獨向溪山廉此樂得有命輕薄神所殲會客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和二首時周有服藹藹君詩似嶺雲從來不許醉紅裙不知野屐穿山翠惟見輕橈破浪紋頗憶呼盧袁彥道難邀罵坐灌將軍公自注皆取其有服也晚風落日元無主不惜清涼與子分退之詩君詩多態度藹藹春空雲晉書袁耽字彥道桓溫少遊博徒資産俱盡尚書負思自振之方欲求濟於耽時耽在艱遂變服懷布帽隨溫與債主戲耽素有藝名債者聞之而不相識謂曰卿當不辦作袁彥道也遂就局十萬一擲直上百萬耽投馬絶呌探布帽擲地曰竟識袁彥道否史記魏其傳田蚡娶燕王女為夫人列侯宗室皆往賀灌夫有服竇嬰強與俱蚡與夫有隙云云夫曰今日斬頭穴胸何知程李蚡怒召長史曰今日召宗室有詔劾灌夫罵坐不敬載酒無人過子雲掩關晝卧客書裙歌喉不共聽珠貫醉面何因作纈紋僧侣且陪香火社詩壇欲斂鸛鵝軍憑君遍繞湖邉寺漲渌晴來已十分漢書揚雄傳贊雄家貧嗜酒人希至其門時有好事者載酒肴從遊南史羊欣長𨽻書父不疑為烏程令欣年十二時王獻之為吳興太守甚知愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去樂記歌者上如抗下如隊纍纍乎端如貫珠唐嚴尚書與于駙馬詩莫損歌喉一串珠又白樂天詩何郎小妓歌喉好嚴老呼為一串珠李賀詩龜甲屏風醉眼纈杜牧詩今代風騷將誰登李杜壇左傳昭二十一年公子城以晉師至救宋與華氏戰於赭邱鄭翩願為鸛其御願為鵝注鄭翩華氏黨鸛鵝皆陳名席上代人贈别三首悽音怨亂不成歌縱使重來奈老何淚眼無窮似梅雨一番勻了一番多風土記夏至前雨名黃梅雨水潤土溽三月雨曰迎梅五月雨曰送梅天上麒麟豈混塵籠中翡翠不由身那知昨夜香閨裏更有偷啼暗别人南史徐陵母夢五色雲化為鳳集左肩上巳而誕陵後年數歲家人攜以候寶志志摩其頂曰天上石麒麟也蓮子擘開須見臆楸枰著盡更無期破衫卻有重逢處一飯何曾忘卻時王注此吳歌格借字寓意也古詩有云圍碁燒敗襖著子故依然乃此格矣蓮子曰菂菂中么荷曰薏須見臆以菂之薏言之楸枰棊槃也更無期以棊言之重逢處以縫綻之縫隱之也忘卻時以匙匕之匙隱之也按古樂府子夜歌云霧露隱芙蓉見蓮不分明又明燈照空局悠然未有期又理絲入殘機何悟不成匹讀曲歌云芙蓉腹裏萎蓮子從心起又石闕生口中銜碑不得語此詩全祖其意王注未盡唐道人言天目山上俯視雷雨每大雷電但聞雲中如嬰兒聲殊不聞雷震也臨安圖經天目山在縣西五十里髙三千九百丈周回八百里乃神仙所居有三十六洞太平寰宇記山有兩湖若左右目故名天目唐道士字子霞嘗作天目山真境録已外浮名更外身區區雷電若為神山頭只作嬰兒看無限人間失箸人三國志曹公從容謂先主曰今天下英雄惟使君與操耳時會雷震先主方食失匕箸謂曹公曰一震之威乃至於此施注蘇詩卷六
