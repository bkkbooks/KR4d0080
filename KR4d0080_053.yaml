body:
  text: 施注蘇詩卷三十九宋蘇軾撰施元之原注武進邵長蘅刪補詩五十一首起建中靖國辛巳改元度嶺北歸即以是年七月卒於毗陵施注缺今補昔在九江與蘇伯固唱和其略曰我夢扁舟浮震澤雪浪橫江一作空千頃白覺來滿眼是廬山倚天無數開青壁蓋實夢也昨日又夢伯固手持乳香嬰兒示豫覺而思之蓋南華賜物也豈復與伯固相見於此耶今得來書知巳在南華相待數日矣感歎不已故先寄此詩扁舟震澤定何時滿眼廬山覺又非春草池塘惠連夢上林鴻雁子卿歸水香知是曹溪口眼净同看古佛衣不向南華結香火此生何處是真依漢書蘇武傳昭帝即位求武等胸奴言武死後使至常惠教漢使謂單于言天子射上林中得雁足有係帛書言武等在某澤中單于視左右大驚乃使武歸曹溪志梁時有天竺國僧自西來泛舶曹溪口聞異香曰上流必有勝地尋之遂開山立石乃云百七十年後當遇無上法師在此演法今六祖南華寺是也眼净字屢見傳燈録五祖黃梅𢎞忍大師以衣鉢潜付六祖今衣猶傳寺中古佛衣即指此白樂天詩夲結菩提香火社為嫌煩惱電泡身次韻韶守狄大夫見贈二首華髮蕭蕭老遂良公自注禇河南帖云即日遂良鬚髮盡白蓋謫長沙時也一身萍挂海中央無錢種菜為家業有病安心是藥方才疏正類孔文舉癡絶還同顧長康萬里歸來空泣血七年供奉殿西廊公自注邇英閣在延和殿西廊下後漢書孔融傳字文舉融負其髙氣志在靖難而才疏意廣迄無成功森森畫㦸擁朱輪坐詠梁公覺有神白傅閒遊空誦句公自注事見白樂天吳郡詩石記拾遺窮老敢論親公自注事見子美寄狄明府詩東海莫懷疏受意西風幸免庾公塵為公過嶺傳新唱催發寒梅一信春唐書狄仁傑封梁公此借用指韶州白樂天吳郡詩石記云韋在此州歌詩甚多有郡宴詩云兵衛森畫㦸燕寢凝清香最為警策今刻此篇於石傳貽將來因以豫旬宴一章亦附於後杜子美狄明府詩梁公曽孫我姨弟不見十年官濟濟次韻韶倅李通直二首一篇瀧吏可書紳莫向長沮更問津老去常憂伴新鬼歸來且喜是陳人曽陪令尹蒼髯古又見郎君白髮新回首天涯一惆悵郤登梅嶺望楓宸韓退之瀧吏詩有云往問瀧頭吏潮州尚幾里瀧吏垂首笑官何問之愚㼚大瓶􅑥小所任自有宜官何不自量滿溢以取斯不知官在朝有益國家不得無虱其間不武亦不文仁義飾其躬乃姦敗羣倫叩頭謝吏言始慚今更羞云云大指皆嘲憤之詞也左傳文二年夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小嶺南録梅嶺即大庾嶺上多梅樹或云梅福隱處青山祗在古城隅萬里歸來卜築初㑹見四山朝鶴駕更看二李跨鯨魚欲從抱朴傳家學應怪中郎得異書待我丹成馭風去借君瓊珮與霞裾公自注僕昔為開封幕先公為赤令暇日相與論內外丹且出其丹示僕今三十年而見君曲江同遊南華宿山水間數日道舊感歎且勸我卜居於舒故詩中皆及之按先生與李惟熙帖云偶得生還平生愛龍舒風土欲卜居為終老之計云云是青山當指舒州但四山未詳其名耳一統志龍眠山在桐城縣又舒州有潛山左慈修煉處𤾂山天柱山道書稱司元洞天漢武帝嘗登封於此以代南嶽或即指此數山也詩國風佩玉瓊琚韓退之詩乞君飛霞珮與我髙頡頏狄韶州煮蔓菁蘆蔔羮我昔在田間寒庖有珍烹常支折腳鼎自煮花蔓菁中年失此味想像如隔生誰知南嶽老解作東坡羮中有蘆蔔根尚含曉露清勿語貴公子從渠嗜羶腥周易鼎折足覆公餗劉禹錫嘉話諸葛亮所止令兵士獨種蔓菁取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回即易尋而採五也冬有根可食六也今蜀人呼為諸葛菜唐夲草萊蔔即蘆蔔也陶𢎞景别録蘆蔔根可食葉不中啖陸佃稗雅萊蔔能制麵毒是萊牟之所服故名按蔓菁蘆蔔諸家皆作二物惟陸機草蟲魚疏葉是蔓菁根是蘆蔔則一物矣先生似亦從陸說東坡羮頌見先生文集中又有玉糝羮詩見補遺卷李伯時畫其弟亮功舊隱宅圖樂天蚤退今安有摩詰長閒古亦無五畝自栽池上竹十年空看輞川圖近聞陶令開三徑應許揚雄寄一區晚嵗與君同活計如雲鵝鴨散平湖白樂天池上篇十畝之宅五畝之園有水一池有竹千竿唐書王維字摩詰別墅在輞川有華子岡竹里館茱萸沜辛夷塢陶淵明歸去來詞三徑就荒漢書揚雄傳處岷山之陽曰郫有田一㕓有宅一區杜子美詩房相西池鵝一羣眠沙泛浦白於雲贈龍光長老舊傳先生詩本題云東坡居士過龍光求大竹作肩輿得兩竿南華圭首座方受請為此山長老乃留一偈院中須其至授之以為他時語録中第一問斫得龍光竹兩竿持歸嶺北萬人看竹中一滴曹溪水漲起西江十八灘贈嶺上老人鶴骨霜髯心巳灰青松合抱手親栽問翁大庾嶺頭住曽見南遷幾箇回贈嶺上梅梅花開盡百花開過盡行人君不來不趁青梅嘗煮酒要看細雨熟黃梅盧同詩鶯花爛漫君不來及至君來花已老杜子美詩南京犀浦道四月熟黃梅豫昔過嶺而南題詩龍泉鐘上今復過而北次前韻按即前過大庾嶺詩秋風卷黃落朝雨洗緑净人貪歸路好節近中原正下嶺獨徐行艱嶮未敢忘遙知叔孫子巳致魯諸生月令季冬之月草木黃落漢武帝秋風辭草木黃落兮雁南飛漢書叔孫通為博士說上曰臣願徴魯諸生與臣弟子共起朝儀於是通使徴魯諸生三十餘人魯有兩生不肻行云云通笑曰若真鄙儒不知時變遂與所徵三十人西按陸游序云建中初韓曽二相得政盡收用元祐人其不召者亦補大藩惟東坡兄弟猶領宫祠末句蓋寓所謂不能致者二人意深而語緩過嶺二首暫著南冠不到頭郤隨北雁與歸休平生不作兔三窟今古何殊貉一邱當日無人送臨賀至今有廟祀潮州劍關西望七千里乘興真為玉局游栁子厚六言詩一生判郤歸休為著南冠到頭唐書楊憑貶臨賀尉姻友憚往獨徐晦至藍田慰餞李夷簡表為監察御史曰君不負楊臨賀肯負國乎韓退之謫潮州潮人為之立廟先生集中有廟碑七年來往我何堪又試曹溪一勺甘夢裏似曽遷海外醉中不覺到江南波生濯足鳴空澗霧繞征衣滴翠嵐誰遣山雞忽驚起半嵓花雨落毿毿按年譜公以紹聖元年自定州貶惠州凡四年再貶儋耳明年改元元符至三年乃量移亷州凡七年江南謂䖍州留題顯聖寺渺渺疏林集晚鴉孤村烟火梵王家幽人自種千頭橘逺客來尋百結花浮石已乾霜後水焦坑間試雨前茶秪疑歸夢西南去翠竹江村繞白沙首楞嚴經阿難白佛言世尊此寶疊華緝續成巾雖夲一體如我思惟如來一綰得一結名若百結成終名百結又江南人謂丁香為百結豫初謫嶺南過田氏水閣東南一峰豐下鋭上里人謂雞籠山豫更名獨秀峰今復過之戲留一絶倚天巉絶玉浮屠肯與彭郎作小姑獨秀江南知有意要三二别四三壺韓退之詩倚天更覺青巉巉李太白詩青冥皖公山巉絶可人意同安志小孤山在宿松縣東南一百二十里又江州有澎浪磯語轉為彭郎磯遂有小姑嫁彭郎之語互見十五卷李思訓長江絶島圖詩注一統志大别山在漢陽府城北小别山在漢川王子年拾遺記海中三壺一曰方壺則方丈也二曰蓬壺則蓬萊也三曰瀛壺則瀛洲也此三山上廣中狹下方皆如工製猶華山之似削成列子渤海之東有大壑焉其中有山一曰岱輿二曰圓嶠三曰方壺云云按詩意則夲前說也乞數珠贈南禪湜老從君覓數珠老境仗消遣未能轉千佛且從千佛轉儒生推變化乾策數大衍道士守元牝龍虎看舒卷我老安能為萬劫付一喘默坐閲塵界往來八十反一作返區區我所寄蹙縮蠶在繭適從海上回蓬萊又清淺傳燈録法逹禪師誦法華經及三千部六祖謂之曰心迷法華轉心悟轉法華周易大衍之數五十其用四十有九又曰凡天地之數五十有五此所以成變化而行鬼神也金晶論夫龍虎金木也金為虎木為龍虎之異名真鉛金水也龍之異名真汞木火也楞嚴經心能記憶八萬四千洹河沙劫周遍了知得無疑惑鬱孤臺公自注再過䖍州和前韻吾生如寄耳嶺外亦閒游贛石三百里寒江尺五流楚山微有霰越瘴久無秋望斷橫雲嶠魂飛咤雪洲曉鐘時出寺暮鼓各鳴樓歸路迷千嶂勞生閲百州不隨猿鶴化甘作賈胡留祗有貂裘在猶堪買釣舟孟浩然詩贛石三百里沿江千嶂閒李肇國史補蜀之三峽南康之贛石皆險絶之所爾雅山狹而長曰嶠王注橫雲嶠指五嶺咤雪洲謂瓊崖儋萬四州南越地炎瘴而無雪有雪則以為咤抱朴子周穆王南征久而不歸一軍皆化君子為猿為鶴小人為蟲為沙賈胡留後漢馬援事注巳見䖍守霍大夫監郡許朝奉見和此詩復次前韻大邦安靜治小院得閒遊贛水雨巳漲廉泉春未流同烹貢茗雪一洗瘴茅秋秋思生蓴鱠寒衣待橘洲揚雄未有宅王粲且登樓老景無多日歸心夢幾州敢因逃酒去端為和詩留舊篋藏新語清風自滿舟贈䖍州術士謝晋臣屬國新從海外歸君平且莫下簾帷前生恐是盧行者後學過呼韓退之死後人傳戒定慧生時宿直斗牛箕憑君為算行年看便數生時到死時頷聨已見三十六卷答周循州詩惟自字今作恐字韓退之詩我生之辰月宿南斗牛奮其角箕張其口樊注蘇內翰云吾生平遭口語無數蓋生時與退之相似吾命宫在斗牛間而身宫亦在箕䖍州景德寺榮師湛然堂卓然精明念不起兀然灰槁照不滅方定之時慧在定定慧照寂非兩法妙湛總持不動尊默然真入不二門語息則默非對語此話要將周易論諸方人人把雷電不容細看真頭面欲知妙湛與總持更問江東三語掾楞嚴經攝心為戒因戒生定因定發慧是則名為三無漏學又净極光通逹寂照含虛空又妙湛總持不動尊首楞嚴王世希有周易復卦注凡動息則靜靜非對動者也語息則默默非對語者也次陽行先公自注用鬱孤臺韻室空惟法喜心定有天游摩詰元無病須洹不入流苦嫌尋直枉坐待寸田秋雖未麒麟閣巳逃鸚鵡洲酒醒風動竹夢斷月窺樓衆謂元德秀自稱陽道州拔葵終相魯辟穀㑹封留用舍俱無礙飄然不繫舟金剛經須陀洹名為入流而實無所入漢書蘇武傳甘露三年單于入朝帝思股肱之良乃圖畫其人於麒麟閣輿地志鸚鵡洲在武昌府城南即黃祖殺禰衡處再用數珠韻贈湜長老嗣宗雖不言叔寶猶理遣東坡但熟睡一夕一展轉南遷昔虞翻郤掃今馮衍古佛既手提諸方皆席卷當年清隱老鶴瘦龜不喘和我彈丸詩百發亦百反耆年日雕喪但有犢角繭時來窺方丈共笑虎毛淺傳燈録手提諸佛直見夲來面目諸方尊宿無能出其右又百丈禪師侍馬祖言下省悟次日馬祖升座衆才集百丈出卷郤席祖便下座白樂天贈王山人詩夜後不聞龜喘息秋來惟長鶴精神禮記天地之牛角繭栗爾雅釋獸篇虎切毛謂之虦注切淺也疏淺毛者别名虦貓虦音潺又鉏限助諌二切和猶子遲贈孫志舉軒裳大爐韝陶冶一世人從橫落模範誰復甘饑貧可憐方回癡初不疑嘉賔頗念懷祖黠瞋兒與兵姻失身墮浩渺投老無涯垠回看十年舊誰似數子真孫郎表獨立霜㦸交重闉深居不汝覿豈問親與鄰連枝皆秀傑英氣推伯仁我從海外歸喜及崆峒春新年得異書西郭有逸民公自注陽行先以登真隱訣見借小孫又過我歡若平生親清詩五百言句句皆絶倫飬火雖未伏要是丹砂銀我家六男子朴學非時新詩詞各璀璨老語徒周諄願言敦宿好永與竹林均六子豈可忘從我屢厄陳莊子大宗師今一以天地為大爐以造化為大冶揚子師者令模範也以木曰模以竹曰範晋書郗愔傳字方回超字嘉賔超實黨桓氏以愔忠於王室不令知之將亡出一箱付門生曰我亡後公若大損眠食可呈此箱及超死愔果哀悼成疾門生依㫖呈之悉與溫往反密計愔於是大怒曰小子死恨晚矣又王述傳字懷祖子坦之為桓溫長史溫欲為子求婚於坦之及還家省父而述愛坦之雖長大猶抱置膝上坦之因言溫意述大怒遽排下曰汝竟癡耶詎可畏溫面而以女妻兵也晋書周俊傳三子顗嵩謨顗别有傳伯仁顗字登真隱訣梁貞白先生所述抱朴子丹砂燒之成水銀積變又還成丹砂故能令人長生大洞鍊真寶經將丹砂修煉伏火後鼓成白銀名之為一返也將白銀化出砂令伏火鼓之乃成黃銀名之為二返也六男子謂邁逮過遲適逺左傳襄三十一年穆叔曰趙孟年未盈五十而諄諄焉如八九十者陶詩詩書敦宿好南禪長老和詩不巳故作六蟲篇答之鳳凰覽德輝逺引不待遣鷾鴯戀庭宇倐忽來千轉那將坐井蛙而比談天衍蠧魚著文字槁死猶遭卷老牛疲耕作見月亦妄喘東坡方三問南禪已五反老人但目擊侍者應足繭最後六蟲篇深寄恨語淺賈誼弔屈原賦鳳皇翔於千仞兮覽德輝而下之莊子山木篇鳥莫知於鷾鴯注鷾鴯燕也韓退之詩何殊蠧書蟲生死文字間風俗通吳牛望月而先喘又滿奮語載世說巳見淮南子楚王欲攻宋墨子聞之自魯而趨十日十夜足重繭而不休息至於郢見楚王杜子美詩足繭荒山轉愁寂明日南禪和詩不到故重賦數珠篇以督之二首未來不可招巳過那容遣中間見在心一一風輪轉自從一生二巧歷莫能衍不如袖手坐六用都懷卷風雷生謦咳萬竅自號喘詩人思無邪孟子內自反大珠分一月細綆合兩繭纍然挂禪牀妙用夫豈淺金剛經過去心不可得見在心不可得未來心不可得楞嚴經覺明空昧相待成搖故有風輪執持世界莊子齊物論一與言為二二與一為三自此以往巧歷不能得而况其凡乎六用注已見朝來取飯化乃是維摩遣全鋒雖未露半藏巳曽轉說有陋裴頠談無笑王衍看經聊爾耳遮眼初不卷三咤故自醒一吷何由喘請歸視故櫝靜夜珠當反安居三十年古衲磨山繭持珠尚默坐豈是功用淺傳燈録羅山示衆云全鋒敵勝罕遇知音同死同生萬中無二又僧問大茅和尚如何是大茅境界師云不露鋒僧云何為不露鋒師云無當者又有一媼令人詣趙州求轉藏經趙州郤下禪床轉一匝乃曰轉藏經已竟其人回舉似媼媼曰比來請轉全藏如何祗為轉半藏晋書裴頠傳頠深患王衍之徒聲譽太盛位髙勢重不以物務自嬰遂相倣效風教陵遲乃著崇有論以釋其蔽晋書王衍傳魏正始中何宴王弼等祖述老莊立論以為天地萬物皆以無為為本無也者開物成務無往不存者也衍甚重之惟裴頠以為非著論以譏之而衍處之自若傳燈録藥山看經曰且圖遮眼再見尚書顧命三宿三祭三咤注云至齒而不飲曰咤韓非子楚人有賣其珠於鄭者為木蘭之匱薰桂椒之櫝綴以珠玉鄭人買櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也用前韻再和霍大夫前和陽行先韻文字先生飲公自注謂劉執中江山清獻遊典刑傳父老尊俎繼風流度嶺逢梅雨還家指麥秋自慙鴻雁侣爭集稻粱洲野濶橫雙練城堅聳百樓行看鳳尾詔郤下虎頭州君意巳吳越我行無去留歸途應食粥乞米使君舟王注清獻趙閲道也劉趙二公皆知䖍州廣絶交論分雁鶩之稻粱庾信詠雁詩稻粱俱可戀飛去復飛還王注雙練謂章貢二水後漢公孫瓚傳云兵法百樓不攻紀聞談晋元帝踐祚凡諸侯箋奏批之曰諾而草書若字之尾如鳳形故謂之鳳尾詔松陵集皮陸詩君批鳳尾詔我住虎頭巖虎頭謂䖍州也用前韻再和許朝奉髙門元世舊客路晚追遊清絶聞詩語疏通豈法流傳家有衣鉢斷獄盡春秋邂逅陪車馬尋芳謝朓洲凄凉望鄉國得句仲宣樓恨賦投湘水悲歌祀栁州何如五字律相與一尊留更約登塵外歸時月滿舟漢藝文志法家者流蓋出於理官斷獄如雋不疑引春秋蒯瞶斷戾太子事見漢書夲傳謝朓詩芳洲採杜若白氏金針梁元帝詩云朝出屠羊縣夕返仲宣樓凡詩四句以苐一句對三句以苐二句對四句謂之扇對又梅聖俞續金針引前人詩云昔時花下留連飲暖日夭桃鶯亂啼今日江邉容易别淡烟衰草馬頻嘶以證其格今此兩聨即其格也塵外亭名在䖍州公有詩見三十五卷傳燈録慧禪師偈曰夜靜水寒魚不食滿船空載月明歸用前韻再和孫志舉人衆者勝天天定亦勝人鄧通豈不富郭解安得貧驚飛賀厦燕走散入幕賔醉眠中山酒結夢南柯姻寵辱能幾何悲歡浩無垠回視人間世了無一事真灑掃古玉局香火通帝闉我室思無邪我堂德有鄰所至為鄉里事賢友其仁之子富經術蔚如井大春蜿蟺楚南極淑氣生此民唱髙和自寡非我誰當親譬彼嶰谷竹翦裁待伶倫俗學吁可鄙紙繒配芻銀聊將調癡鬼亦復爭華新願子事篤實浮言掃譫諄窮通付造物得喪理夲均期子如太倉㑹當發陳陳漢書佞幸傳文帝使善相人者相鄧通曰當貧餓死上曰能富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下漢書游俠傳武帝徙豪右茂陵郭解貧不中徙吏恐不敢不徙衛將軍為言郭解家貧不中徙上曰郭解布衣權至使將軍此其家不貧淮南子湯沐具而蟣虱相弔大厦成而燕雀來賀互見前思無邪先生齊名韓退之詩我來亦巳幸事賢友其仁東漢井丹字大春深於經術再見韓送廖道士序彬之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積意必有魁竒忠信材德之民生其間王注紙繒芻銀喻俗學之無實譫音占字出素問病而狂言也崔文學甲携文見過蕭然有出塵之姿問之則孫介夫之甥也故復用前韻賦一篇示志舉象服盛簮珥豈是邢夫人敝衣破冠履可憐范叔貧君看崔員外晚就觀國賔當年頗赫赫翁嫗爭為姻公自注見退之贈崔員外詩蹭蹬阻風水橫斜挂邉垠青衫映白髮今似梅子真道存百無害甘守吳市闉自言總角嵗慈母為擇鄰邦人驚似舅矯矯惡不仁詩文非他師家法乃富春豈非空同秀為國産雋民挺然齊魯生近出姬姜親為文不在多一頌了伯倫清詩要煆一作淘煉乃得鉛中銀自我遷嶺外七見槐火新著書已絶筆一默含千諄蕢桴和葦籥天節非人均時時自娛嬉豈為俗子陳邢夫人事見第十四卷芙蓉城詩注杜子美詩甫昔少年日早充觀國賔韓退之寄崔立之詩老婦願嫁女約不論財資老翁不量分纍月笞其兒晋書何無忌傳桓元聞義軍起大懼曰劉裕勇冠三軍當今無敵劉毅家無儋石之儲樗蒲一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成晋書劉伶傳字伯倫未嘗厝意文翰惟著酒德頌一篇管子上有鉛下有銀蘇頌本草圖經銀在鎁中與銅相雜土人采得以鉛再三煎鍊方成又鉛銀最難得今時燒煉家每一斤鉛止得一二銖周禮司爟掌行火之政令四時變國火注春取榆栁夏取棗杏夏季取桑柘秋取柞楢冬取槐檀也杜子美詩九鑽巴噀火先生用其意蓋紀年也禮記蕢桴土鼓葦籥伊耆氏之樂也畫車二首何人畫此隻一作觭輪車便是當年欹器圖上易下難須審細左提右挈免疏虞公羊傳晋人敗秦師於殽匹馬隻輪無反者家語孔子觀於魯桓公之廟有欹器焉問守廟者此何器對曰此蓋宥坐之器孔子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡漢書張耳傳厮飬卒說燕曰夫以一趙尚易燕况以兩賢王左提右挈而責殺王滅燕易矣九衢歌舞頌王明誰惻寒泉獨自清賴有千車能散福化為膏雨滿重城䖍州吕倚承事年八十三讀書作詩不巳好收古今帖貧甚至食不足潘子真詩話補遺吕倚夢得維揚人少有埸屋聲善屬對喜收書畫蹭蹬不偶老始以恩補䖍州瑞金簿致仕貧無以歸年八十餘惟有一女嫁贛人因居焉與王禹玉有舊元豐間餉錢二萬酒十壺夢得作啓致謝隔句中用白水真人青州從事為對禹玉極歎賞之其後東坡過䖍以詩遺之云揚雄老無子馮衍終不遇不識孔方兄但有靈照女家藏古今帖墨色照箱筥飢來據空案一字不堪煮枯腸五千卷磊落相撑拄吟為蜩蛩聲時有島可句為語里長者德齒敬巳古如翁有幾人薄少可時助韓退之贈盧同詩俸錢供給公私餘時致薄少助祭祀王子直去嵗送子由北歸往返百舍今又相逢贛上戲用舊韻作詩留别先生有贈王子直秀才詩見三十五卷米盡無人典破裘送行萬里一鄒游解舟又欲携君去歸舍聊須與婦謀聞道年來丹伏火不愁老去雪䝉頭剩買山田添鶴口廟堂新拜富民侯顔魯公與蔡明逺帖云聞鄒游與明逺同來欲至采石計其不久亦合及吾於淮泗之間魏野閒居詩成家書滿室添口鶴生孫次韻江晦叔二首人老家何在龍眠雨未驚酒船回太白稚子候淵明幸與登仙郭同依坐嘯成小樓看月上劇飲到參橫鐘鼓江南岸歸來夢自驚浮雲世事改孤月此心明雨巳傾盆落詩仍翻水成二江爭送客木杪看橋橫次韻江晦叔兼呈器之劉安世字器之終於寶文閣待制學者號曰元城先生橫空初不跨鵬鼇但覺胡床步步髙公自注器之言嘗夢飛自覺身與坐床皆起空中一枕晝眠春有夢扁舟夜渡海無濤歸來又見顛茶陸公自注往在錢塘嘗語晦叔陸羽茶顛君亦然多病仍逢止酒陶公自注陶淵明有止酒詩器之小時飲量無敵今不復飲矣笑說南荒底處所祗今榕葉下庭臯王注先生渡江北還以三更發瓊州晚到遞角埸元城先生語録某初到南方有一髙僧教某南方地熱而酒性亦熱今嶺南煙瘴之地更加以酒必大發疾故某過嶺即合家斷酒雖遍歷水土惡弱他人必死之地某合家十口皆無恙今北歸巳十年矣無一患瘴者此其效也寒食與器之游南塔寺寂照堂城南鐘鼓鬭清新端為投荒洗瘴塵總是鏡空堂上客誰為寂照境中人紅英掃地風驚曉緑葉成隂雨洗春記取明年作寒食杏花曽與此翁鄰先生和聰上人詩一悟鏡空老始知圓澤賢楞嚴經湛然寂照韓退之杏花詩居鄰北郭古寺空杏花兩株能白紅明年更發應更好道人莫忘鄰家翁器之好談禪不喜游山山中笋出戲語器之可同參玉版長老冷齊夜話先生邀器之食笋味勝問此何名東坡曰即玉版也此老師善說法器之乃悟其為戲坡公大笑作偈云云叢林真百丈法嗣有橫枝公自注玉版橫枝竹笋也不怕石頭路來參玉版師聊憑柏樹子與問籜龍兒瓦礫猶能說此君那不知釋氏要覽梵語貧波此云叢林傳燈録洪州百丈山懷海禪師所居處巖巒峻極故號曰百丈又黃梅謂道信師曰和尚他後橫出一枝佛法禪家旁出者謂之橫枝前燕録石季龍使人采藥上華山得玉版先生詩則借以喻笋也莊子道在瓦礫傳燈録有僧問如何是佛文殊答云墻壁瓦礫而猶能說之此君竹也用王子猷語屢見永和清都觀道士童顔鬒髮問其年生於丙子蓋與豫同求此詩鏡湖敕賜老江東未似西歸玉局翁羈枕未容春夢斷清都宛在默存中每逢佳境携兒去試問行年與我同自笑餘生消底物半篙清漲百灘空公自注豫與劉器之同發䖍州江水忽清漲丈餘贛石二百里無一見者至永和器之解舟先去豫獨遊清都作此詩贈詩僧道通雄豪而妙苦而腴祗有琴聰與蜜殊公自注錢塘僧思聰總角善琴後捨琴而學詩復弃詩而學道其詩似皎然而加雄放安州僧仲殊詩敏捷立成而工妙絶人殊辟穀常啖蜜語帶烟霞從古少公自注李太白云他人之文如山無烟霞春無草木氣含蔬筍到公無公自注謂無酸饀氣也香林乍喜聞簷蔔古井惟慙斷轆轤為報韓公莫輕許從今島可是詩奴劉禹鍚答栁子厚書新文吟而繹之顧其詞甚約而味奫然以長端而曼苦而腴張競辰永康所居萬卷堂王注張熙明也君家四壁如相如卷藏天祿吞石渠豈惟鄴侯三萬軸家有世南行祕書兒童拍手笑何事笑人空腹談經義未許中郎得異書且與揚雄說竒字清江縈出碧玉環下有老龍千古閒知君好事家有酒化為老人夜扣關留侯之孫書滿腹玉函寶方何用讀濠梁空復五車多圯上從來一編一作篇足國朝雜事唐太宗出幸有司請載書以從帝曰不須虞世南在此行祕書也劉壯輿長官是是堂閒燕言仁義是非安可無非非義之屬是是仁之徒非非近乎訕是是近乎諛當為感麟翁善惡分錙銖抑為阮嗣宗臧否兩含糊劉君有家學三世道益孤陳古以刺今紬史行天誅皎皎大明鏡百陋逢一姝鶚立時四顧何由優羣狐作堂名是是自說行坦途孜孜稱善人不善自逺徂願君置座右此語禹所謨漢書士相與言仁義於閒燕歐陽永叔非非堂記是是近乎諂非非近乎訕不幸而過寧訕無諂先生用其說按麟翁二句指仲尼作春秋韓退之詩近來自說尋坦途左傳宣十六年羊舌職曰吾聞之禹稱善人不善人逺後漢崔瑗有座右銘豫昔作壺中九華詩其後八年復過湖口則石巳為好事者取去乃和前韻以自解云江邉陳馬走千峰問訊方知冀北空尤物巳隨清夢斷公自注劉夢得以九華為造物一尤物真形猶在畫圖中公自注道藏有五嶽真形圖歸來晚嵗同元亮郤掃何人伴敬通賴有銅盆修石供仇池玉色自璁瓏公自注家有銅盆貯仇池石正緑色有洞水逹背豫又嘗以怪石供佛印師作怪石供一篇次韻郭功甫二首功甫觀先生畫雪雀有感作詩寄惠州云平生才力信瑰竒今在窮荒豈易歸正似雪林枝上畫羽翰雖好不能飛後先生北歸又用前韻寄詩云秋霜春雨不同時萬里今從海外歸巳出網羅毛羽在卻尋雲跡帖天飛今次其韻也蚤知臭腐即神竒海北天南總是歸九萬里風安稅駕雲鵬今悔不卑飛可憐倦鳥不知時空羡騎鯨得所歸玉局西南天一角萬人沙苑看孤飛按年譜元符三年庚辰五月自儋移廉州八月又移永州十一月被命復朝奉郎提舉成都玉局觀沙苑用徐佐卿化鶴事詳見三十七卷新居詩注次韻法芝舉舊詩一首春來何處不歸鴻非復羸牛踏舊蹤但願老師真似月誰家罋裏不相逢王注建中靖國初盡起元祐諸公之廢先生亦得請歸常州故以歸鴻起興先生舊有詩與法芝云團團如磨牛步步踏陳迹又云老芝如雲月炯炯時一出故今云爾次舊韻贈清凉長老過淮入洛地多塵舉扇西風欲汚人但怪雲山不改色豈知江月解分身安心有道年顔好一作少遇物無情句法新送我長蘆舟一葉笑看雪浪滿衣巾傳燈録僧問龍光和尚賔頭盧一身何為赴四天供師曰千江同一月萬户盡逢春睡起聞米元章冒熱到東園送麥門冬飲子一枕清風直萬錢無人肯買北窗眠開心暖胃門冬飲知是東坡手自煎本草别録麥門冬葉如韭根似麥而有鬚凌冬不凋故又名忍冬夢中作寄朱行中舊傳先生夲序云前一日夢作此詩寄朱行中覺而記之自不曉所謂謾寫去夢中分明用此色紙也舜不作六器誰知貴璵璠哀哉楚狂士抱璞號空山相如起睨柱頭璧與俱還何如鄭子産有禮國自間雖微韓宣子鄙夫亦辭環至今不貪寶凛然照塵寰周禮宗伯以玉作六器以禮天地四方尚書舜典修五禮五玉注五等諸侯所執之玉也逸論語璵璠魯之寶玉也孔子曰美哉璵璠逺而望之煥若也近而視之瑟若也春秋陽虎竊寶玉大弓注寶玉即璵璠左傳昭十六年晋韓宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰大國之求無禮以斥之何饜之有韓子買諸賈人以告子産曰今吾子以好來辱而謂敝邑強奪商人毋乃不可乎韓子辭玉曰起不敏敢求玉以徼二罪請辭之答徑山琳長老徑山長老無畏大士維琳湖之武康人也至常州與東坡問疾詩云扁舟駕蘭陵自援舊風日君家有天人雄雄維摩詰我口吞文殊千里來問疾若以默相酬露柱皆笑出與君皆丙子各巳三萬日一日一千偈電往那容詰大患緣有身無身則無疾平生笑羅什神呪真浪出晋書鳩摩羅什傳從師授經日誦千偈王注按年譜先生生於景祐三年丙子卒於常州乃建中靖國元年辛巳實二萬三千四百六十日今云三萬日舉成數耳老子吾有大患為吾有身若無吾身吾有何患又羅什傳未終之日覺四大不愈乃日出三番神呪令外國弟子誦之以自救未及致力轉覺危殆於是力疾與衆僧告别此詩蓋先生示疾時而和琳老者也故用羅什將終時事施注蘇詩卷三十九
