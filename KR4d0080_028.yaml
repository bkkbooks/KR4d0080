body:
  text: 施注蘇詩卷十四宋蘇軾撰施元之原注武進邵長衡刪補詩三十五首時守彭城洎戊午元豐改元作續麗人行并引李仲謀家有周昉畫背面欠伸內人極精戲作此詩張彥逺名畫記周昉字景玄官至宣州長史多在渾郭功臣家圗畫又云周昉善畫子女深宫無人春日長沈香亭北百花香美人睡起薄梳洗燕舞鶯啼空斷腸畫工欲畫無窮意背立東風初破睡若教回首郤嫣然陽城下蔡俱風靡杜陵飢客眼長寒蹇驢破帽隨金鞍隔花臨水時一見只許腰肢背後看心醉歸來茅屋底方信人間有西子君不見孟光舉案與眉齊何曽背面傷春啼楊妃外傳開元禁中重木芍藥移植於沈香亭前會花方繁開上與妃子賞花命李白進清平調三章末云解釋春風無限恨沈香亭北倚欄干宋玉登徒子好色賦嫣然一笑惑陽城迷下蔡漢韓信傳用廣武君䇿發使燕燕從風而靡杜子美麗人行背後何所見珠壓腰衱穩稱身列子黃帝篇有神巫曰季咸列子見之而心醉聞李公擇飲傅國博家大醉二首兒童拍手閙黃昏應笑山公醉習園縱使先生能一石主人未肯獨留髠晉山簡注屢見李白襄陽歌落日欲沒峴山西倒著接㒿花下迷襄陽小兒齊拍手攔街爭唱白銅鞮傍人借問笑何事笑殺山翁醉似泥史記滑稽傳淳于髠曰臣飲一斗亦醉一石亦醉云云日暮酒闌合尊促坐男女同席履舄交錯杯盤狼藉堂上燭滅主人留髠而送客羅襦襟解微聞薌澤當此之時髠心最歡能飲一石不肯惺惺騎馬回玉山知為玉人頺紫雲有語君知否莫喚分司御史來劉禹錫揚州春夜詩寂寂獨看金燼落紛紛只見玉山頺自羞不是髙陽侣一夜惺惺騎馬回世説山公稱嵇叔夜之為人也巖巖若孤松之獨秀其醉也忽若玉山之將頺唐闕記杜牧為御史久之分務洛陽時李聰罷鎮間居聲妓豪華為當時第一嘗宴客女妓百餘皆殊色牧注視良久問曰聞有紫雲者孰是宜以見惠李俯而笑諸妓皆回首破顔牧自飲三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時回意氣間逸傍若無人起伏龍行并引徐州城東二十里有石潭父老云與泗水通增損清濁相應不差時有河魚出焉元豐元年春旱或云置虎頭潭中可以致雷雨用其説作起伏龍行何年白竹千鈞弩射殺南山雪毛虎至今顱骨帶霜牙尚作四海毛蟲祖東方久旱千里赤三月行人口生土碧潭近在古城東神物所蟠誰敢侮上欹蒼苔擁巖竇下應清河通水府眼光作電走金蛇鼻息為雲擢煙縷當年負圗傳帝命左右羲軒詔神禹爾來懷寶但貪眠滿腹雷霆瘖不吐赤龍白虎戰明日公自注是月丙辰明日庚寅倒卷黃河作飛雨嗟我豈樂鬬兩雄有事徑須煩一怒後漢南蠻傳板楯者秦昭襄王時有一白虎常從羣虎數逰秦蜀巴漢之境昭王重募國中能殺虎者時有巴郡閬中􅊂人能作白竹之弩登樓射殺白虎昭王嘉之乃刻石盟要􅊂人安之三國志魏杜襲傳千鈞之弩不為鼷鼠發機尚書故實南中久旱以繩繫虎頭骨投有龍處入水即數人牽制不定俄頃雲起潭雨亦隨下龍畏虎雖枯骨能動之如此劉禹錫嘉話亦云毛蟲字出漢書五行志帝王世紀龍馬出圗於河伏羲觀之以畫八卦黃帝言余夢兩龍挺白圗以授余於河之都又洛出龜書以賜神禹洪範是也張華博物志龍抱寶而眠謂之癡龍史記孟嘗君傳秦齊世不兩雄洞庭靈姻傳堯遭洪水九年乃此子一怒耳聞公擇過雲龍張山人輒往從之公擇有詩戲用其韻我生固多憂肉食常苦墨軒然就一笑猶得好飲力聞君過雲龍對酒兩靜默急攜清歌女出郭及未昃一歡難力致邂逅有勝特喧蜂集晚花亂雀啅叢棘山人樂此耳寂寞誰侍側何當求好人聊使治要襋使君自孤僨此理誰相值不如學飬生一氣服千息左傳哀十三年晉定公吳夫差會于黃池吳晉爭先司馬寅曰請姑視之反曰肉食者無墨今吳王有墨國勝乎太子死乎杜預注墨氣色下也後漢薊子訓傳軒渠笑悅欲往就之詩國風摻摻女手可以縫裳要之襋之好人服之漢胸奴傳冒頓為書遺髙后曰陛下獨立孤僨獨居兩主不樂無以自虞注僨仆也猶言不能自立也虞與娛同晉許邁傳常服氣一氣千餘息送李公擇嗟余寡兄弟四海一子由故人雖云多出處不我謀弓車無停招逝去勢莫留僅存今幾人各在天一陬有如長庚月到曉爛不收宜我與夫子相好手足侔比年兩見之賓主更獻酬樂哉十日飲衎衎和不流論事到深夜僵仆鈴與騶頗嘗見使君有客如此不欲别不忍言慘慘集百憂念我野夫兄知名三十秋已得其為人不待風馬牛他年林下見傾蓋如白頭詩國風終鮮兄弟惟豫二人左傳逸詩翹翹車乘招我以弓史記范雎傳秦昭王遺平原君書曰君幸過寡人願與君為十日飲王注鈴守鈴閣者漢東方朔傳給騶侏儒師古曰騶奉廄之御也晉謝安傳桓溫請安為司馬既到溫喜問左右曰頗嘗見我有如此客不野夫公擇之兄名莘送筍芍藥與公擇二首久客厭鹵饌公自注蜀人謂東北人鹵子枵然思南烹故人知我意千里寄竹萌駢頭玉嬰兒一一脫錦繃庖人應未識旅人眼先明我家拙厨膳彘肉芼蕪菁送與江南客燒煮配香粳韓退之初南食詩自宜味南烹爾雅筍竹萌也吳筠竹賦一筍明其胤嗣三節獲乎嬰兒儲光羲筍詩稚子脫錦繃駢頭玉香滑張平子南都賦若其厨膳則有華薌重秬滍臯香粳今日忽不樂折盡園中花園中亦何有芍藥裊殘葩久旱復遭雨紛披亂泥沙不折亦安用折去還可嗟棄擲亮未能送與謫仙家還將一枝春插向兩髻丫陸凱寄梅詩江南無所有聊贈一枝春按公詩特借用其字故爾不拘歐陽公詩小婢立我前赤腳兩髻丫和孫莘老次韻去國光隂春雪消還家蹤迹野雲飄功名正自妨行樂迎送才堪博早朝雖去友朋親吏卒却辭讒謗得風謡今年我亦江南去不問繁雄與寂寥晉向秀傳秀注莊子嵇康曰此書詎復須注正自妨人作樂耳白樂天詩昏昏一覺睡不博蚤朝人後漢李郃傳和帝分遣使者各至州縣觀採風謡遊張山人園壁間一軸煙蘿子盆裏千枝錦被堆慣與先生為酒伴不嫌刺史亦顔開纎纎入麥黃花亂颯颯催詩白雨來聞道君家好井水歸軒乞得滿瓶回唐楊巨源看花詩一林堆錦映千燈王注煙蘿子今所畫修飬者多有之錦被堆一名粉團兒花如月桂而小粉紅或微黃色枝柯纎長髙丈餘往往作架承之司空圖郊園詩逺樹連村暗黃花入麥稀杜子美詩片雲頭上黑應是雨催詩白樂天詩赤日間白雨隂晴同一川杜介熙熙堂﨑嶇世路最先回窈窕華堂手自開咄咄何曾書怪事熙熙長覺似春臺白砂碧玉味方永黃紙紅旗心巳灰遙想閉門投轄飲鵾絃鐵撥響如雷王文考靈光殿賦旋室㛹娟以窈窕咄咄用殷浩事巳見十一卷和趙郎中詩注老子衆人熙熙如享太牢如登春臺神仙傳殷七七每醉歌曰琴彈碧玉調爐飬白朱砂白樂天詩紅旗破賊非吾事黃紙除書無我名投轄陳遵事詳八卷和蘇州太守詩注鵾絃鐵撥開元賀懷知事已見八卷古纒頭曲注唐文宗時內庫有二琵琶號大忽雷小忽雷五代史補馮道之子能彈琵琶以皮為弦世宗號繞殿雷次韻答劉涇吟詩莫作秋蟲聲天公怪汝鉤物情使汝未老華髮生芝蘭得雨蔚青青何用自燔以出馨細書千紙雜真行新音百變口如鶯異義蜂起弟子爭舌翻濤瀾卷齊城萬卷堆胸兀相撑以病為樂子未驚我有至味非煎烹是中之樂吁難名緑槐如山暗廣庭飛蟲繞耳細而清敗席展轉卧見經一作驚亦自不一作不自嫌翠織成意行信足無溝坑不識五郎呼作卿吏民哀我老不明相戒無復煩鞭刑時臨泗水照星星微風不起鏡面平安得一舟如葉輕卧聞郵籖報水程蓴羮羊酪不須評一飽且救飢腸鳴漢兩龔傳薰以香自燒膏以明自消法書苑晉世以來工書者多以行書著名兼真者謂之真行帶草者謂之行草劉伯倫酒德頌陳説禮法是非蜂起漢蒯通傳酈生掉三寸舌下齊七十餘城詩國風輾轉伏枕杜子美張舍人遺褥假詩客從西北來遺我翠織成唐宋璟傳每宴朝堂張易之昌宗列卿三品璟階六品居下座易之諂事璟虛位揖曰公第一人何下座璟曰才劣品卑卿何謂第一是時朝廷以易之內寵不名其官呼易之五郎昌宗六郎鄭善果謂璟曰公奈何謂五郎為卿璟曰以官正當為卿君非其家奴何郎之云後漢馬援傳頗哀老子使得遨遊唐徐有功傳為蒲州司法參軍為政仁不忍杖罰民服其恩更相約曰犯徐參軍杖者必斥之謝靈運南亭詩戚戚感物歎星星白髮垂杜子美青草湖詩宿漿依農事郵籖報水程蓴羮羊酪見七卷金門寺中詩注陶淵明詩傾身營一飽韓退之詩飢腸徹死無由鳴攜妓樂遊張山人園大杏金黃小麥熟墮巢乳鵲拳新竹故將俗物惱幽人細馬紅糚滿山谷提壺勸酒意雖重杜鵑催歸聲更速酒闌人散却關門寂歷斜陽挂疏木晉王戎傳俗物已復來敗人意李白對酒歌二八佳人細馬駝青黛畫眉紅錦靴種德亭并引處士王復家於錢塘為人多技能而醫尤精期於活人而巳不志於利築室候潮門外治園圃作亭榭以與賢士大夫遊惟恐不及然終無所求人徒知其接花藝果之勤而不知其所種者德也乃以名其亭而作詩以遺之小圃旁城郭閉門芝木香名隨市人隱德與佳木長元化善飬性倉公多禁方所活不可數相逢旋相忘但喜賔客來置酒花滿堂我欲東南去再觀雙檜蒼山茶想出屋湖橘應過牆木老德亦熟吾言豈荒唐唐詩水淨苔莎色露香芝术苗後漢華他傳字元化曉飬性之術年且百嵗而有壯容史記扁鵲倉公傳太倉公姓淳于氏名意少而喜醫方術師元里公乘陽慶悉以禁方豫之史記貨殖傳十嵗樹之以木百嵗來之以德莊子天下篇繆悠之説荒唐之言文與可有詩見寄云待將一假鵝溪絹掃取寒梢萬尺長次韻答之為愛鵝溪白繭光掃殘雞距紫毫鋩世間那有千尋竹月落庭空影許長茶録蜀東川鵝溪出畫絹作羅底佳白樂天雞距筆賦足之健者雞足毛之徑者兔毛就足之中奮發者利距在毛之內秀出者長毫合為乎筆正得其要聞辨才法師復歸上天竺以詩戲問道人出山去山色如死灰白雲不解笑青松有餘哀忽聞道人歸鳥語山容開神光出寶髻法雨洗浮埃想見南北山花發前後臺寄聲問道人借襌以為詼何所聞而去何所見而回道人笑不答此意安在哉昔年夲不住今者亦無來此語竟非是且食白楊梅盧同月蝕詩青山死灰色莊子盜跖篇孔子下車色若死灰楞嚴經世尊從肉髻中涌百寶光光中涌出千葉寶蓮白樂天寄上天竺詩前臺花發後臺見上界鐘聲下界聞晉嵇康傳與向秀煆於大樹下鍾會往造焉康不為禮而煆不輟久之會去康謂曰何所聞而來何所見而去會曰聞所聞而來見所見而去金剛經應生無所住心若心有住則為非住又阿那含名為不來而實無不來北户雜録鄭虔云越州客山有白楊梅杭州圖經楊梅塢在南山近瑞峰楊梅尤盛有紅白二種今杭人呼白者為聖僧梅和子由送將官梁左藏仲通雨足誰言春麥短城堅不怕秋濤卷日長惟有睡相宜半脫紗巾落紈扇芳草不鋤當户長珍禽獨下無人見覺來身世都是夢坐久枕痕猶著面城西忽報故人來急掃風軒炊麥飯公自注徐州所出伏波論兵初矍鑠中散談仙更清逺南都從事亦學道不恤腸空誇腦滿問羊他日到金華應許相將遊閬苑蜀志周羣傳先主將誅張裕諸葛亮表請其罪答曰芳蘭生門不得不鋤謝承後漢書李固為太守食麥飯後漢馬援傳劉尚擊武陵五溪蠻軍沒援請行帝愍其老援據鞍顧盻以示可用帝笑曰矍鑠哉是翁也援為伏波將軍晉嵇康傳嵇康仕魏為中散大夫常修飬性服食之事以為神仙稟之自然非學所得至於導飬得理則安期彭祖之夀可及乃著飬生論王注南都從事謂子由也時子由從張文定僉書南京判官嘗云學道三十年今始粗聞道也道家口訣欲得不死腸中無滓欲得不老還精補腦神仙傳黃初平家使牧羊有道士將至金華山石室中其兄尋索見之問羊何在初平叱白石俱起成羊兄曰道可學否初平曰唯好即得兄乃棄家服伏苓五萬日遂得仙集仙録西王母居閬風之苑東方朔十洲記崑崙山三角其一正北干辰星之輝名閬風次韻秦觀秀才見贈秦與孫莘老李公擇甚熟將入京應舉秦觀髙郵人初字太虛後改字少遊夜光明月非所投逢年遇合百無憂將軍百戰竟不侯伯郎一斗得涼州翹關負重非無力十年不入紛華域故人坐上見君文謂是古人吁莫測新詩説盡萬物情硬黃小字臨黃庭故人已去君未到空吟河畔草青青誰謂他鄉各異縣天遣君來破吾願一聞君語識君心短李髯孫眼中見江湖放浪久全真忽然一鳴驚倒人縱橫所值一作往無不可知君不怕新書新千金敝帚那堪換我亦淹留豈長算山中既未決同歸我聊爾耳君其漫漢鄒陽傳明月之珠夜光之璧以暗投人於道衆莫不按劍相盼史記佞幸傳力田不如逢年善仕不如遇合漢李廣傳與望氣王朔語曰自漢擊胸奴廣未嘗不在其中終無尺寸功以得封邑豈吾相不侯耶三輔決録孟他字伯郎一斗涼州注見一卷和劉長安題薛周逸老亭唐選舉志武后長安二年始置武舉有馬槍翹關負重身材之選唐書員半千傳武后謂半千曰久聞爾名謂為古人乃在朝邪王注公言嘗於祕書閣觀王羲之墨迹皆唐人硬黃紙臨夲惟鵝羣一帖似羲之真筆古樂府飲馬長城窟行青青河畔草綿綿思逺道又他鄉各異縣展轉不相見世説郗超為桓溫參軍王珣為主簿府中語曰髯參軍短主簿蘅按短李謂公擇髯孫謂莘老借用李紳孫會稽事耳舊注非嵇叔夜詩志在守朴飬素全真史記楚世家莊王曰三年不蜚蜚將沖天三年不鳴鳴將驚人唐王勃傳李嶠宋之問之文如良金美玉無施不可三國魏武帝紀自作兵書十餘萬言諸將征伐皆以新書從事王注新書言王介甫新學經義之説也魏文帝典論夫人難於自見而文非一體鮮能備善是以各以所長相輕所短里語曰家有敝帚享之千金不自見之患也晉阮咸傳未能免俗聊復爾耳唐元結傳自稱浪士及有官人以為浪者亦漫為官乎又曰公漫久矣可以漫為叟僕曩於長安陳漢卿家見吳道子畫佛碎爛可惜其後十餘年復見之於鮮于子駿家則巳裝背完好子駿以見遺作詩謝之米元章畫史云蘇子瞻家收吳道子畫佛及侍者志公十餘人破碎甚而當面一手精彩動人點不加墨口淺深暈成故最如活元章所記即此畫也貴人金多身復間爭買書畫不計錢巳將鐵石充逸少公自注法帖大王書中有殷鐵石字鐵石梁武帝時人更補朱繇為道元公自注世所收吳道子畫多朱繇筆也煙薰屋漏裝玉軸鹿皮蒼璧知誰賢吳生畫佛夲神授一作駿夢中化作飛空仙覺來落筆不經意神妙獨到秋毫顛昔我長安見此畫歎息至寶空澘然素絲斷續不忍看巳作蝴蝶飛聯翩君能收拾為補綴體質散落嗟神全志公髣佛見刀尺修羅天女猶雄妍如觀老杜飛鳥句脫字欲補知無緣問君乞得良有意欲將俗眼為洗煎貴人一見定羞怍錦囊千紙何足捐不須更用博麻縷付與一炬隨飛煙尚書故實千字文梁周興嗣編次而有王右軍書者乃梁武教諸王書令殷鐵石於大王書中榻一千字不重者每字片紙雜碎無序武帝召興嗣韻之書畫補遺朱繇長安人工畫佛道米元章畫史真絹色淡雖百破而色明白精神彩色如新惟佛像多經香煙薰損夲色書苑顔魯公與懷素同學草書於郭兵曹或問張長史見公孫大娘舞劍器始得低昂回翔之狀兵曹亦有之乎懷素以古叉腳對魯公曰何如屋漏痕漢書食貨志武帝造白鹿皮幣令王侯朝覲必以薦璧顔異曰今王侯朝賀以蒼璧直數千而其皮薦反四十萬夲末不相稱小説一道人為戲術碎翦絹作蝴蝶而飛少選復如故或藏其一蝶絹亦虧如蝶之大傳燈録寶志襌師金城人姓朱氏常執錫杖頭鐶翦刀尺銅鑑歐陽詩話陳從易舍人偶得杜詩舊本至送蔡都尉詩云身輕一鳥其下脫一字數客各用一字補之或云疾或云落或云下後得完本乃過字陳歎曰一字莫能到也王注博麻縷似祖語麻三斤之類雨中過舒教授舒名煥字堯夫公守徐堯夫時為教授疏疏簾外竹瀏瀏竹間雨窗扉靜無塵几硯寒生霧美人樂幽獨有得緣無慕坐依蒲褐禪起聼風甌語客來淡無有灑掃涼冠屨濃茗洗積昏妙香淨無慮歸來北堂暗一一微螢度此生憂患中一餉安間處飛鳶悔前笑黃犬悲晚悟自非陶靖節誰識此間趣杜子美詩心清聞妙香陶淵明詩此間有真趣欲辨巳忘言飛鳶黃犬注並見前次韻舒教授寄李公擇草書妙絶吾所兄真書小低猶抗行論文作詩俱不敵看君談笑收降旌去年逾月方出晝公自注豫去年留齊月餘為君劇飲幾濡首今年過我雖少留寂寞陶潛方止酒公自注此行公擇病酒夕不飲别時流涕攬君鬚懸知此歡墮空虛松下縱橫餘屐齒門前轣轆想君車怪君一身都是德近之清潤淪肌骨細思還有可恨時不許藍橋見傾國公自注公擇有婢名雲英屢欲出不果晉王羲之傳每自稱我書比鍾繇當抗行比張芝草猶雁行也華嶠譜序華歆能劇飲石餘不亂周易未濟有孚于飲酒無咎濡其首象曰飲酒濡首亦不知節也陶潛止酒詩始覺止為善今朝真止矣裴硎傳竒長慶開裴航傭舟襄漢同舟有樊夫人者國色也航以詩及珍果獻夫人以詩答曰一飲瓊漿百感生元霜杵盡見雲英藍橋便是神仙窟何必﨑嶇上玉京後航歸輦下經藍橋驛因渴乞漿于茅舍果遇雲英遂娶之後同得仙去又送鄭户曹鄭户曹名僅字彥能彭城人是時為冠氏令水繞彭城樓山圍戲馬臺古來豪傑地千嵗有餘哀隆準飛上天重瞳亦成灰白門下吕布大星隕臨淮尚想劉德輿置酒此徘徊爾來苦寂寞廢圃多蒼苔河從百步響山到九里回山水自相激夜聲轉風雷蕩蕩清河壖黃樓我所開秋月墮城角春風搖酒杯遲去聲君為坐客新詩出瓊瑰樓成君巳去人事固多乖他年君倦遊白首賦歸來登樓一長嘯使君安在哉漢髙祖隆準而龍顔史記項羽贊舜目蓋重瞳子項羽亦重瞳子後漢吕布傳自號徐州牧曹操攻之布登白門樓攻圍之急乃下酈道元水經注沛南門謂之白門唐李光弼傳封臨淮郡王復歸徐州遇疾薨杜子美武衛將軍挽詞嚴警當寒夜前軍落大星南史宋髙祖諱裕字德輿小字寄奴姓劉氏初封宋公居彭城嘗九日宴戲馬臺韋應物詩水性自云靜石中夲無聲如何兩相激雷轉空山鳴秦太虛黃樓賦序太守蘇公守彭城之明年既治河決之變民以更生又因修繕其城作黃樓於東門之上以為水受制於土而土之色黃故取名焉晉劉琨傳在晉陽為胡騎所圍城中窘琨乃乘月登樓清嘯賊聞之悽然棄圍而走次韻黃魯直見贈古風二首黃魯直名庭堅分寧人與張文潛秦少遊朝無咎俱出蘇門天下號元祐四學士而魯直之名幾配東坡故稱蘇黃云附魯直古詩一曰江梅有佳實託恨桃李場桃李終不言朝露借恩光孤芳忌皎潔冰雪空自香古來和鼎實此物升廟廊嵗月坐成晚煙雨青已黃得升桃李盤以逺初見嘗終然不可口擲棄官道傍但使夲根在棄捐果何傷二曰青松出洞壑十里聞風聲上有百尺絲下有千嵗苓小草有逺志相依在平生醫和不並世深根且固蒂人言可醫國何用大早計小大才則殊氣味固相似嘉榖卧風雨稂莠登我場陳前漫方丈玉食慘無光大哉天宇間美惡更臭香君看五六月飛蚊殷回廊兹時不少假俯仰霜葉黃期君蟠桃枝千嵗終一嘗顧我如苦李全生依路旁紛紛不足愠悄悄徒自傷杜子美詩天涯歇滯雨粳稻卧不翻又病橘詩此物嵗不稔玉食失光輝莊子知北遊神竒復化為臭腐臭腐復化為神竒詩國風殷其靁山海經東海有山名度索上有大桃蟠屈三千里名蟠桃晉王戎傳嘗與羣兒戲道側見李樹多實等輩趣之戎獨不往或問故曰樹在道邉而多子必苦李也取之信然詩國風憂心悄悄愠于羣小公烏臺詩話北京國子監教授黃庭堅寄書一封并古詩二首與軾依韻和答云嘉榖卧風雨至玉食慘無光以譏今之小人勝君子如稂莠之奪嘉榖又云大哉天宇間至悄悄徒自傷意言君子小人進退有時如夏月蚊虻縱橫至秋自息比黃庭堅於蟠桃進必遲自比苦李以無用全生又取詩云愠于羣小以譏諷當今進用之人皆小人也空山學仙子妄意笙簫聲千金得竒藥開視皆豨苓不知市人中自有安期生今君巳度世坐閲霜中蒂摩挲古銅人嵗月不可計閬風安在哉要君相指似李太白鳳笙篇仙人十五愛吹笙學得崑丘彩鳳鳴韓退之進學解訾醫師以昌陽引年欲進其豨苓也史記封禪書李少君曰安期生仙者通蓬萊中合則見人不合則隱列仙傳安期生琅琊人賣藥東海邉時人皆言千嵗公楚辭逺遊章欲度世以忘歸意恣睢以擔嬌摩挲銅人後漢薊子訓事詳見十二卷子由將赴南都詩注閬風注見夲卷次韻答舒教授觀余所藏墨異時長笑王會稽野鶩膻腥汙刀几暮年郤得庾安西自厭家雞題六紙二子風流冠當代顧與兒童爭愠喜秦王十八巳龍飛嗜好晚將蛇蚓比我生百事不挂眼時人繆説云工此世間有癖念誰無傾身障簏尤堪鄙一生當著幾緉屐定心肯為微物起此墨足支三十年但恐風霜侵髮齒非人磨墨墨磨人瓶應未罄罍先恥逝將振衣歸故國數畝荒園自鋤理作書寄君君莫笑但覓來禽與青李一螺點漆便有餘萬竈燒松何處使君不見永寧第中搗龍麝列屋間居清且美倒暈連眉秀嶺浮雙鴉畫鬢香雲委時聞五斛賜蛾緑不惜千金求獺髓聞君此詩當大笑寒窗冷硯冰生水庾翼家雞注再見桞子厚集殷賢戲批書後寄劉連州詩注云家有右軍書每紙背庾翼題云王會稽六紙二月三十日晉書王羲之終會稽內史庾翼嘗為安西將軍荆州刺史唐太宗紀武德元年進封秦王春蚓秋蛇夲王羲之傳後制為唐太宗撰詳見十二卷和流杯石上詩注按晉書太宗自著宣武二帝陸機王羲之四論於是總題御撰云白樂天七德歌太宗十八舉義兵白旄黃鉞定兩京世説祖士少好財阮遙集好屐同是一纍而未判其得失人有詣祖見料視財物客至屏當未盡餘兩小簏著背後傾身障之意未能平或有詣阮見自吹火蠟屐因歎曰未知一生當著幾緉屐神色間暢於是勝負始分蔡君謨墨説徐鉉云嘗得李超墨一梃與弟鍇共用十年乃盡王注公嘗曰吾有佳墨七十九而求之不巳不近愚耶石昌言蓄墨不許人磨或曰子不磨墨墨當磨子昌言墓木拱矣墨故無恙詩小雅瓶之罄矣維罍之恥淳化法帖大王書四百六十五帖其一云青李來禽櫻桃日給藤子皆囊盛為佳函封多不生足下所疏云此果佳可為致子當種之此種彼胡桃皆生也此號青李來禽帖蕭子良與王僧虔書仲將之墨一點如漆又陸雲與兄書一日上三臺曹公藏石墨數十萬斤今送一螺溫庭筠詩䲧麝成塵香不滅法書苑歐陽通矜其書必以松煙為墨末以真麝唐永寧里王涯第也或云李駙馬第今士大夫家有墨其上有永寧賜第四字即是也意或用此韓退之送李願序粉白黛緑者列屋而間居東齋記事蜀有大慈寺壁畫明皇按樂十眉圖倒暈眉名西京雜記文君眉常如逺山李賀美人梳頭歌纎手郤盤老鴉色翠滑寶叉簪不得杜牧之閨情詩娟娟郤月眉新鬢學鴉飛南部煙花記隋煬帝鳳舸殿腳女吳綘仙善畫長蛾眉帝悅之由是爭為長蛾司宫吏日供螺子黛五斗號蛾緑螺酉陽雜爼吳孫和醉舞如意誤傷鄧夫人頰醫以白獺髓和玉屑以滅瘢䀶送鄭户曹賦席上果得棐子彼美玉人果粲為金槃實瘴霧脫蠻溪清樽奉佳客客行何以贈一語當加璧祝君如此果德膏以自澤驅攘三彭仇巳我心腹疾願君如此木凛凛傲霜雪斫為君倚几滑淨不容削物微興不淺此贈毋輕擲王注棐子出信州玉山縣以懷玉山得名禮記束帛加璧為德也左傳成二年韓厥執縶馬前再拜奉觴加璧以進宣室志彭者三尸之姓學仙者當先絶三尸夲草棐實去三蟲行榮衛史記范雎傳秦之有韓如木之有蠧人之有腹心之病也晉王羲之傳嘗詣門生家見棐兒滑淨因書之真草相半後為其父誤刮去生驚懊者纍日杜子美詩物微意不淺感動一沈吟送胡掾亂葉和淒雨投空如散絲流年一如此逰子去何之節義古所重艱危方自兹他年著清德仍復畏人知張載雜詩騰雲似湧煙密雨如散絲清畏人知晉胡質事詳見五卷和沈立之留别詩注答仲屯田次韻秋來不見渼陂岑千里詩盟忽重尋大木百圍生逺籟朱絃三歎有遺音清風卷地收殘暑素月流天掃積隂欲遣何人賡絶唱滿階桐葉候蟲吟杜子美詩岑參兄弟皆好竒攜我逺來遊渼陂左傳哀十二年吳子使宰嚭請尋盟莊子齊物論大木百圍之竅穴冷風則小和飄風則大和厲風濟則衆竅為虛地籟則衆竅是巳史記樂書清廟之瑟朱絃而疏越一倡而三歎有遺音者矣謝希逸月賦白露曖空素月流天宋書謝靈運傳論平子艷發文以情變絶唱髙蹤久無嗣響桞子厚詩碧空殘月曙門掩候蟲吟密州宋國博以詩見紀在郡雜詠次韻答之吾觀二宋文字字照縑素淵源皆有考竒嶮或難句後來邈無繼嗣子其殆庶胡為尚流落用舍真有數當時茍悅可慎勿笑杖杜斫窗誰赴救袖手良優裕山城辱吾繼缺短煩遮護昔年繆陳詩無人聊瓦注于今賡絶唱外重中巳懼何當附家集擊壤追咸濩二宋宋郊宋祁也國博乃其嗣子漢董仲舒傳贊考其師友淵源有漸北夢瑣言貫休見蜀待詔常重胤傳神曰可謂前無來人後無繼者法華經言辭柔軟悅可衆心舊唐書李林甫傳林甫典選選人嚴逈判語用杕杜二字林甫不識杕字謂韋陟此云杖杜何也陟俯首不敢言朝野僉載唐楊滔為中書舍人時促命草制而吏持門鑰他適無舊夲可檢乃斫窗取之時號斫窗舍人韓退之祭桞子厚文巧匠旁觀縮手袖間嵇叔夜與山巨源絶交書仲尼不假蓋於子夏護其短也莊子逹生篇以瓦注者巧以鉤注者憚以黃金注者殙凡外重者內拙周禮大司樂以樂舞教國子舞大咸大濩鄭氏注大咸堯樂大濩湯樂也答范淳甫范淳甫名祖禹成都華陽人公自注來詩有張僕射李臨淮之句吾州下邑生劉季誰數區區張與李重瞳遺迹巳塵埃惟有黃樓臨泗水公自注郡有聼事俗謂之霸王聼相傳不可坐僕拆之以蓋黃樓而今太守老且寒俠氣不洗儒生酸猶勝白門窮吕布欲將鞍馬事曹瞞漢髙祖紀姓劉字季沛豐邑中陽里人也唐張建封貞元四年拜徐泗節度使檢校尚書右僕射李光弼封臨淮郡王後歸徐州遇疾薨並見夲傳九域志徐州泗水今呼為清河水經云泗之别名又泗水亭漢髙祖嘗為亭長魏志吕布傳曹操攻之自白門樓下降布請操曰明公所患不過於布今已服矣令布將騎明公將步天下不足定也次韻答王定國每得君詩如得書宣心寫妙書不如眼前百種無不有知君一以詩驅除傳聞都下十日雨青泥沒馬街生魚舊雨來人今不來悠然獨酌卧清虛我雖作郡古云樂山川信美非吾廬願君不廢重九約念此衰冷勤呵噓劉禹錫酬樂天詩兩傳千里意書札不如詩杜子美秋述杜子卧病長安旅次多雨生魚青苔及榻常時車馬之客舊雨來今雨不來唐馬周傳舍新豐逆旅主人不之顧命酒一斗八升悠然獨酌清虛定國堂名王粲登樓賦雖信美而非吾土芙蓉城世傳王迥子髙與仙人周瑶英遊芙蓉城元豐元年三月余始識子髙問之信然乃作此詩極其情而歸之正亦變風止乎禮義之意也胡微之作王子髙芙蓉城傳略王迥字子髙虞部員外郎正路之次子初遇一女自言周太尉女語王曰我於人間嗜欲未盡緣以冥契當侍巾幘是以奉尋非一朝一夕之分也又王初見周懼不敢寢更深困甚視窗户掩闃及入解衣聞屏幃間有喘息聲乃適女郎巳脫衣而卧天明已不見餘香不散自是朝去夕至凡百餘日又周云即預朝列王曰朝帝耶不言其詳由此倐去不來者數日忽一夕夢周道服而至謂王曰我居幽僻君能一往否喜而從之但覺其身飄然與周同舉須臾過一嶺及一門珍禽佳木清流怪石殿閣金碧相照遂與王自東箱門入循廊至一殿亭甚雄壯下有三樓相視而聳亦甚雄麗廊間半開周忽入王少留須臾周與一女郎至周曰三山之事息乎曰雖巳息奈情何於是拊掌而去逡巡東廊之門啓有女流道裝而出者百餘人立於庭下俄聞殿上卷簾有美丈夫一人朝服憑几而庭下之女循次而上少頃憑几者起簾復下諸女流亦復不見周遂命王登東廂之樓上有酒其憑欄縱觀山川清秀梁上有碑題曰碧雲其字則真誥八龍雲篆王未及下一女郎復登是樓年可十五容色嬌媚亦周之比周曰此芳卿也與我最相愛芳卿蓋其字耳夢之明日周來王語以夢周笑曰芳卿之意甚勤也王問何地周曰芙蓉城也曰憑几者誰三山之事何謂周皆不對問芳卿何姓曰與我同王感其事作詩遺周云又虞曹公狀其事以奏帝春花秋月悽悽悲泣而去周臨别留詩云久事屏幃不暫間今朝離意尚闌珊臨行惟有相思淚滴在羅衣一半斑按芙蓉城傳施氏注散入句下王注録之亦不詳蘅未見全傳又無他夲可校兹從施氏句注中掇拾出之未免句字脫落殘闕多有而先生是詩大概采用其意不可略也乃附著之如此芙蓉城中花冥冥誰其主者石與丁珠簾玉桉翡翠屏雲舒霞卷千俜停中有一人長眉青炯如微雲淡疏星往來三世空鍊形竟坐誤讀黃庭經天門夜開飛爽靈無復白日乘雲軿俗緣千劫磨不盡翠被冷落淒餘馨因過緱山朝帝廷夜聞笙簫弭節聼飄然而來誰使令皎如明月入窗櫺忽然而去不可執寒衾虛幌風泠泠仙宫洞房夲不扄夢中同躡鳳皇翎徑度萬里如奔霆玉樓浮空聳亭亭天書雲篆誰所銘繞樓飛步髙竛竮仙風鏘然韻流鈴蘧蘧形開如醉醒芳卿寄謝空丁寧一朝覆水不返瓶羅巾别淚空熒熒春風花開秋葉零世間羅綺紛膻腥此身流浪隨滄溟偶然相值兩浮萍願君收視觀三庭勿與嘉榖生蝗螟從渠一念三千齡下作人間尹與邢杜子美詩樹􅭒離思花冥冥歐陽公詩話石曼卿卒後其故人有見之者言我今為仙也所主芙蓉城張師正括異志慶歷中有朝士冒晨赴起居通衢見美婦三十餘人並馬而行若前導者俄見丁觀文度按轡繼之而去有一人最後行朝士問曰觀文將遊何處曰非也諸女御迎芙蓉館主時丁巳在告頃之聞卒襄陽記龍巢山鉢帽峰尹喜石室內有玉案仙經八卷在案上三輔黃圖未央宫漸臺西有兩桂宫中有光明殿皆金玉珠璣為簾箔韓退之華山女詩洗糚拭面著冠帔白咽紅頰長眉青孟浩然詩微雲淡河漢疏雨滴梧桐酉陽雜爼有人掘地遇石函發之見一人方偃仰容色如生須臾振髮而起即失所在方士云此太隂鍊形人也吳筠步虛詞稟化凝正氣鍊形為真仙集仙録謝自然日誦黃庭經十遍誦時有童子侍立每十遍即將向上界去東華夫人曰誦經先讀外篇大都精思誦讀者獲福粗行者獲罪盧同詩天門九重髙崔嵬夜半祭醮夜半開太微靈書人有三魂一曰爽靈二曰台光三曰幽精南史鄧先生傳白日神仙魏夫人忽來臨降曰君有仙分所以故來裴硎封陟傳雲軿既去窗户遺芳劉向列仙傳王子喬周靈王太子也好吹笙道士浮邱公接上嵩山後三十餘年來山中告桓良曰告我家七月七日待我於緱氏山頭果乘白鶴駐山頭舉手謝時人而去楚詞抑志而弭節兮注按節徐行也江淹擬悼婦詩明月入綺窗倣佛想蕙質王注自天門夜開至風泠泠以言周初至時事宋玉神女賦其少進也皎如明月舒其光杜子美薛判官詩自云帝季女噀雨鳳皇翎東方朔十洲記崑崙山上有玉樓十二唐韻伶俜通作竛竮度人經擲火萬里流鈴八衝吳筠步虛詞豁落制六天流鈴威百魔莊子齊物論俄然覺則蘧蘧然周也注巳見又其寐也神交其覺也形開後漢何進傳覆水不收悔將何及李太白妾薄命行雨落不上天水覆難重收元微之鶯鶯傳熒熒然猶瑩於茵席白樂天長恨歌春風桃李花開夜秋雨梧桐葉落時黃庭內景三庭佳榖生蝗螟王注此所謂歸之正也三庭道家事佳榖生蝗螟言色欲之賊身如蝗螟之賊佳榖也楊妃外傳由此一念當復墮下界神仙傳馬明先生隨神女還岱見安期生語神女曰昔與女郎遊於安息西海之際憶此巳三千年矣史記外戚世家漢武帝尹夫人邢夫人同時並幸或云尹喜邢和璞王注正是二夫人耳謂彼自墮落勿效尤也和鮮于子駿鄆州新堂月夜二首公自注前次韻後不次去嵗遊新堂春風雪消後池中半篙水池上千尺桞佳人如桃李胡蝶入衫袖山川今何許疆野一作界巳分宿嵗月不可思駛若船放溜繁華真一夢寂寞兩榮朽惟有當時月依然照杯酒應憐船上人坐穩不知漏曹子建詩南國有佳人容華若桃李明月入華池反照池上堂堂中隱几人心與水月涼風螢已無迹露草時有光起觀河漢流步屧響長廊名都信繁會千指調絲簧先生病不飲童子為燒香獨作五字詩清絶如韋郎詩成月漸側皎皎兩相望蘇州圗經響屧廊以楩梓板藉其地西子行則有聲因名韋郎韋蘇州應物也白樂天稱其五言尤髙間雅淡自成一家已見十二卷詩注杜子美詩浩歌渌水曲清絶聼者從詩國風月出皎兮送將官梁左藏赴莫州王注莫州文安郡理鄚縣唐開元中以鄚字類鄭改為莫乃公孫瓚之易京也燕南垂趙北際其間不合大如礪至今父老哀公孫蒸土為城鐵作門城中積榖三百萬猛士如雲驕不戰一旦鼓角鳴地中帳下美人空掩面豈如千騎平時來笑談謦咳生風雷葛巾羽扇紅塵靜投壺雅歌清燕開東方健兒虓虎樣泣涕懷思廉耻將彭城老守亦淒然不見君家雪兒唱後漢公孫瓚傳瓚禽劉虞盡有幽州之地前此有童謡曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚以為易地當之遂徙鎮焉盛修營壘樓觀慮有非常乃居髙京以鐵為門斥去左右男人專侍姬妾其文簿書記皆汲而上之令婦人習為大聲以傳宣教令謀臣猛將稍有乖散自此之後希復攻戰或問其故瓚曰今兵革方始觀此非我所決不如休兵力耕積榖三百萬斛足以待天下之變建安三年袁紹復大攻瓚瓚遺子續書曰袁氏之攻狀如鬼神梯衝舞吾樓上鼓角鳴於地中及戰敗乃悉縊其姊妹妻子然後引火自焚晉載記赫連勃勃起都城蒸土築之錐入一寸即殺作者而并築之古樂府羅敷行東方千餘騎夫壻居上頭語林諸葛武侯白葛巾持羽扇指麾三軍後漢祭遵傳取士必用儒術對酒設樂必投壺雅歌魏志吕布傳謂曹性曰卿健兒也杜子美哀王孫詩朔方健兒好身手詩大雅進厥虎臣闞如虓虎杜子美遣興詩安得亷恥將三軍同晏眠王注東方健兒則梁左藏所替罷處故懷思之也唐李密有寵姬名雪兒每賓客有新製必令雪兒歌之施注蘇詩卷十四
